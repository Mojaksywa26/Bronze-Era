l_french:
 mycenaean_league: "Ligue mycenienne"
 mycenaean_league_desc: "La $mycenaean_league$ est un ordre hegemonique souple de royaumes palatiaux acheens. Son Haut Wanax est le premier parmi des souverains rivaux, non un empereur absolu, et lie les palais par le prestige, le tribut, les sanctuaires et les serments de guerre."
 MYCENAEAN_LEAGUE_LEADER_MALE: "Haut Wanax"
 MYCENAEAN_LEAGUE_LEADER_MALE.long: "Haut Wanax des Acheens"
 MYCENAEAN_LEAGUE_LEADER_MALE.short: "Wanax"
 MYCENAEAN_LEAGUE_LEADER_FEMALE: "Haute Wanassa"
 MYCENAEAN_LEAGUE_LEADER_FEMALE.long: "Haute Wanassa des Acheens"
 MYCENAEAN_LEAGUE_LEADER_FEMALE.short: "Wanassa"
 MYCENAEAN_LEAGUE_AUTHORITY_DISPLAY: "$VAL$"
 change_mycenaean_league_authority_text: "$VALUE|+=2$ $mycenaean_league_authority$"
 current_mycenaean_league_authority_text: "$mycenaean_league_authority$ vaut au moins $VALUE|0$"
 mycenaean_league_authority: "Unite acheenne"
 mycenaean_league_authority_desc: "L'Unite acheenne mesure le prestige du Haut Wanax, la cohesion diplomatique des palais, la legitimite des sanctuaires communs et la volonte des royaumes acheens de combattre ensemble."
 high_wanax: "Haut Wanax"
 high_wanax_desc: "Le souverain reconnu comme premier parmi les rois palatiaux acheens."
 great_palace_candidate: "Grand palais"
 great_palace_candidate_desc: "Un royaume palatial majeur disposant d'une forte pretention a diriger le monde acheen."
 palace_candidate: "Palais rival"
 palace_candidate_desc: "Un royaume palatial respecte capable de contester l'hegemonie lorsque les grands centres faiblissent."
 palace_kingdom: "Royaume palatial"
 palace_kingdom_desc: "Un wanaxat membre du reseau palatial acheen."
 sanctuary_patron: "Patron de sanctuaire"
 sanctuary_patron_desc: "Un royaume dont le souverain tire son autorite des sacrifices, des festivals et du soutien des pretres des grands sanctuaires."
 island_wanaxate: "Wanaxat insulaire"
 island_wanaxate_desc: "Un royaume palatial maritime lie a la ligue par les navires, le commerce et la diplomatie egeenne."
 mycenaean_palace_tribute: "Tribut palatial"
 mycenaean_palace_tribute_desc: "Bronze, grain, textiles et levees envoyes par les palais secondaires au Haut Wanax en echange de protection et de prestige."
 mycenaean_palace_tribute_price: "Tribut palatial"
 MYCENAEAN_LEAGUE_TRIBUTE_BASE: "Base du tribut palatial"
 MYCENAEAN_LEAGUE_TRIBUTE_SHARE: "Richesse palatiale"
 MYCENAEAN_LEAGUE_HIGH_WANAX_SHARE: "Haut Wanax"
 MYCENAEAN_LEAGUE_PALACE_WEALTH: "Richesse palatiale"
 MYCENAEAN_LEAGUE_GREAT_PALACE: "Pretendant du grand palais"
 MYCENAEAN_LEAGUE_SECONDARY_PALACE: "Pretendant du palais rival"
 MYCENAEAN_LEAGUE_SANCTUARY_INFLUENCE: "Influence des sanctuaires"
 MYCENAEAN_LEAGUE_ISLAND_DISTANCE: "Distance insulaire"
 MYCENAEAN_LEAGUE_MARITIME_WEALTH: "Richesse maritime"
 MYCENAEAN_LEAGUE_INTERNAL_PEACE: "Paix entre les palais"
 MYCENAEAN_LEAGUE_MEMBER_NETWORK: "Reseau palatial"
 MYCENAEAN_LEAGUE_NO_HIGH_WANAX: "Aucun Haut Wanax"
 MYCENAEAN_LEAGUE_HIGH_WANAX_AT_WAR: "Haut Wanax en guerre"
 MYCENAEAN_LEAGUE_FRAGMENTED_PALACES: "Palais fragmentes"
 MYCENAEAN_LEAGUE_SHARED_CULTURE: "Culture acheenne commune"
 MYCENAEAN_LEAGUE_WANTS_PALACE_NETWORK: "Reseau palatial"
 MYCENAEAN_LEAGUE_MEMBER_AUTONOMY: "Autonomie des palais"
 MYCENAEAN_LEAGUE_BALANCED_HEGEMONY: "Hegemonie equilibree"
 wanaxate_hegemony: "Hegemonie du wanaxat"
 wanaxate_hegemony_desc: "Definit l'autorite que le palais le plus puissant peut exercer sur les autres wanaxats acheens."
 equal_palaces_policy: "Palais egaux"
 equal_palaces_policy_desc: "Les palais reconnaissent des coutumes communes mais refusent un hegemon fort."
 recognized_high_wanax_policy: "Haut Wanax reconnu"
 recognized_high_wanax_policy_desc: "Un souverain est accepte comme premier parmi ses pairs, capable de medier les querelles et de parler pour les Acheens."
 great_wanax_policy: "Grand Wanaxat"
 great_wanax_policy_desc: "Le palais dominant revendique une suprematie ceremonielle et militaire plus forte sur la ligue."
 palace_tribute_law: "Tribut palatial"
 palace_tribute_law_desc: "Regle les dons, tributs et levees dus au Haut Wanax."
 gift_exchange_policy: "Echange de dons"
 gift_exchange_policy_desc: "Les dons de prestige circulent entre les palais sans tribut formel."
 bronze_tribute_policy: "Tribut de bronze"
 bronze_tribute_policy_desc: "Les palais membres fournissent regulierement des richesses au Haut Wanax."
 palace_levies_policy: "Levees palatiales"
 palace_levies_policy_desc: "Le Haut Wanax peut demander davantage de ressources et d'hommes pour les campagnes de la ligue."
 sanctuary_legitimacy_law: "Legitimite des sanctuaires"
 sanctuary_legitimacy_law_desc: "Regle la facon dont les sacrifices, festivals et pretres soutiennent l'autorite de la ligue."
 local_sanctuaries_policy: "Sanctuaires locaux"
 local_sanctuaries_policy_desc: "Chaque palais conserve son propre calendrier sacre et ses rites."
 shared_festivals_policy: "Festivals communs"
 shared_festivals_policy_desc: "Des festivals et sacrifices communs renforcent l'identite acheenne."
 divine_omens_policy: "Presages divins"
 divine_omens_policy_desc: "Le Haut Wanax revendique une legitimite accrue par les presages des pretres et la direction ceremonielle."
 war_council_law: "Conseil de guerre"
 war_council_law_desc: "Definit si les royaumes acheens combattent separement, par serment, ou en expeditions pan-acheennes."
 local_war_bands_policy: "Bandes de guerre locales"
 local_war_bands_policy_desc: "Les membres preferent les campagnes locales et ne coordonnent que faiblement la defense."
 palace_oaths_policy: "Serments palatiaux"
 palace_oaths_policy_desc: "Les serments entre palais permettent au Haut Wanax d'organiser des coalitions defensives."
 pan_achaean_campaign_policy: "Campagne pan-acheenne"
 pan_achaean_campaign_policy_desc: "La ligue peut rassembler une grande expedition lorsque l'Unite acheenne est elevee."
 wanax_title: "Wanax"
 lawagetas_title: "Lawagetas"
 mycenaean_league_name_achaean_league: "Ligue acheenne"
 mycenaean_league_name_league_of_achaeans: "Ligue des Acheens"
 mycenaean_league_name_kingdoms_of_achaeans: "Royaumes des Acheens"
 mycenaean_league_name_great_wanaxate: "Grand Wanaxat"
 mycenaean_league_name_achaean_hegemony: "Hegemonie acheenne"
 mycenaean_league_title_great_wanax: "Grand Wanax"
 mycenaean_league_title_king_of_kings: "Roi des rois des Acheens"
 mycenaean_league.1.title: "Conseil dans le megaron"
 mycenaean_league.1.desc: "Les messagers des palais acheens se rassemblent devant le foyer du megaron. Registres, serments et dons de bronze sont poses devant le Haut Wanax, tandis que les scribes preparent un nouveau compte des fidelites."
 mycenaean_league.1.a: "Lier les palais par serment."
 mycenaean_league.1.b: "Accepter les dons sans pression."
 mycenaean_league.2.title: "Presages au sanctuaire"
 mycenaean_league.2.desc: "Les pretres lisent la fumee, les entrailles et les murmures des nobles rassembles. Les dieux peuvent favoriser une expedition commune, mais chaque palais interprete le presage selon ses propres ambitions."
 mycenaean_league.2.a: "Partager le sacrifice."
 mycenaean_league.2.b: "Que chaque palais ecoute ses propres dieux."
 mycenaean_league.10.title: "Rivalite palatiale"
 mycenaean_league.10.desc: "Une querelle de frontiere, une revendication matrimoniale ou une insulte au banquet a dresse un palais contre un autre. Le conflit menace le prestige fragile du Haut Wanax."
 mycenaean_league.10.a: "Laisser la rivalite trancher."
 mycenaean_league.10.b: "Envoyer des dons pour calmer la dispute."
 mycenaean_league.100.title: "Les palais brulent"
 mycenaean_league.100.desc: "Les routes commerciales defaillent, les greniers se vident, et les refugies parlent de pillards, de famine et d'incendies. Si le Haut Wanax ne restaure pas la confiance, la ligue des palais peut sombrer dans l'ombre apres le bronze."
 mycenaean_league.100.a: "Les serments se brisent."
 mycenaean_league.100.b: "Depenser ce qui reste pour tenir les palais ensemble."
