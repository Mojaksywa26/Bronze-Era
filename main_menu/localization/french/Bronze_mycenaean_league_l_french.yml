l_french:
 mycenaean_league: "Ligue mycenienne"
 mycenaean_league_desc: "La $mycenaean_league$ est un ordre hegemonique souple de royaumes palatiaux acheens. Son Haut Wanax est le premier parmi des souverains rivaux, non un empereur absolu, et lie les palais par le prestige, le tribut, les sanctuaires et les serments de guerre.\n\nUnite acheenne actuelle : #Y [GetUniqueInternationalOrganization('mycenaean_league').MakeScope.GetVariable('mycenaean_league_authority').GetValue|V0]#! /100"
 MYCENAEAN_LEAGUE_LEADER_MALE: "Haut Wanax"
 MYCENAEAN_LEAGUE_LEADER_MALE.long: "Haut Wanax des Acheens"
 MYCENAEAN_LEAGUE_LEADER_MALE.short: "Wanax"
 MYCENAEAN_LEAGUE_LEADER_FEMALE: "Haute Wanassa"
 MYCENAEAN_LEAGUE_LEADER_FEMALE.long: "Haute Wanassa des Acheens"
 MYCENAEAN_LEAGUE_LEADER_FEMALE.short: "Wanassa"
 MYCENAEAN_LEAGUE_AUTHORITY_DISPLAY: "$VAL$"
 change_mycenaean_league_authority_text: "$VALUE|+=2$ $mycenaean_league_authority$"
 current_mycenaean_league_authority_text: "$mycenaean_league_authority$ vaut au moins $VALUE|0$"
 mycenaean_league_authority: "Unite acheenne"
 mycenaean_league_authority_desc: "L'Unite acheenne mesure le prestige du Haut Wanax, la cohesion diplomatique des palais, la legitimite des sanctuaires communs et la volonte des royaumes acheens de combattre ensemble."
 high_wanax: "Haut Wanax"
 high_wanax_desc: "Le souverain reconnu comme premier parmi les rois palatiaux acheens."
 great_palace_candidate: "Grand palais"
 great_palace_candidate_desc: "Un royaume palatial majeur disposant d'une forte pretention a diriger le monde acheen."
 palace_candidate: "Palais rival"
 palace_candidate_desc: "Un royaume palatial respecte capable de contester l'hegemonie lorsque les grands centres faiblissent."
 palace_kingdom: "Royaume palatial"
 palace_kingdom_desc: "Un wanaxat membre du reseau palatial acheen."
 sanctuary_patron: "Patron de sanctuaire"
 sanctuary_patron_desc: "Un royaume dont le souverain tire son autorite des sacrifices, des festivals et du soutien des pretres des grands sanctuaires."
 island_wanaxate: "Wanaxat insulaire"
 island_wanaxate_desc: "Un royaume palatial maritime lie a la ligue par les navires, le commerce et la diplomatie egeenne."
 mycenaean_palace_tribute: "Tribut palatial"
 mycenaean_palace_tribute_desc: "Bronze, grain, textiles et richesses envoyes chaque mois par les palais secondaires au Haut Wanax. Chaque membre paie selon ses revenus palatiaux et son tresor."
 mycenaean_palace_tribute_price: "Tribut palatial"
 MYCENAEAN_LEAGUE_TRIBUTE_BASE: "Base du tribut palatial"
 MYCENAEAN_LEAGUE_TRIBUTE_SHARE: "Richesse palatiale"
 MYCENAEAN_LEAGUE_TRIBUTE_STORED_WEALTH: "Tresor stocke"
 MYCENAEAN_LEAGUE_HIGH_WANAX_SHARE: "Haut Wanax"
 MYCENAEAN_LEAGUE_PALACE_WEALTH: "Richesse palatiale"
 MYCENAEAN_LEAGUE_PALACE_HOUSE: "Maison palatiale"
 MYCENAEAN_LEAGUE_PALACE_HOUSE_TRIBUTE: "Droits de maison palatiale"
 MYCENAEAN_LEAGUE_GREAT_PALACE: "Pretendant du grand palais"
 MYCENAEAN_LEAGUE_SECONDARY_PALACE: "Pretendant du palais rival"
 MYCENAEAN_LEAGUE_SANCTUARY_INFLUENCE: "Influence des sanctuaires"
 MYCENAEAN_LEAGUE_ISLAND_DISTANCE: "Distance insulaire"
 MYCENAEAN_LEAGUE_MARITIME_WEALTH: "Richesse maritime"
 MYCENAEAN_LEAGUE_INTERNAL_PEACE: "Paix entre les palais"
 MYCENAEAN_LEAGUE_MEMBER_NETWORK: "Reseau palatial"
 MYCENAEAN_LEAGUE_NO_HIGH_WANAX: "Aucun Haut Wanax"
 MYCENAEAN_LEAGUE_HIGH_WANAX_AT_WAR: "Haut Wanax en guerre"
 MYCENAEAN_LEAGUE_FRAGMENTED_PALACES: "Palais fragmentes"
 MYCENAEAN_LEAGUE_SHARED_CULTURE: "Culture acheenne commune"
 MYCENAEAN_LEAGUE_WANTS_PALACE_NETWORK: "Reseau palatial"
 MYCENAEAN_LEAGUE_MEMBER_AUTONOMY: "Autonomie des palais"
 MYCENAEAN_LEAGUE_BALANCED_HEGEMONY: "Hegemonie equilibree"
 wanaxate_hegemony: "Hegemonie du wanaxat"
 wanaxate_hegemony_desc: "Definit l'autorite que le palais le plus puissant peut exercer sur les autres wanaxats acheens."
 equal_palaces_policy: "Palais egaux"
 equal_palaces_policy_desc: "Les palais reconnaissent des coutumes communes mais refusent un hegemon fort."
 recognized_high_wanax_policy: "Haut Wanax reconnu"
 recognized_high_wanax_policy_desc: "Un souverain est accepte comme premier parmi ses pairs, capable de medier les querelles et de parler pour les Acheens."
 great_wanax_policy: "Grand Wanaxat"
 great_wanax_policy_desc: "Le palais dominant revendique une suprematie ceremonielle et militaire plus forte sur la ligue."
 palace_tribute_law: "Tribut palatial"
 palace_tribute_law_desc: "Regle les dons, tributs et levees dus au Haut Wanax, dont les paiements mensuels calcules selon les revenus et le tresor de chaque palais."
 gift_exchange_policy: "Echange de dons"
 gift_exchange_policy_desc: "Les dons de prestige circulent entre les palais sans tribut formel."
 bronze_tribute_policy: "Prelevement palatial de bronze"
 bronze_tribute_policy_desc: "Les palais membres paient chaque mois un prelevement au Haut Wanax, calcule selon leurs revenus et leur tresor."
 palace_levies_policy: "Levees palatiales"
 palace_levies_policy_desc: "Le Haut Wanax peut demander davantage de ressources et d'hommes pour les campagnes de la ligue."
 sanctuary_legitimacy_law: "Legitimite des sanctuaires"
 sanctuary_legitimacy_law_desc: "Regle la facon dont les sacrifices, festivals et pretres soutiennent l'autorite de la ligue."
 local_sanctuaries_policy: "Sanctuaires locaux"
 local_sanctuaries_policy_desc: "Chaque palais conserve son propre calendrier sacre et ses rites."
 shared_festivals_policy: "Festivals communs"
 shared_festivals_policy_desc: "Des festivals et sacrifices communs renforcent l'identite acheenne."
 divine_omens_policy: "Presages divins"
 divine_omens_policy_desc: "Le Haut Wanax revendique une legitimite accrue par les presages des pretres et la direction ceremonielle."
 war_council_law: "Conseil de guerre"
 war_council_law_desc: "Definit si les royaumes acheens combattent separement, par serment, ou en expeditions pan-acheennes."
 local_war_bands_policy: "Bandes de guerre locales"
 local_war_bands_policy_desc: "Les membres preferent les campagnes locales et ne coordonnent que faiblement la defense."
 palace_oaths_policy: "Serments palatiaux"
 palace_oaths_policy_desc: "Les serments entre palais permettent au Haut Wanax d'organiser des coalitions defensives."
 pan_achaean_campaign_policy: "Campagne pan-acheenne"
 pan_achaean_campaign_policy_desc: "La ligue peut rassembler une grande expedition lorsque l'Unite acheenne est elevee."
 wanax_title: "Wanax"
 lawagetas_title: "Lawagetas"
 mycenaean_league_name_achaean_league: "Ligue acheenne"
 mycenaean_league_name_league_of_achaeans: "Ligue des Acheens"
 mycenaean_league_name_kingdoms_of_achaeans: "Royaumes des Acheens"
 mycenaean_league_name_great_wanaxate: "Grand Wanaxat"
 mycenaean_league_name_achaean_hegemony: "Hegemonie acheenne"
 mycenaean_league_title_great_wanax: "Grand Wanax"
 mycenaean_league_title_king_of_kings: "Roi des rois des Acheens"
 mycenaean_league.1.title: "Conseil dans le megaron"
 mycenaean_league.1.desc: "Les messagers des palais acheens se rassemblent devant le foyer du megaron. Registres, serments et dons de bronze sont poses devant le Haut Wanax, tandis que les scribes preparent un nouveau compte des fidelites."
 mycenaean_league.1.a: "Lier les palais par serment."
 mycenaean_league.1.b: "Accepter les dons sans pression."
 mycenaean_league.2.title: "Presages au sanctuaire"
 mycenaean_league.2.desc: "Les pretres lisent la fumee, les entrailles et les murmures des nobles rassembles. Les dieux peuvent favoriser une expedition commune, mais chaque palais interprete le presage selon ses propres ambitions."
 mycenaean_league.2.a: "Partager le sacrifice."
 mycenaean_league.2.b: "Que chaque palais ecoute ses propres dieux."
 mycenaean_league.10.title: "Rivalite palatiale"
 mycenaean_league.10.desc: "Une querelle de frontiere, une revendication matrimoniale ou une insulte au banquet a dresse un palais contre un autre. Le conflit menace le prestige fragile du Haut Wanax."
 mycenaean_league.10.a: "Laisser la rivalite trancher."
 mycenaean_league.10.b: "Envoyer des dons pour calmer la dispute."
 mycenaean_league.100.title: "Les palais brulent"
 mycenaean_league.100.desc: "Les routes commerciales defaillent, les greniers se vident, et les refugies parlent de pillards, de famine et d'incendies. Si le Haut Wanax ne restaure pas la confiance, la ligue des palais peut sombrer dans l'ombre apres le bronze."
 mycenaean_league.100.a: "Les serments se brisent."
 mycenaean_league.100.b: "Depenser ce qui reste pour tenir les palais ensemble."
 MYCENAEAN_LEAGUE_MEGARON_COUNCIL: "Conseil dans le megaron"
 MYCENAEAN_LEAGUE_SHARED_SACRIFICE: "Sacrifice commun"
 MYCENAEAN_LEAGUE_LINEAR_B: "Administration lineaire B"
 MYCENAEAN_LEAGUE_PAN_ACHAEAN_EXPEDITION: "Expedition pan-acheenne"
 MYCENAEAN_LEAGUE_RIVAL_CLAIMANT: "Pretendant wanax rival"
 MYCENAEAN_LEAGUE_FORCED_TRIBUTE: "Tribut force"
 MYCENAEAN_LEAGUE_MEDIATED_RIVALRIES: "Rivalites mediees"
 MYCENAEAN_LEAGUE_PALACES_BURNING: "Palais en flammes"
 MYCENAEAN_LEAGUE_COLLAPSE_PRESSURE: "Pression d'effondrement"
 MYCENAEAN_LEAGUE_FRAGMENTATION_CRISIS: "Fragmentation mycenienne"
 MYCENAEAN_LEAGUE_PALACE_INFLUENCE: "Influence palatiale"
 mycenaean_league_current_authority_tt: "Unite acheenne actuelle : #Y [GetUniqueInternationalOrganization('mycenaean_league').MakeScope.GetVariable('mycenaean_league_authority').GetValue|V0]#! /100"
 mycenaean_call_megaron_council: "Convoquer le conseil du megaron"
 mycenaean_call_megaron_council_desc: "Rassembler les souverains acheens, les scribes, les pretres et les lawagetas devant le foyer du Haut Wanax. Les serments et les dons renforcent l'Unite acheenne, mais les maisons nobles refusent d'etre trop liees."
 mycenaean_call_megaron_council_price: "Conseil du megaron"
 mycenaean_call_megaron_council_tt: "#G +6#! Unite acheenne. Ajoute le modificateur #Y Conseil dans le megaron#! pendant 5 ans. Les nobles perdent de la satisfaction ; le clerge en gagne."
 mycenaean_sponsor_shared_sacrifice: "Financer un sacrifice commun"
 mycenaean_sponsor_shared_sacrifice_desc: "Payer des sacrifices et des banquets communs dans un grand sanctuaire. Le clerge soutient la ligue, mais les reserves et les biens de commerce sont consommes."
 mycenaean_sponsor_shared_sacrifice_price: "Sacrifice commun"
 mycenaean_sponsor_shared_sacrifice_tt: "#G +4#! Unite acheenne. Ajoute le modificateur #Y Sacrifice commun#! pendant 4 ans. Le clerge gagne de la satisfaction ; les burghers en perdent."
 mycenaean_send_linear_b_administrators: "Envoyer des administrateurs lineaire B"
 mycenaean_send_linear_b_administrators_desc: "Deployer scribes et gardiens de tablettes pour compter grain, bronze, laine et levees. Le controle palatial progresse, mais les paysans ressentent le poids des registres."
 mycenaean_send_linear_b_administrators_price: "Administrateurs lineaire B"
 mycenaean_send_linear_b_administrators_tt: "#G +3#! Unite acheenne. Ajoute le modificateur #Y Administration lineaire B#! pendant 5 ans. Controle et production progressent, mais les paysans perdent de la satisfaction."
 mycenaean_mediate_palace_rivalry: "Medier une rivalite palatiale"
 mycenaean_mediate_palace_rivalry_desc: "Envoyer des dons, accueillir des serments et contraindre des wanaktes rivaux a regler leur querelle avant qu'elle ne brise la cohesion de la ligue."
 mycenaean_mediate_palace_rivalry_price: "Mediation palatiale"
 mycenaean_mediate_palace_rivalry_tt: "#G +5#! Unite acheenne. Ajoute le modificateur #Y Mediation palatiale#! pendant 4 ans. Les nobles perdent de la satisfaction."
 mycenaean_demand_bronze_tribute: "Imposer le tribut palatial"
 mycenaean_demand_bronze_tribute_desc: "Forcer le reseau des palais a fournir bronze, grain, textiles et artisans. Le Haut Wanax gagne en puissance a court terme, mais l'unite souffre."
 mycenaean_demand_bronze_tribute_price: "Exigence de tribut palatial"
 mycenaean_demand_bronze_tribute_tt: "#R -5#! Unite acheenne. Ajoute le modificateur #Y Exigence de tribut palatial#! pendant 5 ans. Production et importations progressent, mais paysans et burghers perdent de la satisfaction."
 mycenaean_summon_palace_levies: "Convoquer les levees palatiales"
 mycenaean_summon_palace_levies_desc: "Appeler fermiers, suivants et equipages de chars au service du Haut Wanax. La ligue gagne des hommes, mais les champs et ateliers souffrent."
 mycenaean_summon_palace_levies_price: "Levees palatiales"
 mycenaean_summon_palace_levies_tt: "#R -8#! Unite acheenne. Ajoute le modificateur #Y Levees palatiales rassemblees#! pendant 4 ans. Les levees et la defense progressent, mais croissance, production et satisfaction souffrent."
 mycenaean_proclaim_pan_achaean_expedition: "Proclamer une expedition pan-acheenne"
 mycenaean_proclaim_pan_achaean_expedition_desc: "Rassembler navires, chars et guerriers lies par serment pour une expedition heroique sous le Haut Wanax. La gloire est possible, mais le cout est lourd."
 mycenaean_proclaim_pan_achaean_expedition_price: "Expedition pan-acheenne"
 mycenaean_proclaim_pan_achaean_expedition_tt: "#R -12#! Unite acheenne. Ajoute le modificateur #Y Expedition pan-acheenne#! pendant 6 ans. Armees et flottes progressent, mais nourriture et importations sont sous tension."
 mycenaean_fortify_megara: "Fortifier les megara"
 mycenaean_fortify_megara_desc: "Renforcer murs palatiaux, greniers et cours de refuge. Cela protege un royaume, mais tourne son attention vers lui-meme et affaiblit la confiance commune."
 mycenaean_fortify_megara_price: "Fortifier les megara"
 mycenaean_fortify_megara_tt: "#R -2#! Unite acheenne. Ajoute le modificateur #Y Megara fortifies#! pendant 6 ans. Defense et controle progressent, mais developpement et nourriture souffrent."
 mycenaean_megaron_council_modifier: "Conseil dans le megaron"
 mycenaean_megaron_council_modifier_desc: "Le palais a recemment accueilli un conseil de souverains acheens et de temoins des serments."
 mycenaean_shared_sacrifice_modifier: "Sacrifice commun"
 mycenaean_shared_sacrifice_modifier_desc: "Des rites communs lient les palais par le prestige du sanctuaire et l'approbation des pretres."
 mycenaean_linear_b_administration_modifier: "Administration lineaire B"
 mycenaean_linear_b_administration_modifier_desc: "Les scribes palatiaux renforcent le controle par tablettes, inventaires et registres de levees."
 mycenaean_palace_mediation_modifier: "Mediation palatiale"
 mycenaean_palace_mediation_modifier_desc: "Le Haut Wanax a recemment arbitre une querelle entre maisons palatiales rivales."
 mycenaean_rival_claimant_modifier: "Pretendant wanax rival"
 mycenaean_rival_claimant_modifier_desc: "Ce palais rassemble ouvertement du prestige pour revendiquer une future hegemonie acheenne."
 mycenaean_bronze_tribute_demand_modifier: "Exigence de tribut de bronze"
 mycenaean_bronze_tribute_demand_modifier_desc: "L'economie palatiale extrait le tribut agressivement, creant richesse et ressentiment."
 mycenaean_palace_levies_mustered_modifier: "Levees palatiales rassemblees"
 mycenaean_palace_levies_mustered_modifier_desc: "Des levees palatiales ont ete tirees des champs et ateliers pour le service militaire de la ligue."
 mycenaean_pan_achaean_expedition_modifier: "Expedition pan-acheenne"
 mycenaean_pan_achaean_expedition_modifier_desc: "Les palais sont engages dans une grande campagne heroique, avec sa gloire et son cout."
 mycenaean_fortified_megara_modifier: "Megara fortifies"
 mycenaean_fortified_megara_modifier_desc: "Centres palatiaux fortifies, magasins gardes et cours de refuge preparees."
 mycenaean_palaces_burning_modifier: "Palais en flammes"
 mycenaean_palaces_burning_modifier_desc: "L'ordre palatial defaille tandis que feu, famine, refugies et revoltes locales rongent l'ancien systeme."
 mycenaean_league.20.title: "Tablettes du tribut"
 mycenaean_league.20.desc: "Le Haut Wanax exige bronze, grain et textiles inscrits sur de nouvelles tablettes. Les anciens locaux previennent que les villages manquent deja de tout."
 mycenaean_league.20.a: "Envoyer le tribut."
 mycenaean_league.20.b: "Cacher ce que les scribes ne peuvent compter."
 mycenaean_league.30.title: "Les lawagetas reclament la guerre"
 mycenaean_league.30.desc: "Les chefs de guerre se rassemblent dans le megaron et pressent le Haut Wanax de prouver sa suprematie par l'action. Refuser pourrait paraitre faible."
 mycenaean_league.30.a: "Ouvrir les listes de levees."
 mycenaean_league.30.b: "Retarder la campagne."
 mycenaean_league.40.title: "Une revendication du haut siege"
 mycenaean_league.40.desc: "Un wanax rival affirme que les dieux et les guerriers favorisent son palais. Ses dons, mariages et rassemblements de chars contestent desormais l'ordre etabli."
 mycenaean_league.40.a: "Faire valoir notre pretention."
 mycenaean_league.40.b: "Honorer l'ordre actuel."
 mycenaean_league.50.title: "Festival des Acheens"
 mycenaean_league.50.desc: "Nobles, pretres et chanteurs se rassemblent dans un sanctuaire commun. Le banquet peut lier les palais, ou un souverain peut garder les meilleures offrandes pour sa propre maison."
 mycenaean_league.50.a: "Que tous les palais partagent le rite."
 mycenaean_league.50.b: "Favoriser notre propre maison."
 mycenaean_league.60.title: "Les tablettes debordent"
 mycenaean_league.60.desc: "Les archives palatiales se remplissent de listes de laine, bronze, travailleuses, navires et grain. Davantage de scribes renforceraient la ligue, meme si la campagne en souffre."
 mycenaean_league.60.a: "Envoyer les scribes."
 mycenaean_league.60.b: "Laisser les villages tranquilles."
 mycenaean_league.70.title: "La terre secoue le megaron"
 mycenaean_league.70.desc: "Les murs se fendent, les magasins se renversent, et les pretres parlent d'une colere sous la terre. Le palais doit choisir entre reconstruire ensemble ou se replier derriere ses propres portes."
 mycenaean_league.70.a: "Reconstruire murs et reserves."
 mycenaean_league.70.b: "L'ordre palatial defaille."
 mycenaean_league.80.title: "Rhodes et les routes maritimes"
 mycenaean_league.80.desc: "Les wanaktes insulaires controlent les navires qui lient l'Egee. Ils peuvent escorter les routes de la ligue, ou profiter de la crise pour enrichir leurs propres ports."
 mycenaean_league.80.a: "Garder les routes maritimes ouvertes."
 mycenaean_league.80.b: "Que nos navires servent notre palais."
 mycenaean_league.90.title: "Gloire devant les palais"
 mycenaean_league.90.desc: "La nouvelle d'une victoire atteint le foyer du Haut Wanax. Pour un moment, les palais rivaux se souviennent pourquoi ils ont jure leurs serments."
 mycenaean_league.90.a: "Que les chanteurs portent le recit."
 mycenaean_league.110.title: "Les serments retrouves"
 mycenaean_league.110.desc: "Le tribut arrive, les sacrifices sont partages, et les rois rivaux parlent avec prudence devant le Haut Wanax. La ligue n'est pas devenue un empire, mais elle respire encore."
 mycenaean_league.110.a: "Les Acheens tiennent ensemble."
 mycenaean_league.120.title: "L'archive defaille"
 mycenaean_league.120.desc: "Des tablettes manquent, les reserves sont mal comptees, et les messagers ne reviennent plus a temps. Sans registres, le palais ne commande plus ce qu'il ne voit pas."
 mycenaean_league.120.a: "Les registres ne sont que cendres."
 mycenaean_league.120.b: "Envoyer les scribes dans les villages."
 mycenaean_fragmentation: "Ligue mycenienne"
 mycenaean_fragmentation_desc: "Gerez la ligue palatiale acheenne. Gardez une Unite elevee pour preserver le tribut, la defense commune et l'autorite du Haut Wanax.\n\nUnite acheenne : #Y [GetUniqueInternationalOrganization('mycenaean_league').MakeScope.GetVariable('mycenaean_league_authority').GetValue|V0]#! /100"
 hint_mycenaean_fragmentation: "Ligue mycenienne"
 mycenaean_fragmentation_panel_high_wanax: "Haut Wanax"
 mycenaean_fragmentation_panel_unity: "Unite acheenne"
 mycenaean_fragmentation_panel_unity_value: "[GetUniqueInternationalOrganization('mycenaean_league').MakeScope.GetVariable('mycenaean_league_authority').GetValue|V0] / 100"
 mycenaean_fragmentation_panel_strong_palace: "Palais puissant"
 mycenaean_fragmentation_overview_card: "Ordre palatial"
 mycenaean_fragmentation_overview_card_desc: "La Ligue est un ordre souple de maisons palatiales acheennes. Une forte Unite garde les membres loyaux. Une Unite faible permet aux palais puissants de revendiquer des territoires et peut ouvrir la fragmentation."
 mycenaean_fragmentation_actions_card: "Actions de ligue"
 mycenaean_fragmentation_actions_card_desc: "Utilisez les actions ci-dessous pour gerer tribut, serments, influence palatiale, defense et royaumes dissidents. La plupart coutent de l'or, des reserves, du prestige, de la stabilite ou du soutien d'estates."
 mycenaean_fragmentation_map_card: "Carte de la ligue"
 mycenaean_fragmentation_map_card_desc: "La carte indique le Haut Wanax et les palais rivaux les plus forts. Si la fragmentation commence, les royaumes palatiaux territorialises apparaitront ici."
 mycenaean_palace_has_valid_landable_location.tt: "Cette maison palatiale possede au moins une location ou son reseau palatial peut devenir une autorite territoriale."
 turn_mycenaean_palace_into_normal_tag.tt: "Cette maison palatiale devient un pays territorial normal et prend le controle direct des locations ou elle possede le reseau palatial dominant."
 turn_mycenaean_palace_into_building_based.tt: "Cet Etat palatial est reduit en maison palatiale extraterritoriale sous le Haut Wanax."
 mycenaean_proclaim_palace_autonomy: "Proclamer l'autonomie palatiale"
 mycenaean_proclaim_palace_autonomy_desc: "Rompre la subordination palatiale et revendiquer les terres administrees par cette maison. Mycenes gagnera un casus belli pour restaurer son autorite."
 mycenaean_proclaim_palace_autonomy_price: "Proclamer l'autonomie"
 mycenaean_proclaim_palace_autonomy_tt: "Le palais devient un pays normal. #R -10#! Unite acheenne. Le Haut Wanax gagne un casus belli pour restaurer son autorite."
 mycenaean_reassert_palace_authority: "Restaurer l'autorite palatiale"
 mycenaean_reassert_palace_authority_desc: "Designer un palais dissident comme desobeissant et preparer une campagne pour le ramener dans l'ordre acheen."
 mycenaean_reassert_palace_authority_price: "Restaurer l'autorite"
 mycenaean_reassert_palace_authority_tt: "Gagne un casus belli contre le palais choisi. #R -3#! Unite acheenne a cause de la tension politique."
 mycenaean_summon_oath_to_mycenae: "Convoquer le serment a Mycenes"
 mycenaean_summon_oath_to_mycenae_desc: "Appeler un palais membre a renouveler son serment devant le Haut Wanax. L'acceptation restaure l'unite; le refus aggrave la crise."
 mycenaean_summon_oath_to_mycenae_price: "Convocation du serment"
 mycenaean_grant_palace_privileges: "Accorder des privileges palatiaux"
 mycenaean_grant_palace_privileges_desc: "Acheter la loyaute en confirmant des droits locaux, archives et privileges de tribut. Cela affaiblit l'autorite centrale mais peut empecher une maison palatiale de rompre."
 mycenaean_grant_palace_privileges_price: "Privileges palatiaux"
 mycenaean_grant_palace_privileges_tt: "#R -4#! Unite acheenne. Le palais choisi recoit des privileges pendant 5 ans, gagne de la satisfaction noble et perd de l'influence palatiale."
 cb_mycenaean_palace_rebel_against_high_wanax: "Autonomie palatiale"
 cb_mycenaean_palace_rebel_against_high_wanax_desc: "Une maison palatiale defie le Haut Wanax et cherche l'autonomie territoriale."
 cb_mycenaean_high_wanax_reassert_authority: "Restaurer l'autorite palatiale"
 cb_mycenaean_high_wanax_reassert_authority_desc: "Le Haut Wanax veut forcer un palais dissident a revenir sous l'autorite acheenne."
 cb_mycenaean_palace_struggle: "Lutte palatiale"
 cb_mycenaean_palace_struggle_desc: "Des palais acheens rivaux se battent pour la terre, le prestige des serments et leur survie pendant la fragmentation."
 peace_mycenaean_gain_palace_autonomy: "Reconnaitre l'autonomie palatiale"
 peace_mycenaean_gain_palace_autonomy_desc: "Le palais victorieux devient un pays territorial normal."
 peace_mycenaean_revoke_palace_autonomy: "Revoquer l'autonomie palatiale"
 peace_mycenaean_revoke_palace_autonomy_desc: "Un petit palais dissident est reduit en maison palatiale extraterritoriale."
 bronze_mycenaean_oath_sworn: "Serment palatial jure"
 bronze_mycenaean_oath_refused: "Serment palatial refuse"
 bronze_mycenaean_palace_autonomy: "Autonomie palatiale revendiquee"
 bronze_mycenaean_reconciled_palace: "Palais reconcilie"
 mycenaean_landed_palace_modifier: "Royaume palatial territorial"
 mycenaean_landed_palace_modifier_desc: "Cette ancienne maison palatiale extraterritoriale gouverne maintenant des terres directement. Son prestige monte, mais le controle et l'equilibre des elites sont troubles."
 mycenaean_palace_autonomy_claimed_modifier: "Autonomie palatiale revendiquee"
 mycenaean_palace_autonomy_claimed_modifier_desc: "Ce palais a recemment revendique son autonomie locale face a l'autorite mycenienne."
 mycenaean_high_wanax_fragmentation_council_modifier: "Conseil de fragmentation"
 mycenaean_high_wanax_fragmentation_council_modifier_desc: "Le Haut Wanax convoque des conseils d'urgence pour maintenir l'ordre palatial."
 mycenaean_palace_privileges_granted_modifier: "Privileges palatiaux accordes"
 mycenaean_palace_privileges_granted_modifier_desc: "Ce palais a recu du Haut Wanax la confirmation de droits locaux et de privileges de tribut."
 mycenaean_league_oath_summoned_modifier: "Serment recemment convoque"
 mycenaean_league_oath_summoned_modifier_desc: "Ce palais a recemment ete convoque pour renouveler son serment devant le Haut Wanax."
 mycenaean_rising_palace_influence_modifier: "Influence palatiale montante"
 mycenaean_rising_palace_influence_modifier_desc: "Ce palais accumule prestige, loyautes locales et confiance des elites dans l'ordre acheen."
 mycenaean_dominant_palace_influence_modifier: "Influence palatiale dominante"
 mycenaean_dominant_palace_influence_modifier_desc: "Ce palais est devenu une force politique serieuse et pourrait defier le Haut Wanax si l'unite s'effondre."
 mycenaean_league.200.title: "L'ordre palatial se brise"
 mycenaean_league.200.desc: "Les messagers ne portent plus les ordres comme des lois. Les maisons palatiales revendiquent les reserves locales, les guerriers suivent leurs propres wanaktes, et l'ancien ordre acheen commence a se fracturer."
 mycenaean_league.200.a: "Les serments tremblent."
 mycenaean_league.210.title: "Un palais revendique ses terres"
 mycenaean_league.210.desc: "Les anciens du palais affirment que Mycenes ne peut plus proteger les villages, reserves et sanctuaires qui leur ont ete confies."
 mycenaean_league.210.a: "Revendiquer terres et greniers."
 mycenaean_league.210.b: "Rester sous le Haut Wanax."
 mycenaean_league.220.title: "Conseil des serments brises"
 mycenaean_league.220.desc: "Le Haut Wanax apprend que des palais fortifient leurs portes et comptent les reserves sans permission. Un conseil dur peut tenir la ligue, ou la pousser plus loin dans la rupture."
 mycenaean_league.220.a: "Rassembler les wanaktes dans le megaron."
 mycenaean_league.220.b: "Menacer les maisons desobeissantes."
 mycenaean_league.225.title: "Un palais defie Mycenes"
 mycenaean_league.225.desc: "Une maison palatiale a revendique la domination directe de ses terres. Les tablettes la nomment desobeissante; les guerriers demandent si le Haut Wanax marchera."
 mycenaean_league.225.a: "Preparer les listes de serment."
 mycenaean_league.230.title: "Le Haut Wanax nous denonce"
 mycenaean_league.230.desc: "Mycenes a nomme ce palais desobeissant et revendique le droit de restaurer son autorite par la force."
 mycenaean_league.230.a: "Qu'ils viennent."
 mycenaean_league.240.title: "Convoques devant le Haut Wanax"
 mycenaean_league.240.desc: "Des envoyes arrivent avec des sceaux de bronze et une exigence: renouveler le serment a Mycenes, envoyer des otages, et se tenir de nouveau sous le Haut Wanax."
 mycenaean_league.240.a: "Renouveler le serment."
 mycenaean_league.240.b: "Refuser la convocation."
 mycenaean_league.250.title: "Apres la fragmentation"
 mycenaean_league.250.desc: "L'ancien ordre palatial a change. Certaines maisons sont independantes, d'autres se plient encore a Mycenes, et le monde acheen n'est plus celui que decrivaient les tablettes."
 mycenaean_league.250.a: "Les chanteurs s'en souviendront."
 mycenaean_league_200_a_tt: "La fragmentation commence. Le Haut Wanax subit un choc d'autorite, tandis que les palais membres gagnent une marge d'action."
 mycenaean_league_210_a_tt: "Devient un pays territorial normal, gagne des cores sur les terres du reseau palatial, et reduit l'Unite acheenne de #R 8#!."
 mycenaean_league_210_b_tt: "Reste loyal pour l'instant. L'Unite acheenne augmente de #G 3#! et les relations avec le Haut Wanax s'ameliorent."
 mycenaean_league_220_a_tt: "Gagne #G 4#! d'Unite acheenne et des modificateurs de conseil de crise, mais les nobles perdent de la satisfaction."
 mycenaean_league_220_b_tt: "Reduit l'Unite acheenne de #R 6#!. Le Haut Wanax gagne de la pression de crise et perd du prestige."
 mycenaean_league_225_a_tt: "Le Haut Wanax est averti et peut utiliser des actions d'autorite ou un casus belli pour restaurer l'ordre palatial."
 mycenaean_league_230_a_tt: "Gagne de la pression de pretendant rival et reduit l'Unite acheenne de #R 3#!."
 mycenaean_league_240_a_tt: "Accepte le serment. L'Unite acheenne augmente de #G 5#!, mais du prestige est depense."
 mycenaean_league_240_b_tt: "Refuse le serment. L'Unite acheenne baisse de #R 7#! et le Haut Wanax gagne un casus belli de restauration."
 mycenaean_league_250_a_tt: "Nettoie les variables temporaires de fragmentation. Le resultat politique reste visible sur la carte."
 MYCENAEAN_LEAGUE_PALACE_REDISTRIBUTION: "Redistribution palatiale"
 mycenaean_redistribute_palace_stores: "Redistribuer les reserves palatiales"
 mycenaean_redistribute_palace_stores_desc: "Ouvrir les greniers royaux, les reserves de bronze et les ateliers palatiaux pour nourrir l'ordre acheen et maintenir l'obeissance. L'unite monte, mais les nobles detestent perdre leurs reserves privees et l'economie ralentit."
 mycenaean_redistribute_palace_stores_price: "Redistribution palatiale"
 mycenaean_redistribute_palace_stores_tt: "#G +5#! Unite acheenne. Tous les palais membres perdent #G 3#! d'Influence palatiale. Le Haut Wanax recoit #Y Redistribution palatiale#! pendant 3 ans : meilleure securite alimentaire, production plus faible et importations sous tension."
 mycenaean_demand_palace_hostages: "Exiger des otages palatiaux"
 mycenaean_demand_palace_hostages_desc: "Exiger des otages nobles d'une maison palatiale pour garantir son obeissance. Cela reduit sa capacite a mener une faction dissidente, mais cree un ressentiment durable."
 mycenaean_demand_palace_hostages_price: "Otages palatiaux"
 mycenaean_demand_palace_hostages_tt: "#G +3#! Unite acheenne. Le palais choisi perd #G 12#! d'Influence palatiale pour l'instant, mais ses nobles sont en colere et ses relations avec le Haut Wanax souffrent."
 mycenaean_restore_palace_network: "Restaurer le reseau palatial"
 mycenaean_restore_palace_network_desc: "Offrir a un petit royaume palatial affaibli un accord couteux : ses terres locales reviennent au controle mycenien, tandis que la dynastie survit comme maison palatiale extraterritoriale."
 mycenaean_restore_palace_network_price: "Restaurer le reseau palatial"
 mycenaean_restore_palace_network_tt: "Le palais choisi recoit un evenement. S'il accepte, il redevient une maison palatiale extraterritoriale et l'Unite acheenne augmente de #G 8#!. S'il refuse, l'Unite baisse et le Haut Wanax gagne un casus belli."
 mycenaean_palace_redistribution_modifier: "Redistribution palatiale"
 mycenaean_palace_redistribution_modifier_desc: "Le Haut Wanax redistribue grain, bronze et production d'ateliers pour maintenir le reseau palatial pendant la crise."
 mycenaean_palace_hostages_taken_modifier: "Otages palatiaux pris"
 mycenaean_palace_hostages_taken_modifier_desc: "Des otages nobles ont ete envoyes au Haut Wanax. Les elites locales obeissent pour l'instant, mais elles pardonnent difficilement."
 bronze_mycenaean_hostages_taken: "Otages nobles pris"
 mycenaean_league.260.title: "Retour au reseau palatial"
 mycenaean_league.260.desc: "Des envoyes de Mycenes arrivent avec sceaux, dons et une offre dure. Le Haut Wanax preserva cette dynastie comme maison palatiale, mais champs, ports et magasins doivent revenir a l'ordre acheen commun."
 mycenaean_league.260.a: "Accepter l'accord."
 mycenaean_league.260.b: "Garder les terres."
 mycenaean_league_260_a_tt: "Ce pays redevient une maison palatiale extraterritoriale. Ses terres reviennent au Haut Wanax, et l'Unite acheenne augmente de #G 8#!."
 mycenaean_league_260_b_tt: "Refuse l'accord. L'Unite acheenne baisse de #R 6#!, ce palais devient un pretendant rival, et le Haut Wanax gagne un casus belli de restauration."


