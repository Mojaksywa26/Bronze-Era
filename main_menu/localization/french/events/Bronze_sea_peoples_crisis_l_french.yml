l_french:
 sea_peoples_crisis: "Crise des Peuples de la mer"
 sea_peoples_crisis_desc: "Une [situation_with_icon|e] visible de la fin de l'age du bronze, suivant l'effondrement des economies palatiales, la famine, les refugies, les raids et les installations cotieres.\n\n#T Situation actuelle#!\nPhase : #Y [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_phase').GetValue|V0]#! /5\nPression de crise : #R [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_pressure').GetValue|V0]#! /100\nPression de famine : #R [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_famine_pressure').GetValue|V0]#! /100\nRaids cotiers reussis : #R [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_raids').GetValue|V0]#!\nRaids repousses : #P [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_repulsed_raids').GetValue|V0]#!\nMarches perturbes : #R [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_market_damage').GetValue|V0]#!\nMouvements de refugies : #R [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_refugee_movements').GetValue|V0]#!\nEnclaves migrantes : #R [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_migrant_enclaves').GetValue|V0]#!\nEnclaves phenicianisees : #P [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_phoenicianized_enclaves').GetValue|V0]#!\nLien Hatti : #Y la situation Hattie gere l'Anatolie imperiale#!\n\n#T Progression des phases#!\nLes phases avancent avec le temps ecoule depuis le debut de la crise : phase 2 apres 3 ans, phase 3 apres 6 ans, phase 4 apres 10 ans, phase 5 apres 15 ans. La pression montre l'elan regional de l'effondrement et le danger local ; elle ne bloque pas la progression des phases.\n\nLa plupart des pays directement touches en Mediterranee orientale, dans l'Egee, en Egypte, a Chypre et au Levant peuvent utiliser des actions couteuses pour limiter les degats locaux. Hatti et ses sujets utilisent les actions de la situation Hattie Collapse."
 sea_peoples_crisis_overview_card: "Vue de la crise"
 sea_peoples_crisis_overview_card_desc: "La Crise des Peuples de la mer est une [situation_with_icon|e] regionale pour la Mediterranee orientale. Elle suit famine, raids, refugies, effondrement du commerce, installations cotieres et pression palatiale. La famine imperiale, les vassaux rebelles et la fragmentation de Hatti sont geres par la situation Hattie Collapse."
 sea_peoples_crisis_panel_phase: "Phase de crise"
 sea_peoples_crisis_panel_phase_value: "#Y [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_phase').GetValue|V0]#! /5"
