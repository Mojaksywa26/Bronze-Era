 sea_peoples_crisis_panel_hatti: "Lien Hatti"
 sea_peoples_crisis_panel_hatti_value: "#Y Crise separee#!"
 sea_peoples_crisis_actions_card: "Reponses possibles"
 sea_peoples_crisis_actions_card_desc: "Les actions apparaissent dessous pour les pays directement touches par les Peuples de la mer. Hatti et ses sujets utilisent les actions de Hattie Collapse. Chaque reponse coute grain, richesse, stabilite, patience des estates, hommes, marins ou controle politique."
 sea_peoples_crisis_map_card: "Lire la carte"
 sea_peoples_crisis_map_card_desc: "La carte montre les pays touches, ports brules, cotes ravagees et effondrements internes. La zone de crise suit la Mediterranee orientale et n'inclut pas l'Italie. La fragmentation propre a Hatti est visible dans la situation Hattie Collapse."
 hint_sea_peoples_crisis: "[GetSituationByKey('sea_peoples_crisis').GetNameWithNoTooltip]"
 hint_sea_peoples_crisis_hint_text: "$hint_sea_peoples_crisis_hint_text_1$\n\n$hint_sea_peoples_crisis_hint_text_2$"
 hint_sea_peoples_crisis_hint_text_1: "La Crise des Peuples de la mer est une [situation_with_icon|e], pas un pays normal. Elle suit famine, raids, refugies, effondrement du commerce et pression d'installation sur la Mediterranee orientale."
 hint_sea_peoples_crisis_hint_text_2: "#T Reponse conseillee :#!\n@arrow_bonus_tier_2! Utilise les [actions_with_icon|e] de crise tot, mais attends-toi a de vrais couts en grain, prestige, stabilite, hommes, marins et satisfaction des estates.\n@arrow_bonus_tier_1! Les raids maritimes testent maintenant des ports precis. Les forts, armees cotieres, flottes, defenses portuaires et convois escortes reduisent les chances de reussite du raid.\n@arrow_bonus_tier_1! Les Etats cotiers et palatiaux doivent fortifier les ports, escorter les convois de bronze, ouvrir les greniers avec prudence et se preparer a la pression d'installation plutot que viser une victoire propre."
 sea_peoples_situation_location_active_tt: "Cette location appartient a un pays touche par la Crise des Peuples de la mer."
 sea_peoples_situation_location_port_hit_tt: "Ce port a ete directement frappe par un raid des Peuples de la Mer."
 sea_peoples_situation_location_raided_tt: "Le proprietaire a subi des raids cotiers."
 sea_peoples_situation_location_refugees_tt: "Le proprietaire subit une pression de refugies."
 sea_peoples_situation_location_breakdown_tt: "Le proprietaire subit un effondrement interne."
 sea_peoples_situation_legend_active: "Touche par la crise"
 sea_peoples_situation_legend_burned_port: "Port incendie"
 sea_peoples_situation_legend_raided: "Cote pillee"
 sea_peoples_situation_legend_breakdown: "Effondrement interne"
 sea_peoples_crisis_name: "Crise des Peuples de la Mer"
 sea_peoples_crisis_name_desc: "Une longue chaine d'effondrement de l'age du bronze tardif, portee par la famine, la rupture du commerce, les raids cotiers, les refugies, la faillite des palais et les migrations maritimes."
 sea_peoples_raider_country_identity_text: "Ce pays appartient a la sphere de raids des Peuples de la Mer"
 sea_peoples_crisis_phase_at_least_text: "La Crise des Peuples de la Mer est au moins en phase $VALUE|0$"
 sea_peoples_crisis_active_country_text: "La Crise des Peuples de la Mer est active"
 sea_peoples_crisis_eastern_mediterranean_country_text: "Ce pays appartient a la zone de crise de la Mediterranee orientale"
 sea_peoples_crisis_direct_country_text: "Ce pays recoit les events directs des Peuples de la mer ; Hatti et ses sujets utilisent la situation Hattie Collapse"
 sea_peoples_crisis_maritime_target_text: "Ce pays est vulnerable aux raids et migrations maritimes"
 sea_peoples_crisis_high_assimilation_zone_text: "Ce pays se trouve dans une zone de forte assimilation pour les implantations des Peuples de la Mer"
 sea_peoples_crisis_egyptian_target_text: "Ce pays est une cible egyptienne de la crise"
 sea_peoples_crisis_mycenaean_target_text: "Ce pays est lie au monde palatial mycenien"
 sea_peoples_begin_crisis_text: "La Crise des Peuples de la Mer commence"
 sea_peoples_set_phase_text: "La Crise des Peuples de la Mer entre en phase $VALUE|0$"
 sea_peoples_advance_phase_text: "La Crise des Peuples de la Mer empire"
 sea_peoples_add_pressure_text: "$VALUE|+=0$ pression de crise"
 sea_peoples_add_famine_pressure_text: "$VALUE|+=0$ pression de famine"
 sea_peoples_mark_raided_coast_text: "Des raids cotiers frappent le pays"
 sea_peoples_coastal_raid_damage_text: "Un raid des Peuples de la Mer incendie un port, tue une partie de la population de la province, reduit la nourriture, abime la prosperite, secoue la stabilite et perturbe le marche local"
 sea_peoples_coastal_raid_repulsed_text: "Les defenses cotieres repoussent un raid des Peuples de la Mer, meme si la cote paie encore un faible prix"
 sea_peoples_apply_raid_stability_shock_text: "La stabilite baisse a cause du choc du raid. Les ports plus developpes ou plus peuples provoquent une perte plus forte."
 sea_peoples_mark_refugee_wave_text: "Des vagues de refugies entrent dans le pays"
 sea_peoples_mark_trade_collapse_text: "Les reseaux commerciaux de l'age du bronze s'effondrent"
 sea_peoples_mark_internal_breakdown_text: "L'ordre interieur se disloque"
 sea_peoples_mark_settlement_pressure_text: "La pression d'installation des Peuples de la Mer augmente"
 sea_peoples_mark_assimilation_text: "Des groupes des Peuples de la Mer commencent a s'assimiler"
 sea_peoples_prepare_port_defense_text: "Les ports se preparent aux attaques maritimes"
 sea_peoples_egypt_mobilization_text: "L'Egypte se mobilise contre les Peuples de la Mer"
 sea_peoples_phoenician_opening_text: "Une occasion maritime phenicienne s'ouvre"
 sea_peoples_clear_acute_damage_text: "Les degats aigus de la crise commencent a reculer"
 sea_peoples_phase_1_climate_pressure: "Pression climatique"
 sea_peoples_phase_1_climate_pressure_desc: "Les mauvaises recoltes et les changements du climat pesent sur les greniers, les reserves palatiales et la loyaute rurale."
 sea_peoples_phase_2_migration_pressure: "Pression migratoire"
 sea_peoples_phase_2_migration_pressure_desc: "Des groupes deplaces avancent le long des cotes, des iles, des routes et des anciennes voies commerciales."
 sea_peoples_phase_3_trade_crash: "Effondrement du commerce mediterraneen"
 sea_peoples_phase_3_trade_crash_desc: "Le cuivre, l'etain, le grain, le bois, les produits de luxe et les reseaux d'echange palatiaux se disloquent."
 sea_peoples_phase_4_settlement_fragmentation: "Fragmentation des implantations"
 sea_peoples_phase_4_settlement_fragmentation_desc: "Raideurs, refugies, mercenaires et familles deplacees commencent a s'installer dans des terres abandonnees ou affaiblies."
 sea_peoples_phase_5_iron_age_transition: "Transition vers l'age du fer"
 sea_peoples_phase_5_iron_age_transition_desc: "L'ancien monde palatial est brise. De nouvelles puissances maritimes, tribales et regionales commencent a le remplacer."
 sea_peoples_raided_coast_modifier: "Cote incendiee"
 sea_peoples_raided_coast_modifier_desc: "Ports, abris de navires, entrepots et villages cotiers ont ete frappes par des bandes maritimes."
 sea_peoples_market_disrupted_modifier: "Marche du bronze perturbe"
 sea_peoples_market_disrupted_modifier_desc: "Les raids et les convois perdus ont abime la circulation du grain, du poisson, du cuivre, de l'etain, du bois et des marchandises portuaires dans le reseau commercial local."
 sea_peoples_refugee_pressure_modifier: "Pression des refugies"
 sea_peoples_refugee_pressure_modifier_desc: "Des refugies affames et des familles deplacees entrent dans le pays, augmentant la pression sur les vivres et l'ordre public."
 sea_peoples_palace_economy_collapse_modifier: "Effondrement de l'economie palatiale"
 sea_peoples_palace_economy_collapse_modifier_desc: "L'economie redistributive des palais ne peut plus deplacer correctement grain, bronze, textiles et main-d'oeuvre."
 sea_peoples_internal_breakdown_modifier: "Dislocation interne"
 sea_peoples_internal_breakdown_modifier_desc: "Rivaux, pretendants, villages affames et factions armees tirent l'Etat dans des directions opposees."
 sea_peoples_settlement_pressure_modifier: "Installation des Peuples de la Mer"
 sea_peoples_settlement_pressure_modifier_desc: "Des migrants maritimes et des bandes armees cherchent a s'installer dans des districts cotiers affaiblis."
 sea_peoples_assimilation_pressure_modifier: "Assimilation maritime"
 sea_peoples_assimilation_pressure_modifier_desc: "Les colons etrangers fusionnent avec la societe locale par le service, le mariage, le commerce et les liens de sanctuaire."
 sea_peoples_port_defense_preparations_modifier: "Defenses portuaires"
 sea_peoples_port_defense_preparations_modifier_desc: "Les souverains detournent des ressources vers les navires, les postes de guet cotiers, les gardes de port et les greniers d'urgence."
 sea_peoples_egypt_mobilization_modifier: "Mobilisation du Delta"
 sea_peoples_egypt_mobilization_modifier_desc: "L'Egypte mobilise navires, archers, garnisons et grain pour defendre le Delta et les approches du Nil."
 sea_peoples_phoenician_opening_modifier: "Ouverture phenicienne"
 sea_peoples_phoenician_opening_modifier_desc: "L'effondrement des anciens suzerains donne aux cites portuaires levantines plus de liberte pour commercer, armer des flottes et absorber des migrants."
 sea_peoples_fortify_coastal_palaces: "Fortifier les palais cotiers"
 sea_peoples_fortify_coastal_palaces_desc: "Detourner travail, bronze, bois et grain pour renforcer ports, murs palatiaux, postes de guet et abris de navires contre les raids maritimes."
 sea_peoples_open_emergency_granaries: "Ouvrir les greniers d'urgence"
 sea_peoples_open_emergency_granaries_desc: "Liberer les reserves de grain du palais sous surveillance armee. Le peuple mangera, mais elites et pretres accepteront mal la perte des reserves sacrees et royales."
 sea_peoples_escort_bronze_convoys: "Escorter les convois de bronze"
 sea_peoples_escort_bronze_convoys_desc: "Engager navires et marins pour proteger cuivre, etain, bois et convois de luxe. Le commerce survit au prix de l'epuisement naval."
 sea_peoples_raise_palace_levies: "Lever les troupes palatiales"
 sea_peoples_raise_palace_levies_desc: "Appeler laboureurs, dependants et clients du palais pour une defense d'urgence. Cela renforce l'Etat maintenant et affaiblit la prochaine recolte."
 sea_peoples_hire_migrant_war_bands: "Engager des bandes migrantes"
 sea_peoples_hire_migrant_war_bands_desc: "Transformer guerriers deplaces et raideurs maritimes en defenseurs payes. Ils sont utiles, armes, affames et peu disposes a disparaitre tranquillement."
 sea_peoples_controlled_settlement: "Installation controlee"
 sea_peoples_controlled_settlement_desc: "Accorder des terres surveillees aux migrants maritimes contre service. Cela reduit la violence immediate mais accelere le changement demographique."
 sea_peoples_sanctuary_appeasement: "Apaiser les sanctuaires"
 sea_peoples_sanctuary_appeasement_desc: "Depenser richesse et grain en sacrifices, fetes et soutien sacerdotal. Les dieux et le peuple seront peut-etre calmes, mais l'economie le sentira."
 sea_peoples_mycenaean_league_levy: "Appeler la levee de la Ligue"
 sea_peoples_mycenaean_league_levy_desc: "Invoquer les serments acheens et exiger navires, bronze et combattants de la ligue. Cela aide la survie locale mais epuise l'unite acheenne."
 sea_peoples_delta_defense_mobilization: "Mobiliser la defense du Delta"
 sea_peoples_delta_defense_mobilization_desc: "Engager le grain, les navires, les archers et l'autorite royale de l'Egypte pour defendre les embouchures du Nil contre la grande menace maritime."
 sea_peoples_open_phoenician_harbours: "Ouvrir les ports pheniciens"
 sea_peoples_open_phoenician_harbours_desc: "Laisser les ports levantins absorber marins, artisans, refugies et marchands migrants. Les ports prosperent, mais l'ancien ordre perd le controle."
 sea_peoples_raid_coastal_settlements: "Piller les cotes"
 sea_peoples_raid_coastal_settlements_desc: "Envoyer des bateaux de guerre contre un pays cotier connu. Un raid reussi rapporte esclaves, nourriture, marchandises et or, mais les raids repetes donnent aux puissances voisines des raisons de guerre punitives."
 sea_peoples_choose_raid_target: "Choisir la cible du raid"
 sea_peoples_no_valid_raid_targets: "Aucune cible cotiere valide n'est disponible."
 sea_peoples_raid_success_tt: "Le raid reussit : nous gagnons or, esclaves, nourriture et marchandises portuaires. La cible perd nourriture, prosperite et stabilite, et obtient un casus belli punitif contre nous."
 sea_peoples_raid_rich_success_tt: "Le raid perce de riches entrepots : nous gagnons davantage de butin et d'esclaves, mais notre reputation de raideurs augmente fortement."
 sea_peoples_raid_repulsed_tt: "Le raid est repousse. Nous perdons marins, hommes et prestige, et la cible obtient un casus belli punitif contre nous."
 sea_peoples_raid_punitive_cb_tt: "Nos raids repetes sont maintenant infames. Les puissances maritimes connues peuvent recevoir un casus belli punitif contre nous."
 sea_peoples_raid_no_target_tt: "Aucune cible de raid valide n'a ete selectionnee."
 cb_sea_peoples_punitive_raid: "Guerre punitive contre les raids maritimes"
 cb_sea_peoples_punitive_raid_desc: "Ce pays a pille les cotes a repetition, capture des esclaves et perturbe les echanges maritimes de l'age du bronze. Ses navires et ses ports doivent etre punis."
 sea_peoples_fortify_coastal_palaces_tt: "Les defenses cotieres sont renforcees pour plusieurs annees, mais grain, travail et developpement palatial sont mis sous tension."
 sea_peoples_open_emergency_granaries_tt: "La pression de famine baisse, tandis que l'autorite palatiale et la satisfaction des elites souffrent de la distribution forcee du grain."
 sea_peoples_escort_bronze_convoys_tt: "Les liens commerciaux sont proteges pour un temps, mais les marins et l'epuisement de guerre en paient le prix."
 sea_peoples_raise_palace_levies_tt: "La defense s'ameliore, mais les champs perdent leur main-d'oeuvre et la pression de famine augmente."
 sea_peoples_hire_migrant_war_bands_tt: "La pression de crise baisse fortement, mais les groupes migrants armes augmentent la pression d'installation et le risque social."
 sea_peoples_controlled_settlement_tt: "Les colons sont encadres par le service et des concessions de terres surveillees, echangeant l'agitation contre une pression d'assimilation durable."
 sea_peoples_sanctuary_appeasement_tt: "La legitimite des sanctuaires calme l'agitation, mais les offrandes consomment grain et richesse productive."
 sea_peoples_mycenaean_league_levy_tt: "Les forces de la Ligue sont mobilisees, reduisant la pression locale de crise tout en affaiblissant l'Unite acheenne."
 sea_peoples_delta_defense_mobilization_tt: "L'Egypte obtient une forte mobilisation defensive, mais paie en grain, main-d'oeuvre, autorite et epuisement de guerre."
 sea_peoples_open_phoenician_harbours_tt: "Les ports pheniciens gagnent en commerce et en assimilation tout en acceptant plus d'instabilite et de pression migratoire."
 sea_peoples_coastal_palaces_fortified_modifier: "Palais cotiers fortifies"
 sea_peoples_coastal_palaces_fortified_modifier_desc: "Defenses portuaires d'urgence, postes de guet et fortifications palatiales protegent la cote, mais consomment grain, travail et patience politique."
 sea_peoples_emergency_granaries_modifier: "Greniers d'urgence ouverts"
 sea_peoples_emergency_granaries_modifier_desc: "Les reserves palatiales nourrissent le pays. La survie s'ameliore, mais commerce, satisfaction des elites et discipline des reserves souffrent."
 sea_peoples_bronze_convoys_modifier: "Convois de bronze escortes"
 sea_peoples_bronze_convoys_modifier_desc: "Les convois proteges maintiennent le bronze et le commerce en mouvement, mais les navires sont immobilises et les marins s'epuisent."
 sea_peoples_palace_levies_modifier: "Troupes palatiales levees"
 sea_peoples_palace_levies_modifier_desc: "Les levees d'urgence augmentent la defense au prix de la production rurale et de l'endurance populaire."
 sea_peoples_migrant_war_bands_modifier: "Bandes guerrieres migrantes"
 sea_peoples_migrant_war_bands_modifier_desc: "Des guerriers deplaces combattent maintenant pour l'Etat, mais leur presence cree de nouvelles demandes d'installation et des problemes de controle."
 sea_peoples_controlled_settlement_modifier: "Installation controlee des Peuples de la Mer"
 sea_peoples_controlled_settlement_modifier_desc: "Des migrants maritimes sont installes sous surveillance palatiale, ameliorant l'assimilation mais pesant sur les vivres et l'autorite locale."
 sea_peoples_sanctuary_appeasement_modifier: "Apaisement des sanctuaires"
 sea_peoples_sanctuary_appeasement_modifier_desc: "Pretres, sacrifices et fetes calment le peuple, mais les offrandes retirent grain et travail de l'economie."
 sea_peoples_league_emergency_levy_modifier: "Levee d'urgence de la Ligue"
 sea_peoples_league_emergency_levy_modifier_desc: "Les levees acheennes liees par serment renforcent la defense tout en pesant lourdement sur nobles, allies et cohesion de la Ligue."
 sea_peoples_delta_defense_modifier: "Mobilisation defensive du Delta"
 sea_peoples_delta_defense_modifier_desc: "L'Egypte a engage ses navires, archers, reserves et prestige royal pour defendre le Delta du Nil."
 sea_peoples_open_phoenician_harbours_modifier: "Ports pheniciens ouverts"
 sea_peoples_open_phoenician_harbours_modifier_desc: "Les ports levantins tirent profit des deplacements et de l'adaptation maritime, tout en acceptant l'agitation et le melange culturel."
 sea_peoples_crisis.1.title: "La Crise des Peuples de la Mer"
 sea_peoples_crisis.1.desc: "Les rumeurs vont plus vite que les navires : des recoltes ont echoue dans des terres lointaines, les entrepots palatiaux se vident et des familles armees prennent la mer. Certains viennent comme raideurs, d'autres comme refugies, d'autres encore comme mercenaires sans seigneur pour les payer. L'ordre de la Mediterranee orientale commence a se fissurer."
 sea_peoples_crisis.1.a: "Les archives du palais nommeront cette calamite."
 sea_peoples_crisis.1.b: "Prevenez les ports et comptez le grain."
 sea_peoples_crisis.5.title: "La crise s'aggrave"
 sea_peoples_crisis.5.desc: "Ce qui commenca par de mauvaises recoltes et des raids disperses est devenu un mouvement plus vaste de peuples, de navires et de peur. Les envoyes parlent de villes brulees, de caravanes perdues et de rois qui ne commandent plus leurs propres guerriers."
 sea_peoples_crisis.5.a: "La maree monte."
 sea_peoples_crisis.5.b: "Tenir encore une saison."
 sea_peoples_crisis.10.title: "Greniers vides"
 sea_peoples_crisis.10.desc: "Les greniers du palais sont forces avant la prochaine recolte. Les rations diminuent, les villages cachent leur grain et les pretres lisent l'inquietude dans chaque presage."
 sea_peoples_crisis.10.a: "La faim se propage."
 sea_peoples_crisis.10.b: "Depenser du prestige pour maintenir les rations."
 sea_peoples_crisis.20.title: "Raideurs venus de la mer"
 sea_peoples_crisis.20.desc: "De longs navires ont ete apercus au large de [scope:target_location.GetName]. Les gardes courent vers la plage, les paysans cachent le grain et les marchands retirent les cargaisons de bronze des quais. Forts, armees cotieres et patrouilles navales peuvent briser l'attaque, mais une cote faible peut bruler avant que le palais ne reponde."
 sea_peoples_crisis.20.a: "La cote brule."
 sea_peoples_crisis.20.b: "Lever des gardes de port et des patrouilles navales."
 sea_peoples_crisis_20_unprepared_tt: "Un raid va tester la cote. Les defenses portuaires existantes, les palais fortifies, les forts, les armees cotieres et une marine peuvent encore le repousser."
 sea_peoples_crisis_20_defended_tt: "Les gardes d'urgence et les patrouilles navales ameliorent les chances de repousser le raid, mais consomment vivres et travail."
 sea_peoples_crisis.30.title: "Navires de refugies"
 sea_peoples_crisis.30.desc: "Des familles s'entassent sur des navires et des chariots, emportant dieux, outils de bronze, enfants et recits de royaumes qui ne repondent plus aux messagers. Ils demandent grain, terre et protection."
 sea_peoples_crisis.30.a: "Laissez-les passer les portes."
 sea_peoples_crisis.30.b: "Installez-les sous surveillance palatiale."
 sea_peoples_crisis.40.title: "Le reseau du bronze se brise"
 sea_peoples_crisis.40.desc: "Les caravanes d'etain sont en retard, les cargaisons de cuivre sont perdues et les cadeaux de luxe n'arrivent plus a la cour. Les scribes peuvent encore compter les obligations, mais les routes qui les rendaient reelles s'effondrent."
 sea_peoples_crisis.40.a: "L'economie palatiale vacille."
 sea_peoples_crisis.40.b: "Saisir ce qu'il reste des reserves commerciales."
 sea_peoples_crisis.50.title: "L'autorite du palais se fissure"
 sea_peoples_crisis.50.desc: "Le wanax, le roi ou le chef peut encore commander depuis la salle du trone, mais la campagne l'ecoute moins chaque mois. Les puissants locaux arment leurs hommes, les corvees disparaissent et les anciennes rivalites deviennent dangereuses."
 sea_peoples_crisis.50.a: "Le centre ne tient plus."
 sea_peoples_crisis.50.b: "Envoyer serments, menaces et cadeaux."
 sea_peoples_crisis.60.title: "Les nouveaux venus exigent des terres"
 sea_peoples_crisis.60.desc: "Des bandes des Peuples de la Mer, des foyers de mercenaires et des clans deplaces ont cesse de bouger. Ils demandent champs et ports, et gardent leurs armes pres d'eux en attendant la reponse."
 sea_peoples_crisis.60.a: "Ils s'installent la ou l'autorite est faible."
 sea_peoples_crisis.60.b: "Les pousser vers des districts surveilles."
 sea_peoples_crisis.70.title: "Les peuples maritimes prennent racine"
 sea_peoples_crisis.70.desc: "Des noms etrangers entrent dans les registres locaux. Leurs dieux recoivent des offrandes pres des anciens sanctuaires, leurs navires portent des marchandises locales et leurs guerriers epousent des femmes du pays. Ce qui arriva comme un danger devient une part de la cote."
 sea_peoples_crisis.70.a: "Que les gens de la mer deviennent notre peuple."
 sea_peoples_crisis.70.b: "Les lier par le service et le commerce."
 sea_peoples_crisis.80.title: "Les cites portuaires respirent"
 sea_peoples_crisis.80.desc: "Alors que les anciens empires faiblissent, les ports levantins s'adaptent. Les marchands pheniciens reprennent les routes abandonnees par les palais, absorbent les marins deplaces et transforment la crise en independance maritime."
 sea_peoples_crisis.80.a: "Un nouveau commerce maritime nait des ruines."
 sea_peoples_crisis.90.title: "Des navires au Delta"
 sea_peoples_crisis.90.desc: "Les rapports de la cote parlent de navires de guerre, de chars a boeufs, de familles et de bandes armees se dirigeant vers les embouchures du Nil. L'Egypte peut survivre, mais seulement en depensant grain, bronze et prestige royal pour sa defense."
 sea_peoples_crisis.90.a: "Mobiliser le Delta."
 sea_peoples_crisis.90.b: "Les recevoir avec navires, archers et grain."
 sea_peoples_crisis.100.title: "Les palais tremblent"
 sea_peoples_crisis.100.desc: "Dans tout le monde acheen, les entrepots brulent et les archives palatiales se terminent en fumee. Les wanaktes rivaux s'accusent, les paysans se retirent vers les collines et l'ancien ordre heroique commence a se fracturer."
 sea_peoples_crisis.100.a: "La Ligue perd son emprise."
 sea_peoples_crisis.100.b: "Sauver les archives, abandonner les reserves."
 sea_peoples_crisis.110.title: "Apres l'incendie"
 sea_peoples_crisis.110.desc: "Les pires feux sont passes, meme si rien ne redevient comme avant. Certains refugies sont devenus voisins, certains palais n'ont jamais rouvert et de nouvelles puissances cotieres commencent a ecrire l'age suivant."
 sea_peoples_crisis.110.a: "Le monde a change."
 sea_peoples_refugees_admitted_text: "Les navires de refugies sont admis. La population augmente autour du point d'arrivee, mais nourriture, stabilite et ordre public souffrent."
 sea_peoples_refugees_supervised_text: "Les refugies sont installes sous surveillance palatiale. Moins de monde est absorbe tout de suite, mais la pression de crise est mieux contenue."
 sea_peoples_unmanaged_settlement_text: "Les migrants s'installent la ou l'autorite est faible. La population locale augmente, mais nourriture, prosperite et stabilite sont abimees."
 sea_peoples_watched_settlement_text: "Les migrants sont envoyes dans des districts surveilles. L'assimilation progresse, mais nobles, pretres, reserves de nourriture et stabilite paient le prix."
 sea_peoples_assimilation_open_text: "Les nouveaux venus maritimes sont acceptes dans la vie locale. L'assimilation progresse et la population augmente un peu, mais les temples et les reserves sont sous tension."
 sea_peoples_service_trade_integration_text: "Les familles des Peuples de la Mer sont liees par le service et le commerce. Les ports gagnent des bras utiles, tandis que les anciennes elites perdent du controle."
 sea_peoples_phoenician_opening_event_text: "Les ports pheniciens transforment la crise en occasion, gagnant commerce et assimilation tout en acceptant instabilite et pression migratoire."
 sea_peoples_refugee_artisans_modifier: "Artisans refugies"
 sea_peoples_refugee_artisans_modifier_desc: "Certains refugies apportent savoir-faire, connaissance des cargaisons et travail portuaire, mais ils augmentent aussi la demande alimentaire et les tensions sociales."
 sea_peoples_supervised_refugees_modifier: "Refugies surveilles"
 sea_peoples_supervised_refugees_modifier_desc: "Les refugies sont comptes, surveilles et installes par l'administration palatiale, limitant le desordre au prix de la patience politique."
 sea_peoples_assimilation_open_modifier: "Assimilation ouverte"
 sea_peoples_assimilation_open_modifier_desc: "Les familles maritimes sont acceptees dans la vie locale, accelerant l'integration tout en inquietant temples et reserves alimentaires."
 sea_peoples_service_trade_integration_modifier: "Integration par service et commerce"
 sea_peoples_service_trade_integration_modifier_desc: "Les nouveaux venus sont lies aux ports, aux obligations de service et aux reseaux commerciaux, devenant utiles tout en affaiblissant les anciens controles."
 sea_peoples_crisis_1a_tt: "La crise commence sans preparation d'urgence. Le prestige baisse car la cour reagit aux evenements."
 sea_peoples_crisis_1b_tt: "La crise commence et les ports se preparent tot. La pression de raid baisse, mais grain, prestige et satisfaction des marchands souffrent."
 sea_peoples_crisis_5a_tt: "La crise passe a la phase suivante."
 sea_peoples_crisis_5b_tt: "La phase est retardee localement, mais la pression de crise augmente et le prestige souffre."
 sea_peoples_crisis_10a_tt: "La famine et la pression de crise augmentent fortement, et la stabilite baisse."
 sea_peoples_crisis_10b_tt: "La famine augmente moins, mais le prestige, les nobles et le clerge paient la discipline forcee des rations."
 sea_peoples_crisis_30a_tt: "La population et le travail portuaire utile augmentent pres du point d'arrivee, mais famine, perte de stabilite et troubles de refugies suivent."
 sea_peoples_crisis_30b_tt: "Un gain de population plus faible est absorbe sous surveillance. La pression de crise baisse, mais stabilite, nobles, clerge et reserves alimentaires souffrent."
 sea_peoples_crisis_40a_tt: "L'effondrement commercial frappe pleinement, augmentant la pression de crise et les degats sur l'economie palatiale."
 sea_peoples_crisis_40b_tt: "Les reserves saisies reduisent la famine, mais prestige, marchands et nobles souffrent pendant que le reseau commercial se brise."
 sea_peoples_crisis_50a_tt: "La dislocation interne commence, augmentant fortement la pression de crise et le danger rebelle."
 sea_peoples_crisis_50b_tt: "Le palais evite l'effondrement immediat, mais la pression de crise augmente, stabilite et prestige baissent, les nobles sont apaises et les paysans supportent la charge."
 sea_peoples_crisis_60a_tt: "La population locale augmente, mais pression d'installation, famine, perte de prosperite et degats de stabilite augmentent."
 sea_peoples_crisis_60b_tt: "L'installation surveillee ameliore l'assimilation et baisse la pression de crise, mais stabilite, nourriture, nobles et clerge souffrent."
 sea_peoples_crisis_70a_tt: "L'assimilation progresse et la population locale augmente legerement, mais nourriture et ordre religieux sont sous tension."
 sea_peoples_crisis_70b_tt: "L'assimilation et le commerce progressent davantage, avec un petit gain de population portuaire, du prestige, le soutien des marchands et le ressentiment des nobles."
 sea_peoples_crisis_80a_tt: "Les ports pheniciens gagnent commerce, assimilation, prestige et soutien marchand, mais stabilite, nourriture, nobles et pression migratoire empirent."
 sea_peoples_crisis_90a_tt: "L'Egypte se mobilise contre l'invasion, reduisant la pression de crise au prix du prestige et d'une tension de guerre."
 sea_peoples_crisis_90b_tt: "Une defense plus forte reduit davantage la pression de crise, mais consomme de la nourriture et irrite les paysans."
 sea_peoples_crisis_100a_tt: "La dislocation interne frappe le monde mycenien, la stabilite baisse et l'Unite acheenne chute fortement."
 sea_peoples_crisis_100b_tt: "Les archives palatiales survivent mieux que les reserves. Le commerce s'effondre, la famine augmente et l'Unite acheenne baisse quand meme."
 sea_peoples_crisis_110a_tt: "Les degats aigus de la crise commencent a reculer, la pression et la famine baissent, et le prestige augmente legerement."
 sea_peoples_crisis_european_corridor_target_text: "Ce pays se trouve sur le couloir de refugies europeens vers les Balkans, la Grece ou l'Anatolie"
 sea_peoples_crisis_levantine_displacement_target_text: "Ce pays peut recevoir des refugies des cotes levantines"
 sea_peoples_crisis_anatolian_recomposition_target_text: "Ce pays cotier anatolien hors Hatti peut recevoir une recomposition migratoire de l'effondrement"
 sea_peoples_add_european_corridor_migrants_text: "Des groupes de refugies europeens entrent dans le pays, ajoutant de petites communautes thraces, illyriennes, peoniennes, triballiennes, daces, urnfield ou gava-holigrady. Le flux augmente quand la crise empire."
 sea_peoples_add_levantine_coastal_flight_text: "Des familles des cotes levantines fuient vers l'interieur et les villes plus sures. Des minorites cananeennes, pheniciennes, ugaritiques, arameennes, peleset ou tjekker arrivent sans remplacer la majorite locale."
 sea_peoples_add_mediterranean_coastal_enclave_text: "Une enclave maritime mixte s'installe sur la cote. De petites populations des Peuples de la Mer et d'autres cotes mediterraneennes arrivent, augmentant la population mais aussi la pression alimentaire et l'instabilite."
 sea_peoples_phoenicianize_recent_settlers_text: "Des colons maritimes recents adoptent la vie portuaire phenicienne, sa langue, ses cultes et ses reseaux commerciaux. Seule une partie de l'enclave change, laissant des communautes cotieres mixtes."
 sea_peoples_anatolian_recomposition_text: "L'Anatolie est remodelee par l'effondrement. Des foyers luwiens, lukka, des Peuples de la Mer, pheniciens et balkaniques s'installent dans des districts affaiblis, changeant le paysage demographique sans effacer l'ancienne population."
 sea_peoples_refugee_corridor_modifier: "Couloir de refugies europeens"
 sea_peoples_refugee_corridor_modifier_desc: "Familles et groupes armes deplaces d'Europe passent par les routes balkaniques et egeennes vers des terres plus sures."
 sea_peoples_levantine_displacement_modifier: "Fuite des cotes levantines"
 sea_peoples_levantine_displacement_modifier_desc: "Des familles cotieres fuient raids, famine et ports perturbes, emportant savoir-faire et traditions religieuses vers l'interieur."
 sea_peoples_mediterranean_enclave_modifier: "Enclave migrante mediterraneenne"
 sea_peoples_mediterranean_enclave_modifier_desc: "De petites communautes migrantes venues des cotes mediterraneennes ont pris racine sans remplacer l'ancienne population."
 sea_peoples_phoenicianized_settlers_modifier: "Colons phenicianises"
 sea_peoples_phoenicianized_settlers_modifier_desc: "Des colons maritimes recents s'adaptent a la culture et au commerce portuaires pheniciens."
 sea_peoples_anatolian_recomposition_modifier: "Recomposition anatolienne"
 sea_peoples_anatolian_recomposition_modifier_desc: "Migrations de l'effondrement, installations cotieres et assimilation changent l'equilibre culturel de l'Anatolie."
 sea_peoples_crisis.120.title: "Refugies des routes europeennes"
 sea_peoples_crisis.120.desc: "Des caravanes de familles effrayees, d'eleveurs et de groupes armes descendent par les routes europeennes. Certains fuient les raideurs, d'autres la famine, d'autres encore suivent simplement la rumeur que les terres des palais ont encore du grain."
 sea_peoples_crisis.120.a: "Les laisser s'installer la ou les champs peuvent tenir."
 sea_peoples_crisis_120a_tt: "De petites communautes migrantes europeennes sont ajoutees pres de la capitale. Les phases avancees ajoutent plus de migrants, tandis que nourriture, instabilite et controle souffrent."
 sea_peoples_crisis.130.title: "La cote se vide derriere eux"
 sea_peoples_crisis.130.desc: "Des familles levantines quittent les ports menaces et cherchent des terres plus sures. Elles apportent filets de peche, images de culte, outils de bronze et recits de ports en flammes."
 sea_peoples_crisis.130.a: "Ouvrir les greniers de l'interieur et compter les nouveaux venus."
 sea_peoples_crisis_130a_tt: "De petites populations cananeennes, pheniciennes, ugaritiques, arameennes, peleset ou tjekker arrivent. La nourriture et l'instabilite empirent, mais le pays gagne des habitants utiles."
 sea_peoples_crisis.140.title: "Foyers etrangers sur le rivage"
 sea_peoples_crisis.140.desc: "Un groupe de bateaux inconnus a touche terre. Les nouveaux venus comptent marins, guerriers, femmes, enfants et artisans de cotes ruinees. Ils demandent abri, mais gardent leurs armes et leurs dieux."
 sea_peoples_crisis.140.a: "Leur accorder une bande de cote surveillee."
 sea_peoples_crisis_140a_tt: "Une enclave cotiere mediterraneenne mixte apparait. La population augmente moderement avec des cultures aleatoires des Peuples de la Mer ou des cotes mediterraneennes, tandis que nourriture, stabilite et pression d'installation empirent."
 sea_peoples_crisis.150.title: "L'enclave apprend la langue du port"
 sea_peoples_crisis.150.desc: "Les nouveaux venus n'ont pas disparu. Leurs enfants commercent au port, leurs anciens marchandent avec les capitaines pheniciens et leurs dieux recoivent des offrandes pres des sanctuaires locaux."
 sea_peoples_crisis.150.a: "Ils deviennent des gens du port."
 sea_peoples_crisis_150a_tt: "Une partie d'une enclave recente des Peuples de la Mer devient population phenicienne, avec des marchands portuaires pheniciens supplementaires. C'est une assimilation, pas un remplacement total."
 sea_peoples_crisis.160.title: "L'Anatolie apres la rupture"
 sea_peoples_crisis.160.desc: "Quinze ans de famine, raids, fuite et palais defaillants ont change l'Anatolie. Les routes portent des foyers deplaces, les ports ruines recoivent de nouveaux colons et l'ancienne autorite hittite n'explique plus qui vit ou."
 sea_peoples_crisis.160.a: "La terre n'est plus celle que decrivaient les tablettes."
 sea_peoples_crisis_160a_tt: "Une recomposition anatolienne unique de phase 5 a lieu, ajoutant des populations luwiennes, lukka, des Peuples de la Mer, pheniciennes et balkaniques. L'Anatolie change visiblement apres quinze ans."
 sea_peoples_crisis.170.title: "Les Peuples de la mer frappent la cote"
 sea_peoples_crisis.170.desc: "Des barques de guerre etrangeres ont frappe l'un de nos ports. Les greniers ont ete forces, de la nourriture a ete emportee, des foyers ont ete pris en esclavage et le marche local est ebranle. Nous avons maintenant un casus belli punitif contre les raiders, mais la cote aura besoin de temps pour se relever."
 sea_peoples_crisis.170.a: "Compter les morts et marquer les raiders."
 sea_peoples_crisis_170a_tt: "Notification d'une action de raid des Peuples de la mer : une location cotiere perd prosperite, nourriture, stabilite et une partie de sa population. Un casus belli punitif est donne contre le raider."
 sea_peoples_crisis.171.title: "Raiders repousses de la rive"
 sea_peoples_crisis.171.desc: "Les bateaux des Peuples de la mer ont teste la cote, mais gardes, navires, murs ou levees locales les ont repousses avant qu'ils n'ouvrent les greniers. L'alerte se propage encore, mais les raiders repartent avec des pertes et notre prestige augmente."
 sea_peoples_crisis.171.a: "La cote tient encore."
 sea_peoples_crisis_171a_tt: "Notification d'une action de raid repoussee : le raider perd hommes, marins et prestige, tandis que nous gagnons du prestige et un casus belli punitif."
