 bronze_hatti_collapse_panel_pressure_value: "#R [GetCountry('HATTI').MakeScope.GetVariable('bronze_hatti_collapse_pressure').GetValue|V0]#! /100"
 bronze_hatti_collapse_panel_famine: "Famine Pressure"
 bronze_hatti_collapse_panel_famine_value: "#R [GetCountry('HATTI').MakeScope.GetVariable('bronze_hatti_famine_pressure').GetValue|V0]#! /100"
