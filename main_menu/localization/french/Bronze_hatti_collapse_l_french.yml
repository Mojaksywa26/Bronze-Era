 bronze_hatti_collapse_client_status_text: "Oaths Under Strain"
 bronze_hatti_collapse_actions_card: "Possible Responses"
 bronze_hatti_collapse_actions_card_desc: "Available Hattie crisis actions appear below for Hatti. They can slow famine, raids, vassal defiance and fragmentation, but every choice costs grain, gold, manpower, prestige, estate patience or direct control."
 bronze_hatti_collapse_map_color: "Hattie Collapse"
 bronze_hatti_collapse_secondary_map_color: "Neo-Hittite Pressure"
 bronze_hatti_collapse_map_card: "Reading the Hattie Collapse"
 bronze_hatti_collapse_map_card_desc: "The map highlights Hatti, vulnerable Hattie lands, raided coasts, internal breakdown and Neo-Hittite successor pressure. Sea Peoples raids feed this crisis, while Hatti actions slow famine, vassal defiance and fragmentation at real political cost."
 bronze_hatti_collapse_legend_hatti: "Hattie lands"
 bronze_hatti_collapse_legend_successor_pressure: "Internal breakdown"
 bronze_hatti_collapse_legend_defiant_vassal: "Defiant vassal"
 bronze_hatti_collapse_legend_loyal_vassal: "Loyal vassal"
 bronze_hatti_collapse_legend_raided: "Raided locations"
 bronze_hatti_collapse_location_owner_tt: "This location belongs to a country drawn into the Hattie Collapse sphere."
 bronze_hatti_collapse_raided_location_tt: "This location has recently suffered collapse-era raiding."
 bronze_hatti_collapse_defiant_vassal_location_tt: "This location is held by a client ruler defying Hattusa."
 bronze_hatti_collapse_loyal_vassal_location_tt: "This location is held by a client ruler whose oath has recently been renewed."

 bronze_hatti_send_grain_to_cities: "Send Grain to the Cities"
 bronze_hatti_send_grain_to_cities_desc: "Open royal granaries and force emergency shipments into the palace cities. This buys time, but drains the treasury, consumes royal administration, and angers elites who expected privileged access."
 bronze_hatti_send_grain_to_cities_tt: "Costs heavy gold, government power and stability. Famine pressure #P -14#!, imperial pressure #P -5#!. Peasants gain satisfaction; nobles lose satisfaction. Cannot be repeated for 4 years."
 bronze_hatti_fortify_the_coast: "Fortify the Coast"
 bronze_hatti_fortify_the_coast_desc: "Repair Cilician and southern Anatolian coastal defenses, station levies near ports, and watch the harbors for raiders. The ports will resent the requisitions, but the coast may hold."
 bronze_hatti_fortify_the_coast_tt: "Costs heavy gold, manpower, government power and stability. For 6 years, Hatti receives the Coast Fortified state: raid events are much more likely to be repulsed. Imperial pressure #P -6#!. Burghers lose satisfaction."
 bronze_hatti_appease_vassals: "Appease the Vassals"
 bronze_hatti_appease_vassals_desc: "Recognize local privileges, reduce tribute demands, send gifts, and purchase loyalty from rulers who still fear the Great King. The oaths remain, but they cost more each season."
 bronze_hatti_appease_vassals_tt: "Costs gold, prestige, government power and stability. Imperial pressure #P -9#!. The western client kings gain Loyal Client for 6 years, but Hatti loses prestige and accepts weaker central authority."
 bronze_hatti_crush_rebellious_lords: "Crush the Rebellious Lords"
 bronze_hatti_crush_rebellious_lords_desc: "Send the army against defiant magnates. Victory restores fear of Hattusa; failure turns a show of force into open civil breakdown."
 bronze_hatti_crush_rebellious_lords_success_tt: "Costs gold, major manpower, stability and prestige. #P 55%#! chance: imperial pressure #P -12#! and prestige rises."
 bronze_hatti_crush_rebellious_lords_failure_tt: "#N 45%#! chance: imperial pressure #N +8#!, internal breakdown begins, stability falls, and nobles lose satisfaction."
 bronze_hatti_evacuate_settlements: "Evacuate Vulnerable Settlements"
 bronze_hatti_evacuate_settlements_desc: "Move exposed villagers and craftsmen inland before raids arrive. Lives are saved, but fields, harbors, and coastal workshops are abandoned."
 bronze_hatti_evacuate_settlements_tt: "Costs gold, government power and stability. Imperial pressure #P -6#!, famine pressure #N +3#!. Peasants lose satisfaction as evacuations disrupt harvests."
 bronze_hatti_centralize_around_hattusa: "Centralize Around Hattusa"
 bronze_hatti_centralize_around_hattusa_desc: "Retreat from the most exposed periphery and preserve the central Anatolian core. This is survival, not victory; the tablets will record abandoned roads and silent border palaces."
 bronze_hatti_centralize_around_hattusa_tt: "Costs gold, prestige, government power and stability. Imperial pressure #P -16#!, famine pressure #P -4#!. Hatti gains Centralized Core and Peripheral Abandonment for several years."
 bronze_hatti_recognize_successors: "Recognize Neo-Hittite Kingdoms"
 bronze_hatti_recognize_successors_desc: "Allow regional dynasts to rule as successor kings rather than fighting every province to the last. Hatti survives smaller, but the imperial structure breaks."
 bronze_hatti_recognize_successors_tt: "Costs major prestige, government power and stability. Historically plausible successor kingdoms are released only from Hatti-owned locations. Imperial pressure #P -12#!, but Hatti loses direct rule over the released regions."
 bronze_hatti_host_vassal_kings: "Host the Client Kings"
 bronze_hatti_host_vassal_kings_desc: "Summon Wilusa, Seha, Mira, and Hapalla to Hattusa for gifts, feasting, oath renewal, and public humiliation carefully disguised as ceremony."
 bronze_hatti_host_vassal_kings_tt: "Costs gold, prestige, government power and stability. Imperial pressure #P -7#!. The main western client kingdoms gain Loyal Client for 6 years and lose Defiant Client."
 bronze_hatti_seize_temple_grain: "Seize Temple Grain"
 bronze_hatti_seize_temple_grain_desc: "Take emergency grain from temple storehouses and sanctuary estates. The cities eat; the gods and priests do not forget."
 bronze_hatti_seize_temple_grain_tt: "Costs stability, prestige and government power. Famine pressure #P -12#!, imperial pressure #N +4#!. Clergy and nobles lose satisfaction; Hatti gains Temple Grain Seized for 5 years."
 bronze_hatti_call_chariot_host: "Call the Chariot Host"
 bronze_hatti_call_chariot_host_desc: "Mobilize the chariot aristocracy and household troops to remind governors, raiders, and rebels that Hatti still has bronze, horses, and kings."
 bronze_hatti_call_chariot_host_tt: "Costs gold, major manpower and stability. Imperial pressure #P -8#!, famine pressure #N +4#!. Hatti gains Chariot Host Mobilized for 4 years."
 bronze_hatti_abandon_syrian_road: "Abandon the Syrian Road"
 bronze_hatti_abandon_syrian_road_desc: "Withdraw from the most exposed southern network and let local royal houses preserve what they can. The core breathes, but the empire becomes smaller in truth."
 bronze_hatti_abandon_syrian_road_tt: "Costs major prestige, government power and stability. Carchemish, Kummuh and Hamath may emerge from appropriate Hatti-owned lands. Imperial pressure #P -10#!, famine pressure #P -2#!, but trade suffers."

