 bronze_hatti_grain_relief_sent_modifier: "Royal Grain Relief"
 bronze_hatti_grain_relief_sent_modifier_desc: "The palace has opened royal stores and forced emergency shipments into hungry cities."
 bronze_hatti_coast_fortified_modifier: "Coast Fortified"
 bronze_hatti_coast_fortified_modifier_desc: "Ports, watchfires, and coastal levies are prepared against raiders."
 bronze_hatti_vassals_appeased_modifier: "Appeased Vassals"
 bronze_hatti_vassals_appeased_modifier_desc: "Client rulers have received gifts, privileges, and lower tribute demands."
 bronze_hatti_lords_crushed_modifier: "Rebellious Lords Crushed"
 bronze_hatti_lords_crushed_modifier_desc: "The army has reminded local magnates that Hattusa can still punish defiance."
 bronze_hatti_evacuation_orders_modifier: "Evacuation Orders"
 bronze_hatti_evacuation_orders_modifier_desc: "Exposed villages and workshops are being moved inland before raiders arrive."
 bronze_hatti_centralized_core_modifier: "Centralized Core"
 bronze_hatti_centralized_core_modifier_desc: "The court has concentrated men, grain, and scribes around the Anatolian heartland."
 bronze_hatti_peripheral_abandonment_modifier: "Peripheral Abandonment"
 bronze_hatti_peripheral_abandonment_modifier_desc: "Peripheral lands feel sacrificed so the Hittite core may survive."
 bronze_hatti_client_loyal_modifier: "Loyal Client King"
 bronze_hatti_client_loyal_modifier_desc: "This client ruler has renewed his oath to Hattusa for now."
 bronze_hatti_client_defiant_modifier: "Defiant Client King"
 bronze_hatti_client_defiant_modifier_desc: "This client ruler delays tribute, arms locally, and tests Hattusa's weakness."
 bronze_hatti_client_broken_oath_modifier: "Broken Oath"
 bronze_hatti_client_broken_oath_modifier_desc: "This kingdom has broken its oath to Hattusa and now survives by its own authority."
 bronze_hatti_client_kings_hosted_modifier: "Client Kings Hosted"
 bronze_hatti_client_kings_hosted_modifier_desc: "The court has spent heavily to renew the oaths of the client kings."
 bronze_hatti_client_kings_restless_modifier: "Restless Client Kings"
 bronze_hatti_client_kings_restless_modifier_desc: "The client kings are watching Hattusa weaken and bargaining accordingly."
 bronze_hatti_temple_grain_seized_modifier: "Temple Grain Seized"
 bronze_hatti_temple_grain_seized_modifier_desc: "Temple grain stores have been taken for emergency distribution."
 bronze_hatti_chariot_host_mobilized_modifier: "Chariot Host Mobilized"
 bronze_hatti_chariot_host_mobilized_modifier_desc: "The palace has called the chariot host, strengthening authority while straining manpower and food."
 bronze_hatti_syrian_road_abandoned_modifier: "Syrian Road Abandoned"
 bronze_hatti_syrian_road_abandoned_modifier_desc: "The southern imperial network has been sacrificed to preserve the Anatolian core."

