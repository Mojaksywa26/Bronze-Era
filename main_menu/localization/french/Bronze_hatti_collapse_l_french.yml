l_french:
 bronze_hatti_collapse: "The Hattie Collapse"
 bronze_hatti_collapse_desc: "The authority of Hattusa is buckling under famine, coastal raids, lost trade, rebellious vassals, and the wider Bronze Age Collapse. If the Great King cannot preserve grain, armies, and loyalty, Hatti may fracture into Neo-Hittite successor kingdoms."
 hint_bronze_hatti_collapse: "Hattie can survive the collapse only by trading authority, wealth, and manpower for time."
 bronze_hatti_collapse_overview_card: "Collapse Overview"
 bronze_hatti_collapse_overview_card_desc: "The Hattie Collapse is a focused [situation_with_icon|e] for Hatti and its sphere. Sea Peoples pressure can worsen it, but famine, imperial pressure, rebellious vassals, raided coasts and Neo-Hittite successor fragmentation are handled here."
 bronze_hatti_collapse_panel_phase: "Collapse Phase"
 bronze_hatti_collapse_panel_phase_value: "#Y [GetCountry('HATTI').MakeScope.GetVariable('bronze_hatti_collapse_phase').GetValue|V0]#! /5"
