 bronze_hatti_collapse_panel_months_value: "#Y [GetSituationByKey('bronze_hatti_collapse').MakeScope.GetVariable('bronze_hatti_situation_months').GetValue|V0]#! /420"
 bronze_hatti_collapse_panel_vassal_oaths: "Vassal Oaths"
 bronze_hatti_collapse_panel_vassal_oaths_value: "#Y [GetCountry('HATTI').MakeScope.GetVariable('bronze_hatti_vassal_oaths').GetValue|V0]#! /4"
 bronze_hatti_collapse_panel_client_status: "Client Kings"
