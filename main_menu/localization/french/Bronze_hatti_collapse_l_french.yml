 bronze_hatti_collapse.1.title: "The Edges of Hatti Tremble"
 bronze_hatti_collapse.1.desc: "Ships vanish on the southern sea, grain caravans arrive late, and governors ask whether Hattusa can still protect them. The Great King still commands palaces, scribes, chariots, and oaths, but the old order no longer feels immovable."
 bronze_hatti_collapse.1.a: "Summon the court to Hattusa."
 bronze_hatti_collapse.1.b: "Send watchers to the coast."
 bronze_hatti_collapse_1a_tt: "The Hattie Collapse begins at phase 1 with imperial pressure 5 and famine pressure 5."
 bronze_hatti_collapse_1b_tt: "The Hattie Collapse begins at phase 1. Hatti gains Coast Fortified for 4 years and imperial pressure #P -3#!."
 bronze_hatti_collapse.5.title: "The Grain Crisis"
 bronze_hatti_collapse.5.desc: "The palace tablets still demand rations, labor, and bronze, but the fields answer with thin harvests. Cities look to the royal granaries while nobles hoard what remains."
 bronze_hatti_collapse.5.a: "The granaries cannot feed everyone."
 bronze_hatti_collapse_5a_tt: "Hatti gains Grain Crisis for 6 years and Collapsed Anatolian Trade for 5 years. Imperial pressure #N +6#!, famine pressure #N +12#!."
 bronze_hatti_collapse.6.title: "Vassals Defy Hattusa"
 bronze_hatti_collapse.6.desc: "Client rulers delay tribute and answer royal messengers with excuses. They speak of local defense, empty storehouses, and danger on every road. Beneath the words lies a sharper question: who still fears the Great King?"
 bronze_hatti_collapse.6.a: "Their loyalty is fraying."
 bronze_hatti_collapse_6a_tt: "Hatti gains Defiant Vassals for 8 years. Imperial pressure #N +8#! and stability suffers."
 bronze_hatti_collapse.7.title: "The Empire Cracks"
 bronze_hatti_collapse.7.desc: "Local dynasts raise men under their own banners. Palace warehouses are guarded more fiercely than city gates. Hatti still exists, but authority now travels only as far as food, fear, and royal troops can carry it."
 bronze_hatti_collapse.7.a: "The center cannot hold every road."
 bronze_hatti_collapse.7.b: "Withdraw toward the Anatolian core."
 bronze_hatti_collapse_7a_tt: "Hatti gains Internal Breakdown for 8 years. Imperial pressure #N +10#!, stability suffers, and nobles lose satisfaction."
 bronze_hatti_collapse_7b_tt: "Hatti gains Centralized Core for 8 years. Imperial pressure #P -10#!, but prestige falls as peripheral authority is abandoned."
 bronze_hatti_collapse.8.title: "The Fall of Hatti"
 bronze_hatti_collapse.8.desc: "The old empire has reached the edge. Some royal houses seek survival beyond Hattusa, some governors claim their cities in their own names, and the northern hills no longer obey. Hatti may live, but it will not live as before."
 bronze_hatti_collapse.8.a: "Recognize what can still be saved."
 bronze_hatti_collapse.8.b: "Hatti will not yield."
 bronze_hatti_collapse_8a_tt: "Neo-Hittite successors emerge only from appropriate Hatti-owned regions. Imperial pressure #P -12#!, stability suffers, and the player keeps a Hatti remnant."
 bronze_hatti_collapse_8b_tt: "No immediate fragmentation. Hatti gains Last Stand for 8 years, but Internal Breakdown worsens and pressure rises."
 bronze_hatti_collapse.10.title: "Refugees on the Royal Road"
 bronze_hatti_collapse.10.desc: "Families arrive from burned villages, coastal towns, and uncertain borders. They bring tools, grief, rumors, and hunger. Scribes can count them, but counting does not feed them."
 bronze_hatti_collapse.10.a: "Let them find food where they can."
 bronze_hatti_collapse.10.b: "Register them under palace oversight."
 bronze_hatti_collapse_10a_tt: "Imperial pressure #N +4#! and famine pressure #N +3#!."
 bronze_hatti_collapse_10b_tt: "Imperial pressure #N +1#!. Nobles lose satisfaction under emergency registration."
 bronze_hatti_collapse.20.title: "Raiders on the Southern Coast"
 bronze_hatti_collapse.20.desc: "Watchfires burn above the harbors. Foreign ships and displaced war bands test the beaches, hoping to seize food, metal, slaves, and livestock before Hattie troops arrive."
 bronze_hatti_collapse.20.a: "Hold the coast if we can."
 bronze_hatti_collapse_20a_tt: "Forts, armies on the coast, fleets, and the Fortify the Coast action improve the chance to repel the raid. Failed defense damages one coastal location, destroys food, kills some population, and raises pressure."
 bronze_hatti_collapse_raid_repulsed_tt: "The raid is repulsed. Imperial pressure falls by #P 2-3#! depending on defenses."
 bronze_hatti_collapse_chariot_raid_repulsed_tt: "The mobilized chariot host reaches the coast in time. Imperial pressure #P -2#!."
 bronze_hatti_collapse.30.title: "Grain Shipments Fail"
 bronze_hatti_collapse.30.desc: "The expected shipments do not arrive. Some boats never left port; others were seized, wrecked, or diverted by local authorities who feared hunger at home."
 bronze_hatti_collapse.30.a: "Confiscate noble stores."
 bronze_hatti_collapse.30.b: "Ask the temples and estates for restraint."
 bronze_hatti_collapse_30a_tt: "Hatti gains Grain Crisis and Collapsed Anatolian Trade. Imperial pressure #N +6#!, famine pressure #N +12#!."
 bronze_hatti_collapse_30b_tt: "Famine pressure #N +4#! and imperial pressure #N +2#!. Nobles lose satisfaction."
 bronze_hatti_collapse.40.title: "Tribute Refused"
 bronze_hatti_collapse.40.desc: "A border king sends gifts instead of tribute and calls them tokens of friendship. The distinction is deliberate. If Hattusa accepts it, others will follow."
 bronze_hatti_collapse.40.a: "This is defiance."
 bronze_hatti_collapse.40.b: "Accept less now to preserve the oath."
 bronze_hatti_collapse_40a_tt: "Hatti gains Defiant Vassals for 8 years. Imperial pressure #N +8#! and stability suffers."
 bronze_hatti_collapse_40b_tt: "Imperial pressure #P -4#!, but prestige suffers as tribute is reduced."
 bronze_hatti_collapse.50.title: "Kaskian Incursions"
 bronze_hatti_collapse.50.desc: "From the northern hills come raiders, cattle thieves, and war bands who know the roads better than the royal garrisons. Every village burned near the frontier makes Hattusa look farther away."
 bronze_hatti_collapse.50.a: "Send punitive columns north."
 bronze_hatti_collapse.50.b: "Pay local chiefs to guard the passes."
 bronze_hatti_collapse_50a_tt: "Imperial pressure #N +7#! and famine pressure #N +3#! as the northern campaign drains men and food."
 bronze_hatti_collapse_50b_tt: "Imperial pressure #N +3#!. Nobles lose satisfaction as frontier chiefs are paid off."
 bronze_hatti_collapse.60.title: "Tarhuntassa Claims Its Own Road"
 bronze_hatti_collapse.60.desc: "In the rough lands of southern Anatolia, local authority hardens around Tarhuntassa. The region can be recognized, fought, or lost piecemeal."
 bronze_hatti_collapse.60.a: "Let Tarhuntassa stand apart."
 bronze_hatti_collapse.60.b: "Reject this disloyalty."
 bronze_hatti_collapse_60a_tt: "Tarhuntassa may be released from Hatti-owned south-central Anatolian locations. Imperial pressure #N +4#!."
 bronze_hatti_collapse_60b_tt: "Tarhuntassa is not recognized. Imperial pressure #N +10#!."
 bronze_hatti_collapse.70.title: "Carchemish Preserves the Line"
 bronze_hatti_collapse.70.desc: "On the Euphrates frontier, Carchemish still has scribes, soldiers, and royal prestige. Nearby governors look to surviving palaces rather than distant Hattusa."
 bronze_hatti_collapse.70.a: "Let the frontier preserve what it can."
 bronze_hatti_collapse.70.b: "The royal line remains in Hattusa."
 bronze_hatti_collapse_70a_tt: "Carchemish, Melid, and Gurgum may emerge only from appropriate Hatti-owned frontier locations. Imperial pressure #N +6#!."
 bronze_hatti_collapse_70b_tt: "No successor continuity is recognized. Imperial pressure #N +8#!."
 bronze_hatti_collapse.80.title: "The Great King Restores Order"
 bronze_hatti_collapse.80.desc: "The court has pulled back, but the center breathes again. Grain reaches the key cities, royal messengers travel under guard, and the remaining nobles know that Hatti has not vanished."
 bronze_hatti_collapse.80.a: "The storm has not broken us."
 bronze_hatti_collapse_80a_tt: "Imperial pressure #P -15#! and famine pressure #P -8#!."
 bronze_hatti_collapse.90.title: "The Hattie Fragments"
 bronze_hatti_collapse.90.desc: "The last claims of universal obedience fail. Regional kings, surviving palaces, and frontier dynasts now speak in their own names. The old imperial body is gone; what remains must learn to survive."
 bronze_hatti_collapse.90.a: "A smaller Hatti may yet endure."
 bronze_hatti_collapse.90.b: "Fight for the whole empire."
 bronze_hatti_collapse_90a_tt: "Neo-Hittite successors are released from appropriate Hatti-owned regions. Imperial pressure #P -12#! and the player remains playable as Hatti."
 bronze_hatti_collapse_90b_tt: "Fragmentation is delayed. Hatti gains Last Stand for 10 years, but imperial pressure #N +12#!."

 bronze_hatti_collapse.100.title: "Wilusa Watches the Sea"
 bronze_hatti_collapse.100.desc: "Wilusa looks westward and seaward. Its rulers still speak the language of oaths, but every burned port and missing caravan makes Hattusa seem farther away. Their envoys ask for bronze, brides, and freedom to defend their own coast."
 bronze_hatti_collapse.100.a: "Bind Wilusa with gifts and marriage."
 bronze_hatti_collapse.100.b: "Demand ships and men."
 bronze_hatti_collapse.100.c: "Let Wilusa guard its own shore."
 bronze_hatti_collapse_100a_tt: "Wilusa gains Loyal Client for 6 years. Imperial pressure #P -3#!, but Hatti loses prestige."
 bronze_hatti_collapse_100b_tt: "Wilusa gains Defiant Client for 6 years. Imperial pressure #N +5#!."
 bronze_hatti_collapse_100c_tt: "Wilusa breaks its vassal oath if still subject. Vassal Oaths #N -1#! and imperial pressure #N +2#!."

 bronze_hatti_collapse.110.title: "The Seha River Bargain"
 bronze_hatti_collapse.110.desc: "The Seha River Land sends polite words and fewer wagons. Its ruler claims local granaries must feed local people first. It is not rebellion yet, but it is no longer obedience."
 bronze_hatti_collapse.110.a: "Accept less tribute this year."
 bronze_hatti_collapse.110.b: "Send royal inspectors."
 bronze_hatti_collapse.110.c: "Release Seha from direct obligation."
 bronze_hatti_collapse_110a_tt: "Seha gains Loyal Client for 6 years. Imperial pressure #P -3#! and nobles gain satisfaction."
 bronze_hatti_collapse_110b_tt: "Seha gains Defiant Client for 6 years. Imperial pressure #N +6#! and Hatti loses prestige."
 bronze_hatti_collapse_110c_tt: "Seha breaks its vassal oath if still subject. Vassal Oaths #N -1#! and imperial pressure #N +3#!."

 bronze_hatti_collapse.120.title: "Mira Demands Autonomy"
 bronze_hatti_collapse.120.desc: "Mira controls roads, ports, and palace stores too valuable to ignore. Its court now asks to command its own levies and judge its own disputes while keeping only ceremonial loyalty to Hattusa."
 bronze_hatti_collapse.120.a: "Buy Mira's loyalty with royal bronze."
 bronze_hatti_collapse.120.b: "Reject the demand."
 bronze_hatti_collapse.120.c: "Recognize Mira's autonomy."
 bronze_hatti_collapse_120a_tt: "Mira gains Loyal Client for 6 years. Imperial pressure #P -4#!, but Hatti loses medium prestige."
 bronze_hatti_collapse_120b_tt: "Mira gains Defiant Client for 8 years. Imperial pressure #N +8#!."
 bronze_hatti_collapse_120c_tt: "Mira breaks its vassal oath if still subject. Vassal Oaths #N -1#! and imperial pressure #N +4#!."

 bronze_hatti_collapse.130.title: "Hapalla Arms the Passes"
 bronze_hatti_collapse.130.desc: "Hapalla's mountain roads are filling with armed households and closed gates. The local king swears he acts for Hatti, but his messengers refuse to name which royal orders he still obeys."
 bronze_hatti_collapse.130.a: "Confirm Hapalla's mountain privileges."
 bronze_hatti_collapse.130.b: "March into the passes."
 bronze_hatti_collapse.130.c: "Let Hapalla hold the frontier alone."
 bronze_hatti_collapse_130a_tt: "Hapalla gains Loyal Client for 6 years. Imperial pressure #P -4#! and nobles gain satisfaction."
 bronze_hatti_collapse_130b_tt: "Hapalla gains Defiant Client for 8 years. Imperial pressure #N +7#! and Hatti loses stability."
 bronze_hatti_collapse_130c_tt: "Hapalla breaks its vassal oath if still subject. Vassal Oaths #N -1#! and imperial pressure #N +4#!."

