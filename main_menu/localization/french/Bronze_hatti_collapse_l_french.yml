 bronze_hatti_collapse_spawn_que_pattin_text: "Que and Pattin may emerge in Cilicia and the Amuq coast."
 bronze_hatti_collapse_spawn_kaskian_north_text: "Kaskian authority may spread in the northern hill country."
 bronze_hatti_collapse_spawn_carchemish_continuity_text: "Carchemish may preserve a royal line on the Euphrates frontier."
