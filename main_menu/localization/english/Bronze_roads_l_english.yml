l_english:

holloway: "Holloways"
holloway_desc: "Repeated traffic wears deep paths into the earth, creating natural sunken roads that guide trade, migration, and armies through the landscape. Though cheap to maintain, they become muddy, flood-prone, and difficult for heavy transport outside dry seasons."

maintained_holloway: "Maintained Holloways"
maintained_holloway: "Local authorities reinforce major holloways with drainage ditches, packed surfaces, bridges, and cleared vegetation to improve reliability and movement. While still primitive roads, they greatly increase trade capacity and military mobility along important routes."