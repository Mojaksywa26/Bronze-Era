l_english:
  bronze_age_victory_stelae: "Victory Stelae"
  bronze_age_victory_stelae_desc: "The victory stelae were monumental stone slabs erected to commemorate significant military victories and achievements in Bronze Age societies. These stelae served as powerful symbols of triumph and were often inscribed with detailed accounts of the victorious campaigns, showcasing the prowess and dominance of the ruling elite. The victory stelae law mandates the construction of these commemorative monuments, reflecting the cultural importance placed on military success and the desire to immortalize such achievements for future generations."