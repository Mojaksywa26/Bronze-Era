l_english:
 mycenaean_league: "Mycenaean League"
 mycenaean_league_desc: "The $mycenaean_league$ is a loose hegemonic order of Achaean palace kingdoms. Its High Wanax is first among rival rulers rather than an absolute emperor, binding the palaces through prestige, tribute, sanctuaries, and war oaths.\n\nCurrent Achaean Unity: #Y [GetUniqueInternationalOrganization('mycenaean_league').MakeScope.GetVariable('mycenaean_league_authority').GetValue|V0]#! /100"
 MYCENAEAN_LEAGUE_LEADER_MALE: "High Wanax"
 MYCENAEAN_LEAGUE_LEADER_MALE.long: "High Wanax of the Achaeans"
 MYCENAEAN_LEAGUE_LEADER_MALE.short: "Wanax"
 MYCENAEAN_LEAGUE_LEADER_FEMALE: "High Wanassa"
 MYCENAEAN_LEAGUE_LEADER_FEMALE.long: "High Wanassa of the Achaeans"
 MYCENAEAN_LEAGUE_LEADER_FEMALE.short: "Wanassa"
 MYCENAEAN_LEAGUE_AUTHORITY_DISPLAY: "$VAL$"
 change_mycenaean_league_authority_text: "$VALUE|+=2$ $mycenaean_league_authority$"
 current_mycenaean_league_authority_text: "$mycenaean_league_authority$ is at least $VALUE|0$"
 mycenaean_league_authority: "Achaean Unity"
 mycenaean_league_authority_desc: "Achaean Unity measures the prestige of the High Wanax, the cohesion of palace diplomacy, shared sanctuary legitimacy, and the willingness of the Achaean kingdoms to fight as one."
 high_wanax: "High Wanax"
 high_wanax_desc: "The ruler recognized as first among the Achaean palace kings."
 great_palace_candidate: "Great Palace"
 great_palace_candidate_desc: "A major palace kingdom with a strong claim to lead the Achaean world."
 palace_candidate: "Rival Palace"
 palace_candidate_desc: "A respected palace kingdom able to challenge for hegemony when the great centers weaken."
 palace_kingdom: "Palace Kingdom"
 palace_kingdom_desc: "A member wanaxate of the Achaean palace network."
 sanctuary_patron: "Sanctuary Patron"
 sanctuary_patron_desc: "A kingdom whose ruler draws authority from sacrifices, festivals, and priesthood support at major sanctuaries."
 island_wanaxate: "Island Wanaxate"
 island_wanaxate_desc: "A maritime palace kingdom tied to the league by ships, trade, and Aegean diplomacy."
 mycenaean_palace_tribute: "Palace Tribute"
 mycenaean_palace_tribute_desc: "Monthly bronze, grain, textiles, and wealth sent from the lesser palaces to the High Wanax. Each member pays according to palace income and stored treasury."
 mycenaean_palace_tribute_price: "Palace Tribute"
 MYCENAEAN_LEAGUE_TRIBUTE_BASE: "Palace tribute base"
 MYCENAEAN_LEAGUE_TRIBUTE_SHARE: "Palace wealth"
 MYCENAEAN_LEAGUE_TRIBUTE_STORED_WEALTH: "Stored treasury"
 MYCENAEAN_LEAGUE_HIGH_WANAX_SHARE: "High Wanax"
 MYCENAEAN_LEAGUE_PALACE_WEALTH: "Palace wealth"
 MYCENAEAN_LEAGUE_PALACE_HOUSE: "Palace house"
 MYCENAEAN_LEAGUE_PALACE_HOUSE_TRIBUTE: "Palace house dues"
 MYCENAEAN_LEAGUE_GREAT_PALACE: "Great palace claimant"
 MYCENAEAN_LEAGUE_SECONDARY_PALACE: "Rival palace claimant"
 MYCENAEAN_LEAGUE_SANCTUARY_INFLUENCE: "Sanctuary influence"
 MYCENAEAN_LEAGUE_ISLAND_DISTANCE: "Island distance"
 MYCENAEAN_LEAGUE_MARITIME_WEALTH: "Maritime wealth"
 MYCENAEAN_LEAGUE_INTERNAL_PEACE: "Peace among the palaces"
 MYCENAEAN_LEAGUE_MEMBER_NETWORK: "Palace network"
 MYCENAEAN_LEAGUE_NO_HIGH_WANAX: "No High Wanax"
 MYCENAEAN_LEAGUE_HIGH_WANAX_AT_WAR: "High Wanax at war"
 MYCENAEAN_LEAGUE_FRAGMENTED_PALACES: "Fragmented palaces"
 MYCENAEAN_LEAGUE_SHARED_CULTURE: "Shared Achaean culture"
 MYCENAEAN_LEAGUE_WANTS_PALACE_NETWORK: "Palace network"
 MYCENAEAN_LEAGUE_MEMBER_AUTONOMY: "Palace autonomy"
 MYCENAEAN_LEAGUE_BALANCED_HEGEMONY: "Balanced hegemony"
 wanaxate_hegemony: "Wanaxate Hegemony"
 wanaxate_hegemony_desc: "Defines how much authority the strongest palace can exercise over the other Achaean wanaxates."
 equal_palaces_policy: "Equal Palaces"
 equal_palaces_policy_desc: "The palaces acknowledge common customs but reject a strong hegemon."
 recognized_high_wanax_policy: "Recognized High Wanax"
 recognized_high_wanax_policy_desc: "One ruler is accepted as first among equals, able to mediate disputes and speak for the Achaeans."
 great_wanax_policy: "Great Wanaxate"
 great_wanax_policy_desc: "The leading palace claims a stronger ceremonial and military supremacy over the league."
 palace_tribute_law: "Palace Tribute"
 palace_tribute_law_desc: "Regulates gifts, tribute, and levies owed to the High Wanax, including monthly payments based on each palace's income and treasury."
 gift_exchange_policy: "Gift Exchange"
 gift_exchange_policy_desc: "Prestige gifts circulate among the palaces without formal tribute."
 bronze_tribute_policy: "Palace Bronze Levy"
 bronze_tribute_policy_desc: "Member palaces pay a monthly levy to the High Wanax, scaled by their income and stored treasury."
 palace_levies_policy: "Palace Levies"
 palace_levies_policy_desc: "The High Wanax can demand heavier resources and manpower for league campaigns."
 sanctuary_legitimacy_law: "Sanctuary Legitimacy"
 sanctuary_legitimacy_law_desc: "Regulates how sacrifices, festivals, and priesthoods support the authority of the league."
 local_sanctuaries_policy: "Local Sanctuaries"
 local_sanctuaries_policy_desc: "Each palace maintains its own sacred calendar and rites."
 shared_festivals_policy: "Shared Festivals"
 shared_festivals_policy_desc: "Common festivals and sacrifices reinforce Achaean identity."
 divine_omens_policy: "Divine Omens"
 divine_omens_policy_desc: "The High Wanax claims stronger legitimacy through priestly omens and ceremonial leadership."
 war_council_law: "War Council"
 war_council_law_desc: "Defines whether the Achaean kingdoms fight separately, by oath, or in pan-Achaean expeditions."
 local_war_bands_policy: "Local War Bands"
 local_war_bands_policy_desc: "Members prefer local campaigns and only loosely coordinate defense."
 palace_oaths_policy: "Palace Oaths"
 palace_oaths_policy_desc: "Oaths between palaces allow the High Wanax to organize defensive coalitions."
 pan_achaean_campaign_policy: "Pan-Achaean Campaign"
 pan_achaean_campaign_policy_desc: "The league can assemble a grand expedition when Achaean Unity is high."
 wanax_title: "Wanax"
 lawagetas_title: "Lawagetas"
 mycenaean_league_name_achaean_league: "Achaean League"
 mycenaean_league_name_league_of_achaeans: "League of the Achaeans"
 mycenaean_league_name_kingdoms_of_achaeans: "Kingdoms of the Achaeans"
 mycenaean_league_name_great_wanaxate: "Great Wanaxate"
 mycenaean_league_name_achaean_hegemony: "Achaean Hegemony"
 mycenaean_league_title_great_wanax: "Great Wanax"
 mycenaean_league_title_king_of_kings: "King of Kings of the Achaeans"
 mycenaean_league.1.title: "Council in the Megaron"
 mycenaean_league.1.desc: "Messengers from the Achaean palaces gather before the hearth of the megaron. Ledgers, oaths, and bronze gifts are laid before the High Wanax, and the palace scribes prepare a new reckoning of loyalty."
 mycenaean_league.1.a: "Bind the palaces by oath."
 mycenaean_league.1.b: "Accept the gifts and avoid pressure."
 mycenaean_league.2.title: "Omens at the Sanctuary"
 mycenaean_league.2.desc: "Priests read the smoke, the entrails, and the murmurs of the gathered nobles. The gods may favor a united expedition, but each palace interprets the omen through its own ambitions."
 mycenaean_league.2.a: "Share the sacrifice."
 mycenaean_league.2.b: "Let each palace heed its own gods."
 mycenaean_league.10.title: "Palace Rivalry"
 mycenaean_league.10.desc: "A border quarrel, marriage claim, or insult in the feast hall has turned one palace against another. The dispute threatens the fragile prestige of the High Wanax."
 mycenaean_league.10.a: "Let rivalry decide the matter."
 mycenaean_league.10.b: "Send gifts to quiet the dispute."
 mycenaean_league.100.title: "The Palaces Burn"
 mycenaean_league.100.desc: "Trade routes fail, storehouses empty, and refugees speak of raiders, famine, and fire. If the High Wanax cannot restore confidence, the league of palaces may fall into the darkness after bronze."
 mycenaean_league.100.a: "The oaths are breaking."
 mycenaean_league.100.b: "Spend what remains to hold the palaces together."
 MYCENAEAN_LEAGUE_MEGARON_COUNCIL: "Council in the megaron"
 MYCENAEAN_LEAGUE_SHARED_SACRIFICE: "Shared sacrifice"
 MYCENAEAN_LEAGUE_LINEAR_B: "Linear B administration"
 MYCENAEAN_LEAGUE_PAN_ACHAEAN_EXPEDITION: "Pan-Achaean expedition"
 MYCENAEAN_LEAGUE_RIVAL_CLAIMANT: "Rival wanax claimant"
 MYCENAEAN_LEAGUE_FORCED_TRIBUTE: "Forced tribute"
 MYCENAEAN_LEAGUE_MEDIATED_RIVALRIES: "Mediated rivalries"
 MYCENAEAN_LEAGUE_PALACES_BURNING: "Burning palaces"
 MYCENAEAN_LEAGUE_COLLAPSE_PRESSURE: "Collapse pressure"
 MYCENAEAN_LEAGUE_FRAGMENTATION_CRISIS: "Mycenaean fragmentation"
 MYCENAEAN_LEAGUE_PALACE_INFLUENCE: "Palace influence"
 mycenaean_league_current_authority_tt: "Current Achaean Unity: #Y [GetUniqueInternationalOrganization('mycenaean_league').MakeScope.GetVariable('mycenaean_league_authority').GetValue|V0]#! /100"
 mycenaean_call_megaron_council: "Call Council in the Megaron"
 mycenaean_call_megaron_council_desc: "Summon the Achaean rulers, scribes, priests, and lawagetas before the hearth of the High Wanax. Oaths and gifts raise Achaean Unity, but the noble houses resent being bound too tightly."
 mycenaean_call_megaron_council_price: "Council in the Megaron"
 mycenaean_call_megaron_council_tt: "#G +6#! Achaean Unity. Adds the #Y Council in the Megaron#! modifier for 5 years. Nobles lose satisfaction; clergy gain satisfaction."
 mycenaean_sponsor_shared_sacrifice: "Sponsor Shared Sacrifice"
 mycenaean_sponsor_shared_sacrifice_desc: "Pay for common sacrifices and feasts at a major sanctuary. The priesthood supports the league, but stores and trade goods are consumed in the ceremony."
 mycenaean_sponsor_shared_sacrifice_price: "Shared Sacrifice"
 mycenaean_sponsor_shared_sacrifice_tt: "#G +4#! Achaean Unity. Adds the #Y Shared Sacrifice#! modifier for 4 years. Clergy gain satisfaction; burghers lose satisfaction."
 mycenaean_send_linear_b_administrators: "Send Linear B Administrators"
 mycenaean_send_linear_b_administrators_desc: "Dispatch scribes and tablet keepers to count grain, bronze, wool, and levy obligations. Palace control improves, but peasants feel the weight of the records."
 mycenaean_send_linear_b_administrators_price: "Linear B Administrators"
 mycenaean_send_linear_b_administrators_tt: "#G +3#! Achaean Unity. Adds the #Y Linear B Administration#! modifier for 5 years. Control and production improve, but peasants lose satisfaction."
 mycenaean_mediate_palace_rivalry: "Mediate Palace Rivalry"
 mycenaean_mediate_palace_rivalry_desc: "Send gifts, host oaths, and force rival wanaktes to settle a dispute before it breaks league cohesion."
 mycenaean_mediate_palace_rivalry_price: "Palace Mediation"
 mycenaean_mediate_palace_rivalry_tt: "#G +5#! Achaean Unity. Adds the #Y Palace Mediation#! modifier for 4 years. Nobles lose satisfaction."
 mycenaean_demand_bronze_tribute: "Enforce Palace Tribute"
 mycenaean_demand_bronze_tribute_desc: "Press the palace network for bronze, grain, textiles, and craftsmen. The High Wanax gains short-term strength, but unity suffers."
 mycenaean_demand_bronze_tribute_price: "Palace Tribute Demand"
 mycenaean_demand_bronze_tribute_tt: "#R -5#! Achaean Unity. Adds the #Y Palace Tribute Demand#! modifier for 5 years. Production and imports improve, but peasants and burghers lose satisfaction."
 mycenaean_summon_palace_levies: "Summon Palace Levies"
 mycenaean_summon_palace_levies_desc: "Call farmers, retainers, and chariot crews into service under the High Wanax. The league gains men, but farms and workshops suffer."
 mycenaean_summon_palace_levies_price: "Palace Levies"
 mycenaean_summon_palace_levies_tt: "#R -8#! Achaean Unity. Adds the #Y Palace Levies Mustered#! modifier for 4 years. Levy size and defense improve, but population growth, production, and satisfaction suffer."
 mycenaean_proclaim_pan_achaean_expedition: "Proclaim Pan-Achaean Expedition"
 mycenaean_proclaim_pan_achaean_expedition_desc: "Gather ships, chariots, and oath-bound warriors for a heroic expedition under the High Wanax. Glory is possible, but the cost is severe."
 mycenaean_proclaim_pan_achaean_expedition_price: "Pan-Achaean Expedition"
 mycenaean_proclaim_pan_achaean_expedition_tt: "#R -12#! Achaean Unity. Adds the #Y Pan-Achaean Expedition#! modifier for 6 years. Armies and fleets improve, while food and imports are strained."
 mycenaean_fortify_megara: "Fortify the Megara"
 mycenaean_fortify_megara_desc: "Strengthen palace walls, granaries, and refuge courts. This protects a kingdom, but it turns attention inward and weakens common Achaean trust."
 mycenaean_fortify_megara_price: "Fortify Megara"
 mycenaean_fortify_megara_tt: "#R -2#! Achaean Unity. Adds the #Y Fortified Megara#! modifier for 6 years. Defenses and control improve, while development and food suffer."
 mycenaean_megaron_council_modifier: "Council in the Megaron"
 mycenaean_megaron_council_modifier_desc: "The palace has recently hosted a council of Achaean rulers and oath witnesses."
 mycenaean_shared_sacrifice_modifier: "Shared Sacrifice"
 mycenaean_shared_sacrifice_modifier_desc: "Common rites bind the palaces through sanctuary prestige and priestly approval."
 mycenaean_linear_b_administration_modifier: "Linear B Administration"
 mycenaean_linear_b_administration_modifier_desc: "Palace scribes are tightening control through tablets, inventories, and levy records."
 mycenaean_palace_mediation_modifier: "Palace Mediation"
 mycenaean_palace_mediation_modifier_desc: "The High Wanax has recently mediated a quarrel between rival palace houses."
 mycenaean_rival_claimant_modifier: "Rival Wanax Claimant"
 mycenaean_rival_claimant_modifier_desc: "This palace is openly gathering prestige for a future claim to Achaean hegemony."
 mycenaean_bronze_tribute_demand_modifier: "Bronze Tribute Demand"
 mycenaean_bronze_tribute_demand_modifier_desc: "The palace economy is extracting tribute aggressively, creating wealth and resentment."
 mycenaean_palace_levies_mustered_modifier: "Palace Levies Mustered"
 mycenaean_palace_levies_mustered_modifier_desc: "Palace levies have been pulled from fields and workshops for league military service."
 mycenaean_pan_achaean_expedition_modifier: "Pan-Achaean Expedition"
 mycenaean_pan_achaean_expedition_modifier_desc: "The palaces are committed to a grand heroic campaign, with all its glory and cost."
 mycenaean_fortified_megara_modifier: "Fortified Megara"
 mycenaean_fortified_megara_modifier_desc: "Palace centers are fortified, storehouses guarded, and refuge courts prepared."
 mycenaean_palaces_burning_modifier: "Palaces Burning"
 mycenaean_palaces_burning_modifier_desc: "Palace order is failing as fire, famine, refugees, and local revolts tear at the old system."
 mycenaean_league.20.title: "Tablets of Tribute"
 mycenaean_league.20.desc: "The High Wanax demands bronze, grain, and textiles recorded on fresh tablets. Local elders warn that the villages are already thinly supplied."
 mycenaean_league.20.a: "Send the tribute."
 mycenaean_league.20.b: "Hide what the scribes cannot count."
 mycenaean_league.30.title: "The Lawagetas Demand War"
 mycenaean_league.30.desc: "War leaders gather in the megaron, pressing the High Wanax to prove his supremacy with action. Refusing them may look weak."
 mycenaean_league.30.a: "Call the levy lists."
 mycenaean_league.30.b: "Delay the campaign."
 mycenaean_league.40.title: "A Claim to the High Seat"
 mycenaean_league.40.desc: "A rival wanax boasts that the gods and the warriors favor his palace. His gifts, marriages, and chariot musters now challenge the standing order."
 mycenaean_league.40.a: "Press our claim."
 mycenaean_league.40.b: "Honor the current order."
 mycenaean_league.50.title: "Festival of the Achaeans"
 mycenaean_league.50.desc: "Nobles, priests, and singers gather at a shared sanctuary. The feast can bind the palaces, or a ruler can keep the finest offerings for his own house."
 mycenaean_league.50.a: "Let all palaces share the rite."
 mycenaean_league.50.b: "Favor our own house."
 mycenaean_league.60.title: "The Tablets Overflow"
 mycenaean_league.60.desc: "The palace archives swell with lists of wool, bronze, women workers, ships, and grain. More scribes could strengthen the league, though the countryside will feel it."
 mycenaean_league.60.a: "Send the scribes."
 mycenaean_league.60.b: "Leave the villages alone."
 mycenaean_league.70.title: "The Earth Shakes the Megaron"
 mycenaean_league.70.desc: "Walls crack, storerooms spill, and priests speak of anger beneath the earth. The palace must choose between rebuilding together or retreating behind its own gates."
 mycenaean_league.70.a: "Rebuild the walls and stores."
 mycenaean_league.70.b: "The palace order is failing."
 mycenaean_league.80.title: "Rhodes and the Sea Roads"
 mycenaean_league.80.desc: "Island wanaktes control the ships that bind the Aegean. They can escort the league's sea roads, or use the crisis to enrich their own harbors."
 mycenaean_league.80.a: "Keep the sea roads open."
 mycenaean_league.80.b: "Let our ships serve our own palace."
 mycenaean_league.90.title: "Glory Before the Palaces"
 mycenaean_league.90.desc: "News of victory reaches the hearth of the High Wanax. For a moment the rival palaces remember why they swore their oaths."
 mycenaean_league.90.a: "Let the singers carry the tale."
 mycenaean_league.110.title: "The Oaths Remembered"
 mycenaean_league.110.desc: "Tribute arrives, sacrifices are shared, and rival kings speak carefully before the High Wanax. The league has not become an empire, but it still breathes."
 mycenaean_league.110.a: "The Achaeans stand together."
 mycenaean_league.120.title: "The Archive Fails"
 mycenaean_league.120.desc: "Tablets are missing, stores are miscounted, and messengers no longer return on time. Without records, the palace cannot command what it cannot see."
 mycenaean_league.120.a: "The records are ash."
 mycenaean_league.120.b: "Send scribes into the villages."
 mycenaean_fragmentation: "Mycenaean League"
 mycenaean_fragmentation_desc: "Manage the Achaean palace league. Keep Unity high to preserve tribute, common defence, and the authority of the High Wanax.\n\nAchaean Unity: #Y [GetUniqueInternationalOrganization('mycenaean_league').MakeScope.GetVariable('mycenaean_league_authority').GetValue|V0]#! /100"
 hint_mycenaean_fragmentation: "Mycenaean League"
 mycenaean_fragmentation_panel_high_wanax: "High Wanax"
 mycenaean_fragmentation_panel_unity: "Achaean Unity"
 mycenaean_fragmentation_panel_unity_value: "[GetUniqueInternationalOrganization('mycenaean_league').MakeScope.GetVariable('mycenaean_league_authority').GetValue|V0] / 100"
 mycenaean_fragmentation_panel_strong_palace: "Strong Palace"
 mycenaean_fragmentation_overview_card: "Palace Order"
 mycenaean_fragmentation_overview_card_desc: "The League is a loose order of Achaean palace houses. Strong Unity keeps members loyal. Low Unity lets powerful palaces claim territory and can turn the league into open fragmentation."
 mycenaean_fragmentation_actions_card: "League Actions"
 mycenaean_fragmentation_actions_card_desc: "Use the actions below to manage tribute, oaths, palace influence, defence and breakaway kingdoms. Most actions have real costs in gold, stores, prestige, stability or estate support."
 mycenaean_fragmentation_map_card: "League Map"
 mycenaean_fragmentation_map_card_desc: "The map highlights the High Wanax and the strongest palace challengers. If fragmentation begins, landed palace kingdoms will appear here."
 mycenaean_palace_has_valid_landable_location.tt: "This palace house has at least one location where its palace network can become territorial authority."
 turn_mycenaean_palace_into_normal_tag.tt: "This palace house becomes a normal territorial country and takes direct control of the locations where it holds the dominant palace network."
 turn_mycenaean_palace_into_building_based.tt: "This palace state is reduced back into an extraterritorial palace house under the High Wanax."
 mycenaean_proclaim_palace_autonomy: "Proclaim Palace Autonomy"
 mycenaean_proclaim_palace_autonomy_desc: "Break from palace subordination and claim the lands administered by this house. Mycenae will gain a casus belli to restore authority."
 mycenaean_proclaim_palace_autonomy_price: "Proclaim Autonomy"
 mycenaean_proclaim_palace_autonomy_tt: "The palace becomes a normal country. #R -10#! Achaean Unity. The High Wanax gains a casus belli to reassert authority."
 mycenaean_reassert_palace_authority: "Reassert Palace Authority"
 mycenaean_reassert_palace_authority_desc: "Name a breakaway palace as disobedient and prepare a campaign to return it to the Achaean order."
 mycenaean_reassert_palace_authority_price: "Reassert Authority"
 mycenaean_reassert_palace_authority_tt: "Gain a casus belli against the chosen palace. #R -3#! Achaean Unity from the political strain."
 mycenaean_summon_oath_to_mycenae: "Summon Oath to Mycenae"
 mycenaean_summon_oath_to_mycenae_desc: "Call a member palace to renew its oath before the High Wanax. Acceptance restores unity; refusal deepens the crisis."
 mycenaean_summon_oath_to_mycenae_price: "Oath Summons"
 mycenaean_grant_palace_privileges: "Grant Palace Privileges"
 mycenaean_grant_palace_privileges_desc: "Buy loyalty by confirming local rights, archives, and tribute privileges. This weakens central authority but can keep a palace house from breaking away."
 mycenaean_grant_palace_privileges_price: "Palace Privileges"
 mycenaean_grant_palace_privileges_tt: "#R -4#! Achaean Unity. The chosen palace receives privileges for 5 years, improving noble satisfaction and reducing its Palace Influence."
 cb_mycenaean_palace_rebel_against_high_wanax: "Palace Autonomy"
 cb_mycenaean_palace_rebel_against_high_wanax_desc: "A palace house challenges the High Wanax and seeks territorial autonomy."
 cb_mycenaean_high_wanax_reassert_authority: "Reassert Palace Authority"
 cb_mycenaean_high_wanax_reassert_authority_desc: "The High Wanax seeks to force a breakaway palace back under Achaean authority."
 cb_mycenaean_palace_struggle: "Palace Struggle"
 cb_mycenaean_palace_struggle_desc: "Rival Achaean palaces fight for land, oath prestige, and survival during the fragmentation."
 peace_mycenaean_gain_palace_autonomy: "Recognize Palace Autonomy"
 peace_mycenaean_gain_palace_autonomy_desc: "The victorious palace becomes a normal territorial country."
 peace_mycenaean_revoke_palace_autonomy: "Revoke Palace Autonomy"
 peace_mycenaean_revoke_palace_autonomy_desc: "A small breakaway palace is reduced back into an extraterritorial palace house."
 bronze_mycenaean_oath_sworn: "Swore Palace Oath"
 bronze_mycenaean_oath_refused: "Refused Palace Oath"
 bronze_mycenaean_palace_autonomy: "Claimed Palace Autonomy"
 bronze_mycenaean_reconciled_palace: "Reconciled Palace"
 mycenaean_landed_palace_modifier: "Landed Palace Kingdom"
 mycenaean_landed_palace_modifier_desc: "This formerly extraterritorial palace house now rules land directly. Its prestige rises, but control and elite balance are unsettled."
 mycenaean_palace_autonomy_claimed_modifier: "Claimed Palace Autonomy"
 mycenaean_palace_autonomy_claimed_modifier_desc: "This palace has recently claimed local autonomy from Mycenaean authority."
 mycenaean_high_wanax_fragmentation_council_modifier: "Council of Fragmentation"
 mycenaean_high_wanax_fragmentation_council_modifier_desc: "The High Wanax is convening emergency councils to hold the palace order together."
 mycenaean_palace_privileges_granted_modifier: "Palace Privileges Granted"
 mycenaean_palace_privileges_granted_modifier_desc: "This palace has received confirmed local rights and tribute privileges from the High Wanax."
 mycenaean_league_oath_summoned_modifier: "Recently Summoned to Oath"
 mycenaean_league_oath_summoned_modifier_desc: "This palace has recently been summoned to renew its oath before the High Wanax."
 mycenaean_rising_palace_influence_modifier: "Rising Palace Influence"
 mycenaean_rising_palace_influence_modifier_desc: "This palace is accumulating prestige, local loyalty, and elite confidence inside the Achaean order."
 mycenaean_dominant_palace_influence_modifier: "Dominant Palace Influence"
 mycenaean_dominant_palace_influence_modifier_desc: "This palace has become a serious political force and may challenge the High Wanax if unity collapses."
 mycenaean_league.200.title: "The Palace Order Breaks"
 mycenaean_league.200.desc: "Messengers no longer carry commands as law. Palace houses claim local stores, warriors follow their own wanaktes, and the old Achaean order begins to fracture."
 mycenaean_league.200.a: "The oaths tremble."
 mycenaean_league.210.title: "A Palace Claims Its Lands"
 mycenaean_league.210.desc: "The palace elders argue that distant Mycenae can no longer protect the villages, stores, and sanctuaries entrusted to them."
 mycenaean_league.210.a: "Claim the land and the granaries."
 mycenaean_league.210.b: "Remain beneath the High Wanax."
 mycenaean_league.220.title: "Council of Breaking Oaths"
 mycenaean_league.220.desc: "The High Wanax hears of palaces fortifying gates and counting stores without permission. A hard council may hold the league together, or force it further apart."
 mycenaean_league.220.a: "Gather the wanaktes in the megaron."
 mycenaean_league.220.b: "Threaten the disobedient houses."
 mycenaean_league.225.title: "A Palace Defies Mycenae"
 mycenaean_league.225.desc: "A palace house has claimed direct rule over its lands. The tablets name it disobedient; the warriors ask whether the High Wanax will march."
 mycenaean_league.225.a: "Prepare the oath lists."
 mycenaean_league.230.title: "The High Wanax Denounces Us"
 mycenaean_league.230.desc: "Mycenae has named this palace disobedient and claims the right to restore authority by force."
 mycenaean_league.230.a: "Let them come."
 mycenaean_league.240.title: "Summoned Before the High Wanax"
 mycenaean_league.240.desc: "Envoys arrive with bronze seals and a demand: renew the oath to Mycenae, send hostages, and stand again beneath the High Wanax."
 mycenaean_league.240.a: "Renew the oath."
 mycenaean_league.240.b: "Refuse the summons."
 mycenaean_league.250.title: "After the Fragmentation"
 mycenaean_league.250.desc: "The old palace order has changed. Some houses stand independent, some bend again to Mycenae, and the Achaean world is no longer what the tablets once described."
 mycenaean_league.250.a: "The singers will remember."
 mycenaean_league_200_a_tt: "The fragmentation begins. The High Wanax suffers an authority shock, while member palaces gain room to act."
 mycenaean_league_210_a_tt: "Become a normal territorial country, gain cores on palace-network lands, and reduce Achaean Unity by #R 8#!."
 mycenaean_league_210_b_tt: "Remain loyal for now. Achaean Unity rises by #G 3#! and relations with the High Wanax improve."
 mycenaean_league_220_a_tt: "Gain #G 4#! Achaean Unity and emergency council modifiers, but noble satisfaction suffers."
 mycenaean_league_220_b_tt: "Reduce Achaean Unity by #R 6#!. The High Wanax gains crisis pressure and prestige loss."
 mycenaean_league_225_a_tt: "The High Wanax is warned and may use authority actions or a casus belli to restore the palace order."
 mycenaean_league_230_a_tt: "Gain rival claimant pressure and reduce Achaean Unity by #R 3#!."
 mycenaean_league_240_a_tt: "Accept the oath. Achaean Unity rises by #G 5#!, but prestige is spent."
 mycenaean_league_240_b_tt: "Refuse the oath. Achaean Unity falls by #R 7#! and the High Wanax gains a restoration casus belli."
 mycenaean_league_250_a_tt: "Cleans up temporary fragmentation flags. The political outcome remains on the map."
 MYCENAEAN_LEAGUE_PALACE_REDISTRIBUTION: "Palace redistribution"
 mycenaean_redistribute_palace_stores: "Redistribute Palace Stores"
 mycenaean_redistribute_palace_stores_desc: "Open the royal granaries, bronze stores, and palace workshops to keep the Achaean order fed and obedient. Unity rises, but nobles resent the loss of private stores and the economy slows."
 mycenaean_redistribute_palace_stores_price: "Palace Redistribution"
 mycenaean_redistribute_palace_stores_tt: "#G +5#! Achaean Unity. All member palaces lose #G 3#! Palace Influence. The High Wanax receives #Y Palace Redistribution#! for 3 years: more food security, weaker production, and strained imports."
 mycenaean_demand_palace_hostages: "Demand Palace Hostages"
 mycenaean_demand_palace_hostages_desc: "Demand noble hostages from a palace house to guarantee obedience. This reduces its ability to lead a breakaway faction, but creates lasting resentment."
 mycenaean_demand_palace_hostages_price: "Palace Hostages"
 mycenaean_demand_palace_hostages_tt: "#G +3#! Achaean Unity. The chosen palace loses #G 12#! Palace Influence for now, but its nobles are angered and relations with the High Wanax suffer."
 mycenaean_restore_palace_network: "Restore Palace Network"
 mycenaean_restore_palace_network_desc: "Offer a small, weakened palace kingdom a costly settlement: its local lands return to Mycenaean control, while the dynasty survives as an extraterritorial palace house."
 mycenaean_restore_palace_network_price: "Restore Palace Network"
 mycenaean_restore_palace_network_tt: "The chosen palace receives an event. If it accepts, it becomes an extraterritorial palace house again and Achaean Unity rises by #G 8#!. If it refuses, Unity falls and the High Wanax gains a casus belli."
 mycenaean_palace_redistribution_modifier: "Palace Redistribution"
 mycenaean_palace_redistribution_modifier_desc: "The High Wanax is redistributing grain, bronze, and workshop output to keep the palace network alive through the crisis."
 mycenaean_palace_hostages_taken_modifier: "Palace Hostages Taken"
 mycenaean_palace_hostages_taken_modifier_desc: "Noble hostages have been sent to the High Wanax. Local elites obey for now, but they do not forgive easily."
 bronze_mycenaean_hostages_taken: "Noble Hostages Taken"
 mycenaean_league.260.title: "Return to the Palace Network"
 mycenaean_league.260.desc: "Envoys from Mycenae arrive with seals, gifts, and a hard offer. The High Wanax will preserve this dynasty as a palace house, but the fields, ports, and storehouses must return to the shared Achaean order."
 mycenaean_league.260.a: "Accept the settlement."
 mycenaean_league.260.b: "Keep the land."
 mycenaean_league_260_a_tt: "This country returns to extraterritorial palace-house status. Its lands pass back to the High Wanax, and Achaean Unity rises by #G 8#!."
 mycenaean_league_260_b_tt: "Refuse the settlement. Achaean Unity falls by #R 6#!, this palace becomes a rival claimant, and the High Wanax gains a restoration casus belli."


