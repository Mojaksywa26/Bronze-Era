l_english:
  bronze_routes: "Long Distance Trade Networks"
  bronze_routes_desc: "Long-distance trade networks refer to the complex systems of trade and commerce that connect different regions and civilizations across vast distances. These networks facilitate the exchange of goods, ideas, and cultural influences between societies."

  palatial_economy: "Palace Economy"
  palatial_economy_desc: "The palace economy is a system of economic organization in which the ruling elite, often centered around a palace or royal court, controls and manages the production and distribution of goods and resources."

  chariot_warfare: "Warrior Aristocracy"
  chariot_warfare_desc: "The warrior aristocracy is a social class or group of individuals who hold power and influence primarily through their military prowess and leadership."