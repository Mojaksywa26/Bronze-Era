l_english:
 a_absolutism_cawa_advance:0 "$a_absolutism_cawa$"
 a_absolutism_cawa_advance_desc:0 "$a_absolutism_cawa_desc$"
 a_absolutism_janissaries_advance:0 "$a_absolutism_janissaries$"
 a_absolutism_janissaries_advance_desc:0 "$a_absolutism_janissaries_desc$"
 a_bedouin_cavalry_advance:0 "$a_bedouin_cavalry$"
 a_bedouin_cavalry_advance_desc:0 "$a_bedouin_cavalry_desc$"
 a_brand_new_world:0 "A Brand New World"
 a_brand_new_world_desc:0 "The world evolves, and those who fail to adapt are forgotten by history. Our Order has endured for over half a millennium, and we will not fade away now! Our mortal bodies will eventually join the Creator, but our Order must first become immortal. We will transform ourselves into the most modern nation of our age, strengthening ourselves from the very core."
 a_central_power:0 "A Central Mediterranean Power"
 a_central_power_desc:0 "Our advantageous central position in the Mediterranean enables effortless access to any shore. We should capitalize on this asset to seek alliances, forge new friendships, and expand our borders. With the sea as our gateway, opportunities abound for growth and prosperity in our quest for greater influence and security."
 a_discovery_cawa_advance:0 "$a_discovery_cawa$"
 a_discovery_cawa_advance_desc:0 "$a_discovery_cawa_desc$"
 a_discovery_janissaries_advance:0 "$a_discovery_janissaries$"
 a_discovery_janissaries_advance_desc:0 "$a_discovery_janissaries_desc$"
 a_dynamic_society:0 "A Dynamic Society"
 a_dynamic_society_desc:0 "Our lands are a haven for the bold. Those looking to better their lives will find opportunity here, and we will in turn capitalize on the talents of these ambitious individuals to strengthen our nation."
 a_fortified_border:0 "A Fortified Border"
 a_fortified_border_desc:0 "Our borders are not well-defended by natural features, as is the case in some other nations. However, we have wit and wisdom in abundance, enough to construct the mightiest fortifications possible to deter our enemies and protect our families."
 a_land_of_banks:0 "A Land of Banks"
 a_land_of_banks_desc:0 "$TUS$ is the center of banking in $europe$, with many powerful financial institutions headquartered in their major cities. From these bases, their influence extends across $italy_region$ and into northern $europe$ through extensive trade networks and lucrative partnerships."
 a_magnanimous_empire:0 "A Magnanimous Empire"
 a_magnanimous_empire_desc:0 "The Great $rank_kingdom_horde_ruler_suffix_male$ was not only known for his fearsome sword, but also for the exceptional generosity towards those who wisely bent the knee to him. Those who welcome the rule of our tolerant empire shall be treated as part of it."
 a_mining_heritage:0 "A Mining Heritage"
 a_mining_heritage_desc:0 "For centuries, mining has shaped our landscape, economy, and culture. Significant $silver$ discoveries in the region have attracted miners and traders from diverse regions, fostering the Ore Mountains' growth and expanding our realm's significance and development."
 a_modern_nation:0 "A Modern Nation"
 a_modern_nation_desc:0 "Despite our apparent isolation, we are well aware of the innovations happening around the world, and we waste no time in implementing these modernizations in order to maintain a competitive advantage over our rivals."
 a_neverending_crusade:0 "A Never-Ending Crusade"
 a_neverending_crusade_desc:0 "As long as any faithful $catholic_ADJ$ is in danger of religious persecution, our mission is not over! Be it during a pilgrimage to the Tomb of our Lord and Savior, or while crossing the seas and fending off corsairs, we will never stop training and never rest, ready to leap into combat at a moment's notice."
 a_new_dawn:0 "A New Dawn"
 a_new_dawn_desc:0 "Our nation has been reborn. The old ways of living are gone, like dreams melting into the morning light. It is time for us to face the world as a fully modernized nation."
 a_permanent_capital:0 "A Permanent Capital"
 a_permanent_capital_desc:0 "For centuries, our nation has lacked a permanent capital, with the court following the rulers wherever they desired. While this approach has its advantages, in order to effectively govern our vast nation we need to establish a strong central authority in a proper permanent location."
 a_reformation_cawa_advance:0 "$a_reformation_cawa$"
 a_reformation_cawa_advance_desc:0 "$a_reformation_cawa_desc$"
 a_reformation_janissaries_advance:0 "$a_reformation_janissaries$"
 a_reformation_janissaries_advance_desc:0 "$a_reformation_janissaries_desc$"
 a_renaissance_cawa_advance:0 "$a_renaissance_cawa$"
 a_renaissance_cawa_advance_desc:0 "$a_renaissance_cawa_desc$"
 a_renaissance_janissaries_advance:0 "$a_renaissance_janissaries$"
 a_renaissance_janissaries_advance_desc:0 "$a_renaissance_janissaries_desc$"
 a_resilient_soul:0 "A Resilient Soul"
 a_resilient_soul_desc:0 "Our people are truly resilient, embodying unwavering determination in the face of challenges. They weather adversity with unwavering spirit, finding strength in unity and a steadfast commitment to their shared values. Their indomitable resilience propels us forward, enabling us to overcome any obstacle that comes our way. We will always emerge stronger and more determined than ever before."
 a_revolutions_cawa_advance:0 "$a_revolutions_cawa$"
 a_revolutions_cawa_advance_desc:0 "$a_revolutions_cawa_desc$"
 a_revolutions_janissaries_advance:0 "$a_revolutions_janissaries$"
 a_revolutions_janissaries_advance_desc:0 "$a_revolutions_janissaries_desc$"
 a_tolerant_society:0 "A Tolerant Society"
 a_tolerant_society_desc:0 "Religious infighting and intolerance plagues other lands, but we stand firm against allowing such strife to fester in our realm. Regardless of the diverse faiths our subjects hold, this nation shall be built on the strong pillars of tolerance and brotherhood, fostering a harmonious coexistence among all communities. United by a common vision, we will be forging a nation where respect and understanding flourish, paving the way for a prosperous future."
 a_trading_hub:0 "A Trading Hub"
 a_trading_hub_desc:0 "Our nation is blessed with a well-established hub of cities focused on trade, and adventurous sailors willing to bring riches from all over the world back home. These seafarers will be an excellent way for us to trade with other nations and make significant profits."
 a_true_ethiopian_church:0 "A True $ETH_ADJ$ Church"
 a_true_ethiopian_church_desc:0 "External influences have their uses, but exposure to them can alter the nature of our beliefs. In order to maintain our identity, we must secure the domestic primacy of our own Tewahedo Church."
 abacus_advance:0 "Abacus"
 abacus_advance_desc:0 "Abaci may be ancient technology, but it is precisely thanks to proper accounting tools and ledgers that we are able to keep accurate accounts of our wealth. Without these tools and the talented experts who know how to use them, we would be blind to the actual richness of our country."
 abolished_serfdom:0 "Abolished Serfdom"
 abolished_serfdom_desc:0 "We know from reading ancient Roman accounts that a citizen army of free men is far more willing to fight than those who are forced. We should give our peasants a relative amount of freedom; they will then fight more fervently to defend their homeland — and those privileges."
 absolute_rulership:0 "Absolute Rulership"
 absolute_rulership_desc:0 "Many people demand to be given a role in the government, but mostly because they want to be rewarded without expending much effort. The idea of absolutism has recently piqued our interest, as adopting it would empower us to dispose of those self-serving parasites and rule alone..."
 absolutism_agressive_advance:0 "State Above All"
 absolutism_agressive_advance_desc:0 "As various regions of the world are formally consolidated and resources become more limited, it is the right of the state to exercise an aggressive policy to satisfy the material needs of its people and expand its power. And while war should be seen as the last act of diplomacy, it is still a diplomatic play, as the state is above human restrictions such as morality and law."
 absolutism_control_decline_advance:0 "Absolutist Administration"
 absolutism_control_decline_advance_desc:0 "Absolutist rulers not only demonstrate their power in court, but also through an administrative apparatus that may spread throughout the country."
 absolutist_court:0 "Absolutist Court"
 absolutist_court_desc:0 "Authority has become increasingly centralized in the person of the ruler. Courtiers and officials now serve as extensions of royal will rather than autonomous actors. This concentration of authority allows rulers to enact their wishes more quickly and efficiently."
 academia_pontaniana:0 "Accademia Pontaniana"
 academia_pontaniana_desc:0 "For a long time, $NAP$ has striven to be a center of modern learning, attracting the great minds of the age and spreading the light of the $renaissance$. Under the leadership of Giovanni Pontano, these discussion circles have been given structure and organization. It is only fitting that we name the academy after its industrious leader."
 accademia_cimento:0 "Accademia del Cimento"
 accademia_cimento_desc:0 "The #italic Accademia del Cimento#! is a scientific society established in $FLO$ by students of Galileo. The first institution of its kind, this groundbreaking incubator of scientific development was devoted to the principles of experimentation. The society had the motto 'Try and try again' and published the #Italic Saggi#!, a book that would set contemporary standards for laboratory practice and procedure."
 acceptance_of_old_testament:0 "Acceptance of the Old Testament"
 acceptance_of_old_testament_desc:0 "Some $christian_ADJ$ denominations have decided to reduce the importance of the Old Testament, claiming that the arrival of Jesus completely supersedes it. We, however, maintain that it is still relevant, and that some instructions in it are as valid as they were when they were written."
 accounts_of_the_atlantic_voyage:0 "Accounts of the Atlantic Voyage"
 accounts_of_the_atlantic_voyage_desc:0 "According to the legendary Mansa Mūsā, his predecessor started a journey across the $atlantic_ocean_continent$ in hopes of discovering the furthest limits of the ocean. While some among the ruling class consider this endeavor a shameful abdication of duty, others see this as inspiration to explore corners of the world previously unknown to man."
 ach_a_system_of_forts_advance:0 "A System of Forts"
 ach_a_system_of_forts_advance_desc:0 "Our coastal defenses are unmatched, utilizing Italian #italic trace italienne#! design to repel enemy naval raids and incursions into our sovereign territory. We have transformed the old Crusader castles into modern artillery forts, capable of withstanding months of siege while projecting power over the Ionian and Aegean seas. No invader shall take the Morea by sea so long as our stone sentinels stand watch over the rocky capes and fertile valleys."
 ach_achaean_enlightenment_advance:0 "Achaean Enlightenment"
 ach_achaean_enlightenment_advance_desc:0 "As scholars flee the crumbling peripheries of the East, many find refuge in our courts, leading to a unique synthesis of Latin philosophy and Greek classical knowledge. Under the enlightened patronage of the Princes, we have established academies where the works of the great sages of both East and West are studied side-by-side, sparking a cultural rebirth. This intellectual flowering attracts the best minds of Europe, ensuring our state remains at the cutting edge of administrative and scientific progress."
 ach_knights_of_the_peloponnese_advance:0 "Knights of the Peloponnese"
 ach_knights_of_the_peloponnese_advance_desc:0 "Our nobility has spent centuries in constant border skirmishes against our enemies, creating a unique tradition of highly mobile cavalry. These knights have discarded the cumbersome barding of their French ancestors in favor of lighter armor and tactics adapted for the steep, treacherous Greek mountains. This allows our forces to outmaneuver traditional heavy cavalry and strike at the enemy's flanks with devastating speed and precision."
 ach_morean_silk_advance:0 "Morean Silk"
 ach_morean_silk_advance_desc:0 "The Peloponnese remains the heart of European silk production, a legacy of the Byzantine era that the Frankish Princes have expanded through state-sponsored mulberry groves. By controlling strategic ports, we can undercut the high prices of Persian and Chinese imports, making Achaea the primary supplier for the garment makers of Florence and Lyon. This monopoly provides a steady stream of #italic soft gold#! that funds our mercenaries and the fortification of our mountain passes."
 ach_villehardouins_valor_advance:0 "Villehardouin's Valor"
 ach_villehardouins_valor_advance_desc:0 "Geoffrey of Villehardouin, marshal of Champagne and eyewitness chronicler of the Fourth Crusade, composed one of the earliest vernacular histories in Old French, immortalizing the deeds of his companions and the astonishing capture of Constantinople in vivid, heroic prose that circulated widely among the nobility of Western Europe. His chronicle served not only as a record but as propaganda and inspiration, rallying fresh knights and pilgrims to reinforce the beleaguered Latin states, while fostering a shared sense of chivalric brotherhood among the scattered Frankish lords who continued to view themselves as crusaders holding God's frontier against schismatic and infidel alike long after the original host had dispersed. It is time to recover that spirit for the challenges of our army."
 act_of_revocation:0 "Act of Revocation"
 act_of_revocation_desc:0 "It has long been the custom to gift parts of the Royal Domain to our nobility as a reward for their services, but this system cannot be sustained if we want to ensure the integrity of our domain. From now on, we will insist on renting these lands instead of outright giving them away."
 adaptability:0 "adaptability"
 adaptability_desc:0 "There is what is ours, and what is part of our ancestral domain that will never be surrendered. A bit of flexibility in defining these 'ancestral' borders will lead to more land being accepted as our rightful territory, and should the worst happen, the whole world will know our crusade to recover it will be just."
 adapted_incan_army:0 "Adaptable Incan Army"
 adapted_incan_army_desc:0 "Invaders from strange lands have set foot in our territory, and threaten our very existence. But our armies are adaptive; they adjust to new enemy tactics, learn to wield their very own weapons against them, and fight with an unbreakable resolve inspired by their foes."
 additional_colonists:0 "Additional Colonists"
 additional_colonists_desc:0 "The New World is many things, but the most important thing of all is that it is empty. Well, no one important lives there, at any rate. By letting people know of the boundless opportunities that await them in the New World, we will encourage more people to go forth and settle there."
 additional_diplomats:0 "Additional Diplomats"
 additional_diplomats_desc:0 "The drive to expand our country means we must also expand our diplomatic reach. We must ensure that our diplomatic service is properly staffed."
 additional_loyalist_recruitment:0 "Additional Loyalist Recruitment"
 additional_loyalist_recruitment_desc:0 "Naturally, there are those within our subject nations who recognize our divine right to rule. By recruiting and aiding these enlightened individuals, we can strengthen our grasp on these territories."
 additional_merchants:0 "Additional Merchants"
 additional_merchants_desc:0 "Colonies are no good to us unless we can bring their riches home to the mother country. We must expand our merchant class to ensure that this happens."
 administrative_leadership:0 "Administrative Leadership"
 administrative_leadership_desc:0 "A military leader must not only know about military matters. Logistics, supply administration and allocation, monetary expenses, and similar topics are all also critical concerns for any successful military campaign."
 admiralty_advance:0 "Admiralty"
 admiralty_advance_desc:0 "$admiralty_desc$"
 advaita_vedanta:0 "Advaita Vedānta"
 advaita_vedanta_desc:0 "Rejecting the dualism between consciousness and matter, $advaita_vedanta$ claims that the $atman$, or the innermost self or consciousness, is one and the same as the supreme reality or consciousness of the universe, Brahman. In this sense, the physical material world is just an illusion hiding the ultimate reality of the Brahman."
 advanced_anti_piracy_warfare:0 "Renunciation of Privateering"
 advanced_anti_piracy_warfare_desc:0 "In our age of discovery and humanism, there is no longer a place for the thievery and violence that pirates inflict on the high seas. More and more nations are banding together to face this common threat to the well-being and prosperity of all, and have sworn to put an end to this scourge."
 advanced_bureaucracy:0 "Advanced Bureaucracy"
 advanced_bureaucracy_desc:0 "Allows us to increase our tax revenues by adopting a more bureaucratic administrative system governed by state officials."
 advanced_mining:0 "Advanced Mining"
 advanced_mining_desc:0 "The development of more advanced and durable tools has made possible to further expand mining operations for new minerals and metals."
 advanced_paik_system_advance:0 "Advanced Paiks"
 advanced_paik_system_advance_desc:0 "$a_late_paik_infantry_desc$"
 african_sturdy_grains_advance:0 "Sturdy Grains Agriculture"
 african_sturdy_grains_advance_desc:0 "A stronger focus on agricultural production will help our people thrive. Thankfully, we have the ample space and fertile soil necessary to grow a number of crops."
 age_of_condottieri:0 "The Age of the Condottieri"
 age_of_condottieri_desc:0 "With mercenaries forming the mainstay of so many armies, we would be wise to ensure that we too have soldiers of fortune at our disposal. Let us ensure that passing mercenary captains are warmly welcomed in $MLO$, so they remember us fondly when our need for them arises."
 agent_training:0 "Agent Training"
 agent_training_desc:0 "We have many covert operations planned, but lack sufficient agents to carry them out. Establishing a training method for our spies will help bolster the ranks of operatives available for dangerous missions."
 agreements_sea_nomads:0 "Agreements with the Sea Nomads"
 agreements_sea_nomads_desc:0 "The $sama_culture$ and other sea-wandering peoples have long lived upon the water itself, drifting between islands with unmatched skill. Through knowledge-sharing or agreements of mutual respect and shared opportunity, we shall ensure safe passage and swift repairs."
 agriculture_advance:0 "Agriculture"
 agriculture_advance_desc:0 "The land is generous, and provides us with abundant crops and resources. But in order to advance our society and become a prosperous nation, we must learn how to shape and tame the land, and to extract the best possible treasures from it."
 ahdnames:0 "Ahidnâme"
 ahdnames_desc:0 "Also called capitulations, the $ahdnames$ are contractual agreements with other nations, drawing upon both $muslim_ADJ$ and secular law. $ahdnames$ are most often used for guaranteeing the protection and rights of foreign merchants and clergy within our lands, ensuring that justice is upheld and trade can flow unhampered."
 ahimsa:0 "Ahiṃsā"
 ahimsa_desc:0 "The concept of $ahimsa$, or nonviolence, is a key virtue among all religions following the Dharma. Any conflict is encouraged to be resolved peacefully through dialogue, rather than the use of force. Unfortunately, that is not always possible, but violence should always be the last resort, and its use must be just."
 akinji_cavalry:0 "Akıncılar"
 akinji_cavalry_desc:0 "Our light cavalry regiments often raid and sometimes even settle in neighboring territories. Known for their courage in battle, they lived and operated as raiders on the frontier, often the first line of response against incursions from our rivals and perfectly positioned to attack and rout enemy trade routes."
 akson_thai:0 "Akson Thai"
 akson_thai_desc:0 "Originally based on ancient $khmer_language$ script, $thai_culture$ writing has evolved to be quite distinct from its original form to accommodate the complex phonology of our language. Having a unique written language has certainly contributed to the development of our unique culture."
 akt_ainu_trade:0 "$ainu_culture$ Trade"
 akt_ainu_trade_desc:0 "We are among the first $japanese_group$ to have established permanent trade with the $ainu_culture$. Our ships go back and forth between their lands and ours, greatly benefiting both communities."
 akt_ezo_kanrei:0 "$ezo_area$ Kanrei"
 akt_ezo_kanrei_desc:0 "The position of the $ezo_area$ #italic Kanrei#!, or administrator of $ezo_area$, has been assigned to our clan since the time of the $kamakura$ Shogunate. We are in charge of managing the island as a place of exile for criminals, necessitating constant communication across the strait."
 akt_march_of_akita:0 "March of $akita$"
 akt_march_of_akita_desc:0 "$akita$, our fief in northern Dewa Province, was an ancient zone of conflict against northern 'barbarians'. The border of $JAP$ has expanded far into the North, but the spirit of our ancestors still lives in our blood — let any who dare stand in our way!"
 al_caid:0 "Al-Qā'id"
 al_caid_desc:0 "By appointing a loyal #italic Qā'id#! to oversee provinces and regulate trade on behalf of the state, we empower urban merchants while ensuring provincial governance. Ensuring fair dealings and regulated markets will greatly strengthen our economic base."
 alb_diplomacy_of_the_two_shores:0 "Diplomacy of the Two Shores"
 alb_diplomacy_of_the_two_shores_desc:0 "Our position allows us to act as the essential bridge between the Italian city-states and the rugged Balkan interior. Our diplomats are trained to navigate both the Venetian Senate and tribal councils, making our mediation indispensable for trade and war."
 alb_eastern_and_western_heritage:0 "Eastern and Western Heritage"
 alb_eastern_and_western_heritage_desc:0 "Our urban centers continue to operate under both the sophisticated principles of Byzantine Law and the modern bureaucracies of the West. This legal continuity provides a stable framework for contracts, property rights, and inheritance that attracts foreign merchants and scholars to our courts. A predictable legal system is the foundation of our growing administrative strength."
 alb_enlightened_albanian_absolutism:0 "Enlightened Albanian Absolutism"
 alb_enlightened_albanian_absolutism_desc:0 "Following the European trend, our monarchs have centralized power, stripping the old clans of their feudal privileges in favor of a modern state. This move has allowed us to implement universal taxation and a national judicial system, turning the kingdom into a streamlined machine of war."
 alb_the_albanian_merchant_class:0 "The Albanian Merchant Class"
 alb_the_albanian_merchant_class_desc:0 "The merchants of our coast have become the primary carriers of trade between the Balkans and the West. By utilizing the Greek language for commerce and Albanian for loyalty, they dominate the markets from Venice to Constantinople. These merchant marined are the lifeblood of our modernizing economy."
 alb_the_arbereshe_diaspora:0 "The Arbëreshë Diaspora"
 alb_the_arbereshe_diaspora_desc:0 "Over time, a good number of our people have emigrated abroad and formed #italic Arbëreshë#! communities. These 'Albanians across the sea' maintain our language and traditions while gaining influence in their new homes. They serve as permanent diplomatic envoys there, constantly lobbying for support for the homeland."
 alb_the_catholic_bulwark:0 "The Catholic Bulwark"
 alb_the_catholic_bulwark_desc:0 "Positioned as the easternmost outpost of the Roman Church, we have become the primary shield against both Orthodox schismatics and Turkish heathens. This sacred duty gives us an inner peace that infuses the entire realm, transforming our struggle into a crusade for our soul."
 alb_the_champion_of_christ:0 "The Champion of Christ"
 alb_the_champion_of_christ_desc:0 "Despite our communities being divided by faith, our nation is devoted to Christ, earning us the title of #italic Athleta Christi#!. Our relentless faith has drawn the eyes of the Papacy and the Patriarchs, securing us financial subsidies and military volunteers. We fight not just for our land, but for the very survival of the 'Word of Christ'."
 alb_the_expansion_of_the_regnum:0 "The Expansion of the Regnum"
 alb_the_expansion_of_the_regnum_desc:0 "We will not rest until the borders of the ancient Kingdom are restored to their greatest extent and beyond, reclaiming our place as masters of the Balkans. This centralizing mission allows us to integrate newly conquered territories with minimal friction as we restore 'rightful' rule."
 alb_the_national_arsenal:0 "The National Arsenal"
 alb_the_national_arsenal_desc:0 "As the primary port for Western intervention, we have modernized the shipyards of Durrës to maintain a permanent fleet of galleys. This infrastructure allows us to project power across the Adriatic, ensuring that the sea lanes between Naples and Albania remain open for reinforcements and trade. Our control of the harbor makes us the undisputed masters of the western Balkan coastline."
 alb_the_spirit_of_the_rilindja:0 "The Spirit of the Rilindja"
 alb_the_spirit_of_the_rilindja_desc:0 "Our 'National Rebirth' or #italic Rilindja#! has ignited a fire in the hearts of Albanians everywhere, from the mountains of the north to the diaspora in Italy and Egypt. This cultural and political movement has unified all Albanians under the common banner of 'Albanianism'. We are a nation reborn, ready to take our place among the sovereign states of Europe."
 albanian_the_albanian_alphabet_commission:0 "The Albanian Alphabet Commission"
 albanian_the_albanian_alphabet_commission_desc:0 "Scholars and patriots are working tirelessly to standardize the Albanian language using a unified Latin alphabet. By establishing national schools and printing newspapers in the vernacular, we are breaking the cultural hegemony of foreign tongues. Literacy in Albanian is the first step toward true independence."
 albanian_the_fortified_kulla_houses:0 "The Fortified Kulla Houses"
 albanian_the_fortified_kulla_houses_desc:0 "Throughout the countryside, the nobility and wealthy farmers have constructed #italic Kulla#! — fortified stone tower houses. These structures serve as miniature citadels, protecting families from both blood feuds and enemy raids. They represent a society that is permanently mobilized for defense."
 albanian_the_kanun:0 "The Kanun"
 albanian_the_kanun_desc:0 "In the absence of a central crown, our social order is maintained by the #italic Kanun#!, a sophisticated code of customary law. This legal framework governs everything from property rights to the sacred duty of #italic Besa#! (the sworn oath). The #italic Kanun#! provides a bedrock of stability and honor that foreign administrators can never fully dismantle."
 albanian_the_sacred_oath:0 "The Sacred Oath"
 albanian_the_sacred_oath_desc:0 "The concept of #italic Besa#! has evolved into a national institution of trust and hospitality. An Albanian's word is his bond, and this reputation for unwavering loyalty makes us the most trusted guards and mercenaries in the Mediterranean. In a world of shifting alliances, our word is our most valuable currency."
 albanian_the_stradioti_tradition:0 "The Stradioti Tradition"
 albanian_the_stradioti_tradition_desc:0 "The poverty of our mountains has turned our men into the finest light cavalry in Christendom. These Stratioti are sought after by every major power from Venice to France for their unparalleled skills in skirmishing and reconnaissance. By exporting our martial prowess, we bring wealth back to our hills and ensure our soldiers are the most experienced in Europe."
 albanian_the_transhumance_networks:0 "The Transhumance Networks"
 albanian_the_transhumance_networks_desc:0 "The seasonal movement of livestock — Transhumance — allows our people to utilize the high summer pastures and the warm winter plains of the coast. This mobile lifestyle makes our population difficult to pin down and provides a resilient food supply that cannot be easily burned by a scorched-earth campaign. Our wealth walks on four legs, always ready to move to safer ground."
 alberghi_28_advance:0 "$alberghi_28$"
 alberghi_28_advance_desc:0 "$alberghi_28_desc$"
 alchemy_advance:0 "Alchemy"
 alchemy_advance_desc:0 "The art of alchemy involves the creation of potions and elixirs using a combination of herbs, minerals, and other natural ingredients. While not always reliable, the use of alchemy can sometimes produce remarkable results in treating various ailments."
 alleviate_concerns_advance:0 "Deflating Tensions"
 alleviate_concerns_advance_desc:0 "No country benefits from its neighbors being constantly vigilant of its movements. We must employ active diplomacy to immediately deflate any tensions that may arise, so that our neighbors have no reason to be concerned about us."
 alpha_and_omega:0 "Alpha and Omega"
 alpha_and_omega_desc:0 "Our faith is the beginning and end of all things. The voice of our god shall be the only sound that our enemies hear above the screams of the battle; the words of our faith shall lead them to the truth."
 alpine_defensiveness:0 "Alpine Defense"
 alpine_defensiveness_desc:0 "The $SWI_ADJ$ landscape is dominated by rough terrain, mountains, and valleys. We must find a way to overcome the challenges our environment presents, and to find a way to use it as a weapon against any potential invaders."
 amazigh_slave_raids:0 "Amazigh Slave Raids"
 amazigh_slave_raids_desc:0 "Our coastal raiders provide our nation with a constant influx of captives from $europe$ through maritime raids and coastal incursions. This steady supply of enslaved labor is key to expanding our workforce and increasing our economic success."
 an_early_urbanization:0 "Early Urbanization"
 an_early_urbanization_desc:0 "The Low Countries have traditionally had a high rate of urbanization, which has allowed us to achieve power beyond what most might expect. We should accelerate this trend by creating a robust network of prosperous settlements that can help us create a wealthier future."
 an_iron_fist:0 "An Iron Fist"
 an_iron_fist_desc:0 "Our region is diverse in cultures and religions, and the only thing that keeps it united is not compassion, but a powerful ruler, capable of dealing swiftly and decisively with any attempt at revolt."
 an_order_with_state:0 "An Order with a State"
 an_order_with_state_desc:0 "While some nations are often described as an #italic Army with a State#!, we, on the other hand, have always been an Order with a nation, ever since our acquisition of Rhodes from the Greeks. Nevertheless, we cannot help but admire how efficiently they have harnessed their resources to become a formidable nation. Inspired by their success, we will implement reforms to ensure our military can confront any adversary with confidence."
 anagignoskomena:0 "anagignoskomena"
 anagignoskomena_desc:0 "Our Bible contains all books worthy of veneration and study, even though some may have less importance than others. The $anagignoskomena$ are not present in the $hebrew_language$ Bible, so they receive less attention than other texts, but they are nonetheless worthy of being read and should not be disregarded."
 anatomy_advance:0 "Anatomy"
 anatomy_advance_desc:0 "Physicians are developing a more advanced understanding of the human body, which is leading to more effective treatments for injuries and diseases. This knowledge, largely gleaned from practical dissections of human cadavers, is also helping to improve surgical techniques and reduce the risks of medical procedures."
 angevin_heraldry:0 "Angevin Heraldry"
 angevin_heraldry_desc:0 "The golden lilies and double-headed eagles of our banners speak to ancient rights and royal ambitions. Claims that stretch across $italy_region$, reaching as far as $ALB$ and $jerusalem$, still echo in our hearts. Let the House of Valois-Anjou rise higher than ever before!"
 ant_arianitis_defiance:0 "Arianiti's Defiance"
 ant_arianitis_defiance_desc:0 "Following the heroic example of our leaders, our house is known as the first to rise and the last to surrender against our foes. This legacy of unyielding resistance has forged our people into a nation of warriors who see struggle as a sacred duty rather than a burden."
 ant_born_in_the_highlands:0 "Born in the Highlands"
 ant_born_in_the_highlands_desc:0 "Our ancestral home in the highlands of our nation is a natural citadel of jagged peaks and narrow ravines that is nearly impossible for a conventional army to navigate. We have further fortified every strategic pass and mountain peak, ensuring that any enemy invader must pay a staggering price in blood for every inch of our territory they attempt to occupy."
 ant_patronage_of_the_faith:0 "Patronage of the Faith"
 ant_patronage_of_the_faith_desc:0 "By providing significant land grants and funds to our monasteries, we maintain the spiritual loyalty of the nobility and the peasantry. These sacred sites serve as the cultural heart of our principality, where our victories are celebrated."
 ant_the_eternal_resistance:0 "The Eternal Resistance"
 ant_the_eternal_resistance_desc:0 "We have sworn an eternal oath that so long as we breathe, the heart of the rebellion will continue to beat. Our troops are drilled with a fanatical devotion to our ruling house, ensuring they maintain discipline even in the face of overwhelming imperial numbers."
 ant_the_iron_mines_of_the_interior:0 "The Iron Mines of the Interior"
 ant_the_iron_mines_of_the_interior_desc:0 "The rugged mountains of central Albania under our control are rich in high-quality iron ore essential for the tools of war. We have established state-sponsored smelters to provide our clans with a constant supply of superior steel blades and armor plates, ensuring we are never dependent on foreign imports to equip our growing armies."
 ant_the_professional_highland_grenadiers:0 "The Professional Highland Grenadiers"
 ant_the_professional_highland_grenadiers_desc:0 "We have evolved our traditional skirmishers into elite mountain grenadier units, specialized in heavy assault and siege warfare. These troops combine their ancestral mountain agility with the devastating firepower of modern explosives, making them the terror of any fortress garrison."
 anti_piracy_warfare:0 "Merchant Convoys"
 anti_piracy_warfare_desc:0 "The rise of cutthroat, lawless buccaneers in the New World — and along the maritime routes leading to it — had made a great impact on our merchants and our trade. From now on, our merchant ships will form convoys with an accompanying warship to protect them, and will have on board a small military contingent to further ensure their survival on the high seas."
 apothecary_advance:0 "$apothecary$"
 apothecary_advance_desc:0 "$apothecary_desc$"
 appointed_chain_of_command:0 "Appointed Chain of Command"
 appointed_chain_of_command_desc:0 "Having talented military experts leading our men into battle, rather than entrusting that duty to inept nobles who only were put in leadership roles because of their blue blood, make our armies work more efficiently. The result of that is that we can more easily command larger forces."
 aqueduct_system:0 "Aqueduct System"
 aqueduct_system_desc:0 "Through carefully laid stone channels and gravity-fed conduits, this construct secures a steady supply of fresh water. While simple in construction, these works mark the first step toward organized urban water management."
 ara_a_maritime_realm:0 "A Maritime Realm"
 ara_a_maritime_realm_desc:0 "Our realm is firmly fixated on the vast expanse of the sea, its attention directed towards maritime pursuits. With a strategic outlook, it harnesses naval power and maritime trade to strengthen its position and expand its influence. Our maritime focus shapes our policies, fostering a seafaring culture that propels the nation's prosperity."
 ara_a_mediterranean_trade_power:0 "A Mediterranean Trade Power"
 ara_a_mediterranean_trade_power_desc:0 "The Mediterranean Sea's gentle embrace caresses our shores, beckoning our people to engage trade endeavors from generation to generation. Our bustling commercial centers and strategic trade posts scattered throughout the Mediterranean will play a crucial role in realizing our ambition to become a dominant force in trade."
 ara_almogavars:0 "$a_almogavars$"
 ara_almogavars_desc:0 "$a_almogavars_desc$"
 ara_catalan_crossbowmen:0 "$a_catalan_crossbowmen$"
 ara_catalan_crossbowmen_desc:0 "$a_catalan_crossbowmen_desc$"
 ara_chartered_merchant_companies:0 "Chartered Merchant Companies"
 ara_chartered_merchant_companies_desc:0 "Our traders are wasting resources competing with each other. This is silly; we should focus all our efforts on taking trade from others instead! Let us charter companies who will be given temporary monopolies on trade from certain regions and whose renewal will be dependent on giving the Crown its rightful due."
 ara_constellation_cities:0 "Constellation of Cities"
 ara_constellation_cities_desc:0 "Since its inception, our nation has consisted of diverse realms brought together under a single ruler. However, each realm retains its unique traditions and laws. Consequently, numerous major cities have emerged as regional metropolises, representing and governing their respective regions."
 ara_desperta_ferro:0 "Desperta Ferro!"
 ara_desperta_ferro_desc:0 "#italic Desperta Ferro!#! — Awake Iron! — is the fearsome battle cry of the $a_almogavars$, invoking the presence of iron in combat. It is accompanied by striking lances and darts against flints to create sparks. Among other war cries like #italic Aragó!#! and #italic Sant Jordi!#!, #italic Desperta Ferro!#! stands out as the most renowned and unique."
 ara_fleet_ordinances:0 "Fleet Ordinances"
 ara_fleet_ordinances_desc:0 "In the bustling Mediterranean, fleets gather from around the world, prompting the need for a legal system to address crimes in the crowded land and sea. #italic Ordinacions sobre lo fet de la mar#!, or #italic Ordinances on What Happens in the Sea#!, is one of the earliest military codes of justice, created to govern fleets. This unique response to the post-Black Death era recruits crew members, including criminals, from outside $ARA$, resulting in a harmonized code formed from diverse traditions rather than a mere codification of existing naval customs."
 ara_gunpowder_souls:0 "Gunpowder Souls"
 ara_gunpowder_souls_desc:0 "The #italic Fallas#! celebration has acted as a catalyst within the Crown of $ARA$, spurring advancements in artillery techniques through the practical expertise gained from handling gunpowder for firecrackers and fireworks. This festive tradition has fueled a spirit of innovation, resulting in the development of new strategies and knowledge about artillery."
 ara_late_almogavars:0 "$a_late_almogavars$"
 ara_late_almogavars_desc:0 "$a_late_almogavars_desc$"
 ara_mossos_esquadra:0 "Mossos d'Esquadra"
 ara_mossos_esquadra_desc:0 "The #italic Escuadras de Paisanos#!, known as #italic Esquadres de Catalunya#! or #italic Mossos d'Esquadra#!, are a local militia dedicated to safeguarding trade routes and fairs, making the most of their intimate familiarity with the terrain. Inspired by their success, we aim to establish similar militias in our other territories, composed of local inhabitants. This should foster a harmonious coexistence and ensure peace in these regions."
 ara_protection_of_the_little_folk:0 "Protect the Smallfolk"
 ara_protection_of_the_little_folk_desc:0 "Our soldiers would want their loved ones to be looked after in the event they perish in battle. $ARA$ will do its duty and ensure that this is done through establishing a system of workhouses for orphans of the fallen."
 ara_remenca:0 "Remença"
 ara_remenca_desc:0 "The #italic Remença#! system, particular to $CAT$, has close equivalents in other territories of the Crown, fostering a collective drive towards greater raw goods production. Through this framework, our lands experience a surge in wealth, igniting the potential for substantial progress towards fulfilling our objectives. By harmonizing these systems, we will cultivate an environment where our endeavors are fortified by the abundance of resources, fueling a path of growth and prosperity for our realm."
 ara_stronger_united:0 "Stronger United"
 ara_stronger_united_desc:0 "Since the merger of between us and the County of Barcelona in 1164, $ARA$ has functioned as a Confederation, comprising distinct realms under a central ruler. These differences have fostered prosperity and maintained individual identities, yet have also given rise to an illusion of disunity. This has led to the need for administrative reforms to strengthen our union while honoring the unique characteristics of each territory."
 ara_valencian_golden_age:0 "$VAL_ADJ$ Golden Age"
 ara_valencian_golden_age_desc:0 "The realm we inhabit has ascended to literary heights as yet unattained by many neighboring nations, thanks to the remarkable contributions of esteemed authors such as Joanot Martorell, Ausiàs March, and Isabel de Villena. Their profound literary works have elevated our culture to unparalleled levels, instilling a sense of pride within our people. Undeniably, our nation stands as a radiant beacon of culture, shining brightly for all to behold."
 arabia_cradle_of_islam:0 "Cradle of $muslim$"
 arabia_cradle_of_islam_desc:0 "Our lands are host to some of the most holy sites in our faith. This divine proximity makes our people connect deeply with their beliefs, inspiring them to further and further greatness."
 arabia_felix:0 "Arabia Felix"
 arabia_felix_desc:0 "Ever since antiquity, $YEM$ has been known as 'Arabia Felix', the Fortunate Arabia. Blessed with a temperate highland climate and fertile soil in a sea of desert, it remains one of the most naturally prosperous regions of the peninsula. Let us nurture that prosperity and use it as the foundation of a thriving realm."
 arabia_red_sea_trade:0 "Red Sea Trade"
 arabia_red_sea_trade_desc:0 "There are many trade outposts along our coastline, dealing in precious goods both from our own lands and foreign shores. It is time that we claim our fair share of this wealth."
 arabian_desert_warfare:0 "Strength of the Desert"
 arabian_desert_warfare_desc:0 "The inhospitable deserts of $AIA$ have made our warriors stronger, able to wear down the enemy before moving in for the killing blow."
 arabian_horsemanship:0 "$AIA_ADJ$ Horsemanship"
 arabian_horsemanship_desc:0 "The $horses$ we raise are desired in many foreign lands for their beauty and strength. With our focus set on raising and exporting them, we will benefit greatly from their renown."
 arduous_terrain:0 "Arduous Terrain"
 arduous_terrain_desc:0 "$asia$ is home to some very inhospitable lands, from the high peaks of the Himalaya, to the arid span of the Gobi Desert, to the dense jungles of $india$ and $south_east_asia$. And that does not even include the monsoon and typhoon seasons, and the almost constant present of earthquakes! Its people have learned to live in such an unwelcoming environment, but invaders will not find it so easy."
 arg_argive_maritime_insurance_advance:0 "Argive Maritime Insurance"
 arg_argive_maritime_insurance_advance_desc:0 "Capitalizing on our position as a safe harbor, the merchant houses of Nauplia have developed a sophisticated system of maritime insurance and risk-sharing for Aegean trade. By guaranteeing the safety of Latin cargoes against piracy and storm, we have turned our port into the financial safe haven of the Peloponnese. This early form of financial capitalism draws capital away from the larger Italian republics and concentrates it in our own local banks."
 arg_the_artillery_school_of_argos_advance:0 "The Artillery School of Argos"
 arg_the_artillery_school_of_argos_advance_desc:0 "Recognizing that the future of warfare is determined by the cannon, we have turned our high-altitude forts into laboratories for ballistics and gunnery. Our officers are trained to calculate firing arcs from extreme heights, allowing our batteries to hit enemy ships with pinpoint accuracy. The #italic Argos School of Gunnery#! is respected across Europe for its mathematical precision and tactical innovation."
 arg_the_curia_of_the_two_benches_advance:0 "The Curia of the Two Benches"
 arg_the_curia_of_the_two_benches_advance_desc:0 "In a daring move toward social stability, the Lordship has reformed the high court of Nauplia into the Curia of the Two Benches. This judicial body requires that every civil case involving land or inheritance be heard by a panel consisting of one Frankish judge and one Greek Demogeron (Elder). By institutionalizing this 'Shared Justice', we have effectively ended the centuries-old legal friction between the Latin and Orthodox populations. This governance model has created a unique 'Argive Identity' that is fiercely loyal to the Lordship, protecting the state from the revolutionary fervors sweeping through the rest of Europe."
 arg_the_gibraltar_of_the_levant_advance:0 "The Gibraltar of the Levant"
 arg_the_gibraltar_of_the_levant_advance_desc:0 "The Palamidi fortress, perched high above the Gulf of Argos, has been expanded into a complex system of seven interlocking forts that command the entire Argolid. By controlling this 'Gibraltar', we dictate the movement of any fleet attempting to supply an army in the Morea, effectively making the lordship unconquerable by land or sea. This strategic dominance allows us to play the role of kingmaker between our neighbours."
 arg_the_heraldry_of_the_brienne_advance:0 "The Heraldry of the Brienne"
 arg_the_heraldry_of_the_brienne_advance_desc:0 "As the House of Brienne maintains claims to Jerusalem and Cyprus, Argos has become a center for 'Chivalric Genealogy'. Knights from across the West come here to prove their lineage or seek titles in the 'crusader fringe'. This constant influx of high-born adventurers provides a rotating pool of talented officers for our local levies."
 arg_the_peloponnesian_diplomatic_hub_advance:0 "The Peloponnesian Diplomatic Hub"
 arg_the_peloponnesian_diplomatic_hub_advance_desc:0 "Because Argos is the most neutral and secure port in the Peloponnese, it has become the preferred meeting ground for the ambassadors of the Latin states. We have established a permanent 'Diplomatic Quarter' where treaties are negotiated and alliances are forged between the Frankish lords and the Great Powers. This role as a regional mediator grants us an international influence that protects us from being annexed by our larger neighbors."
 aristocracy:0 "aristocracy"
 aristocracy_desc:0 "Aristocracy is a key part of any monarchy, as the nobles surrounding the royal dynasty are precisely what gives justification to the monarch. In the end, the concept of royal blood cannot exist without the corresponding concept of noble blood. As such, the aristocracy supports the monarch, but they expect to have some privileges in exchange for their loyalty, as they must never be confused with the common rabble."
 arm_apostolic_church:0 "$ARM_ADJ$ Apostolic Church"
 arm_apostolic_church_desc:0 "$ARM$ was the first nation to declare $christian$ as its state religion. As such, our religious traditions, especially those of our clergy, are a major component of our identity."
 arm_border_nation:0 "Border Nation"
 arm_border_nation_desc:0 "Since ancient times, $ARM$ has been the reluctant battleground between larger nations. Even after regaining our sovereignty, remaining neutral is extremely difficult — it is not impossible to appease everyone, but it is not easy, either."
 arm_greater_armenia:0 "Greater $ARM$"
 arm_greater_armenia_desc:0 "In our long and illustrious history, $ARM_ADJ$ kingdoms spread over a large territory, and so did our $armenian_culture$ people. By emulating these bygone realms, we become a beacon of all $armenian_culture$ people, who will happily unite under our leadership."
 arm_highland_fortresses:0 "Highland Fortresses"
 arm_highland_fortresses_desc:0 "Our fortresses are a brilliant emblem of our resilience and fortitude, built to endure not only the difficult local climate, but also any foreign invader foolish enough to mount an attack into our unforgiving territory."
 arm_land_reclamation:0 "Reclaimed Territory"
 arm_land_reclamation_desc:0 "$ARM$ has been ravaged by war for centuries. By reclaiming the lands lost in these struggles, making them suitable for inhabitation, and restoring ruined churches and fortresses, we can improve the lives of our people and take firmer control over our territory."
 arm_legacy_of_hayk:0 "Legacy of Hayk"
 arm_legacy_of_hayk_desc:0 "Hayk, descendant of Noah, founded our kingdom at the base of Mount Ararat after defeating the Babylonians, and thus became the patriarch of our nation. All our people know this story, and all are proud to belong to such an ancient lineage."
 arm_melikdom_organization:0 "Melikdom Organization"
 arm_melikdom_organization_desc:0 "As one of the few bastions of an independent $ARM_ADJ$ state, $ARM$ is governed by feudal suzerains called #italic meliks#!, as the old system of $arm_nakharar_titles$ collapsed after the $MGE_ADJ$ invasions. The relationship between meliks and their subordinates is that of a military commanding officer and junior officer, and not of feudal lord and a serf."
 arm_mount_ararat:0 "Mount Ararat"
 arm_mount_ararat_desc:0 "Mount Ararat, where Noah's Ark came to rest after the Great Flood, is where our nation first formed. As a result, our people resist with a particularly holy fervor when the sanctity of our territory is threatened."
 arm_mountain_armies:0 "Mountain Armies"
 arm_mountain_armies_desc:0 "$ARM$ is a mountainous land. Our people have adapted to this terrain over the centuries, and we have developed many ways to use those mountains to our advantage. Our armies will gather readily when called, confident in the additional protection our unique environment provides."
 arm_nakharar_titles:0 "Nakharar Titles"
 arm_nakharar_titles_desc:0 "The #italic Nakharar#! system of titles was in continuous use in $ARM$ from its inception until the times of the $MGE_ADJ$ invasions, when it collapsed. Although the titles themselves are no longer in use, certain characteristics of that system persist, enhancing the abilities of both our nobles and armies."
 armories_of_smolensk:0 "The Armories of $SMO$"
 armories_of_smolensk_desc:0 "After decades of warfare on every border, we learned to fight with weapons of both east and west. Blending $MOS_ADJ$ grit with western precision, our armories now produce elite artillery and tactics unmatched by our rivals. From our forges comes firepower — and from firepower, domination and perseverance."
 armory_advance:0 "Armory"
 armory_advance_desc:0 "$armory_desc$"
 army_country_casus_belli_advance:0 "Pretexts"
 army_country_casus_belli_advance_desc:0 "Our professional diplomats and spies excel at fabricating credible pretexts to justify almost any action we might take on the international stage."
 army_country_diplo_range_advance:0 "Armed Envoys"
 army_country_diplo_range_advance_desc:0 "Our army is feared far and wide. Despite our reputation, we should still establish diplomatic relations with nations that have the same goal as ourselves: the destruction of our common enemies. By sending well-armed and escorted envoys to foreign courts, we can ensure our diplomatic reach will not suffer under outbreaks of violence."
 army_country_integration_speed_advance:0 "Respect Local Government"
 army_country_integration_speed_advance_desc:0 "Our people are fearsome warlords who wish to spread their legacy to every corner of the world. As a means of integrating and managing our ever-growing domain, we have decided to mostly respect the way conquered locals conduct themselves, and not to interfere excessively."
 army_country_looting_advance:0 "Raider Troops"
 army_country_looting_advance_desc:0 "Raiding and looting is fundamentally how our army sustains itself. Everywhere our troops go, they pillage as much as they can."
 army_country_movement_speed_advance:0 "Scouting Parties"
 army_country_movement_speed_advance_desc:0 "Through the use of mounted scouts, we can check the terrain lying ahead of armies, and plan how to maneuver around any difficulties. This allows us to travel at a faster rate than other armies could in that same location."
 army_doctrine_law_advance:0 "$army_doctrine_law$"
 army_doctrine_law_advance_desc:0 "$army_doctrine_law_desc$"
 army_initiative_ren:0 "First Strike"
 army_initiative_ren_desc:0 "The element of surprise, combined with landing the first strike, often determines the ultimate victor in an armed conflict. Boosting our military initiative is an excellent way to maintain a competitive advantage."
 army_movement_speed_absolutism:0 "Magazines"
 army_movement_speed_absolutism_desc:0 "Field magazines are not new technology, but their use has been greatly popularized by the unparalleled growth of modern armies. The steady supply of ammunition they provide facilitates ease of army movement, and extends their operational range."
 army_movement_speed_revolutions:0 "Supply Contracts"
 army_movement_speed_revolutions_desc:0 "Paying fair prices for the food and supplies our army needs while moving through a region instead of raiding accelerates our movement through the area, as the peasants themselves will bring their goods to the collection points we establish."
 army_professionalism:0 "Army Professionalism"
 army_professionalism_desc:0 "As we learned from the Persian invasion of Greece so long ago, a small army can defeat a larger one — as long as they have iron discipline and the proper training. We must elevate our own army to meet these extraordinary standards."
 art_school_advance:0 "Art Schools"
 art_school_advance_desc:0 "Dedication to the aesthetic crafts, and the refinement of our artists, must be properly cultivated by the establishment of art schools. Each shall be an incubator for gifted individuals to commence their artistic careers and bring glory and splendor to our nation!"
 arte_della_lana:0 "Arte della Lana"
 arte_della_lana_desc:0 "The #italic Arte della Lana#! — the Wool Guild — controls one of the most important industries in $FLO$. Devoted to the production of quality $cloth$ and supported by a strong and skilled workforce, this guild has helped many traders and artisans build their fortunes across the centuries."
 artillery_institution_advance:0 "Siege Artillery"
 artillery_institution_advance_desc:0 "The invention of gunpowder in Sòng $CHI$ has led to the development of a new device that employs its firepower in warfare: the artillery. These weapons pose a serious threat to stone-built castles and other fortifications."
 artillery_vs_fort_age_5_absolutism:0 "Siege Cannons"
 artillery_vs_fort_age_5_absolutism_desc:0 "Gunpowder has made way for the creation of multiple different types of weapons. Cutting through lines of infantry does not require the same power as breaking down castle walls, and so a specialized type of cannon has to be deployed in sieges."
 artillery_vs_fort_age_6_revolutions:0 "Advanced Howitzers"
 artillery_vs_fort_age_6_revolutions_desc:0 "The need for a weapon that fills the niche between the direct fire of siege cannon and the indirect one of the mortars has led our military to develop new howitzers."
 artisan_migration:0 "Relocating Artisans"
 artisan_migration_desc:0 "It is not fitting that territories we have conquered should have better artisans and wiser advisors than in our capital. The greatest hands and minds of the empire must be brought to the capital to serve us directly."
 artists_advance_absolutism:0 "Artistic Currents"
 artists_advance_absolutism_desc:0 "Art has always been created in a number of different ways, but recent advances have allowed it to develop even further into a myriad of manifestations, as artists explore new media and techniques."
 artists_advance_discovery:0 "Artistic Prints"
 artists_advance_discovery_desc:0 "Widespread usage of the printing press has created new opportunities for our people to share their artistic skills, and to distribute this art faster and more widely than ever before."
 artists_advance_reformations:0 "Development of Secular Art"
 artists_advance_reformations_desc:0 "In the wake of the Reformation, new forms of art flourish like blossoms on a vine. It has become easier for artists to gain recognition in their field, and also to find employment in the courts of the world."
 artists_advance_revolutions:0 "Enlightened Art"
 artists_advance_revolutions_desc:0 "With the rise of the Enlightenment, the arts are flourishing in all forms and at all levels of society. New publications of music and literature are in particular leading to a broad developing interest in these arts."
 arts_academy_advance:0 "$arts_academy$"
 arts_academy_advance_desc:0 "Art is the life-breath of humanity, and what turns the world from a bland existence into a vibrant canvas full of wonders and possibilities. We must foster greater artistic curiosity among our people."
 asa_control_of_buddhist_sects:0 "Control of $buddhist_ADJ$ Sects"
 asa_control_of_buddhist_sects_desc:0 "$echizen_province$ is home to many important temples representing different sects, such as the Eiheiji of the Sōtō tradition and the Heisenji of the Tendai tradition, among others. If we could bring all of them under our control and establish religious peace throughout the province, it would be the foundation of an ideal religious policy for our entire nation."
 asa_legacy_of_emperor_keitai:0 "Legacy of Emperor Keitai"
 asa_legacy_of_emperor_keitai_desc:0 "Many centuries ago, emperor Keitai launched his campaign to take the imperial throne from $echizen_province$. Like him, we must not hesitate to project power beyond our borders and to launch invasions into neighboring realms when the situation calls for it."
 ascetic_practices:0 "Ascetic Practices"
 ascetic_practices_desc:0 "Although the Buddha warned us about the dangers of extreme asceticism, some among the monastic community still perform these strict practices. Limiting the type of cloth they can wear, the food they can eat, or where they can live are some of the restrictions adopted by those who wish to walk this path. Although such abstemious behavior is not a requirement for obtaining merit, it has its own benefits for the practitioner."
 ask_bugyoshu_and_hokushu:0 "Bugyōshū and Hōkōshū"
 ask_bugyoshu_and_hokushu_desc:0 "We must strengthen the authority of our administrative officials, such as the Bugyōshū magistrates and the Hōkōshū commanders. A strong bureaucracy can sometimes be the only thing that stands between us and an open civil war."
 ask_defender_of_the_imperial_court:0 "Defenders of the Imperial Court"
 ask_defender_of_the_imperial_court_desc:0 "When the $kamakura$ Shogunate fell, we were the ones who protected the Emperor and the Imperial Court. This has afforded us a position at the forefront of all clans in $JAP$, as the true protector of the Empire and its courtly traditions."
 ask_higashiyama_culture:0 "Higashiyama Culture"
 ask_higashiyama_culture_desc:0 "Built around the ascetics of Zen $buddhism$, Higashiyama culture sees beauty in simplicity. It has promoted development of the formal tea ceremony, #italic ikebana#! flower arrangements, theater, and art. This blossoming of culture has brought great prestige to those who practice the arts, and will reflect well upon our realm."
 ask_shugo_system:0 "Shugo System"
 ask_shugo_system_desc:0 "#italic Shugo#! are important vassals for the Shogunate, administrating the lands in name of the $JAPANESE_SHOGUNATE_LEADER_MALE$. Thanks to them, we can administer our lands better and more efficiently."
 assault_ability_reformation:0 "Reformed Breach Sorties"
 assault_ability_reformation_desc:0 "By delegating the responsibility of assaulting breaches to our finest and most disciplined troops, we will penetrate even the most formidable fortifications that our foes may hide behind."
 assault_ability_revolutions:0 "March Against Fire"
 assault_ability_revolutions_desc:0 "Our armies willingly march into the mayhem of cannon fire and dust, carving a path for our troops to take the enemy's forts. Despite advances in artillery and new fortification techniques, our skill in assaulting enemy walls remains unrivaled."
 assistance_to_the_suffering:0 "Assistance to the Suffering"
 assistance_to_the_suffering_desc:0 "Our Order is named the Knights Hospitaller for a reason: we were originally the protective force of a pilgrims' hospital in $jerusalem$. Though $jerusalem$ is lost to the Saracens, we still provide medical aid to those in need, including our brave knights, who heartily return to the battlefield much faster than most armies."
 association_with_unbelievers:0 "Association With Unbelievers"
 association_with_unbelievers_desc:0 "There are those who feel that we should not associate with unbelievers at all. We have done much to quash this, as only through association with heathen nations will we be able to trade with them."
 astika_schools:0 "Āstika Schools"
 astika_schools_desc:0 "Called the orthodox schools of $hindu$, they accept the authority of the $vedah$ and the existence of $atman$. Although consisting of many different branches, this commonality of acceptance gives the $astika_schools$ a lot of common ground."
 ath_the_athenian_bureaucracy_advance:0 "The Athenian Bureaucracy"
 ath_the_athenian_bureaucracy_advance_desc:0 "As our rulers transitioned toward absolute rule, they replaced the fractious feudal lords with a meritocratic civil service drawn from the urban bourgeoisie. This centralized administration ensures that taxes are collected efficiently and the ruler's law is enforced uniformly from Marathon to Megara. By breaking the power of the old baronial families, our nation has become a streamlined, modern state capable of rapid mobilization."
 ath_the_attican_gunpowder_mills_advance:0 "The Attican Gunpowder Mills"
 ath_the_attican_gunpowder_mills_advance_desc:0 "Our artillery is now the finest in the world, benefiting from the metallurgical secrets of the World's renowned master-smiths and the chemical innovations of our local alchemists. The 'Thunder of Athens' is heard across the Balkans, as our cannons are prized for their range and reliability."
 ath_the_catalan_company_advance:0 "The Catalan Company"
 ath_the_catalan_company_advance_desc:0 "After being hired and then betrayed by the Byzantine emperor, the ferocious Catalan Grand Company turned against their former paymasters and, in 1311, annihilated the Frankish duke Walter V of Brienne at the Battle of the Cephissus, seizing control of the Duchy of Athens and establishing a period of Catalan rule. These battle-hardened Almogàvers introduced a more ruthless mercenary ethos to Greek affairs, fortifying key strongholds, extracting tribute from the countryside, and maintaining their grip through a combination of terror and disciplined infantry tactics until internal strife and Aragonese intervention eventually shifted power back toward a more conventional feudal regime."
 ath_the_parthenon_dukes_advance:0 "The Parthenon Dukes"
 ath_the_parthenon_dukes_advance_desc:0 "Otto de la Roche, first Duke of Athens, established his court amid the ruins of the Acropolis, converting the ancient Parthenon into a Catholic cathedral dedicated to Our Lady while ruling over a duchy that stretched from Attica to Boeotia. Under his successors, the duchy became a surprising center of cultural exchange where Frankish knights patronized Greek scribes, Italian merchants traded in Piraeus, and scholars debated philosophy in sight of marble temples. All this produced a distinctive aristocratic society that prized both the martial virtues of chivalry and an appreciation for the Hellenic past that had so long been ignored by Western conquerors. We must reinstate this court to its past glory."
 ath_the_piraeus_arsenal_advance:0 "The Piraeus Arsenal"
 ath_the_piraeus_arsenal_advance_desc:0 "Modeled after the Venetian Arsenal but utilizing modern assembly-line techniques, our new dockyards at Piraeus can produce a fully equipped war galley in a matter of weeks. This industrialization of naval warfare allows the small Duchy to punch far above its weight class, maintaining a professional navy that dominates the Saronic Gulf. The Piraeus is no longer a ruin, but the most modern naval base in the Eastern Mediterranean."
 ath_thebes_textiles_advance:0 "Thebes' Textiles"
 ath_thebes_textiles_advance_desc:0 "The workshops of Thebes, already renowned in Byzantine times for their silk-weaving, have flourished anew under Frankish rule as the dukes of Athens encourage Italian merchants to invest in looms, dyeworks, and export networks that carry Theban samites and velvets to markets from Bruges to Alexandria; this revival of luxury textile production, combined with the fertile plains of Boeotia that supply raw materials, generate substantial wealth that funds castle-building, knightly retinues, and the lavish lifestyle of the Athenian court, ensuring that the duchy remains one of the richest and most economically sophisticated territories of the entire Frankokratia."
 atlantic_trade_routes:0 "Atlantic Trade Routes"
 atlantic_trade_routes_desc:0 "Successfully navigated by sailors starting from $europe$, these new maritime routes have opened the floodgates to goods and coin from both the New World and the Far East."
 atman:0 "Ātman"
 atman_desc:0 "Referred to the true and eternal unchanging Self, it is the essence of each individual's consciousness. According to the $astika$ schools, this $atman$ is distinct from the mind and body, and it is also different from the Jivātman that persists across multiple lifetimes. In contrast, the $nastika$ schools interpret the concept differently, or reject it entirely."
 attract_foreign_pirates:0 "Attract Foreign Pirates"
 attract_foreign_pirates_desc:0 "Our ports have long been a haven for those who seek fortune on the high seas. By welcoming these skilled seamen regardless of their faith or origins, we may further strengthen our corsair fleets and expand our maritime manpower."
 audit_checks:0 "Audit Checks"
 audit_checks_desc:0 "While we work to infiltrate other nations, we must be vigilant of poisonous ideas spreading around our own courts. Assembling an audit team to ensure our ministers are acting in the state's interest should help root out any rotten elements."
 auftragstaktik:0 "auftragstaktik"
 auftragstaktik_desc:0 "#italic Auftragstaktik#!, or 'Mission Tactics'. is a system by which our subordinate leaders are informed about the objectives of the battle or the war by their commanders, and then are allowed to act on their personal initiative. This system allows our battalions to develop a tighter relationship with their leaders, yielding better results."
 austrian_ambition:0 "Enlightenment Through Education"
 austrian_ambition_desc:0 "Our rulers must receive the best education possible to live up to the ideal of the enlightened monarch."
 austrian_court:0 "$HAB_ADJ$ Court"
 austrian_court_desc:0 "Maintaining our diplomatic relations requires time and effort, and committing too many people to diplomatic missions could negatively affect our efficiency and damage our reputation. The $HAB_ADJ$ Court's streamlined approach ensures we deploy the right envoys at the right times and still gather the information we need without overextending our diplomatic resources."
 austrian_grenzer:0 "$a_austrian_grenzer$"
 austrian_grenzer_desc:0 "$a_pandur_desc$"
 austrian_grenzhussar:0 "$a_austrian_grenzhussar$"
 austrian_grenzhussar_desc:0 "$a_austrian_grenzhussar_desc$"
 austrian_heritage:0 "Legacy of Rudolf I"
 austrian_heritage_desc:0 "The victory of Rudolf I over his rivals secured our place among the great houses of the $hre$ and is the subject of many tales and songs. The fervor displayed by him and his knights in the Battle on the Marchfeld will inspire our troops for centuries to come."
 austrian_marriage_policy:0 "'Tu Felix Austria Nube'"
 austrian_marriage_policy_desc:0 "'Let others wage war; you, happy $HAB$, marry! For what Mars gives to others, Venus gives to you — kingdoms.'"
 austrian_military_flexibility:0 "Landsknecht Tactics"
 austrian_military_flexibility_desc:0 "Only well-rounded tactics of artillery shock, cavalry charges, and unyielding infantry recruited from the $landknechte$ can lead us to victory."
 austrian_state_industrialization:0 "State Industrialization"
 austrian_state_industrialization_desc:0 "Industrial modernization must always be a priority for our administration. Only through modern manufacturing can we compete with our rivals on a global stage."
 austrian_tradition:0 "A House of Glory"
 austrian_tradition_desc:0 "Our rise to power has made us the target of much envy, and the rival houses of the $hre$ vie for our position as the protectors of the south-eastern border. Despite these circumstances, we pride ourselves on executing diplomatic maneuvers unrivaled by any others."
 autonomous_pashas:0 "Autonomous Pashas"
 autonomous_pashas_desc:0 "Balancing local needs versus national interests is one of the most difficult aspects of government. Given the slow pace of communications, it can take a long time for the most basic directives to reach even relatively close provinces. We must encourage local governors towards more autonomy to ensure that local interests are served in a timely manner."
 avalokitesvara:0 "Avalokiteśvara"
 avalokitesvara_desc:0 "Also known as Guānyīn or Kannon, $avalokitesvara$ is one of the most revered Bodhisattvas. Represented as a male or female depending on the school, and even in some considered to be the origin of all $hindu_ADJ$ deities, $avalokitesvara$ is the $bodhisattva$ of compassion, and is associated with the mantra #italic Oṃ maṇi padme hūm̐#!."
 ayans:0 "Âyan"
 ayans_desc:0 "$ayans$ are provincial magnates of diverse backgrounds that wield significant local autonomy, but still provide a ready source of tax farming income and military forces for the state."
 ayu_ayutthaya_literature:0 "$AYU_ADJ$ Literature"
 ayu_ayutthaya_literature_desc:0 "Our country has a rich and complex literary tradition, from the epic #italic Lilit#! poems narrating famous military conflicts, to the #italic Nirat#! poetry of travels and lost lovers; from folk legend of local heroes to panegyrics praising the feats of our most glorious rulers."
 ayu_cosmopolitan_trade:0 "Cosmopolitan Trade"
 ayu_cosmopolitan_trade_desc:0 "Our country is home to many people from afar, who came here hoping to profit from the richness of our land. Having so many people and goods flowing through our borders is something we derive numerous benefits from."
 ayu_floating_rice:0 "Floating Rice"
 ayu_floating_rice_desc:0 "Rice has been grown in our country for centuries, but the constant flooding of our rivers has always been an issue for its proper cultivation. This new variety of rice, used to growing in flooded conditions, will provide us with a stable source of food even when the rivers overflow."
 ayu_phrai_luang:0 "Phrai Luang"
 ayu_phrai_luang_desc:0 "All freemen subject to #italic phrai#! service not only serve in war — the #italic $ayu_phrai_thaan$#! — but also assist in the construction of public works, at the discretion of local governors."
 ayu_phrai_thaan:0 "Phrai Thaan"
 ayu_phrai_thaan_desc:0 "All males at the age of eighteen are to be registered with the military, and their information passed on to the government bureaucracy. Every male citizen is eligible to be conscripted and made to serve in the army in war, and we will make sure that they do so if needed."
 ayu_prestigious_cavalry:0 "Prestigious Cavalry"
 ayu_prestigious_cavalry_desc:0 "Whether on horseback or atop an elephant, we can boast of an impressive cavalry, usually made up of descendants from the most prestigious families. Their contributions through supporting our infantry are invaluable."
 ayu_sakdina:0 "Sakdina"
 ayu_sakdina_desc:0 "Our society is strictly organized along the $ayu_sakdina$ system. Each person knows their proper place in society and how much wealth and property they are entitled to have. This organization makes it much more efficient to extract taxes from them."
 ayu_white_elephant:0 "White Elephant"
 ayu_white_elephant_desc:0 "The white elephant symbolizes sacred kingship in $buddhist$ tradition, and is also the emblem of our ruler. Possessing a white elephant legitimizes our authority, proving to our subjects that we rule with the blessing of the divine."
 azeb_irregulars:0 "Azeb Irregulars"
 azeb_irregulars_desc:0 "Unmarried youths drafted from the poorest segments of society, the Azebs will not only function as soldiers and sailors, but also builders, sappers and armorers. Through a system of fortress garrisons, we will ensure that they always get paid."
 aztec_chargers:0 "$AZT_ADJ$ Chargers"
 aztec_chargers_desc:0 "The aggressive nature of our warriors is known — and feared — beyond our borders. When battle starts, our enemies shiver in fear at the sight of our combatants charging at them with frenzy, as if they were about to be run down by the heralds of Death itself."
 baghlah_advance:0 "$n_baghlah$"
 baghlah_advance_desc:0 "$n_baghlah_desc$"
 bah_amir_rebellion:0 "Amir Rebellion"
 bah_amir_rebellion_desc:0 "Our state was born from the rebellion of Amir Hasan Gangu against the pathetic rule of $DLH$. The victory against the $DLH_ADJ$ Sultanate still lives on in the minds of our own nobility and military to this day."
 bah_arabian_horses:0 "Arabian Horses"
 bah_arabian_horses_desc:0 "The climate of $india$ is suboptimal at best for breeding and raising horses. The horses of $arabia_region$, however, are superb mounts that outclass our local breeds. We will use our trade connections to ensure that we have a steady supply of these horses for our troops."
 bah_bahmani_primogeniture:0 "Bahmani Primogeniture"
 bah_bahmani_primogeniture_desc:0 "Our unusual practice of always passing the throne to the eldest son of the current ruler has at times created some instability in our realm, as power-hungry regents and opportunistic nobles initially showed little hesitation in trying to take advantage of a child ruler or in supporting an envious relative's claim to the throne. By now, however, the practice has become firmly institutionalized, and when the time for succession comes there are very few who would oppose the true heir of our dynasty."
 bah_gharbians:0 "Gharbians"
 bah_gharbians_desc:0 "Cutting ties with $DLH$ to found our own kingdom has loosened our connection with the $muslim_ADJ$-dominated northern parts of $india$. As our state lacks any form of entrenched $muslim_ADJ$ aristocracy, we are in a precarious situation, and we could end up entirely at the mercy of local $hindu_ADJ$ nobles.\\nFortunately, our reputation precedes us. Tales of the riches of the $deccan_region$ are told and retold all over the $muslim_ADJ$ world, and many ambitious fortune-seekers make the sea voyage to our ports. By using the vast riches of $india$ to attract talented westerners, or #italic Gharbians#!, to our court, we can ensure that our country shall never lack able minds to lead our armies, collect our taxes, and rule our subjects."
 bah_karimis:0 "Kārimī"
 bah_karimis_desc:0 "For centuries, the Indo-Egyptian trade has been dominated by $egypt_region$-based groups of traders and captains known as the $bah_karimis$. Instrumental in the day-to-day business of $indian_ocean_region$ trade, this merchant organization is now both wealthy and powerful. From the $tamil$ coasts and the ports of the $swahili_culture$ trading cities to the $lower_egyptian_culture$ port cities past the $gulf_aden_province$, sultans, nobles, and commoners alike come to buy exotic goods or borrow money for their projects from the $bah_karimis$.\\nThis organization has lately taken a very active interest in our state, and we only stand to gain from cultivating our relationship with them further."
 bah_legacy_of_gisu_daraz:0 "Legacy of Gisu Daraz"
 bah_legacy_of_gisu_daraz_desc:0 "$india$ in general, and our state in particular, has a history as a center of Sufi teachings. The efforts of our rulers to attract and patronize Sufi sheiks from all over the world are a testament to the piety and the great spiritual strength of our monarchs and our court.\\nThe state adopting the Sufi concepts of spiritual sovereignty and the inclusive nature of the Sufi teachings themselves will help create an environment where the diverse religious faiths of $bah_gharbians$ and the natives of $deccan_region$ alike can mix and thrive without clashes or unproductive quarrels."
 bah_madrasa_of_mahmud_gawan:0 "Great Madrasa of the $deccan_region$"
 bah_madrasa_of_mahmud_gawan_desc:0 "For many years now, our state has drained able men from the greater $muslim_ADJ$ world, while also incorporating the best of the states that came before us. This has created a rich cosmopolitan culture that is not entirely $farsi_culture$, $arabian_group$, $marathi_culture$, $telugu$, nor $kannadiga$ in nature. Creating a major madrasa in our capital would serve to further the development of learning this multitude of cultures and also allow the world to see the greatness of our state."
 bah_meltpot_of_languages:0 "Linguistic Melting Pot"
 bah_meltpot_of_languages_desc:0 "$deccan_region$ is a region of many languages and cultures; the great influx of people of $iranian_group$, $turkic_group$, $afghan_culture$, and $arabian_group$ descent into these lands has accentuated the cosmopolitan nature of our state. While historically the $persian_language$ language fulfilled the needs of our predecessors, a new mix of local languages — as well as $persian_language$ and $arabic_language$ — has grown increasingly common. This mixture of languages has even become a source of cultural inspiration for emerging artists."
 bah_nobility_hindu_expansion:0 "Hindu Elite Integration"
 bah_nobility_hindu_expansion_desc:0 "Although at times a challenge to the sovereignty of the ruler, the noble class is nonetheless useful to our government, as they are crucial in administrating our vast properties. With winning our independence from $DLH$, we gained rulership over almost exclusively $hindu_ADJ$ subjects, while our $muslim_ADJ$ nobles are a small minority, unable to manage the masses. We must expand and stabilize our aristocracy by promoting promising $hindu_ADJ$ candidates into their ranks."
 bah_takht_e_firoza:0 "Takht-e-Fīrozā"
 bah_takht_e_firoza_desc:0 "The first thing any guest in our royal audience chamber notices is the Turquoise Throne of our dynasty. This unique piece of royal furniture was originally donated to us by the defeated $telugu$ Raja Kapaya, and it is in many ways the ultimate symbol of our dynasty. Exquisite and splendidly unique, it embodies the riches of the $deccan_region$ and the unusual combination of styles that is the hallmark of our cosmopolitan state."
 baihua:0 "Báihuàwén"
 baihua_desc:0 "Our domain stretches well beyond the horizon. The emergence of a common written language among our subjects will surely bridge the gaps between us, elevate our culture, and reduce conflict based on misunderstanding and linguistic differences."
 balkan_hajduks:0 "Hajduks"
 balkan_hajduks_desc:0 "As the central authority of medieval kingdoms fractures under the weight of imperial expansion, the social vacuum is filled by the Hajduks. Originally simple cattle drovers (#italic hajtó#!) and seasonal laborers, these men have transitioned into a semi-mythical class of guerrilla fighters and highwaymen. They operate in small, disciplined bands (#italic cheta#!) led by a #italic Harambaša#!, governed by strict internal codes of conduct that emphasize loyalty and the protection of the local peasantry (the #italic raja#!). In our eyes, they are nothing more than brigands; to the commoners, they are the only shield against the depredations of foreign tax collectors and unruly invaders. By codifying their presence within our military structure, we empower a force that thrives on the very lawlessness of the frontier."
 ball_game:0 "Tlachtli"
 ball_game_desc:0 "The heart of social life in our society is the ball game, where players strive to keep the ball inside the playing court by striking it with their hips. It is both a ritual alternative to warfare and a large part of religious life."
 baltic_shipyard:0 "Baltic Shipyard"
 baltic_shipyard_desc:0 "We shall build a grand shipyard on the eastern coast of the Baltic Sea, and dominate overseas trade!"
 bank_of_saint_george:0 "Bank of Saint George"
 bank_of_saint_george_desc:0 "The Bank of Saint George is a financial institution founded to consolidate all the debts of $GEN$, with the aim of becoming the credit arm of the country and financing its enterprises overseas."
 banking_advance:0 "Banking"
 banking_advance_desc:0 "Moneylending is old as time, but it is not without risks. We can minimize said dangers if we institutionalize those practices and see that money is loaned under controlled and fair stipulations."
 banking_country_traditions:0 "Banking Traditions"
 banking_country_traditions_desc:0 "While many seek wealth in the opportunities of trade and commerce, our state fills its coffers by offering entirely fair and highly affordable loans."
 bantu_and_perso_arabian:0 "$bantu_language_family$ and Perso-Arabian"
 bantu_and_perso_arabian_desc:0 "Ever since our descent from $arabia_region$ and $persia_region$, we have established communities across the $swahili_coast_region$ that integrate the local $bantu_language_family$ in an effort to maintain social order and make way for the rise of new architectural and cultural advances."
 baptism_books:0 "Baptism Records"
 baptism_books_desc:0 "We must confirm baptism as an important cornerstone of our faith by keeping meticulous records of who in our population has or has not yet been baptized."
 barid:0 "Barīd"
 barid_desc:0 "A postal service that extends even to the farthest corners of our Empire, this institution is responsible for all communication between our capital and centers of local authority across the land."
 barracks_advance:0 "Barracks"
 barracks_advance_desc:0 "$barracks_desc$"
 bashi_bazouks:0 "Bashi-bazouks"
 bashi_bazouks_desc:0 "Unruly irregulars recruited from disenfranchised segments of the population, and sometimes outright vagabonds, the #italic bashi-bazouks#! provide an affordable way of garrisoning forts and outposts. With their proclivity for brigandage and wanton killing, they can always be relied upon to disturb the enemy's frontier."
 basic_financial_instruments:0 "Basic Financial Instruments"
 basic_financial_instruments_desc:0 "Overseas trade is very risky, but also highly profitable. The development of financial instruments like letters of credit will help reduce that risk and increase our profits."
 bastion_advance:0 "Bastion"
 bastion_advance_desc:0 "$bastion_desc$"
 battle_leadership_law_advance:0 "$battle_leadership_law$"
 battle_leadership_law_advance_desc:0 "$battle_leadership_law_desc$"
 battlefield_commisions:0 "Battlefield Commissions"
 battlefield_commisions_desc:0 "Allows us to focus heavily on military advancements and thereby increase our Army Tradition."
 bavarian_brewing_expertise:0 "Skilled Brewers"
 bavarian_brewing_expertise_desc:0 "Our lands are rich in the crops and fresh water required to brew beer, and our people readily enjoy this abundance. Many small breweries could grow into successful businesses, with the right support."
 bavarian_coinage:0 "$BAV$ Coin"
 bavarian_coinage_desc:0 "Our realm needs a new standardized coin to serve as our national unified currency. Establishing a state-owned mint in our capital would ensure our total control over this new coinage."
 bavarian_culture_buildings:0 "$BAV_ADJ$ Cultural Institutions"
 bavarian_culture_buildings_desc:0 "With our homeland at the feet of the beautiful Alps, we are a destination for artists from all over $europe$, who seek inspiration in our incredible landscape. If we were to construct and support the appropriate cultural institutions, we could refine our court into a center of refinement and elegance, one that could rival even the most prestigious powers of $europe$."
 bavarian_flexible_diplomats:0 "Practical Diplomacy"
 bavarian_flexible_diplomats_desc:0 "No matter if we are answering to an Imperial overlord or cozying up to a potential foreign ally, our diplomats must be prepared for everything. But only if they keep $BAV_ADJ$ interests first and foremost in their efforts will we be able to claim true success in our diplomatic maneuverings."
 bavarian_hofkriegsrat:0 "$BAV_ADJ$ Hofkriegsrat"
 bavarian_hofkriegsrat_desc:0 "Establishing a council with the sole duty of advising our ruler during times of conflict will help us develop a more capable fighting force."
 bavarian_imperial_knights:0 "$BAV_ADJ$ Imperial Knights"
 bavarian_imperial_knights_desc:0 "Our nobles have distinguished themselves as formidable knights in the service of the $hre$. We should nurture and scrupulously maintain these troops to ensure the survival of our ducal integrity."
 bavarian_jager:0 "$a_bavarian_jager$"
 bavarian_jager_desc:0 "$a_bavarian_jager_desc$"
 bavarian_legitimacy:0 "$BAV_ADJ$ Dukedom"
 bavarian_legitimacy_desc:0 "We have been granted the rulership of $BAV$ directly by the Emperor! By embellishing ourselves as the divinely-appointed protectors of $BAV$, we will ensure our legitimacy cannot be questioned."
 bavarian_purity_law:0 "$BAV_ADJ$ Purity Law"
 bavarian_purity_law_desc:0 "The excellent quality of our beer has been celebrated for centuries, but for our brews to achieve legendary status, we must ensure their continued prestige and superiority for all time. Several rulers in the past have created regulations and standards for the brewing of this wonderful substance; and we could use this fact as a stamp of our breweries' quality."
 bavarian_stem_duchy:0 "Dreams of Unification"
 bavarian_stem_duchy_desc:0 "We once were ruled by $BAV$, unified in culture and allied under a single banner. We must ensure that the new $BAV_ADJ$ state is equally mighty, a home worthy of its strong and proud people."
 bavarian_zelousness:0 "One Faith for $BAV$"
 bavarian_zelousness_desc:0 "We must ensure our people remain united in their faith, and that they will not be divided by heretical thoughts."
 bayonet_leaders:0 "Bayonet Leaders"
 bayonet_leaders_desc:0 "Men who are well-led will follow, so we must ensure that our officers lead from the front."
 beacon_of_maghrebi_trade:0 "Beacon of Maghrebi Trade"
 beacon_of_maghrebi_trade_desc:0 "$TLE$ lies at the crossroads of Saharan caravans, Mediterranean commerce, and Andalusian eminence. As trade flourishes through its markets and ports, we must strive to continue expanding our merchant networks, asserting our influence over regional commerce."
 beat_to_windward_advance:0 "Beat to Windward!"
 beat_to_windward_advance_desc:0 "Lateen-rigged caravels are highly maneuverable, allowing them to easily tack against the wind. This makes sailing through unfavorable weather and hostile seas much quicker."
 beer_workshop_advance:0 "$beer_workshop$"
 beer_workshop_advance_desc:0 "$beer_workshop_desc$"
 beguins_and_beghards:0 "Lay Religious Orders"
 beguins_and_beghards_desc:0 "Many of the faithful have devoted themselves to a life of prayer and good works, which usually comes with taking the veil or becoming a monk. However, they have not taken formal vows, and act without official $PAP_ADJ$ approval. Nevertheless, we should support these popular efforts to do good deeds and help our people."
 benefits_for_mercenaries:0 "Benefits for Mercenaries"
 benefits_for_mercenaries_desc:0 "Mercenaries will always look out for themselves first, so we need to ensure that any we hire remain with us. By properly looking after our mercenary companies, they will stay loyal for longer and require less direct monetary compensation."
 benevolence:0 "benevolence"
 benevolence_desc:0 "Our nation is a bastion of tolerance and enlightenment. By ensuring that all other nations know this, we can foster better relations abroad."
 benign_diplomats:0 "Benign Diplomats"
 benign_diplomats_desc:0 "The art of diplomacy is an intricate one. Being good with words is not enough, as one's overall presence and demeanor are crucial to how the words themselves are interpreted. By having our diplomats focus on making a good impression, we will be seen more favorably by other countries."
 beyond_the_borders:0 "Beyond the Borders"
 beyond_the_borders_desc:0 "$christian$ undoubtedly originated inside the cradle of the Roman Empire, and many of its branches have been content to stay in that region. $miaphysite$, however, was on the edges of the Empire after being denounced by the Chalcedonians, and has spread far beyond its birthplace, bringing the light of God to the most remote places."
 beyond_the_sun:0 "Beyond the Sun"
 beyond_the_sun_desc:0 "The age of the Great Hordes is not over yet. We have learned from the mistakes of our enemies and will now rise wiser, and stronger. All the land where the sun lives and dies must be ours."
 bhakti_movement:0 "Bhakti Movement"
 bhakti_movement_desc:0 "Having emerged in the 6th century, this movement promotes love and devotion to one's personal god or towards an enlightened individual. It appeals to the lay population by speaking to them directly on their own terms. A highly influential movement, it is changing how religion and belief themselves are understood by our people."
 bill_of_rights:0 "Bill of Rights"
 bill_of_rights_desc:0 "By granting the citizens certain fundamental rights, we will reduce the likelihood of a peasant uprising."
 birch_bark_manuscript:0 "Birchbark Manuscripts"
 birch_bark_manuscript_desc:0 "Writing and reading are fundamental pillars of our society. Religious texts, as well the details of our history, need to be written down so that future generations can learn of our cultural achievements. We have an abundant supply of birch trees in this nation, and their papery white bark will become our parchment."
 birthplace_of_renaissance:0 "Birthplace of the $renaissance$"
 birthplace_of_renaissance_desc:0 "Our dedication to fine arts, cultivating artistic talent, and innovative thought have led us to be regarded as one of the foremost leaders of cultural, philosophical, and scientific advancements worldwide!"
 bison_hunters:0 "Bison Hunters"
 bison_hunters_desc:0 "Bison are a crucial resource for our people. We use every part of the animal as a tribute to its sacrifice. We feed our people with its flesh, we use its bones for tools; we use its fur to protect ourselves against the cold and its hides for our clothes. Even the animal's soul has symbolic meaning for us. Such is the importance of the bison to our culture that we would feel lost without them."
 black_guard:0 "$a_black_guard$"
 black_guard_desc:0 "$a_black_guard_desc$"
 blast_furnace:0 "Blast Furnace"
 blast_furnace_desc:0 "A more expensive method than traditional metallurgy, the use of blast furnaces allows us to further refine pig iron into cast iron by re-melting it with different quantities of iron, steel, limestone, and charcoal. Cast iron made into wrought iron this way creates an excellent material for making complex products such as cannon."
 blend_of_influences:0 "Blend of Influences"
 blend_of_influences_desc:0 "$muslim$ has expanded to many new places since its origins in $arabia_region$, and with this spread, it came into contact with many different peoples and ways of life. Many exchanges of influence happened during this process, to the point that many characteristics not originally part of $muslim$ have become intrinsically associated with the faith."
 blockade_tactics:0 "Blockade Tactics"
 blockade_tactics_desc:0 "Employing effective formations and patrols near enemy ports will make it easier for us to cut off their supply lines, shortening sieges."
 bng_artillery_corps:0 "Artillery Corps"
 bng_artillery_corps_desc:0 "Cannons are an impactful asset to military campaigns. We must ensure an efficient artillery corps that specializes in dealing damage to the enemy's rows before they even start to clash with our soldiers on the field."
 bng_bengali_architecture:0 "$bengali$ Architecture"
 bng_bengali_architecture_desc:0 "A mixture of ancient urban architecture, $muslim_ADJ$ engineering influences, and traditional $bengali$ roof-building techniques, the unique $bengali$ architectural style is used for religious and cultural buildings of all kinds. Due to our expertise in this style, constructing such buildings is significantly easier and more affordable for us than other nations."
 bng_bengali_industrialization:0 "Industrialized Muslin Production"
 bng_bengali_industrialization_desc:0 "$BNG$ is uniquely situated in $india$ to start a revolution unlike any seen before. Muslin — the special cotton fabric $bengali$ spinners are famous for — is a prime trade good for industrialization. We stand poised to exploit new developments in our already world-class textile industry. Let us begin an industrial revolution!"
 bng_bengali_paik:0 "$BNG_ADJ$ Paik"
 bng_bengali_paik_desc:0 "The #italic paiks#! are the backbone of our military. While other states have the Paik System active and use paiks as their general levies, our state maintains smaller, but very well-organized paiks, and provides them with sufficient military support."
 bng_bengali_poetry:0 "$bengali$ Poetry"
 bng_bengali_poetry_desc:0 "The written word is one of the most influential and enduring forms of art. $bengali$ poetry shall tell the tales of epic conquerors, relatable dramas, and engaging philosophical questions, all of which shall further the spread and reputation of $bengali$ culture."
 bng_bengali_trade_fleet:0 "$BNG_ADJ$ Trade Fleet"
 bng_bengali_trade_fleet_desc:0 "The $bengali$ trade fleet brings exotic goods from foreign lands, as well as precious $goods_gold$ and $silver$, to the markets of the Ganges Delta. Our merchants are well renowned in far-flung parts of the world, thanks to our impressive trade fleet."
 bng_bengali_traders:0 "$BNG_ADJ$ Traders"
 bng_bengali_traders_desc:0 "The $indian_ocean_region$ connects our local markets with those of $south_east_asia$ and $china$. We shall therefore greatly emphasize maximizing our presence in these markets via sea routes, and through this increase our trade profits."
 bng_bengali_vassal_system:0 "$BNG_ADJ$ Vassal System"
 bng_bengali_vassal_system_desc:0 "During the reign of $DLH$, the $bengali$ people served their overlord as productive vassals. The $DLH_ADJ$ system shall serve as the foundation for our own vassal systems for the years of $bengali$ sovereignty to come."
 bng_habshi_generals:0 "Habshi Generals"
 bng_habshi_generals_desc:0 "Abyssinian slave-soldiers play a significant role in our military as elite infantry. Those who excel as leaders shall be given greater levels of command, while those who demonstrate exceptional loyalty shall make up the palace guard."
 bng_religious_pluralism:0 "Religious Pluralism"
 bng_religious_pluralism_desc:0 "$india$ is home to many religions: $hindu$ for the majority, $muslim$ as the preferred faith of the ruling classes, and a few remarkable minor religions such as $buddhist$ and $jain$ amongst the working minorities. Promoting one religion over another will cause inevitable chaos and unrest. Thus, we should aim for religious pluralism, and neither favor nor discriminate against any religion in our state."
 bng_rupees:0 "Minting of Rupees"
 bng_rupees_desc:0 "The lack of a widely adopted standardized currency is stunting our commercial development. As one of the foremost economic powers on the subcontinent, we are in a good position to begin minting a new silver coinage with standard weights, which we shall call the #italic rupee#!."
 bng_shipbuilding_industry:0 "Shipbuilding Industry"
 bng_shipbuilding_industry_desc:0 "Maritime trade is vital to our state. Our trade and our warships are some of the most important aspects of our economy, and therefore we focus heavily on supporting the shipbuilding industry."
 bng_war_elephants:0 "War Elephants"
 bng_war_elephants_desc:0 "Although slow, the maneuverability of elephants in the riverine terrain of our country is crucial to quickly resupplying our military. Additionally, war elephants will aid our troops on the battlefield with their imposing stature and terrifying strength."
 boarding_parties:0 "Boarding Parties"
 boarding_parties_desc:0 "By teaching our naval officers to lead boarding actions against enemy ships, we can gain an edge in naval combat even when fighting superior enemy [navies|e]."
 bod_guardians_of_thermopylae_advance:0 "Guardians of the Thermopylae"
 bod_guardians_of_thermopylae_advance_desc:0 "Our fief sits upon the most famous pass in history, and we have taken the lessons of Leonidas to heart by fortifying the mountain tracks with Frankish stone. Every narrow path is a deathtrap for the invader, and every cliffside is a vantage point for our archers and scouts. To pass through Bodonitsa is to run a gauntlet of steel, ensuring that the heart of Greece remains shielded from northern threats."
 bod_the_alpine_skirmishers_advance:0 "The Alpine Skirmishers"
 bod_the_alpine_skirmishers_advance_desc:0 "Living among the crags of Mount Kallidromos, our people have developed a form of light infantry combat that emphasizes vertical mobility and the use of the crossbow. These 'Mountaineers of the Pass' can disappear into the rocks after a volley, making them impossible for traditional heavy infantry to engage. They serve as the eyes and ears of the southern states, providing early warning of any movement from the north."
 bod_the_curia_of_the_three_keys_advance:0 "The Curia of the Three Keys"
 bod_the_curia_of_the_three_keys_advance_desc:0 "To manage the wealth generated by the resurgence of the northern trade routes, the Marquisate has established the #italic Curia of the Three Keys#!. The state treasury and the legal archives are locked in the citadel of Bodonitsa, requiring three separate keys held by the Marquis, the Latin Bishop, and a representative of the local Greek burgesses. This primitive but effective system of 'Checks and Balances' prevents the embezzlement that often plagues small feudal states, ensuring that the heavy tolls collected at Thermopylae are actually spent on the fortress walls."
 bod_the_maritime_consulates_advance:0 "The Maritime Consulates"
 bod_the_maritime_consulates_advance_desc:0 "Reflecting our Venetian heritage, we have established consulates in the major ports of Euboea and Attica to represent the interests of Bodonitsan merchants. These offices act as intelligence hubs, funneling information about naval movements directly to the Marquis. We may be a mountain state, but our eyes are always fixed on the horizon of the sea."
 bod_the_oeta_riflemen_advance:0 "The Oeta Riflemen"
 bod_the_oeta_riflemen_advance_desc:0 "In the age of gunpowder, the rugged woodsmen of the Oeta mountains have been organized into specialized light-infantry corps. These riflemen excel in hit-and-run tactics, using the steep terrain to harass invading columns with lethal precision. They are the nightmare of any general attempting to force the northern passes of Greece."
 bod_the_spercheios_civil_chancellery_advance:0 "The Spercheios Civil Chancellery"
 bod_the_spercheios_civil_chancellery_advance_desc:0 "The Marquisate of Bodonitsa had evolved from a mere frontier watchtower into the administrative nerve center of Central Greece, necessitating a transition from feudal whim to a professionalized civil service. The establishment of the Great Chancellery overlooking the Spercheios valley signals a move toward a centralized, modern state where the old Frankish baronial privileges are replaced by a cadre of legally trained 'Civil Knights' who manage the complex tolls and land registries of the Phocian heartland."
 bodaiji:0 "bodaiji"
 bodaiji_desc:0 "Since antiquity, our people have venerated our ancestors. The most influential of our rulers erect entire temples, where they will be entombed and then worshiped after death, and where their deeds and words will be remembered for all time."
 bodhisattva:0 "bodhisattva"
 bodhisattva_desc:0 "Regardless of the school of $buddhist$ one adheres to, a $bodhisattva$ is an important figure, although their exact characteristics and importance vary between the different traditions. In all cases, however, they are deserving of reverence and admiration."
 bohemian_crystal:0 "$BOH_ADJ$ Crystal"
 bohemian_crystal_desc:0 "There are very few workshops in the known world with the capacity to craft glass and crystal with the same quality and clarity as ours, let alone rival our superior production techniques."
 bohemian_imperial_standing:0 "$BOH_ADJ$ $HRE_ADJ$ Standing"
 bohemian_imperial_standing_desc:0 "Our place within the $hre$ is one of prestige, grandeur, and authority. Few members wield as much soft power as us, due to our capable diplomats and alliance networks."
 bohemian_thaler:0 "$BOH_ADJ$ Thaler"
 bohemian_thaler_desc:0 "For years, the standard currency in our country has been the #italic groschen#!, a coin made of silver and used all throughout the $hre$. The discovery of new sources of silver allows us to create another kind of bigger coin, the #italic thaler#!, also called 'toler' or 'daler', which will become strong and influential enough to dominate all trade and become a new standard."
 bole_smelting:0 "Bole Smelting"
 bole_smelting_desc:0 "A method where lead is smelted in the open air using the constant strong winds at the top of hills to blow fresh air into the melting ore."
 bonded_by_loyalty:0 "Bonded by Loyalty"
 bonded_by_loyalty_desc:0 "Our valiant armies never waver! They demonstrate exceptional morale and loyalty, standing firm whether defending our realm or supporting allies. With indomitable spirits, they will press forward even in desperate circumstances, refusing defeat until physically unable to continue."
 bookkeeping:0 "bookkeeping"
 bookkeeping_desc:0 "Sometimes money is short, and we need to borrow. Lenders always worry that they will not be paid back. By maintaining meticulous records, we will be able to ensure that everyone gets reimbursed, which will allow us to negotiate lower rates of interest."
 border_raiders:0 "Skilled Raiders"
 border_raiders_desc:0 "Our raiders are famous for their ability to carry out lightning-fast attacks against unaware enemies. Their speed and ability to evade enemy retaliation should be studied and employed by our regular troops as well."
 borjigin_blood:0 "$borjigin_dynasty$ Blood"
 borjigin_blood_desc:0 "We share the blood of the $borjigin_dynasty$, of $genghis_khan_name_no_tooltip$ himself. All countries bow in recognition of our heritage, and all territories of the steppes shall recognize us as their own."
 bos_bosnian_ljekaruse:0 "Bosnian Ljekaruše"
 bos_bosnian_ljekaruse_desc:0 "In the secluded valleys of our nation, monks of our monasteries have compiled the #italic Ljekaruše#! — extensive medicinal codices written in the native #italic Bosančica#! script. By synthesizing ancient Greco-Byzantine theory with the high-altitude herbalism of the Dinaric Alps, these manuals provide a sophisticated system of community healthcare in an era where professional physicians are a rarity. This mastery of folk-medicine and surgery ensures our population remains resilient against the plagues that devastate the lowlands, fostering a cultural identity defined by intellectual self-reliance and the preservation of Slavic scientific knowledge."
 bos_cultural_customs:0 "Stećci of $bosnia_area$"
 bos_cultural_customs_desc:0 "Our people practice unique customs that transcend religious differences. The construction of #italic stećci#!, elaborately decorated tombstones, is a tradition shared by all of us, regardless of faith. These distinctive monuments mark our lands as uniquely Bosnian."
 bos_defiant_terrain:0 "Defiant Terrain"
 bos_defiant_terrain_desc:0 "$bosnia_area$ is a land of forested hills and mountains, cut through by river valleys. This terrain lends itself naturally to delaying and tiring invading armies, and we should use this to our advantage. Engaging our enemy only when it benefits us and letting the hostile terrain itself claim both their supplies and troops will preserve our strength."
 bos_influence_of_the_stanak:0 "Stanak Meetings"
 bos_influence_of_the_stanak_desc:0 "Our nobility regularly gathers together to discuss the most pressing issues for our country. These meetings ensure our noble lords are aligned in their policies and show unity during our parliament sessions."
 bos_katun_communities:0 "Vlach Katuns"
 bos_katun_communities_desc:0 "Parts of our population are organized into self-governing, pastoralist communities. Instead of bending them to a central government's will, we should cooperate with them, and in doing so try to extract more resources from our more remote areas."
 bos_kingly_ambitions:0 "Kingly Ambitions"
 bos_kingly_ambitions_desc:0 "The achievements and hard work of our people deserve recognition and protection. We will establish a prestigious title for ourselves and thereby secure that recognition from neighboring rulers, formalizing our status through diplomatic bonds."
 bos_land_of_many_churches:0 "Many Churches of $BOS$"
 bos_land_of_many_churches_desc:0 "$BOS$ is home to several faiths. Not only is our land shared between the $orthodox_ADJ$ and $catholic_ADJ$ Churches, but it is also home to the $south_slavic_group$ $christian_ADJ$ faithful, the #italic Krstjani#!. Isolated from central supervision, we will have to foster a local understanding and harmony between these different groups to maintain our stability."
 bos_the_filigree_guilds:0 "The Filigree Guilds"
 bos_the_filigree_guilds_desc:0 "Drawing on the inexhaustible silver veins of the central mountains, our urban craftsmen have perfected the art of Filigran — intricate silver wire-work that has become the hallmark of Bosnian luxury. These guilds operate as a powerful economic estate, exporting ceremonial daggers and fine jewelry to the markets of Venice and Vienna. By turning our raw mineral wealth into high-value artistic exports, we have created a prosperous urban middle class that is fiercely loyal to the Crown. This industrial refinement elevates the prestige of our nation in every foreign court, proving that the 'Iron Heart' of the Balkans possesses a sophisticated cultural edge that rivals the great capitals of the West."
 bos_the_srebrenica_mint_office:0 "The Srebrenica Mint Office"
 bos_the_srebrenica_mint_office_desc:0 "As the mines of $srebrenica$ become the premier source of bullion in the Balkans, the realm has moved beyond the mere export of raw ore. We have established a Royal Mint and an Assay Office to regulate the purity of Bosnian silver, producing a coin which rivals those of Venice in reliability. By mandating that all silver extracted by Ragusan or Saxon miners be processed through state-controlled refineries, we capture a massive share of the value-added profit. This liquid wealth allows us to make Bosnia the most financially solvent power in the Dinaric Alps."
 bosnian_bosancica:0 "Bosančica"
 bosnian_bosancica_desc:0 "The Bosnian people have unified around #italic Bosančica#!, a unique, cursive Cyrillic script used for everything from diplomatic treaties to private merchant ledgers. This national script serves as a powerful cultural gatekeeper; it is difficult for foreigners to read but universal among the Bosnian literate class, regardless of their specific confession. By maintaining this distinct script, the people ensure that their legal and historical records remain a 'closed book' to imperial administrators, preserving the secret nuances of Bosnian property law and lineage in a format that reinforces their unique Slavic heritage."
 bosnian_people_from_the_hills:0 "People from the Hills"
 bosnian_people_from_the_hills_desc:0 "The geography of the Bosnian heartland is a vertical maze of limestone ridges and valleys that defy conventional mapping. Our people have adapted to this logic, mastering the secrets of the subterranean cavern networks and the logistics of the mule-train."
 bosnian_susjedsvto_of_bosnia:0 "Susjedstvo of Bosnia"
 bosnian_susjedsvto_of_bosnia_desc:0 "The ancient cultural concept of #italic Susjedstvo#! — the sacred social obligation to protect and honor one's neighbor — has evolved into a sophisticated civic philosophy that transcends religious divides. In the face of external pressures, this unwritten code mandates that a neighbor's safety and property are as sacred as one's own. This practice prevents the 'Divide and Rule' tactics often used by foreign powers to incite internal strife. By prioritizing local solidarity and the 'Law of the Neighborhood', we maintain a level of social harmony and internal stability that allows the nation to present a single, unbreakable front against any attempt to dismantle our shared homeland."
 bound_by_service:0 "Bound by Service"
 bound_by_service_desc:0 "We are one people, and we have one army. By bringing troops from across all of our territories together, and pressing conquered peoples into military service, we can better integrate them into our society, and also increase their acceptance of our rule."
 boyar_regime:0 "The Establishment of the Chancellery"
 boyar_regime_desc:0 "The formalization of the Princely Chancellery allows for the systematic recording of land grants and diplomatic treaties in Church Slavonic and, eventually, Romanian. This bureaucratic evolution will enable the Voivodes to more efficiently tax the rural peasantry and maintain a permanent corps of diplomatic envoys at the courts of Europe. It will mark the transition from a tribal military society to a sophisticated medieval state."
 brave_as_hummingbird:0 "Brave as a Hummingbird"
 brave_as_hummingbird_desc:0 "The hummingbird holds a crucial role in our mythology. Linked to the god of war, Huītzilōpōchtli, it embodies fallen warriors' reincarnation and is honored for its bravery. The hummingbird will be made a new symbol for our banners, one that will inspire our soldiers to fight unto their deaths!"
 brb_brabantine_rights:0 "$BRB_ADJ$ Rights"
 brb_brabantine_rights_desc:0 "As other nations have, it is time to codify the liberties of our subjects, in order to identify and safeguard their rights and motivate them to continue working towards a better future for our country."
 brb_land_culture:0 "A Land of Culture"
 brb_land_culture_desc:0 "With the foundation of the University of $leuven$, $BRB$ has placed itself firmly at the center of culture in $common_string_prefix_article$ $NED$. Students from all over $europe$ come to our lands to study and share their knowledge."
 brb_the_four_quartiers:0 "The Four Quartiers"
 brb_the_four_quartiers_desc:0 "The Four Quartiers are the four provinces into which the core of $BRB$ is divided. Each quartier is formed by a satellite of large and smaller towns, some walled and others not. They all work in perfect synergy like a well-greased engine, filling our coffers with great riches."
 breton_tradition:0 "$breton$ Peninsula"
 breton_tradition_desc:0 "Ever since our ancestors came from $great_britain_region$, our extensive coastal holdings have been bustling with activity. Our people live by the sea and for the sea, and our ports are always full of trade and fishing boats."
 brewery_manufactory_advance:0 "Brewery Manufactory"
 brewery_manufactory_advance_desc:0 "$brewery_manufactory_desc$"
 brewery_mill_advance:0 "$brewery_mill$"
 brewery_mill_advance_desc:0 "$brewery_mill_desc$"
 british_bill_of_rights:0 "$ENG_ADJ$ Bill of Rights"
 british_bill_of_rights_desc:0 "A sweeping series of reforms limiting royal power, particularly in judicial matters. Among other stipulations, they state that the monarch may not unilaterally raise armies, prescribe cruel and unusual punishment, or interfere with the free election of members of Parliament."
 bronze_working:0 "Bronze Working"
 bronze_working_desc:0 "Bronze is an alloy of $copper$ and $tin$, discovered and developed to make much more durable tools and weapons, as it also more ductile and easier to work with than $copper$."
 buddhist_canon:0 "$buddhist_ADJ$ Canon"
 buddhist_canon_desc:0 "Called different names and even containing different texts, depending on the branch of $buddhist$, the $buddhist_canon$ is a collection of sacred $buddhist_ADJ$ texts. Containing everything from monastic rules to #italic Sūtra#!, or teachings of the Buddha, any person dedicated to $buddhist$ should be familiar with them."
 buddhist_councils:0 "$buddhist_ADJ$ Councils"
 buddhist_councils_desc:0 "Throughout $buddhist_ADJ$ history, monastic councils have discussed canonical texts across different schools. Although the specific form, outcomes, and records of the councils may vary from school to school, the unifying power of such councils — bringing diverse traditions into dialogue — should not be underestimated."
 buddhist_meditation:0 "$buddhist_ADJ$ Meditation"
 buddhist_meditation_desc:0 "Meditation is a common practice among all $buddhist_ADJ$ followers, regardless of their school. The aim is to train the mind and the spirit to develop mindfulness, tranquility, and insight, and thus ultimately achieve enlightenment."
 buddhist_syncretism:0 "$buddhist_ADJ$ Syncretism"
 buddhist_syncretism_desc:0 "$buddhist$ has its origins in $india$, but it has since spread far and wide, coming in contact with many different beliefs. As such, it contains much syncretism not only with the previous $hindu_ADJ$ traditions, but with the many other deities it has been exposed to."
 buddhist_universities:0 "$buddhist_ADJ$ Universities"
 buddhist_universities_desc:0 "Since antiquity, $buddhist_ADJ$ centers have also been hubs of learning and knowledge, attracting people from all over to study in our institutions. Nālandā was the biggest of these centers in the past, but many others have followed in its footsteps since."
 buffer_states:0 "Buffer States"
 buffer_states_desc:0 "There is nothing worse than arguing with one's neighbor. If we want to avoid border tensions, having other states act as a buffer between us and our potential enemies will allow us some breathing room."
 bul_the_bastion_of_tseverets:0 "The Bastion of Tseverets"
 bul_the_bastion_of_tseverets_desc:0 "The capital of Tarnovo, perched upon the cliffs of Tsarevets and Trapezitsa, is arguably the most formidable fortress in the Balkans, symbolizing the power of the Asen dynasty. By continuously expanding the complex of palaces, patriarchal cathedrals, and triple-layered walls, we have created an administrative center that is immune to sudden coups or sieges. This architectural dominance projects an image of imperial stability that cowers the local Boyars and convinces the populace that the 'Third Rome' has truly moved to the banks of the Yantra."
 bul_the_boyar_council:0 "The Boyar Council"
 bul_the_boyar_council_desc:0 "To prevent the internal strife that plagued the 14th century, we will evolve into a 'Consultative Autocracy' where the most powerful Boyars are integrated into a permanent State Council. This body will serve as a high court and a military planning board, ensuring that the interests of the landed nobility are aligned with those of the crown. This political stability will allow us to maintain a large standing army and avoid the devastating civil wars that have historically left the empire vulnerable to its neighbors."
 bul_the_bulgarian_census_bureau:0 "The Bulgarian Census Bureau"
 bul_the_bulgarian_census_bureau_desc:0 "Knowledge is power. We have instituted a decennial census that records every person, unit of livestock, and hearth in the empire. This precise data allows for the most efficient taxation and conscription system in the Balkans. By knowing exactly what the nation can provide, we can plan long-term campaigns with a level of logistical certainty that ensures our armies are always well-fed and our coffers never empty."
 bul_the_bulgarian_gunpowder_foundries:0 "The Bulgarian Gunpowder Foundries"
 bul_the_bulgarian_gunpowder_foundries_desc:0 "Drawing on the iron mines of the Balkan mountains and the expertise of Saxon miners, we will establish the first major domestic gunpowder industry in the region. These foundries will produce heavy siege cannons and early handguns, allowing the Bulgarian army to transition away from purely feudal cavalry toward a more modern, infantry-heavy force. By controlling the production of saltpeter and iron, we will ensure that our walls remain the most dangerous obstacle for any would-be conqueror in the Balkans."
 bul_the_chancery_of_the_asens:0 "The Chancery of the Asens"
 bul_the_chancery_of_the_asens_desc:0 "At its peak, the chancellery in Tarnovo was the most sophisticated diplomatic hub in the Orthodox world, producing intricate Slavic charters that influenced the courts of Serbia and Russia. By professionalizing the class of #italic Logothetes#! and scribes, the Tsars will ensure that every land grant and international treaty is meticulously recorded and legally binding. This administrative rigor will allow the state to extract taxes more efficiently and manage its complex network of vassalage with a degree of central control that is rare in the late medieval period."
 bul_the_grand_academy_of_the_yantra:0 "The Grand Academy of the Yantra"
 bul_the_grand_academy_of_the_yantra_desc:0 "The intellectual legacy of the 14th-century Tarnovo Literary School is revived in the 17th century through the creation of a modern state university. This institution focuses on civil law, engineering, and the translation of Western scientific texts into the Bulgarian vernacular, creating a class of bureaucrats who are as capable as any in Paris or Vienna. This modernization of the elite will ensure that we can manage a complex, multi-ethnic empire while maintaining the cultural purity of its Bulgarian core."
 bul_the_hesychast_state_philosophy:0 "The Hesychast State Philosophy"
 bul_the_hesychast_state_philosophy_desc:0 "The spiritual teachings of Grēgórios Sinaítēs have moved from the hermit's cell to the halls of power. By adopting Hesychasm — a philosophy of inner stillness and divine light — as the unofficial state ideology, we foster a populace that is deeply pious and resilient. This shared spiritual identity acts as a powerful deterrent against the influences from our enemies, making the Bulgarian subjects immune to foreign conversion or subversion."
 bul_the_imperial_restoration_doctrine:0 "The Imperial Restoration Doctrine"
 bul_the_imperial_restoration_doctrine_desc:0 "We have fully embraced our role as the natural leader of the Balkan peoples, articulating a formal doctrine for the reunification of all former Bulgarian lands. This fate is backed by a modern, professionalized army and a sophisticated diplomatic corps that seek to play the Great Powers against one another. The belief in a 'Greater Bulgaria' becomes the central pillar of the state, driving a policy of aggressive expansion and cultural assimilation that seeks to restore the empire of Simeon the Great."
 bul_the_silk_and_rose_guilds:0 "The Silk and Rose Guilds"
 bul_the_silk_and_rose_guilds_desc:0 "Utilizing the fertile Thracian plains and the unique climate of the Rose Valley, we have established state-protected guilds for the production of luxury oils and silk. These high-value, low-weight goods are perfect for overland export to the courts of Europe and Asia. The wealth generated by these guilds allows the state to build a massive gold reserve, making our economy one of the most stable and credit-worthy in the entire Mediterranean basin."
 bul_the_standing_drilled_infantry:0 "The Standing Drilled Infantry"
 bul_the_standing_drilled_infantry_desc:0 "Moving away from seasonal levies, we have established the first permanent 'Regiments of the Lion'. These infantrymen are trained year-round in the use of firearms, following a rigorous drill based on the successes of neighbor models but adapted for Balkan terrain. This professional infantry core give us a reliable tool for offensive warfare, capable of out-marching and out-shooting the traditional armies of our neighbors."
 bulgarian_orthodox_patriarchate:0 "$BUL_ADJ$ $orthodox_ADJ$ Patriarchate"
 bulgarian_orthodox_patriarchate_desc:0 "The restoration of the Bulgarian Patriarchate in 1235, confirmed by the Council of Lampsacus, established Tarnovo as a sovereign spiritual rival to both Constantinople and Rome. By the 14th century, the Patriarchate functioned as the ideological spine of the Asen and Shishman dynasties, utilizing its autocephalous status to provide divine legitimacy that transcended the political fragmentation of the Bulgarian lands. From its seat on Tsarevets Hill, the Church managed an expansive administrative network of eparchies and monasteries, such as the Zograf Monastery on Mount Athos, which served as repositories for the Bulgarian recension of Church Slavonic."
 bulgarian_the_bulgarian_cloth_industry:0 "The Bulgarian Cloth Industry"
 bulgarian_the_bulgarian_cloth_industry_desc:0 "The Bulgarian towns will be transformed into the industrial heartland of the peninsula through the specialized production of #italic Aba#! (a durable, thick woolen cloth) and #italic Gaitan#! (decorative braid). By organizing the local weavers and shepherds into powerful, self-governing guilds, the Bulgarian merchants will be able to secure massive state contracts for the outfitting of the regional armies and the growing urban middle classes of the Mediterranean. This economic surge creates a merchant aristocracy that will signal the transition of the Bulgarian people from a rural peasantry to a sophisticated, proto-industrial society with the financial power to dictate terms to their neighbors."
 bulgarian_the_bulgarian_national_awakening:0 "The Bulgarian National Awakening"
 bulgarian_the_bulgarian_national_awakening_desc:0 "Driven by the writings of monks like Paisius of Hilendar, the Bulgarian people have rediscovered their imperial history and linguistic pride, sparking a massive educational and political rebirth. This movement has moved beyond local grievances to demand a centralized, modern state that can take its place among the great powers of Europe. The result is a highly motivated and literate populace, ready to serve in a modern bureaucracy or a national army, fueled by the conviction that the glory of the Tsars is not a memory, but a future."
 bulgarian_the_danubian_river_merchants:0 "The Danubian River Merchants"
 bulgarian_the_danubian_river_merchants_desc:0 "Leveraging their position as the gatekeepers of the Lower Danube, Bulgarian merchant families have established a sophisticated trade network connecting the Black Sea to Central Europe. By utilizing shallow-draft barges and fortified river ports, they have managed to bypass the expensive and dangerous overland routes, controlling the flow of salt, grain, and timber across the Balkans. This riverine expertise has turned the Danube into a Bulgarian artery of wealth, funding the rise of a new urban elite that we can tax so they keep their privileges."
 bur_between_two_realms:0 "Between Two Realms"
 bur_between_two_realms_desc:0 "We can consider ourselves to be both members of the traditional lands of the $hre$, and of the realm of $FRA$. While this can complicate feudal relations, the situation has molded us into adept diplomats, able to skillfully play both sides to our own advantage."
 bur_rich_soil_of_burgundy:0 "Foster Agriculture"
 bur_rich_soil_of_burgundy_desc:0 "The lands of $BUR$ are well-suited to growing plants and herding animals. Grapes are particularly apt for local growing conditions. With skilled cultivation, it should be easy to foster an agricultural industry."
 bureaucracy_law_advance:0 "$bureaucracy_law$"
 bureaucracy_law_advance_desc:0 "$bureaucracy_law_desc$"
 burghers_rights_laws_advance:0 "$burghers_rights_laws$"
 burghers_rights_laws_advance_desc:0 "$burghers_rights_laws_desc$"
 by_the_grace_of_god:0 "By the Grace of God"
 by_the_grace_of_god_desc:0 "The world was created with flames, and in flames shall we all end. Our god has gifted the fire of life to us humble mortals, burning our souls in the process and making us see the truth of its danger. Thou shall not be afraid."
 byz_akritai_advance:0 "Akritai"
 byz_akritai_advance_desc:0 "Primarily focused on border defense, these light troops are also given lands to farm as well as protect. Akritai are most adept at defensive warfare, especially against cavalry, and are often the first response against external threats."
 byz_ancient_greek_studies:0 "Ancient $greek_culture$ Studies"
 byz_ancient_greek_studies_desc:0 "The rediscovery and revival of ancient $greek_culture$ arts has provided us with a wonderful opportunity to better educate the masses and to preserve our lofty scientific and cultural ideals. We shall make a diligent study of the wisdom of our ancestors."
 byz_autokratoria_rhomaion:0 "Autokratoría Rhōmaíōn"
 byz_autokratoria_rhomaion_desc:0 "Our great nation is the undisputed heir to the splendor and prestige of Rome, and reclaiming that long-lost territory is our primary motivation."
 byz_bureaucracy_advance:0 "$BYZ_ADJ$ Bureaucracy"
 byz_bureaucracy_advance_desc:0 "Our administration heaves under the weight of our complex web of bureaucracies, a legacy of centuries of imperial rule."
 byz_byzantine_inquisition:0 "$BYZ_ADJ$ Inquisition"
 byz_byzantine_inquisition_desc:0 "$europe$ is engulfed in religious turmoil. We must be prepared to rip up noxious weeds of heresy that appear in the garden of our Empire, lest it become overgrown with heathens. Our pious defense against heretic incursion will prevent us from sinking into instability."
 byz_cataphracts_advance:0 "Late Cataphracts"
 byz_cataphracts_advance_desc:0 "Although warfare has evolved significantly since the first incarnation of our empire, including the introduction of gunpowder, the battle tactics refined by our forebears centuries ago are often still effective. Our cataphracts shall embody the best of both our ancient and modern combat wisdom."
 byz_court_of_languages:0 "Court of Languages"
 byz_court_of_languages_desc:0 "The court of $constantinople$ attracts diplomats and dignitaries from every corner of the known world. As a result, we ensure all languages receive equal respect and accommodation — a practical necessity for an empire at the crossroads of civilizations."
 byz_crossroads_of_continents:0 "Intercontinental Crossroads"
 byz_crossroads_of_continents_desc:0 "$BYZ$ is located between $europe$ and $asia$, making it in many ways the connection between East and West. Our advantageous position is highly lucrative, and has also allowed us to significantly expand our maritime influence."
 byz_heart_of_orthodoxy_advance:0 "Heart of $orthodox$"
 byz_heart_of_orthodoxy_advance_desc:0 "$constantinople$ is the beating heart of vibrant faith. We take great pride in being the home of $orthodox$, holders of the Ecumenical Patriarchate, and defenders of Christendom against our heathen enemies."
 byz_historiography_advance:0 "$BYZ_ADJ$ Historiography"
 byz_historiography_advance_desc:0 "Our people stand on the shoulders of giants; it is our responsibility to leave comprehensive records of our empire's glory to inspire and instruct future generations. By thoroughly documenting the lives of our extraordinary ancestors, tracing our prestigious lineages, and detailing our intricate traditions, we will surpass mere historical records and become truly legendary."
 byz_modernized_strategikon:0 "Modernized Stratēgikon"
 byz_modernized_strategikon_desc:0 "The #italic Strategikon#! — the ancient manual of cavalry tactics, logistics, and battlefield doctrine — has served us well in times of war. However, as war changes, so must we. Our tactics and regiments have adapted to modern combat, employing weapons of such destruction that Maurice himself could never have anticipated their devastation."
 byz_poikilia:0 "Poikilia"
 byz_poikilia_desc:0 "Byzantine culture has taken $europe$ by storm, particularly #italic poikilia#! — our unique aesthetic. Emphasizing visual variety and a dizzying array of vibrant hues, poikilia creates a symphony of colors and elements in our art and architecture alike."
 byz_reaffirm_synod_powers:0 "Reformed Synod Proceedings"
 byz_reaffirm_synod_powers_desc:0 "Bureaucracy is a nightmarish endeavor for a country our size. To better refine the religious proceedings required every time we call the $orthodox_synod$, we will cut down on the red tape, and revisit the associated legislation."
 byz_shield_of_the_west:0 "Shield of the West"
 byz_shield_of_the_west_desc:0 "We stand between $europe$ and a sea of heathens, a shield against foreign threats. Our sword will forever be raised against those who seek to eradicate our faith, ready to strike against any who disrespect our traditions."
 byz_the_new_helepolis:0 "The City-Taker"
 byz_the_new_helepolis_desc:0 "We are already familiar with deploying and refining powerful siege engines. However, by adapting our designs to use gunpowder, we will be able to completely dominate our foes with our cannons."
 byz_the_new_imperial_army:0 "The New Imperial Army"
 byz_the_new_imperial_army_desc:0 "Our army has lagged behind others in $europe$ for far too long. By enacting sweeping military reform and expanding our conscription efforts, we hope to build a modern army befitting the resurgent and resplendent phoenix that symbolizes our empire."
 cabinet:0 "cabinet"
 cabinet_desc:0 "By establishing an executive council, we are able to assemble our most skilled diplomats."
 cabinet_laws_advance:0 "$cabinet_laws$"
 cabinet_laws_advance_desc:0 "$cabinet_laws_desc$"
 caliphate:0 "Ḵilāfa"
 caliphate_desc:0 "The #italic Ḵilāfa#!, or Caliphate, is the union of all $muslim_ADJ$ faithful under a single ruler in the form of the $rank_empire_muslim_ruler_male$, who is to be the political and spiritual successor of Muḥammad, peace be upon him. Although there are different ideas about who is eligible to be $rank_empire_muslim_ruler_male$, the idea of all $muslim$ united under a single banner has always been the primary focus of this process."
 call_of_our_forefathers:0 "The Call of our Forefathers"
 call_of_our_forefathers_desc:0 "Long ago, our illustrious forefathers sailed forth and established colonies in the North. Our sagas even tell us that they reached a new world and established Vinland. We must follow in their footsteps."
 calpixcayotl:0 "Calpixcāyōtl"
 calpixcayotl_desc:0 "Our tributary regions will receive appointed tribute collectors, called #italic calpixqueh#!, who will be in charge of ensuring the flow of tribute never stops. There will be a #italic calpixqui#! in the region, and another in the capital of our nation, for each tributary state."
 camp_followers:0 "Camp Followers"
 camp_followers_desc:0 "Warriors obviously make up the bulk of our armies, but no army can consist of fighters alone. Without the extra entourage of people transporting food and equipment for the army, it would not be able to feasibly go anywhere. By organizing and structuring these camp followers, we can greatly increase their usefulness and efficiency."
 cannon_foundry_advance:0 "$cannon_foundry$"
 cannon_foundry_advance_desc:0 "$cannon_foundry_desc$"
 cannon_maker_advance:0 "$cannon_maker$"
 cannon_maker_advance_desc:0 "$cannon_maker_desc$"
 cannon_workshop_advance:0 "$cannon_workshop$"
 cannon_workshop_advance_desc:0 "$cannon_workshop_desc$"
 canoe_travels:0 "Canoes"
 canoe_travels_desc:0 "Lightweight canoes are perfectly adapted to the waterways of $north_america$. These vessels can navigate shallow rivers and are light enough to portage — carry overland— when necessary. In this way, we can turn disconnected waterways into full trade routes, making it much easier to direct the flow of commerce and people."
 capetian_house_of_anjou:0 "Capetian House of $ANJ$"
 capetian_house_of_anjou_desc:0 "A potent mix of Capetian dignity and Angevin ambition courses through our blood. Though we no longer wear the crown of Jerusalem, we remain heirs to a legacy of kingship that once stretched from $ANJ$ to $ALB$. With careful diplomacy and planning, we may yet revive the grandeur of our forefathers and claim what was unjustly taken from us."
 captives_in_war:0 "Captives in War"
 captives_in_war_desc:0 "We fight wars mainly to take captives, which replace our own losses. However, not all those captives need to be adopted into our tribe, and some can be used for labor instead."
 caravanserai_advance:0 "$caravanserai$"
 caravanserai_advance_desc:0 "Trade routes appeared in $central_asia$ over the last millennium, creating the network known as the Silk Road. Key to this was the flourishing of $caravanserai$, places where merchants and their caravans could stop and rest along the way."
 caroleans_advance:0 "$a_caroleans$"
 caroleans_advance_desc:0 "$a_caroleans_desc$"
 cas_canal_de_castilla:0 "Canal de Castilla"
 cas_canal_de_castilla_desc:0 "Inspired by other water systems across $europe$, which are used for both commercial purposes and irrigation, the #italic Canal de Castilla#! will bring water from the mountains in the north of the #italic Meseta#! and irrigate the cereal fields of Old Castile. This feat of engineering will increase our yield, create a surplus with which we can trade, and be the way to transport it for export."
 cas_castilian_navy:0 "$CAS_ADJ$ Navy"
 cas_castilian_navy_desc:0 "Situated as we are on a peninsula, surrounded by sea on three out of four sides, and with the valuable $strait_of_gibraltar$ bitterly fought over by different powers, dominating the seas has become a matter of life and death. From our hundreds of kilometers of coastline, our ancestors started taming the waves, evolving our nation into a fearless naval power."
 cas_cronicas_reales:0 "Crónicas Reales"
 cas_cronicas_reales_desc:0 "By compiling the chronicles written by previous rulers, we are able to create a compendium that details every past event in our realm and the origins of all our rulers. This knowledge will help us not only to create better cultural foundations, but will also help present and future rulers to correctly assess present events through comparisons to past ones."
 cas_lanzas_de_castilla:0 "$a_lanzas_de_castilla$"
 cas_lanzas_de_castilla_desc:0 "$a_lanzas_de_castilla_desc$"
 cas_marine_infantry:0 "$CAS_ADJ$ Marine Infantry"
 cas_marine_infantry_desc:0 "With a strong navy comes the need for crew members adept at combat in any situation, including having to fight outside their vessels. In order to overcome this challenge, we will regulate our marine infantry so they become a powerful weapon no matter where they fight."
 cas_masters_of_the_orders:0 "Masters of the Orders"
 cas_masters_of_the_orders_desc:0 "As the Reconquista is no longer our main focus, we can no longer justify the independence of Holy Orders. By having our ruler assume the position of Master in every Order, they will not only gain significant power, but they will also have access to the military knowledge of these crusaders."
 cas_new_world:0 "The New World"
 cas_new_world_desc:0 "Newly-discovered lands can be claimed and settled by enterprising colonists, and will send valuable trade goods back to our realm. We will send a few loyal colonists to the New World, have them stake their claims and find ways to harness the treasures of nature, and thereby form the backbone of our colonial endeavors."
 cas_pasos:0 "$CAS_ADJ$ Pasos"
 cas_pasos_desc:0 "While the #italic Pasos#! of the Holy Week are an old tradition in $CAS$, the sculpted artworks that accompany them have recently reached a stunning new peak. Artists such as Juan de Juni and Gregorio Fernández have started down the path of making $CAS_ADJ$ #italic Pasos#! the most impressive on the Peninsula."
 cas_real_academia_espanola:0 "Real Academia Española"
 cas_real_academia_espanola_desc:0 "As our language evolves and spreads across the world, the need to regulate and preserve it becomes obvious. To preserve the essential character and defining traits of our mother tongue, the #italic Real Academia Española#! will be established to set standards for how to properly speak our language."
 cas_reform_of_millones:0 "Reform of the Millions"
 cas_reform_of_millones_desc:0 "With the approval of the Reform of the #italic Millones#!, we might be able to tax our populace more efficiently. This will be an indirect extraction of revenue, done through a levy on food products."
 cas_repoblaciones:0 "Repoblaciones"
 cas_repoblaciones_desc:0 "The extensive conquests of our ancestors have created a country with more land than people available to inhabit and work it. That has resulted in a dire need to attract migrants from other regions."
 cas_royal_factories:0 "Royal Factories"
 cas_royal_factories_desc:0 "To combat the export of raw materials instead of more valuable manufactured goods, we will develop a system of government-backed factories that will industrialize our nation. More robust domestic manufacturing will lead to a stronger national economy."
 cas_the_reconquista:0 "The Reconquista"
 cas_the_reconquista_desc:0 "In the many years since the Visigothic Kingdom fell to invaders, we have waged war against the Moors. This has given us the sort of iron discipline that not many can boast of. Arise, warriors of $CAS$, and show the world your determination!"
 castle_advance:0 "Castle"
 castle_advance_desc:0 "$castle_desc$"
 catalan_galley:0 "$CAT_ADJ$ Galleys"
 catalan_galley_desc:0 "The $n_catalan_galley$ is a larger version of the ancient Greek galleys that once dominated the Mediterranean Sea."
 cathedral_advance:0 "Cathedral"
 cathedral_advance_desc:0 "A cathedral is one of the largest and most important types of $christian_ADJ$ temple, where the Bishop has a #italic cathedra#!, or seat. While a church can be beautiful and detailed, a cathedral is majestic, of enormous dimensions, and adorned with the finest and most intricate details."
 catholic_cuius_regio_eius_religio:0 "Cuius Regio, Eius Religio"
 catholic_cuius_regio_eius_religio_desc:0 "#italic Whose realm, his religion.#! We will have to accept that other countries follow other faiths, and that this will sometimes be a crucial factor in diplomacy."
 catholic_enlightenment:0 "$catholic_ADJ$ Enlightenment"
 catholic_enlightenment_desc:0 "For our faith to withstand the attacks of the Enlightenment, we must adapt, and present new perspectives in and about the Church."
 catholic_sunday_schools:0 "$sunday_schools_advance$"
 catholic_sunday_schools_desc:0 "$sunday_schools_advance_desc$"
 cawa_advance:0 "Ç̌äwa Regiments"
 cawa_advance_desc:0 "The #italic Ç̌äwa#! serve as $ETH$'s noble feudal warriors, recruited and appointed for the Emperor's army service. They are a professional soldier class, renowned for their ferocity."
 cba_dream_of_masakado:0 "Dream of Masakado"
 cba_dream_of_masakado_desc:0 "$taira_dynasty$ no Masakado, a great warrior and close kinsman of our clan, once tried to become the Emperor of Eastern $japan_region$. Sadly, Masakado could not fulfill his ambition, but his dream of founding a new nation of samurai should be our guiding star."
 cba_irrigation_of_southern_kanto:0 "Irrigation of Southern Kantō"
 cba_irrigation_of_southern_kanto_desc:0 "Large parts of our domain is marshland that cannot support intensive agriculture. Recent developments in irrigation technology, however, make it possible to drain marshes and cultivate new arable lands. Let us undertake a grand project of developing these otherwise useless lands; we stand to profit enormously."
 cba_katori_jingu:0 "$katori_shrine$"
 cba_katori_jingu_desc:0 "$katori_shrine$ is dedicated to Futsunushi no Kami, a patron god of martial arts who is revered by every warrior in $japan_region$. By becoming the shrine's primary patron and encouraging our samurai to train there, we will assert our legitimacy while also strengthening the morale and abilities of our warriors."
 cba_lineage_of_taira:0 "$taira_dynasty$ Lineage"
 cba_lineage_of_taira_desc:0 "The $chiba_dynasty$ clan is an old branch of the $taira_dynasty$, having split from them in the late Heian period. This gives us more power and influence than our political situation would otherwise indicate."
 cel_celtic_diaspora:0 "Celtic Diaspora"
 cel_celtic_diaspora_desc:0 "From crofter to chieftain, many have left our shores through hardship or hope, weaving a far-flung web of kinship that carries our language, customs, and pride to distant lands."
 cel_celtic_nations:0 "Celtic Nations"
 cel_celtic_nations_desc:0 "Our union is founded on the ideal of uniting the diverse peoples of the Celtic world under a shared banner. Through cooperation, we aim to preserve our heritage, promote our values, and ensure that the Celtic nations thrive together in the face of external pressures and changing times."
 cel_defensive:0 "The Hills Speak Celtic"
 cel_defensive_desc:0 "Centuries of living under the shadow of conquest have taught our warriors the art of patience and resilience. We can rush headlong into danger, but we can also endure, defend, and strike only when the moment is right."
 cel_pan_celtic_nationalism:0 "Pan-Celticism"
 cel_pan_celtic_nationalism_desc:0 "Our vision of a united Celtic world is more than an ideal - it is a rallying call to all who share our heritage. Together, we forge bonds that reach beyond borders, making our identity as enduring as the hills and seas we call home."
 cel_the_wests_awake:0 "The West's Awake"
 cel_the_wests_awake_desc:0 "After long centuries of silence, the ancient spirit of the Celtic peoples stirs once more, ready to reclaim its place amongst the great civilizations of the world."
 cel_western_shore:0 "The Western Shore"
 cel_western_shore_desc:0 "For millennia we have fished, traded, and fought along the wild Atlantic coasts. From these harsh waters, we have learned seamanship unmatched by any rival."
 celtic_raiders_advance:0 "Furor Celtica"
 celtic_raiders_advance_desc:0 "For millennia, our ferocious and agile guerilla warfare has harried our foes, besting them with a devastating succession of evasive skirmishing and blood-curdling charges."
 centralize_the_states:0 "Centralize the States"
 centralize_the_states_desc:0 "We will consolidate our power in $PAP_ADJ$ provinces by seizing authority from the local princes."
 centralized_city_governance:0 "Centralized City Governance"
 centralized_city_governance_desc:0 "The refomation of our government, in an attempt to support the sprawl of our newly-attained urban territories, shall be united under firm oversight, creating a more orderly and dependable administration."
 centralized_government:0 "Centralized Government"
 centralized_government_desc:0 "If we centralize the state, then we will find it easier to advance the ideas and agenda of the center over the other regions."
 cep_cephalonian_raids_advance:0 "Cephalonian Raids"
 cep_cephalonian_raids_advance_desc:0 "The rulers of Cephalonia and Zante have developed a long tradition of raiding any enemy vessel foolish enough to sail without adequate protection through the Ionian approaches. These island-based raids amass considerable wealth through plunder and ransom while simultaneously weakening our enemies naval logistics in the western Aegean, thereby allowing the tiny county to punch far above its weight and preserve its independence."
 cep_ionian_sea_wall_advance:0 "Ionian Sea-Wall"
 cep_ionian_sea_wall_advance_desc:0 "As the lords of Cephalonia, Zante, and Ithaca, we sit at the crossroads of the Adriatic and the Mediterranean, acting as the first line of defense for Italy. Our naval strategy focuses on 'Anti-Access' warfare, using heavy fortifications and fast scouting vessels to deny the enemy the ability to harbor in the Ionian Isles. We are the gatekeepers of the West, and no fleet enters the Adriatic without our silent consent."
 cep_the_arsenal_of_argostoli_advance:0 "The Arsenal of Argostoli"
 cep_the_arsenal_of_argostoli_advance_desc:0 "We have transformed the natural deep-water bay of Argostoli into a premier naval refitting station. Unlike the massive Arsenals of Venice, ours specializes in the rapid repair of small-tonnage vessels like brigantines and galiots used for Aegean raiding. This specialized infrastructure keeps our fleet at sea longer than our rivals, ensuring local naval superiority."
 cep_the_chancery_of_the_three_tongues_advance:0 "The Chancery of the Three Tongues"
 cep_the_chancery_of_the_three_tongues_advance_desc:0 "Our administration has evolved to issue all decrees in Latin, Greek, and Italian, reflecting the diverse merchant and noble classes of the Ionian Isles. This linguistic inclusivity attracts high-value migrants from the mainland and the Italian peninsula who seek a stable, multi-cultural legal environment. It effectively reduces the friction of governance in a sea of diverse identities."
 cep_the_currant_trade_advance:0 "The Currant Trade"
 cep_the_currant_trade_advance_desc:0 "The unique climate of the Ionian Islands allows for the mass cultivation of the #italic Zante Currant#!, a luxury dried fruit that has become a staple of European diets. By dominating the production and export of this niche crop, we have created a specialized economic engine that generates vast wealth for a relatively small territory. The 'Currant Lords' of Cephalonia are among the wealthiest nobles in the Latin East."
 cep_the_ionian_merchant_experts_advance:0 "The Ionian Merchant Experts"
 cep_the_ionian_merchant_experts_advance_desc:0 "We have granted extensive privileges to our local merchants, allowing them to form self-governing trade companies that manage the most lucrative exports and imports. This mercantile autonomy has fostered a wealthy urban class that bankrolls the County's modern administrative reforms."
 cha_boarding_tactics:0 "Boarding Tactics"
 cha_boarding_tactics_desc:0 "Due to our challenging native terrain, would-be conquerors must rely on their naval capabilities when attempting to invade us. Decades of piracy in the surrounding seas have taught us valuable boarding tactics, which allow us to use an opponent's own ships against them."
 cha_cham_cultural_influence:0 "$cham_culture$ Cultural Influence"
 cha_cham_cultural_influence_desc:0 "Although some of our neighbors see our culture as inferior, they are just in denial, as many of our cultural aspects make their way into their self-proclaimed 'civilized' courts. $cham_culture$ drumming, songs, dances, poetry... all of these art forms have left a clear and lasting mark on what other nations consider artistic achievement!"
 cha_commercial_state:0 "Commercial State"
 cha_commercial_state_desc:0 "Much of our wealth comes from trade. We should concentrate on expanding and refining our exchange practices, with the ultimate goal of creating a commercial state in the process."
 cha_dharmic_presence:0 "$dharmic_ADJ$ Presence"
 cha_dharmic_presence_desc:0 "The $dharmic_ADJ$ gods bless us with their presence. May their strength guide us through the most difficult of times."
 cha_go_tram_huong:0 "Gỗ Trầm Hương"
 cha_go_tram_huong_desc:0 "The resinous heartwood of our native trees, known as agarwood or #italic Trầm Hương#!, is treasured not only for its enchanting aroma but also for its spiritual and medicinal properties. Across the seas, nobles and monks alike covet it for incense, perfumes, and offerings. By protecting our forests and refining our harvesting methods, we can turn this rare natural gift into one of our most prized exports."
 cha_haluwbilau:0 "Haluwbilau"
 cha_haluwbilau_desc:0 "The $cha_haluwbilau$ are elite warriors who occupy key positions in both our land and naval forces. Selected for their talents and bravery, these men lead armies and ships into battle against external threats, and also mediate disputes in local communities."
 cha_kshatriya:0 "Kṣatriya"
 cha_kshatriya_desc:0 "The $cha_kshatriya$ is a term adopted from $hindu_ADJ$ societies, and describes the elite nobles of our state. Given the origin of this term, it follows that our nobility take  similar roles in military and court affairs as their counterparts in $india$."
 cha_matrilineal_heritage:0 "Matrilineal Heritage"
 cha_matrilineal_heritage_desc:0 "Women in our society are given more reverence and appreciation than in many of our neighboring countries. The birthright of any child comes from their mother's side, and women have a wide array of liberties and social responsibilities."
 cha_religious_tolerance:0 "Religious Tolerance"
 cha_religious_tolerance_desc:0 "Our society is a melting pot of different religious influences. The $buddhist_ADJ$ ideas from $china$, the $hindu_ADJ$ practices from $india$, and the spread of $muslim$ in $south_east_asia$ create a unique environment where religious tolerance is paramount to keeping our society together."
 cha_towers_on_water:0 "Towers on Water"
 cha_towers_on_water_desc:0 "As a maritime power, much of our wealth and power comes from the sea and our dominance over it. In order to secure this supremacy, our shipwrights have designed special large warships which are known as #italic Towers on the Water#!, hybrid creations between a heavy ship and a galley."
 cha_veteran_shipbuilders:0 "Veteran Shipbuilders"
 cha_veteran_shipbuilders_desc:0 "Our state relies on maritime dominance to secure its political, military, and economical presence in $indochina_region$. As such, being able to build ships swiftly is of great importance to our survival."
 chacery_slavonic:0 "Chancery Slavonic"
 chacery_slavonic_desc:0 "To help connect our people across our vast realm, we need a unified language, and require many literate members of the clergy to spread it. The development of such a language to record our history and maintain our administrative apparatus is not only a sign of national pride and prestige, but also a means of creating a distinct government, separating us linguistically and culturally from our neighbors to the east."
 chagatai_literature:0 "$karluk_language$ Literature"
 chagatai_literature_desc:0 "The $karluk_language$ language of the eastern steppes is far more worthy to carry the thoughts and ideas of our great lineage than $persian_language$ or $arabic_language$ ever could be. We must promote the use of our ancestral language, and create a new literary tradition."
 chancery_advance:0 "Chancery"
 chancery_advance_desc:0 "A chancery is a bureaucratic office that medieval rulers developed for governing their domains as societal changes made them more complex and increasingly difficult to manage. The main function of a chancery is to write, send, and receive documents related to the management of these domains."
 chancery_records:0 "Chancery Records"
 chancery_records_desc:0 "The growing apparatus of chanceries requires another level of administration, since their bureaucracy is becoming even more complex to manage. This comes in the form of chancery records, an office established to keep all letters received at the chancery, as well as a copy of all the documents issued by its scribes and notaries."
 chartered_companies:0 "Chartered Companies"
 chartered_companies_desc:0 "The world is a big place, and in order to develop our global trade, we must take some serious risks. Luckily there are merchant in our country willing to do so, using mostly their own capital. By sanctioning such companies with a government charter giving them special rights to exercise government powers as well as monopolies in certain areas, we can control and encourage commercial development of everything from foreign trade networks to our colonial possessions overseas."
 chasqui:0 "chasqui"
 chasqui_desc:0 "The #italic chasquis#! are the messengers of our state. Chosen from the fittest and most durable runners of our country, these agile men carry $quipu$ strings, messages, gifts, and other kinds of information, and deliver them to the target recipient. The spread of ideas, as well as the bulk of our diplomacy, rests on their shoulders."
 chg_border_wars:0 "Ceaseless Border Wars"
 chg_border_wars_desc:0 "Surrounded by people that would oppose us, we face a constant struggle to maintain our borders. Our ever-vigilant soldiers have plentiful opportunities to hone their skills in battle, giving birth to a combat-hardened warrior people ready to reclaim the legacy of the Great $rank_kingdom_horde_ruler_suffix_male$."
 chg_chagatai_riders:0 "Chagatai Riders"
 chg_chagatai_riders_desc:0 "The horses of $genghis_khan_name_no_tooltip$ trampled and conquered territories stretching from $europe$ to $china$. As his heirs and successors, our cavalry will instill fear of the same thing happening into our enemies."
 chg_glory_of_conquest:0 "The Glory of Conquest"
 chg_glory_of_conquest_desc:0 "Let it be known that boy cannot be a man unless he has ridden first with our invincible host, that he can take no wife until he has taken another man's wife, that he is not worthy of a hut until he has burnt down someone else's. Let service in our armies be the only route to manhood."
 chg_legacy_of_chagatai:0 "Legacy of Chagatai"
 chg_legacy_of_chagatai_desc:0 "The legacy of $genghis_khan_name_no_tooltip$ is ours through his son Chagatai. All shall tremble before us as we reclaim his glory!"
 chg_scheming_court:0 "Scheming Court"
 chg_scheming_court_desc:0 "The constant power struggles between the various princes, nobles, cities, and tribes in the Chagatai Khanate have produced a nation of highly adept schemers. If we can put aside our quarrels and channel this energy towards outsmarting our enemies, it would be a great boon to our people."
 chg_sons_of_chagatai:0 "Sons of Chagatai $rank_kingdom_horde_ruler_suffix_male$"
 chg_sons_of_chagatai_desc:0 "We can trace our line back to Chagatai $rank_kingdom_horde_ruler_suffix_male$, the second son of $genghis_khan_name_no_tooltip$, who once ruled these lands and established a powerful Mongolian successor state. Although a long time has passed since then, we can still claim considerable legitimacy by appealing to the legacy of our fierce ancestor."
 chg_the_mountain_khanate:0 "The Mountain Khanate"
 chg_the_mountain_khanate_desc:0 "We lie sheltered between $balkhash_lake$ and the Tiānshān Mountains. It is a harsh and unforgiving land, one which our people know how to use as a weapon against would-be invaders."
 chg_tradition_of_conquest:0 "Tradition of Conquest"
 chg_tradition_of_conquest_desc:0 "Conquering people can be a tricky business; not everyone is ready to accept our enlightened government. Still, we have discovered that there are easier ways to bring people into our empire than building a mountain of skulls — something that our ancestors never learned."
 chg_unrelenting_horde:0 "Unrelenting Horde"
 chg_unrelenting_horde_desc:0 "Our armies shall march like the great hordes of $genghis_khan_name_no_tooltip$. Our troops shall trample our enemies under our hooves like blades of grass of our native steppes. All shall fear the power of our armies!"
 chi_great_rivers_of_china:0 "Fertile Rivers"
 chi_great_rivers_of_china_desc:0 "While the great rivers flowing through our lands do have some associated risks for nearby settlements, they are also an invaluable tool for crop production."
 chi_legitimate_claimant:0 "Claim to the Mandate"
 chi_legitimate_claimant_desc:0 "Our origins may be humble, but we have proven our ability to lead, and have inspired and won the loyalty of many faithful subjects. We are now seen as worthy claimants to the Mandate of Heaven and the Middle Kingdom."
 chinampas:0 "chinampas"
 chinampas_desc:0 "Proficient in terracing hills for cultivation and skilled in crafting arable land on shallow lake portions through ingenious #italic chinampas#!, our populace's remarkable agricultural abilities will significantly benefit our society."
 chinese_siege_engineers:0 "Planned Sieges"
 chinese_siege_engineers_desc:0 "Our thick, sturdy fortifications represent generations of defensive engineering expertise. Conversely, our thorough understanding of fortification weaknesses, learned from building impregnable walls, helps us to develop particularly effective siege tactics and strategies."
 christianization_of_the_slavs:0 "Christianization of the Slavs"
 christianization_of_the_slavs_desc:0 "The people of the Kievan Rus' were among the first of the Eastern $slavic_group$ people to accept the light of Christ and convert to $orthodox$. From there, the faith spread throughout the region."
 church_attendance_duty:0 "Church Attendance Duty"
 church_attendance_duty_desc:0 "Adopting a mandatory church attendance policy will emphasize the importance of our religious values and beliefs, and will minimize the costs of maintaining law and order."
 church_councils:0 "Church Councils"
 church_councils_desc:0 "As the Church must be united in its judgments, any matter too complex for a single bishop to resolve requires us to call a council, where the bishops will consult the mind of the Church itself. The council's decisions shall therefore reflect the consensus of the Church as a whole."
 church_guidance:0 "Church Guidance"
 church_guidance_desc:0 "The Scriptures are the Word of God, but only the Church is able to interpret their correct meaning and to relate it accurately to the flock. Any independent reading or interpretation of the Scriptures outside of Church guidance would only lead to being lost in falsehoods and on the path to heresy."
 cir_city_and_fortress:0 "Fortified Towns"
 cir_city_and_fortress_desc:0 "Our settlements lie unprotected, and are easy prey to any invader. As these settlements grow, however, we can directly incorporate the hilly terrain into our defensive lines, enhancing their protection. If necessary, we can even create the elevated terrain required ourselves."
 cir_grand_prince_of_circassia:0 "Grand Princedom"
 cir_grand_prince_of_circassia_desc:0 "To unify our people, we shall elect the greatest of our lords as the Grand Prince, who will serve as an inspiring leader for our troops."
 cir_horsemen_of_the_steppe:0 "Skilled Horsemen"
 cir_horsemen_of_the_steppe_desc:0 "Our position at the edge of the steppes has resulted in multiple mounted invasions of our homelands. If we want to ensure our independence, we will need to raise a great host ourselves, and expand our influence over the steppes, securing our heartland."
 cir_mercenary_employment:0 "$CIR_ADJ$ Mercenaries"
 cir_mercenary_employment_desc:0 "Our lands have again and again been raided by foreign powers, and our people enslaved. Some of these slaves, used as soldiers, have advanced in their new lives, accumulating power and wealth of their own. With some convincing, we could convince them to return to our lands, and protect it from future invasions."
 cir_multireligious_society:0 "Religious Coexistence"
 cir_multireligious_society_desc:0 "Our lands are frequented by many $catholic_ADJ$, $muslim_ADJ$, and $orthodox_ADJ$ people, who frequently engage in trade with our population. We should foster a collective tolerance between all our subjects, to promote peace and stability."
 cir_tribal_elections:0 "Tribal Elections"
 cir_tribal_elections_desc:0 "We will elect a nominal leader of our people, who will act as our representative but will not meddle with the oversight of local lords."
 city_building_advance:0 "City Building"
 city_building_advance_desc:0 "Developing our urban centers has become central to national prosperity, and is a cornerstone of the urbanization movement. By systematically constructing infrastructure and specialized buildings within our cities, we will fuel our economic growth."
 city_of_artists:0 "City of Artists"
 city_of_artists_desc:0 "Through patronage of the world's greatest artists, the glory of our city will become known throughout the world. All will marvel at the greatness of our painters, poets, singers, and actors. Let $NAP_ADJ$ culture be the mark by which other centers of art are measured!"
 city_of_churches:0 "City of Churches"
 city_of_churches_desc:0 "There are over eighty $orthodox_ADJ$ churches in $novgorod$, and some are the largest landholders in the principality. Their wealth and religious prestige allows the Church to significantly influence the population in many areas, and our citizens are more pious as a result — in a good way."
 city_of_scholars:0 "City of Scholars"
 city_of_scholars_desc:0 "$TLE$ has long been a center of Islamic learning and intellectual exchange. Our madrasas attract scholars from across the $maghreb_region$ and Al-'Andalus, fostering scientific and theological progress for generations to come."
 civil_servants:0 "Civil Service"
 civil_servants_desc:0 "Establishing a civil service of eager young bureaucrats will ensure that we can quickly adapt to new advances in administration and governance."
 claim_fabrication:0 "Claim Fabrication"
 claim_fabrication_desc:0 "Claiming something as yours is easy; persuading everyone else that your claim is valid is much harder. By spreading our diplomatic net wide, we can ensure that the people who matter know that we have staked this claim."
 clearing_house_advance:0 "Clearing House"
 clearing_house_advance_desc:0 "$clearing_house_desc$"
 clergy_rights_laws_advance:0 "$clergy_rights_laws$"
 clergy_rights_laws_advance_desc:0 "$clergy_rights_laws_desc$"
 cli_the_counts_ambition:0 "The Count's Ambition"
 cli_the_counts_ambition_desc:0 "Through a masterclass in marital diplomacy and unwavering loyalty to the Holy Roman Emperors, we have risen from local lords to Princes of the Holy Roman Empire. By securing marriage ties to the thrones of our neighbors, we have positioned ourselves as the indispensable 'Shield of the South'. This meteoric rise grants us the prestige to demand respect from the greatest of European houses."
 cli_the_last_counts_legacy:0 "The Last Count's Legacy"
 cli_the_last_counts_legacy_desc:0 "Following our deep involvement in the successions of our neighbors, we formalize our legal claims to oversee the southern frontier of the Empire as the primary protectors of the realm. Even as our rivals attempt to absorb our lands, the administrative structures and 'Imperial Immediate' status we have secured ensure that our territory remains a privileged hub of regional governance."
 cli_the_marble_palaces_of_celje:0 "The Marble Palaces of Celje"
 cli_the_marble_palaces_of_celje_desc:0 "To reflect our status as Princes of the Empire, we have invited Italian architects to redesign our urban centers in the grand Baroque style. These sprawling palaces and public squares are not merely for show; they serve as centralized administrative hubs where the state's bureaucracy is professionalized. The sheer splendor of our capital serves to overawe foreign diplomats and domestic rivals alike, cementing our legitimate right to rule."
 cli_the_modernization_of_a_nation:0 "The Modernization of a Nation"
 cli_the_modernization_of_a_nation_desc:0 "Our ancestral valleys have been transformed from a feudal pastoral land into the industrial heartbeat of our realm. We have seized this momentum by establishing massive industries, alongside modern steam-powered mills that process the raw timber and iron of the surrounding mountains. This rapid modernization has created a new class of skilled laborers and engineers, turning our capital into a center of technological innovation that propels the entire state into the industrial age."
 cli_the_sanneck_condottieri:0 "The Sanneck Condottieri"
 cli_the_sanneck_condottieri_desc:0 "Before we were Princes of the Empire, the House of Cilli was defined by the sharp blades of the Sanneck knights. By leading elite mercenary companies for the Hungarian and Imperial crowns in the fields of Dalmatia and Italy, we have turned the 'contract of war' into a tool for dynastic elevation. This tradition of professional military service allows us to field superior sellswords at a fraction of the cost."
 cli_the_windic_march_arsenal:0 "The Windic March Arsenal"
 cli_the_windic_march_arsenal_desc:0 "As the primary lords of the southern frontier, we have transformed our estates into a permanent military supply chain. By patronizing the ironworks of the Savinja Valley, we ensure our heavy cavalry and border guards are equipped with the finest plate and firearms forged in Inner Austria. This localized military industry reduces our reliance on foreign armaments and keeps our regiments battle-ready at all times."
 close_subjects:0 "Close Subjects"
 close_subjects_desc:0 "For us, our subjects are not something separate from the nation, but rather an integral part of it. We keep close ties with them, and they are fully integrated into our bureaucracy and administration."
 cloth_manufactory_advance:0 "Cloth Manufactory"
 cloth_manufactory_advance_desc:0 "$cloth_manufactory_desc$"
 cloth_workshop_advance:0 "$cloth_workshop$"
 cloth_workshop_advance_desc:0 "$cloth_workshop_desc$"
 coal_improvements_absolutism:0 "Improved Coking"
 coal_improvements_absolutism_desc:0 "By streamlining the coal refining process, we can use it more effectively as fuel while eliminating side effects that would negatively impact other industrial products."
 coal_improvements_revolutions:0 "Improved Beehive Ovens"
 coal_improvements_revolutions_desc:0 "For the production of coke, a vital part of iron processing, we need many beehive ovens. With improved construction techniques and better usage of bricks, we will be able to accordingly raise the quality of the produced coke."
 coastal_fort_advance:0 "Coastal Fort"
 coastal_fort_advance_desc:0 "$coastal_fort_desc$"
 coastal_trade_routes_advance:0 "Coastal Expansion"
 coastal_trade_routes_advance_desc:0 "The safest way for any ship to sail is to do it close to the coast. Unless they actually have to cross the sea, there is no real need for our ships to sail away from the protective coastline, and it is still quicker traveling by ship than by land. As such, maintaining a constant flow of ships along our coasts will allow for easier circulation of goods and people."
 codified_laws:0 "Codified Laws"
 codified_laws_desc:0 "Statutes and regulations are the backbone of any well-functioning society. If we are to hone our efficiency and internal capabilities, a set of robust codified laws is of vital importance."
 coke_blast_furnace:0 "Coke Blast Furnace"
 coke_blast_furnace_desc:0 "This is a new type of blast furnace, which uses coke instead of charcoal as its fuel. It is cheaper and allows us to build larger furnaces, although coke has the disadvantage of being less pure than charcoal, which is a problem yet to be addressed."
 coke_smelting:0 "Coke Smelting"
 coke_smelting_desc:0 "The invention of coke smelting, specifically its application in $iron$ and $steel$ production, is closely tied to the Industrial Revolution. $iron$ and $steel$ are currently produced using traditional methods like charcoal smelting, whereas this new method will result in improved output and reduced maintenance costs."
 colonial_administration_advance:0 "$colonial_administration$"
 colonial_administration_advance_desc:0 "$colonial_administration_desc$"
 colonial_ambition:0 "Colonial Ambition"
 colonial_ambition_desc:0 "Many of our people settled in the New World to start a new life; to discover the wonders beyond the sea and make an untamed continent their home. Their ambition is ours as we push further and further into the unknown."
 colonial_assembly:0 "Colonial Assembly"
 colonial_assembly_desc:0 "Much of the legislative power over taxes and government spending has been moved into colonial administrations."
 colonial_charters:0 "Colonial Charters"
 colonial_charters_desc:0 "These new documents will ensure the rights of our countrymen when they settle the untamed New World. They give our colonies the exclusive right of governing these new lands and regulate their relationship with the mother country."
 colonial_militia:0 "Colonial Militia"
 colonial_militia_desc:0 "In the absence of regular garrisons, colonial militias played an important role in local conflicts and border raids against native tribes and other colonies. They were typically made up of adult male citizens who were usually expected to provide their own weapons and equipment."
 colonial_policy_advance:0 "Colonial Policy"
 colonial_policy_advance_desc:0 "The new lands and frontier territories that our people are colonizing require new forms of management and organization."
 colonial_ventures:0 "Colonial Ventures"
 colonial_ventures_desc:0 "Enables us to send more colonists to uncharted lands."
 colonies:0 "colonies"
 colonies_desc:0 "Be it by sending our own people to settle in new lands, by imposing our rule over the natives in our overseas holdings, or through a mix of both, establishing a colony creates a foothold for our power that will let us further expand our control — and borders — in these unclaimed territories."
 columns_of_gediminids:0 "Columns of $gediminid_dynasty$s"
 columns_of_gediminids_desc:0 "The coat of arms that hangs on our banners originates from one of our most celebrated dynasties, the $gediminid_dynasty$ family. Many of their brightest have led our nation through turbulent times into ample prosperity with careful statesmanship and capable guidance. The columns of such great leaders symbolize the strong foundation and tenacity of our country and our fellow men and women."
 combined_arms_advance_reformation:0 "Combined Arms"
 combined_arms_advance_reformation_desc:0 "Warfare is becoming increasingly complex, driven by the widespread adoption of standing armies composed of soldiers hired for permanent service. The introduction of new weapons, such as firearms and cannons, encourages an approach that balances and combines light and heavy infantry, cavalry, and artillery, supported by auxiliary units."
 combined_arms_advance_revolutions:0 "Advanced Combined Arms"
 combined_arms_advance_revolutions_desc:0 "The regular use of combined arms over several centuries has led to the dominance of this type of warfare. Light infantry and cavalry have the role of weakening and disorganizing enemy forces, while simultaneously screening and protecting their own. Heavy infantry and cavalry bear the brunt of the fighting, seeking decisive charges to rout the enemy, while artillery and auxiliary forces support them from a distance at the rear."
 comets:0 "Comets?"
 comets_desc:0 "We have recently received a rather curious new tome. It is called #italic On the True Significance of Comets against the Vanity of Astrologers#!, and it is positively filled with vital information on these highly suspicious entities. We have decreed that all in the realm should be aware of its contents."
 commerce_center_advance:0 "$commerce_center$"
 commerce_center_advance_desc:0 "$commerce_center_desc$"
 community_of_the_faithful:0 "Domain of Many Tongues"
 community_of_the_faithful_desc:0 "Our Empire is home to people from hundreds of different backgrounds. They speak a multitude of tongues, and come from all the directions of the horizon, but each in their own tongue pays homage to our ruler, binding us together."
 compagnie_d_ordonnance:0 "Compagnies d'Ordonnance"
 compagnie_d_ordonnance_desc:0 "Our reliance on feudal levies has proven inadequate for the demands of modern warfare. The creation of permanently contracted cavalry units, the #italic $compagnie_d_ordonnance$#!, provides us with a reliable and professional military force directly loyal to the Crown."
 competetive_merchants:0 "Competitive Merchants"
 competetive_merchants_desc:0 "To bring the focus of our trade home, we must be able to beat competition from other countries. We need to ensure that our legal system gives our merchants every possible advantage."
 comprehensive_land_survey:0 "Comprehensive Land Survey"
 comprehensive_land_survey_desc:0 "In order to know who should pay taxes, we must first know who owns what. A comprehensive land survey, and regularly updating it, are therefore essential. We will always get what we are due!"
 concentration_power:0 "Concentration of Power"
 concentration_power_desc:0 "For too long, our nation has been unevenly governed by multiple #italic stadtholders#! across different provinces, with the most powerful acting as #italic primus inter pares#! among their peers. It is time to make the position hereditary and concentrate authority in a single ruler."
 confessio_augustana:0 "A New Confession"
 confessio_augustana_desc:0 "The Reformation gives us the opportunity to define a new creed for our people and, more importantly, to accept critique and make adjustments accordingly."
 confessional_court:0 "Confessional Court"
 confessional_court_desc:0 "Court expenses can easily bankrupt even the richest nation. In order to achieve a good balance between luxury and sensible expenses, we can adopt small measures to reduce those costs without reducing the magnificence of our court."
 confessionalism_advance:0 "Confessionalism"
 confessionalism_advance_desc:0 "There are a myriad of different interpretations of what the Faith should be, and as such, there has been an increased interest among religious and secular authorities alike to clearly define the methodology of their specific confessions, enforcing their particular rules and views on all aspects of faith and life."
 confucian_academy_advance:0 "Confucian Academy"
 confucian_academy_advance_desc:0 "$confucian_academy_desc$"
 confucian_influences:0 "Confucian Influences"
 confucian_influences_desc:0 "If we are to manage our realm properly, our advisors shall find great wisdom about administration in Confucian teachings, which emphasize meritocratic selection of officials, attention to administrative detail, and other foundational advice for creating a healthy and prosperous government."
 confucian_school_advance:0 "Confucian School"
 confucian_school_advance_desc:0 "$confucian_school_desc$"
 confutatio_augustana:0 "Refute False Confessions"
 confutatio_augustana_desc:0 "In these turbulent times, we must clearly define orthodox $christian_ADJ$ doctrine, while systematically refuting the false beliefs that endanger the very souls of our people."
 congregation_of_merchants:0 "Congregation of Merchants"
 congregation_of_merchants_desc:0 "From $arabia_region$ to China and the coasts of $south_asia$, merchants of every shore converge upon $malacca$. Drawn by fair laws, secure waters, and bustling markets, they will form a great congregation that enriches our ports and carries our name across the seas."
 connections_with_china:0 "Connections with China"
 connections_with_china_desc:0 "Our envoys have secured recognition from China's most prestigious sovereigns. Tribute and goodwill flow between us, granting us prestige, protection, and a privileged place in the vast network of their trade."
 connections_with_the_christian_world:0 "Connections with the $christian_ADJ$ World"
 connections_with_the_christian_world_desc:0 "Treaties and trade agreements with $christian_ADJ$ states ensure that diplomacy and pragmatism serve our long-term interests. Though our faith differs from theirs, we should not close the door to opportunity."
 conquerors_legacy:0 "Conqueror's Legacy"
 conquerors_legacy_desc:0 "Our glorious empire emerged from the legacy of great conquerors. It was the ferocity of $genghis_khan_name_no_tooltip$'s troops that allowed him to conquer from $europe$ to $china$. As his successors, our troops will be as fearsome as the ones in his army."
 conquistador_advance:0 "Conquistadors"
 conquistador_advance_desc:0 "The discovery of the New World attracts adventurers of all stripes to risk their fortunes and lives on uncertain expeditions, with the promise of unparalleled wealth, fame, and power. These expeditions are formalized through agreements between expedition leaders and the government, legally manifested as 'capitulations of conquest'."
 conscription_advance:0 "$a_conscripts$"
 conscription_advance_desc:0 "$a_conscripts_desc$"
 conscription_center_advance:0 "Conscription Center"
 conscription_center_advance_desc:0 "$conscription_center_desc$"
 consolidate_italian_holdings:0 "Consolidate $ITA_ADJ$ Holdings"
 consolidate_italian_holdings_desc:0 "The Scaligeri ruled not just $VER$, but a growing web of cities across northern $italy_region$. Holding such a realm together demands careful diplomacy, clever delegation, and well-paid professional armies. Only through consolidation can $VER$ stand as a true rival to the other great powers of the peninsula."
 consolidate_the_royal_domain:0 "The Royal Domain"
 consolidate_the_royal_domain_desc:0 "We have inherited a wealthy realm, but we have been stymied from achieving true prosperity by the constraints of archaic laws and customs. Previous rulers balanced noble privilege with economic power, but we must bring attitude and regulations into the modern era. By strengthening courts of the nobility and consolidating their landholdings, we will create a clearer legal hierarchy. Simultaneously, we will empower cities as centers of royal authority and encourage the proliferation of urban trade and craftsmanship."
 construction_center_advance:0 "$construction_center$"
 construction_center_advance_desc:0 "$construction_center_desc$"
 construction_speed_absolutism:0 "Architectural Engineering"
 construction_speed_absolutism_desc:0 "Building construction has become more sophisticated over time, incorporating methods and techniques from a wide range of disciplines, commonly considered a type of engineering."
 construction_speed_discovery:0 "Standardized Planks and Bricks"
 construction_speed_discovery_desc:0 "The standardization of plank and brick production using more modern techniques aims to enable easier construction."
 construction_speed_reformation:0 "Architectural Treatises"
 construction_speed_reformation_desc:0 "The writing of architectural treatises, which often compile centuries-old knowledge, allows for faster learning and dissemination of effective construction techniques."
 construction_speed_renaissance:0 "Mason Guilds"
 construction_speed_renaissance_desc:0 "Freemasons rely on broader associations, known as guilds, to share and preserve their knowledge and experience in a system where veteran masons teach younger apprentices."
 construction_speed_revolutions:0 "Cast Iron Structures"
 construction_speed_revolutions_desc:0 "The development of more advanced metallurgy of wrought and cast iron allows for more elaborate metallic structures, such as pillars and columns, which makes building construction much faster."
 construction_speed_traditions:0 "Master Masons"
 construction_speed_traditions_desc:0 "Our construction efforts should never rest and leave our villages and towns idle. Employing a master mason, who will oversee and plan our construction work, we can make significant improvements in expanding our country."
 contacts_network:0 "Contacts Network"
 contacts_network_desc:0 "The extensive reach of $muslim$ has brought $muslim_ADJ$ countries in contact with many different foreign lands. Maintaining a rich network of international contacts such as ours is always beneficial for diplomacy."
 continental_trade:0 "Continental Trade"
 continental_trade_desc:0 "While the New World colonies had to import a lot of manufactured products, they also became a major supplier of raw materials for markets in $europe$."
 continue_missionary_works:0 "Missionary Works"
 continue_missionary_works_desc:0 "Missionary efforts to carry our faith to the far corners of the world can never be considered finished. We need to sponsor more missions to further bring the light of $catholic$ to these unilluminated souls."
 control_of_the_red_sea:0 "Red Sea Control"
 control_of_the_red_sea_desc:0 "Any and all trade from $india$ and $africa$ must pass through the strait called Gate of Grief. Let us enforce our dominion over this maritime chokepoint and turn every passing ship into an opportunity."
 control_the_malacca_strait:0 "Control the Malacca Strait"
 control_the_malacca_strait_desc:0 "The narrow $inner_strait_malacca$ is the backbone of our maritime commerce. By controlling this vital strait, we channel the wealth of nations into our harbors and establish ourselves as the unrivaled gatekeepers of the east-west trade."
 conviction_of_sin:0 "Conviction of Sin"
 conviction_of_sin_desc:0 "Those who have done wrong will fall to their knees under the heavy weight of their own wickedness! Their evil deeds shall haunt them forevermore, and they will not sleep until they have atoned for the devious nightmares they themselves have caused."
 copper_bottoms:0 "Copper Bottoms"
 copper_bottoms_desc:0 "Wood may be the ideal material for shipbuilding, but it tends to deteriorate over time. By fitting our ships with copper sheathing below the waterline we can reduce this deterioration, allowing them to better withstand long journeys."
 copperworking:0 "copperworking"
 copperworking_desc:0 "Our artisans have begun to craft tools out of $copper$, a precious metal found throughout our territory. If we were to master this art, it would give us a tremendous advantage over our neighbors."
 cork_stoppers:0 "Cork Stoppers"
 cork_stoppers_desc:0 "Developments in bottle manufacturing have allowed wine producers to create bottles in standardized sizes, and as a result, they have been able to reintroduce the use of cork bottlestoppers. This is a much more efficient way to seal in the wine than with cloth stoppers, and means that it can now be transported much farther away than was previously possible. Perhaps we are now seeing the birth of a worldwide $wine$ trade..,"
 corona_regni_poloniae:0 "Corona Regni Poloniae"
 corona_regni_poloniae_desc:0 "This legislation establishes the kingdom as an indivisible, collective entity, owned not by any single dynasty or monarch but by the entire noble class. Rulers serve the realm, they do not #italic own#! it. This concept of collectivity is deeply entrenched in our society."
 corps_organisation:0 "Esprit de Corps"
 corps_organisation_desc:0 "Traditional armies relied on furious discipline to maintain order in the ranks. By appealing to unit pride, however, we can reach even higher levels of discipline."
 correct_box_advance_absolutism:0 "Flexible Battle Formations"
 correct_box_advance_absolutism_desc:0 "New tactics have developed, making for more flexible and coordinated infantry, cavalry, and artillery units on the battlefield, usually grouped as brigades."
 correct_box_advance_discovery:0 "Lieutenants"
 correct_box_advance_discovery_desc:0 "As our professional armies grow, the commissioned officers that lead them are commanding increasingly bigger formations. To assist them, we will create the rank of lieutenant. These officers take charge of transmitting orders from command, and also lead smaller units on the battlefield."
 correct_box_advance_reformation:0 "Regimental Organization"
 correct_box_advance_reformation_desc:0 "Professional armies have made it possible to create a new type of unit, the regiment, which not only is a permanent position for soldiers, but also a useful battle formation."
 correct_box_advance_renaissance:0 "Commissioned Officers"
 correct_box_advance_renaissance_desc:0 "The development of professional armies has led to the appointment of permanent command positions, offices granted by direct commission from the ruler."
 correct_box_advance_revolutions:0 "General Staff"
 correct_box_advance_revolutions_desc:0 "The growth of armies and their deployment in longer campaigns has created a need to assign designated officers to planning and logistics, focused on effectively coordinating the different corps on the battlefield."
 cosmopolitan_court:0 "Cosmopolitan Court"
 cosmopolitan_court_desc:0 "People from all over admire the beauty and sophistication of our $muslim_ADJ$ court. We have therefore become an appealing destination for talented luminaries of all kinds, which only adds to our overall court vibrancy and prestige."
 cossack_administration:0 "Cossack Administration"
 cossack_administration_desc:0 "By granting our Cossack leaders dual roles as both generals and administrators, we will be able to streamline army recruitment, and ensure a high training standard."
 cossack_raids:0 "Cossack Raids"
 cossack_raids_desc:0 "Our Cossacks live in a near-permanent state of war, and have adopted pillaging and raiding tactics similar to those of the $MGE_ADJ$ hordes. Although that will surely not earn us many friends, it will decidedly enrich our coffers."
 cossack_reputation:0 "Fearsome Reputation"
 cossack_reputation_desc:0 "Our Cossacks have already built for themselves a reputation of fierce warriors. That in itself is enough to instill fear in the hearts of our enemies when they have to face them in battle."
 cossacks_colonization_advance:0 "Cossack Colonization"
 cossacks_colonization_advance_desc:0 "Our Cossacks are already used to roaming freely and going beyond our borders. We can use them to advance further settlement, and thus expand our influence to those unclaimed lands."
 cossacks_escaped_serfs:0 "Escaped Serfs"
 cossacks_escaped_serfs_desc:0 "Many Cossacks were born into serfdom. Tired of feudal oppression, they fled their masters, and sought lives of freedom on the steppes. We must continue to welcome these escaped serfs into our society."
 cossacks_exploration_advance:0 "Cossack Exploration"
 cossacks_exploration_advance_desc:0 "Our Cossacks live at the edges of our country, making them excellent candidates to serve as explorers and go beyond our borders to the final frontier, to explore strange new lands, to seek out new countries and new civilizations, to boldly go where no one has gone before..."
 cossacks_hetmanate:0 "Cossack Hetmanate"
 cossacks_hetmanate_desc:0 "There are no kings or khans among the Cossacks. They are led by the #italic ataman#!, who is their highest military commander, but in matters of state and society simply the first among equals. Political power lies in the Rada, the legislative and military assembly, in which all Cossacks can have their say."
 cossacks_military_society:0 "Military Society"
 cossacks_military_society_desc:0 "There is almost no division between civil and military society among the Cossacks. They are a host, defined by their people rather than by the land they control, and their people are warriors. We must ensure that military divisions properly meet our administrative needs as the host expands."
 cossacks_recruitment:0 "Cossack Recruitment"
 cossacks_recruitment_desc:0 "The Cossacks are fearsome warriors, and their skill in surviving in the unforgiving wilderness of the steppes is almost unmatched. There is a place for them in our state as well as our military, as an elite force that will enforce our lordship over the steppes."
 cossacks_registered:0 "Cossack Registers"
 cossacks_registered_desc:0 "As the ranks of our Cossacks swell, we must keep account of the strength of each regiment, their numbers, and how well they are supplied. A centralized registry will allow us to support the needs of all Cossacks."
 cossacks_serf_autonomy:0 "Cossack Serf Autonomy"
 cossacks_serf_autonomy_desc:0 "No man should suffer tyranny among the Cossacks. When we conquer new territories, the serfs, peasants, and slaves there will be treated as equals to our own people."
 council_hall_advance:0 "$council_hall$"
 council_hall_advance_desc:0 "$council_hall_desc$"
 council_of_elders:0 "Council of Elders"
 council_of_elders_desc:0 "Our tribal government ensures that everyone in it has a voice and an equal say in crucial decisions. This collaborative administration encourages us to consider new perspectives."
 council_of_three_lands_advance:0 "Council of Three Lands"
 council_of_three_lands_advance_desc:0 "Our country has a long-standing history of accepting destitute, persecuted $judaism_ADJ$ people. To that end, a council that will look after their needs and advocate for their rights will benefit the stability and spiritual strength of this realm."
 counter_espionage_action_advance:0 "Restricted Information Access"
 counter_espionage_action_advance_desc:0 "We cannot expect to perform well in either the diplomatic or military spheres if our secrets can easily be leaked to any foreign country. We must keep stronger control over how our information flows to quickly plug any possible leakage."
 counter_espionage_building_country_advance:0 "Secret Codes"
 counter_espionage_building_country_advance_desc:0 "It is well known that our activities attract unwelcome attention. If we wish to keep our plans hidden from these curious gazes, we should encrypt our communications."
 counting_house_advance:0 "Counting House"
 counting_house_advance_desc:0 "$counting_house_desc$"
 counting_the_people:0 "Counting the People"
 counting_the_people_desc:0 "Now that we know who owns what, the logical follow-up is to get a clearer idea of who lives where. This will tell us where to look when we need fresh recruits for our armies."
 country_unification_advance:0 "Subject Supervision"
 country_unification_advance_desc:0 "The earlier we start integrating the administration of our subjects to follow the rules of our own, the easier the integration of other matters will be. Creating a permanent liaison with our subjects will make this process significantly smoother."
 court_accounting:0 "Court Accounting"
 court_accounting_desc:0 "The court is the symbol of our country, and its prosperity shall represent that of the nation. However, this does not mean that the court can spend more than the country can sustain; there should be proper accounting for what is spent at court."
 court_of_great_refugees:0 "Court of Great Refugees"
 court_of_great_refugees_desc:0 "Our great capital has become a haven for artists, exiles, and thinkers — displaced by war, faith, or politics elsewhere in $ITA$. These refugees are destined to enrich the city's courts with new techniques, bold ideas, and cultural crosscurrents, making $VER$ a rare sanctuary of innovation in turbulent times."
 courtly_competition:0 "Courtly Competition"
 courtly_competition_desc:0 "A preoccupied noble is a well-behaved noble. There are so many courtly titles in our realms that some say half of our men have one. Let us make sure our courtiers spend their time competing with one another for attention and visibility; they will be too busy to plot against our rule."
 cradle_of_monasticism:0 "Cradle of Monasticism"
 cradle_of_monasticism_desc:0 "Monasticism in $christian$ was born in $egypt_region$, when the $christian_ADJ$ faithful retreated to the desert to pray and dedicate their lives to God. $miaphysite$ can therefore claim this history as their own through the Alexandrine tradition."
 create_the_regimental_system:0 "Create the Regimental System"
 create_the_regimental_system_desc:0 "To ensure consistent recruitment and sufficient supply of fighters, we must establish a formal regimental system. This reform will allow us to organize manpower more effectively, centralize command structures, and reduce dependence on local nobles and foreign mercenaries."
 cri_devshirme_of_the_steppes:0 "The Devshirme of the Steppes"
 cri_devshirme_of_the_steppes_desc:0 "$CRI_ADJ$ elites mimicked aspects of $TUR_ADJ$ military-administrative practices, blending $turkic_group$ and $muslim_ADJ$ systems to manage manpower and military efficiency."
 cri_free_cattle_grazing:0 "Free Cattle Grazing"
 cri_free_cattle_grazing_desc:0 "We place no restrictions on pastoral farmers for the grazing of their great herds of horses and cattle. Herders are free to go about their business as they wish, able to traverse the steppe safely and trade freely."
 cri_genghisid_legacy:0 "Genghisid Legacy"
 cri_genghisid_legacy_desc:0 "Our forefathers rode with $genghis_khan_name_no_tooltip$ as he ravaged the known world. We have kept our military traditions alive, and continued to be ruled by $rank_kingdom_horde_ruler_suffix_male$s who claim descent from the Genghisid line."
 cri_slavers:0 "Slavers of the Steppe"
 cri_slavers_desc:0 "There is a fortune to be made from the $slaves_goods$ trade; unwitting $christian_ADJ$ believers who fall into our grasp fetch a high price in $turkish_culture$, $AIA_ADJ$, and $ITA_ADJ$ markets."
 cri_steppe_commanders:0 "Steppe Commanders"
 cri_steppe_commanders_desc:0 "$CRI_ADJ$ cavalry commanders have mastered the art of mobility in steppes warfare, using speed, flanking, and ambush to outmatch slower European armies."
 cro_antemurale_christianitatis:0 "Antemurale Christianitatis"
 cro_antemurale_christianitatis_desc:0 "Our cultural identity has been forged in the fire of the 'Century of Martyrs'. We have embraced the role of the #italic Antemurale Christianitatis#! (Shield of Christendom), transforming our military struggle into a sacred religious mission. This mythos instills a deep, unshakable sense of historical duty in the population, viewing the defense of our nation as the defense of civilization itself. This 'Heroic Spirit' ensures that the national fire remains alive even in our darkest hours."
 cro_baroque_pietas:0 "The Baroque Pietas"
 cro_baroque_pietas_desc:0 "Our culture has embraced a dramatic and intense Baroque Catholicism, characterized by massive religious processions and the construction of grand, ornate churches. This 'Visual Piety' serves as a powerful unifying force, bridging the gap between the urban nobility and the rural peasantry through shared ritual and spectacle. This intense religious identity acts as a cultural shield against both Protestant and Eastern influences, ensuring that the Croatian soul remains firmly anchored in the Catholic-Mediterranean world, even while defending the central European plains."
 cro_influx_of_foreign_knowledge:0 "Influx of Foreign Knowledge"
 cro_influx_of_foreign_knowledge_desc:0 "The coastal cities have become vibrant centers of the Renaissance, where scholars and artists blend classical Italian influences with a distinct Slavic sensibility. This intellectual movement produces great thinkers who contribute to European science, poetry, and philosophy, proving that Croatian culture is at the forefront of the modern era. The patronage of wealthy merchant families allows for the construction of magnificent cathedrals and palaces, turning our coast into a beacon of high culture that attracts the finest minds of the age."
 cro_legacy_of_the_trpimirovic:0 "Legacy of the Trpimirović"
 cro_legacy_of_the_trpimirovic_desc:0 "We look back to the glorious age of our native kings, such as Tomislav and Zvonimir, to inspire a sense of independent destiny and national pride. By tracing our lineage and institutions back to these sovereign rulers, we bolster our diplomatic standing among the courts of Europe and assert our right to a crown that is older than many of our neighbors'. This historical prestige commands respect from the Holy See and serves as a powerful unifying mythos that rallies the disparate regions of the kingdom under a single, storied banner of Romanic-Slavic royalty."
 cro_maritime_connections:0 "The Pacta Conventa"
 cro_maritime_connections_desc:0 "This legal bedrock formalized the union between the Twelve Noble Tribes of Croatia and the Hungarian Crown. By preserving the right to elect the monarch and maintaining a separate coronation with the Zvonimir Crown, we ensure Croatia remains a distinct political entity in the case of falling in Union with other nations. This contractual sovereignty prevents total absorption into a foreign administration, allowing our nobility to manage internal justice and defense under their own ancient laws."
 cro_pandurs_recruitment:0 "Pandurs"
 cro_pandurs_recruitment_desc:0 "The state must harness the ferocity of the frontier without succumbing to its chaos. The $cro_pandurs_recruitment$ — once mere night watchmen and local security — are reorganized by charismatic leaders into a professionalized light infantry. These soldiers are a terrifying sight on the European battlefield, accompanied by their own bands of martial music. They are the masters of skirmishes, specializing in raiding supply lines, screening the main army, and psychological warfare. While their discipline remains erratic and their propensity for plunder high, they provide a ruler with a flexible tool of intimidation that conventional line infantry cannot match."
 cro_reliance_on_adriatic:0 "The Lessons from the Uskoks"
 cro_reliance_on_adriatic_desc:0 "To counter the advance of our enemies, we have transformed our coastal fortresses into a sanctuary for the Uskoks — refugee warriors who wage a permanent war. These light-infantry units use small, fast boats to conduct lightning raids against enemy supply lines, surviving in the rugged karst where regular armies cannot follow. This policy turns our coast into a lethal 'no-man's-land' for our enemies, providing us with a cheap and fiercely motivated frontier guard that requires no support from the central treasury and keeps our enemies constantly on the defensive."
 cro_the_banovac_silver_denar:0 "The Banovac Silver Denar"
 cro_the_banovac_silver_denar_desc:0 "We have asserted the right of #italic Monetaria#!, establishing a sovereign mint to produce the Banovac silver denar. By maintaining a higher silver content than neighboring currencies, our coin has become the primary medium of exchange in the northern Adriatic and the Drava basin. This fiscal independence allows us to fund its administration without relying on external subsidies, turning our court into a regional financial hub that attracts Ragusan and Venetian capital."
 cro_the_bashka_tablet:0 "The Baška Tablet"
 cro_the_bashka_tablet_desc:0 "The cultural soul of Croatia is anchored in the 'Zvonimir tradition', where our history is carved in stone. We have promoted the memory of our independent kings through epic poetry and historical chronicles, instilling a 'Royal Consciousness' in every peasant and noble. This historical pride ensures that even when ruled by foreign kings, the Croatians view themselves as part of an ancient and sovereign nation, fostering a resilience that ensures our culture remains vibrant and resistant to external cultural decay."
 cro_the_croatian_press:0 "The Croatian Press"
 cro_the_croatian_press_desc:0 "We have established one of the earliest and most daring printing houses in the Slavic world. By moving our technological heart to the 'impassable' valley of Kosinj, we ensure that the production of our sacred Glagolitic texts remains shielded from the maritime raids and border skirmishes that plague the littoral. This press is not merely a tool for literacy; it is a laboratory of cultural survival where we forge the first printed missals in our native tongue. By standardizing our ancient script through the modern press, we provide every parish in the Kingdom with a unified, incorruptible source of our laws and liturgy. This ensures that the Croatian identity remains intellectually fortified and spiritually independent, as it reaches the hands of every shepherd and noble, anchoring the soul of the nation in an unshakeable, home-grown tradition."
 cro_the_jesuit_academy:0 "The Jesuit Academy"
 cro_the_jesuit_academy_desc:0 "Founded by the invited Jesuit Order, this academy has evolved from a local gymnasium into the intellectual heart of our nation. By establishing a rigorous curriculum of Aristotelian philosophy, mathematics, and rhetoric, the academy has created a home-grown elite of 'Enlightened Croats' who are as comfortable in the salons of Vienna as they are in the Sabor. This institutional modernization ensures that our bureaucracy is led by a technocratic class capable of navigating the complex legal and scientific shifts of our century."
 cro_the_national_garrison_system:0 "The National Garrison System"
 cro_the_national_garrison_system_desc:0 "To combat the sudden amphibious raids of enemy fleets or border transgressions, we will establish a sophisticated visual system using smoke and fire signals atop the highest Velebit crags. This 'Mountain Watch' will allow our forts to communicate across the jagged terrain in minutes, bypassing the slow mountain trails. By coordinating these signals with the inland garrisons, we will be able to mobilize our nation and reinforce our walls before any action happens. This high-altitude surveillance will turn the impassable peaks into a centralized command tower, ensuring that no enemy can approach without our immediate knowledge."
 cro_the_royal_council_of_croatia:0 "The Royal Council of Croatia"
 cro_the_royal_council_of_croatia_desc:0 "We have established the #italic Consilium Regium#! in our capital, creating a dedicated executive government for the Croatian Nation. This body will act as a proto-ministry, handling the economy, education, and internal security of the #italic Triune Kingdom#!. This era of 'Government by Council' will foster a professional class of Croatian civil servants who view the state as a rational, modern machine rather than a collection of feudal privileges. The experience gained in these halls of power will provide the administrative expertise necessary for the Croatian people to navigate the transition from a medieval kingdom to a modern European nation-state."
 cro_trade_posts:0 "The Marulić Epic Tradition"
 cro_trade_posts_desc:0 "The cultural soul of Croatia has reached a literary peak with works like #italic Judita#! by Marko Marulić, the 'Father of Croatian Literature'. By using biblical allegory to describe the contemporary defense of our lands, Marulić has provided the nation with a high-culture blueprint for survival. This literature creates a bridge between the Renaissance urbanite and the frontier soldier, unifying all classes under a shared heroic mission and ensuring the preservation of the Croatian tongue as a language of high art and theological debate."
 cro_uniting_the_coast_and_the_inner_lands:0 "Uniting the Coast and the Inner Lands"
 cro_uniting_the_coast_and_the_inner_lands_desc:0 "To break the isolation of our coast, we will oversee the monumental construction of numerous roads, linking the inland to our ports. This engineered highway will be carved through the limestone heart of the Velebit mountains, featuring advanced stone bridges and serpentine curves to accommodate heavy wagons. The road will transform our littoral from a desolate frontier into a vital economic artery, allowing the timber and grain of the interior to reach international markets. By physically binding the mountain hinterland to the Adriatic, we will complete the territorial integration of the nation, fostering a new age of trans-Velebit commerce."
 croatian_the_cravats:0 "The Cravats"
 croatian_the_cravats_desc:0 "During these convulsed years, the world has taken notice of the distinct, elite light-cavalry regiments from the Croatian Military. Beyond their legendary mobility and ferocity, these horsemen have introduced a unique sartorial innovation: a functional, knotted cloth worn around the neck to secure their shirt collars and provide protection from the chafing of breastplates. This #italic cravat#! — a name derived from the French mispronunciation of #italic Croate#! — has rapidly transcended the battlefield to become the height of Parisian and European fashion. By transforming a rugged military necessity into a hallmark of fashionable dressing, our culture has achieved a subtle but permanent victory. This sartorial dominance ensures that the image of the Croatian officer is one of both tactical lethality and unparalleled gallantry."
 croatian_the_glagolitic_lithurgy:0 "The Glagolitic Lithurgy"
 croatian_the_glagolitic_lithurgy_desc:0 "Our culture is defined by the unique privilege of the Glagolitic liturgy — the only place in the Catholic world where the Mass is sung in the native Slavic tongue. This tradition bridges the gap between the Latin cities and the Slavic heartland, creating a unified cultural identity. By preserving this ancient script, our people maintain a secret cultural language that reinforces their distinctiveness, providing a sense of national pride that resists assimilation by both the Italian and Germanic cultural spheres."
 croatian_the_illyrian_movement:0 "The Illyrian Movement"
 croatian_the_illyrian_movement_desc:0 "Over the last few years, our nation has witnessed the explosion of the #italic Illyrian Movement#!, a cultural and political revolution that seeks to unify all Croats under a single banner. This movement effectively aims to unify the disparate regions of our nation into a single, cohesive political and cultural national body. By standardizing the grammar and orthography, we will transform our medieval nation into a modern one, ensuring that the Croatian name, language, and statehood will never again be forgotten or suppressed."
 croatian_the_peasants_revolts:0 "The Peasants' Revolts"
 croatian_the_peasants_revolts_desc:0 "The crushing weight of feudal obligations in the face of constant war caused peasant revolts in the past. The peasantry rose not against us, but against the 'unjust' nobility who failed to protect them while demanding excessive tithes. Though these revolts have been usually brutally suppressed, they have left a lasting legacy of social consciousness and have transformed the relationship between the classes, forcing the state to eventually moderate its tax demands to maintain internal stability."
 crossroads_of_commerce:0 "Crossroads of Commerce"
 crossroads_of_commerce_desc:0 "Our $caravanserais$ support the flow of commerce, information, and people from $china$ to $europe$ across our lands. This proximity to important trade routes has unleashed a flood of affluence throughout our nation."
 crossroads_of_religions:0 "Crossroads of Religions"
 crossroads_of_religions_desc:0 "$hindu$, $buddhist$, $muslim$, and even $tengri$ are religions that have expanded into parts of the world very far from their places of origin. $asia$ has witnessed this exchange of beliefs for centuries, and in many cases the blending and syncretism that has happened among them."
 crown_power_advance_discovery:0 "Statecraft"
 crown_power_advance_discovery_desc:0 "As our ruler's authority becomes the dominant power in our domain, it highlights the need for a comprehensive government structure, as well as a proper bureaucratic corpus to manage it."
 crown_power_advance_reformation:0 "'Cuius Regio, Eius Religio'"
 crown_power_advance_reformation_desc:0 "While our ruler has a firm grasp over matters mundane, it is becoming a necessity that they also take control of heavenly concerns. Church and state must become one."
 crown_power_advance_renaissance:0 "Sovereignty"
 crown_power_advance_renaissance_desc:0 "Traditional governance required rulers to negotiate with estates and balance competing powers. Modern theories of government, however, establish the ruler as supreme authority within the realm — above all other institutions, estates, and subjects, while bowing to no earthly power."
 crown_power_advance_revolutions:0 "Nation"
 crown_power_advance_revolutions_desc:0 "After unifying all the powers under the iron fist of our leader, subjects across the nation have suddenly become aware of a sense of belonging. Whatever region our monarchs rule, they are part of the nation and its people all the same."
 crown_rights_laws_advance:0 "$crown_rights_laws$"
 crown_rights_laws_advance_desc:0 "$crown_rights_laws_desc$"
 crt_academy_of_the_stratioti_advance:0 "Academy of the Stratioti"
 crt_academy_of_the_stratioti_advance_desc:0 "The fierce Cretan mountain dwellers have been integrated into a professional light cavalry corps, blending Western discipline with the hit-and-run tactics of the Balkan frontier. We have established permanent training grounds where the sons of the local nobility and the Latin settlers learn the art of the #italic Saber and Carbine#! to protect the island's interior. These units are now exported as elite mercenaries to many states, providing a steady stream of military prestige and revenue."
 crt_the_council_of_the_two_peoples_advance:0 "The Council of the Two Peoples"
 crt_the_council_of_the_two_peoples_advance_desc:0 "The constant threat of external invasion and internal revolt led the Latin Kings of Candia to abandon the strict segregation of the early conquest. We have established a 'Great Council' where the ancient Venetian-descended nobility sits alongside the #italic Archontes#! (the Greek Orthodox landowning elite). This shared governance allows for a unified administrative front, where the military traditions of the West are funded by the deep roots of the local Greek bureaucracy, ensuring the island remains a stable and indigestible bastion for any would-be conqueror."
 crt_the_cretan_labyrinth_of_fortifications_advance:0 "The Cretan Labyrinth of Fortifications"
 crt_the_cretan_labyrinth_of_fortifications_advance_desc:0 "As new threats loom larger, the engineers of the nation have transformed the entire island into a maritime bastion of the #italic Trace Italienne#! style. By reinforcing the walls of Candia, Rethymno, and Chania with earthworks capable of absorbing heavy cannon fire, we ensure that every siege becomes a multi-decade ordeal for the invader. This infrastructure allows a small garrison to hold out indefinitely against a numerically superior foe while awaiting relief from the sea."
 crt_the_galley_assembly_line_of_suda_advance:0 "The Galley Assembly Line of Suda"
 crt_the_galley_assembly_line_of_suda_advance_desc:0 "By standardizing the parts used in the construction of light galleys at Suda Bay, we have pioneered an early form of modular shipbuilding. This allows us to replace lost vessels at a fraction of the time and cost of other Mediterranean powers. A ship built in Candia is recognized for its speed and its ability to navigate the treacherous currents of the Cretan Sea."
 crt_the_malvasia_wine_export_advance:0 "The Malvasia Wine Export"
 crt_the_malvasia_wine_export_advance_desc:0 "The sun-drenched slopes of Mount Ida produce the famed Malvasia grape, which has become the most coveted dessert wine in the royal courts of Northern Europe. By strictly regulating the quality and the #italic Seal of Saint Mark#! on every barrel exported, we have created a high-value trade monopoly that funds our naval defense. This liquid gold ensures that even as a colony, Candia remains the most profitable jewel in the Venetian maritime empire."
 crt_the_trapete_of_messara_advance:0 "The Trapete of Messara"
 crt_the_trapete_of_messara_advance_desc:0 "We have expanded the cultivation of sugarcane in the fertile Messara plain, building advanced water-powered mills (Trapete) for refining. Cretan sugar is now a luxury sought after by the courts of Europe, competing directly with the products of the Levant. This industrial-scale agriculture provides the crown with the gold needed to fund its naval supremacy."
 crusader_tradition:0 "Crusader Tradition"
 crusader_tradition_desc:0 "Knights of our Order were present in the wars against Saladin and defended the last Outremer Crusader outpost, $acre$. If any among us needs inspiration to do heroic deeds, they need to look only at what the Knights of the Order of the Hospital of St. John have accomplished in the past. The name Knights Hospitaller is truly eternal, as is our famed courage in battle."
 crusading_knights:0 "Baltic Crusades Experience"
 crusading_knights_desc:0 "In this country, we have a long tradition of sending our finest knights and aristocrats to spread the true faith to heathens in the $baltic_region$ and Mediterranean regions. We will fulfill our $christian_ADJ$ mission by bringing the faith to the unenlightened, while also acquiring experienced commanders for our armies."
 crush_the_barons:0 "Crushed Power of the Barons"
 crush_the_barons_desc:0 "Local barons still exert a large degree of power over the $NAP$ countryside. If we wish to continue centralizing our kingdom, we must crush the power of these barons, or risk them conspiring against us."
 csk_clans_of_tosa:0 "Clans of $tosa_province$"
 csk_clans_of_tosa_desc:0 "Our home province $tosa_province$ has always been divided between powerful clans. If we wish to expand our holdings, we must join forces with these other clans — they will help us rise up, and in return we will increase their power."
 csk_expand_the_navy:0 "Expand the Navy"
 csk_expand_the_navy_desc:0 "$japan_region$ is a nation of islands, and as a result, a strong navy is an absolute necessity. $tosa_province$ is an ideal place to begin building an armada of our own."
 csk_god_of_arts:0 "God of the Arts"
 csk_god_of_arts_desc:0 "The ancestral founder of our clan, Hata no Kawakatsu, was highly admired as the patron god of all art, from traditional dances to theater. Our clan must live up to his legacy if we are to earn the respect we deserve."
 csk_unification_of_shikoku:0 "Unification of Shikoku"
 csk_unification_of_shikoku_desc:0 "Shikoku is seen as a poor, isolated land by the rest of $japan_region$, where nothing of importance happens. Let them continue thinking that and overlook our unification of the island until it is too late."
 cth_beyond_the_pillars:0 "Beyond the Pillars"
 cth_beyond_the_pillars_desc:0 "It is time for our trade factories to reach beyond the mythical pillars of Hercules. Combining ancient colonization knowledge with modern discoveries allows us to settle more efficiently than other younger nations, those who are fairly new to this experience. $CTH_ADJ$ colonies shall soon be found all around the world!"
 cth_breadbasket_of_rome:0 "Breadbasket of Rome"
 cth_breadbasket_of_rome_desc:0 "Centuries ago, our advances in irrigation and olive cultivation earned $CTH$ the nickname of 'the breadbasket of Rome.' We will now consult our ancient agricultural knowledge, and once again do battle with the desert to plant our olive groves, just like in antiquity."
 cth_cothons:0 "Cothon"
 cth_cothons_desc:0 "The ancient Carthaginian #italic cothon#! was a technological marvel that helped facilitate efficient ship construction. Now, this great legacy will serve as a blueprint for our whole country. Studying ancient shipbuilding techniques allows us to excel in this area once again, and the $CTH_ADJ$ navy will soon dominate the Mediterranean."
 cth_legacy_of_hannon:0 "Legacy of Hannon"
 cth_legacy_of_hannon_desc:0 "Hannon the Sailor was a legendary ancient explorer who ventured far into the south of the African coast. We shall follow his example, and mount exploration voyages in order to restore our lost trading empire. This time, we will push our expeditions even further, seeking out fresh trading opportunities across the entire world."
 cth_mercenary_army:0 "Army of Mercenaries"
 cth_mercenary_army_desc:0 "Our ancestral empire did not have a massive population, so for centuries, we relied on mercenaries during war. Since the reformation of $CTH$ we have continued that tradition to save our population from dangers of the battlefield."
 cth_merchant_legacy:0 "Merchant Legacy"
 cth_merchant_legacy_desc:0 "Phoenician trade fleets traveled through the Mediterranean for centuries. This economic legacy means that we are more efficient — and ruthless — when it comes to trade. We shall once again preside over the ebb and flow of goods!"
 cth_phoenician_sailors:0 "Phoenician Sailors"
 cth_phoenician_sailors_desc:0 "After restoring our ancient kingdom, we started reaching out to our Phoenician brothers in Libya. As a result, we have a steady influx of volunteers that want to join the restoration of the ancient Phoenician kingdom of $CTH$. It seems we can maintain a much bigger navy now..."
 cth_punic_global_trade:0 "Punic Global Trade"
 cth_punic_global_trade_desc:0 "For centuries, our nation dominated the Mediterranean trade. Now, with all the new discoveries made in the centuries since, we stand poised to dominate the globe. Soon, there will be a $CTH_ADJ$ trading vessel in every port in this world!"
 cth_sufet_rule:0 "Rule of Šūfeṭ"
 cth_sufet_rule_desc:0 "Our ancient kingdom was headed by an elected head of state called the #italic Šūfeṭ#!. In this new modern age, we shall reorganize our government, taking experience from antiquity and combining it with modern theories to create a powerful Republican system, one that will outshine every Republic created up to this date!"
 cth_wine_traders:0 "Punic $wine$ Trade"
 cth_wine_traders_desc:0 "In ancient times, we created a $wine$ trading pipeline by producing large amounts of low-quality $wine$ to trade, and importing the good stuff for ourselves. Building on that tradition, we are looking into expanding our $wine$ production capabilities — we #italic will#! dominate the $wine$ trade in the Mediterranean!"
 cultivate_the_land:0 "Cultivate the Land"
 cultivate_the_land_desc:0 "The jungle is a harsh environment in which to live, especially for farming cultures. Clearing portions of the jungle to create arable land is therefore one of our most vital tasks. We must organize our people in such a way that we can employ large labor forces to carry out these works whenever the need arises."
 cultural_acceptance_advance:0 "Cultural Acceptance"
 cultural_acceptance_advance_desc:0 "It is apparent that as we absorb other peoples into our nation, the foreign traditions they bring with them may cause friction with our own. One way of resolving this is to simply tolerate such foreigners as if they were our own kinsmen, and not to attempt to subdue them to our culture."
 cultural_melting_pot:0 "Cultural Melting Pot"
 cultural_melting_pot_desc:0 "$asia$ is a highly diverse region, home to a wide variety of cultures. This diversity, and the cultural exchange and blended influences that result from it, has empowered our countries and allowed them to flourish in every domain from architecture to music to horticulture, and beyond."
 cultural_ties:0 "Cultural Ties"
 cultural_ties_desc:0 "Different cultures have different customs, and for some reason, they tend to resist attempts from their rulers to change said customs. We can turn this weakness into a strength by incorporating local leaders into our system of government and having them carry out our will in a way that will be palatable to their people."
 cultural_traditions_law_advance:0 "$cultural_traditions_law$"
 cultural_traditions_law_advance_desc:0 "$cultural_traditions_law_desc$"
 cultures_capacity_mil_choice:0 "Multicultural Ambitions"
 cultures_capacity_mil_choice_desc:0 "A country's expansion will inevitably result in it bringing other cultures into its fold. Thus, if we want to further expand our borders, we need to be prepared to become more multicultural."
 cunning_diplomacy:0 "Cunning Diplomacy"
 cunning_diplomacy_desc:0 "Under the visionary leadership of our rulers, we will achieve the geopolitical impossible: the unification of all Romanian lands under a single banner. This 'Great Idea' will ignite a latent national consciousness that will transcend ancient feudal borders, proving to the world that a unified #italic Dacia#! can stand as a European Great Power in its own right. This vision will set the legal, military, and symbolic precedents that will provide us with a permanent, historical claim to regional hegemony and the eventual gathering of all Romanians."
 cupola_smelting:0 "Cupola Smelting"
 cupola_smelting_desc:0 "Using a cylinder-shaped furnace, this method provides a cheap and efficient process of smelting iron, with the unique ability of continuous smelting."
 custom_union_of_the_rhine:0 "Rheinischer Münzverein"
 custom_union_of_the_rhine_desc:0 "In the sprawling patchwork of our great empire, cooperation and collaboration between neighboring groups is vital to the health of our economy. We shall join the customs union of the Rhine and adopt their #italic gulden#! coins to make business transactions less complicated for our merchants, and streamline our international diplomacy."
 customs_house_advance:0 "Customs House"
 customs_house_advance_desc:0 "$customs_house_desc$"
 cyril_and_methodius:0 "Cyril and Methodius"
 cyril_and_methodius_desc:0 "Two $BYZ_ADJ$ theologians from the 9th century, these men were instrumental to the evangelization of the Slavs. They are credited for developing the Glagolitic alphabet, the first one to ever be used to transcribe $church_slavonic_language$, and their followers later developed the Cyrillic alphabet, naming it after Cyril in his honor."
 dah_children_of_the_panther:0 "Children of the Panther"
 dah_children_of_the_panther_desc:0 "Our ancient legends state that our royal line is descended from the union of a princess and a panther. This ancient and mystical tale will enhance our prestige and fame."
 dah_dahomey_palaces:0 "Palaces of Abomey"
 dah_dahomey_palaces_desc:0 "Building a sprawling palace complex in our capital would be an elegant, yet imposing demonstration of our power. Any who may consider taking up arms against us will surely be deterred by the sight of our sumptuous palaces."
 dah_lagredis:0 "Lagredis"
 dah_lagredis_desc:0 "By secretly placing male courtiers disguised as royal wives in the harem, they will be able to act unseen as the king's eyes and ears, especially in matters of palace intrigue."
 dah_migan_mehu:0 "Migan and Mehu"
 dah_migan_mehu_desc:0 "The Migan and the Mehu are the ruler's two chief ministers. One oversees the north, the other the south; one oversees justice, the other commerce. Together, they bring stability and prosperity."
 dah_slave_hunts:0 "Slave Hunts"
 dah_slave_hunts_desc:0 "While raiding the surrounding territories, we obtain slaves who cannot only be employed economically or bartered to our neighbors, but who can serve in our armies. In this way, we will increase the number of fighters that can be called to arms."
 dah_yovogan:0 "The Yovogan"
 dah_yovogan_desc:0 "As more and more foreigners are coming to our shores, we should establish a new office in our government to study and learn from their ways, so that we may benefit from this exchange of cultures."
 dahomey_amazons:0 "Dahomey Amazons"
 dahomey_amazons_desc:0 "A corp of female warriors, recruited from among the king's wives. They have earned their reputation as mythological Amazons due to their ferocity in battle and the fear they strike in the ranks of their opponents. These $dahomey_amazons$ are entirely devoted to $DAH$ and its interests."
 dai_ca_tru:0 "Ca Trù"
 dai_ca_tru_desc:0 "The $dai_ca_tru$ is a $vietnamese_culture$ genre of musical storytelling which serves both entertainment and religious purposes."
 dai_confucian_administration:0 "Confucian Administration"
 dai_confucian_administration_desc:0 "Our state bureaucracy is obviously of the utmost importance, and as such, we select only the most capable administrators to hold government office. Learned in the Confucian texts of $CHI$, these bureaucrats ensure smooth and stable bureaucratic operations."
 dai_don_dien:0 "Đôn Điên"
 dai_don_dien_desc:0 "The $dai_don_dien$ is a system which utilizes military colonies, in which soldiers and landless peasants clear the area for the establishment of new villages. These villages are then incorporated into our administrative system after three years, and the people who cleared the land may then claim and work it."
 dai_giao_chi_arquebus:0 "Giao Chỉ Arquebus"
 dai_giao_chi_arquebus_desc:0 "The $dai_giao_chi_arquebus$ is a staple of our military. Self-produced and adapted to the specific needs of our troops, this type of arquebus gains praise from not only $chinese_group$ people, but also Western observers."
 dai_hung_dao_trans_military_feats:0 "$dai_tran_hung_dao$ Tactics"
 dai_hung_dao_trans_military_feats_desc:0 "$dai_tran_hung_dao$ was an Imperial Prince of $DAI$ long ago. He served as officer during the first $MGE_ADJ$ invasion of $DAI$ in 1258, and as leading commander during the second war against the $MGE_ADJ$s in 1285 and their third attempt in 1287. During these bloody conflicts, $dai_tran_hung_dao$ managed to develop tactics which reliably repelled the oncoming onslaught of cavalry."
 dai_lang:0 "Viet Autonomous Villages"
 dai_lang_desc:0 "The Vietnamese countryside is built upon the enduring strength of the #italic làng#!, autonomous villages that embody the principle: 'customs of the village outweigh the laws of the king.' In a land of rugged mountains and winding rivers, these communities govern themselves, raise local militias, collect taxes efficiently, and uphold royal authority at the grassroots."
 dai_literary_reform:0 "Literary Reform"
 dai_literary_reform_desc:0 "For centuries, we used $classical_chinese_language$ to write our documents. However, the script used to write our language is Chữ Nôm, a native script based on Chữ Hán, the script of $classical_chinese_language$. Chữ Nôm was non-standardized and not used often enough compared to $classical_chinese_language$, so there has been some pressure to reform the script and make it more suitable for our administrative purposes."
 dai_nha_nhac:0 "Nhã Nhạc"
 dai_nha_nhac_desc:0 "The $dai_nha_nhac$ is the traditional music played at our courts and performed at annual ceremonies. It is a prominent aspect of our culture, and a pillar of our traditions."
 dai_thuan_thien:0 "Thuận Thiên"
 dai_thuan_thien_desc:0 "$dai_thuan_thien$, or Heaven's Will, is the name of the legendary sword wielded by our liberator, Lê Lợi. According to the tales, the sword gave him the strength of a thousand men, enough to finally throw off the yoke of $CHI_ADJ$ rule. Many in our country look upon Lê Lợi as the perfect embodiment of the ideal leader."
 dai_trade_advance:0 "Trading Contracts"
 dai_trade_advance_desc:0 "Our existence has been shaped by $CHI$ for too long. To leave our own mark on the world, we must expand our reach beyond the $chinese_group$ sphere of influence."
 dai_vietnamese_architecture:0 "$vietnamese_culture$ Architecture"
 dai_vietnamese_architecture_desc:0 "Though influenced by the $chinese_group$, our architecture remains distinct and unique to our state. While still following the concepts of Fēng Shuǐ, many typical $chinese_group$ elements have been left out or adapted to our unique environment."
 dal_adriatic_oak_galleys:0 "Adriatic Oak Galleys"
 dal_adriatic_oak_galleys_desc:0 "Recognizing that the Mediterranean is becoming a sea of fire, we have commissioned a new class of heavy, oak-reinforced oared vessels built in our best shipyards. By utilizing the iron-hard timber of the coastal mountains, these ships can withstand heavier broadsides and are designed to navigate the shallow, rocky karst inlets where large Venetian galleys founder. This superiority allows us to police our own waters and defend our coasts from any enemy."
 dal_comune_privileges:0 "Comune Privileges"
 dal_comune_privileges_desc:0 "To secure the loyalty of the coastal cities against Venetian encroachment, we will issue privileges that guarantee the internal autonomy and Latin laws of those comunes (a unit of government). By allowing these cities to elect their own priors and manage their own local taxes, we create a loyal urban class that views us as a protector rather than an oppressor. This decentralized urban defense ensures that the coast is a patchwork of loyal, fortified comunes that can hold out against maritime raids, bringing the coasts and inner lands together."
 dal_dalmatian_olive_pacts:0 "Dalmatian Olive Pacts"
 dal_dalmatian_olive_pacts_desc:0 "We have pivoted our economy toward intensive agriculture, taking advantage of the climate of the Dalmatian coast. By establishing state-monitored 'Agricultural Pacts', we have reclaimed the coastal hills for large-scale production, turning our rugged land into a green garden of exports. This economic diversification reduces our reliance on the maritime trade and provides a new source of wealth for the coastal nobility, funding the construction of grand summer villas and urban theaters that rival those of the Italian mainland."
 dal_morlach_frontier_levies:0 "Morlach Frontier Levies"
 dal_morlach_frontier_levies_desc:0 "We have integrated the Morlachs — the fierce Vlach and Slavic shepherds of the interior — into a permanent military reserve. These irregulars are granted land rights in exchange for constant readiness, serving as the eyes and ears of the nation. Their intimate knowledge of the karst geography allows us to conduct deep-strike ambushes and night raids that paralyze the enemy's logistics. This creates a 'Nation in Arms' culture in the Dalmatian hinterland, where the boundary between civilian and soldier is entirely erased in the name of our defense."
 dal_the_soldato_dalmantine:0 "The Soldato Dalmantine"
 dal_the_soldato_dalmantine_desc:0 "As we consolidate our rule, we have turned our population into the 'Sword of the Nation'. Our men are recruited into elite #italic Schiavoni#! (Slavic) regiments, serving as the frontline heavy infantry for our wars. This military service provides our people with professional training and exposure to the latest European warfare techniques, creating a culture of career soldiers. While our cities may lose their mercantile edge, our people become the most respected warriors in the Mediterranean, ensuring that our military tradition remains unbroken even under foreign administration."
 dal_the_union_of_the_two_souls:0 "The Union of the Two Souls"
 dal_the_union_of_the_two_souls_desc:0 "The Dalmatian culture has matured into a truly bilingual society where Latin is the language of the law and Slavic is the language of the heart. This linguistic flexibility allows our people to navigate the complex social strata of the Renaissance Adriatic with ease. By mastering both tongues, our merchants and sailors become the indispensable intermediaries for all trade between the Italian city-states and the Slavic interior. This bilingualism creates a 'Dalmatian Bridge' culture that is uniquely adapted to international trade and diplomacy, ensuring that our people are always at the center of Mediterranean commerce."
 dalmatian_mediterranean_cosmopolitanism:0 "Mediterranean Cosmopolitanism"
 dalmatian_mediterranean_cosmopolitanism_desc:0 "Centuries of maritime trade and bilingualism have produced a culture of Cosmopolitanism, where our people are at home in any port from Venice to the Levant. This cultural openness allows us to absorb and adapt the best ideas from across the globe, creating a society that is uniquely flexible and resilient. Our people are the 'citizens of the sea', possessing a world-view that is far broader than that of the landlocked interior. This cosmopolitan spirit ensures that the Dalmatian culture remains vibrant and commercially successful, serving as the 'window to the world' for the entire Balkan Peninsula."
 dalmatian_the_accademia_degli_oziosi:0 "The Accademia degli Oziosi"
 dalmatian_the_accademia_degli_oziosi_desc:0 "Modeled after the Italian literary academies, the intellectuals of our cities have founded societies like the #italic Accademia degli Oziosi#! to discuss physics, astronomy, and classical poetry. These 'Idle' scholars are anything but — they serve as the scientific advisors to the naval admiralties, applying the new Baroque rationalism to cartography and ballistics. This cultural institutionalization of curiosity ensures that the Dalmatian urban centers remain the 'Scientific Watchtowers' of the Adriatic, preserving the coast as a hub of European Enlightenment even as the interior of the Balkans remains locked in traditionalist cycles."
 dalmatian_the_cult_of_the_local_patron_saint:0 "The Cult of the Local Patron Saint"
 dalmatian_the_cult_of_the_local_patron_saint_desc:0 "Every Dalmatian city is anchored by the intense veneration of its own unique patron — Saint Chrysogonus in Zadar, Saint Domnius in Split, Saint Tryphon in Kotor. These saints are not just religious figures; they are the 'Foundational Sovereigns' of the city. Their feast days are the primary social and political events of the year, uniting all classes in a shared ritual that reinforces the city's independent identity. This intense localism ensures that Dalmatian culture is a mosaic of fiercely independent urban identities, making it impossible for any foreign power to culturally dominate the entire coast at once."
 dalmatian_the_guild_of_the_stone_master:0 "The Guild of the Stone-Master"
 dalmatian_the_guild_of_the_stone_master_desc:0 "The abundant, bone-white limestone of the coast has birthed a culture of master stone-cutters who view the karst as a canvas. Our craftsmen have developed a 'Gothic-Renaissance' style that is world-renowned for its structural innovation and delicate carving. This is not merely art; it is a physical statement of our permanence. By building every church, palace, and city wall from local stone, our people create a landscape that is both beautiful and indestructible, fostering a national pride that views the Dalmatian town as a sacred, eternal monument to our skill that no sea-borne empire can truly erase."
 dalmatian_the_high_chancery_style:0 "The High Chancery Style"
 dalmatian_the_high_chancery_style_desc:0 "The Dalmatian patriciate has adopted the 'High Dalmatian' literary standard for their private correspondence and diplomatic registries, emulating their Italian Peninsula counterparts. This cultural pivot away from the medieval Latin towards the refined vernacular aligns the coastal cities with the heart of the Italian Renaissance. This shared linguistic aesthetic creates a seamless intellectual bridge with the Venetian #italic Studio#!, allowing Dalmatian poets and lawyers to participate in the most exclusive humanist circles of Italy. This 'Linguistic Refinement' ensures that our diplomats are regarded as cultural peers in any Western court, providing a diplomatic shield based on shared civilization rather than raw military force."
 dalmatian_the_maritime_commune_spirit:0 "The Maritime Commune Spirit"
 dalmatian_the_maritime_commune_spirit_desc:0 "Our culture is defined by the Commune, where every citizen's honor is tied to the prestige of their city. This spirit of urban competition drives our people to build more beautiful cathedrals and faster ships than their neighbors, creating a culture of extreme local pride and innovation. This 'City-State' mentality ensures that our people are highly invested in their local governance and defense, fostering a population that is exceptionally resilient and self-reliant, capable of managing its own affairs even when the central crown is distant or weak."
 dan_admiralty_college:0 "College of the Admiralty"
 dan_admiralty_college_desc:0 "With the establishment of a centralized college to train our naval commanders, we will be able to produce skilled leaders familiar with our coastal waters. This will improve our marine defense strategy, and ultimately better safeguard $DAN_ADJ$ sovereignty."
 dan_danish_agriculture:0 "Agricultural Focus"
 dan_danish_agriculture_desc:0 "While the $DAN_ADJ$ terrain is relatively poor in terms of rare materials available to exploit, they make up for it with agricultural abundance. We shall focus on optimizing our farming and food production, safeguarding our people against future periods of famine."
 dan_danish_legislation:0 "$DAN_ADJ$ Legislation"
 dan_danish_legislation_desc:0 "The regional laws of Jutland, Zealand and Scania formed the basis of our legal code for centuries. For the benefit of our realm, we should compile and unify these laws into a single comprehensive legal system, which will be known as the #italic Danske Lov#!."
 dan_danish_orthodoxy:0 "Religious Uniformity"
 dan_danish_orthodoxy_desc:0 "In the tumultuous religious landscape of $europe$, we must set $DAN$ on the path to righteousness, and remain true to the doctrines of our church."
 dan_expanded_dockyards:0 "The $kobenhavn$ Dockyard"
 dan_expanded_dockyards_desc:0 "Our country has a long and proud history of shipbuilding. Our experienced shipwrights need a modern and spacious dock in which to construct a navy worthy of calling itself $DAN_ADJ$. The waters around $kobenhavn$ are the perfect place to construct such a dockyard."
 dan_levy_recruitment:0 "Reliance on Levies"
 dan_levy_recruitment_desc:0 "Our domain is protected by natural barriers, namely the Jutland Peninsula and the $DAN_ADJ$ archipelago. This defensive geography is extremely helpful when we are under attack, as it gives us time to raise levies before our enemies can reach our core territory."
 dan_old_naval_traditions:0 "$DAN_ADJ$ Sea Networks"
 dan_old_naval_traditions_desc:0 "Every part of our country is surrounded by the waters of the Baltic and North Seas. This gives us the unique advantage of being able to utilize waterways for both transport and communication, considerably shortening the time it takes to travel between regions."
 dan_reliance_mercenaries:0 "Reliance on Mercenaries"
 dan_reliance_mercenaries_desc:0 "$DAN$ cannot rely on a vast population to supply their armies. Therefore, we need to ensure that mercenary companies are willing to serve our state, while guaranteeing their loyalty with solid contracts."
 dan_rentekammer_advance:0 "Rentekammeret"
 dan_rentekammer_advance_desc:0 "By establishing a separate department for our Treasury, the #italic Rentekammeret#!, we will have better control over our finances and be able to run the government more efficiently. With the documentation of all our financial records, we will be able to estimate our future expenditures more easily, stabilizing our finances."
 dan_royal_danish_navy:0 "$DAN_ADJ$ State Navy"
 dan_royal_danish_navy_desc:0 "Our country is surrounded by water, and therefore vulnerable to domination by any power with a large enough fleet. To ensure this will never happen, we must fund a navy capable of protecting our coastline and projecting our power over the north of $europe$."
 dan_royal_life_guards:0 "Royal Life Guards"
 dan_royal_life_guards_desc:0 "The Royal Life Guards are an elite $DAN_ADJ$ regiment that also serve as the ruler's personal guard and perform ceremonial duties."
 dan_rulers_of_the_north:0 "True Rulers of the North"
 dan_rulers_of_the_north_desc:0 "The rulers of $DAN$ have claimed overlordship over the Nordic regions for centuries. Embellishing the legacy of Kings like Canute 'the Great' will grant us the internal and external legitimacy needed to support our assertions."
 dan_scanian_regiment:0 "Scanian Regiment"
 dan_scanian_regiment_desc:0 "The Scanian Regiment is a military unit composed of drafted peasants, established to reduce reliance on mercenary forces and build a more organized standing army under direct royal authority."
 dan_trading_economy:0 "A Maritime Nation"
 dan_trading_economy_desc:0 "We cannot produce everything we need to maintain economic stability on our own. We must instead rely on a stable trade network to export our goods and import everything that we ourselves are not able to produce."
 dana:0 "Dāna"
 dana_desc:0 "Denoting generosity, $dana$ is defined as the act of giving without anything in return, and is a key virtue in all religions related to the Dharma. Helping others selflessly, whereas individually or communally, is one of the key ways of accumulating karma."
 danish_heritage:0 "$DAN_ADJ$ Dockyard Legacy"
 danish_heritage_desc:0 "$DAN$'s long naval traditions and its mastery of maritime logistics culminated in major dockyards like those in $kobenhavn$. As $SCA$, we inherit these powerful infrastructures and traditions, boosting our diplomatic standing and naval readiness."
 danka_system:0 "Danka System"
 danka_system_desc:0 "For centuries, households in $japan_region$ have had close relationships with local $buddhist_ADJ$ temples, giving them financial patronage in exchange for the temples taking care of their spiritual needs. Formally enforcing this system will keep our people devoted to the faith, and secure the vital role our religion plays in society."
 debt_and_loans:0 "Debt and Loans"
 debt_and_loans_desc:0 "Debt is sometimes simply unavoidable. However, an organized debt market will allow us to float loans at a lower interest rate."
 defense_against_heretics:0 "Defense Against Heretics"
 defense_against_heretics_desc:0 "Ever since our split from other $christian_ADJ$ faiths, the heretics have come to us with accusations and condemnations many times. They may call themselves $christian_ADJ$, but their views are obviously clouded, whereas our vision is made clear by the light of God."
 defense_of_the_faith:0 "Defense of the Faith"
 defense_of_the_faith_desc:0 "We have been driven from $acre$ and $CYP$, but the Order of the Hospital of St. John will retreat no further. In pagan times, a Colossus stood sentinel over the harbor of Rhodes, but today, the greatest fortifications the world has ever known have taken up the guard!"
 defenses_of_novgorod:0 "Defenses of $NOV$"
 defenses_of_novgorod_desc:0 "The Republic of $NOV$ is the target of many external threats. But be it the western heretics from $scandinavian_region$, the rampaging Germans to our southwest, or even other $RUS_ADJ$ powers to our south; they all shall all crumble at the feet of our unbreakable fortifications."
 defensive_army:0 "Defensive Army"
 defensive_army_desc:0 "The rise of many powerful states around us has hastened our need for a robust defensive force, as we intend to maintain our territorial integrity. Knowledge of our homeland's native terrain, hidden paths, and regional tactics will see us through this turbulent period."
 defensive_mentality:0 "Defensive Mentality"
 defensive_mentality_desc:0 "There are those who think that attack is the best form of defense, but that is foolish. Let our enemies come to us instead; we shall counter with incredible zeal. Our troops will defend their homes tenaciously, and our fortresses will withstand sieges for longer."
 deliberative_council:0 "Deliberative Council of Princes and Ministers"
 deliberative_council_desc:0 "Originally called the 'Council of Deliberation', this body evolved from informal institutions that promoted collaborative governance among the leaders of the realm. The Council's structure has been transformed, focusing on collective aristocratic governance and policy deliberations, mainly in foreign and military affairs. Membership is restricted to military leaders from outside the imperial clan, ensuring elite participation while maintaining the ultimate authority of the ruler."
 denounce_heretics:0 "Denunciation of Heretics"
 denounce_heretics_desc:0 "We must ensure the supremacy of the one true faith, and denounce all criticisms of it as the bitterest of heresy."
 desert_power:0 "Desert Power"
 desert_power_desc:0 "Our region is inhabited by many peasants and tribal groups, who represent the lower classes of our society. Despite their relative poverty, they command great influence over trade routes that cross the barren deserts between our cities. Bringing these people under our jurisdiction, and ensuring their allegiance, will help us establish ourselves as powerful scions of the desert."
 deus_vult:0 "Deus Vult"
 deus_vult_desc:0 "Join the battle cry of the Crusades — 'God wills it' — and crush the heretics!"
 develop_qeshm_and_ormuz:0 "Invest in Qeshm and $ORM$"
 develop_qeshm_and_ormuz_desc:0 "Though dry and rocky, the islands of Qeshm and $ORM$ have sustained urban life thanks to careful provisioning and rich trade. With proper investment, their ports and workshops can flourish further, turning them from logistical hubs into centers of innovation and productivity."
 development_of_maritime_law:0 "Development of Maritime Law"
 development_of_maritime_law_desc:0 "With more and more countries sending their subjects or citizens abroad on various trading ventures and with so many living so close to each other for so long times it has become absolutely essential to have at least a basic concept of common laws of the seas. With publications such as 'Mare Liberum' or the later 'De Dominio Maris Dissertatio', the foundations to an international law of the seas have been laid."
 devotio_moderna:0 "Devotio Moderna"
 devotio_moderna_desc:0 "The #italic Devotio Moderna#!, or modern devotional movement, is rapidly gaining popularity among members of our faith. We should implement some of their teachings into our court, so as to make ourselves appear particularly devout."
 devotionalism:0 "devotionalism"
 devotionalism_desc:0 "We must revive Augustinian theology, and recognize that our beliefs are built on the emotions and fervor of the faithful."
 devoutness:0 "Devotion"
 devoutness_desc:0 "Religion is one of the most important bulwarks of our rulership. By making grand displays of our religious devotion in public, we will inspire the people to follow suit, and this proliferation of piety amongst our people will strengthen our rule."
 diocese_of_smolensk:0 "Diocese of $SMO$"
 diocese_of_smolensk_desc:0 "Once a spiritual stronghold of $orthodox_ADJ$ $christian$ and home to one of the oldest bishoprics in the region, the Diocese of $SMO$ embodies our people's unshakable faith."
 dip_choice_subject_opinions:0 "Subject Emissaries"
 dip_choice_subject_opinions_desc:0 "Continued communication with our subject nations through dedicated emissaries will positively impact our relations, strengthening the core of our domain and ensuring the loyalty of all countries that stand under our banner."
 diplomatic_capacity_traditions:0 "Expanded Archives"
 diplomatic_capacity_traditions_desc:0 "Regular diplomatic endeavors require paperwork and detailed documentation of our contacts."
 diplomatic_corps:0 "Diplomatic Corps"
 diplomatic_corps_desc:0 "Through the establishment of a professional diplomatic corps, we will ensure that the hard-earned knowledge of senior diplomats is passed on to the younger generation."
 diplomatic_influence:0 "Diplomatic Influence"
 diplomatic_influence_desc:0 "By focusing on diplomacy, we can increase the power we wield on the world stage, and win many friends and potential allies."
 diplomatic_range_age_1:0 "Foreign Envoys"
 diplomatic_range_age_1_desc:0 "Diplomacy between countries has always been important. However, the art of diplomatic maneuvering is growing in intensity and complexity, and it has become common to send our envoys ever further afield than before to expand our foreign relations."
 diplomatic_range_age_2:0 "Diplomatic Network"
 diplomatic_range_age_2_desc:0 "Maintaining an established network of skilled diplomats around us allows us to send envoys to countries even further away."
 diplomatic_range_age_3:0 "Embassies"
 diplomatic_range_age_3_desc:0 "The current international situation requires that we set up permanent offices for our diplomats in neighboring countries. It is the only way to ensure that our interests are upheld in our region while we extend our reach beyond it."
 diplomatic_range_age_5:0 "Diplomatic Missions"
 diplomatic_range_age_5_desc:0 "The complexity of modern politics can no longer be handled by single envoys. To expand our influence even further and protect our interests in those faraway places, we will send skilled teams of expert diplomats to each country."
 diplomatic_range_age_6:0 "Global Embassies"
 diplomatic_range_age_6_desc:0 "With every nation trying to expand its reach even farther, the world has become more interconnected than ever before. Only establishing permanent embassies all over the globe can allow this interconnectivity to sustain itself."
 diplomatic_training:0 "Diplomatic Training"
 diplomatic_training_desc:0 "Our diplomatic playbook has been refined, and as a result, we have added excellent diplomats to our entourage in an attempt to bolster our foreign efforts."
 discipline_drills:0 "Disciplined Drills"
 discipline_drills_desc:0 "During combat, only three things matter: firepower, manpower, and the discipline to combine the two. Regular military drills and exercises shall elevate our to a new standard."
 distant_trade_ventures:0 "Distant Trade Ventures"
 distant_trade_ventures_desc:0 "It is from the most distant places that the most lucrative trade goods come. For many years, $muslim_ADJ$ traders have traveled huge distances both on land and across the seas in search of profitable trade opportunities."
 distiller_manufactory_advance:0 "$distiller_manufactory$"
 distiller_manufactory_advance_desc:0 "$distiller_manufactory_desc$"
 distiller_mill_advance:0 "$distiller_mill$"
 distiller_mill_advance_desc:0 "$distiller_mill_desc$"
 distillers_workshop_advance:0 "$distillers_workshop$"
 distillers_workshop_advance_desc:0 "$distillers_workshop_desc$"
 distribution_of_power_advance:0 "$distribution_of_power_law$"
 distribution_of_power_advance_desc:0 "$distribution_of_power_law_desc$"
 diversity_of_beliefs:0 "Diversity of Beliefs"
 diversity_of_beliefs_desc:0 "The beliefs of the people of $india$ center around the concept of Dharma and the text of the $vedah$, but they are manifested in a myriad of forms and practices. Even the gods recognized and worshiped are not the same for everyone, but a common thread of concepts is present throughout."
 divide_estates:0 "Divide the Estates"
 divide_estates_desc:0 "United, the three estates form an effective block against the power of the ruler. To consolidate our control, we must systematically leverage the nobility against the other estates."
 divine_church_music:0 "Divine Church Music"
 divine_church_music_desc:0 "Many of our composers have created their greatest works thanks to the inspiration provided by their faith. We should actively seek out the most talented artists and hire them immediately so as to never let our churches and cathedrals suffer from inferior music."
 divine_passion:0 "Divine Passion"
 divine_passion_desc:0 "Times are changing. Faith was once the most important thing in our lives, but now, ideas once seen as blasphemous are spreading among the common folk. In the face of an evolving world, our clergy finds solace in their unshaken dedication to our cause."
 divine_supremacy:0 "Divine Supremacy"
 divine_supremacy_desc:0 "It is of the utmost importance that we rid our nation and its surrounding borders of the non-believers that plague our lands."
 diwali:0 "diwali"
 diwali_desc:0 "Called the festival of light, $diwali$ is when we celebrate the triumph of the Dharma; the victory of good over evil and light over darkness. We will light candles and lanterns to symbolize this victory, and we will honor our ancestors."
 dlh_afghan_nobility:0 "$afghan_culture$ Nobility"
 dlh_afghan_nobility_desc:0 "Much of the $DLH_ADJ$ nobility is drawn from the ranks of the $afghan_culture$ community, a people with a long history of conquest and rule in northern $india$. Though at times a political hindrance, their martial skills are beyond question."
 dlh_cosmopolitan_religions:0 "Cosmopolitan Religions"
 dlh_cosmopolitan_religions_desc:0 "$india$ is a massive subcontinent with several religions present. In order to ensure stability within our realm, we should expand the rights of the different faiths, and secure the loyalty of their worshippers."
 dlh_grand_trunk:0 "Protect the Grand Trunk Road"
 dlh_grand_trunk_desc:0 "The Grand Trunk Road runs from $kabul$ in Afghanistan to the coast of $bengal_area$. Many of the most important trading cities along its route are part of our empire, and so it falls to us to ensure that the road is well maintained and free of banditry."
 dlh_hindustani_identity:0 "$HIN_ADJ$ Identity"
 dlh_hindustani_identity_desc:0 "Foreign ideas of nationalism and cultural identity have reached $india$. While the cultural diversity of $india$ will remain high, it is clear that our geography, as well as the values of $muslim$, give us all a sense of unity in the form of a $HIN_ADJ$ identity."
 dlh_indo_persian_culture:0 "Indo-Persian Culture"
 dlh_indo_persian_culture_desc:0 "$persian_language$ has been the dominant language of the court ever since the first inception of the $DLH_ADJ$ Sultanate. As such, the influence of $persian_language$ has synthesized with local Indian cultures."
 dlh_origin_of_hindustani:0 "Origin of $hindustani_language$"
 dlh_origin_of_hindustani_desc:0 "The $hindustani_language$ language developed from Apabhramsa — a Middle Indo-Aryan language — and emerged as the contact language of $DLH$. As $hindustani_language$ has influences from $persian_language$, $arabic_language$, and Turkic but also Old Hindi, diplomacy with the $muslim_ADJ$ world and the $hindu_ADJ$ world becomes an uncomplicated task."
 dlh_reintegrate_former_provinces:0 "Re-integrate Former Provinces"
 dlh_reintegrate_former_provinces_desc:0 "The once vast $DLH_ADJ$ Sultanate has lost most of its former possessions, but we have not forgotten the means of administering them. As we work towards restoring our past glory, we will remind local rulers of their duties to the Sultan."
 dlh_restore_the_delhi_empire:0 "Restore the Greatness of $DLH$"
 dlh_restore_the_delhi_empire_desc:0 "The $DLH_ADJ$ Sultanate once encompassed nearly all of $india$. It must rise again!"
 dlh_revert_ghiyath_reforms:0 "Revert Ghiyath's Reforms"
 dlh_revert_ghiyath_reforms_desc:0 "The foolish economic decisions of Ghiyath al-Din have brought nothing but financial ruin to the state of $DLH$. We must revert his madness and restore the usage of gold and silver for our coins."
 dlh_revive_the_tughlaq_architecture:0 "Tughlaq Architectural Revival"
 dlh_revive_the_tughlaq_architecture_desc:0 "During the height of the $tughlaq$ dynasty and the most stable period of our state, great architects and artists of grand vision constructed mosques and tombs in the unique Tughlaq style. As the decades went on and our power was challenged by internal issues, the resources for maintaining this architecture faded. It is time to revive it, and re-establish $DLH$ as an empire of art and wonders."
 dlh_textile_innovation:0 "Innovative Textile Production"
 dlh_textile_innovation_desc:0 "The thriving textile industry in $DLH$ makes our nation a hotspot for related technological innovations. As early adopters of the cotton gin and worm gear roller, we know the importance of staying ahead of the curve in these matters. We must now ensure that the spinning wheel is adopted as widely as possible."
 dlh_throne_of_india:0 "Indian Throne"
 dlh_throne_of_india_desc:0 "For centuries, every great Indian empire has been ruled from $delhi$. It is the seat of conquerors and our birthright. All must know that $delhi$ is once again home to the rightful ruler of all $india$!"
 dlh_turkic_conqueror_roots:0 "$turkic_group$ Conqueror Roots"
 dlh_turkic_conqueror_roots_desc:0 "Although we call $india$ our home, the ancestors of our state were of $turkic_group$ origins. Their early successes as conquerors and rulers from the days of the $mamluk$ dynasty, as well as the achievements of the following Khalji dynasty, inspire our military and diplomats alike to push the borders of $DLH$ into every corner of $india$."
 dock_advance:0 "Dock"
 dock_advance_desc:0 "$dock_desc$"
 donation_of_constantine:0 "Donation of Constantine"
 donation_of_constantine_desc:0 "The Donation of Constantine demonstrates our authority to bestow the title of the Emperor of the Romans upon whomsoever we choose. It may also prove that we are rather good at forging documents."
 double_patriarchate:0 "Double Patriarchate"
 double_patriarchate_desc:0 "Both $alexandria$ and $antioch$ see themselves as having two different patriarchates, one for $miaphysite$ and another for $orthodox$. Although they both may claim legitimacy, only $miaphysite$ preserves the true patriarchates."
 drafted_hatun_runas:0 "Drafted Hatun Runas"
 drafted_hatun_runas_desc:0 "The #italic Hatun Runas#! are the peasant class of our empire. One in fifty men are chosen for military service on their twenty-fifth birthdays, and conscripted for the next seven years. This conscription system helps us maintain a substantial professional army with superior discipline than the troops of our adversaries."
 dragomans:0 "dragomans"
 dragomans_desc:0 "Interpreters, translators, and guides in one, the $dragomans$ are skilled officials who work to enhance our diplomatic and commercial efforts with different communities and countries. Most dragomans are of $greek_culture$ ancestry, though some hail from $judaism_ADJ$, $armenian_culture$, or other multilingual backgrounds."
 drill_army_advance:0 "Drill Army"
 drill_army_advance_desc:0 "No longer shall we depend upon untrained levied men. If we are to defend our borders and smite our rivals, we must conduct regular and organized drills."
 drokpa:0 "drokpa"
 drokpa_desc:0 "The Drokpa nomads often operate as herders and traders, porters that connect distant settlements. Through their traditions and unparalleled knowledge of the terrain, they traverse the high-altitude routes between $TIB$, Bhutan, Ladakh, and $NPL$. Their seasonal caravans carry $salt$, $wool$, and dried meat in exchange for grain and manufactured goods. These networks knit our mountains into a vibrant lattice of commerce and diplomacy."
 dry_dock_advance:0 "Dry Dock"
 dry_dock_advance_desc:0 "$dry_dock_desc$"
 dte_dragon_of_oshu:0 "Dragon of Ōshū"
 dte_dragon_of_oshu_desc:0 "Our might and power will be the envy of our enemies. Our name will forever be associated with the Dragon of Ōshū."
 dte_fujiwara_hokke:0 "$fujiwara_dynasty$ Hokke"
 dte_fujiwara_hokke_desc:0 "As one of the branches of the northern house of the $fujiwara_dynasty$, the legitimacy of our rule is impeachable."
 dte_intensive_domain_development:0 "Intensive Domain Development"
 dte_intensive_domain_development_desc:0 "Many dismiss $ou_area$ as poor due to its harsh weather and mountains, yet the region holds great potential. Through infrastructure investment — new towns, waterways, expanded cultivation — and by abolishing stifling tolls and taxes, we can substantially improve our heartland and make our subjects wealthy."
 dte_oshu_shugo:0 "Ōshū Shugo"
 dte_oshu_shugo_desc:0 "As an honorable clan dating back to the early $kamakura$ period, we have a strong claim to rule over the entire Ōshū province. Fortunately for us, what land Ōshū exactly covers is not well-defined."
 dutch_education:0 "Dutch Education"
 dutch_education_desc:0 "While our people always enjoyed superior literacy rates at all levels of society, this advantage is becoming more apparent in the world taking shape before us. Only those with a limited understanding would not take advantage of and increase this edge."
 dutch_golden_age_art:0 "Dutch Art"
 dutch_golden_age_art_desc:0 "$common_string_prefix_article$ $NED$ has historically been at the forefront of technological and cultural advancements. We must continue to patronize inventors, artists, and writers to maintain our edge over other nations."
 dyes_mill_advance:0 "$dyes_mill$"
 dyes_mill_advance_desc:0 "$dyes_mill_desc$"
 dyes_workshop_advance:0 "$dyes_workshop$"
 dyes_workshop_advance_desc:0 "$dyes_workshop_desc$"
 dyesworks_advance:0 "$dyesworks$"
 dyesworks_advance_desc:0 "$dyesworks_desc$"
 dynamic_court:0 "Dynamic Court"
 dynamic_court_desc:0 "A truly innovative court is one where any person may rise to prominence. We must strive to make sure that old traditions, as well as prejudices around one's birth or level of wealth, do not hinder the development of our court or act as a barrier to talented people wishing to serve our state."
 early_anti_piracy_warfare:0 "Anti-Piracy Leagues"
 early_anti_piracy_warfare_desc:0 "The proliferation of pirates, brigands, and robbers in the waters along our trade routes has forced our merchants to band together and form Merchant Leagues, which facilitate the protection of their boats during long journeys."
 early_council_hall_advance:0 "$early_council_hall$"
 early_council_hall_advance_desc:0 "$early_council_hall_desc$"
 early_iberian_caravel:0 "Early $iberia_region_ADJ$ Caravels"
 early_iberian_caravel_desc:0 "Originally of $iberia_region_ADJ$ origin, the first caravels were small but very fast ships that were used for offshore fishing and coastal trade. Their use in $iberia$ is so widespread that the region can easily boast of possessing the most advanced caravels."
 early_iberian_galleon:0 "Early $iberia_region_ADJ$ Galleons"
 early_iberian_galleon_desc:0 "An early, but powerful ocean-going vessel, the $n_early_iberian_galleon$ is an original invention from $iberia$ that has a lower forecastle and a long hull, making them especially stable and resistant to headwinds."
 early_modern_administation:0 "Early Modern Administration"
 early_modern_administation_desc:0 "Over time, it became apparent that a more centralized bureaucracy, with administrative bodies run by educated officials employed directly by the state, was a necessity to complete the ambitious projects of the Early Modern rulers."
 east_and_west:0 "East and West"
 east_and_west_desc:0 "Our strategic position between eastern and western empires has given our merchants the opportunity to act as essential middlemen for lucrative regional trade routes."
 eastern_african_trade:0 "Eastern African Trade"
 eastern_african_trade_desc:0 "The lands of $east_africa$ are at the crossroads of great trade routes. From the land of $egypt_region$ and the ports of the Mediterranean through the $red_sea_area$, to the riches of the East accross the $indian_ocean_region$, and southwards along the $swahili_coast_region$, the bustling movement of goods and people is constant. The countries in these lands are thus also accustomed to exchanging goods and valuables as a means of establishing diplomatic relationships."
 eastern_christianity:0 "Eastern $christian$"
 eastern_christianity_desc:0 "We are part of the branch of so-called $eastern_christianity$, which amalgamates many different denominations with different theological and liturgical traditions, but also with many common cultural aspects."
 eastern_ecumenism:0 "Eastern Ecumenism"
 eastern_ecumenism_desc:0 "$christian_ADJ$ denominations from the Oriental Orthodoxy are often confused with Eastern $orthodox$ by the uninitiated. Although they are different from us in many key issues, they are still $christian_ADJ$, and our many commonalities could be used to bring them back to the correct faith."
 ecclesiastical_primacy:0 "Ecclesiastical Primacy"
 ecclesiastical_primacy_desc:0 "The $game_concept_pope$ has the sovereign authority to establish religious canon and law in the $catholic_ADJ$ Church. The State shares a special relationship with those who conform to the will of the $catholic_ADJ$ authority."
 economic_ideas:0 "Subservient Economy"
 economic_ideas_desc:0 "The economy and wealth of a country should serve the government, not the opposite way around. As such, it is in the state's best interests to accumulate the lion's share of resources, both as a show of our power and in order to better carry out our will. Only with this system can our nation truly prosper."
 economical_policies_law_advance:0 "$economical_policies_law$"
 economical_policies_law_advance_desc:0 "$economical_policies_law_desc$"
 ecumenical_defenders_of_christendom:0 "Ecumenical Defenders of Christendom"
 ecumenical_defenders_of_christendom_desc:0 "The Reformation has harmed our cause as knights from $GER$ and $scandinavian_region$ have started murmuring questions about the nature of the Communion Host, but the always-present $turkic_group$ threat has a way of making such disputes seem minor. Perhaps we should focus on defending the realm, and debate theology once the Saracen threat is safely at bay?"
 ecumenism:0 "ecumenism"
 ecumenism_desc:0 "Determining how to deal with the heretics in our realm is always tricky. Although the good, old-fashioned fire-and-sword approach will solve most problems eventually, diplomacy can also succeed. By encouraging dialogue between the various sects, we can reduce misunderstandings and promote peace in the realm."
 edict_of_restitution:0 "Edict of Restitution"
 edict_of_restitution_desc:0 "A bit of bookkeeping will help us to weather any religious strife that could befall our realm. This harmless edict will surely not spark any further conflict."
 edicts_of_ashoka:0 "Edicts of Ashoka"
 edicts_of_ashoka_desc:0 "A legal code published by Emperor Ashoka 'the Great' in the 3rd century BCE, these edicts include strictures promoting for $buddhist$. Although this code is from many centuries ago, it still deserves respect and reverence from any member of the $buddhist_ADJ$ faithful."
 educated_bureaucrats:0 "Educated Bureaucrats"
 educated_bureaucrats_desc:0 "The officials running our administration are not illiterate and lazy heirs to their parent's seats, but rather educated and talented individuals who have earned their positions through effort and merit. An administration like this will undoubtedly run more smoothly and efficiently than any other."
 efficient_bureaucracy:0 "Efficient Bureaucracy"
 efficient_bureaucracy_desc:0 "Bureaucracy is the oil that makes the wheels of our administration turn smoothly. With the appointment of efficient bureaucrats that have both talent and the will to properly fulfill their tasks, we will ensure the seamless operation of our government structures."
 efficient_construction_plans:0 "Efficient Construction Plans"
 efficient_construction_plans_desc:0 "Our efficient building strategy allows us to complete complex work orders without taking any half measures."
 efficient_logistics:0 "Efficient Logistics"
 efficient_logistics_desc:0 "Logistics and communications are what allow us to properly administer our entire territory. To facilitate better communication between our provincial governors and the central rulership, we need a well-established network of roads for our messengers to travel upon."
 efficient_mining:0 "Efficient Mining"
 efficient_mining_desc:0 "We shall issue a decree to refine every aspect of metal mining within our domain, in an effort to regulate its presence in our markets."
 efficient_spies:0 "Efficient Spies"
 efficient_spies_desc:0 "Most peasants would happily sell their own mother for gold, but there are some with skills and talents that we in the government might find very useful for...ah, #italic statecraft#!. Although finding these worthy commoners is difficult, through experience we are learning to separate the wheat from the chaff."
 elan:0 "Élan!"
 elan_desc:0 "Cultivating the doctrine of attack is the hallmark of our army. Our men must fight with #italic élan#! — spirit and vigor — giving us a clear edge on the battlefield."
 eltham_ordinance:0 "The Eltham Ordinance"
 eltham_ordinance_desc:0 "The Eltham Ordinances represented $ENG$'s first attempt to streamline royal bureaucracy and make it more adaptable and cost-effective. The Ordinances attempted reform through reducing royal household expenditures and consolidating certain bureaucratic functions."
 emancipation:0 "emancipation"
 emancipation_desc:0 "For a long time, we have restricted land ownership to only those we felt were trustworthy enough. If we were to lift these restrictions, then land holdings could be consolidated. This in turn would create a pool of seasonal labor for whom the army life might be worth pursuing."
 embellish_baroque_art:0 "Promote Baroque Art"
 embellish_baroque_art_desc:0 "Our faith has a long tradition of sponsoring and promoting great works of art. The development of the splendid new Baroque style reflects the pathos and glory of our theology beautifully, and should receive particular sponsorship."
 embrace_romanticism:0 "Embrace Romanticism"
 embrace_romanticism_desc:0 "In the wake of the Enlightenment's emphasis on reason, we must not forget the power of emotion and imagination. By embracing Romanticism, which celebrates nature, folklore, and national character, our artists will produce works that stir the soul."
 empiricism:0 "empiricism"
 empiricism_desc:0 "Things are what they are because we can feel them, see them, and overall experience them with our senses. It is by using this empirical evidence that we come up with newer ideas."
 encouraged_city_living:0 "Encouraged City Living"
 encouraged_city_living_desc:0 "We have inherited an exquisite city from our predecessors. We must continue to beautify and improve this metropolis of the Mediterranean so that it can continue to grow and prosper. No longer can we content ourselves with merely repairing and maintaining the port and buildings; we shall make holistic improvements that better sustain our people by also building aqueducts, draining wetlands, and paving more roads."
 encouragement_of_philosophers:0 "Encouragement of Philosophers"
 encouragement_of_philosophers_desc:0 "We in $MLO$ have long been supporters of $renaissance$ thought. We should continue this tradition by extending patronage to and building facilities for the finest thinkers in all of $europe$. Hopefully, that will draw them here."
 end_of_shipbuilding_guilds:0 "End of the Shipbuilding Guilds"
 end_of_shipbuilding_guilds_desc:0 "As long as ships have been built in $arabia_region$, there have been guilds who control the production. Although they may have performed a valuable service in keeping shipbuilding traditions alive, they now stand in the way of progress. We must open up the shipbuilding industry to all with talent."
 enforced_service:0 "Enforced Service"
 enforced_service_desc:0 "The principle of volunteering underpins our whole army structure, but sometimes there are simply not enough willing conscripts. We should force — erm, #italic encourage#! people to volunteer."
 eng_experimental_riflemen:0 "$a_experimental_riflemen$"
 eng_experimental_riflemen_desc:0 "$a_experimental_riflemen_desc$"
 eng_red_coats:0 "Redcoats"
 eng_red_coats_desc:0 "Life in the $ENG_ADJ$ army is grueling and strictly regimented, but it instills in one a certain character. The unflappable nature of our troops, as well as their expertise with firearms, strikes fear into the hearts of our enemies."
 engineer_corps:0 "Engineer Corps"
 engineer_corps_desc:0 "Allows us to gather the greatest technological minds our nation has to offer, and make use of their unrivaled services."
 english_ambition:0 "Rulers of the Waves"
 english_ambition_desc:0 "A massive sea presence is required for any nation attempting to rule the waters. Our fleet will be so imposing that the shores of our enemies will always be surrounded by our vessels."
 english_heritage:0 "Our Island Home"
 english_heritage_desc:0 "Our island protects us from outside enemies, but that will not matter if we do not protect the surrounding waters. By being true masters of our surrounding seas, we will keep a firm control on those who threaten our land."
 english_tradition:0 "Lionhearts"
 english_tradition_desc:0 "The bravery and discipline of $ENG_ADJ$ foot soldiers has been witnessed from the shieldwalls of $northumbria_area$ to the darkened skies of $FRA$. Inspired by the lion-hearted spirit of our kings and the stoicism of the common man, our infantry fights with the ferocity of the Anglo-Saxon warriors before them."
 enlightened_court:0 "Enlightened Court"
 enlightened_court_desc:0 "The values of the Enlightenment are ever-present in any modern court, and with them comes the presence of the most intellectual and learned people. Thanks to these illustrious and enlightened courtiers, much more can now be achieved with far less effort."
 enlightenment_advance:0 "Enlightenment"
 enlightenment_advance_desc:0 "The last century has seen Rationalism and Empiricism gain ever-increasing popularity among the greatest minds of the age. The Light of Reason has been lit, and many will not rest until it has been brought to all corners of the earth."
 entrenched_church:0 "Entrenched Church"
 entrenched_church_desc:0 "No matter which people we rule over, the Church provides a way to give them a unified structure."
 entrepot_advance:0 "Entrepôt"
 entrepot_advance_desc:0 "$entrepot_desc$"
 entrepot_connections:0 "Entrepôt Connections"
 entrepot_connections_desc:0 "To thrive as a trade hub, our cities must be connected by solid infrastructure. By empowering the noble class to build and maintain strategic roads, we improve internal trade and strengthen the arteries of our realm."
 epi_adriatic_gatekeepers_advance:0 "Adriatic Gatekeepers"
 epi_adriatic_gatekeepers_advance_desc:0 "By securing the ports of Valona and Butrint, Epirus sits as the warden of the Adriatic Sea. We have leveraged this position to negotiate favorable trade treaties with Venice and the Italian city-states, who must pass through our sphere of influence to reach the Levant. By levying precise tariffs and providing 'protection' services against corsairs, we have transformed our once-isolated despotate into a wealthy commercial hub that bridges the gap between East and West."
 epi_arvanite_communities_advance:0 "Arvanite Communities"
 epi_arvanite_communities_advance_desc:0 "To bolster our dwindling numbers, we have invited the fierce Arvanite clans to settle in the fertile valleys of Epirus and Acarnania. In exchange for land and autonomy, these warriors provide us with a tireless light infantry force that excels in the brutal, close-quarters combat of the Balkan frontier. Their unique martial culture, blended with our Roman military tradition, creates a hybrid force that is both exceptionally loyal and terrifyingly aggressive in the shock of battle."
 epi_balkan_marriages_advance:0 "Balkan Marriages"
 epi_balkan_marriages_advance_desc:0 "Epirus sits at the crossroads of the Greek, Slavic, and Latin worlds, and we have turned our royal daughters into our most effective diplomats. Through a complex web of strategic marriages with Serbian Kings, Albanian Chieftains, and even Italian Counts, we have made the House of Doukas-Komnenos the indispensable arbiter of Balkan politics. These blood-ties ensure that when we go to war, we are never without powerful allies willing to strike from our enemies' flanks."
 epi_fortresses_of_ioannina_advance:0 "Fortresses of Ioannina"
 epi_fortresses_of_ioannina_advance_desc:0 "The city of Ioannina has been transformed into a true stronghold. Utilizing the latest in Italian military engineering, we have surrounded our capital and its lake with a series of interlocking bastions and water-forts that can withstand months of sustained bombardment. This defensive network serves as the anchor for our entire national strategy, allowing us to retreat into an impregnable core whenever the tides of war turn against us in the open field."
 epi_the_eagle_of_the_pindus_advance:0 "The Eagle of the Pindus"
 epi_the_eagle_of_the_pindus_advance_desc:0 "In the rugged, rain-swept peaks of the Pindus mountains, the Despots of Epirus have carved out a sanctuary that no Latin army can penetrate. We have mastered the art of 'mountain-ambush' warfare, using the vertical geography of our realm to trap and destroy much larger forces in narrow defiles. This environmental mastery turns our entire country into a deathtrap for invaders, ensuring that while the plains may fall, the mountains remain forever Greek."
 epi_the_sublime_diplomacy_advance:0 "Sublime Diplomacy"
 epi_the_sublime_diplomacy_advance_desc:0 "Centuries of survival between powerful enemies have made our diplomatic corps the most sophisticated in the world. We have developed a 'neutrality-of-strength' doctrine, playing the great powers against one another so skillfully that they compete for our favor rather than seeking our conquest. Our ambassadors are renowned for their ability to weave peace treaties that always seem to leave Epirus with more territory and influence than when the conflict began."
 epic_of_sundiata:0 "Epic of Sundiata"
 epic_of_sundiata_desc:0 "The $epic_of_sundiata$ tells of the legendary campaign of Sundiata Keita, the founder of the $MAL_ADJ$ Empire and hero of our people. His story has passed from generation to generation, and has always been a great source of inspiration to our people."
 epic_poetry_advance:0 "Epic Poetry"
 epic_poetry_advance_desc:0 "For millennia our people have preserved the legends of gods and heroes through epic poetry. Works such as Homer's Iliad and Odyssey, alongside Hesiod's Theogony, stand among the greatest monuments of our cultural heritage. These timeless narratives continue to shape our identity and inspire generations."
 escort_ships:0 "Corvettes"
 escort_ships_desc:0 "Corvettes are a class of small warships that are designed to escort friendly vessels and harass the enemy, relying on speed and maneuverability rather than massed firepower."
 established_holy_sites:0 "Established Holy Sites"
 established_holy_sites_desc:0 "While other religions have somewhat lax and inconsistent views towards how their holy sites are used, the rules of $muslim$ about sacred places are quite clear. Our people will undoubtedly make their pilgrimages with the appropriate reverence and dignity."
 estates_general:0 "Estates-General"
 estates_general_desc:0 "According to some, the Estates-General have existed since 1303. Over time, its form has shifted from being a council of royalty appointees to one of elected representatives. This change in structure has given the Estates-General, and the taxes levied by them, greater legitimacy."
 estates_of_brittany:0 "The Estates of $BRI$"
 estates_of_brittany_desc:0 "First called in the 14th century, the Estates of $BRI$ allowed free men from all rungs of society, even the Third Estate, to share their grievances and petition the ruler for redress. By calling in the Estates, we can mitigate some of the tension felt throughout our domain."
 eternal_crusade:0 "An Eternal Crusade"
 eternal_crusade_desc:0 "As a $christian_ADJ$ nation, we find ourselves surrounded by $muslim_ADJ$ adversaries who seize every opportunity to attack us. To ensure our survival, we must be prepared to fight back immediately."
 exchange_of_ideas:0 "Exchange of Ideas"
 exchange_of_ideas_desc:0 "Not only do coin and profit move along the $silk_road$, but ideas and knowledge also follow the ebb and flow of the merchants traveling along its path."
 expand_varangian_guard_advance:0 "Expand the Varangian Guard"
 expand_varangian_guard_advance_desc:0 "The Varangians have served our country for centuries with distinguished honor and unwavering faith. By expanding their ranks, we will further secure the stability and protection of $BYZ$."
 expanded_aqueduct_system:0 "Expanded Aqueduct Systems"
 expanded_aqueduct_system_desc:0 "The growth of our urban centers has created an increasing demand for reliable fresh water. If our towns and cities are to flourish, we must commit to greater feats of engineering and expand our aqueduct networks."
 expanded_arsenale:0 "Expanded Arsenale"
 expanded_arsenale_desc:0 "For centuries, the Arsenale of $NAP$ has been the center of our ship production and our main naval installation. However, it needs to be expanded and modernized to remain effective against hostile Mediterranean fleets. Let us expand both the commercial and military capabilities of our port, building a more efficient Arsenale to maintain a larger, more powerful fleet."
 expanded_grazing_grounds:0 "Expanded Grazing Grounds"
 expanded_grazing_grounds_desc:0 "Our territory has plenty of land which is well-suited for grazing animal herds, making it easy for us to expand our output of $livestock$."
 expanded_infrastructure_network:0 "Expanded Infrastructure Network"
 expanded_infrastructure_network_desc:0 "Our national road network is a vital part of our commercial and administrative success. As such, we should care to maintain and improve it."
 expanded_slave_trade:0 "Control the Slave Trade"
 expanded_slave_trade_desc:0 "The demand for $slaves_goods$ from external traders grows greater by the day. Our position in $africa$ makes us the ideal middlemen for this trade. Let us encourage those that seek slave markets to do so in our lands, and to make their business in our marketplaces."
 expanded_supply_trains:0 "Expanded Supply Trains"
 expanded_supply_trains_desc:0 "Investing more resources into our supply trains will allow our army to operate for longer periods of time in hostile territory."
 expansion_merchant_guilds:0 "Expansion of Merchant Guilds"
 expansion_merchant_guilds_desc:0 "Pochtēcah merchants extend their routes far beyond our lands, enriching every marketplace loyal to the Mexihcah."
 expansion_of_trade_contacts:0 "Expansion of Trade Contacts"
 expansion_of_trade_contacts_desc:0 "We must ensure that our merchants are always welcome wherever they go. Thus, we will use any means possible to make sure that all rulers we know about welcome our merchants."
 expansionism:0 "A Seed Among Thorns"
 expansionism_desc:0 "The world is huge, and we should not grow complacent with our position in it, for our neighbors will not necessarily do the same. We shall set our sights on expanding our borders and making ourselves stronger, lest we risk being swallowed up by growing neighbor states."
 expansionist_ambitions:0 "Expansionist Ambitions"
 expansionist_ambitions_desc:0 "As the Balkans fractured, many rising powers looked outward. Ambitious rulers pursued integration of diverse lands under a single, stronger crown, taking advantage of $BYZ_ADJ$ weakness."
 expansionist_faith:0 "Expansionist Faith"
 expansionist_faith_desc:0 "From its origins in $arabia_region$, $muslim$ has expanded far and fast. In a few generations, its believers spanned from $iberia_region$ to $india$, the most rapid religious expansion the world has ever seen. There are new lands waiting to be touched by our light, however — perhaps it is time for a second $muslim_ADJ$ expansion."
 expansive_policies:0 "Expansive Policies"
 expansive_policies_desc:0 "$brandenburg_area$'s infertile, sandy soil has earned it the unflattering nickname 'Sandbox of the $hre$.' Such poverty spurred the margraves to aggressively expand, pursuing claims to neighboring territories. These conquests have made our country much more culturally diverse than the rest of the Empire."
 experienced_diplomats:0 "Experienced Diplomats"
 experienced_diplomats_desc:0 "Sometimes it is simply enough for people to #italic believe#! that we are powerful. We have worked hard on our diplomatic service to ensure that our word carries extra weight."
 experienced_fur_hunters:0 "$fur$ Trade"
 experienced_fur_hunters_desc:0 "Trading $fur$ with other tribes and foreigners is an essential part of our economy. We take great pride in our hunting abilities, and therefore are able to provide the best quality pelts."
 expert_hagglers:0 "Expert Hagglers"
 expert_hagglers_desc:0 "Wherever our traders land, be it the coasts of $south_asia$ or the markets of distant China, they are respected for their sharp tongues and keen judgement. Navigating both seas and bargains with equal finesse, they ensure that our trades are never at a disadvantage."
 exploit_the_alpine_trade:0 "Trading Hubs of $BAV$"
 exploit_the_alpine_trade_desc:0 "Our lands are frequently crossed by merchants wishing to trade $salt$, $silver$, and $livestock$ in the rich lands to our south. We would be foolish not to take advantage of their presence, and therefore will establish bustling trade hubs in our own lands to attract their business."
 exploration:0 "Exploration Ideas"
 exploration_desc:0 "Our naval superiority allows us to project power well past our own horizons, extending a natural claim to distant lands as our own by right of discovery."
 exploration_maintenance_advance:0 "Sturdy Construction"
 exploration_maintenance_advance_desc:0 "The key factor when building a ship is its capacity for resisting inclement weather and the relentless pounding of waves. By developing sturdier methods of ship construction, we can ensure that our vessels can sail for longer periods of time."
 explorer_commisions_advance:0 "Explorer Commissions"
 explorer_commisions_advance_desc:0 "Beyond our shores lie uncharted lands, ripe for the taking! We shall recruit brave explorers to set course for the unknown and bring back exotic goods. This is a vital — and possibly very lucrative — opportunity for us."
 export_building_country_advance:0 "Agile Exportation"
 export_building_country_advance_desc:0 "Costs to export valuable goods from our controlled markets can be quite high, making our products less attractive. By performing these export actions quicker, we can make our trade more dynamic."
 export_monopolies:0 "Export Monopolies"
 export_monopolies_desc:0 "By controlling key exports such as olive oil, textiles, and $dyes$, we ensure both domestic prosperity and leverage abroad. Such protectionist practices allow us to project power through commerce as much as conquest, ensuring our own merchants maintain dominance over foreigners in our markets."
 expulsion_of_heretics:0 "Expulsion of Heretics"
 expulsion_of_heretics_desc:0 "The troublesome heretics in our domain could easily foment rebellion against our ruler. It would be better if we redirected them to our overseas colonies instead, where they can cause less trouble."
 exsurge_domine:0 "Exsurge Domine"
 exsurge_domine_desc:0 "To eradicate the evil of heresy, the Lord Himself will arise and purge them from our lands!"
 extend_kampung_kampung:0 "Extend the Kampung-Kampung"
 extend_kampung_kampung_desc:0 "The foundation of $SUN_ADJ$ society lies in every #italic kampung#!, rural communities that dot the landscape. Investing in the infrastructure of these villages ensures sustainable growth, strong local leadership, and resilience against both famine and invasion."
 extensive_canal_works:0 "Extensive Canal Works"
 extensive_canal_works_desc:0 "The many rivers that cross our domain have tremendous economic potential. By constructing extensive canal networks, we can connect waterways to inland settlements, making transportation easier while also providing a reliable water supply to our people."
 external_friends:0 "External Friends"
 external_friends_desc:0 "Our envoys to $rome$ and $iberia_region$, looking for military support, were quite successful — in fact, they put us on the map. These endeavors to find allies should continue."
 extreme_pacifism:0 "Extreme Pacifism"
 extreme_pacifism_desc:0 "Based on the concept of $ahimsa$, $hindu$ always advocates for pacifism and nonviolence. However, our enemies should still be wary of provoking us, lest we end up exemplifying the complete opposite extreme when roused into war."
 faceting:0 "faceting"
 faceting_desc:0 "Master gemcutters have made a breakthrough in diamond-cutting by experimenting with diamond dust suspended in oil on their scaifs. This allows the artisans to cut stones in entirely new shapes, and to a much higher brilliance. The resulting technique, known as faceting, produces a stone of a pleasing geometric shape and with better optical qualities. As the new stones, and the technique for cutting them, spreads across courts and workshops, the demand for jewelry and precious stones increases greatly."
 falconry_mastery:0 "Falconry Mastery"
 falconry_mastery_desc:0 "Deeply rooted in our culture, falconry represents a bond forged between our people and these magnificent birds of prey, and we have finely honed our skill in this ancient art. Our falconers are renowned for their ability to train these majestic raptors to hunt and capture prey."
 fast_negotiations:0 "Fast Negotiations"
 fast_negotiations_desc:0 "Sometimes the key to closing a trade deal is to be the quickest one. We must ensure that our merchants can always successfully close their deals."
 faster_colonists:0 "Faster Colonists"
 faster_colonists_desc:0 "You cannot simply send colonists out to the New World and expect them to just build a colony. There is first a time-consuming process of preparing the expedition with everything they will need to survive in their new home. We can speed this process up, now that we have some prior experience."
 faster_levy_recruitment:0 "Mandatory Weapon Training"
 faster_levy_recruitment_desc:0 "All male peasants are required to be proficient with a spear or bow and to train regularly, so as to be a competent soldier if ever they are called to arms."
 father_governs_children:0 "Father Governs Children"
 father_governs_children_desc:0 "Our rulers are famed for their close connection to the common man. May our people always live free and happily under the guiding light of their majestic, heavenly rulers!"
 feathered_serpent:0 "The Feathered Serpent"
 feathered_serpent_desc:0 "The legend of the Feathered Serpent is well-known across our lands. Although this figure represents many things to many people, such as Quetzalcōātl among the $nahua_group$, K'uk'ulkan among the $maya_language$ or Q'uq'umatz among the $kiche_culture$, he is a unifying figure for all of them."
 federal_constitution:0 "Federation Builders"
 federal_constitution_desc:0 "We should unite with other groups of our kin to form a federation, which will put mutual trust and development as its first priority."
 feo_black_sea_fur_trade_advance:0 "Black Sea Fur Trade"
 feo_black_sea_fur_trade_advance_desc:0 "Despite our small size, we control the vital ports that connect the vast fur-producing forests of Russia to the markets of the Mediterranean. We have negotiated exclusive rights with the local Tatar Khans to be the sole shippers of these furs across the Black Sea. This lucrative monopoly provides us with the wealth necessary to pay for Genoese engineers and Byzantine scholars, ensuring our tiny principality remains a center of wealth and sophistication amidst the steppe."
 feo_gothic_hellenic_synthesis_advance:0 "Gothic-Hellenic Synthesis"
 feo_gothic_hellenic_synthesis_advance_desc:0 "In the isolation of the Crimean mountains, the remnants of the Crimean Goths and the local Greek population have fused into a single, resilient identity. This culture combines the stoic, martial heritage of the North with the administrative and maritime brilliance of the South. This 'Theodoran' spirit is our greatest defense, creating a population that views itself as the last true guardians of the Roman frontier, willing to fight to the last man for their unique way of life."
 feo_the_bastion_of_mangup_advance:0 "The Bastion of Mangup"
 feo_the_bastion_of_mangup_advance_desc:0 "Our capital, Mangup-Kale, is a literal mountain carved into a fortress, surrounded by sheer cliffs that defy any siege engine. We have expanded these natural defenses with a series of sophisticated tunnels, cisterns, and hidden sally ports, allowing the city to hold out for years if necessary. This impregnable base ensures that even if our lands are ravaged by the Golden Horde, the heart of our Principality remains safe, serving as a beacon of hope for all Christians in the North."
 feo_the_gothic_red_guard_advance:0 "The Gothic Red Guard"
 feo_the_gothic_red_guard_advance_desc:0 "Drawing upon the ancient, grim traditions of our Gothic ancestors and the disciplined military manuals of the Romans, we have formed the #italic Red Guard#!. These elite shock troops are recruited exclusively from the highest mountain villages of the Crimea, trained to fight in the pitch-black tunnels of our fortresses and the claustrophobic ravines of the coast. Armed with heavy polearms and the latest flintlock pistols, they are masters of the sudden, devastating raids. Their reputation for never taking prisoners and never retreating makes them the most feared infantry in the Euxine basin, capable of breaking the morale of even the most hardened regiments."
 feo_the_iron_harvest_advance:0 "The Iron Harvest"
 feo_the_iron_harvest_advance_desc:0 "The Gothic-Greek hybrid culture of Theodoro has fully shed its defensive shell, transforming into a 'War Machine'. No longer content with mere cliffside survival, we have industrialized our mountain strongholds into massive foundries and barracks, producing a professional officer corps and a conscript army trained in the brutal school of steppe warfare. Every citizen of the Principality is now a soldier first, viewing the surrounding plains not as a threat, but as a harvest field for Gothic glory and Roman reclamation. This 'Total War' footing allows us to strike with a ferocity that terrifies our larger neighbors, as we field a military machine that is disproportionately powerful relative to our small territorial size."
 feo_the_northern_star_of_greece_advance:0 "The Northern Star of Greece"
 feo_the_northern_star_of_greece_advance_desc:0 "As the main Greek-speaking state in the North, Theodoro has become a symbol of religious resistance and cultural survival. We have established our Prince as the #italic Protector of the Pontic Greeks#!, drawing immigrants and scholars from distant places. This religious prestige gives us a moral authority that transcends our borders, making us a key player in the grand religious struggles as the #italic Northern Star#! of the Greek Orthodox faith."
 fertile_lands:0 "Fertile Lands"
 fertile_lands_desc:0 "In general, the lands of $asia$ are blessed with plentiful rain, and many rivers cross its territories even in areas with less precipitation. Except for some of the most arid areas of the desert, our land provides ample food to our population. Even in those regions where it does not, the people living there are able to do much with what they have."
 feudal_de_jure_law_advance:0 "$feudal_de_jure_law$"
 feudal_de_jure_law_advance_desc:0 "#italic De jure#! - 'by law' - is a description of legally acknowledged practices regardless of the reality of its practice. The systems of a feudal society are built on this very concept."
 feudalism_advance:0 "Feudalism"
 feudalism_advance_desc:0 "Feudalism is a political system that is based on service or labor in exchange for holding and working land. It is a collection of rights and obligations to which each member of a structured societal model is bonded."
 filioque_issue:0 "Filioque Issue"
 filioque_issue_desc:0 "The heretical addition of the #italic Filioque#! clause, which states that the Holy Spirit proceeds from the Father 'and the Son', was done without calling the appropriate ecumenical council, and therefore it is illegitimate. We are the guardians of the true prayer, and $rome$ shall be damned for their heresy!"
 fine_cloth_manufactory_advance:0 "Fine Cloth Manufactory"
 fine_cloth_manufactory_advance_desc:0 "$fine_cloth_manufactory_desc$"
 fine_cloth_mill_advance:0 "Fine Cloth Mill"
 fine_cloth_mill_advance_desc:0 "$fine_cloth_mill_desc$"
 fine_cloth_workshop_advance:0 "$fine_cloth_workshop$"
 fine_cloth_workshop_advance_desc:0 "$fine_cloth_workshop_desc$"
 fine_metals_mining:0 "Fine-Metals Mining"
 fine_metals_mining_desc:0 "The discovery and development of new metal alloys has made it possible to extract and exploit new fine metals on a larger scale, making the process highly profitable compared to other types of mining."
 finest_of_horses:0 "Finest of Horses"
 finest_of_horses_desc:0 "How steadily those troops take the ground! How beautifully those cavalry form! Fine horses with well-trained riders are a hallmark of any modern fighting force, and ours are particularly impressive."
 finnish_heritage:0 "$FIN_ADJ$ Frontier Cavalry"
 finnish_heritage_desc:0 "The $FIN_ADJ$ cavalry — #italic Hakkapeliitta#! — gained a fearsome reputation in wars in $europe$ These riders, raised in the wild forests and plains of $finland_area$, bring experience, adaptability, and toughness to our ranks. By formalizing their role, we will create a permanent elite force within our armies."
 firearms_factory_advance:0 "$firearms_factory$"
 firearms_factory_advance_desc:0 "$firearms_factory_desc$"
 firearms_manufactory_advance:0 "$firearms_manufactory$"
 firearms_manufactory_advance_desc:0 "$firearms_manufactory_desc$"
 first_fleet_of_the_med:0 "First Fleet of the Mediterranean"
 first_fleet_of_the_med_desc:0 "The great al-Muwaḥḥidūn once prided themselves upon owning one of the most formidable navies in the entire Mediterranean Sea. Our people today still possess the traditions and expertise to reignite that passion and restore our greatness across the oceans."
 fishing_habits:0 "Fishing Habits"
 fishing_habits_desc:0 "Sometimes it is difficult to believe that some of our people were born on land and not in the water, for their bodies swim with such agility that it is nearly impossible to distinguish them from the current of the river. As a result, we are experts at fishing."
 five_precepts:0 "Five Precepts"
 five_precepts_desc:0 "The foundational code of $buddhist_ADJ$ ethics and morality, the $five_precepts$ represent the most basic rules believers must follow in $buddhist$, whether part of the ordained monastic community or not. They instruct people to abstain from killing, stealing, sexual misconduct, lying, and intoxication."
 fla_cloth:0 "$FLA_ADJ$ $cloth$"
 fla_cloth_desc:0 "The $FLA_ADJ$ $cloth$ industry is the envy of the world. Merchants come from far away to sell their $wool$ in $FLA$, where we manufacture the best quality $cloth$."
 fla_flemish_renaissance:0 "$FLA_ADJ$ $renaissance$"
 fla_flemish_renaissance_desc:0 "As one of the most prosperous regions on the continents, much of the wealth we have created naturally flows toward artistic patronage. $FLA_ADJ$ merchants commission master painters to create art that, while perhaps not practical, casts light over even the cloudiest of days. With dozens of our merchants actively hiring artists and commissioning new pieces, we are creating a distinctive $renaissance$ of our own."
 fla_prospering_agriculture:0 "Prospering Agriculture"
 fla_prospering_agriculture_desc:0 "As our cloth, luxury goods, and financial industries face growing competition, it is becoming obvious that we need to manage our land use better. By creating regional granaries, we further diversify our economy, and bolster our food stores against famine or poor harvests."
 flemish_cloth_making:0 "$flemish_cloth_industries_right$"
 flemish_cloth_making_desc:0 "$flemish_cloth_industries_right_desc$"
 flesh_is_weak:0 "Flesh is Weak"
 flesh_is_weak_desc:0 "The flesh may be weak and corruptible, but the soul is not. Our armies have learned to fight as if they shared the same soul, and thus their morale can never be broken."
 flexible_loyalty:0 "Flexible Loyalty"
 flexible_loyalty_desc:0 "Our nation is caught in a conflux between the warring religions of $europe$ and a variety of foreign threats. The only way we can ensure our survival in this storm is to take a flexible stance towards cooperating with local mercenary bands."
 flexible_negotiation:0 "Flexible Negotiation"
 flexible_negotiation_desc:0 "You can never quite predict what could be gained during peace talks, so we should enter with all options open."
 flintlock_gun:0 "Improved Hunting Guns"
 flintlock_gun_desc:0 "With the development of improved flintlock guns and special ammunition for hunting, our hunters will be even more capable of bagging their prey."
 florentine_citizen_militia:0 "$FLO_ADJ$ Citizen Militia"
 florentine_citizen_militia_desc:0 "If our people are to flourish well into the future, they must be ready to mobilize and defend our ideals and homeland! Forming a citizen militia, equal in experience and ferocity to other armies in $europe$, will greatly aid us in protecting our domain."
 florentine_school:0 "$FLO_ADJ$ School"
 florentine_school_desc:0 "As one of the most influential contemporary schools of art, $FLO_ADJ$ techniques and fine details have established us as the cultural leader of $europe$, producing masterworks that define the $renaissance$."
 florino_d_oro:0 "Fiorino d'Oro"
 florino_d_oro_desc:0 "A very powerful currency, backed by excellent gold purity and shared by many states and institutions across $europe$. By adopting the #Y Florin#! as our currency, we are sure to positively impact our income and cut down on monetary deficits."
 folwark_system:0 "Folwark System"
 folwark_system_desc:0 "The Folwark System was a system of production that emphasized creating agricultural surpluses. Peasants were encouraged to work through either the use of rents or through compulsion. This system formed the bedrock of our economy."
 food_advance_absolutism:0 "Closed Fields"
 food_advance_absolutism_desc:0 "Until recently, land ownership and use was relatively common and free. However, there is now an increasing tendency to start a process of specific land delimitation, clearly determining the borders and size of fields exclusively dedicated to agriculture. With this kind of specified use, their production and exploitation can be greatly increased."
 food_advance_reformation:0 "Market Agriculture"
 food_advance_reformation_desc:0 "New and improved crops can be introduced to increase agricultural productivity. Whether through selective breeding of existing varieties or importing superior foreign cultivars, we can significantly boost our food production."
 food_advance_renaissance:0 "Intensive Agriculture"
 food_advance_renaissance_desc:0 "Agriculture is the foundation of most societies. Recent advances have improved the productivity of our fields and farms, creating valuable food surpluses."
 foraging_our_way:0 "Foraging our Way"
 foraging_our_way_desc:0 "We are hunters and live in communion with nature, even those of us dwelling in cities. It is in our blood to find the correct path in a dark forest; to know which of Nature's gifts to take with us. This wisdom lets us survive everywhere without difficulty."
 foreign_architectural_influence:0 "Foreign Architectural Influence"
 foreign_architectural_influence_desc:0 "In our many conquests across $indonesia_region$, we have encountered many new and incredible forms of art, all of which could be adopted and refined by our people to further our legacy. By introducing new techniques and sponsoring artists, our culture will come to exemplify the artistic achievements of our region."
 foreign_cultural_law_advance:0 "$foreign_cultural_law$"
 foreign_cultural_law_advance_desc:0 "$foreign_cultural_law_desc$"
 foreign_embassies:0 "Foreign Embassies"
 foreign_embassies_desc:0 "Diplomacy is a delicate balancing act that requires us to balance the needs and desires of multiple entities at the same time. Maintaining embassies in other countries that report to us on a regular basis will give us the information needed to better weigh our diplomatic options."
 foreign_learning:0 "Foreign Learning"
 foreign_learning_desc:0 "From foreign scholars and texts, we shall adopt new administrative, military, and scholarly practices, accelerating the pace of our technological development."
 foreign_mercenaries:0 "Foreign Mercenaries"
 foreign_mercenaries_desc:0 "We have recently received an influx of barbarians from foreign lands. Some are merchants but some are fighting men. Let us make use of them in our armies."
 foreign_mining_techniques:0 "Foreign Mining Techniques"
 foreign_mining_techniques_desc:0 "Precious stones have been appreciated by humanity for millennia. By coming into contact with foreign peoples from faraway lands, we can learn not only about the types of $gems$ they value most, but also about the techniques they use to obtain them."
 foreign_politics:0 "Foreign Politics"
 foreign_politics_desc:0 "To prevail over our foes, we must establish proper diplomatic channels and official cooperation with countries that share our animosity towards them."
 foreign_relations_bureau:0 "Foreign Relations Bureau"
 foreign_relations_bureau_desc:0 "Our realm has recognized the importance of fostering friendly relations and alliances with neighboring countries. To facilitate this, we will establish a specialized bureau dedicated to foreign affairs. By maintaining a dedicated focus on diplomacy, we are better positioned to navigate the complex web of international relations and secure our nation's prosperity."
 formal_administration:0 "Formal Administration"
 formal_administration_desc:0 "Correct procedures and a well-oiled administrative apparatus result in a prosperous country, for without a proper administration, anything that the state attempts to accomplish will just remain fruitless. We will formalize and standardize our administration, so that the will of the state flows through it naturally to all corners of the nation."
 formal_diplomacy:0 "Formal Diplomacy"
 formal_diplomacy_desc:0 "At a time where power is shifting from the hands of powerful individuals towards control by a centralized authority, it is wise to build bridges and open channels of communication between us and our neighbors. Diplomacy is key, and more so than ever in the face of these rising powers."
 formalized_officer_corps:0 "Formalized Officer Corps"
 formalized_officer_corps_desc:0 "Traditionally, our military officers come from the nobility, but we do not have enough people in that estate to fill the necessary roles. However, there are many skilled members of the lower classes in our armies who would do nicely — we should consider promoting some of them as professional officers."
 formalized_relations:0 "Formalized Relations"
 formalized_relations_desc:0 "Establishing formal relations with neighboring countries of interest is crucial if we are to maintain a balance of power and promote our interests."
 fort_limit_1_advance:0 "Castellany System"
 fort_limit_1_advance_desc:0 "Official castellans are appointed to manage local strongholds and their garrisons, marking the first organized framework for the administration and maintenance of fortresses."
 fort_limit_2_advance:0 "Border Wardens"
 fort_limit_2_advance_desc:0 "Regional wardens coordinate multiple castles along frontier marches, establishing supply routes, reporting chains, and mutual defense between neighboring strongholds."
 fort_limit_3_advance:0 "Defense Bureau"
 fort_limit_3_advance_desc:0 "The $crown_estate$ centralizes oversight of fortifications under a formal bureau in the capital, consolidating records, funds, and maintenance orders into a single administrative authority."
 fort_limit_4_advance:0 "Inspectors General"
 fort_limit_4_advance_desc:0 "Professional inspectors travel the realm to evaluate garrisons, stores, and walls, enforcing consistent standards and ensuring the reliability of each fortified place."
 fort_limit_5_advance:0 "Standardized Engineering"
 fort_limit_5_advance_desc:0 "National standards for construction and repair are introduced, enabling efficient planning, shared designs, and predictable maintenance across our network of fortresses."
 fort_limit_6_advance:0 "Ordnance Surveys"
 fort_limit_6_advance_desc:0 "Comprehensive mapping and logistical integration link every fortress into a coherent defensive system; an achievement of bureaucracy, science, and state power working in unison."
 fort_logistics:0 "Fortification Logistics"
 fort_logistics_desc:0 "By ordering our system of fortifications in an organized manner, both construction-wise and logistically, we may save some coin on maintaining it in the long term."
 fortified_towns:0 "Fortified Towns"
 fortified_towns_desc:0 "Through the ravages of the $hussite_wars$, and in an effort to safeguard our faith and people, we funded many fortified towns. Since then, we have gained great expertise in erecting fortifications and engineering impenetrable defenses."
 fortress_advance:0 "Fortress"
 fortress_advance_desc:0 "$fortress_desc$"
 fortress_church_advance:0 "$fortress_church$"
 fortress_church_advance_desc:0 "$fortress_church_desc$"
 fortress_of_the_balkans:0 "Fortress of the Balkans"
 fortress_of_the_balkans_desc:0 "We have recognized that spiritual purity alone cannot halt the encroaching craze of the world. To survive, the state has pivoted toward a doctrine of total territorial fortification, transforming the Balkan Mountains into an impassable granite wall. By reinforcing our lands with tiered stone redoubts and permanent garrisons, the nation has created a strategic depth that forces any invader into a lethal war of attrition. This policy ensures that the Bulgarian heartland remains a sanctuary of Orthodox stability, where the flame of our people's heart is shielded behind a ring of iron and stone that no storm can easily douse."
 foundation_of_bavarian_army:0 "An Army for $BAV$"
 foundation_of_bavarian_army_desc:0 "Only with a formidable standing army will we have the military might necessary to match our ambitions. With careful focus, we can expand it without having a ruinous impact on our state's finances."
 founding_fathers:0 "Founding Fathers"
 founding_fathers_desc:0 "This refers to all the politicians, soldiers, diplomats, and others who played an influential role in establishing their nation by winning their country's independence and creating a new system of governance."
 four_heavenly_kings:0 "Four Heavenly Kings"
 four_heavenly_kings_desc:0 "Each presiding over one of the cardinal directions, the $four_heavenly_kings$ are in charge of protecting the Deva realm from the Asuras. They are also responsible for assessing the virtue and morality of mortals."
 four_noble_truths:0 "Four Noble Truths"
 four_noble_truths_desc:0 "The foundational teachings of the Buddha, the $four_noble_truths$ explain the reality of being. Nothing is permanent, which causes pain to the spirit, due to its attachment to this transient existence. This spiritual pain can only be eased by liberating oneself from desire and letting go of these attachments, which is achieved by following the $noble_eightfold_path$."
 fra_code_civil:0 "Code Civil"
 fra_code_civil_desc:0 "We must replace the chaotic patchwork of laws governing our state with a single, unified legal code that applies to our entire population. This #italic Code Civil#! will serve as the foundation of our government and establish a just system for everyone in our realm."
 fra_expansion_of_france:0 "Historic Claims"
 fra_expansion_of_france_desc:0 "We trace our nation's lineage back to the empire of Charlemagne, and can therefore claim all those lands to be part of our rightful territory. With the support of dedicated courts, we will be able to identify and re-claim all of this long territory."
 fra_gendarmes:0 "Gendarme Companies"
 fra_gendarmes_desc:0 "Reliance on a levy system has exposed our government to great risks, and has proved to be severely limiting. We should recruit heavily armed cavalrymen and pay them a fixed salary in order to create a standing army."
 fra_integration_of_new_territories:0 "Consolidation of the Country"
 fra_integration_of_new_territories_desc:0 "Our influence over other states is undeniable. Why not use this persuasive power to incorporate them directly into our country?"
 fra_reformation_of_taxation:0 "Establishment of Recettes Générales"
 fra_reformation_of_taxation_desc:0 "The intendants responsible for collecting the taxes of the people shall not be appointed by the estates, but by our ruler directly. This way, we will ensure these officers will be loyal to the ruler alone, and gather all of the rightful tribute owed."
 fra_reliance_on_privateers:0 "Reliance on Privateers"
 fra_reliance_on_privateers_desc:0 "Direct competition with other maritime powers could be detrimental to our finances. We should empower our mercantile fleet to plunder and seize the merchant ships of our enemies. This will not only ensure a healthy income for our state, but also disrupt the maritime economies of our rivals."
 fra_school_of_fontainebleau:0 "Northern Mannerism"
 fra_school_of_fontainebleau_desc:0 "As a nation much enriched by the $renaissance$, we should invest in the creation of a unique, distinctively $FRA_ADJ$ aesthetic. By inviting foreign artists to our realm and sponsoring a school for artist training directly, we will be able to brand any artistic works produced as identifiably $FRA_ADJ$."
 franconian_proud_knights:0 "Knights of the Empire"
 franconian_proud_knights_desc:0 "Our people have committed a long line of proud knights to Imperial service. They embody knightly ideals that have become less common over time, but remain an essential part of our identity. We have a long history to look at for proper education in both chivalric conduct and military matters. This tradition of Imperial knights naturally increases the willingness of our noble class to contribute levies in hopes of winning glory in honorable combat."
 franconian_wine_bottles:0 "Silvaner and Bocksbeutel"
 franconian_wine_bottles_desc:0 "The #italic bocksbeutel#! is a major part of our winemaking traditions. Being easily recognizable, the shape of this bottle serves as a sort of ambassador for the beautiful wines produced in our region, such as the Silvaner or Riesling. The exemplary talents of our glassmakers and winemakers will surely bring us economic advantages."
 frankokratia_frankokratia_advance:0 "Frankokratia"
 frankokratia_frankokratia_advance_desc:0 "The original division of the Byzantine Empire in 1204 remains our legal foundation, granting us permanent, divinely sanctioned claims on the remnants of the Greek world. We do not view ourselves as conquerors, but as the rightful heirs to the fiefs assigned to our ancestors by the Latin Emperor and the Venetian Doge. This legal certainty allows us to pursue a relentless policy of expansion and reclamation against any local lords who refuse to acknowledge our feudal suzerainty."
 frankokratia_levantine_trades_advance:0 "Levantine Trades"
 frankokratia_levantine_trades_advance_desc:0 "Centuries of living at the crossroads of East and West have taught our merchant class to navigate the most complex trade networks, from the silk routes to the spice markets of the Levant. We act as the essential middlemen between the resource-rich Black Sea and the manufacturing hubs of Western Europe, profiting from every transaction that passes through our ports. Our merchants are as comfortable negotiating with Egyptians as they are with Flemish weavers, ensuring our ports are never empty."
 frankokratia_synthesized_levies_advance:0 "Synthesized Levies"
 frankokratia_synthesized_levies_advance_desc:0 "To maintain power against overwhelming odds, we have integrated the local Prónoia system — granting land in exchange for military service — with the Western tradition of knightly tenure. This creates a hybrid martial class of #italic Latinikon#! who are loyal to the Latin Crown, but intimately familiar with the rugged Greek terrain and Eastern tactics. These soldiers combine the heavy shock of the Frankish charge with the endurance and skirmishing capabilities required to hold the Balkan frontiers."
 frankokratia_the_frankish_greek_symbiosis_advance:0 "The Frankish-Greek Symbiosis"
 frankokratia_the_frankish_greek_symbiosis_advance_desc:0 "The final evolution of our states sees the emergence of a ruling class that is culturally #italic Latin#! in its chivalry and faith, but linguistically and socially integrated with the Greek population. By encouraging intermarriage and the adoption of local customs by the lesser nobility, we have ended the era of foreign rule and created a unified national identity. This #italic Greco-Latin#! culture is fiercely loyal to its own soil, blending the best of Western feudalism with the resilience of the Greek spirit."
 frankokratia_the_latin_enlightenment_advance:0 "The Latin Enlightenment"
 frankokratia_the_latin_enlightenment_advance_desc:0 "The centuries of struggle have culminated in a unique Eastern European Enlightenment, where the crusading spirit has been replaced by a rationalist, imperialist drive for order. The Frankokratia states are no longer 'crusader outposts' but are now a sophisticated, unified block of powers that blend Western technology with Eastern strategic depth. We have become the definitive bridge between civilizations, a 'Third Way' that is neither purely Western nor purely Byzantine, but something entirely new."
 frankokratia_union_of_the_soul_advance:0 "Union of the Soul"
 frankokratia_union_of_the_soul_advance_desc:0 "By installing a Latin Patriarch who respects the ancient Greek liturgy and the Julian calendar while acknowledging Papal supremacy, we bridge the Great Schism within our borders. This #italic Uniate#! compromise stabilizes the realm by allowing the Greek peasantry to keep their ancestral rites while ensuring the urban elite remains tied to Rome. It effectively neutralizes the threat of religious revolt and provides a theological justification for our continued rule over the Orthodox heartlands."
 fratricide_succesion_advance:0 "$fratricide_succesion$"
 fratricide_succesion_advance_desc:0 "$fratricide_succesion_desc$"
 free_cities:0 "Free Cities"
 free_cities_desc:0 "Giving our cities self-governance in matters of trade will allow us to open new, profitable trade routes."
 free_colonies:0 "Free Colonies"
 free_colonies_desc:0 "Only so many people are willing to move abroad to expand our great colonial empire. However, the promise of a plot of land to farm in freehold will encourage many more people to seek their fortunes abroad. The nice thing about this is that there is plenty of land for everyone!"
 free_merchants:0 "Free Merchants"
 free_merchants_desc:0 "In more reactionary and hidebound societies, merchants are looked down upon as somehow being less than those who own land. Well, this foolish attitude is not for us; we know that wealth is power regardless of where it comes from."
 free_subjects:0 "Free Subjects"
 free_subjects_desc:0 "Although giving a servant a damn good thrashing might be satisfying, it is surprisingly not the best way to make them work harder. Some natural philosopher has stumbled upon the idea of making profit the prime motivation for working people. If we replace monetary rents with payment in kind, our peasant laborers will be incentivized to produce more."
 free_thinkers:0 "Free Thinkers"
 free_thinkers_desc:0 "The belief that every man is entitled to both freedom of thought and freedom of speech is widely held in our colonies. Without these rights in place, there could be no such thing as civil liberty."
 free_trade:0 "Free Trade"
 free_trade_desc:0 "Our leading merchant families wish to secure trade privileges as their exclusive preserve, but we are unwilling to do so, and will therefore allow the growth of the merchant class."
 french_ambition:0 "Grande Armée"
 french_ambition_desc:0 "When measured against our adversaries, our need for military reform becomes painfully apparent. By introducing modern drilling techniques, we can transform our troops into a disciplined force capable of destroying any foe in combat."
 french_heritage:0 "A Knightly Nobility"
 french_heritage_desc:0 "The aristocrats of our nation have always provided the best soldiers for our armies. Their well-trained fighters will serve our nation and defeat our enemies in the name of righteous glory!"
 french_language_in_all_courts:0 "$french_language$ Language in All Courts"
 french_language_in_all_courts_desc:0 "For a long time, $latin_language$ has been the language of cultural exchange in $europe$... but to be honest, that language is nearly as dead as the ancient Romans who spoke it. We need to find a new #italic lingua franca#!, and nothing says 'lingua franca' like $french_language$."
 french_tradition:0 "La Cour de $FRA$"
 french_tradition_desc:0 "Our diplomatic maneuvers are renowned for their complexity and finesse, and our skilled envoys emulated across the continent. Yet only a fool would become complacent now — we could further refine our diplomacy through measures such as cultivating networks of informants and perfecting the art of negotiation. Let other nations muddle through yesterday's techniques while we pioneer tomorrow's."
 frequent_councils:0 "Frequent Councils"
 frequent_councils_desc:0 "It has been proposed that holding religious councils more frequently would prevent theological disputes and criticisms from festering unchecked. While we may not have full control over the curia, we can at least use our influence to encourage regular synods that address relevant issues before they can become crises."
 friends_in_high_places:0 "Friends in High Places"
 friends_in_high_places_desc:0 "There is only one path that will lead us to undying, everlasting happiness. To know the divine is to also know its sacred agents on this Earth, who will help us find that path."
 friends_in_need:0 "Friends in Need"
 friends_in_need_desc:0 "Our Order was formed by faithful souls from every nation in Christendom. This fact, combined with our need for external support to fulfill our missions, have made us adept at recruiting helping hands for our cause. We will take advantage of our omnipresence in $europe$ to reach the ears of powerful $catholic_adj$ rulers, and sway them to our side."
 frisian_legend_grutte_pier:0 "The Legend of Grutte Pier"
 frisian_legend_grutte_pier_desc:0 "There are stories in our lands about a pirate who was seven feet tall and strong as an ox. These tales inspire many to take to the seas and do what our ancestors did best: loot unguarded coasts."
 frisian_resisting_invader:0 "Resisting the Invader"
 frisian_resisting_invader_desc:0 "Surrounded as we are by enemies, our people are accustomed to aggressively defending their lands, fighting so fiercely that many would-be invaders turn tail and never return. Those who cannot escape us can take comfort in the thought that their blood shall nurture the $FRI$ soil."
 frisian_trading_traditions:0 "Trading Traditions"
 frisian_trading_traditions_desc:0 "Long before the counties south of us developed their own routes, our ancestors dominated coastal trade in $europe$, from the Baltic to Biscay. We must revive this ancient maritime expertise to reclaim our rightful position."
 frontline_in_the_caroline_war:0 "Frontline of the Caroline War"
 frontline_in_the_caroline_war_desc:0 "During the long conflicts between $FRA$ and $ENG$, we stood as a strategic battleground. The pressures of war forged a hardened officer corps and traditions of battlefield excellence that endure to this day."
 fukko_shinto:0 "Fukko $shinto$"
 fukko_shinto_desc:0 "As people are rejecting foreign influence in our culture, they are also starting to reject the teachings of $buddhist_ADJ$ and $SECT_CONFUCIANISM_NAME$ interfering in our faith. Given this emerging demand for doctrinal purity, a formal revitalization of $shinto$ might be wise."
 furniture_manufactory_advance:0 "$furniture_manufactory$"
 furniture_manufactory_advance_desc:0 "$furniture_manufactory_desc$"
 furniture_mill_advance:0 "$furniture_mill$"
 furniture_mill_advance_desc:0 "$furniture_mill_desc$"
 furniture_workshop_advance:0 "$furniture_workshop$"
 furniture_workshop_advance_desc:0 "$furniture_workshop_desc$"
 furstenschule:0 "Fürstenschule"
 furstenschule_desc:0 "As the Reformation takes hold and the state assumes control over religious administration, a new responsibility arises for the emerging state: education, which was previously the duty of the Church. We will found princely schools at Pforta, $grimma$, and $meissen$ using former monastic properties. Thus, the state will take on a significant role in shaping the educational landscape, fostering knowledge and intellectual growth for the future leaders of $SAX$."
 further_reaches:0 "Further Reaches"
 further_reaches_desc:0 "Despite many attempts by nonbelievers to stop our faith from spreading, it has nevertheless made its way to many different peoples and cultures, bringing light wherever it goes."
 garrison_conscription:0 "Conscripted Garrisons"
 garrison_conscription_desc:0 "By conscripting our able young citizens for our garrisons, we can ensure that we have enough guards to defend our borders."
 gate_of_the_persian_gulf:0 "Gate of the $persian_gulf$"
 gate_of_the_persian_gulf_desc:0 "$ORM$ controls the strait that links the $indian_ocean_continent$ to the interior of $asia$. Whoever holds this vital passage dictates the rhythm of maritime traffic. Our command of these waters must be absolute, lest our influence be diminished."
 gebirgsschutzen_infantry:0 "$a_gebirgsschutzen_infantry$"
 gebirgsschutzen_infantry_desc:0 "$a_gebirgsschutzen_infantry_desc$"
 geheimrat:0 "Geheimer Rat"
 geheimrat_desc:0 "The #italic Geheimer Rat#! is an elite advisory body composed of high-ranking nobles and officials, serving as the central institution for guiding our political, military, and administrative decisions."
 gel_expand_kwarteers:0 "Expand the Kwarteers"
 gel_expand_kwarteers_desc:0 "As in the case of $BRB$, $GEL$ has traditionally been divided into four quarters. This system of provinces arranged around a strong central city has proven to be an efficient way to govern our nation, and we should apply this system to new regions that join our realm in the future."
 gel_healthy_economy:0 "A Healthy Economy"
 gel_healthy_economy_desc:0 "We have expanded our borders not only by the sword, but through careful financial planning, which allowed us to purchase influence over desirable territories — or to buy them outright. With continued wise budget management, this economic trend should be sustainable."
 gel_warring_spirit:0 "A Warring Spirit"
 gel_warring_spirit_desc:0 "Some may call us bellicose, but that is only because they fear our might. A well-trained standing army is essential for survival in this chaotic age. Our adversaries will soon learn to respect our hardened spirit."
 generic_bureaucracy_4_advance:0 "Executive Bureaucracy"
 generic_bureaucracy_4_advance_desc:0 "As governments grow, so too does the need for a more complex and efficient bureaucracy. By creating specialized departments to handle specific aspects of governance, we can ensure that our administration runs smoothly and effectively."
 genoese_banking_traditions:0 "$GEN_ADJ$ Banking Traditions"
 genoese_banking_traditions_desc:0 "The rise of $GEN$ as a main commercial center of medieval $ITA$ led to the early development of new forms of credit and some of the world's earliest banking institutions."
 genoese_crossbowmen:0 "$a_genoese_crossbowmen$"
 genoese_crossbowmen_desc:0 "$a_genoese_crossbowmen_desc$"
 genoese_flexibility:0 "$GEN_ADJ$ Flexibility"
 genoese_flexibility_desc:0 "Our state navy can serve multiple purposes instead of just being a weapon for war. With our knowledge and experience, we can repurpose our war galleys to merchant galleys — and vice-versa, if need be — in no time."
 genoese_galley:0 "$n_genoese_galley$"
 genoese_galley_desc:0 "$n_genoese_galley_desc$"
 genoese_maritime_diplomacy:0 "$GEN_ADJ$ Maritime Diplomacy"
 genoese_maritime_diplomacy_desc:0 "As the city of $GEN$ became a republic focused on serving the interests of its merchant class, it developed a strong influence abroad, and struck numerous deals with allies and clients across the Mediterranean."
 genoese_school:0 "$GEN_ADJ$ School"
 genoese_school_desc:0 "Painting, and the visual arts in general, has flourished in $ITA$ since the $renaissance$. It is therefore hardly surprising that a rich and esteemed state such as $GEN$ opens its own $GEN_ADJ$ School of Art."
 geo_bagrationi_dynasty:0 "$Bagrationi$ Dynasty"
 geo_bagrationi_dynasty_desc:0 "A dynasty so old that its origins are shrouded in mystery, kings and queens of the $Bagrationi$ house have ruled $GEO$ ever since the 9th century, first as its princes and then as monarchs."
 geo_beacon_of_christianity:0 "Beacon of $christian$"
 geo_beacon_of_christianity_desc:0 "$GEO$ has been a haven for $christian$ in the Caucasus for centuries, even after being surrounded and isolated by followers of $muslim$. The ardent faith of our people is a source of inspiration for all our religious brethren."
 geo_dasturlamali:0 "Dasturlamali"
 geo_dasturlamali_desc:0 "$GEO$ has experienced tumultuous centuries since the $MGE_ADJ$ invasion, marked by periodic division, shifting external pressures, and the rising influence of the local nobility. The old $GEO_ADJ$ feudal system has been made obsolete, or at least partially discarded. The $geo_dasturlamali$, a comprehensive set of rules and guidelines detailing the obligations of subjects and nobles toward king and state, strengthens internal order and serves as the foundation for our kingdom's legal framework."
 geo_david_the_builder:0 "Davit the Builder"
 geo_david_the_builder_desc:0 "Considered the greatest ruler in the history of our country, King Davit the Builder brought $GEO$ to its pinnacle. He built a powerful, culturally influential kingdom, and a beacon for $christian$ and the $GEO_ADJ$ people."
 geo_georgian_embassies:0 "$GEO_ADJ$ Embassies"
 geo_georgian_embassies_desc:0 "We have a tradition of establishing strong diplomatic ties with all nations around us, regardless of our possible differences. As a result, our diplomats are always well received and respected."
 geo_georgian_golden_age:0 "$GEO_ADJ$ Golden Age"
 geo_georgian_golden_age_desc:0 "$GEO$ enjoyed a cultural and religious Golden Age that was brought to a sudden stop, due to the $MGE_ADJ$ invasions. That period witnessed the peak of our cultural achievements, but we will now return to it, and achieve even greater heights."
 geo_georgian_highlands:0 "$GEO_ADJ$ Highlands"
 geo_georgian_highlands_desc:0 "The lands of $GEO$ are nestled among the Caucasus Mountains, and no foreign power has ever found it easy to penetrate our territory. Our tenacity and resilience are legendary."
 geo_georgian_isolation:0 "$GEO_ADJ$ Isolation"
 geo_georgian_isolation_desc:0 "Surrounded by powerful countries with vastly different religions and cultures from ours, we are forced to use opportunistic diplomacy, and often change allegiances in order to appease everyone and preserve peace for as long as possible."
 geo_georgian_numismatics:0 "$GEO_ADJ$ Numismatics"
 geo_georgian_numismatics_desc:0 "Our country has a rich tradition of minting coins, inscribing them not only in $georgian_language$ but also in $arabic_language$ and $persian_language$, as they serve as currency for trade through our country and those that neighbor us."
 geo_georgian_principalities:0 "$GEO_ADJ$ Principalities"
 geo_georgian_principalities_desc:0 "Our regional administration is divided into many different principalities and territories. Delegating authority this way allows us to exert our rule more effectively."
 geo_georgian_resilience:0 "$GEO_ADJ$ Resilience"
 geo_georgian_resilience_desc:0 "Our country has been torn apart, by external and internal influences, more than once in its long history. However, like the phoenix of legend, it has risen from the ashes and established itself as a presence to reckon with each time. The resilience of our people is commendable."
 geo_georgian_script:0 "$georgian_culture$ Script"
 geo_georgian_script_desc:0 "The '$georgian_culture$ alphabet', created centuries ago, is not just one alphabet, but in fact three. #italic Mkhedruli#! is the script used by the civil administration, while #italic Asomtavruli#! and #italic Nuskhuri#! is used by our church. As such, our Holy Scriptures can remain uninfluenced by the lay language, while our people can still feel connected to them."
 geo_georgian_titles:0 "$GEO_ADJ$ Titles"
 geo_georgian_titles_desc:0 "'King of Kings, strong and invincible, majestic and protector of the holy kingdom of the Abkhazians, Iberians, Ranis, Kakhetians, Armenians, Shahanshah and Shirvanshah, of the East and the West, of the South and the North, of both countries, of two thrones and crowns, the godlike Suzerain and the Sovereign of the Throne.' The titles of our ruler are numerous, and all at court shall respect them!"
 geo_georgian_unification:0 "$GEO_ADJ$ Unification"
 geo_georgian_unification_desc:0 "$GEO$ has been divided in the past, both by foreign influences and internal causes. But the patriotic $GEO_ADJ$ people are more than willing to fight to ensure that $GEO$ is never divided again."
 geo_legacy_of_saint_george:0 "Legacy of Saint George"
 geo_legacy_of_saint_george_desc:0 "Our association with the legendary Saint George is well known through both the $christian_ADJ$ and $muslim_ADJ$ worlds. As he bravely faced and slew the fearsome dragon, so will our soldiers face our enemies in battle."
 geo_legacy_of_saint_nino:0 "Legacy of Saint Nino"
 geo_legacy_of_saint_nino_desc:0 "$GEO$ has one of the oldest $christian_ADJ$ churches in the world, tracing its roots back to the conversion of the region by Saint Nino over a millennium ago. Through the centuries, the $GEO_ADJ$ Church has served as an increasingly unifying force in all $GEO_ADJ$ states, and has served as a central element in $GEO_ADJ$ culture in the face of $BYZ_ADJ$, $MGE_ADJ$, and $muslim_ADJ$ influence. With few other $christian_ADJ$ kingdoms left in this region, and given the splintered loyalties within $GEO$, the Church still plays an important role as a unifying force against outsiders."
 geo_legacy_of_tamar:0 "Legacy of Tamar"
 geo_legacy_of_tamar_desc:0 "Tamar was one of the greatest rulers our nation ever had. Her military and cultural successes are legendary, and the mere utterance of her name still stirs reverence in all $GEO_ADJ$ hearts."
 geo_restoration_of_fortresses_and_churches:0 "Restoration of Fortresses and Churches"
 geo_restoration_of_fortresses_and_churches_desc:0 "Our many fortresses and churches have helped our country to resist and continue to survive among encroaching foreign influences. Our fortresses protect the land while our churches protect our spirit, and we must keep both in prime condition if we are to thrive."
 geo_sadrosho_districts:0 "Sadrosho Districts"
 geo_sadrosho_districts_desc:0 "#italic Sadrosho#!, banners, are special military districts used for mobilization purposes. By dividing our territory into several sadrosho, each under the command of their own dedicated military official, we can better organize the recruitment and distribution of all our troops."
 german_baltic_sailors:0 "Baltic Sailors"
 german_baltic_sailors_desc:0 "Harsh climates breed hardy people. Traversing the cold Baltic Sea has certainly left its mark on our sailors, making them mentally resilient and particularly skilled at their profession. This is for their ultimate benefit, as the sea can be a merciless mistress."
 german_biedermeier:0 "Biedermeier"
 german_biedermeier_desc:0 "The Biedermeier period marks a shift in social conservatism stemming from the upper classes and their nostalgia for the time when they held the most influence and power in our country. This social change has led our more free-thinking citizens to shroud their creative and intellectual pursuits in relative secrecy, well out of the public's disapproving gaze. While this inadvertently strengthens the development of a cultural identity amongst our merchants, it has also forced many valuable minds to leave our nation, seeking their lost freedoms — and taking their talents — elsewhere."
 german_fair_towns:0 "Reichsmessestädte"
 german_fair_towns_desc:0 "Imperial fairs are a rare privilege granted to only a few select cities, creating some of the largest marketplaces in $europe$ and making these cities the commercial heart of the $hre$. The centralized nature of these markets allows merchants to plan and negotiate effectively in a setting where they can benefit from freedom and access to a diverse variety of goods."
 german_imperial_roads:0 "Imperial Road Network"
 german_imperial_roads_desc:0 "Since Roman times, road networks have connected places across $GER$, making trade and travel easier and more accessible. These roads also provide critical logistical advantages, particularly when moving troops."
 german_mountain_toll_castle_advance:0 "$german_mountain_toll_castle$"
 german_mountain_toll_castle_advance_desc:0 "$german_mountain_toll_castle_desc$"
 german_populating_the_countryside:0 "Attracting the Right People"
 german_populating_the_countryside_desc:0 "By encouraging settlement in rural areas and giving the people land to work there will be a great foundation to slowly but surely increase the wealth and productivity of our more sparsely populated territories."
 german_river_toll_castle_advance:0 "$german_river_toll_castle$"
 german_river_toll_castle_advance_desc:0 "$german_river_toll_castle_desc$"
 ghazi:0 "ghazi"
 ghazi_desc:0 "In keeping with steppe traditions, our nobles are warriors of the frontier, and we shall be fearless in the fight to expand the Abode of $muslim$."
 gifts_and_hostages:0 "Gifts and Hostages"
 gifts_and_hostages_desc:0 "While our people are now united, the act of bending the knee to a common overlord has not come easy to them. By summoning all subjugated rulers to the capital, we can employ them as prestigious royal envoys. Some would call this a policy of hostage-taking; we simply see it as a way to remind our more independent-minded subjects of their loyalties."
 glass_mill_advance:0 "$glass_mill$"
 glass_mill_advance_desc:0 "$glass_mill_desc$"
 glass_workshop_advance:0 "$glass_workshop$"
 glass_workshop_advance_desc:0 "$glass_workshop_desc$"
 glassworks_advance:0 "Glassworks"
 glassworks_advance_desc:0 "$glassworks_desc$"
 glh_kipchak_khanate:0 "Kipchak Khanate"
 glh_kipchak_khanate_desc:0 "Our great country is also called the Kipchak Khanate, ruling over all the territories of the Cuman-Kipchak Confederation. With such swathes of land under our command, the armies we can gather will be innumerable."
 glh_legacy_of_jochi:0 "Legacy of Jochi"
 glh_legacy_of_jochi_desc:0 "After $genghis_khan_name_no_tooltip$ died, his son Jochi also passed not long after. However, his presence and legacy are still felt in our country, to the point that we are still known as the Ulus of Jochi. Warriors flock to our banners to uphold that legacy."
 glh_legacy_of_the_golden_horde:0 "Legacy of the Golden Horde"
 glh_legacy_of_the_golden_horde_desc:0 "We were one of the main constituent parts of $genghis_khan_name_no_tooltip$'s empire, and we represent the main political force in $eastern_europe$ and the Steppes. The world shall tremble before us!"
 glh_modernization_of_steppes:0 "Modernization of the Steppes"
 glh_modernization_of_steppes_desc:0 "It was long ago that $genghis_khan_name_no_tooltip$'s armies first seized control of the steppes. Our country has since surpassed our ancestor's every expectation, and now we stand as a global power on our own merit. We shall now begin the process of modernizing our territories, so that one day we shall be the beacon of all the world."
 glh_perso_mongol_administration:0 "Perso-$MGE_ADJ$ Administration"
 glh_perso_mongol_administration_desc:0 "Our ancestors refined our administrative system over the centuries, and they were not shy about incorporating the ideas and methods of the cultures they subdued. Our current system of administration is in part based on traditions dating back to the Great $genghis_khan_name_no_tooltip$ himself, and in part on what we have adopted from $IRA_ADJ$ and $muslim_ADJ$ bureaucrats in the lands conquered."
 glh_religious_pragmatism:0 "Religious Pragmatism"
 glh_religious_pragmatism_desc:0 "Constraining, inflexible doctrine has never won many admirers among the Tatar hordes. When the Great $Oz_Beg$ $rank_kingdom_horde_ruler_suffix_male$ adopted $muslim$, it was the faith of a Sufi Shaykh or a zealous Qāḍī that he invited into his lands.\\n\\nCenturies of tradition and loyalty are what we would rather build our state upon. Religion has a part to play, but we would prefer to see our country thrive than to fall apart in the chaos of forced religious homogeneity."
 glh_secure_the_trade_routes:0 "Secure the Trade Routes"
 glh_secure_the_trade_routes_desc:0 "Not all riches in this world originate in our territory. Trade is the source of all wealth, and the Golden Horde has always protected merchants. By ensuring the safety of anyone who wishes to move goods through our country, we can ensure a steady stream of furs, silk, spices, and other necessities to our cities. Whether they choose to sell their goods to us or not, their mere presence will generate wealth for our people."
 glh_tatar_traditions:0 "Tatar Traditions"
 glh_tatar_traditions_desc:0 "Our empire may no longer be ruled from horseback, but our armies remain masters of the mount. Over the centuries, we have stayed true to our origins, ensuring that few can match the skill of our riders. As we go forward and adopt new technology and tactics when needed, we build on the strong organization and martial traditions of the $MGE_ADJ$ Empire."
 global_burghers_max_literacy_advance:0 "Merchant Literature"
 global_burghers_max_literacy_advance_desc:0 "Members of our merchant class rely on their abilities to make a living, and those abilities in turn depend on their having had a thorough education in certain fields. Their increased wealth also increases their demand for any literature that might broaden their written culture."
 global_clergy_max_literacy_advance:0 "Clerical Literature"
 global_clergy_max_literacy_advance_desc:0 "Clerics are required to be literate by the nature of their occupation, which centers around learning, interpreting, and spreading their religious doctrine. Therefore, their spiritual formation and overall efficacy relies heavily on their access to religious doctrine and teachings."
 global_empire:0 "Global Empire"
 global_empire_desc:0 "Our commitment to our colonial empire has transformed attitudes towards working in the colonial administration. No longer seen as a haven for fortune-seeking freebooters, it is now regarded as a prestigious career for the brightest and best. This shift is reflected in more efficient tax collection."
 global_nobles_max_literacy_advance:0 "Nobiliary Literature"
 global_nobles_max_literacy_advance_desc:0 "The nobles are increasingly changing their primary function from being warriors to courtiers in the direct service of their ruler, leading them to give more importance to intellectual matters than military concerns. This has created a demand for engaging literature that appeals to their aristocratic sensibilities."
 global_supply_limit_modifier_advance_2:0 "Supply Lines"
 global_supply_limit_modifier_advance_2_desc:0 "Land warfare is becoming more dependent on supplying bigger and bigger armies. Therefore, better organization of our supply carts would lead to an increased operational capacity."
 global_supply_limit_modifier_advance_5:0 "Army Logistics Planning"
 global_supply_limit_modifier_advance_5_desc:0 "How far an army can march is a consequence of its logistics. With proper study and planning, armies can withstand longer and more distant campaigns."
 global_supply_limit_modifier_advance_6:0 "Campaign Logistics Planning"
 global_supply_limit_modifier_advance_6_desc:0 "Planning the logistics of warfare has become increasingly complex, as the growth in average army size has made it possible to field several armies at once for long-term campaigns, involving hundreds of thousands of soldiers for multiple years."
 global_trade_advance:0 "Global Trade"
 global_trade_advance_desc:0 "Goods have been moved across continents since antiquity, but all trade is now increasingly becoming part of a greater world network. It may still be early to speak of a truly global economy, but surely the first seeds have been sown."
 global_trade_routes_advance:0 "Overseas Trade Routes"
 global_trade_routes_advance_desc:0 "The world has become larger, thanks to so many new discoveries, but it has also grown smaller with the proliferation of international trade routes. With ships constantly carrying goods and people to and from far away lands, those distant shores actually seem closer than before."
 glorious_arms:0 "Glorious Arms"
 glorious_arms_desc:0 "The sight of our glorious and prestigious army will make all adversaries tremble in fear."
 glory_of_rome:0 "Glory of $rome$"
 glory_of_rome_desc:0 "We control the great city and the ancient capital of the Romans. We are the sole keepers of their marvelous tradition!"
 gold_of_bure:0 "Gold of Bure"
 gold_of_bure_desc:0 "The twin gold fields at Bambuk and Bure are renowned as the largest gold deposits anyone has ever heard of, and they belong to us! Bure's gold mines in particular produced fantastic wealth that famously destabilized the entire Egyptian economy through inflation when Mansa Mūsā visited there. Our economy, though, is used to a constant influx of gold, and is more difficult to inflate."
 gold_to_salt_trade:0 "$goods_gold$ to $salt$ Trade"
 gold_to_salt_trade_desc:0 "Some say that $salt$ is worth its weight in $goods_gold$... perhaps it would be more accurate to say that $goods_gold$ is worth its weight in $salt$. Either way, by exchanging these two commodities, we have established thriving trade networks."
 golden_fleece:0 "The Order of the Golden Fleece"
 golden_fleece_desc:0 "One of $europe$'s foremost chivalric orders. Being a Knight of the Golden Fleece is a mark of great status, and reflects well upon us."
 goose_step:0 "The Goose Step"
 goose_step_desc:0 "Although it looks rather odd, the 'goose step' is specifically designed to facilitate our men holding their line as they advance towards the enemy. This provides our armies with a tangible advantage on the battlefield."
 gov_reform_discovery_a:0 "Early Administrative Reformation"
 gov_reform_discovery_a_desc:0 "Our people stand at the threshold of a new era. In order to harness our internal capabilities, we must adapt our government and refine our administrative domain."
 gov_reform_reformation_a:0 "The Prince"
 gov_reform_reformation_a_desc:0 "Current events have determined that rulers need to approach the management of the state more systematically, taking into account both the different estates of the country, and the distinct diplomatic actors that surround them."
 government_sanctioned_celebrations:0 "Government-Sanctioned Celebrations"
 government_sanctioned_celebrations_desc:0 "Our people are always eager to celebrate any good tidings, be they in honor of our country or to mark days on the calendar. Instead of letting them hold these joyful gatherings on their own, we should have our administration organize grand public celebrations, so that we can show our people we care about them while fostering a greater sense of unity between them at the same time."
 government_size_absolutism:0 "Loyal Subordinates"
 government_size_absolutism_desc:0 "Concentrating power in the hands of the rulers allows them to take direct action, but they still need people under them to help carry out those actions. Giving those subordinates no real power, while making them unfailingly loyal to the ruler, allows the $crown_estate$ to host more of them without fear of infighting or discontent."
 government_size_discovery:0 "Early Administrative Capacity"
 government_size_discovery_desc:0 "Our domain consists of many administrative sectors, and as we expand it, we must make the necessary adjustments to our government to account for this growth."
 government_size_renaissance:0 "Permanent Cabinet"
 government_size_renaissance_desc:0 "Rulers traditionally had a council of advisors to counsel them through making important decisions. Over time, our government has grown so complex that we need to establish more permanent advisory positions to help us deal with day-to-day governance."
 government_size_revolutions:0 "Modern Representation"
 government_size_revolutions_desc:0 "With the establishment of official forms of popular representation, the government is better able to address important issues than ever before."
 gozan_jissetsu:0 "Gozan Jissetsu"
 gozan_jissetsu_desc:0 "The 'Five Mountains System' originated in $china$ from state-sponsored Chán $buddhist_ADJ$ monasteries, atop the holy mountains that gave the system its name. In $japan_region$, the practice continued in the $kamakura$ period by the sponsoring of the Zen temples, the Five Mountains of $kyoto$ and the Five Mountains of $kamakura$. By maintaining our sponsorship of such institutions, we can use them to help stabilize our rule."
 gra_a_new_golden_era:0 "A New Golden Era"
 gra_a_new_golden_era_desc:0 "Al-'Andalus was once a center for learning, home to exceptional scholars like 'Aḥmad Ibn Rušd, 'Abū al-Qāsim, and Muḥammad bin Ṭufayl. We should endeavor to continue this long-standing intellectual tradition."
 gra_a_strong_rule:0 "A Strong Rule"
 gra_a_strong_rule_desc:0 "For decades, generations of our ruling family have fought incessantly with each other, destabilizing our nation. It is about time a powerful ruler decisively asserted their authority, proving they are the only one who can keep the peace and bring prosperity to our nation."
 gra_adaptative_trade:0 "Adaptive Trade"
 gra_adaptative_trade_desc:0 "Our privileged position as middlemen between $christian_ADJ$ and $muslim_ADJ$ nations is being challenged. This threat could be an opportunity to modernize our trade methods and recover our position as a link between more distant markets and $europe$."
 gra_banu_nasr:0 "Banū Naṣr"
 gra_banu_nasr_desc:0 "We descend from the Banū l-Ḫazraj tribe and come from the lineage of Saʿd ibn ʿUbāda, a companion of the Prophet Muhammad. The founder of our dynasty, Muhammad I, controlled a territory that included $granada$, $jaen$, $almeria$, and $malaga$, though some of those lands fell to the $christian_ADJ$ forces. Since then, we have been resisting their advances with tenacity, and we will continue doing so with the strength of our ancestors."
 gra_expand_qanahs:0 "Expand the Qanāh"
 gra_expand_qanahs_desc:0 "The lands of $GRA$ are fertile, but expanding our irrigation canals would allow us to make better use of our water supply, and grow better-quality crops as a result."
 gra_expand_the_frontier:0 "Expand the Frontier"
 gra_expand_the_frontier_desc:0 "Since the foundation of our dynasty, our territorial holdings have been shrinking. However, we are now in a stronger position, capable of not only recovering every piece of lost land, but enlarging our realm even beyond those original borders."
 gra_ghazawat:0 "Nasrid Ghazawat"
 gra_ghazawat_desc:0 "As the descendants of the warriors who fought under the Prophet, we must defend our realm with similar bravery. Every battle for $GRA$ is a #italic ghazawat#! — a holy struggle to preserve $muslim$ against the onslaught of $christian$."
 gra_modernized_economy:0 "Modernized Economy"
 gra_modernized_economy_desc:0 "Modern times demand a modern economy, capable of thriving in a highly competitive environment. By upgrading our infrastructure and making our production methods and processes more efficient, we will maximize production using the same amount of resources."
 gra_muttavia_armies:0 "Mutawwi'a Armies"
 gra_muttavia_armies_desc:0 "$GRA$ has a limited number of people, and we cannot draft enough soldiers to defend our nation effectively. However, where we lack people, we do not lack gold, and that can be used to bring mercenary swords under our banners."
 gra_nasrid_art:0 "Nasrid Art"
 gra_nasrid_art_desc:0 "The artisans and architects of $GRA$ are the most skillful in the world. They create things that are not only useful, but pleasing to the eye, beautifully combining form and function."
 gra_razzias:0 "Nasrid Razzias"
 gra_razzias_desc:0 "The borders of our enemies are tantalizing opportunities for us. Should we boldly strike with lightning attacks, we can catch the enemy off-guard and inflict lasting damage."
 gra_skillful_envoys:0 "Skillful Envoys"
 gra_skillful_envoys_desc:0 "Our skillful use of diplomacy has been the deciding factor between life or death many times before. But we must not let ourselves be lulled into complacency; we must train our envoys even more to ensure their success."
 gradual_departure:0 "Gradual Departure"
 gradual_departure_desc:0 "Although they were quick to brand us as heretics, $miaphysite$ did not cut ties with the rest of the $christian_ADJ$ world instantly. We kept in contact with the other patriarchates, and attended the councils, but it was gradually made clear that $miaphysite$ is too different from those heretical beliefs."
 granary_of_europe:0 "Granary of $europe$"
 granary_of_europe_desc:0 "The fertile fields of our domain are home to $europe$'s richest grain crops, in part thanks to the $folwark_system$. Through our grace, we supply the markets beyond our borders, ensuring our people continue to prosper and never go hungry."
 grand_army:0 "Grand Army"
 grand_army_desc:0 "Allows us to create one of the largest and most powerful armies the world has ever seen."
 grand_banquets:0 "Grand Banquets"
 grand_banquets_desc:0 "No important matter can be discussed without an accompanying meal, and the more important the matter is, the more indulgent the meal should be. Having regular grand banquets allows us to constantly and properly discuss all matters that need consideration."
 grand_coordinators:0 "Grand Coordinators"
 grand_coordinators_desc:0 "Maintaining control over our territories, policymaking, and military operations is vital for the continuation of our dynasty. Through the creation of Grand Coordinators, a body of high-ranking officials who can coordinate governance across our vast empire, we will succeed in cementing our position through effective stabilization of internal and external matters."
 grand_display_of_faith:0 "Grand Displays of Faith"
 grand_display_of_faith_desc:0 "To honor God, we need to construct great monuments in His name. Not only will this display our devotion to our faith, but it will also demonstrate the magnificent skills of our sculptors and architects."
 grand_dukes_army:0 "Grand Duke's Army"
 grand_dukes_army_desc:0 "Leading troops is the most important duty for the Grand Duke, who is appointed to rule over the Veche Republic. Under such strong and experienced leadership, our armies will become far more deadly in battle."
 grand_marketplace_advance:0 "$grand_marketplace$"
 grand_marketplace_advance_desc:0 "$grand_marketplace_desc$"
 grand_military_parades:0 "Grand Military Parades"
 grand_military_parades_desc:0 "Our illustrious military history of our people is a great source of inspiration and pride for our people. By conducting elaborate parades to showcase our armies, we will decisively demonstrate our martial experience and unparalleled strength."
 grand_navy:0 "Grand Navy"
 grand_navy_desc:0 "Allows us to create one of the largest and most powerful navies the world has ever seen."
 grand_shipyard_advance:0 "Grand Shipyard"
 grand_shipyard_advance_desc:0 "$grand_shipyard_desc$"
 grant_privilege_cost_modifier_renaissance_advance:0 "Codified Privileges and Duties"
 grant_privilege_cost_modifier_renaissance_advance_desc:0 "By formally codifying the societal roles of each estate in written law, we will clarify their exact privileges and obligations. When rights and responsibilities are clearly defined, each estate knows exactly what it is owed and what it owes in return, and therefore it will be easier for us to grant new privileges without sparking rivalries."
 gre_greek_viticulture_advance:0 "Greek Viticulture"
 gre_greek_viticulture_advance_desc:0 "We have revolutionized the agriculture of Greece, moving away from subsistence farming toward high-value export crops, specifically the famous #italic Malvasia#! wine and sun-dried currants. By investing in modern irrigation and processing techniques, we have made our agricultural products a staple of the European luxury market. The resulting economic boom funds a professional standing army and allows us to maintain a courtly splendor that rivals the great kings of the West."
 gre_megali_idea_realized_advance:0 "Megali Idea Realized"
 gre_megali_idea_realized_advance_desc:0 "The dream of a restored Hellenic world, stretching from the Ionian to the Anatolian coast, has become the guiding star of our national policy. We have developed a legal and historical framework that justifies our expansion into all lands once held by our ancestors, framing our conquests as 'liberations'. This ideological fervor drives our administration to integrate new territories with unprecedented speed, as the populace welcomes their return to the Hellenic fold."
 gre_rebuilding_the_theme_system_advance:0 "Rebuilding the Theme System"
 gre_rebuilding_the_theme_system_advance_desc:0 "We have looked to the golden age of the Middle Byzantine period to solve our manpower crisis. By granting hereditary land plots to #italic Akritai#! (border guards) in exchange for perpetual military service, we create a self-sustaining defense force deeply rooted in the soil they protect. This system reduces our reliance on expensive mercenaries and ensures that every province has a dedicated militia capable of holding the line until the main imperial army arrives."
 gre_restoration_of_power_advance:0 "Restoration of Power"
 gre_restoration_of_power_advance_desc:0 "To survive the chaos of the Fourth Crusade, the scattered Greek fragments must return to the principle of a single, absolute Basileus. We have dismantled the local #italic Archon#! rivalries that allowed the Latins to conquer us piecemeal, re-establishing a central court that commands absolute loyalty. This centralization of power ensures that the state speaks with one voice and acts with one sword, suppressing the internal bickering that once bled the Empire dry."
 gre_the_hellenic_admiralty_advance:0 "The Hellenic Admiralty"
 gre_the_hellenic_admiralty_advance_desc:0 "A unified Greece must be the master of the 'Inner Sea' if it is to survive between the giants of East and West. We have established a centralized Admiralty in Piraeus, standardizing ship construction and training a professional officer corps in the latest navigational sciences. By merging the speed of the galley with the firepower of the galleon, we create a fleet that is both agile in the Aegean winds and formidable in the open Mediterranean."
 gre_the_new_stratikon_advance:0 "The New Stratikon"
 gre_the_new_stratikon_advance_desc:0 "As gunpowder reshapes the battlefields of Europe, we have synthesized Western musket drills with our traditional tactical manuals. Our infantry, the #italic New Stratikon#!, are trained to maintain rigid discipline under fire, mimicking the legendary resilience of the ancient phalanx but armed with modern harquebuses and pikes. This professionalization of the rank-and-file ensures that we are no longer a medieval relic, but a modern military powerhouse capable of standing toe-to-toe with any empire."
 great_sejm_reforms:0 "Great Sejm Reforms"
 great_sejm_reforms_desc:0 "If we are to survive and continue to prosper, our governmental mechanism must run efficiently and be based on robust foundations. The parliament shall adopt modernized procedures and strengthen its authority. The goals of this evolution are to curtail the power of the nobility and mitigate the escalating abuses of serfdom."
 great_tax_reform:0 "Great Tax Reform"
 great_tax_reform_desc:0 "Our wealthy nation has ample coin and bounteous, fertile fields, but all this abundance requires comprehensive taxation. The Great Tax Reform enables more efficient revenue management, which should guarantee a healthier budget for our realm."
 great_three:0 "The Three Great Seats"
 great_three_desc:0 "Sera, Ganden, and Drepung, these towering monastic universities form the intellectual heart of $TIB$. Their scholars train one generation after another of monks, diplomats, and rulers. With their rise, our realm became not only a bastion of faith but a cradle of rigorous thought and institutional progress."
 greek_group_aegean_coastal_defence_advance:0 "Aegean Coastal Defense"
 greek_group_aegean_coastal_defence_advance_desc:0 "The jagged coastlines and thousands of islands of the Aegean are our natural fortifications. We have transformed our maritime culture into a defensive doctrine, where every merchant vessel is armed and every fisherman is a potential marine. By patrolling the narrow straits and hidden coves, we ensure that any hostile fleet attempting to move through our waters is subjected to constant harassment. This decentralized naval power makes our maritime heartland nearly impossible to occupy."
 greek_group_hesychast_traditions_advance:0 "Hesychast Traditions"
 greek_group_hesychast_traditions_advance_desc:0 "In an era of political decay, the spiritual movement of Hesychasm, championed by Grēgórios Palamâs, provides a profound inner strength. By focusing on the 'uncreated light' through silent prayer, our people find a unity that transcends failing borders and imperial intrigue. The monasteries of Mount Athos become the spiritual nerve centers of the Greek world, ensuring that neither the Pope's emissaries nor the Sultan's janissaries can break the religious cohesion of our populace."
 greek_group_stratioti_levies_advance:0 "Stratioti Levies"
 greek_group_stratioti_levies_advance_desc:0 "The rugged landscape of the Balkans has birthed a unique class of warrior: the Stratioti. These light cavalrymen, often wearing a mix of Byzantine armor and local attire, are masters of the 'hit and run' tactics necessary to harass larger, slower Western or Ottoman armies. Their reputation for ferocity and scouting excellence makes them indispensable, turning the tide of mountain battles where heavy knights flounder. They are the vanguard of a Greek military resurgence."
 greek_group_the_modern_greek_enlightenment_advance:0 "The Modern Greek Enlightenment"
 greek_group_the_modern_greek_enlightenment_advance_desc:0 "The #italic Diafotismós#! brings the fire of Western scientific inquiry back to the lands where philosophy was born. Greek intellectuals ship thousands of books back to the homeland, sparking a massive educational reform. This movement replaces old superstitions with the ideals of liberty, equality, and a renewed Hellenic identity. The resulting national awakening transforms our subjects into citizens, ready to fight for a modern, enlightened state."
 greek_group_the_phanariote_network_advance:0 "The Phanariote Network"
 greek_group_the_phanariote_network_advance_desc:0 "Within the narrow streets of the Phanar district, a new class of Greek merchant-diplomats has risen to prominence. Leveraging their literacy and linguistic skills, these families have made themselves indispensable to the administrative machinery of the Mediterranean powers. They serve as dragomans, governors, and financiers, creating a shadow empire of influence that spans from the Danube to the Nile. Their secret correspondence provides our state with unparalleled intelligence and diplomatic leverage."
 greek_group_the_spirit_of_resistance_advance:0 "The Spirit of Resistance"
 greek_group_the_spirit_of_resistance_advance_desc:0 "The fall of Constantinople at the hands of the crusaders was not the end of the Roman soul, but its crucible. Across the fragmented themes, a fierce #italic Ethnos#! begins to coalesce, defined by a refusal to bow to the Latin #italic Frankokratia#!. This defiance manifests as a spiritual and physical mobilization, where every village becomes a cell of resistance against the crusader lords. By clinging to our rites and language, we turn local skirmishes into a holy war for the restoration of our rightful heritage."
 greek_rite:0 "$greek_culture$ Rite"
 greek_rite_desc:0 "Our rites and canonical practices have been for centuries well-defined following the $greek_culture$ rites of $constantinople$. Although there may be some small variations in certain places, there is remarkable homogeneity in the rites performed throughout $orthodox$."
 green_standard_army:0 "Green Standard Army"
 green_standard_army_desc:0 "The Green Standard Army, a military force mainly composed of ethnic Hàn soldiers, coexists with our Eight Banner armies. Originally formed by surrendered troops and recruited on a voluntary, long-term basis, they attract individuals from socially disadvantaged backgrounds. Used as a police force post-consolidation, they will play a crucial role in local military governance, while Bannermen will be reserved for emergencies and sustained resistance."
 green_vitriol:0 "Green Vitriol"
 green_vitriol_desc:0 "Although not technically the same substance as $alum$, $green_vitriol$ has been traditionally conflated with it in alchemical writings, and both have similar properties. As such, it is not uncommon to use one as a substitute for the other."
 griot_advance:0 "Griots"
 griot_advance_desc:0 "The #italic griots#! are storytellers, historians, counselors, musicians, and poets all at once. They safeguard the stories and legends of past generations, mediate between warring parties, and serve both their rulers and local people as advisors."
 guardians_of_ifriqiya:0 "Guardians of Ifrīqya"
 guardians_of_ifriqiya_desc:0 "As successors to the ancient cities of Carthage and Kairouan, we bear the mantle of guardianship over the heart of the $maghreb_region$. Our rule brings stability, and shall be welcomed by all in a once-contested region."
 guards_of_the_shannon_advance:0 "Guards of the Shannon"
 guards_of_the_shannon_advance_desc:0 "The fortress of Athlone, standing astride the mighty river Shannon, is the key to controlling the heart of $IRE$. The O'Kellys of $HYM$, long-standing lords of these lands, have fought fiercely to defend their holdings against $norman$ incursions."
 guilds:0 "guilds"
 guilds_desc:0 "A guild is an association of merchants or craftsmen who have come together for mutual protection, aid, and for the pursuit of their own interests. Guilds establish monopolies of their goods and trade, and set standards for the quality and price of trade goods."
 guj_garba:0 "Garba!"
 guj_garba_desc:0 "Originating out of the worship dances done by women in praise of the $hindu_ADJ$ goddess Ambaji, our people have refined a new and very graceful form of dance called the Garba. The basics of the dance are singing and clapping rhythmically in a circular formation. Today, our men and women use this dance to celebrate any occasion with great fervor, coming together as a community and wearing exquisitely embroidered outfits. All of us together, young and old, peasant and prince, $muslim_ADJ$ and $hindu_ADJ$, dancing in an ever-growing circle."
 guj_gujarati_lipi:0 "$GUJ_ADJ$ Lipi"
 guj_gujarati_lipi_desc:0 "The $GUJ_ADJ$ Lipi is a new script and writing system developed by mercantile interests. Also known as the #italic saraphi#! (bankers), #italic vaniasai#! (merchants), or #italic mahajani#! (traders) script due to its association with commerce, its use has rapidly become widespread throughout $GUJ$, $KUT$, and $SND$ for writing regional languages and studying $sanskrit_language$. The $zoroastrian$ community has also adopted it as a writing system for Avestan. This common writing system unites diverse communities, facilitating both practical communication and a common identity."
 guj_gujarati_merchant_diaspora:0 "$GUJ_ADJ$ Merchant Diaspora"
 guj_gujarati_merchant_diaspora_desc:0 "Our people trade on every shore, pursuing commerce and following the trade winds. Our fleets sail constantly in pursuit of new opportunities, and our merchants understand both the craft of shipbuilding and the value of building good, hardy ships on a limited budget."
 guj_hub_of_the_indian_ocean_trade:0 "Hub of the $indian_ocean_region$ Trade"
 guj_hub_of_the_indian_ocean_trade_desc:0 "Due to the nature of the monsoon tradewinds and its specific location, $GUJ$ has long served as the hub of the East-West trade in the $indian_ocean_region$, connecting the $red_sea_area$, $egypt_region$, and Malacca. Due to this, $GUJ$ merchants were important middlemen bringing such precious goods as spices from the Maluku Islands and $silk$ from $CHI$, and then selling them to the merchants coming from the west."
 guj_jain_routes:0 "$jain_ADJ$ Connections"
 guj_jain_routes_desc:0 "$jain$ is an ancient way of life, shaped into its current form by Mahavira. For a thousand years, $GUJ$ has been the stronghold of the $jain_ADJ$ community and faith, with many holy sites and temples. Royal dynasties have patronized the religion, forming a community with the $hindu_ADJ$ people. $muslim_ADJ$ invasions from the west by Mahmud Ghazni and Mohammad Ghori, oppressed the $jain_ADJ$ community, vandalizing temples or converting them into mosques, as well as burning $jain_ADJ$ libraries. However, the $jain_ADJ$ people of $GUJ$ have survived, adapted, and prospered, using their connections with $jain_ADJ$ communities across the world to serve as a hub for both faith and commerce."
 gun_factory_advance:0 "Gun Factory"
 gun_factory_advance_desc:0 "$cannons_factory_desc$"
 gun_smith_advance:0 "Gunsmith"
 gun_smith_advance_desc:0 "$gun_smith_desc$"
 gunpowder_advance:0 "Gunpowder"
 gunpowder_advance_desc:0 "The usage of gunpowder on the battlefield will certainly have a positive impact on our performance and allow us to excel in military engagements."
 gunpowder_empires:0 "Gunpowder Empires"
 gunpowder_empires_desc:0 "Gunpowder may have been invented in the Far East, but it was through $muslim$ that it became widely used throughout the world. Gunpowder weapons have been a staple of our armies for generations, and its production and use is one of our defining characteristics."
 guns_workshop_advance:0 "$guns_workshop$"
 guns_workshop_advance_desc:0 "$guns_workshop_desc$"
 gustavian_infantry:0 "Gustavian Infantry"
 gustavian_infantry_desc:0 "Gustavus Adolphus, ruler of $SWE$, made several innovations to his infantry that improved their performance. His formations were narrowed and made rectangular to increase the number of muskets that could fire in each volley, and the attachment of small artillery pieces further increased their firepower."
 hab_expert_mountaineers:0 "Land of Mountains and Rivers"
 hab_expert_mountaineers_desc:0 "Our people are highly adapted to traverse the obstacles of our country, from the high peaks and passes of our mountains to the wide rivers of our valleys."
 habsburg_dominance:0 "$HAB_ADJ$ Diplomatic Expertise"
 habsburg_dominance_desc:0 "Given our location at the center of all $europe$, we must adopt a highly flexible attitude towards external diplomacy. Alliances and rivals can shatter as easily as they are formed, and our diplomats must be trained to cover every possible position."
 hachiman_worship:0 "Hachiman Worship"
 hachiman_worship_desc:0 "Hachiman is one of the most venerated divinities. Originally a deification of Ōjin Tennō, after the introduction of $buddhist$ he was later also identified as a Bodhisattva. He is the protector of the Imperial line and the tutelary god of the warrior class."
 hai_bustling_towns:0 "Bustling Towns"
 hai_bustling_towns_desc:0 "Our lively urban settlements are full of potential. With just a little effort, we can make them and their hinterlands incredibly wealthy, allowing us to thoroughly tax them."
 hai_expert_embassadors:0 "Expert Ambassadors"
 hai_expert_embassadors_desc:0 "Our rulers have always been skillful with their words, and their diplomatic acumen has established their influence far beyond our national borders. As time goes on and geopolitical pressures intensify, we must start cultivating friendship with other nations for protection while expanding our sphere of influence."
 hai_frontier_march:0 "A Frontier March"
 hai_frontier_march_desc:0 "As a border province of the $hre$, $HAI$ has developed a rough-and-ready spirit, born from centuries of frontier conflict. This spirit makes our people naturally inclined towards taking defensive action, which we can exploit to our benefit."
 hakkapelitta:0 "Hakkapeliitta"
 hakkapelitta_desc:0 "$FIN$ is considered a rather poor and backwards region, but service in the $SWE_ADJ$ cavalry offers skilled $FIN_ADJ$ horsemen ample opportunities for glory and plunder. Superior horsemanship and high-quality mounts allow us to raise the feared #italic Hakkapeliitta#! — cavalry so effective in battle that our enemies whisper they must be protected by witchcraft."
 hamburg_port_cities:0 "Port Networks"
 hamburg_port_cities_desc:0 "Our country survives through its strong ties to maritime trade and the constant exchange of goods. To maintain an orderly harbor, we will need to dredge fresh waterways and build more docks and warehouses, attracting new merchants and their ships."
 hand_cannon_guild_advance:0 "$hand_cannon_guild$"
 hand_cannon_guild_advance_desc:0 "Primitive metal tubes which were a lesser form of later, more advanced guns. First developed in $CHI$, the early hand cannon spread to $KOR$ and $JAP$ in 1270."
 harae:0 "harae"
 harae_desc:0 "In our faith, the practice of #italic $harae$#!, or ritual purification, is key to removing all #italic tsumi#!, sins, and #italic kegare#!, spiritual uncleanness. Mandating that our population performs the $harae$ rituals properly and frequently ensures that our country remains spiritually pure."
 harsh_environments:0 "Harsh Environments"
 harsh_environments_desc:0 "$muslim$ has, since its inception, found its way to civilizations in some of the harshest environments of the world. If anyone from outside our region tries to invade our territories, they will find it fiendishly difficult — as they should!"
 haudenosaunee_ambition:0 "Model Confederacy"
 haudenosaunee_ambition_desc:0 "The $IRO$ Confederacy has become a model for success. All nations around us are awestruck by our excellent rulership!"
 haudenosaunee_heritage:0 "Fierce Warriors"
 haudenosaunee_heritage_desc:0 "It would be a mistake for our enemies to regard us as weak based on our diplomatic strength. Our warriors are as fierce and proud as those from any militaristic society, and underestimating them is the leading cause of death among our rivals."
 haudenosaunee_present_giving:0 "$IRO_ADJ$ Gift-Giving"
 haudenosaunee_present_giving_desc:0 "The basis of our trade interactions is represented in the form of gift exchanges. As our people come together and work for the benefit of the whole, the act of gifting is guaranteed to be followed by another gift in return."
 haudenosaunee_tradition:0 "Legacy of Hiawatha"
 haudenosaunee_tradition_desc:0 "The legendary Hiawatha, renowned among the $IRO_ADJ$ people as a great speaker and leader, has set a very high precedent for what a diplomat should be. We will honor him by following his example in our diplomatic relations."
 head_hunters:0 "Head Hunters"
 head_hunters_desc:0 "Conquering territory from weaker peoples is a necessary evil in our state. These circumstances have created a unique warrior code, according to which capturing and not killing the enemy is the highest display of bravery and valor. This has made our people famous for their mastery in capturing people alive."
 heavenly_architecture:0 "Heavenly Architecture"
 heavenly_architecture_desc:0 "$orthodox_ADJ$ religious buildings are designed in imitation of heaven. Their construction centralized around the basilica, the central dome that serves as a roof and symbolizes the heavens. Richly decorated in beautiful images and gleaming golden icons, they are a wonder to behold."
 heian_kyo:0 "Heian-Kyō"
 heian_kyo_desc:0 "The city of Heian-Kyō has been the residence of the Emperor for centuries, and is a center for art and culture. It is there where the lavish court of the $fujiwara_dynasty$ flourished, and all the people in $JAP$ looked to it with awe and inspiration. We shall embrace its traditional role, and with our patronage make the culture of our capital flourish once again."
 heirs_of_rollo:0 "Heirs of Rollo"
 heirs_of_rollo_desc:0 "The legacy of Rollo, the Viking founder of $NRM$, continues to define our ruling house. Such a prestigious line has led to strengthened legitimacy and respect from our peers."
 heirs_of_rome:0 "Heirs of Rome"
 heirs_of_rome_desc:0 "Many have claimed to be the heirs of Rome and indeed the whole Roman Empire. However, only our religion is the true faith of the old Empire, and therefore only we can legitimately claim to be a direct descendant from it."
 heirs_of_rum:0 "Scions of Rûm"
 heirs_of_rum_desc:0 "After surviving a turbulent period, and winning the struggle to dominate our neighboring Beyliks, the time has finally come for us to restore the borders of the once-great Sultanate of Rûm!"
 heritage_of_the_rus:0 "The Legacy of the Rus'"
 heritage_of_the_rus_desc:0 "The lands of the Rus' shattered into fragmented states long ago, but the memory of our once-great empire, ruled from $kyiv$, burns brightly in us all. If we style ourselves in the old fashion, and highlight our connection to our ancestors, we will be able to carve out a distinctive set of traditions for our people."
 hes_form_the_militia_army:0 "Professional Army Core"
 hes_form_the_militia_army_desc:0 "Our strategic position within the Empire makes us an attractive staging ground for other princes' armies whenever outside threats arise. However, hosting foreign troops hurts our finances. To prevent this costly burden, we must raise our own troops and put them into service of the Empire."
 hesse_jager:0 "$a_hesse_jager$"
 hesse_jager_desc:0 "$a_hesse_jager_desc$"
 hiberno_norman_keeps_advance:0 "Hiberno-Norman Keeps"
 hiberno_norman_keeps_advance_desc:0 "Our $norman$ forebears built splendid towers to maintain their grip on the hostile interior of $IRE$."
 hidden_cities:0 "Hidden Cities"
 hidden_cities_desc:0 "In a land of immense peaks and impenetrable rainforests, many of our cities are nearly inaccessible to outsiders. They could easily remain hidden for centuries, forgotten by the world."
 hin_administration_of_india:0 "Indian Administration"
 hin_administration_of_india_desc:0 "Governing a state as large as an entire subcontinent is no easy task. We will need to develop a robust system of administration in cooperation with local princes to get the most out of our production and to ensure widespread stability."
 hin_ganga:0 "Gaṅgā"
 hin_ganga_desc:0 "Many $hindu_ADJ$ faithful worship the river Ganges as a goddess that brings purity and redemption to the faithful. We implore pilgrims to visit the river banks to bathe in the sacred waters. Through Gaṅgā, our nation is made pure."
 hin_gunpowder_empire:0 "Gunpowder Empire"
 hin_gunpowder_empire_desc:0 "Our mastery of gunpowder warfare has brought us glory and helped us found our great state. This dominance would be impossible without fostering firearms production for our troops."
 hin_indian_empire:0 "Imperial $india$"
 hin_indian_empire_desc:0 "No ruler, be they $muslim_ADJ$, $hindu_ADJ$, $buddhist_ADJ$, or $jain_ADJ$, has ever succeeded in conquering the entirety of the subcontinent. We shall be the first universal rulers of $india$!"
 hin_industrialization:0 "Industrialization of $india$"
 hin_industrialization_desc:0 "Conditions in our economy are ideal for rapid industrial growth. With new technology we can ensure better conditions for our local production, particularly in the textile industry. Our focus on new methods means that our state can ensure steady industrial expansion."
 hin_persianate_court:0 "Persianate Courtly Culture"
 hin_persianate_court_desc:0 "Foreign languages and noble customs have richly influenced the courts of $india$ for a long time. We should utilize these connections to invite the most capable advisors to serve under our guidance."
 hin_rocketry:0 "Develop Rocket Technology"
 hin_rocketry_desc:0 "Iron-cased rockets have yet to be widely adapted for military purposes, yet their explosive power surely has tactical applications. We should experiment with this technology and test it on the battlefield."
 hin_sepahi:0 "Sipâhi"
 hin_sepahi_desc:0 "Neglecting the importance of the infantry has been the downfall of many would-be conquerors. We must ensure that our troops are equipped with the most effective firearms and drilled in tactics that can adapt to any foe."
 hin_sufism:0 "Attract Sufi Missionaries"
 hin_sufism_desc:0 "$muslim_ADJ$ princes across the world compete to attract the wisest Sufi teachers. As our renown has grown, more of these Sufis have joined us. Towns are founded wherever they settle, often in previously inhospitable regions, and the local people are inspired to convert through the wisdom of the Sufis."
 hin_united_india:0 "United $india$"
 hin_united_india_desc:0 "The many people, cultures, languages, and nations that make up $india$ shall be finally united under a single banner. Only with common understanding and a carefully fostered unity among all our people can we strive towards greater ambitions."
 hindu_architecture:0 "$hindu_ADJ$ Architecture"
 hindu_architecture_desc:0 "Regardless of the style of construction, be it a Śikhara, Vimāna, or Prāṅg, $hindu_ADJ$ temples are recognizable everywhere for their tall, decorated towers. A representation of $mount_meru$, more or less emphasized depending on the region, these spires serve both as a signal of faith and a demonstration of power."
 hindu_empires:0 "$hindu_ADJ$ Empires"
 hindu_empires_desc:0 "There have been many empires in the past that followed $hindu$. From the Maurya and Gupta empires in $india$, to the Śrīvijaya Empire in $indonesia_region$, and the long-lasting Chola Dynasty, $hindu$ has always been the spirital force behind the throne of powerful rulers."
 hindu_muslim_relations:0 "$hindu_ADJ$-$muslim_ADJ$ Relations"
 hindu_muslim_relations_desc:0 "There has been a lot of interaction in the past between $hindu$ and $muslim$, and there will continue to be so. Our peoples have learned to live peacefully together and there has even been some degree of syncretism between the two faiths."
 hindu_unification:0 "$hindu_ADJ$ Unification"
 hindu_unification_desc:0 "Despite the differences in beliefs and practices throughout $hindu$, there are more commonalities between us than differences. A common unified view of $hindu$ has started to emerge, and our people can gain a great sense of unity through it."
 hire_artist_cost_modifier_advance_disc:0 "Land of Culture"
 hire_artist_cost_modifier_advance_disc_desc:0 "Culture and the arts define the identity of any country. By proudly promoting our cultural achievements, we will leave a lasting impression on the entire world."
 hispano_moresque_style:0 "Hispano-Moresque Style"
 hispano_moresque_style_desc:0 "Our cities reflect a unique blend of Andalusian elegance and Maghrebi architecture. The Hispano-Moresque style, passed down from foreign artisans and nobles, inspires a new cultural flowering and elevates the prestige of our court."
 hofkriegsrat:0 "hofkriegsrat"
 hofkriegsrat_desc:0 "Our war council can only function with a proper bureaucratic structure. Only when we know every detail about our troops and logistics can we defend our realm from hostile intruders."
 hol_maritime_warfare:0 "Maritime Warfare"
 hol_maritime_warfare_desc:0 "As a maritime nation, our sailors are accustomed to naval combat, whether against members of rival nations or pirates attempting to plunder our trading vessels. In any case, our navy must be prepared to face any enemy at any time."
 hol_sailors:0 "Hollander Sailors"
 hol_sailors_desc:0 "A land of sands and flooded terrain, the people of $HOL$ have always looked at the sea as their natural second home, where bountiful resources and glorious adventures await those brave enough to pursue them."
 hol_trading_spirit:0 "Trading Spirit"
 hol_trading_spirit_desc:0 "Our country is surrounded by the sea, so it is only natural that we would brave the roiling waves in search of trading ports and enriching goods to bring back."
 holi:0 "holi"
 holi_desc:0 "Held at the beginning of spring to celebrate its arrival, $holi$ is the festival of colors and love. We commemorate agriculture and good harvests, and at the same time enjoy the myriad of colors that spring offers. It is also the time to have fun and resolve conflicts, removing one's emotional impurities."
 hollander_beater:0 "Hollander Beater"
 hollander_beater_desc:0 "For centuries, paper mills have relied on mechanical hammers to beat lumpen paper pulp, crushing the fiber to create the raw material needed to then create paper. Using local windmills for power, enterprising artisans have now devised a more efficient solution: the 'Hollander Beater', a vat containing a wind-powered horizontal roller with blades. These blades can shred as much pulp in hours as the old hammers did over days."
 holy_father:0 "The Holy Father"
 holy_father_desc:0 "Being the Vicar of God to the Roman $catholic_ADJ$ faithful gives us a certain amount of political leeway. The Papal Bull, documents carrying the $game_concept_pope$'s official seal, carry the weight of the very word of God. With these, rulers have been cursed and entire continents divided."
 holy_revelation:0 "Holy Revelation"
 holy_revelation_desc:0 "The Word of $muslim_god_name$ was revealed to His Prophet Muḥammad, peace be upon him, and transcribed in the Holy $common_string_quran$. Through its verses, $muslim_god_name$'s will is passed to His faithful, and all $muslim_ADJ$ believers should be familiar with its passages."
 holy_rivers:0 "Holy Rivers"
 holy_rivers_desc:0 "Rivers and their veneration have always been an important part of $hindu$. From the Indus to the Ganges, there are many rivers considered holy, on the shores of which many rituals are held. Their waters are considered sacred, and they are a common site for purification rituals."
 home_of_hussars:0 "Home of the Hussars"
 home_of_hussars_desc:0 "Although light cavalry formations are an old concept, the first Balkan hussars — or #italic gusars#! — appeared as auxiliary units of $BYZ$, recruited mainly from $BYZ_ADJ$-held $serbia_area$ in the 10th and 11th centuries. Even after $BYZ_ADJ$ power dwindled, this tradition remained, and was further refined over the following centuries."
 home_of_the_whirling_dervishes:0 "Home of the Whirling Dervishes"
 home_of_the_whirling_dervishes_desc:0 "$konya$, our spiritual center, is home to the followers of Mevlânâ Jalāl al-Dīn Muḥammad Rūmī. Their sacred practice — the #italic sema#! — symbolizes the soul's journey toward divine truth. Their presence deepens the mystic traditions of our realm and reinforces our Sufi roots."
 home_shrines:0 "Home Shrines"
 home_shrines_desc:0 "Ritual and religious practice have been traditionally relegated to shrines and temples. However, more and more of our people are placing in their homes both local family shrines, called #italic kamidana#!, to venerate the Kami, and #italic butsudan#! as $buddhist_ADJ$ altars for their ancestors."
 honji_suijaku:0 "Honji Suijaku"
 honji_suijaku_desc:0 "One of the key practices in $shinbutsu_shuugou$ is to identify the local #italic Kami#! as manifestations of the different Buddha, and the Buddhas as manifestations of the different #italic Kami#!. In the end, they are one and the same, with core forms or #italic Honji#! taking on different aspects, or #italic suijaku#!."
 horde_ardor:0 "Horde Ardor"
 horde_ardor_desc:0 "Our horses are almost as fierce and terrifying to our enemies as their riders are. The sight of our cavalry marching to war is like watching an unstoppable force of demons from hell."
 horde_loot_discovery_advance:0 "Raid Profits"
 horde_loot_discovery_advance_desc:0 "Raiding has always been part of our identity. Pillaging and plundering are how our people learn to fight and obtain much of their personal fortune. There is no harm in fomenting even more raids — at least, no harm for us."
 horde_loyalty:0 "Horde Loyalty"
 horde_loyalty_desc:0 "The loyalty of our people is unquestionable. No soul who has lived under the thriving rule of the $rank_kingdom_horde_ruler_suffix_male$ would think of ever leaving it."
 hormuz_toll:0 "$ORM$ Toll"
 hormuz_toll_desc:0 "At the narrowest point of the $persian_gulf$ stands $ORM$, the gatekeeper of east-west maritime trade. No vessel passes without our knowledge — or without paying our fee. For centuries, this toll has not just made us richer, but shaped our diplomacy and how we project power across the vast seas."
 horse_lords:0 "Horse-Lords of the Steppes"
 horse_lords_desc:0 "Our people and horses share an inseparable bond. Children grow up alongside foals, learning horsemanship from infancy. The careful breeding and exhaustive training of these mounts is our greatest pride, and we are recognized far and wide as the greatest horse-lords in the world."
 horse_riding_advance:0 "Horse-Riding"
 horse_riding_advance_desc:0 "The domestication of horses has revolutionized the way people move and transport goods. Additionally, the use of horses in combat provides mounted warriors not only with a faster way of moving, but also a higher ground from which to attack their enemies — or even to crush them under the weight of their mounts."
 hospital_advance:0 "Hospitals"
 hospital_advance_desc:0 "Hospitals were first established during the Middle Ages to provide care for the sick, poor, and disabled. Typically run by religious orders, these hospitals offered a range of medical services, including basic nursing care, herbal remedies, and later on, surgery. They were often located near churches or monasteries and had separate wards for men and women. Despite limited medical knowledge, these hospitals played a vital role in offering sanctuary, comfort, and some form of medical treatment to those in need during a challenging period in history."
 hot_blast_furnace:0 "Hot Blast Furnace"
 hot_blast_furnace_desc:0 "The problems posed by the coke blast furnaces, especially the amount of impurities the coke creates in the final cast iron, has led to the development of the hot blast. It not only greatly reduces the use of coke, therefore improving the quality of the $iron$, but also allows the use of raw mineral coal as fuel if available, which is a great step forward in $iron$ metallurgy."
 house_of_parliament_advance:0 "$house_of_parliament$"
 house_of_parliament_advance_desc:0 "$house_of_parliament_desc$"
 hsa_concept_of_mercantilism:0 "Concept of Mercantilism"
 hsa_concept_of_mercantilism_desc:0 "Over the past centuries, we have worked tirelessly to integrate our dealings into the global scale of trade. Now, more than ever, we must protect our own merchants, lest we fall victim to factionalism and external competition."
 hsa_draft_merchant_privileges:0 "Draft Merchant Privileges"
 hsa_draft_merchant_privileges_desc:0 "The merchants who conduct business under our seal carry with them tremendous influence and purses brimming with coin. As such, solidifying their privileges in foreign and domestic markets will only further increase our capacity for profitable business."
 hsa_exchange_of_ideas:0 "Exchange of Ideas"
 hsa_exchange_of_ideas_desc:0 "Our traveling merchants who carry our business abroad are excellent resources of foreign knowledge. Whenever they return to our shores, they bring innovation and inspiration in their wake."
 hsa_global_reach:0 "Global Reach"
 hsa_global_reach_desc:0 "The widespread adoption of trade on a global scale has shaken the mercantile world to its core. It is now customary to do regular business with foreign traders from all corners of the world, and our treasury has benefited as a result."
 hsa_hanseatic_shipwrights:0 "$HSA_ADJ$ Shipwrights"
 hsa_hanseatic_shipwrights_desc:0 "At a time when $europe$ is enveloped in war, with rulers desperate for expansion pressing claims in all directions, they look to us to build grand fleets that will allow them to fulfill their ambitions. Armed with centuries of accumulated shipwrighting knowledge, and some of the best timber on the continent, our ship-building process is unparalleled!"
 hsa_hanseatic_ties:0 "$HSA_ADJ$ Ties"
 hsa_hanseatic_ties_desc:0 "Our League is home to a great many cities and merchant guilds, all with their own agendas and endeavors. In order to maintain our prosperity and expand our reach, we must take a keen interest in diplomatic efforts."
 hsa_hanseatic_treasury:0 "$HSA_ADJ$ Treasury"
 hsa_hanseatic_treasury_desc:0 "A strong economy is but one result of our prosperity. With ample coin and overflowing coffers, we have established ourselves as robust and dependable creditors."
 hsa_holpfennige:0 "Hohlpfennig"
 hsa_holpfennige_desc:0 "Originally minted between the cities of $LUB$ and $HAM$, the #italic Hohlpfennig#! was a hollow currency developed as a countermeasure to rampant debasing, during an era where each mint had different standards regarding the concentration of silver on each coin. As a means of conducting transactions, the currency will smoothen our trade activities and bridge the gap between foreign markets and our merchants."
 hsa_mastery_of_the_sea:0 "Mastery of the Sea"
 hsa_mastery_of_the_sea_desc:0 "Our maritime traditions have linked our fortunes to the mighty sea. To reap all the benefits we possibly can from our marine resources, we must learn to harness the awesome power of the sea — and to treat it with the proper deference. This will have tremendous effects on our trade activities."
 hsa_reform_the_hanstag:0 "Reform the Hanstag"
 hsa_reform_the_hanstag_desc:0 "In times of troubles and evolving thought, our central institutions for assembly and deliberation must adapt to deal with emerging challenges and new paradigms."
 hsa_regularized_contributions:0 "Standardized Contributions"
 hsa_regularized_contributions_desc:0 "The many entities within our League must be brought under our firm control in a bid to standardize their monthly and annual contributions to our treasury."
 hsa_seal_of_the_hansa:0 "Seal of the $HSA$"
 hsa_seal_of_the_hansa_desc:0 "In markets across $europe$, from $london$ to $novgorod$, our merchants are famed for their affluence. Our ability to mobilize great trade fleets and bring dozens of cities into a perfect symphony of profit and exchange of commodities is second to none."
 hsa_the_cog:0 "The $n_hanseatic_cog$"
 hsa_the_cog_desc:0 "$n_hanseatic_cog_desc$"
 hsk_branches_and_retainers:0 "Branches and Retainers"
 hsk_branches_and_retainers_desc:0 "Our widespread clan controls rich territories through a network of loyal kinsmen and retainers. By maintaining internal harmony in our dynasty, our clan will become one of the most powerful in $JAP$."
 hsk_control_of_izumi_sea:0 "Control of the $izumi$ Sea"
 hsk_control_of_izumi_sea_desc:0 "Our clan's territory has traditionally been situated around the Kii Channel. Taking control of trade entering the mainland through that point will bring us massive profits, and we shall flourish immensely."
 hsk_rising_clan:0 "Rising Clan"
 hsk_rising_clan_desc:0 "Although our origins are relatively humble, even compared to other clans descending from the $ashikaga_dynasty$, we have managed nonetheless to grow our influence considerably. Our clan is decidedly on the rise, and our ascension must not be hindered!"
 htk_clan_spread:0 "Clan Spread"
 htk_clan_spread_desc:0 "Our clan is not content to occupy a single location, and we do our utmost to project our influence all over the country. No matter how far it may spread, our clan authority must be unquestionable in all our holdings."
 htk_hatakeyama_heritage:0 "Hatakeyama Heritage"
 htk_hatakeyama_heritage_desc:0 "Some consider our clan leaders to be rebellious troublemakers due to the stigma attached to our clan name. However, this enmity is naught but a symbol of our resilience. We have been reborn; we will never surrender, and will fight for what is ours no matter who may oppose us!"
 htk_shogunate_ties:0 "Shogunate Ties"
 htk_shogunate_ties_desc:0 "As a clan descending from one of the branches of the $ashikaga_dynasty$, we have particularly strong ties to the authority of the Shogunate. As long as we maintain this association, our clan will continue to be held in high regard."
 hub_of_militarism:0 "Hub of Militarism"
 hub_of_militarism_desc:0 "Long has war defined our fate, but now it shall define our strength. From the ruinous embrace of warfare and siege, $SMO$ rises as a center of military production — cannons, firearms, powder and doctrine flow outward from our armories. Let the world see us not as a prize to be taken, but as a hammer to be feared, ready to strike the anvil of foreign conquerors."
 hum_a_sheep_surrounded_by_wolves:0 "A Sheep Surrounded by Wolves"
 hum_a_sheep_surrounded_by_wolves_desc:0 "We exist geographically wedged between the soaring ambitions of more powerful enemies. To survive this predatory encirclement, our lords have mastered the art of pitting our neighbors against each other, wherein we perpetually offer vassalage to the distant wolf to deter the one at our doorstep. By playing the Catholic West against the Orthodox East and the Bosnian Krstjani against both, we ensure that no single hegemon can fully digest our lands without triggering a massive intervention from their rivals. This culture of sophisticated political duplicity transforms our perceived weakness into a survival mechanism, as we grant trade concessions and military access to whichever power currently guarantees our internal autonomy, effectively keeping the greater wolves at each other's throats while we remain the undisturbed masters of the Neretva."
 hum_modernized_national_redoubt:0 "Modernized National Redoubt"
 hum_modernized_national_redoubt_desc:0 "Refining centuries of mountain warfare, we have implemented the 'National Redoubt' doctrine, where every major city and pass is integrated into a single, cohesive defensive plan. Using modern Western ballistics and cartography, we have pre-positioned batteries and supplies in hidden mountain caches. This doctrine ensures that even if the valleys are lost, the state can continue to function as a sovereign military entity from the high peaks, mocking any occupier with a permanent, active resistance that makes the cost of holding Hum prohibitively expensive for any empire."
 hum_the_humite_chancery_records:0 "The Humite Chancery Records"
 hum_the_humite_chancery_records_desc:0 "To manage our state, we have centralized our administration into a mobile but highly organized Chancery. By maintaining precise records of land ownership, clan lineages, and tax obligations even during wartime, we prevent the social disintegration that often follows foreign occupation. This bureaucratic resilience ensures that the state can resume full operations the moment an invader is repelled, maintaining a clear and unbroken chain of command that stretches from the ruler's palace to the smallest mountain hamlet in the high karsts."
 hum_the_kosaca_iron_fist:0 "The Kosača Iron Fist"
 hum_the_kosaca_iron_fist_desc:0 "Inspired by the Kosača dynasty, the Principality has started centralizing the military under a single dynastic banner, the state has moved away from fragmented feudal levies toward a professionalized core of heavy infantry and mercenary crossbowmen. This military consolidation allows us to defy our enemies, turning the rugged landscape of our lands into a power-broker in the southern Dinaric Alps."
 hum_the_ponor_storage_system:0 "The Ponor Storage System"
 hum_the_ponor_storage_system_desc:0 "We have mastered the climate-controlled secrets of the Trebišnjica river system, the world's longest losing stream. By utilizing the stable temperatures and dry upper galleries of the #italic ponors#! (sinkholes) during the summer, we have established a national network of subterranean granaries. This 'Hidden Reserve' ensures that our grain supplies are immune to the scorching Herzegovinian heat and, more importantly, invisible to the foraging parties of invading armies. While our enemies starve in a scorched valley, our forces remain well-fed by tapping into the earth's own cool depths, allowing us to maintain a high-morale standing army even during multi-year blockades."
 hum_the_viticulture_of_the_sunny_scree:0 "The Viticulture of the Sunny Scree"
 hum_the_viticulture_of_the_sunny_scree_desc:0 "The limestone-rich, sun-drenched slopes of the Herzegovinian valleys produce a distinct, high-sugar grape that is the envy of the Adriatic. By establishing a royal monopoly on the export of Žilavka and Blatina wines, we can create a luxury trade that bypasses the volatility of the grain markets. This 'Liquid Diplomacy' allows our court to maintain a lifestyle that rivals the Italian city-states, using high-end wine exports as a diplomatic lubricant to secure favorable treaties with the Republic of Venice and the Kingdom of Naples."
 humanism:0 "humanism"
 humanism_desc:0 "Mankind is the highest creation of our Lord, and thus it is natural to place it in the center of Creation. Every aspect of human nature has to be preserved and encouraged, from its well-being to its propensity for free will and exploration."
 humanist_tolerance:0 "Humanist Tolerance"
 humanist_tolerance_desc:0 "By striving to create a more tolerant society, and attempting to solve our social and religious problems in more rational ways, the risk of civil disorder will be diminished."
 hun_bulwark_of_christianity:0 "Bulwark of $christian$"
 hun_bulwark_of_christianity_desc:0 "With $turkish_culture$ power rising in the south, it falls to the people of $HUN$ to defend faithful kingdoms from the $turkish_culture$ threat. Let it be known that we will not flinch from our sacred duty!"
 hun_castle_warriors:0 "Castle Warriors"
 hun_castle_warriors_desc:0 "The Castle Warriors, one of the most select classes in our society, are duty-bound to provide military service to their local #italic ispáns#! in royal castle districts. Stalwarts from the earliest days of our nation, these privileged landholders hold a unique position, actively defending their realm while cherishing their hereditary rights."
 hun_composite_light_cavalry:0 "Composite Light Cavalry"
 hun_composite_light_cavalry_desc:0 "Made up of horse archers as well as swift horsemen, our light cavalry is the backbone of our military force. Our mounted forces have shown their mettle time and time again, and will inevitably lead our forces to glory once more."
 hun_curtailed_peasantry:0 "Curtail Peasant Liberties"
 hun_curtailed_peasantry_desc:0 "$HUN$ is not blessed with protective natural frontiers. The wild plains that first brought our ancestors here were perfect for launching raids into the West, not for defense. If $HUN$ is to defend itself, we will need resources. The best solution is to allow our magnates to bind the peasants more closely to the land, ensuring greater productivity."
 hun_found_the_black_army:0 "Found the Black Army"
 hun_found_the_black_army_desc:0 "Inspired by the writings of Julius Caesar, $HUN$ shall maintain a corps of professional soldiers. These warriors will be so fierce that our enemies shall whisper terrified tales of 'The Black Army' to their children at night!"
 hun_hungarian_hussars:0 "$a_hungarian_hussars$"
 hun_hungarian_hussars_desc:0 "$a_hungarian_hussars_desc$"
 hun_hungarian_reformation:0 "$HUN_ADJ$ Reformation"
 hun_hungarian_reformation_desc:0 "$hun_hungarian_reformation_intro$ Our realm has been threatened by outside powers for long enough. By joining the Reformation and abandoning the duty of following the Pope like a lapdog, we can break at least one of the shackles oppressing us!"
 hun_hungarian_unity:0 "$HUN_ADJ$ Unity"
 hun_hungarian_unity_desc:0 "Although our subjects have faced many external threats over the years, the spirit and will of the $HUN_ADJ$ people remains unbroken. Unifying $HUN_ADJ$ hearts is greatly inspiring to our patriotic soldiers, who will defend our homelands to the last man."
 hun_multi_culturalism:0 "Realm of Many Cultures"
 hun_multi_culturalism_desc:0 "The Carpathian Basin is home to more than just $HUN_ADJ$ people. $slovak$, $ruthenian$,$cuman_culture$, and $german_carpathian$ people, among many other different minorities, call our realm their home. Given this diversity, it is only natural that our government proficiently absorbs and adopts these different cultures into our state."
 hun_realm_of_many_religions:0 "Realm of Many Religions"
 hun_realm_of_many_religions_desc:0 "$hun_hungarian_reformation_intro$ Alas, the Reformation has split families apart, made former friends into enemies, and threatened the very stability of many nations. However, our realm knows better than to fall victim to this theological quarreling. We are a people and a realm of many religions, after all."
 hun_reformed_coinage:0 "Reformed Coinage"
 hun_reformed_coinage_desc:0 "To pay for our new professional army, we will need a steady stream of revenue. Reforming the coinage to standardize weights will make this much easier, because we shall know exactly how much people need to pay."
 hun_renaissance_knowledge:0 "A $renaissance$ Prince"
 hun_renaissance_knowledge_desc:0 "The peasants consider their ruler a just one because they are officially protected from having excessive demands and other abuses heaped upon them by magnates. The ruler of $HUN$ is a true $renaissance$ prince — a successful military leader and administrator, an outstanding linguist, and an enlightened patron of the arts."
 hun_revolutionized_military_tactics:0 "Revolutionary Military Tactics"
 hun_revolutionized_military_tactics_desc:0 "As military technology advances, so do battlefield tactics. It is imperative to the survival of our state that we keep pace with the ever-evolving nature of land warfare."
 hun_strengthened_towns:0 "Strengthen the Towns"
 hun_strengthened_towns_desc:0 "Towns are key factors in producing the wealth $HUN$ needs to grow and prosper. If we ensure the operations of our townships are protected from the power-hungry machinations of the nobility, they will continue to bring in trade, which we can tax."
 hun_the_catholic_shield:0 "The $catholic_ADJ$ Shield"
 hun_the_catholic_shield_desc:0 "$hun_hungarian_reformation_intro$ Yet, the hearts of the faithful remain strong. God and his loyal servants will withstand this heretical madness."
 hurricane_hardy:0 "Hurricane Hardy"
 hurricane_hardy_desc:0 "The designs of Feodor Apraksin are robust and resilient, enabling ships to weather most storms that Mother Nature is able to conjure. The innovative construction greatly contributes to any burgeoning maritime ambitions."
 hussite_traditions:0 "$hussite_ADJ$ Traditions"
 hussite_traditions_desc:0 "Through struggle and brotherhood, the adherents of our faith withstand all external conversion pressures. Our unshaken religious roots, stemming from ancient teachings, ring true to the hearts of all those who seek to protect their beliefs and live in peace alongside their fellow $christian_ADJ$ faithful."
 hyanyak_system:0 "Hyangyak System"
 hyanyak_system_desc:0 "Agriculture is the bedrock of our economy, and therefore efficient village management is paramount. To this end, we will implement the #italic hyangyak#! system, which establishes self-governance for villages. These agreements establish behavioral standards, dispute resolution regulations, and other civil procedures aimed at creating stable, self-reliant communities."
 ibadi_imamate:0 "$ibadi_ADJ$ Imamate"
 ibadi_imamate_desc:0 "Unlike the $caliphate$ or a divinely appointed $shia_ADJ$ Imām, an $ibadi_ADJ$ Imām does not rule over the entirety of the $muslim_ADJ$ world, but instead governs locally. Every community can be ruled independently by its own Imām."
 iberian_caravel:0 "$iberia_region_ADJ$ Caravels"
 iberian_caravel_desc:0 "The need for faster and more reliable caravels has driven our shipbuilding experts to make improvements to their design. While caravels have become common across $europe$, the $iberia_region_ADJ$ models remain superior in both innovation and speed."
 iberian_galleon:0 "$iberia_region_ADJ$ Galleons"
 iberian_galleon_desc:0 "The $n_iberian_galleon$ is a more stylized version of the $n_early_iberian_galleon$. They are tremendously powerful vessels that absolutely crush any opposition on the high seas."
 iconostasis:0 "iconostasis"
 iconostasis_desc:0 "One key feature of any $orthodox_ADJ$ church is that of the $iconostasis$, a wall of icons that separates the main body of the building from the altar. The icons it contains serve as a visualization of the link between the worshipers and the Holy of Holies, and thus the link between Heaven and the people, serving as a guide for the people towards Heaven."
 ilk_descendants_of_genghis_khan:0 "Descendants of $genghis_khan_name_no_tooltip$"
 ilk_descendants_of_genghis_khan_desc:0 "The blood of the $rank_empire_horde_ruler_suffix_male$ runs through our veins. Let no man forget that our rule was ordained on the steppes and sealed by conquest. Our horsemen remain unmatched, and our banners bear not just a name, but a birthright."
 ilk_ilkhanate_resurgent:0 "$ILK$ Resurgent"
 ilk_ilkhanate_resurgent_desc:0 "What was once broken is now reborn. Our banners fly once more across $persia_region$, invoking awe and fear in equal measure. As word of our rising power spreads, the world will remember what it means to be ruled by a true $ILKHANATE_LEADER_MALE$."
 ilk_new_roots:0 "New Roots"
 ilk_new_roots_desc:0 "The days of pure steppe conquest lie behind us. We have sown ourselves into the soil of progress and reformation. From that soil, a more stable, sophisticated state shall grow. Though our hearts may still beat to the rhythm of the open fields, our future lies in lasting institutions, not fleeting raids."
 ilk_persian_arts_and_architecture:0 "Persian Arts and Architecture"
 ilk_persian_arts_and_architecture_desc:0 "Our ancestors ruled with the sword, but their greatness was measured in palaces, libraries, and minarets. Let us follow their example and fund not only walls and roads, but mosques, gardens, and schools as testaments to $ilkhanate$ grandeur."
 ilk_restore_yam:0 "Restore the Yäm"
 ilk_restore_yam_desc:0 "The Yäm, our ancient system of relay stations and messengers, once connected the furthest corners of the $MGE_ADJ$ world. By restoring this vast network across $persia_region$ and beyond, we ensure that our orders are swift, our envoys safe, and our dominion responsive, just as it was in the golden days of the Khans."
 imamate:0 "imamate"
 imamate_desc:0 "The basis of $shia_ADJ$ faith is that Muḥammad, peace be upon him, designated 'Alī ibn Abī Ṭālib as his successor. As such, the figure of Imām is that of a spiritual leader coming from the line of Muḥammad, peace be upon him, to lead all $muslim_ADJ$ faithful."
 img_claim_to_shogunate:0 "Claim to the Shogunate"
 img_claim_to_shogunate_desc:0 "As our clan is descended from the $ashikaga_dynasty$ family, we have a strong claim on the position of $JAPANESE_SHOGUNATE_LEADER_MALE$, should the main line perish. Even if the Bakufu is not threatened, it would still be in our best interests to remind everyone of our legitimacy. Just in case it ever becomes relevant..."
 img_march_to_kyoto:0 "March to $kyoto$"
 img_march_to_kyoto_desc:0 "In these dangerous times when $japan_region$ and $kyoto$ are mired in political chaos, anyone could march into the capital and seize power. As close kinsmen of the $ashikaga_dynasty$, it is our obligation — and our right — to ensure the stability of the country."
 img_supreme_ruler_of_tokaido:0 "Control of the Tōkaidō"
 img_supreme_ruler_of_tokaido_desc:0 "The Tōkaidō is the most important trade route between Central and Eastern $japan_region$. As our ancestral lands are in the middle of all this trade, it would behoove us to take control over the entire region, so as to reap the most benefits from local commercial activity."
 img_unlikely_alliances:0 "Unlikely Alliances"
 img_unlikely_alliances_desc:0 "Sometimes, the best way to defeat an enemy is to make them your friend. Securing our rule through strategic marriages will not only pacify our foes and gain us new allies, but will also ensure that we can ultimately dominate our rivals through blood."
 imperatorskiy_moskovskiy_universitet:0 "Imperatorskiy Moskovskiy Universitet"
 imperatorskiy_moskovskiy_universitet_desc:0 "The Imperial University is dedicated to the study of philosophy, medicine, and law, and plays a significant role in $RUS_ADJ$ education and research. It is established as part of educational reforms conceived by polymath Mikhail Lomonosov, emphasizing the importance of scientific inquiry and innovation."
 imperial_ambitions:0 "Imperial Ambitions"
 imperial_ambitions_desc:0 "The great empires of the past are a source of inspiration for artists and poets alike, always spoken of with awe and admiration. If we want to generate the same reaction towards our own country, we should aspire to the same grandeur."
 imperial_artillery:0 "Imperial Artillery"
 imperial_artillery_desc:0 "The rapidly changing nature of warfare urges us to modernize our troops and tactics. In order to stay ahead of our foes, we shall make our artillery the pride of the Imperial army."
 imperial_creed:0 "Imperial Creed"
 imperial_creed_desc:0 "$orthodox$ has been the official faith of the Roman Empire ever since its adoption of $christian$. The heresies of the West and their falsely proclaimed 'emperors' will not be able to discredit our legitimacy."
 imperial_school_of_naval_engineering:0 "Imperial School of Naval Engineering"
 imperial_school_of_naval_engineering_desc:0 "This new school, #italic Mühendishane-i Bahr-i Hümâyûn#!, will help us train shipwrights, naval officers, and sailors for both the navy and the merchant fleet."
 improve_relation_impact_absolutism:0 "Permanent Foreign Affairs Ministry"
 improve_relation_impact_absolutism_desc:0 "Our ever-growing diplomatic corps necessitates our creating a permanent Foreign Affairs Ministry to manage and coordinate our many envoys and coordinate their efforts."
 improve_relation_impact_renaissance:0 "Lavish Diplomatic Gifts"
 improve_relation_impact_renaissance_desc:0 "Diplomatic gifts have been exchanged since ancient times, as a measure of impressing or persuading foreign rulers by emphasizing the high status and enviable wealth of the giver. Gifts could range from fine cloth, to splendid jewelry, to astonishing animals such as giraffes or elephants."
 improved_book_binding:0 "Improved Bookbinding"
 improved_book_binding_desc:0 "The blossoms of thought and knowledge must be watered by a steady supply of books if we are to prosper and cultivate as a people."
 improved_foraging:0 "Improved Foraging"
 improved_foraging_desc:0 "Traditionally, we were unable to fight effectively in lands that did not supply enough food. However, our troops have become better at acquiring food in the wild, making it possible for larger armies to fight."
 improved_logistics:0 "Improved Logistics"
 improved_logistics_desc:0 "The modern art of war nowadays clearly differentiates between amateur officers who talk about tactics, and professional officers who actually study logistics."
 improved_manuever:0 "Improved Maneuver"
 improved_manuever_desc:0 "Tactical positioning is a vital skill for any commander. The ability to maneuver troops effectively around the battlefield will give us a significant edge."
 improved_rams:0 "Improved Rams"
 improved_rams_desc:0 "The concept of outfitting warships with rams goes back thousands of years, but great advancements in metallurgy have been made since then, and we should take advantage of these to create sturdier rams."
 improved_shipyards:0 "Improved Shipyards"
 improved_shipyards_desc:0 "To defend our interests around the globe, we will require a strong [navy|e]. We must ensure our shipyards can produce ships as quickly as possible to replace any losses we may suffer."
 improved_supply_lines:0 "Improved Supply Lines"
 improved_supply_lines_desc:0 "Modern warfare demands more and more resources for our armies, especially since the development of salvo fire and the widespread use of artillery on the battlefield."
 impulse_warfare:0 "Impulse Warfare"
 impulse_warfare_desc:0 "The introduction of light infantry troops has led to a significant change in warfare. Skirmishers are deployed forward in loose order to distract and harass the enemy before the main infantry attack, which is typically delivered in either a line or a column formation."
 inc_tambo:0 "Improved Tambo Way Stations"
 inc_tambo_desc:0 "Our road system is one of our empire's most valuable assets. To further benefit our military and administration, we will erect #italic tambo#! way stations along all the main roads. These stations will be built within a day's march of each other, and will provide shelter and carry supplies for travelers."
 inc_vertical_economy:0 "The Vertical Economy"
 inc_vertical_economy_desc:0 "No other empire is as well adapted to the heights of the Andes as we are. By maintaining settlements and storehouses at every altitude, from the lowest valleys to the highest plateaus, we have mastered the method of moving men and goods across the most difficult terrain, where other states would falter. Our llama caravans, our roads carved into sheer cliffsides, and our highland communities turn the Andes from a barrier into our own highway."
 incamisana_advance:0 "$incamisana$"
 incamisana_advance_desc:0 "$incamisana_desc$"
 incense_burning:0 "Incense Burning"
 incense_burning_desc:0 "The practice of burning incense is a staple of any $buddhist_ADJ$ ritual or offering. Varying in shapes and forms, it is common for both lay people and ordained monks and nuns alike to light incense before performing any ritual or meditation. As such, the smell of incense constantly permeates any $buddhist_ADJ$ temple."
 incense_preeminence:0 "$incense$ Preeminence"
 incense_preeminence_desc:0 "$incense$ has been a staple of life in $asia$ for centuries, maybe more so than anywhere in the world. Although other religions also use it for their rituals, its near-ubiquity in $hindu_ADJ$ and $buddhist_ADJ$ ceremonies, as well as its everyday use by $muslim$ people, give it a constant presence anywhere in $asia$."
 incense_trade_route:0 "$incense$ Trade Route"
 incense_trade_route_desc:0 "The high demand for $incense$, not only in $asia$ but also beyond it, requires the establishment of many trade routes dedicated to its commerce. Akin to the more famous $silk_road$, this trade of $incense$ links the East with the West."
 increase_control_area_advance:0 "Increase Control Widely"
 increase_control_area_advance_desc:0 "As our mighty country grows, we will need to keep a tight grip on our population."
 indelningsverket:0 "indelningsverket"
 indelningsverket_desc:0 "The $SWE_ADJ$ allotment system divides the peasantry into groups of ten for recruitment purposes. This system made it easier to find people to serve in the army and organize them into units."
 independence_from_mali:0 "Independence from $MAL$"
 independence_from_mali_desc:0 "For many years, we were a subject of $MAL$. As $MAL$'s power has weakened, ours has grown, and we can now claim to be fully independent of $MAL_ADJ$ overlordship. Let us take steps to make sure we remain so."
 independent_leaders:0 "Independent Leaders"
 independent_leaders_desc:0 "Due to the isolation of $miaphysite$, it has been difficult at times to contact other patriarchates. As such, our leaders have learned to act independently, while at the same time keeping in contact with the rest of the $christian_ADJ$ world as much as possible."
 index_librorum_prohibitorum:0 "Index of Forbidden Books"
 index_librorum_prohibitorum_desc:0 "The dangerous ideas of the Reformation will spread like a toxic fungus in the minds of our subjects if they have access to written works propagating these silly thoughts! We must forbid certain dangerous texts, and keep a comprehensive list of which books are not allowed."
 indian_networks:0 "Indian Networks"
 indian_networks_desc:0 "Our merchants deal in goods from the markets of $alexandria$, to the shores of Aden, and as far away as $india$ itself. These extensive networks of contacts, business, and capital have positioned us at the forefront of maritime commerce."
 indian_sea_trade:0 "Indian Sea Trade"
 indian_sea_trade_desc:0 "$muslim_ADJ$ traders have sailed the waters of the $indian_ocean_region$ for generations, traveling impossibly far in search of rare and valuable goods. From the eastern coasts of $africa$, to the shores of $india$, and even as far as the spice islands of $indonesia_region$, the waters are crossed by vessels of the $muslim_ADJ$ faithful."
 indirect_rule:0 "Indirect Rule"
 indirect_rule_desc:0 "Sometimes the best way to get people to do what you want is to let them believe that they have had a choice in the matter. A system of indirect rule like that will reduce the unrest in newly acquired provinces, giving them the impression that they have more self-determination than they truly do."
 indonesia_archipelago_of_many_faiths:0 "Land of Many People"
 indonesia_archipelago_of_many_faiths_desc:0 "Our islands are home to many different people, speaking different languages and believing in many different gods. Only if we establish a common understanding and tolerance between them can we secure a prosperous country."
 indonesia_naval_supremacy:0 "Naval Prowess"
 indonesia_naval_supremacy_desc:0 "Our political relevance within the archipelago almost solely relies on the strength of our naval forces. By improving our shipwrighting techniques and crew training, we will ensure our domination over the lesser states of $indonesia_region$."
 indonesia_outer_islands_archipelago:0 "Indonesian Archipelago"
 indonesia_outer_islands_archipelago_desc:0 "Maritime connections naturally play a huge role within our society, as we are surrounded by waters. Our reliance on maritime trade and transport makes traversal of the seas a trivial task for our people."
 indonesia_trading_hub_of_the_east:0 "Trade Hub of the East"
 indonesia_trading_hub_of_the_east_desc:0 "No matter their origin or destination, every trader in $asia$ will eventually have to cross our lands, bringing both precious goods and tales of their travels with them."
 industrialization_advance:0 "Industrialization"
 industrialization_advance_desc:0 "The Industrial Revolution has brought about permanent change — not just to commerce and business, but to the social fabric of many nations. Inventions such as the power loom and steam engine shall push the capabilities of mankind to its highest zenith yet."
 infiltrate_administration_advance:0 "Infiltrate Administration"
 infiltrate_administration_advance_desc:0 "Conflicts with other states are not only fought on the battlefield, but in the shadows as well. Knowing the enemy's next move is an invaluable asset when trying to win wars. Our spies shall specialize in infiltrating state administrations, and forward any relevant information they gather to us."
 infiltration_tactics:0 "Infiltration Tactics"
 infiltration_tactics_desc:0 "Although the ancient $nizari_school$ $shia_ADJ$ order of the #italic Ḥashshāshīyīn#! has been largely mythicized beyond their original scope, their tactics of subterfuge and assassination were undeniably effective. If we employ such infiltration tactics ourselves, we should benefit from the same success."
 influence:0 "Pressuring Diplomacy"
 influence_desc:0 "Ending a war requires negotiations between the two opposing parties, and sometimes one party proves itself too stubborn to accept defeat. In such cases, the art of diplomatic pressure — and gently reminding them of their potential imminent annihilation — shall motivate them to accept our generous terms more easily."
 influence_of_the_burgundian_towns:0 "Influence of the $BUR_ADJ$ Towns"
 influence_of_the_burgundian_towns_desc:0 "The traditional Estates General favors the clergy and nobility, but the rising wealth and political importance of towns can no longer be ignored. By refining its structure to reflect the growing strength of the merchant class, we ensure more balanced governance while preserving the privileges of the other estates. A stronger urban voice will also enhance our administrative capacities and speed up the rate of urbanization."
 influx_of_english_nobles:0 "$ENG_ADJ$ Administrators"
 influx_of_english_nobles_desc:0 "Securing peace with our southern neighbor has led to a steady influx of $ENG_ADJ$ aristocrats entering our administration. This makes it possible to exert our control over our country more effectively."
 inigo_architecture:0 "Palladian Architecture"
 inigo_architecture_desc:0 "The architectural innovations made by Inigo Jones will undoubtedly have a significant impact on future generations of architects. His promotion of classical architecture and his priority on proportion and harmony are considered hallmarks of the neoclassical movement in $ENG$."
 innovativeness:0 "Thirst for Knowledge"
 innovativeness_desc:0 "Natural curiosity, and the desire to understand our world and how it functions, is what pushes us forward. Our people are eager to gain knowledge, and it is this spark in their minds that will ignite progress for our nation."
 inquisition_advance:0 "Inquisition"
 inquisition_advance_desc:0 "The Inquisition was created in the 12th century as a means to combat the Cathar heresy, but its reach grew significantly in the Late Middle Ages as the main tool of the $catholic_ADJ$ Church to counter the spread of dissident doctrines."
 inspired_builders:0 "Inspired Builders"
 inspired_builders_desc:0 "While our Order's principal duty is to fight, we serve our people in other ways as well. Over the centuries, we have developed the art of rapid construction, erecting buildings and fortifications with remarkable speed. We will use this expertise to make our capital into both an impregnable fortress, and a dynamic center of culture."
 institutional_reorganization:0 "Institutional Reorganization"
 institutional_reorganization_desc:0 "By abolishing the Collateral Council and establishing the #italic Real Camera di Santa Chiara#!, we will implement important legal reforms in $NAP$. Ongoing projects will aim to reorganize the legislative complex, consolidate laws into the #italic Codice Carolino#!, and implement the #italic Onciario Cadastre#! for tax reform."
 insurance_companies:0 "Insurance Companies"
 insurance_companies_desc:0 "A further reduction of risk came with the development of insurance. By paying a small fee to an insurance broker, merchants could protect themselves against catastrophic losses. This reduced risk of investment led to a subsequent flourishing of trade."
 integrate_area_advance:0 "Better Integration"
 integrate_area_advance_desc:0 "Our administration is improving, and as such, we can afford the manpower to integrate larger sections of land into our country at once."
 integrated_elites:0 "Integrated Elites"
 integrated_elites_desc:0 "By bringing the ruling elite of our subject nations into our government, we can significantly streamline the process of integrating their provinces."
 intelligence_agency_advance:0 "$intelligence_agency$"
 intelligence_agency_advance_desc:0 "$intelligence_agency_desc$"
 interaction_between_church_and_state:0 "Interaction Between Church and State"
 interaction_between_church_and_state_desc:0 "The patriarchates have absolute authority over their own jurisdictions and those who occupy them. By tying their authority to that of the ruler, we can take advantage of the resources of the Church, and use them to strengthen state authority."
 intercontinental_trade:0 "Far-Reaching Trade"
 intercontinental_trade_desc:0 "Our merchants frequently bring back fascinating things from the courts of faraway countries. Perhaps it would be possible to reach even further shores?"
 internal_communion:0 "Internal Communion"
 internal_communion_desc:0 "Despite having independent patriarchs, all branches of $miaphysite$ maintain mutual communion. This helps them build relationships with each other, and promotes unity in the Church."
 international_influences:0 "Foreign Influences"
 international_influences_desc:0 "Many foreign merchants and travelers frequent our roads, bringing vast wealth to our land. We could convince some of these avid traders to permanently settle in our towns and cities, if we assure them they will not face persecution for their beliefs."
 international_nobility:0 "International Nobility"
 international_nobility_desc:0 "International relations is a tricky business. Some say that the merchant class, who are used to dealing with foreigners, are best suited for this. Those who say so, however, ignore the kindred ties that our noble families have established through the years. We should take advantage of these ties to help our cause diplomatically."
 involved_laity:0 "Involved Laity"
 involved_laity_desc:0 "With the increased involvement of the laity in the day-to-day administration of our Church, our people have found a more personal connection to the faith itself."
 ira_afsharid_navy:0 "$persian_gulf$ Coastal Defense"
 ira_afsharid_navy_desc:0 "Although our lands are located mostly in the highlands of the Zagros Mountains, $IRA$ does have coastal possessions. While past dynasties might have paid little attention to the maritime protection of the empire, our people are more aware of the sea, and our sailors are eager to defend our coasts."
 ira_encouraged_art:0 "Encourage Art"
 ira_encouraged_art_desc:0 "$IRA_ADJ$ art is highly in demand. Collectors from near and far travel here in droves to purchase our exquisite creations. We should offer state support for our talented artists, as this trade in aesthetic goods is extremely lucrative."
 ira_improved_silk_road:0 "Improve the Silk Road"
 ira_improved_silk_road_desc:0 "A system of upgrades to roads and bridges, a system of guards to protect the roads — for a small fee — and a chain of $caravanserai$ for rest and refreshment. All these improvements will help the merchants as they traverse the Silk Road, and also provide revenue for the state."
 ira_islamized_persia:0 "$IRA_ADJ$ $muslim$"
 ira_islamized_persia_desc:0 "The Islamization of $IRA$ has been a lengthy process. It is not yet completely finished, but our religion has still become one of the major pillars of our national identity. Many of our ancient traditions have been combined with the teachings of $muslim$, and now make up our current core culture."
 ira_jazayerchi:0 "The $a_jazayerchi$ Infantry Corps"
 ira_jazayerchi_desc:0 "$a_jazayerchi_desc$"
 ira_nazir:0 "Court Nāẓir"
 ira_nazir_desc:0 "The #italic Nāẓir#!, or overseers, are territorial administrators, and represent the eyes and ears of the Šâhanšâh. All actions of the court are supervised by the Nāẓir, and courtiers are promoted on their command. Even the Grand Vizier must work in association with the Nāẓir."
 ira_persian_horses:0 "$IRA_ADJ$ Horses"
 ira_persian_horses_desc:0 "Horses play a fundamental role in our society. Many of our people are raised alongside their steeds, which is reflected in both the care our horse breeders take and the durability of our cavalry."
 ira_persian_plateau:0 "The Iranian Plateau"
 ira_persian_plateau_desc:0 "The great plateau at the heart of our realm does not result in a weakness for us but instead turns into our strength. As the origin of great empires, our people have for countless generations crossed its great plains and the rugged mountain ranges surrounding it, like the Zagros or the Alborz. The same terrain that exhausts foreign armies is where our soldiers, our merchants, and our administrators thrive. We will use this familiarity to move across our lands and govern them with an ease that no outsider can match."
 ira_persian_rug_production:0 "$IRA_ADJ$ Rug Production"
 ira_persian_rug_production_desc:0 "$IRA$ has long been famous for its beautiful carpets and rugs. However, when the Mongols devastated the empire, much of this cultural heritage was lost. For $IRA$ to fully recover its tumbled glory, we must regain our economic strength, and restoring this legendary ancient industry is the first step in that direction."
 ira_promotion_of_irrigation:0 "Promotion of Irrigation"
 ira_promotion_of_irrigation_desc:0 "As a consequence of the Mongol invasion of the past, $IRA$ is somewhat depopulated compared to the earlier empires which claimed these lands as their own. Promoting the practice of irrigation should help our people develop the agriculture needed to boost the local population and help us recover from the death toll of past conflicts."
 ira_religious_state:0 "Religious State"
 ira_religious_state_desc:0 "No matter what the official faith of our state is, $IRA$ will always be an inherently religious country. Every aspect of our life is guided by religious principles, and even the government itself acts with our core beliefs in mind when dealing with matters of morality and justice."
 ira_religious_unity_policy:0 "Religious Unity Policy"
 ira_religious_unity_policy_desc:0 "The time of great religious divides has come to its end. In these turbulent times, $muslim$ cannot afford any more in-fighting. We shall advocate for a policy of internal and external religious unity, and come to peace with what we used to consider heresy."
 ira_restoration_of_cities:0 "Restoration of Cities"
 ira_restoration_of_cities_desc:0 "The Mongol invasion of $IRA$ was catastrophic for the entire region. Population centers of magnificent size were reduced to mere rubble. But it is finally time to rebuild what was once destroyed, and restore the awe-inspiring empire of $IRA$."
 ira_safaviyya_order_hall:0 "$safaviyya_order_hall$"
 ira_safaviyya_order_hall_desc:0 "$safaviyya_order_hall_desc$"
 ira_sasanian_heritage:0 "Sasanian Heritage"
 ira_sasanian_heritage_desc:0 "Before the Islamic Conquest of $persia_region$, the region was home to the Sasanian Empire, which once ruled from Caucasia in the West to the Kirthar Range in the East. Many of its great cultural accomplishments have shaped our cultural and artistic identity."
 ira_shahnameh:0 "$shahnameh$"
 ira_shahnameh_desc:0 "The #italic $shahnameh$#! - the Book of Kings - is an epic poem, and a national treasure of the $farsi_culture$ people. Describing the historical and mythical past of the empires which once occupied Greater $persia_region$, its stories contribute to the $farsi_culture$ culture in uncountable dimensions."
 ira_spread_of_persian_influence:0 "$IRA_ADJ$ Influence"
 ira_spread_of_persian_influence_desc:0 "$persian_language$ is an ancient language with a history longer than the lifespan of many empires. Even the $muslim_ADJ$ conquest could not diminish the core of the $IRA_ADJ$ identity, and many other states try to imitate our culture."
 ira_the_ghilman:0 "The $a_ghilman$"
 ira_the_ghilman_desc:0 "The $a_ghilman$ are a military unit made up of formerly $christian_ADJ$ slaves with Caucasian origins. The $a_ghilman$ undergo strict military training and are well-practiced in the usage of firearms, making them an essential part of the national army. They serve as a counterbalance to other influential branches of the military."
 ira_the_qizilbash:0 "The $qizilbash$"
 ira_the_qizilbash_desc:0 "The #italic $qizilbash$#! - the Red Heads - are a Shia military movement founded by the Ṣafawiyya. Guided by their religious convictions and deep ties to Sufism, these warriors are primed to fight for our state and to form the core of our army."
 ira_the_qurchi:0 "The Qurchi"
 ira_the_qurchi_desc:0 "While the $qizilbash$ are the backbone of the $IRA_ADJ$ military, the #italic Qurchi#! are the royal bodyguards enlisted from their ranks. Instead of being given land, these soldiers are paid from the royal treasury."
 ira_the_tofangchi:0 "The $a_tofangchi$"
 ira_the_tofangchi_desc:0 "The $a_tofangchi$ are our musket corps. Although firearms have been in use for a while, their presence in our ranks is highly irregular, as many of our fighters prefer to use their traditional weapon of bow and arrow. The regiments of the $a_tofangchi$ aim to change this, as they are trained in the use of modern weaponry."
 ira_the_tupchi:0 "The $a_tupchi$"
 ira_the_tupchi_desc:0 "$a_tupchi_desc$"
 ire_grand_jury_system:0 "Grand Jury System"
 ire_grand_jury_system_desc:0 "County grand juries levy the cess for roads, bridges, and courthouses. With judges riding the assizes, oversight tightens in every county."
 ire_irish_establishment:0 "$IRE_ADJ$ Establishment"
 ire_irish_establishment_desc:0 "A permanent army in $IRE$ — and controlled #italic from#! Ireland — keeps garrisons ready and costs down. For our regular soldiery, this means regular pay. For our logisticians and quartermasters, it means a growing network of barracks that keeps the costs in hand."
 ire_irish_volunteers:0 "$IRE_ADJ$ Volunteers"
 ire_irish_volunteers_desc:0 "Citizen corps are raised for home defense and coastal watch. Drilling at their own expense, they rouse public spirit and stiffen the line."
 irish_booleying_advance:0 "Cattle Booleying"
 irish_booleying_advance_desc:0 "In $IRE$, cattle-rearing is our way of life. The noble bovine is not only a source of food, but a symbol of wealth. By #italic booleying#!, a system of moving our herds from one distant pasture to another, we can grow that wealth."
 irish_frontier_settlement_advance:0 "$IRE_ADJ$ Frontier Settlements"
 irish_frontier_settlement_advance_desc:0 "The land we have seized from the $IRE_ADJ$ is ripe for exploitation. We just need to ensure that only the right sort of people migrate here to settle these cheap crofts."
 irish_monastacism_advance:0 "Insular Monasticism"
 irish_monastacism_advance_desc:0 "Although we are now aligned with Roman $catholic_ADJ$ practices in principle, religious life in our islands still puts a great focus on lay clergy."
 irish_travelling_bards_advance:0 "Traveling Bards"
 irish_travelling_bards_advance_desc:0 "Traditional poets trained in courtly ways crisscross our lands looking for some likely lord to hire them."
 iron_foundry_advance:0 "Iron Foundry"
 iron_foundry_advance_desc:0 "$iron_foundry_desc$"
 iron_mill_advance:0 "$iron_mill$"
 iron_mill_advance_desc:0 "$iron_mill_desc$"
 iron_tooth:0 "Iron Tooth"
 iron_tooth_desc:0 "Enhancing our court's control over the Margraviate's lands will earn our ruler the moniker #italic Iron Tooth#!, as if we bit it like an attack dog. Our rule will leave a mark on our nation, a mark which will instill a sense of pride and loyalty in even the lowliest peasant in $brandenburg_area$."
 iron_working:0 "$iron$ Working"
 iron_working_desc:0 "$iron$ is a key material for the production of different types of tools and weapons, making it vital for village blacksmiths as well as large manufacturing chains."
 ishvara:0 "Īśvara"
 ishvara_desc:0 "Interpreted differently depending on the school or branch of $hindu$, $ishvara$ refers to the Supreme Being or God. Therefore, it can refer to $shiva_god$ for $shaivism$, to $vishnu_god$ for $vaishnavism$, or to any personal god of the individual."
 isk_minister_of_samurai_dokoro:0 "Minister of Samurai-Dokoro"
 isk_minister_of_samurai_dokoro_desc:0 "We are one of four powerful clans traditionally appointed to be the chief of military and police in the Samurai-Dokoro. It is thus our responsibility, and our privilege, to keep the peace in the capital and other important places."
 isk_sanindo_gate:0 "$sanindou_area$ Gate"
 isk_sanindo_gate_desc:0 "The province of $tango_province$ is the gate to $kyoto$ in $sanindou_area$ and a place of crucial economic importance. By firmly establishing and expanding our presence there, we can take advantage of such prosperity."
 islamic_calligraphy:0 "Islamic Calligraphy"
 islamic_calligraphy_desc:0 "$muslim$ is not only a religion of peace, but of the arts. The calligraphy used to write the verses of the $common_string_quran$ and the names of the prophets often straddles the line between scripture and art."
 islamic_courts:0 "Islamic Courts"
 islamic_courts_desc:0 "The royal courts of $muslim_ADJ$ countries have always been among the most admired in the world. Praised for our refined culture and luxurious appointments, tales of the magnificence of our courts have spread far and wide, and our people take great pride in this reputation."
 islamic_golden_age:0 "Islamic Golden Age"
 islamic_golden_age_desc:0 "The impact that the $islamic_golden_age$ had on the entire world, not only in $muslim_ADJ$ countries, is absolutely undeniable. Some of these infidel nations are only now emerging from their dark ages of ignorance, making their first attempts at artistic and scientific 'discoveries' that we invented — and perfected — long ago."
 islamic_prayer:0 "Aṣ-Ṣalāh Farḍ"
 islamic_prayer_desc:0 "One of the Five Pillars of $muslim$, Aṣ-Ṣalāh is the obligation for a $muslim_ADJ$ faithful to perform daily prayers. Although the number of times one must pray every day and the specific movements when doing it may vary from school to school, the act of daily prayer is common among all $muslim$."
 islamic_schoolars:0 "Islamic Schools"
 islamic_schoolars_desc:0 "$muslim$ has always encouraged study and analysis of its scriptures, to the point where we have developed entirely different schools of thought on how to interpret them. Our scholars are therefore extremely learned in the $common_string_quran$ and our other holy texts, capable of having the most in-depth theological discussions."
 isolated_reaches:0 "Isolated Reaches"
 isolated_reaches_desc:0 "$miaphysite$ has managed to spread to very distant places. Even while surrounded by enemies and heretics, our faith has remained strong."
 ita_attractive_migration:0 "Appealing Landscape"
 ita_attractive_migration_desc:0 "The fertile, mild land of our peninsula is a popular place for people from bordering countries to seek their fortunes. While many of our cities already rely on labor from seasonal migrants, we should increase our efforts to settle these people into our lands permanently."
 ita_birthplace_of_the_renaissance:0 "Continuation of the Renaissance"
 ita_birthplace_of_the_renaissance_desc:0 "$italy_region$ has seen a great influx of bright minds. Be it traveling artists coming here to make their fortunes, or our own people inspired to participate in this great rebirth of the arts, our cities seem to be bursting with capable intellects. With our sponsorship, we will surely continue attracting talented people to our culture."
 ita_connect_the_interior:0 "Connect the Interior"
 ita_connect_the_interior_desc:0 "While the terrain of our lands allows for swift transportation and travel along the coastline, the interior of the Italian peninsula is much harder to traverse in many places. Connecting not only interior locales, but also coast with coast, will ensure easier mercantile operations and improved maneuverability of our troops."
 ita_enduring_hardship:0 "Hardships of War"
 ita_enduring_hardship_desc:0 "The foreign interests in $italy_region$ have many times turned our lands into the battlefield of stronger countries. Sustaining our people during these times of need is a difficult task. Establishing secure locations to shelter our population during conflict will ensure their support during even the most dire wars."
 ita_flourishing_urban_centers:0 "Flourishing Cities"
 ita_flourishing_urban_centers_desc:0 "Our lands are blessed with many highly urbanized areas. This not only offers us ample opportunity to manufacture goods, but their mercantile connections also enable us to ship them to foreign markets for our profit. Clearing any obstruction to expanding these industries will guarantee their continued success."
 ita_increased_recruitment:0 "A Prized Possession"
 ita_increased_recruitment_desc:0 "$italy_region$ is a desired possession for many foreign rulers. If we want to defend our country, we must expand recruitment for both our land and sea forces. Since $italy_region$ is vulnerable to invasions both from across the alpine passes and our vast coastline, we must ensure the army and navy are well-prepared to face any conqueror looking to disrupt the peace of the peninsula."
 ita_influence_over_the_clergy:0 "Influential Clergy"
 ita_influence_over_the_clergy_desc:0 "With its close proximity to the $papacy_reform$, $italy_region$ has a long tradition of powerful and talented clergy in the service of the faith. Regardless where our religious matters will take us, we should maintain good relations with our clergy."
 italian_condottieri:0 "Great Condottieri Captains"
 italian_condottieri_desc:0 "Our nation is renowned for producing great military minds, whether they serve their own interests or are sworn in loyalty to the state. We should ensure that these adept intellects are willing to serve us first and foremost."
 italian_galleass:0 "$n_italian_galleass$"
 italian_galleass_desc:0 "$n_italian_galleass_desc$"
 italian_innovativeness:0 "$ITA_ADJ$ Adaptiveness"
 italian_innovativeness_desc:0 "With the flourishing of the $renaissance$ came a deeper understanding of what great strides human achievement can take. If we wish to truly be a nation of progress, we must adapt to these new ideas without fear, and never allow innovation to be obstructed."
 italian_universities:0 "Universities of the Peninsula"
 italian_universities_desc:0 "$ITA$ is home to many great universities and scholars. If we want to keep the flame of the $renaissance$ alive, we must continue to support these great institutions."
 italy_great_families:0 "Great Families of $ITA$"
 italy_great_families_desc:0 "After the foundation of our unified $ITA_ADJ$ state, we have absorbed many great noble families into our country. We should utilize their prestige and reputation to improve our own, while keeping those capable people busy."
 ito_gokenin_family:0 "Gokenin Family"
 ito_gokenin_family_desc:0 "Our ancestors helped Minamoto no Yoritomo during the foundation of the $kamakura$ Shogunate. As a reward for this contribution, we were ranked as his #italic Gokenin#!, and awarded a fiefdom in $hyuuga_province$ Province. This is an honor few families in Kyūshū enjoy."
 ito_sympathy_to_foreign_faiths:0 "Sympathy for New Faiths"
 ito_sympathy_to_foreign_faiths_desc:0 "Foreigners coming to our land bring with them foreign beliefs. We must of course make sure that this is harmless to our traditional belief systems, but as long as there is no risk to us, we see no reason to disallow people from choosing their own faith."
 janissaries_advance:0 "Janissaries"
 janissaries_advance_desc:0 "Janissaries are the elite units of our armies, trained since childhood and forged through discipline."
 jap_ancestral_legacy:0 "Ancestral Legacy"
 jap_ancestral_legacy_desc:0 "The ancestral lineage of our clan is well-known, and our reputation is a pillar of our identity — one that we strive at all costs to uphold, as our history both defines us and ensures our right to rule."
 jap_ashigaru:0 "Ashigaru"
 jap_ashigaru_desc:0 "Warfare has always been the domain of the mighty samurai. Recent developments, however, have proved the need for more substantial reinforcements, and thus our battlefields now also include peasant troops. These #italic ashigaru#! will not be just common rabble, however, as their rigorous training and ample battle experience makes them formidable fighters, on equal footing with the samurai."
 jap_bushido:0 "Bushidō"
 jap_bushido_desc:0 "Although never formally codified into specific rules, the way a warrior should behave is clear: A warrior's duty is to fight and win in battle, and to expand the glory of one's own clan, regardless of the methods needed to achieve that."
 jap_codified_bushido:0 "Codified Bushidō"
 jap_codified_bushido_desc:0 "The expected behavior of a warrior is becoming increasingly idealized, with values such as honor and loyalty being given more importance than their actual utility in real battle. This romanticized and codified version of #italic Bushidō#!, however, will improve how our armies are perceived, even if it is not how they actually behave."
 jap_daiku_construction:0 "Daiku Construction"
 jap_daiku_construction_desc:0 "Traditional carpentry techniques, or #italic daiku#! have been used in $japan_region$ since the earliest days of our history. Our wooden buildings are resilient yet flexible, and admired by many for their beauty and skillful construction. From the lowliest hut to the most elaborate palace, wood is our most universal building resource."
 jap_head_hunting:0 "Head-Hunting"
 jap_head_hunting_desc:0 "The achievements of a warrior in battle are only truly noteworthy if they can be proven. To that end, samurai will collect the decapitated heads of enemies they have slain to present them later to their general. The more numerous and more important the heads that a samurai takes, the better the rewards he will receive."
 jap_ichiban_yari:0 "Ichiban Yari"
 jap_ichiban_yari_desc:0 "Drawing first blood in battle is an honor and a good omen, and thus our warriors are eager to land the first strike whenever they have the opportunity to do so."
 jap_jokamachi:0 "Jōkamachi"
 jap_jokamachi_desc:0 "Turbulent times are gravely dangerous for our people, so for safety, they tend to settle around the security of fortified places. These huddles eventually turn into cities, which of course provide commercial and cultural assets in addition to physical protection for those who huddle behind the walls."
 jap_land_of_the_rising_sun:0 "Land of the Rising Sun"
 jap_land_of_the_rising_sun_desc:0 "$japan_region$ has a long and glorious history. Our unique cultural traditions, our brave soldiers, and our unconquerable geography make us stronger than many other states in our region. The time has come for the Land of the Rising Sun to take its place among the great nations of this world!"
 jap_reformed_land_holding:0 "Reformed Land Holding"
 jap_reformed_land_holding_desc:0 "Traditionally, we assessed land value based on size, but this failed to take into account that not all land is the same. From now on, it will be valued according to how much $rice$ can be grown there. This will streamline related economic actions and make it easier to get the best outcomes from our agricultural ventures."
 jap_shinobi:0 "Shinobi no Mono"
 jap_shinobi_desc:0 "Information is key to gaining the advantage in any situation. To that effect, we have long since used spies and infiltrators to gather reconnaissance. These $jap_shinobi$ are usually from the samurai class, although they can also be recruited from the local peasant population, and are sent into enemy territory, where they blend in and establish networks of informants."
 jap_terakoya:0 "Terakoya"
 jap_terakoya_desc:0 "These private schools provide basic education to commoners, promoting literacy, numeracy, and moral values. #italic Terakoya#! play a vital role in fostering a more educated and socially aware populace, contributing to national stability and progress."
 jap_wandering_ronin:0 "Wandering Rōnin"
 jap_wandering_ronin_desc:0 "It is fairly common for samurai to wander the country in search of the best employment opportunities, switching their allegiance to whoever pays them the most. These warriors come and go like the errant waves, but we can always make use of them."
 jaysh_armies_advance:0 "Jaysh Armies"
 jaysh_armies_advance_desc:0 "A new era in warfare is dawning, and with it comes the need for a new regiment of loyal forces. Jaysh fighters, recruited from our tribal population, provide disciplined soldiers familiar with regional warfare and the local terrain."
 jerusalem_focus:0 "$jerusalem$ Focus"
 jerusalem_focus_desc:0 "We always keep the holy city of $jerusalem$ in our minds, as not only it was the place where Jesus preached and died, but also where he will return to in his Second Coming. As such, we always pray facing in the direction of $jerusalem$, no matter where we are."
 jesuits_bark:0 "Jesuit's Bark"
 jesuits_bark_desc:0 "Some native population of South America have been observed to use the bark of a specific tree to treat shivers. Thanks to the experiments of a Jesuit apothecary, this bark has been proven also effective for the treatment of malaria, and it is already known as 'Jesuit's Bark'. Distributing it to the affected population will greatly decrease the effects of the disease."
 jewels_of_the_desert:0 "Jewels of the Desert"
 jewels_of_the_desert_desc:0 "$muslim$ arose from the sands of $arabia_region$ and spread across a largely arid region. Yet some $muslim_ADJ$ cities became like prosperous jewels shining in the harsh desert, literal and figurative oasis made bountiful through trade, architecture, and irrigation. With wise investment and planning, any desert settlement can achieve a similar status."
 jihad_against_the_pagans:0 "$jihad$ Against the Pagans"
 jihad_against_the_pagans_desc:0 "Despite the best efforts of centuries of Sunni sultanates, $west_africa$ is still plagued by the menace of Animistic pagans. By lifting the banner of $jihad$, we can cleanse our lands of the unbelievers and expand our frontiers at the same time."
 jingdezhen_porcelain:0 "Jǐngdézhèn $porcelain$"
 jingdezhen_porcelain_desc:0 "Our $porcelain$ industry is emblematic of the prosperity and tradition of artisanal excellence alive in our Empire. By perfecting the already-superior $porcelain$ production techniques of Jǐngdézhèn, we will spread our cultural influence far and wide."
 jisha_bugyou:0 "Jisha-Bugyō"
 jisha_bugyou_desc:0 "The administrator and supervisor of all the temples and shrines, the $jisha_bugyou$ also oversees the activities these religious institutions perform, making sure that their interests align with those of the government."
 joint_stock_companies:0 "Joint Stock Companies"
 joint_stock_companies_desc:0 "As trade grew, so did the associated risk. New ways of accumulating capital and managing this risk needed to be developed. In joint stock companies, the burden of enterprise was shared among their many shareholders."
 julian_calendar:0 "Julian Calendar"
 julian_calendar_desc:0 "The time of our country and our Church has been for centuries measured by the $julian_calendar$, promulgated by Julius Caesar in 46 BC. It not only unifies all eastern $christian_ADJ$ nations, but it also serves to dictate when the important feasts and celebrations are to be held."
 junji_chu:0 "Jūnjī Chù"
 junji_chu_desc:0 "Also known as the Grand Council, the #italic Jūnjī Chù#! is tasked with overseeing military affairs. As the most important privy council, it has come to overshadow the Grand Secretariat that held sway over previous dynasties. Despite its crucial role, this council will retain an informal nature within the inner court, with its members holding other official roles besides their councilorship."
 jurchen_honor:0 "Jurchen Honor"
 jurchen_honor_desc:0 "Our people are enthusiastic about feats of strength and other demonstrations of skill, as each Jurchen feels that by showing off their abilities they earn the respect of their peers. This well-earned self-respect makes our warriors immensely brave, ready to fight anyone."
 justified_holy_wars:0 "Justified Holy Wars"
 justified_holy_wars_desc:0 "We cannot allow heathens and heretics to dictate our actions. It is our holy duty to cleanse the land of their impurity so that the true realm of God can be manifested on Earth."
 kafes:0 "kafes"
 kafes_desc:0 "By keeping our unruly princes confined to a special part of the harem, the $kafes$, we can prevent wanton rebellions and the rivalry between brothers that used to plague our regime."
 kagura:0 "kagura"
 kagura_desc:0 "Originally sacred ritual dances performed in front of the court by the #italic miko#!, the shrine maidens, the $kagura$ also inspired the performance of popular ritual dances all around $japan_region$. These dances have evolved into a myriad of forms, but all of them preserving the tradition and ritual they come from."
 kainerekowa:0 "Kaianere'kó:wa"
 kainerekowa_desc:0 "We must always honor the work of Hiawatha and the Great Peacemaker, the Great Law of Peace, which united our five nations under a single purpose, and gave us our rules of governance."
 kalaripayattu_advance:0 "Kalaripayattu"
 kalaripayattu_advance_desc:0 "Kalaripayattu — the #italic Practice in the Arts of the Battlefield#! — is an old Indian martial art with its origins in the $malabar_area$. Warriors of our state shall be trained in the arts of Kalaripayattu to ensure their hand-to-hand and melee prowess."
 kammergericht:0 "Found the Kammergericht"
 kammergericht_desc:0 "In order to regularize control of the Mark of Brandenburg, we will replace local common law with Roman law. We will further regulate justice by moving the Supreme Court from the court of the Elector, who is prone to moving around, to a fixed central location. This will simultaneously improve justice and curb the power of local magnates."
 karamanid_cavalry:0 "$KAR$ Cavalry"
 karamanid_cavalry_desc:0 "Cavalry has always been the cornerstone of $turkmen_culture$ warfare. Our riders, trained from a young age and mounted on hardy Anatolian horses, uphold the proud traditions of steppe warfare with discipline and striking force."
 karimi_merchants:0 "Kārimī Merchants"
 karimi_merchants_desc:0 "Formidable traders that primarily deal in spices, these maritime giants have profited greatly from the flow of exotic goods that trail their origin as far as the shores of $india$ — and beyond."
 kashif:0 "Kāshif"
 kashif_desc:0 "Our Sultanate is enormous, and therefore we must make wise, careful choices about its administration. To employ particularly learned individuals as local governors is a brilliant move, one that should eventually tip the geopolitical scales in our favor."
 kasztelanowie:0 "kasztelanowie"
 kasztelanowie_desc:0 "Castellans represent the voice of the monarch across our domain. They are in charge of gathering taxes and enforcing the rule of law, and may even execute justice in the name of the Crown."
 kbo_council_clan_heads:0 "Council of Clan Heads"
 kbo_council_clan_heads_desc:0 "Delegating administrative duties to local clan heads may mean relinquishing some of our central authority, but our advisors insist that we shall reap great benefits in return."
 kbo_fixed_military_camps:0 "Fixed Military Camps"
 kbo_fixed_military_camps_desc:0 "By establishing permanent military camps at strategic locations throughout our domain, we will ensure our army suffers fewer casualties from attrition and can be mobilized quickly when needed."
 kbo_iron_helmet_musketeers:0 "$a_iron_helmet_musketeers$"
 kbo_iron_helmet_musketeers_desc:0 "As warfare tactics advance, so must our strategy. By adapting foreign innovations and techniques like formations, lines of fire, and new gunpowder recipes, we will surely be victorious!"
 kbo_permanent_sieges:0 "Kanem Siege Tactics"
 kbo_permanent_sieges_desc:0 "Our armies are experienced with siege machinery, but adopting mobile artillery that can maintain sustained fire would secure our victory whenever we attack an enemy's walls!"
 kbo_ribat_fortifications:0 "Ribāṭ Fortifications"
 kbo_ribat_fortifications_desc:0 "Used throughout the $muslim_ADJ$ world, these small fortifications have provided protections to caravans, commercial hubs, and isolated communities alike."
 keepers_of_the_gate:0 "Keepers of the Gate"
 keepers_of_the_gate_desc:0 "$SER$'s rugged terrain has birthed a formidable network of defenses, epitomized by the imposing Smederevo Fortress. These enduring fortifications safeguard our nation, making invasion a daunting prospect. From the sprawling mountain ranges to the strategic river valleys, $SER$'s defenses stand as a testament to our resilience and indomitable spirit."
 kele_koun_advance:0 "The Kèlè-Koun"
 kele_koun_advance_desc:0 "The Kèlè-Koun, or 'war-head', are the commanders of infantry fighting for Empire, called the Kèlè-Bolo, or 'war-arm'. Unlike the Ton-Tigi, the feudal lords of $MAL$, the Kèlè-Koun are not necessarily part of the $nobles_estate$. The Kèlè-Koun have #italic jonow#!, 'slaves', serving as carriers of the weapons and equipment until their inclusion in the Sofa battalions."
 kgk_emerging_clan:0 "Emerging Clan"
 kgk_emerging_clan_desc:0 "Despite our impressive ancestry, our clan is very new, as our split from the Sasaki clan is relatively recent. Our people are eager to prove their worth as scions of an independent name."
 kgk_omi_genji:0 "Ōmi-Genji"
 kgk_omi_genji_desc:0 "We are the Ōmi-Genji, descendants of the Uda Genji branch of the Minamoto family, who have governed Ōmi as hereditary #italic Shugo#! for generations. Our well-established position gives us unquestioned legitimacy to defend and rule our ancestral domain."
 khedivates:0 "khedivates"
 khedivates_desc:0 "Large empires are usually formed around a core territory, and otherwise surrounded by subject nations of somewhat dubious loyalty. We should take the necessary measures to keep these nations under our surveillance."
 khm_ballista_elephants:0 "Ballista Elephants"
 khm_ballista_elephants_desc:0 "Elephants are impressive creatures and tower over any other animal we have seen. It is time to utilize these qualities to strike fear into our enemies by using these majestic animals in warfare. Elephants are also able to carry great weight, allowing us to mount war machines on them. Constructing double-stringed crossbows and equipping our elephants with them will create a tool that will allow us to dominate the battlefields better than ever before."
 khm_champa_mercenaries:0 "Mercenary Leaders of $CHA$"
 khm_champa_mercenaries_desc:0 "In the past, we both fought with and alongside the fierce warriors of $CHA$. If we can secure the service of their most capable leaders in times of conflict, we can ensure our own forces are trained and well-rested, ready to leap into battle as fresh reinforcements."
 khm_foreign_production_skills:0 "Invite Foreign Experts"
 khm_foreign_production_skills_desc:0 "While our own people are not familiar with silk-weaving and prefer other fabrics, we are lucky that foreign artisans have settled in our cities and established their own weaving workshops. We should adopt this approach for other industries by directly inviting foreign artisans to bring their skills here, and thereby universally expand our production."
 khm_great_builders:0 "Hydraulic Cities"
 khm_great_builders_desc:0 "Our great cities are home to many #italic barays#! and canals, primed to store and disperse water throughout the area. Constructing and maintaining this network of waterways with skill will ensure our population will thrive even during the unstable monsoon seasons."
 khm_invest_in_irrigation:0 "Expand the Barays"
 khm_invest_in_irrigation_desc:0 "While our existing water reservoirs meet our current agricultural demands, we could easily support more people if we were to dig new #italic barays#! in other parts of our country, creating the foundations for new urban hubs."
 khm_modern_navy:0 "A Modern Navy for $KHM$"
 khm_modern_navy_desc:0 "We cannot allow others to dominate the seas and control the trade our state depends on. Let us create a new, modern naval force capable of taking on any pirate or rival navy in $south_east_asia$."
 khm_old_grudges:0 "Guided by Rivalry"
 khm_old_grudges_desc:0 "Our people were humiliated in the past by being forced to bow to foreign invaders. While not every defeat can be avoided, we use these old rivalries to spur our people to fight harder and longer on the battlefield, burning to erase the shame of these ancient humiliations."
 khm_protection_from_raids:0 "Secure the Borders"
 khm_protection_from_raids_desc:0 "Our lands are frequently threatened by invasion, and our precious $angkor$ lies especially vulnerable to siege. We must invest into a comprehensive system of fortifications, with sufficient garrisons to withstand any invading force, so that we can protect our people and national treasures from foreign conquest."
 khm_recruitment_of_peasants:0 "Recruit the Peasantry"
 khm_recruitment_of_peasants_desc:0 "We will need to reinforce our army with new recruits, which are easily found among the peasant class. With some training, we will be able to ensure the ranks can be refilled at any time by capable soldiers."
 khm_religious_flexibility:0 "One Faith for $KHM$"
 khm_religious_flexibility_desc:0 "Our country has lived through tumultuous times as royal patronage shifted between both $hindu$ and various branches of $buddhist$. We must promote the chosen faith throughout our country to breed stability, and trust that our ruler has chosen the true path for our people."
 khm_restore_angkor:0 "Restoration of $angkor$"
 khm_restore_angkor_desc:0 "The great city of $angkor$ was once a brilliant example of our architectural genius. Due to external pressures, we had to abandon our construction efforts, but we should connect to the roots of our society and start constructing new monuments to our splendor again."
 khm_royal_procession:0 "$KHM_ADJ$ Royal Processions"
 khm_royal_procession_desc:0 "Our rulers excel at creating dazzling processions, events of glorious splendor that very few others can rival. These extravagant demonstrations of our national wealth confirm the power and brilliance of the ruler and the astonishing riches of our nation. The glittering procession of elephants, treasure, and the royal guard will strike awe and respect in the hearts of our people, winning their unbroken loyalty and admiration."
 khm_utilize_the_rivers:0 "The Lifeblood of $KHM$"
 khm_utilize_the_rivers_desc:0 "Our rivers provide an excellent way to transport goods harvested and produced in our inland territories to our harbors, which are connected to foreign trade routes. Utilizing this transport network will also connect our cities and make communication between them faster."
 kilwan_trade_network:0 "$ZAN_ADJ$ Trade Networks"
 kilwan_trade_network_desc:0 "Attracting merchants from as far away as $persia_region$ and $arabia_region$, our capital has become a bustling commercial hub, facilitating business from the horn of $africa$ all the way to the shores of $china$."
 kkc_disinguished_family_in_kyushu:0 "Distinguished Family"
 kkc_disinguished_family_in_kyushu_desc:0 "Unlike other powerful clans in Kyūshū, our family settled here before the establishment of the $kamakura$ Shogunate. Our achievements are well known, and our name is respected."
 kkc_resistance_against_foreign_intervention:0 "Resistance Against Invasions"
 kkc_resistance_against_foreign_intervention_desc:0 "Our contributions to defending the country against the $MGE_ADJ$ invasions are well known. Kikuchi Takefusa's achievements in repelling the invaders are widely lauded, and all our troops aim to fight as bravely as him."
 kno_murakami_suigun:0 "Murakami Suigun"
 kno_murakami_suigun_desc:0 "The Murakami clan is well-known for committing piracy in the Seto Inland Sea. Let us integrate them fully in our own clan, and send these fearsome privateers after our enemies!"
 kno_ruler_of_inland_sea:0 "Rule Over the Inland Sea"
 kno_ruler_of_inland_sea_desc:0 "The Seto Inland Sea has a special importance for trade routes of $japan_region$, and maintaining naval dominance here could make or break our clan. We must ensure that we always have a strong navy with which to control maritime trade."
 kno_shugo_of_iyo:0 "Shugo of $iyo_province$"
 kno_shugo_of_iyo_desc:0 "Since the late Heian Period, we have been the biggest naval power in the Seto Inland Sea. In fact, our navy is how we became #italic Shugo#! of this province."
 knot_system:0 "Talking Knots"
 knot_system_desc:0 "By using arrangements of cords and knots to record information, we can greatly facilitate administration of our lands and keeping accurate records of vital information."
 kokugaku:0 "kokugaku"
 kokugaku_desc:0 "Almost since its inception as a country, $japan_region$ and $shinto$ have been influenced by foreign ideas coming from $china$ and $buddhist$. A new movement is taking root, claiming that our own national spirit is naturally pure, and that our society must be cleansed of any foreign influences."
 kol_peace_in_the_city:0 "Peace in the City"
 kol_peace_in_the_city_desc:0 "Not so long ago, our city was nearly torn apart in the struggle between our burghers and our clergy. We must ensure that this conflict cannot repeat itself, and that every member of both our court and the city council cooperate in preserving Cologne as a central hub on the Rhine."
 kol_school_of_painting:0 "Cologne School of Painting"
 kol_school_of_painting_desc:0 "Our city is home to many capable painters and craftsmen skilled in the art of bringing images to life through the media of wood, stone, and especially glass. With the support of a strongly established artists' guild, they will thrive under our sponsorship and illuminate our city to new glory."
 komisja_edukacji_narodowej:0 "Komisja Edukacji Narodowej"
 komisja_edukacji_narodowej_desc:0 "Our government's need for capable administrators has led to systematic education reform. We will establish the first education ministry in $europe$, devoted to spreading literacy throughout our population, which will hopefully lead to an increase in qualified candidates to staff our expanding administration."
 kon_bakongo_confederation:0 "Bakongo Confederation"
 kon_bakongo_confederation_desc:0 "Before the rise of our realm, the people of this region governed themselves through clan councils and provincial alliances. What we now call $KON$ emerged from centuries of interwoven relationships, where loyalty to the land and kin outweighed loyalty to borders. Uniting this patchwork into a centralized realm was no small feat, but we did it and we will keep it together yet."
 kon_cultural_syncreticism:0 "Cultural Syncretism"
 kon_cultural_syncreticism_desc:0 "The influx of foreigners and cultural exchanges have made an impact on our society. However, we have not abandoned our own ways. We call upon deities by Kikongo names, we proudly wear our religious insignia, and our ceremonies echo with both drums and hymns. This is a vibrant example of our clarity, and the gods seem to agree."
 kon_european_contact:0 "Contact with $europe$"
 kon_european_contact_desc:0 "The strangers came from the sea with beards, books, and barrels of wine. They brought with them strange gods, stranger languages, and an entire ocean of opportunity. Our emissaries have learned their customs, their intentions, and — most importantly — how to turn their need for allies into our advantage."
 kon_lineage_lukeni_lua_nimi:0 "Lineage of Lukeni lua Nimi"
 kon_lineage_lukeni_lua_nimi_desc:0 "All things must begin somewhere, and for our kingdom, that beginning lies with Lukeni lua Nimi. He was more than a conqueror. Indeed, he was a founder, the father of our realm. His bloodline commanded respect, not just for its ancestry, but because it reminds the people who first dared to dream of a unified $KON$."
 kon_study_european_firearms:0 "Study European Firearms"
 kon_study_european_firearms_desc:0 "The musket may not make a man brave, but it certainly makes him fearsome. Let those in $europe$ boast of their superiority; we will buy their weapons, master their drills, and soon enough the only thing distinguishing our soldiers from theirs will be the color of their flags."
 kon_transatlantic_slave_trade:0 "Transatlantic $slaves_goods$ Trade"
 kon_transatlantic_slave_trade_desc:0 "Prisoners and laborers are needed overseas to operate our many worksites, plantations, and mines. While this is far from a noble endeavor, none can deny the profitable nature of these exploits."
 kor_border_defense_council:0 "Border Defense Council"
 kor_border_defense_council_desc:0 "Our borders are constantly threatened, both by barbarians from the north and pirates from beyond the seas. To ensure our armies are always ready to meet every threat with swiftness, we will establish a council of officers dedicated to controlling and securing our borders."
 kor_court_poetry:0 "Court Poetry"
 kor_court_poetry_desc:0 "Our aristocracy puts great emphasis on the cultural development of their spirit and mind. Literature, such as poetry in $classical_chinese_language$, is seen as greatly valuable by the court. The nobility and ruling class alike are enthusiastic about the cultural impact of the written word."
 kor_daedongbeop:0 "Daedongbeop"
 kor_daedongbeop_desc:0 "A new set of reforms that will gradually introduce previously ignored improvements into the tax system. The tribute tax levied against households will be replaced with a unified tax on arable land, and the tax on goods will be limited to a quota which lets enterprising peasants and wholesalers make and sell surplus goods. This will result in lower taxes for the peasantry, increased revenues for the state, and an overall rise in commerce."
 kor_early_turtle_ship_advance:0 "$n_early_turtle_ship$"
 kor_early_turtle_ship_advance_desc:0 "$n_early_turtle_ship_desc$"
 kor_fortresses_of_goguryeo:0 "Fortresses of Goguryeo"
 kor_fortresses_of_goguryeo_desc:0 "$korea_region$ was home to many kingdoms in the past. However, the influence of one kingdom in particular is still felt today: Goguryeo, the precursor to Goryeo. Goguryeo has left us many legacies, including its stone fortifications and castle-building techniques, which are still in use to this day."
 kor_geobukseon:0 "Geobukseon"
 kor_geobukseon_desc:0 "Defending our coastlines is vital to our survival, and as a result of this vigilance, we have developed the ingenious 'turtle ship'. These heavily armored behemoths will ensure that no enemy ship penetrates our coastal holdings."
 kor_grand_code:0 "Grand Code for State Administration"
 kor_grand_code_desc:0 "To ensure proper, stable governance, we must first codify exactly how the government will work. This will be the basis for our nation's first written constitution."
 kor_gunpowder_engines:0 "Gunpowder Engines"
 kor_gunpowder_engines_desc:0 "Our forces have been aware of gunpowder's tactical value for centuries. Through reverse-engineering $CHI_ADJ$ designs and the innovations of Choe Museon, we have mastered both gunpowder production and the construction of machines that employ it for military use."
 kor_hangeul_alphabet:0 "The Hangeul Alphabet"
 kor_hangeul_alphabet_desc:0 "The $korean_language$ language is so fundamentally different from any form of $chinese_language_family$ that the use of $chinese_language_family$ characters renders all except the most highly educated people illiterate. Our new alphabet is more scientific, and will allow all our people to be able to read and write in their own language."
 kor_hopae_system:0 "The Hopae System"
 kor_hopae_system_desc:0 "The #italic hopae#! is an identity tag system requiring all $korean_culture$ people to carry proof of their name, birthplace, status, and residence. This allows authorities to quickly verify identities, and to track a person's movement, if needed."
 kor_hwachas_advance:0 "$a_hwacha$"
 kor_hwachas_advance_desc:0 "$a_hwacha_desc$"
 kor_korean_artisanry:0 "$korean_culture$ Artisanry"
 kor_korean_artisanry_desc:0 "$korea_region$ has always had artistic traditions, but art has truly blossomed since our national unification, thrusting us into a golden era of cultural achievement. Among our many accomplishments, the artisanry of our people shines as a beacon of skill and refinement."
 kor_korean_barracks_advance:0 "$korean_barracks$"
 kor_korean_barracks_advance_desc:0 "$korean_barracks_desc$"
 kor_korean_cannon:0 "The $korean_culture$ Cannon"
 kor_korean_cannon_desc:0 "Although we are already quite experienced at using gunpowder and cannon, we should not stop making technological advancements. By developing smaller, but more durable cannons, as well as inventing more efficient methods of reloading, we will revolutionize our artillery and greatly benefit both our army and our navy."
 kor_korean_gunnery:0 "$korean_gunnery$"
 kor_korean_gunnery_desc:0 "As gunpowder technology advances, so does our ingenuity, and as a result we have devised a new defensive system. Although simple in concept and execution, installing cannons in our fortifications will increase their defensive capabilities tremendously."
 kor_metal_movable_type:0 "Metal Movable Type"
 kor_metal_movable_type_desc:0 "Movable type is an ancient printing technology first used by the $CHI_ADJ$ people many centuries ago. But it is the Goryeo dynasty who developed the metal form of movable type, streamlining the printing process. We can now print books with unparalleled efficiency."
 kor_panokseon_advance:0 "$n_panokseon$"
 kor_panokseon_advance_desc:0 "$n_panokseon_desc$"
 kouroukan_fouga_advance:0 "Kouroukan Fouga"
 kouroukan_fouga_advance_desc:0 "The $kouroukan_fouga_advance$ is the basic constitution of $MAL$. It covers every aspect of living, from simple family life in the villages all the way to the sovereignty of the Mansa."
 krakow_grosz:0 "Grosz Krakowski"
 krakow_grosz_desc:0 "In an attempt to reform our monetary system, we will introduce a new currency, the #italic Kraków Grosz#!. Minted from silver, these coins are destined to challenge the power of the $BOH_ADJ$ #italic Prague Groschen#! and help establish our realm as pioneers of centralized taxation."
 krs_kurdish_horses:0 "Adaptable Cavalry"
 krs_kurdish_horses_desc:0 "Our homelands are surrounded by many would-be conquerors, hungry to subjugate our people. While our native terrain can slow down hostile armies, it also makes it difficult for our own troops to respond to threats swiftly. A strong cavalry, however, will allow us to quickly react to any threats, no matter how many there might be."
 krs_kurdish_mercenaries:0 "Mercenary Experience"
 krs_kurdish_mercenaries_desc:0 "Our people have long served as hired swords for foreign lords, gaining valuable combat experience in their service. With our own country now established, it is time to call those experienced fighters under our banner."
 krs_kurdish_quarters:0 "Prospering $kurdish_culture$ Quarters"
 krs_kurdish_quarters_desc:0 "In the times of foreign rule, many of our people established predominantly $kurdish_culture$ quarters in cities. While these areas prospered even under distant rulers, we can now utilize their wealth directly, and better guarantee a prosperous future for our people."
 krs_kurdish_tribes:0 "Tribal Loyalty"
 krs_kurdish_tribes_desc:0 "Having asserted our authority over all $kurdish_culture$ tribes, we will be able to call upon their experienced, hardened warriors to defend our country."
 krs_kurdish_warrior_poets:0 "Warrior Poets"
 krs_kurdish_warrior_poets_desc:0 "Our rulers must not just be capable warriors; they must also be educated in the matters of fine art and effective administration. By writing texts and documenting their reigns, our leaders will pass the knowledge and history of our people down through generations, ensuring no valuable insight is lost."
 krs_legacy_of_the_kurdish_dynasties:0 "Legacy of the $kurdish_culture$ Dynasties"
 krs_legacy_of_the_kurdish_dynasties_desc:0 "Our people have established several great dynasties, ruling territories from $egypt_region$ to Iran. Tying our own state to the glory of past rulers will allow us to be a unifying symbol for the $kurdish_culture$ people, and make our rule seem more legitimate in the eyes of our subjects."
 ktb_blessing_of_amaterasu:0 "Blessing of Amaterasu"
 ktb_blessing_of_amaterasu_desc:0 "As the keepers of the holiest of $japan_region$'s shrines at $ise_province$, we are blessed by Amaterasu, goddess of the sun and the universe. We must rise to be worthy of the task of maintaining and caring for this national treasure, which will earn us the respect of the $japanese_group$ people."
 ktb_control_of_ise:0 "Control of $ise_province$"
 ktb_control_of_ise_desc:0 "From the wealthy south to the densely populated urban north, we have extended our control over the entire province of $ise_province$. This will allow us to fully exploit provincial resources to further the growth of our clan's influence."
 ktb_southern_court:0 "Supporters of the Emperor"
 ktb_southern_court_desc:0 "We supported the Southern Court during the Imperial schism, showing loyalty to the Chrysanthemum Throne despite their struggles. This reputation for loyal service grants us more prestige and moral authority than many of the lesser houses that now dominate $japan_region$."
 ktb_the_march_of_kitabatake_akiee:0 "March of Kitabatake Akiie"
 ktb_the_march_of_kitabatake_akiee_desc:0 "Our honorable ancestor Kitabatake Akiie proved that even the long march from $ou_area$ to central $japan_region$ can be undertaken rapidly if one has enough determination. We must learn from this feat and train our armies in swift maneuvering, so that we can quickly move from one front to another as needed."
 kung_och_riksdag:0 "Kung och Riksdag"
 kung_och_riksdag_desc:0 "$SWE_ADJ$ rulers often depended on cooperation with the estates, especially with such a large peasant class compared to that of the nobility. During the reign of Gustavus Adolphus, however, a historic compromise was made with the aristocrats, who loyally pledged their resources to the disposal of the nation in return for new privileges."
 kurultai_advance:0 "Kurultai"
 kurultai_advance_desc:0 "Upon gathering leaders from each warrior band beneath one tent, we will elect the $rank_empire_horde_ruler_suffix_male$ who will lead our hordes to victory. In this #italic kurultai#!, the fate of our people is decided, and leaders will be chosen from among those who think themselves worthy of leading us."
 kutnohorian_deal:0 "The Kutnohorian Deal"
 kutnohorian_deal_desc:0 "The nobility will always be rather sensitive about protecting their privileges. It would go far towards winning their loyalty if said privileges were to be guaranteed forever."
 kvn_karvunan_maritime_heritage:0 "Karvunan Maritime Heritage"
 kvn_karvunan_maritime_heritage_desc:0 "Karvuna has built its power upon the sea rather than the fertile plains, drawing upon a mix of Bulgarian, Greek, and Italian sailors. By fortifying the limestone cliffs of the coast, we will create a series of naval bases that will allow us to dominate the Black Sea trade routes between the Danube delta and Constantinople. This maritime focus will provide us with a unique identity within the Bulgarian world, prioritizing naval superiority and trade over the traditional feudal concerns of the interior."
 kvn_looking_for_friends:0 "Looking for Friends"
 kvn_looking_for_friends_desc:0 "Given our small land area, our rulers understand the need for powerful friends and trade partners. By granting these allies exclusive trading rights in ports like Varna, the Despotate will gain access to modern Western naval technology and financial credit, as well as potentially powerful naval protection against our enemies. This alliance will transform Dobruja into a cosmopolitan trade hub, where the wealth of the Silk Road will be exchanged for the grain and furs of the north."
 kvn_the_black_sea_admiralty:0 "The Black Sea Admiralty"
 kvn_the_black_sea_admiralty_desc:0 "Karvuna will establish a permanent, state-run Admiralty to oversee the construction of modern deep-water warships and the training of a professional officer corps. Shifting away from small galleys, we will begin building frigates and small ships-of-the-line capable of projecting power as far as the Aegean and the Sea of Azov. This naval modernization will ensure that we remain a major maritime player, capable of defending our trade interests against our enemies."
 kvn_the_condotta_of_varna:0 "The Condotta of Varna"
 kvn_the_condotta_of_varna_desc:0 "As a maritime state with a relatively small land population, Karvuna has refined the art of 'contract warfare' by formalizing a permanent Condotta with the Italian maritime powers. Under this arrangement, we provide them with fortified warehouses and naval bases in the Black Sea, and in return, the Italians provide a professional corps of heavy crossbowmen and expert siege engineers for the Despotate's defense. This symbiotic relationship allows Karvuna to punch far above its weight in land battles, utilizing Western tactical innovations and professional discipline to defend its coastal strip while the native Bulgarian sailors dominate the waves, effectively outsourcing its land defense to the most skilled mercenaries in the Mediterranean."
 kvn_the_cosmopolitan_code_of_karvuna:0 "The Cosmopolitan Code of Karvuna"
 kvn_the_cosmopolitan_code_of_karvuna_desc:0 "To maintain its status as the premier trade hub of the Black Sea, we will promulgate a revolutionary legal framework known as the 'Code of Karvuna', which will grant extraterritorial rights and religious freedom to recognized merchant nations. Regardless of their faith or origin, any merchant operating within our ports will be judged by a commercial court of his peers rather than by local feudal lords. This atmosphere of legal predictability and tolerance will attract a massive influx of capital and expertise, turning Karvuna into a huge hub where the wealth of the silk and spice roads will be reinvested into the state's infrastructure and military-industrial complex."
 kvn_the_free_port_of_varna:0 "The Free Port of Varna"
 kvn_the_free_port_of_varna_desc:0 "To cement our position as the premier commercial hub of the Balkans, we will declare Varna a free port, exempting international merchants from most traditional duties in exchange for a flat transit fee. This policy will attract a massive diaspora of merchants, bankers, and insurers, making Varna the 'Venice of the Black Sea' and the financial capital of the Bulgarian world. The resulting wealth will allow us to maintain a professional army and a world-class navy, ensuring that our coastal state remains a wealthy and independent power in an age of giants."
 lacquerware_guild_advance:0 "$lacquerware_guild$"
 lacquerware_guild_advance_desc:0 "$lacquerware_guild_desc$"
 lacquerware_manufactory_advance:0 "Lacquerware Manufactory"
 lacquerware_manufactory_advance_desc:0 "$lacquerware_manufactory_desc$"
 land_morale_attrition_cost_advance:0 "March Training"
 land_morale_attrition_cost_advance_desc:0 "It is common for armies to have to march great distances in order to reach their enemy. As such, long marches are a staple of our military training regimen, accustoming our fighters to walking long distances and still arriving fresh for the battle."
 land_morale_movement_cost_advance_disc:0 "Coordinated March"
 land_morale_movement_cost_advance_disc_desc:0 "An army on the move is vulnerable, and prone to disorganization. Training our troops to march in an organized and coordinated manner ensures that they will retain their battle formations, even if attacked while moving."
 land_morale_movement_cost_rev_choice_mil:0 "Unrelenting Advance"
 land_morale_movement_cost_rev_choice_mil_desc:0 "Our armies on the march is a sight to behold. Their training and discipline shines when they march in unison into battle, unfazed by any previous long march."
 land_morale_recovery_renaissance_advance:0 "Organized Army March"
 land_morale_recovery_renaissance_advance_desc:0 "Managing armies becomes increasingly more complex as they become less reliant on levies. A key aspect of this is improved organization of armies on the march, which helps the troops to be more prepared if a battle occurs."
 land_of_many_religions:0 "Land of Many Religions"
 land_of_many_religions_desc:0 "Our people coexist with fellow men and women of many faiths. This diverse social composition is embedded in our legal frameworks and beliefs. Together, we are stronger!"
 land_of_opportunity:0 "Land of Opportunity"
 land_of_opportunity_desc:0 "By portraying our colonies and the surrounding unclaimed lands as places where anyone can make their fortune, we will rapidly increase emigration to our colonial holdings. This means the nation will spend less money encouraging people to go there."
 land_of_promise:0 "Land of Promise"
 land_of_promise_desc:0 "The fertile lands of our domain are a coveted destination for many migrants, primarily those of lower status, seeking a better and more prosperous life."
 land_of_the_ancestors:0 "Land of the Ancestors"
 land_of_the_ancestors_desc:0 "Land is not property, nor is it mere dust; it is our connection to our great forebears. From the better lands beyond, they watch over us. We must never let the connection between us be severed, and we must care for these lands in honor of those who first settled them."
 land_of_the_rus:0 "Land of the Rus'"
 land_of_the_rus_desc:0 "Reunification of the Rus' is a common goal among the $russian_group$ rulers, and aspiring conquerors can use this as a justification of conquest."
 landsknechte:0 "landsknechte"
 landsknechte_desc:0 "A new type of unit organization has been born out of $GER$'s constant wars: The $landsknechte$, which takes the form of mixed troops formed by innovative pikemen squares, with arquebusiers supporting from their flanks, and a front line composed of the infamous #italic Doppelsöldner#!, 'double-pay men', carrying two-handed swords. This allows for tactics that combine close-quarters and medium-range combat."
 lat_codex_latinus_advance:0 "Codex Latinus"
 lat_codex_latinus_advance_desc:0 "The Emperor has ordered the complete overhaul of the legal system, merging the Justinian Code with the Frankish-style #italic Assizes of Romania#! into a single, unified legal body. This #italic Codex Latinus#! removes the legal distinctions between Frankish and Greek subjects, creating a single class of Imperial Citizens under the Emperor's law. This legal unification is the final nail in the coffin of the old feudal order, paving the way for a truly centralized, absolute monarchy."
 lat_emperor_latins_advance:0 "Emperor of the Latins"
 lat_emperor_latins_advance_desc:0 "With the #italic Frankokratia#! united under our rule, our court now meticulously blends the rigid, martial feudal hierarchies of the French and Occitan tradition with the ancient, intricate ceremonial of the Greeks. By adopting the purple robes and the dignity of the East, we command the spiritual respect of our Greek subjects while maintaining the chivalric loyalty of our Western knights. This synthesis transforms the Emperor from a mere foreign conqueror into a legitimate successor of Constantine, recognized by the Pope and feared by our enemies."
 lat_hegemony_over_the_bosphorus_advance:0 "Hegemony over the Bosphorus"
 lat_hegemony_over_the_bosphorus_advance_desc:0 "Dominating the narrow gates of the Black Sea allows us to levy heavy tolls on the Italian merchant republics that once dictated our fate through debt and naval blockade. The wealth of the Pontic grain trade and the Silk Road's northern terminus now flows directly into the Imperial coffers rather than Venice or Genoa, funding our restoration. We have turned the Golden Horn from a den of foreign merchants into the beating heart of a centralized, sovereign economic powerhouse."
 lat_the_golden_gate_customs_house_advance:0 "The Golden Gate Customs House"
 lat_the_golden_gate_customs_house_advance_desc:0 "The Latin Emperors have moved beyond feudal levies and now rely on a sophisticated system of maritime tariffs and transit duties. Every ship passing through the Dardanelles or the Bosporus must stop at the Imperial Customs House, where the 'Tenth of the Emperor' is collected in hard coin. This massive revenue stream allows the Empire to maintain a professional, standing army that does not rely on the whims of the nobility."
 lat_the_new_praetorian_guard_advance:0 "The New Praetorian Guard"
 lat_the_new_praetorian_guard_advance_desc:0 "Evolving from the old Varangian tradition, our modern guard consists of professional Catholic mercenaries from across Europe, primarily French veterans and Swiss pikemen. These men are bound to the Emperor not by land or title, but by gold and a shared Crusader identity, serving as an iron fist against disloyal feudal barons. This standing force ensures that the Emperor's will is absolute, providing a stable core for the army that is immune to the whims of the high nobility."
 lat_the_order_of_the_star_of_the_east_advance:0 "The Order of the Star of the East"
 lat_the_order_of_the_star_of_the_east_advance_desc:0 "The Emperor has established a high-tier order of merit that replaces hereditary titles with service-based nobility, ensuring that the Empire's leaders are chosen for their talent. Membership in the Order is the highest honor in the land, granted to generals, diplomats, and scholars who have expanded the glory of the Latin Throne. This system creates a loyalist elite that is entirely dependent on the Emperor's favor, cementing the monarch's control over the state."
 late_feudal_relations:0 "Late Feudal Relations"
 late_feudal_relations_desc:0 "Feudalism is built upon the concepts of #italic auxilium#! and #italic consilium#!, or military aid and counsel, owed by vassals to their lords. Over this, this has created an intricate hierarchy of rank, privilege, and reciprocal duties."
 late_ottoman_bureaucracy:0 "Mālīye"
 late_ottoman_bureaucracy_desc:0 "A vast, diverse, and highly organized bureaucracy staffed by the most skilled of scribes, the $late_ottoman_bureaucracy$ aspires to be a fundamental and incorruptible institution of the state."
 late_winged_hussars_advance:0 "Late Winged Hussars"
 late_winged_hussars_advance_desc:0 "The evolution of $POL_ADJ$ hussars entailed the adoption of heavier armor with red and white colors. They used a longer lance of around six meters, which made their charge incredibly devastating, often breaking the morale of their foes and causing them to rout."
 latin_patriarch:0 "Latin Patriarch"
 latin_patriarch_desc:0 "$PAP$ has reinstated the Latin Patriarch of $KOJ$, once exiled and forgotten. Now restored, the Patriarch shall strengthen our influence in $rome$ and reinforce our role as guardian of the Church's interests in the East."
 latinate_integration:0 "Latinate Integration"
 latinate_integration_desc:0 "Our realm is a crucible of noble blood from around $europe$, zealous pilgrims, and old Levantine stock. Through careful governance, we shall weave together this diverse heritage into a Latin $christian_ADJ$ society, where faith and culture go hand in hand."
 law_making_renaissance:0 "Legal Scrutiny"
 law_making_renaissance_desc:0 "New times mean new situations, and the laws that have been in place for generations may not be applicable to these new contexts. We should assign legal experts to continuously scrutinize and revise our laws, so that we can adapt them to our current times and needs."
 lawcode_of_suleiman:0 "The Legal Code of Suleiman"
 lawcode_of_suleiman_desc:0 "Suleiman is remembered as one of the great rulers of history, a soldier, a lawmaker, and a reformer. In fact, while the West knows him as Suleiman the Magnificent, in his homeland, he is called 'The Lawgiver'. Central to his reforms was the re-examination of $TUR_ADJ$ dynastic law, #italic Kanun#!, in order to bring it in line with $sharia$."
 lazaretto_advance:0 "$lazaretto$"
 lazaretto_advance_desc:0 "$lazaretto_desc$"
 le_livre_des_tournois:0 "Le Livre des Tournois"
 le_livre_des_tournois_desc:0 "Penned by royalty, the 'Book of Tournaments' is more than a manual — it is a statement of courtly pride and chivalric identity. Our nobility trains not only for war but for spectacle, and in doing so preserves martial discipline and prestige across the realm."
 lead_ore_dressing:0 "Lead Ore-Dressing"
 lead_ore_dressing_desc:0 "Through the dressing process, lead ore is washed and crushed to remove impurities and separate the ore from rocks, clay and other minerals."
 leader_recruit_cost_advance:0 "Officer Schools"
 leader_recruit_cost_advance_desc:0 "Leading troops is not an easy task. Strategy, tactics, mental insight — these are just some of the skills a successful leader must have. Founding officer training schools will ensure that more of our fighting men develop good leadership skills, and give us a bigger pool of expert commanders to draw from as well."
 leader_under_sky:0 "A Leader under the Sky"
 leader_under_sky_desc:0 "Our people have been divided for too long, and we need someone strong enough to unite them and make the world tremble at our feet. The Sky will direct the acts and thoughts of this leader, and guide us to a bright future."
 ledgers_double_checking:0 "Meticulous Accounting"
 ledgers_double_checking_desc:0 "A lack of rigor in accounting is what allows corruption to thrive, and rots countries from within! To avoid this threat to our administration, we must ensure that any changes in our treasury are fastidiously accounted for."
 legacy_of_breton_independence:0 "Legacy of $breton$ Independence"
 legacy_of_breton_independence_desc:0 "$brittany_area$ has never truly been part of $FRA$ Though we have been ravaged by Franks, Vikings, and the $ENG_ADJ$ in the past, we have, thus far, maintained our unique identity as a people. Let all of our neighbors be aware that $BRI$ shall remain forever free, the last bastion of true Gallic traditions!"
 legacy_of_great_empires:0 "Legacy of Great Empires"
 legacy_of_great_empires_desc:0 "From the Dragon Throne of $china$, to the various empires of $persia_region$, to the powerful $hindu_ADJ$ and $buddhist_ADJ$ dynasties of $india$ and $south_east_asia$, $asia$ has been home to many mighty empires throughout history."
 legacy_of_ivan_asen_ii:0 "Legacy of Ivan Asen II"
 legacy_of_ivan_asen_ii_desc:0 "The reign of Ivan Asen II marked a new height of $BUL_ADJ$ power, diplomacy, and economic expansion. His legacy endures as a foundation for a strong and centralized state."
 legacy_of_saint_andrew:0 "Legacy of Saint Andrew"
 legacy_of_saint_andrew_desc:0 "According to legend, Saint Andrew himself visited Scythia and the northern shores of the $black_sea_area$, prophesying a great flourishing of $christian$ once he reached the future site of $kyiv$."
 legacy_of_the_normans:0 "$norman$ Legacy"
 legacy_of_the_normans_desc:0 "Forged in the crucible of conquest, the $SIC_ADJ$ $norman$ army blended the unstoppable charge of $norman$ knights with the strategic sophistication of $BYZ_ADJ$, Arab, and $lombard$ warfare. Masters of both battlefield ferocity and tactical flexibility, they carved a kingdom at the crossroads of civilizations."
 legalism_advance:0 "Legalism"
 legalism_advance_desc:0 "Laws and rules mean nothing if they are not compiled, standardized, and made understandable to every member of our society. By codifying clear legal standards and enforcing them uniformly, we will ensure that the principles of order and justice reach the furthest corners of our realm."
 legislative_efficiency_idea:0 "Efficiency in Administration"
 legislative_efficiency_idea_desc:0 "The most important factor in efficient government is getting the right advice. We must ensure that we are as inclusive as possible when it comes to advisors, so we can maximize the number of different viewpoints we are presented with."
 legitimization_of_power_law_advance:0 "$legitimization_of_power_law$"
 legitimization_of_power_law_advance_desc:0 "$legitimization_of_power_law_desc$"
 letters_of_marque:0 "Letters of Marque"
 letters_of_marque_desc:0 "Piracy is an appalling act. They are naught but worthless thieves looking to profit from the suffering of others! Formally authorizing ships to raid our enemies, however, is another matter entirely, and could be extremely profitable for us."
 levee_en_masse_advance:0 "Levée en Masse"
 levee_en_masse_advance_desc:0 "Warfare is an ever-evolving concept, having been studied and improved upon for generations and generations. To satisfy the need for expansion and provide the fuel necessary to fulfill these ambitions, new nationwide conscription laws will be drafted. We shall raise armies of young, unmarried recruits, the size of which will leave an indelible mark upon history."
 liberty_egalite_fraternity:0 "Liberté, Egalité, Fraternité"
 liberty_egalite_fraternity_desc:0 "With all men declared to be equal under our new laws, adherents of other beliefs are finally allowed full participation in our government, and may thus now contribute to our national progress."
 liberty_heroes:0 "Sons of Liberty"
 liberty_heroes_desc:0 "Many leaders of the New World independence wars possessed not only the necessary military skills, but also the charisma needed to encourage morale, hold the army together, and be an inspiration to the people."
 library_advance:0 "Library"
 library_advance_desc:0 "$library_desc$"
 lie_athens_north:0 "Athens of the North"
 lie_athens_north_desc:0 "$liege$ has been a cultural center for centuries, the home of the most celebrated scholars in the region and the envy of our rivals. But we shall not allow ourselves to become complacent; we shall never stop improving our institutions."
 lie_devoted_land:0 "A Devoted Land"
 lie_devoted_land_desc:0 "As part of one of the biggest dioceses in the area, there is no doubt as to the depth of devotion our people hold. We will show the world that our faith in God is as strong as our faith in our nation."
 lie_inspiring_mecenas:0 "An Inspiring Maecenas"
 lie_inspiring_mecenas_desc:0 "Our nation inspires artists from across $europe$, who come here to create their masterworks. We will spare no expense to support these artists and attract new talent, establishing ourselves as a hub of arts and culture."
 lieutenancy_advance:0 "Lieutenancy"
 lieutenancy_advance_desc:0 "As the Crown's patrimony grows, the monarch's extended absences from the various kingdoms weaken the Crown and strain relations with subjects. To address this, the position of lieutenant emerges, acting as the monarch's temporary representative during their absences, which are not meant to be permanent. These lieutenants are not only from the royal bloodline but also from the domestic circle connected to the king's family."
 life_among_infidels:0 "Life Among Heathens"
 life_among_infidels_desc:0 "The lands of the faithful have often been tainted by the presence of unbelievers, but this is why our clerics have ventured forth towards the unknown to bring the light of Jesus to distant lands. We have thus influenced these lost souls in more ways than what one might expect, even if we have not been able to make them see the error of their beliefs."
 lijia_system:0 "Lǐ Jiǎ System"
 lijia_system_desc:0 "Under the #italic Lǐ Jiǎ#! system, we are able to exercise control over our borderlands through the allocation of settled armies. By granting land and agricultural rights to our stationed troops, our borders will be safer and our authority shall be affirmed."
 line_infantry:0 "Line Infantry"
 line_infantry_desc:0 "With the invention of bayonets, each musketeer could also function as a pikeman. This allowed pikes to be removed from infantry equipment, and provided infantry formations with more firepower."
 link_the_steppes_trade:0 "Link the Steppes Trade"
 link_the_steppes_trade_desc:0 "Positioned between forest and steppe, $SMO$ has long been a crossroads of war and commerce. By improving overland infrastructure and securing the arteries of caravan travel, we can reforge our role as the vital hinge between northern Rus', the Baltic, and the southern trade routes of the steppes."
 linked_armies_advance:0 "Message Relays"
 linked_armies_advance_desc:0 "Good coordination between the different units of an army is crucial for it to function well. Having an organized system to relay messages between our generals and their unit officials allows all our troops to work more cohesively and respond faster to any situation."
 lithuanian_renaissance:0 "$LIT_ADJ$ $renaissance$"
 lithuanian_renaissance_desc:0 "$LIT$ experienced a $renaissance$ in the late 15th and early 16th centuries. Inspired by the ideas of the Reformation and influenced by the $ITA_ADJ$ $renaissance$, there was a prolific flourishing of education, arts, architecture, and literature during this era. This period will also see the creation of a written form of $lithuanian_dialect$ and, subsequently, the first works of $lithuanian_dialect$ literature."
 LIV_a_order_knights_2:0 "Bannerets of the Livonian Order"
 LIV_a_order_knights_2_desc:0 "The knights of our order have proven their valor and skill in battle time and time again. By promoting the most capable among them to bannerets, we ensure that our armies will always be led by the best."
 llama_farming:0 "Llama Rearing"
 llama_farming_desc:0 "Our vast herds of llamas provide us with fabrics to clothe ourselves, meat to feed ourselves, and pack animals to carry our burdens. They are truly invaluable."
 llama_michis:0 "Llama Michis"
 llama_michis_desc:0 "Llamas have many functions in our society. They act as beasts of burden, as sacrifices, provide meat and wool, and even give us fertilizer for our crops with their dung. Controlling the breeding and use of llamas through government #italic michis#!, or herders, we ensure that the llama population is strictly monitored. This will provide an opportunity for the llama population to increase"
 local_governor_advance:0 "$local_governor$"
 local_governor_advance_desc:0 "$local_governor_desc$"
 local_merchant_preference:0 "Local Merchant Preference"
 local_merchant_preference_desc:0 "Theoretically a merchant can be a citizen of the world, sailing to and from whichever port he pleases. We are going to give advantages to home merchants, for example, priority for loading and unloading of cargo, to ensure that our merchants have every incentive to bring their products home."
 local_nobility:0 "Local Nobility"
 local_nobility_desc:0 "The nobles know they are simply better than other people, and will only give their loyalty to those they deem worthy. If we affirm their privileges, they will of course remember our generosity, and be more resistant to the temptations of foreign powers."
 local_smelters_advance:0 "$local_smelters$"
 local_smelters_advance_desc:0 "$local_smelters_desc$"
 local_traditions:0 "Local Traditions"
 local_traditions_desc:0 "Governing a large nation means ruling over diverse peoples, each with their own customs and traditions. By incorporating these traditions into our official code of laws, we will create a happier and more loyal populace."
 logistics_of_khan:0 "Logistics of the $rank_kingdom_horde_ruler_suffix_male$"
 logistics_of_khan_desc:0 "People forget that the conquests of the Great $rank_kingdom_horde_ruler_suffix_male$ were as much due to superior logistics as military strength. We must emulate the techniques of the Great $rank_kingdom_horde_ruler_suffix_male$ while updating them with modern knowledge. This will give us greater scope for conquest."
 long_rifle:0 "Long Rifle Hunting"
 long_rifle_desc:0 "With specific long rifles designed for hunting, our hunters will have a reliable tool for procuring food and furs."
 lor_between_great_powers:0 "Legacy of Old Kings"
 lor_between_great_powers_desc:0 "Our lands were once an important part of Lotharingia, one of the Frankish kingdoms. If we do not want to fall into irrelevance, we will need to secure our diplomatic position and establish lasting alliances."
 lor_cultural_diversity:0 "Land of Many Cultures"
 lor_cultural_diversity_desc:0 "Our territory is home to many different peoples and cultures. Establishing a single state to govern this diverse population will not be easy, but we must. Only then will we be worthy successors to the $LOR_ADJ$ state from which we descend."
 lor_fortified_cities:0 "Fortified Cities of $LOR$"
 lor_fortified_cities_desc:0 "We occupy vital crossing points on several rivers, which we must defend at all costs if we want to secure our independence. To this effect, we must modernize the large bridge castles of our cities, and construct large citadels at strategic points."
 lor_mining_tradition:0 "Mines of $LOR$"
 lor_mining_tradition_desc:0 "Our lands are rich in ore and coal. Extracting these resources could make us a rich country and lay the groundwork for our grand ambitions."
 lor_three_bishoprics:0 "Land of Bishops"
 lor_three_bishoprics_desc:0 "$LOR$ is home to many bishops with powerful supporters abroad and within the Church itself. Cooperating with them will be useful when making our voice heard within the broader Church. Having the support of the bishops will also help us to pacify the population more easily."
 lowered_power_of_barons:0 "Lowered Baronial Power"
 lowered_power_of_barons_desc:0 "Art and culture are valuable things, but if we wish to remain independent, what we really need is #italic money#!. To acquire what we need, we must diminish the power of regional nobility, and ensure that more money flows into the center of our state."
 lumber_improvements_absolutism:0 "Wind-Powered Sawmills"
 lumber_improvements_absolutism_desc:0 "With the introduction of wind power to our sawmills, we are able to process timber into planks at a much faster rate than we could previously."
 lumber_improvements_discovery:0 "Dedicated Forestry"
 lumber_improvements_discovery_desc:0 "By dedicating a portion of land to the cultivation and harvesting of strong trees, we can increase the quality and quantity of our lumber production."
 lumber_improvements_reformation:0 "Improved Sawblades"
 lumber_improvements_reformation_desc:0 "Thanks to recent advances in toolmaking, our sawblades are sturdier than ever before and require less maintenance. This will make supplying adequate lumber for economic activities far easier than before."
 lux_destined_rule:0 "Destined to Rule"
 lux_destined_rule_desc:0 "The great Luxembourg dynasty, whose very name is derived from that of our nation, is now the most important family in $europe$. This has to be a sign from Heaven, and we will use this divine benediction to further extend our influence."
 lux_fortress_europe:0 "The Fortress of $europe$"
 lux_fortress_europe_desc:0 "The impregnable position of $LUX$, with the formation of the Bock acting as a natural fortress, is incredibly strong. Our enemies would perish in any attempt to usurp our holdings. We shall learn from nature, and construct all our fortresses so as to use the local terrain to their advantage."
 lux_heirs_john_blind:0 "Heirs of John the Blind"
 lux_heirs_john_blind_desc:0 "John the Blind, the heroic King of $BOH$ and Count of $LUX$, was born in our humble realm. He died in the Battle of Crécy at fifty, having charged headlong into combat despite his blindness. His brave, honorable death will inspire our soldiers for centuries."
 lva_baltic_forestry:0 "Baltic Forestry"
 lva_baltic_forestry_desc:0 "Our forests are a vital resource, providing timber for construction and fuel for our fires. We must manage them wisely to ensure their continued abundance."
 lva_baltic_forts:0 "Baltic Forts"
 lva_baltic_forts_desc:0 "Our network of forts and castles scattered across the landscape provides a first line of defense against invaders. These strongholds allow us to monitor and control key routes through the Baltic."
 maghrebi_administration:0 "Maghrebi Administration"
 maghrebi_administration_desc:0 "Centuries of autonomy and our harsh environment have bred separatist tendencies among regional tribes within our borders. Maghrebi administration addresses this through creating a network of regional governors, who enforce central authority and the ruler's will while respecting local customs."
 magna_carta_advance:0 "$magna_carta_reform$"
 magna_carta_advance_desc:0 "$magna_carta_reform_desc$"
 mai_center_of_printing:0 "Printing Shops of $mainz$"
 mai_center_of_printing_desc:0 "By expanding our already-growing printing industry, we can become the leading producer of books in $europe$."
 mai_city_and_archbishop:0 "Rights of the City"
 mai_city_and_archbishop_desc:0 "The citizens of $MAI$ have prospered under the extensive rights granted to them by Adalbert of $MAI$ in the early 12th century. These rights, carved into the bronze door of the Cathedral, will serve as a reminder of cooperation between the separate powers within the city, both the clergy and the citizenry."
 mai_diadema_regni:0 "Diadema Regni"
 mai_diadema_regni_desc:0 "Our beloved city has been described as 'Diadema Regni', the Crown of the Empire, a moniker we strive mightily to maintain. Maintaining this distinction will help us remain above other Imperial cities in terms of our prestige and political influence."
 mai_garrison_of_the_rhine:0 "Garrison of the Rhine"
 mai_garrison_of_the_rhine_desc:0 "Defending our borders can be a difficult task, especially considering the river splitting our land in two. We must build an extensive network of garrisons and fortifications that can withstand our enemies."
 mai_leader_rheinish_league:0 "Rheinish League"
 mai_leader_rheinish_league_desc:0 "When the Rheinish League was active, we naturally assumed a position of leadership and guidance for the other members. Although the League itself has disbanded, we must do everything we can to maintain our influence over our former associates."
 mai_mainz_kingdom:0 "Mainzer Königreich"
 mai_mainz_kingdom_desc:0 "While celebrations on Ash Wednesday are a common occurrence, they hold especially deep roots in our country. While the public celebrates the #italic Fastnacht#!, or carnival, with masquerade and excessive feasts, our court will engage in a special event. During the carnival celebrations, we will redistribute the roles of our court per lottery, with even the ruler having to participate. This custom of swapping roles, called #italic Mainzer Königreich#!, will spread far beyond our borders and help expand our cultural legacy."
 mai_vicar_of_mainz:0 "Governance of the Vicar"
 mai_vicar_of_mainz_desc:0 "To ensure our lands are governed reliably, even in the absence of our ruler, we should instate a vicar. Empowered with extensive rights, the vicar can rule with our best intentions and remind the common folk of our presence at all times."
 mai_zealous_fight_against_heretics:0 "Protect Our Faith"
 mai_zealous_fight_against_heretics_desc:0 "Our country's religious unity must be defended against any threat. If we provide our armies with moral guidance in the form of military chaplains, they will be much more motivated to defend our beliefs."
 maitreya:0 "maitreya"
 maitreya_desc:0 "$maitreya$ is currently a $bodhisattva$, prophesized to be the future and final Buddha of the current era. His destiny is to reestablish the teachings of the Dharma in the world after they have been forgotten by humanity, and as such he is the successor of Siddhārtha Gautama."
 maj_bajang_ratu:0 "The $bajang_ratu$ Gate"
 maj_bajang_ratu_desc:0 "$bajang_ratu_desc$"
 maj_bubu_and_jala:0 "Bubu & Jala"
 maj_bubu_and_jala_desc:0 "$bubu_building_desc$"
 maj_home_of_the_sea_nomads:0 "Home of the Sea Nomads"
 maj_home_of_the_sea_nomads_desc:0 "$n_kabang_desc$"
 maj_island_colonies:0 "Island Colonies"
 maj_island_colonies_desc:0 "Contact with our neighbors in the archipelago has shown us clearly that the raw resources and unclaimed lands are ripe for the taking, promising to become secure and prosperous under our control."
 maj_jong_advance:0 "$n_jong$"
 maj_jong_advance_desc:0 "$n_jong_desc$"
 maj_late_karambit_warriors:0 "$a_late_karambit_warrior$"
 maj_late_karambit_warriors_desc:0 "$a_late_karambit_warrior_desc$"
 maj_maritime_silk_road:0 "Maritime Silk Road"
 maj_maritime_silk_road_desc:0 "Our geographical position, complemented by our growing influence, has led to us presiding over the extensive and profitable trade network that carries $silk$ and $spices$ from East to West."
 maj_preservation_of_javanese_history:0 "Preservation of $javanese_culture$ History"
 maj_preservation_of_javanese_history_desc:0 "The history of the $javanese_culture$ people is an integral part of our cultural identity. To protect this identity, we must preserve the traditions upon which we built our great country."
 maj_restore_candi_shrines:0 "Restore Candi Shrines"
 maj_restore_candi_shrines_desc:0 "Scattered throughout Nusantara are a series of temples known as #italic candi#!. We should restore these temples wherever we find them to renew our people's faith."
 maj_sumpah_palapa:0 "Sumpah Palapa"
 maj_sumpah_palapa_desc:0 "The head of our military directly answers to our ruler, and holds enough influence and power to shape the future of our realm. To ensure they understand what an important role they have been given, they are required to swear a special oath, one that underlines our dreams of conquest and bolsters our spirits."
 maj_the_ghali:0 "$n_madurese_gali$"
 maj_the_ghali_desc:0 "$n_madurese_gali_desc$"
 maj_the_magic_arrow:0 "The Magic Arrow"
 maj_the_magic_arrow_desc:0 "$a_cetbang_cannon_desc$"
 makaron_nisoi_advance:0 "Tales of the Blessed Isles"
 makaron_nisoi_advance_desc:0 "The Makaron Nesoi, the Blessed Isles, are believed to be the ultimate destination of the most virtuous souls. Those who live lives of piety and excellence may earn their place among heroic spirits in the Elysian fields. Tales of these sacred realms inspire the pursuit of virtue, honor, and moral excellence throughout society."
 malay_merchants_in_every_port:0 "Malay Merchants in Every Port"
 malay_merchants_in_every_port_desc:0 "From the bazaars of $arabia_region$ to the harbors of $east_asia$, our merchants are a familiar sight. Their presence forms a vast network of cooperation, easing the establishment of our enclaves abroad and extending our reach into every great entrepôt of the world."
 malian_military_tactics:0 "$MAL_ADJ$ Military Tactics"
 malian_military_tactics_desc:0 "During our time as subjects of $MAL$, our people learned much from their military command and combat tactics. This knowledge shall help our own infantry in battles to come."
 mamluk_halqah:0 "$a_halqah_unit$"
 mamluk_halqah_desc:0 "$a_halqah_unit_desc$"
 mamluk_soldiers:0 "$a_mamluk_unit_traditions$"
 mamluk_soldiers_desc:0 "$a_mamluk_unit_traditions_desc$"
 manchu_reborn:0 "Manchu Reborn"
 manchu_reborn_desc:0 "As our nation has undergone fundamental transformations, so will our army. The world has opened itself to us, and new challenges will appear on the horizon. If we want to survive in this new paradigm, we have to be ready to act."
 manchu_script:0 "Manchu Script"
 manchu_script_desc:0 "The Manchu alphabet has emerged, combining Classical $mongolian_language$ characters with Jurchen phonetics. This unique writing system facilitates left-to-right vertical column writing. With diverse letter forms and contextual adaptability for initial, medial, final, and isolated positions, it preserves the most subtle nuances of our language."
 mandate_of_the_khan:0 "Mandate of the $rank_kingdom_horde_ruler_suffix_male$"
 mandate_of_the_khan_desc:0 "As the $rank_kingdom_horde_ruler_suffix_male$ commands, gods do. The unity of our people comes from their loyalty to our great leader. Only someone capable of bending the will of those loyal to the ruler is worthy of our devotion."
 mandinka_warrior_spirit:0 "Mandinka Warrior Spirit"
 mandinka_warrior_spirit_desc:0 "Whether pagan or $muslim_ADJ$, Mandinka men have been the greatest fighters the $sahel_region$ has ever seen. The courage of our troops is admirable, as is their pride. When the Mansa raises an army, not only is it the largest in all the $sahel_region$, it is the best!"
 manufactories_advance:0 "Manufactories"
 manufactories_advance_desc:0 "Recent technological advances in mechanization have facilitated the rise of concentrated production facilities in the form of manufactories. These businesses have helped us greatly improve the rate and quality of production."
 manufacturing_center:0 "Imperial Manufacturing Center"
 manufacturing_center_desc:0 "Our citizens are the power base of our overlord's trade empire. Foreign goods are delivered to us, which we then mold into finished products."
 maori_ceremonial_haka_advance:0 "Ceremonial Haka"
 maori_ceremonial_haka_advance_desc:0 "The ground shakes as our warriors perform the #italic Haka#!, their fierce cries and synchronized movements echoing across the battlefield. This intimidating ceremonial war dance emboldens the heart of every warrior, granting a significant morale boost to land forces."
 maori_he_whakaputanga_advance:0 "He Whakaputanga"
 maori_he_whakaputanga_advance_desc:0 "The so-called 'Declaration of the Independence of New Zealand' is a document that once and for all establishes a unified $maori_culture$ state that is independent. With the wording fully understood by all sides, our chieftains may finally unite, and be free from foreign interference."
 maori_rua_kumara_advance:0 "Rua Kūmara"
 maori_rua_kumara_advance_desc:0 "By perfecting the art of growing and storing #italic kūmara#! tubers in specially-constructed #italic rua#!, or storage pits, we can ensure that our bellies are filled even in the harshest of winters."
 maori_ta_moko_advance:0 "Tā Moko"
 maori_ta_moko_advance_desc:0 "With the intricate curves and spirals of #italic Tā Moko#!, we ritualistically etch pigment into our very skin, transforming our bodies into living tapestries of honor and history."
 maori_te_reo_advance:0 "Te Reo"
 maori_te_reo_advance_desc:0 "We know that by preserving and nurturing #italic Te Reo#!, our sacred language, we maintain a vibrant connection to our culture and traditions."
 maori_whakapapa_advance:0 "Whakapapa"
 maori_whakapapa_advance_desc:0 "Strength and unity come from knowing one's #italic Whakapapa#!, the intricate web of genealogical connections that binds an #italic iwi#! together. This deep understanding of collective ancestry fosters a united front against all adversities."
 maple_syrup:0 "Maple Syrup"
 maple_syrup_desc:0 "The many maple trees in our country produce great quantities of sap, which can be collected and boiled to create a delicious sweet syrup and other confections."
 mapmaking:0 "mapmaking"
 mapmaking_desc:0 "Accurately drawing the borders and landmarks of a country is much more than art — it helps us collect information about other nations for strategic purposes. By knowing where important places are exactly, we can not only better coordinate attacks, but also gain more knowledge about our own territory. As the elders often say, knowledge is power."
 march_to_the_sound_of_the_guns_advance:0 "$march_to_sound_of_guns$"
 march_to_the_sound_of_the_guns_advance_desc:0 "With the steady growth of our army, our logistical needs have changed. Our generals will adopt 'march to the sound of guns' doctrine — ordering dispersed forces to move toward battle independently when they hear fighting. This enables rapid reinforcement without having to await orders."
 marcher_lords:0 "Marcher Lords"
 marcher_lords_desc:0 "By granting considerable autonomy to vassals in border regions, these 'Marcher Lords' will be able to raise large military armies to support us in our wars."
 margrave_council:0 "Geheimer Rat für die Kurmark"
 margrave_council_desc:0 "The authority of the Margrave is greatly threatened by the ever-increasing power of our Estates. The Estates are of great benefit to our nation, but the threat they represent to our base of power necessitates the creation of a new council, one which reduces the very real power that the estates hold over our nation into more of an advisory position for the Margrave. This way, we may continue to enjoy the benefits of our Estates while having fewer concerns about their needs."
 marine_regiments:0 "Marine Regiments"
 marine_regiments_desc:0 "Marines are military units that specialize in amphibious operations. They can be used in raiding shores and boarding enemy vessels, while still seeing action on land."
 maritime_advance_age_2:0 "Trade Fleets"
 maritime_advance_age_2_desc:0 "As commerce grows, so does the need to more quickly and efficiently transport greater quantities of goods. As such, those invested in maritime trade will spare no expense in building the bigger fleets they can afford."
 maritime_advance_age_3:0 "Exploration Fleets"
 maritime_advance_age_3_desc:0 "As our knowledge of the world grows, so does the need to learn even more about it. From the far seas to the east to the new coasts in the west, the length at which we must sail has increased, and thus so has the need for a bigger fleet."
 maritime_advance_age_4:0 "Global Fleets"
 maritime_advance_age_4_desc:0 "Given the advances of the last century, it seems like the world has become smaller rather than bigger. Countries that had no contact until now are instead engaging in constant diplomatic and commercial relations. As a result, bigger and better fleets are needed to be able to maintain all those overseas connections."
 maritime_advance_age_5:0 "Convoys"
 maritime_advance_age_5_desc:0 "As maritime trade expands, with our ships ferrying goods back and forth in greater quantities and to more distant shores than ever before, the need to maintain a consistent flow of commerce also increases. Organizing convoy trade fleets will allow a more stable circulation of trade ships."
 maritime_advance_age_6:0 "Armed Convoys"
 maritime_advance_age_6_desc:0 "Trade convoys are obviously a very juicy target for any pirate. Ships full to the brim with goods and coins are a booty that few will let pass through. Thus, providing those trade convoys with defense armament to deter those attacks is vital. Having the trade fleets be accompanied by frigates or any other armed vessel ensures their safety."
 maritime_decay_advance_disc:0 "Established Routes"
 maritime_decay_advance_disc_desc:0 "The seas are constantly crossed by eager merchants searching for the best profit. This naturally evolves into certain routes becoming more established and frequented than others, with the most popular ones seeing a steady steam of ships sailing back and forth."
 markets_for_salt:0 "Markets for $salt$"
 markets_for_salt_desc:0 "In our kingdom, $salt$ is worth its cost in gold. But south of us, in the great forests of the Ashanti and the Yoruba, salt is worth considerably #italic more#! than gold. Luckily for us, we have our own supply of $salt$, and enough gold to obtain as much as we could ever want. Perhaps we could find yet more markets of people for whom $salt$ is more valuable than gold?"
 marmorina:0 "marmorina"
 marmorina_desc:0 "In these times of peace, $VER$ has flourished under rulers who value beauty as much as power. The city shall earn the name 'Marmorina' for its abundance of Roman marble, statues, and graceful architecture. A new bridge over the Adige, the Ponte Navi, stands as a feat of engineering, while the Gardello tower — the first water-driven clock in $ITA$ — marked the hours in quiet ascendancy. This legacy of refinement will undoubtedly shape not only our skyline, but how we shall be remembered in the annals of history."
 martyrs:0 "martyrs"
 martyrs_desc:0 "A martyr is someone who understands that dying on behalf of their faith is the highest of honors. The people of our land keep their faith close to their hearts, and are always keen to join our cause. If they die as martyrs, it is an honor and not a tragedy."
 mass_army:0 "Mass Army"
 mass_army_desc:0 "We have, up to now, been very selective about who can serve as an enlisted member of our military. We only took the poorest and most desperate — basically, the people no one else would miss. Now, though, we shall open up the ranks to everyone who wishes to serve and has no significant wealth to speak of."
 massed_battery:0 "Massed Battery"
 massed_battery_desc:0 "Let us mass our artillery in a single grand battery. Its destructive power will blast a hole in the enemy lines!"
 masters_of_spice:0 "Masters of Spice"
 masters_of_spice_desc:0 "Trading in cloves holds much wealth for us and our people. By securing the lands and seas from which these spices flow, we stand at the center of a trade that spans the world, and no merchant can ignore the allure of these goods."
 masters_of_the_nile:0 "Masters of the Nile"
 masters_of_the_nile_desc:0 "The heart-vein of our Sultanate is the river Nile. Traversing our nation, its touch creates our most fertile lands, and its life-bringing waters of the river channel prosperity and ample wealth throughout our domain."
 matchlock_gun:0 "Early Hunting Guns"
 matchlock_gun_desc:0 "Improvements to the weapons produced by our gunsmiths will also provide our hunters with better tools to bring home ample furs and wild game."
 matsuri:0 "matsuri"
 matsuri_desc:0 "Every local shrine and temple has its own festivals and celebrations. The people are always eager to participate, for it is their chance to offer devotion and gratitude towards their local protector #italic Kami#!."
 maurician_infantry:0 "Maurician Infantry"
 maurician_infantry_desc:0 "The size and depth of the $spanish_square$ gave it staying power, but made it slow and cumbersome to maneuver on the battlefield. It also led to a large percentage of troops being inactive during battles. Maurice of Nassau, the Stadtholder of the $NED$, reduced the total number of men in the formation to make it more mobile and reduced its depth, so it maintained the same firepower and shock value."
 measuring_the_world:0 "Measuring the World"
 measuring_the_world_desc:0 "The new sciences have given us a number of different ways to describe and measure the world around us. However, we cannot know all of the resources that could be at our disposal until we have thoroughly searched all our lands for minerals, counted every last subject, and assessed every last enterprise. Let us command out scholarly experts to conduct a thorough survey — first of our nation, then of the entire world!"
 medical_school_advance:0 "Medical Schools"
 medical_school_advance_desc:0 "Specialized sites for medical training, these schools are where scholars go to learn about the human body, diseases, and how to treat and prevent them."
 medici_porcelain:0 "Medici $porcelain$"
 medici_porcelain_desc:0 "Many attempts have been made during the last few decades to replicate the properties of true $porcelain$, an exotic good from the Far East. With the help of experienced alchemists and thorough scientific knowledge, we will surely be able to produce $porcelain$ of great quality."
 medicinal_infusions:0 "Medicinal Infusions"
 medicinal_infusions_desc:0 "The healing properties of certain plants have helped our people overcome different diseases for centuries. Infusions of certain leaves have even been said to lengthen the lives of our people."
 medieval_administration:0 "Medieval Administration"
 medieval_administration_desc:0 "With a military elite in place to govern our society, the next stage of development is to build a literate class of administrators. Typically, these roles will be filled by drawing from the clergy."
 medieval_military:0 "Medieval Military"
 medieval_military_desc:0 "Over the past centuries, land armies have become more professional and well-organized. Better systems are in place to support the mix of levies and professional soldiers that now dominate the battlefields, and the infantry is slowly but steadily gaining power, poised to overtake that of the cavalry arm."
 mehmed_beys_firman:0 "Meḥmed Bey's Firman"
 mehmed_beys_firman_desc:0 "Meḥmed I issued a decree demanding that only Turkish be spoken in courts, dervish lodges, assemblies, and public squares. This act rejected $persian_language$ and $arabic_language$ dominance in elite circles and laid the groundwork for a uniquely $turkmen_culture$ cultural policy."
 meissen_lion:0 "The Meißen Lion"
 meissen_lion_desc:0 "The Meißen Lion, also known as the #italic Markmeißnische Löwe#!, holds a special place in heraldry. Representing the $wettin_dynasty$ dynasty's symbol of power, an armored black lion with a red tongue gazes to the left on a golden field. Its image appears in various forms, including on painted tombstones, ensigns, helmets, coins, and seals, symbolizing the affiliation of the city of $meissen$ to the #italic Mark Meißen#! and adorning the coats of arms of numerous towns and communities. Some link it to the recolored Thuringian lion."
 meissner_groschen:0 "Meißner Groschen"
 meissner_groschen_desc:0 "The #italic Meißner groschen#! will serve as our national currency. This coin is based on the #italic Prague groschen#!, which we will replace. This new large groschen will mark the beginning of a new era in the history of our coinage and will let us better control its influxes."
 meissner_porcelain:0 "Meissner $porcelain$"
 meissner_porcelain_desc:0 "$SAX$ is the first country in $europe$ to produce $porcelain$, which will bring wealth and prestige to the $wettin_dynasty$ court."
 melaka_tree:0 "The Melaka Tree"
 melaka_tree_desc:0 "As legend goes, the timid mouse deer sought refuge in what would later become our domain. Our beggining is humble, as little more than a fishing village clustered beneath the shade of the Melaka tree. From these roots shall grow a people that will one day shape the entire region."
 men_of_letters_advance:0 "Men of Letters"
 men_of_letters_advance_desc:0 "It is no secret that other nations envy our literary accomplishments and enlightened past. They seek to hire tutors from our court, eager to sink their claws into the knowledge that gave rise to powerful empires and carved the cultural landscape of the entire continent. It is through these men of letters that our neighbors will come to fall in love with our history and become educated in our ways."
 mendicant_orders:0 "Mendicant Orders"
 mendicant_orders_desc:0 "The orders of our faith, who have taken vows of poverty and live itinerant lives, have brought assistance to many remote parts of our country. We should support their efforts as much as we can without disrupting their holy missions."
 mercantile_spirit:0 "Mercantile Spirit"
 mercantile_spirit_desc:0 "$NAP$, inspired by the influential maritime republic of Amalfi, boasts a vibrant culture of trade. Strategic ports, including the city of $naples$ itself, served as vital hubs, connecting the kingdom to distant lands and fostering economic prosperity through commercial exchanges and the flourishing exchange of goods and ideas."
 mercenaries_reformation_advance:0 "Ensure Mercenary Payments"
 mercenaries_reformation_advance_desc:0 "It is well understood that mercenaries do not work for free. By promising fair compensation and a share of the plunder, we can assure their loyalty more easily, and ensure the most skilled companies will be willing to work for us"
 merchant_adventures:0 "Merchant Adventures"
 merchant_adventures_desc:0 "This allows us to make use of the numerous traders lusting for fame and fortune, eager to offer their services for a chance to search and explore new trade routes."
 merchant_marine:0 "Merchant Marine"
 merchant_marine_desc:0 "Let every merchant ship fly our emblem with pride and know that our navy will always be there to protect them, if needed."
 merchant_officials:0 "Merchant-Officials"
 merchant_officials_desc:0 "Merchants and their trading contribute substantially to our national income. However, merchants are also excellent sources of information, as they are often in the position to observe first-hand what circumstances our neighbors are in. By giving them official roles in the government, we can exploit their knowledge and mobility to our own ends."
 merchant_power_from_maritime_absolutism_advance:0 "Chamber of Commerce"
 merchant_power_from_maritime_absolutism_advance_desc:0 "With the emergence of new ideas about commerce and economics, the local businesses have joined together to form a business network that can further their interests and protect their rights against political entities and foreign influences."
 merchant_power_from_maritime_discovery_advance:0 "Merchant Guilds"
 merchant_power_from_maritime_discovery_advance_desc:0 "The confraternities of merchants allow our traders to organize, share profitable trade route information, and join forces when buying and selling in foreign markets."
 merchant_power_from_maritime_reformation_advance:0 "Merchant Companies"
 merchant_power_from_maritime_reformation_advance_desc:0 "The expansion of markets overseas — and the associated expenses and risks — require the creation of merchant associations that share the burden of trading in these new lands."
 merchant_power_from_maritime_renaissance_advance:0 "Merchant Partnerships"
 merchant_power_from_maritime_renaissance_advance_desc:0 "The rising prominence of long-distance trade has led merchants to innovate new ways of making the most of their activities through partnerships. The most common kind is having one partner invest a sum of money in the trading expedition, while the other does the traveling and procurement of goods to be sold after their return."
 merchant_power_from_maritime_rev_dip_choice:0 "Merchant Fleets"
 merchant_power_from_maritime_rev_dip_choice_desc:0 "Merchant ships have become a common sight in our waters. Our traders have so many vessels going back and forth that they have effectively formed their own fleet."
 merchant_power_from_maritime_revolutions_advance:0 "Limited Companies"
 merchant_power_from_maritime_revolutions_advance_desc:0 "The frequent failures of chartered companies have led to the development of a new business model: limited companies, where shareholder liability is limited to their initial investment. This protection from unlimited debt makes such partnerships far less risky and more attractive to potential investors."
 merchant_princes:0 "Merchant Princes"
 merchant_princes_desc:0 "The great coastal cities of $ITA$ have long benefited from great trade networks bringing wealth and power to their shores. Our country may not be on the coast, but it does not mean that $MLO$ cannot get its own share of the maritime trade. Let it be known that any wealthy trades who go forth and bring back the riches of the world will be looked upon with favor at the court of $MLO$."
 merchant_traditions:0 "Merchant Traditions"
 merchant_traditions_desc:0 "A steady flow of trade and commerce is a sure sign of a healthy economy. With our merchants focusing on keeping the trade flowing, we can establish a tradition of and reputation for lively commerce, making it easier to attract foreign trade to our nation."
 merchants_and_trade:0 "Merchants and Trade"
 merchants_and_trade_desc:0 "The patterns of trade had been seriously disrupted, possibly due to plagues and pandemics. Now trade is slowly beginning to recover."
 merchants_quarters_advance:0 "Merchant Quarters"
 merchants_quarters_advance_desc:0 "$merchants_quarters_desc$"
 meritocracy_advance:0 "Meritocracy"
 meritocracy_advance_desc:0 "Merit is not exclusive to the upper echelons of our society. It can be found everywhere, even among the humblest individuals. By creating standardized exams that measure this merit, effort, and overall competency, we can find intellectual jewels hidden in plain sight, and properly appoint them for the betterment of our nation."
 metallurgy:0 "metallurgy"
 metallurgy_desc:0 "Metallurgy, the art of manipulating and working metal, stands as one of the defining capabilities of advanced civilization. Metal tools and weapons are far superior than their stone counterparts, enabling both workers and soldiers to operate with better efficiency."
 mge_all_under_a_khan:0 "All Under a $rank_kingdom_horde_ruler_suffix_male$"
 mge_all_under_a_khan_desc:0 "$genghis_khan_name_no_tooltip$ unified great swathes of territory under his banner. Having unified those territories again under the authority of a single $rank_kingdom_horde_ruler_suffix_male$, all people in our empire shall swear allegiance to us."
 mge_ghostly_horses_of_the_plain:0 "Ghostly Horses of the Plain"
 mge_ghostly_horses_of_the_plain_desc:0 "The prowess of $mongolian_culture$ horsemen is renowned across the entire world. Our enemies shake in terror at the sight of a dust cloud in the distance, fearing that it might signify our cavalry's approach!"
 mge_glory_of_the_khan:0 "Glory of the $rank_kingdom_horde_ruler_suffix_male$"
 mge_glory_of_the_khan_desc:0 "The extraordinary $genghis_khan_name_no_tooltip$ amassed a huge army like never before seen. We are heirs to his glory, and therefore our army will outstrip even the greatest $MGE_ADJ$ hordes of the past."
 mge_improved_yam_system:0 "Improved Yam System"
 mge_improved_yam_system_desc:0 "The system of #italic yam#! posts all over our empire have facilitated communication and logistics since the times of the great $genghis_khan_name_no_tooltip$. After re-establishing and improving this system, our messengers can cross the massive expanse of our empire at speeds that were not even thought possible before."
 mge_kheshig:0 "The Kheshig"
 mge_kheshig_desc:0 "The #italic Kheshig#! once formed the formidable bodyguard of the Great $MGE_ADJ$ $rank_kingdom_horde_ruler_suffix_male$. Their descendants will continue to protect the $rank_kingdom_horde_ruler_suffix_male$ of $MGE$ as they ride into battle."
 mge_life_of_steppe_warrior:0 "The Life of a Steppe Warrior"
 mge_life_of_steppe_warrior_desc:0 "The steppe is a foreboding and unforgiving place for the unprepared. We are accustomed to living in this harsh environment, and as such our people are sturdy and have a knack for survival. We will ensure that all of our soldiers share these skills, and are thus able to more easily survive extreme situations."
 mge_mongolian_mobility:0 "Mongolian Mobility"
 mge_mongolian_mobility_desc:0 "Each of our soldiers typically maintains three or four horses, allowing them to change each time their mount becomes tired, and thereby travel at high speed for days without stopping. Furthermore, their extra mounts provide them with food reserves through mare's milk as well as horse meat, making our armies far less vulnerable to starvation than other, so-called civilized nations' armies. This allows us to outmaneuver our enemies with ease, covering a staggering amount of territory in shorter periods than they had believed to be possible."
 mge_multicultural_empire:0 "Multicultural Empire"
 mge_multicultural_empire_desc:0 "The territories of the great $MGE_ADJ$ Empire are home to many different peoples, all unified under the glory of the mighty $rank_kingdom_horde_ruler_suffix_male$."
 mge_pax_mongolica:0 "Pax Mongolica"
 mge_pax_mongolica_desc:0 "Having unified all $mongolian_culture$ territories under our banner, the stability and prosperity our people will be able to enjoy has not been seen since the times of the great $genghis_khan_name_no_tooltip$."
 mge_yeke_mongol_ulus:0 "Yeke Mongol Ulus"
 mge_yeke_mongol_ulus_desc:0 "As the original Mongols, we restored the #italic Yeke Mongol Ulus#!, the Great Mongolian State, resurrecting the glory of $genghis_khan_name_no_tooltip$'s great empire. Given the slightest chance, our people will emulate the exploits of the Great $rank_kingdom_horde_ruler_suffix_male$ and reclaim his legacy, reuniting the once-vast territories of the $MGE_ADJ$ Khanate."
 mhr_ashta_pradhan_advance:0 "$mhr_ashta_pradhan$"
 mhr_ashta_pradhan_advance_desc:0 "$mhr_ashta_pradhan_desc$"
 mhr_encourage_brahmin_ties:0 "Encourage Brāhmaṇa Ties"
 mhr_encourage_brahmin_ties_desc:0 "Our financial sector is dominated by Brāhmaṇa banking families. Let us integrate them further in our administration by hiring them as tax collectors, and creating regulations to strengthen their rights and protect their traditions. We will have gained the favor of our financiers as well as access to learned and able administrators."
 mhr_forts_of_maharashtra:0 "Forts of Maharashtra"
 mhr_forts_of_maharashtra_desc:0 "In these hilly and densely forested lands, maintaining a series of forts is an offensive necessity as well as a defensive one. Meticulous maintenance of our fortifications should therefore be a top priority."
 mhr_office_of_the_peshwa:0 "Office of the Peshwa"
 mhr_office_of_the_peshwa_desc:0 "The #italic Peshwa#! Shall be our chief minister, entirely devoted to both civil administration and overseeing military operations. This consolidation of power will make us versatile enough to expand quickly and efficiently."
 mhr_peasant_soldiers:0 "Peasant Soldiers"
 mhr_peasant_soldiers_desc:0 "The villages of the Desh are full of able men who would be more than willing to serve in our armies. Let us recruit the $marathi_language$-speaking members of our population into our military."
 mhr_tradition_of_military_service:0 "Tradition of Military Service"
 mhr_tradition_of_military_service_desc:0 "$marathi_culture$ cavalrymen have a long tradition of service as 'Bargirs' for the Deccan sultanates. The increased militarization of the Deccan due to the many wars fought in the area has made our cavalry one of the most dangerous forces in $india$."
 middle_way:0 "Middle Way"
 middle_way_desc:0 "The Buddha teaches us that we should avoid extremes, as neither with sensual indulgence nor extreme asceticism can one achieve enlightenment."
 migrant_opportunities:0 "Migrant Opportunities"
 migrant_opportunities_desc:0 "Mercantile opportunities and the promise of a better life are some of the reasons as to why our towns and settlements tend to receive constant waves of immigration. Many men and women relocate to our lands seeking their fortune, and their presence and contributions increase our fortune in turn."
 milanese_ambition:0 "A New $lombard$ Kingdom"
 milanese_ambition_desc:0 "The glory of the previous $lombard$ Kingdom pales in comparison to what the people of $MLO$ have managed to achieve, and what they are still entitled to receive. All shall bow before us!"
 milanese_heritage:0 "Condottieri Tradition"
 milanese_heritage_desc:0 "The people of $MLO$ are used to fighting as mercenaries in the constant squabbles all around the region, earning a reputation for being very capable soldiers."
 milanese_tradition:0 "$lombard$ Heritage"
 milanese_tradition_desc:0 "The glory and influence of the $lombard$ Kingdom is still felt to this day. As their clear spiritual heirs, the nobles of $MLO$ enjoy a higher degree of authority and respect than their peers."
 military_administration:0 "Military Administration"
 military_administration_desc:0 "The ever-increasing armies of the 16th century have imposed equally heightened demands on national administrations. By creating a permanent organization charged with military supply strategy and operation, and by keeping more troops on the rolls even during winter or peacetime, we will ultimately be able to field large armies more cheaply and to support those armies more efficiently."
 military_border:0 "Military Frontier"
 military_border_desc:0 "Defending our frontiers is a serious issue, and puts significant financial pressure on the state. The solution we have hit upon is to make generous grants of frontier lands in order to build up a professional military class. This will ensure more discipline overall and facilitate migration to the underpopulated regions of our realm."
 military_drill:0 "Military Drill"
 military_drill_desc:0 "Allows us to invest in military training and thereby improve battle formations, weapon handling, and our army's morale."
 military_mita:0 "Military Mit'a"
 military_mita_desc:0 "The #italic mit'a#! is a mandatory public service system fundamental to Incan society, and forms the backbone of the military service. Every #italic ayllu#! must contribute capable men, adapted to combat in the highlands, to provide labor for state projects and military service."
 military_modernization:0 "Military Modernization"
 military_modernization_desc:0 "Our people remember the birth of our nation: surrounded by formidable powers that pose permanent, looming threats to our security. This enduring vigilance has forged a culture of unwavering readiness, ensuring our armed forces stand as a shield against adversity. Fearless and respected, our soldiers have transformed us from potential prey to a mighty adversary, deterring any who dare encroach upon our sovereignty."
 military_revolution_advance:0 "Military Revolution"
 military_revolution_advance_desc:0 "War never changes, but the manner of waging it does. Recent arms developments have proved that the old ways of fighting are obsolete, and armies have experienced a full paradigm shift. Adapting to those changes is the only way to continue being a strong military power."
 military_tactics_advance_6:0 "Field Artillery"
 military_tactics_advance_6_desc:0 "With artillery being mobile enough to accompany the rest of the army on the battlefield, its influence is no longer limited to whatever is in firing range. Semi-autonomous artillery formations led by artillery officers can instead be deployed where they are most needed."
 military_traditions:0 "Military Traditions"
 military_traditions_desc:0 "The nature of war is constantly evolving, and we must ensure that perceptions of our military evolve with it. By encouraging a tradition of service amongst our nobility, we shall entrench the idea that high social status is earned through glory on the battlefield. While bravery and combat skill remain important, true military excellence now lies in professional expertise rather than nebulous things like personal valor."
 militiamen_advance:0 "$a_militiamen$"
 militiamen_advance_desc:0 "$a_militiamen_desc$"
 millets:0 "Kanunnames"
 millets_desc:0 "By establishing unique codes of law in each of our empire's provinces, we can ensure that our rule will be viewed as equitable and just. These law books, known as #italic Kanunname#!, will take into consideration the local circumstances and traditions of each of our diverse and far-flung provinces."
 mimic_the_phoenix:0 "Mimicking the Phoenix"
 mimic_the_phoenix_desc:0 "We eagerly embrace the ways of $BYZ$, aiming to mirror their laws and overall style. Drawing from the rich tapestry of Roman influences, we strive to infuse our governance and legal system with their essence, in a conscious effort to emulate the grace and sophistication of $BYZ$ within our realm."
 mindfulness:0 "mindfulness"
 mindfulness_desc:0 "An essential part of $buddhist_ADJ$ practice, $mindfulness$ means to be aware of the phenomena of both body and mind, while keeping the teachings of the Buddha always present in the mind. With this, one can avoid the arising of unwanted states, and develop into the wanted ones."
 mining_advance:0 "Quarrying"
 mining_advance_desc:0 "Quarrying has been a basic economic activity since the dawn of humanity. The widespread use of metalworking only increased the importance of prospecting and mining different types of minerals and metals for the development of complex societies."
 mining_law_advance:0 "$mining_law$"
 mining_law_advance_desc:0 "$mining_law_desc$"
 mining_tradition:0 "Mining Tradition"
 mining_tradition_desc:0 "Our land is rich in rare materials, ready to be ripped from the earth and sold to foreign merchants for large profits. We would be foolish not to exploit this."
 mint_advance:0 "$minting_office$"
 mint_advance_desc:0 "$minting_office_desc$"
 mint_of_the_gulf:0 "Mint of the Gulf"
 mint_of_the_gulf_desc:0 "Ormuzi coinage circulates from $basra_al_hamra$ to $bengal_area$, trusted for its purity and weight. By institutionalizing our mint and expanding our issuance, we reinforce our financial sovereignty — and claim fiscal supremacy over the $indian_ocean_region$."
 minting_income_factor_building:0 "Currency Ownership"
 minting_income_factor_building_desc:0 "There are many types of currency in circulation, but the one that bears our seal is the most widely accepted as trustworthy."
 minting_trade_range_disc_building:0 "Expanded Trade Depots"
 minting_trade_range_disc_building_desc:0 "The growing demands of international trade will need to be accounted for in the planning of our trading endeavors. With this expansion of our trade depots, we can reach new shores without risking our valuable cargo."
 minting_trade_range_trad_building:0 "Planned Trade Expeditions"
 minting_trade_range_trad_building_desc:0 "Trade with foreign countries is the lifeblood of our nation. By meticulously planning out the trading routes and stockpiling supplies for each voyage, we can reach markets further from our bases."
 missionary_schools:0 "Missionary Schools"
 missionary_schools_desc:0 "Although there is no shortage of people willing to spread the word of the true faith, most of them ultimately do more harm than good. However, establishing specialist schools to properly train missionaries will ensure we have more people who cannot only spread the faith, but do so successfully."
 mitma:0 "Mitma Obligations"
 mitma_desc:0 "In order to undertake great building projects in the past, our rulers had to fulfill ancient traditions by inviting every single petty chief in our empire to the capital, showering them with gifts, and holding lavish feasts. As our state grows, however, this is far from an ideal way to undertake these projects. Supplying labor and materials for construction should be the duty of each and every chief in our lands."
 modern_bureaucracy:0 "Modern Bureaucracy"
 modern_bureaucracy_desc:0 "In order to best utilize the lands and subjects we control, we must enlarge, reorganize, and professionalize our bureaucracy. We shall create organizations dedicated to administering specific aspects of the state, and thus eliminate the need for ad hoc solutions.\\n\\nLet us consult with our universities to determine how to most efficiently rule and govern. Meanwhile, we shall encourage our young nobles to serve the state with a pen rather than a sword in hand."
 modern_council_hall_advance:0 "$modern_council_hall$"
 modern_council_hall_advance_desc:0 "$modern_council_hall_desc$"
 modern_road_advance:0 "$modern_road$"
 modern_road_advance_desc:0 "$modern_road_desc$"
 modernization_of_the_military:0 "Modernization of the Military"
 modernization_of_the_military_desc:0 "Our state lives and dies by the capabilities of our army. Our military not only ensures our survival, but is also what has set us on the path to greatness. We cannot allow ourselves to fall behind in progress!"
 modernized_royal_scots_navy:0 "Royal Scots Navy"
 modernized_royal_scots_navy_desc:0 "Since the Wars of Independence, we have been looking at reinforcing and updating our navy. Previously, we had used feudal obligations to bulk out our fleets with crew and ships, but we will now create a modern fleet, owned by the King and based in our port of Newhaven."
 moe_plethons_vision_advance:0 "Plethon's Vision"
 moe_plethons_vision_advance_desc:0 "The arrival of the philosopher Georgios Gemistus Plethon at the court of Mystras has signaled a radical shift in the Morean identity, as he has proposed a return to the laws and social structures of ancient Sparta. Plethon advocates for a national army of native Greeks rather than unreliable mercenaries, and a social order based on Hellenic heritage rather than just Christian confession. This proto-nationalist awakening will provide the Despotate with a powerful ideological weapon, transforming the defense of the Morea into a crusade for the survival of the Greek nation itself, which will bolster the prestige of our ruling house even if we stick to Christianity."
 moe_reclaiming_the_peloponnese_advance:0 "Reclaiming the Peloponnese"
 moe_reclaiming_the_peloponnese_advance_desc:0 "Following the Byzantine recovery of the forts of Monemvasia, Maina, and Mystras, the Despotate of the Morea has dedicated itself to a long 'reconquista' of the peninsula from the Frankish Principalities. This campaign is not merely one of siegecraft, but of cultural subversion, as the Greek administration encourages the local population to rise against their Latin lords in favor of the 'rightful ruler'. Through a combination of strategic marriages, persistent skirmishing, and the gradual absorption of feudal fiefs, the Morea slowly knits together a fractured land into a cohesive province."
 moe_the_constitution_of_morea_advance:0 "The Constitution of Morea"
 moe_the_constitution_of_morea_advance_desc:0 "As the wave of Enlightenment sweeps across the Mediterranean, the despots of the Morea have taken the radical step of formalizing the relationship between the throne and the people through a written charter. This document, heavily influenced by the social theories of the Mystras Academy, dismantles the last vestiges of Byzantine courtly favoritism in favor of a meritocratic civil service and protects property rights for the burgeoning merchant class. By granting the citizenry a stake in the governance of the state, the Despotate fosters an intense national loyalty that makes the population far more resistant to foreign subversion. This political modernization will transform the Morea from a traditional autocracy into a sophisticated 'National Monarchy', capable of mobilizing the full psychological and financial resources of its people for the glory of the state."
 moe_the_court_of_mystras_advance:0 "The Court of Mystras"
 moe_the_court_of_mystras_advance_desc:0 "Like Constantinople, the hill-city of Mystras ascends as the premier center of Hellenic culture, attracting the Empire's greatest scholars, artists, and theologians to its sun-drenched slopes. The Despots of the Kantakouzenos and Palaiologos houses foster a vibrant intellectual atmosphere where the study of Classical Greek philosophy is merged with Orthodox mysticism. This #italic Mystras Renaissance#! ensures that the Despotate is no longer a mere provincial outpost, but a prestigious capital in its own right, possessing a gravitational pull that draws diplomats and thinkers from across the Mediterranean."
 moe_the_hexamilion_modernization_advance:0 "The Hexamilion Modernization"
 moe_the_hexamilion_modernization_advance_desc:0 "Recognizing that the Isthmus of Corinth is the gateway to the peninsula, the Morean state will invest heavily in the reconstruction and modernization of the Hexamilion wall. Utilizing new developments in gunpowder fortification, the ancient barrier will be transformed into a sophisticated line of bastions, redoubts, and artillery batteries designed to withstand a modern imperial siege and, then, replicated across our nation. This 'Great Wall of Greece' will serve as the cornerstone of a defensive strategy that will allow the Despotate to project power safely behind an impenetrable line, forcing any invader to commit to a long and costly naval blockade."
 moe_the_silk_road_of_morea_advance:0 "The Silk Road of Morea"
 moe_the_silk_road_of_morea_advance_desc:0 "The Peloponnesian silk industry, long a staple of the local economy, has underwent a massive state-led expansion during the 17th century to fund the Despotate's growing military ambitions. By inviting Venetian master-weavers and Genoese dyers to settle in the capital of Mystras, the Despots have broken the foreign monopoly on luxury textile processing, ensuring that the entire value chain — from mulberry cultivation to finished brocade — remained within Greek borders. This economic protectionism will turn the Morea into a vital 'Silk Hub' that will link the luxury demands of the European Enlightenment with the raw materials of the East. The resulting surge in custom duties and trade tolls will provide the treasury with the gold necessary to maintain a modern bureaucracy and a standing army without overtaxing the peasantry."
 mohe_ancestry:0 "Mohe Ancestry"
 mohe_ancestry_desc:0 "Our people descend from the Mohe tribes of the Amur forests. Their traditions of hunting, herding, and hardy frontier life shape our society."
 mol_the_banner_of_the_golden_bull:0 "The Banner of the Golden Bull"
 mol_the_banner_of_the_golden_bull_desc:0 "Under the banner of the Golden Bull, representing our nation, Moldavia will become the 'Bulwark of the East', successfully defending against enemy incursions. We will start a tradition of building a monastery for every military victory that will create a landscape of religious sites. This fusion of religious zeal and military discipline ensures our soldiers fight with the conviction of crusaders."
 mol_the_chronicles_of_grigore_ureche:0 "The Chronicles of Grigore Ureche"
 mol_the_chronicles_of_grigore_ureche_desc:0 "A transformative era of intellectual self-awareness has dawned! Our high boyars have begun to systematically document the history of our people in our native Romanian for the first time. By scientifically documenting the Latin origins and linguistic heritage we share with our Romanian brothers, we shift the state's foundation from a purely religious identity to a modern linguistic and historical one. This cultural awakening strengthens the internal legitimacy of the Prince and provides our diplomats with the historical arguments needed to assert our sovereignty among the European courts. History has become a weapon of the state."
 mol_the_cotnari_and_odobesti_wines:0 "The Cotnari & Odobești Wines"
 mol_the_cotnari_and_odobesti_wines_desc:0 "Vineyards have remained Moldavia's greatest treasure, with the sweet white wines of Cotnari rivaling Tokay in the courts of Europe. We have already codified the first wine classifications, establishing a state interest in the export of 'Perle de la Moldavie'; now it is time to pass to action. This luxury trade will provide the Princely court with significant hard currency from neighboring markets, funding the lavish palaces in our capital."
 mol_the_great_military_reforms:0 "The Great Military Reforms"
 mol_the_great_military_reforms_desc:0 "To counter the numbers of our enemies, we have reorganized our army into the #italic Oastea Mare#! (The Great Army). By granting land to the #italic Răzeși#! — free-holding peasants who owe service directly to the Voivode — we have created a loyal, self-equipped infantry core that fights with the ferocity of landowners defending their own soil. This system ensures that even when the boyars waver, the Prince has a reliable and massive pool of battle-hardened soldiers."
 mol_the_moldavian_road:0 "The Moldavian Road"
 mol_the_moldavian_road_desc:0 "By securing the 'Moldavian Road' connecting the Baltic Sea to the Black Sea, we have positioned our main settlements as vital hubs for the Northern European fur and wax trades. We have granted extensive privileges to Slavic merchants and German burghers to settle in our customs towns, ensuring that every caravan passing from the Baltic to the Genoese ports of the south pays a heavy toll into our treasury. This commercial wealth allows us to fund a professional court and to build stone fortifications without taxing our free peasantry into rebellion."
 mol_the_moldovan_enlightment:0 "The Moldovan Enlightenment"
 mol_the_moldovan_enlightment_desc:0 "Dimitrie Cantemir has ascended to become a polymath of European renown, bringing the radical principles of the early Enlightenment directly into our court. By mapping the intricate history, music, and geography of our region for a Western audience, we have gained a profound strategic advantage in the shifting sands of Eastern European politics. We have transitioned from a medieval frontier march into a scientifically managed state that looks increasingly toward the modernized reforms of the West for its political and military inspiration. Knowledge is the new currency of the Moldavian throne."
 monarchy_reform_traditions_advance:0 "Monarchy Reform Traditions"
 monarchy_reform_traditions_advance_desc:0 "Authority cannot be entrusted to just any individual. Concentrating power and influence in the hands of the ruler will help them create order and stability throughout the realm."
 monarchy_royal_court_advance:0 "$royal_court_customs_law$"
 monarchy_royal_court_advance_desc:0 "$royal_court_customs_law_desc$"
 monastery_productions:0 "Monastic Frugality"
 monastery_productions_desc:0 "The holy occupants of our monasteries are bastions of sensible, frugal living. Our clergy should consider adapting their own lifestyles to more closely resemble those of these monks and nuns."
 monastic_communities:0 "Monastic Communities"
 monastic_communities_desc:0 "$buddhist_ADJ$ life is centered around its communities of monks and nuns, called the #italic Saṃgha#!. They are governed by the #italic Vinaya#!, the rules and precepts that dictate the operations of any $buddhist_ADJ$ religious community."
 monastic_dominance:0 "Monastic Dominance"
 monastic_dominance_desc:0 "A fusion of spiritual and temporal rule defines our political landscape. From the smallest village to the halls of power in Sakya, monastic institutions are central to every sphere of life. Their moral authority and organizational prowess ensure loyalty, unity, and cultural resilience."
 monophysite_vs_miaphysite:0 "Monophysite vs $miaphysite_ADJ$"
 monophysite_vs_miaphysite_desc:0 "Although $miaphysite$ also proclaims that the figure of Christ has only a single nature, it differs substantially from the Eutychian Monophysite view which proclaims that the humanity of Christ was absorbed into his divinity. Though there may be some that also call us followers of Monophysitism, it is just an agreement in words, as in substance our views are clearly different."
 monuments_to_greatness:0 "Monuments of Greatness"
 monuments_to_greatness_desc:0 "In our people's many millennia of existence on this planet, they have endured thousands of catastrophes through sheer tenacity. This innate steely strength has come to be recognized as a defining feature of our society. We showcase our resilience in the strength of our army and the divine beauty of our art."
 moqarrariya:0 "Institutionalize the Moqarrariya"
 moqarrariya_desc:0 "For generations, our realm maintained peace with the mainland through the ancient tribute system known as #italic Moqarrariya#!. Rather than depending on custom and negotiation, let us codify these tributes into formal pacts — securing fresh water, overland safety, and long-term stability through reliable diplomacy."
 mor_marabouts:0 "Ṣūfī Marabouts"
 mor_marabouts_desc:0 "Several groups of Ṣūfī teachers have made Morocco their home. We must make sure that we accommodate these holy men, and take their teachings to heart."
 morale_recovery_rev_dip_choice:0 "Established Rest"
 morale_recovery_rev_dip_choice_desc:0 "No army can exist in a permanent state of action; all soldiers need time for rest and recovery. By establishing guidelines and procedures for them to rest, without permitting any laziness, we can keep our troops in prime condition."
 more_merchants_age_of_trad:0 "Merchant Guilds"
 more_merchants_age_of_trad_desc:0 "The formation of guilds has shaped our economy for a long time. While they are common organizations amongst our artisans, the same cannot be said for our merchants. We should encourage our traders to form similar guilds in order to streamline our mercantile ambitions."
 mos_dynastic_ties:0 "Rule through Dynastic Ties"
 mos_dynastic_ties_desc:0 "The lands of $russian_region$ have been ruled by one dynasty since time immemorial. We should utilize our position among our peers and our blood ties to take a leading role."
 mos_patrol_the_territories:0 "Organized Levies"
 mos_patrol_the_territories_desc:0 "Governing the vast expanse of $russian_region$ is no easy task. We should establish local recruitment centers to make drafting levies into our armies easier."
 mos_skilled_tax_collectors:0 "Gatherers of Tribute"
 mos_skilled_tax_collectors_desc:0 "Our position as the collector of tribute for the $GLH_horde$ has given us many years of experience in gathering tribute... and in retaining some of the profits for ourselves."
 mother_of_russian_cities:0 "The Mother of Rus' States"
 mother_of_russian_cities_desc:0 "$kyiv$ was once the shining capital of a great empire spanning from the northern forests of $novgorod$ to the southern shores of the Black Sea. After suffering the dissolution of the Rus' and the invasions of the Mongols, little remained of it. But the time has come for our revival, and no matter what our cities have endured, we vow that they will recover and prosper for centuries to come!"
 moundbuilding_advance:0 "Mound Builders"
 moundbuilding_advance_desc:0 "The ceremonial mounds built by our ancestors are monuments to their sophisticated earthwork engineering skills. By incorporating these mounds into the planning of our infrastructure, we will preserve a defining tradition of our civilization."
 mount_meru:0 "Mount Meru"
 mount_meru_desc:0 "$mount_meru$ is the sacred mountain at the center of the universe in both the physical and spiritual sense for $hindu$, $buddhist$, and $jain$. As it is the center around which everything else revolves, so does our entire country revolve around our ruler."
 mountain_cities:0 "Summit Fortresses"
 mountain_cities_desc:0 "Our cities and fortresses occupy the tops of immense mountains, well past the clouds. They present a formidable obstacle to anyone who might attempt to invade us."
 mountain_roads:0 "Mountain Roads Network"
 mountain_roads_desc:0 "To facilitate easier distribution of goods, a great network of mountain roads connecting far-off valleys together and crossing deep gorges is required. Let us build it."
 mounted_people:0 "Mounted People"
 mounted_people_desc:0 "Our people have thrived on horseback for centuries, and these majestic creatures are an integral part of our culture and power. We take immense pride in our unrivalled skills in our equine husbandry and talent for mounted archery, both of which contribute to our supremacy on the battlefield."
 mourning_wars:0 "Mourning Wars"
 mourning_wars_desc:0 "It is a long-established tradition of our people to adopt captured warriors into our tribe. But to replenish our numbers and ensure our defensive and offensive strength, we should seek to adopt entire tribes into the $IRO$, not just individual fighters."
 mri_descendant_of_oe_hiromoto:0 "Descendants of Ōe no Hiromoto"
 mri_descendant_of_oe_hiromoto_desc:0 "Ōe no Hiromoto, a scholar and politician who made great contributions to the establishment of the $kamakura$ Shogunate, was the ancestor of our clan. To this day, his spirit is embodied in our people, and we take pride in effectively administering the lands he secured for us."
 mri_munakata_three_goddesses:0 "Munakata Three Goddesses"
 mri_munakata_three_goddesses_desc:0 "The three daughters of Susanoo-no-Mikoto are patron goddesses of the sea and navigation. Their blessings will make our navies unstoppable."
 mtr_lagoon_fisheries:0 "The Lagoon Fisheries"
 mtr_lagoon_fisheries_desc:0 "The biological wealth of our coastal waters provides a stable food supply that supports a larger standing militia even during regional famines. By monopolizing the harvest of the lagoons, we ensure that our population remains healthy and our granaries full, fueling our state's survival."
 mtr_marshland_guerillas:0 "Marshland Guerillas"
 mtr_marshland_guerillas_desc:0 "We specifically train our levies to lure enemy units into the deep bogs where their armor becomes a liability. In these environments, our light, unarmored infantry reigns supreme through ambush tactics, turning the very earth into a weapon. Our ability to adapt to any terrain and move fast in the worst conditions makes us a dangerous foe."
 mtr_reclamation_engineering:0 "Reclamation Engineering"
 mtr_reclamation_engineering_desc:0 "We have begun the process of draining parts of the Myzeqe marshes to create even more fertile farmland. This engineering feat not only increases our tax base but allows us to construct permanent roads through what was once impassable bog."
 mtr_the_masters_of_the_karavasta:0 "The Masters of the Karavasta"
 mtr_the_masters_of_the_karavasta_desc:0 "Our domain is protected by the labyrinthine Karavasta Lagoon, where our people have mastered navigation through mudflats and hidden channels. This watery landscape serves as a natural fortress that is nearly impossible for heavy foreign armies to map or conquer, providing a sanctuary that no cavalry charge can reach."
 mtr_the_mataranga_port_authority:0 "The Mataranga Port Authority"
 mtr_the_mataranga_port_authority_desc:0 "We have unified all coastal harbors under a single administrative authority, streamlining the collection of dues and customs. This centralization has made us the most efficient trade administrators in the Adriatic, attracting foreign investment."
 mtr_the_trade_monopolies:0 "The Trade Monopolies"
 mtr_the_trade_monopolies_desc:0 "By controlling the river mouths and coasts, we can successfully dictate the flow of timber and grain from the interior to Venetian galleys. We have positioned ourselves as the indispensable middlemen of the Adriatic trade, ensuring no merchant can bypass our tolls."
 mug_an_indian_padshah:0 "Indian Padishah"
 mug_an_indian_padshah_desc:0 "Though we came to $india$ as foreigners, we now rule as Indian Padishah, embracing local traditions while transcending divisions of caste and creed. As our realm is one of many faiths and cultures, our administration will draw talent from all communities, giving everyone — regardless of caste, religion, or culture — an equal opportunity to serve our great house and glorious realm."
 mug_fatawa_e_alamgiri:0 "Fatawa-i-Alamgiri"
 mug_fatawa_e_alamgiri_desc:0 "The $mug_fatawa_e_alamgiri$ is a sharia-based compilation, serving as the primary legal code regulating various aspects of life in our empire. It is one of the most comprehensive collections of $muslim_ADJ$ laws, ethics, military strategies, economic policies, justice, and principles."
 mug_mughal_architecture:0 "$MUG_ADJ$ Architecture"
 mug_mughal_architecture_desc:0 "A great empire demands equally monumental buildings. In our cosmopolitan realm, architects are already creating marvelous edifices that will awe generations to come. Our dynasty should be at the forefront of this movement, creating great architectural works such as the world has never seen."
 mug_mughal_ibadat_khana:0 "$ibadat_khana$"
 mug_mughal_ibadat_khana_desc:0 "$ibadat_khana_desc$"
 mug_zamindar_system:0 "Zamindar System"
 mug_zamindar_system_desc:0 "The Zamindar are feudal rulers who govern our territories autonomously or semi-autonomously. While they are owners of the land they administrate and part of our nobility, in the end, they serve as internal vassals to the Crown itself."
 mulltimmer_masugn:0 "Mulltimmer Masugn"
 mulltimmer_masugn_desc:0 "$SWE_ADJ$ $iron$, prized for its purity and strength, supplies not only our domestic needs but also the foundries and armories of nations across the continent. The #italic Mulltimmer Masugn#! was not built just with stone, but also with wood isolated with sand, gravel and dirt."
 multicultural_empire:0 "Multicultural Empire"
 multicultural_empire_desc:0 "$HAB$ is a diverse and multicultural realm, committed to embracing and accommodating its numerous ethnic minorities to maintain unity and stability amidst growing nationalist tensions."
 muslim_caravans:0 "$muslim_ADJ$ Caravans"
 muslim_caravans_desc:0 "From the many paths of the Silk Road, to the salt routes across the Sahara, our people have a tradition of embarking on trade ventures to faraway lands, providing us and the rest of the $muslim_ADJ$ world with a wide selection of available goods."
 muslim_lineage:0 "$muslim_ADJ$ Lineage"
 muslim_lineage_desc:0 "Ever since the times of Muḥammad, peace be upon him, $muslim$ has been intrinsically linked to rulership structures. As such, our dynastic line is also legitimized by the faith itself."
 muslim_trade_communities:0 "$muslim_ADJ$ Trade Communities"
 muslim_trade_communities_desc:0 "The presence of $muslim_ADJ$ traders in faraway lands puts them in contact with many different peoples and beliefs. The establishment of trade communities among them allows for a certain degree of blending and syncretism of their beliefs with the true Word of $muslim_god_name$."
 mystai_advance:0 "Mystery Cults"
 mystai_advance_desc:0 "Hidden behind masks, symbols, and sacred ritual, influential initiates gather within secretive mystery cults. These organizations exercise considerable social and political influence, shaping events through ritual authority, wealth, and discreet alliances. Wise rulers maintain good relations with these mystai, lest their influence and intrigue turn against the state."
 mzk_literary_patronage:0 "Literary Patronage"
 mzk_literary_patronage_desc:0 "We have turned our capital into a center of culture, preserving the wisdom of the East and the West for future generations. This intellectual prestige makes our court the destination for the finest minds of the Orthodox and Latin worlds alike."
 mzk_silk_road_waystations:0 "Silk Road Waystations"
 mzk_silk_road_waystations_desc:0 "Our land sits on the primary trade routes from the interior; by taxing the silk caravans, we maintain a full and prosperous treasury. This revenue allows us to patronize the finest calligraphers and icon painters, turning our domain into the cultural capital of southern Albania."
 mzk_the_agricultural_wealth_of_the_devoll:0 "Agricultural Wealth of the Devoll"
 mzk_the_agricultural_wealth_of_the_devoll_desc:0 "The fertile valleys of our heartland allow us to fund a lavish court and a highly trained cavalry force through advanced irrigation. This agricultural surplus provides the economic bedrock for our political ambitions, allowing us to sustain a larger professional retinue than our rivals."
 mzk_the_despots_of_berat:0 "The Despots of Berat"
 mzk_the_despots_of_berat_desc:0 "Ruling from the Castle of Berat, the 'City of a Thousand Windows', we represent the peak of Albanian urban sophistication and Byzantine-style administration. Our court serves as a magnet for scholars and artisans, turning our capital into a beacon of culture that rivals the grand cities of the East."
 mzk_the_muzaka_chronicle:0 "The Muzaka Chronicle"
 mzk_the_muzaka_chronicle_desc:0 "Our family keeps meticulous and grand records of our history and territorial rights, ensuring our ancient claims are never forgotten. This literary tradition preserves our high Byzantine titles, overawing local rivals with our imperial dignity and historical depth."
 mzk_the_muzakan_industrialization:0 "The Muzakan Industrialization"
 mzk_the_muzakan_industrialization_desc:0 "We have introduced the large-scale cultivation of cash crops in our most fertile valleys, fueling a new domestic industry. By processing our own raw materials into high-value products, we have created an industrial base that supports a wealthy and loyal urban population."
 nagusa_negast:0 "Nəgusä Nägäst"
 nagusa_negast_desc:0 "Our ruler is the king of all kings; the heir to the pedigree of the kings of Aksum along with that of the first ruler, Menelik I, the son of King Solomon and the Queen of Sheba. All of our kings are descended from the $solomonid_dynasty$ dynasty, and the line of inheritance need not be from father to son."
 nahuatl_domination:0 "$nahua_culture$ Domination"
 nahuatl_domination_desc:0 "The superiority of $nahua_culture$ culture is very clear, as neighboring peoples increasingly adopt it as their own. This cultural diffusion and spread of influence creates opportunities for us to extend our political control well beyond our borders."
 nair_military_advance:0 "Nair Military"
 nair_military_advance_desc:0 "The Nairs are a diverse group of $hindu_ADJ$ castes from $malabar_area$ and have a long history of involvement with the military. Their experience, as well as their role for the $kalari$, will be of great value in our current conflicts."
 nambardar_levy:0 "Nambardar Levy"
 nambardar_levy_desc:0 "The $nambardar_levy$, or #italic čerig-i nambardar#!, refers to our troops that do not come from $mongolian_culture$ or $turkic_group$ origins, but instead come from the native $iranian_group$ population. Thanks to them, we can build larger armies than would have been possible before."
 nanto_rokushuu:0 "Nanto Rokushū"
 nanto_rokushuu_desc:0 "The temples of $nara$ have been influential since $buddhist$ first came from $china$. The six schools that formed around these temples are a renowned repository of knowledge, especially about the teachings of the Buddha and the various ways of achieving enlightenment. However, they also teach more mundane, but equally valuable subjects, such as how to properly administrate a monastery."
 napoleonic_warfare:0 "Napoleonic Warfare"
 napoleonic_warfare_desc:0 "Sieges are a costly and time-consuming occupation for our army. Instead of focusing on every fortification in our way, we need to dedicate our tactics entirely to landing the decisive blow that will win us the war."
 naraka:0 "naraka"
 naraka_desc:0 "Also called #italic Niraya#!, $naraka$ refers to the realms of suffering where one's bad karma is cleansed before being reincarnated. There are many $naraka$ realms, and both the time an individual must reside in them and the punishments they will receive while doing so depends on how much karma they need to gain before being reborn in one of the upper realms."
 nastika_schools:0 "Nāstika Schools"
 nastika_schools_desc:0 "Some schools of thought in $hindu$ deviate from the mainstream, rejecting the authority of the $vedah$ and the existence of $atman$. These schools, like $jain$ and $buddhist$, are thus heterodox, although they still contain many of the shared core beliefs of $hindu$."
 nation_state_advance:0 "Nation State"
 nation_state_advance_desc:0 "Uniting as a single culture under a single flag is a powerful, moving idea. By fostering a sense of national identity, we will ensure the loyalty of our subjects and citizens to our cause."
 national_assemblies_advance:0 "National Assemblies"
 national_assemblies_advance_desc:0 "$national_assemblies_desc$"
 national_bank:0 "National Bank"
 national_bank_desc:0 "By establishing a central authority for financial matters, we will have better control over our nation's economy."
 national_churches:0 "National Church"
 national_churches_desc:0 "The State must take greater control over the Church in our land. We cannot allow foreign entities to exercise undue influence over our ecclesiastical administration; our Church must serve our realm first."
 national_conscripts:0 "National Conscripts"
 national_conscripts_desc:0 "Increases our military numbers by making military service compulsory for those eligible."
 national_rites:0 "National Rites"
 national_rites_desc:0 "The presence of different autocephalous patriarchates in our Church allows for certain variations between the national rites of each country. However, the unity of the message remains, and the Church as a single entity is not broken."
 national_sovereignty:0 "National Sovereignty"
 national_sovereignty_desc:0 "The many long wars in the first half of the 17th century have led to an international diplomatic system for which the territorial integrity of states is a cornerstone. States, rather than individual rulers or supra-national groupings, are the actors in the international arena, and no state has the right to intervene in the internal affairs of another."
 national_trade:0 "National Trade"
 national_trade_desc:0 "Cloth, wool, and other sought-after commodities have made their way across the world. At an age where a nation's commerce reaches faraway shores, we must make sure our merchants always have the advantage!"
 national_trade_policy:0 "National Trade Policy"
 national_trade_policy_desc:0 "By adopting a national trade policy, we can strengthen our commercial presence and increase the effectiveness of our trade."
 nationalistic_enthusiasm:0 "Nationalistic Enthusiasm"
 nationalistic_enthusiasm_desc:0 "Giving our troops adequate support is vital to national defense. With our excellent administration, we are able to secure generous discounts on our military supplies."
 native_policy_advance:0 "Natives Policy"
 native_policy_advance_desc:0 "The new lands discovered by our daring explorers are usually inhabited by people we find strange and unsophisticated. It is time that we created an official policy to regulate encounters between our expeditionary forces and the natives of the lands they explore."
 natural_seamanship:0 "Natural Seamanship"
 natural_seamanship_desc:0 "With the growth of our fishing industry, we have also seen a corresponding expansion in the number of sailors in our realm. We should take advantage of this and recruit some of them to our navy, as seamanship is just as important as the ship itself."
 nav_a_renaissance_realm:0 "A $renaissance$ Realm"
 nav_a_renaissance_realm_desc:0 "Though our realm originates in the mountain valleys of the Pyrenees, our people have been heavily influenced by humanistic ideas coming from both north and south. By embracing this new way of thinking, the people of $NAV$ are not abandoning their traditions, but merging them into their overall identity."
 nav_adept_traders:0 "Adept Traders"
 nav_adept_traders_desc:0 "The quality of our ships, the proficiency of our merchants, and the efficacy of our production processes have made our trade incredibly lucrative. The influx of wealth into our nation will make us stronger than ever before."
 nav_always_ready:0 "Always Ready"
 nav_always_ready_desc:0 "We were born as a small realm, encircled by formidable adversaries from every direction. This has profoundly influenced the development of our national character and our approach to engaging with the world. Consequently, we remain ever-watchful, poised to respond to the slightest indication of a threat."
 nav_an_industrious_folk:0 "An Industrious Folk"
 nav_an_industrious_folk_desc:0 "The land we live in might not be the richest, but the $basque$ people are industrious individuals, working hard to obtain what they need. Be it by smelting $iron$ in our ironworks, converting wood from our forests into charcoal, or building the finest ships, our realm is bountiful thanks to the efforts and expertise of our community."
 nav_basque_ferocity:0 "$basque$ Ferocity"
 nav_basque_ferocity_desc:0 "Even before the Battle of $roncesvalles$, for which the $FRA_ADJ$ still weep, or the campaigns of the $NAV_ADJ$ Company, our people have always been considered ferocious fighters. We should never let our enemies forget it."
 nav_chartered_councils:0 "Chartered Councils"
 nav_chartered_councils_desc:0 "Each historical territory will form a council, dependent on the ruler and elected by the locals, which will guarantee the respect of their traditional laws or #italic Fueros#!. This intermediate step will give us better and more efficient administrative power over our lands, without meddling in local interests."
 nav_efficient_bureaucracy:0 "Efficient Bureaucracy"
 nav_efficient_bureaucracy_desc:0 "Our nation has maintained bureaucratic traditions since the realm's establishment, but changing times demand new approaches. $NAV$ has drawn particular admiration for pioneering certain administrative innovations."
 nav_fearless_seamen:0 "Fearless Seafarers"
 nav_fearless_seamen_desc:0 "Our people have always looked to the sea with awe and fear, well aware of both the rewards and dangers to be found in its briny embrace. Our brave forefathers founded communities that would live not only by the sea but from it, developing impressive skills on the water. Sailors from our shores are well known all across the Atlantic Coast."
 nav_memories_reconquista:0 "Memories of the Reconquista"
 nav_memories_reconquista_desc:0 "Our people were active participants in the Reconquista, contributing to the $christian_ADJ$ efforts to reclaim $iberia_region$ from $muslim_ADJ$ rule. Despite reaching a stage where further territorial expansion became unattainable, $NAV$ still played a significant role in this Crusade, through military campaigns and alliances with neighboring $christian_ADJ$ kingdoms"
 nav_mercantile_expansion:0 "Mercantile Expansion"
 nav_mercantile_expansion_desc:0 "For centuries, our society has traded not only with our neighbors, but with faraway lands. This has had the effect not only of making our merchants particularly skilled in the art of trade, but has disseminated innovations from many nations farther and wider than they would have been able to otherwise."
 nav_navarrese_defense_force:0 "$NAV_ADJ$ Defense Force"
 nav_navarrese_defense_force_desc:0 "Over time, our neighbors have gained significant strength, posing an increasing threat to our nation's survival. To address this, we will establish a military department aimed at bolstering our forces with a higher number of soldiers without compromising on the quality of recruits."
 nav_people_of_the_sea:0 "People of the Sea"
 nav_people_of_the_sea_desc:0 "Our people are expert mariners, and all the world knows it. Our expertise will be an obvious advantage in maritime battles to come."
 nav_riflemen_march:0 "Riflemen March"
 nav_riflemen_march_desc:0 "The introduction of rifles to our armies has required new approaches to military training and discipline. Our commanders have developed innovative marching formations that have become famous as proof of our military competence and focus."
 nav_royal_basque_society:0 "Royal $basque$ Society"
 nav_royal_basque_society_desc:0 "#italic Euskalerriaren Adiskideen Elkartea#!, the Royal $basque$ Society of Friends of the Country, has been founded to encourage the development of $basque$ economy, culture, and science. It will benefit the country greatly in the coming years."
 nav_shipbuiling_experts:0 "Expert Shipbuilders"
 nav_shipbuiling_experts_desc:0 "The sea kissing our shores teems with resources waiting for those brave enough to grab them. For centuries, our coast has been full of ports and shipyards, tirelessly building vessels with which to slake our thirst for adventure and profit on the open seas."
 nav_shipyards_ironworks:0 "Shipyards and Ironworks"
 nav_shipyards_ironworks_desc:0 "The traditions of shipbuilding, steelmaking, and ironworking have been common activities in our lands for centuries. But as new techniques develop, we must obviously update our processes correspondingly. Even the most ancient traditions must embrace modernity in order to remain valuable in the modern world."
 nav_the_national_military_academy:0 "The National Military Academy"
 nav_the_national_military_academy_desc:0 "With the professionalization of our army, the necessity of a training center for our recruits becomes apparent. We will form a corps of experienced soldiers to teach the fundamentals of war and to forge our recruits into the spearhead of our army."
 nav_transatlantic_whaling:0 "Transatlantic Whaling"
 nav_transatlantic_whaling_desc:0 "$basque$ whaling traditions represent centuries of experience, and our specialists are often consulted by other nations looking to expand and improve their own whaling industries. We should capitalize on this expertise by establishing whaling enterprises throughout the $atlantic_ocean_continent$."
 naval_ambitions:0 "Naval Ambitions"
 naval_ambitions_desc:0 "With an extra boost to naval morale, our sailors will conquer the waves and rule the seas. Meanwhile, our colonists will be able to brave the darkest corners of the world, founding new settlements farther from home than ever before."
 naval_base_advance:0 "Naval Base"
 naval_base_advance_desc:0 "$naval_base_desc$"
 naval_battery_advance:0 "Naval Battery"
 naval_battery_advance_desc:0 "$naval_battery_desc$"
 naval_cadets:0 "Naval Cadets"
 naval_cadets_desc:0 "By promoting the navy as the ideal career choice for second and third sons of the aristocracy, we can create a professional corps of naval officers to oversee our gunnery crews."
 naval_doctrines_advance:0 "Naval Doctrines"
 naval_doctrines_advance_desc:0 "Naval warfare has seen many changes in recent years, with ships and fleets both becoming larger and more specialized. As a result of this, different countries are starting to use a variety of tactics and doctrines, tailored to their strong points or their particular way of using their fleets."
 naval_drill:0 "Naval Drill"
 naval_drill_desc:0 "The confusion of combat can leave a warship unfit for action for a long time. A well-drilled crew will recover much faster than an ordinary one."
 naval_fighting_instruction:0 "Naval Fighting Instruction"
 naval_fighting_instruction_desc:0 "Allows our naval veterans to devise new methods to improve our navy's efficiency in blockades."
 naval_glory:0 "Naval Glory"
 naval_glory_desc:0 "The awesome sight of our glorious navy will make all adversaries tremble in fear!"
 naval_initiative_ren:0 "Deployment Tactics"
 naval_initiative_ren_desc:0 "It is true that victory often comes to those who draw first blood. Exhaustive study and effective implementation of deployment tactics will permit us to mobilize quickly and take initiative in combat situations, helping us achieve that victory."
 naval_morale_advance_1:0 "Medieval Sailing"
 naval_morale_advance_1_desc:0 "The advancements made in the field of sailing in recent decades have increased the expertise and confidence of our sailors, allowing them to navigate with confidence in coastal waters."
 naval_morale_advance_2:0 "Navigation Techniques"
 naval_morale_advance_2_desc:0 "Our sailors are becoming accustomed to longer journeys, using a new set of techniques and instruments, such as dry compasses, to improve their mastery of navigation."
 naval_morale_advance_3:0 "Overseas Expeditions"
 naval_morale_advance_3_desc:0 "The recent rise of long-range overseas commerce has accustomed our sailors to being at sea for long periods of time, making them resistant to the adverse effects of long journeys."
 naval_morale_advance_5:0 "Permanent Fleets"
 naval_morale_advance_5_desc:0 "The global expansion of trade and commerce demands permanent naval forces to protect national interests. Maintaining an established, ever-present standing navy will allow ships to operate more effectively together as a fleet."
 naval_professionalism:0 "Naval Professionalization"
 naval_professionalism_desc:0 "Until the beginning of the 17th century, permanent navies were quite small, and even notable martitime powers mostly maintained only enough of a naval force to meet their immediate needs. Over time, however, many states have started moving in the direction of establishing larger professional navies. Unless we want to see our rivals overtake us in naval matters, we must strive to create a larger permanent navy with the proper administrative structures to support it. We should also ensure that a naval career can be a lifelong occupation for our officers."
 naval_repair_ren:0 "Tighter Joints"
 naval_repair_ren_desc:0 "Everyone knows that a hole in a ship's hull will inevitably lead to its sinking. With better building techniques, we can build a hull with more tightly jointed planks, making the ships less prone to leakage and holes in the hull much easier to repair."
 naval_supplies_manufactory_advance:0 "Naval Supplies Manufactory"
 naval_supplies_manufactory_advance_desc:0 "$naval_supplies_manufactory_desc$"
 naval_supplies_mill_advance:0 "$naval_supplies_mill$"
 naval_supplies_mill_advance_desc:0 "$naval_supplies_mill_desc$"
 naval_supplies_workshop_advance:0 "$naval_supplies_workshop$"
 naval_supplies_workshop_advance_desc:0 "$naval_supplies_workshop_desc$"
 navigation_acts:0 "The Navigation Acts"
 navigation_acts_desc:0 "These acts represent the apex of mercantilism. Trade must be conducted with our ships and pass through our ports first, where we will collect customs duties and any other applicable taxes."
 nax_aegean_waystation_networks_advance:0 "Aegean Waystation Networks"
 nax_aegean_waystation_networks_advance_desc:0 "In an era of global trade, our islands have become the indispensable waystations of the Mediterranean, providing fresh water, ship timber, and salted meats to long-haul vessels. By standardizing the port facilities across our twenty-odd islands, we ensure that any merchant ship must pay for the privilege of our hospitality. This logistics network makes us the undisputed masters of the Aegean's internal economy."
 nax_archipelagic_vigil_advance:0 "Achipelagic Vigil"
 nax_archipelagic_vigil_advance_desc:0 "The scattered islands of the Aegean demand constant vigilance from their Latin rulers, who maintain fleets of light galleys to patrol against pirates, raiders, and rival Italian maritime powers. The dukes of Naxos and their vassals have developed a sophisticated system of island garrisons, signal fires, and swift courier vessels that allow them to respond rapidly to threats across the archipelago, while the wealth extracted from trade protection and harbor dues enables the construction of sturdy coastal fortresses that make the Cyclades one of the most secure regions of the Frankokratia, a maritime bulwark."
 nax_naxian_sea_knights_advance:0 "The Naxian Sea-Knights"
 nax_naxian_sea_knights_advance_desc:0 "Our nobility is unique in the Western world; they are knights who have traded the horse for the galley and the lance for the boarding pike. These 'Sea-Knights' roam the Eastern Mediterranean under the Ducal banner, enforcing a 'Latin Peace'. This aggressive stance keeps our sailors sharp and our rivals' trade in constant peril."
 nax_sanudos_isles_advance:0 "Sanudo's Isles"
 nax_sanudos_isles_advance_desc:0 "Marco I Sanudo, a Venetian noble who participated in the Fourth Crusade, seized the Cyclades archipelago in 1207 and founded the Duchy of Naxos, creating a maritime feudal state whose lords ruled from fortified island citadels and drew income from trade, piracy suppression, and the fertile valleys of Naxos, Paros, and Santorini. By blending Venetian commercial instincts with Frankish feudal organization, the Sanudo dynasty has maintained a semi-independent duchy that serves as a vital link in the Latin trade network, protecting shipping lanes while extracting tolls and offering safe harbors to Crusader, Genoese, and Venetian vessels alike."
 nax_the_aegean_hydrographic_bureau_advance:0 "The Aegean Hydrographic Bureau"
 nax_the_aegean_hydrographic_bureau_advance_desc:0 "In an age of global exploration and precision, the Dukes of Naxos have established the premier center for Mediterranean cartography and maritime science. By employing the finest astronomers and clockmakers to map every reef, current, and wind pattern of the Cyclades, we have made our navigational charts the most sought-after tools in the world. This scientific mastery ensures that Naxiot captains can navigate the treacherous Aegean at night or in storm, granting our merchant and war fleets a decisive advantage in speed and safety over any foreign interloper."
 nax_the_marble_trade_of_paros_advance:0 "The Marble Trade of Paros"
 nax_the_marble_trade_of_paros_advance_desc:0 "As the demand for fine art rises, the demand for high-quality Parian marble has returned to levels not seen since the days of Augustus. By reopening the ancient quarries and employing modern engineering techniques, we have turned a geologic quirk into a fountain of wealth that funds our Aegean hegemony. The palaces of Rome and Paris are increasingly built with stone hewn from our sovereign islands."
 nbu_fight_against_famines:0 "Fighting Famine"
 nbu_fight_against_famines_desc:0 "Due to cold winds in the late autumn and heavy snows until the early spring, our people often suffer from severe famines and hunger. We must build reserves of food and look into how we can improve the lands under our control to counter future catastrophes."
 nbu_genji_in_the_north:0 "Ōshū Genji"
 nbu_genji_in_the_north_desc:0 "We are originally a cadet branch of the Kai Genji; our founder was given a fief in Ōshū Province as a reward for loyal service to the $kamakura$ Shogunate. Over time, we have grown accustomed to this region with its harsh winters, and know how to utilize these conditions to our strategic and tactical advantage."
 nbu_northern_horses:0 "Northern Horses"
 nbu_northern_horses_desc:0 "Mutsu has ranches, from which horses were sent to $kyoto$ in ancient times. The tradition of horse farming continues until today, and is one we should cultivate, as it allows us to raise cavalry more easily than many of our neighbors."
 neapolitan_army_reforms:0 "$NAP_ADJ$ Army Reforms"
 neapolitan_army_reforms_desc:0 "Our nation needs to undergo sweeping military reforms, modernizing its armed forces to meet the challenges of the changing battlefield. These reforms will bolster tactical capabilities, streamline command structures, and enhance training programs, positioning us as a formidable force in our region."
 neapolitan_industrialization:0 "$NAP_ADJ$ Industrialization"
 neapolitan_industrialization_desc:0 "$NAP$ has witnessed a gradual industrialization process over the past decades. Key sectors such as textiles, shipbuilding, and ironworks have experienced significant growth, fueled by investments and technological advancements. This shift towards industrialization will play a significant role in transforming $NAP$ into a major economic center."
 neg_bridgehead_of_the_euripus_advance:0 "Bridgehead of the Euripus"
 neg_bridgehead_of_the_euripus_advance_desc:0 "The narrow channel separating our island from the mainland is the most strategic chokepoint in Central Greece, controlled by our massive swing-bridge and fortified towers. By taxing the flow of goods between Boetia and the Aegean, we have transformed a geographic oddity into a permanent source of toll revenue. We hold the key to the movement of armies in the Balkans, and we charge a heavy price for its use."
 neg_negropontine_navarchy_advance:0 "The Negropontine Navarchy"
 neg_negropontine_navarchy_advance_desc:0 "The triarchs of Negroponte divided the lordship of the long island among three families yet managed to maintain a unified naval policy that dominates the narrow Euripos channel and extracts tolls from every vessel passing between the Aegean and the northern ports. Their galleys, crewed by a mixture of Frankish knights, Greek mariners, and Italian mercenaries, patrol the straits with ruthless efficiency, ensuring that Negroponte remains one of the wealthiest and most strategically vital outposts of the Frankokratia."
 neg_the_eubean_tidal_mills_advance:0 "The Eubean Tidal Mills"
 neg_the_eubean_tidal_mills_advance_desc:0 "The unique, reversing tides of the Euripus Strait have been harnessed by our engineers to power a series of massive tidal mills. These machines provide consistent energy for milling grain, sawing ship-timber, and powering forge-bellows regardless of the wind. This technological advantage makes Euboea the most industrially advanced island in the Mediterranean, capable of out-producing its maritime rivals."
 neg_the_glassworks_of_chalkis_advance:0 "The Glassworks of Chalkis"
 neg_the_glassworks_of_chalkis_advance_desc:0 "Using the high-quality silica sands of our beaches and the soda ash from our coastal plants, we have established a glass-making industry that rivals Murano. Our mirrors and stained glass are exported to the great palaces of the Latin Empire and the West, bringing immense wealth to the island. This luxury industry provides the tax revenue needed to maintain our massive coastal walls in an age of gunpowder."
 neg_the_three_fold_defense_advance:0 "The Three Fold-Defense"
 neg_the_three_fold_defense_advance_desc:0 "The island of Euboea is divided among three #italic Terzieri#!, or Triarchs, creating a competitive yet unified defensive structure that prevents any single lord from becoming weak. This tripartite system ensures that if one fortress falls, the other two mobilize instantly, creating a redundant and resilient military administration. This internal rivalry keeps our garrisons at peak readiness, as no Triarch wishes to be outdone by his peers."
 neg_the_triarchic_naval_academy_advance:0 "The Triarchic Naval Academy"
 neg_the_triarchic_naval_academy_advance_desc:0 "To ensure the quality of our fleet, the three lords of the island have co-founded an academy for the training of naval officers and navigators. Students are taught the latest in astronomical navigation and maritime law, ensuring that every Euboean captain is a professional of the highest caliber. This focus on naval education keeps our fleet at the cutting edge of maritime warfare and exploration."
 neo_confucianism:0 "Neo-$SECT_CONFUCIANISM_NAME$"
 neo_confucianism_desc:0 "$SECT_CONFUCIANISM_NAME$ has a millenary history, and Neo-$SECT_CONFUCIANISM_NAME$ has already existed in $japan_region$ for centuries. However, active state involvement and support of the faith will strengthen our authority."
 neo_neopatras_fortresses_advance:0 "Neopatras Fortresses"
 neo_neopatras_fortresses_advance_desc:0 "In the mountainous frontier of southern Thessaly, the lords of Neopatras — first Brienne and later Aragonese — constructed and repeatedly strengthened one of the most formidable castle complexes in Frankish Greece, turning the ancient city into a virtually impregnable stronghold that withstood repeated sieges by their enemies. These towering walls, deep ditches, and cleverly sited outworks became a symbol of Latin tenacity, allowing a small but determined garrison to project influence deep into central Greece and delay the northward advance of hostile powers for generations."
 neo_the_academy_of_administration_advance:0 "The Academy of Administration"
 neo_the_academy_of_administration_advance_desc:0 "Neopatras needs to replace its hereditary 'Captain-Governors' with graduates of a dedicated Administrative Lyceum. Candidates are tested on their knowledge of our civil law and the latest techniques, ensuring that the nation's officials are as comfortable with a quill as they are with a sword. This shift from 'Birthright to Merit' has turned Neopatras into the most efficiently governed territory in Central Greece, capable of precise census-taking and rapid tax-levying."
 neo_the_consulate_of_the_sea_advance:0 "The Consulate of the Sea"
 neo_the_consulate_of_the_sea_advance_desc:0 "Using our connections to the Crown of Aragon and the merchants of Barcelona, Neopatras has become the primary entry point for Iberian goods into the Levant. We operate a #italic Consulate of the Sea#! that provides legal protection and standardized weights for all Catalan and Spanish traders. This special relationship makes Neopatras the wealthiest outpost of the Western Mediterranean in the heart of Greece."
 neo_the_great_companys_code_advance:0 "The Great Company's Code"
 neo_the_great_companys_code_advance_desc:0 "The nation remains governed by the democratic-military traditions of the Catalan Company, where officers are elected and the spoils of war are shared. This egalitarian structure creates an army with incredibly high morale, as every soldier feels they have a personal stake in the survival of the state. While the rest of Europe moves toward absolutism, our 'Soldier's Republic' remains a fiercely loyal and cohesive fighting force."
 neo_the_neopatras_horse_breeding_program_advance:0 "The Neopatras Horse-Breeding Program"
 neo_the_neopatras_horse_breeding_program_advance_desc:0 "In the fertile Spercheios valley, the Dukes have established royal stables to breed a new strain of warhorse, crossing Catalan stallions with local Balkan mares. The resulting #italic Neopatras Charger#! is famed for its endurance in mountainous terrain and its shock power in the charge. This cavalry advantage allows us to dominate the open plains of Thessaly and strike fear into our rivals."
 neo_the_ordinance_of_the_viles_noves_advance:0 "The Ordinance of the Viles Noves"
 neo_the_ordinance_of_the_viles_noves_advance_desc:0 "The realm has moved to centralize its scattered mountain population into 'New Towns' (Viles Noves in the Catalan language) modeled after the planned fortified villages of Catalonia. The governance of these towns is handed to a 'Consul of the Hearth', an official tasked with managing communal wood-fuel and grain storage for the harsh winters. By controlling the heat and the bread of the highlands, our rule effectively ends the age of independent mountain-warlords, replacing them with a streamlined, urbanized bureaucracy."
 netherlandish_protoindustry:0 "$NED_ADJ$ Verlagssystem"
 netherlandish_protoindustry_desc:0 "For a long time, our land has been home to bustling towns and cities with a higher concentration of craftsmen than our neighbors. This focus has made us a highly productive nation."
 netherlandish_ship_building:0 "$NED_ADJ$ Shipbuilding"
 netherlandish_ship_building_desc:0 "As the Low Countries are home to some of $europe$'s greatest port cities, it is only fitting that they should also boast some of $europe$'s greatest shipyards. Being able to employ skilled local craftsmen dramatically reduces the costs of acquiring new merchant fleets."
 network_of_cities:0 "Network of Cities"
 network_of_cities_desc:0 "Across lakes and valleys, our cities bind themselves through roads, markets, and shared purpose, strengthening our reach."
 new_currency_demands:0 "New Currency Demands"
 new_currency_demands_desc:0 "The discovery of new lands has also led to an increased flow of trade. This has in turn caused a rise in the demand for coins, and although the noble metal currencies made of $goods_gold$ and $silver$ remain the main values, other lesser metals like $copper$ and its alloys have seen their use and circulation increased."
 new_fire_ceremonies:0 "New Fire Ceremonies"
 new_fire_ceremonies_desc:0 "Once every fifty-two years, the world is renewed by flame, uniting the people in faith and cosmic balance."
 new_frontiers:0 "New Frontiers"
 new_frontiers_desc:0 "The movement to push the colonial frontier further and further inland in the New World, by establishing everything from small trade stations to full settlements with large areas of cultivated land."
 new_trade_opportunities:0 "New Trade Opportunities"
 new_trade_opportunities_desc:0 "The needs of our people have been adapting to the new markets that have opened to our traders, and we have been training our merchants in methods to maximize our earnings."
 new_world_advance:0 "New World"
 new_world_advance_desc:0 "As the $FLO_ADJ$ navigator Amerigo Vespucci says, the lands discovered by Columbus are not the Indies but, in fact, a whole New World unknown to our ancients and waiting to be mapped and claimed."
 new_world_crops:0 "New World Crops"
 new_world_crops_desc:0 "The bountiful lands of the New World have provided many treasures to our country. One of the most important discoveries is that of the strange, exotic plants cultivated as food and spices by the natives of those lands. Growing those crops in our fields will provide our population with the dietary variety and novelty they crave."
 newspapers_advance:0 "Newspapers"
 newspapers_advance_desc:0 "The concept of announcements being announced or posted where the public may read them is certainly not a new one. However, as the $printing_press$ becomes more popular around the world, so does the demand for accessible information about politics, war, and the economy. The newspaper - a periodical publication describing current events - shall satisfy this demand."
 nghia_quan:0 "The Nghĩa Quân"
 nghia_quan_desc:0 "Throughout our history, the #italic Nghĩa Quân#! — 'righteous militias' — have risen in defense of our land during times of great peril. Composed of farmers, scholars, and local patriots, they stood against foreign invaders and internal tyranny alike. Though irregular in nature, their valor and devotion to the country have made them a formidable force when mobilized."
 nine_garrisons_of_the_great_wall:0 "Nine Garrisons of the Great Wall"
 nine_garrisons_of_the_great_wall_desc:0 "In order to defend against the vicious barbarian onslaught, we must do more than simply repair the Great Wall. The Nine Garrisons are militarized garrison towns along the Wall that will not only help to defend the most important passes, but also improve the overall logistical situation on our northern border."
 niyamniyan:0 "niyamniyan"
 niyamniyan_desc:0 "The tradition of the Five Noble Talents involves riding, archery, military command, loyalty, and discipline. These aspects of our martial society form the backbone of our proud culture."
 noble_eightfold_path:0 "Noble Eightfold Path"
 noble_eightfold_path_desc:0 "The path to being liberated from Saṃsāra and achieving Nirvāṇa, the $noble_eightfold_path$ is the purest distillation of $buddhist_ADJ$ practices. Dictating both one's mental state and physical actions, it determines proper comportment for any follower of $buddhist$."
 noble_knights:0 "Noble Knights"
 noble_knights_desc:0 "Supporting cavalry requires an economic system that produces a large number of surplus horses. If we were to guarantee the privileges of our nobility, not only would they be much happier, but they would do much of the work to produce the much-needed horses. Our court fool described it as 'service guarantees serfs.'"
 noble_officers:0 "Noble Officers"
 noble_officers_desc:0 "The choice of who leads our troops is a crucial one, and our nobles wish to ensure that preference is given to them when it comes to filling these roles. It will give them a chance to show their valor by giving the enemy cold steel, and we will allow them to do this."
 noble_resilience:0 "Noble Connections"
 noble_resilience_desc:0 "The various mercenary groups on this continent are often headed by lesser nobles. By befriending the aristocracy, we can use their network of contacts to seek out more — and larger — groups of mercenary soldiers."
 noble_society_baden_palatine:0 "Society with the Donkey"
 noble_society_baden_palatine_desc:0 "Founded to protect knightly interests within the Empire, the #italic Gesellschaft mit dem Esel#! has entrenched itself in the lands surrounding $heidelberg$. Their expertise in governance, as well as their ability to sponsor tourneys, will improve our cultural standing."
 noble_society_cologne:0 "Order of Saint Hubert"
 noble_society_cologne_desc:0 "The #italic Hubertusorden#! will serve as a glorious reminder of our knights' combat prowess! Joining the order will be a reward for our loyal knights, and its members will display our glory for all to see."
 noble_society_franconia:0 "Fürspang Society"
 noble_society_franconia_desc:0 "The #italic Gesellschaft mit dem Fürspang#! is an order of knights formed to defend their interests and provide assistance to those who sponsor them. Providing them with extensive funds will grant us significantly more political prowess within our region and within the Holy Roman Empire."
 noble_society_mainz:0 "Bengler Society"
 noble_society_mainz_desc:0 "The #italic Klüppelgesellschaft#! has been founded by a group of knights concerned about the erosion of our power within the Holy Roman Empire. It would be wise of us to sponsor those willing to fight for our status."
 noble_society_nassau:0 "Society with the Lion"
 noble_society_nassau_desc:0 "Founded in the woes of the $western_schism$, the #italic Löwenbund#! is sworn to protect our lands from heretical revolts. We should grant them our official sponsorship and incorporate them into our court to further our cause."
 noble_society_tyrol:0 "Elefantenbund"
 noble_society_tyrol_desc:0 "Our lands are at risk of invasion from hostile neighbors, who desire the riches of our valleys. Creating and funding an order of knights, ready to defend our lands, allows us to draw on greater forces if the need ever arises."
 nobles_rights_laws_advance:0 "$nobles_rights_laws$"
 nobles_rights_laws_advance_desc:0 "$nobles_rights_laws_desc$"
 nomadic_legacy:0 "Nomadic Legacy"
 nomadic_legacy_desc:0 "Our people are born in the saddle, free to roam the world without the need to put down roots."
 nomadic_tendencies:0 "Nomadic Tendencies"
 nomadic_tendencies_desc:0 "Many of our people have lived their lives as nomads, as our custom has been to travel from one habitable place to the next. Even now, as everything changes and we build a city for our people, some retain their nomadic traditions, and continue to wander."
 non_inheritable_offices:0 "Non-Hereditary Offices"
 non_inheritable_offices_desc:0 "Having our court officials pass their offices from father to son is a plague on our administrative system! It does nothing but cause apathy and rot to blight every branch of our authority. All offices should from now on be assigned to those best able to fulfill the required duties, regardless of their lineage."
 nor_bounties_of_the_sea:0 "Bountiful Seas"
 nor_bounties_of_the_sea_desc:0 "The $NOR_ADJ$ land cannot provide our people with enough food to sustain themselves. We will look to the sea to feed our people instead. Fortunately, the waters of the North Sea provide us with plenty of fishing grounds."
 nor_merchant_tradition:0 "$NOR_ADJ$ Merchants"
 nor_merchant_tradition_desc:0 "The ports of $NOR$ have long been a desirable destination for merchants from all around $europe$. It is time that we not only host foreign merchants in our ports, but benefit from the trades of northern $europe$ ourselves."
 nor_seaborn_country:0 "Seaborn Country"
 nor_seaborn_country_desc:0 "The $NOR_ADJ$ people have always chosen to traverse the country by boat, whenever it is convenient. This makes our people adept sailors, ready to man our navy whenever necessary."
 nor_shipbuilding:0 "Military Shipbuilding"
 nor_shipbuilding_desc:0 "The expansion of our fishing industry has also led to an expansion in shipbuilding. We have a ready pool of trained shipwrights at hand to expand our own production process."
 norman_law:0 "$NRM_ADJ$ Law"
 norman_law_desc:0 "Our state is governed by its own customary legal code, the $couteume_de_normaundie$. By enshrining noble privilege, decentralized power, and property rights, this legal tradition ensures local stability while asserting our distinct identity."
 north_german_hanseatic_traditions:0 "Hanseatic Traders"
 north_german_hanseatic_traditions_desc:0 "The people of $north_german_region$ have for a long time reaped the benefits of access to the Baltic Sea. While many of our southern neighbors must make do using rivers to transport goods, our traders have a long tradition of sailing the Baltic to make their fortunes, bringing enviable wealth back to our shores."
 northern_center_of_arts:0 "Northern Center of Arts"
 northern_center_of_arts_desc:0 "$novgorod$ is an important cultural center in $europe$. Epic tales are told of our's literate and intellectual population, intricate religious art, and grand architecture, increasing the prestige of our flourishing city and indeed the whole nation."
 northern_march:0 "The Northern March"
 northern_march_desc:0 "In the early days of the $hre$, the $brandenburg_area$ area was settled and governed by $slavic_group$ tribes, until the Emperor created the Northern March to subjugate and fortify the area. Over time, this Northern March evolved into $brandenburg_area$, becoming one of the most important regions in the $hre$."
 norwegian_heritage:0 "$NOR_ADJ$ Maritime Heritage"
 norwegian_heritage_desc:0 "$NOR$'s rugged coastlines and maritime traditions have shaped a people skilled in seafaring, fishing, and navigation. The legacy of $NOR_ADJ$ fishermen and shipbuilders fuels our naval endeavors and bolsters the lifeblood of our coastal communities."
 novgorod_first_chronicle:0 "$NOV$ First Chronicle"
 novgorod_first_chronicle_desc:0 "The #italic Novgorod First Chronicle#! details the history of our country, from the days of the legendary Varangian chieftain Rurik up to the present. It is a cultural heirloom that is proudly handed down from one generation to another."
 novgorodian_fur_trade:0 "Novgorodian Fur Trade"
 novgorodian_fur_trade_desc:0 "$fur$, the silken gold of $RUS$! While other states gain their wealth from trading in $goods_gold$ and other rare metals, our source of income comes from the high-quality $fur$ the motherland provides us with."
 npl_gurkhas:0 "$a_gurkha$"
 npl_gurkhas_desc:0 "$a_gurkha_desc$"
 npl_himalayan_homeland:0 "Children of the Himalayas"
 npl_himalayan_homeland_desc:0 "Our people have lived since time immemorial in the shadow of very mountains that sustain the Heavens. The high passes, the steep ridgelines, the deep-cut river valleys — these are not obstacles to us but the very fabric of our homeland. Even the air itself is different than that of the lowlands, and no army from the plains can expect to move through these lands as our soldiers do."
 npl_the_divya_upadesh:0 "The Divya Upadesh"
 npl_the_divya_upadesh_desc:0 "The #italic Divya Upadesh#! lays out nine principles that form the core of political and national life in $nepal_area$, as well as guidelines for successful foreign policy. It encapsulates centuries of $nepali_group$ thought on governance, war, and peace. Following these principles, $nepal_area$ shall be able to avoid the subversion of nearby empires and marauding foreigners."
 oak_forests_for_ships:0 "Oak Forests for Ships"
 oak_forests_for_ships_desc:0 "The more punishment our ships can take, the more they can dish out. Let us ensure that we have a ready supply of the finest seasoned oak for our warships."
 obon:0 "obon"
 obon_desc:0 "One of the most important festivals in our culture, $obon$ is the time to honor the dead, and our ancestors in particular. During the celebrations, offerings of food and ritual dances are performed. People also light fires and lanterns to guide the souls of the dead back home for the celebrations, and once again back to the land of the dead."
 oda_generals:0 "$ODA$ Generals"
 oda_generals_desc:0 "Obsession with birth and privilege has made this country weak, and the rise of self-made powerful clans throughout the realm has clearly proven how useless such notions can be. Let us take this lesson to heart, and allow success and skill be the guiding principles for who should rise to command our armies. Strong leadership is a requirement for rapid expansion."
 oda_influential_strongholds:0 "Influential Strongholds"
 oda_influential_strongholds_desc:0 "$japan_region$ is a land of castles and fortifications. It is through the construction of strong defensive positions that one can assert influence both over the political realm and the routes vital to military campaigns. This learning is one we must take to heart. It is also through our castles that we impose our presence and power upon the common people. At all times, we must prioritize the reduction of enemy fortifications and the erection of our own in strategic locations."
 oda_patronization_of_the_west:0 "Patronization of the West"
 oda_patronization_of_the_west_desc:0 "Western missionaries brought many ideas and techniques to our land, and unlike the $buddhist_ADJ$ sects of old, they have no previous ties to corrupt landowners or rebellious cities. We should welcome these foreigners into our cities, and see what benefits they could bring to our court."
 oda_tenka_fubu:0 "Tenka Fubu"
 oda_tenka_fubu_desc:0 "It is clearly our destiny to hold all the country within our grasp. None shall resist our authority, and all under Heaven will bend to our military might."
 oda_triple_firing:0 "Triple Firing"
 oda_triple_firing_desc:0 "The advent of firearms has and will continue to revolutionize warfare in $japan_region$, and through mastering these new weapons, we can dominate any battlefield. In order to increase the rate of their fire, our arquebusiers will form ranks, allowing one line to fire while two others reload."
 oda_uninspiring_clan:0 "Uninspiring Clan"
 oda_uninspiring_clan_desc:0 "Despite having an illustrious lineage, our clan is not considered particularly relevant, threatening, or interesting to outsiders. Their underestimation of our strength and cunning will soon prove to be their undoing..."
 offensive_army:0 "Offensive Army"
 offensive_army_desc:0 "The era of gunpowder and military innovations is upon us, and with it comes a renewed interest in and vitality to the conduct of warfare. To further our glory, we must diligently ensure high standards for our offensive armed forces."
 offerings:0 "offerings"
 offerings_desc:0 "It is a precept of $buddhist$ to make offerings to the $three_jewels$ in order to accumulate merit. These offerings may be material or non-material, and some monastic communities depend completely on food donated by their followers for their survival."
 offerings_to_the_moirai_advance:0 "Offerings to the Moirai"
 offerings_to_the_moirai_advance_desc:0 "Each year a portion of our ritual offerings is dedicated to the three Moirai, the Fates who govern destiny itself. Clotho the Spinner, Lachesis the Alloter of life's portion, and Atropos the inevitable end preside over the completion of every mortal life according to the cosmic order. In many theological traditions their authority is considered primordial, sometimes even surpassing that of the gods."
 ogs_improvment_of_nakasendo:0 "Improving the Nakasendō"
 ogs_improvment_of_nakasendo_desc:0 "The Nakasendō is one of the most important routes between central and eastern $japan_region$. Controlling it also means controlling the trade that flows through it."
 ogs_kiso_uma:0 "Kiso-Uma"
 ogs_kiso_uma_desc:0 "Horses from the Kiso area are our preferred breed. They are not as high nor as fast as other types, but they make up for it with high stamina, and are sturdy enough to survive in the mountains."
 ogs_ogasawara_ryu:0 "Ogasawara-Ryū"
 ogs_ogasawara_ryu_desc:0 "Traditional forms of many things are highly valued in our society. We have formalized the official system of martial arts and etiquette for samurai since the founder of our clan, Ogasawara Nagakiyo, originally developed a special school, where all samurai should go to learn the proper techniques."
 ogs_shinano_shugo:0 "$shinano_province$ Shugo"
 ogs_shinano_shugo_desc:0 "Our clan belongs to a sub-branch of the Minamoto, and rules $shinano_province$ Province as its #italic Shugo#!. Our land is mountainous and unwelcoming to many. For our people, however, it has for a long time been an integrated part of our defenses against outsiders. Let us take this experience with us wherever our armies go, and make sure to always obtain thorough information about the terrain in any region where we do battle."
 oktoechos:0 "Oktōēchos"
 oktoechos_desc:0 "An eight-mode system of writing music, the $oktoechos$ has been the system used for writing religious chants and music for the Church for centuries. It is the foundation of $orthodox_ADJ$ chant, although with some variations between cultures."
 omani_ambition:0 "Land Isolation"
 omani_ambition_desc:0 "Despite not being an island, our land is factually isolated from the rest of $arabia_region$ due to the surrounding deserts. As such, we have learned how crucial it is to have access to the sea, and how useful it will be for us if we take that option away from our enemies."
 omani_heritage:0 "Control of the Gulf"
 omani_heritage_desc:0 "Our sailors are used to navigating far and wide upon the seas, but control of the gulf surrounding us is what allows such travels. We must always stand ready to defend our waters against any foreign threat."
 omani_tradition:0 "Gulf of $OMA$"
 omani_tradition_desc:0 "Our nation is at the back of the ample and hostile deserts of $arabia_region$, but the sea to our east allows us to circumvent them. It is by sea, not by land, that we will need to perform our diplomacy, trade, and expansion."
 on_hubris_and_morality_advance:0 "On Hubris & Morality"
 on_hubris_and_morality_advance_desc:0 "The principles of our faith originate from the will of the gods and are interpreted through priests, seers, and acts of divination. Through prophecy and sacred interpretation mortals attempt to understand the divine order of the cosmos. Yet the surest path to moral virtue remains piety, reverence, and the careful avoidance of destructive hubris."
 onmyodo:0 "Onmyōdō"
 onmyodo_desc:0 "Coming from $china$ centuries ago, the theories of Yīn and Yáng evolved in $JAP$ into $onmyodo$. Expert practitioners, called #italic onmyōji#!, deal with the purification and exorcism of evil and vengeful spirits, as well as with divination, astronomy, and the study of nature."
 open_levy_standards:0 "Open Levy Standards"
 open_levy_standards_desc:0 "What makes a man willing to fight and die for his country? Is it his faith? Loyalty to his nation? Or is it simply a desire to protect his family? In the end, the answer does not matter, as everyone has the duty of serving under our banner."
 open_sea_exploration:0 "Overseas Exploration"
 open_sea_exploration_desc:0 "The vast seas promise us great riches and new opportunities for trade on distant shores."
 opera_house_advance:0 "Opera House"
 opera_house_advance_desc:0 "$opera_house_desc$"
 optimism:0 "optimism"
 optimism_desc:0 "Victory is not just won on the battlefield, but also in the drawing rooms. Our advancement of reason helps our people shrug off the effects of temporary setbacks, and prepare instead for our inevitable victory."
 orang_laut:0 "Orang Laut"
 orang_laut_desc:0 "Long before our rise, the Orang Laut roamed the straits as masters of wind and tide. Now, by learning their ways and employing a select few, we guide traders through the narrow waters and shield our coast from pirates. Such vigilance ensures that all who sail to $malacca$ arrive safely."
 order_headquarters_advance:0 "$order_headquarters$"
 order_headquarters_advance_desc:0 "Establishing loyal Orders will undoubtedly increase our local defensive capabilities and make it easier to recruit able-bodied fighters."
 organised_construction:0 "Organized Construction"
 organised_construction_desc:0 "Upgrading our government's infrastructure is a costly business. However, if we structure the process correctly, we can do it for less expense."
 organised_mercenary_payment:0 "Organized Mercenary Payments"
 organised_mercenary_payment_desc:0 "Mercenary captains are a canny lot. They will try to coax two commanders in the same army into a bidding war over their services. We must streamline our mercenary recruitment process to prevent this sort of trickery, and to ensure we are always in the best position during negotiations."
 organised_mercenary_recruitment:0 "Mercenary Recruitment"
 organised_mercenary_recruitment_desc:0 "Money is not the only limiting factor when it comes to recruiting mercenaries. The other bottleneck is finding mercenary companies who actually wish to serve with us. Thus, we must ensure our system allows every company to join us."
 organized_religion:0 "Improved Religious Organization"
 organized_religion_desc:0 "Religion plays a major role in every society, yet not every faith has the same structure. An organized religion has its rituals and belief systems systematically arranged, and follows defined doctrines."
 ori_anka_year_system:0 "Anka Year System"
 ori_anka_year_system_desc:0 "The #italic Anka#! system is our method of documenting the regnal years of our rulers. Years ending in 6 or 0 are skipped, except for year 10, which is retained. The count begins at year 2, not year 1, and always starts on the #italic Sunia#!, our fiscal new year."
 ori_bulwark_of_the_hindu:0 "Bulwark of the $hindu$"
 ori_bulwark_of_the_hindu_desc:0 "The $muslim_ADJ$ faithful have invaded $india$ and subjugated many $hindu_ADJ$ residents under their gruesome rule. Yet, $ORI$ stands unflinching against the warriors of $muslim$. We are the bulwark of $hindu$, and we shall defend our traditions and culture against any foreign invader!"
 ori_encourage_salt_trade:0 "$salt$ Trade"
 ori_encourage_salt_trade_desc:0 "The high-quality $salt$ of $ORI$ is in demand all over $india$. Let us do whatever we can to encourage the $salt$ trade so that we may grow rich from it."
 ori_expansion_of_infrastructure:0 "Expansion of Infrastructure"
 ori_expansion_of_infrastructure_desc:0 "As technology advances, so does the number of people in our realm. Industrialization has driven significant population growth, and as such, we must expand our infrastructure to accommodate these growing communities."
 ori_lord_of_elephants:0 "Gajapati"
 ori_lord_of_elephants_desc:0 "Horses are not native to $ORI$, and the lands here are unsuitable for raising them. Our jungles are, however, famously teeming with elephants. In the dense jungles of Eastern $india$, well-executed tactical cooperation between elephants and infantry can be just as deadly as a cavalry. Let us further increase the size of our elephant corps and refine their tactics, so that we will be known as a true #italic Gajapati#!, 'Lord of the Elephants'."
 ori_odia_militarization:0 "Odia Militarization"
 ori_odia_militarization_desc:0 "The $muslim_ADJ$ threat never ceases, nor does it ever rest. We must ensure our military is ready to face and combat invaders at any and all times."
 ori_parikshas:0 "Parikshas"
 ori_parikshas_desc:0 "$ORI$ has long been divided among many different princes, but their time is over! We will take control of these lands, and appoint regional governors — #italic parikshas#! — instead of allowing these petty princelings to dilute our imperial authority."
 ori_patronize_temple_construction:0 "Patronized Temple Construction"
 ori_patronize_temple_construction_desc:0 "The glory of past dynasties is reflected by the grandeur of the temples they left behind. We should improve our many magnificent temple complexes, and construct new ones to further the development of Kalinga architecture."
 ori_refined_cloth_production:0 "Refined $cloth$ Production"
 ori_refined_cloth_production_desc:0 "$ORI$ has been famous for its high-quality textiles since ancient times. Let us further encourage the textile guilds of $ORI$ to refine their methods of producing their fine Kalinga $cloth$."
 ori_servitor_of_jagganath:0 "Servitor of Jagannath"
 ori_servitor_of_jagganath_desc:0 "Worship of Jagannath, the Lord of the Universe, is what unites our people. Previous rulers of $ORI$ were even considered to be the scions of Jagannath. Our current ruler might not be one of his descendants, but we must imprint on all that our leader is the servitor of Jagannath, and that any disobedience to them equals treason against Lord Jagannath himself."
 origin_of_coffee:0 "Origin of $coffee$"
 origin_of_coffee_desc:0 "It is from our lands that $coffee$ comes, as we have the perfect growing conditions. While it can be cultivated in other places, ours is revered for its quality and exported by the ton. We have to make this a way to channel wealth into our nation."
 original_christianity:0 "Original $christian$"
 original_christianity_desc:0 "There have been many schisms and divisions in the $christian_ADJ$ world, but our creed traces its roots on the original true $christian$ formulated from the First Council of Nicaea. Every split from the main branch after this is mere heresy."
 orm_a_vast_emporium:0 "A Vast Emporium"
 orm_a_vast_emporium_desc:0 "It has been said that $ORM$ is 'a vast emporium where there were peoples and goods of every description from all parts of the world' or that 'If all the world were a golden ring, $ORM$ would be the jewel in it'. Our realm's identity is inseparable from commerce. Indeed, ships from $gujarat_area$, $arabia_region$, and even $CHI$ anchor in our ports, exchanging spices, $gems$, $silk$, and stories."
 ormuzi_navy:0 "The $ORM_ADJ$ Navy"
 ormuzi_navy_desc:0 "The $persian_gulf$ is crossed daily by our fleets — be they traders, patrols, or armed escorts. But to match the ambitions of those who envy our position, we must expand and modernize. Let $ORM$ become more than just a trading post: a maritime arsenal."
 ostentatious_clothing:0 "Ostentatious Clothing"
 ostentatious_clothing_desc:0 "It is the right and duty of the ruling classes to display their power through their appearance. As such, they are wearing increasingly flamboyant attire, making use of the latest techniques to achieve vibrant and luxurious colors and patterns."
 ostrog_advance:0 "$ostrog$"
 ostrog_advance_desc:0 "$ostrog_desc$"
 otm_christian_conversion:0 "$christian_ADJ$ Converts"
 otm_christian_conversion_desc:0 "Our increasing interactions with foreigners have sparked an interest in $christian$ for many in our clan. The $christian_ADJ$ people have many powerful advocates among our lords and vassals, and few are as zealous as recent converts. Let us make good use of these $christian_ADJ$ converts, regardless of which route our own clan takes, and use their influence and zeal to further our own agenda."
 otm_domination_of_kyushu:0 "Domination of Kyūshū"
 otm_domination_of_kyushu_desc:0 "We have been designated #italic Shugo#! of $bungo_province$, $hizen_province$, and $hyuuga_province$. This positions us perfectly to claim all of Kyūshū for ourselves!"
 otm_lord_of_bungo:0 "Lord of Bungo"
 otm_lord_of_bungo_desc:0 "We have been the #italic Shugo#! of Bungo since the $kamakura$ era. These lands are known for their highly fertile soil, and the rich harvests from this region allow us to feed larger armies than many other $daimyo$ can support."
 otm_nanban_trade:0 "Welcoming the Nanban Trade"
 otm_nanban_trade_desc:0 "Others may denounce foreigners as barbarians, but we recognize the benefits and advantages of trading with them. Let it be known that they will always be welcome in our ports — and we will be able to expand our trade network further than our rivals."
 ottoman_bureaucracy:0 "Birûn"
 ottoman_bureaucracy_desc:0 "The #italic Birûn#!, or the Exterior Service, comprises the group of administrators, military officers and religious scholars just outside the ruler's personal inner circle. Together, they make up an efficient bureaucracy inherited from $IRA$ and the Great Seljuks, but adapted further by elements from $BYZ$, making it uniquely $TUR_ADJ$ indeed."
 ottoman_tax_farming:0 "Muqāta'ah"
 ottoman_tax_farming_desc:0 "A system of tax farming where nobles purchase the right to collect revenue from parcels of land owned by the state. $ottoman_tax_farming$ balances the distribution of wealth across the empire, and turns the nobility away from corruption, giving them a vested interest in supporting the state."
 ottoman_waystations:0 "Menzil"
 ottoman_waystations_desc:0 "A complex system of supply depots and lodgings for use by soldiers and officials, #italic menzil#! waystations allow our armies to rely less on plunder, and remain well-supplied on every frontier."
 ouc_descendant_of_baekje:0 "Descendants of Baekje"
 ouc_descendant_of_baekje_desc:0 "Our chronicle says we are descendants of Prince Imseong of the royal house of the ancient Baekje Kingdom, which once ruled in $korea_region$. This legendary connection means we hold a prestigious position in $east_asia$."
 ouc_fight_against_wokou:0 "Countering Piracy"
 ouc_fight_against_wokou_desc:0 "In order to retain good relations with nations on the continent for the sake of our traders, we must mount constant sea patrols. As long as pirates and smugglers are common in our waters, foreigners will not trust us, and may even act against us."
 ouc_korea_trade:0 "Trade with $korea_region$"
 ouc_korea_trade_desc:0 "Due to our location, we are the clan trading most actively with $korea_region$, and as a result we have a near-monopoly on many exotic goods. We must do what we can to retain this favorable position, and leverage it to out-compete any upstart that might challenge us."
 ouc_welcome_missionaries:0 "Welcome the Westerners"
 ouc_welcome_missionaries_desc:0 "As our trade network expands, we come in more frequent contact with foreigners and their strange habits and faiths. Regardless of what they believe, their coin is good enough; we should appear to be open to their ideas as we are to their business if we wish to secure repeat commerce."
 outwards_expansion:0 "Outwards Expansion"
 outwards_expansion_desc:0 "It is the holy duty of the Church to bring the light of Christ to the pagan and the infidels. We must go beyond our borders to carry salvation to every lost soul!"
 overnight_army:0 "An Army Overnight"
 overnight_army_desc:0 "Our capital and other cities are built using army camps as a model. They have wings, vanguards, and fronts. In ensuring that military thinking permeates daily life, we will improve our overall combat readiness."
 oversea_missions:0 "Overseas Missions"
 oversea_missions_desc:0 "Our clergy is ready and willing to spread our faith into new territories overseas. With their contribution, settling new lands will be made easier and cheaper."
 overseas_exploration:0 "Fortune-Seekers"
 overseas_exploration_desc:0 "Establishing colonies in distant lands is nearly always a one-way trip for those involved. Even if strange new diseases do not take you or unforgiving terrain does not starve you, the amount of time it takes to sail back means you will most likely never come home. While these realities are discouraging to some, if we remind people of the potential riches to be gained from colonial life, we can encourage them to settle lands further afield despite the dangers."
 overseas_merchants:0 "Overseas Merchants"
 overseas_merchants_desc:0 "To expand trade, we need to extend the rights of citizenship to people who live abroad, support our trade, and are of the right social class."
 overseas_trade:0 "Overseas Trade"
 overseas_trade_desc:0 "News of the discovery of distant lands has reached our nation, and our merchants are already preparing to expand their trading operations. These unexplored territories are filled with prosperous markets dripping with wealth, like so much ripe fruit waiting to be collected."
 pacify_population_advance:0 "Keep Agitators in Check"
 pacify_population_advance_desc:0 "At some point, people may be discontent with our leadership — it is practically unavoidable. However, these grumblings will not grow into anything major as long as we do not let them fester. If we actively seek out those who raise their voices against us, we can nip any agitation in the bud before they have the chance to rally others around them, and thus keep the general populace content. Or at least complacent."
 paik_regiments_advance:0 "$a_paik_infantry$"
 paik_regiments_advance_desc:0 "$a_paik_desc$"
 paik_system_advance:0 "$paik_system$"
 paik_system_advance_desc:0 "$paik_system_desc$"
 pal_a_just_ruler:0 "A Mild and Calm Ruler"
 pal_a_just_ruler_desc:0 "The only effect of bloodshed is to cause further bloodshed. Therefore, we need to be a forgiving ruler, and reconcile with our enemies to establish a lasting peace in our territories."
 pal_bilbiotheca_palatina:0 "Protect the #italic Bibliotheca Palatina#!"
 pal_bilbiotheca_palatina_desc:0 "Rich in theological scriptures of several $christian_ADJ$ denominations, the #italic Bibliotheca Palatina#! is one of our most prized possessions. Protection of the knowledge and the cultural value contained within must be a high priority, so that we are able to keep relying on its documents."
 pal_castles_on_rhine:0 "Castles on the Rhine"
 pal_castles_on_rhine_desc:0 "By erecting multiple castles in key positions along the Rhine, we will be able to exert and expand our control over both the river and the trade flowing through it."
 pal_cultivate_vineyards:0 "Vineyards and Orchards of the Rhine"
 pal_cultivate_vineyards_desc:0 "Although our territory is small, the sunny banks of the Rhine are perfectly suited to cultivate vineyards and orchards. With some effort, these could sustain our local economy by producing wine."
 pal_fractured_territory:0 "Consolidate the Territories"
 pal_fractured_territory_desc:0 "Our administration is skilled in handling multiple disconnected territories without losing our grasp on them. With that, we can build a strong bureaucracy capable of handling even the most difficult tasks."
 pal_heaven_of_tolerance:0 "Palatinate Tolerance"
 pal_heaven_of_tolerance_desc:0 "No matter their denominations, all $christian_ADJ$ people must be welcomed in the towns and cities of our lands. While others may decide to suppress their religious minorities, our tolerance will ensure a steady stream of immigrants into our territory, and we shall benefit from their presence."
 pal_heidelberg_catechism:0 "Heidelberg Catechism"
 pal_heidelberg_catechism_desc:0 "The Reformation has created many discussions around the nature of our faith. We should invest into a comprehensive catechism, to which our people will be able to adhere."
 pal_humanist_court:0 "Humanist Education"
 pal_humanist_court_desc:0 "To govern well, our rulers must receive a comprehensive education in humanist ideas. To this effect, we must hire renowned humanists for the education of our rulers and heirs, while also focusing our court on these principles."
 pal_mildness_to_the_commoners:0 "Forgiveness for Peasants"
 pal_mildness_to_the_commoners_desc:0 "When our peasantry rises up against our nobility, they unmistakably rise up against our own rule. However, we should not excessively punish those who revolt. With mild consequences, everyone will be more in alignment with our authority."
 pal_palatine_lion:0 "Palatine Lion"
 pal_palatine_lion_desc:0 "Originating from the dynastic coat of arms of the Wittelsbach family, the Palatine Lion is the centerpiece of our legitimacy. Displayed with a red crown, it signifies our role as the Imperial Vicar and Arch-Steward of the Holy Roman Empire. As long as the Palatine Lion is proudly displayed on our crest, our legitimacy will not come into question."
 pal_protection_of_exclaves:0 "Local Fortification"
 pal_protection_of_exclaves_desc:0 "By virtue of having our territories disperse, we are vunerable to attacks from several foreign powers. Constructing many fortified outposts within our lands will buy us time to raise an army and repel any attempt to take over one of our many disconnected territories."
 palatinate_romanticism:0 "Support the Romantic Movement"
 palatinate_romanticism_desc:0 "A significant part of the Romantic movement is centered around $heidelberg$. We should capitalize on this phenomenon, and support these and other artists in order to bolster our global recognition."
 pali_canon:0 "$pali_language$ Canon"
 pali_canon_desc:0 "Although there are many different canons in $buddhist$, depending on the school, the $theravada_ADJ$ $pali_canon$ is the oldest and most prestigious. Other schools have created their canons from a mix of texts with various sources, but the $pali_canon$ has remained unchanged since the times of Ashoka 'the Great', and contains the words of the Buddha himself. It has also served as the foundation of many other schools."
 palm_tree_masters:0 "Palm Tree Masters"
 palm_tree_masters_desc:0 "We may not have a very robust manufacturing industry, but one thing we do have in abundance are palm trees. Sturdy enough to support construction and shipwrighting, but flexible enough to be shaped by our artisans, mastering the use of this unique lumber will help us expand our seafaring activities, improve production, and ultimately line our pockets."
 pan_amalgamation_advance:0 "Pan Amalgamation"
 pan_amalgamation_advance_desc:0 "The $pan_amalgamation_advance$ is an improvement of the $patio_process_advance$ that speeds up processing."
 pan_asian_trade:0 "Pan-Asian Trade"
 pan_asian_trade_desc:0 "Sunda lies at the crossroads of great empires: $india$, $CHI$, and the Islamic world. By positioning ourselves as an indispensable node in this network, we secure access to goods, ideas, and partners across $asia$ turning our harbors into gateways of prosperity."
 pap_head_of_the_church:0 "Head of the Church"
 pap_head_of_the_church_desc:0 "The Curia and the Holy See are tightly intertwined with the $PAP_ADJ$ government. Cardinals from other nations and states might try to influence the theological trends of $christian$, but in the end, the $game_concept_pope$ will always have the most influence in the Curia."
 pap_legacy_of_the_military_orders:0 "Legacy of the Military Orders"
 pap_legacy_of_the_military_orders_desc:0 "Although the era of Holy Orders has long come to its end, its legacy still remains a major inspiration for the soldiers of God who pledge to defend the Holy See from heathens and heresy."
 pap_the_word_of_the_lord:0 "The Word of the Lord"
 pap_the_word_of_the_lord_desc:0 "As His most loyal servants; His holiest of bishops, it is we who read and interpret the Word of the Lord. As such, our diplomacy is backed by the divinity of God."
 papal_investiture_and_tithes:0 "$PAP_ADJ$ Investiture and Tithes"
 papal_investiture_and_tithes_desc:0 "Into $rome$ flows the riches of $christian_ADJ$ $europe$."
 paper_guild_advance:0 "Paper Guild"
 paper_guild_advance_desc:0 "$paper_guild_desc$"
 paper_guild_cloth_maintenance_advance:0 "$paper_guild_cloth_maintenance$"
 paper_guild_cloth_maintenance_advance_desc:0 "$paper_guild_cloth_maintenance$, made from cotton unfit to be processed or otherwise used, set new standards for quality and durability."
 paper_guild_fiber_pulp_maintenance_advance:0 "$paper_guild_fiber_pulp_maintenance$"
 paper_guild_fiber_pulp_maintenance_advance_desc:0 "Utilizing fiber plants like hemp or paper mulberry, paper production will become widely available across the world. While cheap to produce, this paper is lacking in quality."
 paper_guild_wood_pulp_maintenance_advance:0 "$paper_guild_wood_pulp_maintenance$"
 paper_guild_wood_pulp_maintenance_advance_desc:0 "Using widely available softwood, paper will be easier and cheaper to produce than ever before."
 paper_manufactory_advance:0 "$paper_manufactory$"
 paper_manufactory_advance_desc:0 "$paper_manufactory_desc$"
 paper_mill_advance:0 "$paper_mill$"
 paper_mill_advance_desc:0 "$paper_mill_desc$"
 paper_workshop_advance:0 "$paper_workshop$"
 paper_workshop_advance_desc:0 "$paper_workshop_desc$"
 partition_inheritance_advance:0 "Partition Inheritance"
 partition_inheritance_advance_desc:0 "Rivalries among royal offspring are not uncommon, as each one would like to be the ruler one day. To avoid such in-fighting, some monarchs choose to divide their territories and titles among all their sons, so that all of them are satisfied with a more or less equal share of the inheritance."
 paschal_cycle:0 "Paschal Cycle"
 paschal_cycle_desc:0 "$orthodox$ contains some movable feasts around #italic Pascha#!, Easter, organized in the $paschal_cycle$. The ten weeks before Pascha are called #italic Triodion#!, while the fifty days after Pascha are called #italic Pentekostárion#!. This cycle marks the most important celebrations in the liturgical year."
 pat_the_church_state_of_saint_andrew_advance:0 "The Church-State of Saint Andrew"
 pat_the_church_state_of_saint_andrew_advance_desc:0 "As the spiritual heart of the Frankokratia, Patras has evolved into a sovereign ecclesiastical principality similar to the Prince-Bishoprics of the Holy Roman Empire. The Archbishop wields both the crozier and the sword, ruling his lands through a #italic Synod of Defense#! that merges religious law with feudal military obligation. This unique status allows us to mobilize the peasantry through religious fervor, viewing every border skirmish as a localized Holy War."
 pat_the_patrine_mint_advance:0 "The Patrine Mint"
 pat_the_patrine_mint_advance_desc:0 "Patras has secured the right to mint its own coinage, the #italic Patrine Soldo#!, which is recognized for its stable value across the Aegean. By acting as the central bank for the Frankish Morea, the Archbishop exerts a powerful economic influence over secular lords. We control the pulse of trade through the purity of our silver."
 pat_the_pilgrimage_tolls_advance:0 "The Pilgrimage Tolls"
 pat_the_pilgrimage_tolls_advance_desc:0 "The purported relics of Saint Andrew attract thousands of Catholic pilgrims who seek safety in the East, and we have established a network of fortified 'Hospices' to protect them. By charging a modest 'Protection Fee' for passage and lodging, the Archbishopric funds the maintenance of a standing army of Crusader-Monks. These funds are also used to beautify the city, making Patras the 'Rome of the East' and a beacon of Latin architecture."
 pat_the_port_of_sanctuary_advance:0 "The Port of Sanctuary"
 pat_the_port_of_sanctuary_advance_desc:0 "Our ports have been declared 'Neutral Holy Ports', where merchants of all nations — Catholic, Orthodox, or otherwise — may trade in safety. This sanctuary status has turned our ports into the primary neutral ground for Mediterranean commerce. Even in times of total war, the trade of Patras continues to flow, protected by the Archbishop's ban."
 pat_the_seminary_of_diplomats_advance:0 "The Seminary of Diplomats"
 pat_the_seminary_of_diplomats_advance_desc:0 "The Archbishop has established a school to train clergy in the art of international negotiation and secret correspondence. Our 'Black-Robed Diplomats' serve in the courts of Europe as the eyes and ears of the Latin East. This clerical intelligence network gives Patras a level of geopolitical influence that rival kingdoms envy."
 pat_uniate_liturgical_printing_advance:0 "Uniate Liturgical Printing"
 pat_uniate_liturgical_printing_advance_desc:0 "To counter the influence of the Orthodox world, the Archbishop has established the first Greek-language Catholic printing press in the Peloponnese. We produce bibles and liturgical texts that use the Greek language but adhere to Latin dogma, slowly winning the 'War of the Word' among the literate Greek classes. This cultural offensive reduces the risk of rebellion and integrates the Greek population into the Latin social hierarchy without stripping them of their linguistic heritage."
 patio_process_advance:0 "Patio Process"
 patio_process_advance_desc:0 "The $patio_process_advance$ consists is a method of refining low quality silver and gold ores with a chemical solution based on mercury to catalyze the amalgamation reaction."
 patriarchate_of_lithuania:0 "Patriarchate of $LIT$"
 patriarchate_of_lithuania_desc:0 "The abolition of $romuva$, a faith embraced by our ancestors, has shaken the very foundations of $LIT_ADJ$ society. Yet, in order to secure a brighter future, we have chosen the path of $orthodox$ and fully celebrate our new identity. But if we are to be successful in that, the religious authorities of our newfound $orthodox_ADJ$ faith must maintain autonomy from foreign patriarchates in order to avoid external interference."
 patron_of_art:0 "Patron of the Arts"
 patron_of_art_desc:0 "Our quest towards cultivating a culturally sophisticated society begins here. Our artistic creations will go down in history as the most marvelous wonders of this era."
 patron_of_music:0 "Patron of Music"
 patron_of_music_desc:0 "The musical arts have been sadly neglected by other princes. We, by contrast, shall patronize music for the glory of God and ourselves, and $MLO$ will shine as a result."
 paved_road_advance:0 "$paved_road$"
 paved_road_advance_desc:0 "$paved_road_desc$"
 peasant_connections_advance:0 "Peasant Connections"
 peasant_connections_advance_desc:0 "Our merchants have established connections to the rural settlements within and beyond our borders. As a result, they are able to secure better prices for food than would otherwise be expected."
 peasants_rights_laws_advance:0 "$peasants_rights_laws$"
 peasants_rights_laws_advance_desc:0 "$peasants_rights_laws_desc$"
 peel_towers_advance:0 "Peel Towers"
 peel_towers_advance_desc:0 "Peel Towers were developed to mitigate the dangers of life in our borderlands. They serve as protection against incursions of hostile raiding parties, sheltering both people and valuable livestock, and are a fast way to alert neighboring towns of approaching hostile armies by being a high place to light signal fires."
 people_of_allah:0 "People of $muslim_god_name$"
 people_of_allah_desc:0 "We are the followers of $muslim_god_name$, the only true God, and abide by His Word. All those who believe in Him are our brothers and sisters in His eyes."
 people_of_ornaments:0 "People of Ornamentation"
 people_of_ornaments_desc:0 "Our artisans are renowned far and wide, and it is said that they cannot leave a surface undecorated. Let us make the most of this reputation, and promote their creations as much as possible."
 people_of_the_sea:0 "People of the Sea"
 people_of_the_sea_desc:0 "We are a people shaped by wind and tide. From childhood, we learn the ways of the monsoon, the pulse of the straits, and the call of the open ocean. Our sailors carry this knowledge into every voyage, earning renown across the archipelago for their courage and mastery."
 people_of_war:0 "People of War"
 people_of_war_desc:0 "Whether we take up arms on a search for prestige, to instill fear in our foes, to take captives for sacrifice,  or simply to acquire wealth, our people are accustomed to a continuous state of warfare, enduring its hardships with more resilience than members of other nations."
 pepper_of_the_parahyangan:0 "Pepper of the Parahyangan"
 pepper_of_the_parahyangan_desc:0 "The fertile volcanic soil of the Sundanese highlands is perfect for growing the prized spice, black pepper. Traders from across the world seek our peppercorns for their potency and aroma. We must capitalize on this natural treasure to expand our influence through spice."
 perfumery_advance:0 "Perfumery"
 perfumery_advance_desc:0 "$perfumery_desc$"
 perpetual_general_captain_of_the_people:0 "Perpetual General Captain of the People"
 perpetual_general_captain_of_the_people_desc:0 "In the shifting politics of medieval $VER$, the title of 'Capitano del Popolo' came to embody more than a ceremonial office — it became a lasting claim to leadership. Rooted in civic tradition and claimed by the Scaligeri to legitimize their power, it gave permanence to their rule in a city where loyalty was hard-won."
 persian_in_the_court:0 "$IRA_ADJ$ in the Court"
 persian_in_the_court_desc:0 "Persian has served as our administrative language for quite some time, a legacy stemming from our ancient roots. This has helped us transcend the social and cultural barriers that often arise in highly diverse nations like ours."
 personal_executions:0 "Personal Executions"
 personal_executions_desc:0 "From now on, the most heinous criminals will be executed personally by the ruler. With this, people will know that we are an orderly nation committed to justice, and they will show the appropriate obedience to the law."
 pest_house_advance:0 "$pest_house$"
 pest_house_advance_desc:0 "$pest_house_desc$"
 pharmacology_advance:0 "Pharmacology"
 pharmacology_advance_desc:0 "Alchemists and physicians are exploring new compounds and chemical mixtures in their search for remedies. Some of these early pharmacists have developed treatments for common illnesses like fevers, colds, and digestive problems, and their methods show promise for the future. However, there is still much to be learned, and many of these new remedies can be dangerous if not prepared correctly."
 photduang:0 "photduang"
 photduang_desc:0 "Our currency may feel strange to outsiders, but #italic $photduang$#! have served us well for centuries. Roundish balls of silver and stamped with official marks, they serve as the basis of our economy."
 physical_body_of_christ:0 "Physical Body of Christ"
 physical_body_of_christ_desc:0 "Our Church is the physical manifestation of the Body of Christ on Earth, having no difference from the one in Heaven. As such, the Church is the physical embodiment of the Lord Savior, sent for the benefit of His people."
 pike_and_shot_advance:0 "Pike and Shot"
 pike_and_shot_advance_desc:0 "A new type of warfare has emerged on the battlefield: Pikemen form a defensive square, while arquebusiers fan out to the sides and front, retreating behind or inside the square in case the formation enters close combat."
 pike_square:0 "Pike Square"
 pike_square_desc:0 "Throughout the Middle Ages, the dominance of cavalry was challenged by disciplined pikemen. In battles such as Bannockburn or the Golden Spurs, the pikemen decimated the cavalry. A combination of improved training and discipline, and the addition of swordsmen to provide close combat support, has raised this formation to the peak of its efficiency."
 pioneer_spirit:0 "Pioneer Spirit"
 pioneer_spirit_desc:0 "In days gone by, our people would brave the high seas to establish colonies on distant shores. Let us rekindle this adventurous spirit in our people so that they sail forth again!"
 piqure_de_marseilles:0 "Piqûre de $marseille$"
 piqure_de_marseilles_desc:0 "Across the workshops of $marseille$, artisans stitch delicate #italic boutis#! quilts in the $PRO_ADJ$ style — treasured across $europe$ for their quality and charm. Much like our duchy, works of art created in our realm are composed of many parts stitched into a unified whole: a quilted land, rich in texture and culture."
 pis_anziani_del_popolo:0 "Anziani del Popolo"
 pis_anziani_del_popolo_desc:0 "The Council of the Elders was initially founded in an effort to pacify the rivalry between the $gherardesca_dynasty$ and $visconti_dynasty$ families. It has influenced who controls and governs the republic since it was established."
 pis_maritimes_legacy:0 "Maritime Republic Legacy"
 pis_maritimes_legacy_desc:0 "For centuries, $PIS$ was one of the dominant powers in the Mediterranean, massively influential and in control of an impressive trading network. While we may currently be but a shadow of the great $PIS$ of the past, our legacy remains. $PIS$ remembers."
 pis_the_university_of_pisa:0 "The University of $PIS$"
 pis_the_university_of_pisa_desc:0 "One of the oldest centers for higher learning in $ITA$ and indeed all of $europe$, the University of $PIS$ has a near-legendary reputation for excellence in both teaching and research."
 plantation_buildings_advance:0 "Plantations"
 plantation_buildings_advance_desc:0 "The mild climate and abundant fertile lands of the New World make the Colonies the ideal location for producing very profitable crops like $sugar$ and $tobacco$."
 platoon_fire:0 "Platoon Fire"
 platoon_fire_desc:0 "Standard volley fire involved each rank delivering its volley in one go to maximize firepower. But we have developed a different system of firing by platoon, with the idea being that one part of the regiment would always be firing at the enemy while others reloaded and got ready for the next volley. This removed time between attacks that the enemy could use to recover or otherwise gain an advantage."
 ple_irish_viking_towns_advance:0 "Old Viking Towns"
 ple_irish_viking_towns_advance_desc:0 "The ancient trading ports founded by the Ostmen are still bustling hives of mercantile activity where the canny can get rich."
 ple_pale_defenseworks_advance:0 "Pale Works"
 ple_pale_defenseworks_advance_desc:0 "Our boundary is defined by light defensive works of dykes and palisades designed to deter our unruly neighbors from launching their irritating raids."
 plutocracy:0 "The Power of Coin"
 plutocracy_desc:0 "Wealth and power are not synonyms, but they are certainly related: Not only can power make someone wealthy, but wealth can also grant someone power. We understand that well, as our wealthiest members of the population are also the ones who occupy the seats of power in our country."
 pochtecayotl:0 "Pōchtēcayōtl"
 pochtecayotl_desc:0 "Traders travel far afield, to provinces well beyond the reach of our authority, and even to the territories of our rivals. If these traders were to, perhaps, also serve as our eyes and ears, what secrets might we learn?"
 poklisars:0 "poklisars"
 poklisars_desc:0 "Since the earliest days of our nation, we have often cast our gaze beyond our borders, be it to establish profitable trade routes, placate formidable neighbors and build alliances, or even to forge robust partnerships against common adversaries. #italic Poklisars#! are the ambassadors who carry out these missions in our name."
 polders_advance:0 "Polders"
 polders_advance_desc:0 "The Low Countries are highly susceptible to flooding, and the many disastrous floods that happened between the 11th and 14th centuries led to the creation of the Zuiderzee. This excessive flooding also caused coastal soils to become uselessly salinated. Thankfully, we now have the technology to reclaim this damaged land and use it productively for agriculture."
 polhem_machina_nova:0 "Machina Nova"
 polhem_machina_nova_desc:0 "Christopher Polhem, dubbed the 'father of $SWE_ADJ$ engineering, has transformed $SWE_ADJ$ industry with his #italic Machina Nova#!, an innovative array of mechanical systems designed to streamline and boost production. Using intricate systems of gears, cams, and water power, Polhem has developed several machines capable of performing tasks previously done by hand, from ore-crushing in mines to textile weaving and sawmilling."
 polish_renaissance:0 "$polish_group$ $renaissance$"
 polish_renaissance_desc:0 "Inspired by the ideals of the $ITA_ADJ$ $renaissance$, we are experiencing a cultural golden age. Our literary achievements, architectural splendors, and cultivated atmosphere of religious tolerance have all led to a blossoming of culture across our land."
 pomestnoe_voisko:0 "Pomestnoe Voisko"
 pomestnoe_voisko_desc:0 "By redistributing plots of confiscated lands to noble cavalrymen, we can build a new class of soldiers to defend our principality."
 pop_promote_actions_advance:0 "Social Ladder"
 pop_promote_actions_advance_desc:0 "It is said that chaos is a ladder for those seeking higher status. For us, this ladder comes not from chaos but from order, as we have systematized pathways allowing our people to improve their social standing through merit. We not only permit such advancement; we actively encourage it."
 pop_promotion_speed_age_2:0 "Favorable Social Mobility"
 pop_promotion_speed_age_2_desc:0 "The dream of most peasants — to escape poverty and climb the social ladder — is a reality within our society. By rewarding hard work, meticulousness, and the proper embodiment of our ideals, we will never have a shortage of capable and influential people."
 pop_promotion_speed_age_3:0 "Nobility by Service"
 pop_promotion_speed_age_3_desc:0 "Traditionally, our artistocrats achieved their status through military service to their ruler. However, the demands of a growing state now necessitate members of the lower nobility being promoted to higher ranks, while people from other classes, such as merchants, are elevated as nobles."
 pop_promotion_speed_age_4:0 "Confessional Clerics"
 pop_promotion_speed_age_4_desc:0 "The Age of Reformation and Confessionalism have renewed interest in organized confessions, and there is demand for more clerics willing to guide their flocks through these troublesome times. These confessional clergy make religious offices much more appealing to those people seeking certainty and spiritual guidance."
 pop_promotion_speed_age_5:0 "Bureaucratic Promotions"
 pop_promotion_speed_age_5_desc:0 "The bureaucracy is expanding to meet the needs of the expanding bureaucracy, which correspondingly increases our need for educated officials to join the administrative ranks."
 pop_promotion_speed_age_6:0 "Capitalist Social Mobility"
 pop_promotion_speed_age_6_desc:0 "The expansion of capitalism has given birth to a new age of social mobility, in which wealth is replacing the traditional hierarchies as means of determining social status. Everyone, from business moguls to clerks to industrial laborers, is eager to buy their way into the upper strata."
 populating_the_steppes:0 "Populating the Steppes"
 populating_the_steppes_desc:0 "Just as we bring destruction to our enemies, we must bring peace to the many who reside within our borders. By upholding internal stability and encouraging talented men and women from all over our empire to plan and populate new and great cities, we will tame the steppes."
 por_battle_ourique:0 "The Battle of $ourique$"
 por_battle_ourique_desc:0 "In 1139, our brave troops defeated five Moorish kings in battle. This feat shall live on eternally in the memories of our soldiers, and they can use it as inspiration to defeat any enemy, no matter how powerful or well-armed they are."
 por_bombardeiros:0 "Bombardeiros"
 por_bombardeiros_desc:0 "Technological advancements have helped us develop much more powerful cannon, but most ships' decks cannot support their weight. By reinforcing our ships, we will be able to carry more munitions, and our navies will be feared for their awesome firepower."
 por_cacadores:0 "Caçadores"
 por_cacadores_desc:0 "Nicknamed the #italic Fighting Cocks#!, the #italic Caçadores#! are an elite light infantry unit in the $POR_ADJ$ Army who wear brown uniforms to distinguish them from regular soldiers."
 por_colonial_governors:0 "Colonial Governors"
 por_colonial_governors_desc:0 "By sending our most capable administrators to govern our colonies and outposts, we will ensure that these settlements remain peaceful and loyal to their mother nation, while we sit back and watch the profits roll in."
 por_establishment_portuguese_navy:0 "Establishment of the $POR_ADJ$ Navy"
 por_establishment_portuguese_navy_desc:0 "King Dinis laid the foundations for the $POR_ADJ$ Navy when he appointed $GEN_ADJ$ merchant Manuel Pessanha, originally Pessagno, as admiral of the national fleet. Pessanha's missions were to defend $POR_ADJ$ shores from $muslim_ADJ$ pirate raids, and to create a powerful trade fleet."
 por_estimulate_rural_areas:0 "Stimulate Rural Areas"
 por_estimulate_rural_areas_desc:0 "Many places across our country, mainly in rural and remote regions, are becoming depopulated, with fields, forests, and mines falling into disuse. By reforming relevant aspects of our legal system, we will encourage people to remain in the countryside and restore its productivity."
 por_feitorias:0 "Feitorias"
 por_feitorias_desc:0 "Let us send forth our #italic feitors#! to all corners of the East, and establish our country as the dominant trading force in the $indian_ocean_region$. By creating a network of strong fortified trading posts along the coasts of $africa$ and $india$, we can dominate local trade without expending too many resources."
 por_ordenancas:0 "Ordenanças"
 por_ordenancas_desc:0 "Our nation needs a professional army to guard the sacred borders of our glorious nation. We will reform the conscription system and train our young recruits to fulfill that duty with honor."
 por_pursuing_waves:0 "Pursuing the Waves"
 por_pursuing_waves_desc:0 "It seems the land is not enough for part of our populace. Some people look at the sea and feel #italic saudade#!, as if it was a long-lost lover. The ports and docks bustle with eager sailors, all enrolling in expeditions as if they were drunk with a desire to explore the world. We will make great use of these eager seafarers."
 por_royal_absolutism:0 "Royal Absolutism"
 por_royal_absolutism_desc:0 "For too long, our royal authority has been hindered by hapless meddling from the nobility, whose narrow local interests threaten the greater good of the realm. We will ignore the Cortes entirely, and rule without their interference."
 por_royal_military_academy:0 "Royal Academy of Fortification, Artillery, and Drawing"
 por_royal_military_academy_desc:0 "Our artillery corps and fortifications have long been the key to defending our land, making our small country a tougher nut to crack for enemy armies. We shall establish a military academy — the #italic Academia Real de Fortificação, Artilharia e Desenho#! — to train our officers in these fields, so that they, in turn, may fashion our forts and our artillery corps into the finest in the world!"
 por_the_bandeirantes:0 "Encourage the Bandeirantes"
 por_the_bandeirantes_desc:0 "Sometimes, members of slave-raiding expeditions stumble across gold and other precious metals or stones. Spreading word of these valuable discoveries should pique the interest of hardy souls who might be willing to emigrate to our colonies in search of their fortunes."
 por_vinho_porto:0 "Vinho do $porto$"
 por_vinho_porto_desc:0 "On the banks of the Douro river, in the north of the country, grapes are cultivated to create a unique $wine$ fortified with spirits, which is famously known as #italic Port Wine#!. As we are the only nation producing this delightful intoxicant, we must not miss our chance to make scads of money from its export."
 porcelain_kiln_advance:0 "Porcelain Kiln"
 porcelain_kiln_advance_desc:0 "$porcelain_guild_desc$"
 porcelain_manufactor_advance:0 "Porcelain Manufactory"
 porcelain_manufactor_advance_desc:0 "$porcelain_manufactory_desc$"
 port_authority_advance:0 "Port Authority"
 port_authority_advance_desc:0 "$port_authority_desc$"
 port_cost_distance_from_capital_advance:0 "Experienced Captains"
 port_cost_distance_from_capital_advance_desc:0 "Not every scallywag is worthy of being a captain; only the most experienced and skillful of them will lead our vessels. Such salty seadogs should be capable of safely finding their way back to port even in the fiercest of storms."
 port_cost_distance_from_capital_choice_mil:0 "Coastal Patrols"
 port_cost_distance_from_capital_choice_mil_desc:0 "Maintaining regular patrols along all our coasts will ensure that our administrative authority is felt everywhere, even in the farthest regions."
 port_customs:0 "Port Customs"
 port_customs_desc:0 "Designating our ports as official merchant zones for incoming cargo is a move that will certainly increase the mercantile significance of our territory, albeit at the expense of our neighbors and foes alike."
 port_of_aden:0 "Port of Aden"
 port_of_aden_desc:0 "The port of Aden has been a nexus of trade for millennia — its natural harbor welcoming ships from $india$, $egypt_region$, and $east_africa$. If properly supported, it can once again become the cornerstone of our maritime economy and the pride of the Red Sea."
 port_security_improvement:0 "Port Security Improvements"
 port_security_improvement_desc:0 "To reap the full financial potential from trade, we need ships and any cargo they carry to be safe when docked in our ports. We must ensure that any areas that merchants consort in are free from petty crime."
 porto_franco:0 "Porto Franco"
 porto_franco_desc:0 "By opening our ports for business with foreign merchants and eliminating import dues, we are sure to accumulate more capital gains from our mercantile ventures."
 postal_service:0 "Postal Service"
 postal_service_desc:0 "With communications being what they are, it is difficult to ensure that our diplomatic dispatches arrive in a timely fashion. Creating a network of post offices and courier rest stops will make it easier for our voice to be heard in distant lands."
 potato_production:0 "Potato Production"
 potato_production_desc:0 "Since maize grows poorly in the high plateaus of our land, we have learned to rely instead on the highly nutritious roots of a local plant. With increased production, we can feed our people and our warriors with this easily maintained crop."
 pottery_manufactory_advance:0 "$pottery_manufactory$"
 pottery_manufactory_advance_desc:0 "$pottery_manufactory_desc$"
 pottery_mill_advance:0 "$pottery_mill$"
 pottery_mill_advance_desc:0 "$pottery_mill_desc$"
 pottery_workshop_advance:0 "$pottery_workshop$"
 pottery_workshop_advance_desc:0 "$pottery_workshop_desc$"
 pound_lock_canals_advance:0 "Pound Lock Canals"
 pound_lock_canals_advance_desc:0 "We have carved into the very face of Earth in order to gain access to food, affluence, and better circulation of goods. The invention of special gates, called 'Mitre Gates', will assist us in providing the necessities for our people to grow and prosper."
 power_projection_advance_1:0 "Imperial Ambitions"
 power_projection_advance_1_desc:0 "As the countries grew and states consolidated during the High Middle Ages, their ambitions also grew, leading to attempts at creating and recreating empires in their regions."
 power_projection_advance_2:0 "Supranational Ambitions"
 power_projection_advance_2_desc:0 "Although the old ideas about forging empires still linger in the minds of the rulers in this age, they have also begun to crystallize new ways of establishing their dominance over other countries and peoples."
 power_projection_advance_3:0 "Regional Ambitions"
 power_projection_advance_3_desc:0 "The ability to project power beyond our borders is of vital importance to maintaining relevance on the regional stage. By studying the strategies of great powers past and present, we can elevate our nation's prestige everywhere and leverage that reputation to exert power."
 power_projection_advance_4:0 "Domineering External Influence"
 power_projection_advance_4_desc:0 "Our presence at the diplomatic tables always conveys an air of grandeur and prestige. Our voice and influence shall resonate with all those with whom we engage."
 power_projection_advance_5:0 "Absolutist Ambitions"
 power_projection_advance_5_desc:0 "As state power becomes increasingly centralized, rulers across the world have begun to envision themselves as absolute sovereigns over their respective territories. Like the sun that illuminates the entire world, they seek to be the sole source of authority, their will extending unchallenged across every corner of their domain."
 power_projection_advance_6:0 "Global Ambitions"
 power_projection_advance_6_desc:0 "Consolidation of countries into bigger nations has resulted in the formation of major powers that dominate huge portions of their homelands, and have every intention of extending their power even further."
 powerful_statues:0 "Impressive Statuary"
 powerful_statues_desc:0 "A prosperous country is the true sign of a strong ruler, but the people will only believe that a ruler is strong if they are depicted as such. To that effect, many rulers commission statues of themselves, often made out of stone or bronze, to project an image of strength and power to any who look upon their rendered visages. However, these displays of ego are not always effective, and sometimes only result in great amounts of materials being moved around."
 preaching_friars:0 "Itinerant Preaching Friars"
 preaching_friars_desc:0 "Preaching friars — members of $mendicant_orders$ like the Dominicans and Franciscans — have taken their ministry beyond the monastery walls to preach directly among the people. By supporting and praising them openly for these acts of devotion, we can strengthen religious conviction throughout the realm, even among the most remote peasants."
 preaching_missions:0 "Preaching Missions"
 preaching_missions_desc:0 "Establish missionary expeditions that will ensure that our population worships the one true faith."
 precious_stones_art:0 "Precious Stone Carving"
 precious_stones_art_desc:0 "Our area is rich in precious stones, which are excellent for adding color, detail, and sparkle to artistic pieces and mundanities alike. Our craftsmen will immortalize themselves through these glittering jewels, and create great monuments to our culture."
 preobrazhensky_semyonovsky_imperial_guard:0 "Preobrazhensky Semyonovsky Imperial Guard"
 preobrazhensky_semyonovsky_imperial_guard_desc:0 "The 'Toy Army' is organized into elite companies, forming the Imperial Guard which protects the interests of the monarchy. They are frequently involved in court ceremonies, parades, and other significant events, showcasing their importance beyond their military duties."
 preserve_theogony_advance:0 "The Teachings of Theogony"
 preserve_theogony_advance_desc:0 "Hesiod's Theogony recounts the origins and genealogy of the gods, revealing the birth of the divine order itself. Through its verses, symbols of authority such as the scepter and the voice of rule are presented as sacred responsibilities. The work reminds rulers that true authority must be exercised through wisdom, moderation, and reason."
 preserver_of_national_identity:0 "Preserving National Identity"
 preserver_of_national_identity_desc:0 "It is because of our history of being persecuted and oppressed that our Church became responsible for preserving our identity. It is in the bosom of the Church where our languages and traditions have been kept safe, and therefore we have unshakeable faith in this institution."
 preserving_of_local_languages:0 "Preservation of Local Languages"
 preserving_of_local_languages_desc:0 "Despite the importance of $greek_language$ and $latin_language$ in early $christian$, $miaphysite$ has preserved its liturgy in more local vernaculars, like $coptic_language$, $aramaic_language$, and $armenian_language$. Venerable languages in their own right, each $miaphysite_ADJ$ branch preserves its own historical tongue."
 press_gangs:0 "Press Gangs"
 press_gangs_desc:0 "Life at sea is hard and unforgiving, and not everyone is keen on a naval career. By legalizing the impressment of sailors and other skilled seafarers, it will be easier to crew our ships, speeding up the process of commissioning ships as well."
 prester_john:0 "Prester John"
 prester_john_desc:0 "People from $europe$ have been looking for Prester John for centuries, and are convinced that our ruler has to be him, somehow, as we are fellow $christian_ADJ$ worshippers. There is no reason to point out that they are wrong, however, as they are now happy to share their ideas with us."
 prestigious_monasticism:0 "Prestigious Monasticism"
 prestigious_monasticism_desc:0 "In $orthodox$, monasticism and asceticism are highly valued and almost a requirement. Any bishop must be a monk first, and they must become a monk before being consecrated if they are not. As such, monasteries and monasticism centers have a big impact on our clerical life."
 prestigious_schools:0 "Prestigious Schools"
 prestigious_schools_desc:0 "$buddhist$ has developed into a myriad of schools, each one centered around one type of monastic community and declaring a preference for certain texts. However, some of these schools have gained recognition, while others have been relegated to obscurity. Associating with the more prestigious schools gives those people a bit of prestige as well."
 primacy_of_alexandria:0 "Primacy of $alexandria$"
 primacy_of_alexandria_desc:0 "Although $miaphysite$ has many branches and independent leaders, we recognize $alexandria$ and its seat as our spiritual leader. However, this is a sign of respect for the Apostolic Throne and a way to honor it, rather than a bestowal of any special prerogatives."
 principle_of_administration_law_advance:0 "Principle of Administration Law"
 principle_of_administration_law_advance_desc:0 "The natural evolution of our complex government dictates the adoption of new laws pertaining to our administration."
 print_culture:0 "Print Culture"
 print_culture_desc:0 "With the invention of the printing press, the spread of knowledge has never been easier. New techniques and advances will reach every corner of our nation and make it grow stronger and richer."
 printing_manufactory_advance:0 "$printing_manufactory$"
 printing_manufactory_advance_desc:0 "$printing_manufactory_desc$"
 printing_mill_advance:0 "$printing_mill$"
 printing_mill_advance_desc:0 "$printing_mill_desc$"
 printing_of_religious_texts:0 "printing_of_religious_texts"
 printing_of_religious_texts_desc:0 ""
 printing_press_advance:0 "Printing Press"
 printing_press_advance_desc:0 "The popularization of printing techniques this century has resulted in the wider spread of knowledge, as well as easier exchange of information, by speeding up the duplication of important manuscripts."
 printing_press_shop_advance:0 "$printing_press_shop$"
 printing_press_shop_advance_desc:0 "$printing_press_shop_desc$"
 private_to_marshal:0 "Private to Marshal"
 private_to_marshal_desc:0 "Every private has a marshal's baton in his back. Well, perhaps not exactly, but for those who distinguish themselves in battle, promotion and rewards will follow. The troops know this and are inspired by it."
 privateers:0 "privateers"
 privateers_desc:0 "Waging war on enemy commerce is at the apex of naval warfare. We shall encourage the crustiest, saltiest seadogs we can hire to strike at the heart of the enemy's trade, which should help refill our own coffers quickly."
 produktplakatet:0 "produktplakatet"
 produktplakatet_desc:0 "The decree forbids foreign ships arriving in $SWE$ to bring goods from countries other than their own or their colonies."
 professional_armies_advance:0 "Professional Armies"
 professional_armies_advance_desc:0 "The modernization of our armies is largely dependent upon the maintenance of our recruitment and organization centers. We must strive towards preserving a clear and robust military organization, cutting waste and redundancy."
 promote_estates_general:0 "Promote the États Généraux"
 promote_estates_general_desc:0 "$BUR$ is a feudal creation with various parts conjoined under different conditions, which has created strong local identities. By promoting a central assembly, we give a forum for these interests, promoting a smooth and uncontested rule."
 protect_the_new_faith:0 "Shield of the Faith"
 protect_the_new_faith_desc:0 "Our religion is beset on all sides by enemies. We will have to defend our rights to our own confession against the $catholic_ADJ$ oppressors."
 protected_harbor_advance:0 "$protected_harbor$"
 protected_harbor_advance_desc:0 "$protected_harbor_desc$"
 protectors_of_jerusalem:0 "Protectors of $KOJ$"
 protectors_of_jerusalem_desc:0 "We stand on the frontlines of Christendom, surrounded by unbelief. It is our sacred duty to shield the Holy City and strike fear into the hearts of heathens who would dare usurp it."
 protestant_administration_tax:0 "Efficient Tax Collectors"
 protestant_administration_tax_desc:0 "Previously, the clerics shouldered a significant portion of the tax burden. While some of these structures have been dismantled in the wake of the Reformation, the capable common people are still around, and thus must help make up for that missing clerical revenue."
 protestant_cuius_regio_eius_religio:0 "$catholic_cuius_regio_eius_religio$"
 protestant_cuius_regio_eius_religio_desc:0 "$catholic_cuius_regio_eius_religio_desc$"
 protestant_innovation:0 "Protestant Innovations"
 protestant_innovation_desc:0 "Since the founding days of our faith, we have emphasized the inherent value of questioning established doctrines and beliefs. We should apply these same ethics to other fields of study."
 protestant_invite_persecuted:0 "Welcome the Unwelcome"
 protestant_invite_persecuted_desc:0 "While we have seen the light of the true faith, many of our brethren suffer under the oppressive rule of misguided heathens. We should invite these people to settle in our lands, where they can process their faith without repercussions and, more importantly, contribute to our treasury."
 protestant_painters:0 "Protestant Art"
 protestant_painters_desc:0 "The Reformation has given our artists the opportunity to explore new themes, finally freed from the obligatory glorification of God. Hiring more of these artists will reflect well on us, and give us the reputation of being a great patron of the arts."
 protestant_sunday_schools:0 "$sunday_schools_advance$"
 protestant_sunday_schools_desc:0 "$sunday_schools_advance_desc$"
 protestant_work_ethic:0 "Diligent Workers"
 protestant_work_ethic_desc:0 "The influence of Puritan and Pietist preachers on the Reformation is undeniable. Their emphasis on virtues like diligence and frugality will help us to foster an industrious and dedicated workforce."
 province_governors:0 "Provincial Governors"
 province_governors_desc:0 "Our provinces are not ruled autonomously, nor by any local nobles hungry for power. Instead, governors appointed by our central administration are the ones responsible for extending our authority into every settlement in our country."
 prussian_grenadiers:0 "$a_prussian_grenadiers$"
 prussian_grenadiers_desc:0 "$a_prussian_grenadiers_desc$"
 public_punishments:0 "Public Punishments"
 public_punishments_desc:0 "Life at sea is full of dangers, and thus the punishments need to be harsh. If wrongdoing is not thoroughly deterred, we will quickly run into trouble. Over time, a system of highly public punishments has evolved, and now the time has come to formalize those proceedings. This will greatly enhance discipline at sea."
 pukara_advance:0 "$pukara_building$"
 pukara_advance_desc:0 "$pukara_building_desc$"
 pun_breadbasket_of_india:0 "Breadbasket of $india$"
 pun_breadbasket_of_india_desc:0 "The five great rivers — Indus, Jhelum, Chenab, Ravi, and Sutley — penetrate the lands of the $punjab_area$ area, granting the soil the blessing of unmatched fertility. Apart from allowing us to export food and cotton to our neighbors, this also allows our many cities to grow and encourages all sorts of specialized production. We must do our utmost to encourage the growth of agriculture and to defend our farmers from the bandits and brigands in the adjoining areas."
 pun_encourage_indo_persian_trade:0 "Encourage Indo-Persian Trade"
 pun_encourage_indo_persian_trade_desc:0 "Situated on the westernmost border of $india$, the $PUN$ has always been at the crossroads of economic and cultural exchange between $india$ and $persia_region$. The ancient Grand Trunk Road, which connects eastern $india$ to the $farsi_culture$ world, runs right through our lands before heading up into the Afghan mountain passes. These passes are, however, plagued by tribal raiders and bandits. We should encourage the traffic along this ancient and vibrant route and do everything in our power to look after the wellbeing of these traders by constructing caravanserais and policing these roads."
 pun_foundation_of_the_khalsa:0 "The Khalsa"
 pun_foundation_of_the_khalsa_desc:0 "$sikhism$, a religion native to the $PUN$, is spreading rapidly in our lands. Members of this faith come from all castes and backgrounds, and will defend their state regardless of their former professions."
 pun_gurmukhi_script:0 "Gurmukhī Script"
 pun_gurmukhi_script_desc:0 "The Gurmukhī script is an #italic abugida#! developed in the lands of $PUN$, and is highly favored by our $sikhism_ADJ$ gurus. Our clergy is using this script in order to record $sikhism_ADJ$ texts."
 pun_punjabi_textile_industry:0 "$PUN_ADJ$ Textile Industry"
 pun_punjabi_textile_industry_desc:0 "The $PUN$ is a major center for textile production. $cloth$ from our weavers is specially made for markets all over $asia$ and $europe$, and our weavers are among the most productive in $india$."
 pun_reforming_the_punjabi_army:0 "Reforming the $PUN_ADJ$ Army"
 pun_reforming_the_punjabi_army_desc:0 "The ways of our forefathers were sound, and have served us well over the years. But in order for our armies to continue to triumph on the battlefields, we must create a more professional military. By studying the way other countries organize their armies and adapting their methods when prudent, we may create a more efficient $PUN_ADJ$ army while still retaining the unique qualities of our current military system."
 pun_strength_of_the_misls:0 "Strength of the Misls"
 pun_strength_of_the_misls_desc:0 "The administrative system of the Misl states of $PUN$ allows them to field impressive cavalry forces. In times of need, we may call upon these forces to fight a common enemy."
 purana:0 "Purāṇa"
 purana_desc:0 "Considered part of the $smrti$, the $purana$ are texts with a variety of content. Cosmology, divine genealogies, astronomy, grammar, love stories... almost everything can be found within them. As such, even though they are not part of the $sruti$, their influence on $hindu_ADJ$ beliefs and society is strong, as they combine diverse local beliefs and traditions into the common narrative of the $vedah$."
 putrefaction_mill_advance:0 "$putrefaction_mill$"
 putrefaction_mill_advance_desc:0 "$putrefaction_mill_desc$"
 putrefaction_works_advance:0 "Putrefaction Works"
 putrefaction_works_advance_desc:0 "$putrefaction_works_desc$"
 pyramid_architecture:0 "Pyramid Architecture"
 pyramid_architecture_desc:0 "Our ancestors constructed massive stone pyramids in the far-gone days of Teōtīhuacān, Tik'al, Copan, and Palenque. We have not forgotten the art of pyramid building, and can carry on this tradition."
 qalat_al_mashwar_advance:0 "$qalat_al_mashwar$"
 qalat_al_mashwar_advance_desc:0 "The fortified complex of $qalat_al_mashwar$ stands as both a military bastion and a symbol of dynastic authority. Having invested in its expansion, the defense of $TLE$ is strengthened while ensuring administrative control over the surrounding lands."
 quality_education:0 "Well-Trained Forces"
 quality_education_desc:0 "The most crucial time for any army comes after battle. Win or lose, troops are most vulnerable when they are exhausted. We must ensure that our troops are highly trained and can recover easily from combat, lest our enemies take advantage of us in moments of weakness."
 quest_for_the_new_world:0 "Quest for the New World"
 quest_for_the_new_world_desc:0 "Allows us to join the nations set to explore the world outside their borders, or strive to be the first nation to circumnavigate the globe, by commencing a quest for the New World."
 quinine:0 "quinine"
 quinine_desc:0 "Although the 'Jesuit's Bark' has been effective in treating malaria in the past, its consumption as dried bark powder leaves much room for improvement. By isolating and extracting the actual healing component from the bark, we can substantially increase the effectiveness of the treatment."
 quipu:0 "quipu"
 quipu_desc:0 "A system which uses knots on a string to store information, do accounting, and perform other informational tasks. Each knot represents a number from zero to nine. The knots can also be used to refer to logograms on the same string. The knots show which syllable in the logogram to use, and by combining more strings, sentences can be formed."
 rade_of_toulon:0 "Rade of $toulon$"
 rade_of_toulon_desc:0 "$toulon$'s natural harbor offers the ideal staging ground for our naval ambitions. While $marseille$ thrives as our commercial jewel, $toulon$ shall be the armory of $PRO$, and the launching point of a future maritime power."
 rag_the_arsenal_expansion:0 "The Arsenal Expansion"
 rag_the_arsenal_expansion_desc:0 "Our shipyards have become famous for producing the #italic argosy#!, massive carracks capable of surviving the Atlantic and the Indian Oceans. By standardizing our shipbuilding techniques and securing high-quality oak from the Bosnian forests, we ensure that the Ragusan merchant marine is the most technologically advanced in the Adriatic. These vessels are designed for maximum cargo capacity and defensive firepower, allowing our merchants to dominate the spice and silk routes while flying the flag of Saint Blaise in every major port from London to Goa."
 rag_the_collegium_ragusinum:0 "The Collegium Ragusinum"
 rag_the_collegium_ragusinum_desc:0 "To maintain our status as a center of refinement, we have established the #italic Collegium Ragusinum#!, a Jesuit-led institution of higher learning that attracts the sons of Balkan and Italian nobility. By producing a class of highly educated diplomats, scientists, and poets, we ensure that Ragusa's leadership is never outmatched in the courtrooms of Europe. This intellectual investment turns our small city into a center of culture, where the fusion of Latin logic and Slavic spirit produces the scholars who will define the cultural awakening of the entire Adriatic littoral."
 rag_the_lazzaretto_system:0 "The Lazzaretto System"
 rag_the_lazzaretto_system_desc:0 "Facing the recurring devastation of the Black Death, Ragusa has pioneered the world's first mandatory maritime quarantine system on the islands of Mrkan and Bobara. By isolating incoming crews and goods for forty days (quaranta), we protect our urban population while maintaining the functionality of our port when other Mediterranean hubs are paralyzed by plague. This scientific approach to public health ensures that the Republic remains a reliable and clean port of call, preserving our manpower and mercantile networks during even the most lethal periods of European history."
 rag_the_ragusan_maritime_insurance_code:0 "The Ragusan Maritime Insurance Code"
 rag_the_ragusan_maritime_insurance_code_desc:0 "We have moved beyond mere shipping to the world of high finance by formalizing one of the first sophisticated systems of maritime insurance. By pooling the risks of our merchant families through the #italic Monte di Pietà#!, we allow our captains to undertake daring new voyages to the Americas and the Far East with minimal personal risk. This financial innovation ensures that Ragusan capital is always in motion, creating a self-sustaining cycle of wealth that keeps our city wealthy and relevant even as the traditional Mediterranean trade routes begin to fade in importance."
 rag_the_ragusan_porto_franco:0 "The Ragusan Porto Franco"
 rag_the_ragusan_porto_franco_desc:0 "As the wars between our neighbors intensify, we have declared our city a strictly neutral #italic Porto Franco#! (Free Port). By refusing to host foreign warships while offering high-quality repairs and storage to all merchant vessels, we ensure that the conflict only serves to increase our profits. This 'Economic Non-Alignment' makes Ragusa the only safe harbor in a burning sea, allowing us to capture the trade routes that our rivals have abandoned in their pursuit of military glory."
 rag_the_statute_of_1272:0 "The Statute of 1272"
 rag_the_statute_of_1272_desc:0 "To ensure a stable environment for international investment, Ragusa has codified its laws into a comprehensive legal framework that defines property rights and maritime codes. By limiting the power of any single noble and establishing the #italic Consilium Rogatorum#!, we create a predictable mercantile environment that attracts the wealthiest traders of the Mediterranean. This legal clarity allows a small city-state to punch far above its weight, turning a rocky outcrop into a sanctuary of #italic Libertas#! that no feudal lord can easily subvert or ignore."
 railroad_advance:0 "$railroad$"
 railroad_advance_desc:0 "$railroad_desc$"
 rainforests_and_mountaintops:0 "Rainforests and Mountaintops"
 rainforests_and_mountaintops_desc:0 "The rainforests and mountains of our land are teeming with life. Apart from the spirits of the forests, jaguars, anacondas, tarantulas, and a myriad of other animals live among us, and for someone who knows them, they offer little direct danger. To an invading enemy, however, these lands might seem like a fortress and the wild animals as its defenders."
 rais_of_the_navy:0 "Ra'īs of the Navy"
 rais_of_the_navy_desc:0 "Our corsair captains, the #italic Ra'īs#!, are more than just pirates. Truly, they are seasoned naval commanders, and their experience at sea feeds a deep well of maritime tradition that strengthens our navy's proud heritage."
 raj_clan_loyalties:0 "Clan Loyalties"
 raj_clan_loyalties_desc:0 "The influence of our clan extends far beyond our own borders. We are able to draw from other Rajput groups from all over northern $india$ when filling the ranks of our armies."
 raj_combat_training:0 "Combat Training"
 raj_combat_training_desc:0 "Every soldier is trained for battle, but our people start combat training at a much younger age, granting them skills surpassing those of other green soldiers."
 raj_expanded_artillery_arm:0 "Expanded Artillery Arm"
 raj_expanded_artillery_arm_desc:0 "Sieges are what win wars. We must experiment with ways of creating bigger and better cannons to bring down the many forts of our enemies, both within $india$ and outside it."
 raj_fortress_architecture:0 "Fortress Architecture"
 raj_fortress_architecture_desc:0 "The rise of $DLH$, and the invading $muslim_ADJ$ warriors of the past, were wake-up calls. We must always be prepared for foreign invaders, and thus, we must hire the most skilled architects to design impregnable forts throughout our realm. The immensely long walls that will be needed to protect our land make this an ambitious project, but our determination to defend our people shall ensure that it is done."
 raj_mandatory_firearm_drilling:0 "Mandatory Firearm Drills"
 raj_mandatory_firearm_drilling_desc:0 "Many Rajput soldiers are experts in the use of personal firearms. We should put these hardened veterans to work training the next generation of soldiers, rather than risking the loss of their expertise in battle. All of our soldiers must be drilled in firearms tactics before they are expected to meet our enemies on the front line."
 raj_martial_ethos:0 "Martial Ethos"
 raj_martial_ethos_desc:0 "The upbringing and traditions of Rajput warriors ensure a wide base for recruiting officers to lead our armies. In order to capitalize on this, we should formalize career opportunities and advancement paths to encourage these promising young fighters to serve as officers in our forces."
 raj_martial_smiths:0 "Martial Smiths"
 raj_martial_smiths_desc:0 "Wars are not only won through tactics and bravery, but also through weaponry. Our blacksmiths shall forge the finest martial weapons for our warriors to wield in defense of the Rajput people."
 raj_marwari_horses:0 "Marwari Horses"
 raj_marwari_horses_desc:0 "Like their masters, Rajput cavalry horses are meticulously trained to perform on the field of battle. It is said that a Marwari horse will only leave the battlefield under one of three conditions - victory, death, or when carrying a wounded master to safety. By taking good care of these divine beings, we will ensure the everlasting dominance of our horsemen on the battlefields of $india$."
 raj_militaristic_society:0 "Militaristic Society"
 raj_militaristic_society_desc:0 "There is almost no division between civil and military society among the Rajputs. Our nation is a host, defined by its people rather than by the land we control, and its people are warriors. We must ensure that military divisions properly meet our administrative needs as the host expands."
 raj_monumental_architecture:0 "Monumental Architecture"
 raj_monumental_architecture_desc:0 "What purpose does victory serve if there is nothing to immortalize our achievements? Monuments, such as an awe-inspiring Tower of Victory, shall be erected, so future generations will know of our greatest battles and be appropriately inspired."
 raj_painting_school:0 "Rajput Painting School"
 raj_painting_school_desc:0 "Rajput painters already have an excellent reputation, but it could be even better. We must encourage our artists to develop their skills and add to the glory of our dynasty by creating a school of painting particular to our state."
 raj_rajput_resistance:0 "Rajput Resistance"
 raj_rajput_resistance_desc:0 "Rajput poet-musicians tell stories of our people's many battles against foreign invaders, and how our ancestors would rather die than admit themselves defeated. We must encourage this spirit of unity, and give our musicians reason to write new ballads of bravery in the face of death."
 raj_reorganized_rajput_regiments:0 "Reorganized Rajput Regiments"
 raj_reorganized_rajput_regiments_desc:0 "Traditional clan structures are an excellent foundation for a modernized regimental system. Existing hierarchies based on kinship and unconditional loyalty can be easily translated into an organized and formal chain of command."
 raj_the_purbias:0 "The Purbias"
 raj_the_purbias_desc:0 "The Rajputs have spread themselves throughout northern $india$ in their pursuit of glory. The #italic Purbias#!, elite Rajput soldiers who venture as mercenaries, are renowned for their combat ability, and as such spread our fearsome reputation."
 rallying_the_troops:0 "Rallying the Troops"
 rallying_the_troops_desc:0 "Our realm has developed various methods for swiftly amassing troops, so no enemy can catch us unprepared. This edge has helped us stand tall, despite all odds being against us, and we are prepared for battle. United, we march forward, resolute in purpose and ready to defend our honor and homeland!"
 ramadan:0 "Ramaḍān"
 ramadan_desc:0 "A commemoration of the first revelation to Prophet Muḥammad, peace be upon him, the month of $ramadan$ is the holiest month in $muslim$. During this month, all $muslim_ADJ$ faithful are expected to perform Ṣawm — fasting and abstinence — during the daylight hours, as well as prayer and reflection."
 ranching:0 "ranching"
 ranching_desc:0 "Cattle breeding led to the ability to raise entire herds of horses, which in turn has made it possible to breed the best animals for travel, war, and many other tasks."
 rasulid_bureaucracy:0 "$rasulid_dynasty$ Bureaucracy"
 rasulid_bureaucracy_desc:0 "The $rasulid_dynasty$ dynasty brought unprecedented administrative order to our lands. With census records, tax systems, and a robust cabinet structure, they transformed Yemen into one of the most efficiently governed realms in the region."
 rebellion_support:0 "Undercover Contacts"
 rebellion_support_desc:0 "These are turbulent times, and not everyone is happy with who rules over them. By contacting these dissatisfied groups abroad, we may be able to turn them to our cause and persuade them to incite a revolt, which would be a devastating tool for destabilizing our enemies."
 reclamation_of_land:0 "Reclamation of Land"
 reclamation_of_land_desc:0 "The Sahara is not static. It can wax and wane depending on rainfall, and the habitable belt known as the $sahel_region$, where we reside, can grow or shrink accordingly. A major drought could render much of our kingdom useless desert, an addition to the Sahara where no one reigns but death. However, in good years, we might reclaim some of the marginal lands from the Sahara and make it productive again."
 reconquista_of_the_sea:0 "Reconquista of the Sea"
 reconquista_of_the_sea_desc:0 "In our frequent clashes with fierce foreign corsairs, the thought has occurred to us that these scurvy dogs might have the right idea about looting and pillaging the coast, but they are preying on the wrong targets. Piracy may be a vile sin in peacetime, but in times of war, it is known as 'privateering,' and that is another thing altogether."
 recovery_efforts:0 "Recovery Efforts"
 recovery_efforts_desc:0 "War is a cruel mistress that leaves behind naught but wreckage and devastation. By concentrating our efforts on assisting our people as they return to ordinary life after so much horror, we can hasten recovery across the realm."
 recruitment_improvements_reformation:0 "Recruitment Offices"
 recruitment_improvements_reformation_desc:0 "For our country to create a formidable army, we must improve our recruitment efforts. With increased time and money spent on recruitment centers and activities, we will attract able soldiers with haste."
 recruitment_improvements_renaissance:0 "Organized Recruitment"
 recruitment_improvements_renaissance_desc:0 "The development of professional armies has increased our military capabilities. To sustain this, the state will need to improve its capacity for recruiting soldiers as well."
 recruitment_improvements_revolutions:0 "Extensive Recruitment"
 recruitment_improvements_revolutions_desc:0 "With potential threats emerging from across a wider geographical expanse than ever before, we need to expand our military recruitment accordingly. By offering incentives to volunteers while also pressing criminals into service, we can rapidly mobilize forces to meet any danger."
 recruitment_law_advance:0 "$recruitment_law$"
 recruitment_law_advance_desc:0 "$recruitment_law_desc$"
 red_sea_trade:0 "Red Sea Trade"
 red_sea_trade_desc:0 "The spice trade flowing through the Red Sea is a key source of our wealth, and we must seize full control of it. By threatening to burn down any Red Sea ports outside our authority that accept spice traders, we can capture the lion's share of this lucrative commerce. We may not win many friendships with our aggression, but we shall have gold enough to comfort us."
 reduce_inflations_advance:0 "Strict Monetary Control"
 reduce_inflations_advance_desc:0 "Some may think that if we need more money, the only thing we need to do is mint more, but that is neither sustainable nor wise. By keeping strict control over our minting industry, we can keep our inflation in check, and possibly even reduce it."
 refined_obsidian_weaponry:0 "Obsidian Weaponry"
 refined_obsidian_weaponry_desc:0 "Obsidian is an excellent material for making all kinds of tools and weapons. The hard, glasslike rock holds a sharp edge beautifully, making it an easy task to create blades, spearheads, or arrowheads which leave deadly wounds on any foe."
 reform_church_music:0 "Reformed Church Music"
 reform_church_music_desc:0 "We must accept the proposed reforms to our liturgical music. The diluted, soulless tunes currently in fashion can no longer be considered acceptable ways to express the glory of the divine."
 reform_the_diwan:0 "Reform the Dīwān"
 reform_the_diwan_desc:0 "We are fortunate to be served by loyal and well-educated $farsi_culture$ administrators, who have perfected the art of governance for generations. Sadly, however, a hereditary office is one that over time might stagnate and lack innovation. By reducing the number of inherited offices with each generation, we can make sure that we reward not only loyalty, but also ability. Able administrators must rise to high positions regardless of which family they come from."
 reform_the_ecclesiastical_authorities:0 "The Morava Trade Guilds"
 reform_the_ecclesiastical_authorities_desc:0 "We will issue royal charters to the guilds of the Morava Valley, and encourage the development of large-scale leather-working, weaving, and metal-finishing workshops along the river's transit points. By exempting these guilds from certain internal tolls in exchange for providing standardized equipment to the royal armies — such as saddlery for the cavalry and uniforms for the infantry — the state will create a self-sustaining domestic industry. This move will reduce the realm's dependence on expensive foreign imports from outside and create a prosperous, urban middle class that serves as a loyal counter-weight to the rural power of the nobility, significantly broadening the state's taxable economic base."
 reform_the_feudal_army:0 "Reform the Feudal Army"
 reform_the_feudal_army_desc:0 "The feudal levy system has proven slow and unreliable in this new age of professional warfare. Inspired by the $FRA_ADJ$ model, we will replace our scattered vassal hosts with salaried companies, skilled officers, and integrated armies. A disciplined core of professional soldiers will form the backbone of a modern and adaptable army."
 reform_the_grand_secretariat:0 "Reform the Grand Secretariat"
 reform_the_grand_secretariat_desc:0 "Considered the #italic de facto#! highest institution in our nation, the #italic Grand Secretariat#! has served our rulers for centuries. Wielding immense influence over administrative affairs, this body of cabinet ministers must undergo a reform to further increase its effectiveness."
 reform_the_mamluk_corps:0 "$a_mamluk_unit_renaissance$"
 reform_the_mamluk_corps_desc:0 "$a_mamluk_unit_renaissance_desc$"
 reformation_of_the_bulgarian_patriarchate:0 "Reformation of the Patriarchate"
 reformation_of_the_bulgarian_patriarchate_desc:0 "The spiritual heart of the Bulgarian world will undergo a rigorous and profound transformation under the iron-willed guidance of our Patriarch. Recognizing that the survival of the nation depends upon the purity of its faith and the precision of its holy texts, the Patriarchate will initiate a sweeping linguistic and liturgical reform centered at the Holy Trinity Monastery of Tarnovo. By purging the Church Slavonic manuscripts of centuries of scribal errors and corrupt localisms, we will establish a new, standardized orthography that will become the gold standard for the entire Orthodox Slavic world, from the Danube to the Volga."
 reformation_subject_opinions_advance:0 "Economic Overlords"
 reformation_subject_opinions_advance_desc:0 "Contracts that define suzerainty over another state cover many different aspects. One such is the domestic trade obligations of the subject to their overlord. As global trade becomes more and more prominent, the expansion of these obligations becomes increasingly important."
 reformed_telpochcalli:0 "Reformed Tēlpōchcalli"
 reformed_telpochcalli_desc:0 "As we face new enemies, new military tactics have to be developed or learned. This invaluable knowledge will be taught in our #italic Tēlpōchcalli#!."
 reforms_of_the_posadnichestvo:0 "Reforms of the Posadnichestvo"
 reforms_of_the_posadnichestvo_desc:0 "The #italic Posadnik#! is the highest administrative position in our towns and cities, and is a more significant role than that of a mayor. As their city grows, so do the responsibilities, influence, and number of Posadniks in the administration."
 regiment_reinforcement_speed_absolutism:0 "Marshal of Lodgings"
 regiment_reinforcement_speed_absolutism_desc:0 "Standing armies have become the new standard of warfare, which in itself brings its share of challenges. The Marshal of Lodging, a new position within our military, shall focus on overcoming these challenges by organizing the logistics of our ever-growing forces."
 regiment_reinforcement_speed_discovery:0 "Early Military Logistics"
 regiment_reinforcement_speed_discovery_desc:0 "Logistics are half the battle. As soldiers fight, their weaponry and armor will lose their durability, and possibly even break under the enemy onslaught. Establishing local supply depots, as well as employing other logistic methods, allows us to re-equip our soldiers in record time."
 regiment_reinforcement_speed_reformation:0 "Powder Flask"
 regiment_reinforcement_speed_reformation_desc:0 "Use of gunpowder weaponry has become increasingly prevalent among our fighting forces. However, gunpowder is a troublesome material to work with due to its vulnerability to weather and external impact. A specialized flask will protect our gunpowder from the elements, allowing us to supply our troops more easily."
 regiment_reinforcement_speed_renaissance:0 "Permanent Field Training"
 regiment_reinforcement_speed_renaissance_desc:0 "Professional armies are shifting the way warfare is conducted, as now it is based on permanent units that serve for long periods of time. Maintaining a regular flow of trained soldiers into those units is a challenge, but very much needed for their optimal operation."
 regiment_reinforcement_speed_revolutions:0 "Mass Training"
 regiment_reinforcement_speed_revolutions_desc:0 "Modern standing armies are grander than any military force of the past. Tactics are executed by the tens of thousands, and the casualties pile up in unprecedented numbers. Our new military training techniques should offset the high death toll of modern warfare by readying hundreds of soldiers for battle at the same time."
 regimental_camp_advance:0 "Regimental Camp"
 regimental_camp_advance_desc:0 "$regimental_camp_desc$"
 regimental_system:0 "Regimental System"
 regimental_system_desc:0 "By organizing our armies into regiments tied to distinct geographical areas, we allow them to put down roots in local communities. Then, we need to raise additional battalions for these regiments, recruitment will be faster thanks to these regional ties."
 regnal_chronicles:0 "Regnal Chronicles"
 regnal_chronicles_desc:0 "We should record the history of our splendid rulers and their illustrious deeds in great chronicles, so that they may be passed down across the generations and always remembered."
 regular_levy_training:0 "Designated Instruction"
 regular_levy_training_desc:0 "Levies are by definition not the best-trained troops, but that does not mean that we have to send a bunch of untrained rabble to war. Assigning them proper instructors from our most proficient units will allow them to learn from the best, and a mandatory training period with them will make them ready — and eager — to fight."
 regulate_court_procedures:0 "Regulate Court Procedures"
 regulate_court_procedures_desc:0 "By applying a strict regimen and routine to our operations, we will reduce any potential excess cost, and run a frugal and efficient court."
 regulation_bureau:0 "Regulation Bureau"
 regulation_bureau_desc:0 "A legislative body whose jurisdiction involves the maintenance and promotion of inflation-related laws as well as the local administration of our provinces."
 rejection_of_chalcedon:0 "Rejection of Chalcedon"
 rejection_of_chalcedon_desc:0 "As they did not accept the $second_council_of_ephesus$, the Council of Chalcedon was called at the instance of Pope Leo I, who demanded the nullification of the $second_council_of_ephesus$. We reject this false council, and stand by the decisions made in the original one."
 relations_absolutism_advance:0 "Threaded Politics"
 relations_absolutism_advance_desc:0 "As the world around us shifts to accommodate the wider scope of a truly global theater, so too must our diplomatic efforts keep up with this ever-growing need for security against foreign threats."
 religious_dialects_hellenic_faith_advance:0 "Religious Dialects"
 religious_dialects_hellenic_faith_advance_desc:0 "Although our faith is shared across many communities, notable divergence exists in ritual, tradition, and local religious practice. Over time these variations develop organically, sometimes even within the same province. Much like language evolves into regional dialects, our religious customs gradually form distinct local expressions while remaining within the same sacred tradition."
 religious_icon_power_advance:0 "Religious Icons"
 religious_icon_power_advance_desc:0 "Icons are the physical representation of our faith, sacred depictions of holy figures designed to inspire awe and devotion to those that contemplate them."
 religious_melting_pot:0 "Religious Melting Pot"
 religious_melting_pot_desc:0 "Many different religions have influenced our people, from their traditional folk beliefs to $hindu$ and $buddhist$, both from $india$ and $china$. Over time, our people have developed some degree of religious syncretism, mixing some beliefs with others and not fully disregarding any."
 religious_syncretism:0 "Religious Syncretism"
 religious_syncretism_desc:0 "Interaction between beliefs sometimes results in synthesis rather than rejection. Foreign thoughts and practices should therefore not be seen as hostile threats, but opportunities to learn, and possibly incorporate valuable elements into our own traditions."
 religious_toleration:0 "Religious Toleration"
 religious_toleration_desc:0 "Stability in our home regions is the key to our success elsewhere. Expanding outwards while fostering religious tolerance, we not only improve stability at home, but we also make our realm a haven for those fleeing persecution elsewhere."
 religious_tradition:0 "Religious Tradition"
 religious_tradition_desc:0 "The strength of our faith, and the impressive public displays of piety and worship we stage, are admired by other countries both near and far. This is a clear reflection of the prestige and glory of our realm."
 religious_unification:0 "Religious Unification"
 religious_unification_desc:0 "There is only one religion that is true, and thus it is our duty to unite all the faithful under the sole guidance of God."
 remote_patriarchates:0 "Remote Patriarchates"
 remote_patriarchates_desc:0 "Conquest and persecution have repeatedly forced our patriarchates to relocate after their seats have fallen under control of heathen conquerors. Though we now operate from new locations, the original seats remain spiritually revered in our tradition, albeit from a distance."
 renaissance_advance:0 "Renaissance"
 renaissance_advance_desc:0 "The waves of innovative thought and discoveries that permeate our realm must be harnessed and utilized if we are to remain at the forefront of technological innovation."
 renaissance_city_rights:0 "Formal City Rights"
 renaissance_city_rights_desc:0 "By establishing that only our ruler can grant city rights, we centralize control over urban development and give our administration a clear overview of the state of our country."
 renaissance_court:0 "$renaissance$ Court"
 renaissance_court_desc:0 "The $renaissance$ has spread far and wide, and as a result, our court is attracting dedicated artists and scholars, creating the most splendid works ever made."
 renaissance_development:0 "Scholarly Treatises"
 renaissance_development_desc:0 "This era of thought, arts, and science will bring forth new waves of discoveries and inventions, allowing us to optimize our adoption of foreign institutions."
 renaissance_prince:0 "$renaissance$ Prince"
 renaissance_prince_desc:0 "Other rulers in $italy_region$ may pay lip service to their support of the cultural rebirth that manifests itself before us; let $MLO$ emerge as its heart under our patronage."
 renaissance_sculptures:0 "$renaissance$ Sculptures"
 renaissance_sculptures_desc:0 "The $renaissance$ has brought with it greater interest in arts in all forms. It seems that nowadays no one is anybody if they do not have a piece of art adorning their homes! Sculptures are one of the most prolific forms of artistic expression, which has led to an increase in the number of quarries as demand for $stone$ has risen dramatically among the artistically inclined."
 renaissance_subject_opinions_advance:0 "Cultural Overlords"
 renaissance_subject_opinions_advance_desc:0 "In recent years, matters of culture, humanism, and natural philosophy have risen in prominence. This cultural influence extends not only to our own people, but also to states who have sworn allegiance to us, making our position as cultural overlords a valuable diplomatic tool."
 renaissance_thought:0 "$renaissance$ Thought"
 renaissance_thought_desc:0 "The notion of a noble oligarchy ruling over society is hardly new, having existed since at least Roman times. This system remains entrenched in the structure of many nations, and the idea is regaining popularity among those who matter..."
 renaissance_urbanisation:0 "$renaissance$ City Planning"
 renaissance_urbanisation_desc:0 "Accounting for dedicated areas for resource exploitation during the planning phase will allow our urban centers to produce more goods than before."
 repair_at_sea:0 "Coastal Careening"
 repair_at_sea_desc:0 "Ships are undertaking longer voyages than ever before, made possible by new technical advances. This means more complex repairs are needed, but ports with adequate equipment and skilled craftsmen are not always available. Our sailors must be trained in the art of careening — deliberately beaching vessels to expose the parts that need cleaning or repair. This is the only way our fleets can maintain seaworthiness far from their home ports."
 repair_at_sea_aod:0 "Professional Crews"
 repair_at_sea_aod_desc:0 "While the latest advances in naval craftsmanship are pushing the boundaries of sailing as we know it, we need any crewmen on said ships to know how to fully exploit these new capabilities. Only training permanent professional sailors will allow them to correctly perform the necessary tasks to maintain these cutting-edge new ships."
 repair_at_sea_aorev:0 "Parliamentary Heel"
 repair_at_sea_aorev_desc:0 "This advanced form of careening is performed in deep coastal waters. Heavy cargo is shifted to one side of the ship to make it heel, allowing the crew to access the opposite side of the hull for repairs without needing to beach the vessel and wait for low tide as with regular careening."
 republic_reform_traditions_advance:0 "Republic Reform Traditions"
 republic_reform_traditions_advance_desc:0 "Dissemination of power is a cornerstone belief of any healthy republic. Robust laws enforcing elections by lottery will ensure stability and reduce corruption."
 republican_assembly_advance:0 "Republican Assembly"
 republican_assembly_advance_desc:0 "The heart of our republic, the $republican_assembly$ is an incredibly vital institution, allowing us to be governed by noble virtue and excellence."
 republican_election_law_advance:0 "$republican_election_law$"
 republican_election_law_advance_desc:0 "$republican_election_law_desc$"
 republican_electorate_law_advance:0 "$republican_electorate_law$"
 republican_electorate_law_advance_desc:0 "$republican_electorate_law_desc$"
 republican_foundation_law_advance:0 "$republican_foundation_law$"
 republican_foundation_law_advance_desc:0 "$republican_foundation_law_desc$"
 republican_power_law_advance:0 "$republican_power_law$"
 republican_power_law_advance_desc:0 "$republican_power_law_desc$"
 repurposed_monasteries:0 "Repurposed Monasteries"
 repurposed_monasteries_desc:0 "Former religious properties seized by the state during our national conversion process can serve us now in new ways, such as centers for production or administration."
 res_publica_christiana:0 "Universal $christian$"
 res_publica_christiana_desc:0 "We must pursue good relations with our fellow $christian_ADJ$ faithful of all denomination, even if we consider some of their practices to be heresy."
 resilient_merchants:0 "Resilient Traders"
 resilient_merchants_desc:0 "$muslim_ADJ$ traders endure the harshest of conditions during their expeditions. From crossing the scorching sands of the Sahara and Gobi Deserts, to braving the monsoon-plagued waters of the $indian_ocean_region$, they have proved time and again that they will undergo any hardship in order to bring about successful trade."
 resistance_to_persecution:0 "Resistance to Persecution"
 resistance_to_persecution_desc:0 "Although it has spread widely throughout the world, $buddhist$ has also seen its fair share of persecution across the ages. Its temples and images may have been destroyed, its followers slaughtered or forced into hiding, but nonetheless its faithful have persevered."
 resistance_to_the_infidels:0 "Resistance to the Infidels"
 resistance_to_the_infidels_desc:0 "Our $orthodox_ADJ$ brethren have seen themselves at times under the yoke of foreign infidels. However, we have learned to endure such oppression, and even live in peace alongside these infidels."
 retablissement:0 "Rétablissement"
 retablissement_desc:0 "After tumultuous wars, a new era dawns upon $SAX$ — the remarkable $SAX_ADJ$ #italic Rétablissement#!. Amidst the ruins of our past, our nation will rise like a phoenix, rebuilding its shattered economy and charting a path toward prosperity. Driven by a blend of visionary state reforms and disciplined spending, our nation will emerge as a commercial hub.\\n\\nWith unparalleled administrative prowess and a strategic focus on economic growth, this resolute transformation will mark a pivotal moment in history, shaping the destiny of $SAX$ well into the future."
 reuniting_rus:0 "Reuniting the Rus'"
 reuniting_rus_desc:0 "We are the true heir of the Kievan Rus', and those lands must be reunited under our banner!"
 revival_of_the_literary_schools:0 "The Tarnovo Artistic Schools"
 revival_of_the_literary_schools_desc:0 "Under the direct patronage of the Shishman Dynasty, the nation has undergone a spectacular cultural growth, positioning itself as a true #italic Third Rome#! and the primary guardian of Orthodox high culture. By funding the reconstruction of the Patriarchal Cathedral and the royal palaces of Tsarevets, the state has gathered a new generation of master iconographers, hagiographers, and architects who blend traditional Byzantine aesthetics with a unique, emotive Bulgarian realism. This school of thought does not merely produce religious icons; it serves as a powerful instrument of imperial propaganda, codifying the Bulgarian recension of Church Slavonic and producing the Manasses Chronicle to legitimize the Tsar's claim to the Byzantine heritage."
 revolutions_agressive_advance:0 "Justified Conflicts"
 revolutions_agressive_advance_desc:0 "The international diplomatic theater thrives on a balance of power between the nations. Wars of aggression are frowned upon and, if won, might lead to coalitions forming and uniting against the winner.\\nThrough clever usage of diplomacy and interpretation, however, we can make our enemies appear as the aggressors against us, justifying our warmongering and gains from it in the eyes of the public."
 revolutions_subject_opinions_advance:0 "Benign Overlords"
 revolutions_subject_opinions_advance_desc:0 "The fires of revolution are no trifling threat. If we wish to guarantee the loyalty of our subjects, we must suffocate any notion of uprising in its cradle by appointing trustworthy governors and removing any cause for unrest."
 rgo_build_time_advance:0 "$renaissance$ Building Methods"
 rgo_build_time_advance_desc:0 "The great edifices and grand statues erected in the past still stand proudly. It is undeniable that the construction techniques used to design and erect them were sophisticated and well-developed. There is still much we can learn from studying them."
 rgo_construction_ren:0 "Infrastructure Efforts"
 rgo_construction_ren_desc:0 "Our country is nothing without its land and its people. Improving the infrastructure of our nation will benefit the common folk as much as it benefits us."
 rgo_logistics_discovery:0 "Local Storehouses"
 rgo_logistics_discovery_desc:0 "If merchants and artisans can access the products they need locally, that would not only ease the burden of their work, but keep prices from being excessively high. To that effect, storehouses will serve as local distribution hubs to supply everyone's needs."
 rgo_logistics_mil_choice:0 "Improved Storehouses"
 rgo_logistics_mil_choice_desc:0 "Having proper storehouses to hold the products required by local businesses is a must if we want those enterprises — to say nothing of the entire economy — to function smoothly."
 rgo_size_advance_absolutism:0 "Physiocracy"
 rgo_size_advance_absolutism_desc:0 "Recent developments in economic thought have shifted the focus from the mercantilist ideals of value lying in trade towards the notion that value lies in the production process itself. As a result, production has been steadily improving and increasing."
 rgo_size_advance_discovery:0 "Advanced Extraction Techniques"
 rgo_size_advance_discovery_desc:0 "The discovery of new minerals and the invention of new tools has resulted in more efficient resource gathering and production line acceleration."
 rgo_size_advance_reformation:0 "Spinning Wheels"
 rgo_size_advance_reformation_desc:0 "As we learn new and better methods of resource extraction, our production will skyrocket, making us richer in the process!"
 rgo_size_advance_renaissance:0 "Mills"
 rgo_size_advance_renaissance_desc:0 "Mills have been used since ancient times. However, we are now able to develop more modern and efficient wind and water mills, which in turn improve our production."
 rgo_size_advance_revolutions:0 "Steam Engine"
 rgo_size_advance_revolutions_desc:0 "Steam as a means to power a machine has been understood since antiquity. However, its potential had never been fully realized until recently, when the latest advances in physics and mathematics allowed the creation of more sophisticated steam engines, which in turn can power more complex machines. This allows for increased productivity in all fields."
 rich_lands:0 "Rich Lands"
 rich_lands_desc:0 "Our lands are rich with fertile soil and abundant resources from the prairies to the dense forests, ready to be transformed by our hardy men and women. We will use every tool at our disposal to wisely manage the land we have been gifted, and thereby bring prosperity to every household."
 riches_of_asia:0 "Riches of $asia$"
 riches_of_asia_desc:0 "$asia$ is famous around the world for its riches. From the bountiful cities of $persia_region$ and $india$, to the highly-sought luxury items produced in $china$, to the almost mythical Spice Islands in $indonesia_region$, the luxurious goods coming from $asia$ are highly prized worldwide."
 riches_of_foreign_coasts:0 "Riches of Foreign Coasts"
 riches_of_foreign_coasts_desc:0 "Distant lands have brought to us many resources, but not only the lands themselves are rich. Coasts and seas are also plentiful, and the knowledge we have gained from foreign pearl divers allows ours to be more successful in their catches."
 riches_of_the_silk_road:0 "Control of the Silk Road"
 riches_of_the_silk_road_desc:0 "As long as our merchants control the trade through the lands of $transoxiana_area$ and $samarkand$, the trade of the Silk Road shall flow unhindered and the wealth of our dynasty will continue to grow."
 right_to_rule:0 "Right to Rule"
 right_to_rule_desc:0 "Our administration is centered around the premise that the most talented people should be assigned to appropriate posts. As such, the ruler should be the most gifted member of the realm, as befits someone who leads an entire country. In the unfortunate case that the ruler might be lacking, we will need people skilled at 'embellishing' the truth to communicate the ruler's extraordinary competence, be it through imposing statues, astonishing paintings, or exalting verses."
 rights_of_man:0 "Rights of Man"
 rights_of_man_desc:0 "At the forefront of current revolutionary thought is the radical notion of equality for all. Philosophers from around the world have collaborated to create a document entitled the 'Declaration of the Rights of Man and of the Citizen', proclaiming that these rights are universal and should be enforced by law. It is likely that this will be ample fuel for popularizing the concepts of freedom and democracy, and we would do well not to lag behind other nations."
 rise_of_great_individuals:0 "Rise of Great Individuals"
 rise_of_great_individuals_desc:0 "History proves that the most extraordinary individuals are the ones who rise to prominence and achieve great things. Time and again, empires have been forged or destroyed by the hand of a single ruler, and such achievements are to be respected and admired."
 rites_holy_sepulchre:0 "Rites of the Holy Sepulchre"
 rites_holy_sepulchre_desc:0 "In the Church of the Holy Sepulchre, the ancient Latin rites are once more performed in full splendor. These solemn rituals, honoring the death and resurrection of Christ, reinforce our divine mandate to rule this land and spread the teachings of our faith."
 ritual_bloodletting:0 "Ritual Bloodletting"
 ritual_bloodletting_desc:0 "Many cultures in this region consider ritual sacrifice and bloodletting by the ruler as a way of paying homage to the gods. Maintaining this tradition pleases the gods and affirms our right to rule through divine tribute."
 river_trade:0 "River Trade"
 river_trade_desc:0 "The bounty of our great rivers and seas has always fed our people. Let us embrace the river trade, and do what we can to protect the many merchants that travel along the coast to the mouth of the mighty river, so that we may never lack for the fine goods they bring us."
 rmn_cartea_romaneasca_de_invetatura:0 "Carte Românească de Învățătură"
 rmn_cartea_romaneasca_de_invetatura_desc:0 "We have issued the first printed collection of laws in our nation, the #italic Carte Românească de Învățătură#!. This monumental work seeks to unify the legal practices of our realm and align them with broader European jurisprudence. By professionalizing the courts and standardizing punishments, we have reduced the arbitrary power of the local boyars and strengthened the central authority of the throne, making our state a model of Eastern Orthodox legalism and order."
 rmn_the_bible_of_bucharest:0 "The Bible of Bucharest"
 rmn_the_bible_of_bucharest_desc:0 "The publication of the first complete Bible in the Romanian language has fundamentally shifted our cultural identity from the liturgical Church Slavonic to the living vernacular. This monumental work acts as a linguistic unifier, standardizing the dialects of Wallachia, Moldavia, and Transylvania into a single literary tongue. By making the sacred texts accessible to the common man, we have laid the foundation for a unified national consciousness that transcends the political borders of the three separate principalities."
 rmn_the_byzantine_heirs:0 "The Byzantine Heirs"
 rmn_the_byzantine_heirs_desc:0 "Inspired by the glory of Constantinople, the Romanian princes have bound themselves to be the primary patrons of Mount Athos and the Orthodox East. By positioning ourselves as heirs to the Byzantine cultural legacy, we attract scholars and artists from across the Balkans. Romania is now 'more Byzantium than Byzantium', the faith capital of the Orthodox world."
 rmn_the_descendants_of_trajan:0 "The Descendants of Trajan"
 rmn_the_descendants_of_trajan_desc:0 "As enemy tides recede, the Latin-speaking people of the Carpathians recognize their shared Roman heritage. By formalizing the oral histories and legal traditions of the 'Vlachs', we create a unified cultural identity that transcends the fragmented #italic Knezates#! and Voivodeships. This #italic Romanitas#! provides the ideological glue needed to bind the mountain clans into a cohesive state."
 rmn_the_foundation_of_the_metropolises:0 "The Foundation of the Metropolises"
 rmn_the_foundation_of_the_metropolises_desc:0 "By securing the establishment of the Metropolises in our lands, we achieve spiritual and political independence from foreign ecclesiastical influence. This religious autonomy allows the Romanian crown to use the Church as an administrative arm, ensuring the loyalty of the boyars through divine sanction. The Church becomes the primary sponsor of Romanian literacy and law."
 rmn_the_pandur_militias:0 "The Pandur Militias"
 rmn_the_pandur_militias_desc:0 "Our nation has seen the rise of the #italic Panduri#!, a highly motivated irregular infantry force drawn from among our free peasantry and petty gentry. These soldiers specialize in guerrilla warfare and rapid movement through the Danubian marshes, proving that a native, ideologically driven force could challenge both enemy and Boyar retinues. The Pandur tradition will become the blueprint for the first professional and modern native Romanian national army."
 road_advance_1:0 "Road Network"
 road_advance_1_desc:0 "The importance of trade and commerce is becoming more and more relevant, and so is the establishment of more complex road networks to facilitate and increase the movement of people and goods."
 road_advance_2:0 "Basic Roads"
 road_advance_2_desc:0 "We have constructed rudimentary road networks, but those are quickly showing us why we need to advance our transportation systems. By expanding our road network, we will be able to circulate goods within our territory more easily."
 road_building:0 "Road Building"
 road_building_desc:0 "The transportation of goods, troops, and people is vital to our nation's survival. By developing a basic road network, we will be able to at least connect our people and assist them in their daily endeavors."
 rom_all_roads_lead_to_rome:0 "All Roads Lead to Rome"
 rom_all_roads_lead_to_rome_desc:0 "The Roman road system is the envy of the world. It binds our empire together, speeding merchants, messengers, and soldiers alike, with all paths converging in the Eternal City."
 rom_bread_and_circuses:0 "Panem et Circenses"
 rom_bread_and_circuses_desc:0 "The people must be kept happy and sated, for discontent breeds revolt. By putting grain on their tables and providing diverting activities such as games and public festivals, we shall win their loyalty and strengthen the state through their patriotism."
 rom_citizenship:0 "Roman Citizenship"
 rom_citizenship_desc:0 "Citizenship is the lifeblood of Rome, binding peoples of every province into a single political body. Extending these rights ensures integration and the promise of advancement for all who serve the empire."
 rom_imperium_sine_fine:0 "Imperium Sine Fine"
 rom_imperium_sine_fine_desc:0 "Rome's destiny knows no bounds. From the Pillars of Hercules to the edges of the earth, we will expand our dominion without end, bringing civilization wherever the Imperial Eagle soars."
 rom_new_corpus_juris_civilis:0 "Novus Corpus Juris Civilis"
 rom_new_corpus_juris_civilis_desc:0 "Our jurists shall compile and refine our laws into a comprehensive body, drawing on the wisdom of Justinian and the Republic alike. In doing so, we will assure justice for all Roman citizens."
 rom_pax_romana:0 "Pax Romana"
 rom_pax_romana_desc:0 "Peace under Rome does not mean the absence of war, but the triumph of order. Through enforcing our laws and building extensive road systems, as well as the might of our armies, we will bring stability and prosperity to every corner of the Empire."
 rom_provincial_governors:0 "Provincial Governors"
 rom_provincial_governors_desc:0 "Our more remote provinces cannot effectively be ruled from Rome only. By placing competent governors in the outlying regions, we will guarantee that our laws are followed and taxes paid promptly in even the most distant lands of the empire."
 rom_restore_the_legions:0 "Restore the Legions"
 rom_restore_the_legions_desc:0 "The Legions were once the pride of Rome, feared and respected across the world. To restore them is to also revive the discipline, organization, and indomitable spirit that our great empire is built upon."
 rom_revival_of_arts_and_culture:0 "Revival of Arts and Culture"
 rom_revival_of_arts_and_culture_desc:0 "Rome was as much a center of culture as it was an Empire of conquest. By sponsoring poets, scholars, and architects, we will rekindle the creative flame that once illuminated the ancient world."
 rom_roman_architecture:0 "Roman Architecture"
 rom_roman_architecture_desc:0 "From aqueducts to amphitheaters, Roman engineering leaves behind monuments that endure for centuries. Our mastery of stone and arch will show the entire world that Rome's greatness is eternal."
 rom_spqr:0 "S.P.Q.R."
 rom_spqr_desc:0 "The Senate and the people of Rome are the eternal foundations of our state. By invoking this ancient authority, we remind all that Rome rules not merely by force of arms, but by the will of its citizens and its institutions."
 rom_triumphs:0 "Roman Triumphs"
 rom_triumphs_desc:0 "A triumph is more than a mere procession. Indeed, it is the living memory of conquest, paraded through the streets of our greatest cities. Such ceremonies inspire loyalty, awe, fear, and ambition in equal measure."
 roman_catechism:0 "Roman Catechism"
 roman_catechism_desc:0 "Our clergy must adopt the official Roman Catechism as their guide for instruction. This text will improve priestly education and ensure only consistent, orthodox teachings are transmitted to the populace."
 roman_orthodoxy:0 "Roman Orthodoxy"
 roman_orthodoxy_desc:0 "The righteousness of the Roman $catholic_ADJ$ faith and its doctrines must remain unquestioned, in order to entrench its authority in the minds of our people."
 romanian_the_foundation_of_the_voivodeship_tradition:0 "The Foundation of the Voivodeship Tradition"
 romanian_the_foundation_of_the_voivodeship_tradition_desc:0 "The transition from tribal knezes to the centralized office of the Voivode signals the maturation of Romanian political culture into a sophisticated medieval system. This #italic Dux#! or military leader model is adapted from both Slavic and Byzantine influences but is uniquely Romanian in its execution, blending elective monarchy with dynastic continuity. It will provide the community with a clear military hierarchy capable of negotiating with the neighboring crowns as sovereign equals."
 romanian_the_letter_of_neacsu:0 "The Letter of Neacșu"
 romanian_the_letter_of_neacsu_desc:0 "The Letter of Neacșu of Câmpulung represents the earliest surviving document in the Romanian language. This shift from Slavonic to the vernacular in private and administrative correspondence signals a growing national self-awareness among the elites and merchants. It provides the foundation for a unified Romanian literary culture that will eventually bridge our lands."
 romanian_the_postelnic_bureaucracy:0 "The Postelnic Bureaucracy"
 romanian_the_postelnic_bureaucracy_desc:0 "We have modernized our central administration by expanding the role of the Postelnic (Great Chamberlain) to oversee a professionalized corps of diplomatic and financial scribes. By adopting Western-style chancery practices and keeping rigorous records of state revenues and foreign treaties, we have moved beyond simple feudal governance. This bureaucratic efficiency allows the Voivode to squeeze every ducat out of the Danubian trade while maintaining a complex network of spies in our enemies' capitals."
 romanian_the_romanian_renaissance:0 "The Romanian Renaissance"
 romanian_the_romanian_renaissance_desc:0 "Due to the influence of our wealthiest families, our lands are undergoing a cultural blossoming known as the Brâncovenesc style, which we must support. This period of high culture will lead to the construction of grand palaces and the patronage of humanist scholars who will emphasize the Roman origins of the Romanian people. This intellectual movement will solidify our identity as the 'Latin island' in a sea of Slavic and Magyar influences, boosting our diplomatic standing in Western Europe."
 romanian_the_scoala_ardeleana:0 "The Școala Ardeleană"
 romanian_the_scoala_ardeleana_desc:0 "This intellectual movement born in Transylvania has successfully combined Enlightenment rationalism with a fierce national pride, proving the Latin origins of our people through rigorous cultural and linguistic studies. By creating the first modern Romanian grammar and history books, we have provided the ideological fuel for a true nationalistic spirit. The school has convinced the Romanian people across all provinces that they are a single, Western-descended nation destined for sovereignty, effectively ending the era of medieval provincialism."
 roof_of_africa:0 "The Roof of $africa$"
 roof_of_africa_desc:0 "Our people have inhabited the highlands for generations, enduring extreme conditions that have made us resilient and strong. This gives us a significant advantage over our enemies whenever we engage in conflict."
 rotherham_plough:0 "Rotherham Plough"
 rotherham_plough_desc:0 "The basic plow in use in $europe$ has been unchanged since Roman times. Now, thanks to an improved design, the same plow can be made much lighter, reducing the strain on draft animals and thereby getting more work out of them."
 route_to_the_indies_advance:0 "Route to the Indies"
 route_to_the_indies_advance_desc:0 "Trade with the Far East is essential to maintaining our way of life. However, the land route is slow and costly. If we could find a route over the seas, it would open up many business opportunities for our merchants."
 royal_court_advance:0 "Royal Court"
 royal_court_advance_desc:0 "$royal_court_desc$"
 royal_mamluks:0 "The Royal Mamluks"
 royal_mamluks_desc:0 "The Royal Mamluks are the elite core of the Mamluk army, serving as the Sultan's personal guard. Handpicked and rigorously trained, they are renowned for their loyalty, exceptional combat skills, and unwavering dedication."
 royal_navy:0 "A Royal Navy"
 royal_navy_desc:0 "Beginning around 1495, the $tudor_dynasty$ monarchy invested heavily in not just ships, but extensive infrastructure to maintain and otherwise support them. This for many marked the official founding of the Royal Navy."
 royal_revenue:0 "Assert the Royal Revenue"
 royal_revenue_desc:0 "If $SCO$ is to continue its independent existence, we must secure stable sources of income. By tightening our control over the obligations owed to us by royal estates and feudal properties, we can increase our rightfully received taxes. Through these methods, we can ensure the Crown has sufficient funds to enact their will without relying on other sources of money."
 rudimentary_coastal_ship_repair:0 "Makeshift Repairs"
 rudimentary_coastal_ship_repair_desc:0 "It is unavoidable that ships deteriorate while sailing. The beating of the waves and the bite of saltwater accumulate over time, damaging both the hull and ropes no matter how well-constructed the vessel. To alleviate this, sailors are used to performing regular maintenance on their ships to keep them in prime condition, and when more significant damage is received, even being able to keep it afloat until they reach a safe harbor."
 rulership_of_enlightened_principals:0 "Rulership Through Enlightened Principals"
 rulership_of_enlightened_principals_desc:0 "Enlightenment philosophers have inspired new theories of governance. By structuring our government along those principles of merit, justice, and efficiency, we will enjoy greater support. At least, among those who actually matter..."
 rural_rgo_disc_advance:0 "Developing Settlements"
 rural_rgo_disc_advance_desc:0 "Any settlement, no matter how small, will thrive as long as the land is rich and there are people willing to work it. Even the smallest village can become prosperous and bustling with activity over time."
 rural_rgo_traditions:0 "Clearing Terrain"
 rural_rgo_traditions_desc:0 "We must tame the far reaches of our country in order to expand our economic capabilities. Not only will we provide more space for our people, but we can optimize their contributions to our country."
 russian_artillery_yard:0 "$RUS_ADJ$ Artillery Yard"
 russian_artillery_yard_desc:0 "Superior firepower is what determines who wins the sieges of today as well as the pitched battles of tomorrow. We must build a state-of-the-art artillery yard in the heart of our country, to ensure our armies are never without cannons nor ammunition."
 russian_integration:0 "$russian_group$ Traditions"
 russian_integration_desc:0 "The $russian_group$ are vast and diverse in their culture. To unify them like the rulers of old once did, we should promote our shared history and forge an unbreakable cultural bond between the different groups."
 russian_legitimization:0 "Common Legitimacy"
 russian_legitimization_desc:0 "The $russian_group$ people have occupied and ruled these lands for centuries. It is only natural that a $russian_group$ ruler should govern their own people. The more $russian_group$ we present ourselves to be, the easier the people will accept our leadership."
 russian_resiliance:0 "$russian_group$ Recruitment"
 russian_resiliance_desc:0 "The $mongolian_group$ invasions of the past left a strong determination within the $russian_group$ to resist foreign rule. We can utilize their zeal to reinforce our troops."
 ruthenia_commoner_education:0 "Education for All $UKR_ADJ$ People"
 ruthenia_commoner_education_desc:0 "By establishing local schools, we will ensure that our population is well-educated at all levels of society."
 ruthenian_rural_buildings:0 "$UKR_ADJ$ Villages"
 ruthenian_rural_buildings_desc:0 "Much of $ruthenia_region$ is rural, empty land. While our great cities like $kyiv$ serve many important purposes, we cannot neglect the remote lands or small villages that provide us with crucial supplies of food and raw materials."
 ruthenian_state_advance:0 "A $UKR_ADJ$ State"
 ruthenian_state_advance_desc:0 "In the past, we bowed to foreign influences, and were obliged to adapt to their customs to ensure friendly relations. But times have changed, and now we must affirm our own customs, or risk falling into the sphere of foreign influences again."
 sacred_cattle:0 "Sacred Cattle"
 sacred_cattle_desc:0 "As part of $ahimsa$, it is prohibited to slaughter cattle. They instead are respected and venerated as maternal figures, and are symbols of selfless provision and sacrifice. Having been worshiped since the time of the $vedah$, they still command enormous respect and attention."
 safe_exploration_techniques_advance:0 "Lessons of Exploration"
 safe_exploration_techniques_advance_desc:0 "Heading into the unknown is always scary, but nowadays, there are few places that are truly undiscovered. While many places around the world have still not been fully explored, they are nonetheless known to us, and we have the knowledge and experience to reach them. With the wealth of knowledge our explorers have collected over their many journeys, we can confidently venture into uncharted territory."
 saharan_gold_trade:0 "Saharan $goods_gold$ Trade"
 saharan_gold_trade_desc:0 "The $goods_gold$ mined within our territory is of superior quality, and an excellent tool with which to further spread our influence over trade routes with foreign ports."
 saharan_trade:0 "Saharan Trade"
 saharan_trade_desc:0 "From the oases of $ghadames$ to the caravans of the $sahel_region$, our merchants secure and collect revenue from the trans-Saharan routes that connect us to the riches of the interior. $goods_gold$, $salt$, and $slaves_goods$ flow northward under our protection and oversight."
 saiger_process:0 "Saiger Process"
 saiger_process_desc:0 "A new and revolutionary smelting process, enriching silver-containing copper with lead, will allow us to increase the productivity of our mining operations."
 saiger_process_discovery:0 "Refined Saiger Process"
 saiger_process_discovery_desc:0 "Improved processing and work methods will allow our $silver$ and $lead$ mines to prosper."
 sailing_and_fighting_instructions:0 "Blake's Sailing and Fighting Instructions"
 sailing_and_fighting_instructions_desc:0 "Robert Blake has written several sets of rules and regulations that resulted in sweeping naval reforms. These include new tactics for blockades and landings, as well as adoption of the single line ahead battle formation."
 sakya_hegemony:0 "Sakya Hegemony"
 sakya_hegemony_desc:0 "For the last century, the Sakya school has held temporal authority over $TIB$, acting as spiritual and political stewards under $MGE_ADJ$ patronage. Their dominance ushered in an age of centralized governance and scholastic consolidation. Though their rule has waned, their legacy continues to shape our approach to authority and order."
 salic_law_advance:0 "Salic Law"
 salic_law_advance_desc:0 "The rulership of women is not always respected — nor even permitted. As such, it is not uncommon for governments to pass laws directly barring women from inheritance, rejecting them in favor of their male siblings or cousins."
 salt_monopoly:0 "Restore the $salt$ Monopoly"
 salt_monopoly_desc:0 "The $salt$ monopoly was once our most important revenue source, but previous Emperors abolished it to encourage free trade. It is time to return the $salt$ trade to state control."
 saltpeter_workshop_advance:0 "$saltpeter_workshop$"
 saltpeter_workshop_advance_desc:0 "$saltpeter_workshop_desc$"
 samanta_advance:0 "Sāmanta Feudalism"
 samanta_advance_desc:0 "Sāmanta — #italic neighbor#! — is a term denoting vassals and tributary chiefs alike. It is a feudal system that has for centuries acted as one of the pillars of our society. While this arrangement is currently losing prominence, it remains a foundation of our political structure."
 sanitation_advance:0 "Sanitation"
 sanitation_advance_desc:0 "Settlements are investing in improved sanitation measures, such as waste disposal and clean water systems. This will reduce the spread of disease, and improve the overall health of the population. The development of modern sanitation practices will make it possible for people to live in closer proximity without succumbing to disease."
 sankore_madrassah:0 "Sankoré Madrasah"
 sankore_madrassah_desc:0 "We have been told that the Sankoré Mosque's school is the greatest center for learning in the entirety of $africa$. Who could be surprised if this were true, given how many wise men from distant $arabia_region$ and the $maghreb_region$ are here right now, arguing the finer points of philosophy and religion?"
 sanskritization:0 "sanskritization"
 sanskritization_desc:0 "$hindu$ has spread much farther than its origins in $india$, and many other cultures and countries have adopted $sanskrit_language$ concepts and titles to refer to their own identity. As such, the concepts of $hindu$ have seamlessly permeated and blended into foreign beliefs."
 sanxitang:0 "Sānxītáng"
 sanxitang_desc:0 "The Hall of Three Rarities is our most splendid repository of rare, valuable objects and works of art. Through the generous patronage of our ruler, it has flowered into a venue for academic discussions, lectures, and even cultural events, promoting intellectual exchange and scholarly pursuits."
 sao_salonas_stance_advance:0 "Salona's Stance"
 sao_salonas_stance_advance_desc:0 "The mountain lords of Salona, perched around the ancient site of Delphi and controlling the strategic passes into central Greece, maintain a fierce independence through a combination of rugged terrain, stout fortifications, and a martial tradition that draws fighting men from across the Frankokratia; even as larger states collapse, the lords of Salona repeatedly defy their enemies, turning their highland fief into a safe refuge of Latin knighthood in Greece and a persistent irritant to every power that sought to dominate the region between the Corinthian Gulf and the Spercheios valley."
 sao_the_asceticism_of_the_crissaean_crags_advance:0 "The Asceticism of the Crissaean Crags"
 sao_the_asceticism_of_the_crissaean_crags_advance_desc:0 "The soil of Salona is a miserly host, offering little food besides mountain herbs to those who dwell in the shadow of the peaks. Life in this jagged landscape have bred a peasantry and a knightly class alike who are famously indifferent to hunger and hardship. Our soldiers require half the rations of a Frankish man-at-arms, possessing a lean, wolf-like endurance that allows them to out-march and out-climb any adversary. In the high passes of Phocis, the belly is light, but the resolve is as unyielding as the mountain itself."
 sao_the_legacy_of_the_alpha_protector_advance:0 "The Legacy of the Alpha Protector"
 sao_the_legacy_of_the_alpha_protector_advance_desc:0 "The 'Wolf-Pacts' have reached their logical conclusion: the Hegemony is the recognized 'Alpha' of the Eastern Mediterranean. We no longer justify aggression. We simply exercise our natural mandate to 'police' the Levant. This projection of power ensures that the Greek seas remain a private lake for the merchants of Salona."
 sao_the_parnassian_wolf_pacts_advance:0 "The Parnassian Wolf-Pacts"
 sao_the_parnassian_wolf_pacts_advance_desc:0 "In the shifting power dynamics, Salona has moved beyond simple feudal oaths to a predatory legal doctrine known as the 'Wolf-Pacts'. By legally defining our neighbors as 'client-prey' that require Salona's 'alpha' protection to survive, we create a permanent diplomatic justification for intervention and annexation. This predatory diplomacy allows us to absorb smaller lordships and border-fiefs under the guise of 'Defensive Consolidation', ensuring that the Latin presence in the Balkans is led by a single, sharp-toothed power rather than a scattered, vulnerable pack."
 sao_the_parnassus_mines_advance:0 "The Parnassus Mines"
 sao_the_parnassus_mines_advance_desc:0 "Deep within the rugged mountains of our lordship lie veins of metals that were forgotten since the days of the Delphic Oracle. By bringing in Saxon mining experts and applying Western smelting technology, we have turned the #italic Mount of the Muses#! into a center of heavy industry. The wealth extracted from these mines allows the Lords of Salona to maintain a court that rivals the Dukes of Athens in elegance and power."
 sao_the_phocian_mule_chancery_advance:0 "The Phocian Mule-Chancery"
 sao_the_phocian_mule_chancery_advance_desc:0 "Wheeled transport is pretty much impossible in most of our domain; thus, we have established a state-run Chancery to nationalize the logistics of the mountains. This allows us to move supply trains at a pace that leaves conventional imperial armies starving in the crags."
 saquiyah:0 "Sāqiyah"
 saquiyah_desc:0 "The $saquiyah$ is a mechanical device designed to ease the transportation of water to higher elevations. Also known as the #italic Persian wheel#!, #italic tablia#!, #italic rehat#!, and #italic tympanum#!, the wheel is crucial in the irrigation systems in areas with little to no flowing water."
 sav_alpine_identity:0 "$SAV_ADJ$ Alpine Identity"
 sav_alpine_identity_desc:0 "Nestled in the high Alps, We are a mountain people before we anything. Their therrain and the passes crossing them are our inheritance, our livelihood, and the mountains themselves are our protectors. Generations of living inside the Alps have given our people an unmatched understanding of their heights and geography."
 sav_alpine_pass_control:0 "Control Over the Passes"
 sav_alpine_pass_control_desc:0 "The passage over the Alps is troublesome at the best of times, and can be outright impossible with carriages or a larger entourage. By maintaining good pathways, shelters, and waystations, we will be able to dominate the difficult terrain and ensure a steady exchange of merchants throughout our territory."
 sav_embrace_the_vaudois:0 "A Light in the Darkness"
 sav_embrace_the_vaudois_desc:0 "We have embraced the teachings of the Waldensian movement and are dedicated to protecting this faith from the vicious $catholic_ADJ$ Church, which seeks to eradicate its ideas."
 sav_fight_the_vaudois:0 "Stand against Heresy"
 sav_fight_the_vaudois_desc:0 "Our lands have long suffered under the heretical preaching of the Waldensians. By the force of our will and with the support of the divine, we have been able to contain their influence, and we shall continue to defend the one true faith from these dangerous ideas."
 sav_house_of_savoy:0 "A Unified House"
 sav_house_of_savoy_desc:0 "$SAV$ has been ruled by a stable line of dynastic counts ever since its creation. By ensuring the unity of our ruling family and maintaining a strong connection to local representatives, we keep our land from being fractured."
 sav_repopulate_the_valleys:0 "Populate Alpine Valleys"
 sav_repopulate_the_valleys_desc:0 "Many people in our realm leave the alpine valleys they were born into to settle in the urban areas on either side of the mountain range. This depopulation leaves the small villages of lesser valleys in a precarious, politically unstable position. We must ensure that the valley lands are sufficiently populated and can be adequately maintained."
 sav_savoyard_flexibility:0 "$SAV_ADJ$ Diplomacy"
 sav_savoyard_flexibility_desc:0 "Due to our precarious location between greater powers, we must rely on our diplomatic skills for survival. By maintaining diplomatic relations even with our most dangerous foes, we will be able to shift our alliances to ensure the endurance of our country."
 sav_the_shroud_of_turin:0 "Holy Shroud Pilgrimage"
 sav_the_shroud_of_turin_desc:0 "Our realm is in the possession of a most holy artifact, a piece of cloth that bears the face of Jesus of Nazareth. Naturally, it has attracted numerous pilgrims, all clamoring to see and venerate this extraordinary relic. This constant stream of pilgrimage brings a great deal of wealth into our territory — which is all very much to our advantage."
 saxon_baroque:0 "$SAX_ADJ$ Baroque"
 saxon_baroque_desc:0 "$dresden$ and $leipzig$, among other locales, have gained international recognition for being centers of $SAX_ADJ$ Baroque culture. Magnificent architecture, like the Dresdner Hof, epitomize the grandeur of $SAX$, while Johann Sebastian Bach's work has transformed $leipzig$ into a city of music and thriving highbrow culture. The region boasts unique expressions of culture, including handicrafts from the Ore Mountains and culinary traditions like the #italic Dresdner Christstollen#!."
 saxon_court:0 "The $SAX_ADJ$ Court"
 saxon_court_desc:0 "The $SAX_ADJ$ Court is a pillar of Electoral $SAX$'s government, alongside civil and military administration. Court regulations define the responsibilities and daily routines of officials, while the court itself is composed of both nobles and peasants serving the ruling family in governance and administration. Traditionally, each adult member of the ruling family maintained their own household court, but we will now create a single, permanent court in our capital, attracting the finest minds in the realm."
 saxon_defensioner:0 "$a_saxon_defensioner$"
 saxon_defensioner_desc:0 "$a_saxon_defensioner_desc$"
 saxon_industrialization:0 "$SAX_ADJ$ Industrialization"
 saxon_industrialization_desc:0 "$SAX$'s successful early industrialization is evident, with a highly developed industrial sector compared to other regions. The manufactory system, producing mainly for export, has flourished and will make $SAX$ a leading state in $GER$'s industrialization process. The emergence of smaller commercial landscapes and trade will be instrumental in promoting the region's economic growth and connections to other markets in $europe$."
 sba_access_to_northern_japan:0 "Ōshū Ties"
 sba_access_to_northern_japan_desc:0 "Ōshū Province is our second home and where our clan originated. We must make use of our ties to Ōshū to procure some of the strong war horses native to that region."
 sba_multiple_shugo:0 "Multiple Shugo"
 sba_multiple_shugo_desc:0 "We have been made #italic Shugo#! of multiple provinces. Administering all this land will make us rich from revenue generated by our fertile rice paddies and the workshops of the region's most skilled artisans."
 sba_shiba_retainers:0 "$SBA$ Retainers"
 sba_shiba_retainers_desc:0 "We have talented, but ambitious vassals in our clan. They are a frequent cause of familial friction, and we would be wise to rein them in. Then again, close supervision and lavish, yet strategic rewards could turn these powerful families into the greatest assets of our rule."
 sca_legacy_kalmar_union:0 "Legacy of the Kalmar Union"
 sca_legacy_kalmar_union_desc:0 "Though the Kalmar Union dissolved in conflict, it established a precedent for shared Nordic sovereignty. Drawing upon this legacy, we reaffirm our authority and remind our subjects that unity brings strength, not subjugation."
 sca_sound_toll:0 "The Sound Toll"
 sca_sound_toll_desc:0 "Control over the Øresund grants us the right to impose the Sound Toll on all foreign ships passing through the $DAN_ADJ$ straits. This ancient privilege turns geographic advantage into tangible wealth, strengthening our dominance over northern trade."
 sca_unified_scandinavia:0 "Unified $SCA$"
 sca_unified_scandinavia_desc:0 "The union of $DAN$, $NOR$, $SWE$, and $FIN$ under one crown has turned the North from a battleground of competing kings into a centralized power. With unified administration and increased cooperation among the estates, we can assert stronger control over the realm."
 scaligers_military_ambitions:0 "Scaligeri Military Ambitions"
 scaligers_military_ambitions_desc:0 "The Scaligeri dreamed not only of ruling $VER$, but of transforming it into a $lombard$ power. Their campaigns pushed across the Po Valley, clashing with $ML$, $VEN$, and Padua. This ambition left its mark in the form of fortified towns, hardened levies, and a court that breathed military reform."
 scandinavian_bergslag_privileges_advance:0 "$scandinavian_bergslag_privileges$"
 scandinavian_bergslag_privileges_advance_desc:0 "$scandinavian_bergslag_privileges_desc$"
 scandinavian_fishing_privileges_advance:0 "$scandinavian_fishing_privileges$"
 scandinavian_fishing_privileges_advance_desc:0 "$scandinavian_fishing_privileges_desc$"
 scandinavian_tar_privileges_advance:0 "$scandinavian_tar_privileges$"
 scandinavian_tar_privileges_advance_desc:0 "$scandinavian_tar_privileges_desc$"
 scandinavian_thing_rights_advance:0 "$scandinavian_thing_rights$"
 scandinavian_thing_rights_advance_desc:0 "$scandinavian_thing_rights_desc$"
 scholasticism:0 "Classic Scholasticism"
 scholasticism_desc:0 "Based on Aristotelian logic and the writings of the early $christian_ADJ$ Fathers, scholasticism aims to spread knowledge by emphasizing religious dogmatic beliefs and traditions."
 school_of_alexandria:0 "School of $alexandria$"
 school_of_alexandria_desc:0 "The Catechetical $school_of_alexandria$, allegedly founded by the Apostle Mark himself, is the oldest school of catechism in the world. There, biblical and theological studies have been taught since the start of $christian$ itself. Although the school itself was destroyed when the Bishop of $rome$ was declared to be above the Patriarch of $alexandria$, its tradition has endured."
 schools_of_thought:0 "Schools of Thought"
 schools_of_thought_desc:0 "$muslim$ tradition has always emphasized the pursuit of knowledge and education. From schools of jurisprudence and theology to the great libraries and institutions of learning established by various rulers, $muslim_ADJ$ scholarship has earned admiration throughout the $muslim_ADJ$ world and well beyond."
 scientific_experimentation:0 "Scientific Experimentation"
 scientific_experimentation_desc:0 "Things happen for a reason. By understanding the explanation behind everything, we can learn what to expect when similar situations arise."
 scientific_mapping_advance:0 "Cartographic Mapping"
 scientific_mapping_advance_desc:0 "Recent improvements in the sciences of geography and cartography have allowed for more accurate depictions of land masses and natural features, both in terms of their relative sizes and their exact positions."
 scientific_revolution_advance:0 "Scientific Revolution"
 scientific_revolution_advance_desc:0 "Recent developments in mathematics, physics, astronomy, biology and chemistry have not only challenged, but completely changed our view of the world around us. Society is progressing at a greater speed than ever before, and more scientific breakthroughs are made every day."
 scottish_diplomacy:0 "Reliable Alliance"
 scottish_diplomacy_desc:0 "For centuries, we relied on diplomacy and contact with foreign powers on the continent to ensure our independence. It is time to formalize this practice, and secure the endurance of our bonds for centuries to come."
 scottish_education:0 "$SCO_ADJ$ Universities"
 scottish_education_desc:0 "Having sent our brightest scholars to be educated in foreign universities for many years, it is time to improve our domestic education, and provide a place here in $SCO$ where the greatest minds of our nation can learn and grow. Our people should strive to acquire valuable knowledge and skills in their home country rather than wasting their money on expensive travel and their time on foreign institutions."
 scottish_enlightenment:0 "$SCO_ADJ$ Enlightenment"
 scottish_enlightenment_desc:0 "Rapid advancements in philosophy, political economy, and medicine have led to a plethora of accomplishments by our fellow countrymen that will propel $SCO$ to the forefront of global innovation. This period of $SCO_ADJ$ Enlightenment can be a very powerful tool for us on the world stage."
 scottish_highland_tradition:0 "Highland Tradition"
 scottish_highland_tradition_desc:0 "The clans of the Highlands have always moved and fought differently from lowland armies. Raised among the glens, lochs, and steep braes of the north, our clansmen are naturally comfortable engaging in terrain that would exhaust and disorient outsiders. This intimate knowledge of the local landscape is passed down from father to son, and no foreign conqueror has ever truly mastered it."
 scottish_highlander_advance:0 "Establish Highlander Regiments"
 scottish_highlander_advance_desc:0 "Recruiting regiments from the people who live in the $SCO_ADJ$ Highlands can be a crucial measure for our military efforts."
 scottish_longbowmen:0 "$ENG_ADJ$-$SCO_ADJ$ Longbowmen"
 scottish_longbowmen_desc:0 "Now that our ties to $ENG$ have been strengthened, we shall incorporate some of their military tactics, refining our units into fearsome forces."
 scottish_morale:0 "$SCO_ADJ$ Courage"
 scottish_morale_desc:0 "Since the start of our war against $ENG_ADJ$ tyranny, we have preserved our independence through the valiant efforts of the courageous $SCO_ADJ$ people. The memory of brave men like William Wallace will motivate our armies to defend and protect $SCO_ADJ$ independence for all time!"
 scottish_salmon:0 "$SCO_ADJ$ Salmon Conservation"
 scottish_salmon_desc:0 "Our rivers and coastlines are rich in salmon. With careful attention and strict legislation, we will be able to harness this resource and shape our local economy towards export of this highly sought-after fish."
 scottish_tenacity:0 "Tenacious Land"
 scottish_tenacity_desc:0 "War can be a long and tiring affair. If we are to defend our independence, we need to be prepared to endure hard times. Luckily, our people are as tenacious as the land they call their home, and resist foreign invaders to their last breaths."
 scottish_trade_connections:0 "$north_sea_area$ Trade Connections"
 scottish_trade_connections_desc:0 "Our country is situated at the far edge of $western_europe$ and is sparse in resources. If we are to thrive economically, we need to invest and expand our trade connections to further regions. The $north_sea_area$ can connect us to rich markets and business opportunities, provided we learn to harness its potential."
 scottish_whisky:0 "Scotch Whisky"
 scottish_whisky_desc:0 "While distilleries have existed in $SCO$ for a long time, we should ensure these industries are finally put under the purview of the state. This supervision will allow us to establish ourselves at the forefront of liquor production, and expand our exports industry."
 scourge_of_the_corsairs:0 "Scourge of the Corsairs"
 scourge_of_the_corsairs_desc:0 "The famed $turkish_culture$ privateer Hayreddin Barbarossa fought many legendary encounters against the Knights, but he was hardly the only corsair we have encountered. $turkish_culture$ raiding and looting of all of Southern $europe$, tolerated by the Barbary states and funded by the Turks, must end. The Knights will do their job protecting innocent sailors at any cost."
 scriptorium_advance:0 "Scriptorium"
 scriptorium_advance_desc:0 "$scriptorium_desc$"
 sea_hawks:0 "Seahawks"
 sea_hawks_desc:0 "Allows us to focus heavily on military advancements, and thereby increase our Naval Tradition."
 seasonal_economy:0 "Seasonal Economy"
 seasonal_economy_desc:0 "In troubled times, we must learn to endure life, and life is synonymous with nature. The change of seasons necessitates a change in our lifestyles; villages must be adaptable and mobile."
 seat_of_metropolitan_bishop:0 "Seat of the Metropolitan Bishop"
 seat_of_metropolitan_bishop_desc:0 "The $RUS_ADJ$ people need firm religious guidance. We have historically cooperated well with the Church, and expanding this relationship would benefit us all. If we can move the seat of the Metropolitan Bishop to $moscow$, we will be able to strengthen the bonds between our faith and our state."
 second_council_of_ephesus:0 "Second Council of Ephesus"
 second_council_of_ephesus_desc:0 "The $second_council_of_ephesus$, convened in 449 at the instance of Pope Dioscorus of $alexandria$, was a legitimate $christian_ADJ$ council despite its denunciation by the $catholic_ADJ$ and $orthodox_ADJ$ Churches. At this council, the formula of Cyril of Alexandria — which states that Christ is a single incarnate nature, both human and divine — was officially accepted."
 second_scholasticism:0 "Second $scholasticism$"
 second_scholasticism_desc:0 "We will need to revive and refine the philosophical movement of medieval scholasticism."
 secretaries_of_state:0 "Secretaries of State"
 secretaries_of_state_desc:0 "The monarch has always had a secretary responsible for their royal correspondence. This position eventually evolved into that of the Secretary of State, a powerful minister who not only transmits royal decrees, but also has a high level of administrative authority."
 secure_mediterranean_ports:0 "Secure Mediterranean Ports"
 secure_mediterranean_ports_desc:0 "Our ports across the Mediterranean Sea are some of the most affluent in the entire region. Merchants from every corner of the known world travel to $alexandria$ and Cairo to deal in spices, $silk$, and precious stones. The creation of a merchant navy to facilitate and protect our maritime avenues would therefore be a wise idea."
 seljuk_heritage:0 "Seljuk Heritage"
 seljuk_heritage_desc:0 "To embrace the future, we must remember what we learned from $IRA$ and the Great Seljuks, and build a state that can unite disparate peoples and beliefs into a greater whole."
 seljuk_roots:0 "Seljuk Roots"
 seljuk_roots_desc:0 "We are surrounded by enemies on all sides, making a strong military an absolute necessity. Fortunately, we are not weak people. From the irregular Ġuzāt and the Akıncılar raiders to the Sipâhi of the $TUR$, the world has come to fear and respect our military might. Let us build an army worthy of an empire, inspired by our glorious traditions and history, honing our might through the ages."
 semi_salic_law_advance:0 "$semi_salic_law$"
 semi_salic_law_advance_desc:0 "By the right of the $salic_law$, only men are allowed to inherit the throne. This practice leads to a succession crisis in cases where the male bloodline dies out, and the monarchy gets thrown into chaos. In order to avoid such disturbances, the rights of women shall be expanded to include eligibility to rule the nation, should no suitable male heir exist."
 send_people_to_colonial_charter_advance:0 "New Lands of Plenty"
 send_people_to_colonial_charter_advance_desc:0 "New lands mean new opportunities — and new resources to exploit. By encouraging our population to settle abroad and take advantage of these abundant resources, we will reap enormous benefits."
 send_people_to_the_colonies_advance:0 "New Lands of Opportunity"
 send_people_to_the_colonies_advance_desc:0 "A whole new world lies open before us, and that means our people are dreaming about what their lives could be in these distant lands. We should encourage these thoughts, embellishing stories of gold and glory to be found in the unexplored territories, so that our people will be eager to settle these new lands for us."
 sepak_takraw:0 "Sepak Takraw"
 sepak_takraw_desc:0 "Having been practiced all over $south_east_asia$ for a long time since its adaptation from the ancient $chinese_group$ #italic Cùjū#!, and also known as #italic Sepak Raga#!, #italic Takraw#!, #italic Chinlone#!, or #italic Sipa#! depending on the country, #italic $sepak_takraw$#! is not just a game. Although the objective is to kick a ball between players and keep it in the air, it is also a way to have regular physical exercise, and thus played not only for entertainment but as military training for the army."
 separation_of_powers:0 "Separation of Powers"
 separation_of_powers_desc:0 "An incendiary, anonymous treatise on political theory has emerged. Despite efforts to suppress the text, it is spreading quickly across the world. It analyzes the nature of various forms of government, be they monarchies, despotisms, or democracies, and argues for a strict separation of the executive, legislative, and judiciary branches.\\n\\nThis separation would protect the people and limit monarchical, which is understandably a very popular prospect for many of our subjects. Despite the unfortunate implications for the ruler's authority, these ideas may well benefit our nation greatly."
 septuagint:0 "septuagint"
 septuagint_desc:0 "Our Old Testament is encoded in $greek_language$, using the version known as the $septuagint$, which is a translation from $hebrew_language$ done in the 3rd century BC. It was written by seventy-two isolated translators, who all came up with the exact same translations independently. It is thus definitely divinely inspired, and the direct word of God."
 ser_serbian_national_militia:0 "Serbian National Militia"
 ser_serbian_national_militia_desc:0 "Drawing from the hard-won experience of our veteran units of the previous decades, we have established a permanent, professional standing National Militia. This force represents a decisive move away from the disorganized peasant levy, utilizing rigorous Western drill, uniform equipment, and a modernized chain of command while retaining the fierce, high-morale fighting style of our Balkan predecessors. This ensures that our independence is not a fragile diplomatic gift, but is instead backed by a credible, modern military machine that can defend our borders against any encroaching imperial power."
 ser_the_sumadija_agrarian_revolution:0 "The Šumadija Agrarian Revolution"
 ser_the_sumadija_agrarian_revolution_desc:0 "The Serbian peasantry has led its own cultural-economic revolution by adopting agrarian techniques learned from the West. This has turned the dense forests of $sumadija_province$ into a highly productive agricultural heartland. This surplus of food does not just feed the people; it fuels a demographic explosion. A well-fed Serbian population is a growing and ambitious one, providing a massive pool of young, healthy recruits for the army and a robust internal market that makes Serbia the dominant economic engine of the Central Balkans."
 ser_the_transcribers_of_resava:0 "The Transcribers of Resava"
 ser_the_transcribers_of_resava_desc:0 "In an era of conflict, the Serbian people turns to the pen to preserve what the sword can not. The #italic Resava School#! of orthography will standardize the Serbian-Slavonic language, creating a cultural 'republic of letters'. This obsession with linguistic purity and the preservation of chronicles will ensure that Serbian history is never lost to the fog of war. It creates a highly literate elite who acts as the memory of the nation, keeping the records of our dynasties alive in every monastery scriptorium from the Danube to the Adriatic."
 ser_vitestvo:0 "Viteštvo"
 ser_vitestvo_desc:0 "We will encourage #italic Viteštvo#!, a unique Serbian chivalric code, that will blend the heavy-armored traditions of the West with the stoic warrior-ethos of the East. This culture of knighthood will not be restricted to the highest nobility but trickle down into the lower classes of free soldiers. It will emphasize personal bravery, loyalty to the True Faith, and a specialized mastery of both the lance and the saber. This military culture will produce a population that is naturally predisposed to warfare, viewing military service as the highest form of social and spiritual achievement."
 serbian_enlightenment:0 "$SER_ADJ$ Enlightenment"
 serbian_enlightenment_desc:0 "Inspired by other nations of the Enlightenment, our national heroes, such as Dositej Obradović, have sought to elevate our vernacular language and literature. Touched by the dearth of secular works accessible to the common folk, Dositej Obradović has taken the lead in bridging the gap between written and spoken $serbian_dialect$. By diligently crafting grammar books and dictionaries, authoring new tomes, and translating foreign works, our nation is fostering a literary revival thanks to the work of these visionaries."
 serbian_mining:0 "The $saxon$ Mining Privileges"
 serbian_mining_desc:0 "The deliberate invitation of #italic Sasi#! miners from $upper_saxony_area$ and the Harz Mountains has fundamentally transformed our primitive surface pits into sophisticated industrial engines. By granting these Germanic experts their own autonomous courts, the right to follow their own mining codes, and religious freedom, we have successfully unlocked the vast, deep-seated silver and gold veins of $brskovo$ and $novo_brdo$. This influx of technical expertise provide us with the immense quantities of hard bullion necessary to hire the finest Western mercenaries, build monumental stone endowments, and mint the high-quality silver #italic Matapan#! imitations that have come to dominate Balkan trade and Mediterranean commerce."
 serbian_seobe:0 "Seobe"
 serbian_seobe_desc:0 "The Serbian people have mastered the art of 'mobile identity'. This is characterized by the ability to move entire communities to new lands without losing cultural cohesion. This cultural mobility ensures that the 'Serbian Hearth' is not a fixed geographic point, but a portable and indestructible social contract; wherever the Serbian community strikes its staff, the old laws and the traditions of the #italic Slava#! are immediately re-established. This resilience makes the Serbian culture functionally impossible to decapitate, as the nation can abandon scorched valleys only to reappear as a fully formed, military society on a new frontier, waiting for the opportune moment to strike back at the heart of their ancestral lands."
 serbian_serbian_epic_poetry:0 "Serbian Epic Poetry"
 serbian_serbian_epic_poetry_desc:0 "Serbian people have developed a 'living history' through epic poetry. The #italic Guslar#! — a wandering bard — is the primary guardian of the national soul. The #italic Guslar#! recites thousands of verses accompanied by the #italic gusle#!. These songs preserve genealogies, legal precedents, and moral imperatives. Serbian culture ensures that even the most illiterate shepherd has an understanding of ancestral rights and a shared identity. Every village gathering becomes a session of historical indoctrination."
 serbian_the_icon_of_saint_sava:0 "The Icon of Saint Sava"
 serbian_the_icon_of_saint_sava_desc:0 "The cultural foundation of the Serbian people is defined by Saint Sava. By blending Byzantine spirituality with local Slavic customs and a fierce commitment to the Serbian language in liturgy, Sava created a national church that is inseparable from the people's identity. This cultural anchor resurfaces again among our people and ensures that all Serbians, whether nobles or peasants, view themselves as part of a distinct, sacred community that remains unified even when political borders shift or collapse, providing an internal stability that resists foreign cultural assimilation."
 serbian_zaduzbina:0 "Zadužbina"
 serbian_zaduzbina_desc:0 "The Serbian elite and commoners alike are bound by the tradition of the #italic Zadužbina#! — the 'endowment for the soul'. This cultural drive to build stone churches and monasteries creates a permanent, physical landscape of Serbian presence across the Balkans. These buildings serve as more than religious centers; they are repositories of history, art, and literacy that define the Serbian 'living space'. This architectural obsession ensures that the Serbian culture is physically anchored to the land, providing a sense of permanence and historical continuity that inspires the people to defend their 'holy ground' at any cost."
 seren_taun:0 "Sérén Taun"
 seren_taun_desc:0 "Held after the harvest, the #italic Sérén Taun#! festival is an annual thanksgiving ceremony celebrating agricultural abundance. Marked by rituals, offerings, and music, it strengthens the communal bonds of our #italic kampung-kampung#! and reminds all of the sacred balance between people, rice, and nature."
 serfdom:0 "Serfs"
 serfdom_desc:0 "Being a foot soldier in the army is not exactly a dream career, what with the poor food, low pay, and virtually nonexistent medical services. Therefore, recruitment attempts are often a fruitless affair. If we were to tie our peasantry to the land, however, we would always know exactly where to find recruits."
 servants_of_god:0 "Servants of God"
 servants_of_god_desc:0 "Being a cog in this heavenly machine is a great honor; our people find deep purpose in serving God's will. This belief that we collectively serve divine purpose makes the heart of our people beat with thunderous acclaim."
 settle_the_frontier_advance:0 "Call of the Frontier"
 settle_the_frontier_advance_desc:0 "We are surrounded by weakly defended territories ripe for the taking! Let us send out some adventurous courtiers to enforce our authority in these unclaimed lands."
 settle_the_islands:0 "Settle the Islands"
 settle_the_islands_desc:0 "Across the scattered isles of our homeland lie countless shores awaiting our touch. By strengthening our presence among these islands, we secure the wealth of our people: new trade posts, new harvests, and new communities bound by the waves that unite us."
 shadow_of_ambition:0 "Shadow of Ambition"
 shadow_of_ambition_desc:0 "The unification of the Jurchen tribes is but the first step in our ambitious rise to power. Soon, our name will strike fear and awe across the entire continent."
 shahbandar:0 "The Shāhbandar System"
 shahbandar_desc:0 "To manage the vast tide of merchants arriving at our ports, we appoint a Shāhbandar as the authority to oversee customs, resolve disputes, and organize the foreign quarters. This office brings order to our bustling entrepôt and will strengthen our role as the crossroads of the seas."
 shared_brotherhood:0 "Shared Brotherhood"
 shared_brotherhood_desc:0 "United in the teachings of the Great Law of Peace, our people maintain a strong sense of brotherhood and unity, despite their disparate tribal background."
 shared_knowledge:0 "Shared Knowledge"
 shared_knowledge_desc:0 "Innovation can come in many forms and if we want to stay ahead of rival tribes, we will need to explore every advantage we can get."
 shared_products_procedures:0 "Shared Products and Procedures"
 shared_products_procedures_desc:0 "The world has become smaller, and we have encountered a plethora of new peoples and undiscovered territory. Along with these discoveries, we have also come into contact with many new products and ways of utilizing them. Even the most specialized goods, like $alum$, can be used in other ways in other places."
 sharia:0 "Sharī'ah"
 sharia_desc:0 "The Holy Law that the Prophet followed when ruling $medina$ should be the unshakable foundation of the laws we use to run our society. By reforming our criminal code to reflect the teachings of the Prophet, we will bring harmony and justice to our people."
 sheltered_ports:0 "Sheltered Ports"
 sheltered_ports_desc:0 "It is an unfortunate fact that ships tend to be damaged during battle, and equally unfortunate that the damage can rarely be repaired at sea. To alleviate this problem, we will create a system of sheltered ports along our coastline where our ships can patch themselves up."
 shinbutsu_shuugou:0 "Shinbutsu-Shūgō"
 shinbutsu_shuugou_desc:0 "Since $buddhist$ came to $japan_region$, its teachings have coexisted with the worship of local #italic Kami#!. This has led to them both blending into a single combined set of beliefs, albeit with distinct ritualistic practices."
 ship_building_advance:0 "Shipbuilding"
 ship_building_advance_desc:0 "The seas hold many adventures, much wealth, and commercial — as well as expansionist — opportunities."
 ship_building_techniques_absolutism:0 "Wet Dock"
 ship_building_techniques_absolutism_desc:0 "The development of the wet dock, or floating dock, will allow our shipwrights to construct ships much faster than before."
 ship_building_techniques_discovery:0 "Improved Shipbuilding"
 ship_building_techniques_discovery_desc:0 "New building techniques for our ships will help us produce them faster."
 ships_penny:0 "Ship's Penny"
 ships_penny_desc:0 "Ships are expensive to build and maintain. By imposing a ship's penny — a small tax levied on trade or port activities — we can ensure our fleet remains strong without draining our treasury."
 shipyard_advance:0 "Shipyard"
 shipyard_advance_desc:0 "$shipyard_desc$"
 shirazi_legacy:0 "Shirazi's Legacy"
 shirazi_legacy_desc:0 "Our ancestral founder came from $shiraz$, son of the 'Amīr of $persia_region$, which makes our right to rule undeniable."
 shn_defender_against_mongols:0 "Defender of $JAP$"
 shn_defender_against_mongols_desc:0 "As a prominent samurai family from Northern Kyūshū, we have bravely fought against both $MGE_ADJ$ invasions. Should the need arise, we will once again rise to defend both Kyūshū and the realm at large from outside invaders."
 shn_diplomacy_through_tsushima:0 "Diplomacy Through Tsushima"
 shn_diplomacy_through_tsushima_desc:0 "Thanks to our presence in $tsushima_province$, we have a wealth of experience in negotiating with $korea_region$. This way, we have always been able to keep a channel open to the outside world, even during times when official relations were forbidden."
 shn_vice_minister_of_dazaifu:0 "Vice-Minister of Dazaifu"
 shn_vice_minister_of_dazaifu_desc:0 "As the name of our clan shows, we come from the appointed vice minister of the Dazaifu in $chikuzen_province$ province. This institution has since antiquity been the diplomatic and military center of the region, and we traditionally govern Northern Kyūshū as representative of the Emperor."
 shrewd_commerce_practice:0 "Shrewd Commerce"
 shrewd_commerce_practice_desc:0 "Allows us to make use of more refined trading practices, giving our merchants the upper hand over our competitors."
 shurfa_status:0 "Shurfā' Status"
 shurfa_status_desc:0 "The most revered and prestigious amongst all those who inhabit the $muslim_ADJ$ world, there are not many who can proclaim themselves descendants of the Great Prophet. We, of course, are among these blessed few."
 sia_advanced_elephant_warfare:0 "Advanced Elephant Warfare"
 sia_advanced_elephant_warfare_desc:0 "It is not uncommon for our greatest poems to dedicate lines of text to list and honor our war elephants individually. Let us show our enemies why!"
 sia_consolidation_of_state:0 "Consolidation of the State"
 sia_consolidation_of_state_desc:0 "A decentralized system may cause us to lose control over our more distant provinces. If we are to be the true unifying realm for the $thai_culture$ people, our provinces must be unified as well."
 sia_education_reform:0 "Education Reforms"
 sia_education_reform_desc:0 "As our Lord Buddha said, we shall not accept something because it is often said, but we need to experience it ourselves. Education is the basis of knowledge, and if we want to excel at technology, we need to excel at education first."
 sia_experienced_ambassadors:0 "Experienced Ambassadors"
 sia_experienced_ambassadors_desc:0 "We have extensive political experience. The birth of our country was something achieved not only with the power of our military, after all. Surely our diplomatic reputation will prove to be a source of our influence on the world stage."
 sia_rise_to_equal_heights:0 "Rise to Equal Heights"
 sia_rise_to_equal_heights_desc:0 "There are many parts of our country with very low population. We should improve conditions in these regions to ensure that no part of our country is seen as lackluster, and all of it shines equally."
 sia_royal_absolutism:0 "Royal Absolutism"
 sia_royal_absolutism_desc:0 "Second only to Heaven — that is what a ruler should be. Honored and worshipped, our leaders rule over the Earth as the Gods rule over Heaven."
 sia_thai_unity:0 "$thai_culture$ Unity"
 sia_thai_unity_desc:0 "We are undoubtedly the leaders of all $thai_culture$ people. Our troops are proud to serve as defenders of our culture and identity itself, and they fight fiercely for the privilege."
 siberian_frontier:0 "Siberian Frontier"
 siberian_frontier_desc:0 "The distant wastes of Siberia call to us. We must clear a path to its frozen heart, and let our Cossacks go forth and claim land for the $RUS_ADJ$ people."
 sic_constitions_of_melfi:0 "Constitutions of Melfi"
 sic_constitions_of_melfi_desc:0 "Emperor Frederick II, the Hohenstaufen King of $SIC$, drafted a legal code for $SIC$ known as the Constitutions of Melfi, or #italic Liber Augustalis#!. Still in use centuries later, it represents a solid foundation for the governance of our state, regulating public law, judicial procedure and feudal, private and penal law."
 sic_naval_vigilance:0 "Naval Vigilance"
 sic_naval_vigilance_desc:0 "Constant raids from Barbary pirates and $TUR_ADJ$ ships have forced $SIC$ to maintain a vigilant coastal defense. Its galleys and forts became critical for protecting southern $europe$."
 sic_sicilian_enlightenment:0 "$SIC_ADJ$ Enlightenment"
 sic_sicilian_enlightenment_desc:0 "Though distant from the great salons of $paris$ or $vienna$, $SIC$ has fostered its own Enlightenment. Intellectuals challenged feudal privileges, promoted science, and advocated legal reforms, often within the framework of $catholic_ADJ$ humanism. These ideas laid the groundwork for modernity in the shadow of monarchy and tradition."
 sic_sicilian_reforms:0 "$SIC_ADJ$ Reforms"
 sic_sicilian_reforms_desc:0 "As time passes, our institutions become obsolete or just inefficient. Reforms are necessary if we want our nation to prosper and thrive. Our best minds will work hard to ensure that no waste happens, and that our processes are as efficient as possible."
 sic_sicilian_silk:0 "$SIC_ADJ$ $silk$"
 sic_sicilian_silk_desc:0 "In the time of Frederick II, $silk$ was $SIC$'s major export. Although our $silk$ industry has declined in the intervening centuries, $SIC$'s productions having been outstripped by that of the northern $ITA_ADJ$ states, there is no reason why it should not rise again. By investing in our $silk$ production, we can see our weavers and craftsmen flourish anew."
 sic_studium_generale:0 "Studium Generale"
 sic_studium_generale_desc:0 "Founded by King Alfonso V of $ARA$, the University of $catania$ was the oldest in $SIC$ and one of the few southern institutions granted full #italic Studium Generale#! status. Unique for its royal charter and blend of scholastic and legal education, it produced jurists, theologians, and scientists who served both Church and Crown in a culturally diverse region."
 sick_and_hurt_board:0 "The Sick and Hurt Board"
 sick_and_hurt_board_desc:0 "This institution looked after the welfare of ordinary enlisted seamen in the Navy. It brought about a series of reforms that greatly improved the health of sailors on duty."
 sie_artists:0 "$SIE_ADJ$ School of Painting"
 sie_artists_desc:0 "The art of painting has flourished in $ITA$ since the beginning of the $renaissance$, but no artists can match the sheer skill and quality of those from $SIE$. $SIE_ADJ$ art is otherworldly and elegant, with a heavy focus on the miracles performed by Biblical figures and Saints. While other artists may create works considered beautiful for the moment, the subtler style of the $SIE_ADJ$ school will ensure its works are admired for centuries to come."
 sie_council_priori:0 "The Council of Priori"
 sie_council_priori_desc:0 "Following a series of failed republican and royal governments, we have established a Council for the People of $SIE$, one which hopefully shall not fall to highborn maneuverings and corruption like so many before it have. Though the exact number of representatives in the Council and how they are elected is somewhat in flux, decentralizing our government in this way will prevent $SIE$ from sinking into aristocratic control ever again."
 sie_studium_senese:0 "Studium Senese"
 sie_studium_senese_desc:0 "Considered the first publicly funded university, the University of $siena$ is the pride of the city, educating our citizens so that all may serve the nation with strength and skill."
 siege_ability_revolutions:0 "Artillery Officers"
 siege_ability_revolutions_desc:0 "Artillery has become so central to modern warfare that specialized officers trained in gunnery techniques and tactical deployment are now essential on the battlefield."
 sight_veneration:0 "Icon Veneration"
 sight_veneration_desc:0 "The most important aspect of veneration is the faithful be reminded of great works, miracles, and figures through their natural sense. As such, our churches are adorned with vibrant images and colors, ringing with music and sweetly scented with our holy incense, so that the presence of Christ on Earth can be immediately felt by all inside."
 silk_road:0 "Silk Road"
 silk_road_desc:0 "Be it the land route crossing the Gobi Desert and $persia_region$, or its ocean counterpart through the $indian_ocean_region$ and $indonesia_region$, the lands of $asia$ have been for centuries traversed by merchants seeking profit on the famous Silk Road."
 silk_road_transmission:0 "Silk Road Transmission"
 silk_road_transmission_desc:0 "It is undeniable the effect that the Silk Road has had on the spread of $buddhist$. Whether via land or sea, trade has allowed $buddhist$ to spread far from its origins in $india$."
 silver_standard:0 "Silver Standard"
 silver_standard_desc:0 "By turning most obligations towards the central government - from poll taxes to the labor obligations of the peasants or the tributes of local officials - into a single silver payment, the amount of which is based on the population and cultivated land in each prefecture, tax collection will become easier and our income will increase."
 skilled_captains:0 "Skilled Captains"
 skilled_captains_desc:0 "We must ensure that our captains meet the highest standards of seamanship and nautical knowledge, ensuring that they will be able to use every advantage in all situations."
 skilled_cavalry_raids:0 "Cavalry Raids"
 skilled_cavalry_raids_desc:0 "From the time of our ancestors, horsemen have been the agents of our conquests. The thunder of their hooves ringing across the grasslands of the $sahel_region$ spread fear in our enemies, and have brought us many victories."
 sko_education_for_all:0 "Learned Scholars"
 sko_education_for_all_desc:0 "By encouraging the spread of literacy and scholarship among men and women alike, we can advance our society and further our hold over our lands. The family of our rulers must have a special place in these efforts, serving as an ideal to emulate."
 sko_fulani_expansion:0 "Expansion of Sokoto"
 sko_fulani_expansion_desc:0 "For too long the people of $west_africa$ have labored under rulers that, while professing to be righteous, indulged in syncretism. No more! Our flag shall always fly above that of worldly kingdoms!"
 sko_one_people_in_faith:0 "Unification in Faith"
 sko_one_people_in_faith_desc:0 "Our lands are home to many people of different cultures and languages. We must emphasize our faith as the unifying force, joining all people under one banner."
 sko_recruit_fulani_generals:0 "Recruit $fulbe$ Commanders"
 sko_recruit_fulani_generals_desc:0 "The $fulbe$ people are distinguished warriors, serving as leaders in all corners of $west_africa$. We should establish ourselves as a permanent employer for their most capable commanders."
 sko_recruit_the_faithful:0 "Recruit the Faithful"
 sko_recruit_the_faithful_desc:0 "Everyone who is ready to serve under our righteous leaders must be welcome, regardless of their heritage."
 sko_religious_court:0 "Most Religious Court"
 sko_religious_court_desc:0 "Instead of displaying the worldly pomp of our rule, our court should focus on spiritual matters. By inviting learned religious figures to teach in our capital, we can show our true commitment to our faith."
 slash_and_burn:0 "Slash and Burn Agriculture"
 slash_and_burn_desc:0 "An agricultural technique that involves strategically cutting and burning the vegetation to obtain a nutrient-rich layer of ash that fertilizes underlying soil, making it excellent land for planting crops. We have learned that the land becomes stronger after this method, as a bone becomes stronger after being broken."
 slave_center_advance:0 "$slave_center$"
 slave_center_advance_desc:0 "Properly managing bonded labor within our realm is imperative to the continued affluence of our people."
 slave_manned_galleys:0 "Slave-Manned Galleys"
 slave_manned_galleys_desc:0 "Massive galley fleets incur equally massive costs, as they must have enough oarsmen to function. By assigning slaves to this task, we can significantly lessen the cost of staffing our navies."
 slave_raid_advance:0 "Coastal Raiding"
 slave_raid_advance_desc:0 "Our country has a long tradition of raiding the coastlines for slaves, money, and all the other necessary things in life."
 slave_raiding_wars:0 "Slave Raiding Wars"
 slave_raiding_wars_desc:0 "Slaves are the cornerstone of our economy. Attacking and raiding our neighbors to capture their population and enslave them is therefore the lifeblood of our country."
 slave_soldiers:0 "Slave Soldiers"
 slave_soldiers_desc:0 "To ensure a loyal corps of well-trained standing troops, we will employ disciplined slave soldiers from within our society."
 slave_trade_act_advance:0 "Slave Trade Act"
 slave_trade_act_advance_desc:0 "The flow of workers to and from our colonies is a lucrative and sensitive affair. As such, we must invest in our legislative attempts to refine it."
 slavery_before_death:0 "Slavery Before Death"
 slavery_before_death_desc:0 "Razing and the destruction of cities are part of warfare. In the past, our warriors would go on a rampage, destroying and looting every item they could find, and killing those who stood in their way. While it strengthened their morale, their actions were far from economical. With this new approach, we can ensure to at least enslave those capable of work instead of blindly beheading them for the skull throne."
 slitting_mills:0 "Slitting Mills"
 slitting_mills_desc:0 "These are a new type of watermills developed for slitting bars of $iron$ into rods. This allows for more efficient development of $iron$ tools and machinery, as it allows casters to use rods that more appropriate for their needs compared to bigger bars, wasting less byproduct in the forging process."
 slovene_the_catechismus_and_abecedarium:0 "The Catechismus and Abecedarium"
 slovene_the_catechismus_and_abecedarium_desc:0 "The soul of our people has found its voice through the printing presses. Primož Trubar has published the #italic Catechismus and Abecedarium#!, the first books ever printed in the Slovenian language. This is far more than a religious act; it is a political earthquake that standardizes our various dialects into a single literary tongue. By giving the common folk the tools of literacy in their own language, we have forged a unified national consciousness that transcends the borders of old feudal duchies. This intellectual awakening accelerates the adoption of modern administrative institutions and allows the light of new ideas to spread rapidly from the pulpit to the plow."
 slovene_the_dukes_chair_tradition:0 "The Duke's Chair Tradition"
 slovene_the_dukes_chair_tradition_desc:0 "The ancient ritual of installing the Dukes of Carinthia in the Slovenian language symbolizes a unique contractual relationship between the ruler and the ruled. This custom reinforces the idea of a free peasantry with specific legal rights, preventing the total disenfranchisement of the rural population. This social contract fosters a stable and productive agricultural base across our domains."
 slovene_the_freising_fragments:0 "The Freising Fragments"
 slovene_the_freising_fragments_desc:0 "Drawing upon the ancient traditions of the Freising Fragments, the Slovenian peasantry and local clergy have maintained a distinct linguistic identity, which has survived within the ecclesiastical structures of the Holy Roman Empire. This early vernacular tradition serves as a silent but resilient cultural anchor that distinguishes the #italic Windisch#! speakers from their Germanic and Italian neighbors."
 slovene_the_glory_of_carniola:0 "The Glory of Carniola"
 slovene_the_glory_of_carniola_desc:0 "Following the lead of Janez Vajkard Valvasor, we have undertaken a monumental effort to map the geography, history, and customs of our lands. This scientific survey provides the state with an unparalleled understanding of its resources and people, allowing for more efficient taxation and the rapid application of technological innovations."
 slovene_the_tabor_defense_system:0 "The Tabor Defense System"
 slovene_the_tabor_defense_system_desc:0 "As a border nation, we have always been in a dangerous position against our enemies, so our people have developed the #italic Tabor#! — fortified church enclosures where villagers can retreat with their livestock and valuables. This decentralized defense system turns every village into a minor fortress, forcing any invader into a grueling war of attrition they cannot win."
 slovene_the_zois_circle:0 "The Zois Circle"
 slovene_the_zois_circle_desc:0 "Baron Sigmund Zois, a wealthy mineralogist and patron of the arts, has started organizing a circle of intellectuals who spearheaded the Slovenian National Awakening (Preporod). This group promotes the use of Slovenian in high culture, science, and politics, effectively transforming a 'peasant tongue' into a language of modern statehood."
 sme_atabegs_of_samtskhe:0 "Atabegs of $SME$"
 sme_atabegs_of_samtskhe_desc:0 "We are not just one part of the Kingdom of $GEO$, as a long time ago we received royal recognition and, with it, the title of Atabeg. This title had previously been granted only to the Armenian vassals, and therefore its conveyance is a sign of distinction and of the respect that the $GEO_ADJ$ monarch has for us."
 sme_bridge_between_worlds:0 "Bridge Between Worlds"
 sme_bridge_between_worlds_desc:0 "Our country has always served as a bridge between the $christian_ADJ$ and $muslim_ADJ$ worlds. As such, people of both faiths within our borders have become accustomed to interacting with each other."
 sme_fortresses_of_samtskhe:0 "Fortresses of $SME$"
 sme_fortresses_of_samtskhe_desc:0 "Our mountainous terrain has acted as a shield against foreign invaders many times. Because of this, we learned to build strong fortresses and to always be prepared for defensive warfare. This legacy of strength and readiness is one we must strive at all costs to uphold — the fortresses of $SME$ must be perpetually well maintained, manned, and supplied, as foreign invaders are not a possibility but a certainty."
 sme_frontier_warriors:0 "Frontier Warriors"
 sme_frontier_warriors_desc:0 "The Caucasus have been shaped by nomadic emperors since time immemorial, but the lush pastures of $SME$ have convinced many tribesmen to settle. We must not let this affect the stability of our kingdom, but instead make arrangements with these settling tribes so that they contribute to our military ambitions in exchange for the lands they claim."
 sme_independent_ambitions:0 "Independent Ambitions"
 sme_independent_ambitions_desc:0 "$SME$ has often been obligated to bow to foreign rulers, be they $muslim_ADJ$ or $christian_ADJ$; $georgian_culture$, $turkic_group$, or $iranian_group$. To build an enduring state that survives as an independent entity and can stand against covetous outsiders, we must establish independent institutions: issuing our own coinage, creating our own laws, and patronizing our own theologians and writers."
 sme_jaqeli_dynasty:0 "$jaqeli_dynasty$ Dynasty"
 sme_jaqeli_dynasty_desc:0 "Despite its humble origins, the $jaqeli_dynasty$ dynasty has been able to establish many successful relationships, forging strong ties to the rulers of surrounding states. As such, we have a positive reputation in the diplomatic sphere."
 sme_proactive_diplomacy:0 "Proactive Diplomacy"
 sme_proactive_diplomacy_desc:0 "While still a part of $GEO$, $SME$ operates with substantial independence. This privileged position requires constant diplomatic awareness and a policy of active diplomacy, ensuring that we always have a direct channel to those in power. We do all this while actively engaging in our internal politics, meddling with the succession and forging dynastic alliances as best benefits us. The survival of our relatively small state depends on upholding these diplomatic traditions. Let it never be said that we have done too little or acted without sufficient wisdom!"
 sme_protect_trade_routes:0 "Protect the Trade Routes"
 sme_protect_trade_routes_desc:0 "Our position at the crossroads of $georgia_area$, $anatolia_region$, $armenia_area$, and $azerbaijan_area$ also means that a great number of traders seek to cross our lands. However, the constant threat of being raided by nomadic tribesmen means that some have come to doubt the safety of traveling on our roads. We must properly defend all roads and merchant inns in our nation so that trade revenue can flow into our state treasury unhindered."
 sme_sacred_land:0 "A Sacred Land"
 sme_sacred_land_desc:0 "The lands of $SME$ are home to places both sacred and revered among the $georgian_culture$ people. The cave monastery of Vardzia, the ancient church of Atskuri with its miraculous icon of the Virgin Mary, and the Monastery of Ancha with its Anchiskhati icon, are some of the most significant holy places in our realm. By protecting and curating the $SME$ church, setting it apart as distinct from that of $GEO$, we ensure that our people stand united even in the face of adversity."
 smithian_economics:0 "Smithian Economics"
 smithian_economics_desc:0 "By opposing mercantilism and restricting the state's influence in economic matters, we shall support a free market that will increase our overall production efficiency."
 smolenskian_resolve:0 "$SMO_ADJ$ Resolve"
 smolenskian_resolve_desc:0 "For centuries, $SMO$ has been a land carved up by outsiders — $LIT_ADJ$ dukes, $POL_ADJ$ kings, and $MOS_ADJ$ princes. To survive, we clung to what united us: our faith and our fortitude. If we are ever to rise again, we must cast off divisions and rally around the sacred idea that, above all, there is only $SMO$."
 smooth_administration:0 "Smooth Administration"
 smooth_administration_desc:0 "Having an administration composed of the most talented and suitable individuals in our realm helps our country run smoothly and our authority to flow uninterrupted, regardless of any circumstances in which we may find ourselves."
 smrti:0 "Smṛti"
 smrti_desc:0 "Meaning 'that which is remembered', $smrti$ texts are inspired by or originated from the $vedah$, and thus are considered less authoritative than the $sruti$ due to being derived from them. However, unlike the $sruti$, the $smrti$ texts have attributed authorship and are transmitted through manuscripts."
 smz_early_westernization:0 "Early Westernization"
 smz_early_westernization_desc:0 "Thanks to frequent early contact with Western countries, we have learned a lot about foreign technology and other innovations. Using this knowledge, we can carry out reforms in economy, industry, and education that will help gain an edge over other clans."
 smz_satsuma_shugo:0 "$satsuma_province$ Shugo"
 smz_satsuma_shugo_desc:0 "We have always traditionally held the title of #italic Shugo#! of $satsuma_province$; its name has become synonymous with our clan. Our warriors are proud of this, and therefore always ready to defend our territory."
 smz_shimazu_charge:0 "$SMZ$ Charge"
 smz_shimazu_charge_desc:0 "Even when surrounded and outnumbered, our soldiers will keep marching forward until they reach the other side of the enemy lines. The charge of our troops will be legendary!"
 smz_tanegashima:0 "Tanegashima Teppō"
 smz_tanegashima_desc:0 "The Westerners who first landed on Tanegashima brought with them new and interesting weapons. These arquebuses are becoming an increasingly common sight all over $japan_region$, but nowhere have they been available for as long as here."
 smz_tsurinobuse:0 "Tsurinobuse"
 smz_tsurinobuse_desc:0 "#italic Tsurinobuse#!, 'lure and ambush', is our most effective tactic. This strategy enables us to beat enemies when we are vastly outnumbered, which is of course a very valuable skill. We must make this a central tactic of our armies, and give the dull-witted commanders of rival clans a little surprise."
 sofa_levies_advance:0 "Sofa Levies"
 sofa_levies_advance_desc:0 "Originally, all soldiers in the Kèlè-Bolo levies are #italic horon#!, or 'freemen', but the latest developments in $MAL$ have forced the inclusion of #italic jonow#!, 'slaves', to serve in the army as fighters instead of weapon-bearers. These slave warriors would thereafter be known as 'Sofa', protecting fortifications as part of garrison forces."
 soldier_king:0 "The Soldier-King of $PRU$"
 soldier_king_desc:0 "Most states are countries that have an army. $PRU$, on the other hand, is an army that has a country! The many Kings of $PRU$ were soldiers as much as monarchs; each concluded their reign not only by reforming the state but also leaving a lasting impact on the army."
 soldiers_fortune:0 "Soldiers of Fortune"
 soldiers_fortune_desc:0 "Our lands are sparsely populated, for the most part, and surrounded by enemies. The necessity for more robust defenses has prompted us to hire soldiers from foreign lands, who will fight under our banner for a price."
 solomonid_claim:0 "$solomonid_dynasty$ Dynastic Claim"
 solomonid_claim_desc:0 "Our rulers' forefathers are descended from the monarchs of Aksum; from the bloodlines of King Solomon and the Queen of Sheba. We have deposed the $zagwe_dynasty$ monarchs in order to legitimize our rule and firmly establish the kingdom being restored to its rightful dynasty."
 sons_of_the_salur_tribe:0 "Sons of the Salur Tribe"
 sons_of_the_salur_tribe_desc:0 "The $KAR$ trace their ancestry to the Salur, one of the major Oghuz tribes. Known for both their leadership and valor, the Salur legacy shapes our state's identity and our claim to represent the $turkmen_culture$ of $anatolia_region$."
 soo_bahan_ship:0 "Bahan Ship"
 soo_bahan_ship_desc:0 "Our privateer ships fly the flag of Hachiman, spreading terror wherever they go. No one would dare attack a fleet protected by the god of war himself!"
 soo_fight_for_tsushima:0 "Fight for Tsushima"
 soo_fight_for_tsushima_desc:0 "Lying between $asia$ and the islands of $japan_region$, our homeland of $tsushima_province$ and its surrounding waters are where countries clash and fight hard. May our own fleets be strong, so that we can not only defend our country, but also expand it!"
 soo_tradition_of_wakou:0 "Wakō Tradition"
 soo_tradition_of_wakou_desc:0 "While we appreciate lawful and peaceful trade, we also need to be prepared for tense military situations. Fortunately, the local tradition of piracy could help us solve certain combat-related issues."
 source_of_knowledge:0 "Source of Knowledge"
 source_of_knowledge_desc:0 "While foreign nations pride themselves on being at the forefront of knowledge and development, some of their recent 'inventions' have been known in $asia$ for centuries. From the technological prowess of $china$ to the ancient literature of $india$, there is nothing for the East to envy from the West."
 southern_campaigns:0 "Southern Campaigns"
 southern_campaigns_desc:0 "$CHI$ is home to immeasurable wealth, prestige, and knowledge. Under the rule of a weak dynasty, it falls upon our shoulders to seize power and return the prosperity and splendor of these lands."
 spa_naval_reforms:0 "$SPA_ADJ$ Naval Reforms"
 spa_naval_reforms_desc:0 "We have not made our navy a priority, and as a result, we have fallen behind our competitors in terms of naval quality and performance. A reform is in order, which will re-elevate us to our rightful position of maritime supremacy."
 spa_revival_of_ecclesiastical_discipline:0 "Revival of Ecclesiastical Discipline"
 spa_revival_of_ecclesiastical_discipline_desc:0 "Religious laxity has become widespread among our people, turning us away from God. We will sign treaties with our religious leaders to encourage a stronger bond between them and our government, and return to being a devout nation."
 spa_school_salamanca:0 "School of $salamanca$"
 spa_school_salamanca_desc:0 "Based in the University of $salamanca$, the School's interests lie in fields as diverse as theology, economics, and political philosophy. As one of the leading schools of thought in the $catholic_ADJ$ world, its entrenched presence in $SPA$ ensures that our nation always remains at the forefront of intellectual affairs."
 spa_siglo_de_oro:0 "Siglo de Oro"
 spa_siglo_de_oro_desc:0 "Our realm bustles with cultural and artistic achievements of all kinds. Should we channel that creativity to the proper places, feeding it when needed through wealthy benefactors, we will start a truly Golden Century of $SPA_ADJ$ art."
 spa_spanish_enlightenment:0 "$SPA_ADJ$ Enlightenment"
 spa_spanish_enlightenment_desc:0 "Radical new ideas have permeated the minds of $SPA$'s leading figures, inspiring them to develop ambitious plans that will make us stand out among all the other nations of the world."
 spa_viceroyalties:0 "$SPA_ADJ$ Viceroyalties"
 spa_viceroyalties_desc:0 "New lands across the ocean are waiting for us to claim them. We will divide this territory and have each section ruled by representatives of our government, who will establish orderly settlements. The aim there is for our people to find these new lands an attractive destination, and will settle there and secure our presence."
 spanish_square:0 "Spanish Square"
 spanish_square_desc:0 "The Spanish Square evolved organically from the $pike_and_shot$ formation. At its core was a traditional pike square, and at each corner, it had a group of arquebusiers. This way, they maintained the staying power of the traditional pike square and enhanced it with the firepower of the arquebus."
 splendor_of_anatolia:0 "Splendor of $anatolia_region$"
 splendor_of_anatolia_desc:0 "Our region is home to some of the most impressive madrasas and mosques in the entire $muslim_ADJ$ world. With their meticulous attention to detail and abundant talent, our artisans shine with unmatched prowess."
 spy_construction_absolutism:0 "Expand Global Spy Networks"
 spy_construction_absolutism_desc:0 "As the various empires and institutions that make up our world continue to expand, we shall need to maintain and perhaps increase espionage if we wish to stay one step ahead of our rivals."
 spy_construction_discovery:0 "Improved Spy Organization"
 spy_construction_discovery_desc:0 "By hiring trustworthy individuals as informants and strategically positioning them in situations where clandestine information is shared, we can improve our capability to gather information about our enemies and their activities."
 spy_construction_reformation:0 "Advanced Cryptography"
 spy_construction_reformation_desc:0 "If we want to gather intelligence on our enemies, we must improve our skill in cracking and devising secret codes. We shall lull our enemies into a false sense of security by sending what appear to be only ordinary communications, which shall actually contain hidden, encoded information. A pity our enemies will not be clever enough to understand it!"
 spy_construction_renaissance:0 "Spy Networks"
 spy_construction_renaissance_desc:0 "Espionage has been a valuable tool for empires since ancient times. Spycraft allows us to become better informed about both internal and external threats, and to monitor the activities of potentially dangerous states and actors. The Mongols were masters of this art, using espionage to prepare for and secure the success of their military campaigns."
 spy_construction_revolutions:0 "Contact with Dissidents"
 spy_construction_revolutions_desc:0 "As new ideas and political systems raise their heads around the world, there must logically also arise those who protest the status quo. We will need to allocate resources to support these dissenting voices in our rival nations in order to extract valuable information and contribute to their destabilizing effects."
 square_rigged_caravel:0 "Square-Rigged Caravels"
 square_rigged_caravel_desc:0 "By combining the $n_iberian_caravel$ and the $n_carrack$, a new ship has been born: fast, strong, and exactly what we need help us dominate the seas."
 sruti:0 "Śruti"
 sruti_desc:0 "Meaning 'that which is heard', $sruti$ are the holiest and most ancient texts of $hindu$. They are considered to be a divine revelation and thus not attributed to human authorship, although some deny their divine origin while still accepting their authority."
 standardisation_of_calibre:0 "Caliber Standardization"
 standardisation_of_calibre_desc:0 "With artillery's growing importance on the battlefield, the number of firearms kept increasing. But because each gun was made separately, it also required great effort to resupply. In 1544, in an effort to mitigate this, Emperor Charles V declared that there would be only five calibers of guns, while King Henry II of $FRA$ set the standard of calibers at six."
 standardized_coins:0 "Standardized Coins"
 standardized_coins_desc:0 "As wealth is created, more and more mints appear. While we have lived with many different currencies for years, official standards have to be set in order to avoid fraud caused by using lesser quantities of precious metals, or by rasping the edges of those coins."
 standardized_pikes:0 "Standardized Pikes"
 standardized_pikes_desc:0 "A pike is a remarkably simple weapon to make, but to get the full benefit from their use, the entire formation must be wielding weapons of similar length and blade."
 star_fort_advance:0 "Star Fort"
 star_fort_advance_desc:0 "$star_fort_desc$"
 state_administration_advance:0 "State Administration"
 state_administration_advance_desc:0 "Taxing our population is only feasible as long as we know who lives where and what local customs and laws apply to each person. We must establish a comprehensive administration to properly manage our realm."
 state_efficiency:0 "Local Infrastructure"
 state_efficiency_desc:0 "Despite our focus on country-wide affairs, we must not neglect our local state legislators and bailiffs."
 state_of_clerics:0 "State of Clerics"
 state_of_clerics_desc:0 "The nature of a theocracy is held in its proximity to the divine. To achieve this closeness, many actions of our government are carried out by the clergy, combining religious ritual with the bureaucratic duties of administrators."
 state_propaganda:0 "State Propaganda"
 state_propaganda_desc:0 "As with a man, a nation's reputation is everything, and the establishment of an official propaganda service will ensure our good name is not smeared by the lies of our enemies."
 status_by_merit:0 "Status by Merit"
 status_by_merit_desc:0 "Warriors and nobles rise through valor and service, ensuring authority belongs to those who have truly earned it."
 statute_of_kalisz:0 "Statute of Kalisz"
 statute_of_kalisz_desc:0 "Known as the General Charter of $judaism_ADJ$ Liberties, this legislation contains articles that allow all Jews in our realm the freedom to worship, trade, and travel. The statute also attempts to reduce the number of blood libel accusations against Jews propagated by the $catholic_ADJ$ Church."
 statutes_of_aix:0 "Statutes of Aix"
 statutes_of_aix_desc:0 "A series of loosely consolidated laws and statutes form the legal backbone of our governance. These statutes blend Roman jurisprudence with local customs and Angevin tradition, allowing us to manage a patchwork of regions as one cohesive domain: a true composite monarchy, where the parts are diverse, but the crown is indivisible."
 statutes_of_lithuania:0 "Statutes of $LIT$"
 statutes_of_lithuania_desc:0 "Statutes of $LIT$ are a set of three different legal reforms which aggregate, unify, and update the laws of the realm. Known for harsh punishments and the introduction of the death penalty, these statutes are in line with many contemporary Western penal codes. Each crime is supposed to be punished the same regardless of the class of the person committing it, but in practice, the peasants were often at a disadvantage compared to how members of other estates were treated."
 steel_mill_advance:0 "Steel Mill"
 steel_mill_advance_desc:0 "$steel_mill_desc$"
 steppe_horde_tribal_cultural_identity_law_advance:0 "$tribal_cultural_identity_law$"
 steppe_horde_tribal_cultural_identity_law_advance_desc:0 "$tribal_cultural_identity_law_desc$"
 steppe_horde_tribal_modernization_law_advance:0 "$tribal_modernization_law$"
 steppe_horde_tribal_modernization_law_advance_desc:0 "$tribal_modernization_law_desc$"
 steppe_horde_tribal_religious_values_law_advance:0 "$tribal_religious_values_law$"
 steppe_horde_tribal_religious_values_law_advance_desc:0 "$tribal_religious_values_law_desc$"
 steppe_riders:0 "Steppe Riders"
 steppe_riders_desc:0 "The steppes are a peculiar and treacherous place to live. When you enter the Endless Sea of Grass, your horse stops being an animal or piece of property, and truly becomes a part of you. Just as your body cannot survive without a heart or a liver, in the steppes it certainly will not survive without a horse. But the good news is that those who find themselves in that situation will find countless interesting ways to perish..."
 steppe_slave_raiding:0 "Steppe Slave Raiding"
 steppe_slave_raiding_desc:0 "Our raiding parties move as fast as the wind, hitting and running almost before anyone is aware of our presence. Looting the settlements we attack is in itself lucrative, but any prisoners we capture can be sold for a high price as well."
 stickball_game:0 "Stickball Game"
 stickball_game_desc:0 "The ancient tradition of playing the stickball game has been part of our culture for ages. Used for ritual purposes or to settle disputes, hundreds of warriors gather in a field with wooden sticks and a single ball, which must be directed towards a marked goal. This practice not only brings our people together, but keeps our warriors in prime condition."
 stk_eastern_coalitions:0 "Eastern Coalitions"
 stk_eastern_coalitions_desc:0 "Regardless of the hostile clans around us, we have always presented ourselves as a reasonable third party for other clans to attach themselves to for protection against invaders. This tradition of eastern coalitions will serve us well, as long as we make sure that the clans who rely on us never have to worry about protection."
 stk_hitachi_genji:0 "$hitachi_province$ Genji"
 stk_hitachi_genji_desc:0 "We are one of the oldest Minamoto lines in the Kantō region, and have fought for our clan's glory in eastern $japan_region$ since before Minamoto no Yoritomo founded the $kamakura$ Shogunate. Our position as #italic Shugo#! of $hitachi_province$ is therefore never in question."
 stk_kashima_jingu:0 "$kashima_shrine$"
 stk_kashima_jingu_desc:0 "$kashima_shrine$ is one of three most important shrines in the Kantō region. This shrine is dedicated to Takemikazuchi-no-O-no-Kami, who is the god of thunder and swords, and also the patron god of $sumo$ wrestling. Our custodianship of this shrine strengthens the resolve of our armies."
 stock_exchange_advance:0 "Stock Exchange"
 stock_exchange_advance_desc:0 "$stock_exchange_desc$"
 stone_and_brick:0 "Stone and Brick"
 stone_and_brick_desc:0 "For centuries, we have used wood to build our towns and defenses, but we will now  systematically upgrade our infrastructure by replacing more vulnerable wooden structures with stronger ones. We have inherited wooden towns, but we shall leave them fortified with stone and brick."
 stories_of_the_gao_empire:0 "Stories of the $gao$ Empire"
 stories_of_the_gao_empire_desc:0 "Before the $MAL_ADJ$ Empire came to dominate $west_africa$, the city of $gao$ was the capital of an empire in its own right. Although there are barely any written records of the $gao$ Empire, its legacy lives on in our oral traditions, inspiring all who want to achieve greatness one day."
 strength_of_the_boyars:0 "Strength of the Boyars"
 strength_of_the_boyars_desc:0 "The Boyar class is in many ways the foundation of $RUS$, but just as we need to strengthen the Boyars, we also need to control them. We must protect seats for the Boyars in the Duma, but also to make sure that they are dependent on us to further their influence."
 structured_patriarchates:0 "Structured Patriarchates"
 structured_patriarchates_desc:0 "Our patriarchates have always been well organized and structured, each with its own attributions and delimitations. This allows for a better-functioning Church, which leads to a better-functioning state."
 structured_society:0 "Structured Society"
 structured_society_desc:0 "Religious and philosophical traditions, particularly those of $hindu$ and $SECT_CONFUCIANISM_NAME$, have historically influenced social organization in parts of $asia$, emphasizing proscribed role fulfillments within social hierarchies. The rigidity of living within these systems is offset by the relative ease with which social order is maintained."
 students_of_foreign_courts:0 "Students of Foreign Courts"
 students_of_foreign_courts_desc:0 "Members of our royal dynasties are accustomed to journeys abroad. They have spent much of their upbringing as students of illustrious courts far away from home, in the pursuit of a thorough education in matters of statesmanship."
 study_european_colonizers:0 "Study the European Colonizers"
 study_european_colonizers_desc:0 "Strangers have made contact with our people. Their unfamiliar ships and weapons instill awe and fear. Understanding their methods may be the key to survival."
 study_foreign_gunpowder_techniques:0 "Foreign Gunpowder"
 study_foreign_gunpowder_techniques_desc:0 "The great empires of $europe$ and the East have made groundbreaking advances in the use of gunpowder and its military applications. To study their ways and make the according improvements to our own armaments would greatly strengthen our own military."
 study_institutions_advance:0 "Shared Knowledge"
 study_institutions_advance_desc:0 "It is not a shame that others know what we do not, but it is never to our benefit if we do nothing to remedy that ignorance. By actively studying and learning from the discoveries of others, we can better improve our own knowledge of the world."
 sturdy_privateers:0 "Sturdy Privateers"
 sturdy_privateers_desc:0 "Privateers are always in the line of fire. If we wish to utilize their full potential, we must ensure they are not sunk after the first round of cannon fire! Making sure they only sail on the sturdiest vessels will be beneficial to us in the long run — and to the privateers themselves, of course, as they will live longer."
 subject_income_reformation_advance:0 "Firmer Financial Control"
 subject_income_reformation_advance_desc:0 "The financial responsibilities our subjects have towards us are clearly defined. However, tightening these contracts will ensure timely payments and lead to a healthier treasury."
 subject_income_revolutions_advance:0 "Paid Sovereignty"
 subject_income_revolutions_advance_desc:0 "The world around us is undergoing tremendous change in all sectors. We can capitalize on this instability by formalizing tributary arrangements with subject nations in exchange for supporting them. Sovereign protection, it turns out, has a price."
 subject_integration:0 "Consolidation of Titles"
 subject_integration_desc:0 "Although having many countries serving us can be beneficial, only by gathering their different titles under our own will we be able to best utilize their resources. In the end, it is clear that a ruler with only one title will pale in comparison to us, with our splendid array of impressive-sounding titles."
 subject_loyalty_absolutism:0 "Absolute Loyalty"
 subject_loyalty_absolutism_desc:0 "We tolerate no dissent or revolt. Absolute loyalty is demanded from all subjects, whether they are part of the core citizenry or a conquered group."
 subjects_advance:0 "Subject Nations"
 subjects_advance_desc:0 "Granting our subject nations some autonomy over local governance keeps them from revolting while ensuring they continue to provide tribute to the realm."
 successors_of_genghis_khan:0 "Successors of $genghis_khan_name_no_tooltip$"
 successors_of_genghis_khan_desc:0 "From the days of total conquest to the vast expanses of $genghis_khan_name_no_tooltip$'s great Empire, our people descend from generations of earthshakers. Our people are the ones destined to author history."
 sudano_sahelian_architecture_advance:0 "Sudano-Sahelian Architecture"
 sudano_sahelian_architecture_advance_desc:0 "The grasslands, savannas, and deserts of $west_africa$ provide few resources suitable for construction projects, so we have made the best of what we can get. The usage of mudbricks and adobe plaster reduces the cost of buildings significantly while also giving them a distinct style that is pleasing to the eye."
 suk_akson_sukhothai:0 "Akson $SUK$"
 suk_akson_sukhothai_desc:0 "Although the $thai_culture$ script is already common to all $thai_culture$ people, it should not be forgotten that it was in our country and under our guidance that it was developed. As such, $thai_culture$ script is not only a unifying force for our culture, but also proof of our individuality and distinctiveness."
 suk_birthplace_of_a_culture:0 "Birthplace of a Culture"
 suk_birthplace_of_a_culture_desc:0 "We are called the first independent $thai_culture$ kingdom, as we were the first ones to rebel against $KHM_ADJ$ authority and establish ourselves as free from their influence. As such, all $thai_culture$ people look at us in admiration."
 suk_breaker_of_chains:0 "Breaker of Chains"
 suk_breaker_of_chains_desc:0 "It was not so long ago that we saw ourselves under the $KHM_ADJ$ authority, but we have since gained our freedom, and have taken our rightful place as an independent power. We have earned the admiration of our peers, and their respect."
 suk_military_history:0 "Military History"
 suk_military_history_desc:0 "Our armies have a long history of victory in combat. As a result, a position in our military is seen as a post of honor and prestige, and there are many willing to serve."
 suk_ram_khamhaeng_stele:0 "$name_ram_khamhaeng$ Stele"
 suk_ram_khamhaeng_stele_desc:0 "Most of the history of the early $SUK_ADJ$ kingdom comes from inscriptions on the $suk_ram_khamhaeng_stele$, commissioned by the great king to give a record of his glorious reign. The $suk_ram_khamhaeng_stele$ is a sacred piece of heritage and one that surely proves our place in history."
 suk_sukhothai_ceramics:0 "$SUK$ Ceramics"
 suk_sukhothai_ceramics_desc:0 "Ceramics have been created by the $thai_culture$ people since antiquity, influenced by $chinese_group$ ceramics but always retaining their own distinct style. However, the ceramics produced in our country are most valued, and they are often traded at great distances overseas."
 suk_unstoppable_army:0 "Unstoppable Army"
 suk_unstoppable_army_desc:0 "Many have tried in the past to stop our progress and expansion, but all have failed in the face of our army. It has proved to be an unstoppable force, one that readily crushes any obstacles in our way."
 suk_wat_si_sawai:0 "Wat Si Sawai"
 suk_wat_si_sawai_desc:0 "We are known for our many gorgeous temples, such as the $suk_wat_si_sawai$, one of the oldest in $sukhothai$. Built under the $KHM_ADJ$ authority as a $hindu_ADJ$ temple, its ensuing repurposing has turned it into a symbol of our identity. The faith of our people is strong."
 sumo:0 "Sumō"
 sumo_desc:0 "Derived from an ancient agricultural ritual, in which dances served as prayers for a good harvest, the practice of $sumo$ has escaped the confines of the court and is now a popular practice among the commoners. It also serves as a form of combat training."
 sun_must_rise:0 "The Sun Must Rise"
 sun_must_rise_desc:0 "Through devotion and ritual, we keep the sun's journey alive, easing the hearts and strengthening the spirit of our people. The preservation of equilibrium, and even the world, rests upon our shoulders."
 sunnah:0 "sunnah"
 sunnah_desc:0 "Consisting of the traditions and practices attributed to Muḥammad, peace be upon him, the $sunnah$ dictates how every $muslim_ADJ$ faithful should behave, and is also what gives $sunni$ its name. Although the different schools of jurisprudence may vary on the details, they all have their basis in the $sunnah$."
 superior_firepower:0 "Superior Firepower"
 superior_firepower_desc:0 "The use of massed firepower to disrupt the enemy before delivering a coup de grâce is one of our army's strengths, and we will make sure that our leaders know this."
 superior_seamanship:0 "Superior Seamanship"
 superior_seamanship_desc:0 "Enables us to transform our navy into a supreme naval force with top-class vessels and highly skilled captains and crew."
 superior_ship_design:0 "Superior Ship Design"
 superior_ship_design_desc:0 "Building ships that are slightly faster than those of our opponents, even if the amount of this extra speed is so negligible that it is of no military significance, can still fill our crews with confidence and make our enemy wary of taking us on in an even fight."
 supply_depot_advance_age_2_renaissance:0 "Supply Depots"
 supply_depot_advance_age_2_renaissance_desc:0 "No army can survive without supplies. Establishing permanent supply depots dedicated to providing for our fighting forces allows for a continuous feeding of the supply lines, keeping our armies always in peak condition."
 supply_depot_advance_age_3_discovery:0 "Army Depots"
 supply_depot_advance_age_3_discovery_desc:0 "The development and deployment of standing armies have increased the demands for weaponry, uniforms, and other military supplies, which should be stored in close proximity to our soldiers."
 supply_depot_advance_age_4_reformation:0 "Ammunition Depots"
 supply_depot_advance_age_4_reformation_desc:0 "Generalized deployment of artillery for battlefields and sieges has created a high demand for the ammunition and gunpowder to fuel them, increasing the importance of storage depots."
 supply_depot_advance_age_5_absolutism:0 "Forward Depots"
 supply_depot_advance_age_5_absolutism_desc:0 "Armies can now penetrate deeper into enemy territory and sustain themselves there for longer periods, making it necessary to build and maintain forward depots closer to them while being linked to rear supply lines."
 supply_depot_advance_age_6_revolutions:0 "Campaign Depots"
 supply_depot_advance_age_6_revolutions_desc:0 "The operation of multiple armies on longer campaigns has put extra stress on our supply systems, making bigger, rapidly constructed depots even more important to sustain them."
 supply_lines:0 "Supply Lines"
 supply_lines_desc:0 "The development of professional armies has changed the way war is waged. Logistics are now essential, and supply lines are absolutely necessary to keep armies fed and supplied with ammunition."
 supply_trains:0 "Supply Trains"
 supply_trains_desc:0 "While on campaign, attrition is our most formidable foe, and the key to defending our men against it is a well-planned and efficiently run logistic network capable of providing ample support and supplies."
 supreme_court_advance:0 "Supreme Court"
 supreme_court_advance_desc:0 "$supreme_court_desc$"
 supremus_dux_lithuaniae:0 "'Supremus Dux Lithuaniae'"
 supremus_dux_lithuaniae_desc:0 "If we are to defend ourselves against our aggressive $polish$ and $russian_group$ foes, we must project strength! Establishing the title of #italic Supreme Duke of Lithuania#! will decisively assert our authority, especially against the growing power of our nobility and others who seek to violate our sovereignty."
 surgery_advance:0 "Surgery"
 surgery_advance_desc:0 "Barber-surgeons are developing more sophisticated techniques for treating injuries and illnesses, and the invention of new surgical instruments makes procedures safer and more effective. As a result, patients are surviving injuries and illnesses that would have been fatal just a few years ago."
 sutra:0 "Sūtra"
 sutra_desc:0 "A type of sacred text in both $dharmic_ADJ$ and $buddhist_ADJ$ religions, they vary in format and content. Regardless, they are always considered to be valid sources of knowledge, and proper study of them is required if one is to develop their spirit."
 suw_suwa_taisha:0 "Suwa Taisha"
 suw_suwa_taisha_desc:0 "Suwa Taisha at Lake Suwa is one of the oldest shrines in $japan_region$, and highly adored throughout the country. Its most important festival, #italic Onbashira-matsuri#!, proves the bravery of our people as they carry the sacred logs from the mountain to the shrine."
 svn_swamp_drainage_projects:0 "Swamp Drainage Projects"
 svn_swamp_drainage_projects_desc:0 "By investing in large-scale hydraulic engineering projects to drain the vast marshlands of the riverine areas, we unlock thousands of acres of new, fertile farmland. These reclaimed lands will be soon settled, increasing the population density and tax base of the province while eliminating the vectors for disease. This transformation of the landscape not only strengthens our economy but also creates a more navigable and defensible terrain, removing the natural barriers that once hindered our own internal communications."
 svn_the_alluvial_grant_lands:0 "The Alluvial Land Grants"
 svn_the_alluvial_grant_lands_desc:0 "The fertile silt between the Sava and Drava is our greatest asset. By granting tax-free plots in exchange for clearing the heavy riverine brush, we are turning the flooded plains into the primary grain basin of the North. This agricultural intensification provides the logistics needed to support a massive standing army, ensuring the Kingdom can feed its defenders even during the most grueling winter blockades."
 svn_the_marturina_tax_system:0 "The Marturina Tax System"
 svn_the_marturina_tax_system_desc:0 "We have formalized the #italic Marturina#! (marten-pelt tax, also known as #italic Kunovina#!), a unique and ancient Slavonian tribute system that provides the Ban with a high-value, portable liquid asset. By standardizing the value of these pelts against the Royal Mark, we have created a stable currency for the region that is highly resistant to inflation. This fiscal reliability allows the Banate to maintain a professional guard and build extensive wooden and stone river-fortifications along the vulnerable Drava crossings without burdening the peasantry with excessive grain taxes."
 svn_the_oak_staple_rights:0 "The Oak Staple Rights"
 svn_the_oak_staple_rights_desc:0 "Slavonian Oak is now the most sought-after timber in the Mediterranean for its iron-like resistance to water rot. By establishing a royal monopoly on the export of mature oak to the Venetian shipyards, we have secured a strategic economic lever over the maritime republics. This trade does not just fill our coffers; it ensures that the very foundations of Venice's palaces and the hulls of their galleys are physically composed of Croatian soil, giving us a unique diplomatic influence over the 'Queen of the Adriatic'."
 svn_the_slavonian_grenadier_regiments:0 "The Slavonian Grenadier Regiments"
 svn_the_slavonian_grenadier_regiments_desc:0 "Our infantry units are reorganized into elite grenadier regiments that are renowned across the continent for their physical stature, rigorous discipline, and unwavering bravery under fire. These specialized shock troops are trained to lead the charge into the heaviest enemy fire, using their grenades and bayonets to break the lines of even the most formidable opponents. The presence of these 'Slavonian Giants' on the battlefield serves as a powerful psychological weapon, boosting the morale of our own troops while striking terror into the hearts of those who face them."
 svn_the_slavonian_sabor:0 "The Slavonian Sabor"
 svn_the_slavonian_sabor_desc:0 "Our people are governed under the scrutiny of the Slavonian #italic Sabor#!. This legislative independence allows the Slavonian nobility to address the specific needs of the inter-river plains, such as drainage projects and the regulation of grain markets. By having a dedicated assembly, the Banate can react quickly to regional crises and negotiate directly for tax exemptions, ensuring that Slavonia's agricultural wealth is used primarily for Slavonia's own defense and improvement."
 swabian_frugal_people:0 "Frugal Finances"
 swabian_frugal_people_desc:0 "Many have accused our people of stinginess, and laughed at our good sense of economic caution. Fortunately, we cannot hear their mockery over the sound of all these ducats jingling in our purse."
 swabian_league_of_cities:0 "League of Cities"
 swabian_league_of_cities_desc:0 "$SWA$ is home to many wealthy cities, which are desirable targets for foreign ambition. To better protect our nation, we should come together in times of war and fight united against foreign incursions."
 swedish_absolutism:0 "$SWE_ADJ$ Absolutism"
 swedish_absolutism_desc:0 "Absolutism is the theory that one person should be in charge, that this person is the monarch, and that said monarch shall run the government unfettered by the Privy Council."
 swedish_copper_coins:0 "Swedish Copper Coins"
 swedish_copper_coins_desc:0 "The abundance of copper in $SWE$, primarily from the Stora Kopparberget mine in Falun, has prompted the country to use it as the main metal for minting a new national currency, the #italic daler#!. This is issued as a large money plate, called #italic plåtmynt#!, which can weigh up to 20 kilograms. Some argue that this might not be very practical and that the volume of money in circulation could exceed copper reserves, but they seem narrow-minded."
 swedish_heritage:0 "Free Farmers"
 swedish_heritage_desc:0 "$SWE_ADJ$ peasants have always made significant contributions to our country; the differences between a noble and a free farmer have never been big."
 swedish_roots:0 "$SWE_ADJ$ Military Roots"
 swedish_roots_desc:0 "From the disciplined Carolean ranks to the strong freeholding peasantry, $SWE$'s military prowess is an essential pillar of Scandinavia. By integrating $SWE_ADJ$ institutions and recruitment systems, we reinforce the manpower and strength of our empire."
 swedish_royal_post_office:0 "Kungliga Postverket"
 swedish_royal_post_office_desc:0 "The #italic Kungliga Postverket#!, or Royal Postal Agency, was created to improve state administration and communication across the expanse of $SWE$. It establishes a reliable network of couriers and waystations, and has become crucial for our military coordination, diplomacy, and governance."
 swedish_steel:0 "$SWE_ADJ$ Steel"
 swedish_steel_desc:0 "While other armies may be content to wildly fire inaccurate volleys at their enemies, we shall march at them in disciplined ranks, deliver a single volley at close range, and then feed them cold steel."
 swedish_tradition:0 "Always Attack"
 swedish_tradition_desc:0 "Forming our marching troops into a #italic Svinfylking#! and charging is enough force to shatter any opponent! Mounted troops are not superior; other than being ridden to the battle itself, horses have no place on the battlefield."
 swiss_alpine_passes:0 "Masters of the Alpine Passes"
 swiss_alpine_passes_desc:0 "The great mountains of the Alps are not mere obstacles to us, they are our home. Their great passes — the Gotthard, the Simplon, the Grimsel — are our streets. Generations of pilgrims, merchants, and armies marching through these treacherous heights have made our people intimately familiar with every route, shelter, and shortcut in them. No foreign army will move through our mountains as swiftly as we do."
 swiss_ambition:0 "$SWI_ADJ$ Enlightenment"
 swiss_ambition_desc:0 "We do not need to construct a unique identity for our country, since our people readily rally around the banners of their cantons and the ideals of our confederacy. But by funding our most enlightened scholars of our time, we will be able to shape a new age for the $SWI_ADJ$ people, and solidify the unique traits of our #italic Eidgenossenschaft#!. This Helvetism forms the foundation of our Enlightenment."
 swiss_banking:0 "$SWI_ADJ$ Banking"
 swiss_banking_desc:0 "We are a sanctuary, not only for persecuted people from other countries, but also for their wealth. In large vaults, hidden away behind strong walls and protected by our most trustworthy soldiers, we will be the best place for every citizen of the poor, war-torn countries of the world to stash their valuables."
 swiss_clockwork:0 "Masters of Clockwork"
 swiss_clockwork_desc:0 "Some fools think that clockwork is for timekeeping alone, but when one witnesses the power of rotating gears, it is obvious that clockwork can do just about anything one wants it to do. Maybe the Creator of the Universe Himself wound up existence like a clock and let the gears spin on their own, ticking away the centuries. Be that as it may, $SWI_ADJ$ clockmakers are the greatest masters of the art — barring God Himself, of course."
 swiss_eternal_alliance:0 "Eternal Alliance of the Forest Cantons"
 swiss_eternal_alliance_desc:0 "We have forged an eternal alliance with our friends in the neighboring Cantons. Had it not been for this treaty, we would have surely succumbed to the $habsburg_dynasty$ invaders and fallen under the rule of foreign tyrants yet again. These alliances will ensure our survival for centuries to come."
 swiss_halberd_infantry:0 "Legacy of Morgarten"
 swiss_halberd_infantry_desc:0 "When we defended our freedom in the Battle of Morgarten, we had a very important advantage over the cursed $habsburg_dynasty$ invaders: the halberd, a simple yet lethal weapon that can repel any foe with ease. Training our troops to use halberds with skill will give us an advantage against our foes, even if they have superior numbers."
 swiss_mercenaries:0 "$SWI_ADJ$ Mercenaries"
 swiss_mercenaries_desc:0 "Our troops are widely recognized as exceptional combatants. Fortunately for us, we are not permanently in need of their services, which allows us to rent them out to foreign powers, earning extra revenue and providing them with valuable combat experience."
 swiss_oath_of_rutli:0 "The Oath of Rütli"
 swiss_oath_of_rutli_desc:0 "Let us recite the vow of this new union: We shall be one nation of brothers, and no trouble or danger shall separate us. No foreign tyrant shall ever rule over our realm!"
 swiss_recovery_and_prosperity:0 "A Tormented Realm"
 swiss_recovery_and_prosperity_desc:0 "Past conflicts have shown that repelling invaders is not our only concern. The valleys of our cantons are devastated with each battle; careful steps must be taken to bring prosperity back to our land."
 swiss_reislaufer:0 "The Reisläufer"
 swiss_reislaufer_desc:0 "$a_reislaufer_desc$ We should form regiments from these veterans and employ them in our own armies."
 swiss_religious_refuge:0 "Haven for Refugees"
 swiss_religious_refuge_desc:0 "While others exile religious minorities and disruptive figures, we will gladly offer them a home. In $SWI$, they will be able to establish a new life for themselves, and as a result will be inclined to praise our rule."
 swiss_tolerance:0 "$SWI_ADJ$ Tolerance"
 swiss_tolerance_desc:0 "Why must we kill each other over obscure issues of transubstantiation and predestination, when we could spend that energy turning our mountain home into a realm united once more?\\n\\nFor that reason, every Canton of $SWI$ will have the ultimate jurisdiction over religious matters in their region. While this will not eliminate all religious strife in our country, it will at least ensure that no matter what someone believes, our people will be able to find a place where they are not persecuted."
 symbol_of_catholicism:0 "Symbol of $catholic$"
 symbol_of_catholicism_desc:0 "$jerusalem$ is the holiest city in Christendom, the very place of Christ's Passion and Resurrection. By asserting $catholic_ADJ$ supremacy over these sacred grounds, we become the spiritual beacon of the Latin world and a pillar of the true faith."
 system_of_tributaries:0 "Tributary System"
 system_of_tributaries_desc:0 "Direct rule comes at the cost of extensive investment in subjugating and pacifying rival groups. By instead installing a loyal official to rule locally and demanding they pay an annual tribute, we eliminate threats from any rival $altepetl$ while filling our treasury at the same time."
 szkola_rycerska:0 "Szkoła Rycerska"
 szkola_rycerska_desc:0 "By establishing the 'Knight's School' to train noble youth in military science and their patriotic duty, we will forge generations of capable, dedicated military and civil personnel."
 table_of_ranks:0 "The Table of Ranks"
 table_of_ranks_desc:0 "The abolishment of the Mestnichestvo was the first step toward creating a more meritocratic state bureaucracy. The Table of Ranks further codified this principle, making military advancement conditional on performance rather than noble birth."
 talented_traders:0 "Talented Traders"
 talented_traders_desc:0 "Just as we staff our administration with talented officials, we need to ensure our commercial infrastructure is managed by skilled professionals. Having only the brightest minds overseeing our trade operations will keep products moving and revenues flowing without interruption."
 tamazight:0 "tamazight"
 tamazight_desc:0 "The Berber-speaking people of the interior are a vital part of our society. By recognizing their cultural identity and fostering literacy, we expand our ability to govern diverse regions without losing cohesion or a firm hold on power."
 tambo_advance:0 "$tambo$"
 tambo_advance_desc:0 "$tambo_desc$"
 tamed_steppes:0 "Tamed Steppes"
 tamed_steppes_desc:0 "Although most people would qualify the steppes as inhospitable and even worthless land, our Cossacks have adapted to the harsh environment, and are able not only to survive but to thrive in the wilderness. Thanks to their expertise, we are able to exploit those lands and benefit from them."
 tamerlane_chess:0 "Tamerlane Chess"
 tamerlane_chess_desc:0 "This new variety of chess, invented by our great eponymous founder, improves upon previous versions. Using it will help our generals to improve their strategic and tactical skills."
 tannery_manufactory_advance:0 "$tannery_manufactory$"
 tannery_manufactory_advance_desc:0 "$tannery_manufactory_desc$"
 tannery_mill_advance:0 "$tannery_mill$"
 tannery_mill_advance_desc:0 "$tannery_mill_desc$"
 tanning_workshop_advance:0 "$tanning_workshop$"
 tanning_workshop_advance_desc:0 "$tanning_workshop_desc$"
 tanye_guanxi:0 "Tányuè Guānxì"
 tanye_guanxi_desc:0 "For centuries, our spiritual influence in $CHI$ has formed the bedrock of our diplomatic relations. Imperial patronage, tribute exchanges, and sacred rituals like #italic Tányuè#! secure both respect and material gain."
 tax_assessor_advance:0 "Tax Assessor"
 tax_assessor_advance_desc:0 "$tax_assessor_desc$"
 taxation_advance:0 "Taxation"
 taxation_advance_desc:0 "Operating a civilized society implies the maintenance of a central authority, and that authority must be supported through some form of currency. By extracting taxes from our subjects and citizens, we will be more productive and better able to achieve great things for our people."
 tears_of_the_sun:0 "Tears of the Sun"
 tears_of_the_sun_desc:0 "Though adventurers from far-off lands dream of finding secret gold on mountain trails high in the Andes, to us the yellow metal has more artistic and sacred importance than simple economic value."
 temporary_appointments:0 "Temporary Appointments"
 temporary_appointments_desc:0 "Having our court members serve a position for life carries the inherent risk of them amassing undue power and influence. They also tend to dedicate less effort to their tasks, due to being given excessive responsibilities. To avoid this messiness, we can establish a system of temporary assignments. That way, officials are assigned to the positions they are best qualified for, but can be reassigned with ease should they grow too complacent in their roles."
 ten_great_campaigns:0 "Ten Grand Campaigns"
 ten_great_campaigns_desc:0 "The Ten Great Campaigns are aimed at expanding our influence both inside and outside our borders. To achieve that, we will draft a huge army to crush any resistance that we might find in our way. We shall choke the life out of any rebellion before it has the chance to raise its head, and our glory will be eternal."
 tercio:0 "Tercios"
 tercio_desc:0 "#italic Tercio#! infantry were developed principally by the brilliant general Gonzalo Fernández de Córdoba, called #italic El Gran Capitán#!, during the Italian Wars. It is a mixed infantry formation of pikemen and musketeers. Because of this combined-arms approach, the formation simultaneously utilizes both the rigidity of its heavy infantry and the long-range firepower of its musketeers, making it an ideal defensive and offensive formation."
 terrace_farming:0 "Terrace Farming"
 terrace_farming_desc:0 "To take maximum advantage of the limited space in our highlands, we have developed terrace farming, a series of step-like platform fields on the sides of the mountains, as well as better irrigation techniques."
 terraces_advance:0 "$terraces$"
 terraces_advance_desc:0 "$terraces_desc$"
 teu_absolute_order:0 "Absolute Order"
 teu_absolute_order_desc:0 "All powers of the state are consolidated in our order. Every action taken and every decision made goes through the hierarchy of the Teutonic Order first before it gets executed. Of course, this bureaucracy is not in everyone's favor, but it ensures the absolute power of the #italic Hochmeister#!."
 teu_crusader_discipline:0 "Crusader Discipline"
 teu_crusader_discipline_desc:0 "Our grand order was forged in the flames and blood of the Third Crusade during the siege of $acre$ in 1191. While we originally nursed the sick and feeble, the order has transformed into a militarized group of knights of unbreakable devotion and discipline."
 teu_expanded_marches:0 "Expanded Marches"
 teu_expanded_marches_desc:0 "Grant autonomy to the local governors of our border regions, and reform their holdings into marches. These special zones will pay fewer taxes to the state in return for an obligation to maintain the highest combat readiness during times of war as well as peace. This should provide us with substantial military flexibility at little cost."
 teu_infantry_tactics:0 "Infantry Tactics"
 teu_infantry_tactics_desc:0 "Contemporary battles in $europe$ have proven that the age of infantry is about to begin. It is now time to develop new tactics, adopt use of the pike, and reform our medieval concept of auxiliary infantry into the main fighting force of our future armies."
 teu_one_state_one_religion:0 "One State, One Religion"
 teu_one_state_one_religion_desc:0 "Reserve all state offices only for those who follow our religion. Heretics and heathens are no longer welcome in our realm."
 teu_peasants_recruitment:0 "Peasant Recruitment"
 teu_peasants_recruitment_desc:0 "It has become clear to us that we can no longer rely on foreign volunteers to fill up our army ranks, no matter how experienced and valuable they might be. Instead, we will develop a system that would allow us to levy our subjects, both $GER_ADJ$ and non-$GER_ADJ$ folk alike."
 teu_prussian_bishops:0 "$prussian$ Bishops"
 teu_prussian_bishops_desc:0 "We shall grant further rights and privileges to our $prussian$ bishops, ensuring their loyalty in all matters."
 teu_reformed_order_army:0 "Reformed Order Army"
 teu_reformed_order_army_desc:0 "The $GER_ADJ$ knights, and veterans of the Crusades and other wars are simply not numerous enough to remain the base of our armies. We must reorganize the army to incorporate domestic levies, regiments capable of replacing the knights on the battlefield."
 teu_teutonic_heavy_cavalry:0 "Teutonic Heavy Cavalry"
 teu_teutonic_heavy_cavalry_desc:0 "There is no greater symbol of power and military prowess than the heavy cavalry. While for many states the cavalry is made of nobles, every Teutonic Knight is also a member of our heavy cavalry, and undergoes the strict training of a crusader."
 teu_teutonic_religious_authority:0 "Teutonic Religious Authority"
 teu_teutonic_religious_authority_desc:0 "We will put an end to the loose religious autonomy local bishops hold within our realm. All religious matters, from taxation to converting the populace, will be state matters from now on."
 textile_mill_advance:0 "Textile Mill"
 textile_mill_advance_desc:0 "$textile_mill_desc$"
 thai_royal_poets:0 "Royal Poets"
 thai_royal_poets_desc:0 "What is the point of winning wars if no songs are sung about our victories? Our court shall be a haven for poets, and our history shall be their source of inspiration."
 thai_war_elephants:0 "War Elephants"
 thai_war_elephants_desc:0 "War elephants have been used in $indochina_region$ for generations, both for cavalry and as personal mounts for the kings, who would then engage in elephant duels with the opposing side's leader."
 the_adige:0 "The Adige"
 the_adige_desc:0 "The Adige River is $VER$'s lifeline — a channel for trade, agriculture, and prosperity. As its waters flow from the Alps to the Adriatic, so too does wealth flow through our markets and fields, nourishing both town and countryside alike."
 the_age_of_the_genoese:0 "The Age of the $GEN_ADJ$"
 the_age_of_the_genoese_desc:0 "The financial development of $GEN$ in recent decades has led $GEN_ADJ$ bankers to becoming among the most sought-after, stimulating the splendor of our country by becoming patrons of renowned artists for their villas and palaces."
 the_ark_of_the_covenant:0 "The Ark of the Covenant"
 the_ark_of_the_covenant_desc:0 "We are the only nation to house the sacred Ark of the Covenant after it was secretly taken by Menelik I with divine assistance thousands of years ago. It is hidden away from public view, lest someone attempt to steal our sacred national treasure. Replicas of the Ark are placed in every single one of our churches as a reminder that our rule is blessed by God."
 the_censorate:0 "The Censorate"
 the_censorate_desc:0 "Parallel to other institutes within our administration, this branch of our government is in charge of preventing corruption. The censors are tasked with keeping palatial intrigues and malfeasance in check, often seen as the eyes and ears of the Emperor."
 the_constitution:0 "The Constitution"
 the_constitution_desc:0 "A new philosophical concept called constitutionalism has been developed, wherein the government accepts legal limits to its power through established law rather than ruling by arbitrary decree. While some may find this idea intriguing, it is obviously not popular with monarchs..."
 the_dhow:0 "$n_kilwan_dhow$"
 the_dhow_desc:0 "$n_kilwan_dhow_desc$"
 the_eight_banners:0 "The Eight Banners"
 the_eight_banners_desc:0 "The Eight Banner System is the core of our society and military. Through hereditary membership and grants of land and income, the Banners are granted elite status, and for good reason — from the conquest of our neighbors to future campaigns, our dominance depends on their might."
 the_exchequer:0 "The Exchequer"
 the_exchequer_desc:0 "Our legislative body must remain distinct from any outside influences, in an effort to preserve our cultural identity and independence. Inspired by Anglo-Norman fiscal institutions, our parliamentary procedures will surely bolster crown revenue and improve administrative oversight."
 the_gold_standard:0 "The Gold Standard"
 the_gold_standard_desc:0 "The ongoing trade deficit between $europe$ and $CHI$ has caused a shortage of silver bullion not only in $europe$, but all over the world. Switching from silver to gold coinage will allow new coins to enter circulation and encourage trade to flow in ever greater amounts."
 the_hajj:0 "The Ḥajj"
 the_hajj_desc:0 "Like Mansa Mūsā of $MAL$ once did, our rulers can travel to $mecca$ on pilgrimage, fulfilling the fifth pillar of $muslim$ and bearing gold as a symbol of our wealth and power. Like the $MAL_ADJ$ pilgrims of old, the world will gasp in wonder at the wealth and grandeur of $SON$."
 the_hansa_bank:0 "The $HSA$ Bank"
 the_hansa_bank_desc:0 "Following our new system of contributions, we can underwrite a bank for members to use. Backed by the resources of the League, a letter of credit from the bank will be as good as cash. This, as well as other financial instruments, will give our merchants an edge over those in other countries."
 the_kilwan_zambuc:0 "$n_kilwan_zambuc$"
 the_kilwan_zambuc_desc:0 "$n_kilwan_zambuc_desc$"
 the_mantle_of_the_great_khan:0 "The Mantle of the Great $rank_kingdom_horde_ruler_suffix_male$"
 the_mantle_of_the_great_khan_desc:0 "The death of $genghis_khan_name_no_tooltip$ created a power vacuum that led to people who should have known better vying to replace him. However, through strategic marriages, we have consolidated our claim to descent from the Great $rank_kingdom_horde_ruler_suffix_male$ himself, and the warriors of the steppes will declare their loyalty to us accordingly."
 the_mestnichestvo_advance:0 "$the_mestnichestvo$"
 the_mestnichestvo_advance_desc:0 "$the_mestnichestvo_desc$"
 the_old_and_infirm:0 "The Old and Infirm"
 the_old_and_infirm_desc:0 "Our veteran sergeants are some of the most despicable and corrupt men imaginable, but that does not mean they are useless. Rather than leave them to be beggars on our streets when their service ends, we can put these old dogs to work. We shall make them into drill sergeants and quartermasters so that their unique skills can be put to use."
 the_pentarchy:0 "The Pentarchy"
 the_pentarchy_desc:0 "The old structure of the Church formulated by Emperor Justinian is still in full effect in $orthodox$. Although the patriarch of $rome$ believes himself to be above all else, for the #italic authentic#! Church, the cities of $constantinople$, $alexandria$, $antioch$, and $jerusalem$ remain far more important."
 the_philosophes:0 "The Philosophes"
 the_philosophes_desc:0 "We are proud to be the home of so many of the most renowned philosophers of these enlightened times. These thinkers produce a constant stream of groundbreaking ideas, which are stimulating advances in all fields, from the most trifling to the most vital."
 the_rebirth_of_the_patriarchate:0 "The Rebirth of the Patriarchate"
 the_rebirth_of_the_patriarchate_desc:0 "Through incredible savvy and political maneuvering within the complex imperial administrative systems of our neighbors, we have successfully negotiated the restoration of our national Patriarchate. This diplomatic victory grants us spiritual and legal jurisdiction over all Serbian populations stretching from the Adriatic coast to the middle Danube, effectively allowing the Church to act as a 'Guardian of all Serbs'. It enables the maintenance of a shadow administration that collects tithes, manages local education, and keeps the flame of our traditions alive among a population that remains unified by a single, powerful faith."
 the_red_cannon:0 "The Red Cannon"
 the_red_cannon_desc:0 "The red-haired barbarians from $europe$ may be uncivilized and ill-mannered, but they do know how to make artillery and firearms of good quality. Importing and duplicating their weapons will give our army a significant advantage against all invaders."
 the_return_of_quetzalcoatl:0 "The Return of Quetzalcōātl"
 the_return_of_quetzalcoatl_desc:0 "Contact with foreigners from other continents has given us interesting new ideas about our gods. The #italic Quetzalcōātl#! prophecy unveils a reality beyond myth — a glimpse of truth. #italic Quetzalcōātl#!, 'the Feathered Serpent', will soon return and herald a transformative era, vanquishing darkness for enlightenment. Symbolizing cosmic fusion, he will bridge matter and spirit, restoring balance and elevating human consciousness."
 the_right_hand_pope:0 "The Right Hand of the Pope"
 the_right_hand_pope_desc:0 "As time goes on, and the Crusades start to fade from the memory of our people, the importance of having the Pope's ear increases. We ingratiate ourselves until we are the closest confidantes to the Supreme Pontiff. Naturally, our devotion to his service will benefit us enormously — and why not enjoy our hard-won privileges?"
 the_sahel_trade:0 "The $sahel_region$ Trade"
 the_sahel_trade_desc:0 "Caravans have been trading between the $sahel_region$ and the Mediterranean for ages, the benefits from this trade greatly outweighing the perils of crossing the burning sands of the Sahara."
 the_swiss_confederation:0 "Principles of the Confederation"
 the_swiss_confederation_desc:0 "Every member of our confederation contributes valuable resources to our cause. Our decentralized approach to governing this alliance of states serves a greater purpose, so we cannot break into civil war when disagreements arise between towns, cities, or our cantons."
 the_tea_trade:0 "The $tea$ Trade"
 the_tea_trade_desc:0 "A staple beverage of our society, $tea$ has come to dominate social gatherings, becoming the choice drink of many. This will undoubtedly lead to not only new varieties being cultivated, but a production boom as well."
 the_the_fair_of_saint_demetrios:0 "The Fair of Saint Demetrios"
 the_the_fair_of_saint_demetrios_desc:0 "We have expanded the ancient religious fair into a massive international trade expo that links the Balkan hinterland with the Mediterranean maritime routes. By granting safe passage to merchants, Thessalonica has become the premier marketplace for fur, grain, and Western textiles. This economic vitality allows the King to bypass the local nobility by funding his administration through sales taxes and customs duties."
 the_the_lombard_guard_advance:0 "The Lombard Guard"
 the_the_lombard_guard_advance_desc:0 "Restored as a bulwark in Macedonia, the Kingdom has revived its heritage by inviting Lombard and northern Italian military engineers to modernize its defenses. These #italic Lombard Guards#! serve as the professional core of the army, utilizing advanced pike-and-shot formations to hold the Vardar valley against the encroaching enemy armies. Their presence ensures that our nation remains a bastion of Western military theory in the heart of the Balkans."
 the_the_macedonian_fur_trade_advance:0 "The Macedonian Fur Trade"
 the_the_macedonian_fur_trade_advance_desc:0 "Our hunters have tapped into the vast wilderness of the northern mountains, establishing a lucrative trade in high-quality pelts for the luxury markets of Italy and France. By regulating the trapping seasons and protecting the trade routes to the Danube, we have secured a consistent source of 'furry gold' for the royal treasury. This industry funds the modernization of our northern fortifications against the rising power of the northern principalities."
 the_the_thessalonican_crown_advance:0 "The Thessalonican Crown"
 the_the_thessalonican_crown_advance_desc:0 "Boniface of Montferrat, crowned King of Thessalonica in 1204, established a northern Latin kingdom that controlled the vital Via Egnatia and much of Macedonia, creating a wealthy and strategically important realm whose capital became a glittering center of Frankish court life, Italian commerce, and Orthodox–Catholic coexistence under Latin domination. Although repeatedly threatened by surrounding enemies, the kingdom's barons maintained a proud martial tradition and a flourishing economy based on grain, wine, and transit trade, ensuring that Thessalonica remained one of the brightest jewels in the Frankokratia."
 the_the_university_of_thessalonica_advance:0 "The University of Thessalonica"
 the_the_university_of_thessalonica_advance_desc:0 "Thessalonica has founded a royal university dedicated to the study of a diverse array of matters, blending Italian theory with local Balkan experience. This institution produces the finest students in the Frankokratia, capable of marvels. Our graduates are in high demand across the Latin world, making the Kingdom the intellectual center of innovation."
 the_the_via_egnatia_restoration_advance:0 "The Via Egnatia Restoration"
 the_the_via_egnatia_restoration_advance_desc:0 "The King has commissioned the total resurfacing and fortification of the ancient Via Egnatia, the vital artery connecting the Adriatic to the Bosporus. By establishing permanent garrisons along this road, we have eliminated banditry and drastically reduced the travel time for both merchants and armies. This logistical masterpiece cements Thessalonica as the indispensable bridge between the Latin Empire and the Western European powers."
 the_yak:0 "The Yak"
 the_yak_desc:0 "Domesticated for centuries, the yak is the backbone of $TIB_ADJ$ pastoral life. It provides meat, milk, wool, transport, and fuel — even its dried dung is a vital source of fuel on the treeless plateau. In times of need or celebration, yak butter fills our lamps and cups."
 the_young_can_serve:0 "The Young can Serve"
 the_young_can_serve_desc:0 "How old does a boy have to be before he is a man? How old must he be before he can die for his country? Some rulers are squeamish; We, on the other hand, are an equal opportunity butcher."
 theater_advance:0 "Theater"
 theater_advance_desc:0 "$theater_desc$"
 theocracy_divine_cause_law_advance:0 "$divine_cause_law$"
 theocracy_divine_cause_law_advance_desc:0 "$divine_cause_law_desc$"
 theocracy_nature_of_our_faith_law_advance:0 "$nature_of_our_faith_law$"
 theocracy_nature_of_our_faith_law_advance_desc:0 "$nature_of_our_faith_law_desc$"
 theotokos:0 "theotokos"
 theotokos_desc:0 "The Virgin Mary is a key figure in our beliefs, as she fulfilled the Old Covenant by carrying within her the New Covenant in the figure of Christ. As such, being the bearer of Christ God-incarnate, she was literally the Mother of God, and has a place of prominence above all other saints."
 there_shall_be_no_grass:0 "There Shall Be No Grass"
 there_shall_be_no_grass_desc:0 "Where our horde has passed, the grass will never grow again; the land will no longer feed our enemies. Day and night will pass, and the ground will stay silent, no crops to be collected. Some hungers you cannot escape."
 thp_a_centralized_levy_system:0 "A Centralized Levy System"
 thp_a_centralized_levy_system_desc:0 "We have moved away from loose clan associations toward a semi-professional core of infantry based in our central urban axis. This modernization allows us to respond to threats with a speed and discipline that traditional tribal levies cannot match."
 thp_french_blood_claims:0 "French Blood Claims"
 thp_french_blood_claims_desc:0 "We assert a prestigious, albeit disputed, descent from the French Royalty, granting our diplomats a unique standing in the courts of Europe. This perceived noble pedigree allows us to negotiate as peers with the Italian city-states and the Papacy, securing alliances that would be denied to common Balkan warlords."
 thp_mecenas_of_the_arts:0 "Mecenas of the Arts"
 thp_mecenas_of_the_arts_desc:0 "We have funded the construction of grand cathedrals and fortifications, blending Gothic and Byzantine styles to showcase our wealth and piety. This architectural splendor serves to legitimize our rule in the eyes of the Church and our subjects, turning our cities into symbols of permanence."
 thp_princeps_albaniae:0 "Princeps Albaniae"
 thp_princeps_albaniae_desc:0 "Our name has become synonymous with the state itself, allowing us to integrate various ethnic groups under a single banner. By promoting the most talented individuals regardless of their origins, we have created a meritocratic bureaucracy that outshines our feudal rivals."
 thp_the_lion_of_thopia:0 "The Lion of Thopia"
 thp_the_lion_of_thopia_desc:0 "Our house has risen to preeminence by masterfully navigating the clashes among the clans, positioning the Thopia family as the arbiters of Albanian sovereignty. By weaving together a complex web of alliances, we will secure the first true #italic Princeps Albaniae#! title recognized by both the East and the West. With the lion of our crest flying over the ramparts of the coast, we have established a professionalized administrative core that outpaces the primitive feudalism of our rivals, ensuring our house remains the apex predator of the Adriatic shore."
 thp_the_thopia_merchant_marine:0 "The Thopia Merchant Marine"
 thp_the_thopia_merchant_marine_desc:0 "We have expanded our commercial influence by offering state protection to all merchant vessels flying the Thopia banner. This naval security has turned our ports into the preferred hubs for Levant trade, siphoning wealth away from the decaying ports of our rivals."
 three_sisters:0 "Three Sisters Agriculture"
 three_sisters_desc:0 "Our land is plentiful, with many crops, but the method of cultivating maize, beans, and squash together is one of our greatest agricultural achievements. Grown together, these crops have a better output than they do when planted separately."
 three_teachings:0 "Three Teachings"
 three_teachings_desc:0 "The $three_teachings$ are a philosophy originating from $CHI$ which combines the teachings of $SECT_CONFUCIANISM_NAME$, $SECT_DAOISM_NAME$ and $buddhist$ into a harmonious, singular teaching. $SECT_CONFUCIANISM_NAME$ represents the ideology of the law while $SECT_DAOISM_NAME$ is the worldview of the radical intellectuals. These two opposite ends of the philosophical spectrum would then be connected with the philosophies of $buddhist$."
 thrive_under_persecution:0 "Thriving Under Persecution"
 thrive_under_persecution_desc:0 "Although our faithful have been persecuted by heretics for centuries, our beliefs have persevered. No matter how many times they bring us down, we will rise again!"
 ths_armatole_administration_advance:0 "Armatole Administration"
 ths_armatole_administration_advance_desc:0 "To combat the lawlessness of the borderlands and the rise of banditry, the Thessalian state institutionalized the #italic Armatoloi#!, a system where local leaders are given official military jurisdiction over specific districts. This administrative layer bridges the gap between the central Despot and the rural peasantry, creating a disciplined paramilitary class responsible for collecting taxes and maintaining internal security. By turning former outlaws into state-sanctioned peacekeepers, the despotate will achieve a level of domestic stability that will allow for renewed economic growth and a more centralized form of governance."
 ths_meteora_sanctuaries_advance:0 "Meteora Sanctuaries"
 ths_meteora_sanctuaries_advance_desc:0 "As the Balkans face increasing instability, the Despots of Thessaly patronize the construction of monastic complexes atop the inaccessible sandstone pillars of Meteora. These 'monasteries in the sky' serve a dual purpose: They function as spiritual beacons for the Orthodox faith and as high-altitude treasuries where the state's wealth and holy relics can be protected from marauding mercenaries. By centralizing the spiritual authority of the region in such defensible positions, the Despotate ensures that the local identity remains anchored in Orthodoxy even when the central government is under duress."
 ths_raiders_of_the_pindus_advance:0 "Raiders of the Pindus"
 ths_raiders_of_the_pindus_advance_desc:0 "Survival in Northern Greece requires a departure from traditional Byzantine field tactics in favor of a sophisticated system of partisan warfare. The Thessalian military doctrine will evolve to focus on #italic Klephthic#! tactics, utilizing the deep ravines and dense forests of the Pindus mountains to bleed enemy supply lines dry through constant harassment. This cultural shift toward guerilla resistance meant that any occupying force will face a landscape where every shepherd is a scout and every mountain path a potential ambush site, making the conquest of Thessaly a logistical nightmare for foreign empires."
 ths_the_wallachian_scutari_advance:0 "The Wallachian Scutari"
 ths_the_wallachian_scutari_advance_desc:0 "In the chaos following the Fourth Crusade, the rulers of Thessaly turned to the semi-nomadic Vlach populations of #italic Great Wallachia#! to bolster their depleted ranks. By granting these fierce herdsmen autonomy and grazing rights in exchange for military service, the Despotate secured a loyal caste of light infantry and skirmishers who thrived in the rugged Pindus range. These soldiers, known for their mobility and devastating shock tactics, became the primary deterrent against Latin knights and Epirote rivals alike, turning the mountain passes into lethal bottlenecks for any invading force."
 ths_thessalian_grain_exchange_advance:0 "The Thessalian Grain Exchange"
 ths_thessalian_grain_exchange_advance_desc:0 "The transformation of the Thessalian plains into a modernized agricultural breadbasket will be completed through the establishment of the Thessalian Grain Exchange. Moving away from medieval sharecropping, the state will encourage the use of the most modern techniques, while the Exchange will standardize prices and quality for the international market. This economic centralization will allow Thessaly to leverage its food surplus as a diplomatic tool, supplying the hungry armies of Europe during conflicts in exchange for political concessions and modern technology. The wealth generated by these exports will fund infrastructure that will link the mountain mines directly to the coastal ports, creating a truly integrated national economy."
 ths_thessalian_horse_breeding_advance:0 "Thessalian Horse-Breeding"
 ths_thessalian_horse_breeding_advance_desc:0 "The vast, fertile plains surrounding Larisa and Trikala offer a unique geographical advantage in a region dominated by mountains: the capacity for large-scale horse-rearing. Drawing upon the ancient legacy of the Thessalian cavalry, the Despots have established state-run stud farms to produce hardy, swift mounts capable of carrying armored riders across diverse terrains. This investment will transform the Despotate's military, allowing it to field a professional cavalry corps that could compete with enemy knights, providing the state with a decisive offensive tool on the open field."
 tibetan_monastic_education:0 "Monastic Education System"
 tibetan_monastic_education_desc:0 "Our monastic institutions have long served as centers of learning, debate, and spiritual discipline. Through rigorous training and a structured approach to education, our clerics maintain a high standard of intellectual and moral integrity. These foundations will support wise governance and cultural flourishing across our enlightened realm."
 ties_with_the_holy_see:0 "Holy See Ties"
 ties_with_the_holy_see_desc:0 "Years of negotiations with the Holy Father have resulted in our embracing $catholic$, with the blessing of our $polish$ neighbors and the Pope himself, during a turbulent and unique Christianization process. After our struggle to seek our spiritual identity subsided, it is clear that we have become a beacon of $catholic$, a shield against the heathens and heretics that threaten our society."
 timariots:0 "timariots"
 timariots_desc:0 "By offering Timar land grants to Sipâhi cavalrymen, they can use this new state-sponsored wealth to supply themselves and their retinue. This allows us to field more formidable cavalry forces."
 timurid_architecture:0 "$TIM_ADJ$ Architecture"
 timurid_architecture_desc:0 "The architecture of $persia_region$ has been the envy of the known world for centuries. We must promote a new form of architecture, one that surpasses anything seen before, so that we may claim our birthright as the master of this art."
 timurid_cavalry:0 "$TIM_ADJ$ Cavalry"
 timurid_cavalry_desc:0 "As the great $genghis_khan_name_no_tooltip$ dominated the steppes with the power of his cavalry, so will we triumph through our incomparable horses. Bred for the most rigorous combat, and mounted by the best-trained soldiers in the world, our cavalry will instill fear in the hearts of our enemies."
 timurid_renaissance:0 "$TIM_ADJ$ $renaissance$"
 timurid_renaissance_desc:0 "Ever since the initial $TIM_ADJ$ expansion, our realm has attracted the greatest artisans and wise men of the age. Through our continued patronage of art, science, and literature, we have made the cities of $herat$ and $samarkand$ the brightest jewels in the world."
 tkd_fuurinkazan:0 "Fūrinkazan"
 tkd_fuurinkazan_desc:0 "'Swift like the wind, gentle like the forest, aggressive like fire, immovable like a mountain.' The words of the great war master Sun Tzu shall be permanently etched into our family's history, and shall serve as our motto."
 tkd_kai_shugo:0 "$kai_province$ Shugo"
 tkd_kai_shugo_desc:0 "We are descendants of the Genji of $kai_province$, and have been traditionally appointed as its #italic Shugo#!. As such, we are intrinsically associated with it, and the famous horses from the province are already synonymous with our cavalry."
 tkd_takeda_ryu:0 "Takeda-Ryū"
 tkd_takeda_ryu_desc:0 "Traditional forms of martial arts have been practiced in our family for generations. Among them, there is particular emphasis on horse riding and mounted archery, making our mounted troops much more effective soldiers than those from other clans."
 tkd_tiger_of_kai:0 "Tiger of Kai"
 tkd_tiger_of_kai_desc:0 "Strong leaders are better at safeguarding their domains than any number of imposing castles. Our generals must train hard, and earn the right to be called the 'Tiger of Kai'."
 tki_banner_of_bellflower:0 "Bellflower Banner"
 tki_banner_of_bellflower_desc:0 "Having been its Shugo for generations, our emblem is already synonymous with $mino_province$. All who live there will fight under our banner."
 tki_flood_control_of_three_rivers:0 "Flood Control"
 tki_flood_control_of_three_rivers_desc:0 "In our home province, the three big rivers of Kiso, Nagara, and Ibi often cause serious flooding in our rice fields. We should control this overflow, and use it to increase the yield in all provinces under our rule."
 tki_genji_in_mino:0 "Genji of $mino_province$"
 tki_genji_in_mino_desc:0 "As the head of the Genji in $mino_province$ and its appointed #italic Shugo#!, we have led other local samurai for generations. Our domain occupies an advantageous position from which to control the neighboring regions."
 tlahtocayotl:0 "Tlahtohcāyōtl"
 tlahtocayotl_desc:0 "We will create a system of provinces for the city-states that are integrated into our realm in an effort to centralize our power."
 tnk_expertise_in_conflicts:0 "Hardened by War"
 tnk_expertise_in_conflicts_desc:0 "Throughout our turbulent history, we never wavered in the face of conflict and insurmountable odds. We need to weaponize this determination, and use it to instill a sense of fervor into our people that will inspire them to fight harder than ever."
 tnk_imperial_legacy:0 "Imperial Pandyan Legacy"
 tnk_imperial_legacy_desc:0 "The lands of southern $india$ have long endured the incursions of foreign invaders and upstart warlords looking to establish their own domains. We must use the grand history of our ancient dynasty to lay claim to this land, as only we can bring stability and peace back to our rightful territory."
 tnk_legitimate_rule:0 "Ancient Roots"
 tnk_legitimate_rule_desc:0 "Our ancestors ruled the lands of $tamil_land_area$ for centuries. In these times when we are dominated by foreign invaders, we should rely on our ancient connections to this land to justify our rule."
 tnk_pearls_of_india:0 "Pearl-Diving Expertise"
 tnk_pearls_of_india_desc:0 "Our people have developed an outstanding skill for diving for and harvesting pearls along our coasts. While this has clear economic benefits, the natural affinity our people have for water makes them excellent and easily-trained sailors, granting us an edge against our seafaring foes."
 tnk_resist_invaders:0 "Expert Resistance"
 tnk_resist_invaders_desc:0 "Our troubled history records both victories and crushing defeats. If we want to endure and dominate as a significant power once more, we must develop a thorough understanding of how to best utilize our native terrain to delay and stall hostile armies until we can mount a direct resistance."
 toi_muay:0 "Toi Muay"
 toi_muay_desc:0 "Taught to our soldiers for use in combat, it is an unarmed martial art featuring punches, grappling, and ground-fighting techniques. Proficiency in this art allows our troops to remain deadly in battle even if they lose their weapons."
 tolerance_idea:0 "Ideas of Tolerance"
 tolerance_idea_desc:0 "Every human was created equal to the Creator, and therefore we understand that their beliefs, even if wrong, can be accepted as a means to eventual conversion to the one true faith."
 tools_workshop_advance:0 "$tools_workshop$"
 tools_workshop_advance_desc:0 "$tools_workshop_desc$"
 town_rights_abs_advance:0 "Splendorous Court"
 town_rights_abs_advance_desc:0 "As the place of our court, our capital should also bask in the glory and magnificence of our rule. No other town or city should come close to it in majesty and grandeur."
 town_rights_aod_advance:0 "Capital Primacy"
 town_rights_aod_advance_desc:0 "From all settlements of our country, both rural and urban, none is more important than our capital. Being the place of our court and the source of our power, it clearly deserves some preferencial treatment compared to other settlements."
 town_rights_enable:0 "Borough Privileges"
 town_rights_enable_desc:0 "It is unquestionable that any substantial aglomeration of people and residences makes a settlement quite different from the countryside. Inheriting from the traditions of Roman self-administrated cities, we can provide such settlements with special laws and privileges, thus making the difference more clear and providing advantages for their populace."
 town_rights_ref_advance:0 "Developed Capital"
 town_rights_ref_advance_desc:0 "As our country grows, so does our capital, requiring constant revision and update of the laws affecting it. Only with a functioning capital, with laws and privileges perfectly suited to its size and importance, can our country continue growing."
 town_rights_rev_advance:0 "Heart of a Nation"
 town_rights_rev_advance_desc:0 "As the source of our government, our capital is the heart of the nation itself. This fact alone makes it special, and more privileged than the rest."
 tra_the_edict_of_torda:0 "The Edict of Torda"
 tra_the_edict_of_torda_desc:0 "In a Europe increasingly torn apart by bloody and fanatical religious wars, Transylvania has bravely issued the Edict of Torda, the first law of universal religious tolerance in the Western world. By allowing Catholics, Lutherans, Calvinists, and Unitarians to coexist within a single legal framework, we have prevented the internal social collapse and civil strife seen throughout the Holy Roman Empire. This unprecedented religious peace makes our principality a safe haven for displaced scholars, scientists, and merchants, rapidly accelerating our adoption of modern administrative reforms and diverse cultural influences. Tolerance has become our greatest strategic asset."
 tra_the_national_mining_academy:0 "The National Mining Academy"
 tra_the_national_mining_academy_desc:0 "We have established world-class scientific institutions to oversee the intensive extraction of gold, silver, and salt from the multiple mountain ranges of our nation. By applying the latest mineralogical and chemical techniques, we have turned Transylvania into the primary treasury of the region. This industrial focus has created a new class of professional engineers and technocrats who manage the state's resources with scientific precision, ensuring long-term economic stability."
 tra_the_transylvanian_autonomy:0 "The Transylvanian Autonomy"
 tra_the_transylvanian_autonomy_desc:0 "While Transylvania has remained part of the Hungarian Kingdom, the local Romanian, Saxon, and Hungarian nobles have all maintained a unique degree of regional autonomy under their own Voivode, and lived in peace. This shared governance has allowed everyone to preserve their distinct faiths and customs despite their apparent differences. This internal collaboration has ensured a certain degree of internal peace and multiculturalism in the Carpathian interior."
 tra_the_transylvanian_trade_guilds:0 "The Transylvanian Trade Guilds"
 tra_the_transylvanian_trade_guilds_desc:0 "In the bustling cities of the Carpathian arc, merchants from our main cultural groups have begun to organize themselves into trade guilds and fraternities, often in competition or cooperation with the others. This is urbanizing a segment of the population, creating a middle class who funds schools and prints books. This economic rise will allow our nation to move beyond the village and into the marketplace of ideas and global commerce."
 tra_the_vauban_transylvanian_bastion_synthesis:0 "The Bastion Synthesis"
 tra_the_vauban_transylvanian_bastion_synthesis_desc:0 "As the age of gunpowder reaches its peak, we have adopted a unique school of military architecture that adapts the latest Italian and French #italic trace italienne#! designs to the rugged, limestone geography of the Carpathian interior. Our major administrative centers have been refortified with low-profile, angled bastions capable of absorbing heavy siege artillery fire. Unlike the massive stone walls of the past, these modern earth-and-brick works are designed for active defense, featuring interlocking fields of fire for the principality's growing artillery corps. This defensive doctrine ensures that any invading army is bled dry in a series of prolonged, costly sieges before they can ever threaten the state's heartland."
 tra_unio_trium_nationum:0 "Unio Trium Nationum"
 tra_unio_trium_nationum_desc:0 "In response to threats of peasant revolts, our higher classes have formed the 'Union of the Three Nations'. This complex and rigid legal framework largely excludes the commoner majority, but creates a highly stable, fortified, and loyal administrative core for the region. This internal unity provides the crown with a reliable base of professional urban and feudal soldiers."
 trade_advance_age_of_trad:0 "Trade Fairs"
 trade_advance_age_of_trad_desc:0 "As trade routes were revived and expanded during the Middle Ages, new mercantile practices began to appear. One such were trade fairs, large-scale events held annually in towns and cities where merchants and traders from different places could meet and broker deals."
 trade_caravans:0 "Trade Caravans"
 trade_caravans_desc:0 "Lucrative trade routes have crossed our territories since ancient times. Our people are used to interacting with long caravan trains of merchants trading in goods from lands far away."
 trade_center_building_country_advance:0 "Emporiums"
 trade_center_building_country_advance_desc:0 "With clever techniques, we can easily make our controlled markets more attractive to foreign merchants, increasing the amount of money we earn in the process."
 trade_companies_advance:0 "Trade Companies"
 trade_companies_advance_desc:0 "It has always been plain that money makes the world go 'round. With desirable new products constantly being discovered in distant lands, trade companies that specialize in distributing them are sure to reap enormous profits."
 trade_envoys:0 "Trade Envoys"
 trade_envoys_desc:0 "With the recent increase in trade to and from faraway lands, our envoys have started joining trade expeditions to establish diplomatic contacts with countries that were previously out of our reach."
 trade_manipulation:0 "Trade Manipulation"
 trade_manipulation_desc:0 "At those key choke points where trade supremacy could go one way or another, edging out the regional competition is crucial to expanding our trade income."
 trade_ports_in_the_channel:0 "Channel Trade Ports"
 trade_ports_in_the_channel_desc:0 "Our position along the English Channel allows us to flourish as a commercial gateway. By investing in our port towns and merchant infrastructure, we can dominate regional trade while minimizing the cost of overseas operations."
 trade_range_advance_age_2:0 "Distant Markets"
 trade_range_advance_age_2_desc:0 "As our economy grows, new opportunities arise. Whereas before short-distance trade routes were very profitable, longer-distance routes have recently started to bring in more money. Our merchant vessels are now sailing farther away for the best offers."
 trade_range_advance_age_3:0 "Improved Trade Ships"
 trade_range_advance_age_3_desc:0 "We have developed larger ships that require a smaller crew to sail, and which can travel farther without needing to stop. This should greatly increase the range of our trade efforts as a result."
 trade_through_owned_disc_advance:0 "Merchant Trails"
 trade_through_owned_disc_advance_desc:0 "Merchants rarely stay still in one place, always trying to find the most profitable trades. Their constant coming and going is a common sight in our lands, and over time they have beaten their own paths to shorten the journey to their destinations."
 trading_embassies:0 "Trading Embassies"
 trading_embassies_desc:0 "The numerous trade ships coming in and out of our waters have familiarized us with many distant realms. By establishing permanent trading embassies with these far-off places, we can transform casual commerce into formal relationships."
 trading_hub_advance:0 "Trading Hub"
 trading_hub_advance_desc:0 "$trading_hub_desc$"
 trading_links:0 "Trading Links"
 trading_links_desc:0 "Our country has been a crossroads of trade since ancient times. Our proximity to $india$ and $china$ has allowed trade to flow through our lands, and with it relationships and interactions with the many different countries around us."
 tradition_of_payment:0 "Tradition of Payment"
 tradition_of_payment_desc:0 "It is always tempting to be a little late paying soldiers of fortune — after all, you never know what sudden expenses might come along. But we will #italic not do that#!; we shall pay our mercenaries exactly on time, and mercenary captains will know this and remember this."
 training_fields_advance:0 "Training Fields"
 training_fields_advance_desc:0 "$training_fields_desc$"
 trampling_horde:0 "Trampling Horde"
 trampling_horde_desc:0 "$genghis_khan_name_no_tooltip$ made the world tremble with his conquests, and we will do the same. The world will learn to fear the sound of galloping hoofbeats as our riders approach!"
 trans_sahara_trade:0 "Trans-Sahara Trade"
 trans_sahara_trade_desc:0 "Our traders frequently bring back fascinating things from the courts of $north_africa$. Perhaps they could find and bring back yet more fascinating trinkets?"
 trans_saharan_trade:0 "Trans-Saharan Trade"
 trans_saharan_trade_desc:0 "The caravans of the great Saharan routes trade $salt$ and other goods from $north_africa$ for $slaves_goods$ and $goods_gold$ from the Sub-Saharan kingdoms. Through these valuable avenues of coin, we will build our great legacy."
 tre_byzantine_birthright:0 "$BYZ_ADJ$ Birthright"
 tre_byzantine_birthright_desc:0 "The great $BYZ_ADJ$ Empire, under the rule of our forefathers, was truly something to behold. Deceit and treachery may have toppled their regime, but $BYZ$ has risen like the phoenix to reclaim its former glory, and now no one shall doubt our authority!"
 tre_empire_in_exile:0 "Empire in Exile"
 tre_empire_in_exile_desc:0 "We inherit some of the bureaucracy of our former empire, allowing us to maintain order and governance despite our reduced circumstances."
 tre_grand_komnenoi:0 "Grand Komnenoi"
 tre_grand_komnenoi_desc:0 "The $komnenos_dynasty$ dynasty may have been expelled from the $BYZ_ADJ$ throne long ago, but its glory never faded. Members of our lineage are still shown the appropriate deference, and this respect and admiration stretches far beyond our borders."
 tre_greek_stronghold:0 "$greek_language$ Stronghold"
 tre_greek_stronghold_desc:0 "Since ancient times, $greek_language$ has been the language of education and science. When our ancestors came here, they not only brought their determination, but also their culture and native tongue. As such, the $greek_language$ tradition of learning is very much alive in our country."
 tre_komnenoi_princesses:0 "Komnenoi Princesses"
 tre_komnenoi_princesses_desc:0 "Some remarkable women have emerged from along the $komnenos_dynasty$, and many among the rulers of $europe$ and even the infidels have sought their hands in matrimony. Our line is well-respected, and our princesses doubly so, for they are what allow foreign countries to claim legitimacy through our line, and us to maintain influence in foreign courts."
 tre_komnenos_legacy:0 "$komnenos_dynasty$ Legacy"
 tre_komnenos_legacy_desc:0 "Let nobody forget that we are the descendants of the $komnenos_dynasty$ that ruled over the $BYZ_ADJ$ Empire. Although we now rule a different state, the legacy and prestige of our dynasty remains undeniable."
 tre_lessons_of_the_fourth_crusade:0 "Lessons of the Fourth Crusade"
 tre_lessons_of_the_fourth_crusade_desc:0 "Isaakios Angelos, who deposed our line centuries ago, was himself deposed and blinded. On the pretense of putting the blind old fool back on the throne, the $VEN_ADJ$ troops then sacked $constantinople$. If there is something to learn from this incident, it is that treason and deceit are ubiquitous in the struggle for power, but they can also safeguard victory."
 tre_pontic_mountains:0 "$pontic_greek_culture$ Mountains"
 tre_pontic_mountains_desc:0 "Much as the Alps separate the $french_group$ and $italian_group$, the $pontic_greek_culture$ Mountains separate our last $greek_culture$ holdout in $anatolia_region$ from the $turkic_group$ invaders who have seized the Anatolian Plateau. Pontus has always been more $greek_culture$ than the rest of $anatolia_region$; perhaps the legacy of the great Mithridates will inspire our warriors and strike as much fear into the Turks as he did the Romans?"
 tre_pontic_trail_mastery:0 "$pontic_greek_culture$ Trail Mastery"
 tre_pontic_trail_mastery_desc:0 "Our land is like our home; its forests, our garden. We know every bit of it better than anyone. Every path and every trail that crosses it is known to us, and we will make use of that knowledge if any dare to invade us."
 tre_princes_of_the_lazes:0 "Princes of the $laz_culture$"
 tre_princes_of_the_lazes_desc:0 "The $laz_culture$ have inhabited these lands for centuries. While our Empire was forged by $greek_culture$ people, many $laz_culture$ nonetheless remain within our borders. This has led to some of our enemies calling us $tre_princes_of_the_lazes$ in mockery, regarding us as inferiors. However, no matter what they say, it does not diminish our heritage, and we shall wear the title proudly."
 tre_strategic_marriages:0 "Strategic Marriages"
 tre_strategic_marriages_desc:0 "Kingdoms are conquered not only by the sword. By forging marriage alliances with surrounding nations, we create opportunities to inherit their thrones — and, at the very least, extend stronger influence over them."
 tre_terminus_of_the_silk_road:0 "Terminus of the Silk Road"
 tre_terminus_of_the_silk_road_desc:0 "Even when it was called Trapezous in the mists of antiquity, our nation was the point where the land route across $asia$ meets the sea route leading to the Mediterranean. We grew famous as the terminal point for the great Silk Road, the wealth of $china$ and $india$ passing through our lands on its way to $europe$. Since our nation still lies in this crucial location, there is no reason for us not to continue and encourage this steady flow of intercontinental trade."
 tre_trapezuntine_endurance:0 "$TRE_ADJ$ Endurance"
 tre_trapezuntine_endurance_desc:0 "Banished from our country, and yet our line survived. Forced to live in a mountainous wasteland surrounded by enemies, and yet our people thrived. We are a resourceful people, determined to make the most of what we have and to best whatever situation we encounter."
 tre_trapezuntine_monasteries:0 "$TRE_ADJ$ Monasteries"
 tre_trapezuntine_monasteries_desc:0 "It is our faith that saves the souls of our people, and our clergy are the ones who ensure their salvation. What,  then, are our monasteries, if not the source and origin of such salvation?"
 tree_of_peace:0 "Tree of Peace"
 tree_of_peace_desc:0 "The Tree of Peace is the legacy of the Great Peacemaker, and is a symbol of our commitment to unity among the different tribes, as well as a representation of the chiefs themselves."
 tri_balance_the_landstande:0 "Balance the Landstände"
 tri_balance_the_landstande_desc:0 "Our territory is both home to many urban areas and castles of many imperial knights. Balancing them and their often opposing interests is no easy task. Only if they cooperate with us and the cathedral chapter, we can ensure the functionality of our government."
 tribal_cultural_identity_law_advance:0 "$tribal_cultural_identity_law$"
 tribal_cultural_identity_law_advance_desc:0 "$tribal_cultural_identity_law_desc$"
 tribal_migration_law_advance:0 "$tribal_migration_law$"
 tribal_migration_law_advance_desc:0 "$tribal_migration_law_desc$"
 tribal_modernization_law_advance:0 "$tribal_modernization_law$"
 tribal_modernization_law_advance_desc:0 "$tribal_modernization_law_desc$"
 tribal_religious_values_law_advance:0 "$tribal_religious_values_law$"
 tribal_religious_values_law_advance_desc:0 "$tribal_religious_values_law_desc$"
 tributary_system:0 "Tributary System"
 tributary_system_desc:0 "A system of subjugated local warlords and other rulers who send us regular gifts of allegiance in recognition of our overlordship. To refine and centralize this system would help us tighten our grip and squeeze more out of them."
 tribute_system:0 "Tribute System"
 tribute_system_desc:0 "Strengthen our income by establishing a formalized system of yearly tribute from our vassals."
 tu_bing:0 "Tǔ Bīng"
 tu_bing_desc:0 "In our quest to shore up our border defenses, it has become apparent that we must create a system of recruitment centered around local soldiers and stalwarts. These fighters will be a valuable addition to our military capabilities, and shall be kept separate from the #italic Wèi Suǒ#! system."
 tulip_period:0 "Tulip Period"
 tulip_period_desc:0 "We will reform old and stagnant traditions, plant tulips in all gardens, and usher in a new golden age of commerce and connection."
 tunisian_corsairs:0 "$TUN_ADJ$ Corsairs"
 tunisian_corsairs_desc:0 "From their strongholds in $TUN$ and La Goulette, our corsairs dominate the Mediterranean. With swift galleys and the power of state sponsorship behind them, they strike fear into foreign merchants and bolster our naval strength with ruthless efficiency."
 turco_mongol_tradition:0 "Turco-Mongol Tradition"
 turco_mongol_tradition_desc:0 "Although the $borjigin_dynasty$ dynasty has a $mongolian_culture$ origin, the territories conquered by $genghis_khan_name_no_tooltip$ in $central_asia$ were mainly hose of $turkic_group$ populations. As a result, a distinct blended culture emerged between those two groups."
 turco_persian_tradition:0 "Turco-Persian Tradition"
 turco_persian_tradition_desc:0 "$IRA$ has always been the undeniable center of culture and language in the region, influencing the different $turkic_group$ peoples that have been around for centuries. We will embrace this blend of cultures to create our own unique tradition."
 turkic_traditions:0 "Turkic Traditions"
 turkic_traditions_desc:0 "We hail from the steppes. The wind, the hardships, and the thrill of battle will always be in our blood, and we must never forget them."
 tuscan_municipal_reforms:0 "$TUS_ADJ$ Municipal Reforms"
 tuscan_municipal_reforms_desc:0 "As we enter the era of absolutism and supreme centralized authority, we must reform local administration accordingly by establishing uniform procedures and transforming  local systems into instruments of central power."
 tuscan_new_trade_system:0 "New $TUS_ADJ$ Trade System"
 tuscan_new_trade_system_desc:0 "The era of trade guild supremacy is slowly coming to an end as their influence wanes in the face of absolute centralized power. By reforming their administration and shifting much of their control to our heads of state, we are sure to increase profits."
 tuscan_physiocratic_reforms:0 "$TUS_ADJ$ Physiocratic Reforms"
 tuscan_physiocratic_reforms_desc:0 "By strengthening our agricultural sectors and taking better care of our people, we will undoubtedly secure a strong foundation for our newly modernized economic systems."
 tuscan_uffizi:0 "Uffizi"
 tuscan_uffizi_desc:0 "Originally meant to consolidate the administration of several guilds and agencies, the Uffizi is a valuable source of centralized power, preserving and displaying various works of art as a sign of cultural superiority and an exhibition of affluence."
 tusi_titles:0 "Tǔsī Titles"
 tusi_titles_desc:0 "Titles granted to warlords and local strongmen, these administrative positions are used to quell unrest and keep the rural populace under central control."
 two_realms:0 "Two Realms"
 two_realms_desc:0 "Due to the size of our realm, our jurisdiction falls under two distinct frameworks: To the north lies the core of our territories, proudly embracing our cultural traditions and social mores. However, our southern and eastern regions often diverge to a certain degree from our central norms. To respect such diversity will strengthen our nation as well as our position on the geopolitical stage."
 tws_capable_vicars:0 "Capable Vicars"
 tws_capable_vicars_desc:0 "A particular struggle of our unified country is governing both sides of the Strait of Messina. Since our ruler can only be present on one side at a time, the other will have to be given to a vicar, ruling in our name. We must be sure to appoint only the most capable and trustworthy people to this vital role to prevent corruption."
 tws_ensure_loyal_families:0 "Loyalty of the Noble Families"
 tws_ensure_loyal_families_desc:0 "The Noble Families of both Sicilies exert much power in our stead. By granting them prestigious yet meaningless roles at court, we will ensure their loyalty and guarantee stable rule over our countryside."
 tws_oversea_ambitions:0 "Overseas Ambitions"
 tws_oversea_ambitions_desc:0 "Expanding our territories within Italy is a difficult task, navigating a treacherous web of alliances and risking the anger of the Pope himself. Therefore, we should look overseas, where potential riches await us in the lands of northern Africa and Greece."
 tws_protect_the_coastline:0 "Increase Maritime Patrols"
 tws_protect_the_coastline_desc:0 "Our coastline is vast, and vulnerable to raids by pirates hunting for slaves. We need to establish a navy to patrol, protect, and eventually defeat this vile threat to our people."
 tws_revitalize_the_lands:0 "Attract new People"
 tws_revitalize_the_lands_desc:0 "Previous rulers put too much focus on particular areas of our country. If we want to retain control of both Sicilies, we will have to invest equally and fairly in both parts. One step towards this goal is attracting people to settle in previously neglected areas."
 tws_unified_legal_code:0 "Unified Legal Code"
 tws_unified_legal_code_desc:0 "The territories which constitute our land have suffered revolts due to unjust applications of laws. In order to prevent these occurrences in the future, we should standardize our legal code and ensure our laws are applied fairly. This will surely prevent any uprising from spiraling into chaos."
 uc_bey_advance:0 "$uc_bey$"
 uc_bey_advance_desc:0 "$uc_bey_desc$"
 ues_double_shugo:0 "Double Shugo"
 ues_double_shugo_desc:0 "We have been appointed #italic Shugo#! of both $kouzuke_province$ and $tango_province$ Provinces. Their plentiful lands are the perfect starting point for our expansion."
 ues_dragon_of_echigo:0 "Dragon of Echigo"
 ues_dragon_of_echigo_desc:0 "Our clan has fostered such an extraordinary spirit of courage and justice that it intimidates our opponents on the battlefield. We will declare the strength of our leaders to all the world, and everyone will quake with terror at the thought of the Dragon of Echigo!"
 ues_eastern_power:0 "Eastern Power"
 ues_eastern_power_desc:0 "Although we have been granted territory in both eastern and western $japan_region$, it is in the east where we will truly be able to flourish. Our territories there are rich, and we can attract many skilled local warriors to fight for our cause."
 ues_strong_dynastic_ties:0 "Strong Dynastic Ties"
 ues_strong_dynastic_ties_desc:0 "Our family descends from the prestigious line of the $fujiwara_dynasty$, and we also have strong ties to the $ashikaga_dynasty$, as the mother of $ashikaga_dynasty$ Takauji was a member of our clan. These dynastic ties will prove invaluable for our prosperity."
 ukrainian_farmlands:0 "Ukrainian Farmlands"
 ukrainian_farmlands_desc:0 "Ukraine, or the 'borderlands' in $slavic$ language, is one of the most fertile regions in $europe$. The lands along both banks of the great rivers are renowned for their rich black soil, yielding abundant harvests of grain, legumes, and fiber crops. Whoever holds these territories commands a significant agricultural advantage, supplying their realm's granaries and the markets of $europe$."
 unchanging_tradition:0 "Unchanging Tradition"
 unchanging_tradition_desc:0 "The tradition passed down to us by Jesus Christ and the apostles is consistent, without any changes, additions, or subtractions whatsoever. Our faith is undeniable in its truths, and what is fundamentally true about this world cannot be changed by mortal hands."
 unified_armies:0 "Unified Armies"
 unified_armies_desc:0 "It cannot be denied that $muslim$ has spread to many different cultures and peoples since its emergence in $arabia_region$. As long as they believe in $muslim_god_name$, any person should be able to fight in His name, regardless of their origin."
 unify_priestly_class_advance:0 "Unify the Priestly Class"
 unify_priestly_class_advance_desc:0 "For much of our history the priesthood responsible for sacred lands and temple revenues has functioned in a decentralized manner. Yet recent developments in foreign religious institutions have introduced new ideas of organization and central authority. These influences now encourage the unification and coordination of our own priestly hierarchy."
 unique_architecture:0 "Unique Architecture"
 unique_architecture_desc:0 "The relative isolation of our patriarchates have resulted in the development of unique architectural styles for our holy places. Although other $christian_ADJ$ denominations may be more prominent, our captivating architecture is an inspiration to the faithful."
 unite_the_tribes:0 "Unite the Tribes"
 unite_the_tribes_desc:0 "Since the birth of our nation, the Jurchen people have been unified and divided into multiple tribes and alliances, and not always friendly ones. This dynamic has been constant for as long as we can remember — as has the urge to unify all our tribes under a single banner. The time has come to satisfy this long-cherished desire!"
 united_faith:0 "A United Faith"
 united_faith_desc:0 "No matter our situation, we must ensure the unity of our faith. Only if our clergy is aligned, and no discord exists between factions of the faithful, will they be able to focus on their primary function of guiding and aiding our population."
 university_advance:0 "University"
 university_advance_desc:0 "$university_desc$"
 university_naples:0 "The University of $NAP$"
 university_naples_desc:0 "Founded in 1224 by Emperor Frederick II, the University of $NAP$ is one of $ITA$'s oldest public institutions. Embracing a secular ethos, it has provided generations of students with a comprehensive education and contributed to intellectual advancements across various fields."
