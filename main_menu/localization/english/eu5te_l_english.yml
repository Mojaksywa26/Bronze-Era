 urbanization:0 "urbanization"
 urbanization_desc:0 "The new opportunities and security offered by life in our emerging cities are drawing more and more people off of rural farms and into cities, where they are eager to take up industrial jobs created by the new, modern factories."
 urbanization_decrees:0 "Urbanization Decrees"
 urbanization_decrees_desc:0 "As part of our efforts to modernize $prague$, we will issue grants encouraging prominent figures to relocate their business to the capital while offering privileges to attract skilled and wealthy foreign immigrants. This influx of talent and capital will transform our $prague$ into a thriving, cosmopolitan metropolis."
 usa_bill_of_rights:0 "Bill of Rights"
 usa_bill_of_rights_desc:0 "#italic ...or abridging the freedom of speech, or of the press; or the right of the people peaceably to assemble, and to petition the Government for a redress of grievances.#!"
 usa_declaration_of_independence:0 "Declaration of Independence"
 usa_declaration_of_independence_desc:0 "#italic We hold these truths to be self-evident, that all men are created equal.#!\\n\\nWith this bold declaration, we shall break the chains of subjugation, and embraced our shared destiny!"
 usa_empowered_assemblies:0 "Empowered Assemblies"
 usa_empowered_assemblies_desc:0 "Elected assemblies emerged throughout the colonies, empowering landowners to govern themselves. The humble origins of liberty lie in the halls of these institutions."
 usa_era_good_feelings:0 "Era of Good Feelings"
 usa_era_good_feelings_desc:0 "In the wake of hardship, peace and unity have brought a rare moment of national harmony. The people flourish with optimism and order."
 usa_great_awakening:0 "Great Awakening"
 usa_great_awakening_desc:0 "A wave of religious revival sweeps the land, challenging old authorities and stirring the moral conscience of a rising people."
 usa_mayflower_compact:0 "Mayflower Compact"
 usa_mayflower_compact_desc:0 "Bound together by shared peril and purpose, the early settlers drafted a pact of self-governance. Even in the wilderness, the seeds of society and compromise found soil."
 usa_recognized_sovereignty:0 "Recognized Sovereignty"
 usa_recognized_sovereignty_desc:0 "Treaties and diplomacy affirmed what our struggles have earned. Our place on the stage of diplomacy is no longer questioned, but respected."
 ushkuiniks:0 "The Ushkuyniks"
 ushkuiniks_desc:0 "The Viking-like #italic Ushkuynik#! pirates were once a useful tool to suppress our competitors. Unfortunately, we were forced to stop using them due to foreign intervention, mainly from Moscow. We should begin funding them again, and send these pirates to plunder farther shores — that will show everyone who the true masters of the North are!"
 utn_fujiwara_descendant:0 "$fujiwara_dynasty$ Descendants"
 utn_fujiwara_descendant_desc:0 "Our genealogy shows that the ancestors of our clan were originally members of the $fujiwara_dynasty$ family from $kyoto$. This kinship to such an ancient and revered dynasty is very useful for making diplomatic connections to the Imperial Court and with the other clans."
 utn_legacy_of_nasu_no_yoichi:0 "Legacy of Nasu no Yoichi"
 utn_legacy_of_nasu_no_yoichi_desc:0 "$shimotsuke_province$ was once the home of Nasu no Yoichi, who was famous for his abilities as an archer during the Genpei War. To this day, the warriors of $shimotsuke_province$ hold him in high regard; we are proud to be called 'the best archers in Kantō' and to carry on Nasu no Yoichi's legacy."
 utn_mediator_of_kanto:0 "Mediator of Kantō"
 utn_mediator_of_kanto_desc:0 "As one of the oldest clans in Kantō, we have a keen insight into regional politics, and have worked as a mediator between different factions on many occasions. This same comprehensive understanding of our home region allows us to expand our territory effectively without provoking others."
 utr_blessed_land:0 "A Blessed Land"
 utr_blessed_land_desc:0 "The Pope himself influences the election of our Prince-Bishop, challenging the traditional five-chapter election format that we had before. This is clear proof that our land has been divinely blessed!"
 utr_city_churches:0 "The City of Churches"
 utr_city_churches_desc:0 "$utrecht$, often called the #italic City of Churches#!, is home to the iconic Dom Tower. The spiritual center of $common_string_prefix_article$ $NED$ and the seat of the Bishopric of Utrecht, it has been a beacon of faith since antiquity."
 utr_skilled_diplomats:0 "Skilled Diplomats"
 utr_skilled_diplomats_desc:0 "Given the growing influence of our neighbors, our nation's survival depends on our ability to find loyal, powerful allies who will support us in our times of need."
 vaccination_advance:0 "Vaccination"
 vaccination_advance_desc:0 "With the development of vaccines, physicians are able to provide the populace with immunity against deadly diseases. These vaccines are helping to reduce the spread of disease and prevent epidemics. By injecting a small amount of weakened or dead bacteria or virus into the body, the immune system is able to recognize and fight off the disease if it ever encounters it again."
 valley_irrigation:0 "Inter-Valley Irrigation"
 valley_irrigation_desc:0 "By building extensive networks of canals and connecting the waterways of our homeland's valleys, we can greatly improve our irrigation techniques and the productivity of our farmlands."
 variety_in_divine_identity_advance:0 "Variety in Divine Identity"
 variety_in_divine_identity_advance_desc:0 "Our pantheon contains a remarkable variety of deities, each representing different virtues, crafts, and ideals. This diversity allows every individual to discover a divine patron that resonates with their life and vocation. The modest altar of a blacksmith to Hephaestus carries meaning equal to the noble devotion offered to Zeus."
 varna_system:0 "Varṇa System"
 varna_system_desc:0 "Since the times of the $vedah$, there has existed the concept of one's Dharma being classified as one of the four possibles: #italic Brāhmaṇa#!, scholars or priests; #italic Kṣatriya#!, rulers or warriors; #italic Vaiśya#!, farmers or merchants; or #italic Śūdra#!, artisans or servants. These classifications are not rigid, but instead represent the ideal of an individual's calling, and they have been very influential in $hindu_ADJ$ society."
 vauban_fortifications:0 "Innovative Fortifications"
 vauban_fortifications_desc:0 "Our genius in fortification does not represent a radical departure in their design; rather, the innovation comes from the placement of the fortresses. By taking maximum advantage of local terrain, even the most basic fort requires more effort and supplies to take."
 veche_advance:0 "The Veche"
 veche_advance_desc:0 "$veche_advance$ is a popular assembly with its origins in ancient tribal councils, which themselves existed long before the time of the Rus'. It is the highest judicial and legislative authority of the state."
 vedah:0 "Vēdaḥ"
 vedah_desc:0 "The main texts among the $sruti$ are the $vedah$, which are the oldest $sanskrit_language$ texts. Their authorship is attributed to Brahmā in the $mahabarata$, and they are the Ṛgveda, the Yajurveda, the Sāmaveda, and the Atharvaveda."
 vegetarianism:0 "vegetarianism"
 vegetarianism_desc:0 "Although it depends on the school, there are some rules in the Dharma regarding abstinence from meat consumption. Each school has different views about the strictness of this abstinence, and also whether it should apply only to the monastic community or to the population in general."
 ven_gothic_architecture:0 "Gothic Architecture"
 ven_gothic_architecture_desc:0 "Influenced by $BYZ_ADJ$ architecture and with nods to Islamic aesthetics, the unique $ven_gothic_architecture$ is a core element of $VEN_ADJ$ identity and highly beloved by the upper class. Many aristocrats and prosperous merchants show their support for proliferating this style of architecture with their gold."
 ven_magistrato_alla_sanita:0 "Magistrato alla Sanità"
 ven_magistrato_alla_sanita_desc:0 "The #italic $ven_magistrato_alla_sanita$#! — Magistracy of Health — is a crucial office in our state which oversees the prevention of diseases and epidemics."
 ven_mixed_naval_tactics:0 "Mixed Naval Tactics"
 ven_mixed_naval_tactics_desc:0 "Oar-propelled vessels have been standard since the inception of the $VEN_ADJ$ navy. However, sailing ships now play an increasingly dominant role in Mediterranean naval combat. Our navy will adapt by adopting the mighty galleass, a hybrid ship that can use both oars and sails."
 ven_naval_conscription:0 "Naval Conscription"
 ven_naval_conscription_desc:0 "For as long as $VEN$ has stood, our galleys have been rowed by free men who worked for a wage, but an acute manpower shortage is making it harder to find qualified oarsmen. We have no choice but to resort to conscription to staff our galleys."
 ven_printing_industry:0 "Printing Industry"
 ven_printing_industry_desc:0 "Since the invention of the printing press, the people of $VEN$ have shown an aptitude for its use. We should encourage further development of our printing industry, as the potential benefits are manifold."
 ven_provveditori_ai_beni_inculti:0 "'Provveditori ai Beni Inculti'"
 ven_provveditori_ai_beni_inculti_desc:0 "This department for uncultivated natural resources was set up to facilitate the draining of marshes and the irrigation of arid land. The ultimate goal is to improve the supply of food to $VEN$."
 ven_ship_mounted_gunpowder_weapons:0 "Ship-Mounted Gunpowder Weapons"
 ven_ship_mounted_gunpowder_weapons_desc:0 "Naval combat has been more like fighting a land battle on floating planks than actual ship-to-ship combat for millennia. With the introduction of gunpowder weapons on our ships, we are able to break away from old-fashioned warfare and annihilate enemy ships before they come even close to boarding our galleys."
 ven_state_inquisition:0 "Found the State Inquisition"
 ven_state_inquisition_desc:0 "The State Inquisition is a panel of three judges that was set up to handle threats to internal security. The panel's small size means they can deal quickly with threats, and it will not take them long to establish a network of agents both at home and abroad to root out the traitors."
 ven_stato_da_mar:0 "Stato da Mar"
 ven_stato_da_mar_desc:0 "Trade is the lifeblood of $VEN$, and competent management of our overseas trade stations is vital to our trading interests. By centralizing the administration of these lands into a single unit, we will enhance our trade."
 ven_venetian_painting:0 "$VEN_ADJ$ Painting"
 ven_venetian_painting_desc:0 "$ITA$ as a whole is famous for its cultural achievements, and $VEN_ADJ$ painting is one of its greatest contributions. Artists come from far away to experience our magnificent galleries and witness our cultural rebirth firsthand."
 ven_venetian_palaces:0 "$venetian_palaces$"
 ven_venetian_palaces_desc:0 "$venetian_palaces_desc$"
 ven_venetian_school_of_music:0 "$VEN_ADJ$ School of Music"
 ven_venetian_school_of_music_desc:0 "While our paintings attract enthusiasts of visual art, $VEN_ADJ$ music travels far and beyond, beloved by those who seek melodic enlightenment. Many great composers graduate from our conservatories and go on to find great success throughout $europe$, spreading our culture with every golden note."
 ven_venetian_thalassocracy:0 "$VEN_ADJ$ Thalassocracy"
 ven_venetian_thalassocracy_desc:0 "$VEN$ has always had a close connection to the sea. Trade and commerce are deeply integrated into our administration, and $VEN_ADJ$ merchants have access to more resources than in any other government."
 venetian_arsenal_advance:0 "$VEN_ADJ$ Arsenal"
 venetian_arsenal_advance_desc:0 "Dating from the 12th century, the Arsenal of $VEN$ is the foundation on which all our power rests."
 vetting:0 "vetting"
 vetting_desc:0 "Because so many of our government positions are held by those seeking to advance themselves, we sometimes find that those who run our administration are susceptible to bribes from foreign powers. Running some simple background checks will weed out the officials most prone to corruption."
 vibrant_court_advance:0 "Vibrant Court"
 vibrant_court_advance_desc:0 "Great minds flock to our court from across the known world, bringing with them diverse languages, fashions, and art. As a result of this exposure, we have grown more accommodating of their foreign 'manners'."
 vice_roys:0 "Viceroys"
 vice_roys_desc:0 "Makes it possible for us to establish Viceroys, therby improving the administration of our colonies and increase the amount of money they generate."
 viceroyalty_advance:0 "Viceroyalty"
 viceroyalty_advance_desc:0 "A viceroyalty refers to a distinct and semi-autonomous territorial unit within a kingdom, characterized as a monarchical state governed by a designated viceroy. These administrative entities are entrusted to a viceroy, appointed by the monarch, with the crucial responsibility of managing and governing a specific country or province. Typically situated apart from the central core of the kingdom, the viceroyalty operates as a separate entity, exhibiting a degree of self-governance while ultimately being answerable to the reigning monarch. The viceroy's role encompasses a wide range of duties, including the implementation of policies, the maintenance of order, and the representation of the king's authority in the designated region."
 vid_the_codex_shishman:0 "The Codex Shishman"
 vid_the_codex_shishman_desc:0 "To finalize the transition from a medieval feudal state to a modern, centralized monarchy, the Tsardom will promulgate the #italic Societas Codex Shishman#!, a comprehensive legal reform that unifies the disparate local customs of the Western Balkans. This code will establish a professional judiciary independent of the local landowners and standardize the weights, measures, and currencies used throughout Vidin's trade network. By providing a predictable and fair legal environment, we will ensure the growth of a loyal urban middle class and the stability of the state's tax revenue. This administrative modernization will make Vidin a beacon of 'Enlightened Despotism' in the East, where the rule of law is as ironclad as the walls of Baba Vida itself."
 vid_the_mining_grants:0 "The Mining Grants"
 vid_the_mining_grants_desc:0 "Vidin needs to expand its influence into the mineral-rich Timok valley, granting charters to Saxon and Ragusan miners to extract silver, lead, and copper. This industrial base will provide the Tsardom with the metal needed for modern currency and the production of high-quality firearms, making Vidin a self-sufficient military power. The wealth from these mines will also allow the Tsars to maintain a professional army."
 vid_the_order_of_the_danubian_dragon:0 "The Order of the Danubian Dragon"
 vid_the_order_of_the_danubian_dragon_desc:0 "To ensure the loyalty of the border nobility and create a professional officer corps, the Tsars of Vidin will establish a local knightly order modeled after the Western European #italic Societas Draconistrarum#!. Members of this order will be granted estates along the Timok and Danube rivers in exchange for maintaining a state of perpetual readiness and providing a heavy cavalry core for the Tsardom's defense. This institution will hopefully bridge the gap between the old Bulgarian Boyar traditions and the chivalric standards of the West, fostering a high level of military discipline and personal loyalty to the crown and prevent internal fragmentation."
 vid_the_stronghold_of_baba_vida:0 "The Stronghold of Baba Vida"
 vid_the_stronghold_of_baba_vida_desc:0 "The fortress of Vidin, situated at a strategic bend in the Danube, serves as the ultimate gateway between the Bulgarian lands, the Hungarian plains, and the Serbian mountains. Under the Shishman dynasty, the castle of Baba Vida has been transformed into a sophisticated riverine citadel capable of withstand long sieges and housing a permanent garrison of elite troops. This focus on defensive architecture ensures that Vidin remains a sovereign bastion, even when the rest of the Bulgarian heartland is under threat, acting as a 'Western Shield' for the nation."
 vid_the_western_connection:0 "The Western Connection"
 vid_the_western_connection_desc:0 "Positioned at the crossroads of cultures, the Tsars of Vidin have maintained closer ties with the Catholic West than any other Bulgarian rulers, often marrying into Hungarian and Wallachian nobility. This diplomatic flexibility allows Vidin to survive as an independent state, utilizing Western military technology and courtly traditions to distinguish itself from the rest of $BUL$. By acting as a bridge between the Orthodox and Catholic worlds, Vidin becomes a center of trade and intellectual exchange that enriches the local treasury and the army."
 vid_vidins_custom_houses:0 "Vidin's Custom Houses"
 vid_vidins_custom_houses_desc:0 "As the trade between the upper Danube and the Black Sea grows, Vidin has become one of the most important custom houses on the Lower Danube, regulating the flow of European luxury goods into the Balkans. By implementing a sophisticated system of tariffs and warehouse laws, the state will be able to fill its coffers without placing a heavy burden on its own agricultural population. This trade-heavy economy will allow Vidin to modernize its infrastructure, building paved roads and stone bridges that connect the Danube to the interior of the Balkan Peninsula."
 vij_adroit_diplomacy:0 "Adroit Diplomacy"
 vij_adroit_diplomacy_desc:0 "The numerous invaders of our $hindu_ADJ$ people have shown time and time again the same weakness: the tendency to fight amongst themselves. We must be ready at all times to exploit this to our own ends."
 vij_an_army_for_city_of_victory:0 "An Army for the City of Victory"
 vij_an_army_for_city_of_victory_desc:0 "For the City of Victory to be worthy of its name, we must have an army that can bring about these namesake triumphs. We will ensure our troops are well-trained and take great pride in their service."
 vij_arab_horses:0 "Arabian Horses"
 vij_arab_horses_desc:0 "Horses from $arabia_region$ are far superior to our local breeds. We will use our trade connections to ensure that we have a steady supply for our military."
 vij_carnatic_music:0 "Carnatic Music"
 vij_carnatic_music_desc:0 "We must resist the $muslim_ADJ$ invasion on all fronts. The musical traditions of the Northern States are already showing signs of foreign influence. This is blasphemy, because we all know that music is a divine art form that originated with the Devas and Devis themselves. We will show the $hindu_ADJ$ people that we are committed to defending this holy art form."
 vij_city_of_victory:0 "City of Victory"
 vij_city_of_victory_desc:0 "$vijayanagar$ — the 'City of Victory' — is the heart of our state, and will one day become the heart of the entire $hindu_ADJ$. Let it shine as a beacon of culture and tradition even as it fends off the $muslim_ADJ$ invaders!"
 vij_cultural_integration:0 "Cultural Integration"
 vij_cultural_integration_desc:0 "The cultural diversity of $india$ is one of our defining traits. By allowing our various settlements to rule by their own customs, we will assure their loyalty and integration into our society."
 vij_decentralized_rule:0 "Decentralized Rule"
 vij_decentralized_rule_desc:0 "As our state grows, so do our administrative burdens on the government and the risk of revolt. To counteract this, we shall establish a system of decentralized rule, where settlements can manage their own minor issues, only seeking intervention from the central court for severe matters."
 vij_first_indian_artillery:0 "First Indian Artillery"
 vij_first_indian_artillery_desc:0 "The military application of gunpowder is not yet widespread, but it has the potential to mold the future of warfare. We must explore the utility and benefits of gunpowder."
 vij_harsh_penal_code:0 "Harsh Penal Code"
 vij_harsh_penal_code_desc:0 "Harsh punishments — including being put to death — are how we uphold law and order in this society. By establishing and strictly enforcing a harsh penal code, we ensure criminals fear the consequences of their actions, creating stability through the certainty of punishment."
 vij_indian_throne:0 "Indian Throne"
 vij_indian_throne_desc:0 "$india$ has been subject to $muslim_ADJ$ threats for far too long. Heathen empires claim their rule from $delhi$ in the north, yet their beliefs and government are in direct opposition to what our people want. No, a new seat of power must be established — and $vijayanagar$ shall be the new Throne of $india$!"
 vij_promotion_of_trade:0 "Promotion of Trade"
 vij_promotion_of_trade_desc:0 "Our territory is situated on one of the key trade routes from East to West. We must ensure that our ports are safe and secure so that visiting captains will land there... giving us the opportunity to tax them."
 vij_rule_in_accord_with_dharma:0 "Rule According to Dharma"
 vij_rule_in_accord_with_dharma_desc:0 "#Italic Dharma#! is a major pillar of our religious and social values. Our state can only be just and virtuous if our rulers themselves embody and live in accord with dharma."
 vij_the_bunds:0 "The Bunds"
 vij_the_bunds_desc:0 "Our society is built on agriculture in the rather arid $karnakassala_area$ area. The #italic bunds#!, also called #italic anecut#!, provide our cities and fields alike with much-needed fresh water."
 voivode_advance:0 "Voivode"
 voivode_advance_desc:0 "The #italic voivode#! is a military leader with regional administrative authority, defending territory and maintaining order. A voivode can be useful in overcoming the challenges posed by the limited means of communication available, as they have the authority to make crucial decisions without waiting for approval."
 wagenburg:0 "wagenburg"
 wagenburg_desc:0 "During the Hussite Wars, our armies relied on wagon forts called #italic Wagenburg#! to win battles against superior forces. While we may not always deploy wagons, the principle remains: infantry sharpshooters fighting from prepared defensive positions become our standard doctrine."
 wake_of_the_mongol_horde:0 "Wake of the $MGE_ADJ$ Horde"
 wake_of_the_mongol_horde_desc:0 "There is almost no place in $asia$ that has not felt the influence of the $MGE_ADJ$ conquests. After the fall of the once-great empire forged by $genghis_khan_name_no_tooltip$, the land is finally recovering from being trampled by his horses."
 wal_the_abolition_of_serfdom:0 "The Abolition of Serfdom"
 wal_the_abolition_of_serfdom_desc:0 "Under the reformists in our nation, we have taken the radical step of legally abolishing serfdom, before many of our neighbors. By transforming the peasantry from 'chattel' into 'taxable subjects', we have centralized the state's fiscal power and broken the absolute control of the rural boyars. This social revolution provides the Voivode with a more direct relationship with the people, creating a more mobile and economically active population capable of supporting a modernizing central administration."
 wal_the_diplomat_schools:0 "The Diplomat Schools"
 wal_the_diplomat_schools_desc:0 "Under the patronage of high officials, we have established the Princely Academy of Saint Sabbas, bringing Italian and Greek professors to our capital. This investment in high education has created a generation of 'Philosopher-Diplomats' who are as comfortable discussing Latin rhetoric as they are negotiating secret treaties with our neighbors. By turning our capital into an intellectual beacon, we have ensured that our administrative elite remains the most sophisticated in the Balkans, capable of outmaneuvering anyone at every turn."
 wal_the_order_of_the_dragon_influence:0 "The Order of the Dragon Influence"
 wal_the_order_of_the_dragon_influence_desc:0 "We will introduce a culture of brutal psychological warfare and absolute law and order in Wallachia. By purging the corrupt boyars and imposing strict legal codes, we will consolidate princely power and transform the military into a centralized force loyal only to the Voivode. This ruthless reputation will serve as a primary deterrent for the forces of our enemies."
 wallachian_heritage:0 "The Battle of Posada Legacy"
 wallachian_heritage_desc:0 "In 1330, Basarab I defeated the Hungarian King Charles Robert, securing Wallachian independence through superior mountain tactics. This victory proved that a smaller, localized force could utilize the treacherous Carpathian passes to dismantle imperial armies, setting a military precedent for the next five centuries. Our troops are now experts in hit-and-run warfare and utilize the terrain to bleed invaders long before they reach the Danubian plains."
 wallachian_tradition:0 "The Descent of the Vlachs"
 wallachian_tradition_desc:0 "According to historical tradition, Radu Negru crossed the Carpathians from Transylvania to found the Principality of Wallachia, and similar stories have been told about the foundation of other Principalities. This 'founding descent' or #italic Descălecatul#! represents the migration of Romanian elites and the establishment of the first sovereign Țara Românească (Romanian Land), independent of foreign hegemonies. This event marks the birth of a distinct Romanian statehood, separate from the surrounding empires, but deeply rooted in Orthodox and Latin heritage."
 wampum:0 "wampum"
 wampum_desc:0 "A mix of white and purple beads made from different kinds of shells, wampum are used for many purposes, such as recording treaties and oral histories, facilitating diplomacy, and functioning as a system of exchange in trade. Wampum appears wherever our people tread."
 wandering_scholars:0 "Wandering Scholars"
 wandering_scholars_desc:0 "Communities of learned scholars of many faiths live in our lands, offering religious instruction to all who will listen."
 war_bonfires:0 "War Bonfires"
 war_bonfires_desc:0 "A network of frontier settlements linked together by immense bonfires, which can be seen from a huge distance when lit, will allow us to quickly alert multiple settlements at once to threats, and therefore respond far faster."
 war_college_advance:0 "War College"
 war_college_advance_desc:0 "$war_college_desc$"
 war_no_cb_cost_modifier_renaissance_advance:0 "Recurrent Warfare"
 war_no_cb_cost_modifier_renaissance_advance_desc:0 "The nature of war is strongly influenced by which actors are involved. Those with superior capabilities can wage war for longer periods, and thus inter-state wars are becoming increasingly more common."
 war_score_absolutism_advance:0 "Aggressive Demands"
 war_score_absolutism_advance_desc:0 "The power of the state is directly tied to its military capacity. The more populous a country is, the grander its army can become. We must take an aggressive approach toward annexing as much land as possible in peace treaties to seize the advantage over our neighbors."
 war_score_reformations_advance:0 "Divine Right to Conquer"
 war_score_reformations_advance_desc:0 "Victory on the battlefield is the result of more than just good execution of battle plans and war strategies — it is a divine intervention in our favor. Therefore, our right to conquer and annex new territories for which we have spilled blood is an extension of the divine will that champions our supremacy."
 war_score_revolutions_advance:0 "Arguments of Reason"
 war_score_revolutions_advance_desc:0 "Wars are always ugly affairs that bring suffering to both sides. Emphasizing this fact, and appealing to our opposition's reason and logic, will surely give us a significant advantage when negotiating the inevitable border changes."
 warka_ties:0 "Warka Ties"
 warka_ties_desc:0 "Our ties with the Warka have given us great knowledge in hunting and gathering food. Through these practices, we ensure our people stay fed, even during long winters."
 warlord_dukes:0 "Warlord Dukes"
 warlord_dukes_desc:0 "Over two remarkable centuries of warfare, $LIT_ADJ$ warlord dukes transformed a loose federation of tribes into a unified warrior state. They mounted fierce resistance against the aggression of $catholic_ADJ$ holy orders, while simultaneously conquering vast territories in the East. These legendary achievements continue to inspire our military leaders today."
 warrior_societies:0 "Warrior Societies"
 warrior_societies_desc:0 "Our society is remarkably dynamic, offering commoners, also known as #italic mācēhualtin#!, the path to become #italic pīpiltin#!, or noble, by exceptional military service through the #italic tlahuiztli#! honor dress rank system. This unique opportunity for upward mobility grants our people a distinct advantage over those in neighboring societies."
 warriors_unity:0 "Warriors Unity"
 warriors_unity_desc:0 "We may not be the largest tribe in terms of sheer number, but our tribal nature gives us something that others lack: unity! Our warriors fight as brothers and stand together on the field of battle. So long as we maintain this tradition, we cannot lose!"
 wary_of_heretic_preachers:0 "Defense Against Heretics"
 wary_of_heretic_preachers_desc:0 "We will need to be wary of forces trying to convert our people, or seduce them back to our previous faith. By publicly declaring these preachers to be malicious and hostile, we can prepare our people for these interactions and more easily reinforce religious orthodoxy."
 watchers_of_the_silk_road:0 "Watchers of the Silk Road"
 watchers_of_the_silk_road_desc:0 "We do not build, we do not trade. We take what we need... and sometimes more. Our warriors have kept an attentive watch upon foreign merchants and their passage, and we now know the safest paths for transporting our goods."
 water_frame:0 "Water Frame"
 water_frame_desc:0 "The water frame is a spinning frame used in the textile industry to produce cotton thread. This innovation will contribute to the establishment of large textile factories powered by water wheels."
 wealth_of_mesoamerica:0 "Wealth of Mesoamerica"
 wealth_of_mesoamerica_desc:0 "The fertile soils, forests, and mines of Ānāhuac yield immense riches, sustaining our growth and imperial ambitions. Properly utilizing these resources will bolster our affluence."
 weapon_factory_advance:0 "Weapon Factory"
 weapon_factory_advance_desc:0 "$weapon_factory_desc$"
 weapon_guild_advance:0 "$weapon_guild$"
 weapon_guild_advance_desc:0 "$weapon_guild_desc$"
 weapon_manufactory_advance:0 "Weapon Manufactory"
 weapon_manufactory_advance_desc:0 "$weapon_manufactory_desc$"
 weapon_workshop_advance:0 "$weapon_workshop$"
 weapon_workshop_advance_desc:0 "$weapon_workshop_desc$"
 weisuo_system:0 "Wèi Suǒ"
 weisuo_system_desc:0 "Many would-be conquerors eye our lands with covetous intent. If we are to defend our territory, we must set up a garrison system, aimed at rapidly responding to hostile invasions. Through the recruitment of local troops, our defensive prowess will be supplemented through supplies and more efficient logistics."
 west_african_caravan_stop_advance:0 "Saharan $caravan_stop$"
 west_african_caravan_stop_advance_desc:0 "Trade between sub-Saharan $africa$ and $north_africa$ has been part of our identity for centuries. The journey across the vast desert, even with the many years of accumulated experience, is always taxing and dangerous. The key to securing trade in this region is the $caravan_stop$, a place where merchants and their caravans can rest and refresh themselves on their way through the desert."
 west_african_slave_trade:0 "West African Slave Trade"
 west_african_slave_trade_desc:0 "Even before our Empire existed, the great Wagadou, the Ghana Empire that preceded us, sold $slaves_goods$ across the desert to the Arabs. We have followed suit all these years, supplying the Arab world with a vast number of $slaves_goods$. Now the Europeans clamor for even more $slaves_goods$ to work their holdings in the so-called New World. We have had little report, but the amount of $slaves_goods$ they demand is truly stunning, and they keep coming back, sometimes even raiding our shores and abducting our subjects. The time has come to impose order on this trade and restrict the Europeans to select commercial ports where they will purchase, not steal, $slaves_goods$."
 westphalian_monastic_traditions:0 "Land of Monasteries"
 westphalian_monastic_traditions_desc:0 "$north_german_region$ is home to many $catholic_ADJ$ strongholds, such as the Bishoprics in $munster$ and $paderborn$. Monastic life and associated regional religious traditions have a generally positive effect on the literacy and education of our clergy, as there are plenty of opportunities for them to further educate themselves. This access to learning also helps the Holy Mother Church by creating an intellectual flock well-suited to priestly duties."
 whale_hunters:0 "Whale Hunters"
 whale_hunters_desc:0 "Whales, porpoises, walruses, seals... everything the sea gives us, we hunt."
 wiener_klassik:0 "Wiener Klassik"
 wiener_klassik_desc:0 "Viennese Classicism is a transformative force in music. Our best composers' works shall revolutionize Western musical tradition through bold, trend-setting innovation of symphonic, operatic, and chamber arrangements."
 windmills_advance:0 "$windmill$"
 windmills_advance_desc:0 "$windmill_desc$"
 winery_manufactory_advance:0 "$winery_manufactory$"
 winery_manufactory_advance_desc:0 "$winery_manufactory_desc$"
 winged_hussars_advance:0 "Winged Hussars"
 winged_hussars_advance_desc:0 "The hussars were originally light cavalry troops used for scouting, but with the decline of the old feudal army, we have switched over to professional regiments, the core of which shall be made up of these heavier, armored hussars. The fear of these winged warriors shall make our enemies tremble in the night like children!"
 wojsko_komputoe:0 "Wojsko Komputowe"
 wojsko_komputoe_desc:0 "The 'Compute Army' was based around an annual budget calculated and approved by the Sejm. The idea behind this was to provide the Commonwealth with a stable standing army for defense."
 woodblock_printing:0 "Woodblock Printing"
 woodblock_printing_desc:0 "The production of elegant illustrations, artworks, and books using this printing method has captivated our people's attention, and our master printers constantly strive to perfect their techniques. Woodblock printing has become part of our culture and, with recent improvements to and expansion of our literary production, will further elevate our prestige."
 write_new_sagas:0 "Write New Sagas"
 write_new_sagas_desc:0 "Keen minds preserve knowledge\\nKnown from ages past\\nSung in the sundown\\nSagas are our inheritance\\nEncouraged by the establishment\\nEach country will have its own"
 written_alphabet:0 "Written Alphabet"
 written_alphabet_desc:0 "What is a society but the sum of its legacy? A written alphabet, therefore, is but the first step towards immortalizing our culture, as well as the foundation of building an educated, well-functioning society."
 xuanzang_travels:0 "Xuánzàng Travels"
 xuanzang_travels_desc:0 "Xuánzàng, a $chinese_group$ $buddhist_ADJ$ monk who lived during the Táng dynasty in the 7th century, embarked on a seventeen-year overland trip to $india$ in order to visit it centers of learning and to gather a great number of $buddhist$ texts. Among other places he visited Nālandā, where he learned from the best masters, and on his return to $china$ he brought with him more than a thousand documents, which made a great contribution to $mahayana$. His trip and his records served as basis for the tale of #italic Journey to the West#!, in which a monk is tasked by the Buddha to travel to $india$ in search of some holy texts. accompanied among others by the Monkey King, Sūn Wùkōng."
 yams_of_the_great_khan:0 "Yams of the Great $rank_kingdom_horde_ruler_suffix_male$"
 yams_of_the_great_khan_desc:0 "In order to ensure that messengers could travel fast enough to keep up with Mongol armies, $genghis_khan_name_no_tooltip$ instituted a system of relay stations or #italic yams#!, which were set up every 30-60 km to provide food, shelter and spare horses for Mongol army messengers. This allowed messages to travel as fast as a horse can gallop, with fatigue no longer slowing the speed a messenger could travel. By these means, our empire was able to overcome the logistical problems caused by the vast scale of the Pax Mongolica - at least temporarily."
 yem_unite_the_tribes:0 "Unite the $YEM_ADJ$ Tribes"
 yem_unite_the_tribes_desc:0 "From the Tihāmah coast to the Ḥarāz mountains, our realm is home to countless fiercely independent tribes. While they have long resisted centralized authority, they are also our strength. By uniting them under a single cause, we can better utilize them as a workforce."
 ymn_descendant_of_nitta:0 "Descendants of the $nitta_dynasty$"
 ymn_descendant_of_nitta_desc:0 "We are descendants of the $nitta_dynasty$ clan, ancient rivals of the $ashikaga_dynasty$ family. To some this is proof of the depths of our loyalty, while to others this makes us a natural enemy. We must cleverly utilize our lineage as a diplomatic weapon."
 ymn_isolated_heartland:0 "Isolated Heartland"
 ymn_isolated_heartland_desc:0 "Our homeland is mountainous and isolated. Fortunately, this also means that any potential conquerors would find our territory almost impossible to reach! Let us build our defenses so that they complement the natural protective strength of our geography — any invader will bitterly regret the day they turned their greedy eyes to our possessions."
 ymn_leader_of_western_army:0 "The Western Army"
 ymn_leader_of_western_army_desc:0 "Let us forge a great western army to unite the squabbling states of $japan_region$. Skillful generals, well-trained soldiers, and ironclad bravery will easily force the Easterners to their knees!"
 ymn_mediate_succession_disputes:0 "Succession Dispute Mediation"
 ymn_mediate_succession_disputes_desc:0 "As many of the other clans squabble within themselves over who is the rightful heir to whom, they turn to us to mediate their disputes. Doing so puts us in a unique position of power and trust, making it easy for us to make new allies and contacts — and to destabilize our rivals."
 yoga:0 "yoga"
 yoga_desc:0 "A prominent $hindu_ADJ$ school and philosophy, $yoga$ is a set of practices both physical and spiritual, with the purpose of controlling the mind and body. Performed for millennia, it has almost become synonymous with the path of enlightenment."
 yulin_tuce:0 "Yúlín Túcè"
 yulin_tuce_desc:0 "Tax evasion is a timeless problem that even plagued our ancestors, but we may have found a solution: By compiling registers for districts and provinces, we will keep better track of the taxes owed to the central government by every plot. This taxation is largely determined based on the grain yield of every plot that undergoes survey."
 zaju:0 "Zájù"
 zaju_desc:0 "Typically consisting of four acts, this brilliant display of dance and music is a colorful expression of the artistic heights that our society has achieved."
 zan_diplomacy_through_trade:0 "Diplomacy Through Trade"
 zan_diplomacy_through_trade_desc:0 "We are uniquely positioned at the confluence of wealth coming from $china$, $india$, and $europe$. This not only benefits us financially, but it gives us great influence in the diplomatic game between Empires and foreign powers..."
 zan_food_imports:0 "Food Imports"
 zan_food_imports_desc:0 "The dawn of a new age in seafaring has given us new opportunities to seek sustenance for our people. Whereas once we would only trade with the interior of $africa$ to procure crucial supplies of $millet$, $livestock$, and $rice$, we can now access new ports where food may be cheaper and more readily available."
 zan_gold_trade_of_africa:0 "$goods_gold$ Trade of $africa$"
 zan_gold_trade_of_africa_desc:0 "Our abundant reserve of $goods_gold$ from many sources across $east_africa$ is the cornerstone of our economy. We must take full advantage of our reserves, and use our wealth to support and disseminate a strong currency. This will help us develop as a trading hub."
 zan_kilwan_latitude_staves:0 "Latitude Staves"
 zan_kilwan_latitude_staves_desc:0 "Our superior ship technology allows us to sail further and for longer than any of our competitors, giving us a significant edge in any seafaring activity."
 zanj_taxation:0 "Zanj Taxation"
 zanj_taxation_desc:0 "Originally a term to describe the inhabitants of inner $africa$, particularly those of $bantu_language_family$ origin, these folk make up a substantial portion of our demographics. While they have many liberties and responsibilities, they are taxed accordingly in order to preserve these privileges. Their peaceful, relatively autonomous  place within our legal framework has led to the organic development of linguistic phenomena and new cultural traditions."
 zasechnaya_cherta:0 "Zasechnaya Cherta"
 zasechnaya_cherta_desc:0 "In order to withstand the constant threat of Tatar raids, our ancestors have built a line of tightly positioned and well-defended forts. As our state grows larger, we should keep expanding this 'Abatis Line' to ensure our people are always protected from foreign attacks."
 zaydi_scholarly_traditions:0 "$zaidi_school$ Scholarly Traditions"
 zaydi_scholarly_traditions_desc:0 "The highlands of $YEM$ have long been home to the $zaidi_school$ imamate, a center of learning and piety. Rooted in Islamic jurisprudence, theology, and rationalism, our scholars have ensured the rule of law and the moral integrity of our governance for centuries."
 zenata_roots:0 "Zenata Roots"
 zenata_roots_desc:0 "Our people are descendants of the Zenata, a tribe best known for its vital wool production and skill at shepherding great herds of rams."
 zhongshu_sheng:0 "Zhōngshū Shěng"
 zhongshu_sheng_desc:0 "One of the most vital branches of the #italic Three Departments and Six Ministries#!, the central secretariat is responsible for the drafting and codification of many Imperial reforms and decrees."
 zmw_controlling_the_mutapan_riches:0 "Controlling the Riches"
 zmw_controlling_the_mutapan_riches_desc:0 "Western travelers have named our land 'Ophir', and the riches of our gold mines and the Zambezi trade have made many visitors envious of us over the centuries. Let us leverage our control over these riches, and build permanent trade posts which can grow into sprawling cities."
 zmw_cow_horn_tactics:0 "Cow-Horn Formations"
 zmw_cow_horn_tactics_desc:0 "Adapting to the ever-changing tactics of war is no easy task. Against potentially superior enemies, we should rely on our own mobility over everything else. If we are able to pin our foes into a melee fight and send a regiment to flank and encircle their troops, we will be able to inflict devastating casualties."
 zmw_discipline_and_traning:0 "Regular Training"
 zmw_discipline_and_traning_desc:0 "Discipline, preparation, and training are the factors that win battles. With this in mind, our commanders have successfully pioneered elaborate new tactics and organizational improvements. Let us make good use of these innovations by dividing our warriors into regiments and having them train regularly with their bows, assegais, daggers, and axes. Practice will also allow them to fight in formation without fear, defeating many more numerous enemies."
 zmw_elected_administrators:0 "Provincial Administrators"
 zmw_elected_administrators_desc:0 "Traditionally, all of our administrators, even on the local level, have been direct relatives of our ruler. As our empire has grown and matured, however, it is time we show deference to the local knowledge of our subjects, and allow them to select their own administrators."
 zmw_empowering_the_rozwi:0 "Empowering the Rozwi"
 zmw_empowering_the_rozwi_desc:0 "Our lands are home to many skilled warriors. Among them are the Rozwi, disciplined fighters who stand ready to defend our people against any who would dare try to take our rightful lands from us."
 zmw_encourage_new_settlements:0 "New Grounds for Resources"
 zmw_encourage_new_settlements_desc:0 "Beyond our borders lie vast expanses of land, studded with resources and herding grounds waiting eagerly to be claimed by our people. We must encourage settlement in these territories, and establish new towns."
 zmw_experienced_cattle_herder:0 "Experienced Herders"
 zmw_experienced_cattle_herder_desc:0 "Herding animals requires some skill, and is crucial for our survival. If we want to stabilize and expand our rule, we should expand our herding and grazing grounds as well."
 zmw_merchant_taxes:0 "Mercantile Fees"
 zmw_merchant_taxes_desc:0 "With the arrival of new traders in the Zambezi area, the need has arisen to assert our authority. Anyone who wishes to trade here, and carry our precious $goods_gold$ and $ivory$ to other shores, must first be approved by our ruler and pay a tax in order to be granted access. Should payments lapse, all foreign merchandise will be confiscated by our state."
 zmw_rekindling_the_royal_fires:0 "Rekindling the Royal Fires"
 zmw_rekindling_the_royal_fires_desc:0 "Our subordinate chiefs must prove their loyalty to us and the gods by traveling to the capital once a year, and using our flames to rekindle their own local fire. Once a year has passed, our army will extinguish their fire, and they will have to make a new journey."
 zmw_spokesman_before_the_dead:0 "Spokesman Before the Dead"
 zmw_spokesman_before_the_dead_desc:0 "Our ruler is not only our leader in the temporal sense, but is also expected to speak on our behalf before the spirits of the dead. Prior to any campaign or harvest, he will communicate our respect and needs to the spirits of our ancestors through ceremonies or dances. Without a diligent ruler to maintain the royal graves and keep in close contact with our dead, things might go awry very quickly."
 zmw_stone_builders:0 "Builders of $ZMW$"
 zmw_stone_builders_desc:0 "The astonishing stone buildings of $ZMW$ impress many visitors to our great country. Continuing our architectural traditions will allow us to expand our great cities of stone, which shall stand tall for centuries."
 zmw_strict_gold_regulations:0 "$goods_gold$ Trade Restrictions"
 zmw_strict_gold_regulations_desc:0 "The land provides us with plenty of goods that foreign merchants have a keen interest in, but our abundant reserves of $goods_gold$ shine brighter than any other. While such riches are a blessing, the state must tightly regulate all trade and ownership of $goods_gold$ in order to help prevent the destructive effects of human greed and skullduggery from affecting  our bottom line."
 zta_guerillas_of_the_scrub:0 "Guerillas of the Scrub"
 zta_guerillas_of_the_scrub_desc:0 "The #italic Gola Brda#! (Naked Hills) of the karst offer absolutely no cover for a traditional invading army, but they provide infinite hideouts and ambush points for our nimble warriors. We have developed a sophisticated tactical doctrine of 'Night-Raiding', where our clansmen descend silently from the peaks under the total cover of darkness to butcher enemy camps, spike their cannons, and vanish back into the mist before the first light of dawn. This psychological warfare ensures that any occupying force in the lowlands is driven to the brink of madness by constant fear and physical exhaustion, making our territory a nightmare they eventually choose to abandon, while adapting our armies to any hostile territory."
 zta_maritime_fiefdoms_of_the_adriatic:0 "Maritime Fiefdoms of the Adriatic"
 zta_maritime_fiefdoms_of_the_adriatic_desc:0 "Our identity is forged at the violent meeting point of the high limestone mountain and the salt of the sea. By maintaining firm control over the strategic coastal towns of the coast, the lords of Zeta act as the indispensable maritime gateway for the entire Serbian interior, controlling the flow of salt, silk, and silver. We utilize the considerable wealth generated from Mediterranean trade and customs duties to fund our independent-minded mountain clans and build massive stone fortifications that guard the shoreline. This ensures that Zeta remains a maritime power in its own right, projecting influence far beyond the rugged cliffs of the hinterland."
 zta_the_code_of_the_black_mountain:0 "The Code of the Black Mountain"
 zta_the_code_of_the_black_mountain_desc:0 "To finally transition from a loose tribal federation to a modern, centralized state, we have introduced a rigorous and uncompromising new legal code that strictly suppresses the destructive tradition of blood feuds and centralizes the power of the #italic Vladika#!. By replacing ancient tribal law with a uniform system of state justice and taxation, we unify the competing clans into a single, cohesive national body. This reform turns the disparate and often chaotic energy of the mountains into a focused, disciplined national force capable of reclaiming our ancestral coastlines and expanding our borders with the efficiency of a modern European power."
 zta_the_italian_condottieri:0 "The Italian Condottieri"
 zta_the_italian_condottieri_desc:0 "We have mastered the lucrative and dangerous art of the international mercenary contract. By providing elite Zetan mountain infantry and veteran sailors to the italians for their various overseas wars, we secure access to modern Western armaments, gunpowder, and a powerful naval ally in the Adriatic. This connection ensures that our realm's independence is protected by powerful friends, while we simultaneously maintain and sharpen our ancient warrior traditions at home. It provides us with a professional military edge that few other Balkan states can hope to match."
 zta_the_retreat_to_the_karst:0 "The Retreat to the Karst"
 zta_the_retreat_to_the_karst_desc:0 "The coast may be temporarily lost to the shifting sands of imperial power, but the karst mountains remain our eternal and impregnable fortress. Our monastery-stronghold of Cetinje, nestled high in the Lovćen mountains where the air is thin and the slopes are steep, is the core of our nation. This city embodies a long-term national strategy of 'Mountain Isolation', where we deliberately trade the wealth and vulnerability of the ports for the absolute security of the high peaks. By entrenching ourselves in the rock, we effectively make the Zetan state impossible for any imperial power to fully annex or govern."
 zta_the_vladika_sovereignty:0 "The Vladika Sovereignty"
 zta_the_vladika_sovereignty_desc:0 "As the secular noble dynasties fade under the pressure of continuous war, the Prince-Bishops (Vladikas) of Cetinje have taken up the heavy mantle of national leadership. This unique #italic Theocratic Monarchy#! unites spiritual authority and temporal power in a single, celibate office, effectively preventing the dangerous fragmentation of our lands among rival feudal heirs. It turns the struggle for mountain independence into a perpetual holy war that every clan member is religiously bound to fight. The #italic Vladika#! is not just a ruler; he is the living symbol of our resistance, ensuring that the cross and the sword are never separated in the defense of the #italic Black Mountain#!."
 age_1_traditions:0 "Traditions"
 age_1_traditions_desc:0 "Different societies have been established all over the world for thousands of years, and their foundations can be framed in traditions such as $legalism$, $meritocracy$, or $feudalism$."
 age_2_renaissance:0 "Renaissance"
 age_2_renaissance_desc:0 "Societies affected by the $mge_pax_mongolica$, $islamic_golden_age$, and $renaissance$ in $europe$ are witnessing the emergence of a new era of knowledge, art, and innovation as a result of increased foreign interactions and the establishment of new institutions."
 age_3_discovery:0 "Discovery"
 age_3_discovery_desc:0 "As the Early Modern Era dawns, new continents are being mapped, while feudal society is slowly giving way to centralized states.\\nFor an enterprising leader, this age is the perfect time to build the foundations of a globe-spanning empire..."
 age_4_reformation:0 "Reformation"
 age_4_reformation_desc:0 "From East to West, this is the age of religious conviction, debate, and mass movements. $protestant$ churches are entrenched in $europe$, millenarianism has taken hold of Iran, and $religious_syncretism$ shapes society in $india$."
 age_5_absolutism:0 "Absolutism"
 age_5_absolutism_desc:0 "As governments seize absolute authority over their countries, their devotion turns from amassing power to building empires. This is the age of the state; of rulers and their armies."
 age_6_revolutions:0 "Revolutions"
 age_6_revolutions_desc:0 "The Enlightenment's interrogation of rights, authority, and the nature of our world itself has led to widespread rejection of the old hierarchies. As absolutism crumbles before revolution, so too are kingdoms brought down to make way for republics..."
 bronze_age_1_bronze:0 "Bronze Age Collapse"
 bronze_age_1_bronze_desc:0 "A custom technology era."
 bronze_age_2_iron:0 "Early Iron Age"
 bronze_age_2_iron_desc:0 "A custom technology era."
 bronze_age_3_archaic:0 "Archaic Age"
 bronze_age_3_archaic_desc:0 "A custom technology era."
 bronze_age_4_classic:0 "Classical Age"
 bronze_age_4_classic_desc:0 "A custom technology era."
 bronze_age_5_hellenistic:0 "Hellenistic Age"
 bronze_age_5_hellenistic_desc:0 "A custom technology era."
 bronze_age_6_roman:0 "Roman Age"
 bronze_age_6_roman_desc:0 "A custom technology era."
 artillery_institution:0 "Artillery"
 artillery_institution_desc:0 "The invention of gunpowder in $CHI$ led to the development of a device that would employ its firepower in warfare: the artillery. Although artillery spread throughout $europe$ and $asia$ in the 13th century, its widespread adoption as a weapon system did not happen until the 15th century, when improvements in cannon length and gunpowder composition made artillery powerful enough to pose a threat to the stone-built castles and fortifications common in $europe$. Soon artillery would be used not only in sieges, but also on battlefields, as smaller-caliber guns were mobile enough to be quickly deployed and used. Its final evolution as a key warfare system would come in the 18th century, especially after Napoleon perfected its use at crucial points during battles."
 banking:0 "banking"
 banking_desc:0 "Moneylending has existed since metal-based coins first appeared in Antiquity. However, its availability is heavily dependent on the dominant people, culture, or religion of a given state.\\n\\nA shift occurred in the Middle Ages, encouraged by the renewed growth of long-range commercial activities on the Eurasian continent and its peripheries. Specialized moneylenders began to organize when $judaism_ADJ$ communities started operating between the $christian_ADJ$ and $muslim_ADJ$ worlds. However, the boom of credit demand that followed the Crusades in the 12th century encouraged merchants in the $ITA_ADJ$ city-states to create larger structures for moneylending, effectively founding the first banking institutions, such as the Peruzzi and Bardi houses.\\n\\nMore instruments were developed, like bills of exchange and debt bonds, and banking dynasties such as the $medici_dynasty$, $fugger_dynasty$, or $welser_dynasty$ soon became as powerful as states."
 bronze_large_libraries:0 "Large Libraries"
 bronze_large_libraries_desc:0 "An institution based on scholarship, experimentation, and research."
 bronze_professional_armies:0 "Greek Professional Armies"
 bronze_professional_armies_desc:0 "Armies have existed since war was invented, many thousands of years ago. However, their form has changed over the centuries, and different types of recruitment and organization have developed in different cultures and periods.\\n\\nIn the Late Middle Ages, armies in many societies relied on levy systems, with knights and footmen forming a core that was levied seasonally. Some states, however, were powerful enough to finance standing armies, staffed by professional soldiers who would be available for duty throughout the year.\\n\\nThis system also developed in $europe$ after the outbreak of the Hundred Years War, being one of the main changes that promoted a military revolution in the Early Modern Age. Increasing the size and quality of professional armies, while finding new sources of revenue to finance them, soon became one of the main challenges for rulers around the world."
 bronze_routes:0 "Bronze Routes"
 bronze_routes_desc:0 "An institution driven by trade networks and market growth."
 chariot_warfare:0 "Chariot Warfare"
 chariot_warfare_desc:0 "An institution based on professional warfare and military organization."
 classical_philosophy:0 "Classical Philosophy"
 classical_philosophy_desc:0 "An institution based on scholarship, experimentation, and research."
 commercial_counters:0 "Commercial counters"
 commercial_counters_desc:0 "An institution driven by trade networks and market growth."
 confessionalism:0 "confessionalism"
 confessionalism_desc:0 "$catholic$ has been regarded as a unitary entity for a long time, but the advent of the various $protestant$ faiths has put an end to that. Given the myriad of different interpretations of what the faith should be, $christian$ is anything but united. But whereas before any deviance from mainstream Church teachings could be easily labeled as heresy, the lines between the different sects have mercifully become blurrier.\\n\\nAs such, there has been an increasing interest both for religious and secular authorities alike to clearly define the shape of their specific doctrines, enforcing their particular rules and views on all aspects of faith and life. This allows them a more firm grip on the faith of their population, but also increases the differentiation, and thus animosity with all other forms of belief."
 enlightenment:0 "enlightenment"
 enlightenment_desc:0 "Rationalism and Empiricism have gained incredible popularity among the greatest minds of the age. In letters, publications, and coffeehouses, intellectual giants from kings to scientists debate the merits of tolerance, advanced scientific methodology, and the spread of Enlightenment ideals to all of humanity. From universities and the courts of enlightened monarchs, expeditions are being sent to measure, catalog, and map the world so that we can better understand the laws governing everything around us. Other thinkers are more interested in the laws of society and try to better understand the Rights of Man.\\n\\nColossal undertakings, such as creating a complete encyclopedia of all knowledge or a complete index of all plants, animals, and fungi in the world, are being pursued for the greater good of humanity. The Light of Reason has been lit, and many will not rest until it has been brought to all corners of the earth."
 feudalism:0 "feudalism"
 feudalism_desc:0 "Over time, many societies develop stronger and more permanent institutions of government. After the fall of the Roman Empire, much of $europe$ gradually developed into a feudal system, a structure in which $peasants_estate$ performed labor on properties owned by wealthy $nobles_estate$ in exchange for protection and the right to use that land for their own purposes.\\n\\nFor similar reasons, parallel systems of land tenure and reciprocal obligation have formed across the world, some with roots that go even further back than European feudalism."
 global_trade:0 "Global Trade"
 global_trade_desc:0 "Goods have been moved across continents since antiquity. But where this was previously limited to a set number of routes and and specific goods, such as the manufactured products from $india$ and $CHI$ finding their way across the $indian_ocean_continent$ and along the Silk Road, trade is now increasingly becoming part of a greater world network. With the discovery of the Americas, establishment of sea routes around $africa$, and the crossing of the $pacific_ocean_continent$, local trade networks are being woven into a single, interconnected, world-spanning web.\\n\\n$silver$ mined in the $andes_region$ is now being shipped via $europe$ all the way to $CHI$ and $india$, $iron$ mined and wrought in $scandinavian_region$ is being sold in $west_africa$ by $ENG_ADJ$ merchants, and others are making a fortune just by distributing $cloth$ and spices to traders from $south_east_asia$. Merchants in $india$ are even investing in future European trade ventures! It may still be early to speak of a truly global economy, but surely the first seeds have been sown."
 hellenistic_cosmopolitanism:0 "Hellenistic Cosmopolitanism"
 hellenistic_cosmopolitanism_desc:0 "An institution driven by trade networks and market growth."
 hoplite_phalanx:0 "Hoplite Phalanx"
 hoplite_phalanx_desc:0 "An institution based on professional warfare and military organization."
 imperial_administration:0 "Imperial Administration"
 imperial_administration_desc:0 "An institution driven by trade networks and market growth."
 industrialization:0 "industrialization"
 industrialization_desc:0 "The dawn of the 18th century has given rise to many new institutions as humanity's thirst for progress grows. Advances in the field of production and manufacturing, as well as the introduction of complicated machinery, will change the world as we know it on a global scale. The Industrial Revolution has brought about permanent change — not just to commerce and business, but to the social fabric of many nations. Inventions such as the power loom and steam engine shall push the capabilities of mankind to its highest zenith yet."
 iron_metallurgy:0 "Iron Metallurgy"
 iron_metallurgy_desc:0 "An institution based on scholarship, experimentation, and research."
 legalism:0 "legalism"
 legalism_desc:0 "The theories behind Legalism have been integral to $CHI_ADJ$ society for hundreds of years. The concept that strict laws, centralized authority, and bureaucratic efficiency lead to a stable, prosperous state with a powerful army is deeply rooted in many ideologies throughout $east_asia$.\\n\\nAs merchants and migrants facilitated the exchange of ideas across the world, Legalism entered the vast $muslim_ADJ$ sphere, where it became part of the symbiotic relationship between believers and non-$muslim_ADJ$ subjects.\\n\\nIn $europe$, Legalism emerged from the dying gasps of the Roman Empire. After its decline, its systematic legal codes were adapted and transformed into the foundational jurisprudence for many nations on the continent."
 legions:0 "Legions"
 legions_desc:0 "An institution based on professional warfare and military organization."
 levee_en_masse:0 "Levée en Masse"
 levee_en_masse_desc:0 "Warfare is an ever-evolving concept, having been studied and improved upon for generations and generations. We have witnessed the rise of powerful empires, each with its own ambitions. To satisfy the need for expansion and provide the fuel necessary to fulfill these ambitions, new nationwide conscription laws will be drafted. We shall raise armies of young, eager recruits, the size of which will leave an indelible mark upon history."
 manufactories:0 "manufactories"
 manufactories_desc:0 "While a number of technical innovations during the 16th and 17th centuries increased production output for some goods, such as $iron$ or $cloth$, the biggest industrial improvement came in the form of optimized organization. By creating manufactories, often outside city limits, merchant capitalists could both bypass the ancient guild laws that inhibited mass production and pioneer ways to increase output through the organization and specialization of centralized labor. The forerunners of later Industrialization were able to increase production by facilitating access to raw materials and organizing labor on a mass scale, rather than by investing in expensive new machinery. This was in itself a huge change from the often heavily regulated methods of old, and together with later technical advances, this new mode of production would come to revolutionize society."
 mediterranean_colonization:0 "Mediterranean Colonization"
 mediterranean_colonization_desc:0 "An institution driven by trade networks and market growth."
 meritocracy:0 "meritocracy"
 meritocracy_desc:0 "Individuals of great prestige and power often appoint those closest to them to particularly influential positions.\\n\\nThe advent of Meritocracy as an institution and thought movement was largely popular in the courts of $CHI$. There, Confucius himself supported the notion that those who govern should do so on the basis of merit, not due to inherited status. This led to the replacement of the traditional $CHI_ADJ$ aristocracy with one based solely on merit.\\n\\nThe development of this institution would cause ripples across and beyond the borders of $asia$, eventually reaching the royal courts of $europe$, even those whose nobles had a crushing grasp on the mechanisms of power and authority."
 military_revolution:0 "Military Revolution"
 military_revolution_desc:0 "The continuous state of war affecting $europe$ in the 16th and 17th centuries led to a sharp increase in the size of armies, a necessity born of the growing authority of competing absolutist regimes. The infantry is now armed en masse with flintlock muskets, greatly increasing their firepower and performance in battle by being deployed in the innovative line formation, which replaces the old $pike_and_shot$.\\n\\nOur military needs affect the capabilities of the state administration; it continues to expand to handle the manpower and finances required by this increase in the size of the military. This pressure has also led to the development of supply chains to feed and sustain armies, as well as intermediate depots that support the operational forces. The ultimate result of these advances would be a surge of wars between increasingly militarized countries throughout the 18th century."
 new_world:0 "New World"
 new_world_desc:0 "The discovery of the New World has ushered in a new era — not only for the colonizers and the colonized, but for many nations in the Old World, as colonial expansion has led to widespread availability of new resources and innovations, as well as a fuller realization of our vast world. As new animals, crops, precious metals, and diseases spread across the $atlantic_ocean_continent$, the first steps have been taken towards a truly global economy.\\n\\nWith foreign lands and peoples being mapped and documented, ideas as well as religious and philosophical debate are increasingly being colored by what we have found in overseas societies. Great minds feel the need to question what was once accepted as truth, and from $valladolid$ to Fatehpur Sikri, the nature of the world is now up for debate."
 palatial_economy:0 "Palatial Economy"
 palatial_economy_desc:0 "An institution driven by trade networks and market growth."
 phoenician_alphabet:0 "Phoenician Alphabet"
 phoenician_alphabet_desc:0 "An institution driven by trade networks and market growth."
 pike_and_shot:0 "Pike and Shot"
 pike_and_shot_desc:0 "A new type of warfare began to develop at the end of the 15th Century, in the midst of the $ITA_ADJ$ Wars. The generalization of pikemen in the Late Middle Ages as an alternative to men-at-arms who could successfully face heavy cavalry charges was accompanied by the development of portable firearms, mainly matchlock arquebuses and muskets. The soldiers now adopt a new formation, in which the pikemen form a square, while the arquebusiers fan out to the sides and front, and seek cover behind or inside the square in case the formation enters close combat. This new type of formation, called Pike and Shot, was favored by $GER_ADJ$ #italic Landsknechts#! and $SPA_ADJ$ #italic Tercios#!, and was soon adopted by other armies, reigning supreme on the battlefields of $europe$ for nearly two centuries, until superseded in the early 18th Century by line infantry formations armed with new flintlock muskets mounting bayonets."
 printing_press:0 "Printing Press"
 printing_press_desc:0 "The ability to mass-produce the written word would revolutionize the spread of information and, in many ways, society as a whole. Pioneered by talented individuals, such as $VEN_ADJ$ printer Aldus Manutius, this new art helped fuel the $renaissance$ by making the translated classics more widely available. Later, the Reformation benefitted greatly from the ability to spread critical publications and translations of the Holy Scriptures.\\n\\nNow that printing has matured as a technique and spread throughout $europe$, hundreds of thousands of copies of everything from religious and political pamphlets, to scientific treatises, to etiquette guides are circulating the continent. With print shops growing ever more commonplace, rulers have found it hard to contain the new technique, as the comparatively easy means of production means censorship can be sidestepped by moving one's business across a border — or even just changing the name on a title page."
 professional_armies:0 "Professional Armies"
 professional_armies_desc:0 "Armies have existed since war was invented, many thousands of years ago. However, their form has changed over the centuries, and different types of recruitment and organization have developed in different cultures and periods.\\n\\nIn the Late Middle Ages, armies in many societies relied on levy systems, with knights and footmen forming a core that was levied seasonally. Some states, however, were powerful enough to finance standing armies, staffed by professional soldiers who would be available for duty throughout the year.\\n\\nThis system also developed in $europe$ after the outbreak of the Hundred Years War, being one of the main changes that promoted a military revolution in the Early Modern Age. Increasing the size and quality of professional armies, while finding new sources of revenue to finance them, soon became one of the main challenges for rulers around the world."
 renaissance:0 "renaissance"
 renaissance_desc:0 "The wealthiest and most powerful citizens in the $ITA_ADJ$ city-states have been patronizing artists and scholars who are breathing new life into the classical ideals and aesthetics of their Greek and Roman forebears. As a cultural movement, the Renaissance has already had a profound impact on the literature, art, philosophy, and music of our region. Renaissance Humanism has developed into a fully-formed intellectual tradition ready to permeate all aspects of society; A true Renaissance Humanist is an expert in everything from politics and philosophy to art, textual analysis, music, and architecture.\\n\\nNew ideals for rulers — as well as those who are ruled — are spreading as quickly as printing presses can distribute copies.\\n\\nRenaissance ideals are now poised to reshape the world according to these sophisticated classical principles."
 road_network:0 "Road Network"
 road_network_desc:0 "An institution driven by trade networks and market growth."
 roman_law:0 "Roman Law"
 roman_law_desc:0 "An institution based on scholarship, experimentation, and research."
 scientific_revolution:0 "Scientific Revolution"
 scientific_revolution_desc:0 "The world is smaller now than ever before. The rise of global trade and expansion of the printing industry have led to an increased flow of ideas, allowing for a more widespread dissemination of knowledge. This, in turn, resulted in a more thorough questioning and analysis of the reality of the world. What was once just accepted as fact is now questioned, what was only poorly understood is now observed, and what was only supposed has been tested.\\n\\nThe recent advancements in areas such as mathematics, physics, and biology are undeniable, but the real revolution is the change in the perception and approach towards science itself, and our way of understanding it. Systematic experimentation is the true scientific revolution, and it will completely change our conception of the world."
 standardized_currency:0 "Standardized Currency"
 standardized_currency_desc:0 "An institution driven by trade networks and market growth."
 tribal_migrations:0 "Tribal Migrations"
 tribal_migrations_desc:0 "An institution shaped by religious authority and social cohesion."
