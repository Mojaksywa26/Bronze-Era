l_english:
  bronze_age_burial_pits: "Burial Pits"
  bronze_age_burial_pits_desc: "The burial pits law mandates the use of simple burial pits for interring the deceased in Bronze Age societies. This practice reflects the cultural beliefs and social norms related to death and the afterlife, emphasizing a more modest approach to burial compared to elaborate tombs or mausoleums."

  bronze_age_aristocratic_mounds: "Aristocratic Mounds"
  bronze_age_aristocratic_mounds_desc: "The aristocratic mounds law mandates the use of elaborate burial mounds for interring the deceased in Bronze Age societies. This practice reflects the cultural beliefs and social norms related to death and the afterlife, emphasizing a more prestigious approach to burial compared to simple burial pits."

  bronze_age_urnfield_burial_site: "Urnfields"
  bronze_age_urnfield_burial_site_desc: "The urnfields became increasingly common in the late Bronze Age, as societies shifted towards cremation and the use of urns for burial. The urnfields law mandates the use of designated areas for interring the deceased in Bronze Age societies. This practice reflects the cultural beliefs and social norms related to death and the afterlife, emphasizing a more communal approach to burial compared to individual graves."

  bronze_age_inhumation_burial_site: "Inhumation Burial Site"
  bronze_age_inhumation_burial_site_desc: "The inhumation burial site law mandates the use of individual graves for interring the deceased in Bronze Age societies. This practice reflects the cultural beliefs and social norms related to death and the afterlife, emphasizing a simple and spiritual approach to burial."