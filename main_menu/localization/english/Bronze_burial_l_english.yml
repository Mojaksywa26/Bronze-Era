l_english:
  bronze_age_burial_pits: "Burial Pits"
  bronze_age_burial_pits_desc: "The burial pits law mandates the use of simple burial pits for interring the deceased in Bronze Age societies. This practice reflects the cultural beliefs and social norms related to death and the afterlife, emphasizing a more modest approach to burial compared to elaborate tombs or mausoleums."

  bronze_age_aristocratic_mounds: "Aristocratic Mounds"
  bronze_age_aristocratic_mounds_desc: "The aristocratic mounds law mandates the use of elaborate burial mounds for interring the deceased in Bronze Age societies. This practice reflects the cultural beliefs and social norms related to death and the afterlife, emphasizing a more prestigious approach to burial compared to simple burial pits."

  bronze_age_urnfield_burial_site: "Urnfields"
  bronze_age_urnfield_burial_site_desc: "The urnfields became increasingly common in the late Bronze Age, as societies shifted towards cremation and the use of urns for burial. The urnfields law mandates the use of designated areas for interring the deceased in Bronze Age societies. This practice reflects the cultural beliefs and social norms related to death and the afterlife, emphasizing a more communal approach to burial compared to individual graves."

  bronze_age_collective_tombs: "Collective Tombs"
  bronze_age_collective_tombs_desc: "The collective tombs law mandates the use of shared burial spaces for interring the deceased in Bronze Age societies. This practice reflects the cultural beliefs and social norms related to death and the afterlife, emphasizing a communal approach to burial."

# #########################################
# PRODUCTION AND MAINTENANCE METHODS
# #########################################

  bronze_age_aristocratic_mounds_maintenance_simple: "Aristocratic Mounds Construction"
  bronze_age_aristocratic_mounds_maintenance_desc: "Maintaining elite burial mounds requires continuous labor, ceremonial offerings, and the preservation of ancestral sites tied to noble prestige and dynastic legitimacy."

  bronze_age_burial_pits_maintenance: "Burial Pits Practice"
  bronze_age_burial_pits_maintenance_Desc: "Simple pit burials demand little material investment, relying mostly on local labor and basic funerary customs carried out by families or village communities."

  bronze_age_urnfield_burial_site_maintenance: "Urnfield Maintenance"
  bronze_age_urnfield_burial_site_maintenance_desc: "Cremation grounds and urn cemeteries consume large quantities of fuel, pottery, and ritual labor to sustain widespread funerary practices and maintain sacred burial areas."

  bronze_age_collective_tombs_maintenance: "Collective Tomb Practice"
  bronze_age_collective_tombs_maintenance_desc: "Shared tombs require periodic upkeep, ritual care, and communal organization to preserve burial chambers used by generations of the dead."