l_english:
 sea_peoples_crisis: "The Sea Peoples Crisis"
 sea_peoples_crisis_desc: "A visible Late Bronze Age [situation_with_icon|e] tracking the collapse of palace economies, famine, refugee movement, raiding, and coastal settlement.\n\n#T Current Situation#!\nPhase: #Y [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_phase').GetValue|V0]#! /5\nCrisis Pressure: #R [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_pressure').GetValue|V0]#! /100\nFamine Pressure: #R [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_famine_pressure').GetValue|V0]#! /100\nSuccessful Coastal Raids: #R [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_raids').GetValue|V0]#!\nRepulsed Raids: #P [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_repulsed_raids').GetValue|V0]#!\nMarket Disruptions: #R [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_market_damage').GetValue|V0]#!\nRefugee Movements: #R [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_refugee_movements').GetValue|V0]#!\nMigrant Enclaves: #R [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_migrant_enclaves').GetValue|V0]#!\nPhoenicianized Enclaves: #P [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_phoenicianized_enclaves').GetValue|V0]#!\nHatti Link: #Y Hattie Collapse handles imperial Anatolia#!\n\n#T Phase Progression#!\nPhases advance by elapsed crisis time: phase 2 after 3 years, phase 3 after 6 years, phase 4 after 10 years, phase 5 after 15 years. Pressure shows regional collapse momentum and local danger; it does not block phase progression.\n\nMost direct target countries in the eastern Mediterranean, Aegean, Egypt, Cyprus, and the Levant can use costly actions to reduce local damage. Hattie and its subjects use the separate Hattie Collapse actions for imperial famine, vassal defiance and fragmentation."
 sea_peoples_crisis_overview_card: "Crisis Overview"
 sea_peoples_crisis_overview_card_desc: "The Sea Peoples Crisis is a regional [situation_with_icon|e] for the eastern Mediterranean. It tracks famine, raids, refugee movement, trade collapse, coastal settlement and palace stress. Hattie-specific famine, vassal defiance and fragmentation are handled by the separate Hattie Collapse situation."
 sea_peoples_crisis_panel_phase: "Crisis Phase"
 sea_peoples_crisis_panel_phase_value: "#Y [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_phase').GetValue|V0]#! /5"
