l_english:

  a_slingers: "Slingers"
  slingers_desc: "Drawn from shepherds, hunters, and common folk, slingers hurl stones with surprising force and accuracy. Cheap to equip and easy to recruit, they provide valuable ranged support on the battlefield."

  a_simple_chariots: "Simple Chariots"
  light_chariots_desc: "Fast and agile vehicles crewed by a driver and warrior, simple chariots excel at scouting, skirmishing, and harassing slower enemies across open ground."

  a_heavy_chariots: "Heavy Chariots"
  heavy_chariots_desc: "Built with sturdier frames and larger crews, heavy chariots deliver shock and prestige on the battlefield. Though costly and terrain-dependent, they can dominate less organized foes in open terrain."