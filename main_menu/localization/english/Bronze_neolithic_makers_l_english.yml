 neolithic_leather_maker_maintenance_livestock: "Livestock Hides"
 neolithic_leather_maker_maintenance_livestock_desc: "Leather is produced from domesticated herd animals slaughtered for meat, milk, or labor. Production is more reliable and integrated into daily rural life, supporting steady household crafting and local trade."

 neolithic_leather_maker_maintenance_wild_game: "Wild game Hides"
 neolithic_leather_maker_maintenance_wild_game_desc: "Leather is sourced from hunted animals, tying production to seasonal hunts and woodland access. Supplies are irregular but provide durable furs and hides valued for prestige clothing, trophies, and hardy equipment."