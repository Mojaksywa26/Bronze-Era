l_english:
 age_1_traditions:0 "Bronze"
 age_1_traditions_desc:0 "Visual chronology: 1209-1050 BC. Palace economies, bronze working, chariot warfare, river kingdoms and maritime exchange define the first technological horizon of the Bronze Era setup. Internally, the engine uses positive years for stability."
 age_2_renaissance:0 "Iron"
 age_2_renaissance_desc:0 "Visual chronology: 1050-800 BC. Iron tools, new military organization, fragmented kingdoms and post-collapse recovery reshape the old Bronze Age world."
 age_3_discovery:0 "Archaic"
 age_3_discovery_desc:0 "Visual chronology: 800-500 BC. Cities, sanctuaries, colonizing ports, written law and regional aristocracies begin to reshape the Mediterranean and its hinterlands."
 age_4_reformation:0 "Classic"
 age_4_reformation_desc:0 "Visual chronology: 500-323 BC. Mature city-states, organized empires, civic institutions and disciplined armies define the balance of power across the ancient world."
 age_5_absolutism:0 "Hellenistic"
 age_5_absolutism_desc:0 "Visual chronology: 323-147 BC. Successor kingdoms, royal courts, professional armies and long-distance exchange bind the eastern Mediterranean into a wider political world."
 age_6_revolutions:0 "Roman"
 age_6_revolutions_desc:0 "Visual chronology: 147 BC-120 AD. Imperial administration, road systems, professionalized armies and Mediterranean hegemony mark the final age of the campaign."
