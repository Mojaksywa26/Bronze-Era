 bronze_hatti_collapse_spawn_tarhuntassa_text: "Tarhuntassa may emerge in south-central Anatolia."
 bronze_hatti_collapse_spawn_tabal_text: "Tabal may emerge in the Cappadocian highlands."
 bronze_hatti_collapse_spawn_melid_gurgum_text: "Melid and Gurgum may emerge in the upper Euphrates and Maras regions."
 bronze_hatti_collapse_spawn_kummuh_hamath_text: "Kummuh and Hamath may emerge if Hatti controls their frontier lands."
 bronze_hatti_collapse_spawn_que_pattin_text: "Que and Pattin may emerge in Cilicia and the Amuq coast."
 bronze_hatti_collapse_spawn_kaskian_north_text: "Kaskian authority may spread in the northern hill country."
 bronze_hatti_collapse_spawn_carchemish_continuity_text: "Carchemish may preserve a royal line on the Euphrates frontier."
 bronze_hatti_collapse_fragment_periphery_text: "Hatti fragments into regional successor states."
 bronze_hatti_collapse_cleanup_text: "The Hittite Collapse cleanup runs."

 bronze_hatti_collapse.1.title: "The Edges of Hatti Tremble"
 bronze_hatti_collapse.1.desc: "Ships vanish on the southern sea, grain caravans arrive late, and governors ask whether Hattusa can still protect them. The Great King still commands palaces, scribes, chariots, and oaths, but the old order no longer feels immovable."
 bronze_hatti_collapse.1.a: "Summon the court to Hattusa."
 bronze_hatti_collapse.1.b: "Send watchers to the coast."
 bronze_hatti_collapse_1a_tt: "The Hittite Collapse starts with initial pressure and prestige loss."
 bronze_hatti_collapse_1b_tt: "The collapse starts, but temporary coastal preparations reduce early pressure."
 bronze_hatti_collapse.5.title: "The Grain Crisis"
 bronze_hatti_collapse.5.desc: "The palace tablets still demand rations, labor, and bronze, but the fields answer with thin harvests. Cities look to the royal granaries while nobles hoard what remains."
 bronze_hatti_collapse.5.a: "The granaries cannot feed everyone."
 bronze_hatti_collapse_5a_tt: "Famine and trade penalties intensify."
 bronze_hatti_collapse.6.title: "Vassals Defy Hattusa"
 bronze_hatti_collapse.6.desc: "Client rulers delay tribute and answer royal messengers with excuses. They speak of local defense, empty storehouses, and danger on every road. Beneath the words lies a sharper question: who still fears the Great King?"
 bronze_hatti_collapse.6.a: "Their loyalty is fraying."
 bronze_hatti_collapse_6a_tt: "Vassal defiance increases unrest, control loss, and collapse pressure."
 bronze_hatti_collapse.7.title: "The Empire Cracks"
 bronze_hatti_collapse.7.desc: "Local dynasts raise men under their own banners. Palace warehouses are guarded more fiercely than city gates. Hatti still exists, but authority now travels only as far as food, fear, and royal troops can carry it."
 bronze_hatti_collapse.7.a: "The center cannot hold every road."
 bronze_hatti_collapse.7.b: "Withdraw toward the Anatolian core."
 bronze_hatti_collapse_7a_tt: "Internal breakdown worsens."
 bronze_hatti_collapse_7b_tt: "Pressure falls, but Hatti loses prestige by abandoning peripheral authority."
 bronze_hatti_collapse.8.title: "The Fall of Hatti"
 bronze_hatti_collapse.8.desc: "The old empire has reached the edge. Some royal houses seek survival beyond Hattusa, some governors claim their cities in their own names, and the northern hills no longer obey. Hatti may live, but it will not live as before."
 bronze_hatti_collapse.8.a: "Recognize what can still be saved."
 bronze_hatti_collapse.8.b: "Hatti will not yield."
 bronze_hatti_collapse_8a_tt: "Neo-Hittite successors emerge from Hatti-owned regions. The player keeps a Hatti remnant."
 bronze_hatti_collapse_8b_tt: "No immediate fragmentation, but internal breakdown and pressure worsen."
 bronze_hatti_collapse.10.title: "Refugees on the Royal Road"
 bronze_hatti_collapse.10.desc: "Families arrive from burned villages, coastal towns, and uncertain borders. They bring tools, grief, rumors, and hunger. Scribes can count them, but counting does not feed them."
 bronze_hatti_collapse.10.a: "Let them find food where they can."
 bronze_hatti_collapse.10.b: "Register them under palace oversight."
 bronze_hatti_collapse_10a_tt: "Pressure and famine rise."
 bronze_hatti_collapse_10b_tt: "Pressure rises less, but nobles dislike the administrative burden."
 bronze_hatti_collapse.20.title: "Raiders on the Southern Coast"
 bronze_hatti_collapse.20.desc: "Watchfires burn above the harbors. Foreign ships and displaced war bands test the beaches, hoping to seize food, metal, slaves, and livestock before Hittite troops arrive."
 bronze_hatti_collapse.20.a: "Hold the coast if we can."
 bronze_hatti_collapse_20a_tt: "Forts, armies on the coast, fleets, and the Fortify the Coast action all improve the chance to repel the raid."
 bronze_hatti_collapse_raid_repulsed_tt: "The raid is repulsed and collapse pressure falls slightly."
 bronze_hatti_collapse.30.title: "Grain Shipments Fail"
 bronze_hatti_collapse.30.desc: "The expected shipments do not arrive. Some boats never left port; others were seized, wrecked, or diverted by local authorities who feared hunger at home."
 bronze_hatti_collapse.30.a: "Confiscate noble stores."
 bronze_hatti_collapse.30.b: "Ask the temples and estates for restraint."
 bronze_hatti_collapse_30a_tt: "The grain crisis worsens, and peasants suffer under emergency collection."
 bronze_hatti_collapse_30b_tt: "Famine rises less, but nobles lose satisfaction."
 bronze_hatti_collapse.40.title: "Tribute Refused"
 bronze_hatti_collapse.40.desc: "A border king sends gifts instead of tribute and calls them tokens of friendship. The distinction is deliberate. If Hattusa accepts it, others will follow."
 bronze_hatti_collapse.40.a: "This is defiance."
 bronze_hatti_collapse.40.b: "Accept less now to preserve the oath."
 bronze_hatti_collapse_40a_tt: "Vassal defiance grows."
 bronze_hatti_collapse_40b_tt: "Collapse pressure falls, but prestige suffers."
 bronze_hatti_collapse.50.title: "Kaskian Incursions"
 bronze_hatti_collapse.50.desc: "From the northern hills come raiders, cattle thieves, and war bands who know the roads better than the royal garrisons. Every village burned near the frontier makes Hattusa look farther away."
 bronze_hatti_collapse.50.a: "Send punitive columns north."
 bronze_hatti_collapse.50.b: "Pay local chiefs to guard the passes."
 bronze_hatti_collapse_50a_tt: "Pressure and famine rise as the frontier campaign drains resources."
 bronze_hatti_collapse_50b_tt: "Pressure rises less, but noble satisfaction suffers."
 bronze_hatti_collapse.60.title: "Tarhuntassa Claims Its Own Road"
 bronze_hatti_collapse.60.desc: "In the rough lands of southern Anatolia, local authority hardens around Tarhuntassa. The region can be recognized, fought, or lost piecemeal."
 bronze_hatti_collapse.60.a: "Let Tarhuntassa stand apart."
 bronze_hatti_collapse.60.b: "Reject this disloyalty."
 bronze_hatti_collapse_60a_tt: "Tarhuntassa may be released from Hatti-owned south-central Anatolian locations."
 bronze_hatti_collapse_60b_tt: "Pressure rises sharply and stability falls."
 bronze_hatti_collapse.70.title: "Carchemish Preserves the Line"
 bronze_hatti_collapse.70.desc: "On the Euphrates frontier, Carchemish still has scribes, soldiers, and royal prestige. Nearby governors look to surviving palaces rather than distant Hattusa."
 bronze_hatti_collapse.70.a: "Let the frontier preserve what it can."
 bronze_hatti_collapse.70.b: "The royal line remains in Hattusa."
 bronze_hatti_collapse_70a_tt: "Carchemish, Melid, and Gurgum may emerge only from appropriate Hatti-owned frontier locations."
 bronze_hatti_collapse_70b_tt: "Pressure rises, but Hatti refuses to recognize regional continuity."
 bronze_hatti_collapse.80.title: "The Great King Restores Order"
 bronze_hatti_collapse.80.desc: "The court has pulled back, but the center breathes again. Grain reaches the key cities, royal messengers travel under guard, and the remaining nobles know that Hatti has not vanished."
 bronze_hatti_collapse.80.a: "The storm has not broken us."
 bronze_hatti_collapse_80a_tt: "Collapse and famine pressure fall significantly."
 bronze_hatti_collapse.90.title: "The Hittite Empire Fragments"
 bronze_hatti_collapse.90.desc: "The last claims of universal obedience fail. Regional kings, surviving palaces, and frontier dynasts now speak in their own names. The old imperial body is gone; what remains must learn to survive."
 bronze_hatti_collapse.90.a: "A smaller Hatti may yet endure."
 bronze_hatti_collapse.90.b: "Fight for the whole empire."
 bronze_hatti_collapse_90a_tt: "Neo-Hittite successors are released from Hatti-owned regions. The player remains playable as Hatti."
 bronze_hatti_collapse_90b_tt: "Fragmentation is delayed, but collapse pressure rises."
