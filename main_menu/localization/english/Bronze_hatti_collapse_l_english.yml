 bronze_hatti_collapse_actions_card: "Possible Responses"
 bronze_hatti_collapse_actions_card_desc: "Available Hittite crisis actions appear below for Hatti. They can slow famine, raids, vassal defiance and fragmentation, but every choice costs grain, gold, manpower, prestige, estate patience or direct control."
 bronze_hatti_collapse_map_color: "Hittite Collapse"
 bronze_hatti_collapse_secondary_map_color: "Neo-Hittite Pressure"
 bronze_hatti_collapse_map_card: "Reading the Hittite Collapse"
 bronze_hatti_collapse_map_card_desc: "The situation map highlights Hatti, vulnerable Hittite lands, raided coasts, internal breakdown and Neo-Hittite successor pressure. Use situation actions to slow famine, raids and fragmentation, but every response costs wealth, manpower, prestige or authority."
 bronze_hatti_collapse_legend_hatti: "Hittite lands"
 bronze_hatti_collapse_legend_successor_pressure: "Internal breakdown"
 bronze_hatti_collapse_legend_raided: "Raided locations"
 bronze_hatti_collapse_location_owner_tt: "This location belongs to a country drawn into the Hittite collapse sphere."
 bronze_hatti_collapse_raided_location_tt: "This location has recently suffered collapse-era raiding."

 bronze_hatti_send_grain_to_cities: "Send Grain to the Cities"
 bronze_hatti_send_grain_to_cities_desc: "Open royal granaries and force emergency shipments into the palace cities. This buys time, but strains the treasury and angers elites who expected privileged access."
 bronze_hatti_send_grain_to_cities_tt: "Famine pressure falls strongly and collapse pressure falls slightly. Nobles lose satisfaction because royal stores are redistributed."
 bronze_hatti_fortify_the_coast: "Fortify the Coast"
 bronze_hatti_fortify_the_coast_desc: "Repair Cilician and southern Anatolian coastal defenses, station levies near ports, and watch the harbors for raiders."
 bronze_hatti_fortify_the_coast_tt: "For six years, coastal raid events have a much higher chance to be repulsed. Costs manpower, gold, and burgher satisfaction."
 bronze_hatti_appease_vassals: "Appease the Vassals"
 bronze_hatti_appease_vassals_desc: "Recognize local privileges, reduce tribute demands, and purchase loyalty from rulers who still fear the Great King."
 bronze_hatti_appease_vassals_tt: "Collapse pressure falls, but Hatti loses prestige and accepts weaker central authority."
 bronze_hatti_crush_rebellious_lords: "Crush the Rebellious Lords"
 bronze_hatti_crush_rebellious_lords_desc: "Send the army against defiant magnates. Victory restores fear of Hattusa; failure accelerates civil breakdown."
 bronze_hatti_crush_rebellious_lords_success_tt: "The campaign succeeds: collapse pressure falls and prestige rises."
 bronze_hatti_crush_rebellious_lords_failure_tt: "The campaign bogs down: collapse pressure rises and internal breakdown worsens."
 bronze_hatti_evacuate_settlements: "Evacuate Vulnerable Settlements"
 bronze_hatti_evacuate_settlements_desc: "Move exposed villagers and craftsmen inland before raids arrive. Lives are saved, but fields and coastal workshops are abandoned."
 bronze_hatti_evacuate_settlements_tt: "Collapse pressure falls, but famine pressure rises and peasants lose satisfaction."
 bronze_hatti_centralize_around_hattusa: "Centralize Around Hattusa"
 bronze_hatti_centralize_around_hattusa_desc: "Retreat from the most exposed periphery and preserve the central Anatolian core. This is survival, not victory."
 bronze_hatti_centralize_around_hattusa_tt: "Greatly reduces collapse pressure and famine pressure, but costs prestige and marks peripheral abandonment."
 bronze_hatti_recognize_successors: "Recognize Neo-Hittite Kingdoms"
 bronze_hatti_recognize_successors_desc: "Allow regional dynasts to rule as successor kings rather than fighting every province to the last. Hatti survives smaller, but the imperial structure breaks."
 bronze_hatti_recognize_successors_tt: "Historically plausible successor kingdoms are released only from Hatti-owned locations. Collapse pressure falls, but Hatti is weakened."

