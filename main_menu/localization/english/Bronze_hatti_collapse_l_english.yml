l_english:
 bronze_hatti_collapse: "The Hittite Collapse"
 bronze_hatti_collapse_desc: "The authority of Hattusa is buckling under famine, coastal raids, lost trade, rebellious vassals, and the wider Bronze Age Collapse. If the Great King cannot preserve grain, armies, and loyalty, Hatti may fracture into Neo-Hittite successor kingdoms."
 hint_bronze_hatti_collapse: "The Hittite Empire can survive the collapse only by trading authority, wealth, and manpower for time."
 bronze_hatti_collapse_overview_card: "Collapse Overview"
 bronze_hatti_collapse_overview_card_desc: "The Hittite Collapse is a focused [situation_with_icon|e] for Hatti and its sphere. It tracks famine, imperial pressure, rebellious vassals, raided coasts and the chance that Neo-Hittite successors emerge from lands still controlled by Hatti."
