l_english:
 sea_peoples_crisis: "The Sea Peoples Crisis"
 sea_peoples_crisis_desc: "A visible Late Bronze Age [situation_with_icon|e] tracking the collapse of palace economies, famine, refugee movement, raiding, and coastal settlement.\n\n#T Current Situation#!\nPhase: #Y [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_phase').GetValue|V0]#!/5\nCrisis Pressure: #R [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_pressure').GetValue|V0]#!/100\nFamine Pressure: #R [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_famine_pressure').GetValue|V0]#!/100\nSuccessful Coastal Raids: #R [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_raids').GetValue|V0]#!\nRepulsed Raids: #P [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_repulsed_raids').GetValue|V0]#!\nMarket Disruptions: #R [GetSituationByKey('sea_peoples_crisis').MakeScope.GetVariable('sea_peoples_global_market_damage').GetValue|V0]#!\n\nCountries in the eastern Mediterranean, Aegean, Anatolia, Egypt, Cyprus, and the Levant can use costly actions to reduce local damage, but no response is painless."
 hint_sea_peoples_crisis: "[GetSituationByKey('sea_peoples_crisis').GetNameWithNoTooltip]"
 hint_sea_peoples_crisis_hint_text: "$hint_sea_peoples_crisis_hint_text_1$\n\n$hint_sea_peoples_crisis_hint_text_2$"
 hint_sea_peoples_crisis_hint_text_1: "The Sea Peoples Crisis is a [situation_with_icon|e], not a normal country. It tracks famine, raids, refugee movement, trade collapse, and settlement pressure across the eastern Mediterranean."
 hint_sea_peoples_crisis_hint_text_2: "#T Suggested Response:#!\n@arrow_bonus_tier_2! Use crisis [actions_with_icon|e] early, but expect real costs in grain, prestige, stability, manpower, sailors, and estate satisfaction.\n@arrow_bonus_tier_1! Sea raids now test individual ports. Forts, coastal armies, fleets, port defenses, and escorted convoys reduce the chance that a raid succeeds.\n@arrow_bonus_tier_1! Coastal and palace states should fortify harbors, protect bronze convoys, open granaries carefully, and prepare for settlement pressure rather than expecting a clean victory."
 sea_peoples_situation_location_active_tt: "This location belongs to a country currently affected by the Sea Peoples Crisis."
 sea_peoples_situation_location_port_hit_tt: "This port has been directly hit by a Sea Peoples raid."
 sea_peoples_situation_location_raided_tt: "The owner has suffered coastal raids."
 sea_peoples_situation_location_refugees_tt: "The owner is under refugee pressure."
 sea_peoples_situation_location_breakdown_tt: "The owner is suffering internal breakdown."
 sea_peoples_situation_legend_active: "Crisis affected"
 sea_peoples_situation_legend_burned_port: "Burned port"
 sea_peoples_situation_legend_raided: "Raided coast"
 sea_peoples_situation_legend_breakdown: "Internal breakdown"
 sea_peoples_crisis_name: "The Sea Peoples Crisis"
 sea_peoples_crisis_name_desc: "A long Late Bronze Age collapse chain driven by famine, broken trade, coastal raiding, refugees, palace failures, and maritime migration."
 sea_peoples_crisis_phase_at_least_text: "The Sea Peoples Crisis is at least phase $VALUE|0$"
 sea_peoples_crisis_active_country_text: "The Sea Peoples Crisis is active"
 sea_peoples_crisis_eastern_mediterranean_country_text: "This country belongs to the eastern Mediterranean crisis zone"
 sea_peoples_crisis_maritime_target_text: "This country is vulnerable to maritime raids and migrations"
 sea_peoples_crisis_high_assimilation_zone_text: "This country lies in a high assimilation zone for Sea Peoples settlement"
 sea_peoples_crisis_egyptian_target_text: "This country is an Egyptian crisis target"
 sea_peoples_crisis_mycenaean_target_text: "This country is tied to the Mycenaean palace world"
 sea_peoples_begin_crisis_text: "The Sea Peoples Crisis begins"
 sea_peoples_set_phase_text: "The Sea Peoples Crisis enters phase $VALUE|0$"
 sea_peoples_advance_phase_text: "The Sea Peoples Crisis worsens"
 sea_peoples_add_pressure_text: "$VALUE|+=0$ crisis pressure"
 sea_peoples_add_famine_pressure_text: "$VALUE|+=0$ famine pressure"
 sea_peoples_mark_raided_coast_text: "Coastal raids strike the country"
 sea_peoples_coastal_raid_damage_text: "A Sea Peoples raid burns a coastal port, reduces food, damages prosperity, and disrupts the local market"
 sea_peoples_coastal_raid_repulsed_text: "Coastal defenses repulse a Sea Peoples raid, though the coast still pays a small price"
 sea_peoples_mark_refugee_wave_text: "Refugee waves enter the country"
 sea_peoples_mark_trade_collapse_text: "Bronze Age trade networks collapse"
 sea_peoples_mark_internal_breakdown_text: "Internal order breaks down"
 sea_peoples_mark_settlement_pressure_text: "Sea Peoples settlement pressure grows"
 sea_peoples_mark_assimilation_text: "Sea Peoples groups begin assimilation"
 sea_peoples_prepare_port_defense_text: "Ports prepare against maritime attacks"
 sea_peoples_egypt_mobilization_text: "Egypt mobilizes against the Sea Peoples"
 sea_peoples_phoenician_opening_text: "Phoenician maritime opportunity opens"
 sea_peoples_clear_acute_damage_text: "Acute crisis damage begins to recede"
 sea_peoples_phase_1_climate_pressure: "Climate Pressure"
 sea_peoples_phase_1_climate_pressure_desc: "Failed harvests and shifting weather patterns strain granaries, palace storage, and rural loyalty."
 sea_peoples_phase_2_migration_pressure: "Migration Pressure"
 sea_peoples_phase_2_migration_pressure_desc: "Displaced groups move along coasts, islands, roads, and broken trade lanes."
 sea_peoples_phase_3_trade_crash: "Mediterranean Trade Crash"
 sea_peoples_phase_3_trade_crash_desc: "Copper, tin, grain, timber, luxury goods, and palace exchange networks are breaking apart."
 sea_peoples_phase_4_settlement_fragmentation: "Settlement Fragmentation"
 sea_peoples_phase_4_settlement_fragmentation_desc: "Raiders, refugees, mercenaries, and displaced households begin settling in abandoned or weakened lands."
 sea_peoples_phase_5_iron_age_transition: "Iron Age Transition"
 sea_peoples_phase_5_iron_age_transition_desc: "The old palace world has broken. New maritime, tribal, and regional powers start to replace it."
 sea_peoples_raided_coast_modifier: "Burned Coast"
 sea_peoples_raided_coast_modifier_desc: "Ports, ship sheds, storehouses, and coastal villages have been raided by maritime bands."
 sea_peoples_market_disrupted_modifier: "Disrupted Bronze Market"
 sea_peoples_market_disrupted_modifier_desc: "Raids and convoy losses have damaged the movement of grain, fish, copper, tin, timber, and port goods through the local market network."
 sea_peoples_refugee_pressure_modifier: "Refugee Pressure"
 sea_peoples_refugee_pressure_modifier_desc: "Hungry refugees and displaced families are entering the country, increasing strain on food and order."
 sea_peoples_palace_economy_collapse_modifier: "Palace Economy Collapse"
 sea_peoples_palace_economy_collapse_modifier_desc: "The redistributive palace economy can no longer reliably move grain, bronze, textiles, and labor."
 sea_peoples_internal_breakdown_modifier: "Internal Breakdown"
 sea_peoples_internal_breakdown_modifier_desc: "Rivals, pretenders, hungry villages, and armed factions are pulling the state apart."
 sea_peoples_settlement_pressure_modifier: "Sea Peoples Settlement"
 sea_peoples_settlement_pressure_modifier_desc: "Maritime migrants and war bands are pressing to settle in weakened coastal districts."
 sea_peoples_assimilation_pressure_modifier: "Maritime Assimilation"
 sea_peoples_assimilation_pressure_modifier_desc: "Foreign settlers are merging into local society through service, marriage, trade, and sanctuary ties."
 sea_peoples_port_defense_preparations_modifier: "Port Defenses"
 sea_peoples_port_defense_preparations_modifier_desc: "Rulers have diverted resources into ships, coastal watch posts, harbor guards, and emergency granaries."
 sea_peoples_egypt_mobilization_modifier: "Delta Mobilization"
 sea_peoples_egypt_mobilization_modifier_desc: "Egypt mobilizes ships, archers, garrisons, and grain to defend the Delta and Nile approaches."
 sea_peoples_phoenician_opening_modifier: "Phoenician Opening"
 sea_peoples_phoenician_opening_modifier_desc: "The collapse of old overlords gives Levantine port cities new room to trade, build fleets, and absorb migrants."
 sea_peoples_fortify_coastal_palaces: "Fortify Coastal Palaces"
 sea_peoples_fortify_coastal_palaces_desc: "Divert labor, bronze, timber, and grain to reinforce harbors, palace walls, watch posts, and ship sheds against maritime raids."
 sea_peoples_open_emergency_granaries: "Open Emergency Granaries"
 sea_peoples_open_emergency_granaries_desc: "Release palace grain reserves under armed supervision. The people may eat, but elites and priesthoods will resent the loss of sacred and royal stores."
 sea_peoples_escort_bronze_convoys: "Escort Bronze Convoys"
 sea_peoples_escort_bronze_convoys_desc: "Commit ships and sailors to protect copper, tin, timber, and luxury convoys. Trade survives at the cost of naval exhaustion."
 sea_peoples_raise_palace_levies: "Raise Palace Levies"
 sea_peoples_raise_palace_levies_desc: "Call rural laborers, retainers, and palace dependents into emergency defense. It strengthens the state now and weakens the harvest later."
 sea_peoples_hire_migrant_war_bands: "Hire Migrant War Bands"
 sea_peoples_hire_migrant_war_bands_desc: "Turn displaced warriors and sea raiders into paid defenders. They are useful, armed, hungry, and unlikely to vanish quietly."
 sea_peoples_controlled_settlement: "Controlled Settlement"
 sea_peoples_controlled_settlement_desc: "Grant watched land to maritime migrants in exchange for service. This reduces immediate violence but accelerates demographic change."
 sea_peoples_sanctuary_appeasement: "Appease the Sanctuaries"
 sea_peoples_sanctuary_appeasement_desc: "Spend wealth and grain on sacrifices, festivals, and priestly support. The gods and the people may be calmed, but the economy will feel it."
 sea_peoples_mycenaean_league_levy: "Call the League Levy"
 sea_peoples_mycenaean_league_levy_desc: "Invoke Achaean oaths and demand ships, bronze, and fighting men from the league. It helps local survival but drains Achaean unity."
 sea_peoples_delta_defense_mobilization: "Mobilize the Delta Defense"
 sea_peoples_delta_defense_mobilization_desc: "Commit Egypt's grain, ships, archers, and royal authority to defend the Nile mouths against the great maritime threat."
 sea_peoples_open_phoenician_harbours: "Open the Phoenician Harbours"
 sea_peoples_open_phoenician_harbours_desc: "Let Levantine ports absorb sailors, craftsmen, refugees, and migrant merchants. The harbors prosper, but the old order loses control."
 sea_peoples_fortify_coastal_palaces_tt: "Coastal defenses are strengthened for several years, but grain, labor, and palace development are strained."
 sea_peoples_open_emergency_granaries_tt: "Famine pressure falls, while palace authority and elite satisfaction suffer from forced grain release."
 sea_peoples_escort_bronze_convoys_tt: "Trade links are protected for a time, but sailors and war exhaustion carry the burden."
 sea_peoples_raise_palace_levies_tt: "Defense improves, but fields are stripped of labor and famine pressure rises."
 sea_peoples_hire_migrant_war_bands_tt: "Crisis pressure falls sharply, but armed migrant groups increase settlement pressure and social risk."
 sea_peoples_controlled_settlement_tt: "Settlers are managed through service and supervised land grants, trading unrest for long-term assimilation pressure."
 sea_peoples_sanctuary_appeasement_tt: "Sanctuary legitimacy calms unrest, but the offerings consume grain and productive wealth."
 sea_peoples_mycenaean_league_levy_tt: "League forces are mobilized, reducing local crisis pressure while weakening Achaean Unity."
 sea_peoples_delta_defense_mobilization_tt: "Egypt gains strong defensive mobilization, but pays with grain, manpower, authority, and war exhaustion."
 sea_peoples_open_phoenician_harbours_tt: "Phoenician ports gain trade and assimilation strength while accepting greater instability and migrant pressure."
 sea_peoples_coastal_palaces_fortified_modifier: "Fortified Coastal Palaces"
 sea_peoples_coastal_palaces_fortified_modifier_desc: "Emergency harbor defenses, watch posts, and palace fortifications protect the coast, but they consume grain, labor, and political patience."
 sea_peoples_emergency_granaries_modifier: "Emergency Granaries Opened"
 sea_peoples_emergency_granaries_modifier_desc: "Palace stores are feeding the country. Survival improves, but trade, elite satisfaction, and reserve discipline suffer."
 sea_peoples_bronze_convoys_modifier: "Escorted Bronze Convoys"
 sea_peoples_bronze_convoys_modifier_desc: "Protected convoys keep bronze and trade moving, but ships are tied down and sailors are worn thin."
 sea_peoples_palace_levies_modifier: "Palace Levies Raised"
 sea_peoples_palace_levies_modifier_desc: "Emergency levies increase defensive strength at the cost of rural production and popular endurance."
 sea_peoples_migrant_war_bands_modifier: "Migrant War Bands"
 sea_peoples_migrant_war_bands_modifier_desc: "Displaced warriors now fight for the state, though their presence creates new settlement demands and control problems."
 sea_peoples_controlled_settlement_modifier: "Controlled Sea Peoples Settlement"
 sea_peoples_controlled_settlement_modifier_desc: "Maritime migrants are settled under palace oversight, improving assimilation but straining food and local authority."
 sea_peoples_sanctuary_appeasement_modifier: "Sanctuary Appeasement"
 sea_peoples_sanctuary_appeasement_modifier_desc: "Priests, sacrifices, and festivals calm the people, but offerings pull grain and labor out of the economy."
 sea_peoples_league_emergency_levy_modifier: "League Emergency Levy"
 sea_peoples_league_emergency_levy_modifier_desc: "Achaean oath-bound levies strengthen defense while placing heavy strain on nobles, allies, and league cohesion."
 sea_peoples_delta_defense_modifier: "Delta Defense Mobilization"
 sea_peoples_delta_defense_modifier_desc: "Egypt has committed its ships, archers, stores, and royal prestige to defend the Nile Delta."
 sea_peoples_open_phoenician_harbours_modifier: "Open Phoenician Harbours"
 sea_peoples_open_phoenician_harbours_modifier_desc: "Levantine harbors profit from displacement and maritime adaptation while accepting unrest and cultural mixing."
 sea_peoples_crisis.1.title: "The Sea Peoples Crisis"
 sea_peoples_crisis.1.desc: "Rumors move faster than ships: harvests have failed in distant lands, palace warehouses stand empty, and armed families are taking to the sea. Some come as raiders, some as refugees, some as mercenaries with no lord left to pay them. The eastern Mediterranean order is beginning to crack."
 sea_peoples_crisis.1.a: "The palace records will name this calamity."
 sea_peoples_crisis.1.b: "Warn the harbors and count the grain."
 sea_peoples_crisis.5.title: "The Crisis Deepens"
 sea_peoples_crisis.5.desc: "What began as bad harvests and scattered raids has become a wider movement of people, ships, and fear. Envoys speak of burned towns, lost caravans, and kings who no longer command their own warriors."
 sea_peoples_crisis.5.a: "The tide rises."
 sea_peoples_crisis.5.b: "Hold the line for another season."
 sea_peoples_crisis.10.title: "Empty Granaries"
 sea_peoples_crisis.10.desc: "The palace granaries are forced open before the next harvest. Rations shrink, villages hide their grain, and priests read unease in every omen."
 sea_peoples_crisis.10.a: "The hunger spreads."
 sea_peoples_crisis.10.b: "Spend prestige to maintain the ration lines."
 sea_peoples_crisis.20.title: "Raiders from the Sea"
 sea_peoples_crisis.20.desc: "Long ships have been sighted beyond [scope:target_location.GetName]. Harbor guards race to the shore, farmers hide their grain, and merchants pull bronze cargo from the quays. Forts, coastal armies, and patrol ships can blunt the attack, but a weak coast may still burn before the palace can answer."
 sea_peoples_crisis.20.a: "The coast burns."
 sea_peoples_crisis.20.b: "Raise harbor guards and patrol ships."
 sea_peoples_crisis_20_unprepared_tt: "A raid will test the coast. Existing port defenses, fortified palaces, forts, coastal armies, and a navy can still repulse it."
 sea_peoples_crisis_20_defended_tt: "Emergency guards and patrol ships improve the odds of repulsing the raid, but they consume food and labor."
 sea_peoples_crisis.30.title: "Refugee Ships"
 sea_peoples_crisis.30.desc: "Families crowd onto ships and carts, carrying gods, bronze tools, children, and stories of kingdoms that no longer answer messengers. They ask for grain, land, and protection."
 sea_peoples_crisis.30.a: "Let them through the gates."
 sea_peoples_crisis.30.b: "Settle them under palace supervision."
 sea_peoples_crisis.40.title: "The Bronze Network Breaks"
 sea_peoples_crisis.40.desc: "Tin caravans are late, copper shipments are lost, and luxury gifts no longer arrive at court. Scribes can still tally obligations, but the routes that made those obligations real are failing."
 sea_peoples_crisis.40.a: "The palace economy falters."
 sea_peoples_crisis.40.b: "Seize what remains of the trade stores."
 sea_peoples_crisis.50.title: "Palace Authority Cracks"
 sea_peoples_crisis.50.desc: "The wanax, king, or chief may command from the throne room, but the countryside listens less each month. Local strongmen arm their followers, labor gangs vanish, and old rivalries become dangerous."
 sea_peoples_crisis.50.a: "The center cannot hold."
 sea_peoples_crisis.50.b: "Send oaths, threats, and gifts."
 sea_peoples_crisis.60.title: "Newcomers Demand Land"
 sea_peoples_crisis.60.desc: "Sea Peoples bands, mercenary households, and displaced clans have stopped moving. They ask for fields and ports, and they keep their weapons close while they wait for an answer."
 sea_peoples_crisis.60.a: "They settle where authority is weak."
 sea_peoples_crisis.60.b: "Push them into watched districts."
 sea_peoples_crisis.70.title: "Maritime Peoples Take Root"
 sea_peoples_crisis.70.desc: "Foreign names enter local rolls. Their gods receive offerings beside old sanctuaries, their ships carry local goods, and their warriors take local wives. What arrived as danger is becoming part of the coast."
 sea_peoples_crisis.70.a: "Let the sea people become our people."
 sea_peoples_crisis.70.b: "Bind them through service and trade."
 sea_peoples_crisis.80.title: "The Port Cities Breathe"
 sea_peoples_crisis.80.desc: "As old empires fail, Levantine harbors adapt. Phoenician merchants take over routes abandoned by palaces, absorb displaced sailors, and turn crisis into maritime independence."
 sea_peoples_crisis.80.a: "A new sea trade is born from ruin."
 sea_peoples_crisis.90.title: "Ships at the Delta"
 sea_peoples_crisis.90.desc: "Reports from the coast speak of warships, ox carts, families, and armed bands moving toward the Nile mouths. Egypt can survive, but only by spending grain, bronze, and royal prestige on defense."
 sea_peoples_crisis.90.a: "Mobilize the Delta."
 sea_peoples_crisis.90.b: "Meet them with ships, archers, and grain."
 sea_peoples_crisis.100.title: "The Palaces Tremble"
 sea_peoples_crisis.100.desc: "Across the Achaean world, storehouses burn and palace records end in smoke. Rival wanaktes blame one another, farmers retreat to safer hills, and the old heroic order begins to fracture."
 sea_peoples_crisis.100.a: "The League loses its grip."
 sea_peoples_crisis.100.b: "Save the records, abandon the stores."
 sea_peoples_crisis.110.title: "After the Burning"
 sea_peoples_crisis.110.desc: "The worst fires have passed, though nothing returns as it was. Some refugees have become neighbors, some palaces never reopened, and new coastal powers begin writing the next age."
 sea_peoples_crisis.110.a: "The world has changed."

