l_french:
 a_absolutism_cawa_advance:0 "$a_absolutism_cawa$"
 a_absolutism_cawa_advance_desc:0 "$a_absolutism_cawa_desc$"
 a_absolutism_janissaries_advance:0 "$a_absolutism_janissaries$"
 a_absolutism_janissaries_advance_desc:0 "$a_absolutism_janissaries_desc$"
 a_bedouin_cavalry_advance:0 "$a_bedouin_cavalry$"
 a_bedouin_cavalry_advance_desc:0 "$a_bedouin_cavalry_desc$"
 a_brand_new_world:0 "Un tout nouveau monde"
 a_brand_new_world_desc:0 "Le monde évolue et ce qui était autrefois d'une certaine façon est désormais différent. Chacun est forcé à changer sous peine d'être oublié par l'Histoire. Notre Ordre existe depuis plus d'un demi-millénaire et nous ne sommes pas encore prêts à nous éteindre. Nos corps mortels finiront par rejoindre le Créateur, mais notre Ordre doit devenir éternel. Notre nation sera la plus moderne d'entre les modernes, bâtie sur des fondations inébranlables."
 a_central_power:0 "Puissance centrale en Méditerranée"
 a_central_power_desc:0 "Notre position centrale en Méditerranée nous offre un accès aisé à n'importe quelle côte. Nous devrions tirer parti de cet avantage pour trouver des alliances, forger de nouvelles amitiés et étendre nos frontières. La mer nous ouvre bien des opportunités de croissance dans notre quête d'influence et de sécurité."
 a_discovery_cawa_advance:0 "$a_discovery_cawa$"
 a_discovery_cawa_advance_desc:0 "$a_discovery_cawa_desc$"
 a_discovery_janissaries_advance:0 "$a_discovery_janissaries$"
 a_discovery_janissaries_advance_desc:0 "$a_discovery_janissaries_desc$"
 a_dynamic_society:0 "Une société dynamique"
 a_dynamic_society_desc:0 "Nos terres sont la patrie des braves. Ceux qui cherchent à améliorer leur vie ont leur place ici. Nous exploiterons les ambitions de ces personnes pour renforcer notre nation."
 a_fortified_border:0 "Une frontière fortifiée"
 a_fortified_border_desc:0 "Les éléments naturels ne défendent pas suffisamment nos frontières, comme c'est le cas pour d'autres nations. Cependant, nous pouvons avoir recours à notre esprit pour créer de puissantes défenses afin de dissuader nos ennemis et de protéger nos familles."
 a_land_of_banks:0 "Un pays de banques"
 a_land_of_banks_desc:0 "La Toscane est le cœur bancaire de l'Europe, abritant de nombreuses et puissantes institutions dans ses principales cités. Depuis leurs sièges, leurs ramifications s'étendent à travers la péninsule italienne et jusque dans le reste du continent."
 a_magnanimous_empire:0 "Un empire magnanime"
 a_magnanimous_empire_desc:0 "Le règne prospère du Grand $rank_kingdom_horde_ruler_suffix_male$ n'est pas seulement rappelé pour son épée terrible, mais aussi pour sa clémence envers quiconque ployait sagement le genou devant lui. Ceux qui accueillent favorablement notre autorité, nous les traitons comme s'ils étaient des nôtres."
 a_mining_heritage:0 "Héritage minier"
 a_mining_heritage_desc:0 "Durant des siècles, les mines ont façonné le paysage, l'économie et la culture de la région. Les importantes découvertes d'argent à la fin du XIIe siècle ont attiré les mineurs et les négociants de diverses régions, contribuant ainsi à renforcer la croissance des monts Métallifères et notre ascendant tant économique que politique."
 a_modern_nation:0 "Un pays moderne"
 a_modern_nation_desc:0 "En dépit de notre isolement évident, nous savons pertinemment que des innovations se produisent dans le monde entier, et ne perdons pas de temps à mettre en place ces tactiques pour semer la terreur chez nos ennemis."
 a_neverending_crusade:0 "Croisade éternelle"
 a_neverending_crusade_desc:0 "Notre mission ne s'achèvera pas tant qu'un catholique pourra être en danger pour des motifs religieux, que ce soit pour se rendre en pèlerinage sur la tombe de notre Seigneur et Sauveur, ou simplement traverser les mers sans craindre les corsaires. Jamais nous ne cesserons de nous entraîner afin de nous tenir prêts à combattre."
 a_new_dawn:0 "Une ère nouvelle"
 a_new_dawn_desc:0 "Notre nation renaît. Nos origines tribales ne sont plus que de vieux rêves qui ne reviendront jamais. La modernisation de notre pays est un fait qu'il est temps de montrer au monde entier."
 a_permanent_capital:0 "Une capitale permanente"
 a_permanent_capital_desc:0 "Depuis des siècles, notre nation ne dispose pas d'une vraie capitale : la cour suit les souverains partout où ils le souhaitent. Si cette approche a ses avantages, afin de gouverner efficacement notre vaste pays, nous devons établir une autorité centrale forte à un lieu permanent."
 a_reformation_cawa_advance:0 "$a_reformation_cawa$"
 a_reformation_cawa_advance_desc:0 "$a_reformation_cawa_desc$"
 a_reformation_janissaries_advance:0 "$a_reformation_janissaries$"
 a_reformation_janissaries_advance_desc:0 "$a_reformation_janissaries_desc$"
 a_renaissance_cawa_advance:0 "$a_renaissance_cawa$"
 a_renaissance_cawa_advance_desc:0 "$a_renaissance_cawa_desc$"
 a_renaissance_janissaries_advance:0 "$a_renaissance_janissaries$"
 a_renaissance_janissaries_advance_desc:0 "$a_renaissance_janissaries_desc$"
 a_resilient_soul:0 "Une âme forte"
 a_resilient_soul_desc:0 "Notre peuple brille par son opiniâtreté, sa résolution inflexible face à l'adversité. Il puise son courage dans l'unité et dans des valeurs communes, inaliénables. Sa résistance indomptable nous pousse à avancer, à affronter tous les obstacles qui se dressent face à nous. Quelles que soient les épreuves, nous en sortirons plus forts et déterminés que jamais."
 a_revolutions_cawa_advance:0 "$a_revolutions_cawa$"
 a_revolutions_cawa_advance_desc:0 "$a_revolutions_cawa_desc$"
 a_revolutions_janissaries_advance:0 "$a_revolutions_janissaries$"
 a_revolutions_janissaries_advance_desc:0 "$a_revolutions_janissaries_desc$"
 a_tolerant_society:0 "Société de tolérance"
 a_tolerant_society_desc:0 "Nous sommes résolus à empêcher notre royaume de sombrer dans l'intégrisme qui gangrène d'autres territoires. Quelles que soient les religions de nos sujets, notre pays doit être bâti sur les piliers de la tolérance et de la fraternité, afin d'encourager une coexistence harmonieuse de toutes les communautés. Unis par une vision commune, nous devons forger un pays où le respect et la compréhension sont au cœur de nos valeurs, préparant la voie vers un futur prospère."
 a_trading_hub:0 "Carrefour commercial"
 a_trading_hub_desc:0 "Notre nation a la chance de disposer d'un centre bien établi de villes axées sur le commerce et de marins aventureux prêts à ramener chez eux les richesses du monde entier. Ces hommes nous permettront de commercer avec d'autres nations et d'engranger d'importants bénéfices dans nos coffres."
 a_true_ethiopian_church:0 "Véritable Église d'Éthiopie"
 a_true_ethiopian_church_desc:0 "Les influences extérieures pourraient être utiles sur certains aspects, mais peuvent changer la nature de nos croyances. Afin de préserver notre identité, nous devons assurer l'existence de notre propre Église tewahedo."
 abacus_advance:0 "Abaque"
 abacus_advance_desc:0 "L'abaque est utilisé depuis des temps immémoriaux à travers le monde, et c'est précisément grâce à des outils comptables et à des registres de qualité que nous pouvons tenir un compte précis de nos finances. Sans eux et sans les hommes de talent qui les utilisent, nous serions ignorants de la richesse réelle de notre pays."
 abolished_serfdom:0 "Abolition du servage"
 abolished_serfdom_desc:0 "Les textes de l'époque romaine montrent qu'une armée d'hommes libres est bien plus déterminée au combat qu'une armée d'esclaves. Accorder quelques droits à la paysannerie les fera combattre pour défendre leur liberté."
 absolute_rulership:0 "Souveraineté absolue"
 absolute_rulership_desc:0 "Nombreux sont ceux qui exigent une place au sein du gouvernement, mais dans les faits, la plupart veulent les récompenses sans avoir à faire le moindre effort. Une nouvelle idée se répand, toutefois : l'absolutisme, qui nous autoriserait à nous débarrasser de ces parasites pour gouverner seuls."
 absolutism_agressive_advance:0 "L'État avant tout"
 absolutism_agressive_advance_desc:0 "À une époque où les régions se consolident et les ressources deviennent plus limitées, l'État a le droit d'exercer une politique agressive pour satisfaire les besoins matériels de sa population et étendre son pouvoir. Et si les guerres doivent être considérées comme le dernier acte de diplomatie, elles n'en restent pas moins un jeu diplomatique, car l'État se place au-dessus des restrictions humaines telles que la moralité et les lois."
 absolutism_control_decline_advance:0 "Administration absolutiste"
 absolutism_control_decline_advance_desc:0 "Les souverains absolutistes ne cherchent pas seulement à afficher leur pouvoir à la cour, mais aussi à travers un appareil administratif susceptible de s'étendre à l'ensemble du pays."
 absolutist_court:0 "Cour absolutiste"
 absolutist_court_desc:0 "L'autorité a récemment été centralisée en la personne du dirigeant lui-même dans le monde entier. Les autres membres de la cour sont davantage serviteurs et subordonnés de leur autorité qu'acteurs autonomes. Cela permet aux dirigeants d'instaurer leurs volontés plus rapidement et plus efficacement."
 academia_pontaniana:0 "Accademia Pontaniana"
 academia_pontaniana_desc:0 "Longtemps, Naples a tout fait pour être un foyer d'enseignement moderne, attirant les beaux esprits de son époque et répandant les lumières de la Renaissance. C'est sous la conduite de Giovanni Pontano que ces cercles de discussion devinrent mieux structurés et organisés, aussi est-il approprié de donner à cette académie le nom de cet intellectuel si prolifique."
 accademia_cimento:0 "Accademia del Cimento"
 accademia_cimento_desc:0 "L'Accademia del Cimento était une société scientifique établie à Florence en 1657. C'était l'une des premières du genre, fondée par des étudiants de Galilée et financée par le prince Léopold et son frère, le grand-duc Ferdinand II.\\nBien qu'elle n'ait jamais eu le titre d'institution officielle, elle a joué un rôle important dans le développement des principes scientifiques de l'expérimentation. Cette société savante qui avait pour devise « Provando e riprovando », soit « Essayer et essayer à nouveau », publia le Saggi, un ouvrage qui devint le manuel de laboratoire standard du XVIIIe siècle."
 acceptance_of_old_testament:0 "Reconnaissance du Vieux Testament"
 acceptance_of_old_testament_desc:0 "Certaines dénominations $christian_ADJ$nes ont décidé d'accorder moins d'importance à l'Ancien Testament, prétendant que l'arrivée de Jésus l'a complètement supplanté. De notre côté, nous maintenons qu'il est toujours pertinent, et que certaines instructions qu'il contient sont aussi valables qu'elles l'étaient au moment où elles ont été rédigées."
 accounts_of_the_atlantic_voyage:0 "Histoires du voyage sur l'Atlantique"
 accounts_of_the_atlantic_voyage_desc:0 "Selon le légendaire Mansa Moussa, son prédécesseur est parti explorer la mer de l'Atlantique, dans l'espoir de découvrir les limites de l'océan. Même si certains parmi les élites considèrent cette entreprise comme une abdication éhontée, d'autres au sein de notre pays y voient une histoire édifiante visant à explorer les recoins inconnus du monde."
 ach_a_system_of_forts_advance:0 "Un système de forts"
 ach_a_system_of_forts_advance_desc:0 "Nos défenses côtières sont inégalées, s'appuyant sur le #italic tracé à l'italienne#!, une innovation d'Italie, pour repousser les raids navals ennemis et les incursions dans notre territoire souverain. Nous avons transformé les anciens châteaux des croisés en forts d'artillerie modernes, capables à la fois de résister à des mois de siège et de projeter leur puissance sur les mers Ionienne et Égée. Aucun envahisseur ne prendra la Morée par la mer tant que nos sentinelles de pierre monteront la garde sur les caps rocheux et dans les vallées fertiles."
 ach_achaean_enlightenment_advance:0 "Les Lumières de l'Achaïe"
 ach_achaean_enlightenment_advance_desc:0 "Fuyant les périphéries délabrées de l'Orient, les lettrés trouvent refuge au sein de nos cours, adjoignant ainsi de manière unique la philosophie latine et le savoir classique grec. Grâce au mécénat éclairé des princes, nous avons créé des académies dans lesquelles sont étudiées les œuvres des grands sages d'Orient et d'Occident, suscitant une renaissance culturelle. Cet essor intellectuel attire les grands esprits d'Europe et garantit à notre État de rester à la pointe du progrès dans les domaines administratifs et scientifiques."
 ach_assizes_of_romania_advance:0 "Assises de Romanie"
 ach_assizes_of_romania_advance_desc:0 "Codifiées pour gérer un réseau complexe de serfs grecs et de seigneurs français, les lois féodales de la Francie orientale sont les plus raffinées du monde catholique. Ces #italic assises#! offrent un cadre juridique clair pour les litiges fonciers, les successions et les obligations militaires, garantissant que même en temps de guerre, l'ordre social reste inébranlable. Le respect rigoureux de ces lois permet d'endiguer les fractures internes qui ont détruit les premiers États croisés, fournissant ainsi une base solide pour la gouvernance."
 ach_knights_of_the_peloponnese_advance:0 "Chevaliers du Péloponnèse"
 ach_knights_of_the_peloponnese_advance_desc:0 "Notre noblesse a passé des siècles à mener des escarmouches incessantes contre nos ennemis à nos frontières, créant ainsi une tradition unique de cavalerie hautement mobile. Ces chevaliers ont abandonné les bardes encombrantes de leurs ancêtres français au profit d'armures plus légères et de tactiques adaptées aux montagnes escarpées et traîtresses de Grèce. Cela permet à nos forces de déjouer la cavalerie lourde traditionnelle et de frapper les flancs ennemis avec une vitesse et une précision dévastatrices."
 ach_morean_silk_advance:0 "Soie de Morée"
 ach_morean_silk_advance_desc:0 "Le Péloponnèse reste le cœur de la production européenne de soie, un héritage de l'époque byzantine que les princes francs ont considérablement développé grâce à la plantation de mûriers financée par l'État. En contrôlant les ports stratégiques, nous pouvons proposer des prix inférieurs à ceux des importations perses et chinoises, faisant ainsi de l'Achaïe le principal fournisseur des fabricants de vêtements de Florence et de Lyon. Ce monopole nous assure un flux constant #italic d'or doux#! qui finance nos mercenaires ainsi que la fortification de nos cols montagneux."
 ach_villehardouins_valor_advance:0 "La vaillance de Villehardouin"
 ach_villehardouins_valor_advance_desc:0 "Geoffroi de Villehardouin, maréchal de Champagne et chroniqueur de la quatrième croisade, a composé l'une des premières histoires vernaculaires en ancien français, immortalisant les exploits de ses compagnons et la prise étonnante de Constantinople dans une prose vivante et héroïque qui a largement circulé au sein de la noblesse d'Europe occidentale. Sa chronique a servi non seulement de témoignage, mais aussi de propagande et d'inspiration. Elle a permis de rallier de nouveaux chevaliers et pèlerins pour renforcer les États latins assiégés, tout en favorisant un sentiment commun de fraternité chevaleresque parmi les seigneurs francs disséminés. Longtemps après la dispersion de l'ost d'origine, ceux-ci continuaient en effet à se considérer comme des croisés défendant la frontière de Dieu contre les dissidents et les infidèles. Il est temps de retrouver cet esprit pour relever les défis auxquels notre armée est confrontée."
 act_of_revocation:0 "Acte de révocation"
 act_of_revocation_desc:0 "Depuis longtemps, la coutume veut que des parties du domaine royal soient offertes à la noblesse en échange de ses services. Ce système ne peut plus être maintenu si nous voulons assurer l'intégrité de notre domaine. Dorénavant, nous louerons ces terres."
 adaptability:0 "Arrangements"
 adaptability_desc:0 "Il y a ce qui est nôtre, et ce qui relève de notre domaine patrimonial et que nous n'abandonnerons en aucun cas. Or, quelques arrangements permettront d'intégrer dans cette seconde catégorie quelques territoires supplémentaires. Ainsi, au cas où le pire surviendrait, le monde entier saura que notre combat pour reprendre ce qui nous appartient est juste."
 adapted_incan_army:0 "Armée inca adaptée"
 adapted_incan_army_desc:0 "Des envahisseurs venus de contrées inconnues ont posé le pied sur notre territoire et menacent notre existence. Mais nos armées s'adaptent aux nouvelles tactiques ennemies, apprennent à utiliser leurs propres armes contre eux, et combattent avec une résolution indestructible."
 additional_colonists:0 "Colonisateurs supplémentaires"
 additional_colonists_desc:0 "Le Nouveau Monde est bien des choses, mais surtout, il est vide. En tout cas, personne digne de considération n'y vit. Faire savoir au peuple qu'il regorge d'opportunités encouragera de nombreuses personnes à s'y établir."
 additional_diplomats:0 "Diplomates supplémentaires"
 additional_diplomats_desc:0 "L'expansion de notre pays signifie aussi que nous devons étendre notre réseau diplomatique. Assurons-nous que notre corps diplomatique dispose du personnel nécessaire."
 additional_loyalist_recruitment:0 "Recrutement de nouveaux loyalistes"
 additional_loyalist_recruitment_desc:0 "Naturellement, certains qui résident dans nos dépendances comprennent bien que notre droit à gouverner a reçu l'assentiment divin. En recrutant et soutenant ces personnes éclairées, nous pourrions raffermir notre emprise sur ces dépendances."
 additional_merchants:0 "Marchands supplémentaires"
 additional_merchants_desc:0 "Les colonies n'ont d'autre usage que de fournir la métropole en marchandises. Pour nous en assurer, il nous faut tout faire pour favoriser le développement de la classe marchande."
 administrative_leadership:0 "Commandants administratifs"
 administrative_leadership_desc:0 "Un chef militaire ne doit pas seulement connaître les affaires militaires. Des sujets liés à la logistique, à l'administration et à l'attribution des approvisionnements, aux dépenses monétaires, et autres, sont également essentiels à toute campagne militaire réussie."
 admiralty_advance:0 "Amirauté"
 admiralty_advance_desc:0 "$admiralty_desc$"
 advaita_vedanta:0 "Advaita Vedānta"
 advaita_vedanta_desc:0 "Rejetant le dualisme entre la conscience et la matière, l'$advaita_vedanta$ affirme que l'$atman$, le soi le plus profond, est identique au brahman, la réalité suprême ou conscience de l'univers. En ce sens, le monde matériel physique n'est qu'une illusion qui masque la réalité ultime du brahman."
 advanced_anti_piracy_warfare:0 "Renonciation à la piraterie"
 advanced_anti_piracy_warfare_desc:0 "Dans cet âge propulsé par la découverte et la pensée humaniste, le vol et la violence causés par les pirates en haute mer n'ont plus leur place. De plus en plus de nations s'unissent pour faire face à cette menace commune contre le bien-être et la prospérité, et chacune promet de mettre un terme à ce fléau."
 advanced_bureaucracy:0 "Bureaucratie avancée"
 advanced_bureaucracy_desc:0 "Une administration fiscale mieux organisée, dirigée par des fonctionnaires de l'État, nous permet d'augmenter nos revenus fiscaux."
 advanced_mining:0 "Minage avancé"
 advanced_mining_desc:0 "La mise au point d'outils plus avancés et résistants a permis d'étendre les opérations d'extraction de nouveaux minéraux et métaux."
 advanced_paik_system_advance:0 "Paiks avancés"
 advanced_paik_system_advance_desc:0 "$a_late_paik_infantry_desc$"
 african_sturdy_grains_advance:0 "Culture de céréales robustes"
 african_sturdy_grains_advance_desc:0 "Le renforcement de notre stratégie de production agricole aidera notre peuple à prospérer. Heureusement, nos terres présentent bien assez d'espace pour la culture de diverses céréales."
 age_of_condottieri:0 "L'ère des condottieres"
 age_of_condottieri_desc:0 "Les mercenaires constituent l'essentiel de très nombreuses armées, aussi serait-il bon de nous assurer que nous pouvons en recruter aisément. Accueillons comme il se doit les capitaines mercenaires de passage, et ils se souviendront de Milan lorsque nous aurons besoin d'eux."
 agent_training:0 "Agents bien formés"
 agent_training_desc:0 "Nous avons prévu de nombreuses actions clandestines, mais il nous manque les hommes nécessaires à ces tâches. Établir une méthode de formation pour nos espions nous permettra de soutenir les agents disponibles lors de leurs missions les plus risquées."
 agreements_sea_nomads:0 "Accords avec les nomades des mers"
 agreements_sea_nomads_desc:0 "À l'instar d'autres peuples nomades des mers, les $sama_culture$ vivent depuis longtemps sur l'eau, voguant entre les îles avec une habileté sans pareille. Grâce au partage des connaissances ou à des accords de respect mutuel et d'opportunités communes, nous garantirons la sécurité des passages et la rapidité des réparations."
 agriculture_advance:0 "Agriculture"
 agriculture_advance_desc:0 "La terre est l'une des plus grandes sources de richesse, d'abondance et de marchandises qui existe. Nous devons apprendre à l'exploiter si nous voulons faire avancer notre société, nourrir notre peuple et prospérer."
 ahdnames:0 "Ahidnâme"
 ahdnames_desc:0 "Également appelés capitulations, les Ahidnâmes sont des accords contractuels passés avec d'autres nations, s'appuyant à la fois sur le droit musulman et le droit séculier. Les Ahidnâmes garantissent la protection et les droits des marchands ou des clercs étrangers sur nos terres, afin que la justice soit respectée et que le commerce puisse se faire librement."
 ahimsa:0 "Ahimsa"
 ahimsa_desc:0 "Le concept d'$ahimsa$, ou de non-violence, est une vertu essentielle dans toutes les religions suivant le dharma. Tout conflit devrait être résolu pacifiquement par le dialogue, et non par l'usage de la force. Malheureusement, ce n'est pas toujours possible, aussi la violence ne doit-elle être employée qu'en dernier recours, et son usage doit être juste."
 akinji_cavalry:0 "Akindji"
 akinji_cavalry_desc:0 "Notre cavalerie légère opère de fréquentes incursions sur les territoires des voisins et parvient même parfois à s'y établir. Historiquement, elle faisait partie des premières unités à faire face à l'armée ennemie, attaquant les voies commerciales pour empêcher tout ravitaillement et renfort d'arriver. Connue pour son courage au combat, elle vit de ses pillages aux frontières."
 akson_thai:0 "Akson Thai"
 akson_thai_desc:0 "Basée à l'origine sur l'ancienne écriture $khmer_language$, l'écriture $thai_culture$ s'est développée de manière distincte pour s'adapter à la phonologie de notre langue. Le fait de disposer d'une langue écrite qui nous est propre a permis à notre peuple de développer une culture unique."
 akt_ainu_trade:0 "Commerce $ainu_culture$"
 akt_ainu_trade_desc:0 "Nous figurons parmi les premiers Japonais à avoir établi un commerce permanent avec les $ainu_culture$s. Nos navires transitent entre leurs terres et les nôtres, ce qui contribue grandement à nos économies mutuelles."
 akt_ezo_kanrei:0 "Ezo kanrei"
 akt_ezo_kanrei_desc:0 "Le poste d'Ezo kanrei (administrateur d'$ezo_area$) a été confié à notre clan à l'époque du shogunat de Kamakura. Nous sommes chargés d'administrer l'île en tant que terre d'exil pour les criminels, raison pour laquelle nous conservons des contacts étroits dans tout le détroit."
 akt_march_of_akita:0 "Marche d'Akita"
 akt_march_of_akita_desc:0 "Notre fief d'Akita, dans le nord de la province de Dewa, constituait autrefois une zone de conflit contre les « barbares » du nord. La frontière japonaise a été repoussée plus au nord, mais l'esprit de nos ancêtres coule toujours dans nos veines."
 al_caid:0 "Al-Qā'id"
 al_caid_desc:0 "En nommant un Qā'id loyal pour superviser les provinces et réglementer le commerce au nom de l'État, nous donnons du pouvoir aux marchands urbains tout en garantissant la gouvernance provinciale. Le fait de garantir des transactions équitables et des marchés réglementés ne fera que renforcer notre base économique."
 alb_angevin_legitimacy:0 "Légitimité angevine"
 alb_angevin_legitimacy_desc:0 "Nos souverains actuels peuvent être directement rattachés à la lignée de la maison capétienne d'Anjou, établie notamment par Charles Ier de Naples pour servir de porte d'entrée vers les terres du cœur byzantin. Ce lien nous confère un prestige occidental unique parmi les seigneurs balkaniques fragmentés, nous permettant de revendiquer une place à la table des grands monarques catholiques d'Europe. En perpétuant les honneurs et l'héraldique du Lys, nous distinguons notre souveraineté de celle de simples chefs tribaux."
 alb_diplomacy_of_the_two_shores:0 "Diplomatie des deux côtes"
 alb_diplomacy_of_the_two_shores_desc:0 "Notre position nous permet de servir de pont essentiel entre les cités-États italiennes et l'intérieur montagneux des Balkans. Nos diplomates sont formés pour naviguer à la fois au sein du Sénat vénitien et des conseils tribaux, rendant notre médiation indispensable pour le commerce comme pour la guerre."
 alb_eastern_and_western_heritage:0 "Héritage oriental et occidental"
 alb_eastern_and_western_heritage_desc:0 "Nos centres urbains continuent de fonctionner à la fois selon les principes sophistiqués du droit byzantin et les bureaucraties modernes de l'Occident. Cette continuité juridique offre un cadre stable pour les contrats, les droits de propriété et les successions, attirant marchands et érudits étrangers à nos cours. Un système juridique prévisible est le fondement de notre puissance administrative croissante."
 alb_enlightened_albanian_absolutism:0 "Absolutisme albanais éclairé"
 alb_enlightened_albanian_absolutism_desc:0 "Suivant la tendance européenne, nos monarques ont centralisé le pouvoir, privant les anciens clans de leurs privilèges féodaux au profit d'un État moderne. Cette décision nous a permis de mettre en place une fiscalité universelle et un système judiciaire national qui a transformé le royaume en une machine de guerre efficace."
 alb_the_albanian_merchant_class:0 "La classe marchande albanaise"
 alb_the_albanian_merchant_class_desc:0 "Les marchands de notre côte sont devenus les principaux vecteurs du commerce entre les Balkans et l'Occident. En utilisant le grec pour les affaires et l'albanais pour la fidélité, ils dominent les marchés de Venise à Constantinople. Ces marins commerçants sont l'élément vital de notre économie en pleine modernisation."
 alb_the_arbereshe_diaspora:0 "La diaspora d'Arbëreshë"
 alb_the_arbereshe_diaspora_desc:0 "Au fil du temps, bon nombre de nos compatriotes ont émigré à l'étranger et formé des communautés appelées #italic Arbëreshë#!. Ces « Albanais d'outre-mer » préservent notre langue et nos traditions tout en gagnant en influence dans leurs nouveaux foyers. Ils servent de diplomates permanents sur place, plaidant sans cesse pour le soutien de la patrie."
 alb_the_arberian_principality:0 "La principauté d'Arbëria"
 alb_the_arberian_principality_desc:0 "Alors que la puissance de nos ennemis décline, nos grandes maisons se sont unies pour assurer la survie de notre nation. En tirant parti de notre position entre l'Occident catholique et l'Orient orthodoxe, nous sommes devenus des maîtres de la diplomatie maritime et du commerce côtier. Cette autonomie stratégique nous permet de naviguer entre les rivalités de nos voisins à notre propre avantage."
 alb_the_catholic_bulwark:0 "Le rempart catholique"
 alb_the_catholic_bulwark_desc:0 "Positionnés comme le poste avancé le plus à l'est de l'Église romaine, nous sommes devenus le principal bouclier contre les schismatiques orthodoxes et les païens turcs. Ce devoir sacré nous confère une paix intérieure qui imprègne tout le royaume, transformant notre lutte en une croisade pour notre âme."
 alb_the_champion_of_christ:0 "Le Champion du Christ"
 alb_the_champion_of_christ_desc:0 "Bien que nos communautés soient divisées par la foi, notre nation est dévouée au Christ, ce qui nous vaut le titre #italic d'Athleta Christi#!. Notre foi inébranlable a attiré l'attention de la papauté et des patriarches, nous assurant des subventions financières et des volontaires militaires. Nous combattons non seulement pour nos terres, mais pour la survie même de la « Parole du Christ »."
 alb_the_expansion_of_the_regnum:0 "L'expansion du Regnum"
 alb_the_expansion_of_the_regnum_desc:0 "Nous n'aurons de cesse que les frontières de l'ancien Royaume soient restaurées dans toute leur étendue et au-delà, reprenant notre place en tant que maîtres des Balkans. Cette mission centralisatrice nous permet d'intégrer les territoires nouvellement conquis avec un minimum de frictions tandis que nous rétablissons un pouvoir « légitime »."
 alb_the_national_arsenal:0 "L'arsenal national"
 alb_the_national_arsenal_desc:0 "En tant que principal port pour l'intervention occidentale, nous avons modernisé les chantiers navals de Durrës afin de maintenir une flotte permanente de galères. Cette infrastructure nous permet de projeter notre puissance à travers l'Adriatique, garantissant que les voies maritimes entre Naples et l'Albanie restent ouvertes pour les renforts et le commerce. Notre contrôle du port fait de nous les maîtres incontestés de la côte occidentale des Balkans."
 alb_the_spirit_of_the_rilindja:0 "L'esprit de la Rilindja"
 alb_the_spirit_of_the_rilindja_desc:0 "Notre « Renaissance nationale » ou #italic Rilindja#! a allumé un feu dans le cœur des Albanais partout, des montagnes du nord à la diaspora en Italie et en Égypte. Ce mouvement culturel et politique a uni tous les Albanais sous la bannière commune de « l'albanaisisme ». Nous sommes une nation renaissante, prête à prendre sa place parmi les États souverains de l'Europe."
 albanian_prokletije:0 "Bjeshkët e Namuna"
 albanian_prokletije_desc:0 "Les « monts maudits » qui s'élèvent au cœur de nos terres font autant partie de notre peuple que le #italic Kanun#! lui-même. Même le villageois le plus humble sait quels passages sont praticables en hiver, quelles crêtes offrent un abri contre les embuscades et quelles vallées ne mènent nulle part. Les envahisseurs qui pénètrent dans ces montagnes se retrouvent piégés dans un labyrinthe créé par le terrain bien avant de rencontrer nos guerriers."
 albanian_the_albanian_alphabet_commission:0 "Le Congrès de l'alphabet albanais"
 albanian_the_albanian_alphabet_commission_desc:0 "Des lettrés et des patriotes travaillent sans relâche pour standardiser la langue albanaise en utilisant un alphabet latin unifié. En créant des écoles nationales et en publiant des journaux en langue vernaculaire, nous brisons l'hégémonie culturelle des langues étrangères. L'alphabétisation en albanais est le premier pas vers une véritable indépendance."
 albanian_the_fortified_kulla_houses:0 "Les Kulla, maisons fortifiées"
 albanian_the_fortified_kulla_houses_desc:0 "À travers la campagne, la noblesse et les paysans aisés ont construit des #italic Kulla#! : des maisons-tours en pierre fortifiées. Ces structures servent de mini-citadelles, protégeant les familles à la fois des vendettas et des raids ennemis. Elles représentent une société constamment mobilisée pour la défense."
 albanian_the_kanun:0 "Le Kanun"
 albanian_the_kanun_desc:0 "En l'absence d'une Couronne centrale, notre ordre social est maintenu par le #italic Kanun#!, un code sophistiqué de droit coutumier. Ce cadre légal régit tout, des droits de propriété au devoir sacré de #italic Besa#! (le serment solennel). Le #italic Kanun#! constitue une base de stabilité et d'honneur que les administrateurs étrangers ne pourront jamais démanteler entièrement."
 albanian_the_sacred_oath:0 "Le serment sacré"
 albanian_the_sacred_oath_desc:0 "Le concept de #italic Besa#! a évolué pour devenir une institution nationale de confiance et d'hospitalité. La parole d'un Albanais est un engagement, et cette réputation de loyauté indéfectible fait de nous les gardes et mercenaires les plus fiables de la Méditerranée. Dans un monde d'alliances changeantes, notre parole est notre monnaie la plus précieuse."
 albanian_the_stradioti_tradition:0 "La tradition Stradioti"
 albanian_the_stradioti_tradition_desc:0 "La pauvreté de nos montagnes a fait de nos hommes la meilleure cavalerie légère de la chrétienté. Ces Stratioti, « stradiotes », sont recherchés par toutes les grandes puissances, de Venise à la France, pour leurs compétences inégalées en escarmouche et en reconnaissance. En exportant notre savoir-faire martial, nous ramenons la richesse dans nos collines et assurons que nos soldats soient les plus expérimentés d'Europe."
 albanian_the_transhumance_networks:0 "Les réseaux de transhumance"
 albanian_the_transhumance_networks_desc:0 "Le déplacement saisonnier du bétail, la transhumance, permet à notre peuple d'exploiter les pâturages élevés en été et les plaines côtières chaudes en hiver. Ce mode de vie mobile rend notre population difficile à cerner et assure un approvisionnement alimentaire résilient, que l'on ne peut détruire facilement par une politique de terre brûlée. Notre richesse marche sur quatre pattes, toujours prête à se déplacer vers des terres plus sûres."
 alberghi_28_advance:0 "$alberghi_28$"
 alberghi_28_advance_desc:0 "$alberghi_28_desc$"
 alchemy_advance:0 "Alchimie"
 alchemy_advance_desc:0 "L'art de l'alchimie consiste à créer des potions et des élixirs en combinant des herbes, des minéraux et d'autres ingrédients naturels. Bien qu'elle ne soit pas toujours fiable, l'alchimie peut parfois produire des résultats remarquables dans le traitement de divers maux."
 alleviate_concerns_advance:0 "Apaisement des tensions"
 alleviate_concerns_advance_desc:0 "Nul pays n'a intérêt à ce que ses voisins soient constamment à l'affût de ses moindres mouvements. Notre diplomatie doit apaiser en permanence les tensions qui peuvent surgir, afin que nos voisins n'aient aucune raison d'inquiétude à notre sujet."
 alpha_and_omega:0 "L'alpha et l'oméga"
 alpha_and_omega_desc:0 "Notre dieu est le commencement et la fin de toute chose. Sa voix sera le seul son qu'entendront nos ennemis par-dessus les cris du combat. Sa nature pieuse les guidera jusqu'à Ses bras accueillants. Et, alors, ils verront la vérité."
 alpine_defensiveness:0 "Défense dans les Alpes"
 alpine_defensiveness_desc:0 "Les terres $SWI_ADJ$s sont constituées de terrains accidentés, de montagnes et de vallées. Nous devons tirer le meilleur parti de notre géographie dans nos tactiques militaires. C'est ainsi que nous triompherons de tout ennemi qui osera poser le pied chez nous."
 amazigh_slave_raids:0 "Raids d'esclaves amazighs"
 amazigh_slave_raids_desc:0 "Les côtes qui bordent notre région sont bien pourvues pour faciliter un afflux constant de travailleurs sous contrat et de captifs en provenance de toute l'Europe. Cette main-d'œuvre jouera certainement un rôle clé dans la grandeur de notre nation et la croissance de nos profits."
 an_early_urbanization:0 "Une urbanisation précoce"
 an_early_urbanization_desc:0 "Les Pays-Bas ont traditionnellement un taux d'urbanisation élevé qui nous a permis de dépasser nos prévisions. Nous devrions tirer parti de cette tendance et l'accroître, en créant un solide réseau de colonies qui contribuera à un avenir plus riche."
 an_iron_fist:0 "Une main de fer"
 an_iron_fist_desc:0 "Notre région est riche d'une diversité de cultures et de religions. La seule chose qui l'unit n'est pas la compassion, mais un dirigeant puissant, capable d'étouffer toute tentative de révolte rapidement et fermement."
 an_order_with_state:0 "Un Ordre avec un État"
 an_order_with_state_desc:0 "Certaines nations sont souvent décrites comme une #italic armée avec un État#!. Nous, en revanche, avons toujours été un Ordre avec une nation, depuis notre acquisition de Rhodes aux Romains. Néanmoins, nous ne pouvons qu'admirer l'efficacité avec laquelle ils ont exploité leurs ressources pour devenir une formidable nation. Inspirés par leur réussite, nous mettrons en œuvre des réformes pour que notre armée puisse affronter tout adversaire avec confiance."
 anagignoskomena:0 "Anagignoskomena"
 anagignoskomena_desc:0 "La Bible contient toutes les œuvres dignes d'être vénérées et étudiées, même si certaines présentent peut-être moins d'importance que d'autres. L'$anagignoskomena$ n'étant pas présente dans la Bible en $hebrew_language$, elle a moins de valeur que d'autres textes, mais reste néanmoins digne d'être lue et ne saurait être ignorée."
 anatomy_advance:0 "Anatomie"
 anatomy_advance_desc:0 "Les médecins acquièrent une connaissance plus approfondie de l'anatomie humaine, ce qui permet de traiter plus efficacement les blessures et les maladies. Ces connaissances, qui proviennent en grande partie de dissections pratiques de cadavres humains, permettent également d'améliorer les techniques chirurgicales et de réduire les risques liés aux procédures médicales."
 angevin_heraldry:0 "Héraldique angevine"
 angevin_heraldry_desc:0 "Les lys d'or et les aigles à deux têtes de nos bannières témoignent de revendications anciennes et de notre ambition royale. Des revendications qui s'étendent sur la péninsule italienne, et dont l'écho résonne encore dans notre cour, jusqu'en Albanie et à Jérusalem. Que la maison de Valois-Anjou s'élève plus haut que jamais."
 ant_arianitis_defiance:0 "La résistance d'Arianiti"
 ant_arianitis_defiance_desc:0 "Suivant l'exemple héroïque de nos dirigeants, notre maison est reconnue comme la première à se lever et la dernière à se rendre face à nos ennemis. Cet héritage de résistance inflexible a forgé notre peuple en une nation de guerriers qui considèrent le combat comme un devoir sacré plutôt qu'un fardeau."
 ant_born_in_the_highlands:0 "Nés dans les Highlands"
 ant_born_in_the_highlands_desc:0 "Notre foyer ancestral, niché dans les hautes terres de notre nation, est une citadelle naturelle de pics escarpés et de ravins étroits, presque impossible à traverser pour une armée conventionnelle. Nous avons en outre fortifié chaque passage stratégique et chaque sommet montagneux, garantissant que tout envahisseur devra payer un prix exorbitant en sang pour chaque parcelle de notre territoire qu'il tentera d'occuper."
 ant_patronage_of_the_faith:0 "Mécénat de la foi"
 ant_patronage_of_the_faith_desc:0 "En accordant d'importantes terres et des fonds à nos monastères, nous assurons la loyauté spirituelle de la noblesse et des paysans. Ces lieux sacrés servent de cœur culturel à notre principauté, où nos victoires sont célébrées."
 ant_the_eternal_resistance:0 "La résistance éternelle"
 ant_the_eternal_resistance_desc:0 "Nous avons prêté un serment éternel : tant que nous respirerons, le cœur de la rébellion continuera de battre. Nos troupes sont entraînées avec une dévotion fanatique envers notre maison régnante, garantissant qu'elles conservent leur discipline même face à des forces impériales écrasantes."
 ant_the_iron_mines_of_the_interior:0 "Les mines de fer de l'intérieur"
 ant_the_iron_mines_of_the_interior_desc:0 "Les montagnes escarpées du centre de l'Albanie, sous notre contrôle, regorgent de minerai de fer de haute qualité, essentiel aux outils de guerre. Nous avons mis en place des fonderies étatiques pour fournir à nos clans un approvisionnement constant en lames et en plaques d'armure supérieures, garantissant que nous ne dépendons jamais des importations étrangères pour équiper nos armées en pleine expansion."
 ant_the_professional_highland_grenadiers:0 "Les grenadiers professionnels des Highlands"
 ant_the_professional_highland_grenadiers_desc:0 "Nous avons fait évoluer nos éclaireurs traditionnels en unités d'élite de grenadiers de montagne, spécialisées dans l'assaut lourd et le siège. Ces troupes allient leur agilité montagnarde ancestrale à la puissance de feu dévastatrice des explosifs modernes, qui font d'elles la terreur de toute garnison fortifiée."
 anti_piracy_warfare:0 "Convois marchands"
 anti_piracy_warfare_desc:0 "La montée en puissance des boucaniers sans foi ni loi dans le Nouveau Monde et sur les routes maritimes qui mènent à ce territoire a un impact important sur nos marchands et notre commerce. Désormais, nos navires marchands formeront des convois, afin que le vaisseau de guerre qui les accompagne puisse les protéger plus efficacement, et auront à leur bord un petit contingent de militaires pour assurer leur protection en haute mer."
 apothecary_advance:0 "$apothecary$"
 apothecary_advance_desc:0 "$apothecary_desc$"
 appointed_chain_of_command:0 "Chaîne de commandement désignée"
 appointed_chain_of_command_desc:0 "Le fait de confier aux plus talentueux le soin de mener nos hommes au combat, au lieu de laisser cette tâche à des fils de nobles ineptes, mais bien nés, améliore l'efficacité de nos armées et facilite le commandement de plus grandes unités."
 aqueduct_system:0 "Système d'aqueducs"
 aqueduct_system_desc:0 "Grâce à des canaux en pierre soigneusement aménagés et à des conduites fonctionnant par gravité, cet ouvrage assure un approvisionnement régulier en eau douce. Bien que de conception simple, ce système marque la première étape vers une gestion urbaine organisée de l'eau."
 ara_a_maritime_realm:0 "Un royaume maritime"
 ara_a_maritime_realm_desc:0 "Étroitement lié à la vaste étendue marine, notre royaume se concentre sur les activités maritimes. Dans une perspective stratégique, il exploite la puissance navale et le commerce par bateau pour renforcer sa position et étendre son influence. La prépondérance de la mer façonne les politiques, favorisant une culture nautique qui profite à la prospérité de la nation."
 ara_a_mediterranean_trade_power:0 "Une puissance commerciale méditerranéenne"
 ara_a_mediterranean_trade_power_desc:0 "La douce étreinte de la mer Méditerranée caresse nos côtes, invitant notre peuple à s'engager pour des générations dans le négoce. Nos villes marchandes animées et nos comptoirs stratégiques disséminés dans toute la Méditerranée joueront un rôle crucial dans la réalisation de notre ambition : devenir une force commerciale dominante."
 ara_almogavars:0 "$a_almogavars$"
 ara_almogavars_desc:0 "$a_almogavars_desc$"
 ara_catalan_crossbowmen:0 "$a_catalan_crossbowmen$"
 ara_catalan_crossbowmen_desc:0 "$a_catalan_crossbowmen_desc$"
 ara_chartered_merchant_companies:0 "Compagnies commerciales à charte"
 ara_chartered_merchant_companies_desc:0 "Nos commerçants gaspillent leurs ressources en se faisant concurrence entre eux plutôt que de s'opposer aux négociants étrangers. C'est du gaspillage, et nous devrions concentrer tous nos efforts sur le commerce extérieur. Nous allons créer des compagnies qui se verront attribuer des monopoles temporaires sur les exports de certaines régions, et dont le renouvellement dépendra des sommes effectivement perçues par la couronne sur leurs affaires."
 ara_constellation_cities:0 "Constellation de cités"
 ara_constellation_cities_desc:0 "Depuis sa création, notre nation est composée de plusieurs royaumes, réunis sous la férule d'un seul dirigeant. Chaque royaume conserve ses propres traditions et lois. Par conséquent, de nombreuses grandes villes se sont taillé des statures de métropoles régionales, représentant et gouvernant leurs régions respectives."
 ara_desperta_ferro:0 "Desperta Ferro !"
 ara_desperta_ferro_desc:0 "#italic Desperta Ferro !#! (Réveillez le fer !) Tel est le redoutable cri de guerre de la $a_almogavars$ qui invoque la présence du fer au combat. Ses membres l'accompagnent de coups de lances et de fléchettes contre des silex pour créer des étincelles. Parmi d'autres cris de guerre comme #italic Aragó !#! et #italic Sant Jordi !#!, #italic Desperta Ferro !#! se distingue comme le plus renommé, et unique à ces guerriers."
 ara_fleet_ordinances:0 "Ordonnances maritimes"
 ara_fleet_ordinances_desc:0 "Dans la Méditerranée en pleine effervescence, les flottes médiévales se rassemblent, et un système juridique pour traiter les crimes sur terre comme sur mer devient nécessaire tant elles sont fréquentées. #italic Ordinacions sobre lo fet de la mar#! ou #italic Les Ordonnances sur le fait maritime#! se présente comme l'un des premiers codes de justice militaire, conçu pour régir les flottes. Cette réponse unique à l'ère suivant la peste noire est liée au recrutement d'équipages en dehors de la couronne d'Aragon, parfois constitués de criminels. Il faut donc établir un code harmonisé héritier de diverses traditions plutôt qu'une simple formalisation des coutumes navales déjà appliquées."
 ara_gunpowder_souls:0 "Âmes des poudrières"
 ara_gunpowder_souls_desc:0 "La célébration des #italic Fallas#! a agi comme un catalyseur au sein de la Couronne d'Aragon, suscitant des avancées dans les techniques d'artillerie grâce à l'expertise acquise lors des manipulations de poudre pour les feux d'artifice. Cette tradition festive a alimenté un esprit d'innovation qui a permis au royaume de développer de nouvelles stratégies et connaissances en matière d'artillerie."
 ara_late_almogavars:0 "$a_late_almogavars$"
 ara_late_almogavars_desc:0 "$a_late_almogavars_desc$"
 ara_mossos_esquadra:0 "Mossos d'Esquadra"
 ara_mossos_esquadra_desc:0 "Les #italic Escuadras de Paisanos#!, également connues sous le nom de #italic Mossos d'Esquadra#! ou #italic Esquadres de Catalunya#!, constituent une milice locale dédiée à la sûreté des routes commerciales et des foires, qui met à profit sa connaissance intime du terrain. Inspirés par leur succès, nous visons à établir des milices semblables dans nos autres territoires, composées de gens du cru afin de favoriser une coexistence harmonieuse et de garantir la paix dans ces régions."
 ara_protection_of_the_little_folk:0 "Protéger le petit peuple"
 ara_protection_of_the_little_folk_desc:0 "Nos soldats veulent savoir que leurs proches seront protégés au cas où ils tomberaient au combat. Ils seront rassurés de savoir que l'Aragon fera son devoir en mettant sur pied un système d'ateliers réservés aux orphelins."
 ara_remenca:0 "Remença"
 ara_remenca_desc:0 "Le système de la Remença, propre à la Catalogne, ressemble de près à ceux d'autres territoires de la Couronne, ce qui favorise un élan collectif vers l'augmentation de la production de matières premières. Grâce à ce cadre, nos terres connaissent un essor de la création de richesses, qui soutient lui-même la réalisation de progrès substantiels vers l'accomplissement de nos objectifs. En exploitant harmonieusement ces systèmes, nous cultivons un environnement qui récompense nos efforts par une abondance de ressources, favorisant la croissance et la prospérité du royaume."
 ara_stronger_united:0 "L'union fait la force"
 ara_stronger_united_desc:0 "Depuis la fusion du royaume d'Aragon et du comté de Barcelone en 1164, l'Aragon fonctionne comme une confédération, composée de royaumes distincts dirigés par un suzerain central. Ces différences ont favorisé la prospérité et maintenu les identités individuelles, mais ont également donné une impression de désunion. D'où la nécessité de procéder à des réformes administratives pour renforcer notre union tout en respectant les singularités de chaque territoire."
 ara_valencian_golden_age:0 "L'âge d'or de Valence"
 ara_valencian_golden_age_desc:0 "Grâce aux contributions remarquables d'auteurs estimés tels que Joanot Martorell, Ausiàs March et Isabelle de Villena, notre royaume a atteint des sommets littéraires encore inégalés par de nombreuses nations voisines. Leurs œuvres profondes ont élevé notre culture à des hauteurs nouvelles et font la fierté de notre peuple. Notre nation rayonne indéniablement sur le plan artistique, tel un phare brillant de tous ses feux."
 arabia_cradle_of_islam:0 "Berceau de l'Islam"
 arabia_cradle_of_islam_desc:0 "Notre territoire abrite certains des lieux les plus sacrés de notre foi. Ce qui permet à nos concitoyens de se rapprocher de leur foi et d'inspirer de nombreuses actions d'envergure."
 arabia_felix:0 "Arabia Felix"
 arabia_felix_desc:0 "Depuis l'Antiquité, le Yémen est célébré sous le nom d'Arabia Felix, l'Arabie heureuse, terre bénie entre toutes. Doté d'un climat tempéré en altitude et de sols fertiles au cœur des déserts, il demeure l'une des régions les plus prospères de la péninsule. Cultivons cette richesse et faisons-en le socle d'un royaume florissant."
 arabia_red_sea_trade:0 "Commerce en mer Rouge"
 arabia_red_sea_trade_desc:0 "De nombreux comptoirs commerciaux jalonnent nos côtes, qui accueillent des marchandises précieuses, locales et étrangères. Il est temps de revendiquer notre juste part de cette richesse en transit."
 arabian_desert_warfare:0 "Force du désert"
 arabian_desert_warfare_desc:0 "Ces paysages inhospitaliers du désert d'Arabie ont rendu nos guerriers plus forts, et ils sont capables d'épuiser l'ennemi avant même de se lever pour lui porter le coup de grâce."
 arabian_horsemanship:0 "Cavaliers arabes"
 arabian_horsemanship_desc:0 "Les chevaux élevés sur nos terres sont recherchés dans le monde entier pour leur beauté et leur force. En nous spécialisant dans leur élevage et leur exportation, nous tirerons grand profit de leur renommée."
 arduous_terrain:0 "Terrain ardu"
 arduous_terrain_desc:0 "L'$asia$ comporte des territoires extrêmement inhospitaliers, des hauts sommets de l'Himalaya aux étendues arides du désert de Gobi en passant par les jungles denses de l'$india$ et de l'$south_east_asia$. Et c'est sans parler des saisons des moussons et des typhons, ni des séismes presque incessants. Si la population a appris à vivre dans cet environnement hostile, les envahisseurs auront quant à eux bien plus de mal à l'apprivoiser."
 arg_argive_maritime_insurance_advance:0 "Assurance maritime argienne"
 arg_argive_maritime_insurance_advance_desc:0 "Tirant parti de notre position de refuge, les maisons de commerce de Nauplie ont mis au point un système sophistiqué d'assurance maritime et de partage des risques pour le commerce égéen. En garantissant la sécurité des cargaisons latines contre la piraterie et les tempêtes, nous avons fait de notre port le sanctuaire pécuniaire du Péloponnèse. Cette forme primitive de capitalisme financier détourne les capitaux des grandes républiques italiennes et les fait converger vers nos propres banques locales."
 arg_the_artillery_school_of_argos_advance:0 "L'école d'artillerie d'Argos"
 arg_the_artillery_school_of_argos_advance_desc:0 "Conscients que les canons offriront un tournant décisif à la guerre, nous avons transformé nos forts situés en altitude en laboratoires de balistique et d'artillerie. Nos officiers sont formés pour calculer les angles de tir depuis des hauteurs extrêmes, ce qui permet à nos batteries de frapper les navires ennemis avec une précision redoutable. #italic L'école d'artillerie d'Argos#! impose le respect dans toute l'Europe pour sa précision mathématique et son innovation en termes de tactique."
 arg_the_curia_of_the_two_benches_advance:0 "La Curie des deux bancs"
 arg_the_curia_of_the_two_benches_advance_desc:0 "Dans un geste audacieux visant à assurer la stabilité sociale, la seigneurie a réformé la haute cour de Nauplie pour en faire la Curie des deux bancs. Cet organe judiciaire exige que toutes les affaires civiles concernant des terres ou des héritages soient entendues par un panel composé d'un juge franc et d'un Demogeron (ancien) grec. En institutionnalisant cette « justice partagée », nous avons mis fin de manière efficace aux tensions juridiques séculaires entre les populations latine et orthodoxe. Ce modèle de gouvernance a créé une « identité argienne » unique, farouchement loyale à la seigneurie, qui protège l'État des ferveurs révolutionnaires balayant le reste de l'Europe."
 arg_the_gibraltar_of_the_levant_advance:0 "Le Gibraltar du Levant"
 arg_the_gibraltar_of_the_levant_advance_desc:0 "Surplombant le golfe d'Argos, la forteresse Palamède a été agrandie pour former un système complexe de sept forts interconnectés qui dominent l'Argolide. En contrôlant ce « Gibraltar », nous influençons les mouvements de toute flotte tentant d'approvisionner une armée en Morée, rendant ainsi notre seigneurie imprenable par voie terrestre ou maritime. Cette domination stratégique nous permet de jouer le rôle de faiseur de rois entre nos voisins."
 arg_the_heraldry_of_the_brienne_advance:0 "Les armoiries de la maison de Brienne"
 arg_the_heraldry_of_the_brienne_advance_desc:0 "Alors que la maison de Brienne revendique Jérusalem et Chypre, Argos est devenue un centre de « généalogie de la chevalerie ». Des chevaliers venus de tout l'Occident s'y rendent pour prouver leur lignée ou obtenir des titres dans la « frange des croisés ». Cet afflux continu d'aventuriers bien nés est un excellent moyen de profiter d'un vivier constamment renouvelé d'officiers talentueux pour nos levées locales."
 arg_the_peloponnesian_diplomatic_hub_advance:0 "Le pôle diplomatique du Péloponnèse"
 arg_the_peloponnesian_diplomatic_hub_advance_desc:0 "Considéré comme le port le plus neutre et le plus sûr du Péloponnèse, Argos est devenu le lieu de rencontre privilégié des ambassadeurs des États latins. Nous y avons établi un « quartier diplomatique » permanent où sont négociés les traités et forgées les alliances entre les seigneurs francs et les grandes puissances. Ce rôle de médiateur régional nous confère une influence internationale qui nous protège de l'annexion par nos voisins plus puissants."
 aristocracy:0 "Aristocratie"
 aristocracy_desc:0 "L'aristocratie est un élément fondamental de toute monarchie, car un groupe de nobles autour de la dynastie royale est précisément la raison d'être du monarque. Au bout du compte, il ne peut y avoir de sang royal sans le concept de sang noble. En tant que telle, l'aristocratie apporte son soutien au monarque, mais elle s'attendra toujours à bénéficier de certains privilèges, car elle ne doit jamais être confondue avec le peuple."
 arm_apostolic_church:0 "Église apostolique $ARM_ADJ$ne"
 arm_apostolic_church_desc:0 "L'$ARM$ a été la première nation à établir le christianisme comme religion d'État en 301. Nos traditions religieuses et celle de notre clergé sont à la source de notre identité."
 arm_border_nation:0 "Nation frontalière"
 arm_border_nation_desc:0 "Depuis la plus haute antiquité, l'$ARM$ est le champ de bataille des grandes nations, au point que même si nous avons retrouvé notre indépendance, il est souvent difficile de conserver la moindre neutralité dans leurs querelles. Malgré tout, s'il est difficile de contenter tout le monde, nous pouvons y parvenir."
 arm_greater_armenia:0 "La grande $ARM$"
 arm_greater_armenia_desc:0 "Notre pays a une grande et longue histoire, et les royaumes $ARM_ADJ$s du passé ainsi que notre peuple $armenian_culture$ ont réussi à s'étendre sur un vaste territoire. En nous inspirant de leur exemple, nous deviendrons un phare pour tous les peuples $armenian_culture$s, qui se rassembleront volontiers sous notre bannière."
 arm_highland_fortresses:0 "Forteresses des hautes terres"
 arm_highland_fortresses_desc:0 "Nos montagnes nous ont beaucoup appris sur la résistance et l'endurance. Nos forteresses sont un exemple de cette résistance, construites pour résister aussi bien aux conditions difficiles de l'endroit où elles sont situées qu'aux envahisseurs étrangers ayant l'audace de pénétrer sur notre territoire."
 arm_land_reclamation:0 "Récupération des terres"
 arm_land_reclamation_desc:0 "L'$ARM$ a été ravagée par des siècles de conflits, dépecée par ses voisins. En reprenant possession des terres longtemps perdues, en permettant à notre peuple d'y vivre et en rebâtissant les églises et forteresses en ruine, nous pourrons nous assurer d'un meilleur contrôle sur le pays et d'un sort meilleur pour les nôtres."
 arm_legacy_of_hayk:0 "Héritage de Haïk"
 arm_legacy_of_hayk_desc:0 "Haïk, descendant de Noé, est devenu le patriarche de notre nation lorsqu'il a fondé notre royaume au pied du mont Ararat après sa victoire contre les Babyloniens. Notre peuple connaît cette histoire et tire fierté d'appartenir à une lignée aussi ancienne."
 arm_melikdom_organization:0 "Mélikats"
 arm_melikdom_organization_desc:0 "Comptant parmi les rares bastions d'une $ARM$ encore indépendante, les territoires de ces souverains féodaux appelés les méliks ont préservé notre identité, tandis que les nakharars disparaissaient. La relation entre les méliks et leurs subordonnés se rapprochait davantage de celle entre un général et ses officiers, non de celle d'un seigneur avec ses serfs."
 arm_mount_ararat:0 "Mont Ararat"
 arm_mount_ararat_desc:0 "C'est sur le mont Ararat, où l'arche de Noé s'est posée après le grand déluge, que notre nation s'est formée pour la première fois. Ainsi, notre peuple est plus que disposé à résister lorsque le caractère sacré de nos terres est menacé."
 arm_mountain_armies:0 "Armées de montagnards"
 arm_mountain_armies_desc:0 "Le territoire $ARM_ADJ$ est montagneux par nature. Notre peuple a appris à y vivre au cours des siècles, et nous avons mis en valeur ces montagnes à notre avantage. Nos armées se rassembleront donc sous nos bannières, depuis toutes les régions de notre territoire."
 arm_nakharar_titles:0 "Titres nakharars"
 arm_nakharar_titles_desc:0 "Le système des titres nakharars a été utilisé en $ARM$ depuis pratiquement sa création sans interruption jusqu'aux invasions mongoles, lorsque tout le système s'est effondré. Bien que les titres eux-mêmes ne soient plus utilisés, certaines caractéristiques de ce système persistent aujourd'hui et améliorent les compétences de notre noblesse et de nos armées."
 armories_of_smolensk:0 "Armureries de Smolensk"
 armories_of_smolensk_desc:0 "Après des décennies de guerre sur toutes nos frontières, nous avons appris à combattre avec les armes de l'Est comme de l'Ouest. En associant l'endurance moscovite à la précision occidentale, nos arsenaux produisent désormais une artillerie d'élite et des tactiques inégalées par nos adversaires. De nos forges naît la puissance de feu, et de la puissance de feu naît la domination et la persévérance."
 armory_advance:0 "Armurerie"
 armory_advance_desc:0 "$armory_desc$"
 army_country_casus_belli_advance:0 "Prétextes"
 army_country_casus_belli_advance_desc:0 "La capacité de nos diplomates et espions professionnels à imaginer des scénarios mensongers, mais crédibles, nous permet d'inventer de faux prétextes pouvant justifier presque n'importe quel agissement sur la scène internationale."
 army_country_diplo_range_advance:0 "Émissaires armés"
 army_country_diplo_range_advance_desc:0 "Notre armée est crainte de tous. Malgré notre réputation, nous devrions établir des relations diplomatiques avec d'autres nations partageant notre philosophie : anéantir nos ennemis communs. En envoyant des émissaires armés et sous bonne escorte à l'étranger, nous pouvons nous assurer que notre représentation diplomatique ne fera pas l'objet de violences."
 army_country_integration_speed_advance:0 "Respect du gouvernement local"
 army_country_integration_speed_advance_desc:0 "Notre nation comprend de redoutables seigneurs de guerre qui souhaitent répandre leur héritage dans le monde entier. Afin de faciliter l'intégration et l'administration de notre domaine toujours plus vaste, nous avons décidé de respecter les us et coutumes du peuple dans les zones conquises."
 army_country_looting_advance:0 "Pillards fiers"
 army_country_looting_advance_desc:0 "Les raids et pillages sont pour ainsi dire la fondation logistique de notre armée. Nos troupes pillent autant qu'elles le peuvent partout où elles vont."
 army_country_movement_speed_advance:0 "Groupes de reconnaissance"
 army_country_movement_speed_advance_desc:0 "En faisant appel à des éclaireurs montés, nous pouvons appréhender le terrain à l'avance et planifier les manœuvres de nos armées en conséquence. Un avantage qui nous permet d'avancer bien plus rapidement que les autres armées."
 army_doctrine_law_advance:0 "$army_doctrine_law$"
 army_doctrine_law_advance_desc:0 "$army_doctrine_law_desc$"
 army_initiative_ren:0 "Première frappe"
 army_initiative_ren_desc:0 "L'élément de surprise, combiné à la première frappe, déterminera parfois le vainqueur d'un conflit. Garantir notre initiative militaire est un excellent moyen de conserver un avantage décisif."
 army_movement_speed_absolutism:0 "Chargeurs"
 army_movement_speed_absolutism_desc:0 "Bien que les chargeurs ne soient pas une découverte, le développement sans précédent des armées modernes a popularisé leur usage. L'apport régulier de munitions qu'ils fournissent facilite le mouvement des troupes tout en étendant leur portée opérationnelle."
 army_movement_speed_revolutions:0 "Contrats de ravitaillement"
 army_movement_speed_revolutions_desc:0 "Plutôt que de recourir au pillage, proposer des prix équitables pour la nourriture et le matériel nécessaires à notre armée permet d'accélérer les mouvements des troupes, les paysans venant apporter eux-mêmes leurs marchandises aux points de collecte établis."
 army_professionalism:0 "Professionnalisme de l'armée"
 army_professionalism_desc:0 "Depuis l'invasion de la Grèce par les Perses, on sait qu'une petite armée plus disciplinée et mieux entraînée peut en vaincre une bien plus grande. Si nous voulons vaincre, nous devons donc améliorer notre armée avec ces idées en tête."
 art_school_advance:0 "Écoles d'art"
 art_school_advance_desc:0 "Nous devons concrétiser notre soutien à la réalisation artistique et à la finesse de nos artistes par la construction d'écoles d'art. Un forum où les individus de talent pourront lancer leur carrière et nous couvrir de gloire !"
 arte_della_lana:0 "Arte della Lana"
 arte_della_lana_desc:0 "La production d'étoffes de qualité soutenue par une forte main-d'œuvre est l'une des industries les plus influentes de Florence. Au cours des siècles, bien des marchands et personnes influentes ont fait fortune grâce à elle."
 artillery_institution_advance:0 "Artillerie de siège"
 artillery_institution_advance_desc:0 "L'invention de la poudre à canon dans la Chine des Song a conduit à la mise au point d'un nouveau dispositif qui utiliserait sa puissance de feu en combat : l'artillerie. Son utilisation représente désormais une menace pour les châteaux et les fortifications en pierre."
 artillery_vs_fort_age_5_absolutism:0 "Canons de siège"
 artillery_vs_fort_age_5_absolutism_desc:0 "La poudre à canon permet de créer de nombreux types d'armes différents. Traverser des lignes d'infanterie ne requiert pas la même puissance que briser les murs d'un château, c'est pourquoi un type de canon spécialisé doit être déployé lors des sièges."
 artillery_vs_fort_age_6_revolutions:0 "Obusiers avancés"
 artillery_vs_fort_age_6_revolutions_desc:0 "Le besoin d'une meilleure arme à positionner entre le feu direct des canons de siège et les tirs indirects en cloche des mortiers a conduit notre armée à développer de nouveaux obusiers."
 artisan_migration:0 "Déportation des artisans"
 artisan_migration_desc:0 "Il est inconvenant que les territoires conquis disposent d'artisans plus habiles et de sages plus nombreux que notre capitale. Les mains et les esprits les plus brillants du pays doivent être amenés à la capitale pour nous servir de façon directe."
 artists_advance_absolutism:0 "Courants artistiques"
 artists_advance_absolutism_desc:0 "L'Art s'exprime de multiples façons, mais les progrès récents lui ont permis de se muer encore davantage en une myriade de manifestations."
 artists_advance_discovery:0 "Impressions artistiques"
 artists_advance_discovery_desc:0 "L'usage répandu de la presse d'imprimerie ouvrira de nouvelles opportunités à notre peuple, qui pourra faire valoir son talent artistique plus rapidement que jamais et à plus grande envergure."
 artists_advance_reformations:0 "Développement de l'art profane"
 artists_advance_reformations_desc:0 "Alors que de nouvelles branches artistiques se développent au lendemain de la Réforme, le peuple peut désormais plus facilement se distinguer professionnellement et trouver du travail à la cour."
 artists_advance_revolutions:0 "Art des Lumières"
 artists_advance_revolutions_desc:0 "La montée en puissance des Lumières fait fleurir l'art dans toutes ses branches et à tous les niveaux de la société. Les nouvelles œuvres musicales et littéraires produites suscitent un large intérêt pour ces arts."
 arts_academy_advance:0 "$arts_academy$"
 arts_academy_advance_desc:0 "L'art est le souffle de vie de l'humanité et ce qui permet au monde de passer d'une existence fade à une toile vivante, remplie de merveilles et de possibilités. Nous devons encourager davantage l'intérêt artistique chez nos concitoyens."
 asa_control_of_buddhist_sects:0 "Contrôle des sectes bouddhistes"
 asa_control_of_buddhist_sects_desc:0 "Echizen abrite de nombreux temples relevant de sectes différentes, tel que l'Eihei-ji de l'école Sōtō ou l'Heisen-ji de l'école Tendai. Si nous pouvions les contrôler tous et établir une paix confessionnelle dans la province, nous serions en mesure d'établir une politique religieuse idéale pour tout notre domaine."
 asa_legacy_of_emperor_keitai:0 "Héritage de l'empereur Keitai"
 asa_legacy_of_emperor_keitai_desc:0 "Il y a de cela des siècles, c'est de la province d'Echizen que l'empereur Keitai a mené la guerre pour s'emparer du trône impérial. Tout comme lui, nous ne devons pas nous montrer hésitants à projeter nos forces loin au-delà de nos frontières en lançant des invasions dans les territoires voisins lorsque la situation l'exige."
 ascetic_practices:0 "Pratiques ascétiques"
 ascetic_practices_desc:0 "Le Bouddha a beau nous avoir mis en garde contre les dangers d'un ascétisme démesuré, certains membres de la communauté monastique continuent de suivre des pratiques ascétiques. Ils s'imposent notamment des restrictions au niveau de la tenue qu'ils portent, de la nourriture qu'ils consomment ou du lieu où ils résident, et bien que ces méthodes ne constituent aucunement une exigence vis-à-vis de l'accumulation de mérite, elles présentent néanmoins des avantages pour ceux qui les adoptent."
 ask_bugyoshu_and_hokushu:0 "Bugyō-shū et Hōkō-shū"
 ask_bugyoshu_and_hokushu_desc:0 "Nous devons renforcer la position des fonctionnaires de notre administration, tels que les magistrats bugyō-shū et les commandants hōkō-shū. Une bureaucratie forte sera parfois la seule chose qui pourra prévenir une véritable guerre civile."
 ask_defender_of_the_imperial_court:0 "Défenseurs de la cour impériale"
 ask_defender_of_the_imperial_court_desc:0 "Lorsque le shogunat de Kamakura est tombé, nous avons maintenu l'empereur et la cour impériale sous notre protection. Cela a assuré notre position au-dessus de tous les clans du Japon en tant que véritables protecteurs de l'empire et de la tradition de cour."
 ask_higashiyama_culture:0 "Culture d'Higashiyama"
 ask_higashiyama_culture_desc:0 "Fondée sur l'ascèse du bouddhisme zen, la culture d'Higashiyama voit la beauté dans la simplicité. Elle encourage le développement de la cérémonie du thé, des arrangements floraux, du théâtre et des arts. Cette culture florissante apporte un grand prestige à ses adeptes et améliore grandement notre image."
 ask_shugo_system:0 "Système des shugo"
 ask_shugo_system_desc:0 "Les shugo sont des vassaux très importants pour le shogunat, chargés d'administrer les terres au nom du $JAPANESE_SHOGUNATE_LEADER_MALE$. Grâce à eux, nous sommes en mesure de gouverner plus efficacement nos territoires."
 assault_ability_reformation:0 "Assauts militaires réformés"
 assault_ability_reformation_desc:0 "En déléguant la responsabilité des assauts militaires à nos troupes les plus vaillantes et disciplinées, nous abattrons jusqu'aux plus robustes fortifications abritant nos ennemis."
 assault_ability_revolutions:0 "Marche sous le feu"
 assault_ability_revolutions_desc:0 "Nos armées bravent délibérément le feu des canons ennemis, se frayant un chemin à travers la poussière afin de capturer les forts adverses. Malgré les nombreuses avancées en matière d'artillerie et de fortification, notre capacité à percer les murs de l'ennemi reste inégalée."
 assistance_to_the_suffering:0 "Aide à ceux qui souffrent"
 assistance_to_the_suffering_desc:0 "L'Ordre tient son nom de sa vocation première qui consistait à protéger un hôpital de pèlerins à Jérusalem. Bien que Jérusalem soit passée aux mains des Sarrasins, nous continuons d'aider ceux qui en ont besoin, y compris nos courageux chevaliers qui retournent plus rapidement sur le champ de bataille que la plupart des armées."
 association_with_unbelievers:0 "Association avec les infidèles"
 association_with_unbelievers_desc:0 "Certains pensent que nous devrions rompre tout lien avec les infidèles. Nous faisons tout pour étouffer de telles suggestions, car ce n'est qu'en entretenant des contacts que nous pourrons commercer avec eux."
 astika_schools:0 "Écoles āstika"
 astika_schools_desc:0 "Appelées écoles orthodoxes de l'$hindu$, ces groupes acceptent l'autorité des $vedah$ et l'existence de l'$atman$. Et bien qu'il en existe une multitude, cette notion d'acceptation partagée confère aux $astika_schools$ de nombreux points communs."
 ath_the_athenian_bureaucracy_advance:0 "La bureaucratie athénienne"
 ath_the_athenian_bureaucracy_advance_desc:0 "À mesure que notre État évolue vers un régime absolu, nos dirigeants ont remplacé les seigneurs féodaux indisciplinés par une fonction publique méritocratique issue de la bourgeoisie urbaine. Cette administration centralisée garantit que les impôts sont perçus efficacement et que les lois du dirigeant sont appliquées uniformément de Marathon à Mégare. En brisant le pouvoir des anciennes familles baronniales, notre nation est devenue un État moderne et rationalisé, capable de se mobiliser rapidement."
 ath_the_attican_gunpowder_mills_advance:0 "Les poudreries d'Attique"
 ath_the_attican_gunpowder_mills_advance_desc:0 "Notre artillerie est désormais la plus performante au monde. Elle bénéficie en effet des secrets métallurgiques des maîtres forgerons de renommée mondiale et des innovations chimiques de nos alchimistes locaux. Le « Tonnerre d'Athènes » résonne à travers les Balkans, nos canons étant réputés pour leur portée et leur fiabilité."
 ath_the_catalan_company_advance:0 "La Compagnie catalane"
 ath_the_catalan_company_advance_desc:0 "Engagée puis trahie par l'empereur byzantin, la féroce Grande Compagnie catalane se retourna contre ses anciens commanditaires et, en 1311, anéantit le duc franc Gautier V de Brienne lors de la bataille de Céphise, prenant le contrôle du duché d'Athènes et instaurant une période de domination catalane. Ces Almogavres aguerris ont instauré une éthique mercenaire plus impitoyable dans les affaires grecques, fortifiant des bastions stratégiques, extorquant des tributs aux campagnes et maintenant leur emprise grâce à la terreur et à des tactiques d'infanterie disciplinées, jusqu'à ce que des conflits internes et l'intervention aragonaise ne ramènent finalement le pouvoir vers un régime féodal plus conventionnel."
 ath_the_parthenon_dukes_advance:0 "Les ducs du Parthénon"
 ath_the_parthenon_dukes_advance_desc:0 "Otto de la Roche, premier duc d'Athènes, érigea sa cour au milieu des ruines de l'Acropole. Il transforma l'ancien Parthénon en une cathédrale catholique dédiée à Notre Dame et régna sur un duché qui s'étendait de l'Attique à la Béotie. Sous le règne de ses successeurs, le duché devint de manière inattendue un centre d'échanges culturels où les chevaliers francs fréquentaient les scribes grecs, les marchands italiens faisaient du commerce au Pirée et les lettrés débattaient de philosophie à la vue des temples de marbre. Tout cela donna naissance à une société aristocratique originale qui valorisait à la fois les vertus martiales de la chevalerie et l'estime du passé hellénique, si longtemps ignoré par les conquérants occidentaux. Nous devons redonner à cette cour sa gloire passée."
 ath_the_piraeus_arsenal_advance:0 "L'arsenal du Pirée"
 ath_the_piraeus_arsenal_advance_desc:0 "Inspirés de l'Arsenal vénitien, nos nouveaux chantiers navals du Pirée peuvent produire une galère de guerre entièrement équipée en quelques semaines grâce à des techniques modernes de chaîne de montage. Cette industrialisation de la guerre navale permet au petit duché de jouer dans la cour des grands, en maintenant une flotte professionnelle qui domine le golfe Saronique. Le Pirée n'est plus une ruine, mais la base navale la plus moderne de la Méditerranée orientale."
 ath_thebes_textiles_advance:0 "Étoffes de Thèbes"
 ath_thebes_textiles_advance_desc:0 "Les ateliers de Thèbes, déjà réputés à l'époque byzantine pour leur activité de tissage de la soie, ont connu un nouvel essor sous la domination franque. En effet, les ducs d'Athènes ont encouragé les marchands italiens à investir dans des métiers à tisser, des teintureries et des réseaux d'exportation qui acheminent les samits et velours thébains vers les marchés de Bruges à Alexandrie. Cette renaissance de la production textile de luxe, combinée aux plaines fertiles de Béotie fournissant les matières premières, génère une richesse considérable qui permet de financer la construction de châteaux, les suites chevaleresques et le mode de vie somptueux de la cour athénienne. Ainsi, le duché reste l'un des territoires les plus fortunés et les plus sophistiqués sur le plan économique de toute la francocratie."
 atlantic_trade_routes:0 "Routes commerciales atlantiques"
 atlantic_trade_routes_desc:0 "Ces nouvelles routes maritimes, empruntées avec soin par les Européens d'aujourd'hui, ont ouvert les portes aux marchandises et à l'argent en provenance d'Extrême-Orient."
 atman:0 "Ātman"
 atman_desc:0 "Désignant le véritable Soi, à la fois éternel et immuable, l'$atman$ est l'essence même de chaque individu. D'après les écoles $astika$, ce concept est distinct du corps et de l'esprit, ainsi que du jīvātman qui migre d'une existence à l'autre. Les écoles $nastika$, quant à elles, l'interprètent différemment ou bien le rejettent entièrement."
 attract_foreign_pirates:0 "Appel aux pirates étrangers"
 attract_foreign_pirates_desc:0 "Nos ports ont toujours été un refuge pour ceux qui cherchent fortune sur les mers. En accueillant ces marins expérimentés, quelles que soient leur foi et leurs origines, nous renforçons nos flottes corsaires et notre puissance maritime."
 audit_checks:0 "Inspections"
 audit_checks_desc:0 "Alors que nous cherchons à infiltrer d'autres pays, nous devons surveiller ces idées pernicieuses qui menacent de se répandre à la cour. Réunir un groupe d'inspecteurs pour nous assurer que les membres du gouvernement agissent dans l'intérêt de l'État nous aidera à débusquer les éléments dangereux."
 auftragstaktik:0 "Auftragstaktik"
 auftragstaktik_desc:0 "L'Auftragstaktik, ou #italic tactique de mission#!, est un système par lequel les commandants subordonnés reçoivent suffisamment d'informations sur les objectifs de la bataille ou de la guerre par leurs commandants, et sont autorisés à agir de leur propre chef. Ce système permet à nos bataillons de développer une relation plus étroite avec leurs dirigeants, avec de meilleurs résultats à la clé."
 austrian_ambition:0 "Les Lumières par l'éducation"
 austrian_ambition_desc:0 "Nos gouvernants doivent recevoir la meilleure éducation possible pour être à la hauteur de l'idéal de notre monarque éclairé."
 austrian_court:0 "Cour d'Autriche"
 austrian_court_desc:0 "Le maintien de nos relations diplomatiques exige du temps et des efforts, et le fait d'engager trop de personnes dans des missions diplomatiques pourrait nuire à notre efficacité et à notre réputation. En rationalisant notre cour, nous pouvons nous assurer que nous obtenons les informations dont nous avons besoin pour aplanir les difficultés lorsqu'elles surviennent."
 austrian_grenzer:0 "$a_austrian_grenzer$"
 austrian_grenzer_desc:0 "$a_pandur_desc$"
 austrian_grenzhussar:0 "$a_austrian_grenzhussar$"
 austrian_grenzhussar_desc:0 "$a_austrian_grenzhussar_desc$"
 austrian_heritage:0 "L'héritage de Rodolphe Ier"
 austrian_heritage_desc:0 "La victoire de Rodolphe Ier sur ses rivaux a assuré notre place parmi les grandes maisons de l'empire et est le sujet de nombreux récits et chansons. La ferveur dont ses chevaliers et lui ont fait preuve lors de la bataille du Marchfeld inspirera nos armées pour les siècles à venir."
 austrian_marriage_policy:0 "Tu Felix Austria Nube"
 austrian_marriage_policy_desc:0 "Que les autres fassent la guerre ; vous, heureuse Autriche, mariez-vous ! Car ce qu'à l'autre Mars accorde, la déesse Vénus vous le donne."
 austrian_military_flexibility:0 "Tactiques des lansquenets"
 austrian_military_flexibility_desc:0 "Seule une tactique bien rodée de frappes d'artillerie, de charges de cavalerie et d'infanterie inflexible recrutée parmi les lansquenets peut nous mener à la victoire."
 austrian_state_industrialization:0 "Industrialisation d'État"
 austrian_state_industrialization_desc:0 "La modernisation de notre industrie doit toujours être au premier plan des préoccupations de notre pays. Ce n'est qu'avec des usines modernes que nous pourrons rivaliser avec nos concurrents sur la scène mondiale."
 austrian_tradition:0 "Une maison de gloire"
 austrian_tradition_desc:0 "Notre accession au pouvoir a suscité beaucoup de jalousie et les maisons rivales de l'empire se disputent notre statut de protecteurs de la frontière sud-est. En dépit de ces circonstances, nous sommes fiers de nos actions diplomatiques sans pareil."
 autonomous_pashas:0 "Pachas autonomes"
 autonomous_pashas_desc:0 "Pour tout gouvernement, la tâche la plus ardue consiste à trancher entre besoins locaux et intérêts du pays. La lenteur des moyens de communication fait que même une directive simple peut mettre du temps à atteindre des provinces qui, tout compte fait, ne sont pas si éloignées ; aussi est-ce une bonne chose que les gouverneurs locaux disposent de plus d'autonomie, garantissant ainsi que les intérêts locaux sont pris en compte."
 avalokitesvara:0 "Avalokiteśvara"
 avalokitesvara_desc:0 "Également connu sous le nom de Guānyīn ou de Kannon, $avalokitesvara$ est l'un des Bodhisattvas les plus vénérés. Représenté comme un homme ou une femme selon l'école du bouddhisme, et même comme l'être à l'origine de toutes les divinités $hindu_ADJ$es par certains, $avalokitesvara$ est le $bodhisattva$ de la compassion, et une figure associée au mantra #italic Om maṇi padmé hoûm#!."
 ayans:0 "Âyan"
 ayans_desc:0 "Les $ayans$ (ou « notables ») sont des magnats provinciaux d'origines diverses qui jouissent d'une autonomie territoriale importante, tout en constituant une source de revenus agricoles fiscaux et une force militaire pour l'État."
 ayu_ayutthaya_literature:0 "Littérature $AYU_ADJ$"
 ayu_ayutthaya_literature_desc:0 "La littérature produite dans notre pays est riche, depuis les poèmes épiques de #italic Lilit#! racontant des guerres célèbres, jusqu'à la poésie #italic Nirat#! narrant voyages et amours perdues, en passant par les légendes folkloriques de héros locaux et les panégyriques des exploits de nos plus grands souverains."
 ayu_cosmopolitan_trade:0 "Commerce cosmopolite"
 ayu_cosmopolitan_trade_desc:0 "Notre pays accueille de nombreux étrangers venus tirer profit des richesses de notre territoire. Le fait est que nous pouvons également tirer grand profit de toutes ces personnes et ces marchandises qui circulent à travers nos frontières."
 ayu_floating_rice:0 "Riz flottant"
 ayu_floating_rice_desc:0 "La culture du riz se pratique dans notre pays depuis des siècles, mais les risques d'inondation ont toujours été un problème. Cette nouvelle variété de riz, habituée à pousser dans l'eau, assurera la stabilité de notre approvisionnement alimentaire, même lorsque les rivières sont en crue."
 ayu_phrai_luang:0 "Phrai Luang"
 ayu_phrai_luang_desc:0 "Tous les hommes libres soumis au service phrai servent à la guerre (#italic $ayu_phrai_thaan$#!), mais aussi dans les travaux publics, à la discrétion des gouverneurs locaux."
 ayu_phrai_thaan:0 "Phrai Thaan"
 ayu_phrai_thaan_desc:0 "Tous les hommes âgés de 18 ans doivent être enregistrés et leurs informations transmises à l'administration. Tous les citoyens de sexe masculin peuvent être enrôlés et servir dans l'armée en cas de guerre, et nous nous assurerons qu'ils le fassent si nécessaire."
 ayu_prestigious_cavalry:0 "Cavalerie prestigieuse"
 ayu_prestigious_cavalry_desc:0 "Qu'elle soit à cheval ou à dos d'éléphant, notre cavalerie est une fière unité, généralement issue des familles les plus nobles. L'efficacité de son soutien à notre infanterie est incontestable."
 ayu_sakdina:0 "Sakdina"
 ayu_sakdina_desc:0 "Notre société est organisée selon le strict système du $ayu_sakdina$. Chacun connaît sa place dans la société ainsi que la quantité de richesses et de biens qu'il a le droit de posséder. Ainsi, nous avons une meilleure capacité à soutirer l'impôt."
 ayu_white_elephant:0 "Éléphant blanc"
 ayu_white_elephant_desc:0 "L'éléphant blanc est le symbole du pouvoir de notre souverain, un présage très favorable que nous utiliserons à notre avantage. Lorsque notre souverain montera sur l'éléphant blanc, personne ne pourra remettre en question la légitimité de notre pouvoir."
 azeb_irregulars:0 "Les Azabs"
 azeb_irregulars_desc:0 "Jeunes célibataires issus des couches les plus pauvres de la société, les Azabs seront non seulement des soldats et des marins, mais aussi des bâtisseurs, des sapeurs et des armuriers. Grâce à un système de garnisons fortifiées, nous veillerons à ce qu'ils soient toujours payés."
 aztec_chargers:0 "Charges $AZT_ADJ$s"
 aztec_chargers_desc:0 "L'hostilité de nos guerriers est connue au-delà de nos frontières. Lorsqu'une bataille commence, nos ennemis tremblent de peur à la vue de nos combattants en pleine charge frénétique, comme si les hérauts de la mort les ciblaient directement."
 baghlah_advance:0 "$n_baghlah$"
 baghlah_advance_desc:0 "$n_baghlah_desc$"
 bah_amir_rebellion:0 "Révolte de l'émir"
 bah_amir_rebellion_desc:0 "Notre État est né de la rébellion de l'émir contre le régime pathétique de $DLH$. La victoire contre le sultanat $DLH_ADJ$ vit encore aujourd'hui dans l'esprit de notre propre noblesse et de nos militaires."
 bah_arabian_horses:0 "Chevaux arabes"
 bah_arabian_horses_desc:0 "Le climat de l'$india$ est, au mieux, sous-optimal pour la reproduction et l'élevage des chevaux. Les pur-sang de la péninsule arabique sont cependant de superbes montures qui surpassent les chevaux locaux. Nous allons utiliser nos relations commerciales pour assurer un approvisionnement régulier de ces chevaux pour nos troupes."
 bah_bahmani_primogeniture:0 "Primogéniture bahmanide"
 bah_bahmani_primogeniture_desc:0 "Notre pratique inhabituelle consistant à toujours transmettre le trône au fils aîné du dirigeant actuel a parfois créé une certaine instabilité dans notre royaume, car des régents avides de pouvoir et des nobles opportunistes n'hésitaient pas à essayer de tirer profit d'un enfant souverain ou à soutenir les prétentions au trône d'un parent envieux. Aujourd'hui, cependant, cette pratique est fermement institutionnalisée et, lorsque le moment de la succession arrive, rares sont ceux qui s'opposeraient au véritable héritier de notre dynastie."
 bah_gharbians:0 "Gharbiens"
 bah_gharbians_desc:0 "En coupant les liens avec $DLH$ pour fonder notre propre royaume il y a près de cent ans, nous avons relâché nos liens avec les régions du nord de l'$india$ dominées par les $muslim_ADJ$s. Comme notre État est dépourvu de toute forme d'aristocratie $muslim_ADJ$e enracinée, nous sommes dans une situation précaire, et nous pourrions nous retrouver entièrement à la merci des nobles $hindu_ADJ$s locaux.\\nFort heureusement, notre réputation nous précède. Les histoires sur les richesses du Deccan sont racontées et répétées dans le monde $muslim_ADJ$ et de nombreux bâtisseurs de fortune ambitieux cherchent à faire le voyage en mer jusqu'à nos ports. En utilisant les vastes richesses de l'$india$ pour attirer à notre cour des Occidentaux talentueux, les Gharbiens, nous pouvons nous assurer que notre pays ne manquera jamais d'hommes capables de diriger nos armées, de collecter nos impôts et de gouverner nos sujets."
 bah_karimis:0 "Karimi"
 bah_karimis_desc:0 "Pendant des siècles, le commerce indo-égyptien a été assuré par des groupes de commerçants et de capitaines basés en Égypte, connus sous le nom de $bah_karimis$. Instrument du commerce de l'$indian_ocean_region$, cette organisation marchande est aujourd'hui à la fois riche et puissante. Des côtes $tamil$es et des ports des villes marchandes $swahili_culture$s aux villages portuaires $lower_egyptian_culture$nes au-delà du $gulf_aden_province$, sultans, nobles et roturiers viennent acheter des marchandises exotiques ou emprunter de l'argent pour leurs projets auprès des $bah_karimis$.\\nCette organisation en est récemment venue à s'intéresser très activement à notre nation, et nous ne pouvons que gagner à cultiver davantage nos relations avec elle."
 bah_legacy_of_gisu_daraz:0 "Héritage de Gisu Daraz"
 bah_legacy_of_gisu_daraz_desc:0 "L'$india$ en général, et notre État en particulier, sont connus pour être le cœur des préceptes soufis. Les efforts de nos dirigeants pour attirer et parrainer des cheikhs soufis du monde entier témoignent de la piété et de la grande force spirituelle de nos monarques et de notre cour.\\nL'adoption par l'État des concepts soufis de souveraineté spirituelle et de la nature inclusive des enseignements soufis eux-mêmes contribuera à créer un environnement où les diverses confessions religieuses des $bah_gharbians$ et des natifs du $deccan_region$ pourront se mélanger et s'épanouir sans heurts ni querelles stériles."
 bah_madrasa_of_mahmud_gawan:0 "Grande médersa du Deccan"
 bah_madrasa_of_mahmud_gawan_desc:0 "Depuis de nombreuses années, notre État a attiré les hommes compétents du grand monde $muslim_ADJ$ tout en incorporant le meilleur des États qui nous ont précédés. Cela a créé une riche culture cosmopolite qui n'est pas entièrement $farsi_culture$, $arabian_group$, $marathi_culture$, $telugu$ ni $kannadiga$ par nature. La création d'une grande médersa dans notre capitale servirait à favoriser le développement de l'apprentissage de cette multitude de cultures et permettrait au monde de voir la grandeur de notre État."
 bah_meltpot_of_languages:0 "Melting-pot linguistique"
 bah_meltpot_of_languages_desc:0 "Le $deccan_region$ est une région où se côtoient de nombreuses langues et cultures. Le grand afflux de personnes d'origine $iranian_group$ne, $turkic_group$, $afghan_culture$e et $arabian_group$ sur ces terres a encore accentué la nature cosmopolite de notre État. Alors qu'historiquement le $persian_language$ a répondu aux besoins de nos prédécesseurs, un nouveau mélange de langues locales associées au $persian_language$ et à l'$arabic_language$ est devenu de plus en plus courant. Ce mélange de langues constitue une source d'inspiration culturelle pour les artistes en devenir."
 bah_nobility_hindu_expansion:0 "Expansion de la noblesse hindoue"
 bah_nobility_hindu_expansion_desc:0 "Bien que parfois une malédiction pour la souveraineté du dirigeant, la $nobles_estate$ est néanmoins l'un des aspects importants du gouvernement afin d'administrer les vastes terres de l'État. Avec notre indépendance de $DLH$, nous avons obtenu la propriété sur des vassaux $hindu_ADJ$s presque exclusifs, tandis que nos nobles $muslim_ADJ$s demeurent une petite minorité, incapable de gérer les masses. Nous devons élargir notre noblesse en promouvant des candidats $hindu_ADJ$s prometteurs."
 bah_takht_e_firoza:0 "Takht-e-fīrozā"
 bah_takht_e_firoza_desc:0 "La première chose que remarque tout invité dans notre salle d'audience royale, c'est le trône turquoise de notre dynastie. Cette pièce unique du mobilier royal nous a été offerte à l'origine par le Raja Kapaya, un Télougou vaincu, et elle est à bien des égards le symbole ultime de notre dynastie. Exquis et splendidement unique, il incarne les richesses du Deccan et la combinaison inhabituelle de styles qui est la marque de fabrique de notre État cosmopolite."
 baihua:0 "Baihua"
 baihua_desc:0 "Notre domaine s'étend bien au-delà de l'horizon. L'émergence d'une langue écrite commune à nos sujets ne manquera pas de combler le fossé qui nous sépare, d'élever notre culture et de réduire les conflits fondés sur l'incompréhension et les différences linguistiques."
 balkan_hajduks:0 "Haïdouks"
 balkan_hajduks_desc:0 "Alors que l'autorité centrale des royaumes médiévaux se fragmente sous le poids de l'expansion impériale, le vide social est comblé par les Haïdouks. À l'origine simples bergers (#italic hajtó#!) et travailleurs saisonniers, ces hommes sont devenus une classe semi-mythique de guérilléros et de brigands. Ils opèrent en petites bandes disciplinées (#italic cheta#!) dirigées par un #italic Harambaša#!, régies par des codes de conduite internes stricts mettant l'accent sur la loyauté et la protection de la paysannerie locale (la #italic raja#!). À nos yeux, ce ne sont que des brigands ; pour les paysans, ils constituent le seul bouclier contre les exactions des collecteurs d'impôts étrangers et des envahisseurs indisciplinés. En codifiant leur présence au sein de notre structure militaire, nous renforçons une force qui prospère grâce même à l'illégalité de la frontière."
 ball_game:0 "Tlachtli"
 ball_game_desc:0 "Le tlachtli est un jeu de balle au cœur de la vie sociale de notre pays. Au cours de la partie, les joueurs s'efforcent de conserver la balle sur le terrain en la frappant de la hanche. Il s'agit là d'une alternative cérémonielle à la guerre et d'un élément important de notre vie religieuse."
 baltic_shipyard:0 "Chantier naval sur la Baltique"
 baltic_shipyard_desc:0 "Construire un grand chantier naval sur la côte est de la Baltique nous permettrait de dominer le commerce outre-mer."
 bank_of_saint_george:0 "Office de Saint Georges"
 bank_of_saint_george_desc:0 "Cette institution financière fut fondée pour consolider toutes les dettes de Gênes en une seule, et servir de bras financier de la république en finançant ses entreprises outre-mer."
 banking_advance:0 "Banque"
 banking_advance_desc:0 "Le prêt d'argent est vieux comme le monde, mais il n'est pas sans risque. Nous pouvons institutionnaliser ces pratiques et faire en sorte que l'argent soit prêté de manière contrôlée et équitable."
 banking_country_traditions:0 "Traditions bancaires"
 banking_country_traditions_desc:0 "Alors que beaucoup cherchent à s'enrichir en profitant des opportunités offertes par les échanges et le commerce, notre État remplit ses coffres en proposant des prêts abordables."
 bantu_and_perso_arabian:0 "$bantu_language_family$ et perso-arabe"
 bantu_and_perso_arabian_desc:0 "Issus de l'$arabia_region$ et de la $persia_region$, nous avons établi des communautés à travers la $swahili_coast_region$ qui intègrent les langues $bantu_language_family$es locales dans un effort visant à maintenir l'ordre social et faire place à de nouvelles avancées architecturales et culturelles !"
 baptism_books:0 "Livres de baptême"
 baptism_books_desc:0 "Nous devons réaffirmer le baptême en tant que pierre angulaire de notre foi et offrir au clergé l'opportunité de suivre ce sacrement pour le bien de tous les fidèles."
 barid:0 "Barīd"
 barid_desc:0 "Ce service postal qui dessert les régions les plus reculées de l'Empire est responsable de la communication entre notre capitale et notre gouvernement."
 barracks_advance:0 "Caserne"
 barracks_advance_desc:0 "$barracks_desc$"
 bashi_bazouks:0 "Les bachi-bouzouks"
 bashi_bazouks_desc:0 "Les bachi-bouzouks sont des irréguliers indisciplinés recrutés parmi des couches de la population privées de leurs droits, et parfois des vagabonds. Ils constituent un moyen abordable d'assurer la garnison des forts et des avant-postes. Grâce à leur penchant pour le brigandage et les meurtres gratuits, nous pouvons compter sur eux pour attaquer sans relâche les frontières de l'ennemi."
 basic_financial_instruments:0 "Outils financiers primitifs"
 basic_financial_instruments_desc:0 "Le commerce au long cours est aussi risqué que profitable. Toutefois, le développement d'outils financiers, tels que les lettres de change, aide à réduire les risques tout en accroissant les profits."
 bastion_advance:0 "Bastion"
 bastion_advance_desc:0 "$bastion_desc$"
 battle_leadership_law_advance:0 "$battle_leadership_law$"
 battle_leadership_law_advance_desc:0 "$battle_leadership_law_desc$"
 battlefield_commisions:0 "Commissions militaires"
 battlefield_commisions_desc:0 "Les commissions nous permettront de coordonner les recherches dans le domaine militaire, et ainsi d'accroître notre Tradition terrestre."
 bavarian_brewing_expertise:0 "Brasseurs de talent"
 bavarian_brewing_expertise_desc:0 "Nos territoires sont riches en ingrédients nécessaires à la bière, dont notre peuple sait tirer parti. Nombre de ces petites brasseries pourraient se développer en entreprises florissantes avec un bon soutien."
 bavarian_coinage:0 "Devise bavaroise"
 bavarian_coinage_desc:0 "Le pays a besoin d'une nouvelle pièce servant de devise unifiée au peuple bavarois. Établir une monnaie d'État dans notre capitale assurerait notre contrôle total sur cette nouvelle monnaie."
 bavarian_culture_buildings:0 "Institutions culturelles bavaroises"
 bavarian_culture_buildings_desc:0 "Nos terres natales se situant au pied des magnifiques Alpes, nous sommes une destination commune pour des artistes venus de l'Europe tout entière. Si nous pouvions construire et soutenir des institutions culturelles, nous pourrions raffiner notre cour en centre culturel et prendre notre place parmi les prestigieuses puissances européennes."
 bavarian_flexible_diplomats:0 "Diplomatie pratique"
 bavarian_flexible_diplomats_desc:0 "Peu importe que nous discutions avec un suzerain ou un allié potentiel, nos diplomates doivent être prêts à tout. Il ne nous sera possible de réussir que si nous considérons avec soin les intérêts bavarois et en faisons notre plus haute priorité."
 bavarian_hofkriegsrat:0 "Hofkriegsrat bavarois"
 bavarian_hofkriegsrat_desc:0 "Établir un conseil avec pour seul devoir de conseiller notre dirigeant en temps de conflit nous aidera à créer une force de combat plus efficace pour le pays bavarois."
 bavarian_imperial_knights:0 "Chevaliers impériaux bavarois"
 bavarian_imperial_knights_desc:0 "Notre noblesse s'est distinguée avec des chevaliers formidables au service du Saint-Empire romain germanique. Il nous faut donc développer ces troupes pour assurer la survie de notre intégrité ducale."
 bavarian_jager:0 "$a_bavarian_jager$"
 bavarian_jager_desc:0 "$a_bavarian_jager_desc$"
 bavarian_legitimacy:0 "Ducs bavarois"
 bavarian_legitimacy_desc:0 "Nous avons reçu le titre de duc de Bavière par l'Empereur lui-même. En nous présentant comme les protecteurs du duché bavarois, nous veillerons à ce que nul ne puisse remettre en question notre légitimité."
 bavarian_purity_law:0 "Loi de pureté bavaroise"
 bavarian_purity_law_desc:0 "La qualité de notre bière a été reconnue durant des siècles, mais pour atteindre la véritable célébrité, nous devons nous assurer de son statut prestigieux pour toujours. Plusieurs souverains du passé ont tenté d'instaurer des régulations sur la préparation de cette merveilleuse substance, dont nous pourrions tirer parti pour nos brasseries."
 bavarian_stem_duchy:0 "Rêves d'unification"
 bavarian_stem_duchy_desc:0 "Le peuple bavarois et sa culture étaient autrefois gouvernés par le royaume de Bavière sous une seule bannière. Nous devrions donc chercher à établir un État tout aussi puissant et assurer un foyer au peuple bavarois."
 bavarian_zelousness:0 "Unicité de la foi bavaroise"
 bavarian_zelousness_desc:0 "Nous devons nous assurer que la foi de notre peuple reste unie et ne sera pas divisée par les pensées hérétiques."
 bayonet_leaders:0 "Officiers en première ligne"
 bayonet_leaders_desc:0 "Les effectifs bien dirigés suivent. Nous ferons donc en sorte que nos officiers mènent les combats en première ligne."
 beacon_of_maghrebi_trade:0 "Le phare du commerce au Maghreb"
 beacon_of_maghrebi_trade_desc:0 "Tlemcen se situe au carrefour des caravanes sahariennes, du commerce méditerranéen et de l'émergence andalouse. Alors que les échanges prospèrent dans ses marchés et ses ports, nous devons œuvrer à étendre nos réseaux marchands et affirmer notre emprise sur le commerce régional."
 beat_to_windward_advance:0 "Louvoiement !"
 beat_to_windward_advance_desc:0 "Les caravelles à voiles latines sont très maniables, ce qui leur permet de virer facilement de bord contre le vent. Cette facilité de louvoyage accélère sensiblement la navigation en conditions météorologiques défavorables et sur des mers hostiles."
 beer_workshop_advance:0 "$beer_workshop$"
 beer_workshop_advance_desc:0 "$beer_workshop_desc$"
 beguins_and_beghards:0 "Ordres religieux laïcs"
 beguins_and_beghards_desc:0 "Nombre de fidèles se sont orientés vers la vie de prière et de bienveillance qui accompagne le quotidien des moines et des nonnes., sans pour autant avoir officiellement prononcé leurs vœux. Bien qu'ils agissent en dehors de l'approbation officielle du pape, nous devons soutenir ces efforts populaires et aider notre population."
 benefits_for_mercenaries:0 "Avantages pour les mercenaires"
 benefits_for_mercenaries_desc:0 "Les mercenaires recherchent toujours le contrat qui leur est le plus favorable. Pour nous assurer qu'ils restent à notre service, il nous faut prendre soin de leurs compagnies, de façon qu'elles nous restent loyales et soient moins exigeantes quant à leur solde."
 benevolence:0 "Bienveillance"
 benevolence_desc:0 "Notre nation est un bastion de la tolérance et du progrès. En nous assurant que tous les autres le sachent, il nous est aisé d'améliorer nos relations avec l'étranger."
 benign_diplomats:0 "Diplomates bienveillants"
 benign_diplomats_desc:0 "La diplomatie est un art complexe où il ne suffit pas de bien savoir parler. La démarche et la conduite de l'orateur sont des facteurs essentiels à l'interprétation de ses paroles. En formant nos diplomates pour qu'ils paraissent plus amicaux, nous serons mieux perçus par les autres pays."
 beyond_the_borders:0 "Par-delà les frontières"
 beyond_the_borders_desc:0 "Le $christian$ trouve sans nul doute ses origines dans le berceau de l'Empire romain, et nombre de ses branches n'ont pas cherché à s'étendre au-delà de ses frontières. Toutefois, le $miaphysite$, en marge de l'Empire depuis sa dénonciation par les Chalcédoniens, a osé dépasser ses limites territoriales, apportant la lumière de Dieu dans les endroits les plus reculés."
 beyond_the_sun:0 "Par-delà le soleil"
 beyond_the_sun_desc:0 "L'âge des grandes hordes n'est pas terminé. Nous avons appris des erreurs de nos ennemis : nous voilà plus avisés et plus forts. Toutes ces terres où le soleil croît et meurt seront bientôt nôtres."
 bhakti_movement:0 "Mouvement Bhakti"
 bhakti_movement_desc:0 "Ayant émergé au VIe siècle, ce mouvement prône l'amour et la dévotion envers un dieu personnel ou un esprit illuminé. En outre, il lance un appel à la population en s'exprimant directement à elle selon ses souhaits. Jouissant d'une grande influence, ce mouvement change le ressenti du peuple sur la religion et les croyances."
 bill_of_rights:0 "Déclaration des droits"
 bill_of_rights_desc:0 "En accordant aux citoyens certains droits fondamentaux, nous réduisons les chances que la paysannerie se soulève."
 birthplace_of_renaissance:0 "Foyer de la Renaissance"
 birthplace_of_renaissance_desc:0 "Notre attention aux arts, notre culture du talent et notre pensée novatrice nous ont poussés à être considérés comme étant au sommet des progrès scientifiques et culturels."
 bison_hunters:0 "Chasse au bison"
 bison_hunters_desc:0 "Le bison est la vie de notre peuple. Chacune de ses parties est utilisée, et son sacrifice n'est jamais vain : sa chair nous nourrit, ses os sont transformés en outils, sa fourrure nous protège du froid lors des longs hivers, son cuir nous habille et couvre nos tipis, et son âme nous protège de manière symbolique. Le bison revêt une telle importance pour nous que sans lui nous serions perdus."
 black_guard:0 "$a_black_guard$"
 black_guard_desc:0 "$a_black_guard_desc$"
 blast_furnace:0 "Haut fourneau"
 blast_furnace_desc:0 "Si elle reste plus coûteuse que la métallurgie traditionnelle, l'utilisation de la méthode des hauts fourneaux permet d'affiner la fonte brute en la refondant pour y incorporer fer, acier, calcaire ou charbon de bois. La fonte ainsi transformée en fer forgé constitue un excellent matériau pour la fabrication de produits plus complexes, tels que les canons."
 blend_of_influences:0 "Mélange d'influences"
 blend_of_influences_desc:0 "L'$muslim$ a su s'implanter dans de nombreuses contrées depuis ses origines dans la région d'$arabia_region$ et, à travers cette expansion, est entré en contact avec un grand nombre de peuples et coutumes. De multiples échanges d'influences ont eu lieu au cours de ce processus, à tel point que maintes caractéristiques ne provenant pas à l'origine de l'$muslim$ y sont devenues étroitement liées. En outre, les nombreuses cultures ayant accepté l'$muslim$ se sont également vues influencées par ce phénomène."
 blockade_tactics:0 "Tactiques de blocus"
 blockade_tactics_desc:0 "L'emploi de formations et de patrouilles au large des ports ennemis augmentera notre capacité à couper leurs lignes de ravitaillement, ce qui raccourcira les sièges."
 bng_artillery_corps:0 "Corps d'artillerie"
 bng_artillery_corps_desc:0 "Les canons sont devenus un atout indéniable dans les campagnes militaires. Nous devons nous doter d'un corps d'artillerie efficace, spécialisé dans la destruction des rangs ennemis avant qu'ils ne puissent affronter nos fantassins sur le terrain."
 bng_bengali_architecture:0 "Architecture $bengali$e"
 bng_bengali_architecture_desc:0 "Mélange d'architecture urbaine ancienne, d'influences de l'ingénierie $muslim_ADJ$e et de toits $bengali$s classiques, le style $bengali$ unique est utilisé pour les bâtiments religieux et culturels de toutes sortes. Grâce à notre expertise en la matière, la construction de tels bâtiments est nettement plus simple à aborder."
 bng_bengali_industrialization:0 "Industrialisation de la mousseline"
 bng_bengali_industrialization_desc:0 "Le $BNG$ est idéalement situé en $india$ pour entamer une révolution sans précédent. La mousseline, le tissu de coton spécial qui fait la renommée des filateurs $bengali$s, est une marchandise de premier choix pour l'industrialisation. Nous sommes prêts à exploiter de nouveaux horizons dans notre industrie textile déjà reconnue mondialement. Entamons une révolution industrielle !"
 bng_bengali_paik:0 "Paik $BNG_ADJ$"
 bng_bengali_paik_desc:0 "Les paiks constituent le pilier central de notre armée. Alors que dans d'autres États, le système de paiks est actif et que ceux-ci sont utilisés comme ressources générales, notre État se concentre sur des unités moins nombreuses, mais bien organisées et bénéficiant d'un soutien militaire suffisant."
 bng_bengali_poetry:0 "Poésie $bengali$e"
 bng_bengali_poetry_desc:0 "L'écriture est l'une des formes d'art les plus influentes. La poésie $bengali$e racontera les récits de conquérants épiques, des drames réalistes, et posera des questions philosophiques profondes qui feront la gloire de la culture $bengali$e."
 bng_bengali_trade_fleet:0 "Flotte marchande $BNG_ADJ$e"
 bng_bengali_trade_fleet_desc:0 "La flotte commerciale du peuple $bengali$ apporte aux marchés du delta du Gange des marchandises exotiques en provenance de pays étrangers, ainsi que de l'$goods_gold$ et de l'$silver$. Nos marchands sont réputés dans les régions les plus éloignées du monde grâce à notre grande flotte commerciale."
 bng_bengali_traders:0 "Marchands $BNG_ADJ$s"
 bng_bengali_traders_desc:0 "L'$indian_ocean_region$ relie le marché indien à ceux de l'$south_east_asia$ et de $china$. Ainsi, nous mettrons l'accent sur la maximisation de notre présence sur ces marchés via les routes maritimes et sur l'augmentation de nos profits commerciaux."
 bng_bengali_vassal_system:0 "Système de vassalité $BNG_ADJ$"
 bng_bengali_vassal_system_desc:0 "Sous le règne de $DLH$, le peuple $bengali$ a servi son suzerain en tant que vassal productif. Le système $DLH_ADJ$ nous servira de base pour nos propres systèmes de vassalité pendant les années de souveraineté $bengali$e à venir."
 bng_habshi_generals:0 "Généraux habshî"
 bng_habshi_generals_desc:0 "Les soldats-esclaves abyssiniens achetés sur les marchés arabes jouent un grand rôle en tant que fantassins d'élite. Ceux qui excellent comme commandants devraient être promus, tandis que ceux faisant preuve de la plus grande loyauté devraient être nommés gardes du palais."
 bng_religious_pluralism:0 "Pluralisme religieux"
 bng_religious_pluralism_desc:0 "L'$india$ abrite de nombreuses religions : l'$hindu$ dans l'ensemble de la population, l'$muslim$ que préfèrent les classes dirigeantes, et quelques religions mineures notables telles que le $buddhist$ et le $jain$ parmi les minorités ouvrières. La promotion d'une seule religion par rapport à une autre provoquera inévitablement le chaos et des troubles. Nous devrions donc viser le pluralisme religieux et ne favoriser ni discriminer aucune religion dans notre État."
 bng_rupees:0 "Frappe de roupies"
 bng_rupees_desc:0 "L'absence d'une monnaie standard largement adoptée freine le développement du commerce indien. En tant que l'une des premières puissances économiques du sous-continent, nous sommes bien placés pour commencer à frapper une nouvelle monnaie en argent avec des poids standard, que nous appellerons roupie."
 bng_shipbuilding_industry:0 "L'industrie de construction navale"
 bng_shipbuilding_industry_desc:0 "Le commerce maritime est l'essence même de notre État. Notre commerce et nos navires de guerre constituent donc l'un des aspects les plus importants de notre économie, et nous nous attachons à soutenir l'industrie de la construction navale."
 bng_war_elephants:0 "Éléphants de guerre"
 bng_war_elephants_desc:0 "Malgré leur lenteur, la manœuvrabilité des éléphants dans les cours d'eau du pays est un avantage décisif pour l'armée. En outre, les éléphants de guerre aideront nos troupes à combattre, grâce à leur stature imposante."
 boarding_parties:0 "Abordages"
 boarding_parties_desc:0 "En enseignant à nos officiers comment mener des abordages contre les vaisseaux ennemis, nous pouvons gagner un avantage décisif dans le combat naval, y compris contre des [navies|e] supérieures en nombre."
 bod_guardians_of_thermopylae_advance:0 "Gardiens des Thermopyles"
 bod_guardians_of_thermopylae_advance_desc:0 "Notre fief se situe sur le col le plus célèbre de l'histoire, et nous avons eu la sagesse d'esprit de suivre les leçons de Léonidas en fortifiant les sentiers de montagne avec des pierres franques. Chaque sentier étroit représente un piège mortel pour l'envahisseur, et chaque falaise un point d'observation pour nos archers et éclaireurs. La protection du cœur de la Grèce contre les menaces venues du nord est ainsi garantie, car traverser Bodonitza, c'est s'exposer à une pluie de flèches fatale."
 bod_the_alpine_skirmishers_advance:0 "Les tirailleurs alpins"
 bod_the_alpine_skirmishers_advance_desc:0 "Vivant au milieu des rochers du mont Kallídromo, notre peuple a développé une forme de combat d'infanterie légère qui met l'accent sur la mobilité verticale et l'utilisation de l'arbalète. Ces « montagnards du col » peuvent disparaître dans les rochers après une salve, empêchant ainsi l'infanterie lourde traditionnelle de les engager. Ils servent d'yeux et d'oreilles aux États du Sud et sont les premiers à donner l'alerte en cas de mouvement provenant du Nord."
 bod_the_curia_of_the_three_keys_advance:0 "La Curie des trois clefs"
 bod_the_curia_of_the_three_keys_advance_desc:0 "Afin de gérer la richesse générée par la renaissance des routes commerciales du nord, le marquisat a créé la #italic Curie des trois clefs#!. Le trésor et les archives juridiques sont enfermés dans la citadelle de Bodonitza, dont l'accès nécessite trois clés distinctes détenues par le marquis, l'évêque latin et un représentant des bourgeois grecs locaux. Ce système primitif mais efficace de « freins et contrepoids » empêche les détournements de fonds qui affligent souvent les petits États féodaux et garantit que les lourds péages versés par les Thermopyles sont effectivement employés à financer la construction des remparts de la forteresse."
 bod_the_maritime_consulates_advance:0 "Les consulats maritimes"
 bod_the_maritime_consulates_advance_desc:0 "Fidèles à notre héritage vénitien, nous avons établi des consulats dans les principaux ports d'Eubée et d'Attique afin de représenter les intérêts des marchands de Bodonitza. Ces bureaux font office de pôles de renseignement, transmettant directement au marquis les informations relatives aux mouvements navals. Nous sommes peut-être un État montagneux, mais notre regard est toujours tourné vers l'horizon marin."
 bod_the_oeta_riflemen_advance:0 "Les fusiliers d'Œta"
 bod_the_oeta_riflemen_advance_desc:0 "À l'ère de la poudre à canon, les robustes bûcherons du mont d'Œta ont été organisés en corps d'infanterie légère spécialisés. Ces fusiliers excellent dans les tactiques de guérilla, utilisant le terrain escarpé pour accabler les colonnes envahissantes avec une précision mortelle. Ils sont le cauchemar de tout général qui tente de forcer le passage à travers les cols nordiques de Grèce."
 bod_the_spercheios_civil_chancellery_advance:0 "La chancellerie civile du Sperchiós"
 bod_the_spercheios_civil_chancellery_advance_desc:0 "Le marquisat de Bodonitza, qui n'était à l'origine qu'une simple tour de guet frontalière, était devenu le centre névralgique administratif de la Grèce centrale, ce qui nécessitait une transition entre le système féodal arbitraire et une fonction publique professionnalisée. La création de la Grande Chancellerie, qui surplombe la vallée du Sperchiós, marque le passage à un État centralisé et moderne, où les anciens privilèges des barons francs sont remplacés par un groupe de « chevaliers civils ». Formés au droit, ceux-ci gèrent les péages complexes et les registres fonciers du cœur de la Phocide."
 bodaiji:0 "Bodaiji"
 bodaiji_desc:0 "Depuis l'Antiquité, il est courant dans nos pays de vénérer nos ancêtres. Ainsi, les souverains les plus influents peuvent ériger des temples entiers pour y être enterrés et vénérés après leur mort, afin de préserver le souvenir de leur vie et de leurs actes."
 bodhisattva:0 "Bodhisattva"
 bodhisattva_desc:0 "Dans toutes les écoles du bouddhisme, le $bodhisattva$ est une figure très éminente, bien que son importance et ses particularités puissent varier en fonction de la branche. Cependant, une constante demeure : il inspire toujours la vénération et l'admiration."
 bohemian_crystal:0 "Cristal de Bohême"
 bohemian_crystal_desc:0 "Peu d'ateliers autour du monde connu ont la capacité de fabriquer du verre et des cristaux d'une qualité et d'une clarté rivalisant notre propre production."
 bohemian_imperial_standing:0 "Importance de la Bohême dans l'Empire"
 bohemian_imperial_standing_desc:0 "Notre place au sein de l'Empire est une preuve de prestige, de grandeur et d'autorité. Peu de membres disposent d'un pouvoir aussi délicat que nous, grâce à nos talentueux diplomates et alliés."
 bohemian_thaler:0 "Thaler de Bohême"
 bohemian_thaler_desc:0 "Depuis des années, la monnaie de notre pays a été le gros ou groschen, une pièce d'argent utilisée dans l'ensemble du Saint-Empire romain germanique. La découverte de nouvelles sources d'argent nous permet de créer une autre pièce de plus grande taille : le thaler, aussi appelé taler ou le talir, qui deviendra fort et influent pour dominer le commerce et établir un nouveau standard."
 bole_smelting:0 "Fonte en foyer ouvert"
 bole_smelting_desc:0 "Une méthode permet de fondre le plomb en utilisant les vents puissants et constants que l'on trouve au sommet d'une colline afin d'alimenter la fusion du minerai."
 bonded_by_loyalty:0 "Liés par la loyauté"
 bonded_by_loyalty_desc:0 "Que ce soit envers nos compatriotes ou nos alliés indéfectibles, nos vaillantes armées ne cesseront jamais de croire à leur propre triomphe. Dotées d'une détermination indomptable, elles continueront inlassablement le combat, prêtes à persévérer jusqu'au dernier soldat. Ensemble, unis par nos objectifs et notre loyauté, nous irons de l'avant, arrachant la victoire coûte que coûte à nos adversaires."
 bookkeeping:0 "Comptabilité"
 bookkeeping_desc:0 "Parfois, l'argent se fait rare, nous obligeant à emprunter ; mais les prêteurs craignent alors de ne pas être toujours remboursés. La tenue méticuleuse de nos comptes nous permettra de nous assurer que tout le monde recevra son dû, ce qui facilitera les négociations lorsqu'il s'agira d'obtenir des taux d'intérêt plus favorables."
 border_raiders:0 "Pillards habiles"
 border_raiders_desc:0 "Nos pillards sont célèbres pour leur capacité à mener des attaques éclair pour surprendre les ennemis. Leur vitesse et leur talent pour échapper aux représailles pourraient également représenter un énorme atout pour nos troupes ordinaires."
 borjigin_blood:0 "Le sang des $Borjigin$s"
 borjigin_blood_desc:0 "Nous partageons le sang des $Borjigin$, de $genghis_khan_name_no_tooltip$ lui-même. Tous les pays s'inclineront devant notre héritage et tous les territoires des steppes nous reconnaîtront comme les leurs."
 bos_bosnian_ljekaruse:0 "Ljekaruše bosniens"
 bos_bosnian_ljekaruse_desc:0 "Dans les vallées reculées de notre nation, les moines de nos monastères ont compilé les #italic Ljekaruše#!, de vastes codex médicinaux rédigés avec l'écriture locale #italic Bosančica#!. En synthétisant la théorie gréco-byzantine antique avec l'herboristerie d'altitude des Alpes dinariques, ces ouvrages offrent un système de soins communautaires sophistiqué à une époque où les médecins professionnels sont rares. Cette maîtrise de la médecine populaire et de la chirurgie garantit que notre population reste résiliente face aux épidémies qui ravagent les basses terres, favorisant une identité culturelle fondée sur l'autonomie intellectuelle et la préservation du savoir scientifique slave."
 bos_cultural_customs:0 "Stećci de $bosnia_area$"
 bos_cultural_customs_desc:0 "Nos peuples perpétuent des traditions uniques, qui transcendent les différences de foi. L'édification de #italic stećci#!, ces pierres tombales richement ornées, marquera notre territoire d'une identité résolument bosniaque."
 bos_defiant_terrain:0 "Terrain rebelle"
 bos_defiant_terrain_desc:0 "Les terres de $bosnia_area$, faites de collines boisées et de montagnes traversées par des vallées fluviales, se prêtent naturellement à l'épuisement des armées d'envahisseurs. Nous devons tirer parti de ce relief et n'engager l'ennemi que lorsque cela nous avantage, pour laisser les difficultés du terrain épuiser ses troupes et ses ressources et préserver ainsi nos forces."
 bos_influence_of_the_stanak:0 "Réunions du Stanak"
 bos_influence_of_the_stanak_desc:0 "Notre noblesse se réunit régulièrement pour débattre des enjeux les plus pressants de notre pays. Ces rassemblements garantissent l'alignement de nos seigneurs sur une politique commune et démontrent l'unité de notre parlement."
 bos_katun_communities:0 "Katuns valaques"
 bos_katun_communities_desc:0 "Une partie de notre population s'organise en communautés pastorales autonomes. Plutôt que de les soumettre à une autorité centrale, nous devrions collaborer avec elles et tirer un meilleur parti des ressources de nos contrées les plus reculées."
 bos_kingly_ambitions:0 "Ambitions royales"
 bos_kingly_ambitions_desc:0 "Les réalisations et le labeur de notre peuple méritent reconnaissance et protection. Pour y parvenir, nous devons obtenir une forte légitimité et nouer des liens solides avec les souverains voisins, afin d'établir un titre prestigieux pour nous-mêmes."
 bos_land_of_many_churches:0 "Églises de Bosnie"
 bos_land_of_many_churches_desc:0 "Les terres de Bosnie abritent plusieurs communautés religieuses. Notre territoire est certes partagé entre les Églises orthodoxe et catholique, mais il accueille aussi les Krstjani. Éloignés comme nous le sommes de toute autorité centrale, nous devrons cultiver une entente locale et l'harmonie entre ces groupes pour garantir notre stabilité."
 bos_the_filigree_guilds:0 "Les guildes de filigrane"
 bos_the_filigree_guilds_desc:0 "S'appuyant sur les filons d'argent inépuisables des montagnes centrales, nos artisans urbains ont perfectionné l'art du filigrane, un délicat travail de fils d'argent devenu la marque du luxe bosnien. Ces guildes constituent un puissant corps économique qui exporte des dagues cérémonielles et de fines parures vers les marchés de Venise et de Vienne. En transformant notre richesse minérale brute en exportations artistiques à forte valeur ajoutée, nous avons créé une classe moyenne urbaine prospère, farouchement loyale à la Couronne. Ce raffinement industriel élève le prestige de notre nation dans toutes les cours étrangères, preuve que le « Cœur de fer » des Balkans possède un raffinement culturel rivalisant avec les grandes capitales de l'Occident."
 bos_the_srebrenica_mint_office:0 "L'atelier de fabrication de monnaie de Srebrenica"
 bos_the_srebrenica_mint_office_desc:0 "Alors que les mines de $srebrenica$ deviennent la principale source de métal précieux des Balkans, le royaume a dépassé le simple stade de l'exportation de minerai brut. Nous avons établi un Atelier de fabrication de monnaie royal et un bureau de contrôle pour garantir la pureté de l'argent bosnien, produisant une monnaie rivalisant en fiabilité avec celles de Venise. En imposant que tout l'argent extrait par les mineurs ragusains ou saxons soit traité dans des raffineries contrôlées par l'État, nous captons une part massive de la valeur ajoutée. Cette richesse liquide nous permet de faire de la Bosnie la puissance la plus solvable financièrement des Alpes dinariques."
 bosnian_bosancica:0 "Bosančica"
 bosnian_bosancica_desc:0 "Le peuple bosnien s'est uni autour de la #italic Bosančica#!, une écriture cyrillique cursive unique aux nombreuses applications, des traités diplomatiques aux registres privés des marchands. Cette écriture nationale sert de puissant gardien culturel : elle est difficile à lire pour les étrangers mais universelle parmi la classe lettrée bosnienne, quelle que soit sa confession. En maintenant cet alphabet distinct, le peuple garantit que ses archives légales et historiques restent un « livre fermé » pour les administrateurs impériaux, préservant les subtilités secrètes du droit de propriété et de la lignée bosnienne dans un format qui renforce leur héritage slave unique."
 bosnian_people_from_the_hills:0 "Le peuple des collines"
 bosnian_people_from_the_hills_desc:0 "La géographie du cœur de la Bosnie est un labyrinthe vertical de crêtes et de vallées calcaires qui défient la cartographie conventionnelle. Notre peuple s'est adapté à cette logique, maîtrisant les secrets des réseaux de cavernes souterraines et la logistique des convois de mulets."
 bosnian_susjedsvto_of_bosnia:0 "Le Susjedstvo de Bosnie"
 bosnian_susjedsvto_of_bosnia_desc:0 "Le concept culturel ancien de #italic Susjedstvo#!, l'obligation sociale sacrée de protéger et d'honorer son voisin, a évolué en une philosophie civique sophistiquée qui transcende les divisions religieuses. Face aux pressions extérieures, ce code tacite impose que la sécurité et les biens d'un voisin soient aussi sacrés que les siens propres. Cette pratique empêche les tactiques de « diviser pour régner » souvent utilisées par les puissances étrangères pour attiser les conflits internes. En privilégiant la solidarité locale et la « loi du voisinage », nous maintenons un niveau d'harmonie sociale et de stabilité interne qui permet à la nation de présenter un front uni et inébranlable contre toute tentative de démanteler notre patrie commune."
 bound_by_service:0 "Intégration par le service militaire"
 bound_by_service_desc:0 "Nous sommes un même peuple et disposons d'une même armée. En dotant celle-ci de troupes venues de tous nos territoires et des peuples conquis, nous assurerons leur meilleure intégration au sein de notre société, favorisant ainsi l'acceptation de notre règne."
 boyar_regime:0 "La création de la chancellerie"
 boyar_regime_desc:0 "La formalisation de la chancellerie princière permet l'enregistrement systématique des concessions de terres et des traités diplomatiques en slavon liturgique puis, progressivement, en roumain. Cette évolution bureaucratique permettra aux voïvodes de taxer plus efficacement la paysannerie rurale et de maintenir un corps permanent d'envoyés diplomatiques auprès des cours européennes. Elle marquera la transition d'une société militaire tribale vers un État médiéval sophistiqué."
 brave_as_hummingbird:0 "La bravoure du colibri"
 brave_as_hummingbird_desc:0 "Le colibri joue un rôle crucial dans notre mythologie, car il est lié au dieu de la guerre, Huītzilōpōchtli. Symbole de la réincarnation des guerriers défunts, il est honoré pour sa bravoure. Le colibri constituera un nouveau symbole pour nos bannières et motivera nos soldats à combattre jusqu'à la mort."
 brb_brabantine_rights:0 "Droits #L $BRB_ADJ$s#!"
 brb_brabantine_rights_desc:0 "À l'instar d'autres nations, il est temps de codifier les libertés de nos sujets afin qu'ils puissent jouir d'une vie plus prospère au service de notre grande nation."
 brb_land_culture:0 "Une terre de culture"
 brb_land_culture_desc:0 "Avec la fondation de l'université de $leuven$, le $BRB$ se trouve au cœur de la culture $common_string_prefix_article$ $NED$. Des étudiants venus de toute l'$europe$ se présentent à nos portes pour apprendre et partager leurs connaissances."
 brb_the_four_quartiers:0 "Les quatre quartiers"
 brb_the_four_quartiers_desc:0 "Le cœur du duché de $BRB$ est divisé en quatre provinces, aussi appelées quartiers. Chaque quartier est formé de petites et de grandes villes, certaines entourées de murailles, d'autres non. Ils fonctionnent tous en parfaite synergie, comme un moteur bien huilé, et remplissent nos coffres de grandes richesses."
 breton_tradition:0 "Péninsule $breton$"
 breton_tradition_desc:0 "Notre territoire est richement doté en côtes et, depuis que nos ancêtres sont arrivés de Grande-Bretagne, elles bourdonnent d'activité. Notre peuple vit de la mer et pour la mer, et nos ports sont toujours remplis de bateaux de commerce et de pêche."
 brewery_manufactory_advance:0 "Manufacture de bière"
 brewery_manufactory_advance_desc:0 "$brewery_manufactory_desc$"
 brewery_mill_advance:0 "$brewery_mill$"
 brewery_mill_advance_desc:0 "$brewery_mill_desc$"
 british_bill_of_rights:0 "Bill of Rights"
 british_bill_of_rights_desc:0 "Afin de permettre la prospérité de notre commerce et une plus grande cohérence dans le jugement des affaires commerciales, un ensemble de réformes doit limiter le pouvoir royal, notamment en matière judiciaire : le souverain ne doit pas lever les armées selon sa seule volonté, ni infliger de châtiments cruels et inhabituels, ou s'immiscer dans l'élection des membres du Parlement."
 bronze_administration:0 "Administration du Bronze"
 bronze_administration_desc:0 "Quand une élite militaire tient les rênes du pouvoir au sein de la société, il faut aussi que se constitue une classe de lettrés pour son administration, le plus souvent issue du clergé."
 bronze_working:0 "Travail du bronze"
 bronze_working_desc:0 "La découverte et l'exploitation du bronze ont permis de fabriquer des outils et des armes beaucoup plus résistants. De plus, puisqu'il s'agit d'un matériau malléable, cet alliage de cuivre et d'étain est plus facile à travailler que le cuivre."
 buddhist_canon:0 "Canon bouddhique"
 buddhist_canon_desc:0 "Possédant diverses appellations et comportant différents textes en fonction de la branche du $buddhist$, le $buddhist_canon$ est le recueil de textes sacrés du $buddhist$. Des règles monastiques aux #italic sutras#! en passant par les enseignements du Bouddha, tout adepte se doit de connaître cet ouvrage."
 buddhist_councils:0 "Conseils $buddhist_ADJ$s"
 buddhist_councils_desc:0 "Depuis la mort de Sidhārtha Gautama, de nombreux conseils se sont déroulés au sein des communautés monastiques afin de discuter des textes des différents canons. Bien que les archives concernant ces conseils varient d'une école à l'autre, la force de cohésion de ces assemblées reste quant à elle indéniable."
 buddhist_meditation:0 "Méditation bouddhique"
 buddhist_meditation_desc:0 "La méditation est une pratique courante chez tous les adeptes $buddhist_ADJ$s, quelle que soit l'école à laquelle ils appartiennent. Elle vise à entraîner l'esprit afin de développer la pleine conscience, la sérénité et la perspicacité, et ainsi atteindre l'illumination."
 buddhist_syncretism:0 "Syncrétisme $buddhist_ADJ$"
 buddhist_syncretism_desc:0 "Bien qu'il se soit répandu aux quatre coins du monde, le $buddhist$ est né en $india$ et est entré en contact avec de nombreuses croyances. C'est pourquoi il présente un important syncrétisme non seulement avec les anciennes traditions $hindu_ADJ$es, mais aussi avec les maintes divinités auxquelles il a été exposé."
 buddhist_universities:0 "Universités $buddhist_ADJ$s"
 buddhist_universities_desc:0 "Depuis l'Antiquité, les institutions $buddhist_ADJ$s servent également de centres d'enseignement et de connaissances, attirant des populations venues des quatre coins du monde. Nālandā était jadis le plus grand de ces lieux de savoir, mais de nombreux autres sites ont émergé depuis."
 buffer_states:0 "États tampons"
 buffer_states_desc:0 "Il n'y a rien de pire que d'avoir un différend avec son voisin. Si nous voulons éviter les tensions frontalières et disposer d'une certaine marge de manœuvre, nous aurons besoin d'autres États agissant comme tampons entre nous et nos ennemis potentiels."
 bul_the_bastion_of_tseverets:0 "Le bastion de Tseverets"
 bul_the_bastion_of_tseverets_desc:0 "La capitale Tarnovo, perchée sur les falaises de Tsarevets et Trapezitsa, est sans doute la forteresse la plus redoutable des Balkans, symbolisant le pouvoir de la dynastie Asen. En élargissant continuellement le complexe de palais, de cathédrales patriarcales et de murs à triple enceinte, nous avons créé un centre administratif à l'abri des coups d'État ou des sièges soudains. Cette domination architecturale projette une image de stabilité impériale qui intimide les boyards locaux et convainc la population que la « Troisième Rome » s'est réellement installée sur les rives de la Yantra."
 bul_the_boyar_council:0 "Le Conseil des boyards"
 bul_the_boyar_council_desc:0 "Pour prévenir les conflits internes qui ont ravagé le XIVe siècle, nous évoluerons vers une « autocratie consultative » dans laquelle les boyards les plus puissants seront intégrés à un Conseil d'État permanent. Cet organe servira à la fois de haute cour et de conseil de planification militaire, garantissant que les intérêts de la noblesse foncière sont alignés sur ceux de la Couronne. Cette stabilité politique nous permettra de maintenir une grande armée permanente et d'éviter les guerres civiles dévastatrices qui ont historiquement laissé l'empire vulnérable face à ses voisins."
 bul_the_bulgarian_census_bureau:0 "Le bureau de recensement bulgare"
 bul_the_bulgarian_census_bureau_desc:0 "Le savoir, c'est le pouvoir. Nous avons instauré un recensement décennal qui enregistre chaque personne, chaque unité de bétail et chaque foyer de l'empire. Ces données précises permettent de mettre en place le système de taxation et de conscription le plus efficace des Balkans. En sachant exactement ce que la nation peut fournir, nous pouvons planifier des campagnes à long terme avec un niveau de certitude logistique qui garantit que nos armées sont toujours bien approvisionnées et que nos coffres ne sont jamais vides."
 bul_the_bulgarian_gunpowder_foundries:0 "Les fonderies de poudre à canon bulgares"
 bul_the_bulgarian_gunpowder_foundries_desc:0 "En puisant dans les mines de fer des montagnes balkaniques et dans l'expertise des mineurs saxons, nous établirons la première grande industrie domestique de poudre à canon de la région. Ces fonderies produiront des canons de siège lourds et les premières arquebuses, permettant à l'armée bulgare de passer d'une force purement féodale de cavalerie à une armée plus moderne centrée sur l'infanterie. En contrôlant la production de salpêtre et de fer, nous ferons en sorte que nos murailles restent l'obstacle le plus redoutable pour tout conquérant potentiel des Balkans."
 bul_the_chancery_of_the_asens:0 "La chancellerie des Asen"
 bul_the_chancery_of_the_asens_desc:0 "À son apogée, la chancellerie de Tarnovo était le centre diplomatique le plus sophistiqué du monde orthodoxe, produisant des chartes slaves complexes qui influençaient les cours de Serbie et de Russie. En professionnalisant la classe des #italic logothètes#! et des scribes, les tsars s'assurent que chaque concession foncière et traité international est consigné avec minutie et a force obligatoire. Cette rigueur administrative permettra à l'État de percevoir les impôts plus efficacement et de gérer son réseau complexe de vassalité avec un degré de contrôle central rare à la fin du Moyen Âge."
 bul_the_grand_academy_of_the_yantra:0 "La Grande Académie de la Yantra"
 bul_the_grand_academy_of_the_yantra_desc:0 "L'héritage intellectuel de l'École littéraire de Tarnovo du XIVe siècle est ravivé au XVIIe siècle par la création d'une université d'État moderne. Cette institution se concentre sur le droit civil, l'ingénierie et la traduction des textes scientifiques occidentaux en langue vernaculaire bulgare, formant une classe de bureaucrates aussi compétents que ceux de Paris ou de Vienne. Cette modernisation des élites garantira notre capacité à administrer un empire complexe et multiethnique tout en préservant la pureté culturelle de son noyau bulgare."
 bul_the_hesychast_state_philosophy:0 "La philosophie d'État hésychaste"
 bul_the_hesychast_state_philosophy_desc:0 "Les enseignements spirituels de Grēgórios Sinaítēs sont passés de la cellule de l'ermite aux salles du pouvoir. En adoptant l'hésychasme – philosophie du recueillement intérieur et de la lumière divine – comme idéologie d'État officieuse, nous forgeons une population profondément pieuse et résiliente. Cette identité spirituelle commune constitue un puissant moyen de dissuasion contre les influences ennemies, qui immunise les sujets bulgares contre la conversion ou la subversion étrangère."
 bul_the_imperial_restoration_doctrine:0 "La doctrine de la Restauration impériale"
 bul_the_imperial_restoration_doctrine_desc:0 "Nous avons pleinement embrassé notre rôle de chef naturel des peuples balkaniques, en formulant une doctrine officielle visant à la réunification de toutes les anciennes terres bulgares. Cette destinée est soutenue par une armée moderne et professionnalisée ainsi qu'un corps diplomatique sophistiqué cherchant à jouer les grandes puissances les unes contre les autres. La croyance en une « Grande Bulgarie » devient le pilier central de l'État, guidant une politique d'expansion agressive et d'assimilation culturelle résolue à restaurer l'empire de Siméon le Grand."
 bul_the_silk_and_rose_guilds:0 "Les guildes de la Soie et des Roses"
 bul_the_silk_and_rose_guilds_desc:0 "En tirant parti de la fertilité des plaines thraces et du climat unique de la Vallée des Roses, nous avons établi des guildes protégées par l'État pour la production d'huiles de luxe et de soie. Ces produits de grande valeur et légers sont parfaits pour l'exportation terrestre vers les cours d'Europe et d'Asie. La richesse générée par ces guildes permet à l'État de constituer une énorme réserve d'or, faisant de notre économie l'une des plus stables et solvables de l'ensemble du bassin méditerranéen."
 bul_the_standing_drilled_infantry:0 "L'infanterie standardisée permanente"
 bul_the_standing_drilled_infantry_desc:0 "En abandonnant les levées saisonnières, nous avons établi les premiers « Régiments du Lion » permanents. Ces fantassins sont entraînés toute l'année à l'usage des armes à feu, suivant une discipline rigoureuse inspirée des modèles voisins mais adaptée au terrain balkanique. Ce noyau d'infanterie professionnelle nous offre un outil fiable pour la guerre offensive, capable de marcher plus vite et de tirer avec plus d'efficacité que les armées traditionnelles de nos voisins."
 bulgarian_orthodox_patriarchate:0 "Patriarcat orthodoxe bulgare"
 bulgarian_orthodox_patriarchate_desc:0 "La restauration du patriarcat bulgare en 1235, confirmée par le concile de Lampsaque, a établi Tarnovo comme un rival spirituel souverain de Constantinople et de Rome. Au XIVe siècle, le patriarcat fonctionnait comme l'épine dorsale idéologique des dynasties Asen et Chichman, utilisant son statut autocéphale pour fournir une légitimité divine transcendant la fragmentation politique des terres bulgares. Depuis son siège sur la colline de Tsarevets, l'Église gérait un vaste réseau administratif d'éparchies et de monastères, tels que le monastère de Zograf sur le mont Athos, qui servaient de dépositaires de la recension bulgare du slavon liturgique."
 bulgarian_the_bulgarian_cloth_industry:0 "L'industrie textile bulgare"
 bulgarian_the_bulgarian_cloth_industry_desc:0 "Les villes bulgares seront transformées en cœur industriel de la péninsule grâce à la production spécialisée #italic d'Aba#! (un tissu de laine épais et résistant) et de #italic Gaitan#! (une tresse décorative). En organisant les tisserands et les bergers locaux en guildes puissantes et autonomes, les marchands bulgares pourront obtenir d'importants contrats d'État pour équiper les armées régionales et les classes moyennes urbaines en plein essor en Méditerranée. Cet essor économique engendre une aristocratie marchande qui marquera la transition du peuple bulgare d'une paysannerie rurale vers une société proto-industrielle sophistiquée, dotée de la puissance financière nécessaire pour dicter ses conditions à ses voisins."
 bulgarian_the_bulgarian_national_awakening:0 "Le réveil national bulgare"
 bulgarian_the_bulgarian_national_awakening_desc:0 "Porté par les écrits de moines comme Paisius de Hilendar, le peuple bulgare a redécouvert son histoire impériale et sa fierté linguistique, déclenchant une vaste renaissance éducative et politique. Ce mouvement a dépassé les plaintes locales pour réclamer un État centralisé et moderne capable de tenir sa place parmi les grandes puissances européennes. Le résultat est une population hautement motivée et alphabétisée, prête à servir dans une bureaucratie moderne ou une armée nationale, animée par la conviction que la gloire des tsars n'est pas un souvenir, mais un avenir."
 bulgarian_the_danubian_river_merchants:0 "Les marchands du Danube"
 bulgarian_the_danubian_river_merchants_desc:0 "Tirant parti de leur position de gardiens du bas Danube, les familles marchandes bulgares ont établi un réseau commercial sophistiqué reliant la mer Noire à l'Europe centrale. En utilisant des barges à faible tirant d'eau et des ports fluviaux fortifiés, elles ont réussi à contourner les routes terrestres coûteuses et dangereuses, contrôlant le flux de sel, de céréales et de bois à travers les Balkans. Cette maîtrise fluviale a fait du Danube une artère de richesse bulgare, finançant l'essor d'une nouvelle élite urbaine que nous pouvons taxer afin qu'elle conserve ses privilèges."
 bur_between_two_realms:0 "Entre deux royaumes"
 bur_between_two_realms_desc:0 "Nous pouvons considérer que nous sommes à la fois membres des terres traditionnelles du $hre$ et du royaume de $FRA$. Si cela peut compliquer les relations féodales, ces situations ont fait de nous d'habiles diplomates, capables de jouer dans les deux camps à notre avantage."
 bur_knightly_prowess:0 "Prouesses chevaleresques"
 bur_knightly_prowess_desc:0 "Nous occupons une place prestigieuse au sein du système féodal de $FRA$. Il est donc normal que nos troupes reflètent l'esprit $BUR_ADJ$."
 bur_rich_soil_of_burgundy:0 "Favoriser l'agriculture"
 bur_rich_soil_of_burgundy_desc:0 "Les terres de $BUR$ sont bien adaptées à la culture des plantes et à l'élevage des animaux. Le raisin, en particulier, est parfaitement approprié à ces conditions. Grâce à nos compétences en agriculture, il devrait être facile de développer une branche d'activité dédiée."
 bureaucracy_law_advance:0 "$bureaucracy_law$"
 bureaucracy_law_advance_desc:0 "$bureaucracy_law_desc$"
 burghers_rights_laws_advance:0 "$burghers_rights_laws$"
 burghers_rights_laws_advance_desc:0 "$burghers_rights_laws_desc$"
 by_the_grace_of_god:0 "Par la grâce de Dieu"
 by_the_grace_of_god_desc:0 "Le monde a été créé dans les flammes, et par les flammes nous périrons. Notre dieu nous a donné le feu de la vie, à nous humbles mortels, qui brûle nos âmes et nous fait voir la vérité de ses périls. Nous ne serons pas effrayés."
 byz_akritai_advance:0 "Les akrites"
 byz_akritai_advance_desc:0 "Fiers défenseurs de nos frontières contre les menaces extérieures, ces troupes légères reçoivent des terres à nourrir et à protéger. Les akrites sont particulièrement doués pour la guerre défensive, notamment contre la cavalerie, et constituent souvent la première réponse aux menaces extérieures."
 byz_ancient_greek_studies:0 "Études de la Grèce antique"
 byz_ancient_greek_studies_desc:0 "La redécouverte des classiques et l'adoption des arts de la Grèce antique ont donné à l'Occident une formidable occasion d'éduquer les masses et de préserver de grands idéaux dans divers domaines culturels et scientifiques."
 byz_autokratoria_rhomaion:0 "Autokratoría Rhōmaíōn"
 byz_autokratoria_rhomaion_desc:0 "Notre grande nation est la continuation incontestée de la splendeur et du prestige romains. La reconquête de ces terres perdues depuis longtemps est notre principal objectif et notre principale motivation."
 byz_bureaucracy_advance:0 "Bureaucratie $BYZ_ADJ$e"
 byz_bureaucracy_advance_desc:0 "Notre administration croule sous le poids de notre réseau complexe de bureaucraties, héritage de siècles de domination impériale."
 byz_byzantine_inquisition:0 "L'Inquisition byzantine"
 byz_byzantine_inquisition_desc:0 "Alors que l'$europe$ est embourbée dans la tourmente religieuse, nous devons préparer nos pieuses défenses contre les mauvaises herbes qui peuvent apparaître dans notre jardin, sous peine d'être victimes de l'hérésie et de l'instabilité."
 byz_cataphracts_advance:0 "Cataphractaires"
 byz_cataphracts_advance_desc:0 "Malgré les changements introduits par la poudre à canon et l'évolution de la guerre, nous pouvons toujours compter sur les tactiques affinées par nos ancêtres depuis plusieurs siècles."
 byz_court_of_languages:0 "Cour polyglotte"
 byz_court_of_languages_desc:0 "La cour de $constantinople$ accueille des diplomates et des dignitaires venus de tous les coins du monde connu. En conséquence, toutes les langues sont entendues et respectées, comme un signe de prospérité et de progrès à l'initiative d'un peuple dont l'histoire et la langue ont façonné le monde."
 byz_crossroads_of_continents:0 "À la croisée des continents"
 byz_crossroads_of_continents_desc:0 "Byzance se trouve à la croisée des chemins entre l'$europe$ et l'$asia$. Cette position lucrative a eu une grande influence sur l'importance maritime de la ville."
 byz_heart_of_orthodoxy_advance:0 "Cœur de l'$orthodox$"
 byz_heart_of_orthodoxy_advance_desc:0 "$constantinople$ se trouve au cœur d'une foi vibrante et ancestrale. Nous sommes fiers d'être les gardiens de l'$orthodox$, détenteurs du patriarcat œcuménique de notre empire et défenseurs de la chrétienté contre nos ennemis païens."
 byz_historiography_advance:0 "Historiographie byzantine"
 byz_historiography_advance_desc:0 "Notre peuple repose sur les épaules de géants. La documentation appropriée de nos ancêtres, la traçabilité de nos lignées prestigieuses et la préservation de nos grandes traditions sont des responsabilités impressionnantes qui découlent de la place importante que nous occupons dans l'Histoire."
 byz_modernized_strategikon:0 "Stratégie modernisée"
 byz_modernized_strategikon_desc:0 "Le manuel de guerre écrit par Maurice il y a longtemps a servi à notre peuple en temps de guerre. Cependant, comme la guerre change, nous devons aussi évoluer. Nos tactiques se sont adaptées et nos régiments se sont conformés à de nouvelles armes et méthodes bien plus dévastatrices pour ceux qui cherchent à s'opposer à nous."
 byz_poikilia:0 "Poikilia"
 byz_poikilia_desc:0 "La culture byzantine a pris l'$europe$ d'assaut. Présentée avec élégance dans une vaste gamme de teintes, c'est la dernière façon d'exprimer la symphonie des couleurs et des éléments dans l'art et l'architecture."
 byz_reaffirm_synod_powers:0 "Procédures réformées du synode"
 byz_reaffirm_synod_powers_desc:0 "La bureaucratie est une entreprise cauchemardesque pour un pays de notre taille. Afin de mieux affiner les procédures religieuses autour de l'appel de chaque $orthodox_synod$, nous allons réduire la paperasserie et revoir la législation à ce sujet."
 byz_shield_of_the_west:0 "Rempart de l'Occident"
 byz_shield_of_the_west_desc:0 "Nous nous dressons entre l'$europe$ et une foule de païens, en fiers protecteurs face aux menaces étrangères. Notre épée s'abattra toujours contre ceux qui cherchent à défaire nos manières de pratiquer notre foi, une frappe puissante contre ceux qui désirent la fin de nos traditions."
 byz_the_new_helepolis:0 "Le conquérant des cités"
 byz_the_new_helepolis_desc:0 "La tradition consistant à déployer et à perfectionner les engins de siège les plus puissants et les plus impressionnants est un aspect de notre guerre qui nous est intimement familier. En adoptant et en perfectionnant la poudre à canon dans nos conceptions, nos canons domineront nos ennemis."
 byz_the_new_imperial_army:0 "Nouvelle armée impériale"
 byz_the_new_imperial_army_desc:0 "Depuis trop longtemps, notre armée est à la traîne par rapport à nos homologues européens. Nous devons la réformer et étendre nos efforts de conscription dans l'espoir de la voir se relever glorieusement tel le phénix."
 cabinet:0 "Conseil des dépêches"
 cabinet_desc:0 "L'établissement d'un conseil exécutif nous permet de regrouper nos diplomates les plus talentueux."
 cabinet_laws_advance:0 "$cabinet_laws$"
 cabinet_laws_advance_desc:0 "$cabinet_laws_desc$"
 caliphate:0 "Califat"
 caliphate_desc:0 "Le califat, ou ḵilāfa, est l'union de tous les fidèles $muslim_ADJ$s sous la coupe d'un seul dirigeant, le $rank_empire_muslim_ruler_male$, qui est le successeur à la fois politique et spirituel de Mahomet, que la paix soit sur lui. Bien que les conditions d'éligibilité au titre de calife puissent varier, l'idée d'unir l'$muslim$ sous une seule et même bannière est présente depuis ses prémices."
 call_of_our_forefathers:0 "L'appel des ancêtres"
 call_of_our_forefathers_desc:0 "Il y a longtemps de cela, nos illustres ancêtres prenaient la mer pour établir des colonies, loin dans le Nord. Nos sagas racontent qu'ils ont même atteint un nouveau monde, le Vinland. Nous devrions suivre leurs traces."
 calpixcayotl:0 "Calpixcāyōtl"
 calpixcayotl_desc:0 "Nos régions annexées recevront des collecteurs de tribut nommés #italic calpixqueh#!, chargés de veiller à ce que le flux de tributs ne soit jamais arrêté. Il y aura un #italic calpixqui#! dans la région et un autre dans la capitale de notre nation pour chaque État annexé."
 camp_followers:0 "Vivandiers"
 camp_followers_desc:0 "Les guerriers constituent naturellement le gros de nos armées, mais aucune force ne saurait être uniquement composée de soldats. Sans les individus chargés du transport de nourriture et d'équipement, les armées ne pourraient même pas faire route. En organisant ces vivandiers, nous pourrons fortement accroître leur utilité et leur efficacité."
 cannon_foundry_advance:0 "$cannon_foundry$"
 cannon_foundry_advance_desc:0 "$cannon_foundry_desc$"
 cannon_maker_advance:0 "$cannon_maker$"
 cannon_maker_advance_desc:0 "$cannon_maker_desc$"
 cannon_workshop_advance:0 "$cannon_workshop$"
 cannon_workshop_advance_desc:0 "$cannon_workshop_desc$"
 canoe_travels:0 "Canoës"
 canoe_travels_desc:0 "En utilisant des canoës légers, nous pourrons tirer profit des voies d'eau et de portage d'$north_america$, ce qui accroîtra grandement notre capacité à rediriger les flux commerciaux et humains."
 capetian_house_of_anjou:0 "Maison d'Anjou capétienne"
 capetian_house_of_anjou_desc:0 "L'union de la dignité capétienne et de l'ambition angevine coule dans nos veines. Bien que nous ne portions plus la couronne de Jérusalem, nous sommes dépositaires d'un héritage royal qui s'étendait jadis de l'Anjou à l'Albanie. Par une diplomatie astucieuse et des stratégies mûrement réfléchies, nous pourrions encore raviver la grandeur de nos ancêtres et revendiquer ce qui nous a été injustement pris."
 captives_in_war:0 "Prisonniers de guerre"
 captives_in_war_desc:0 "Nous faisons la guerre essentiellement pour prendre des captifs afin de remplacer nos propres pertes. Cependant, nous n'avons pas besoin d'adopter tous ces captifs dans notre tribu : nous pouvons également les utiliser pour le travail forcé."
 caravanserai_advance:0 "$caravanserai$"
 caravanserai_advance_desc:0 "Les routes commerciales se sont développées en Asie centrale au cours du dernier millénaire, créant le réseau connu sous le nom de Route de la soie. L'essor des $caravanserai$s, ces lieux où les marchands et leurs caravanes pouvaient s'arrêter et se reposer en cours de route, a été déterminant."
 caroleans_advance:0 "$a_caroleans$"
 caroleans_advance_desc:0 "$a_caroleans_desc$"
 cas_canal_de_castilla:0 "Canal de Castilla"
 cas_canal_de_castilla_desc:0 "Inspiré par les systèmes hydrauliques de toute l'Europe, utilisés à des fins commerciales et d'irrigation, le #italic Canal de Castilla#! amènera l'eau des montagnes du nord de la #italic Meseta#! pour arroser les champs de céréales de la Vieille Castille. Cette prouesse technique augmentera le rendement de nos champs, créera un surplus alimentaire que nous pourrons exporter, et acheminera ces denrées vers les ports commerciaux."
 cas_castilian_navy:0 "Marine castillane"
 cas_castilian_navy_desc:0 "Pour qui occupe une péninsule entourée de mer aux trois quarts, à proximité du précieux détroit de Gibraltar que se disputent différentes puissances, la domination des eaux devient une question de vie ou de mort. Sur des centaines de kilomètres de côtes, nos ancêtres ont commencé à dompter les vagues, érigeant notre nation au statut de puissance navale intrépide."
 cas_cronicas_reales:0 "Crónicas reales"
 cas_cronicas_reales_desc:0 "En rassemblant les chroniques écrites par les rois précédents, nous sommes en mesure de créer une collection qui répertoriera tous les événements historiques de notre royaume ainsi que l'origine de nos dirigeants. Ces connaissances nous permettront non seulement de consolider les fondements de notre culture, mais aussi d'éclairer les souverains contemporains et futurs sur les événements présents en les comparant au passé."
 cas_lanzas_de_castilla:0 "$a_lanzas_de_castilla$"
 cas_lanzas_de_castilla_desc:0 "$a_lanzas_de_castilla_desc$"
 cas_marine_infantry:0 "Infanterie de marine castillane"
 cas_marine_infantry_desc:0 "Pour une marine forte, il faut que les équipages des navires soient capables de se battre dans toutes les situations, y compris en dehors des vaisseaux. Afin de combler leurs lacunes, nous allons réglementer notre infanterie de marine pour en faire un outil puissant."
 cas_masters_of_the_orders:0 "Maîtres des Ordres"
 cas_masters_of_the_orders_desc:0 "La Reconquista n'étant plus notre objectif principal, l'indépendance des Ordres Saints n'est plus justifiée. En confiant à nos souverains la fonction de maîtres de ces ordres, nous pouvons non seulement étendre leur pouvoir, mais aussi assimiler l'expertise militaire de ces croisés."
 cas_new_world:0 "Nouveau Monde"
 cas_new_world_desc:0 "Grâce aux récentes découvertes, de courageux colons pourront s'approprier de nouvelles terres et rapporter des marchandises de valeur à la mère patrie. Nous enverrons quelques colons loyaux, qui formeront la pierre angulaire de nos comptoirs."
 cas_pasos:0 "Pasos castillans"
 cas_pasos_desc:0 "Si les #italic Pasos#! de la Semaine sainte relèvent d'une vieille tradition en Castille, c'est à notre époque que l'art de la sculpture qui s'exprime à travers eux atteint son apogée. Des artistes tels que Jean de Joigny ou Gregorio Fernández ont pavé la voie qui fera des #italic Pasos#! castillans les exemples les plus impressionnants de la péninsule."
 cas_real_academia_espanola:0 "Real Academia Española"
 cas_real_academia_espanola_desc:0 "Comme dans d'autres parties du monde, la nécessité de réglementer l'aspect linguistique de notre culture devient évidente à mesure que notre langue évolue et se répand dans d'autres contrées. Afin de conserver le génie propre à notre langue, la #italic Real Academia Española#! sera fondée avec pour mission de fixer les règles régissant le bon usage de notre langue."
 cas_reform_of_millones:0 "Réforme des Millions"
 cas_reform_of_millones_desc:0 "Avec l'approbation de la Réforme des #italic Millones#! par nos Cortes, nous nous trouverons en mesure de taxer notre population de manière plus efficace. Cet impôt indirect portera sur les produits alimentaires."
 cas_repoblaciones:0 "Repoblaciones"
 cas_repoblaciones_desc:0 "Les conquêtes réalisées par nos ancêtres ont donné naissance à un pays dont la superficie dépasse la population disponible pour l'habiter et en travailler la terre. Il est donc urgent d'attirer des migrants d'autres régions, en particulier vers le sud de l'Andalousie, sévèrement sous-peuplé depuis l'expulsion de ses habitants musulmans en 1267."
 cas_royal_factories:0 "Manufactures royales"
 cas_royal_factories_desc:0 "Pour lutter contre l'exportation de matières premières au lieu de produits manufacturés plus coûteux, nous développerons un système d'immenses ateliers soutenus par le gouvernement, qui industrialiseront notre pays. Ces nouveaux produits manufacturés renforceront l'économie de notre pays."
 cas_the_reconquista:0 "Empire espagnol"
 cas_the_reconquista_desc:0 "Pendant de longues années, depuis l'invasion et la chute du royaume wisigoth, nous avons fait la guerre aux Maures. Cette lutte nous a inculqué une discipline de fer dont peu de peuples peuvent se vanter. Levez-vous, hommes de Castille, et révélez au monde votre détermination."
 castle_advance:0 "Château"
 castle_advance_desc:0 "$castle_desc$"
 catalan_galley:0 "Galère catalane"
 catalan_galley_desc:0 "Évolution naturelle des anciens navires grecs, la $n_catalan_galley$ est une version plus grande des bâtiments documentés avant le développement d'autres navires similaires en Méditerranée."
 cathedral_advance:0 "Cathédrale"
 cathedral_advance_desc:0 "Une cathédrale est le monument chrétien le plus massif et important qui soit, abritant le siège d'un évêque. S'il est vrai qu'une église peut être magnifique et bien décorée, une cathédrale est quant à elle majestueuse, titanesque et avec un niveau de détail époustouflant."
 catholic_cuius_regio_eius_religio:0 "Cuius regio, ejus religio"
 catholic_cuius_regio_eius_religio_desc:0 "#italic Tel prince, telle religion.#! Nous devrons accepter le fait que d'autres pays pratiquent une foi différente, ce qui pourra s'avérer vital pour notre diplomatie."
 catholic_enlightenment:0 "Illumination catholique"
 catholic_enlightenment_desc:0 "Si nous voulons que notre foi puisse survivre au siècle des Lumières, nous devons nous adapter et acquérir une nouvelle perspective sur l'Église."
 catholic_pilgrimages:0 "Pèlerinages catholiques"
 catholic_pilgrimages_desc:0 "Les lieux saints de notre foi méritent l'attention de tous les fidèles. Il est important que notre pays encourage les pèlerinages et encense les âmes participant à de tels voyages sacrés."
 catholic_sunday_schools:0 "$sunday_schools_advance$"
 catholic_sunday_schools_desc:0 "$sunday_schools_advance_desc$"
 cawa_advance:0 "Régiments des ç̌äwa"
 cawa_advance_desc:0 "Les ç̌äwa servent la classe guerrière noble d'Éthiopie, recrutée et nommée pour le service militaire de l'empereur. Ce pays représente une classe militaire professionnelle, réputée pour sa férocité."
 cba_dream_of_masakado:0 "Le rêve de Masakado"
 cba_dream_of_masakado_desc:0 "Taira no Masakado, un grand guerrier d'autrefois et proche parent de notre clan, a tenté de devenir empereur de l'est du Japon. Malheureusement, Masakado n'a pu réaliser son ambition, mais son rêve de créer un nouveau pays pour les samouraïs devrait nous guider dans les années à venir."
 cba_irrigation_of_southern_kanto:0 "Irrigation du sud du Kantō"
 cba_irrigation_of_southern_kanto_desc:0 "De vastes portions de nos domaines sont marécageuses, ce qui interdit toute agriculture intensive. Toutefois, les derniers progrès en termes d'irrigation nous permettent de cultiver de nouveaux champs et d'assécher les marais. Entreprenons donc de développer ces terres à une vaste échelle, afin de garantir un net développement de notre économie."
 cba_katori_jingu:0 "$katori_shrine$"
 cba_katori_jingu_desc:0 "Le $katori_shrine$ est dédié à Futsunushi no kami, une divinité tutélaire des arts martiaux qui est révérée par tous les guerriers du Japon. Nous devrions tirer parti de cet avantage pour endurcir davantage encore nos samouraïs."
 cba_lineage_of_taira:0 "Lignée Taira"
 cba_lineage_of_taira_desc:0 "Le clan Chiba est issu du clan Taira, de la fin de l'ère Heian. Ce simple fait nous donne plus de pouvoir et d'influence que notre situation sur la scène politique ne pourrait le laisser supposer."
 cel_celtic_diaspora:0 "Diaspora celtique"
 cel_celtic_diaspora_desc:0 "De l'agriculteur au chef de tribu, nombreux sont ceux qui ont quitté nos terres à cause des difficultés et de l'espoir d'une vie meilleure ailleurs. Ils ont tissé un réseau de parenté très étendu qui porte notre langue, nos coutumes et notre fierté jusqu'aux contrées les plus lointaines."
 cel_celtic_nations:0 "Nations celtes"
 cel_celtic_nations_desc:0 "Notre union est fondée sur l'idéal d'unir les divers peuples du monde celtique sous une bannière commune. Par la coopération, nous visons à préserver notre héritage, à promouvoir nos valeurs et à garantir que les nations celtiques prospèrent ensemble face aux pressions extérieures et aux temps qui changent."
 cel_defensive:0 "Les collines parlent celtique"
 cel_defensive_desc:0 "Des siècles de conquête ont enseigné à nos guerriers l'art de la patience et de la résistance. Nous pouvons foncer tête baissée vers le danger, mais nous pouvons aussi endurer, nous défendre et ne frapper que le moment venu."
 cel_pan_celtic_nationalism:0 "Panceltisme"
 cel_pan_celtic_nationalism_desc:0 "Notre vision d'un monde celtique uni est plus qu'un idéal, c'est un appel au ralliement pour tous ceux qui partagent notre héritage. Ensemble, nous forgeons des liens qui dépassent les frontières, rendant notre identité aussi durable que les collines et les mers que nous appelons notre patrie."
 cel_the_wests_awake:0 "L'éveil de l'Occident"
 cel_the_wests_awake_desc:0 "Après de longs siècles de silence, l'esprit ancien des peuples celtes se réveille, prêt à reprendre sa place parmi les grandes civilisations du monde."
 cel_western_shore:0 "La côte ouest"
 cel_western_shore_desc:0 "Pendant des millénaires, nous avons pêché, commercé et combattu le long des côtes sauvages de l'Atlantique. Dans ces eaux hostiles, nous avons acquis un savoir-faire maritime inégalé."
 celtic_raiders_advance:0 "Furor Celtica"
 celtic_raiders_advance_desc:0 "Pendant des millénaires, notre guérilla féroce et agile a tourmenté étrangers et ennemis, les surpassant par une succession dévastatrice d'escarmouches dissuasives et de charges terrifiantes."
 centralize_the_states:0 "Centralisation des États pontificaux"
 centralize_the_states_desc:0 "C'est en la prenant des mains des princes locaux que nous consoliderons notre puissance dans les provinces des États pontificaux."
 centralized_city_governance:0 "Gouvernance des cités centralisée"
 centralized_city_governance_desc:0 "La réforme de notre gouvernement, visant à soutenir l'expansion de nos nouveaux territoires urbains, sera menée sous une supervision rigoureuse, afin d'établir une administration plus ordonnée et plus fiable."
 centralized_government:0 "Gouvernement centralisé"
 centralized_government_desc:0 "La centralisation de l'État facilitera la diffusion des idées et des projets de la capitale sur tout le territoire national."
 cep_cephalonian_raids_advance:0 "Raids céphaloniens"
 cep_cephalonian_raids_advance_desc:0 "Les dirigeants de Céphalonie et de Zante usent, depuis longtemps, de la pratique des raids pour attaquer tout navire ennemi assez imprudent pour naviguer sans protection adéquate aux abords des eaux de la mer Ionienne. Menés depuis les îles, ces raids leur offrent l'opportunité indéniable d'amasser des richesses considérables grâce au pillage et aux rançons, tout en affaiblissant la logistique navale de nos ennemis dans l'ouest de la mer Égée, ce qui permet à ce petit comté de jouer dans la cour des grands et de préserver son indépendance."
 cep_ionian_sea_wall_advance:0 "Mur de la mer Ionienne"
 cep_ionian_sea_wall_advance_desc:0 "Nous, seigneurs de Céphalonie, de Zante et d'Ithaque, sommes situés au carrefour de l'Adriatique et de la Méditerranée, et constituons la première ligne de défense de l'Italie. Notre stratégie navale est axée sur la guerre de « déni d'accès », qui consiste à utiliser des fortifications lourdes et des navires de reconnaissance rapides pour empêcher l'ennemi de se réfugier dans les îles Ioniennes. Nous sommes les gardiens de l'Occident, et aucune flotte ne peut entrer dans l'Adriatique sans notre consentement tacite."
 cep_the_arsenal_of_argostoli_advance:0 "L'arsenal d'Argostóli"
 cep_the_arsenal_of_argostoli_advance_desc:0 "Nous avons transformé la baie aux eaux profondes d'Argostóli en une station de réparation navale de premier ordre. Contrairement aux immenses arsenaux de Venise, le nôtre est spécialisé dans la réparation rapide de navires de petit tonnage tels que les brigantins et les galiotes utilisés pour les raids en mer Égée. Cette infrastructure spécialisée permet à notre flotte de rester en mer plus longtemps par rapport à celle de nos rivaux, garantissant ainsi notre supériorité navale à l'échelle locale."
 cep_the_chancery_of_the_three_tongues_advance:0 "La Chancellerie des Trois Langues"
 cep_the_chancery_of_the_three_tongues_advance_desc:0 "Notre administration a évolué et publie désormais tous les décrets en latin, en grec et en italien, reflétant ainsi la diversité des classes marchandes et nobles des îles Ioniennes. Cette inclusivité linguistique attire des migrants hautement qualifiés du continent et de la péninsule italienne qui recherchent un environnement juridique stable et multiculturel. Elle réduit efficacement les frictions liées à la gouvernance dans un océan d'identités diverses."
 cep_the_currant_trade_advance:0 "Le commerce du raisin de Corinthe"
 cep_the_currant_trade_advance_desc:0 "Le climat unique des îles Ioniennes est particulièrement favorable à la culture du #italic raisin de Zante#!, un fruit sec de luxe qui est devenu un aliment de base dans l'alimentation européenne. En dominant la production et l'exportation de cette culture de niche, nous avons créé un moteur économique spécialisé qui génère une grande richesse pour un territoire relativement petit. Les « seigneurs du raisin de Corinthe » de Céphalonie comptent parmi les nobles les plus fortunés de l'Orient latin."
 cep_the_ionian_merchant_experts_advance:0 "Les experts marchands ioniens"
 cep_the_ionian_merchant_experts_advance_desc:0 "Nous avons accordé des privilèges étendus à nos marchands locaux, en les autorisant à former des sociétés commerciales autonomes qui gèrent les exportations et les importations les plus lucratives. Cette autonomie commerciale a favorisé l'émergence d'une classe urbaine aisée qui finance les réformes administratives modernes du comté."
 cha_boarding_tactics:0 "Tactiques d'abordage"
 cha_boarding_tactics_desc:0 "En raison de la difficulté d'accès de la majeure partie de notre territoire, les envahisseurs doivent s'appuyer sur leur suprématie navale pour tenter de nous conquérir. Les décennies de piraterie dans les mers indochinoises nous ont enseigné de précieuses tactiques d'abordage qui nous permettent d'utiliser leurs propres navires contre eux."
 cha_cham_cultural_influence:0 "Influence culturelle $cham_culture$"
 cha_cham_cultural_influence_desc:0 "Certains de nos voisins considèrent notre culture avec mépris, mais en vérité ils sont aveugles au fait que de nombreux aspects de notre culture font leur chemin dans leurs cours prétendument « civilisées ». Les rythmes des tambours, les chants, les danses et la poésie $cham_culture$s sont autant d'éléments qui laissent leur empreinte à l'étranger."
 cha_commercial_state:0 "État commerçant"
 cha_commercial_state_desc:0 "Une grande partie de notre richesse est due aux opportunités commerciales offertes par nos territoires. Nous devrions concentrer nos efforts pour les maximiser, en créant un État commercial dans le processus."
 cha_dharmic_presence:0 "Présence $dharmic_ADJ$"
 cha_dharmic_presence_desc:0 "Les dieux $dharmic_ADJ$s nous bénissent de leur présence. Puisse leur force nous guider dans les temps les plus difficiles."
 cha_go_tram_huong:0 "Gỗ Trầm Hương"
 cha_go_tram_huong_desc:0 "Le bois résineux de nos forêts, connu sous le nom de bois d'agar ou Trầm Hương, est apprécié non seulement pour son arôme envoûtant, mais aussi pour ses propriétés spirituelles et médicinales. De l'autre côté des mers, nobles et moines le convoitent pour en faire de l'encens, des parfums et des offrandes. En protégeant nos forêts et en affinant nos méthodes de récolte, nous pouvons faire de ce don naturel rare l'un de nos produits d'exportation les plus prisés."
 cha_haluwbilau:0 "Haluwbilau"
 cha_haluwbilau_desc:0 "Les $cha_haluwbilau$s sont des guerriers et officiers d'élite occupant les postes stratégiques de notre armée et de nos troupes de marine. Sélectionnés en fonction de leurs talents et de leur courage, ils commandent nos armées et nos navires contre les menaces extérieures, et règlent les dissensions au sein de nos nombreuses communautés."
 cha_kshatriya:0 "Kshatriya"
 cha_kshatriya_desc:0 "Le $cha_kshatriya$ est un terme adopté des sociétés $hindu_ADJ$s qui s'applique à l'élite de la noblesse de notre État. Celle-ci joue un rôle similaire à celui de ses homologues d'$india$ dans sa manière de considérer les manières militaires et de la cour."
 cha_matrilineal_heritage:0 "Héritage matrilinéaire"
 cha_matrilineal_heritage_desc:0 "La position de la femme dans notre société est bien meilleure et respectée que chez nos voisins. Les droits des enfants leur viennent de leur mère et les femmes jouissent d'un grand nombre de libertés et de devoirs."
 cha_religious_tolerance:0 "Tolérance religieuse"
 cha_religious_tolerance_desc:0 "Notre peuple est un creuset de nombreuses influences religieuses. Les idées $buddhist_ADJ$s venues de $china$, les pratiques $hindu_ADJ$s d'$india$ et la diffusion de l'$muslim$ dans l'$south_east_asia$ créent un environnement unique où seule la tolérance religieuse peut préserver l'unité de notre société."
 cha_towers_on_water:0 "Tours sur l'eau"
 cha_towers_on_water_desc:0 "En tant que puissance maritime, une grande partie de notre richesse et de notre pouvoir provient de la mer. Afin d'assurer notre domination, nos constructeurs navals ont conçu de grands navires de guerre, connus sous le nom de #italic Tours sur l'eau#! : un navire hybride entre la galère et le vaisseau de guerre."
 cha_veteran_shipbuilders:0 "Charpentiers de marine vétérans"
 cha_veteran_shipbuilders_desc:0 "Notre État s'appuie sur sa domination maritime pour s'assurer une position politique, militaire et économique forte en $indochina_region$. À ce titre, la construction rapide de navires supplémentaires est d'une importance capitale pour notre avenir."
 chacery_slavonic:0 "Chancellerie slavonne"
 chacery_slavonic_desc:0 "Pour relier l'immensité de notre royaume, il est nécessaire de disposer d'une langue officielle et de la faire diffuser par des cohortes de clercs lettrés. Le développement de notre langue pour consigner notre histoire et organiser notre appareil administratif n'est pas seulement un signe de fierté et de prestige, mais aussi le moyen de créer un gouvernement qui nous séparera linguistiquement et culturellement de nos voisins de l'Est."
 chagatai_literature:0 "Littérature $karluk_language$"
 chagatai_literature_desc:0 "La langue $karluk_language$ des steppes d'Orient est bien plus à même d'exprimer les pensées et idées de notre illustre lignée que le $persian_language$ ou l'$arabic_language$. Il nous faut promouvoir l'usage de la langue de nos ancêtres pour créer une nouvelle tradition littéraire."
 chancery_advance:0 "Chancellerie"
 chancery_advance_desc:0 "Une chancellerie est un bureau administratif développé par les dirigeants médiévaux afin de gouverner leurs domaines devenus plus difficiles à gérer en raison des changements sociétaux. Ce lieu est principalement utilisé pour la rédaction, l'envoi et la réception de documents liés à l'administration des domaines."
 chancery_records:0 "Archives de chancellerie"
 chancery_records_desc:0 "L'essor des chancelleries les ayant rendues plus complexes à gérer que jamais, la création d'un niveau d'administration supplémentaire s'est avérée nécessaire. Il s'agit des archives de chancellerie, un bureau chargé de conserver toutes les lettres qu'elle reçoit, ainsi qu'une copie des documents rédigés par ses scribes et notaires."
 chartered_companies:0 "Compagnies à charte"
 chartered_companies_desc:0 "Le monde est vaste, et pour développer notre commerce, il convient parfois de prendre des risques importants. Heureusement, certains marchands sont prêts à le faire, en recourant presque uniquement à leurs propres moyens. En homologuant ces compagnies par le biais d'une charte gouvernementale, qui leur accorde le droit d'exercer certains droits régaliens et de disposer du monopole dans certaines régions bien définies, nous pouvons contrôler et encourager le développement du commerce, depuis le maintien de contacts à l'étranger jusqu'à nos possessions coloniales d'outre-mer."
 chasqui:0 "Chasquis"
 chasqui_desc:0 "Les chasquis sont les messagers de notre État. Sélectionnés parmi des coureurs les plus athlétiques et les plus endurants du pays, ces hommes agiles transportent des quipous, des messages, des présents et autres sortes d'informations qu'ils remettent à leurs destinataires. La propagation des idées et le cœur de notre diplomatie reposent sur leurs épaules."
 chg_border_wars:0 "Guerres incessantes aux frontières"
 chg_border_wars_desc:0 "Entourés de populations hostiles, nous sommes confrontés à une lutte constante pour maintenir nos frontières. Nos soldats, toujours vigilants, ont de nombreuses occasions d'affiner leurs compétences au combat, donnant naissance à un peuple de guerriers aguerris, prêts à reprendre l'héritage du Grand $rank_kingdom_horde_ruler_suffix_male$."
 chg_chagatai_riders:0 "Cavaliers de Tchaghataï"
 chg_chagatai_riders_desc:0 "Les chevaux de $genghis_khan_name_no_tooltip$ ont piétiné tous les territoires, de l'Europe à la Chine. En tant qu'héritiers et successeurs, notre cavalerie inspirera la même crainte à nos ennemis."
 chg_glory_of_conquest:0 "La gloire de la conquête"
 chg_glory_of_conquest_desc:0 "Que l'on sache qu'un garçon ne peut être un homme s'il n'a pas chevauché le premier avec notre invincible armée, qu'il ne peut pas prendre femme s'il n'a pas pris la femme d'un autre, qu'il n'est pas digne d'une hutte s'il n'a pas brûlé celle d'un autre."
 chg_legacy_of_chagatai:0 "Héritage de Tchaghataï"
 chg_legacy_of_chagatai_desc:0 "L'héritage de $genghis_khan_name_no_tooltip$ est le nôtre par l'intermédiaire de son fils Tchaghataï. Tous trembleront devant nous lorsque nous retrouverons sa gloire."
 chg_scheming_court:0 "Machinations de la cour"
 chg_scheming_court_desc:0 "Les luttes de pouvoir incessantes entre les différents princes, nobles locaux, villes et tribus du khânat de Tchaghataï ont donné naissance à une nation de comploteurs très habiles. Si nous parvenons à mettre de côté nos querelles et à canaliser cette énergie pour être plus malins que nos ennemis, notre peuple en bénéficiera grandement."
 chg_sons_of_chagatai:0 "Fils de Tchaghataï $rank_kingdom_horde_ruler_suffix_male$"
 chg_sons_of_chagatai_desc:0 "Nous pouvons remonter jusqu'à Tchaghataï $rank_kingdom_horde_ruler_suffix_male$, le deuxième fils de $genghis_khan_name_no_tooltip$, qui a jadis régné sur ces terres et établi un puissant État successeur des Mongols. Malgré le temps passé, nous pouvons encore revendiquer une légitimité considérable en faisant appel à l'héritage de notre ancêtre."
 chg_the_mountain_khanate:0 "Le khânat de la montagne"
 chg_the_mountain_khanate_desc:0 "Nous sommes abrités entre le lac Balkhach et les montagnes du Tiānshān. C'est une terre rude et impitoyable, que notre peuple peut utiliser comme une arme contre les envahisseurs potentiels."
 chg_tradition_of_conquest:0 "Tradition de conquête"
 chg_tradition_of_conquest_desc:0 "La conquête des peuples peut s'avérer délicate, car tout le monde n'est pas prêt à accepter notre gouvernement éclairé. Pourtant, nous avons découvert qu'il existe des moyens plus simples que la construction d'une montagne de crânes pour amener les gens dans notre empire. Une chose que nos ancêtres n'ont jamais apprise."
 chg_unrelenting_horde:0 "Une horde implacable"
 chg_unrelenting_horde_desc:0 "Nos armées marcheront comme les grandes hordes de $genghis_khan_name_no_tooltip$. Nos troupes piétineront nos ennemis sous nos sabots comme les brins d'herbe de nos steppes natales. Tous craindront la puissance de nos armées !"
 chi_great_rivers_of_china:0 "Fleuves fertiles"
 chi_great_rivers_of_china_desc:0 "Si les grands fleuves qui traversent nos terres sont dangereux, ils offrent aussi d'immenses opportunités pour produire d'abondantes récoltes."
 chi_legitimate_claimant:0 "Revendication du mandat céleste"
 chi_legitimate_claimant_desc:0 "Malgré nos humbles origines, nous avons prouvé notre capacité à diriger et inspirer nos nombreux et fidèles sujets. Nous sommes désormais reconnus comme des prétendants légitimes au mandat céleste et à l'Empire du Milieu."
 chinampas:0 "Chinampas"
 chinampas_desc:0 "Entre notre maîtrise du terrassement des collines pour la cultivation, et notre talent pour créer des terres arables autour de lacs peu profonds grâce à d'ingénieuses #italic chinampas#!, les grandes compétences agricoles de notre peuple vont énormément profiter à notre société."
 chinese_siege_engineers:0 "Sièges planifiés"
 chinese_siege_engineers_desc:0 "Les murs de nos forteresses et de nos villes, épais et solides, résistent même à nos meilleures armes de siège. Nos ingénieurs ont donc dû développer des tactiques et des stratégies variées pour venir à bout des positions fortifiées."
 christianization_of_the_slavs:0 "Christianisation des Slaves"
 christianization_of_the_slavs_desc:0 "Les habitants de la Ruthénie de Kiev ont été parmi les premiers $slavic_group$s de l'est à accepter la lumière du Christ et à se convertir à l'$orthodox$. De là, la foi s'est largement répandue au sein des peuples de l'est."
 church_attendance_duty:0 "Obligation d'assister aux cérémonies"
 church_attendance_duty_desc:0 "Nul doute n'est permis : adopter une politique de présence obligatoire aux cérémonies du culte permettra de mettre l'accent sur les valeurs et croyances de notre religion, diminuant ainsi incontestablement le coût du maintien de l'ordre."
 church_councils:0 "Conciles de l'Église"
 church_councils_desc:0 "Dans la mesure où l'Église doit être unifiée, toute question ne pouvant être résolue par un évêque requiert la tenue d'un concile, durant lequel les évêques sondent l'esprit de l'Église elle-même. Ainsi, les décisions des conciles reflètent le consensus de l'Église dans son ensemble."
 church_guidance:0 "Sagesse de l'Église"
 church_guidance_desc:0 "Les Écritures sacrées sont la parole de Dieu, mais seule l'Église est capable d'interpréter leur sens exact et d'en informer les fidèles. Toute lecture ou interprétation indépendante de la Bible non approuvée par l'Église ne conduirait qu'à l'égarement religieux et à l'hérésie."
 cir_city_and_fortress:0 "Villes fortifiées"
 cir_city_and_fortress_desc:0 "Nos bourgs et villages sont sans protection et constituent une proie facile pour tout envahisseur. Au fur et à mesure de leur développement, nous intégrerons les reliefs accidentés à nos lignes de défense, afin de renforcer leur sécurité. Si nécessaire, nous façonnerons nous-mêmes les hauteurs requises pour préserver les foyers de notre peuple."
 cir_grand_prince_of_circassia:0 "Grande principauté"
 cir_grand_prince_of_circassia_desc:0 "Pour unifier notre peuple, nous élirons le plus éminent de nos seigneurs comme grand-prince, une figure dirigeante capable d'inspirer nos troupes."
 cir_horsemen_of_the_steppe:0 "Cavaliers aguerris"
 cir_horsemen_of_the_steppe_desc:0 "Notre position à la lisière de la grande steppe européenne nous a exposés à de nombreuses invasions de cavaliers. Pour assurer notre indépendance, nous devons lever une puissante armée et étendre notre influence sur les steppes, garantissant ainsi la prospérité du cœur historique de notre pays."
 cir_mercenary_employment:0 "Mercenaires circassiens"
 cir_mercenary_employment_desc:0 "Nos terres ont été maintes fois razziées par des puissances étrangères, réduisant notre peuple en esclavage. Certains de ces captifs, devenus soldats, ont gravi les échelons dans des contrées lointaines où ils ont accumulé pouvoir et richesses. En faisant preuve d'habileté, nous pourrions les convaincre de revenir défendre nos terres contre de futures invasions."
 cir_multireligious_society:0 "Coexistence religieuse"
 cir_multireligious_society_desc:0 "Nos terres, fréquentées par des catholiques, des musulmans et des orthodoxes, sont un carrefour d'échanges. Nous devrions favoriser une tolérance collective entre tous nos sujets, afin de créer un terreau fertile pour la prospérité."
 cir_tribal_elections:0 "Élections tribales"
 cir_tribal_elections_desc:0 "Nous élirons un chef unique pour représenter notre peuple, tout en laissant aux seigneurs locaux la gestion de leurs affaires."
 city_building_advance:0 "Construction urbaine"
 city_building_advance_desc:0 "Le développement des centres-villes, au cœur de l'urbanisation, vise à ériger de grandes étendues de bâtiments complexes."
 city_of_artists:0 "La cité des artistes"
 city_of_artists_desc:0 "Grâce au mécénat des plus grands artistes de ce monde, nous montrerons à tous la gloire de notre ville, et tous s'étonneront de la grandeur de nos peintres, poètes, chanteurs et acteurs. Faisons de la culture napolitaine celle à laquelle voudront se mesurer tous les autres foyers artistiques !"
 city_of_churches:0 "La cité des églises"
 city_of_churches_desc:0 "Novgorod compte plus de 80 églises orthodoxes, notamment la Dom Svyatoï Sofii, ou cathédrale Sainte-Sophie, qui font partie des plus grands propriétaires terriens de la principauté. Par leur opulence et leur prestige religieux, elles influencent la population de bien des manières, rendant nos citoyens plus pieux."
 city_of_scholars:0 "La cité des lettrés"
 city_of_scholars_desc:0 "Tlemcen est depuis longtemps un centre d'enseignement islamique et d'échanges intellectuels. Nos madrasas attirent des érudits de tout le Maghreb et d'Al-Andalus, nourrissant pour les générations futures le progrès scientifique et théologique."
 civil_servants:0 "Fonction publique"
 civil_servants_desc:0 "L'établissement d'un corps de fonctionnaires composé de jeunes bureaucrates dynamiques nous assurerait une adaptation prompte à toute nouvelle condition qui pourrait influer sur l'administration et le gouvernement."
 claim_fabrication:0 "Revendications falsifiées"
 claim_fabrication_desc:0 "Il est facile de prétendre que quelque chose est à soi ; en revanche, persuader tout le monde que c'est bien le cas l'est beaucoup moins. En étendant grandement notre réseau diplomatique, nous nous assurons que ceux qui comptent savent que nos prétentions sont fondées."
 clearing_house_advance:0 "Centre d'échange"
 clearing_house_advance_desc:0 "$clearing_house_desc$"
 clergy_rights_laws_advance:0 "$clergy_rights_laws$"
 clergy_rights_laws_advance_desc:0 "$clergy_rights_laws_desc$"
 cli_the_counts_ambition:0 "L'ambition du comte"
 cli_the_counts_ambition_desc:0 "Grâce à une maîtrise exemplaire de la diplomatie matrimoniale et à une loyauté sans faille envers les empereurs du Saint-Empire romain germanique, nous sommes passés de seigneurs locaux à princes du Saint-Empire. En assurant des liens matrimoniaux avec les trônes de nos voisins, nous nous sommes positionnés comme l'indispensable « bouclier du Sud ». Cette ascension fulgurante nous confère le prestige nécessaire pour exiger le respect des plus grandes maisons d'Europe."
 cli_the_last_counts_legacy:0 "L'héritage du dernier comte"
 cli_the_last_counts_legacy_desc:0 "À la suite de notre implication profonde dans les successions de nos voisins, nous formalisons nos droits légaux pour superviser la frontière sud de l'Empire en tant que protecteurs principaux du royaume. Même lorsque nos rivaux tentent d'absorber nos terres, les structures administratives et le statut d'« immédiat impérial » que nous avons acquis garantissent que notre territoire demeure un centre privilégié de gouvernance régionale."
 cli_the_marble_palaces_of_celje:0 "Les palais de marbre de Celje"
 cli_the_marble_palaces_of_celje_desc:0 "Pour refléter notre statut de princes de l'Empire, nous avons invité des architectes italiens à repenser nos centres urbains dans le grand style baroque. Ces palais et places publiques étendus ne sont pas seulement décoratifs : ils servent de centres administratifs centralisés où la bureaucratie de l'État est professionnalisée. La splendeur même de notre capitale impressionne diplomates étrangers et rivaux domestiques, consolidant ainsi notre droit légitime de gouverner."
 cli_the_modernization_of_a_nation:0 "La modernisation d'une nation"
 cli_the_modernization_of_a_nation_desc:0 "Nos vallées ancestrales ont été transformées d'une terre pastorale féodale en cœur industriel de notre royaume. Nous avons saisi cet élan en établissant d'immenses industries, accompagnées de moulins modernes à vapeur qui transforment le bois brut et le fer des montagnes environnantes. Cette modernisation rapide a créé une nouvelle classe d'ouvriers qualifiés et d'ingénieurs, faisant de notre capitale un centre d'innovation technologique qui propulse l'ensemble de l'État dans l'ère industrielle."
 cli_the_sanneck_condottieri:0 "Les condottieres de Sanneck"
 cli_the_sanneck_condottieri_desc:0 "Avant de devenir princes de l'Empire, la maison de Cilli se définissait par les lames acérées des chevaliers de Sanneck. En commandant des compagnies de mercenaires d'élite pour les couronnes hongroise et impériale dans les plaines de Dalmatie et d'Italie, nous avons transformé le « contrat de guerre » en un outil d'élévation dynastique. Cette tradition de service militaire professionnel nous permet de déployer des mercenaires supérieurs à une fraction du coût."
 cli_the_windic_march_arsenal:0 "L'arsenal de la marche windique"
 cli_the_windic_march_arsenal_desc:0 "En tant que seigneurs principaux de la frontière sud, nous avons transformé nos domaines en une chaîne d'approvisionnement militaire permanente. En patronnant les forges de la vallée de la Savinja, nous veillons à ce que notre cavalerie lourde et nos garde-frontières soient équipés des meilleures armures et armes à feu fabriquées en Haute-Autriche intérieure. Cette industrie militaire localisée réduit notre dépendance aux armements étrangers et maintient nos régiments prêts au combat en permanence."
 close_subjects:0 "Sujets proches"
 close_subjects_desc:0 "Nos sujets font partie intégrante de notre nation. Nous entretenons des liens étroits avec eux et ils sont intégrés dans notre administration."
 cloth_manufactory_advance:0 "Manufacture de tissus"
 cloth_manufactory_advance_desc:0 "$cloth_manufactory_desc$"
 cloth_workshop_advance:0 "$cloth_workshop$"
 cloth_workshop_advance_desc:0 "$cloth_workshop_desc$"
 coal_improvements_absolutism:0 "Amélioration de la cokéfaction"
 coal_improvements_absolutism_desc:0 "En rationalisant le processus de raffinage du charbon extrait, nous pourrons alors l'utiliser plus efficacement comme combustible et sans effets secondaires sur les autres produits."
 coal_improvements_revolutions:0 "Fours à ruche améliorés"
 coal_improvements_revolutions_desc:0 "Pour la production de coke, élément vital de notre transformation du fer, nous avons besoin de grandes quantités de fours à ruche. Grâce à des améliorations dans leur construction et l'utilisation de briques, nous serons capables d'élever la qualité du coke produit."
 coastal_fort_advance:0 "Fort côtier"
 coastal_fort_advance_desc:0 "$coastal_fort_desc$"
 coastal_trade_routes_advance:0 "Expansion côtière"
 coastal_trade_routes_advance_desc:0 "Le moyen le plus sûr de naviguer pour un navire est de le faire près des côtes. À moins de devoir traverser la mer, il n'est pas nécessaire de s'éloigner de la côte et de perdre cette mesure protectrice, et c'est toujours plus rapide que de passer par la terre. Ainsi, favoriser un flux constant de navires le long de nos côtes permettra de faciliter la circulation des marchandises et des personnes."
 codified_laws:0 "Lois codifiées"
 codified_laws_desc:0 "Les lois et réglementations sont le moteur d'une société fonctionnelle. Si nous voulons améliorer notre efficacité et nos capacités intérieures, il est vital que nous définissions un ensemble de lois solides et codifiées."
 coffea_arabica:0 "Coffea Arabica"
 coffea_arabica_desc:0 "Bien que d'autres aient tenté de transplanter notre précieux grain, le café d'Arabie reste inégalé en saveur et en renom. Des docks animés de Moka aux cours de lointains souverains étrangers, le monde ne peut assouvir sa soif de notre breuvage."
 coke_blast_furnace:0 "Haut fourneau au coke"
 coke_blast_furnace_desc:0 "Il s'agit d'un nouveau type de haut fourneau, qui utilise du coke au lieu du charbon de bois comme combustible. Il est non seulement moins cher, mais il permet également de construire des fours plus grands. Il présente cependant l'inconvénient de contenir plus d'impuretés que le charbon de bois, un problème qui n'a pas encore trouvé de solution."
 coke_smelting:0 "Combustion du coke"
 coke_smelting_desc:0 "L'invention de la combustion du coke, et plus particulièrement son application à la production de fer et d'acier, sont étroitement liées à la Révolution industrielle. Le fer et l'acier sont actuellement produits à l'aide de méthodes traditionnelles telles que la combustion du charbon de bois, alors que cette nouvelle méthode permettra d'améliorer le rendement et de réduire les coûts d'entretien."
 colonial_administration_advance:0 "$colonial_administration$"
 colonial_administration_advance_desc:0 "$colonial_administration_desc$"
 colonial_ambition:0 "Ambitions coloniales"
 colonial_ambition_desc:0 "Nombre de nos concitoyens se sont installés dans le Nouveau Monde pour y commencer une nouvelle vie, pour découvrir les merveilles au-delà de la mer et faire d'un continent sauvage leur foyer. Leur ambition est la nôtre, et nous la portons tout en nous enfonçant de plus en plus loin dans l'inconnu."
 colonial_assembly:0 "Assemblée coloniale"
 colonial_assembly_desc:0 "Une part importante du pouvoir législatif regardant les impôts et le budget du gouvernement a été transférée aux colonies."
 colonial_charters:0 "Chartes coloniales"
 colonial_charters_desc:0 "Ces nouveaux documents garantiront les droits de nos compatriotes lorsqu'ils s'installeront sur les terres sauvages du Nouveau Monde, donneront aux colonies le droit exclusif de gouverner le nouveau territoire et réglementeront leurs relations avec la mère patrie."
 colonial_heritage:0 "Héritage colonial"
 colonial_heritage_desc:0 "En tant que colonie de la mère patrie, nous portons l'héritage de ses ambitions impériales."
 colonial_militia:0 "Milice coloniale"
 colonial_militia_desc:0 "En l'absence de garnisons permanentes, les milices coloniales jouent un rôle important dans les conflits locaux et les raids frontaliers contre les tribus indigènes et les autres colonies. Elles sont constituées de citoyens hommes adultes, souvent censés fournir leurs propres armes et leur propre matériel."
 colonial_policy_advance:0 "Politique coloniale"
 colonial_policy_advance_desc:0 "Les nouveaux territoires et marches frontalières où s'installe notre peuple requièrent de nouvelles formes de gestion et d'organisation des colonies."
 colonial_tradition:0 "Traditions coloniales"
 colonial_tradition_desc:0 "Notre État est formé et façonné par les grandes ambitions des pères fondateurs, les premiers colons de la mère patrie. Nombre de leurs coutumes et traditions font partie intégrante de notre société dans ce monde nouveau et étrange."
 colonial_ventures:0 "Entreprises coloniales"
 colonial_ventures_desc:0 "Ces entreprises nous permettent d'envoyer davantage de colonisateurs dans les territoires inexplorés."
 colonies:0 "colonies"
 colonies_desc:0 "Qu'il s'agisse d'envoyer nos propres citoyens s'installer sur de nouvelles terres, d'établir des indigènes dans un endroit donné sous notre domination ou d'une combinaison des deux, une colonie représente un point d'ancrage de notre propre pouvoir dans une région, qui nous permettra d'étendre encore davantage notre contrôle."
 columns_of_gediminids:0 "Les colonnes de Gédiminas"
 columns_of_gediminids_desc:0 "La fierté de notre peuple et les armoiries qui ornent nos bannières trouvent leur origine dans l'une de nos dynasties les plus célèbres et les plus prospères, les Gédiminides. La plupart d'entre eux ont su conduire notre nation à travers des périodes turbulentes vers la prospérité, grâce à un sens aigu des affaires publiques et à des conseillers avisés. Les colonnes de ces grands dirigeants symbolisent les fondations solides et la ténacité de notre pays et de nos concitoyens."
 combined_arms_advance_reformation:0 "Combat interarmes"
 combined_arms_advance_reformation_desc:0 "La guerre devient de plus en plus complexe, en raison de la généralisation des armées permanentes composées de soldats engagés à vie. L'introduction de nouvelles armes, telles que les armes à feu et les canons, encourage l'adoption d'une approche équilibrée en termes de proportion entre infanterie légère, infanterie lourde, cavalerie et artillerie, soutenues par des unités auxiliaires."
 combined_arms_advance_revolutions:0 "Combat interarmes avancé"
 combined_arms_advance_revolutions_desc:0 "L'utilisation régulière de stratégies interarmes pendant plusieurs siècles a conduit à la prédominance de ce type de guerre. L'infanterie et la cavalerie légères ont pour rôle d'affaiblir et de désorganiser les forces ennemies, tout en protégeant leurs combattants. L'infanterie et la cavalerie lourdes sont en première ligne, cherchant à mener des charges décisives pour mettre l'ennemi en déroute, tandis que l'artillerie et les forces auxiliaires, à l'arrière-garde, les soutiennent à distance."
 comets:0 "Des comètes ?"
 comets_desc:0 "Une œuvre nous a été récemment dédiée par son auteur, Giovanni Ferrerio : #italic De la signification véritable des comètes, et de la vanité des astrologues#!. Nous avons décrété que tous devraient en connaître le contenu."
 commerce_center_advance:0 "$commerce_center$"
 commerce_center_advance_desc:0 "$commerce_center_desc$"
 community_of_the_faithful:0 "Domaine polyglotte"
 community_of_the_faithful_desc:0 "Notre empire abrite des gens issus de bien des origines. Ils parlent une multitude de langues, viennent de différents horizons, mais tous, dans la langue qui est la leur, honorent notre dirigeant et c'est ce qui nous unit."
 compagnie_d_ordonnance:0 "Compagnies d'ordonnance"
 compagnie_d_ordonnance_desc:0 "Notre dépendance aux levées féodales s'est révélée inadaptée aux exigences de la guerre moderne. La création d'unités de cavalerie sous contrat permanent, la $compagnie_d_ordonnance$, nous offre une force militaire fiable et professionnelle, fidèle à la Couronne."
 competetive_merchants:0 "Marchands performants"
 competetive_merchants_desc:0 "Pour remporter des marchés, nous devons l'emporter sur la concurrence des autres nations. Nos lois doivent donner à nos marchands tous les avantages possibles."
 comprehensive_land_survey:0 "Cadastre exhaustif"
 comprehensive_land_survey_desc:0 "Pour savoir qui doit payer l'impôt, nous devons d'abord savoir qui possède quoi. C'est pourquoi il est essentiel de mettre en place un cadastre exhaustif et de s'assurer qu'il soit tenu à jour. Nous percevrons ainsi tout ce qui nous est dû."
 concentration_power:0 "Concentration du pouvoir"
 concentration_power_desc:0 "Depuis trop longtemps, notre nation est gouvernée par plusieurs stathouders, même si certains détenaient plus de pouvoir que d'autres et agissaient en tant que #italic primus inter pares#!. Il est temps qu'une seule personne détienne le pouvoir transmis de manière héréditaire."
 confessio_augustana:0 "Nouvelle confession"
 confessio_augustana_desc:0 "La Réforme nous offre l'opportunité de définir une nouvelle croyance pour notre peuple et, plus important encore, d'accepter les critiques à son encontre et de l'adapter."
 confessional_court:0 "Cour confessionnaliste"
 confessional_court_desc:0 "Les dépenses à la cour peuvent facilement exploser et mettre en faillite le pays le plus riche. Afin d'atteindre un bon équilibre entre somptuosité et dépenses raisonnables, nous pouvons adopter de petits artifices qui permettront de réduire ces coûts sans entraver la magnificence de notre cour."
 confessionalism_advance:0 "Confessionnalisme"
 confessionalism_advance_desc:0 "Avec l'apparition d'une myriade d'interprétations différentes de ce que doit être la foi, les autorités religieuses et laïques ont de plus en plus intérêt à définir clairement les formes de leurs confessions spécifiques, en appliquant leurs règles et leurs points de vue particuliers sur tous les aspects de la foi et de la vie."
 confucian_academy_advance:0 "Académie confucéenne"
 confucian_academy_advance_desc:0 "$confucian_academy_desc$"
 confucian_influences:0 "Influences confucéennes"
 confucian_influences_desc:0 "Si nous voulons gérer notre royaume correctement, nos conseillers doivent trouver une grande sagesse dans les enseignements de Confucius, l'attention aux détails et la méritocratie pour un gouvernement sain et prospère."
 confucian_school_advance:0 "École confucéenne"
 confucian_school_advance_desc:0 "$confucian_school_desc$"
 confutatio_augustana:0 "Rejeter les fausses confessions"
 confutatio_augustana_desc:0 "En ces temps troublés, nous devons expliquer clairement à nos vassaux ce que nous entendons par pensée hérétique et quelle doctrine tout bon chrétien se doit de suivre."
 congregation_of_merchants:0 "Congrégation de marchands"
 congregation_of_merchants_desc:0 "Qu'ils proviennent d'$arabia_region$, de Chine ou des côtes d'$south_asia$, des marchands de tous horizons convergent vers $malacca$. Attirés par des lois équitables, des eaux sûres et des marchés animés, ils formeront une grande communauté qui enrichira nos ports et fera connaître notre nom à travers les mers."
 connections_with_china:0 "Liens avec la Chine"
 connections_with_china_desc:0 "Nos émissaires ont obtenu la reconnaissance des souverains les plus prestigieux de Chine. Les hommages et la bienveillance sont réciproques, nous accordant prestige, protection ainsi qu'une place privilégiée au sein de leur vaste réseau commercial."
 connections_with_the_christian_world:0 "Liens avec le monde chrétien"
 connections_with_the_christian_world_desc:0 "Bien que notre foi diffère, nous ne devons écarter aucune opportunité. En passant des traités et accords commerciaux avec les États chrétiens, nous ferons preuve de diplomatie et de pragmatisme qui serviront nos intérêts à long terme."
 conquerors_legacy:0 "Héritage du conquérant"
 conquerors_legacy_desc:0 "Notre glorieux empire est né de l'héritage de grands conquérants. C'est la férocité des troupes de $genghis_khan_name_no_tooltip$ qui lui a permis de conquérir de l'$europe$ à la $china$. Nous qui sommes ses successeurs, nos troupes seront aussi redoutables que celles de son armée."
 conquistador_advance:0 "Conquistadors"
 conquistador_advance_desc:0 "La découverte du Nouveau Monde incite les aventuriers de tous horizons à risquer leur vie et leur fortune dans des expéditions incertaines, séduits par les promesses de richesse, de pouvoir et de renommée. Ces expéditions font l'objet d'un accord entre le chef des aventuriers et la Couronne, accord qui les désigne légalement comme « capitulations de conquête »."
 conscription_advance:0 "$a_conscripts$"
 conscription_advance_desc:0 "$a_conscripts_desc$"
 conscription_center_advance:0 "Centre de conscription"
 conscription_center_advance_desc:0 "$conscription_center_desc$"
 consolidate_italian_holdings:0 "Consolidation des possessions italiennes"
 consolidate_italian_holdings_desc:0 "Les Scaligeri ne régnaient pas seulement sur Vérone, mais sur un réseau grandissant de cités en Italie du Nord. Maintenir un tel ensemble exigeait une diplomatie avisée, une délégation habile et des armées professionnelles bien payées. Seul un pouvoir solide pourra permettre à Vérone de rivaliser avec les autres grandes puissances de la péninsule."
 consolidate_the_royal_domain:0 "Le Domaine royal"
 consolidate_the_royal_domain_desc:0 "Nous avons reçu un pays riche en héritage, sans pouvoir atteindre la prospérité pour autant par la faute de lois et de coutumes archaïques. Les dirigeants précédents s'étaient attachés à rendre richesse et noblesse inséparables ; il nous incombe maintenant de rénover ces réglementations. Le renforcement des baronnies et la consolidation des domaines fonciers permettront de mettre sur pied une hiérarchie juridique plus claire. Dans les domaines de la Couronne et en territoire urbain, les cités doivent devenir de véritables centres de puissance, ce qui encouragera la croissance du commerce et de l'artisanat."
 construction_center_advance:0 "$construction_center$"
 construction_center_advance_desc:0 "$construction_center_desc$"
 construction_speed_absolutism:0 "Ingénierie architecturale"
 construction_speed_absolutism_desc:0 "La construction de bâtiments est devenue plus sophistiquée au fil du temps, intégrant des méthodes et techniques issues d'un large éventail de disciplines, généralement considérées comme une forme d'ingénierie."
 construction_speed_discovery:0 "Planches et briques standardisées"
 construction_speed_discovery_desc:0 "La standardisation de la production de planches et de briques à l'aide de techniques plus modernes vise à faciliter et simplifier la construction des bâtiments."
 construction_speed_reformation:0 "Traités architecturaux"
 construction_speed_reformation_desc:0 "La rédaction de traités d'architecture, qui compilent souvent un savoir vieux de plusieurs siècles, permet un apprentissage plus rapide et la diffusion des techniques de construction les plus efficaces."
 construction_speed_renaissance:0 "Guildes de maçons"
 construction_speed_renaissance_desc:0 "Les francs-maçons s'appuient sur des associations plus larges, appelées guildes, pour partager et préserver leur savoir et leur expérience, dans un système où les maçons vétérans enseignent aux jeunes apprentis."
 construction_speed_revolutions:0 "Structures en fer forgé"
 construction_speed_revolutions_desc:0 "Le développement d'une métallurgie plus avancée du fer forgé et du fer coulé permet de réaliser des structures métalliques plus élaborées, comme des piliers et des colonnes, ce qui accélère considérablement la construction des bâtiments."
 construction_speed_traditions:0 "Maîtres maçons"
 construction_speed_traditions_desc:0 "Nos efforts de construction ne doivent jamais s'arrêter ni laisser nos villages et nos villes inactifs. En employant un maître maçon chargé de superviser et de planifier nos travaux, nous pouvons réaliser des avancées significatives dans l'expansion de notre pays."
 contacts_network:0 "Réseau de contacts"
 contacts_network_desc:0 "La diffusion de l'$muslim$ à très grande échelle a permis aux pays $muslim_ADJ$s d'entrer en contact avec de nombreuses contrées lointaines. L'entretien d'un important réseau de contacts sera toujours bénéfique sur le plan diplomatique."
 continental_trade:0 "Commerce continental"
 continental_trade_desc:0 "Si les colonies du Nouveau Monde ont dû importer de nombreux produits manufacturés, elles sont en retour devenues d'importantes fournisseuses de matières premières pour le marché européen."
 continue_missionary_works:0 "Missionnariat"
 continue_missionary_works_desc:0 "L'œuvre sacrée visant à propager notre foi aux confins du monde ne pourra jamais être considérée comme terminée. Nous devons donc financer davantage de missions afin de répandre la bonne parole du catholicisme."
 control_of_the_red_sea:0 "Contrôle de la mer Rouge"
 control_of_the_red_sea_desc:0 "Le commerce en provenance d'Inde et d'Afrique doit emprunter la Porte des Lamentations. Affirmons notre domination sur ce goulet d'étranglement maritime et transformons chaque navire de passage en une opportunité."
 control_the_malacca_strait:0 "Contrôler le détroit de Malacca"
 control_the_malacca_strait_desc:0 "L'étroit $inner_strait_malacca$ est l'épine dorsale de notre commerce maritime. En contrôlant ce couloir maritime vital, nous sommes en mesure d'orienter les nations ainsi que leurs richesses vers nos ports et de nous imposer comme les gardiens incontestés du commerce est-ouest."
 conviction_of_sin:0 "Condamnation du péché"
 conviction_of_sin_desc:0 "Ils s'inclineront, ceux qui ont fait le mal. Le lourd poids de leurs actes infects les hantera éternellement. Jamais ils ne pourront dormir sur leurs deux oreilles tant qu'ils n'auront pas regretté les cauchemars perfides qu'ils ont suscités."
 copper_bottoms:0 "Doublage en cuivre"
 copper_bottoms_desc:0 "Le bois est assurément le matériau idéal lorsqu'il s'agit de construire un navire, mais il a aussi tendance à se détériorer avec le temps. En doublant les coques de nos navires avec des plaques de cuivre placées en dessous du niveau de flottaison, nous pouvons réduire cette détérioration et rendre nos vaisseaux aptes à de longs voyages."
 copperworking:0 "Travail du cuivre"
 copperworking_desc:0 "Nos artisans ont commencé à fabriquer des outils à partir des métaux trouvés sur nos terres. Maîtriser cet art nous conférera un avantage de taille sur nos voisins."
 cork_stoppers:0 "Bouchons de liège"
 cork_stoppers_desc:0 "Des améliorations techniques en bouteillerie ont permis aux producteurs de vin de créer des bouteilles plus standardisées, permettant de réintroduire l'usage des bouchons de liège. C'est une manière bien plus efficace de sceller le vin que les anciens bouchons de tissu, ce qui signifie que le vin peut être transporté beaucoup plus loin désormais qu'on ne l'aurait jamais cru possible auparavant. Peut-être assiste-t-on à la naissance d'une industrie vinicole mondiale ?"
 corona_regni_poloniae:0 "Corona Regni Poloniae"
 corona_regni_poloniae_desc:0 "L'idée que le royaume est indivisible et qu'il est la propriété commune, non pas d'une dynastie ou d'un monarque, mais de l'ensemble de la communauté politique au sein de notre domaine, est bien ancrée entre nous et les différents ducs sous notre bannière."
 corps_organisation:0 "Esprit de corps"
 corps_organisation_desc:0 "Par tradition, les armées usent d'une discipline de fer pour maintenir l'ordre dans les rangs. Pourtant, mettre en valeur l'orgueil des unités permet d'avoir une discipline meilleure encore."
 correct_box_advance_absolutism:0 "Formations de combat flexibles"
 correct_box_advance_absolutism_desc:0 "De nouvelles tactiques ont été mises au point, offrant une plus grande flexibilité et une meilleure coordination des unités d'infanterie, de cavalerie et d'artillerie sur le champ de bataille, généralement regroupées en brigades."
 correct_box_advance_discovery:0 "Lieutenants"
 correct_box_advance_discovery_desc:0 "Tandis que les armées professionnelles se développent, les officiers dirigent des bataillons de plus en plus importants. Pour aider ces officiers, les lieutenants transmettent leurs ordres et commandent de petites unités sur le champ de bataille."
 correct_box_advance_reformation:0 "Organisation régimentaire"
 correct_box_advance_reformation_desc:0 "Les armées professionnelles ont permis l'établissement d'un nouveau type d'unité militaire, le régiment, qui offre non seulement un foyer permanent aux soldats, mais propose aussi une formation de combat utile."
 correct_box_advance_renaissance:0 "Officiers"
 correct_box_advance_renaissance_desc:0 "Le développement des armées professionnelles a conduit à l'affectation d'officiers permanents à nos bataillons, nommés directement par le souverain."
 correct_box_advance_revolutions:0 "État-major"
 correct_box_advance_revolutions_desc:0 "Tandis que nos armées ne cessent de croître et nos campagnes militaires de s'allonger, le besoin d'affecter des officiers fixes à la planification et à la logistique s'est fait ressentir, permettant une meilleure coordination des différents corps d'armée sur le champ de bataille."
 cosmopolitan_court:0 "Cour cosmopolite"
 cosmopolitan_court_desc:0 "Des gens du monde entier viennent admirer notre tribunal $muslim_ADJ$. L'attrait d'un tel tribunal ne se dément pas, ce qui permet la présence dans nos salles d'une grande variété de talents."
 cossack_administration:0 "Administration cosaque"
 cossack_administration_desc:0 "En accordant aux chefs cosaques le double rôle de généraux et d'administrateurs, nous rationaliserons le recrutement de nos armées et leur assurerons une formation de haut niveau."
 cossack_raids:0 "Raids cosaques"
 cossack_raids_desc:0 "Nos cosaques, qui vivent dans un état de guerre quasi permanent, ont adopté des tactiques de raid et de pillage semblables à celles des hordes. Même si cela ne leur vaut pas beaucoup d'amis, c'est un moyen sûr de remplir nos coffres."
 cossack_reputation:0 "Réputation des cosaques"
 cossack_reputation_desc:0 "Nos cosaques se sont déjà forgé une réputation de guerriers féroces. Cela suffit à inspirer la peur dans le cœur de nos ennemis lorsqu'ils doivent les affronter au combat."
 cossacks_colonization_advance:0 "Colonisation cosaque"
 cossacks_colonization_advance_desc:0 "Nos cosaques ont déjà pour habitude de se déplacer librement au-delà de nos frontières. Nous pouvons nous servir d'eux pour accroître nos colonies et ainsi étendre notre influence sur ces terres non revendiquées."
 cossacks_escaped_serfs:0 "Serfs en fuite"
 cossacks_escaped_serfs_desc:0 "Beaucoup de cosaques sont nés dans le servage. Lassés de l'oppression féodale, ils ont fui leurs maîtres pour trouver une vie de liberté dans les steppes. Nous devons continuer à accueillir les serfs en fuite dans notre société."
 cossacks_exploration_advance:0 "Explorations cosaques"
 cossacks_exploration_advance_desc:0 "Les cosaques vivent aux franges de notre nation. Cela fait d'eux des candidats idéaux pour explorer et s'aventurer au-delà de nos frontières, découvrir de nouveaux territoires étranges, d'autres civilisations, et, au mépris du danger, avancer vers l'inconnu."
 cossacks_hetmanate:0 "Hetmanat cosaque"
 cossacks_hetmanate_desc:0 "Il n'y a ni roi ni khan chez les cosaques. Ils sont dirigés par l'ataman, qui est leur plus haut commandant militaire, mais pour ce qui concerne les affaires de l'État et la société il n'est que le premier parmi ses pairs. Le pouvoir politique se trouve à la Rada, l'assemblée législative et militaire, au sein de laquelle tout cosaque a le droit de parole."
 cossacks_military_society:0 "Société militaire"
 cossacks_military_society_desc:0 "Chez les cosaques, il n'y a pratiquement pas de division entre la société civile et la société militaire. Leur nation est une armée, définie par son peuple plutôt que par les terres qu'ils contrôlent, et leur peuple est constitué de guerriers. Nous devons veiller à ce que les divisions militaires répondent correctement à nos besoins administratifs au fur et à mesure de l'expansion de cette armée."
 cossacks_recruitment:0 "Recrutement des cosaques"
 cossacks_recruitment_desc:0 "Les cosaques sont des guerriers redoutables, capables de survivre comme personne dans les steppes hostiles. Au sein de notre État et de notre armée, ils trouveront leur place de force d'élite qui assurera notre domination sur les steppes."
 cossacks_registered:0 "Registres cosaques"
 cossacks_registered_desc:0 "Alors que les rangs de nos cosaques s'étoffent, nous devons tenir le compte de la force de chaque unité, de leurs effectifs et de leurs approvisionnements. Un registre centralisé nous permettra de répondre aux besoins de chaque cosaque."
 cossacks_serf_autonomy:0 "Autonomie des serfs cosaques"
 cossacks_serf_autonomy_desc:0 "Parmi les cosaques, aucun homme ne doit souffrir de la tyrannie. Lorsque nous conquérons de nouveaux territoires, les serfs, les paysans et les esclaves qui s'y trouvent doivent être traités sur un pied d'égalité avec nos propres cosaques."
 council_hall_advance:0 "$council_hall$"
 council_hall_advance_desc:0 "$council_hall_desc$"
 council_of_elders:0 "Conseil des anciens"
 council_of_elders_desc:0 "Le gouvernement de notre tribu existe pour veiller à ce que tous ses membres puissent faire entendre leur voix et leur avis en toutes choses. Collaborer pour gérer au mieux la terre permet d'envisager des perspectives nouvelles."
 council_of_three_lands_advance:0 "Conseil des Trois Pays"
 council_of_three_lands_advance_desc:0 "Notre pays accueille depuis très longtemps des Juifs démunis et persécutés. À cette fin, un conseil qui s'occupera de leurs besoins et protégera leurs droits ne pourra que bénéficier à notre stabilité et à notre force spirituelle."
 counter_espionage_action_advance:0 "Accès plus strict à l'information"
 counter_espionage_action_advance_desc:0 "Nous ne serons jamais performants dans les domaines diplomatiques ou militaires si tous nos secrets et toutes les questions discutées en privé peuvent être divulgués à des pays étrangers. Il nous faut renforcer les contrôles sur la circulation de nos informations afin de colmater rapidement toute fuite éventuelle."
 counter_espionage_building_country_advance:0 "Codes secrets"
 counter_espionage_building_country_advance_desc:0 "Il est bien connu que nos activités attirent l'œil d'individus quelque peu douteux. Si nous voulons éloigner ces regards curieux, nous devons chiffrer nos communications."
 counting_house_advance:0 "Chambre des comptes"
 counting_house_advance_desc:0 "$counting_house_desc$"
 counting_the_people:0 "Recensement"
 counting_the_people_desc:0 "Maintenant que nous savons qui possède quoi, la suite logique est de savoir qui vit où. Nous saurons ainsi où chercher lorsque nous aurons besoin d'hommes pour nos armées."
 country_unification_advance:0 "Supervision des vassaux"
 country_unification_advance_desc:0 "Plus tôt nous commencerons à intégrer l'administration de nos vassaux pour qu'ils suivent nos règles, plus il sera facile de les intégrer dans les autres domaines. La création d'une liaison permanente avec eux facilitera grandement ce processus."
 court_accounting:0 "Comptabilité de la cour"
 court_accounting_desc:0 "La cour est le symbole du pays, et sa prospérité représente la prospérité du pays. Cependant, cela ne signifie pas que la cour peut dépenser plus que le pays peut offrir et il devrait exister à la cour une comptabilité capable de superviser les dépenses."
 court_of_great_refugees:0 "Cour des grands réfugiés"
 court_of_great_refugees_desc:0 "Notre grande capitale est devenue un refuge pour les artistes, les exilés et les penseurs, chassés par la guerre, la foi ou les bouleversements politiques en Italie. Ils sont appelés à enrichir les cours de la cité de techniques inédites, d'idées audacieuses et de courants culturels croisés, faisant de Vérone un sanctuaire pour l'innovation en des temps troublés."
 courtly_competition:0 "Compétition de cour"
 courtly_competition_desc:0 "Un noble préoccupé est un noble utile. Notre royaume compte tant de titres de cour que certains affirment que la moitié de nos hommes en détiennent un. Assurons-nous que nos courtisans consacrent leur énergie à se concurrencer pour attirer notre attention et gagner en visibilité, plutôt qu'à remettre en question notre autorité."
 cradle_of_monasticism:0 "Berceau du monachisme"
 cradle_of_monasticism_desc:0 "La tradition monastique du $christian$ est née en $egypt_region$, lorsque les fidèles $christian_ADJ$s se rendaient dans le désert pour prier et consacrer leur vie à Dieu. Le $miaphysite$ peut revendiquer ce berceau comme étant le sien, de par la tradition alexandrine."
 create_the_regimental_system:0 "Création d'un système de régiments"
 create_the_regimental_system_desc:0 "Pour assurer un recrutement et un approvisionnement cohérents, nous devons mettre en place un système régimentaire. Cette réforme nous permettra d'organiser plus les effectifs, de centraliser les structures de commandement et de réduire la dépendance à l'égard des nobles locaux et des mercenaires étrangers."
 cri_devshirme_of_the_steppes:0 "Le devchirmé des steppes"
 cri_devshirme_of_the_steppes_desc:0 "Les élites de Crimée ont imité certains aspects des pratiques militaires et administratives ottomanes, mêlant les systèmes turcs et islamiques pour gérer les effectifs et l'efficacité dans le domaine militaire."
 cri_free_cattle_grazing:0 "Pâture libre"
 cri_free_cattle_grazing_desc:0 "Nous ne limitons en rien les pasteurs qui veulent faire brouter leurs troupeaux de chevaux et de bétail. Ils doivent rester libres d'aller et venir comme ils l'entendent, et de traverser la steppe en sécurité pour y faire commerce librement."
 cri_genghisid_legacy:0 "Héritage des Gengissides"
 cri_genghisid_legacy_desc:0 "Nos ancêtres chevauchaient aux côtés de $genghis_khan_name_no_tooltip$ lorsqu'il ravageait tout le monde connu. Depuis lors, nous avons perpétué les traditions militaires et continué d'être gouvernés par les khâns qui prétendent descendre de la lignée gengisside."
 cri_slavers:0 "Esclavagistes des steppes"
 cri_slavers_desc:0 "Le commerce des esclaves peut faire naître des fortunes : les chrétiens tombés entre nos mains peuvent être vendus à bon prix sur les marchés turcs, arabes et persans."
 cri_steppe_commanders:0 "Commandants des steppes"
 cri_steppe_commanders_desc:0 "Les commandants de la cavalerie de Crimée maîtrisent la mobilité, clef de la guerre dans les steppes, mettant à profit la vitesse, les attaques de flanc et les embuscades pour vaincre les armées européennes beaucoup plus lentes."
 cro_antemurale_christianitatis:0 "Antemurale Christianitatis"
 cro_antemurale_christianitatis_desc:0 "Notre identité culturelle s'est forgée dans le feu du « Siècle des Martyrs ». Nous avons endossé le rôle #italic d'Antemurale Christianitatis#! (Bouclier de la Chrétienté), qui a transformé notre lutte militaire en une mission religieuse sacrée. Ce mythe inculque à la population un sens profond et inébranlable du devoir historique, considérant la défense de notre nation comme celle de la civilisation elle-même. Cet « Esprit héroïque » garantit que le feu national demeure vivant même dans nos heures les plus sombres."
 cro_baroque_pietas:0 "Les Pietas baroques"
 cro_baroque_pietas_desc:0 "Notre culture a embrassé un catholicisme baroque intense et spectaculaire, caractérisé par de vastes processions religieuses et la construction de grandioses églises richement ornées. Cette « piété visuelle » constitue une puissante force d'unification qui comble le fossé entre la noblesse urbaine et la paysannerie rurale par le partage de rituels et de manifestations collectives. Cette identité religieuse fervente agit comme un rempart culturel face aux influences protestantes et orientales, garantissant que l'âme croate demeure solidement ancrée dans le monde catholique méditerranéen, tout en défendant les plaines d'Europe centrale."
 cro_influx_of_foreign_knowledge:0 "Afflux de savoirs étrangers"
 cro_influx_of_foreign_knowledge_desc:0 "Les villes côtières sont devenues des centres vibrants de la Renaissance, où érudits et artistes mêlent les influences classiques italiennes à une sensibilité slave distincte. Ce mouvement intellectuel produit de grands penseurs qui contribuent à la science, à la poésie et à la philosophie européennes, preuve que la culture croate est à l'avant-garde de l'époque moderne. Le mécénat des riches familles de marchands permet la construction de cathédrales et de palais magnifiques, transformant notre littoral en phare de haute culture qui attire les plus brillants esprits de l'époque."
 cro_legacy_of_the_trpimirovic:0 "Héritage du Trpimirović"
 cro_legacy_of_the_trpimirovic_desc:0 "Nous nous tournons vers l'âge glorieux de nos rois autochtones, tels que Tomislav et Zvonimir, pour inspirer un sentiment de destin indépendant et de fierté nationale. En retraçant notre lignée et nos institutions jusqu'à ces souverains, nous renforçons notre position diplomatique auprès des cours d'Europe et affirmons notre droit à une Couronne plus ancienne que celle de nombreux voisins. Ce prestige historique impose le respect auprès du Saint-Siège et sert de puissant mythe unificateur, rassemblant les différentes régions du royaume sous une seule et prestigieuse bannière de royauté romano-slave."
 cro_maritime_connections:0 "Les Pacta conventa"
 cro_maritime_connections_desc:0 "Cette assise juridique a officialisé l'union entre les douze tribus nobles de Croatie et la Couronne hongroise. En préservant le droit d'élire le monarque et en maintenant une cérémonie de couronnement distincte avec la Couronne de Zvonimir, nous veillons à ce que la Croatie demeure une entité politique à part entière en cas d'union avec d'autres nations. Cette souveraineté contractuelle empêche une absorption totale par une administration étrangère, permettant à notre noblesse de gérer la justice et la défense intérieure selon ses propres lois anciennes."
 cro_pandurs_recruitment:0 "Pandurs"
 cro_pandurs_recruitment_desc:0 "L'État doit canaliser la férocité de la frontière sans succomber à son chaos. Les $cro_pandurs_recruitment$, autrefois de simples veilleurs de nuit et agents de sécurité locaux, sont réorganisés par des chefs charismatiques en une infanterie légère professionnalisée. Ces soldats constituent un spectacle terrifiant sur les champs de bataille européens, accompagnés de leurs propres formations musicales martiales. Ils sont maîtres des escarmouches, spécialisés dans le pillage des lignes d'approvisionnement, l'écran de l'armée principale et la guerre psychologique. Bien que leur discipline reste erratique et leur propension au butin élevée, ils offrent au souverain un instrument flexible d'intimidation que l'infanterie de ligne conventionnelle ne peut égaler."
 cro_reliance_on_adriatic:0 "Les leçons des Uscoques"
 cro_reliance_on_adriatic_desc:0 "Pour contrer l'avancée de nos ennemis, nous avons transformé nos forteresses côtières en sanctuaire pour les Uscoques, des guerriers réfugiés menant une guerre permanente. Ces unités d'infanterie légère utilisent de petites embarcations rapides pour frapper en raids éclair les lignes d'approvisionnement ennemies, survivant dans le karst accidenté où les armées régulières ne peuvent les poursuivre. Cette politique transforme notre littoral en une « zone interdite » meurtrière pour nos ennemis qui nous fournit une garde frontalière bon marché et farouchement motivée, ne nécessite aucun soutien du trésor central et maintient nos adversaires constamment sur la défensive."
 cro_the_banovac_silver_denar:0 "Le denier d'argent Banovac"
 cro_the_banovac_silver_denar_desc:0 "Nous avons affirmé le droit de #italic Monetaria#!, en établissant un hôtel de la monnaie souverain pour frapper le denier d'argent Banovac. En maintenant une teneur en argent plus élevée que les monnaies voisines, notre pièce est devenue le principal moyen d'échange dans le nord de l'Adriatique et le bassin de la Drava. Cette indépendance financière nous permet de financer notre administration sans dépendre de subsides étrangers, transformant notre cour en un centre financier régional attirant les capitaux ragusains et vénitiens."
 cro_the_bashka_tablet:0 "La tablette de Baška"
 cro_the_bashka_tablet_desc:0 "L'âme culturelle de la Croatie est ancrée dans la « tradition de Zvonimir », où notre histoire est gravée dans la pierre. Nous avons promu la mémoire de nos rois indépendants à travers des poèmes épiques et des chroniques historiques qui instillent une « conscience royale » en chaque paysan et noble. Cette fierté historique garantit que, même sous la domination de rois étrangers, les Croates se considèrent comme partie d'une nation ancienne et souveraine, animée d'une résilience qui permet à notre culture de rester vivante et résistante à l'érosion extérieure."
 cro_the_croatian_press:0 "La presse croate"
 cro_the_croatian_press_desc:0 "Nous avons établi l'une des premières et des plus audacieuses imprimeries du monde slave. En installant notre cœur technologique dans la vallée « impénétrable » de Kosinj, nous garantissons que la production de nos textes sacrés en glagolitique reste protégée des raids maritimes et des escarmouches frontalières qui frappent le littoral. Cette presse n'est pas simplement un outil d'alphabétisation : c'est un laboratoire de survie culturelle où nous forgeons les premiers missels imprimés dans notre langue maternelle. En standardisant notre ancien alphabet grâce à la presse moderne, nous fournissons à chaque paroisse du royaume une source unifiée et incorruptible de nos lois et liturgies. Cela assure que l'identité croate reste intellectuellement fortifiée et spirituellement indépendante, parvenant aux mains de chaque berger et noble, et ancrant l'âme de la nation dans une tradition indigène inébranlable."
 cro_the_jesuit_academy:0 "L'Académie jésuite"
 cro_the_jesuit_academy_desc:0 "Fondée par l'ordre des Jésuites invité dans notre pays, cette académie a évolué d'un gymnase local pour devenir le cœur intellectuel de notre nation. En établissant un programme rigoureux fondé sur la philosophie aristotélicienne, les mathématiques et la rhétorique, l'institution a formé une élite locale de « Croates éclairés », aussi à l'aise dans les salons de Vienne qu'au sein du Sabor. Cette modernisation institutionnelle garantit que notre bureaucratie est dirigée par une classe technocratique capable de naviguer dans les évolutions juridiques et scientifiques complexes de notre siècle."
 cro_the_national_garrison_system:0 "Le système de garnisons nationales"
 cro_the_national_garrison_system_desc:0 "Pour contrer les raids amphibies soudains des flottes ennemies ou les incursions frontalières, nous établirons un système visuel sophistiqué utilisant des signaux de fumée et de feu au sommet des plus hauts pics du Velebit. Cette « garde montagneuse » permettra à nos forteresses de communiquer à travers le relief escarpé en quelques minutes, contournant la lenteur des sentiers alpins. En coordonnant ces signaux avec les garnisons de l'intérieur, nous pourrons mobiliser la nation et renforcer nos défenses avant toute offensive. Cette surveillance en haute altitude transformera les sommets imprenables en une véritable tour de commandement centralisée, garantie qu'aucun ennemi ne peut approcher sans être immédiatement détecté."
 cro_the_royal_council_of_croatia:0 "Le Conseil royal de Croatie"
 cro_the_royal_council_of_croatia_desc:0 "Nous avons établi le #italic Consilium Regium#! dans notre capitale et créé un gouvernement exécutif dédié à la nation croate. Cet organe agira comme un proto-ministère en gérant l'économie, l'éducation et la sécurité intérieure du #italic Royaume triunitaire#!. Cette ère de « gouvernement par conseil » favorisera l'émergence d'une classe professionnelle de fonctionnaires croates qui considèrent l'État comme une machine rationnelle et moderne plutôt que comme un assemblage de privilèges féodaux. L'expérience acquise dans ces cercles de pouvoir fournira l'expertise administrative nécessaire pour permettre au peuple croate de réussir la transition d'un royaume médiéval vers un État-nation européen moderne."
 cro_trade_posts:0 "La tradition épique de Marulić"
 cro_trade_posts_desc:0 "L'âme culturelle de la Croatie a atteint un sommet littéraire avec des œuvres comme #italic Judita#! de Marko Marulić, le « Père de la littérature croate ». En utilisant l'allégorie biblique pour décrire la défense contemporaine de nos terres, Marulić a offert à la nation un modèle de haute culture pour sa survie. Cette littérature crée un pont entre l'urbain de la Renaissance et le soldat des frontières, unifiant toutes les classes sous une mission héroïque commune et assurant la préservation de la langue croate comme langue de haute culture et de débat théologique."
 cro_uniting_the_coast_and_the_inner_lands:0 "Unification des côtes et des terres intérieures"
 cro_uniting_the_coast_and_the_inner_lands_desc:0 "Pour briser l'isolement de notre littoral, nous superviserons la construction monumentale de nombreuses routes reliant l'arrière-pays à nos ports. Cette grande voie d'ingénierie sera taillée à travers le cœur calcaire des montagnes du Velebit, avec des ponts de pierre avancés et des tracés en lacets adaptés aux lourds chariots. Cette route transformera notre côte, passant d'une frontière isolée à une artère économique vitale qui permettra au bois et aux céréales de l'intérieur d'atteindre les marchés internationaux. En reliant physiquement l'arrière-pays montagneux à l'Adriatique, nous achèverons l'intégration territoriale de la nation et ouvrirons une nouvelle ère de commerce trans-Velebit."
 croatian_the_cravats:0 "Les Cravates"
 croatian_the_cravats_desc:0 "Au cours de ces années tourmentées, les régiments d'élite de cavalerie légère croate se sont taillé une solide réputation. Au-delà de leur mobilité et de leur férocité légendaires, ces cavaliers ont introduit une innovation vestimentaire unique : un tissu noué autour du cou pour maintenir le col de la chemise et protéger contre les irritations causées par les cuirasses. Cette #italic cravate#!, un nom dérivé de la mauvaise prononciation française de #italic Croate#!, a rapidement dépassé le champ de bataille pour devenir le summum de la mode parisienne et européenne. En transformant une nécessité militaire rudimentaire en symbole de raffinement, notre culture a remporté une victoire subtile mais durable. Cette domination sartoriale assure que l'image de l'officier croate allie létalité tactique et élégance incomparable."
 croatian_the_glagolitic_lithurgy:0 "La liturgie glagolitique"
 croatian_the_glagolitic_lithurgy_desc:0 "Notre culture se définit par le privilège unique de la liturgie glagolitique, seul endroit dans le monde catholique où la messe est chantée dans la langue slave vernaculaire. Cette tradition jette un pont entre les cités latines et la campagne slave, créant une identité culturelle unifiée. En préservant cet ancien alphabet, notre peuple maintient une langue culturelle secrète qui renforce sa singularité, d'où un sentiment de fierté nationale capable de résister à l'assimilation par les sphères culturelles italienne et germanique."
 croatian_the_illyrian_movement:0 "L'Illyrisme"
 croatian_the_illyrian_movement_desc:0 "Au cours des dernières années, notre nation a été le théâtre de l'explosion de #italic l'illyrisme#!, une révolution culturelle et politique visant à unir tous les Croates sous une seule bannière. Ce mouvement cherche à transformer les régions disparates de notre nation en un corps national unique et cohérent, tant sur le plan politique que culturel. En standardisant la grammaire et l'orthographe, nous transformerons notre nation médiévale en une nation moderne pour garantir que le nom, la langue et la souveraineté croates ne seront jamais oubliés ni réprimés."
 croatian_the_peasants_revolts:0 "Les révoltes paysannes"
 croatian_the_peasants_revolts_desc:0 "Le poids écrasant des obligations féodales face à la guerre constante a provoqué par le passé des révoltes paysannes. La paysannerie ne s'est pas soulevée contre nous, mais contre la noblesse « injuste » qui ne parvenait pas à les protéger tout en exigeant des taxes excessives. Bien que ces révoltes aient généralement été réprimées dans le sang, elles ont laissé un héritage durable de conscience sociale et ont transformé les relations entre les classes, obligeant l'État à modérer ses exigences fiscales afin de maintenir la stabilité interne."
 crossroads_of_commerce:0 "Carrefour commercial"
 crossroads_of_commerce_desc:0 "Nos caravansérails favorisent la circulation du commerce, de l'information et des personnes de la Chine vers l'Europe à travers nos terres. La monnaie et les richesses qui transitent par nos terres constituent un commerce extrêmement lucratif."
 crossroads_of_religions:0 "Carrefour des religions"
 crossroads_of_religions_desc:0 "L'$hindu$, le $buddhist$, l'$muslim$ et même le $tengri$ se sont étendus bien au-delà de leur berceau. L'$asia$ a été témoin de ces échanges de croyances, et bien souvent des mélanges et syncrétismes qui se sont produits entre elles."
 crown_power_advance_discovery:0 "Gouvernement"
 crown_power_advance_discovery_desc:0 "Alors que nos dirigeants deviennent les maîtres incontestés de leurs domaines, le besoin d'une structure gouvernementale se fait sentir. Il est temps de créer les corps bureaucratiques nécessaires pour l'administrer."
 crown_power_advance_reformation:0 "Cuius regio, ejus religio"
 crown_power_advance_reformation_desc:0 "Si nos dirigeants exercent un fort contrôle sur les sujets les plus humbles, le besoin de régenter les questions divines du pays devient impérieux. L'Église et l'État doivent ne faire plus qu'un."
 crown_power_advance_renaissance:0 "Souveraineté"
 crown_power_advance_renaissance_desc:0 "Les méthodes traditionnelles de gouvernement reposaient sur la capacité d'un dirigeant à traiter avec les différentes puissances du pays. Cependant, les théories politiques modernes ont établi que les dirigeants sont souverains dans leur propre pays, et que nous devons nous garder de nous incliner devant tout autre pouvoir temporel."
 crown_power_advance_revolutions:0 "Nation"
 crown_power_advance_revolutions_desc:0 "Avec l'unification de tous les pouvoirs sous la poigne de fer de nos monarques, leurs sujets à travers la nation tout entière se sentent appartenir à ce grand tout. Quels que soient les domaines gouvernés par nos monarques, ils font partie de la Nation, et il en va de même pour leurs habitants."
 crown_rights_laws_advance:0 "$crown_rights_laws$"
 crown_rights_laws_advance_desc:0 "$crown_rights_laws_desc$"
 crt_academy_of_the_stratioti_advance:0 "Académie des stradiotes"
 crt_academy_of_the_stratioti_advance_desc:0 "Les féroces montagnards crétois ont été intégrés dans un corps professionnel de cavalerie légère, qui allie la discipline occidentale aux tactiques de guérilla des frontières balkaniques. Nous avons établi des terrains d'entraînement permanents où les fils de la noblesse locale et des colons latins apprennent à manier #italic le sabre et la carabine#! afin de protéger l'intérieur de l'île. Ces unités sont désormais transférées vers de nombreux États en tant que mercenaires d'élite, apportant un prestige militaire et des revenus réguliers."
 crt_the_council_of_the_two_peoples_advance:0 "Le Conseil des deux peuples"
 crt_the_council_of_the_two_peoples_advance_desc:0 "La menace constante d'invasion extérieure et de révolte intérieure a conduit les rois latins de Candia à abandonner la ségrégation stricte qui prévalait au début de la conquête. Nous avons créé un « Grand Conseil », au sein duquel l'ancienne noblesse vénitienne siège aux côtés des #italic Archontes#!, l'élite foncière grecque orthodoxe. Cette gouvernance partagée permet de profiter d'un front administratif unifié, dans lequel les traditions militaires occidentales sont financées par les racines profondes de la bureaucratie grecque locale, garantissant ainsi que l'île reste un bastion stable et inassimilable pour tout conquérant potentiel."
 crt_the_cretan_labyrinth_of_fortifications_advance:0 "Le labyrinthe crétois des fortifications"
 crt_the_cretan_labyrinth_of_fortifications_advance_desc:0 "Alors que de nouvelles menaces se profilent à l'horizon, les ingénieurs de la nation ont transformé toute l'île en un bastion maritime de style #italic tracé à l'italienne#!. Le renforcement des murs de Candia, Réthymnon et La Canée avec des remblais capables d'absorber les tirs de canon lourds nous permet de transformer chaque siège en une épreuve de plusieurs décennies pour l'envahisseur. Cette infrastructure offre à une petite garnison des moyens efficaces pour résister indéfiniment à un ennemi disposant d'une supériorité numérique en attendant les renforts venus de la mer."
 crt_the_galley_assembly_line_of_suda_advance:0 "La chaîne de galères de Soúda"
 crt_the_galley_assembly_line_of_suda_advance_desc:0 "En normalisant les pièces servant à fabriquer les galères légères dans la baie de Soúda, nous avons été les pionniers d'une forme précoce de construction navale modulaire. Cela nous permet de remplacer les navires perdus bien plus vite et bien moins cher que les autres puissances méditerranéennes. Les navires construits à Candia sont réputés pour leur célérité et leur capacité à braver les courants traîtres de la mer de Crète."
 crt_the_malvasia_wine_export_advance:0 "L'exportation du Malvoisie"
 crt_the_malvasia_wine_export_advance_desc:0 "Les pentes ensoleillées du mont Ida produisent le célèbre raisin Malvoisie, devenu le vin doux le plus convoité dans les cours royales d'Europe du Nord. En réglementant strictement la qualité et en apposant le #italic sceau de saint Marc#! sur chaque fût exporté, nous avons créé un monopole commercial à forte valeur ajoutée qui finance notre défense navale. Cet or liquide garantit que, même en tant que colonie, Candia reste le joyau le plus rentable de l'empire maritime vénitien."
 crt_the_trapete_of_messara_advance:0 "Les moulins hydrauliques de Messará"
 crt_the_trapete_of_messara_advance_desc:0 "Nous avons étendu la culture de la canne à sucre dans la plaine fertile de Messará, en construisant des moulins hydrauliques sophistiqués (Trapete) pour le raffinage. Le sucre crétois est désormais un produit de luxe très prisé par les cours européennes, en concurrence directe avec les marchandises du Levant. Cette agriculture à l'échelle industrielle permet à la couronne de disposer de l'or nécessaire pour financer sa suprématie navale."
 crusader_tradition:0 "Traditions des croisés"
 crusader_tradition_desc:0 "Les Chevaliers de l'Ordre étaient présents lors des guerres contre Saladin et ont combattu pour défendre le dernier avant-poste d'outre-mer, Acre. À tout moment, nous devons nous inspirer des actes passés des Chevaliers de l'Ordre de Saint-Jean de Jérusalem. Le nom des Hospitaliers est éternel, de même que notre courage légendaire sur le champ de bataille."
 crusading_knights:0 "Expérience des croisades baltes"
 crusading_knights_desc:0 "Depuis des temps immémoriaux, notre pays a pour tradition d'envoyer nos meilleurs chevaliers et nobles dans les contrées païennes de la mer Baltique ou de la Méditerranée. Nous accomplirons l'œuvre du Christ qui consiste à apporter la foi aux ignorants et dénicherons par la même occasion des commandants expérimentés pour nos armées."
 crush_the_barons:0 "Pouvoir des barons amoindri"
 crush_the_barons_desc:0 "Les barons détiennent encore une part de puissance considérable dans les campagnes qui entourent Naples. Si nous souhaitons poursuivre la centralisation du pays, il nous faut briser cette puissance ou risquer de les voir conspirer contre nous."
 csk_clans_of_tosa:0 "Clans de Tosa"
 csk_clans_of_tosa_desc:0 "Notre province d'origine, Tosa, est divisée entre plusieurs clans puissants. Si nous voulons nous étendre, ils doivent être unis. Ils nous aideront alors à nous élever, et en retour nous pourrons accroître leur puissance."
 csk_expand_the_navy:0 "Expansion de la flotte"
 csk_expand_the_navy_desc:0 "Le Japon est une nation insulaire, qui pour prospérer doit absolument disposer d'une flotte puissante. Tosa est le lieu parfait où entamer la construction de notre armada."
 csk_god_of_arts:0 "Dieu des arts"
 csk_god_of_arts_desc:0 "Hata no Kawakatsu, le fondateur ancestral de notre clan, était grandement admiré comme le dieu des tous les arts, depuis les danses traditionnelles jusqu'au théâtre. Le clan doit perpétuer son héritage s'il veut s'assurer le respect du peuple japonais."
 csk_unification_of_shikoku:0 "Unification de Shikoku"
 csk_unification_of_shikoku_desc:0 "Shikoku est considérée comme une terre pauvre et isolée par le reste du Japon, où rien d'important ne se passerait jamais. Laissons-les tous continuer de penser ainsi et se désintéresser de l'unification de notre île, jusqu'à ce qu'il soit trop tard pour eux."
 cth_beyond_the_pillars:0 "Au-delà des Colonnes"
 cth_beyond_the_pillars_desc:0 "Nos comptoirs commerciaux doivent désormais s'étendre au-delà des colonnes d'Hercule. En combinant notre savoir-faire ancestral en matière de colonisation avec nos découvertes modernes, nous pouvons établir des comptoirs bien plus efficaces que ceux des nations plus jeunes, encore inexpérimentées. Bientôt, des colonies carthaginoises s'étendront aux quatre coins du monde."
 cth_breadbasket_of_rome:0 "Grenier à blé de Rome"
 cth_breadbasket_of_rome_desc:0 "Il y a des siècles, nos avancées en irrigation et en culture de l'olivier valurent à Carthage le titre de grenier à blé de Rome. Forts de ce savoir ancien, nous lutterons contre le désert pour faire pousser des oliviers, comme dans l'Antiquité."
 cth_cothons:0 "Cothon"
 cth_cothons_desc:0 "Le cothon antique de Carthage était une merveille technologique qui permettait de construire des navires efficacement. Cet héritage, nous en faisons aujourd'hui le socle de notre renaissance. En redécouvrant les techniques navales de nos ancêtres, nous avons retrouvé notre maîtrise en la matière. Bientôt, les flottes carthaginoises sillonneront à nouveau toute la Méditerranée."
 cth_legacy_of_hannon:0 "Héritage d'Hannon"
 cth_legacy_of_hannon_desc:0 "Hannon le Navigateur fut un grand explorateur de l'Antiquité, qui atteignit les côtes lointaines de l'Afrique. Nous suivrons son exemple et relancerons l'exploration afin de rebâtir un vaste empire commercial. Cette fois, nous pousserons l'exploration encore plus loin, à la recherche de nouvelles opportunités commerciales à travers le globe."
 cth_mercenary_army:0 "Armée de mercenaires"
 cth_mercenary_army_desc:0 "La population de Carthage n'est pas nombreuse, c'est pourquoi, depuis des siècles, nous comptons sur des mercenaires pour mener nos guerres à notre place. Depuis la renaissance de Carthage, nous perpétuons cette tradition afin d'épargner à notre peuple les dangers de la guerre."
 cth_merchant_legacy:0 "Héritage marchand"
 cth_merchant_legacy_desc:0 "Les flottes commerciales phéniciennes ont sillonné la Méditerranée pendant des siècles. Tout cet héritage confère aux fils de Carthage une efficacité et une impitoyable maîtrise dans le domaine du commerce. Nous sommes destinés à dominer une nouvelle fois les flux des marchandises."
 cth_phoenician_sailors:0 "Marins phéniciens"
 cth_phoenician_sailors_desc:0 "La restauration de notre ancien royaume a permis de renouer avec nos frères phéniciens de Libye. En conséquence, nous bénéficions d'un afflux constant de volontaires, déterminés à contribuer à la renaissance de Carthage. Grâce à eux, notre marine peut désormais atteindre une puissance sans égal."
 cth_punic_global_trade:0 "Commerce global punique"
 cth_punic_global_trade_desc:0 "Pendant des siècles, notre nation a régné en maître sur le commerce méditerranéen. Avec les nouvelles découvertes, nous sommes appelés à étendre cette domination à l'échelle mondiale. Bientôt, on verra mouiller un navire carthaginois dans chaque port de la planète."
 cth_sufet_rule:0 "Règne du Šūfeṭ"
 cth_sufet_rule_desc:0 "Notre ancien royaume était dirigé par un chef d'État élu, le Šūfeṭ. Notre gouvernement moderne sera réorganisé en s'inspirant de cette tradition antique, tout en intégrant les théories politiques les plus avancées. Le système républicain qui en résultera surpassera en puissance toutes les républiques qui l'ont précédé."
 cth_wine_traders:0 "Commerce du vin punique"
 cth_wine_traders_desc:0 "Un réseau d'échange vinicole ingénieux avait été établi par nos ancêtres : ils produisaient de grands volumes de vin ordinaire pour le commerce, tout en important les crus les plus fins. Aujourd'hui, nous allons étendre nos capacités de production pour contrôler entièrement le commerce du vin en Méditerranée, et au-delà."
 cultivate_the_land:0 "Culture de la terre"
 cultivate_the_land_desc:0 "La jungle est un environnement hostile, notamment si notre peuple entend s'y adonner à des travaux agricoles au lieu de se mouvoir sans cesse. Le défrichement relève dès lors d'une des tâches les plus importantes pour assurer la survie et la prospérité de notre société. Il nous faut nous organiser de façon à employer le plus grand nombre possible d'hommes capables de mener à bien ces travaux, chaque fois que cela est nécessaire."
 cultural_acceptance_advance:0 "Acceptation culturelle"
 cultural_acceptance_advance_desc:0 "Il est évident qu'en absorbant d'autres peuples, leurs traditions peuvent entrer en contradiction avec les nôtres et provoquer des frictions. Une façon de résoudre ce problème consiste à tolérer ces étrangers et à les considérer comme nos propres compatriotes."
 cultural_melting_pot:0 "Creuset culturel"
 cultural_melting_pot_desc:0 "L'$asia$ n'est autre que le foyer d'une très large diversité culturelle. C'est précisément cette diversité et les constantes interactions qui ont permis aux pays d'$asia$ de prospérer en s'échangeant des idées et des influences."
 cultural_ties:0 "Liens culturels"
 cultural_ties_desc:0 "Différentes cultures ont différents usages et, pour une raison ou une autre, ont souvent tendance à résister aux tentatives visant à les faire évoluer. Nous pouvons faire de cette faiblesse une force, en incorporant des notables locaux dans notre système de gouvernement et en leur confiant la tâche de faire respecter notre volonté d'une façon qui les satisfasse."
 cultural_traditions_law_advance:0 "$cultural_traditions_law$"
 cultural_traditions_law_advance_desc:0 "$cultural_traditions_law_desc$"
 cultures_capacity_mil_choice:0 "Ambitions multiculturelles"
 cultures_capacity_mil_choice_desc:0 "L'expansion d'un pays l'amènera sans aucun doute à accueillir d'autres cultures. Ainsi, si nous voulons continuer à étendre nos frontières, nous devons nous préparer à devenir plus multiculturels."
 cunning_diplomacy:0 "Ruse diplomatique"
 cunning_diplomacy_desc:0 "Sous la direction visionnaire de nos dirigeants, nous réaliserons l'impossible en géopolitique : l'unification de toutes les terres roumaines sous une seule bannière. Cette « Grande Idée » éveillera une conscience nationale latente qui transcendera les anciennes frontières féodales, prouvant au monde qu'une #italic Dacie#! unifiée peut s'imposer comme une grande puissance européenne à part entière. Cette vision établira les précédents juridiques, militaires et symboliques qui nous garantiront une revendication historique permanente sur l'hégémonie régionale et la future réunification de tous les Roumains."
 cupola_smelting:0 "Fonte au cubilot"
 cupola_smelting_desc:0 "En utilisant un fourneau cylindrique, cette méthode offre un processus unique de forge à combustion continue à la fois peu onéreux et efficace."
 custom_union_of_the_rhine:0 "Rheinischer Münzverein"
 custom_union_of_the_rhine_desc:0 "Au sein de l'ensemble hétéroclite de l'empire, il est nécessaire de collaborer économiquement avec ses voisins pour prospérer. Nous rejoindrons l'union douanière du Rhin et adopterons leur monnaie, le #italic gulden#! ou florin, pour simplifier les affaires de nos marchands et la diplomatie avec les autres pays."
 customs_house_advance:0 "Poste de douane"
 customs_house_advance_desc:0 "$customs_house_desc$"
 cyril_and_methodius:0 "Cyrille et Méthode"
 cyril_and_methodius_desc:0 "Théologiens $BYZ_ADJ$s du IXe siècle, ces deux personnages ont grandement contribué à l'évangélisation des Slaves. Ils sont également connus pour avoir développé l'alphabet glagolitique, le premier à avoir été utilisé pour transcrire le $church_slavonic_language$, et leurs fidèles ont par la suite inventé l'alphabet cyrillique, qu'ils ont nommé en hommage à Cyrille."
 dah_children_of_the_panther:0 "Enfants de la panthère"
 dah_children_of_the_panther_desc:0 "Selon une légende ancienne, notre lignée royale serait née de l'union entre une princesse et une panthère. Ce mythe ne peut que renforcer notre prestige et notre renommée auprès de nos voisins."
 dah_dahomey_palaces:0 "Palais d'Abomey"
 dah_dahomey_palaces_desc:0 "La présence au sein de notre capitale d'un vaste complexe de palais serait un signe de puissance pour tous ceux qui oseraient la défier."
 dah_lagredis:0 "Lagredis"
 dah_lagredis_desc:0 "En introduisant un certain nombre de jeunes nobles efféminés dans le harem royal et en les présentant comme des épouses royales, nous pouvons leur donner la liberté d'espionner pour le compte du roi, en particulier en matière de complots au sein du palais."
 dah_migan_mehu:0 "Migan et Mehu"
 dah_migan_mehu_desc:0 "Le Migan et le Mehu sont les deux principaux ministres de nos rois. L'un supervise le nord, et l'autre le sud. L'un supervise la justice, et l'autre le commerce. Ensemble, ils apportent la paix et la prospérité à notre territoire."
 dah_slave_hunts:0 "Chasses aux esclaves"
 dah_slave_hunts_desc:0 "En attaquant nos voisins, nous nous procurons des esclaves qui peuvent non seulement être employés sur le plan économique ou troqués avec nos voisins, mais aussi servir dans notre armée. Nous disposons ainsi d'effectifs militaires supplémentaires."
 dah_yovogan:0 "Yovogan"
 dah_yovogan_desc:0 "Compte tenu du nombre croissant d'étrangers qui débarquent sur nos côtes, nous devons tâcher d'en tirer profit en établissant au sein de notre gouvernement un nouveau cabinet chargé d'étudier leurs coutumes et de découvrir leurs secrets."
 dahomey_amazons:0 "Amazones du Dahomey"
 dahomey_amazons_desc:0 "Un corps de guerrières recrutées parmi les épouses du roi. Considérées comme des amazones de la mythologie grecque en raison de leur férocité au combat, elles ne manqueront pas de semer la terreur au sein des rangs ennemis. Ces $dahomey_amazons$ sont au service du royaume du $DAH$ et de ses intérêts."
 dai_ca_tru:0 "Ca trù"
 dai_ca_tru_desc:0 "Le $dai_ca_tru$ est un genre de récit musical $vietnamese_culture$, à la fois chant de divertissement et chant religieux."
 dai_confucian_administration:0 "Administration confucéenne"
 dai_confucian_administration_desc:0 "L'administration de notre État est d'une grande importance et, à ce titre, seuls les administrateurs les plus compétents sont choisis pour y travailler. Formés par les textes confucéens de $CHI$, ces fonctionnaires garantissent un fonctionnement stable et sans heurt de notre administration."
 dai_don_dien:0 "Đôn Điên"
 dai_don_dien_desc:0 "Le $dai_don_dien$ est un système de colonies militaires dans lesquelles des soldats et des paysans sans terre défrichent une région pour y établir de nouveaux villages. Au bout de trois ans, ces villages sont ensuite intégrés dans notre système administratif, puis les soldats et les paysans sans terre s'installent sur les terres disponibles."
 dai_giao_chi_arquebus:0 "Arquebuse de Giao Chỉ"
 dai_giao_chi_arquebus_desc:0 "L'$dai_giao_chi_arquebus$ est un élément essentiel de notre armée. Fabriquée par nos soins et adaptée aux besoins de nos troupes, elle recueille non seulement les éloges des Chinois, mais aussi ceux des observateurs occidentaux."
 dai_hung_dao_trans_military_feats:0 "Tactiques de $dai_tran_hung_dao$"
 dai_hung_dao_trans_military_feats_desc:0 "$dai_tran_hung_dao$ était un prince impérial de $DAI$ qui a servi comme officier lors de la première invasion $mongolian_group$e de $DAI$ en 1258, et comme commandant en chef lors de la deuxième guerre contre les Mongols en 1285, puis lors de leur troisième tentative en 1287. Au cours de ces conflits sanglants, $dai_tran_hung_dao$ a mis au point des tactiques qui nous ont permis de repousser constamment ces cavaliers des steppes."
 dai_lang:0 "Villages autonomes vietnamiens"
 dai_lang_desc:0 "Le monde rural vietnamien repose sur la force intangible des #italic làng#!, ces villages gérant leur autonomie selon le principe que « les coutumes du village priment sur les lois du roi ». Dans un pays de montagnes escarpées et de rivières sinueuses, ces communautés s'administrent elles-mêmes, lèvent des milices locales, perçoivent les impôts avec efficacité et ancrent l'autorité royale jusqu'au niveau le plus modeste."
 dai_literary_reform:0 "Réforme littéraire"
 dai_literary_reform_desc:0 "Depuis des siècles, nous écrivons en $classical_chinese_language$. Cependant, notre langue s'écrit en Chữ Nôm, un alphabet basé sur le Chữ Hán, l'écriture du $classical_chinese_language$. Le Chữ Nôm n'étant pas normalisé et peu usité en comparaison avec le $classical_chinese_language$, nous avons connu un besoin urgent de réformer notre écriture pour des besoins administratifs."
 dai_nha_nhac:0 "Nhã nhạc"
 dai_nha_nhac_desc:0 "Le $dai_nha_nhac$ est la musique traditionnelle que l'on joue dans nos cours ou lors des cérémonies annuelles. C'est un aspect important de notre culture et un pilier de nos traditions."
 dai_thuan_thien:0 "Thuận Thiên"
 dai_thuan_thien_desc:0 "$dai_thuan_thien$, ou Volonté du Ciel, est le nom de l'épée légendaire de notre libérateur, Lê Lợi. Selon les récits, l'épée lui a donné la force d'un millier d'hommes pour secouer enfin le joug chinois. Lê Lợi est considéré comme la parfaite incarnation du dirigeant dont notre État a besoin."
 dai_trade_advance:0 "Contrats commerciaux"
 dai_trade_advance_desc:0 "Notre histoire a été façonnée par la $CHI$ pendant trop longtemps. Pour laisser notre empreinte sur le monde, nous devons nous étendre au-delà de la sphère d'influence chinoise."
 dai_vietnamese_architecture:0 "Architecture $vietnamese_culture$ne"
 dai_vietnamese_architecture_desc:0 "Derrière l'influence des Chinois, notre architecture reste typique de notre culture. Tout en suivant les concepts du fēng shuǐ, de nombreux éléments caractéristiques du style chinois ont été abandonnés ou adaptés à notre environnement."
 dal_adriatic_oak_galleys:0 "Galères de chêne adriatique"
 dal_adriatic_oak_galleys_desc:0 "Conscients que la Méditerranée devient une mer de feu, nous avons commandé une nouvelle classe de navires lourds à rames, renforcés de chêne, construits dans nos meilleurs chantiers navals. En utilisant le bois dur comme le fer des montagnes côtières, ces navires peuvent supporter des bordées plus puissantes et sont conçus pour naviguer dans les criques karstiques peu profondes et rocheuses où les grandes galères vénitiennes échouent. Cette supériorité nous permet de contrôler nos propres eaux et de défendre nos côtes contre tout ennemi."
 dal_comune_privileges:0 "Privilèges des Comunes"
 dal_comune_privileges_desc:0 "Pour assurer la fidélité des villes côtières face à l'empiétement vénitien, nous accorderons des privilèges garantissant l'autonomie interne et les lois latines de ces Comunes (unités de gouvernement). En permettant à ces villes d'élire leurs propres prieurs et de gérer leurs impôts locaux, nous formons une classe urbaine loyale qui nous considère comme un protecteur plutôt que comme un oppresseur. Cette défense urbaine décentralisée fait de la côte un patchwork de Comunes loyales et fortifiées capables de résister aux raids maritimes, rapprochant ainsi les côtes des terres intérieures."
 dal_dalmatian_olive_pacts:0 "Pactes agricoles dalmates"
 dal_dalmatian_olive_pacts_desc:0 "Nous avons réorienté notre économie vers l'agriculture intensive en tirant parti du climat de la côte dalmate. En établissant des « Pactes agricoles » supervisés par l'État, nous avons reconquis les collines côtières pour une production à grande échelle, afin de transformer nos terres escarpées en un véritable jardin verdoyant d'exportations. Cette diversification économique réduit notre dépendance au commerce maritime et offre une nouvelle source de richesse à la noblesse côtière, finançant la construction de somptueuses villas d'été et de théâtres urbains qui rivalisent avec ceux de la péninsule italienne."
 dal_morlach_frontier_levies:0 "Milices frontalières morlaques"
 dal_morlach_frontier_levies_desc:0 "Nous avons intégré les Morlaques, farouches bergers valaques et slaves de l'arrière-pays, dans une réserve militaire permanente. Ces irréguliers se voient accorder des droits sur des terres en échange d'une disponibilité constante, servant d'yeux et d'oreilles de la nation. Leur connaissance intime de la géographie karstique nous permet de mener des embuscades profondes et des raids nocturnes qui paralysent la logistique ennemie. Cela crée une culture de « Nation en armes » dans l'arrière-pays dalmate, où la frontière entre civil et soldat disparaît entièrement au nom de notre défense."
 dal_the_soldato_dalmantine:0 "Le Soldato Dalmantine"
 dal_the_soldato_dalmantine_desc:0 "En consolidant notre pouvoir, nous avons fait de notre population « l'Épée de la Nation ». Nos hommes sont enrôlés dans des régiments d'élite #italic Schiavoni#! (slaves), servant d'infanterie lourde en première ligne lors de nos guerres. Ce service militaire offre à notre peuple une formation professionnelle et une exposition aux dernières techniques de guerre européennes, qui crée une culture de soldats de carrière. Si nos villes perdent peut-être leur supériorité commerciale, notre population comporte les guerriers les plus respectés de la Méditerranée, garantissant que notre tradition militaire reste intacte, même sous administration étrangère."
 dal_the_union_of_the_two_souls:0 "L'union des deux âmes"
 dal_the_union_of_the_two_souls_desc:0 "La culture dalmate a mûri pour devenir une société véritablement bilingue, où le latin est la langue du droit et le slave celle du cœur. Cette flexibilité linguistique permet à notre peuple de naviguer aisément dans les strates sociales complexes de l'Adriatique de la Renaissance. En maîtrisant ces deux langues, nos marchands et marins deviennent les intermédiaires indispensables de tout commerce entre les cités italiennes et l'intérieur slave. Ce bilinguisme crée une culture de « pont dalmate » parfaitement adaptée au commerce et à la diplomatie internationaux, garantie que notre peuple se trouve toujours au centre des échanges méditerranéens."
 dalmatian_mediterranean_cosmopolitanism:0 "Cosmopolitanisme méditerranéen"
 dalmatian_mediterranean_cosmopolitanism_desc:0 "Des siècles de commerce maritime et de bilinguisme ont donné naissance à une culture de cosmopolitisme, où notre peuple se sent chez lui dans n'importe quel port, de Venise au Levant. Cette ouverture culturelle nous permet d'absorber et d'adapter les meilleures idées venues du monde entier, créant une société à la fois flexible et résiliente. Notre population, celle des « citoyens de la mer », possède une vision du monde bien plus vaste que celle des régions enclavées de l'intérieur. Cet esprit cosmopolite garantit que la culture dalmate reste dynamique et prospère sur le plan commercial, et sert de « fenêtre sur le monde » pour l'ensemble de la péninsule balkanique."
 dalmatian_the_accademia_degli_oziosi:0 "L'Accademia degli Oziosi"
 dalmatian_the_accademia_degli_oziosi_desc:0 "Inspirés par les académies littéraires italiennes, les intellectuels de nos villes ont fondé des sociétés telles que #italic l' Accademia degli Oziosi#! pour débattre de physique, d'astronomie et de poésie classique. Ces érudits « oisifs » ne le sont en rien : ils servent de conseillers scientifiques aux amirautés navales, appliquant le nouveau rationalisme baroque à la cartographie et à la balistique. Cette institutionnalisation culturelle de la curiosité garantit que les centres urbains dalmates restent les « Phares scientifiques » de l'Adriatique, préservant la côte comme un carrefour du siècle des Lumières européen, tandis que l'intérieur des Balkans demeure enfermé dans des cycles traditionalistes."
 dalmatian_the_cult_of_the_local_patron_saint:0 "Le culte du saint patron local"
 dalmatian_the_cult_of_the_local_patron_saint_desc:0 "Chaque cité dalmate s'enracine dans la vénération intense de son propre saint patron : saint Chrysogone à Zadar, saint Domnius à Split, saint Tryphon à Kotor. Ces saints ne sont pas de simples figures religieuses, mais les « souverains fondateurs » de la ville. Leurs jours de fête constituent les principaux événements sociaux et politiques de l'année, unissant toutes les classes dans un rituel commun qui renforce l'identité indépendante de la cité. Ce localisme intense fait de la culture dalmate une mosaïque d'identités urbaines farouchement autonomes, et empêche toute puissance étrangère de dominer culturellement l'ensemble de la côte d'un seul coup."
 dalmatian_the_guild_of_the_stone_master:0 "La guilde du maître tailleur de pierres"
 dalmatian_the_guild_of_the_stone_master_desc:0 "Le calcaire abondant et d'un blanc éclatant de la côte a engendré une culture de maîtres tailleurs de pierre qui considèrent le karst comme une toile. Nos artisans ont développé un style « gothique Renaissance » mondialement reconnu pour son innovation structurelle et la finesse de ses sculptures. Il ne s'agit pas seulement d'art : c'est une déclaration physique de notre permanence. En construisant chaque église, palais et rempart avec la pierre locale, notre peuple façonne un paysage à la fois magnifique et indestructible, nourrissant une fierté nationale qui considère la ville dalmate comme un monument sacré et éternel à notre savoir-faire, qu'aucun empire maritime ne pourra jamais effacer véritablement."
 dalmatian_the_high_chancery_style:0 "Le style de la haute chancellerie"
 dalmatian_the_high_chancery_style_desc:0 "La noblesse dalmate a adopté la norme littéraire du « haut dalmate » pour sa correspondance privée et ses registres diplomatiques, imitant leurs homologues de la péninsule italienne. Ce pivot culturel, qui s'éloigne du latin médiéval au profit du vernaculaire raffiné, aligne les villes côtières sur le cœur de la Renaissance italienne. Cette esthétique linguistique partagée crée un pont intellectuel direct avec le #italic Studio #! vénitien, ce qui permet aux poètes et juristes dalmates de participer aux cercles humanistes les plus exclusifs d'Italie. Ce « Raffinement linguistique » garantit que nos diplomates sont considérés comme des pairs culturels dans toutes les cours occidentales, fournissant un bouclier diplomatique fondé sur une civilisation partagée plutôt que sur la seule force militaire."
 dalmatian_the_maritime_commune_spirit:0 "L'esprit de Commune maritime"
 dalmatian_the_maritime_commune_spirit_desc:0 "Notre culture se définit par la Commune, où l'honneur de chaque citoyen est lié au prestige de sa ville. Cet esprit de compétition urbaine pousse notre peuple à construire des cathédrales plus belles et des navires plus rapides que ceux des voisins, ce qui crée une culture de fierté locale et d'innovation extrêmes. Cette mentalité de « cité-État » garantit que notre population est fortement investie dans sa gouvernance et sa défense locales, favorisant des citoyens exceptionnellement résilients et autonomes, capables de gérer leurs affaires même lorsque la couronne centrale est distante ou faible."
 dan_admiralty_college:0 "École de l'Amirauté"
 dan_admiralty_college_desc:0 "La création d'une école de marine nous permettra de former des commandants connaissant parfaitement notre littoral. Nous protégerons ainsi nos eaux territoriales et nous garantirons la souveraineté du Danemark."
 dan_danish_agriculture:0 "Priorité à l'agriculture"
 dan_danish_agriculture_desc:0 "Nos terres sont pauvres en matériaux rares, mais riches en produits agricoles. Nous pourrons produire plus de nourriture pour éviter les famines pendant les périodes difficiles."
 dan_danish_legislation:0 "Législation danoise"
 dan_danish_legislation_desc:0 "Les lois régionales du Jutland, de la Zélande et de la Scanie ont servi de base à notre code juridique pendant des siècles. Nous devrions compiler et unifier ces lois en un code juridique cohérent au bénéfice de tous, connu sous le nom de #italic Danske Lov#!."
 dan_danish_orthodoxy:0 "Uniformité religieuse"
 dan_danish_orthodoxy_desc:0 "Dans le paysage religieux tumultueux de l'Europe, nous devrons trouver la voie juste pour le Danemark et rester fidèles à la doctrine de notre Église."
 dan_expanded_dockyards:0 "L'arsenal de Copenhague"
 dan_expanded_dockyards_desc:0 "La renommée de nos chantiers navals n'est plus à faire. Nos charpentiers de marine méritent désormais un endroit moderne et spacieux à la hauteur de leur savoir-faire, afin de construire une flotte digne de porter les couleurs danoises. Les eaux autour de Copenhague sont parfaites pour construire ce chantier naval."
 dan_levy_recruitment:0 "Dépendance aux levées"
 dan_levy_recruitment_desc:0 "Notre domaine immédiat étant concentré sur la péninsule du Jutland et l'archipel des îles danoises, nous pourrons compter sur des levées de fonds rapides pour nous défendre contre les agressions des pays étrangers."
 dan_old_naval_traditions:0 "Réseaux maritimes du Danemark"
 dan_old_naval_traditions_desc:0 "L'intégralité de notre pays est entourée par les eaux de la mer Baltique et de la mer du Nord. Cette situation nous confère l'avantage unique de pouvoir utiliser les voies maritimes comme moyen de transport et de communication, ce qui réduit considérablement la distance entre les régions de notre pays."
 dan_reliance_mercenaries:0 "Dépendance aux mercenaires"
 dan_reliance_mercenaries_desc:0 "Le $DAN$ ne dispose pas d'une vaste population qui pourrait rejoindre les rangs des armées dont nous aurons besoin pour devenir une grande puissance mondiale. Nous devons donc nous assurer que les compagnies mercenaires sont prêtes à servir notre État en garantissant leur loyauté par des contrats concrets."
 dan_rentekammer_advance:0 "Rentekammeret"
 dan_rentekammer_advance_desc:0 "En créant un département distinct pour le Trésor, le #italic Rentekammeret#!, nous pouvons établir un meilleur contrôle sur nos finances et permettre à notre gouvernement de fonctionner plus efficacement. Grâce à la documentation de tous nos dossiers financiers, nous serons en mesure d'estimer plus facilement nos dépenses futures, ce qui stabilisera nos finances."
 dan_royal_danish_navy:0 "Flotte pour l'État danois"
 dan_royal_danish_navy_desc:0 "Notre pays étant entouré d'eau, il peut facilement être dominé par une puissance dotée d'une flotte suprême. Pour que nos ennemis échouent, nous devons financer la fabrication de navires dignes de protéger nos côtes et de représenter notre puissance dans le nord de l'Europe."
 dan_royal_life_guards:0 "Royal Life Guards"
 dan_royal_life_guards_desc:0 "Les Royal Life Guards sont un régiment d'élite des forces danoises, qui constitue la garde personnelle du souverain et une unité de cérémonie du gouvernement."
 dan_rulers_of_the_north:0 "Souverains légitimes du Nord"
 dan_rulers_of_the_north_desc:0 "Les souverains du Danemark revendiquent la suprématie sur les régions nordiques depuis des siècles. Si nous embellissons l'héritage de rois comme Knut le Grand, nous gagnerons en légitimité, à la fois dans notre pays et à l'étranger."
 dan_scanian_regiment:0 "Régiment scanien"
 dan_scanian_regiment_desc:0 "Le régiment scanien est une unité composée de paysans enrôlés, visant à réduire notre dépendance à l'égard des mercenaires et à mettre en place une armée permanente organisée sous l'autorité directe de la Couronne."
 dan_trading_economy:0 "Un pays maritime"
 dan_trading_economy_desc:0 "Notre économie ne pourra jamais être autosuffisante. Nous devons donc nous appuyer sur un réseau commercial stable pour exporter nos marchandises et importer les biens que nous ne sommes pas en mesure de produire."
 dana:0 "Dāna"
 dana_desc:0 "Signifiant « générosité », le $dana$ est défini comme l'acte de donner sans rien demander en retour, ce qui constitue une vertu essentielle dans toutes les religions liées au dharma. Aider son prochain de façon désintéressée, individuellement ou collectivement, est un excellent moyen de gagner du karma."
 danish_heritage:0 "Héritage des chantiers navals danois"
 danish_heritage_desc:0 "La longue tradition navale du Danemark et sa maîtrise de la logistique maritime ont abouti à la création d'importants chantiers navals comme ceux de Copenhague. En tant que pays scandinave, nous héritons de ces infrastructures puissantes et de ce savoir-faire, ce qui renforce notre stature diplomatique et notre préparation navale."
 danka_system:0 "Système danka"
 danka_system_desc:0 "Pendant des siècles, au $japan_region$, les ménages ont entretenu des relations étroites avec les temples $buddhist_ADJ$s locaux en leur accordant leur soutien financier en échange de la prise en charge de leurs besoins spirituels. L'extension de ce système à l'ensemble de notre population garantira la sécurité de la foi de nos concitoyens."
 debt_and_loans:0 "Dette et emprunts"
 debt_and_loans_desc:0 "Il est difficile, en certaines occasions, de ne pas recourir à l'emprunt. Un véritable marché de la dette nous permettra de contracter des emprunts à des taux d'intérêt plus bas."
 defense_against_heretics:0 "Défense contre les hérétiques"
 defense_against_heretics_desc:0 "Depuis que nous nous sommes séparés d'eux, les hérétiques ont souvent proféré des accusations et des condamnations à notre encontre. Ils se disent $christian_ADJ$s, mais leur vision est manifestement erronée par l'hérésie, alors que la nôtre est éclairée grâce à la lumière de Dieu."
 defense_of_the_faith:0 "Défense de la foi"
 defense_of_the_faith_desc:0 "Nous avons été chassés d'Acre, puis de Chypre, mais l'Ordre de Saint-Jean de Jérusalem ne reculera pas davantage. À l'époque païenne, un Colosse se dressait à l'entrée du port de Rhodes et aujourd'hui, les plus hautes fortifications du monde ont repris le flambeau."
 defenses_of_novgorod:0 "Défenses de Novgorod"
 defenses_of_novgorod_desc:0 "La République de Novgorod est la cible de nombreuses menaces extérieures. Qu'il s'agisse des Scandinaves hérétiques à l'ouest, des Allemands qui ravagent notre sud-ouest, ou même des autres puissances russes plus au sud, toutes trouveront sur leur chemin les fortifications indestructibles de notre grand État."
 defensive_army:0 "Armée défensive"
 defensive_army_desc:0 "La montée en puissance de nombreux États autour de nous a mis en évidence la nécessité de disposer d'une solide force de défense, alors que nous nous efforçons de maintenir notre intégrité territoriale. La connaissance du terrain, des chemins et des tactiques nous permettra de traverser cette période de turbulences."
 defensive_mentality:0 "Mentalité défensive"
 defensive_mentality_desc:0 "Certains pensent que la meilleure défense, c'est l'attaque. Folie que cela ! Laissons-les venir à nous, pour ensuite contre-attaquer. Nos troupes se défendront avec ténacité et nos forteresses résisteront bien plus longtemps."
 deliberative_council:0 "Conseil délibératif des princes et ministres"
 deliberative_council_desc:0 "Initialement nommé #italic Conseil de délibération#!, il trouve son origine dans des institutions informelles qui promouvaient une gouvernance collaborative entre les dirigeants du royaume. La structure du Conseil a été transformée pour se concentrer sur la gouvernance aristocratique collective et les délibérations politiques, principalement dans les affaires étrangères et militaires. L'adhésion est limitée aux chefs militaires de notre peuple qui ne font pas partie du clan impérial, afin de renforcer le pouvoir du dirigeant."
 denounce_heretics:0 "Dénonciation des hérétiques"
 denounce_heretics_desc:0 "Nous devons préserver la foi unique et dénoncer ceux qui la désapprouvent de manière hérétique."
 desert_power:0 "Puissance du désert"
 desert_power_desc:0 "Notre région est habitée par de nombreux paysans et tribus qui constituent l'essentiel des classes inférieures. Malgré leur dénuement, ils exercent une grande influence sur les routes commerciales traversant les déserts arides qui séparent nos villes. Nous assurer de leur allégeance nous permettra d'asseoir notre pouvoir sur le désert."
 deus_vult:0 "Deus Vult"
 deus_vult_desc:0 "Joignez-vous au concert des cris de guerre de la croisade, « Dieu le veut ! », afin d'écraser les infidèles."
 develop_qeshm_and_ormuz:0 "Investissements à Qeshm et Ormuz"
 develop_qeshm_and_ormuz_desc:0 "Bien qu'arides et rocheuses, les îles de Qeshm et d'Ormuz ont entretenu une vie urbaine grâce à une gestion avisée des ressources et à un commerce florissant. Avec des investissements judicieux, leurs ports et ateliers pourraient s'épanouir davantage, transformant ces plaques tournantes logistiques en foyers d'innovation et de productivité."
 development_of_maritime_law:0 "Développement du droit maritime"
 development_of_maritime_law_desc:0 "De plus en plus de pays voient leurs sujets ou citoyens partir à l'étranger pour y commercer ou se lancer à l'aventure. Avec autant de gens vivant les uns sur les autres pendant de telles durées, il est devenu essentiel de disposer d'un droit international en mer. À travers des publications telles que le « Mare Liberum » ou le « De Dominio Maris Dissertatio » plus tardif, ce sont les fondations d'un droit maritime international qui sont posées."
 devotio_moderna:0 "Devotio moderna"
 devotio_moderna_desc:0 "Le courant de la dévotion moderne se répand dans notre foi, aussi devrions-nous introduire certains de ses enseignements au sein de notre cour afin de renforcer notre image de pieux chrétiens."
 devotionalism:0 "Dévotionalisme"
 devotionalism_desc:0 "Nous devons faire renaître la théologie augustinienne et appuyer notre foi sur les émotions et la ferveur des fidèles."
 devoutness:0 "Dévotion"
 devoutness_desc:0 "La religion est l'un des piliers sur lesquels repose notre gouvernement. Si nos dirigeants font publiquement preuve d'un comportement pieux, le peuple suivra leur exemple ; et cette piété grandissante au sein du peuple renforcera notre gouvernement."
 diocese_of_smolensk:0 "Diocèse de Smolensk"
 diocese_of_smolensk_desc:0 "Autrefois bastion spirituel du christianisme orthodoxe et siège de l'un des plus anciens évêchés de la région, le diocèse de Smolensk incarne la foi inébranlable de notre peuple."
 dip_choice_subject_opinions:0 "Émissaires vassaux"
 dip_choice_subject_opinions_desc:0 "La communication continue avec nos vassaux aura très certainement un impact positif sur nos relations, renforçant le noyau de notre domaine ainsi que les pays fidèlement rassemblés sous notre bannière."
 diplomatic_capacity_traditions:0 "Archives étendues"
 diplomatic_capacity_traditions_desc:0 "Nos entreprises diplomatiques régulières nécessitent une production et une documentation détaillée de nos contacts."
 diplomatic_corps:0 "Corps diplomatique"
 diplomatic_corps_desc:0 "Grâce à la mise sur pied d'un corps diplomatique professionnel, nous pouvons nous assurer que les leçons durement apprises par nos diplomates les plus chevronnés seront transmises aux générations qui les suivront."
 diplomatic_influence:0 "Influence diplomatique"
 diplomatic_influence_desc:0 "En concentrant nos efforts sur la diplomatie, nous pouvons accroître notre stature sur la scène internationale et nous faire ainsi de nombreux alliés."
 diplomatic_range_age_1:0 "Émissaires étrangers"
 diplomatic_range_age_1_desc:0 "La diplomatie entre pays a toujours été importante. Toutefois, elle gagne en intensité et en complexité, et l'envoi d'émissaires toujours plus loin pour développer nos relations étrangères devient de plus en plus courant."
 diplomatic_range_age_2:0 "Réseau diplomatique"
 diplomatic_range_age_2_desc:0 "Il est important d'entretenir un bon réseau de diplomates autour de nous, afin de pouvoir en tirer parti pour envoyer des émissaires dans des pays toujours plus éloignés."
 diplomatic_range_age_3:0 "Ambassades"
 diplomatic_range_age_3_desc:0 "La situation internationale actuelle exige que nous établissions des offices permanents pour nos diplomates dans les pays voisins. C'est là la seule manière de garantir la défense de nos intérêts dans notre région, tout en étendant notre champ d'action au-delà de ses frontières."
 diplomatic_range_age_5:0 "Missions diplomatiques"
 diplomatic_range_age_5_desc:0 "La complexité de la politique moderne n'est plus l'affaire d'un seul émissaire. Pour étendre encore davantage notre influence et protéger nos intérêts dans ces contrées lointaines, nous enverrons des missions entières de diplomates experts dans chaque pays."
 diplomatic_range_age_6:0 "Ambassades à l'échelle mondiale"
 diplomatic_range_age_6_desc:0 "Avec les différents pays qui tentent d'étendre toujours davantage leur portée, le monde est devenu plus interconnecté que jamais. Seul l'établissement d'ambassades permanentes dans le monde entier permettra à cette interconnectivité de perdurer."
 diplomatic_training:0 "Entraînement diplomatique"
 diplomatic_training_desc:0 "Le manuel diplomatique de notre cour a été optimisé, ce qui a conduit à la formation d'un excellent groupe de diplomates capables de renforcer notre politique étrangère."
 discipline_drills:0 "Entraînement et discipline"
 discipline_drills_desc:0 "Au combat, seules trois valeurs comptent : la puissance de feu, les effectifs et la discipline qui combine les deux premières. Des exercices militaires réguliers permettront d'améliorer les capacités militaires de nos troupes."
 distant_trade_ventures:0 "Commerce lointain"
 distant_trade_ventures_desc:0 "Ce sont les plus lointaines contrées qui abritent les produits les plus lucratifs. Durant de nombreuses années, les marchands $muslim_ADJ$s ont parcouru de vastes distances sur terre comme en mer en quête d'opportunités commerciales profitables."
 distiller_manufactory_advance:0 "Manufacture de produits distillés"
 distiller_manufactory_advance_desc:0 "$distiller_manufactory_desc$"
 distiller_mill_advance:0 "$distiller_mill$"
 distiller_mill_advance_desc:0 "$distiller_mill_desc$"
 distillers_workshop_advance:0 "$distillers_workshop$"
 distillers_workshop_advance_desc:0 "$distillers_workshop_desc$"
 distribution_of_power_advance:0 "$distribution_of_power_law$"
 distribution_of_power_advance_desc:0 "$distribution_of_power_law_desc$"
 diversity_of_beliefs:0 "Diversité des croyances"
 diversity_of_beliefs_desc:0 "Les croyances du peuple d'$india$ gravitent autour du concept de dharma et des $vedah$, mais se manifestent sous une multitude de formes et pratiques. Même les dieux reconnus et vénérés peuvent varier, tandis que demeurent des notions communes."
 divide_estates:0 "Diviser les Ordres"
 divide_estates_desc:0 "Unis, les trois ordres forment un bloc efficace contre le pouvoir du dirigeant. Pour asseoir notre contrôle, nous devons systématiquement faire pression sur la noblesse pour qu'elle s'oppose aux autres ordres."
 divine_church_music:0 "Musique religieuse divine"
 divine_church_music_desc:0 "Nombre de nos compositeurs ont créé leurs plus grands chefs-d'œuvre grâce à l'inspiration de la foi. Nous devrions donc continuer à rechercher des artistes talentueux et les recruter pour que jamais plus de piètres mélodies ne résonnent dans l'enceinte de nos églises et cathédrales."
 divine_passion:0 "Passion divine"
 divine_passion_desc:0 "Les temps changent. Là où la foi primait, des idées autrefois considérées comme païennes se répandent au sein du peuple. Face à un monde en pleine évolution, notre clergé trouve du réconfort dans son dévouement inébranlable à la cause qu'il défend."
 divine_supremacy:0 "Suprématie divine"
 divine_supremacy_desc:0 "Il est de la plus haute importance que nous débarrassions le pays et les régions environnantes des infidèles qui souillent nos terres."
 diwali:0 "Diwali"
 diwali_desc:0 "$diwali$ est la fête des lumières hindoue qui célèbre la prédominance du dharma, la victoire du bien sur le mal et le triomphe de la lumière sur les ténèbres. Nous allumerons des bougies et des lanternes en cette occasion, et honorerons nos ancêtres."
 dlh_afghan_nobility:0 "Noblesse $afghan_culture$e"
 dlh_afghan_nobility_desc:0 "Une grande partie de la noblesse $DLH_ADJ$ est issue des rangs de la communauté $afghan_culture$e, un peuple ayant une longue histoire de conquête et de domination dans le nord de l'$india$. Bien que parfois un obstacle politique, leurs compétences martiales sont incontestables."
 dlh_cosmopolitan_religions:0 "Religions cosmopolites"
 dlh_cosmopolitan_religions_desc:0 "L'$india$ est un vaste sous-continent où plusieurs religions sont pratiquées. Afin d'assurer la stabilité de notre royaume, nous devons étendre les droits des différentes confessions et nous assurer de leur loyauté."
 dlh_grand_trunk:0 "Protection de la Grande Marche"
 dlh_grand_trunk_desc:0 "Le Grande Marche s'étend de $kabul$ en Afghanistan jusqu'à la côte du $bengal_area$. La plupart des villes commerciales les plus importantes situées le long de cette route font partie de notre Empire, il nous incombe donc de veiller à ce que la route soit bien entretenue et exempte de banditisme."
 dlh_hindustani_identity:0 "L'identité $HIN_ADJ$e"
 dlh_hindustani_identity_desc:0 "Les idéologies étrangères de nationalisme et d'identités culturelles ont atteint le sous-continent indien. Si la diversité culturelle de l'$india$ reste acquise, il est clair que la géographie du sous-continent ainsi que les valeurs de l'$muslim$ nous donnent à tous un sentiment d'unité, sous la forme d'une identité $HIN_ADJ$e."
 dlh_indo_persian_culture:0 "Culture indo-perse"
 dlh_indo_persian_culture_desc:0 "Le $persian_language$ est la langue dominante de la cour depuis la création du sultanat $DLH_ADJ$ en 1290. Ainsi, l'influence du $persian_language$ a créé une synergie avec les cultures indiennes locales."
 dlh_origin_of_hindustani:0 "Berceau de l'hindoustani"
 dlh_origin_of_hindustani_desc:0 "L'$hindustani_language$ s'est développé depuis l'apabhramsha, une langue indo-aryenne intermédiaire. Elle est apparue en tant que langue de contact de $DLH$. Comme l'$hindustani_language$ tire ses influences du $persian_language$, de l'$arabic_language$, des langues turciques mais aussi de l'hindi ancien, la diplomatie avec le monde $muslim_ADJ$ et le monde $hindu_ADJ$ devient une tâche aisée."
 dlh_reintegrate_former_provinces:0 "Réintégrer les provinces perdues"
 dlh_reintegrate_former_provinces_desc:0 "Autrefois si vaste, le sultanat $DLH_ADJ$ a perdu la plus grande partie de ses anciennes possessions. Il n'a pas oublié pour autant la façon de les administrer. Alors que nous œuvrons à restaurer notre gloire passée, nous rappellerons aux dirigeants locaux leurs devoirs envers le sultan."
 dlh_restore_the_delhi_empire:0 "Restaurer la grandeur de $DLH$"
 dlh_restore_the_delhi_empire_desc:0 "Le sultanat $DLH_ADJ$ englobait jadis presque l'intégralité de l'$india$. Il doit maintenant renaître de ses cendres !"
 dlh_revert_ghiyath_reforms:0 "Abroger les réformes de Ghiyath"
 dlh_revert_ghiyath_reforms_desc:0 "Les décisions économiques insensées de Ghiyath al-Din n'ont apporté que la ruine financière à $DLH$. Nous devons revenir sur ses élucubrations et rétablir l'usage de l'or et de l'argent pour nos pièces de monnaie."
 dlh_revive_the_tughlaq_architecture:0 "Raviver l'architecture des Tughlûq"
 dlh_revive_the_tughlaq_architecture_desc:0 "À l'apogée de la dynastie des Tughlûq et pendant la période de stabilité de notre État, de grands architectes et des artistes à la vision grandiose ont construit des mosquées et des tombes dans le style unique des Tughlûq. Au fil des décennies, notre pouvoir a été remis en question par des problèmes internes et les ressources nécessaires à l'entretien de cette architecture se sont évanouies. Il est temps de la faire revivre et de rétablir $DLH$ en tant qu'empire de l'art et des merveilles."
 dlh_textile_innovation:0 "Une production textile innovante"
 dlh_textile_innovation_desc:0 "La prospérité de l'industrie textile de $DLH$ fait de notre pays un centre d'innovation technologique pour l'industrie. En tant qu'utilisateurs précoces de l'égreneuse à coton et du rouleau à vis, nous savons combien il est important de rester à l'avant-garde dans ces domaines. Nous devons maintenant veiller à ce que le rouet soit adopté le plus largement possible."
 dlh_throne_of_india:0 "Le trône indien"
 dlh_throne_of_india_desc:0 "Pendant des siècles, tous les grands empires indiens ont été dirigés depuis $delhi$. C'est le siège des conquérants et notre droit de naissance. Tous doivent savoir que $delhi$ abrite à nouveau le dirigeant légitime de toute l'$india$ !"
 dlh_turkic_conqueror_roots:0 "Racines des conquérants $turkic_group$s"
 dlh_turkic_conqueror_roots_desc:0 "Bien que nous considérions l'$india$ comme notre patrie, les ancêtres de notre État étaient d'origine $turkic_group$. Leurs premiers succès en tant que conquérants et dirigeants de l'époque de la dynastie $mamluk$, ainsi que les réalisations de la dynastie Khaldjî qui a suivi, inspirent nos militaires et nos diplomates à repousser les frontières de $DLH$ à travers l'$india$."
 dock_advance:0 "Quais"
 dock_advance_desc:0 "$dock_desc$"
 donation_of_constantine:0 "La donation de Constantin"
 donation_of_constantine_desc:0 "La donation de Constantin démontre que nous possédons l'autorité d'accorder le titre d'empereur des Romains à celui que nous choisissons. Elle prouve d'ailleurs aussi que nous sommes plutôt doués pour falsifier des documents."
 double_patriarchate:0 "Double patriarcat"
 double_patriarchate_desc:0 "$alexandria$ et $antioch$ se considèrent toutes deux comme ayant deux patriarcats différents, l'un pour le $miaphysite$ et l'autre pour l'$orthodox$. Bien qu'ils puissent revendiquer la légitimité de leur lignée, seul le $miaphysite$ préserve les véritables patriarcats."
 drafted_hatun_runas:0 "Enrôlement des hatun-runas"
 drafted_hatun_runas_desc:0 "Les hatun-runas sont les soldats de rang de l'Empire. Un homme sur cinquante est choisi pour servir dans l'armée à partir de son vingt-cinquième anniversaire, pour une durée de sept ans. Cela nous permet de disposer d'une armée professionnelle et conséquente, bien plus disciplinée que celles de nos ennemis."
 dragomans:0 "Drogmans"
 dragomans_desc:0 "À la fois guides, traducteurs et interprètes, les $dragomans$ sont des fonctionnaires talentueux qui œuvrent afin de renforcer nos efforts diplomatiques et commerciaux avec différents pays et communautés. La plupart des drogmans sont d'origine $greek_culture$, bien que certains soient issus de la culture $judaism_ADJ$, $armenian_culture$ ou d'un autre environnement polyglotte."
 drill_army_advance:0 "Entraînement de l'armée"
 drill_army_advance_desc:0 "Nous ne devons plus dépendre d'hommes non entraînés et non mobilisés. Si nous voulons défendre nos frontières et écraser nos rivaux, nous devons organiser des entraînements de manière régulière et structurée."
 drokpa:0 "Drokpa"
 drokpa_desc:0 "Les nomades Drokpa sont souvent éleveurs et marchands et relient des communautés éloignées. Leurs traditions et leur connaissance inégalée du terrain, leur permettent de parcourir les routes de haute montagne entre le Tibet, le Bhoutan, le Ladakh et le Népal. Leurs caravanes saisonnières transportent du sel, de la laine et de la viande séchée qu'ils échangent contre des céréales et des produits manufacturés. Ces réseaux transforment nos montagnes en un vibrant maillage de commerce et de diplomatie."
 dry_dock_advance:0 "Cale sèche"
 dry_dock_advance_desc:0 "$dry_dock_desc$"
 dte_dragon_of_oshu:0 "Dragon d'Ōshū"
 dte_dragon_of_oshu_desc:0 "Notre puissance et notre pouvoir susciteront l'envie chez nos ennemis. Notre nom sera à jamais associé au dragon d'Ōshū."
 dte_fujiwara_hokke:0 "Branche Hokke du clan Fujiwara"
 dte_fujiwara_hokke_desc:0 "En tant que « maison du Nord » du clan Fujiwara, la légitimité de notre règne est incontestable."
 dte_intensive_domain_development:0 "Développement intensif des domaines"
 dte_intensive_domain_development_desc:0 "Le climat difficile et le relief montagneux font du $ou_area$ une région pauvre aux yeux de beaucoup. Mais nos terres ont malgré tout un grand potentiel qu'il convient d'exploiter. La fondation de nouvelles villes, l'encouragement et la protection du commerce, la construction de canaux et l'extension des terres arables pourraient nous permettre d'améliorer notablement nos territoires, tout comme l'abolition des péages et la réduction des impôts qui étouffent le peuple devraient rendre nos sujets riches et la région prospère."
 dte_oshu_shugo:0 "Shugo d'Ōshū"
 dte_oshu_shugo_desc:0 "En tant que clan honorable remontant au début de la période Kamakura, nous avons de fortes prétentions à régner sur l'ensemble de la province de Ōshū. Heureusement pour nous, le territoire que couvre exactement Ōshū n'est pas bien défini."
 dutch_education:0 "Éducation néerlandaise"
 dutch_education_desc:0 "Si nos pays ont toujours bénéficié d'un taux d'alphabétisation supérieur dans toutes les couches de la société, cet avantage devient de plus en plus évident dans le monde qui se dessine devant nous. Seuls ceux qui ont une compréhension limitée n'en profiteraient pas et ne chercheraient pas à l'améliorer."
 dutch_golden_age_art:0 "Art néerlandais"
 dutch_golden_age_art_desc:0 "Les Pays-Bas ont toujours été à la pointe de l'innovation technologique et un foyer de la culture. Nous devons continuer de nous comporter en mécènes des inventeurs, des artistes et des penseurs pour maintenir cet avantage sur les autres pays."
 dyes_mill_advance:0 "$dyes_mill$"
 dyes_mill_advance_desc:0 "$dyes_mill_desc$"
 dyes_workshop_advance:0 "$dyes_workshop$"
 dyes_workshop_advance_desc:0 "$dyes_workshop_desc$"
 dyesworks_advance:0 "$dyesworks$"
 dyesworks_advance_desc:0 "$dyesworks_desc$"
 dynamic_court:0 "Cour progressiste"
 dynamic_court_desc:0 "Une cour véritablement progressiste permet à certains de s'élever pour briller. Nous devons à tout prix veiller à ce que les traditions anciennes, la naissance ou l'opulence ne soient pas un obstacle au développement de notre cour, ni un mur dressé face aux hommes de talent qui cherchent à s'accomplir au service du pays."
 early_anti_piracy_warfare:0 "Ligues contre la piraterie"
 early_anti_piracy_warfare_desc:0 "La prolifération des pirates, brigands et voleurs dans les eaux fréquentées par les commerçants qui soutiennent notre économie les a contraints à former des ligues marchandes afin de faciliter la protection des navires lors des longs voyages."
 early_council_hall_advance:0 "$early_council_hall$"
 early_council_hall_advance_desc:0 "$early_council_hall_desc$"
 early_iberian_caravel:0 "Caravelle ibérique primitive"
 early_iberian_caravel_desc:0 "D'origine ibérique, les premières caravelles étaient des navires de petite taille très rapides, utilisés pour la pêche au large et le commerce côtier. Son utilisation dans la péninsule ibérique est si répandue que l'on y trouve les caravelles les plus perfectionnées."
 early_iberian_galleon:0 "Galion ibérique primitif"
 early_iberian_galleon_desc:0 "Version précoce d'un puissant navire de haute mer, le $n_early_iberian_galleon$ est une invention originaire de la péninsule. Il est doté d'un gaillard d'avant abaissé et d'une longue coque qui le rend particulièrement stable et résistant aux vents frontaux."
 early_modern_administation:0 "Début de l'administration moderne"
 early_modern_administation_desc:0 "Avec le temps, il est devenu évident que pour mettre en place les projets ambitieux des dirigeants de l'époque moderne, il était nécessaire de disposer d'une bureaucratie plus centralisée, dont chaque département serait dirigé par des personnes éduquées et employées directement par l'État."
 east_and_west:0 "Est et Ouest"
 east_and_west_desc:0 "Notre situation géographique entre les nations de l'Est et de l'Ouest a offert à nos marchands la position enviable d'intermédiaires sur les routes commerciales extrêmement lucratives de la région."
 eastern_african_trade:0 "Commerce en Afrique de l'Est"
 eastern_african_trade_desc:0 "Les terres d'$east_africa$ se trouvent au carrefour de grandes routes commerciales. De l'$egypt_region$ aux ports de la Méditerranée, à travers la $red_sea_area$, jusqu'aux richesses de l'Orient au-delà de l'$indian_ocean_region$, et vers le sud le long des $swahili_coast_region$, le mouvement animé des marchandises et des populations est constant. Les pays de ces régions sont ainsi habitués à échanger biens et richesses comme moyen d'établir des relations diplomatiques."
 eastern_christianity:0 "$christian$ oriental"
 eastern_christianity_desc:0 "Nous faisons partie de la branche du $eastern_christianity$, qui regroupe de nombreuses dénominations différentes avec des traditions théologiques et liturgiques distinctes, mais également de nombreux aspects culturels communs."
 eastern_ecumenism:0 "Œcuménisme oriental"
 eastern_ecumenism_desc:0 "Les dénominations $christian_ADJ$nes de l'Église orthodoxe orientale, ou Église des trois conciles, ont tendance à être confondues par les non-initiés avec l'Église $orthodox_ADJ$ orientale, ou Église des sept conciles. Bien qu'elles diffèrent sur de nombreuses questions fondamentales, elles demeurent néanmoins $christian_ADJ$nes, et leurs points communs pourraient permettre de les ramener à la véritable foi."
 ecclesiastical_primacy:0 "Primauté ecclésiastique"
 ecclesiastical_primacy_desc:0 "Le pape détient l'autorité souveraine en matière de droit canon, religieux, au sein de l'Église catholique. L'État entretient des liens particuliers avec tous ceux qui se conforment à l'autorité catholique."
 economic_ideas:0 "Économie sous contrôle"
 economic_ideas_desc:0 "L'économie et la richesse d'un pays doivent être au service de l'État, et non l'inverse. Ainsi, l'État doit agir dans son intérêt pour accumuler les plus grandes quantités de ressources. C'est le seul moyen qu'a notre nation de prospérer."
 economical_policies_law_advance:0 "$economical_policies_law$"
 economical_policies_law_advance_desc:0 "$economical_policies_law_desc$"
 ecumenical_defenders_of_christendom:0 "Défenseurs œcuméniques de la chrétienté"
 ecumenical_defenders_of_christendom_desc:0 "La Réforme a nui à notre cause puisque les chevaliers allemands et scandinaves ont commencé à s'interroger sur la nature de l'hôte de Communion, mais l'omniprésence de la menace turque permet de faire passer ces différends au second plan. Peut-être devrions-nous nous concentrer sur le royaume et débattre de théologie une fois la menace des Sarrasins écartée ?"
 ecumenism:0 "Œcuménisme"
 ecumenism_desc:0 "La manière de traiter les hérétiques a toujours été une question épineuse. Même si la bonne vieille méthode du fer et du feu permet, au bout du compte, de régler la plupart des problèmes, la diplomatie peut payer, elle aussi. Encourager le dialogue entre les différentes sectes permettrait de dissiper les malentendus et de promouvoir la paix au sein du pays."
 edict_of_restitution:0 "L'Édit de restitution"
 edict_of_restitution_desc:0 "Une discrète opération comptable nous aidera à surmonter les conflits religieux qui pourraient survenir dans notre royaume. Cet édit inoffensif ne déclenchera certainement pas d'autres conflits."
 edicts_of_ashoka:0 "Édits d'Ashoka"
 edicts_of_ashoka_desc:0 "Publié au IIIe siècle av. J.-C. par l'empereur Ashoka le Grand, ce code juridique fait la promotion du $buddhist$. Bien que ces édits remontent à de nombreux siècles, ils inspirent toujours un grand respect et une profonde vénération parmi les adeptes $buddhist_ADJ$s."
 educated_bureaucrats:0 "Fonctionnaires éduqués"
 educated_bureaucrats_desc:0 "Les fonctionnaires qui dirigent notre administration ne sont pas les héritiers analphabètes et paresseux de la fonction occupée par leurs pères, mais des hommes éduqués et talentueux qui ont obtenu leur poste grâce à leurs efforts et à leur mérite. Nul doute qu'une telle administration fonctionnera plus efficacement que n'importe quelle autre."
 efficient_bureaucracy:0 "Bureaucratie efficace"
 efficient_bureaucracy_desc:0 "La bureaucratie est l'huile qui permet aux rouages de notre administration de fonctionner correctement. En nommant des fonctionnaires efficaces et talentueux qui ont à cœur de s'acquitter correctement de leurs tâches, nous garantirons le bon fonctionnement de nos structures gouvernementales."
 efficient_construction_plans:0 "Planification des constructions"
 efficient_construction_plans_desc:0 "Une planification méticuleuse des travaux permet de répondre aux commandes sans devoir travailler à la va-vite."
 efficient_logistics:0 "Logistique efficace"
 efficient_logistics_desc:0 "La logistique et les communications nous aident à administrer correctement l'ensemble de notre territoire. Afin de permettre aux messages de circuler entre nos provinces et les gouverneurs, nous avons besoin d'un réseau de routes de qualité pour améliorer le déplacement de nos messagers."
 efficient_mining:0 "Efficacité des mines"
 efficient_mining_desc:0 "Afin de réguler l'approvisionnement des marchés en métaux, une législation est indispensable pour gérer chaque aspect des travaux miniers dans le pays."
 efficient_spies:0 "Espions efficaces"
 efficient_spies_desc:0 "La plupart des paysans vendraient leur propre mère pour de l'argent, mais il est difficile de trouver ceux qui peuvent réellement s'avérer utiles. Nous apprenons cependant, par l'expérience, à séparer le bon grain de l'ivraie."
 elan:0 "Impétuosité"
 elan_desc:0 "Maintenir un esprit offensif est fondamental pour une armée. Nos hommes montrent une impétuosité telle que nous avons un net avantage sur le champ de bataille."
 eltham_ordinance:0 "Ordonnance d'Eltham"
 eltham_ordinance_desc:0 "Rejetée en 1526, cette ordonnance n'en constitue pas moins la première tentative de rationalisation de la bureaucratie royale anglaise, visant à la rendre à la fois plus efficace et moins coûteuse."
 emancipation:0 "Émancipation"
 emancipation_desc:0 "Pendant très longtemps, nous n'avons accordé le droit de posséder des terres qu'à ceux que nous jugions suffisamment dignes de confiance. Si nous levions ces restrictions, les propriétés foncières seraient consolidées, ce qui créerait une force de travailleurs saisonniers pour qui l'armée deviendrait une carrière envisageable."
 embellish_baroque_art:0 "Embellissement des œuvres baroques"
 embellish_baroque_art_desc:0 "Le mécénat est une tradition importante au sein de notre foi. Le développement du style baroque reflète bien notre théologie, aussi devrions-nous continuer à soutenir ces artistes."
 embrace_romanticism:0 "Adoption du romantisme"
 embrace_romanticism_desc:0 "Au lendemain du siècle des Lumières, nous ne devons pas oublier l'attrait du romantisme. Nos artistes de ce courant produiront très certainement de sublimes œuvres d'art."
 empiricism:0 "Empirisme"
 empiricism_desc:0 "Les choses sont ce qu'elles sont car nous pouvons les sentir, les observer et, plus généralement, les percevoir grâce à nos sens. Exploiter ces preuves empiriques nous permettra de développer des idées nouvelles."
 encouraged_city_living:0 "Promotion de la vie citadine"
 encouraged_city_living_desc:0 "Nos prédécesseurs nous ont légué une ville magnifique. Nous devons continuer à embellir et améliorer la métropole méditerranéenne, afin qu'elle puisse continuer de croître et de prospérer. Nous ne pouvons plus nous contenter de réparer et d'entretenir le port et les bâtiments. Assurons-nous de pouvoir maintenir une population importante en construisant des aqueducs, en asséchant les marais et en pavant plus de routes."
 encouragement_of_philosophers:0 "Encouragements aux philosophes"
 encouragement_of_philosophers_desc:0 "Milan approuve depuis longtemps la pensée de la Renaissance. Nous devrions poursuivre cette tradition en étendant notre mécénat et en construisant des structures capables d'attirer les plus grands penseurs d'Europe."
 end_of_shipbuilding_guilds:0 "Fin des guildes de construction navale"
 end_of_shipbuilding_guilds_desc:0 "Dans la péninsule Arabique, il y a toujours eu des guildes pour contrôler la construction des navires. Or, si elles ont rendu de grands services en maintenant vivante la tradition de la construction navale, elles constituent désormais un frein au progrès. Nous devons ouvrir la construction navale à tous ceux qui y ont le moindre talent."
 enforced_service:0 "Service obligatoire"
 enforced_service_desc:0 "Les structures de notre armée pâtissent du principe du recrutement basé sur le volontariat : nous manquons d'hommes à certaines périodes. Nous devrions vraiment désigner des volontaires."
 eng_experimental_riflemen:0 "$a_experimental_riflemen$"
 eng_experimental_riflemen_desc:0 "$a_experimental_riflemen_desc$"
 eng_red_coats:0 "Tuniques rouges"
 eng_red_coats_desc:0 "La vie dans l'armée anglaise est exténuante et soumise à toutes sortes de règlements, mais elle forge le caractère de chacun de nos hommes. Leur inflexibilité et leur expertise dans les armes à feu suscitent l'effroi chez nos ennemis."
 engineer_corps:0 "Corps du génie"
 engineer_corps_desc:0 "Le corps du génie nous permet de rassembler les plus grands esprits de notre pays en matière de technologie militaire et d'utiliser au mieux leurs services inestimables."
 english_ambition:0 "Souverains des vagues"
 english_ambition_desc:0 "Une présence maritime massive est nécessaire pour toute nation désireuse de dominer les mers. Notre flotte sera si imposante que les côtes de nos ennemis seront toujours encerclées par nos navires."
 english_heritage:0 "Notre foyer insulaire"
 english_heritage_desc:0 "Notre île nous protège des ennemis extérieurs, mais ce sera en pure perte si nous ne protégeons pas les eaux qui l'entourent. En étant les véritables maîtres des mers qui bordent nos côtes, nous contrôlerons fermement les menaces extérieures."
 english_tradition:0 "Cœurs de lion"
 english_tradition_desc:0 "La bravoure et la discipline des fantassins anglais ont été observées depuis les mur de boucliers de Northumbrie jusqu'aux cieux assombris de France. Inspirée par le cœur de lion de nos rois et par le stoïcisme de l'homme du peuple, notre infanterie combat avec la férocité du guerrier anglo-saxon avant elle."
 enlightened_court:0 "Cour des Lumières"
 enlightened_court_desc:0 "Les principes des Lumières sont omniprésents dans les cours modernes, invitant les plus grands esprits à s'y rassembler. Grâce à cela, nous pouvons désormais accomplir bien plus avec des efforts moindres."
 enlightenment_advance:0 "Lumières"
 enlightenment_advance_desc:0 "Le siècle dernier a vu la raison et l'empirisme gagner en popularité parmi les grands esprits de la période. Les Lumières de la raison ont été allumées, et nombreux sont ceux qui ont décidé de ne pas prendre de repos tant qu'elles n'éclaireront pas jusqu'au dernier recoin de ce monde."
 entrenched_church:0 "Église ancrée"
 entrenched_church_desc:0 "Quel que soit le peuple que nous gouvernons, l'Église trouvera un moyen de lui fournir une structure unifiée."
 entrepot_advance:0 "Entrepôt"
 entrepot_advance_desc:0 "$entrepot_desc$"
 entrepot_connections:0 "Connexions des entrepôts"
 entrepot_connections_desc:0 "Pour prospérer en tant que carrefour commercial, nos villes doivent être reliées par des infrastructures solides. En confiant à la noblesse la construction et l'entretien des routes stratégiques, nous dynamisons notre commerce intérieur et renforçons les artères vitales de notre royaume."
 epi_adriatic_gatekeepers_advance:0 "Gardiens de l'Adriatique"
 epi_adriatic_gatekeepers_advance_desc:0 "En contrôlant les ports de Valona et Butrint, l'Épire règne en maître sur la mer Adriatique. Nous avons tiré parti de cette position pour négocier des traités commerciaux avantageux avec Venise et les cités-États italiennes, qui doivent passer par notre sphère d'influence pour atteindre le Levant. En imposant des droits de douane précis et en fournissant des services de « protection » contre les corsaires, nous avons transformé notre despotat autrefois isolé en un riche centre commercial qui fait le pont entre l'Orient et l'Occident."
 epi_arvanite_communities_advance:0 "Communautés arvanites"
 epi_arvanite_communities_advance_desc:0 "Afin de renforcer nos effectifs qui s'amenuisent, nous avons invité les redoutables clans des Arvanites à s'installer au cœur des vallées fertiles de l'Épire et de l'Acarnanie. En échange de terres et d'autonomie, ces guerriers nous fournissent une force d'infanterie légère infatigable qui excelle dans les combats brutaux et rapprochés typiques de la frontière balkanique. Leur culture martiale unique, mêlée à notre tradition militaire romaine, créent une force hybride d'une loyauté exceptionnelle et d'une agressivité sans nom lorsque la bataille fait rage."
 epi_balkan_marriages_advance:0 "Mariages balkaniques"
 epi_balkan_marriages_advance_desc:0 "Située au carrefour des mondes grec, slave et latin, la région de l'Épire compte parmi ses meilleurs diplomates les filles issues de notre lignée royale. Grâce à un réseau complexe de mariages stratégiques avec des rois serbes, des chefs albanais, voire des comtes italiens, nous avons fait de la maison Doukas Comnène l'arbitre indispensable de la politique balkanique. Ces liens du sang nous permettent de nous appuyer sur de puissants alliés, prêts à frapper les flancs de nos ennemis, lorsque nous partons en guerre."
 epi_fortresses_of_ioannina_advance:0 "Forteresses de Ioannina"
 epi_fortresses_of_ioannina_advance_desc:0 "La ville de Ioannina s'est transformée en véritable forteresse. Grâce aux dernières avancées en matière d'ingénierie militaire italienne, nous avons pu border notre capitale et son lac d'une série de bastions et de forts aquatiques imbriqués, capables de résister à des mois de bombardements soutenus. Ce réseau défensif sert de point d'ancrage à notre stratégie nationale et nous permet de nous replier au cœur d'un noyau imprenable chaque fois que le cours de la guerre tourne à notre désavantage."
 epi_the_eagle_of_the_pindus_advance:0 "L'aigle du Pinde"
 epi_the_eagle_of_the_pindus_advance_desc:0 "Dans les sommets escarpés et balayés par les pluies des montagnes du Pinde, les despotes d'Épire ont taillé un sanctuaire que nulle armée latine ne peut pénétrer. Nous maîtrisons l'art de la guerre d'embuscade en montagne et exploitons la géographie verticale de notre royaume pour piéger et détruire des forces bien plus importantes dans des passages étroits. Cette maîtrise de l'environnement transforme notre pays en un piège mortel pour les envahisseurs : si les plaines peuvent tomber, les montagnes, quant à elles, resteront à jamais grecques."
 epi_the_sublime_diplomacy_advance:0 "Diplomatie prestigieuse"
 epi_the_sublime_diplomacy_advance_desc:0 "Des siècles de survie entre des ennemis puissants ont fait de notre corps diplomatique le plus sophistiqué au monde. Nous avons développé une doctrine de « neutralité de la force », en montant habilement les grandes puissances les unes contre les autres afin qu'elles se disputent nos faveurs plutôt que de chercher à nous conquérir. Nos ambassadeurs sont réputés pour leur capacité à négocier des traités de paix qui semblent, à terme, favoriser toujours davantage l'Épire en termes de territoire et d'influence."
 epic_of_sundiata:0 "Épopée de Soundiata"
 epic_of_sundiata_desc:0 "L'$epic_of_sundiata$ raconte la campagne légendaire de Soundiata Keita, fondateur du Mali et héros de notre peuple. Son histoire, transmise de génération en génération, a toujours été une grande source d'inspiration pour nous."
 epic_poetry_advance:0 "Poésie épique"
 epic_poetry_advance_desc:0 "Depuis des millénaires, notre peuple a préservé les légendes des dieux et des héros à travers la poésie épique. Des œuvres telles que l'Iliade et l'Odyssée d'Homère, aux côtés de la Théogonie d'Hésiode, comptent parmi les plus grands monuments de notre patrimoine culturel. Ces récits intemporels continuent de façonner notre identité et d'inspirer les générations."
 escort_ships:0 "Corvettes"
 escort_ships_desc:0 "La corvette est un petit bâtiment conçu pour escorter les navires alliés et harceler les vaisseaux ennemis, en s'appuyant moins sur la puissance de feu que sur la vitesse et l'agilité."
 established_holy_sites:0 "Lieux saints établis"
 established_holy_sites_desc:0 "Tandis que d'autres religions montrent un certain laxisme et une certaine incohérence quant à l'utilisation de leurs lieux saints, les règles de l'$muslim$ vis-à-vis de ces lieux sont claires. C'est pourquoi il ne fait aucun doute que nous accomplirons diligemment nos pèlerinages le moment venu."
 estates_general:0 "États généraux"
 estates_general_desc:0 "Les États généraux se réunissent depuis 1303. Transformés progressivement de conseil convoqué par le roi à une assemblée d'élus, cela leur confère une plus grande légitimité, ainsi que les impôts qu'ils prélèvent."
 estates_of_brittany:0 "Les États de Bretagne"
 estates_of_brittany_desc:0 "Réunis pour la première fois au XIVe siècle, les États de $BRI$ ont permis à des hommes libres, issus de toutes les couches de la société, y compris du tiers état, de faire part de leurs griefs et requêtes au duc pour obtenir réparation. Convoquer les ordres permet d'évacuer une partie des tensions qui règnent sur nos terres."
 eternal_crusade:0 "Croisade éternelle"
 eternal_crusade_desc:0 "En tant que chrétiens, nous nous trouvons entourés d'adversaires musulmans qui ne rateront jamais l'occasion de nous attaquer. Pour assurer notre survie, nous devons nous tenir prêts à combattre au plus vite."
 exchange_of_ideas:0 "Échanges d'idées"
 exchange_of_ideas_desc:0 "En sus de l'argent et des profits qui transitent le long de la $silk_road$ ; maintes idées et connaissances circulent également au gré des allées et venues des marchands."
 expand_varangian_guard_advance:0 "Développer la garde varègue"
 expand_varangian_guard_advance_desc:0 "Les Varègues servent notre pays depuis des siècles avec un honneur distingué et une foi inébranlable. En élargissant leurs rangs, nous ne ferons que renforcer notre stabilité et la protection de Byzance."
 expanded_aqueduct_system:0 "Systèmes d'aqueducs développés"
 expanded_aqueduct_system_desc:0 "La croissance de nos centres urbains a entraîné une demande exponentielle en eau potable sûre. Si nous voulons que nos villes et cités prospèrent, nous devons nous engager à réaliser des prouesses techniques encore plus ambitieuses et à développer nos réseaux d'aqueducs."
 expanded_arsenale:0 "Extension de l'arsenal"
 expanded_arsenale_desc:0 "Depuis le XIVe siècle, l'Arsenal de Naples a été au cœur de la production maritime et notre première installation portuaire. Cet arsenal doit toutefois être étendu et modernisé, si nous voulons pouvoir continuer de faire face aux flottes hostiles en Méditerranée. Pour disposer d'une flotte plus importante et plus forte, il nous reste donc à étendre les quais du port et à construire un arsenal plus efficace."
 expanded_grazing_grounds:0 "Pâturages étendus"
 expanded_grazing_grounds_desc:0 "Notre pays dispose de nombreuses terres adaptées à l'élevage, nous permettant d'accroître relativement facilement notre production de bétail."
 expanded_infrastructure_network:0 "Réseaux d'infrastructures étendus"
 expanded_infrastructure_network_desc:0 "Le réseau routier couvrant le pays est un élément essentiel pour assurer le développement du commerce et de l'administration. Il est par conséquent crucial de veiller à son entretien et à son amélioration."
 expanded_slave_trade:0 "Renforcement du contrôle sur le commerce des esclaves"
 expanded_slave_trade_desc:0 "La demande en esclaves de la part de marchands externes s'accroît sans cesse. Notre position dans le monde africain fait de nous les intermédiaires idéaux pour ce commerce. Encourageons donc ceux qui cherchent à acheter ou vendre des esclaves à venir sur nos terres et à mener leurs affaires sur nos marchés."
 expanded_supply_trains:0 "Convois de ravitaillement accrus"
 expanded_supply_trains_desc:0 "En investissant plus de ressources dans nos convois de ravitaillement, nous permettons à nos armées de faire campagne plus longtemps en territoire hostile."
 expansion_merchant_guilds:0 "Développement des guildes de marchands"
 expansion_merchant_guilds_desc:0 "Les marchands pochteca développent leurs routes bien au-delà de nos terres, enrichissant ainsi l'ensemble des marchés fidèles aux Mexicas."
 expansion_of_trade_contacts:0 "Développement des réseaux commerciaux"
 expansion_of_trade_contacts_desc:0 "Nous devons faire en sorte que nos marchands soient les bienvenus, où qu'ils se rendent. Cela implique que nous faisions usage de tous les moyens à notre disposition pour que tous les souverains que nous connaissons les accueillent au mieux."
 expansionism:0 "Une graine parmi les épines"
 expansionism_desc:0 "Le monde est vaste et nous ne pouvons pas nous contenter de rester sur notre petit lopin de terre, car nos voisins n'en feront pas forcément autant. Nous devons nous étendre et nous renforcer, sous peine d'être étouffés par nos voisins en pleine croissance."
 expansionist_ambitions:0 "Ambitions expansionnistes"
 expansionist_ambitions_desc:0 "Alors que les Balkans se divisent, bon nombre de puissances balkaniques se tournent vers l'extérieur. Des dirigeants ambitieux cherchent à accaparer des territoires divers pour former une couronne unifiée et forte, en tirant parti de la faiblesse de Byzance."
 expansionist_faith:0 "Foi expansionniste"
 expansionist_faith_desc:0 "Par le passé, l'$muslim$ s'est très rapidement développé depuis ses origines dans la région d'$arabia_region$. En à peine quelques générations, il est parvenu à s'étendre de l'$iberia_region$ jusqu'à l'$india$, marquant la plus rapide expansion que le monde n'ait jamais connue. De nouvelles terres se situent au-delà de nos frontières, aussi est-il peut-être aujourd'hui temps d'assister à une seconde expansion $muslim_ADJ$e."
 expansive_policies:0 "Politiques expansionnistes"
 expansive_policies_desc:0 "Les terres du Brandebourg, essentiellement des sols sablonneux, sont pauvres et considérées comme le #italic bac à sable#! du Saint-Empire romain germanique. Nos dirigeants ont toujours ressenti le besoin pour le margraviat de s'étendre dans toutes les directions, revendiquant souvent des trônes voisins comme celui de la Poméranie. Accueillant de ce fait différentes cultures en son sein, notre pays est devenu un véritable melting-pot."
 experienced_diplomats:0 "Diplomates expérimentés"
 experienced_diplomats_desc:0 "Il suffit parfois de faire croire que nous sommes puissants. Notre corps diplomatique a œuvré pour s'assurer que nos paroles soient réellement prises en considération."
 experienced_fur_hunters:0 "Commerce des fourrures"
 experienced_fur_hunters_desc:0 "Le commerce des fourrures avec les autres tribus et les étrangers est l'un des principaux piliers de notre économie. Nous nous enorgueillissons de notre adresse à la chasse et pouvons fournir à tous les fourrures de la meilleure qualité."
 expert_hagglers:0 "Négociateurs experts"
 expert_hagglers_desc:0 "Qu'ils débarquent sur les côtes d'$south_asia$ ou les marchés de la lointaine Chine, nos marchands sont respectés pour leur éloquence et leur jugement pointu. Aussi doués pour naviguer avec finesse sur les mers que pour mener des négociations, ils veillent à ce que nos échanges commerciaux ne soient jamais désavantageux."
 exploit_the_alpine_trade:0 "Nœuds commerciaux de Bavière"
 exploit_the_alpine_trade_desc:0 "Nos territoires sont fréquentés par les marchands qui commercent du sel, de l'argent et du bétail vers les riches territoires au sud. Il serait insensé de ne pas tirer parti de leur présence. Nous devons veiller à ce que ces routes commerciales amènent de riches profits à nos localités urbaines."
 exploration:0 "Doctrines d'exploration"
 exploration_desc:0 "Notre capacité à naviguer au-delà de l'horizon découle de notre revendication naturelle sur les rivages et les habitants des terres inexplorées."
 exploration_maintenance_advance:0 "Construction robuste"
 exploration_maintenance_advance_desc:0 "Le facteur clé lors de la construction d'un navire est sa capacité à résister aux intempéries et au battement des vagues. En développant des méthodes de construction navale plus robustes, nous nous assurons que nos navires pourront braver les mers plus longtemps."
 explorer_commisions_advance:0 "Commissions d'exploration"
 explorer_commisions_advance_desc:0 "Au-delà des mers se trouvent des territoires inexplorés, qui nous tendent les bras ! Le recrutement d'hommes courageux et d'explorateurs pour mettre le cap sur l'inconnu est une occasion lucrative et vitale pour notre nation."
 export_building_country_advance:0 "Exportation agile"
 export_building_country_advance_desc:0 "Les coûts d'exportation des marchandises de valeur issues de nos marchés contrôlés peuvent s'élever relativement haut, ce qui rend nos produits moins attractifs. Accélérer notre processus d'exportation dynamisera notre commerce."
 export_monopolies:0 "Monopoles d'exportation"
 export_monopolies_desc:0 "En contrôlant les exportations clés d'huile d'olive, de textiles et de teintures, nous garantissons à la fois la prospérité intérieure et notre influence à l'étranger. Ces pratiques protectionnistes nous permettent d'affirmer notre puissance par le commerce autant que par la conquête, et font en sorte que nos marchés sont occupés par nos marchands, et non par des étrangers."
 expulsion_of_heretics:0 "Bannissement des hérétiques"
 expulsion_of_heretics_desc:0 "Les hérétiques de notre domaine pourraient bien faire naître une rébellion à l'encontre de notre souverain. Mieux vaudrait les rediriger vers nos colonies d'outre-mer, où ils causeront moins de problèmes."
 exsurge_domine:0 "Exsurge Domine"
 exsurge_domine_desc:0 "Pour éradiquer le poison de l'hérésie, le Seigneur lui-même se soulèvera afin de la chasser de nos territoires !"
 extend_kampung_kampung:0 "Étendre les kampung-kampung"
 extend_kampung_kampung_desc:0 "La société sundanaise repose sur les kampung, ces communautés rurales qui ponctuent le paysage. Investir dans leurs infrastructures garantit une croissance durable, une autorité locale solide et une meilleure résilience face aux famines et aux invasions."
 extensive_canal_works:0 "Travaux étendus sur les canaux"
 extensive_canal_works_desc:0 "Les nombreux cours d'eau qui traversent notre domaine sont le plus souvent annonciateurs de prospérité. Pour tenter d'exploiter leur richesse, nous construirons des réseaux d'infrastructures afin de fournir de l'eau et des moyens de transport entre les rivières et nos colonies à l'intérieur des terres."
 external_friends:0 "Amis extérieurs"
 external_friends_desc:0 "L'envoi de nos émissaires vers $rome$ et l'$iberia_region$, à la recherche de soutien militaire, a été un véritable succès. Ces entreprises ne devraient jamais s'arrêter."
 extreme_pacifism:0 "Pacifisme extrême"
 extreme_pacifism_desc:0 "Basé sur le concept de l'$ahimsa$, l'$hindu$ prône toujours la paix et la non-violence. Cependant, mieux vaut que nos ennemis évitent de nous provoquer s'ils ne veulent pas nous voir adopter l'extrême opposé."
 faceting:0 "Facettage"
 faceting_desc:0 "Les maîtres de la taille des pierres précieuses ont fait une grande avancée dans la découpe des diamants en faisant des expériences avec de la poussière de diamant en suspension dans de l'huile et une roue. Cela permet de couper désormais cette pierre rare selon des formes entièrement nouvelles et d'obtenir un brillant bien plus marqué. Cette technique, appelée « facettage », produit une pierre géométrique, bien plus plaisante à l'œil et dotée de meilleures qualités optiques. À mesure que ces nouvelles pierres et la technique pour les façonner se répandent de cour en atelier, la demande pour les gemmes, les joyaux et les pierres précieuses ne fait que croître."
 falconry_mastery:0 "Maîtrise du faucon"
 falconry_mastery_desc:0 "Profondément ancrée dans notre culture, la fauconnerie représente un lien forgé entre notre peuple et ces magnifiques oiseaux de proie. Nous avons perfectionné nos compétences dans l'art ancien de la fauconnerie et nos fauconniers sont vénérés pour leur capacité à capturer, dresser et chasser avec ces majestueux rapaces."
 farari_corps_advance:0 "Corps de farari"
 farari_corps_advance_desc:0 "Les $farari_corps_advance$ sont l'élite de l'armée malaise. Ces hommes sont des commandants avertis et sont très respectés pour leur expérience et leur courage."
 fast_negotiations:0 "Négociations rapides"
 fast_negotiations_desc:0 "Parfois, pour emporter un marché, il suffit d'être le plus rapide. Faisons ce qu'il faut pour que nos marchands puissent conclure des accords."
 faster_colonists:0 "Colonisateurs plus rapides"
 faster_colonists_desc:0 "Il ne suffit pas d'envoyer des colonisateurs pour qu'ils mettent sur pied des colonies : il est nécessaire de préparer l'expédition et de rassembler tous les outils nécessaires à leur survie sur leur terre d'accueil. Nous pourrions toutefois gagner du temps en mettant à profit notre expérience historique en la matière."
 faster_levy_recruitment:0 "Formation obligatoire au maniement des armes"
 faster_levy_recruitment_desc:0 "Tous les paysans de sexe masculin doivent savoir manier une lance ou un arc et s'entraîner régulièrement afin de servir efficacement au cas où ils seraient appelés à prendre les armes."
 father_governs_children:0 "Le père régit ses enfants"
 father_governs_children_desc:0 "Nos dirigeants sont réputés pour être proches du peuple. Puisse notre peuple vivre libre et heureux sous le règne de leurs vénérables souverains."
 feathered_serpent:0 "Le serpent à plumes"
 feathered_serpent_desc:0 "Une légende largement répandue dans nos territoires parle du serpent à plumes. Même s'il incarne des choses bien différentes pour des peuples très divers, qu'il soit Quetzalcóatl pour les $nahua_group$s, K'uk'ulkan pour les $maya_language$s ou Q'uq'umatz pour les $kiche_culture$s, il constitue un facteur d'unité pour tout le pays."
 federal_constitution:0 "Fondation d'une fédération"
 federal_constitution_desc:0 "Nous devrions fonder une fédération aux côtés de nos peuples amis, et ainsi mettre au premier plan les notions de confiance mutuelle et de développement."
 feo_black_sea_fur_trade_advance:0 "Commerce de fourrures de la mer Noire"
 feo_black_sea_fur_trade_advance_desc:0 "Malgré notre petite taille, nous contrôlons les ports stratégiques reliant les vastes forêts productrices de fourrures de Russie aux marchés de la Méditerranée. Nous avons négocié des droits exclusifs avec les khâns tatars locaux afin de bénéficier de l'exclusivité en termes de transport de ces fourrures à travers la mer Noire. Ce monopole particulièrement lucratif nous procure les fonds nécessaires pour offrir une rémunération aux ingénieurs génois et aux lettrés byzantins, garantissant ainsi que notre petite principauté maintienne son statut de centre de richesse et de sophistication au milieu de la steppe."
 feo_gothic_hellenic_synthesis_advance:0 "Synthèse gothico-hellénique"
 feo_gothic_hellenic_synthesis_advance_desc:0 "Les vestiges des Goths de Crimée, isolés dans les montagnes du même nom, et la population grecque locale ont fusionné pour former une identité unique et résiliente. Cette culture combine l'héritage stoïque et martial du Nord avec le génie administratif et maritime du Sud. Cet esprit « théodorien » représente notre meilleure défense et crée des individus qui se considèrent comme les derniers véritables gardiens de la frontière romaine, prêts à se sacrifier pour préserver leur mode de vie singulier."
 feo_the_bastion_of_mangup_advance:0 "Le bastion de Mangoup"
 feo_the_bastion_of_mangup_advance_desc:0 "Véritable montagne taillée en forteresse, notre capitale, Mangoup Kale, est entourée de falaises abruptes qui résistent aux engins de siège. Nous avons renforcé ces défenses naturelles par une série de tunnels sophistiqués, de citernes et de portes dérobées, offrant ainsi à la ville des moyens efficaces pour résister pendant de nombreuses années aux éventuelles attaques. Cette base imprenable garantit que même si nos terres sont ravagées par la Horde d'or, le cœur de notre principauté, parfaitement à l'abri, reste un symbole d'espoir pour tous les chrétiens du Nord."
 feo_the_gothic_red_guard_advance:0 "La Garde rouge gothique"
 feo_the_gothic_red_guard_advance_desc:0 "S'inspirant des traditions antiques et macabres de nos ancêtres gothiques ainsi que des manuels militaires rigoureux des Romains, nous avons formé la #italic Garde rouge#!. Ces troupes de choc d'élite, recrutées exclusivement dans les villages de haute montagne de Crimée, sont entraînées à combattre dans les tunnels obscurs de nos forteresses et les ravins oppressants de la côte. Armés de lourdes armes d'hast et des derniers pistolets à silex, ces combattants sont passés maîtres dans l'art de mener des raids soudains et dévastateurs. Leur réputation de ne jamais faire de prisonniers ni battre en retraite en fait l'infanterie la plus redoutée du bassin pontique, capable de briser le moral des régiments les plus aguerris."
 feo_the_iron_harvest_advance:0 "La moisson de fer"
 feo_the_iron_harvest_advance_desc:0 "La culture hybride gréco-gothique de la principauté de Théodoros s'est intégralement débarrassée de sa carapace défensive pour se transformer en une véritable « machine de guerre ». Au lieu de nous contenter de survivre sur les falaises, nous avons industrialisé nos forteresses montagneuses pour en faire d'immenses fonderies et casernes, produisant un corps d'officiers professionnels et une armée de conscrits entraînés à la dure école de la guerre des steppes. Chaque citoyen de la principauté est désormais avant tout un soldat, considérant les plaines environnantes non pas comme une menace, mais comme un champ de récolte cultivé en faveur de la gloire gothique et de la reconquête romaine. Cette position de « guerre totale » nous permet de frapper avec une férocité terrifiante pour nos voisins plus puissants, car nous disposons d'une force armée disproportionnellement supérieure par rapport à la taille réduite de notre territoire."
 feo_the_northern_star_of_greece_advance:0 "L'étoile du Nord de la Grèce"
 feo_the_northern_star_of_greece_advance_desc:0 "En tant que principal État hellénophone du Nord, la principauté de Théodoros est devenue un symbole de résistance religieuse et de survie culturelle. Notre prince, que nous avons désigné comme #italic protecteur des Grecs pontiques#!, accueille des immigrants et des lettrés venus de contrées lointaines. Ce prestige religieux nous confère une autorité morale qui transcende nos frontières, faisant de notre nation #italic l'étoile du Nord#! de la foi orthodoxe grecque et un acteur clé dans les grandes luttes de religion."
 fertile_lands:0 "Terres fertiles"
 fertile_lands_desc:0 "En général, les territoires d'$asia$ connaissent des pluies abondantes, et de nombreuses rivières traversent les zones moins favorisées par les eaux du ciel. À l'exception des régions les plus arides du désert, la terre fournit de la nourriture à foison à sa population, et même lorsque ce n'est pas le cas, les habitants savent tirer le meilleur parti de ce qu'ils reçoivent."
 feudal_de_jure_law_advance:0 "$feudal_de_jure_law$"
 feudal_de_jure_law_advance_desc:0 "#italic De jure#! – « par la loi » – désigne les pratiques légalement reconnues indépendamment de la réalité de leur pratique. Les sociétés féodales sont bâties sur ce concept."
 filioque_issue:0 "Querelle du Filioque"
 filioque_issue_desc:0 "L'introduction sournoise de la clause #italic Filioque#! par les hérétiques occidentaux a été décidée sans la tenue d'un concile, et est par conséquent illégitime. Nous sommes les seuls à préserver le véritable Credo, tandis qu'ils seront à jamais condamnés à l'enfer pour leur sacrilège."
 fine_cloth_manufactory_advance:0 "Manufacture de tissus fins"
 fine_cloth_manufactory_advance_desc:0 "$fine_cloth_manufactory_desc$"
 fine_cloth_mill_advance:0 "Fabrique d'étoffes fines"
 fine_cloth_mill_advance_desc:0 "$fine_cloth_mill_desc$"
 fine_cloth_workshop_advance:0 "$fine_cloth_workshop$"
 fine_cloth_workshop_advance_desc:0 "$fine_cloth_workshop_desc$"
 fine_metals_mining:0 "Minage de métaux fins"
 fine_metals_mining_desc:0 "La découverte et le développement d'alliages métalliques inédits ont favorisé l'extraction et l'exploitation à plus grande échelle de nouveaux métaux précieux. Ce processus est particulièrement rentable par rapport à d'autres types d'exploitation minière."
 finest_of_horses:0 "Les meilleurs chevaux"
 finest_of_horses_desc:0 "Avec quelle précision ces troupes se mettent en bataille ! Comme cette cavalerie se forme bien ! Regardez ces chevaux gris ! Qui sont ces beaux cavaliers ? Ce sont de braves troupes !"
 finnish_heritage:0 "Cavalerie frontalière finlandaise"
 finnish_heritage_desc:0 "La cavalerie finlandaise, les Hakkapeliitta, s'est forgé une réputation redoutable dans les guerres européennes. Ces cavaliers, issus des forêts sauvages et des plaines de Finlande, apportent expérience, adaptabilité et endurance. En officialisant leur rôle, nous créerons une force d'élite permanente au sein de nos armées."
 firearms_factory_advance:0 "$firearms_factory$"
 firearms_factory_advance_desc:0 "$firearms_factory_desc$"
 firearms_manufactory_advance:0 "$firearms_manufactory$"
 firearms_manufactory_advance_desc:0 "$firearms_manufactory_desc$"
 first_fleet_of_the_med:0 "Première flotte de la Méditerranée"
 first_fleet_of_the_med_desc:0 "Les al-Muwaḥḥidūn, à la gloire passée, s'enorgueillissaient de posséder l'une des marines les plus redoutables de toute la Méditerranée. Notre peuple possède la tradition et le savoir-faire nécessaires pour restaurer notre grandeur sur les mers."
 fishing_habits:0 "Habitudes de pêche"
 fishing_habits_desc:0 "Il est parfois difficile de croire que certains d'entre nous ne sont pas nés sur les eaux mais sur la terre, car ils nagent avec une telle adresse qu'il est quasiment impossible de les distinguer du courant de la rivière."
 five_precepts:0 "Cinq préceptes"
 five_precepts_desc:0 "Servant de base à l'éthique et au code de moralité $buddhist_ADJ$s, les $five_precepts$ représentent les règles les plus fondamentales que tout adepte du $buddhist$ se doit de suivre, qu'il appartienne à la communauté monastique ou non. Ces préceptes enjoignent le peuple à ne pas tuer, ne pas voler, ne pas commettre d'inconduite sexuelle, ne pas mentir et ne pas user de substances intoxicantes."
 fla_cloth:0 "Draps flamands"
 fla_cloth_desc:0 "L'industrie du drap flamand fait l'envie du monde entier. Les marchands viennent de loin pour nous vendre leur laine, à partir de laquelle nous pouvons fabriquer les draps de la plus haute qualité."
 fla_flemish_renaissance:0 "Renaissance flamande"
 fla_flemish_renaissance_desc:0 "Nous qui disposons d'une des terres les plus développées du continent, il est naturel que la richesse créée à la sueur de notre front soit finalement consacrée à la création de choses moins pratiques, telles que l'art. Cet art, cependant, illumine les jours sombres de notre patrie. Avec des dizaines de marchands flamands agissant en tant que mécènes, l'offre des artistes ne cesse de croître."
 fla_prospering_agriculture:0 "Agriculture florissante"
 fla_prospering_agriculture_desc:0 "Alors que nos rivaux commencent à défier nos industries dédiées aux étoffes, aux produits de luxe ou aux finances, il devient indispensable de mieux utiliser nos biens terriens. Avec la préparation appropriée, nos territoires peuvent devenir un véritable grenier, ce qui rendrait notre économie encore plus diverse."
 flemish_cloth_making:0 "$flemish_cloth_industries_right$"
 flemish_cloth_making_desc:0 "$flemish_cloth_industries_right_desc$"
 flesh_is_weak:0 "La chair est faible"
 flesh_is_weak_desc:0 "Contrairement à l'âme, la chair est faible. Nos armées ont appris à combattre comme si une seule et unique âme les guidait, aussi leur moral ne vacillera jamais."
 flexible_loyalty:0 "Loyauté flexible"
 flexible_loyalty_desc:0 "Notre pays se trouve à la croisée des chemins entre les diverses religions d'Europe et de nombreuses forces qui pourraient mettre notre peuple en danger. Seule une attitude de coopération souple avec les diverses bandes de mercenaires de la région permettra d'assurer notre survie."
 flexible_negotiation:0 "Négociations ouvertes"
 flexible_negotiation_desc:0 "Il est toujours difficile de savoir ce que l'on peut retirer de négociations de paix. Mieux vaut y aller en envisageant toutes les possibilités."
 flintlock_gun:0 "Fusils de chasse améliorés"
 flintlock_gun_desc:0 "Avec des mousquets améliorés et des munitions spéciales pour la chasse, nos chasseurs seront encore plus à même d'attraper leurs proies."
 florentine_citizen_militia:0 "Milice citoyenne florentine"
 florentine_citizen_militia_desc:0 "Si notre peuple doit résister à l'épreuve du temps, il doit être prêt à se mobiliser rapidement pour défendre nos idéaux ! La formation d'une milice citoyenne, aussi féroce et expérimentée que les autres armées d'Europe, servira assurément à protéger notre domaine."
 florentine_school:0 "École florentine"
 florentine_school_desc:0 "Notre #italic arte del disegno#! compte parmi les plus influents au monde. L'impact des techniques artistiques florentines et l'attention portée au détail nous assurent d'être au sommet des sphères culturelle et artistique !"
 florino_d_oro:0 "Fiorino d'Oro"
 florino_d_oro_desc:0 "Une monnaie très puissante, soutenue par une excellente pureté de l'or et partagée par de nombreux États et institutions d'Europe. En adoptant le #Y florin#! comme devise, nous sommes assurés d'augmenter nos revenus tout en palliant les déficits financiers."
 folwark_system:0 "Système des folwarki"
 folwark_system_desc:0 "Les folwarki, ces grands domaines fonciers, sont un encouragement à la production de surplus agricoles, et constituent donc un pilier de l'économie polonaise. Les paysans sont incités à y travailler, soit contre un salaire, soit par la contrainte."
 food_advance_absolutism:0 "Champs fermés"
 food_advance_absolutism_desc:0 "Jusqu'à récemment, la propriété des terres et leur utilisation appropriée étaient plus ou moins courantes et libres. Cependant, la tendance est de plus en plus à la mise en place d'un processus de délimitation spécifique des terres, déterminant clairement les limites et la taille des champs dédiés à l'agriculture. Cela permet d'augmenter considérablement la production et l'exploitation de ces terres."
 food_advance_reformation:0 "Agriculture de marché"
 food_advance_reformation_desc:0 "Des cultures plus modernes et de meilleure qualité peuvent être introduites dans nos champs pour favoriser la productivité. En sélectionnant de meilleures variétés ou en les remplaçant par des produits étrangers, nous pouvons facilement augmenter notre rendement alimentaire."
 food_advance_renaissance:0 "Agriculture intensive"
 food_advance_renaissance_desc:0 "L'agriculture est le socle de la plupart des sociétés depuis qu'elles tiennent des annales. Récemment, une série de découvertes ont amélioré la productivité de nos champs et de nos fermes et accru les excédents alimentaires."
 foraging_our_way:0 "Notre nature de chasseurs"
 foraging_our_way_desc:0 "Nous sommes des chasseurs et vivons en communion avec la nature, même les citadins parmi nous. Nous avons dans le sang la capacité de sentir où se trouve le bon chemin et quels dons de la forêt sont bons pour nous. Cette sagesse nous permet de survivre partout sans difficulté."
 foreign_architectural_influence:0 "Influences architecturales étrangères"
 foreign_architectural_influence_desc:0 "Au cours de nos nombreuses conquêtes à travers l'$indonesia_region$, nous sommes entrés en contact avec de nombreux styles d'architecture susceptibles d'enrichir notre culture. En introduisant ces nouveaux mouvements artistiques dans le développement de nos villes, notre culture intégrera les meilleurs aspects artistiques de la région."
 foreign_cultural_law_advance:0 "$foreign_cultural_law$"
 foreign_cultural_law_advance_desc:0 "$foreign_cultural_law_desc$"
 foreign_embassies:0 "Ambassades à l'étranger"
 foreign_embassies_desc:0 "La diplomatie est l'art délicat de maintenir l'équilibre entre plusieurs partis en même temps. Le maintien d'ambassades dans les pays étrangers, nous faisant des comptes rendus réguliers, nous offre les moyens de prendre des décisions en étant bien informés."
 foreign_learning:0 "Enseignements étrangers"
 foreign_learning_desc:0 "Nous adopterons les nouvelles pratiques administratives, militaires et scientifiques transmises par les textes et les lettrés étrangers, afin d'accélérer le rythme de notre développement technologique."
 foreign_mercenaries:0 "Mercenaires étrangers"
 foreign_mercenaries_desc:0 "Nous avons constaté une présence de barbares étrangers ces derniers temps. Certains sont des marchands, d'autres des combattants. Utilisons-les dans nos armées."
 foreign_mining_techniques:0 "Techniques minières étrangères"
 foreign_mining_techniques_desc:0 "Les pierres précieuses sont appréciées par l'humanité depuis des millénaires à travers le monde. En entrant en contact avec des peuples lointains, nous apprendrons non seulement les types de $gems$ qu'ils apprécient le plus, mais aussi les techniques qu'ils utilisent pour les obtenir."
 foreign_politics:0 "Politique étrangère"
 foreign_politics_desc:0 "Pour vaincre nos ennemis, nous devons mettre en place des canaux diplomatiques et une coopération appropriée avec les pays qui partagent notre animosité à leur égard."
 foreign_relations_bureau:0 "Bureau des relations étrangères"
 foreign_relations_bureau_desc:0 "Notre royaume a reconnu l'importance de favoriser les relations amicales et les alliances avec les pays voisins. Pour ce faire, nous allons créer un bureau spécialisé dans les affaires étrangères. Si nous privilégions la diplomatie, nous serons mieux placés pour naviguer dans le réseau complexe des relations internationales et assurer la prospérité de notre nation."
 formal_administration:0 "Administration officielle"
 formal_administration_desc:0 "Des procédures appropriées et un système administratif efficace aboutissent à un pays prospère, car sans une administration compétente, tous les projets de l'État restent inaboutis. Nous organiserons et réglementerons la nôtre, de sorte que la volonté de l'État s'écoule naturellement à travers elle vers les moindres recoins de la nation."
 formal_diplomacy:0 "Diplomatie officielle"
 formal_diplomacy_desc:0 "À une époque où le pouvoir passe des mains d'individus puissants à celles d'une autorité centralisée, il est judicieux de construire des canaux de communication entre nous et nos voisins. Aujourd'hui, plus que jamais, la diplomatie est essentielle face aux puissances émergentes."
 formalized_officer_corps:0 "Corps d'officiers structuré"
 formalized_officer_corps_desc:0 "Par tradition, les officiers sont issus de la noblesse ; or, nous ne disposons pas de tant de nobles que cela, et manquons donc d'officiers. Nos armées comptent toutefois de très nombreuses personnes issues des classes les plus humbles de la société. Sans doute pourrions-nous en promouvoir certaines au rang d'officier."
 formalized_relations:0 "Relations formalisées"
 formalized_relations_desc:0 "L'établissement de relations officielles avec les pays voisins notoires est vital si nous souhaitons maintenir un rapport de force et défendre nos intérêts."
 fort_limit_1_advance:0 "Système de la châtellenie"
 fort_limit_1_advance_desc:0 "Les châtelains sont nommés pour gérer les bastions locaux et leurs garnisons, et constituent le premier cadre organisé de l'administration et de l'entretien des forteresses."
 fort_limit_2_advance:0 "Garde frontalière"
 fort_limit_2_advance_desc:0 "Les gardes régionaux gèrent plusieurs châteaux le long des marches frontalières. Ils établissent les voies d'approvisionnement, les chaînes de commandement et une défense mutuelle entre les places fortes."
 fort_limit_3_advance:0 "Bureau de la défense"
 fort_limit_3_advance_desc:0 "La Couronne centralise la supervision des fortifications au sein d'un bureau officiel situé dans la capitale, chargé de rassembler les registres, les fonds et les ordres de maintenance sous une seule autorité administrative."
 fort_limit_4_advance:0 "Inspecteurs généraux"
 fort_limit_4_advance_desc:0 "Des inspecteurs professionnels parcourent le royaume pour évaluer les garnisons, les réserves et les remparts, imposant des normes uniformes et assurant la fiabilité de chaque place forte."
 fort_limit_5_advance:0 "Ingénierie standardisée"
 fort_limit_5_advance_desc:0 "Des normes nationales de construction et de réparation sont instaurées, ouvrant sur une plus grande efficacité de la planification, une standardisation des plans et une meilleure organisation de l'entretien de l'ensemble de notre réseau de forteresses."
 fort_limit_6_advance:0 "Services topographiques"
 fort_limit_6_advance_desc:0 "Leur cartographie exhaustive et l'intégration logistique de chaque forteresse forme un système défensif unifié, une réalisation où administration, science et puissance étatique œuvrent de concert."
 fort_logistics:0 "Logistique des forteresses"
 fort_logistics_desc:0 "En administrant de manière convenable les systèmes de fortification du pays, aussi bien pour ce qui concerne la construction que le ravitaillement, il est possible de réaliser des économies importantes sur le long terme."
 fortified_towns:0 "Villes fortifiées"
 fortified_towns_desc:0 "En raison des ravages causés par les guerres hussites, et dans un effort pour préserver notre foi et notre peuple, nous avons financé de nombreuses villes fortifiées. Depuis lors, nous avons acquis un grand savoir-faire en matière d'édification de fortifications et d'ingénierie de défenses impénétrables."
 fortress_advance:0 "Citadelle"
 fortress_advance_desc:0 "$fortress_desc$"
 fortress_church_advance:0 "$fortress_church$"
 fortress_church_advance_desc:0 "$fortress_church_desc$"
 fortress_of_the_balkans:0 "La forteresse des Balkans"
 fortress_of_the_balkans_desc:0 "Nous avons reconnu que la pureté spirituelle seule ne peut arrêter les tourments du monde. Pour survivre, l'État s'est tourné vers une doctrine de fortification territoriale totale, transformant les montagnes balkaniques en un mur de granit infranchissable. En renforçant nos terres par des redoutes de pierre échelonnées et des garnisons permanentes, la nation a créé une profondeur stratégique qui contraint tout envahisseur à une guerre d'usure mortelle. Cette politique garantit que le cœur de la Bulgarie demeure un sanctuaire de stabilité orthodoxe, où la flamme de notre peuple est protégée derrière un anneau de fer et de pierre qu'aucune tempête ne saurait aisément éteindre."
 foundation_of_bavarian_army:0 "Une armée pour la Bavière"
 foundation_of_bavarian_army_desc:0 "Seule une armée permanente puissante nous permettra de revendiquer nos propres ambitions. En nous concentrant correctement sur cette entreprise, nous pouvons l'étendre sans vider les caisses de l'État."
 founding_fathers:0 "Pères fondateurs"
 founding_fathers_desc:0 "Tous ces politiciens, soldats et diplomates ont joué un rôle important dans l'avènement de leur nation, en obtenant l'indépendance de leur pays et en créant un nouveau système de gouvernement."
 four_heavenly_kings:0 "Quatre rois célestes"
 four_heavenly_kings_desc:0 "Gardant chacun un point cardinal, les $four_heavenly_kings$ sont chargés de protéger le royaume des dévas contre les asuras, mais également d'évaluer la vertu et la moralité des hommes."
 four_noble_truths:0 "Quatre nobles vérités"
 four_noble_truths_desc:0 "Les $four_noble_truths$, qui sont l'origine et le fondement des enseignements du Bouddha, consistent en une explication de la réalité de l'être. Rien n'est perpétuel, ce qui afflige l'esprit en raison de son attachement à une existence éphémère. Cette souffrance ne peut être apaisée que par la libération de soi et l'abandon de cet attachement en suivant le $noble_eightfold_path$."
 fra_code_civil:0 "Code civil"
 fra_code_civil_desc:0 "Nous devons démanteler l'écheveau emmêlé de lois qui régit actuellement notre État et établir un code unique, clair et accessible pour l'ensemble de notre population. Ce #italic Code civil#! deviendra la fondation de notre gouvernement et jettera les bases d'un système juste pour tous."
 fra_expansion_of_france:0 "Revendications anciennes"
 fra_expansion_of_france_desc:0 "Notre État remonte à l'empire de Charlemagne et nous pouvons donc revendiquer toutes ces terres comme étant notre territoire légitime. Avec des tribunaux spécialisés pour retracer l'histoire de tous les territoires avec notre couronne, nous serons en mesure de réclamer ces terres perdues."
 fra_gendarmes:0 "Compagnies de gendarmes"
 fra_gendarmes_desc:0 "La dépendance au système des levées a exposé notre gouvernement à de grands risques, et s'est avérée très contraignante. Nous devrions créer des unités de cavaliers lourdement armés, rémunérés par un salaire fixe, formant une armée permanente au service de notre dirigeant."
 fra_integration_of_new_territories:0 "Consolidation du pays"
 fra_integration_of_new_territories_desc:0 "Notre influence sur les autres pays est indéniable, pourquoi ne pas l'utiliser pour les intégrer directement ?"
 fra_reformation_of_taxation:0 "Établissement des Recettes générales"
 fra_reformation_of_taxation_desc:0 "Les intendants chargés de collecter les impôts du peuple ne seront pas nommés par les ordres, mais par notre dirigeant en personne. De cette façon, nous nous assurerons de la loyauté des officiers envers leur souverain et qu'ils collecteront le juste tribut dû."
 fra_reliance_on_privateers:0 "Le recours aux corsaires"
 fra_reliance_on_privateers_desc:0 "Une concurrence directe avec d'autres puissances maritimes pourrait être coûteuse et mettre nos finances dans une position délicate. Nous devrions plutôt financer notre flotte marchande afin de piller et nous emparer des navires marchands de nos ennemis. Cela garantira non seulement une saine source de revenus à notre État, mais perturbera également le commerce maritime de nos rivaux."
 fra_school_of_fontainebleau:0 "Le maniérisme nordique"
 fra_school_of_fontainebleau_desc:0 "En tant que fière nation de la Renaissance, nous devrions investir dans la création d'un style français unique. En invitant des artistes étrangers et en parrainant directement une école, nous serons en mesure d'imprégner leur œuvre artistique d'une identité spécifiquement française."
 franconian_proud_knights:0 "Chevaliers de l'Empire"
 franconian_proud_knights_desc:0 "Notre peuple a contribué à une longue lignée de fiers chevaliers au service de l'Empire. Il incarne les idéaux chevaleresques qui ont perdu en notoriété depuis, mais qui constituent néanmoins une part essentielle de ce que nous sommes. Ainsi, notre longue histoire nous a enseigné les nombreuses leçons du comportement chevaleresque et d'aspects plus militaires de la vie. Cela a naturellement un effet sur la volonté de notre noblesse de contribuer aux levées dans l'espoir de se couvrir de gloire dans des combats honorables."
 franconian_wine_bottles:0 "Silvaner et Bocksbeutel"
 franconian_wine_bottles_desc:0 "La Bocksbeutel est un fier symbole de notre puissante tradition viticole. Pratique et immédiatement reconnaissable, la forme de cette bouteille est le meilleur ambassadeur des vins d'exception produits dans notre région, comme le Silvaner ou le Riesling. Grâce au savoir-faire de nos verriers et de nos vignerons, cette bouteille promet prospérité et rayonnement économique à notre terre."
 frankokratia_frankokratia_advance:0 "Francocratie"
 frankokratia_frankokratia_advance_desc:0 "La division initiale de l'Empire byzantin en 1204 reste notre fondement juridique, car elle nous octroie des droits permanents et sanctionnés par le Divin sur les vestiges du monde grec. Nous ne nous considérons pas comme des conquérants, mais comme les héritiers légitimes des fiefs attribués à nos ancêtres par l'empereur latin et le doge de Venise. Cette sécurité juridique nous permet de mener une politique d'expansion et de reconquête implacable contre tous les seigneurs locaux qui refusent de reconnaître notre suzeraineté féodale."
 frankokratia_levantine_trades_advance:0 "Commerces du Levant"
 frankokratia_levantine_trades_advance_desc:0 "Après des siècles passés au carrefour de l'Orient et de l'Occident, nos marchands ont appris à naviguer au sein des réseaux commerciaux les plus complexes, des routes de la soie aux marchés aux épices du Levant. Nous jouons un rôle essentiel, celui d'intermédiaires entre la mer Noire, riche en ressources, et les pôles manufacturiers d'Europe occidentale, tirant profit de chaque transaction qui passe par nos ports. Nos marchands sont aussi à l'aise pour négocier avec les Égyptiens qu'avec les tisserands flamands, c'est une garantie que nos ports ne sont jamais vides."
 frankokratia_synthesized_levies_advance:0 "Levées transversales"
 frankokratia_synthesized_levies_advance_desc:0 "Pour maintenir notre pouvoir face à de puissants adversaires, nous avons intégré à la tradition occidentale de la tenure chevaleresque le système local de la Pronoia, qui accorde des terres en échange du service militaire. Cela crée une classe martiale hybride de #italic Latinikon#!, des mercenaires fidèles à la Couronne latine disposant de connaissances poussées du terrain accidenté de la Grèce et des tactiques orientales. Ces soldats combinent la puissance de frappe des Francs avec l'endurance et les capacités de combat nécessaires pour protéger les frontières des Balkans."
 frankokratia_the_frankish_greek_symbiosis_advance:0 "La symbiose franco-grecque"
 frankokratia_the_frankish_greek_symbiosis_advance_desc:0 "L'évolution finale de nos États voit l'émergence d'une classe dirigeante culturellement #italic latine#! en termes de chevalerie et de foi, mais linguistiquement et socialement intégrée à la population grecque. En encourageant les mariages mixtes et l'adoption des coutumes locales par la petite noblesse, nous avons mis fin à l'ère de la domination étrangère et créé une identité nationale unifiée. Cette culture #italic gréco-latine#! est farouchement fidèle à son propre sol, alliant le meilleur du féodalisme occidental à la résilience de l'esprit grec."
 frankokratia_the_latin_enlightenment_advance:0 "Les Lumières latines"
 frankokratia_the_latin_enlightenment_advance_desc:0 "Des siècles de lutte ont abouti à une ère des Lumières unique en Europe de l'Est, où l'esprit de croisade a été remplacé par une volonté rationaliste et impérialiste d'imposer l'ordre. Les États de la francocratie ne sont plus des « avant-postes croisés », mais constituent désormais un bloc de puissances sophistiqué et unifié qui allie technologie occidentale et complexité stratégique orientale. Nous représentons désormais un pont entre les civilisations, une « troisième voie » nouvelle qui n'est ni entièrement occidentale ni purement byzantine."
 frankokratia_union_of_the_soul_advance:0 "Union de l'âme"
 frankokratia_union_of_the_soul_advance_desc:0 "En installant un patriarche latin qui respecte l'ancienne liturgie grecque et le calendrier julien, et reconnaît la suprématie papale, nous remédions au Grand Schisme à l'intérieur de nos frontières. Ce compromis #italic uniate#! stabilise le royaume en permettant aux paysans grecs de conserver leurs rites ancestraux et à l'élite urbaine de conserver son lien avec Rome. Cela endigue efficacement la menace d'une révolte religieuse et fournit une justification théologique à notre domination continue sur les territoires centraux orthodoxes."
 fratricide_succesion_advance:0 "$fratricide_succesion$"
 fratricide_succesion_advance_desc:0 "$fratricide_succesion_desc$"
 free_cities:0 "Villes libres"
 free_cities_desc:0 "Accorder à nos villes l'autonomie pour tout ce qui concerne le commerce nous permettrait d'ouvrir de nouvelles routes commerciales rentables."
 free_colonies:0 "Terres disponibles"
 free_colonies_desc:0 "Ils sont si peu nombreux, ceux qui sont prêts à émigrer pour étendre notre grand empire colonial ! Pourtant, la promesse d'une terre en pleine propriété encouragera les plus réticents à partir faire fortune au-delà des mers. L'intérêt de la chose, c'est que nous avons plus de terres qu'il n'en faut."
 free_merchants:0 "Marchands libres"
 free_merchants_desc:0 "Les sociétés plus réactionnaires et plus figées considèrent les commerçants comme inférieurs aux propriétaires fonciers. Ce n'est pas notre cas, car nous savons bien que la richesse signifie le pouvoir, quelle qu'en soit la provenance."
 free_subjects:0 "Sujets libres"
 free_subjects_desc:0 "Donner un bon coup de bâton à un serviteur apporte une certaine satisfaction, mais ce n'est pas ce qui le poussera à travailler plus. Certains philosophes naturels ont compris que le profit constituait la principale motivation des gens, et si nous remplaçons les loyers en argent par des versements en nature, nos paysans seront poussés à produire davantage."
 free_thinkers:0 "Libres penseurs"
 free_thinkers_desc:0 "Certaines idées sont fort répandues dans les colonies. Ainsi, on y pense fréquemment que la liberté de penser et la liberté de parole relèvent du droit naturel de chaque homme, et que sans elles il ne peut y avoir de liberté publique."
 free_trade:0 "Libre concurrence"
 free_trade_desc:0 "Les familles marchandes bien établies aimeraient que le commerce leur soit réservé. Nous ne pouvons l'autoriser, car cela limiterait l'expansion de la classe marchande."
 french_ambition:0 "La Grande Armée"
 french_ambition_desc:0 "La nécessité de réformer nos troupes devient évidente lorsqu'on les compare à celles de nos ennemis. L'introduction de nouvelles méthodes d'entraînement permettra à nos hommes de détruire l'ennemi sur le champ de bataille."
 french_heritage:0 "Noblesse chevaleresque"
 french_heritage_desc:0 "La noblesse de notre nation a toujours fourni les meilleures troupes à nos armées. Leurs membres bien entraînés serviront nos armes et vaincront nos ennemis pour la gloire de notre nation."
 french_language_in_all_courts:0 "Le français dans toutes les cours"
 french_language_in_all_courts_desc:0 "Le latin a, pendant longtemps, été la langue commune à toute l'Europe. Mais soyons honnêtes : c'est désormais une langue morte. Si une nouvelle lingua franca doit être trouvée, laquelle serait plus appropriée que le français ?"
 french_tradition:0 "La Cour de France"
 french_tradition_desc:0 "Notre diplomatie, connue pour sa complexité et sa finesse, a servi de modèle à d'autres nations. Mais seul un imbécile se contenterait du niveau que nous avons atteint sans chercher à l'améliorer."
 frequent_councils:0 "Conseils fréquents"
 frequent_councils_desc:0 "Il nous a été proposé de tenir des conseils fréquents afin d'éviter les critiques persistantes à l'encontre de notre foi. Même s'il est vrai que nous n'avons pas la mainmise sur la curie, nous pouvons au moins user de notre influence pour mettre en œuvre cette proposition."
 friends_in_high_places:0 "Des amis en haut lieu"
 friends_in_high_places_desc:0 "Il n'y a qu'une voie qui mène au bonheur éternel. Connaître Dieu, c'est d'abord connaître ses ministres ici-bas. Ce sont eux qui nous aideront à trouver cette voie."
 friends_in_need:0 "Des amis dans le besoin"
 friends_in_need_desc:0 "Notre Ordre est formé de personnes issues de toute la chrétienté. Ce fait et notre besoin de soutien extérieur pour remplir notre mission nous ont rendus aptes à trouver des mains secourables pour notre cause. Nous profiterons de notre présence partout en Europe pour rallier à notre cause les puissants souverains catholiques."
 frisian_legend_grutte_pier:0 "La légende de Grutte Pier"
 frisian_legend_grutte_pier_desc:0 "Dans notre territoire courent des histoires sur un pirate de plus de deux mètres de haut et fort comme un bœuf. Elles inspirent de nombreux marins en herbe à parcourir les océans pour faire ce que nos ancêtres faisaient le mieux : piller les côtes sans défense."
 frisian_resisting_invader:0 "Résistance à l'envahisseur"
 frisian_resisting_invader_desc:0 "Entouré d'ennemis, notre peuple est habitué à défendre ses terres avec agressivité pour faire reculer les envahisseurs et les empêcher de revenir. Avec leur sang, notre sol ne fait que s'enrichir !"
 frisian_trading_traditions:0 "Traditions commerciales"
 frisian_trading_traditions_desc:0 "Avant la formation des comtés au sud qui commencent à se rendre dans d'autres nations pour commercer, nos ancêtres disposaient de routes commerciales qui couvraient toutes les côtes d'Europe, de la Baltique au golfe de Gascogne. Aujourd'hui, ce savoir ancestral doit plus que jamais être mis à profit."
 frontline_in_the_caroline_war:0 "Ligne de front dans la guerre de Cent Ans"
 frontline_in_the_caroline_war_desc:0 "Pendant les longs conflits entre la France et l'Angleterre, notre territoire fut un champ de bataille stratégique. Les pressions de la guerre ont forgé un corps d'officiers aguerris et des traditions d'excellence militaire qui perdurent encore aujourd'hui."
 fukko_shinto:0 "Fukko $shinto$"
 fukko_shinto_desc:0 "De même que les gens rejettent l'influence étrangère dans notre culture, ils rejettent également le syncrétisme $buddhist_ADJ$ et le $SECT_CONFUCIANISM_NAME$ dans notre foi. Selon cette pensée, il est nécessaire de revitaliser le $shinto$."
 furniture_manufactory_advance:0 "$furniture_manufactory$"
 furniture_manufactory_advance_desc:0 "$furniture_manufactory_desc$"
 furniture_mill_advance:0 "$furniture_mill$"
 furniture_mill_advance_desc:0 "$furniture_mill_desc$"
 furniture_workshop_advance:0 "$furniture_workshop$"
 furniture_workshop_advance_desc:0 "$furniture_workshop_desc$"
 furstenschule:0 "Fürstenschule"
 furstenschule_desc:0 "Alors que la Réforme prend et que l'État assume l'administration de l'Église, une responsabilité émergente apparaît pour l'État : l'éducation, qui appartenait autrefois à l'Église. Pour préparer les universités nouvellement fondées, trois écoles saxonnes pour princes vont être créées à partir de propriétés monastiques laïcisées. Les conseils scolaires de Pforta, Grimma et Misnie vont être formés pour superviser et entretenir ces trois écoles étatiques et princières. Ainsi, l'État aura le rôle important de façonner le paysage éducatif, de favoriser la connaissance et la croissance intellectuelle des futurs dirigeants de Saxe."
 further_reaches:0 "Autres confins"
 further_reaches_desc:0 "Bien que notre foi se soit souvent trouvée confinée parmi les infidèles, elle a également été en mesure d'atteindre des contrées plus éloignées et d'être adoptée par bon nombre de populations et de cultures différentes."
 garrison_conscription:0 "Enrôlement dans les garnisons"
 garrison_conscription_desc:0 "En enrôlant les jeunes hommes de bonne constitution au sein des garnisons, nous pouvons nous assurer d'avoir assez d'hommes pour défendre nos frontières."
 gate_of_the_persian_gulf:0 "La porte du golfe Persique"
 gate_of_the_persian_gulf_desc:0 "Ormuz contrôle le détroit qui relie l'océan Indien à l'Asie centrale. Celui qui contrôle ce passage vital dicte le rythme du trafic maritime. Notre maîtrise de ces eaux doit être absolue, sous peine de voir notre influence diminuer."
 gebirgsschutzen_infantry:0 "$a_gebirgsschutzen_infantry$"
 gebirgsschutzen_infantry_desc:0 "$a_gebirgsschutzen_infantry_desc$"
 geheimrat:0 "Geheimer Rat"
 geheimrat_desc:0 "Le Geheimer Rat (ou « Conseil privé ») est un collège consultatif d'élite composé de nobles et de fonctionnaires de haut rang, qui agit en tant qu'institution centrale pour orienter les décisions politiques, militaires et administratives de l'Autriche."
 gel_expand_kwarteers:0 "Développement des kwartiers"
 gel_expand_kwarteers_desc:0 "Comme dans le cas du $BRB$, $GEL$ est traditionnellement divisé en quatre quartiers. Ce système de provinces centrées sur une cité puissante s'est avéré être un outil de gouvernement efficace, et nous devrions étendre ce système aux endroits qui rejoignent notre royaume."
 gel_healthy_economy:0 "Une économie saine"
 gel_healthy_economy_desc:0 "Notre royaume ne s'est pas seulement agrandi à coups d'épée, il a aussi su gérer son argent et ses économies, ce qui nous a permis d'étendre notre influence sur d'autres territoires ou de les acheter directement. Nous devons gérer notre budget avec sagesse pour continuer sur cette voie."
 gel_warring_spirit:0 "Esprit belliqueux"
 gel_warring_spirit_desc:0 "Certains prétendent que nous sommes trop belliqueux. En réalité, ils craignent notre puissance. Dans ce monde chaotique, une armée bien entraînée est nécessaire pour réussir. Ceux qui s'opposent à nous savent que nous sommes endurcis."
 generic_bureaucracy_4_advance:0 "Bureaucratie exécutive"
 generic_bureaucracy_4_advance_desc:0 "À mesure que les gouvernements se développent, la nécessité d'instaurer une bureaucratie plus élaborée et compétente s'accroît également. En créant des départements spécialisés chargés de traiter des aspects spécifiques de la gouvernance, nous pourrons garantir le bon fonctionnement et l'efficacité de notre administration."
 genoese_banking_traditions:0 "Traditions bancaires génoises"
 genoese_banking_traditions_desc:0 "L'essor de Gênes parmi les principaux centres commerciaux de l'Italie médiévale a conduit au développement précoce de nouvelles formes de crédit, ainsi qu'à l'apparition de certaines des premières institutions bancaires au monde."
 genoese_crossbowmen:0 "$a_genoese_crossbowmen$"
 genoese_crossbowmen_desc:0 "$a_genoese_crossbowmen_desc$"
 genoese_flexibility:0 "Flexibilité génoise"
 genoese_flexibility_desc:0 "Contrairement à l'armée, la marine d'État peut servir de multiples fins, et ne se cantonne pas à un rôle martial. Grâce à nos connaissances et à notre expérience, nous pouvons transformer nos galères de guerre en galères marchandes et vice versa en un rien de temps."
 genoese_galley:0 "$n_genoese_galley$"
 genoese_galley_desc:0 "$n_genoese_galley_desc$"
 genoese_maritime_diplomacy:0 "Diplomatie maritime génoise"
 genoese_maritime_diplomacy_desc:0 "En devenant une république au service de ses marchands, la ville de Gênes a développé une forte influence à l'étranger et conclu de nombreux accords avec des alliés et des clients de toute la Méditerranée."
 genoese_school:0 "École génoise"
 genoese_school_desc:0 "La peinture de style Renaissance est une tradition italienne. Il n'est donc pas surprenant qu'un État riche et estimé comme celui de Gênes ouvre sa propre école d'art."
 geo_bagrationi_dynasty:0 "Dynastie $Bagrationi$"
 geo_bagrationi_dynasty_desc:0 "Appartenant à une dynastie dont les origines sont entourées de mystère, les rois et reines de la maison des $Bagrationi$ ont régné sur la $GEO$ depuis le IXe siècle, d'abord en tant que princes, puis comme rois."
 geo_beacon_of_christianity:0 "Phare de la chrétienté"
 geo_beacon_of_christianity_desc:0 "La $GEO$ est le symbole du christianisme dans le Caucase depuis des siècles, même après avoir été entouré et isolé par l'islam. La foi ardente de notre peuple est une source d'inspiration pour tous nos frères en religion."
 geo_dasturlamali:0 "Dasturlamali"
 geo_dasturlamali_desc:0 "La $GEO$ a connu des temps troublés ces derniers siècles, en fait depuis l'invasion mongole. Divisée pour un temps, soumise à l'influence croissante des nobles des provinces, sous des pressions changeantes venues de l'extérieur, son ancien système féodal est dans les faits devenu obsolète, ou à tout le moins en partie rejeté. Le moment est venu de créer un ordre et une règle au sein de la noblesse et du peuple. Le $geo_dasturlamali$ est un nouveau code légal, constitué de lois et de réglementations, détaillant les obligations de nos sujets et des nobles envers le roi et l'État. Cette solide base juridique pour tous les corps légaux du pays est la seule façon d'aller de l'avant."
 geo_david_the_builder:0 "Davit le bâtisseur"
 geo_david_the_builder_desc:0 "Considéré aujourd'hui encore comme le plus grand souverain de notre histoire, le roi Davit le bâtisseur a porté la $GEO$ à son apogée. Il en a fait un royaume puissant, culturellement influent, un phare pour le christianisme et le peuple $georgian_culture$."
 geo_georgian_embassies:0 "Ambassades $GEO_ADJ$nes"
 geo_georgian_embassies_desc:0 "Nous avons pour tradition d'établir des liens diplomatiques étroits avec toutes les nations qui nous entourent, quelles que soient nos éventuelles divergences. À ce titre, nos diplomates sont toujours respectés et bien accueillis."
 geo_georgian_golden_age:0 "L'âge d'or $GEO_ADJ$"
 geo_georgian_golden_age_desc:0 "La $GEO$ a connu un âge d'or culturel et religieux brusquement interrompu par les invasions mongoles. Cette période nous a donné les plus beaux fleurons de l'expression de notre culture. Nous allons maintenant la faire revivre et même atteindre de plus hauts sommets."
 geo_georgian_highlands:0 "Les hauts plateaux $GEO_ADJ$s"
 geo_georgian_highlands_desc:0 "Les terres de $GEO$ sont nichées au cœur des monts du Caucase, et les puissances étrangères ont toujours eu grand peine à y pénétrer. Notre ténacité et notre résistance sont légendaires."
 geo_georgian_isolation:0 "Isolement $GEO_ADJ$"
 geo_georgian_isolation_desc:0 "Entourés de pays puissants ne partageant ni notre religion ni notre culture, nous sommes obligés de recourir à une diplomatie opportuniste : nous changeons donc souvent d'allégeance afin d'apaiser tout le monde et de préserver la paix autant que faire se peut."
 geo_georgian_numismatics:0 "Numismates $GEO_ADJ$s"
 geo_georgian_numismatics_desc:0 "Notre pays a coutume de longue date à battre monnaie portant des mentions en $georgian_language$ mais aussi en $arabic_language$ et $persian_language$, car elle sert de moyen de communication dans les échanges commerciaux entre notre pays et nos voisins."
 geo_georgian_principalities:0 "Principautés $GEO_ADJ$nes"
 geo_georgian_principalities_desc:0 "L'administration de notre nation est divisée en plusieurs principautés et territoires. Cette délégation d'autorité nous permet d'exercer notre pouvoir de manière plus efficace."
 geo_georgian_resilience:0 "Résistance $GEO_ADJ$ne"
 geo_georgian_resilience_desc:0 "Au cours de sa longue histoire, notre pays s'est vu déchiré plus d'une fois par des influences extérieures et des conflits internes. Cependant, tel le phénix, il n'a cessé de renaître de ses cendres et de s'imposer comme une force avec laquelle il faut compter. La résilience de notre peuple est digne d'éloges."
 geo_georgian_script:0 "Alphabet $georgian_culture$"
 geo_georgian_script_desc:0 "L'Alphabet $georgian_culture$, créé il y a des siècles, n'est pas un alphabet, mais en fait trois. Le mkhedruli est utilisé par l'administration civile, tandis que l'asomtavruli et le nuskhuri servent à nos textes religieux. Ainsi, nos Saintes Écritures sont protégées des influences de la langue profane, tout en conservant le lien avec notre peuple."
 geo_georgian_titles:0 "Titres $GEO_ADJ$s"
 geo_georgian_titles_desc:0 "« Roi des rois, fort et invincible, majestueux et protecteur du saint royaume des Abkhazes, des Ibères, des Ranis, des Kakhètes, des Arméniens, des Shahanshah et des Shirvanshah, de l'Est et de l'Ouest, du Sud et du Nord, des deux pays, des deux trônes et des deux Couronnes, Suzerain divin et Souverain du trône. » Les titres de notre souverain sont nombreux et tous les membres de la cour doivent les respecter."
 geo_georgian_unification:0 "Unification $GEO_ADJ$ne"
 geo_georgian_unification_desc:0 "La $GEO$ a été divisée dans le passé, à cause d'influences étrangères et de causes internes. Mais notre fier peuple $GEO_ADJ$ est plus que désireux de se battre pour s'assurer que notre pays ne soit plus jamais divisé."
 geo_legacy_of_saint_george:0 "Héritage de Saint-Georges"
 geo_legacy_of_saint_george_desc:0 "Nos liens avec le légendaire Saint-Georges sont bien connus dans les mondes chrétien et musulman. De même qu'il a bravement affronté et tué le redoutable dragon, nos soldats affronteront nos ennemis au combat."
 geo_legacy_of_saint_nino:0 "Héritage de sainte Nino"
 geo_legacy_of_saint_nino_desc:0 "La $GEO$ possède l'une des Églises chrétiennes les plus anciennes au monde, remontant à la christianisation de la région par sainte Nino, il y a plus d'un millénaire. Au cours des siècles, l'Église $GEO_ADJ$ne a été à la base de l'unification de tous les États $GEO_ADJ$s. Dès lors, elle a été l'élément central de la culture du pays, face aux influences venues de Byzance, des Mongols et des musulmans. Bien peu de royaumes chrétiens ont survécu dans la région aujourd'hui, et face aux loyautés concurrentes dans la $GEO$ de notre temps, cette Église a encore un rôle fondamental à jouer en tant que facteur d'unité face aux étrangers."
 geo_legacy_of_tamar:0 "Héritage de Tamar"
 geo_legacy_of_tamar_desc:0 "Tamar a été l'une des plus grandes souveraines de notre nation. Ses succès militaires et culturels sont devenus légendaires, et l'évocation de son nom suscite encore le respect dans le cœur des $georgian_culture$s."
 geo_restoration_of_fortresses_and_churches:0 "Restauration des forteresses et des églises"
 geo_restoration_of_fortresses_and_churches_desc:0 "Ce sont nos nombreuses forteresses et nos églises qui ont permis à notre pays de résister aux nombreuses influences étrangères. Nos forteresses protègent nos terres, tandis que nos églises protègent notre esprit. Si nous voulons perdurer, nous devons mettre un grand soin à les entretenir."
 geo_sadrosho_districts:0 "Districts sadroshos"
 geo_sadrosho_districts_desc:0 "Les sadroshos (les bannières) sont des districts militaires servant à la mobilisation. En divisant notre territoire en plusieurs sadroshos, sous l'autorité de fonctionnaires militaires, nous pouvons organiser le recrutement des troupes et leur répartition dans notre armée."
 german_baltic_sailors:0 "Marins baltes"
 german_baltic_sailors_desc:0 "Les climats rudes font de rudes gaillards. Leur proximité avec la froide Baltique a clairement laissé sa marque sur nos marins, ce qui les rend très aptes à leur profession et à leur mode de vie, car la mer peut être une maîtresse très dure."
 german_biedermeier:0 "Biedermeier"
 german_biedermeier_desc:0 "La période Biedermeier est marquée par une vision conservatrice de notre société, issue des classes supérieures et de leur nostalgie des temps passés. C'est ainsi que les activités les plus libres et les plus créatives se déroulent dans l'intimité des maisons, à l'abri des regards. Si cela renforce involontairement le développement d'une identité culturelle au sein de la classe bourgeoise, c'est aussi la raison pour laquelle de nombreux libres-penseurs émigrent afin de poursuivre leurs activités à l'étranger."
 german_fair_towns:0 "Reichsmessestädte"
 german_fair_towns_desc:0 "Les foires impériales sont un grand privilège accordé par l'empereur lui-même à quelques villes choisies de l'empire, permettant aux commerçants de participer à certains des plus grands marchés d'$europe$. Ces villes sont véritablement au cœur du commerce du $hre$. La nature centralisée de ces grands marchés facilite également la planification et la négociation pour les marchands dans un cadre qui offre autant de liberté que de variété, et donc l'accès à toutes sortes de marchandises."
 german_imperial_roads:0 "Réseau routier impérial"
 german_imperial_roads_desc:0 "Durant des siècles, on a construit, développé et amélioré les routes au cœur de l'Europe. Depuis les Romains jusqu'à aujourd'hui, les nombreuses routes impériales qui relient les différentes régions d'Allemagne les unes aux autres facilitent le commerce et les voyages, tout en répondant aux besoins logistiques, en particulier lorsqu'il s'agit de déplacer des armées."
 german_mountain_toll_castle_advance:0 "$german_mountain_toll_castle$"
 german_mountain_toll_castle_advance_desc:0 "$german_mountain_toll_castle_desc$"
 german_populating_the_countryside:0 "Attirer les persona grata"
 german_populating_the_countryside_desc:0 "Le repeuplement des régions rurales et l'attribution de terres à cultiver à la population constituent la base solide qui permettra d'accroître lentement mais sûrement la richesse et la prospérité de nos territoires actuellement sous-peuplés."
 german_river_toll_castle_advance:0 "$german_river_toll_castle$"
 german_river_toll_castle_advance_desc:0 "$german_river_toll_castle_desc$"
 ghazi:0 "Ghâzî"
 ghazi_desc:0 "Conformément aux traditions des steppes, nos nobles sont des guerriers de la frontière. Nous nous montrerons intrépides dans la lutte pour l'extension de la Dâr al-Islâm, la Maison de la Soumission."
 gifts_and_hostages:0 "Dons et otages"
 gifts_and_hostages_desc:0 "Bien que notre peuple soit désormais uni sous l'autorité d'un dirigeant commun, les chefs ont longtemps résisté à se soumettre. En les rassemblant tous dans la capitale, nous pourrions les transformer en émissaires royaux de prestige. Certains y verraient une forme de prise d'otages, mais il s'agit avant tout de réaffirmer à notre peuple à qui leur loyauté doit être accordée."
 glass_mill_advance:0 "$glass_mill$"
 glass_mill_advance_desc:0 "$glass_mill_desc$"
 glass_workshop_advance:0 "$glass_workshop$"
 glass_workshop_advance_desc:0 "$glass_workshop_desc$"
 glassworks_advance:0 "Verrerie"
 glassworks_advance_desc:0 "$glassworks_desc$"
 glh_kipchak_khanate:0 "Khanat kiptchak"
 glh_kipchak_khanate_desc:0 "Notre grand pays est également appelé le Khanat kiptchak, qui règne sur tous les territoires de la confédération Couman-Kipchak. Avec de telles étendues de terre sous notre commandement, les armées que nous pourrons rassembler seront immenses."
 glh_legacy_of_jochi:0 "Héritage de Djötchi"
 glh_legacy_of_jochi_desc:0 "$genghis_khan_name_no_tooltip$ fut vite rejoint dans la mort par son fils Djötchi. Cependant, sa présence et son héritage se font encore sentir dans notre pays, au point que nous sommes toujours connus comme les ulus de Djötchi. Les guerriers affluent sous nos bannières pour défendre cet héritage."
 glh_legacy_of_the_golden_horde:0 "Héritage de la Horde d'or"
 glh_legacy_of_the_golden_horde_desc:0 "Le monde tremblera devant nous ! Nous qui étions au cœur de l'empire de $genghis_khan_name_no_tooltip$, nous représentons la principale force politique en Europe de l'Est et dans les steppes."
 glh_modernization_of_steppes:0 "Modernisation des steppes"
 glh_modernization_of_steppes_desc:0 "Il est loin, le temps où les armées de $genghis_khan_name_no_tooltip$ dominaient les steppes. Notre pays a dépassé les rêves de nos ancêtres et nous sommes désormais une puissance à part entière. Nous moderniserons nos territoires afin de devenir le phare du monde."
 glh_perso_mongol_administration:0 "Administration perso-mongole"
 glh_perso_mongol_administration_desc:0 "Nos ancêtres ont peaufiné durant des siècles le système administratif des Mongols, mais ils n'avaient pas peur non plus d'intégrer les idées et méthodes qu'avaient à offrir les cultures à leur botte. Notre système administratif s'appuie d'une part sur des traditions remontant au grand $genghis_khan_name_no_tooltip$ lui-même, et de l'autre sur ce que nous avons copié des administrateurs perses et musulmans dans les territoires conquis."
 glh_religious_pragmatism:0 "Pragmatisme religieux"
 glh_religious_pragmatism_desc:0 "Les doctrines strictes et inflexibles n'ont jamais séduit grand monde au sein des hordes tatares. Lorsque le grand $Oz_Beg$ $rank_kingdom_horde_ruler_suffix_male$ a adopté l'islam, il a invité les cheikhs soufis tout comme les qâdîs fanatiques à venir vivre sur nos terres. Notre pays doit s'appuyer sur des siècles entiers de tradition et de loyauté ; la religion a certes son rôle à jouer, mais mieux vaut voir le pays prospérer que se déchirer pour s'assurer que tous partagent la même foi."
 glh_secure_the_trade_routes:0 "Sécurité des routes commerciales"
 glh_secure_the_trade_routes_desc:0 "Toutes les richesses de ce monde ne proviennent pas des territoires sur lesquels nous régnons. Le commerce est mère de toutes les richesses, et la Horde d'or a toujours protégé les marchands. Car c'est en garantissant la sécurité de quiconque veut faire transiter des biens par nos territoires que nous pouvons assurer un flot constant de fourrures, de produits artisanaux chinois, de soies, d'épices et d'autres biens jusqu'à nos cités. Qu'ils les vendent à nous ou à d'autres, leur simple présence est gage d'opulence pour notre peuple."
 glh_tatar_traditions:0 "Traditions tatares"
 glh_tatar_traditions_desc:0 "Notre empire n'est certes plus gouverné depuis la selle d'un cheval, mais nos armées n'en sont jamais descendues pour autant. Au cours des siècles, nous sommes toujours restés fidèles à nos origines, si bien que peu de cavaliers peuvent rivaliser avec l'adresse des nôtres. Quand nous nous développons, quand nous adoptons de nouvelles technologies et tactiques lorsque le besoin s'en fait sentir, c'est sur l'organisation stricte et la tradition martiale de l'Empire mongol que nous nous appuyons."
 global_burghers_max_literacy_advance:0 "Littérature bourgeoise"
 global_burghers_max_literacy_advance_desc:0 "Les bourgeois dépendent de leurs compétences et de leurs capacités pour prospérer, lesquelles dépendent à leur tour d'une bonne éducation littéraire sur certains sujets. La croissance de leur richesse à mesure que l'économie progresse entraîne une plus grande demande de littérature capable d'élargir leur culture de l'écrit."
 global_clergy_max_literacy_advance:0 "Littérature cléricale"
 global_clergy_max_literacy_advance_desc:0 "De par la nature de leur sacerdoce, qui s'appuie sur l'apprentissage, l'interprétation et la diffusion de leur doctrine religieuse, les ecclésiastiques se doivent d'être lettrés. Ainsi, leur formation spirituelle repose sur leur accès aux textes de la doctrine et aux enseignements religieux."
 global_empire:0 "Empire mondial"
 global_empire_desc:0 "Tous les efforts que nous avons consacrés à notre empire colonial ont modifié l'attitude du peuple envers les postes disponibles dans l'administration coloniale. Les colonies ne sont plus des zones de non-droit où l'on cherche avant tout à s'enrichir, mais bien désormais l'opportunité de carrières réservées aux meilleurs. Nos revenus fiscaux le montrent bien..."
 global_nobles_max_literacy_advance:0 "Littérature nobiliaire"
 global_nobles_max_literacy_advance_desc:0 "Les nobles accordent plus d'intérêt aux compétences littéraires, car ils évoluent d'un état de guerriers couverts de gloire à celui de courtisans au service de leur souverain. Il en résulte une demande pour une littérature attrayante à leurs yeux."
 global_supply_limit_modifier_advance_2:0 "Voies d'approvisionnement"
 global_supply_limit_modifier_advance_2_desc:0 "Lors des guerres terrestres, l'importance de l'approvisionnement croît avec la taille de nos armées. En conséquence, une meilleure organisation des chariots de ravitaillement se traduirait par une plus grande capacité opérationnelle."
 global_supply_limit_modifier_advance_5:0 "Planification logistique militaire"
 global_supply_limit_modifier_advance_5_desc:0 "La marche de toute armée est soutenue par sa logistique. Avec une étude et une planification adéquates, les armées peuvent faire face à des campagnes plus longues, tout en parcourant des distances plus importantes."
 global_supply_limit_modifier_advance_6:0 "Planification de la logistique de campagne"
 global_supply_limit_modifier_advance_6_desc:0 "Les campagnes militaires modernes impliquant des centaines de milliers de soldats déployés pendant plusieurs années, la planification de la logistique guerrière est devenue plus complexe que jamais."
 global_trade_advance:0 "Commerce mondial"
 global_trade_advance_desc:0 "Les marchandises sont transportées d'un continent à l'autre depuis l'Antiquité, mais aujourd'hui, tous les échanges commerciaux s'inscrivent de plus en plus dans un réseau mondial plus vaste. Même s'il est encore trop tôt pour parler d'une véritable économie mondiale, les premières graines ont été semées."
 global_trade_routes_advance:0 "Routes commerciales d'outre-mer"
 global_trade_routes_advance_desc:0 "Si le monde s'est agrandi grâce aux nouvelles découvertes, il s'est aussi rétréci en raison du nombre toujours croissant de nouvelles routes commerciales. Grâce aux navires qui transportent régulièrement des marchandises et des personnes en provenance et à destination de pays lointains, les terres semblent s'être rapprochées."
 glorious_arms:0 "Armée glorieuse"
 glorious_arms_desc:0 "À la vue de notre glorieuse et prestigieuse armée, tous nos adversaires trembleront de peur."
 glory_of_rome:0 "Gloire de Rome"
 glory_of_rome_desc:0 "Nous contrôlons la magnifique cité de Rome, ancienne capitale des Romains. C'est nous qui pérennisons leurs traditions prodigieuses."
 gold_of_bure:0 "Or du Bouré"
 gold_of_bure_desc:0 "Les deux gisements aurifères du Bambouk et du Bouré sont réputés pour être les plus grands connus, et ils nous appartiennent. Les mines d'or du Bouré produisent des richesses en quantité si importante qu'elles ont déstabilisé toute l'économie égyptienne lors de la visite de Mansa Moussa. Notre économie, au contraire, est habituée à cet afflux constant d'or, et donc bien moins sujette à l'inflation."
 gold_to_salt_trade:0 "De l'$goods_gold$ contre du $salt$"
 gold_to_salt_trade_desc:0 "Certains prétendent que le $salt$ vaut son pesant d'or... Sans doute serait-il plus juste de dire que l'or vaut son pesant de $salt$. Quoi qu'il en soit, grâce à l'échange de ces deux marchandises, nos réseaux commerciaux sont florissants."
 golden_fleece:0 "L'Ordre de la Toison d'or"
 golden_fleece_desc:0 "La Toison d'or est appelée à devenir l'un des plus grands ordres chevaleresques d'Europe. Être chevalier de la Toison d'or est une marque de statut importante et nous donne bonne allure."
 goose_step:0 "Le pas de l'oie"
 goose_step_desc:0 "Si le pas de l'oie donne une allure plutôt étrange à nos hommes, il a été spécialement conçu pour s'assurer que la ligne reste bien formée en approchant l'ennemi. Cela confère à nos armées un véritable avantage sur le champ de bataille."
 gov_reform_discovery_a:0 "Début de la réforme administrative"
 gov_reform_discovery_a_desc:0 "Notre peuple se trouve aux portes d'une nouvelle ère. Afin d'exploiter nos capacités internes, nous devons adapter notre gouvernement et affiner notre domaine administratif."
 gov_reform_reformation_a:0 "Le Prince"
 gov_reform_reformation_a_desc:0 "Les temps nouveaux imposent aux dirigeants une approche différente pour aborder la gestion de l'État de manière plus systématique, en tenant compte à la fois des différents ordres du pays et des multiples acteurs diplomatiques qui les entourent."
 government_sanctioned_celebrations:0 "Célébrations officielles du gouvernement"
 government_sanctioned_celebrations_desc:0 "Nos concitoyens sont toujours prêts à célébrer les bonnes nouvelles pour notre pays ou les événements importants de notre calendrier. Au lieu de les laisser organiser ces célébrations de leur propre chef, nous pouvons faire en sorte que notre administration les organise officiellement, afin de montrer à notre population que nous nous soucions d'elle, mais aussi pour forger un sentiment d'unité nationale."
 government_size_absolutism:0 "Subordonnés loyaux"
 government_size_absolutism_desc:0 "Le fait que le pouvoir soit remis aux mains des dirigeants permet à ces derniers d'agir plus directement, mais ils ont toujours besoin de personnes sous leurs ordres pour mettre en œuvre ces actions. Cependant, le fait que ces subordonnés n'aient pas de pouvoir réel et qu'ils fassent preuve de fidélité envers le dirigeant permet à la cour d'en disposer d'un plus grand nombre, sans craindre les luttes intestines ou les mécontentements."
 government_size_discovery:0 "Début de la capacité administrative"
 government_size_discovery_desc:0 "Notre domaine se compose de nombreux secteurs administratifs et, à mesure que nous l'étendons, nous devons apporter les ajustements nécessaires à notre gouvernement pour nous conformer à cette croissance."
 government_size_renaissance:0 "Cabinet permanent"
 government_size_renaissance_desc:0 "Traditionnellement, les dirigeants disposaient d'un cabinet de conseillers chargés de les aider à prendre des décisions en matière de guerre et de paix. Aujourd'hui, le gouvernement de notre pays est devenu si complexe que nous avons besoin de postes plus pérennes pour gérer les affaires courantes."
 government_size_revolutions:0 "Représentation moderne"
 government_size_revolutions_desc:0 "En offrant une meilleure représentation au peuple, le gouvernement est devenu capable de résoudre plus de problèmes que jamais."
 gozan_jissetsu:0 "Gozan jissetsu"
 gozan_jissetsu_desc:0 "Le « système des cinq montagnes » est un système traditionnel venu de $china$, de monastères $buddhist_ADJ$s Chán parrainés par l'État, ainsi nommés parce qu'ils se trouvaient au sommet de montagnes sacrées. Au $japan_region$, la pratique a perduré pendant la période Kamakura par le parrainage des temples zen, des cinq montagnes de $kyoto$ et des cinq montagnes de $kamakura$. Maintenir le parrainage de ces institutions nous permettra de les utiliser pour stabiliser notre pouvoir."
 gra_a_new_golden_era:0 "Un nouvel âge d'or"
 gra_a_new_golden_era_desc:0 "Al-Andalus était autrefois un centre d'apprentissage accueillant des savants exceptionnels, comme ʾAḥmad Ibn Rušd, ʾAbū al-Qāsim et Muḥammad bin Ṭufayl. Nous devrions perpétuer les aspirations de nos ancêtres."
 gra_a_strong_rule:0 "Une autorité puissante"
 gra_a_strong_rule_desc:0 "Pendant des décennies, les générations de la famille régnante se sont entredéchirées, ce qui a déstabilisé notre pays. Il est temps d'unifier le pouvoir sous l'égide d'un dirigeant puissant, capable de maintenir la paix et la prospérité pour notre peuple."
 gra_adaptative_trade:0 "Commerce adaptatif"
 gra_adaptative_trade_desc:0 "Notre position privilégiée d'intermédiaire entre les nations chrétiennes et musulmanes est remise en cause. Cette menace peut être l'occasion de moderniser nos méthodes et de retrouver notre position d'interlocuteur entre l'Europe et des marchés plus lointains."
 gra_banu_nasr:0 "Banū Naṣr"
 gra_banu_nasr_desc:0 "Nous descendons de la tribu des Banū l-Ḫazraj et de la lignée de Sa'd ibn 'Ubāda, compagnon du prophète Mahomet. Le fondateur de notre dynastie, Muhammad Ier, contrôlait un territoire comprenant Grenade, Jaén, Almería et Malaga, bien que certaines de ces terres soient tombées aux mains des forces chrétiennes. Depuis lors, nous avons résisté avec ténacité à leurs avancées et nous continuerons à le faire avec la force de nos ancêtres."
 gra_expand_qanahs:0 "Élargir les Qanāh"
 gra_expand_qanahs_desc:0 "Les terres de Grenade sont fertiles, mais l'extension des canaux qui les irriguent permettra de mieux utiliser l'eau dont nous disposons, afin de favoriser la vigueur de nos cultures et de nos fruits."
 gra_expand_the_frontier:0 "Pousser au sud"
 gra_expand_the_frontier_desc:0 "Depuis la fondation de notre dynastie, nos terres se sont vues maintes fois tronquées. Cependant, nous sommes aujourd'hui en position de force, et nous pouvons non seulement ambitionner de récupérer tous les territoires perdus, mais aussi d'agrandir notre royaume."
 gra_ghazawat:0 "Ghazawat nasride"
 gra_ghazawat_desc:0 "Comme les premiers guerriers qui ont combattu sous les ordres du prophète Mahomet, nos soldats doivent se battre avec courage, presque avec fanatisme, pour défendre notre royaume et notre peuple."
 gra_modernized_economy:0 "Économie modernisée"
 gra_modernized_economy_desc:0 "Les temps modernes exigent une économie moderne, capable de prospérer dans un monde plus compétitif. En modernisant nos infrastructures et en améliorant l'efficacité de nos méthodes et processus, nous parviendrons à produire davantage avec les mêmes ressources."
 gra_muttavia_armies:0 "Armées mercenaires"
 gra_muttavia_armies_desc:0 "Grenade dispose d'un nombre limité d'habitants et les hommes qui peuvent être recrutés ne sont pas aussi nombreux qu'il le faudrait pour défendre efficacement notre nation. Cependant, notre richesse peut compenser notre manque d'effectifs : il suffit d'embaucher des épées étrangères qui combattront sous notre bannière."
 gra_nasrid_art:0 "Art nasride"
 gra_nasrid_art_desc:0 "Les artisans et architectes de Grenade sont les plus habiles du monde. Ils créent des objets à la fois utiles et agréables à œil, combinant avec brio ces deux qualités."
 gra_razzias:0 "Razzias nasride"
 gra_razzias_desc:0 "Les frontières de nos ennemis sont autant d'occasions qui s'offrent à nous. Si nous osons les frapper d'attaques éclair, nous pouvons les prendre au dépourvu et leur infliger des dommages durables."
 gra_skillful_envoys:0 "Émissaires habiles"
 gra_skillful_envoys_desc:0 "Pour nous, l'habileté diplomatique est une question de vie ou de mort. Nous ne pouvons pas nous contenter de rester inactifs : nous devons sans cesse affiner les talents de nos ambassadeurs pour assurer notre survie."
 gradual_departure:0 "Départ progressif"
 gradual_departure_desc:0 "Bien qu'ils aient été prompts à nous qualifier d'hérétiques, les fidèles du $miaphysite$ n'ont pas instantanément coupé les ponts avec le reste du monde $christian_ADJ$. Nous sommes restés en contact avec les autres patriarcats et avons assisté aux conciles, mais il est apparu progressivement que le $miaphysite$ était différent de ces croyances hérétiques."
 granary_of_europe:0 "Grenier européen"
 granary_of_europe_desc:0 "Les champs fertiles de notre domaine abritent les cultures céréalières les plus riches d'Europe, en partie grâce au système de #italic folwarki#!. Nous approvisionnons généreusement les marchés au-delà de nos frontières, ce qui permet à notre peuple de continuer à prospérer et de ne jamais souffrir de la faim."
 grand_army:0 "Grande armée"
 grand_army_desc:0 "Mettons sur pied l'une des plus grandes et plus puissantes armées que le monde ait jamais connues."
 grand_banquets:0 "Banquets fastueux"
 grand_banquets_desc:0 "Nulle affaire d'État ne saurait être abordée en l'absence d'un bon repas. Et plus l'affaire en question est importante, plus le repas doit être copieux. Organiser régulièrement de grands banquets nous permettra de traiter efficacement les sujets d'intérêt."
 grand_coordinators:0 "Grands coordinateurs"
 grand_coordinators_desc:0 "Le maintien du contrôle de nos territoires, de nos politiques et de nos opérations militaires est vital pour la pérennité de notre dynastie. Grâce à la création d'un corps de hauts fonctionnaires, nous parviendrons à consolider notre position en stabilisant les affaires intérieures et extérieures."
 grand_display_of_faith:0 "Grandes démonstrations de foi"
 grand_display_of_faith_desc:0 "Afin d'honorer le Seigneur, nous devons ériger de grands monuments en Son nom. Cette mesure nous permettra non seulement d'afficher ouvertement notre dévotion au seul vrai Dieu, mais aussi de démontrer le talent de nos architectes."
 grand_dukes_army:0 "L'armée du grand-duc"
 grand_dukes_army_desc:0 "Mener les troupes au combat est le devoir le plus important du grand-duc, qui est amené à régner sur la république russe. Grâce à son expérience et ses solides qualités de commandement, nos armées seront plus efficaces sur le champ de bataille."
 grand_marketplace_advance:0 "$grand_marketplace$"
 grand_marketplace_advance_desc:0 "$grand_marketplace_desc$"
 grand_military_parades:0 "Grandes parades militaires"
 grand_military_parades_desc:0 "L'illustre histoire militaire de notre peuple sera exposée à la vue de tous. En faisant défiler nos armées, nous mettrons en valeur notre expérience martiale et notre force incontestée."
 grand_navy:0 "Grande flotte"
 grand_navy_desc:0 "Mettons sur pied l'une des [navies|e] les plus grandes et les plus puissantes jamais connues."
 grand_shipyard_advance:0 "Grand chantier naval"
 grand_shipyard_advance_desc:0 "$grand_shipyard_desc$"
 grant_privilege_cost_modifier_renaissance_advance:0 "Codification des privilèges et devoirs"
 grant_privilege_cost_modifier_renaissance_advance_desc:0 "Le fait d'ancrer le rôle sociétal de chaque domaine dans le quotidien de notre cour facilitera le processus d'octroi de nouveaux privilèges sans provoquer de rivalités entre les différents domaines."
 gre_greek_viticulture_advance:0 "Viticulture grecque"
 gre_greek_viticulture_advance_desc:0 "Nous avons révolutionné l'agriculture grecque, en passant d'une culture de subsistance à l'exportation de cultures à forte valeur ajoutée, à l'instar du célèbre vin #italic Malvoisie#! et des raisins secs séchés au soleil. En investissant dans des techniques modernes d'irrigation et de transformation, nous avons fait de nos produits agricoles des incontournables du marché européen du luxe. L'essor économique qui en a résulté nous permet de financer une armée professionnelle permanente et de préserver une splendeur courtoise qui rivalise avec celle des grands rois occidentaux."
 gre_megali_idea_realized_advance:0 "La Grande Idée réalisée"
 gre_megali_idea_realized_advance_desc:0 "Le rêve d'un monde hellénique restauré, s'étendant de la côte ionienne à la côte anatolienne, est devenu le fil conducteur de notre politique nationale. Nous avons développé un cadre juridique et historique qui justifie notre expansion dans toutes les terres autrefois détenues par nos ancêtres, présentant nos conquêtes comme des « libérations ». Cette ferveur idéologique pousse notre administration à intégrer de nouveaux territoires à une vitesse sans précédent, et ce retour dans le giron hellénique est accueilli favorablement par la population."
 gre_rebuilding_the_theme_system_advance:0 "Reconstruction du Système des thèmes"
 gre_rebuilding_the_theme_system_advance_desc:0 "Nous nous sommes tournés vers l'âge d'or de la période mésobyzantine pour résoudre la crise qui touche nos réserves militaires. En accordant des parcelles de terre héréditaires aux #italic akrites#! (gardiens des frontières) en échange d'un service militaire à vie, nous créons une force de défense autonome profondément enracinée dans le sol qu'elle protège. Ce système réduit notre dépendance vis-à-vis des mercenaires qui nous demandent un effort financier important et garantit que chaque province dispose d'une milice dédiée capable de défendre sa position jusqu'à l'arrivée du corps principal de l'armée impériale."
 gre_restoration_of_power_advance:0 "Restauration du pouvoir"
 gre_restoration_of_power_advance_desc:0 "Afin que nous puissions nous relever du chaos causé par la quatrième croisade, il est crucial que les fragments grecs épars soient réintégrés sous l'égide d'un Basileus unique et absolu. Nous avons démantelé les rivalités locales entre #italic archontes#! qui ont permis aux Latins de nous conquérir progressivement, restaurant ainsi une cour centrale qui impose une loyauté absolue. Cette centralisation du pouvoir garantit que l'État parle d'une seule voix et agit d'une seule épée afin de supprimer les querelles internes qui ont autrefois saigné l'Empire à blanc."
 gre_the_hellenic_admiralty_advance:0 "L'Amirauté hellénique"
 gre_the_hellenic_admiralty_advance_desc:0 "Une Grèce unifiée doit devenir la maîtresse de la « mer intérieure » si elle souhaite survivre entre les géants de l'Est et de l'Ouest. Nous avons établi une Amirauté centralisée au Pirée permettant de normaliser la construction navale et de former un corps d'officiers professionnels aux dernières sciences de la navigation. En combinant la vitesse de la galère et la puissance de feu du galion, nous sommes en mesure de créer une flotte capable de prendre les courants de la mer Égée et de faire régner sa loi en Méditerranée."
 gre_the_new_stratikon_advance:0 "La nouvelle infanterie"
 gre_the_new_stratikon_advance_desc:0 "Alors que la poudre à canon bouleverse les champs de bataille européens, nous avons combiné les exercices d'entraînement au mousquet occidentaux avec nos manuels tactiques traditionnels. Notre nouvelle infanterie, appelée #italic Stratikon#!, est entraînée à maintenir une discipline rigoureuse lorsqu'elle est soumise aux tirs ennemis, imitant la résilience légendaire de la phalange antique, mais armée d'arquebuses et de piques modernes. Cette professionnalisation des troupes nous garantit le statut de puissance militaire moderne, et non plus de relique médiévale, capable de rivaliser avec n'importe quel empire."
 great_sejm_reforms:0 "Grandes réformes du Sejm"
 great_sejm_reforms_desc:0 "Si nous voulons survivre et continuer à prospérer, nous devons veiller à ce que notre mécanisme gouvernemental fonctionne bien et repose sur des bases solides. Le parlement adoptera des procédures modernisées et déléguera son autorité nouvellement adoptée. Les objectifs de cette évolution sont de saper le pouvoir des nobles et d'atténuer les abus croissants de l'institution du servage."
 great_tax_reform:0 "Grande réforme fiscale du coup de fouet unique"
 great_tax_reform_desc:0 "Notre grande nation dispose de nombreux systèmes monétaires et associés. Dans la mesure où nous souhaitons l'administrer correctement, nous allons nous efforcer d'appliquer une nouvelle forme de taxation qui permettra d'assainir le budget."
 great_three:0 "Les trois grands sièges"
 great_three_desc:0 "Sera, Ganden et Drepung, ces grandes universités monastiques, constituent le cœur intellectuel du Tibet. Leurs savants y forment des générations de moines, diplomates et gouvernants. Leur essor a fait de notre royaume non seulement un bastion de la foi, mais aussi un berceau de rigueur intellectuelle et de progrès institutionnel."
 greek_group_aegean_coastal_defence_advance:0 "Défense des côtes de la mer Égée"
 greek_group_aegean_coastal_defence_advance_desc:0 "Les côtes escarpées et les milliers d'îles de l'Égée constituent nos fortifications naturelles. Nous avons transformé notre culture étroitement liée à la mer en une doctrine défensive, où chaque navire marchand est armé et chaque pêcheur représente un marin potentiel. En surveillant les détroits exigus et les criques dissimulées, nous nous assurons que toute flotte hostile tentant de traverser nos eaux subit une persécution constante. Cette puissance navale décentralisée rend notre berceau maritime presque impossible à occuper."
 greek_group_hesychast_traditions_advance:0 "Traditions hésychastes"
 greek_group_hesychast_traditions_advance_desc:0 "À une époque de déclin politique, le mouvement spirituel de l'hésychasme, défendu par Grégoire Palamas, procure une profonde force intérieure. En se concentrant sur la « Lumière incréée » à travers la prière silencieuse, notre peuple trouve une unité qui transcende les frontières défaillantes et les intrigues impériales. Les monastères du mont Athos deviennent les centres névralgiques spirituels du monde grec, garantissant que ni les émissaires du pape ni les janissaires du sultan ne puissent briser la cohésion religieuse de notre population."
 greek_group_stratioti_levies_advance:0 "Levées de stradiotes"
 greek_group_stratioti_levies_advance_desc:0 "Nés au cœur des paysages accidentés des Balkans, les stradiotes sont une classe unique de guerriers. Ces combattants de cavalerie légère, souvent vêtus d'armures byzantines et de vêtements locaux, sont passés maîtres dans l'art d'attaquer l'ennemi par un assaut suivi d'un repli rapide, tactique nécessaire pour accabler les armées occidentales ou ottomanes, plus nombreuses mais plus lentes. Réputés féroces, ils excellent en matière de reconnaissance, ce qui en fait des éléments indispensables pour renverser le cours des batailles en montagne, terrain sur lequel les chevaliers dotés d'armures lourdes peinent à s'imposer. Ils représentent l'avant-garde de la renaissance militaire grecque."
 greek_group_the_modern_greek_enlightenment_advance:0 "Les Lumières néohelléniques"
 greek_group_the_modern_greek_enlightenment_advance_desc:0 "Le #italic Diafotismós#! amène les principes de la recherche scientifique occidentale au cœur même des terres d'origine de la philosophie. Les intellectuels grecs renvoient des milliers de livres dans leur patrie, déclenchant ainsi une réforme éducative massive. Ce mouvement remplace les anciennes superstitions par des idéaux de liberté et d'égalité ainsi que par une identité hellénique renouvelée. Le réveil national qui en résulte transforme nos sujets en citoyens, prêts à se battre pour défendre un État moderne et éclairé."
 greek_group_the_phanariote_network_advance:0 "Le réseau phanariote"
 greek_group_the_phanariote_network_advance_desc:0 "Dans les rues étroites du quartier de Phanar, une nouvelle classe de marchands-diplomates grecs s'est imposée. Tirant parti de leurs compétences linguistiques et de leur savoir, ces familles ont rapidement su se rendre indispensables au sein des rouages administratifs des puissances méditerranéennes. Leurs membres occupent des fonctions de drogmans, de gouverneurs et de financiers, créant ainsi un empire parallèle dont l'influence s'étend du Danube au Nil. Leur correspondance secrète fournit à notre État des renseignements et un levier diplomatique sans pareil."
 greek_group_the_spirit_of_resistance_advance:0 "L'esprit de résistance"
 greek_group_the_spirit_of_resistance_advance_desc:0 "La chute de Constantinople, tombée aux mains des croisés, n'a pas marqué la fin de l'âme romaine, mais plutôt son creuset. À travers les thèmes fragmentés, un #italic Ethnos#! féroce commence à se former, défini par un refus de se plier à la #italic francocratie#! latine. Cette défiance se manifeste par une mobilisation spirituelle et physique, où chaque village devient une cellule de résistance contre les seigneurs croisés. En nous accrochant à nos rites et à notre langue, nous transformerons les escarmouches locales en une guerre sainte afin de restaurer notre héritage légitime."
 greek_rite:0 "Rite $greek_culture$"
 greek_rite_desc:0 "Il y a de cela des siècles, le rite $greek_culture$ de $constantinople$ a clairement défini nos cérémonies et pratiques canoniques. Bien qu'il puisse exister de légères variations en fonction du lieu, l'homogénéité des rites de toute l'$orthodox$ est généralisée."
 green_standard_army:0 "Armée de l'Étendard vert"
 green_standard_army_desc:0 "L'armée de l'Étendard vert, une force militaire composée principalement de soldats de l'ethnie Hàn, coexiste avec nos armées des Huit Bannières. Formée à l'origine par des troupes qui se sont rendues, recrutées sur une base volontaire et à long terme, elle attire des individus issus de milieux socialement défavorisés. Utilisés comme force de police après la consolidation, ils joueront un rôle crucial dans la gouvernance militaire locale, tandis que les membres des Bannières seront réservés aux situations d'urgence et à la résistance soutenue."
 green_vitriol:0 "Vitriol vert"
 green_vitriol_desc:0 "Bien qu'il ne s'agisse pas de la même substance que l'$alum$, le $green_vitriol$ est habituellement mentionné dans les écrits alchimiques indistinctement de l'$alum$, car tous deux ont des propriétés similaires. Il n'est donc pas rare d'utiliser l'un comme substitut de l'autre."
 griot_advance:0 "Griots"
 griot_advance_desc:0 "Les griots sont à la fois conteurs, historiens, conseillers, musiciens et poètes. Ils préservent les histoires et légendes des générations passées, agissent en tant que médiateurs entre les parties belligérantes et servent de conseillers à leurs souverains et à leur peuple."
 guardians_of_ifriqiya:0 "Gardiens de l'Ifrīqya"
 guardians_of_ifriqiya_desc:0 "Successeurs des anciennes cités de Carthage et de Kairouan, nous sommes les gardiens du cœur du Maghreb. Notre règne apporte la stabilité et sera salué par tous dans une région autrefois contestée."
 guards_of_the_shannon_advance:0 "Gardiens du Shannon"
 guards_of_the_shannon_advance_desc:0 "La forteresse d'Athlone, qui enjambe le puissant fleuve Shannon, est un point capital pour contrôler le cœur de l'Irlande. Les O'Kellys de $HYM$, seigneurs de ces terres depuis belle lurette, se sont battus sans relâche pour défendre leurs possessions contre les incursions normandes."
 guilds:0 "Guildes"
 guilds_desc:0 "Une guilde est une association de marchands ou d'artisans réunis pour se protéger mutuellement, s'entraider et poursuivre leurs propres intérêts. Les guildes établissent des monopoles sur leurs marchandises et leur commerce, tout en fixant des normes de qualité et de prix pour leurs marchandises."
 guj_garba:0 "Danse garbha"
 guj_garba_desc:0 "En s'inspirant du culte que vouent par la danse les femmes à la déesse $hindu_ADJ$e Ambâjî, notre peuple a créé une nouvelle et très gracieuse forme de danse appelée « garbha ». Les bases de cette danse consistent à chanter et à battre des mains en rythme en formant un cercle. Aujourd'hui, les hommes et les femmes de notre pays s'assemblent en foule pour pratiquer avec grande ferveur cette danse destinée aux occasions spéciales, vêtus de tenues brodées de façon exquise. Tous ensemble, jeunes et moins jeunes, paysans et princes, $muslim_ADJ$s et $hindu_ADJ$s dansent en formant une ronde toujours plus grande."
 guj_gujarati_lipi:0 "Alphabet $GUJ_ADJ$"
 guj_gujarati_lipi_desc:0 "L'alphabet $GUJ_ADJ$ est un nouveau système d'écriture développé pour des raisons mercantiles. Il est également connu sous le nom d'écriture des sharâphî (banquiers), des vâniâshâi (marchands) ou des mahajânî (commerçants), en raison de son association avec le commerce. Son utilisation s'est rapidement répandue à travers le $GUJ$, au $KUT$ et au $SND$ pour représenter ces langues et étudier le $sanskrit_language$ ; elle a même été adoptée par la communauté zoroastrienne pour écrire l'Avesta. Il fournit un système d'écriture commun à de nombreuses ethnies différentes, qu'il lie entre elles en facilitant leur unité et une identité commune."
 guj_gujarati_merchant_diaspora:0 "Diaspora des marchands $GUJ_ADJ$s"
 guj_gujarati_merchant_diaspora_desc:0 "Il n'est nul lieu où notre peuple ne pratique le commerce ! Sur chaque côte notre peuple fait ses affaires, partout où le portent les alizés, et nos flottes sillonnent en permanence les mers à la recherche de nouvelles occasions. Nos marchands connaissent l'art et la valeur des biens et des navires hardis, pour leur plus grand bénéfice."
 guj_hub_of_the_indian_ocean_trade:0 "Carrefour commercial de l'$indian_ocean_region$"
 guj_hub_of_the_indian_ocean_trade_desc:0 "Grâce à la mousson et à sa situation géographique, le $GUJ$ a longtemps servi de plaque tournante du commerce est-ouest dans l'$indian_ocean_region$, reliant la $red_sea_area$, l'$egypt_region$ et Malacca. De ce fait, les marchands du $GUJ$ étaient d'importants intermédiaires apportant des biens précieux tels que les épices des îles Moluques et la $silk$ de $CHI$, pour le vendre aux marchands venant de l'ouest."
 guj_jain_routes:0 "Liens $jain_ADJ$s"
 guj_jain_routes_desc:0 "Le $jain$ est un mode de vie ancien, mis en place dans sa forme actuelle par Mahāvīra. Pendant un millier d'années, le $GUJ$ a été le bastion de la communauté et de la foi $jain_ADJ$e, avec de nombreux lieux saints et temples. Des dynasties royales ont soutenu la religion en formant une communauté avec le peuple $hindu_ADJ$. Les invasions $muslim_ADJ$es de l'ouest, par Mahmud Ghaznî et Mohammad Ghûrî, ont opprimé la communauté $jain_ADJ$e, vandalisant les temples ou les convertissant en mosquées, et brûlant les bibliothèques $jain_ADJ$es. Cependant, le peuple $jain_ADJ$ du $GUJ$ a survécu, s'est adapté et a prospéré, utilisant ses liens avec les communautés $jain_ADJ$es à travers le monde pour servir de plaque tournante dans le domaine de la foi comme dans celui du commerce."
 gun_factory_advance:0 "Fabrique de canons"
 gun_factory_advance_desc:0 "$cannons_factory_desc$"
 gun_smith_advance:0 "Armurier"
 gun_smith_advance_desc:0 "$gun_smith_desc$"
 gunpowder_advance:0 "Poudre à canon"
 gunpowder_advance_desc:0 "L'usage de la poudre à canon sur le champ de bataille aura sans conteste un impact positif sur nos performances et nous permettra d'exceller en matière d'affrontements militaires."
 gunpowder_empires:0 "Empires de la poudre à canon"
 gunpowder_empires_desc:0 "La poudre à canon a beau avoir été inventée en Extrême-Orient, c'est néanmoins l'$muslim$ qui l'a répandue à travers le monde et a contribué à sa large utilisation. Les armes sont au cœur de nos armées depuis des générations, et leur production est l'une des caractéristiques qui nous définissent."
 guns_workshop_advance:0 "$guns_workshop$"
 guns_workshop_advance_desc:0 "$guns_workshop_desc$"
 gustavian_infantry:0 "Infanterie gustavienne"
 gustavian_infantry_desc:0 "Le roi de Suède Gustave Adolphe développa les unités d'infanterie pour améliorer leur puissance de tir : il réduisit ses formations et les organisa sous forme de rectangle, pour augmenter le nombre de mousquets pouvant faire feu lors de la même volée. Par ailleurs, l'adjonction de petites pièces d'artillerie accrut encore davantage la puissance de feu de l'infanterie."
 hab_expert_mountaineers:0 "Un pays de montagnes et de rivières"
 hab_expert_mountaineers_desc:0 "Notre peuple est parfaitement habitué au franchissement des obstacles de notre pays, depuis les hauts sommets et les cols de nos montagnes jusqu'aux larges fleuves de nos vallées."
 habsburg_dominance:0 "Expertise diplomatique autrichienne"
 habsburg_dominance_desc:0 "Au vu de notre position au centre de l'Europe, nous devrons adopter une position flexible en ce qui concerne notre diplomatie extérieure. Les alliances et les rivalités peuvent se briser aussi rapidement qu'elles se sont formées, et nos diplomates doivent être formés pour couvrir toutes les éventualités."
 hachiman_worship:0 "Culte de Hachiman"
 hachiman_worship_desc:0 "Hachiman est l'une des divinités les plus vénérées. À l'origine, il s'agissait d'une déification de Ōjin Tennō, mais après l'introduction du $buddhist$, il a également été identifié comme un bodhisattva. Il est le protecteur de la lignée impériale et le dieu tutélaire de la classe des guerriers."
 hai_bustling_towns:0 "Villes animées"
 hai_bustling_towns_desc:0 "Les villes urbaines regorgent de vie et de potentiel. Avec un petit effort, nous pouvons les rendre fabuleusement riches (et leur région par voie de conséquence) pour en tirer un gain d'impôts substantiel."
 hai_expert_embassadors:0 "Ambassadeurs expérimentés"
 hai_expert_embassadors_desc:0 "Nos dirigeants ont toujours été habiles avec les mots, ce qui nous a permis d'étendre l'influence de notre nation au-delà de nos frontières. Plus le temps passe, plus la nécessité de nous faire des amis pour nous protéger de nos ennemis ou pour étendre notre influence sur d'autres nations devient évidente."
 hai_frontier_march:0 "Une marche frontalière"
 hai_frontier_march_desc:0 "Aux confins de l'Empire, le Hainaut a développé un esprit frontalier qui n'échappe à personne. Cet esprit confère à nos terres une mentalité défensive que nous pouvons exploiter à notre avantage."
 hakkapelitta:0 "Hakkapeliitat : les hakkapélites"
 hakkapelitta_desc:0 "La Finlande est un endroit pauvre et quelque peu arriéré. Aussi, servir dans l'armée suédoise donne aux Finlandais une excellente opportunité de s'enrichir par le pillage. Leurs cavaliers adroits et leurs montures de grande qualité nous permettent de disposer d'une excellente cavalerie, que nos ennemis redoutent, et dont ils disent que la sorcellerie la rend invulnérable."
 hamburg_port_cities:0 "Réseaux portuaires"
 hamburg_port_cities_desc:0 "Notre pays survit grâce à ses liens étroits avec le commerce maritime et à l'échange constant de biens. Pour maintenir un port en bon état, nous devrons draguer de nouvelles voies navigables et construire d'autres quais et entrepôts, afin d'attirer de nouveaux marchands et leurs cargaisons."
 hand_cannon_guild_advance:0 "$hand_cannon_guild$"
 hand_cannon_guild_advance_desc:0 "Ce sont des tubes métalliques primitifs, sans commune mesure avec les canons sophistiqués qui ont suivi. D'abord développés en Chine, les premiers canons à main se sont répandus en Corée et au Japon en 1270."
 harae:0 "Harae"
 harae_desc:0 "Dans notre foi, la pratique du #italic $harae$#!, ou purification rituelle, est essentielle pour éliminer tous les #italic tsumi#!, péchés, et #italic kegare#!, impuretés. En veillant à ce que notre population accomplisse les rituels $harae$ correctement et fréquemment, nous nous assurerons du maintien de la pureté de notre pays."
 harsh_environments:0 "Environnements hostiles"
 harsh_environments_desc:0 "Depuis sa genèse, l'$muslim$ s'est répandu dans certains des environnements les plus hostiles au monde, raison pour laquelle les infidèles venant combattre sur nos terres se retrouvent toujours en difficulté."
 haudenosaunee_ambition:0 "Confédération modèle"
 haudenosaunee_ambition_desc:0 "La confédération haudenosaunee a été une grande réussite. Tous les pays autour de nous contemplent avec admiration notre manière de gouverner."
 haudenosaunee_heritage:0 "Guerriers impitoyables"
 haudenosaunee_heritage_desc:0 "Ce serait une erreur pour nos ennemis de nous considérer comme faibles au vu de nos capacités diplomatiques. Il n'y a pas meilleur moyen de perdre face à nos guerriers que de les sous-estimer, car ils brillent par leur férocité et leur fierté."
 haudenosaunee_present_giving:0 "Cadeaux haudenosaunee"
 haudenosaunee_present_giving_desc:0 "Nos tractations commerciales sont cimentées par des échanges de cadeaux. De même que les tribus se rassemblent et travaillent pour le bien commun, l'acte d'offrir est forcément suivi d'un autre don en retour."
 haudenosaunee_tradition:0 "Héritage de Hiawatha"
 haudenosaunee_tradition_desc:0 "Le légendaire Hiawatha, réputé pour ses talents de chef et d'orateur parmi les Haudenosaunee, a placé la barre très haut en manière de diplomatie. Nous l'honorerons en suivant son exemple dans nos relations diplomatiques."
 head_hunters:0 "Chasseurs de têtes"
 head_hunters_desc:0 "La conquête des terres des peuples inférieurs au nôtre est une nécessité pour notre pays. Cette tradition a engendré un code guerrier unique en son genre, selon lequel capturer un ennemi sans le tuer relève de la plus haute forme de courage. Cela a permis à notre peuple de se forger une réputation pour sa capacité à capturer ses ennemis vivants."
 heavenly_architecture:0 "Architecture céleste"
 heavenly_architecture_desc:0 "Les édifices religieux $orthodox_ADJ$s sont toujours conçus à l'imitation du Ciel. Leur dôme central, construit de manière plus centralisée qu'en Occident où il est basé sur la basilique, est le toit qui symbolise le paradis. Parés d'images et d'icônes, ces structures sont des merveilles pour les yeux."
 heian_kyo:0 "Heian-kyō"
 heian_kyo_desc:0 "La ville de Heian-kyō, centre d'art et de culture, fut la résidence de notre empereur pendant des siècles. C'est là que la cour somptueuse de l'ère $fujiwara$ s'est épanouie et que tous les Japonais l'ont contemplée avec admiration pour s'en inspirer. Nous allons embrasser sa tradition et, grâce à notre mécénat, faire connaître à la culture de notre capitale un nouveau printemps."
 heirs_of_rome:0 "Héritiers de Rome"
 heirs_of_rome_desc:0 "Nombreux sont ceux qui se sont proclamés héritiers de Rome et de l'ensemble de l'Empire romain. Cependant, notre foi est la seule véritable foi de l'ancien empire, et nous seuls pouvons prétendre en être les descendants directs."
 heirs_of_rum:0 "Héritiers de Rûm"
 heirs_of_rum_desc:0 "Après une période mouvementée et la lutte pour dominer nos beylicats voisins, le temps est venu pour nous de restaurer les frontières de l'ancien grand sultanat de Rûm."
 hes_form_the_militia_army:0 "Province légitime des armées professionnelles"
 hes_form_the_militia_army_desc:0 "Notre position stratégique au sein de l'Empire fait de nous un terrain d'entraînement attrayant pour les armées des autres princes, lorsque des menaces extérieures surgissent. Cependant, accueillir des troupes étrangères nuit à nos finances. Pour éviter cette charge onéreuse, nous devons lever nos propres troupes et les assigner au service de l'Empire."
 hesse_jager:0 "$a_hesse_jager$"
 hesse_jager_desc:0 "$a_hesse_jager_desc$"
 hiberno_norman_keeps_advance:0 "Donjons hiberno-normands"
 hiberno_norman_keeps_advance_desc:0 "Nos ancêtres normands ont construit de splendides tours pour maintenir leur emprise sur les terres hostiles de la campagne irlandaise."
 hidden_cities:0 "Cités cachées"
 hidden_cities_desc:0 "Dans un pays de pics immenses et de forêts humides impénétrables, nombre de nos cités sont pratiquement inaccessibles aux étrangers. Elles pourraient facilement rester cachées durant des siècles, oubliées du reste du monde."
 hin_administration_of_india:0 "Administration indienne"
 hin_administration_of_india_desc:0 "Gouverner un État aussi vaste qu'un sous-continent n'est pas tâche aisée. Nous devons développer un système administratif robuste, en coopération avec les princes locaux, pour tirer la richesse de nos terres pour extraire les richesses de nos terres."
 hin_ganga:0 "Gaṅgā"
 hin_ganga_desc:0 "De nombreux hindous vénèrent le Gange comme une déesse, qui apporte pureté et rédemption aux fidèles. Nous invitons les pèlerins à visiter ses rives pour se baigner dans ses eaux sacrées. Par le Gange, notre nation est purifiée."
 hin_gunpowder_empire:0 "Empire de la poudre à canon"
 hin_gunpowder_empire_desc:0 "Notre maîtrise de la poudre à canon dans la guerre nous a couverts de gloire et donné un grand État. Cette domination serait impossible sans une production intensive d'armes à feu pour nos troupes."
 hin_indian_empire:0 "Inde impériale"
 hin_indian_empire_desc:0 "Jamais aucun dirigeant, qu'il soit musulman, hindou, bouddhiste ou jaïn, n'est parvenu à conquérir l'ensemble de l'Inde. Nous devons être les premiers souverains à y parvenir !"
 hin_industrialization:0 "Industrialisation de l'Inde"
 hin_industrialization_desc:0 "L'Inde bénéficie de conditions économiques idéales pour une croissance industrielle rapide. Grâce à l'adoption de nouvelles technologies, nous avons la possibilité d'améliorer significativement les conditions de notre production locale, notamment dans le secteur textile. En mettant l'accent sur des méthodes innovantes, notre État panindien pourra garantir une croissance soutenue et régulière à nos industries."
 hin_persianate_court:0 "Culture de cour persane"
 hin_persianate_court_desc:0 "Les cours indiennes ont longtemps été marquées par l'influence des langues étrangères et des coutumes de cour. C'est en exploitant ces liens que nous attirerons à notre service les conseillers les plus compétents."
 hin_rocketry:0 "Développer la technologie des fusées"
 hin_rocketry_desc:0 "Les fusées de métal doivent encore être adaptées aux usages militaires, mais leur puissance explosive a certainement de nombreuses applications tactiques. Nous devrions donc expérimenter cette technologie et la mettre en œuvre sur le champ de bataille."
 hin_sepahi:0 "Sipahis"
 hin_sepahi_desc:0 "Nombre de conquérants ont échoué parce qu'ils avaient négligé l'importance de l'infanterie. Nous devons donc veiller à ce que nos sipahis soient équipés des armes à feu les plus efficaces et recourent aux tactiques les plus modernes afin d'affronter les ennemis les plus divers."
 hin_sufism:0 "Attirer les missionnaires soufis"
 hin_sufism_desc:0 "Les princes musulmans, dans le monde entier, rivalisent pour attirer les maîtres soufis les plus sages. Notre renom est grand désormais, aussi de plus en plus de ces soufis nous rejoignent-ils. Des villes sont fondées où ils peuvent s'établir, dans des régions autrefois inhospitalières, et les populations locales voient dans leur sagesse un modèle qui les pousse à se convertir à notre foi."
 hin_united_india:0 "Unité indienne"
 hin_united_india_desc:0 "Une seule bannière unira les peuples, les cultures, les langues et les nations du sous-continent indien. Des ambitions plus grandes ne seront possibles que par une compréhension commune et une unité soigneusement cultivée parmi les Indiens."
 hindu_architecture:0 "Architecture $hindu_ADJ$e"
 hindu_architecture_desc:0 "Quel que soit le style architectural employé – śikhara, vimāna ou prāṅg – les temples $hindu_ADJ$s se distinguent facilement grâce à leurs grandes tours décoratives. Offrant une représentation du $mount_meru$ plus ou moins marquée selon la région, ces flèches servent à la fois de symbole et de démonstration de force."
 hindu_empires:0 "Empires $hindu_ADJ$s"
 hindu_empires_desc:0 "L'Histoire a vu naître de nombreux empires suivant les préceptes de l'$hindu$. Des empires Maurya et Gupta d'$india$ à l'Empire de Śrīvijaya d'$indonesia_region$ en passant par la longue dynastie Chola, l'$hindu$ a toujours soutenu les puissants dirigeants."
 hindu_muslim_relations:0 "Relations entre $hindu_ADJ$s et $muslim_ADJ$s"
 hindu_muslim_relations_desc:0 "$hindu$ et $muslim$ ont grandement interagi par le passé, et il continuera d'en être ainsi. Nos peuples ont appris à coexister en paix, au point où un certain syncrétisme s'est même établi entre les deux confessions."
 hindu_unification:0 "Unification $hindu_ADJ$e"
 hindu_unification_desc:0 "Malgré la diversité des pratiques et des croyances au sein de l'$hindu$, ce qui nous rassemble dépasse largement ce qui nous sépare. Une vision commune de cette religion commence à se dessiner, offrant à notre peuple un profond sentiment d'unité."
 hire_artist_cost_modifier_advance_disc:0 "Une terre de culture"
 hire_artist_cost_modifier_advance_disc_desc:0 "Les arts et la culture sont ce qui définit l'identité de tout pays. En étant fiers de notre culture et de nos artistes, nous pouvons certainement laisser notre marque sur le monde entier."
 hispano_moresque_style:0 "Le style hispano-mauresque"
 hispano_moresque_style_desc:0 "Nos cités reflètent un mélange unique d'élégance andalouse et d'architecture maghrébine. Le style hispano-mauresque, transmis par des artisans et des nobles étrangers, inspire une nouvelle floraison culturelle et rehausse le prestige de notre cour."
 hofkriegsrat:0 "Hofkriegsrat"
 hofkriegsrat_desc:0 "Notre conseil de guerre ne peut fonctionner qu'avec une structure administrative adéquate. Il nous faut connaître les moindres détails de nos troupes et de notre logistique pour espérer défendre notre royaume contre des ennemis."
 hol_maritime_warfare:0 "Guerre maritime"
 hol_maritime_warfare_desc:0 "En tant que nation maritime, nos marins sont habitués au combat, que ce soit contre des rivaux ou des pirates qui tentent de voler nos richesses. Dans tous les cas, notre flotte doit être prête à affronter n'importe quel ennemi à n'importe quel moment."
 hol_sailors:0 "Marins hollandais"
 hol_sailors_desc:0 "En tant que pays constitué de sable et de terres inondables, la Hollande a toujours considéré la mer comme une seconde patrie naturelle, où le poisson et la gloire attendent ceux qui auront la bravoure de les poursuivre."
 hol_trading_spirit:0 "Esprit commerçant"
 hol_trading_spirit_desc:0 "Notre pays est cerné par la mer. Il est donc naturel pour nous de faire face à ces vagues afin de trouver des ports avec lesquels commercer et nous enrichir."
 holi:0 "Holi"
 holi_desc:0 "Célébrant l'arrivée du printemps, $holi$ est la fête des couleurs et de l'amour. Nous honorons l'agriculture et les récoltes abondantes, tout en admirant la myriade de couleurs offerte par le printemps. Cet événement est également l'occasion de s'amuser et de résoudre les conflits, permettant ainsi à chacun de s'affranchir de ses impuretés émotionnelles."
 hollander_beater:0 "Cylindre hollandais"
 hollander_beater_desc:0 "Des siècles durant, les papeteries ont dû faire usage de piles à maillets pour battre le chiffon, écrasant les fibres pour produire la pâte nécessaire à la fabrication du papier. Grâce à leurs moulins à vent, d'ingénieux artisans ont créé une méthode bien plus efficace. Ce qu'ils appellent le « cylindre hollandais » est une cuve où une roue horizontale dotée de lames tranchantes est mue par la force du vent. Ces lames déchirent autant de chiffons en quelques heures que les anciennes piles le faisaient en plusieurs jours."
 holy_father:0 "Saint-Père"
 holy_father_desc:0 "Être le vicaire du Christ aux yeux des catholiques romains nous confère une certaine marge de manœuvre politique. La bulle pontificale, ce document porteur du sceau du pape, est investie de la parole de Dieu Lui-même. Elle a déjà permis, par le passé, de maudire des rois et de diviser des continents entiers."
 holy_revelation:0 "Révélation sacrée"
 holy_revelation_desc:0 "La parole d'$muslim_god_name$ a été révélée à Son prophète Mahomet, que la paix soit sur lui, et transcrite dans le saint $common_string_quran$. Par ses versets, la volonté d'$muslim_god_name$ sera transmise à Ses fidèles, et tous les croyants $muslim_ADJ$s devraient se familiariser avec cet ouvrage."
 holy_rivers:0 "Rivières sacrées"
 holy_rivers_desc:0 "Les rivières et leur vénération ont toujours occupé une place essentielle dans l'$hindu$. De l'Indus au Gange, nombreuses sont les rivières perçues comme sacrées, servant de cadre à de nombreuses cérémonies. Leurs eaux, investies d'une dimension spirituelle, sont souvent utilisées dans des rituels de purification."
 home_of_hussars:0 "Berceau des hussards"
 home_of_hussars_desc:0 "Bien que les formations de cavalerie légère soient un concept ancien, les premiers hussards balkaniques – ou #italic gusars#! – apparurent comme des unités auxiliaires de $BYZ$, recrutées principalement dans la $serbia_area$ sous domination $BYZ_ADJ$e aux Xe et XIe siècles. Même après le déclin $BYZ_ADJ$, cette tradition perdura et fut encore perfectionnée au fil des siècles suivants."
 home_of_the_whirling_dervishes:0 "Berceau des derviches tourneurs"
 home_of_the_whirling_dervishes_desc:0 "Konya, notre centre spirituel, abrite les disciples de Mevlânâ Jalâl al-Dîn Muhammad Rûmî. Leur pratique sacrée, le Sema, symbolise le voyage de l'âme vers la vérité divine. Leur présence enrichit la tradition mystique de notre royaume et renforce nos racines soufies."
 home_shrines:0 "Sanctuaires domestiques"
 home_shrines_desc:0 "Les cultes et les rituels sont traditionnellement accomplis dans les sanctuaires et les temples. Cependant, de plus en plus de nos concitoyens commencent à avoir chez eux des sanctuaires familiaux : le #italic kamidana#! pour vénérer les kamis et le #italic butsudan#! $buddhist_ADJ$ pour vénérer les ancêtres."
 honji_suijaku:0 "Honji suijaku"
 honji_suijaku_desc:0 "L'un des facteurs clés pour comprendre le $shinbutsu_shuugou$ est d'identifier les kamis comme des manifestations des différents Bouddhas, et les Bouddhas comme la manifestation des différents kamis. Ainsi, les deux ne sont qu'une seule et même chose, l'entité essentielle ou #italic Honji#! se manifestant sous différentes formes, ou #italic Suijaku#!."
 horde_ardor:0 "Ardeur de la horde"
 horde_ardor_desc:0 "Nos chevaux sont presque aussi féroces et terrifiants pour nos ennemis que le sont leurs cavaliers. Notre cavalerie marchant vers la guerre donne l'impression d'une armée inarrêtable de démons venus de l'enfer."
 horde_loot_discovery_advance:0 "Profits des raids"
 horde_loot_discovery_advance_desc:0 "Les raids ont toujours fait partie de notre identité. C'est en pillant et en saccageant que notre peuple s'est formé et a acquis une grande partie de ses richesses. Il n'y a pas de mal à fomenter encore plus de raids, du moins pour nous."
 horde_loyalty:0 "Loyauté de la horde"
 horde_loyalty_desc:0 "La loyauté de notre peuple est incontestable. Aucune âme ayant vécu sous le règne prospère du $rank_kingdom_horde_ruler_suffix_male$ ne pourrait songer à l'abandonner."
 hormuz_toll:0 "Péage d'Ormuz"
 hormuz_toll_desc:0 "Au point le plus étroit du golfe Persique se trouve Ormuz, gardienne du commerce maritime entre l'Orient et l'Occident. Aucun navire ne passe sans que nous le sachions ou que nous le taxions. Pendant des siècles, ce péage ne nous a pas seulement enrichis, il a aussi façonné notre diplomatie et la projection de notre puissance à travers les vastes mers."
 horse_lords:0 "Maîtres des chevaux des steppes"
 horse_lords_desc:0 "La seule véritable bête est de nature humaine. Les chevaux sont nés et ont été élevés parmi nos enfants, ils ont appris à être aussi nobles et féroces que notre peuple. Leur dressage est pour nous notre plus grande fierté, car ils nous reconnaissent comme leurs plus grands seigneurs."
 horse_riding_advance:0 "Cavalerie"
 horse_riding_advance_desc:0 "Le dressage des chevaux a révolutionné la façon dont les individus se déplacent et transportent de lourdes charges. L'utilisation des chevaux au combat a permis aux cavaliers non seulement de se déplacer plus rapidement, mais aussi de prendre de la hauteur pour attaquer leurs ennemis ou les écraser en utilisant le poids de la monture à leur avantage."
 hospital_advance:0 "Hospices"
 hospital_advance_desc:0 "Les hospices médiévaux furent fondés durant le Moyen Âge pour soigner les malades, les pauvres et les handicapés. Généralement gérés par des ordres religieux, ces hôpitaux rudimentaires proposaient quelques services médicaux, notamment des soins infirmiers de base, des remèdes à base de plantes et, plus tard, des interventions chirurgicales. Ils étaient souvent situés à proximité des églises ou des monastères et disposaient de salles séparées pour les hommes et les femmes. Malgré les connaissances médicales limitées de l'époque, les hospices ont joué un rôle essentiel en offrant un sanctuaire, du réconfort et des rudiments de traitements médicaux à ceux qui en avaient besoin pendant cette période difficile de l'histoire."
 hot_blast_furnace:0 "Haut fourneau à chaud"
 hot_blast_furnace_desc:0 "Les problèmes posés par les hauts fourneaux à coke, qui produisent une fonte avec plus d'impuretés, ont conduit au développement du haut fourneau à chaud. En plus de réduire considérablement l'utilisation du coke, celui-ci améliore la qualité de la fonte, mais permet également d'utiliser du charbon brut comme combustible s'il est disponible, ce qui constitue un grand progrès dans la métallurgie de la fonte."
 house_of_parliament_advance:0 "$house_of_parliament$"
 house_of_parliament_advance_desc:0 "$house_of_parliament_desc$"
 hsa_concept_of_mercantilism:0 "Concept de mercantilisme"
 hsa_concept_of_mercantilism_desc:0 "Au cours des siècles passés, nous avons œuvré sans relâche à intégrer nos accords à l'échelle mondiale du commerce. Désormais, plus que jamais, nous devons protéger nos propres marchands, sous peine de voir notre ligue se morceler et ployer face à la concurrence."
 hsa_draft_merchant_privileges:0 "Privilèges marchands de recrutement"
 hsa_draft_merchant_privileges_desc:0 "Les marchands qui font affaire sous notre blason disposent d'une grande influence et de grandes richesses. Ainsi, consolider leurs privilèges sur les marchés étrangers et intérieurs ne fera qu'accroître notre propre prospérité."
 hsa_exchange_of_ideas:0 "Échanges d'idées"
 hsa_exchange_of_ideas_desc:0 "Les marchands itinérants qui conduisent nos marchandises à l'étranger sont les meilleurs apporteurs des connaissances étrangères sur nos côtes !"
 hsa_global_reach:0 "Portée mondiale"
 hsa_global_reach_desc:0 "L'adoption du commerce à grande échelle a ébranlé le monde mercantiliste. Les affaires régulières avec des marchands étrangers venus de lointaines contrées sont en plein essor, tout comme nos bénéfices."
 hsa_hanseatic_shipwrights:0 "Charpentiers de marine de la Hanse"
 hsa_hanseatic_shipwrights_desc:0 "Dans une $europe$ plongeant dans la guerre, remplie de souverains pressés d'étendre leur domaine, tout le monde attend de nous que nous leur construisions une grande flotte apte à remplir leurs ambitions. Forts de siècles de connaissances en matière de construction navale ainsi que du meilleur bois du continent, nos charpentiers sont sans égal !"
 hsa_hanseatic_ties:0 "Relations hanséatiques"
 hsa_hanseatic_ties_desc:0 "Notre ligue abrite de nombreuses cités et guildes marchandes, disposant elles-mêmes de leurs propres objectifs et opérations. Afin de préserver notre prospérité et de développer notre champ d'action, nous devons nous intéresser à la diplomatie."
 hsa_hanseatic_treasury:0 "La trésorerie hanséatique"
 hsa_hanseatic_treasury_desc:0 "Une économie forte et saine n'est que l'un des résultats de notre prospérité continue. Avec des liquidités à profusion et une trésorerie au beau fixe, nous nous sommes établis comme créanciers robustes et fiables."
 hsa_holpfennige:0 "Hohlpfennig"
 hsa_holpfennige_desc:0 "Créée entre les cités de $LUB$ et $HAM$, le #italic Hohlpfennig#! était une monnaie développée pour lutter contre la dévaluation galopante d'une ère où chaque frappeur avait ses propres normes de concentration d'argent. En tant que moyen de mener des transactions, cette monnaie facilitera nos activités commerciales y compris avec les marchés à l'étranger."
 hsa_mastery_of_the_sea:0 "Maîtrise de la mer"
 hsa_mastery_of_the_sea_desc:0 "Nos traditions maritimes ont lié notre fortune aux caprices de la mer. Maîtriser sa puissance et obtenir son respect nous permettrait de bénéficier de grands avantages pour les affaires marchandes..."
 hsa_reform_the_hanstag:0 "Réforme du Hansetag"
 hsa_reform_the_hanstag_desc:0 "En ces temps de troubles et de mutations, nos institutions centralisées pour les assemblées et les délibérations doivent être ajustées afin de s'adapter aux problèmes de notre époque."
 hsa_regularized_contributions:0 "Contributions régularisées"
 hsa_regularized_contributions_desc:0 "Les nombreuses entités au sein de notre ligue doivent passer sous notre contrôle afin de formaliser leurs contributions mensuelles et annuelles à la trésorerie."
 hsa_seal_of_the_hansa:0 "Sceau de la Hanse"
 hsa_seal_of_the_hansa_desc:0 "Dans les marchés d'$europe$, de $london$ à $novgorod$, nos marchands sont réputés pour leur opulence. Notre capacité à mobiliser de grandes flottes commerciales et à rassembler des dizaines de villes en une parfaite harmonie de profit et d'échange de ressources est inégalée."
 hsa_the_cog:0 "La $n_hanseatic_cog$"
 hsa_the_cog_desc:0 "$n_hanseatic_cog_desc$"
 hsk_branches_and_retainers:0 "Branches et fidèles"
 hsk_branches_and_retainers_desc:0 "Notre lignée est très étendue, et nos parents et fidèles possèdent de nombreux territoires riches dans le centre du Japon, tout en restant loyaux au chef de clan. C'est par son harmonie intérieure que notre clan pourra devenir l'un des plus puissants du pays."
 hsk_control_of_izumi_sea:0 "Contrôle de la mer d'Izumi"
 hsk_control_of_izumi_sea_desc:0 "Traditionnellement, les territoires de notre clan ont toujours gravité autour du canal de Kii. Contrôler le commerce en provenance de l'extérieur nous permettrait donc de dégager d'immenses profits et de prospérer rapidement."
 hsk_rising_clan:0 "Clan en plein essor"
 hsk_rising_clan_desc:0 "Bien que nos origines soient relativement humbles, même par rapport aux autres clans issus de la maison Ashikaga, nous sommes parvenus à développer considérablement notre influence. Notre clan est en pleine ascension, et nous ne comptons pas nous arrêter là."
 htk_clan_spread:0 "Expansion du clan"
 htk_clan_spread_desc:0 "Nous ne limitons pas notre clan à une seule région et tentons de propager notre influence à travers le pays. Quelle que soit la distance à parcourir, l'autorité de notre clan demeurera incontestée dans l'ensemble de notre territoire."
 htk_hatakeyama_heritage:0 "Héritage de Hatakeyama"
 htk_hatakeyama_heritage_desc:0 "D'aucuns considèrent les chefs de notre clan comme des rebelles ou des fauteurs de troubles, du fait de notre histoire passée. Mais ce n'est là rien de plus qu'un signe de notre ténacité. Nous nous sommes relevés de nos cendres. Nous ne capitulerons jamais et nous nous battrons toujours pour ce qui nous appartient, quel que soit l'adversaire !"
 htk_shogunate_ties:0 "Liens avec le shogunat"
 htk_shogunate_ties_desc:0 "Notre clan étant issu de l'une des branches de la maison Ashikaga, nos liens avec l'autorité du shogunat sont solides. Cette association fera à jamais notre prestige."
 hub_of_militarism:0 "Carrefour militariste"
 hub_of_militarism_desc:0 "La guerre a longtemps défini notre destin, mais désormais elle définira notre force. De l'étreinte dévastatrice des combats et des sièges, Smolensk s'élève comme un centre de production militaire : canons, armes à feu, poudre et doctrines s'écoulent de nos arsenaux. Que le monde ne nous voie plus comme une proie à conquérir, mais comme un marteau à craindre, prêt à frapper l'enclume des envahisseurs étrangers."
 hum_a_sheep_surrounded_by_wolves:0 "Un mouton entouré de loups"
 hum_a_sheep_surrounded_by_wolves_desc:0 "Nous existons géographiquement coincés entre les ambitions grandissantes d'ennemis plus puissants. Pour survivre à cet encerclement prédateur, nos seigneurs ont maîtrisé l'art d'opposer nos voisins les uns aux autres, offrant sans cesse une vassalité au loup lointain afin de dissuader celui qui se tient à notre porte. En jouant l'Occident catholique contre l'Orient orthodoxe, et les Krstjani bosniens contre les deux, nous veillons à ce qu'aucun hégémon ne puisse entièrement absorber nos terres sans provoquer une intervention massive de ses rivaux. Cette culture de duplicité politique sophistiquée transforme notre faiblesse apparente en mécanisme de survie : nous accordons des concessions commerciales et un accès militaire à la puissance qui garantit notre autonomie interne à un moment donné. Les grands loups sont ainsi occupés à s'entre-déchirer pendant que nous restons les maîtres incontestés de la Neretva."
 hum_modernized_national_redoubt:0 "Réduit national modernisé"
 hum_modernized_national_redoubt_desc:0 "En perfectionnant des siècles de guerre de montagne, nous avons mis en place la doctrine du « réduit national », où chaque ville majeure et chaque col sont intégrés dans un plan défensif unique et cohérent. En utilisant la balistique et la cartographie modernes de l'Occident, nous avons prépositionné des batteries et des réserves dans des caches montagnardes dissimulées. Cette doctrine garantit que, même si les vallées sont perdues, l'État peut continuer à fonctionner comme une entité militaire souveraine depuis les hauts sommets, narguant tout occupant par une résistance permanente et active qui rend le coût de la domination du Hum prohibitif pour n'importe quel empire."
 hum_the_humite_chancery_records:0 "Les Registres de la chancellerie humite"
 hum_the_humite_chancery_records_desc:0 "Pour gérer notre État, nous avons centralisé notre administration au sein d'une chancellerie mobile mais hautement organisée. En tenant des registres précis de la propriété foncière, des lignées claniques et des obligations fiscales, même en temps de guerre, nous empêchons la désintégration sociale qui suit souvent l'occupation étrangère. Cette résilience bureaucratique garantit que l'État peut reprendre pleinement ses fonctions dès qu'un envahisseur est repoussé, en maintenant une chaîne de commandement claire et ininterrompue, du palais du souverain jusqu'au plus petit hameau des hauts karsts."
 hum_the_kosaca_iron_fist:0 "La main de fer des Kosača"
 hum_the_kosaca_iron_fist_desc:0 "Inspiré par la dynastie Kosača, le Principat a commencé à centraliser l'armée sous une seule bannière dynastique, l'État s'éloignant des levées féodales fragmentées pour constituer un noyau professionnel d'infanterie lourde et d'arquebusiers mercenaires. Cette consolidation militaire nous permet de défier nos ennemis, transformant le relief escarpé de nos terres en un véritable acteur de pouvoir dans le sud des Alpes dinariques."
 hum_the_ponor_storage_system:0 "Le système de stockage des ponors"
 hum_the_ponor_storage_system_desc:0 "Nous avons maîtrisé les secrets climatiques du système fluvial de la Trebišnjica, le plus long cours d'eau à pertes du monde. En exploitant les températures stables et les galeries supérieures sèches des #italic ponors#! (gouffres) durant l'été, nous avons établi un réseau national de greniers souterrains. Cette « réserve cachée » garantit que nos approvisionnements en grain sont à l'abri de la chaleur écrasante de l'Herzégovine et, surtout, invisibles aux groupes de ravitaillement des armées envahissantes. Tandis que nos ennemis meurent de faim dans des vallées brûlées, nos forces restent bien approvisionnées en puisant dans la fraîcheur naturelle de la terre, ce qui nous permet de maintenir une armée permanente au moral élevé même lors de blocus de plusieurs années."
 hum_the_viticulture_of_the_sunny_scree:0 "La viticulture des vallées ensoleillées"
 hum_the_viticulture_of_the_sunny_scree_desc:0 "Les pentes ensoleillées et riches en calcaire des vallées d'Herzégovine produisent un raisin distinct à forte teneur en sucre, envié dans toute l'Adriatique. En établissant un monopole royal sur l'exportation des vins Žilavka et Blatina, nous créons un commerce de luxe qui contourne la volatilité des marchés céréaliers. Cette « diplomatie liquide » permet à notre cour de maintenir un mode de vie rivalisant avec celui des cités italiennes, utilisant les exportations de vins haut de gamme comme un lubrifiant diplomatique pour obtenir des traités favorables avec la République de Venise et le Royaume de Naples."
 humanism:0 "Humanisme"
 humanism_desc:0 "L'Homme est le plus grand chef-d'œuvre de notre Seigneur, aussi est-il naturel de le placer au centre de la Création. Chaque aspect de la nature humaine doit être préservé et encouragé, de son bien-être à son libre arbitre en passant par son désir d'exploration."
 humanist_tolerance:0 "Tolérance humaniste"
 humanist_tolerance_desc:0 "Chercher à établir une société plus tolérante, et tenter de résoudre nos problèmes sociaux et religieux de manière plus rationnelle, nous permettra de réduire les risques de trouble à l'ordre public."
 hun_bulwark_of_christianity:0 "Rempart de la chrétienté"
 hun_bulwark_of_christianity_desc:0 "Avec les forces turques à l'œuvre au Sud, il est du devoir du royaume de Hongrie de défendre la chrétienté contre la menace turque. Que tout le monde sache que nous ne reculerons pas face à nos obligations."
 hun_castle_warriors:0 "Jobagiones castri : les officiers de château"
 hun_castle_warriors_desc:0 "Les officiers de château, caste d'élite de notre nation, ont pour devoir de fournir un service militaire à leurs #italic ispáns#! locaux dans les quartiers du château royal. Ayant émergé dès les premiers jours du royaume, ces propriétaires fonciers privilégiés occupent une position unique, défendant la nation tout en chérissant leurs droits héréditaires."
 hun_composite_light_cavalry:0 "Cavalerie légère composite"
 hun_composite_light_cavalry_desc:0 "Composée aussi bien d'archers montés que de cavaliers rapides, la cavalerie légère de notre pays est le pilier de notre armée. Elle a prouvé sa valeur lors de la grande bataille de Marchfeld en 1278, et conduira à nouveau nos forces vers la gloire."
 hun_curtailed_peasantry:0 "Réduire les libertés de la paysannerie"
 hun_curtailed_peasantry_desc:0 "La Hongrie n'a pas la chance de posséder des frontières naturelles sur lesquelles s'appuyer. La plaine sauvage par laquelle nos ancêtres sont arrivés était parfaite pour lancer des attaques vers l'ouest, mais pas pour se défendre. Pour défendre la Hongrie, nous aurons donc besoin de ressources. Si nous acceptons d'autoriser nos magnats à réduire plus encore les libertés des paysans, ils s'assureront qu'ils travaillent davantage."
 hun_found_the_black_army:0 "Fondation de l'armée noire"
 hun_found_the_black_army_desc:0 "Inspirée par les écrits de Jules César, la Hongrie doit posséder une armée de soldats professionnels. Ces hommes seront si puissants que nos ennemis les désigneront sous le nom d'armée noire."
 hun_hungarian_hussars:0 "$a_hungarian_hussars$"
 hun_hungarian_hussars_desc:0 "$a_hungarian_hussars_desc$"
 hun_hungarian_reformation:0 "Réforme hongroise"
 hun_hungarian_reformation_desc:0 "$hun_hungarian_reformation_intro$ Trop longtemps notre nation a été menacée par des puissances extérieures. En rejoignant la Réforme et en renonçant à notre devoir de suivre aveuglément les directives du pape, nous pouvons briser au moins l'une des chaînes qui nous entravent."
 hun_hungarian_unity:0 "Unité hongroise"
 hun_hungarian_unity_desc:0 "Bien que notre peuple ait été confronté à de nombreuses menaces extérieures, l'esprit et la volonté des Hongrois restent inébranlables. L'unité hongroise est une grande source d'inspiration pour nos valeureux soldats qui défendront nos territoires jusqu'au dernier homme."
 hun_multi_culturalism:0 "Multiculturalisme"
 hun_multi_culturalism_desc:0 "Les contreforts des Carpates n'abritent pas que des Hongrois. Les Slovaques, les Ruthènes, les Coumans, les Allemands et bien d'autres minorités différentes ont élu domicile dans notre royaume. Il est donc tout à fait naturel que notre gouvernement soit en mesure d'adopter facilement des cultures différentes dans notre État."
 hun_realm_of_many_religions:0 "Royaume aux multiples religions"
 hun_realm_of_many_religions_desc:0 "$hun_hungarian_reformation_intro$ Hélas, la Réforme divise les familles, transforme les anciens amis en ennemis et menace la stabilité même de nombreux États. Pourtant, notre nation n'est pas dupe au point de tomber en proie au combat théologique. Nous sommes un peuple et un royaume aux multiples religions."
 hun_reformed_coinage:0 "Réforme de la monnaie"
 hun_reformed_coinage_desc:0 "Afin de payer notre nouvelle armée professionnelle, il nous faut des rentrées d'argent continues. Réformer la monnaie afin de normaliser les mesures de poids facilitera cela : nous saurons combien chacun doit payer."
 hun_renaissance_knowledge:0 "Un prince de la Renaissance"
 hun_renaissance_knowledge_desc:0 "Les serfs considéraient leur roi comme un souverain juste parce qu'il les protégeait des exigences excessives et d'autres abus de la part des magnats. C'était un vrai prince de la Renaissance, un chef militaire et un gestionnaire couronné de succès, un linguiste exceptionnel et un mécène éclairé."
 hun_revolutionized_military_tactics:0 "Tactiques militaires révolutionnaires"
 hun_revolutionized_military_tactics_desc:0 "Le progrès des technologies militaires conduit inévitablement au développement des tactiques de bataille. Il est impératif pour la survie de notre État que nous restions en phase avec la perpétuelle évolution de la guerre terrestre."
 hun_strengthened_towns:0 "Renforcer les villes"
 hun_strengthened_towns_desc:0 "La Hongrie a besoin de richesses pour croître et prospérer, et les villes sont au centre de ce système. Si nous faisons en sorte que nos villes soient correctement protégées de l'influence des nobles, elles continueront à générer du commerce que nous pourrons taxer."
 hun_the_catholic_shield:0 "Le bouclier catholique"
 hun_the_catholic_shield_desc:0 "$hun_hungarian_reformation_intro$ Pourtant, le cœur des fidèles reste fort. Dieu et ses loyaux serviteurs sauront résister à la folie hérétique."
 hurricane_hardy:0 "Insensible aux tempêtes"
 hurricane_hardy_desc:0 "Robustes et résistantes, les créations de Fiodor Apraxine permettent aux navires d'affronter la plupart des tempêtes que Dame Nature est capable de conjurer. Cette construction innovante contribue grandement à la réalisation de toutes les ambitions maritimes en plein essor."
 hussite_traditions:0 "Traditions $hussite_ADJ$s"
 hussite_traditions_desc:0 "C'est par la lutte et la fraternité que notre foi résistera aux pressions extérieures qui tentent de nous convertir. Nos racines inébranlables, provenant d'enseignements religieux historiques, sonnent juste dans le cœur de tous ceux qui cherchent à protéger leur foi et à vivre en paix aux côtés de leurs concitoyens $christian_ADJ$s."
 hyanyak_system:0 "Système du hyangyak"
 hyanyak_system_desc:0 "Accorder une certaine autonomie aux villages permet la formation d'une conscience commune de leurs habitants, et donc de développer une administration performante. C'est là un point fondamental, étant donné le poids de l'agriculture dans notre économie."
 ibadi_imamate:0 "Imamat $ibadi_ADJ$"
 ibadi_imamate_desc:0 "Contrairement aux concepts du $caliphate$ ou de l'imam $shia_ADJ$ choisi par Dieu, la doctrine $ibadi_ADJ$ n'exige pas un imam régnant sur l'intégralité du monde $muslim_ADJ$. À la place, chaque communauté doit pouvoir être gouvernée indépendamment par son propre imam."
 iberian_caravel:0 "Caravelle ibérique"
 iberian_caravel_desc:0 "La nécessité de disposer de caravelles plus rapides et plus fiables a conduit à la conception de nouvelles nefs, plus grandes, dans les ports ibériques. Si les caravelles sont devenues courantes dans toute l'Europe, les bâtiments ibériques conservent une longueur d'avance en termes d'innovation et de rapidité."
 iberian_galleon:0 "Galion ibérique"
 iberian_galleon_desc:0 "Le $n_iberian_galleon$, version simplifiée du $n_early_iberian_galleon$, est une embarcation d'une incroyable puissance, qui lui confère l'hégémonie sur les océans."
 iconostasis:0 "Iconostase"
 iconostasis_desc:0 "L'$iconostasis$, un mur d'icônes qui sépare l'autel du corps principal de l'édifice, est l'une des principales caractéristiques de l'Église $orthodox_ADJ$. Ces icônes représentent le lien qui unit les fidèles au Saint des saints, et par conséquent le Ciel au peuple, servant de guide afin d'accéder au paradis."
 ilk_descendants_of_genghis_khan:0 "Descendants de $genghis_khan_name_no_tooltip$"
 ilk_descendants_of_genghis_khan_desc:0 "Le sang du $rank_empire_horde_ruler_suffix_male$ coule dans nos veines. Nul ne doit oublier que notre règne fut décrété dans les steppes et affirmé par la conquête. Nos cavaliers restent sans égaux, et si nos bannières portent un nom, elles arborent aussi un droit de naissance."
 ilk_ilkhanate_resurgent:0 "Résurgence de l'$ILK$"
 ilk_ilkhanate_resurgent_desc:0 "Ce qui a été brisé renaît aujourd'hui. Nos bannières flottent à nouveau à travers la Perse, suscitant à la fois respect et effroi. À mesure que la nouvelle de notre puissance se répandra, le monde se souviendra de ce que signifie être gouverné par un véritable $ILKHANATE_LEADER_MALE$."
 ilk_new_roots:0 "Nouvelles racines"
 ilk_new_roots_desc:0 "L'époque de la conquête des steppes est derrière nous. Nous nous sommes installés dans le temps du progrès et de la réforme. De cette terre naîtra un État plus stable et plus sophistiqué. Bien que notre cœur batte encore au rythme des vastes plaines, notre avenir réside dans des institutions durables, non dans des raids éphémères."
 ilk_persian_arts_and_architecture:0 "Arts et architecture persans"
 ilk_persian_arts_and_architecture_desc:0 "Nos ancêtres régnaient par l'épée, mais leur grandeur se mesurait aux palais, aux bibliothèques et aux minarets qu'ils bâtissaient. Suivons leur exemple et finançons non seulement des murs et des routes, mais aussi des mosquées, des jardins et des écoles, en témoignage de la grandeur de l'$ilkhanate$."
 ilk_restore_yam:0 "Réinstituer l'örtöö"
 ilk_restore_yam_desc:0 "L'örtöö, notre ancien système de relais et de messagers, reliait les confins du monde mongol. En restaurant ce vaste réseau à travers la Perse et au-delà, nous nous assurons de la transmission rapide de nos ordres, de la sécurité de nos envoyés et que notre autorité soit aussi réactive qu'à la glorieuse époque des Khans."
 imamate:0 "Imamat"
 imamate_desc:0 "D'après la foi $shia_ADJ$, le prophète Mahomet, que la paix soit sur lui, a explicitement désigné Ali ibn Abi Talib comme son successeur. Ainsi, la figure de l'imam est celle d'un chef spirituel issu de la lignée de Mahomet, que la paix soit sur lui, dont la mission consiste à guider tous les fidèles $muslim_ADJ$s."
 img_claim_to_shogunate:0 "Revendication sur le shogunat"
 img_claim_to_shogunate_desc:0 "Grâce aux liens de sang que nous partageons avec la famille Ashikaga, nous serions en mesure de revendiquer le titre de $JAPANESE_SHOGUNATE_LEADER_MALE$ si la lignée principale venait à s'éteindre. Même si le bakufu paraît assuré pour l'instant, nous devons toutefois nous assurer que personne n'oublie quels droits nous a octroyés notre naissance."
 img_march_to_kyoto:0 "Marche sur $kyoto$"
 img_march_to_kyoto_desc:0 "À une époque où le Japon et $kyoto$ sont plongés dans le chaos politique, n'importe qui peut avoir l'idée de marcher sur la capitale et de prendre le pouvoir. En tant que proches parents des Ashikaga, il est de notre devoir, et de notre droit, d'assurer la stabilité du pays."
 img_supreme_ruler_of_tokaido:0 "Contrôle du Tōkaidō"
 img_supreme_ruler_of_tokaido_desc:0 "Le Tōkaidō est l'axe par lequel se fait l'essentiel des échanges entre le centre et l'est du Japon. Nos territoires s'y sont toujours traditionnellement situés, nous permettant ainsi de contrôler l'économie de toute la région."
 img_unlikely_alliances:0 "Alliances improbables"
 img_unlikely_alliances_desc:0 "Parfois, la meilleure façon de vaincre un ennemi est de le transformer en ami. En consolidant nos positions par des alliances matrimoniales, nous apaiserons nos adversaires, gagnerons de nouveaux alliés et garantirons, à terme, notre domination par les liens du sang."
 imperatorskiy_moskovskiy_universitet:0 "Imperatorskiy Moskovskiy Universitet"
 imperatorskiy_moskovskiy_universitet_desc:0 "L'Université impériale se consacre à l'étude et à l'enseignement de la philosophie, de la médecine et du droit. Elle joue un rôle important dans l'éducation et la recherche en Russie. Sa création remonte aux réformes de l'éducation russe conçues par le polymathe Mikhaïl Lomonossov, qui soulignait l'importance de la recherche scientifique et de l'innovation."
 imperial_ambitions:0 "Ambitions impériales"
 imperial_ambitions_desc:0 "Ce n'est un secret pour personne : les grands empires du passé sont une source d'inspiration pour les épopées et les poèmes, toujours contemplés avec crainte et admiration. Si nous voulons susciter la même réaction à l'égard de notre propre pays, nous devons aspirer à la même grandeur."
 imperial_artillery:0 "Artillerie impériale"
 imperial_artillery_desc:0 "L'évolution rapide de la nature de la guerre nous pousse à moderniser nos troupes et nos tactiques. Pour garder une longueur d'avance sur nos ennemis, nous devons faire en sorte que notre artillerie devienne la fierté de l'armée impériale."
 imperial_creed:0 "Doctrine impériale"
 imperial_creed_desc:0 "L'$orthodox$ a toujours été la religion officielle de l'Empire romain depuis qu'il a adopté le $christian$. Les hérésies de l'Occident et leurs « empereurs » faussement proclamés ne pourront jamais réfuter la légitimité de notre lignée."
 imperial_school_of_naval_engineering:0 "Mühendishane-i Bahr-i Hümâyûn"
 imperial_school_of_naval_engineering_desc:0 "Cette nouvelle école impériale du génie militaire, #italic Mühendishane-i Bahr-i Hümâyûn#!, nous aidera à former des charpentiers et des officiers de marine, ainsi que des marins pour la marine de guerre et la flotte marchande."
 improve_relation_impact_absolutism:0 "Ministère permanent des Affaires étrangères"
 improve_relation_impact_absolutism_desc:0 "La force diplomatique sans cesse croissante de notre pays nous a obligés à créer un ministère permanent des Affaires étrangères pour gérer et coordonner nos nombreux émissaires et orienter leurs efforts."
 improve_relation_impact_renaissance:0 "Cadeaux diplomatiques exotiques"
 improve_relation_impact_renaissance_desc:0 "Depuis les temps anciens, des cadeaux diplomatiques sont offerts aux souverains étrangers afin d'obtenir leurs faveurs en mettant en avant leur statut. Ces présents peuvent prendre de nombreuses formes, des objets de luxe aux animaux vivants tels que les girafes et les éléphants."
 improved_book_binding:0 "Reliure améliorée"
 improved_book_binding_desc:0 "La promotion du savoir et de la pensée doit être soutenue par un approvisionnement régulier d'ouvrages si nous voulons prospérer et cultiver notre peuple."
 improved_foraging:0 "Fourragement amélioré"
 improved_foraging_desc:0 "Par le passé, nous ne pouvions combattre de manière efficace dans les régions qui ne fournissaient pas suffisamment de nourriture. Désormais, nos troupes ont amélioré leur capacité à trouver une plus grande quantité de ces [Concept('food', 'denrées')|e] nécessaires aux armées nombreuses."
 improved_logistics:0 "Logistique améliorée"
 improved_logistics_desc:0 "L'art moderne de la guerre fait aujourd'hui clairement la différence entre les fonctionnaires amateurs qui abordent les questions de tactique et leurs homologues professionnels qui étudient la logistique."
 improved_manuever:0 "Manœuvres améliorées"
 improved_manuever_desc:0 "Tout commandant compétent se doit de bien exploiter ses troupes sur le champ de bataille. Savoir où placer et déplacer les différentes armes nous donnera l'avantage."
 improved_rams:0 "Éperons améliorés"
 improved_rams_desc:0 "Le concept d'éperons remonte à des milliers d'années, mais depuis lors, d'importants progrès ont été réalisés dans le domaine de la métallurgie ; aussi devrions-nous en tirer parti pour créer des éperons plus robustes."
 improved_shipyards:0 "Chantiers navals améliorés"
 improved_shipyards_desc:0 "Défendre nos intérêts autour du monde requiert une [navy|e] puissante. Nous devons nous assurer que nos chantiers navals produisent des navires aussi rapidement que possible afin de remplacer toute perte que nous aurions à subir."
 improved_supply_lines:0 "Lignes de ravitaillement améliorées"
 improved_supply_lines_desc:0 "Les guerres contemporaines exigent de plus en plus de ressources pour nos armées, surtout depuis le développement du tir de salve et l'utilisation généralisée de l'artillerie sur le champ de bataille."
 impulse_warfare:0 "Actions coordonnées"
 impulse_warfare_desc:0 "L'introduction de l'infanterie légère entraîna une évolution dans l'art de la guerre : les tirailleurs étaient déployés en ordre dispersé à l'avant pour distraire et désorienter l'ennemi avant l'attaque principale de l'infanterie, laquelle s'effectuait le plus souvent en ligne ou en colonne."
 inc_tambo:0 "Relais tambos améliorés"
 inc_tambo_desc:0 "Notre empire repose en grande partie sur son réseau routier. L'armée et l'administration profitent allègrement des relais, les tambos, répartis le long des routes principales : situés à une journée de marche les uns des autres, ils offrent abri et provisions aux voyageurs."
 inc_vertical_economy:0 "L'économie verticale"
 inc_vertical_economy_desc:0 "Aucun autre empire n'est aussi bien adapté aux hauteurs des Andes que le nôtre. En maintenant des communautés et des entrepôts à chaque altitude, des vallées les plus basses aux plus hauts plateaux, nous avons maîtrisé l'art de déplacer hommes et marchandises à travers les terrains les plus difficiles, là où d'autres États échoueraient. Grâce à nos caravanes de lamas, à nos routes taillées dans les falaises abruptes et à nos communautés d'altitude, les Andes ne sont plus un obstacle mais notre propre voie de communication."
 incamisana_advance:0 "$incamisana$"
 incamisana_advance_desc:0 "$incamisana_desc$"
 incense_burning:0 "Fumigation d'encens"
 incense_burning_desc:0 "La fumigation d'encens est une pratique incontournable liée aux rituels et offrandes $buddhist_ADJ$s. Elle prend toutes sortes de formes, et il est courant pour les personnes profanes comme pour les moines et nonnes d'allumer de l'encens avant de méditer ou d'accomplir un rituel. C'est la raison pour laquelle tout temple $buddhist_ADJ$ est constamment imprégné d'une odeur d'encens."
 incense_preeminence:0 "Prééminence de l'encens"
 incense_preeminence_desc:0 "L'encens est une ressource incontournable en $asia$ depuis des siècles, plus encore que partout ailleurs dans le monde. Bien que certaines religions s'en servent également pour leurs rituels, la quasi-omniprésence de l'encens dans les cérémonies $hindu_ADJ$es et $buddhist_ADJ$s, ainsi que dans la vie quotidienne des pratiquants de l'$muslim$, en fait un produit de premier plan en $asia$."
 incense_trade_route:0 "Route de l'encens"
 incense_trade_route_desc:0 "La forte demande d'encens en $asia$ et au-delà requiert l'établissement de nombreuses routes commerciales dédiées. Tout comme pour la célèbre $silk_road$, le commerce de l'encens relie l'Orient à l'Occident."
 increase_control_area_advance:0 "Augmenter le contrôle à grande échelle"
 increase_control_area_advance_desc:0 "Au fur et à mesure que notre puissant pays se développe, nous devons maîtriser notre population."
 indelningsverket:0 "Indelningsverket : le système des tenures"
 indelningsverket_desc:0 "Le système de tenures suédois correspond à des groupes de dix paysans, à des fins de recrutement. Cela permet de faciliter grandement la levée et l'organisation des unités militaires."
 independence_from_mali:0 "Indépendance vis-à-vis du Mali"
 independence_from_mali_desc:0 "Pendant de trop nombreuses années, nous avons été sous le joug du sultanat du Mali. Mais tandis que sa puissance ne faisait que décliner, la nôtre se renforçait. Nous pouvons maintenant déclarer notre pleine indépendance et tout faire pour la conserver."
 independent_leaders:0 "Dirigeants indépendants"
 independent_leaders_desc:0 "En raison du caractère isolé du $miaphysite$, il a parfois été difficile de communiquer avec d'autres patriarcats. Nos dirigeants ont donc appris à agir de manière indépendante, tout en disposant de leurs propres moyens pour maintenir le contact avec le reste du monde $christian_ADJ$ autant que possible."
 index_librorum_prohibitorum:0 "Index des livres interdits"
 index_librorum_prohibitorum_desc:0 "Les idées dangereuses de la Réforme ne pourront pas se propager dans l'esprit de nos vassaux si ceux-ci n'ont pas accès aux ouvrages encourageant ces pensées ridicules."
 indian_networks:0 "Réseaux d'Inde"
 indian_networks_desc:0 "Nos marchands commercent des produits issus d'Alexandrie jusqu'aux côtes d'Aden et de l'Inde elle-même. Nos réseaux de contacts, d'affaires et d'argent nous ont placés au sommet du commerce maritime."
 indian_sea_trade:0 "Commerce dans l'océan Indien"
 indian_sea_trade_desc:0 "Les marchands $muslim_ADJ$s ont sillonné les eaux de l'$indian_ocean_region$ des générations durant, parcourant chaque fois de plus vastes distances en quête de produits lucratifs. Des côtes orientales de l'$africa$ à l'$india$ en passant par les îles aux épices de l'$indonesia_region$, les eaux regorgent de navires $muslim_ADJ$s."
 indirect_rule:0 "Gouvernance indirecte"
 indirect_rule_desc:0 "Parfois, la meilleure façon de faire obéir le peuple est de le laisser croire qu'il fait ses propres choix. Un tel système de gouvernance indirecte permet de réduire les agitations dans les provinces nouvellement acquises."
 indonesia_archipelago_of_many_faiths:0 "Terre de nombreux peuples"
 indonesia_archipelago_of_many_faiths_desc:0 "Nos îles abritent de nombreux peuples, parlant des langues variées et croyant en des dieux différents. C'est par la compréhension commune et la tolérance que nous pourrons assurer la prospérité de notre pays."
 indonesia_naval_supremacy:0 "Prouesses navales"
 indonesia_naval_supremacy_desc:0 "Notre pertinence politique au sein de l'archipel repose presque entièrement sur la puissance de notre flotte. En améliorant la formation de nos marins et la qualité de nos navires, nous assurerons notre domination sur les États mineurs d'Indonésie."
 indonesia_outer_islands_archipelago:0 "Archipel indonésien"
 indonesia_outer_islands_archipelago_desc:0 "Les relations maritimes jouent naturellement un rôle important dans notre société, puisque nous sommes entourés d'eau. Notre dépendance au commerce et au transport maritime fait de nous d'excellents navigateurs."
 indonesia_trading_hub_of_the_east:0 "Carrefour commercial de l'Est"
 indonesia_trading_hub_of_the_east_desc:0 "D'où qu'ils viennent et où qu'ils aillent, tous les marchands d'Asie finissent par traverser notre territoire en apportant avec eux des biens précieux et des récits de leurs voyages."
 industrialization_advance:0 "Industrialisation"
 industrialization_advance_desc:0 "L'essor de la Révolution industrielle entraîne des changements durables sur la scène internationale, non seulement dans le commerce et les affaires, mais aussi dans le tissu social lui-même. Des inventions telles que le métier à tisser et la machine à vapeur porteront les capacités de l'humanité à leur apogée."
 infiltrate_administration_advance:0 "Infiltrer l'administration"
 infiltrate_administration_advance_desc:0 "La guerre avec les autres États ne se déroule pas seulement sur le champ de bataille, mais aussi dans l'ombre. Connaître les intentions de l'ennemi est un atout inestimable pour gagner une guerre. C'est pourquoi nos espions se spécialiseront dans l'infiltration de l'administration d'un État et nous transmettront tout type d'information."
 infiltration_tactics:0 "Tactiques d'infiltration"
 infiltration_tactics_desc:0 "Bien que l'ancien ordre $shia_ADJ$ du $nizari_school$ ait largement été romancé, l'efficacité des tactiques de ruse et d'assassinat de ses Ḥashshāshīyīn demeure incontestable. En employant nous-mêmes ces tactiques d'infiltration, nous pourrions jouir du même succès."
 influence:0 "Pression diplomatique"
 influence_desc:0 "Mettre fin à une guerre nécessite des négociations entre les deux parties, et il arrive que la partie adverse se montre trop têtue pour accepter la défaite. Dans ce cas, la pression diplomatique et le rappel de l'imminence de leur anéantissement les motiveront assez pour qu'ils acceptent nos conditions généreuses."
 influence_of_the_burgundian_towns:0 "Influence des villes bourguignonnes"
 influence_of_the_burgundian_towns_desc:0 "Les États généraux traditionnels favorisent le clergé et la noblesse, mais l'opulence et l'importance politique croissantes des villes ne peuvent plus être ignorées. En affinant leur structure pour refléter la force grandissante de la bourgeoisie, nous nous assurons d'un gouvernement plus équilibré tout en préservant les privilèges des autres. Une voix des villes plus forte renforcera également nos capacités administratives et accélérera le rythme de notre urbanisation."
 influx_of_english_nobles:0 "Administrateurs anglais"
 influx_of_english_nobles_desc:0 "Nous avons instauré la paix avec notre voisin du sud, ce qui a entraîné un afflux constant de nobles anglais dans notre administration. Grâce à cela, nous pouvons exercer un contrôle plus efficace sur notre pays."
 inigo_architecture:0 "Inigo, l'architecte"
 inigo_architecture_desc:0 "Les travaux d'Inigo Jones devraient avoir un impact significatif sur les futures générations d'architectes. Sa pratique de l'architecture classique et la priorité qu'il accorde aux proportions et à l'harmonie laisseront certainement une trace durable dans l'architecture britannique. Ses contributions sont considérées comme essentielles pour le mouvement néoclassique en Angleterre."
 innovativeness:0 "Soif de connaissances"
 innovativeness_desc:0 "La curiosité naturelle, le désir de connaître le monde et son fonctionnement, nous poussent à aller de l'avant. Nos concitoyens veulent savoir, et c'est cette étincelle dans leur esprit qui déclenchera le progrès pour notre nation."
 inquisition_advance:0 "Inquisition"
 inquisition_advance_desc:0 "Alors que l'Inquisition a été créée au XIIe siècle comme un moyen de combattre l'hérésie cathare, son influence s'est considérablement étendue à la fin du Moyen Âge, jusqu'à devenir l'outil principal de l'Église catholique pour contrer la propagation des doctrines dissidentes."
 inspired_builders:0 "Bâtisseurs inspirés"
 inspired_builders_desc:0 "Le principal devoir de notre Ordre est de combattre, mais grâce au Seigneur, nos luttes ne sont pas seulement martiales. Notre peuple a besoin de commodités ainsi que de protection contre d'éventuelles attaques futures. C'est pourquoi, depuis des siècles, nous avons développé une capacité admirable à ériger rapidement des bâtiments et des ouvrages défensifs. Nous l'utiliserons non seulement pour faire de notre capitale une forteresse impénétrable, mais aussi un centre culturel."
 institutional_reorganization:0 "Réorganisation institutionnelle"
 institutional_reorganization_desc:0 "L'abolition du Conseil collatéral et la création de la Real Camera di Santa Chiara permettent d'appliquer des réformes légales importantes dans le royaume de Naples. Des projets en cours vont tenter de réorganiser le complexe législatif, de consolider le Codice Carolino et de mettre en place le Catasto onciario pour les réformes fiscales."
 insurance_companies:0 "Compagnies d'assurance"
 insurance_companies_desc:0 "Le développement des assurances permet de réduire les risques : avoir la possibilité de compenser les risques encourus par le paiement d'une maigre redevance à un assureur favorisera une croissance des échanges commerciaux."
 integrate_area_advance:0 "Intégration améliorée"
 integrate_area_advance_desc:0 "Notre administration s'améliore et, de ce fait, nous pouvons nous permettre de disposer de la main-d'œuvre nécessaire pour intégrer en une seule fois de plus grandes portions de territoire dans le pays."
 integrated_elites:0 "Intégration des élites"
 integrated_elites_desc:0 "Impliquer les élites de nos dépendances au sein de l'administration nous permet d'accélérer de façon significative l'intégration de leurs territoires."
 intelligence_agency_advance:0 "$intelligence_agency$"
 intelligence_agency_advance_desc:0 "$intelligence_agency_desc$"
 interaction_between_church_and_state:0 "Interactions entre l'Église et l'État"
 interaction_between_church_and_state_desc:0 "Les patriarcats disposent d'une autorité absolue sur leur propre patriarcat et leur peuple. En associant leur autorité à celle du dirigeant, nous pourrons tirer parti des ressources de l'Église afin de renforcer l'autorité de l'État."
 intercontinental_trade:0 "Commerce lointain"
 intercontinental_trade_desc:0 "Nos marchands rapportent souvent des produits fascinants des cours de pays lointains. Nous devrions peut-être essayer d'élargir davantage encore notre rayon d'action."
 internal_communion:0 "Communion interne"
 internal_communion_desc:0 "Bien qu'ayant des patriarches indépendants, toutes les branches du $miaphysite$ partagent une communion interne. Cela leur permet d'entretenir des relations étroites les unes avec les autres et d'assurer l'unité de l'Église."
 international_influences:0 "Influences étrangères"
 international_influences_desc:0 "De nombreux marchands et voyageurs étrangers fréquentent nos routes, amenant avec eux prospérité et richesse. Nous pourrions convaincre certains d'entre eux de s'installer définitivement dans nos cités si nous les assurions de la protection de leur foi."
 international_nobility:0 "Noblesse internationale"
 international_nobility_desc:0 "Les relations internationales constituent un exercice complexe. Certains prétendent que les marchands, habitués à traiter avec les étrangers, sont les meilleurs dans ce domaine ; mais ceux-là ne tiennent pas compte des liens que les familles de notre noblesse ont tissés depuis des années. Il nous faut en tirer parti pour aider à faire avancer notre cause par la diplomatie."
 involved_laity:0 "Laïcat impliqué"
 involved_laity_desc:0 "Grâce à l'implication croissante du laïcat dans l'administration quotidienne de l'Église, notre peuple a pu établir une relation plus personnelle avec la foi."
 ira_afsharid_navy:0 "Défense des côtes du golfe Persique"
 ira_afsharid_navy_desc:0 "Bien que notre territoire soit principalement situé dans les montagnes et les hauts plateaux des monts Zagros, l'État perse n'est pas dépourvu de possessions côtières. Si les dynasties passées n'ont guère prêté attention à la défense maritime de l'empire, nous n'oublions pas la mer et nos marins sont impatients de défendre nos côtes."
 ira_encouraged_art:0 "Encouragement des arts"
 ira_encouraged_art_desc:0 "Les arts de la Perse sont très prisés. Des collectionneurs d'art venus de partout viennent acheter certaines de nos plus belles créations artistiques. Nous devrions soutenir ce commerce et les artistes en herbe."
 ira_improved_silk_road:0 "Améliorations de la Route de la soie"
 ira_improved_silk_road_desc:0 "Une amélioration du réseau des routes et des ponts ; des gardes pour protéger les différents itinéraires contre une taxe légère ; un réseau de caravansérails pour que les marchands puissent s'y reposer. C'est tout ce qu'il faut pour aider les marchands qui parcourent la Route de la soie afin qu'ils augmentent les revenus de l'État."
 ira_islamized_persia:0 "Islam perse"
 ira_islamized_persia_desc:0 "L'islamisation de la Perse est un processus de longue haleine, qui n'est pas encore totalement achevé, mais qui reste l'un des principaux piliers de son identité. Nos anciennes traditions se sont mêlées aux enseignements de l'islam et constituent aujourd'hui nos valeurs fondamentales."
 ira_jazayerchi:0 "Corps d'infanterie $a_jazayerchi$"
 ira_jazayerchi_desc:0 "$a_jazayerchi_desc$"
 ira_nazir:0 "Nāẓirs"
 ira_nazir_desc:0 "Les nāẓirs, ou surveillants, administrent nos territoires et représentent les yeux et les oreilles des Šâhanšâh. Toutes les actions de la cour sont supervisées par les nāẓirs, qui ont la responsabilité des promotions à la cour. Même le grand vizir doit travailler en association avec les nāẓirs."
 ira_persian_horses:0 "Chevaux persans"
 ira_persian_horses_desc:0 "Les chevaux jouent un rôle fondamental dans notre société. Nos concitoyens grandissent aux côtés de leurs montures, ce qui se reflète dans les soins apportés par les éleveurs de chevaux comme dans l'excellence de notre cavalerie."
 ira_persian_plateau:0 "Le plateau iranien"
 ira_persian_plateau_desc:0 "Le grand plateau au cœur de notre royaume n'est pas une faiblesse, mais bien une force. Berceau de grands empires, notre peuple a, pendant d'innombrables générations, traversé ses vastes plaines ainsi que les chaînes montagneuses escarpées qui l'entourent, comme le Zagros ou l'Alborz. Ce même relief qui épuise les armées étrangères est celui où prospèrent nos soldats, nos marchands et nos administrateurs. Nous tirerons parti de cette familiarité pour parcourir nos terres et les gouverner avec une aisance qu'aucun étranger ne peut égaler."
 ira_persian_rug_production:0 "Production de tapis persans"
 ira_persian_rug_production_desc:0 "La Perse a pendant longtemps été réputée pour sa production de tapis. Cependant, les invasions mongoles ont causé d'énormes destructions. Pour s'en remettre, elle doit aussi retrouver sa vigueur économique. Il est temps de relancer ce qui faisait jadis notre force."
 ira_promotion_of_irrigation:0 "Promotion de l'irrigation"
 ira_promotion_of_irrigation_desc:0 "À la suite de l'invasion mongole, la Perse se trouve dépeuplée. La promotion de l'irrigation devrait permettre d'améliorer l'agriculture nécessaire au soutien d'un nouvel élan démographique et de se remettre des pertes subies dans le passé."
 ira_religious_state:0 "Théocratie"
 ira_religious_state_desc:0 "Quelle que soit la foi de notre État, la Perse sera toujours un pays religieux. Chaque aspect de notre vie est guidé par des principes religieux, et l'État lui-même donne l'exemple de la moralité et de la justice de nos croyances fondamentales."
 ira_religious_unity_policy:0 "Politique d'unité religieuse"
 ira_religious_unity_policy_desc:0 "L'époque des grands clivages religieux est révolue. Dans cette ère moderne, l'islam ne peut plus se permettre de poursuivre des querelles intestines. Nous devons prôner une politique d'unité religieuse interne et externe, et faire la paix avec ce que nous considérions comme des hérésies."
 ira_restoration_of_cities:0 "Restauration des cités"
 ira_restoration_of_cities_desc:0 "L'invasion de la Perse par les Mongols entre 1219 et 1221 a été une catastrophe pour la région. Des cités d'une taille impressionnante ont été réduites en ruines. Il est temps de reconstruire ce qui a été détruit et de restaurer les impressionnantes métropoles de la Perse."
 ira_safaviyya_order_hall:0 "$safaviyya_order_hall$"
 ira_safaviyya_order_hall_desc:0 "$safaviyya_order_hall_desc$"
 ira_sasanian_heritage:0 "Héritage sassanide"
 ira_sasanian_heritage_desc:0 "Avant la conquête de la $persia_region$ par les musulmans, la région abritait l'empire sassanide, un royaume qui s'étendait du Caucase à l'ouest jusqu'à la chaîne du Kirthar à l'est. Nombre de ses grandes réalisations culturelles ont façonné l'identité artistique et culturelle de la Perse."
 ira_shahnameh:0 "$shahnameh$"
 ira_shahnameh_desc:0 "Le #italic $shahnameh$#!, le Livre des Rois, est un poème épique et une épopée nationale du peuple $farsi_culture$. Décrivant le passé historique et mythique des empires qui se sont succédé dans la Grande $persia_region$, il contribue à la culture $farsi_culture$ d'innombrables manières."
 ira_spread_of_persian_influence:0 "Influence persane"
 ira_spread_of_persian_influence_desc:0 "Le persan est une langue ancienne, à l'histoire plus longue que celles de plusieurs empires bout à bout. Même la conquête musulmane n'a pu entamer les fondements de l'identité persane, et de nombreux autres États tentent d'imiter notre culture."
 ira_the_ghilman:0 "$a_ghilman$"
 ira_the_ghilman_desc:0 "Les $a_ghilman$ sont des esclaves-soldats d'origine caucasienne. Le plus souvent d'anciens chrétiens, ils subissent un entraînement militaire strict et sont formés à l'usage des armes à feu, ce qui fait d'eux des éléments essentiels de l'armée, en plus de permettre de contrebalancer les unités influentes de nos armées."
 ira_the_qizilbash:0 "$qizilbash$"
 ira_the_qizilbash_desc:0 "Les #italic $qizilbash$#!, ou « têtes-rouges », appartiennent à un mouvement militaire chiite fondé par les Ṣafawiyya, résolus à mourir pour leurs convictions religieuses de par leurs liens profonds avec le soufisme. Ils sont prêts à soutenir notre pays et pourraient bien constituer le cœur de notre armée."
 ira_the_qurchi:0 "Les Qurchi"
 ira_the_qurchi_desc:0 "Si les $qizilbash$ constituent l'épine dorsale de l'armée perse, les #italic Qurchi#! sont les gardes du corps royaux recrutés parmi les $qizilbash$. Au lieu de recevoir des terres, ces soldats sont payés par le trésor royal."
 ira_the_tofangchi:0 "$a_tofangchi$"
 ira_the_tofangchi_desc:0 "Les $a_tofangchi$ sont les mousquetaires de l'empire. Bien que les armes à feu soient déjà connues, leur emploi est peu répandu, car de nombreux militaires perses privilégient l'arc, leur arme traditionnelle. Les régiments de $a_tofangchi$ ont pour objectif de changer ces habitudes, car ils sont formés à l'utilisation des armes modernes."
 ira_the_tupchi:0 "$a_tupchi$"
 ira_the_tupchi_desc:0 "$a_tupchi_desc$"
 ire_grand_jury_system:0 "Système des grands jurys"
 ire_grand_jury_system_desc:0 "Les grands jurys comtaux lèvent les taxes pour les routes, les ponts et les palais de justice. Les juges en tournée d'assises renforcent le contrôle de la loi dans chaque comté."
 ire_irish_establishment:0 "Établissement en Irlande"
 ire_irish_establishment_desc:0 "Une armée permanente en Irlande, dirigée depuis l'Irlande, maintient les garnisons en état de préparation tout en maîtrisant les coûts. Pour nos soldats, cela signifie une solde régulière. Pour nos logisticiens et intendants, cela implique un réseau croissant de casernes qui optimise les dépenses."
 ire_irish_volunteers:0 "Volontaires irlandais"
 ire_irish_volunteers_desc:0 "Des unités de citoyens se lèvent pour la défense locale et la surveillance des côtes. S'entraînant à leurs frais, ils élèvent l'esprit du peuple et renforcent nos lignes."
 irish_booleying_advance:0 "Transhumance du bétail"
 irish_booleying_advance_desc:0 "En Irlande, l'élevage de vaches est un mode de vie. Véritable source de nourriture, ces nobles bovins sont également un symbole de richesse. Grâce à la transhumance, un système qui consiste à déplacer nos troupeaux d'un pâturage éloigné à un autre, nous pouvons accroître cette richesse."
 irish_frontier_settlement_advance:0 "Colonies frontalières irlandaises"
 irish_frontier_settlement_advance_desc:0 "Les terres que nous avons confisquées aux Irlandais sont propices à l'exploitation, et les habitants de bonne volonté émigrent de contrées lointaines pour s'installer sur ces terres agricoles bon marché."
 irish_monastacism_advance:0 "Monachisme insulaire"
 irish_monastacism_advance_desc:0 "Bien que nous ayons aujourd'hui, en substance, adopté les pratiques catholiques romaines, la vie religieuse sur ces îles est encore fortement influencée par le clergé laïc."
 irish_travelling_bards_advance:0 "Bardes itinérants"
 irish_travelling_bards_advance_desc:0 "Les poètes classiques formés à la cour parcourent nos terres à la recherche d'un seigneur susceptible de les engager."
 iron_foundry_advance:0 "Fonderie de fer"
 iron_foundry_advance_desc:0 "$iron_foundry_desc$"
 iron_mill_advance:0 "$iron_mill$"
 iron_mill_advance_desc:0 "$iron_mill_desc$"
 iron_tooth:0 "Dent de Fer"
 iron_tooth_desc:0 "Le renforcement du contrôle de notre cour sur les terres du margraviat vaudra à notre dirigeant le surnom de #italic Dent de Fer#!, comme si nous le mordions tel un chien d'attaque. Notre règne laissera une marque sur notre nation, qui instillera un sentiment de fierté et de loyauté même chez le plus humble paysan du Brandebourg."
 iron_working:0 "iron_working"
 iron_working_desc:0 ""
 ishvara:0 "Ishvara"
 ishvara_desc:0 "Interprété différemment en fonction de l'école ou de la branche de l'$hindu$, $ishvara$ fait référence à Dieu ou à l'Être suprême. Ce terme peut donc désigner $shiva_god$ dans le $shaivism$, $vishnu_god$ dans le $vaishnavism$, ou n'importe quel dieu personnel d'un individu."
 isk_minister_of_samurai_dokoro:0 "Ministre du samurai-dokoro"
 isk_minister_of_samurai_dokoro_desc:0 "Nous figurons parmi les quatre clans puissants traditionnellement nommés pour diriger l'armée et la police au samurai-dokoro. Il est donc de notre responsabilité et de notre privilège de préserver la paix au sein de la capitale et dans les autres régions importantes."
 isk_sanindo_gate:0 "Porte du $sanindou_area$"
 isk_sanindo_gate_desc:0 "La province de $tango_province$ est la porte de $kyoto$ dans le $sanindou_area$ et revêt une immense importance économique. En y établissant fermement notre présence et en nous y développant, nous pourrions tirer parti de cette prospérité."
 islamic_calligraphy:0 "Calligraphie islamique"
 islamic_calligraphy_desc:0 "L'$muslim$ n'est pas seulement une religion de paix, mais aussi d'art. La calligraphie des versets du $common_string_quran$ et des noms des prophètes oscillent souvent entre art et écriture."
 islamic_courts:0 "Cours islamiques"
 islamic_courts_desc:0 "Les cours royales des pays $muslim_ADJ$s ont toujours été parmi les plus admirées au monde. Louées pour leur culture raffinée et leurs produits exotiques, nos cours et leur grandeur ont donné naissance à des récits circulant aux quatre coins du globe, et notre peuple est fier d'en faire partie."
 islamic_golden_age:0 "Âge d'or de l'islam"
 islamic_golden_age_desc:0 "Même si l'époque culturellement glorieuse de l'$muslim$ est déjà derrière nous, l'impact qu'a eu l'$islamic_golden_age$ non seulement sur les pays $muslim_ADJ$s, mais aussi sur le reste du monde, est indéniable. Certains de ces pays infidèles, bloqués dans une ère d'ignorance, commencent d'ailleurs tout juste à découvrir notre grandeur en matière d'art et de science."
 islamic_prayer:0 "Salat"
 islamic_prayer_desc:0 "L'un des cinq piliers de l'$muslim$, l'Aṣ-Ṣalāh est l'obligation pour les fidèles $muslim_ADJ$s d'accomplir leurs prières quotidiennes. Bien que le nombre de prières et leurs mouvements précis puissent varier d'une école à l'autre, cet acte demeure une constante au sein de l'$muslim$."
 islamic_schoolars:0 "Écoles islamiques"
 islamic_schoolars_desc:0 "L'$muslim$ a toujours encouragé la pensée et l'étude de ses écrits, au point où ont émergé différentes écoles de pensée ayant pour mission de les interpréter. Nos spécialistes du $common_string_quran$ et des autres textes sacrés sont ainsi devenus des êtres très savants, capables de tenir les plus profonds des débats."
 isolated_reaches:0 "Confins isolés"
 isolated_reaches_desc:0 "Le $miaphysite$ a pu gagner des endroits très éloignés. Même entourée d'ennemis et d'infidèles, notre foi a résisté."
 ita_attractive_migration:0 "Paysage attrayant"
 ita_attractive_migration_desc:0 "La terre fertile et tempérée de notre péninsule est un lieu très prisé par les habitants des pays voisins qui viennent y chercher fortune. Bon nombre de nos villes dépendent déjà de la main-d'œuvre saisonnière, c'est pourquoi nous devrions redoubler d'efforts pour aider ces peuples à s'installer définitivement sur notre territoire."
 ita_birthplace_of_the_renaissance:0 "Prolongement de la Renaissance"
 ita_birthplace_of_the_renaissance_desc:0 "L'$italy_region$ a connu un afflux important de brillants esprits. Qu'il s'agisse d'artistes itinérants venus ici pour faire fortune ou de nos propres concitoyens inspirés par cette grande renaissance des arts, nos villes semblent regorger d'intellectuels talentueux. En poursuivant nos parrainages, notre culture continuera sans conteste à attirer des personnes au talent exceptionnel."
 ita_connect_the_interior:0 "Relier les terres"
 ita_connect_the_interior_desc:0 "Si le relief de nos terres favorise les transports rapides et les déplacements le long du littoral, l'intérieur de la péninsule italienne est beaucoup plus difficile à traverser à de nombreux endroits. Relier non seulement les localités de l'intérieur, mais également les côtes entre elles, facilitera les opérations commerciales et améliorera la maniabilité de nos troupes."
 ita_enduring_hardship:0 "Épreuves de la guerre"
 ita_enduring_hardship_desc:0 "Les intérêts étrangers en $italy_region$ ont moult fois transformé nos terres en champs de bataille sur lesquels combattent les pays plus puissants. Assurer la pérennité de notre peuple en ces temps difficiles est une tâche ardue. La création de lieux sûrs pour abriter notre population pendant les conflits garantira son soutien, même pendant les guerres les plus terribles."
 ita_flourishing_urban_centers:0 "Cités florissantes"
 ita_flourishing_urban_centers_desc:0 "Nos terres ont la chance de compter de nombreuses contrées fortement urbanisées. Cela nous offre non seulement d'innombrables opportunités pour fabriquer des biens, mais leurs liaisons commerciales nous permettent également d'expédier ces marchandises vers les marchés étrangers pour en tirer pleinement profit. Éliminer tout obstacle à l'expansion de ces industries garantira leur succès continu."
 ita_increased_recruitment:0 "Possession prisée"
 ita_increased_recruitment_desc:0 "L'$italy_region$ est une possession convoitée par de nombreux dirigeants étrangers. Si nous voulons défendre notre pays, nous avons le devoir d'intensifier le recrutement pour nos forces terrestres et navales. L'$italy_region$ étant vulnérable aux invasions tant par les cols alpins que par son vaste littoral, nous devons veiller à ce que l'armée et la marine soient bien préparées à faire face à tout conquérant cherchant à perturber la paix de la péninsule."
 ita_influence_over_the_clergy:0 "Clergé influent"
 ita_influence_over_the_clergy_desc:0 "De par sa proximité avec la $papacy_reform$, l'$italy_region$ perpétue une longue tradition de clergé puissant et talentueux au service de la foi. Quelle que soit l'orientation que prendront nos affaires religieuses, nous devons entretenir de bonnes relations avec nos ecclésiastiques."
 italian_condottieri:0 "Grands capitaines condottieres"
 italian_condottieri_desc:0 "Nos terres sont réputées pour leurs esprits militaires brillants, capables de diriger de glorieuses armées, aussi bien dans leur propre intérêt et dans celui du plus offrant. Nous devons nous assurer que ces hommes soient toujours prêts à nous servir avant tout."
 italian_galleass:0 "$n_italian_galleass$"
 italian_galleass_desc:0 "$n_italian_galleass_desc$"
 italian_innovativeness:0 "Adaptation italienne"
 italian_innovativeness_desc:0 "La Renaissance a montré à quel point les humains peuvent progresser quand des idées nouvelles fleurissent sur nos terres. Pour continuer à avancer, il ne s'agit pas de rejeter ces innovations, mais de les accueillir, de les transformer et d'en faire une force uniquement nôtre."
 italian_universities:0 "Universités de la péninsule"
 italian_universities_desc:0 "L'Italie compte de grandes universités et d'éminents savants. C'est en soutenant ces grandes institutions que nous pourrons maintenir la flamme de la Renaissance."
 italy_great_families:0 "Grandes familles d'Italie"
 italy_great_families_desc:0 "Après la fondation d'un État italien unifié, nous avons intégré de nombreuses grandes familles nobles. Nous devons utiliser leur prestige et leur réputation pour rehausser la nôtre, tout en occupant ces personnalités capables."
 ito_gokenin_family:0 "Famille de gokenin"
 ito_gokenin_family_desc:0 "Nos ancêtres ont aidé Minamoto no Yoritomo lors de la fondation du shogunat de Kamakura. En récompense, nous avons été faits ses gokenin et avons reçu comme fief la province de $hyuuga_province$. C'est là un honneur dont peuvent se vanter bien peu de familles de Kyūshū."
 ito_sympathy_to_foreign_faiths:0 "Sympathie pour les nouvelles fois"
 ito_sympathy_to_foreign_faiths_desc:0 "Les étrangers affluent sur nos terres et apportent avec eux d'autres croyances. Nous devons bien évidemment nous assurer qu'elles ne constituent pas un danger pour les religions traditionnelles, mais dès lors que cela sera établi, il n'y aura aucune raison d'interdire au peuple de choisir lui-même sa croyance."
 janissaries_advance:0 "Janissaires"
 janissaries_advance_desc:0 "Élites de nos armées, les janissaires sont formés depuis l'enfance et forgés par la discipline."
 jap_ancestral_legacy:0 "Héritage ancestral"
 jap_ancestral_legacy_desc:0 "La lignée ancestrale de notre clan est bien connue, un pilier que nous devons défendre et maintenir. C'est notre histoire passée qui nous définit et qui garantit notre droit à gouverner."
 jap_ashigaru:0 "Ashigaru"
 jap_ashigaru_desc:0 "La guerre a toujours été l'art de prédilection des puissants samouraïs. Toutefois, les récentes avancées dans ce domaine ont prouvé qu'il était nécessaire de former d'autres troupes incluant également une force paysanne. Ces ashigaru ne sont néanmoins pas à confondre avec de la simple chair à canon, car leur formation et leur expérience sur le champ de bataille en font de redoutables combattants capables de rivaliser avec les samouraïs."
 jap_bushido:0 "Bushidō"
 jap_bushido_desc:0 "Bien qu'elle n'ait jamais été codifiée, la voie du guerrier est pourtant claire : chacun a le devoir de combattre, de vaincre et d'étendre la gloire de son clan, quelles que soient les méthodes employées."
 jap_codified_bushido:0 "Bushidō codifié"
 jap_codified_bushido_desc:0 "Les valeurs telles que l'honneur et la loyauté prenant le pas sur leur utilité en combat réel, le comportement attendu d'un guerrier devient de plus en plus idolâtré. Cette version romancée et codifiée du bushidō améliorera très certainement l'image de nos armées, même si elle diffère de leur comportement réel."
 jap_daiku_construction:0 "Daiku"
 jap_daiku_construction_desc:0 "La construction de bâtiments au moyen de techniques traditionnelles de charpenterie, ou #italic daiku#!, existe au $japan_region$ depuis sa création. Nos édifices en bois sont solides mais flexibles, et admirés de tous. De la hutte la plus ordinaire au plus haut palais, le bois est toujours présent dans nos constructions."
 jap_head_hunting:0 "Collectionneurs de têtes"
 jap_head_hunting_desc:0 "Les exploits d'un guerrier au combat ne peuvent être vraiment glorieux que s'ils sont prouvés. À cet effet, les samouraïs vont ramasser les têtes décapitées des ennemis qu'ils ont tués pour les présenter plus tard au général. Plus les têtes qu'un samouraï ramène sont nombreuses et importantes, meilleures seront ses récompenses."
 jap_ichiban_yari:0 "Ichiban yari"
 jap_ichiban_yari_desc:0 "Être le premier à blesser un ennemi est un immense honneur, aussi nos guerriers sont-ils désireux de devenir cette « première lance » afin de briser la force de l'adversaire lorsque l'occasion se présente."
 jap_jokamachi:0 "Jôkamachi"
 jap_jokamachi_desc:0 "Les temps de troubles présentent un grave danger pour la population, qui a alors tendance à se rassembler autour des lieux fortifiés en quête de sécurité. Le développement des villes à proximité des châteaux favorisera sans aucun doute leur commerce et leur prospérité."
 jap_land_of_the_rising_sun:0 "Pays du Soleil-Levant"
 jap_land_of_the_rising_sun_desc:0 "Le Japon possède une histoire longue et glorieuse. Notre tradition culturelle unique, nos courageux guerriers et la géographie qui a préservé le pays de toute conquête nous rendent plus forts que tout autre pays de la région. Le moment est venu pour le pays du Soleil-Levant de prendre sa place au sein des grandes nations de ce monde !"
 jap_reformed_land_holding:0 "Réforme de la propriété foncière"
 jap_reformed_land_holding_desc:0 "De façon traditionnelle, la terre est estimée selon sa superficie, mais c'est dénier le fait qu'en réalité, toutes les terres ne se valent pas. Désormais, elles seront estimées en fonction de la quantité de riz qui y pousse, ce qui nous aidera à en tirer pleinement parti."
 jap_shinobi:0 "Shinobi no mono"
 jap_shinobi_desc:0 "L'information étant un élément vital afin d'obtenir l'ascendant sur son adversaire, nous recourons depuis longtemps à des espions et infiltrés qui glanent des renseignements pour nous. Ces $jap_shinobi$ sont généralement issus de la classe des samouraïs, mais peuvent aussi être recrutés parmi la population locale. Ils sont ensuite envoyés dans les territoires ennemis pour s'y fondre dans la société et établir un précieux réseau de renseignements destiné à nous servir par la suite."
 jap_terakoya:0 "Terakoya"
 jap_terakoya_desc:0 "Ces écoles privées dispensent une éducation de base aux gens du peuple, promouvant l'alphabétisation, le calcul et les valeurs morales. Les écoles terakoya jouent un rôle essentiel dans la formation d'une population plus éduquée et socialement plus consciente, contribuant ainsi à la stabilité et au progrès du pays."
 jap_wandering_ronin:0 "Rōnin errants"
 jap_wandering_ronin_desc:0 "Il est très commun pour les samouraïs d'errer à travers le pays à la recherche du meilleur emploi et d'accorder leur allégeance au seigneur qui les rémunère le plus grassement. Ces hommes vont et viennent telles les saisons, mais peuvent avoir leur usage."
 jaysh_armies_advance:0 "Armées Jaych"
 jaysh_armies_advance_desc:0 "L'aube d'une nouvelle ère de guerre a fait naître le besoin d'une armée issue des tribus locales qui nous sont loyales. Grâce à elle, nous exploiterons les ressources de notre vaste domaine."
 jerusalem_focus:0 "Attachement à $jerusalem$"
 jerusalem_focus_desc:0 "Nous gardons toujours à l'esprit la ville sainte de $jerusalem$, car c'est non seulement le lieu où Jésus a prêché et péri, mais également celui où il reviendra lors de son second avènement. C'est pourquoi nous prions systématiquement en direction de $jerusalem$, où que nous nous trouvions."
 jesuits_bark:0 "Herbe des jésuites"
 jesuits_bark_desc:0 "Certaines populations indigènes d'Amérique du Sud utilisaient l'écorce d'un arbre spécifique pour traiter les frissons. Grâce aux expériences d'un apothicaire jésuite, cette écorce s'est également révélée efficace pour traiter le paludisme, et elle est déjà connue sous le nom d'« Herbe des jésuites ». En distribuer à la population touchée permettra de réduire considérablement les effets de la maladie."
 jewels_of_the_desert:0 "Joyaux du désert"
 jewels_of_the_desert_desc:0 "Il est vrai que l'$muslim$ est né des sables de l'$arabia_region$ et s'est étendu à de nombreuses autres régions arides. Cependant, certaines villes $muslim_ADJ$es ont réussi à briller malgré leur situation au milieu de zones désertiques et ont été saluées comme des centres de vie aisés. Avec suffisamment d'efforts, n'importe quelle colonie peut devenir aussi riche qu'elles."
 jihad_against_the_pagans:0 "$jihad$ contre les païens"
 jihad_against_the_pagans_desc:0 "Malgré tous les efforts déployés pendant des siècles par les sultanats sunnites, l'Afrique de l'Ouest est toujours menacée par les païens animistes. En hissant la bannière du jihâd, nous pouvons chasser de nos terres les mécréants et en profiter pour étendre nos frontières."
 jingdezhen_porcelain:0 "Porcelaine de Jǐngdézhèn"
 jingdezhen_porcelain_desc:0 "La marque d'une société prospère, et le summum de l'art, ne sont que quelques-uns des aspects établis de notre peuple. En perfectionnant la fabrication de la porcelaine et en introduisant une nouvelle variété supérieure, appelée #italic Jǐngdézhèn#!, nous étendrons certainement notre portée culturelle vers de nouveaux horizons."
 jisha_bugyou:0 "Jisha-bugyō"
 jisha_bugyou_desc:0 "Administrateur et superviseur de tous les temples et sanctuaires, le $jisha_bugyou$ supervise toutes les activités de ces institutions religieuses, en veillant à ce que leurs intérêts soient en adéquation avec ceux du gouvernement."
 joint_stock_companies:0 "Compagnies par actions"
 joint_stock_companies_desc:0 "Les risques ont augmenté en même temps que le commerce s'est développé. Il était donc nécessaire de trouver de nouvelles façons d'accumuler le capital et de gérer au mieux les risques. La réponse est la compagnie par actions, où l'ensemble des actionnaires partage les risques de l'entreprise."
 julian_calendar:0 "Calendrier julien"
 julian_calendar_desc:0 "Depuis des siècles, notre pays et notre Église s'appuient sur le $julian_calendar$, instauré par Jules César en 46 av. J.-C. Bien plus qu'un simple repère temporel, ce calendrier unit les nations orientales $christian_ADJ$nes et fixe les dates des grandes fêtes et célébrations."
 junji_chu:0 "Jūnjī chù"
 junji_chu_desc:0 "Également connu sous le nom de Grand Conseil, le #italic Jūnjī chù#! est chargé des affaires militaires. Comme il s'agit du conseil privé suprême, il en est venu à éclipser le Grand Secrétariat installé par les dynasties précédentes. Malgré son rôle crucial, ce conseil conservera une nature informelle au sein de la cour intérieure, fonctionnant parallèlement aux autres rôles tenus par ses membres."
 jurchen_honor:0 "Honneur jürchen"
 jurchen_honor_desc:0 "Notre peuple s'enthousiasme pour les tours de force et autres démonstrations de valeur, car chaque Jürchen estime qu'en montrant ses capacités, il gagne le respect de ses pairs. Cette estime de soi bien méritée rend nos guerriers immensément courageux, prêts à combattre n'importe qui."
 justified_holy_wars:0 "Guerres saintes justifiées"
 justified_holy_wars_desc:0 "Nous ne pouvons laisser les païens et hérétiques dicter nos actes. Il est de notre devoir sacré de débarrasser le pays de leur souillure, afin que le véritable royaume de Dieu puisse être manifesté sur Terre."
 kafes:0 "Kafès"
 kafes_desc:0 "En confinant nos princes indisciplinés dans une partie du harem, les $kafes$, nous éviterons les rébellions superficielles et les rivalités entre frères qui sévissaient autrefois dans notre régime."
 kagura:0 "Kagura"
 kagura_desc:0 "À l'origine, il s'agissait de danses sacrées exécutées à la cour par les #italic miko#!, les vierges du sanctuaire. Les $kagura$ ont également inspiré des danses rituelles populaires dans toutes les régions du $japan_region$. Ces danses ont évolué en une multitude de formes qui conservent les traditions et les rituels dont elles sont issues."
 kainerekowa:0 "Kaianere'kó:wa"
 kainerekowa_desc:0 "Nous devons honorer le grand don que nous ont fait Hiawatha et le Grand Pacificateur : la grande loi de paix, qui a uni nos cinq nations autour d'un même but et nous a donné nos coutumes."
 kalaripayattu_advance:0 "Kalarippayatt"
 kalaripayattu_advance_desc:0 "Le Kalarippayatt, la #italic pratique des arts du champ de bataille#!, est un vieil art martial indien qui trouve ses origines dans la région de $malabar_area$. Les guerriers de notre État seront formés aux arts du Kalarippayatt pour assurer leurs prouesses au corps à corps et au combat rapproché."
 kammergericht:0 "Fondation de la Kammergericht"
 kammergericht_desc:0 "Afin de réguler le contrôle de la Marche de Brandebourg, nous remplacerons le droit commun local par le droit romain. La justice, quant à elle, sera remaniée en s'assurant que la Cour suprême ne suive plus la cour de l'Électeur, qui se déplaçait souvent, mais reste en un lieu fixe et centralisé. Cela permettra donc une justice plus efficace, tout en réduisant le pouvoir des magnats locaux."
 karamanid_cavalry:0 "Cavalerie karamanide"
 karamanid_cavalry_desc:0 "La cavalerie a toujours été la pierre angulaire de la guerre turkmène. Nos cavaliers, entraînés dès leur plus jeune âge et montés sur des chevaux anatoliens robustes, perpétuent les fières traditions de la guerre des steppes avec discipline et une force redoutable."
 karimi_merchants:0 "Marchands kārimīs"
 karimi_merchants_desc:0 "Ces géants maritimes du commerce d'épices ont beaucoup profité des flux de produits exotiques qui viennent d'aussi loin que les côtes d'Aden, d'Inde, et plus loin encore !"
 kashif:0 "Kāshifs"
 kashif_desc:0 "Notre sultanat est vaste, aussi devons-nous l'administrer judicieusement. Employer des hommes sages et justes en tant que gouverneurs locaux est une idée de génie, qui pourrait faire pencher la balance en notre faveur."
 kasztelanowie:0 "Kasztelanowie"
 kasztelanowie_desc:0 "Chargés d'être la voix du monarque, les castellans sont ses représentants officiels dans son domaine. Ils sont chargés de collecter les impôts et de faire respecter l'État de droit, voire d'exécuter la justice et la conformité au nom de la couronne."
 kbo_council_clan_heads:0 "Conseil des chefs de clans"
 kbo_council_clan_heads_desc:0 "Déléguer les devoirs administratifs aux chefs de clan locaux pourrait nous priver d'une partie de notre autorité centrale, mais nos conseillers soutiennent que le jeu en vaut la chandelle."
 kbo_fixed_military_camps:0 "Camps militaires sédentaires"
 kbo_fixed_military_camps_desc:0 "En employant un système de campements autour de notre domaine, nous pouvons nous assurer que l'armée souffre moins de pertes par attrition et reçoit des renforts aussi rapidement que possible."
 kbo_iron_helmet_musketeers:0 "$a_iron_helmet_musketeers$"
 kbo_iron_helmet_musketeers_desc:0 "À mesure que les tactiques de guerre progressent, il nous incombe de progresser tout autant. En adaptant des concepts étrangers en matière de formations, de lignes de tir et de nouvelles armes à feu, nous serons assurément vainqueurs !"
 kbo_permanent_sieges:0 "Tactiques de siège du Kanem"
 kbo_permanent_sieges_desc:0 "La construction de machines élaborées visant à détruire les remparts ennemis nous est familière. En revanche, la création d'une artillerie mobile capable de résister à des jours de siège tout en tirant est une nouvelle avancée qui nous assurera certainement la victoire !"
 kbo_ribat_fortifications:0 "Ribats"
 kbo_ribat_fortifications_desc:0 "Érigées dans l'ensemble du monde $muslim_ADJ$, ces petites fortifications ont permis de protéger les caravanes comme les carrefours commerciaux et les communautés isolées."
 keepers_of_the_gate:0 "Gardiens de la porte"
 keepers_of_the_gate_desc:0 "Le terrain accidenté de la Serbie a donné naissance à un formidable réseau de défense, incarné par l'imposante forteresse de Smederevo. Ces fortifications durables protègent notre nation et découragent toute velléité d'invasion. Des chaînes de montagnes tentaculaires aux vallées fluviales à la position stratégique, nos systèmes défensifs témoignent de notre résilience et de notre esprit indomptable."
 kele_koun_advance:0 "Les kèlè-koun"
 kele_koun_advance_desc:0 "Les kèlè-koun, ou « têtes de guerre », sont les commandants des kèlè-bolo, le « bras de la guerre », les fantassins qui combattent pour l'Empire. Au contraire des ton-tigi, les seigneurs féodaux du Mali, les kèlè-koun ne font pas forcément partie des $nobles_estate$. Les kèlè-koun ont des jonow, des « esclaves » servant à porter les armes et l'équipement jusqu'à leur inclusion dans les bataillons de Sofas."
 kgk_emerging_clan:0 "Clan émergent"
 kgk_emerging_clan_desc:0 "Malgré notre héritage ancestral, notre clan, en tant que branche du clan Sasaki, est relativement récent. Notre peuple pense donc que nous devons prouver notre valeur."
 kgk_omi_genji:0 "Ōmi-Genji"
 kgk_omi_genji_desc:0 "Nos ancêtres appartenaient autrefois au clan Uda Genji de la famille Minamoto, et nous avons été les shugo d'Ōmi des générations durant. Notre droit de défendre cette province est assuré."
 khedivates:0 "Khédivats"
 khedivates_desc:0 "Les grands empires sont généralement constitués d'un noyau entouré de sujets à l'allégeance parfois sujette à caution. Nous devons prendre les mesures nécessaires pour mieux surveiller ces nations."
 khm_ballista_elephants:0 "Éléphants à balistes"
 khm_ballista_elephants_desc:0 "Les éléphants sont des créatures impressionnantes qui surpassent tous les autres animaux que nous connaissons. Il est temps d'utiliser ces qualités pour effrayer nos ennemis en employant ces animaux majestueux dans la guerre. Les éléphants sont également capables de porter de lourdes charges, ce qui nous permet de les équiper de machines de guerre. En construisant des arbalètes à double corde dont nous les équiperons, nous disposerons d'une arme capable de dominer le champ de bataille mieux que jamais."
 khm_champa_mercenaries:0 "Chefs mercenaires de $CHA$"
 khm_champa_mercenaries_desc:0 "Par le passé, nous avons combattu aux côtés des féroces guerriers $CHA$s et avons pu nous appuyer sur eux. Si nous parvenons à nous assurer les services de leurs chefs les plus compétents, nous aurons la garantie que notre armée est bien entraînée et prête à combattre en toutes circonstances."
 khm_foreign_production_skills:0 "Invitation d'experts étrangers"
 khm_foreign_production_skills_desc:0 "Alors que notre population n'a pas pour habitude de tisser la soie, préférant d'autres tissus, nous avons la chance que des tisserands étrangers se soient établis dans nos villes. Nous devrions adopter la même approche pour d'autres types d'industries et accroître ainsi notre productivité dans tous les domaines."
 khm_great_builders:0 "Cités hydrauliques"
 khm_great_builders_desc:0 "Nos grandes villes abritent de nombreux barays et canaux, permettant le stockage et l'évacuation de l'eau dans les limites de la ville. Nos compétences en matière de construction et d'entretien de ce réseau de voies d'eau garantiront la prospérité de notre population pendant les périodes difficiles de la mousson."
 khm_invest_in_irrigation:0 "Développement des barays"
 khm_invest_in_irrigation_desc:0 "Alors que nos réserves d'eau répondent à nos besoins agricoles actuels, nous pourrions facilement subvenir aux besoins d'un plus grand nombre d'habitants en creusant de nouveaux barays en diverses régions de notre pays, créant ainsi de nouveaux centres urbains pour notre population."
 khm_modern_navy:0 "Une flotte moderne pour $KHM$"
 khm_modern_navy_desc:0 "Ne laissons pas les autres dominer les mers et contrôler le commerce dont dépend notre royaume. Créons une force navale moderne capable de tenir tête aux pirates et aux flottes étrangères en $south_east_asia$."
 khm_old_grudges:0 "Aiguillonnés par la rivalité"
 khm_old_grudges_desc:0 "Notre peuple a été humilié par le passé par des envahisseurs qui nous ont forcés à nous incliner devant eux. Si toutes les défaites ne peuvent être évitées, nous nous en servirons pour inciter notre peuple à accomplir de plus grands exploits sur les champs de bataille à venir."
 khm_protection_from_raids:0 "Sécurisation des frontières"
 khm_protection_from_raids_desc:0 "Nos territoires sont souvent menacés d'invasion et notre précieuse $angkor$ est particulièrement exposée aux sièges et à la destruction. Nous devons investir dans un vaste système de fortifications avec une garnison capable de résister aux forces d'invasion, afin de prémunir notre peuple de l'esclavage et de la domination étrangère."
 khm_recruitment_of_peasants:0 "Enrôlement des paysans"
 khm_recruitment_of_peasants_desc:0 "Nous aurons besoin de renforcer notre armée avec de nouvelles recrues, que l'on trouvera facilement au sein de notre paysannerie. Avec un peu d'entraînement, nous nous assurerons que les rangs de nos troupes soient regarnis à tout moment par des soldats compétents."
 khm_religious_flexibility:0 "Une foi unique pour les $KHM$s"
 khm_religious_flexibility_desc:0 "Notre pays a connu des périodes tumultueuses et a vu des monarques promouvoir à la fois l'$hindu$ et diverses orientation du $buddhist$. Nous devons faire confiance à nos dirigeants et donc suivre la foi choisie dans chacun des territoires de notre pays."
 khm_restore_angkor:0 "Restauration d'$angkor$"
 khm_restore_angkor_desc:0 "La grande cité d'$angkor$ était autrefois le phare de notre génie architectural. À cause d'influences extérieures, nous avons été contraints de réduire nos efforts de construction, mais nous devrions renouer avec nos traditions et relancer la construction de nouveaux monuments témoins de notre splendeur."
 khm_royal_procession:0 "Processions royales $KHM_ADJ$s"
 khm_royal_procession_desc:0 "Les défilés de nos dirigeants sont un événement qui suscite l'émerveillement et qui n'a que peu d'équivalent. Nous afficherons la force de notre autorité par des processions somptueuses avec notre souverain pour afficher la splendeur de notre État. Représentant la richesse et le pouvoir du souverain, les cortèges d'éléphants et la garde royale feront en sorte que la confiance de notre peuple reste inébranlable."
 khm_utilize_the_rivers:0 "Les forces vives de $KHM$"
 khm_utilize_the_rivers_desc:0 "Nos cours d'eau constituent un excellent moyen d'acheminer les marchandises récoltées ou produites à l'intérieur de nos territoires vers nos ports et les routes commerciales étrangères. L'utilisation de ce réseau de transport nous permettra également de relier nos villes entre elles et de rendre la communication plus rapide."
 kilwan_trade_network:0 "Réseaux commerciaux $ZAN_ADJ$s"
 kilwan_trade_network_desc:0 "Attirant de nombreux marchands venus d'aussi loin que la $persia_region$ et l'$arabia_region$, notre capitale est devenue une plaque tournante du commerce, facilitant les affaires depuis la corne de l'$africa$ jusqu'aux rivages de la $china$."
 kkc_disinguished_family_in_kyushu:0 "Famille honorée"
 kkc_disinguished_family_in_kyushu_desc:0 "Contrairement aux autres puissants clans de Kyūshū, notre famille s'est établie avant que ne soit fondé le shogunat de Kamakura. Nos exploits sont bien connus, et notre nom respecté."
 kkc_resistance_against_foreign_intervention:0 "Résistance face aux invasions"
 kkc_resistance_against_foreign_intervention_desc:0 "Nos contributions à la défense du pays durant les invasions mongoles ne sont plus à prouver. Les exploits de Kikuchi Takefusa pour repousser les envahisseurs sont salués de tous, et l'ensemble de nos troupes aspirent à combattre aussi courageusement que lui."
 kno_murakami_suigun:0 "Suigun des Murakami"
 kno_murakami_suigun_desc:0 "Le clan Murakami est bien connu en tant que groupe de pirates opérant dans la mer intérieure de Seto. Intégrons-le donc en notre sein et envoyons ces redoutables corsaires sur nos ennemis !"
 kno_ruler_of_inland_sea:0 "Maîtrise de la mer intérieure"
 kno_ruler_of_inland_sea_desc:0 "La mer intérieure de Seto a un rôle stratégique pour les routes commerciales du Japon. Y perpétuer notre domination navale ou la perdre peut faire ou défaire le clan. Nous devons donc veiller à toujours disposer d'une flotte puissante afin de contrôler le commerce maritime."
 kno_shugo_of_iyo:0 "Shugo d'$iyo_province$"
 kno_shugo_of_iyo_desc:0 "Depuis la fin de l'ère de Heian, au XIIe siècle, nous avons été la plus grande puissance navale de la mer intérieure de Seto, et c'est la force de notre flotte qui nous a valu le titre de shugo de la province."
 knot_system:0 "Quipus"
 knot_system_desc:0 "En utilisant un système de cordes nouées permettant de recenser des informations, nous pouvons faciliter grandement l'administration de nos territoires en enregistrant des informations de toute première importance."
 kokugaku:0 "Kokugaku"
 kokugaku_desc:0 "Presque depuis leur origine, le $japan_region$ et le $shinto$ ont été influencés par des idées en provenance de $china$ et du $buddhist$. Un nouveau mouvement est en train de s'affirmer, selon lequel notre esprit national est naturellement pur et toutes les influences étrangères doivent en être écartées."
 kol_peace_in_the_city:0 "Paix au sein de la ville"
 kol_peace_in_the_city_desc:0 "Il n'y a pas si longtemps, notre ville a failli être ravagée par une lutte opposant nos bourgeois et notre clergé. Nous devons veiller à ce que ce conflit ne se reproduise pas et à ce que tous les membres de notre cour et du conseil urbain coopèrent pour préserver Cologne et son statut de plaque tournante centrale sur le Rhin."
 kol_school_of_painting:0 "École de peinture de Cologne"
 kol_school_of_painting_desc:0 "Notre ville accueille de nombreux peintres et artisans talentueux, habiles dans l'art de donner vie à des images à travers le travail du bois, de la pierre et tout particulièrement du verre. Avec le soutien d'une guilde d'artistes solidement établie, ils prospéreront sous notre parrainage et illumineront notre ville d'une nouvelle gloire."
 komisja_edukacji_narodowej:0 "Komisja Edukacji Narodowej"
 komisja_edukacji_narodowej_desc:0 "Afin de répondre à la nécessité pour notre gouvernement de se doter d'administrateurs compétents et d'assurer le bon fonctionnement des procédures concernées, nous financerons et créerons le premier ministère de l'Éducation d'Europe, axé sur la diffusion de l'alphabétisation au sein de notre population."
 kon_bakongo_confederation:0 "Confédération Bakongo"
 kon_bakongo_confederation_desc:0 "Avant l'essor de notre royaume, les peuples de cette région se gouvernaient eux-mêmes par des conseils de clans et des alliances provinciales. Ce que nous appelons aujourd'hui $KON$ est né de siècles de relations entremêlées, où la loyauté envers la terre et la famille l'emportait sur la fidélité aux frontières. Unir ce patchwork en un royaume centralisé n'a pas été une mince affaire, mais nous l'avons fait, et nous entendons poursuivre dans cette voie."
 kon_cultural_syncreticism:0 "Syncrétisme culturel"
 kon_cultural_syncreticism_desc:0 "L'arrivée des étrangers et les échanges culturels ont profondément influencé notre société. Pourtant, nous sommes restés fidèles à nos racines : nous prions nos dieux en kikongo, nous arborons nos symboles religieux, et nos fêtes mêlent le rythme des tambours aux chants sacrés. C'est un exemple vibrant de notre clarté d'esprit, et les dieux semblent l'approuver."
 kon_european_contact:0 "Contact européen"
 kon_european_contact_desc:0 "Des étrangers sont arrivés par la mer, barbus, avec des livres et des tonneaux de vin. Ils ont apporté avec eux des dieux étranges, des langues encore plus étranges, et tout un océan de possibilités. Nos émissaires ont appris leurs coutumes, leurs intentions, et surtout comment transformer leur besoin d'alliés en avantage pour nous."
 kon_lineage_lukeni_lua_nimi:0 "Lignée de Lukeni lua Nimi"
 kon_lineage_lukeni_lua_nimi_desc:0 "Tout a un commencement, et pour notre royaume, ce commencement est Lukeni lua Nimi. Il fut bien plus qu'un conquérant : il fut un fondateur, le père de notre royaume. Sa lignée commande le respect, non seulement pour son ascendance, mais parce qu'elle entretient le souvenir de ceux qui osèrent les premiers rêver d'un $KON$ unifié."
 kon_study_european_firearms:0 "Étude des armes à feu européennes"
 kon_study_european_firearms_desc:0 "Le mousquet ne rend pas un homme courageux, mais il en fait un adversaire redoutable. Qu'ils se targuent de leur supériorité, ces Européens. Nous, nous leur achèterons leurs armes, nous apprendrons leurs méthodes, et bientôt, nos soldats ne se distingueront des leurs que par la bannière qu'ils brandissent."
 kon_transatlantic_slave_trade:0 "Traite transatlantique des esclaves"
 kon_transatlantic_slave_trade_desc:0 "La traite fournit la main-d'œuvre dont les colonies ont besoin : ouvriers pour les chantiers, les plantations et les mines. Ce n'est pas glorieux, mais c'est une activité lucrative, ce que personne ne peut nier."
 kor_border_defense_council:0 "Conseil des frontières"
 kor_border_defense_council_desc:0 "Nos frontières sont constamment menacées, tant par les barbares du Nord que par les pirates au-delà des mers. Nous allons mettre en place un conseil d'officiers dédié à la surveillance et à la sécurité de nos frontières, afin que nos armées soient toujours prêtes à faire face à n'importe quelle menace."
 kor_court_poetry:0 "Poésie de cour"
 kor_court_poetry_desc:0 "Notre aristocratie met l'accent sur le développement culturel de son esprit. La littérature, comme la poésie en chinois classique et d'autres types d'engagements textuels, sont hautement estimés des privilégiés. La noblesse et les membres de la cour se réjouissent de l'impact culturel de l'écrit."
 kor_daedongbeop:0 "Daedongbeop"
 kor_daedongbeop_desc:0 "Une nouvelle série de réformes proposées par le conseiller d'État en chef Yi Won-ik introduira progressivement dans le système fiscal des améliorations ignorées jusqu'alors. La taxe de tribut prélevée sur les ménages sera remplacée par une taxe unifiée sur les terres arables. La taxe sur les marchandises sera limitée à un quota qui permettra aux paysans entreprenants et aux grossistes de produire et de vendre leurs marchandises excédentaires. Il en résultera certainement une baisse des impôts pour les paysans, une augmentation des recettes de l'État et un essor du commerce."
 kor_early_turtle_ship_advance:0 "$n_early_turtle_ship$"
 kor_early_turtle_ship_advance_desc:0 "$n_early_turtle_ship_desc$"
 kor_fortresses_of_goguryeo:0 "Forteresses du Goguryeo"
 kor_fortresses_of_goguryeo_desc:0 "Auparavant, la péninsule coréenne abritait de nombreux royaumes. Pourtant, l'influence de l'un de ces royaumes peut encore être ressentie : le Goguryeo, prédécesseur du Goryeo. Si le Goguryeo nous a laissé de nombreux héritages, ses fortifications et sa maîtrise de la pierre pour construire de tels châteaux nous servent aujourd'hui encore."
 kor_geobukseon:0 "Geobukseon"
 kor_geobukseon_desc:0 "Il est fondamental de défendre nos côtes. Seul le geobukseon, ou « navire-tortue », un monstre puissamment armé et lourdement fortifié, est capable d'aider nos flottes à le faire."
 kor_grand_code:0 "Grand Code administratif"
 kor_grand_code_desc:0 "Afin d'assurer un gouvernement stable et digne de ce nom, nous devons codifier précisément la manière dont le gouvernement doit fonctionner. Ce sera ainsi la première constitution écrite de Corée."
 kor_gunpowder_engines:0 "Canons à poudre"
 kor_gunpowder_engines_desc:0 "Nos militaires connaissent l'utilité tactique de la poudre à canon depuis le début du XIIe siècle. Grâce à l'ingénierie inverse de la poudre à canon chinoise et aux travaux scientifiques de Choi Mu-seon, nous devrions être en mesure de fabriquer notre propre poudre à canon pour notre armée."
 kor_hangeul_alphabet:0 "L'alphabet hangeul"
 kor_hangeul_alphabet_desc:0 "La langue coréenne est si différente du chinois que, hormis les plus éduqués, ceux qui essaient d'utiliser les caractères chinois restent illettrés. Notre nouvel alphabet permettra à tous d'apprendre facilement à lire et écrire."
 kor_hopae_system:0 "Système du hopae"
 kor_hopae_system_desc:0 "Le hopae est une étiquette d'identification que doit porter chaque Coréen, indiquant son nom, son lieu de naissance, son statut et son lieu de résidence. Cela permet de savoir qui sont les gens, et où ils se trouvent."
 kor_hwachas_advance:0 "$a_hwacha$"
 kor_hwachas_advance_desc:0 "$a_hwacha_desc$"
 kor_korean_artisanry:0 "Artisanat coréen"
 kor_korean_artisanry_desc:0 "L'art est une tradition de longue date dans notre État. Depuis la #italic véritable unification nationale#!, il connaît un âge d'or et parmi toutes ces merveilles, l'artisanat de la péninsule coréenne est l'une des plus honorées."
 kor_korean_barracks_advance:0 "$korean_barracks$"
 kor_korean_barracks_advance_desc:0 "$korean_barracks_desc$"
 kor_korean_cannon:0 "Le canon coréen"
 kor_korean_cannon_desc:0 "Nous utilisons depuis longtemps la poudre et les canons pour notre armée, mais nous ne pouvons pas nous arrêter en si bon chemin. En développant des canons plus petits mais plus résistants ainsi que des méthodes de recharge plus efficaces, l'artillerie coréenne connaîtra une révolution technologique qui profitera à la fois à notre armée et à notre marine."
 kor_korean_gunnery:0 "$korean_gunnery$"
 kor_korean_gunnery_desc:0 "La technologie de la poudre à canon progresse et notre ingéniosité défensive avec elle. Bien que simple dans son concept et son exécution, l'installation de canons dans nos fortifications augmentera considérablement leurs capacités de défense."
 kor_metal_movable_type:0 "Caractères mobiles en métal"
 kor_metal_movable_type_desc:0 "Les caractères mobiles sont une ancienne technologie d'impression utilisée par les Chinois pour la première fois il y a des siècles. C'est toutefois la dynastie du Goryeo qui a mis au point les caractères de métal et le processus qui permet d'imprimer des livres avec une efficacité sans précédent."
 kor_panokseon_advance:0 "$n_panokseon$"
 kor_panokseon_advance_desc:0 "$n_panokseon_desc$"
 kouroukan_fouga_advance:0 "Charte du Mandé"
 kouroukan_fouga_advance_desc:0 "La $kouroukan_fouga_advance$ est la constitution de base du $MAL$. Elle régit tous les aspects de la société, de la simple vie de famille des villages jusqu'à la souveraineté des Mansa."
 krakow_grosz:0 "Grosz Krakowski"
 krakow_grosz_desc:0 "Pour tenter de réformer le système monétaire, nous allons introduire une nouvelle monnaie, le gros de Cracovie. Frappées en argent, ces pièces sont destinées à remettre en cause le pouvoir du gros de Prague et à faire de notre royaume l'avant-garde de la fiscalité centralisée."
 krs_kurdish_horses:0 "Cavalerie adaptée"
 krs_kurdish_horses_desc:0 "Nos terres natales sont entourées de nombreux conquérants en puissance, avides de soumettre notre peuple. Si notre terrain naturel peut ralentir les armées hostiles, cela complique également la capacité de nos propres troupes à réagir rapidement face à la menace. Nous pourrions toutefois régler ce problème grâce à une cavalerie puissante, et ce quel que soit le nombre d'adversaires."
 krs_kurdish_mercenaries:0 "Expérience de mercenaires"
 krs_kurdish_mercenaries_desc:0 "Notre peuple a longtemps servi comme mercenaires pour des seigneurs étrangers, acquérant ainsi une précieuse expérience au combat. Maintenant que notre propre pays est établi, il est temps de rallier ces combattants expérimentés sous notre bannière."
 krs_kurdish_quarters:0 "Quartiers $kurdish_culture$s prospères"
 krs_kurdish_quarters_desc:0 "À l'époque de la domination étrangère, bon nombre de nos concitoyens ont établi des quartiers à prédominance $kurdish_culture$ au sein des villes. Si ces zones ont prospéré même avec des dirigeants qui exercent leur autorité à distance, nous pouvons désormais exploiter directement leur richesse et garantir un avenir prospère à notre peuple."
 krs_kurdish_tribes:0 "Loyauté tribale"
 krs_kurdish_tribes_desc:0 "Une fois que nous aurons assis notre autorité sur toutes les tribus $kurdish_culture$s, nous pourrons faire appel à leurs guerriers expérimentés et aguerris pour défendre notre pays."
 krs_kurdish_warrior_poets:0 "Poètes guerriers"
 krs_kurdish_warrior_poets_desc:0 "Nos dirigeants ne doivent pas seulement être des guerriers compétents ; ils doivent également être instruits dans les domaines des beaux-arts et apprendre les ficelles pour établir une administration efficace. En rédigeant des textes et en documentant leurs règnes, nos dirigeants transmettront les connaissances et l'histoire de notre peuple à travers les générations, garantissant ainsi qu'aucune information précieuse ne soit perdue."
 krs_legacy_of_the_kurdish_dynasties:0 "Héritage des Dynasties $kurdish_culture$s"
 krs_legacy_of_the_kurdish_dynasties_desc:0 "Notre peuple a fondé plusieurs grandes dynasties, régnant sur des territoires allant de l'$egypt_region$ à l'Iran. En associant notre propre État à la gloire des anciens dirigeants, nous serons en mesure de devenir un symbole d'unité pour le peuple $kurdish_culture$ et de renforcer la légitimité de notre pouvoir aux yeux de nos vassaux."
 ktb_blessing_of_amaterasu:0 "Bénédiction d'Amaterasu"
 ktb_blessing_of_amaterasu_desc:0 "En tant que gardiens du sanctuaire le plus sacré du $japan_region$, à $ise_province$, nous sommes bénis par la déesse du soleil et de l'univers. Nous devons nous montrer dignes de la charge de maintenir et d'entretenir ce trésor national, car cela nous vaudra le respect de l'ensemble des Japonais."
 ktb_control_of_ise:0 "Contrôle d'$ise_province$"
 ktb_control_of_ise_desc:0 "Depuis le Sud opulent jusqu'aux régions densément peuplées et urbaines du Nord, nous sommes parvenus à étendre notre contrôle sur l'ensemble de la province d'$ise_province$. Cela nous permettra d'exploiter toutes ses ressources pour assurer la montée en puissance et l'influence de notre clan."
 ktb_southern_court:0 "Partisans de l'empereur"
 ktb_southern_court_desc:0 "Bien que la branche impériale ait perdu de son poids politique, notre dévouement envers la Cour du Sud, même après sa division, reste reconnu. Cette réputation de fidélité absolue envers le trône du chrysanthème démontrera au monde que notre détermination est plus grande que celle des maisons de moindre envergure qui dominent désormais le Japon."
 ktb_the_march_of_kitabatake_akiee:0 "Marche de Kitabatake Akiie"
 ktb_the_march_of_kitabatake_akiee_desc:0 "Notre honorable ancêtre Kitabatake Akiie a prouvé que l'on pouvait entreprendre toute la marche entre le $ou_area$ et le centre du Japon en peu de temps en faisant preuve de suffisamment de détermination. Nous devrions tirer les leçons d'un tel exploit et entraîner nos armées pour qu'elles se livrent à des manœuvres rapides, de manière à pouvoir rapidement passer d'un front à l'autre si la situation l'exige."
 kung_och_riksdag:0 "Kung och riksdag : le roi et le Parlement"
 kung_och_riksdag_desc:0 "Les rois de Suède dépendaient souvent de la bonne volonté des ordres, tout particulièrement de l'importante classe paysanne, pour contrebalancer la noblesse. Pendant le règne de Gustave Adolphe, pourtant, un compromis historique fut conclu avec la noblesse, qui jura de mettre ses ressources à la disposition du pays en contrepartie de nouveaux privilèges."
 kurultai_advance:0 "Kurultaï"
 kurultai_advance_desc:0 "En rassemblant tous les chefs de chaque groupe de guerriers, nous pourrons élire le $rank_empire_horde_ruler_suffix_male$ qui mènera nos hordes à la victoire. Sous une tente, le sort de notre peuple sera décidé et les chefs seront élus parmi les candidats qui s'estimeront dignes de nous diriger."
 kutnohorian_deal:0 "Le traité de Kutná Hora"
 kutnohorian_deal_desc:0 "La noblesse restera toujours sensible à ses prérogatives. Nous veillerons à ce que les privilèges des nobles soient solidement garantis."
 kvn_karvunan_maritime_heritage:0 "L'héritage maritime de Karvuna"
 kvn_karvunan_maritime_heritage_desc:0 "Karvuna a fondé sa puissance sur la mer plutôt que sur les plaines fertiles, s'appuyant sur un mélange de marins bulgares, grecs et italiens. En fortifiant les falaises calcaires de la côte, nous créerons une série de bases navales qui nous permettront de dominer les routes commerciales de la mer Noire, entre le delta du Danube et Constantinople. Cet accent maritime nous conférera une identité unique au sein du monde bulgare, privilégiant la supériorité navale et le commerce par rapport aux préoccupations féodales traditionnelles de l'intérieur."
 kvn_looking_for_friends:0 "En quête d'amitié"
 kvn_looking_for_friends_desc:0 "Étant donné la petite taille de notre territoire, nos dirigeants comprennent la nécessité de disposer d'alliés puissants et de partenaires commerciaux. En accordant à ces alliés des droits commerciaux exclusifs dans des ports comme Varna, le Despotat aura accès à la technologie navale moderne de l'Occident et au crédit financier, ainsi qu'à une protection navale potentiellement puissante contre nos ennemis. Cette alliance transformera la Dobroudja en un centre commercial cosmopolite, où la richesse de la Route de la soie sera échangée contre le grain et les fourrures du nord."
 kvn_the_black_sea_admiralty:0 "L'amirauté de la mer Noire"
 kvn_the_black_sea_admiralty_desc:0 "Karvuna établira une Amirauté permanente, dirigée par l'État, afin de superviser la construction de navires de guerre modernes de haute mer et la formation d'un corps d'officiers professionnels. En s'éloignant des petites galères, nous commencerons à construire des frégates et de petits navires de ligne capables de projeter notre puissance jusqu'à la mer Égée et la mer d'Azov. Cette modernisation navale garantira que nous restions une grande puissance maritime, capable de défendre nos intérêts commerciaux face à nos ennemis."
 kvn_the_condotta_of_varna:0 "La Condotta de Varna"
 kvn_the_condotta_of_varna_desc:0 "En tant qu'État maritime avec une population terrestre relativement réduite, Karvuna a perfectionné l'art de la « guerre sous contrat » en formalisant une Condotta permanente avec les puissances maritimes italiennes. Dans le cadre de cet arrangement, nous leur fournissons des entrepôts fortifiés et des bases navales dans la mer Noire, et en retour, les Italiens mettent à disposition un corps professionnel d'arbalétriers lourds et d'ingénieurs de siège experts pour la défense du Despotat. Cette relation symbiotique permet à Karvuna de frapper bien au-delà de son poids lors des batailles terrestres, en utilisant les innovations tactiques occidentales et la discipline professionnelle pour protéger sa bande côtière, tandis que les marins bulgares natifs dominent les flots, externalisant ainsi efficacement sa défense terrestre aux mercenaires les plus compétents de la Méditerranée."
 kvn_the_cosmopolitan_code_of_karvuna:0 "Le Code cosmopolite de Karvuna"
 kvn_the_cosmopolitan_code_of_karvuna_desc:0 "Afin de maintenir son statut de principal centre commercial de la mer Noire, nous promulguerons un cadre juridique révolutionnaire connu sous le nom de « Code de Karvuna », qui accordera des droits d'extraterritorialité et la liberté religieuse aux nations marchandes reconnues. Quelle que soit leur foi ou leur origine, tout marchand opérant dans nos ports sera jugé par un tribunal commercial composé de ses pairs plutôt que par des seigneurs féodaux locaux. Ce climat de prévisibilité juridique et de tolérance attirera un afflux massif de capitaux et d'expertise, transformant Karvuna en un immense carrefour où les richesses des routes de la soie et des épices seront réinvesties dans les infrastructures de l'État et son complexe militaro-industriel."
 kvn_the_free_port_of_varna:0 "Le port libre de Varna"
 kvn_the_free_port_of_varna_desc:0 "Pour asseoir notre position de plaque tournante commerciale des Balkans, nous déclarerons Varna port franc et exempterons les marchands internationaux de la plupart des droits traditionnels en échange d'une taxe de transit forfaitaire. Cette politique attirera une diaspora massive de marchands, banquiers et assureurs, faisant de Varna la « Venise de la mer Noire » et la capitale financière du monde bulgare. La richesse ainsi générée nous permettra de maintenir une armée professionnelle et une marine de classe mondiale, afin de garantir que notre État côtier demeure une puissance prospère et indépendante à l'époque des géants."
 lacquerware_guild_advance:0 "$lacquerware_guild$"
 lacquerware_guild_advance_desc:0 "$lacquerware_guild_desc$"
 lacquerware_manufactory_advance:0 "Manufacture de laques"
 lacquerware_manufactory_advance_desc:0 "$lacquerware_manufactory_desc$"
 land_morale_attrition_cost_advance:0 "Entraînement à la marche"
 land_morale_attrition_cost_advance_desc:0 "Une armée doit souvent se déplacer sur de longues distances pour atteindre son ennemi. Ainsi, les manœuvres à pied prolongées sont un élément essentiel de l'entraînement de nos troupes, ce qui les incite à arriver en forme au combat malgré des marches de plusieurs heures."
 land_morale_movement_cost_advance_disc:0 "Marche coordonnée"
 land_morale_movement_cost_advance_disc_desc:0 "Une armée en mouvement est à son plus vulnérable, et risque de se désorganiser. Entraîner nos troupes à marcher de façon organisée et coordonnée s'assure qu'elles conserveront leur formation de bataille même en cas d'attaque pendant la marche."
 land_morale_movement_cost_rev_choice_mil:0 "Avancée implacable"
 land_morale_movement_cost_rev_choice_mil_desc:0 "L'entraînement et la discipline de nos armées brillent lorsqu'elles marchent à l'unisson et se lancent dans la bataille sans se laisser impressionner par les longues marches précédentes."
 land_morale_recovery_renaissance_advance:0 "Organisation de la marche des armées"
 land_morale_recovery_renaissance_advance_desc:0 "Les armées deviennent de plus en plus complexes à gérer, car elles dépendent de moins en moins des levées. L'un des aspects essentiels est une meilleure organisation du déplacement des armées qui permet aux troupes d'être mieux préparées au moment de la bataille."
 land_of_many_religions:0 "Terre de diversité religieuse"
 land_of_many_religions_desc:0 "Notre peuple a la possibilité de coexister avec des hommes et des femmes de confessions différentes. Cette diversité sociale est inscrite dans nos cadres juridiques et dans nos croyances. Ensemble, nous sommes plus forts !"
 land_of_opportunity:0 "Là où tout est possible"
 land_of_opportunity_desc:0 "En présentant nos colonies et les territoires nouvellement découverts comme des endroits où n'importe qui, peut-être même les femmes, peut faire fortune, les candidats à l'émigration seront plus nombreux. Cela signifie que le pays dépensera moins d'argent pour encourager les gens à s'y rendre."
 land_of_promise:0 "Terre de promesses"
 land_of_promise_desc:0 "Les terres fertiles de notre domaine sont une destination convoitée par de nombreux migrants des couches inférieures à la recherche d'une vie meilleure et plus prospère."
 land_of_the_ancestors:0 "Terre des ancêtres"
 land_of_the_ancestors_desc:0 "La terre n'est pas seulement une possession ; elle nous relie aux grands hommes qui nous ont précédés. Depuis le pays bienheureux de l'au-delà, ils nous observent. À nous de veiller à ce que ce lien ne soit jamais rompu."
 land_of_the_rus:0 "Terre des Rus"
 land_of_the_rus_desc:0 "La réunification de la Ruthénie est un objectif que partagent les dirigeants $russian_group$s, et tout conquérant en puissance peut s'en servir pour justifier des conquêtes."
 landsknechte:0 "Lansquenets"
 landsknechte_desc:0 "Les $landsknechte$ sont une nouvelle forme d'organisation militaire qui a émergé des guerres récurrentes en Allemagne et à ses frontières. Ce sont des unités mixtes alliant l'innovation de carrés de piquiers, associés à des arquebusiers en soutien sur les flancs, et une première ligne composée des redoutables #italic Doppelsöldner#!, des mercenaires à « double solde » armés d'épées à deux mains. Cette combinaison permet des tactiques efficaces en combat rapproché et à moyenne distance."
 lat_codex_latinus_advance:0 "Codex Latinus"
 lat_codex_latinus_advance_desc:0 "L'empereur a ordonné la refonte complète du système juridique, fusionnant le Code de Justinien avec les #italic Assises de Romanie#! de style franc en un seul corps législatif unifié. Ce #italic Codex Latinus#! supprime les distinctions juridiques entre les sujets francs et grecs, créant ainsi une seule classe de citoyens impériaux soumis aux lois de l'empereur. Cette unification juridique est un coup de grâce pour l'ancien ordre féodal, car elle ouvre la voie à une monarchie véritablement centralisée et absolue."
 lat_emperor_latins_advance:0 "Empereur des Latins"
 lat_emperor_latins_advance_desc:0 "Avec la #italic francocratie#! unifiée sous notre règne, notre cour est désormais un savant mélange entre hiérarchies féodales rigides et martiales de la tradition française et occitane, et cérémonies anciennes et complexes des Grecs. En adoptant les robes pourpres et la dignité de l'Orient, nous imposons le respect spirituel de nos sujets grecs tout en conservant la loyauté de nos chevaliers occidentaux. Cette synthèse transforme l'empereur d'un simple conquérant étranger en un successeur légitime de Constantin, reconnu par le pape et craint par nos ennemis."
 lat_hegemony_over_the_bosphorus_advance:0 "Hégémonie sur le Bosphore"
 lat_hegemony_over_the_bosphorus_advance_desc:0 "Le contrôle des étroites voies d'accès à la mer Noire nous permet d'imposer de lourds péages aux républiques marchandes italiennes qui, autrefois, dictaient notre destin par le biais de la dette et du blocus naval. Les richesses issues du commerce du blé pontique et du terminus nord de la Route de la soie alimentent désormais directement les coffres impériaux plutôt que ceux de Venise ou de Gênes, et contribuent à financer notre restauration. Nous avons transformé la Corne d'Or, autrefois repaire de marchands étrangers, en cœur battant d'une puissance économique centralisée et souveraine."
 lat_the_golden_gate_customs_house_advance:0 "Le poste de douane de la Porte dorée"
 lat_the_golden_gate_customs_house_advance_desc:0 "Les empereurs latins ont dépassé le stade des impôts féodaux et s'appuient désormais sur un système sophistiqué de tarifs maritimes et de droits de transit. Chaque navire passant par les Dardanelles ou le Bosphore doit s'arrêter à la douane impériale, où la « dîme de l'empereur » est collectée en pièces de monnaie. Cette source de revenus considérable permet à l'Empire de maintenir une armée professionnelle permanente, libérée des caprices et chantages de la noblesse."
 lat_the_new_praetorian_guard_advance:0 "La nouvelle garde prétorienne"
 lat_the_new_praetorian_guard_advance_desc:0 "Issue de l'ancienne tradition varègue, notre garde moderne est composée de mercenaires catholiques venus d'Europe. Il s'agit principalement de vétérans français et de piquiers suisses. Ces hommes ne sont pas liés à l'empereur par leurs terres ou leurs titres, mais par l'or et une identité croisée commune, servant de main de fer contre les barons féodaux déloyaux. Cette force permanente, garante de la volonté absolue impériale, représente un noyau stable pour l'armée qui est ainsi libérée des caprices et chantages de la haute noblesse."
 lat_the_order_of_the_star_of_the_east_advance:0 "L'Ordre de l'Étoile d'Orient"
 lat_the_order_of_the_star_of_the_east_advance_desc:0 "L'empereur a créé un ordre du mérite de haut rang qui remplace les titres héréditaires par une noblesse fondée sur le mérite, garantissant ainsi que ce sont bien les compétences qui déterminent le choix des dirigeants de l'Empire. Appartenir à cet ordre est le plus grand honneur du pays, accordé aux généraux, diplomates et lettrés qui ont contribué à la gloire du Trône latin. Ce système crée une élite loyaliste entièrement dépendante de la faveur de l'empereur, consolidant ainsi le contrôle du monarque sur l'État."
 late_feudal_relations:0 "Rapports féodaux tardifs"
 late_feudal_relations_desc:0 "La féodalité est basée sur les concepts #italic d'auxilium#! et de #italic consilium#! que les nobles de divers rangs accordent à leurs seigneurs respectifs, créant une hiérarchie qui s'est fortement développée à travers les âges."
 late_ottoman_bureaucracy:0 "Mālīye"
 late_ottoman_bureaucracy_desc:0 "Le $late_ottoman_bureaucracy$, qui est un type de bureaucratie vaste, divers et très organisé composé des meilleurs scribes, aspire à devenir une institution fondamentale et incorruptible de l'État."
 late_winged_hussars_advance:0 "Nouveaux hussards ailés"
 late_winged_hussars_advance_desc:0 "L'évolution des hussards polonais au XVIIe siècle s'est traduite par l'adoption d'une armure plus lourde aux couleurs rouge et blanc. Ils utilisaient une lance plus longue d'environ six mètres dont la charge, dévastatrice, brisait souvent le moral de leurs ennemis et les mettait en déroute."
 latin_patriarch:0 "Patriarche latin"
 latin_patriarch_desc:0 "$PAP$ a rétabli le patriarcat latin de $KOJ$, autrefois exilé et oublié. Désormais restauré, le patriarche renforcera notre influence à $rome$ et consolidera notre rôle de gardien des intérêts de l'Église en Orient."
 latinate_integration:0 "Intégration latine"
 latinate_integration_desc:0 "Notre royaume est un creuset de noblesse européenne, de pèlerins zélés et de vieilles familles levantines. Par notre gouvernance avisée, nous formerons cet héritage diversifié en une société chrétienne latine, où foi et culture vont de pair."
 law_making_renaissance:0 "Examen juridique"
 law_making_renaissance_desc:0 "Les temps nouveaux impliquent des situations nouvelles, et les lois qui ont été utilisées depuis des générations ne sont pas toujours applicables aux nouveaux contextes. Nous devons procéder à un examen et à une révision continus de nos lois, afin de pouvoir les adapter à notre époque."
 lawcode_of_suleiman:0 "Le code juridique de Soliman"
 lawcode_of_suleiman_desc:0 "On se souvient de Soliman comme de l'un des plus grands souverains de l'Histoire, grâce à ses conquêtes autant qu'à ses réformes législatives et administratives. De fait, si l'Occident le connaît comme Soliman « le Magnifique », nous l'appelons quant à nous Kanunî Süleyman, « Soliman le Législateur ». Ses réformes se sont essentiellement centrées sur la remise à plat de la législation dynastique ottomane, le Kanun, afin de la mettre en conformité avec la $sharia$."
 lazaretto_advance:0 "$lazaretto$"
 lazaretto_advance_desc:0 "$lazaretto_desc$"
 le_livre_des_tournois:0 "Le Livre des tournois"
 le_livre_des_tournois_desc:0 "Rédigé par la royauté, le « Livre des tournois » est bien plus qu'un simple manuel, c'est une déclaration de fierté courtoise et d'identité chevaleresque. Notre noblesse s'entraîne non seulement pour la guerre, mais aussi pour le spectacle, et ce faisant, elle préserve la discipline martiale et le sens du prestige à travers tout le royaume."
 lead_ore_dressing:0 "Traitement du plomb"
 lead_ore_dressing_desc:0 "Au cours de son traitement, le minerai de plomb est lavé et broyé afin d'éliminer les impuretés et de séparer le minerai des roches, de l'argile et des autres minéraux."
 leader_recruit_cost_advance:0 "Écoles d'officiers"
 leader_recruit_cost_advance_desc:0 "Diriger des troupes n'est pas une tâche facile. Stratégie, tactique, perspicacité mentale, ce ne sont là que quelques-unes des compétences qu'un dirigeant doit posséder pour réussir. Le fait de disposer d'académies appropriées pour la formation de ces dirigeants nous permettra de disposer d'un plus grand nombre d'entre eux."
 leader_under_sky:0 "Un dirigeant guidé par le ciel"
 leader_under_sky_desc:0 "Notre peuple est divisé depuis trop longtemps. Nous avons besoin de quelqu'un d'assez fort pour l'unir et faire trembler le monde. Le ciel dirigera les actes et les pensées de ce dirigeant et nous guidera vers un avenir radieux."
 ledgers_double_checking:0 "Double vérification des livres de compte"
 ledgers_double_checking_desc:0 "C'est l'absence de rigueur dans la comptabilité qui permet à la corruption de prospérer et de pourrir une nation de l'intérieur. Pour éviter cette menace, nous devons veiller à ce que tout changement dans notre trésorerie soit correctement comptabilisé."
 legacy_of_breton_independence:0 "Héritage de l'indépendance bretonne"
 legacy_of_breton_independence_desc:0 "La Bretagne n'a jamais été française. Malgré les assauts répétés des Francs, des Vikings et des Anglais, nous sommes toujours parvenus à préserver notre identité. Que tous nos voisins sachent que la Bretagne restera libre et qu'elle demeurera le dernier bastion des véritables Celtes."
 legacy_of_great_empires:0 "Héritage des grands empires"
 legacy_of_great_empires_desc:0 "Du Trône du Dragon de $china$ aux différents empires de $persia_region$ en passant par les redoutables dynasties $hindu_ADJ$es et $buddhist_ADJ$s d'$india$ et d'$south_east_asia$, nombreux sont les puissants empires nés en $asia$."
 legacy_of_ivan_asen_ii:0 "L'héritage d'Ivan Asen II"
 legacy_of_ivan_asen_ii_desc:0 "Le règne d'Ivan Asen II a marqué un nouvel essor de la puissance bulgare, de la diplomatie et de l'expansion économique. Il a laissé en héritage les fondements d'un État fort et centralisé."
 legacy_of_saint_andrew:0 "Héritage de Saint André"
 legacy_of_saint_andrew_desc:0 "D'après la légende, Saint André se rendit en Scythie et sur les côtes septentrionales de la $black_sea_area$, et prédit l'essor du $christian$ lorsqu'il atteignit la future ville de $kyiv$."
 legacy_of_the_normans:0 "L'héritage des Normands"
 legacy_of_the_normans_desc:0 "Forgée dans le creuset de la conquête, l'armée normande de Sicile mêle la charge imparable des chevaliers normands à la sophistication stratégique des Byzantins, Arabes et Lombards. Maîtrisant à la fois la férocité et la souplesse tactique sur le champ de bataille, ils se taillent un royaume au carrefour des civilisations."
 legalism_advance:0 "Légalisme"
 legalism_advance_desc:0 "Les lois ne signifient rien si elles ne sont pas rédigées, standardisées et rendues compréhensibles par les membres de notre société. Leur mise en application permettra à la justice et à la liberté de s'étendre jusqu'aux confins de notre royaume."
 legislative_efficiency_idea:0 "Efficacité de l'administration"
 legislative_efficiency_idea_desc:0 "Pour tout gouvernement, l'aspect le plus crucial est d'obtenir les conseils les plus avisés. Assurons-nous de recruter autant de conseillers que possible, de façon à multiplier les points de vue."
 legitimization_of_power_law_advance:0 "$legitimization_of_power_law$"
 legitimization_of_power_law_advance_desc:0 "$legitimization_of_power_law_desc$"
 letters_of_marque:0 "Lettres de marque"
 letters_of_marque_desc:0 "La piraterie est un acte épouvantable. Des voleurs sans valeur qui cherchent à profiter de la souffrance d'autrui. Mais autoriser des navires à attaquer et piller nos ennemis n'a toutefois rien à voir."
 levee_en_masse_advance:0 "Levée en masse"
 levee_en_masse_advance_desc:0 "La guerre est un concept en constante évolution, perfectionné à force d'innovations génération après génération. Pour satisfaire le besoin d'expansion et fournir le carburant nécessaire à la réalisation de ces ambitions, de nouvelles lois sur la conscription nationale vont être rédigées et signées, levant des armées composées de tous les jeunes hommes célibataires, dont la taille façonnera le cours de l'Histoire."
 liberty_egalite_fraternity:0 "Liberté, Égalité, Fraternité"
 liberty_egalite_fraternity_desc:0 "Tous les hommes étant égaux, conformément aux lois nouvelles, les autres religions sont autorisées à participer pleinement à la vie du pays et contribuent ainsi au progrès de la nation."
 liberty_heroes:0 "Héros de la liberté"
 liberty_heroes_desc:0 "De nombreux dirigeants des guerres d'indépendance du Nouveau Monde possédaient non seulement les compétences militaires, mais aussi le charisme requis pour maintenir le moral et la cohésion des troupes, tout en représentant une source d'inspiration pour le peuple."
 library_advance:0 "Bibliothèque"
 library_advance_desc:0 "$library_desc$"
 lie_athens_north:0 "L'Athènes du Nord"
 lie_athens_north_desc:0 "Depuis des siècles, Liège est un centre culturel qui a formé certains des érudits les plus instruits de la région et fait l'envie de ses rivaux. Nos institutions ne devraient jamais cesser de s'améliorer."
 lie_devoted_land:0 "Une terre dévouée"
 lie_devoted_land_desc:0 "Comme notre peuple fait partie de l'un des plus grands diocèses de la région, sa dévotion ne fait aucun doute. Nous montrerons au monde que notre foi en Dieu est aussi forte que notre foi en notre nation."
 lie_inspiring_mecenas:0 "Un mécène inspirant"
 lie_inspiring_mecenas_desc:0 "Notre terre est une source d'inspiration pour de nombreux artistes qui viennent sur nos terres travailler sur leurs œuvres. L'argent tiré de nos arches ne manquera jamais de nourrir nos artistes et d'en attirer de nouveaux."
 life_among_infidels:0 "La vie parmi les infidèles"
 life_among_infidels_desc:0 "Les terres de notre foi ont souvent été entachées par la présence d'infidèles, mais nos prédicateurs se sont aventurés vers l'inconnu pour faire briller la lumière de Jésus dans des contrées lointaines. Nous avons ainsi influencé ces infidèles de bien des manières, même si nous ne sommes pas parvenus à leur prouver que leurs croyances sont erronées."
 lijia_system:0 "Système Lǐ jiǎ"
 lijia_system_desc:0 "Dans le cadre du système Lǐ Jiǎ, nous sommes en mesure d'opérer et d'exercer notre contrôle sur nos zones frontalières, grâce à l'affectation d'armées sédentaires. En accordant des droits fonciers et agricoles à nos troupes stationnées, nos frontières seront sûres et notre contrôle montera en flèche."
 line_infantry:0 "Infanterie de ligne"
 line_infantry_desc:0 "Avec l'apparition de la baïonnette, chaque mousquetaire était désormais en mesure de combattre aussi comme un piquier. Cela permit de retirer la pique de l'équipement du fantassin, tout en offrant à l'infanterie la puissance des armes à feu."
 link_the_steppes_trade:0 "Relier le commerce des steppes"
 link_the_steppes_trade_desc:0 "Située entre steppe et forêt, Smolensk a toujours été un carrefour, tant pour la guerre que pour le commerce. En améliorant les infrastructures terrestres et en assurant la sécurité des caravanes, nous pouvons réaffirmer notre rôle de charnière vitale entre la Ruthénie septentrionale, la Baltique et les routes commerciales méridionales de la steppe."
 linked_armies_advance:0 "Relais de messagerie"
 linked_armies_advance_desc:0 "La coordination entre les différentes unités d'une armée est cruciale. Disposer d'un système efficace de relais des messages entre nos généraux et les chefs d'unités permettra à l'ensemble de nos troupes de combattre de manière plus cohérente et de réagir plus rapidement à n'importe quelle situation."
 lithuanian_renaissance:0 "Renaissance lituanienne"
 lithuanian_renaissance_desc:0 "La Lituanie connaît une Renaissance à la fin du XVe et au début du XVIe siècles. Inspirée par les idées de la Réforme et l'influence italienne, cette période connaît une floraison de l'éducation, des arts, de l'architecture et de la littérature. C'est alors qu'apparaît pour la première fois le lituanien écrit, et que sont rédigées les premières œuvres littéraires dans cette langue."
 LIV_a_order_knights_2:0 "Bannerets de l'Ordre de Livonie"
 LIV_a_order_knights_2_desc:0 "Les chevaliers de notre ordre ont maintes fois prouvé leur vaillance et leur habileté au combat. En promouvant les plus compétents d'entre eux au rang de bannerets, nous nous assurons que nos armées seront toujours dirigées par les meilleurs."
 llama_farming:0 "Élevage de lamas"
 llama_farming_desc:0 "Les nombreux troupeaux de lamas de nos territoires nous fournissent la laine pour nous habiller, la viande pour nous nourrir, et peuvent porter nos charges dans les montagnes. Ils sont donc pour nous d'une valeur inestimable."
 llama_michis:0 "Llama-michis"
 llama_michis_desc:0 "Les lamas ont différents usages au sein de notre société : bêtes de somme, sacrifices aux dieux, source de viande, de laine et d'excréments utilisés comme engrais. Leur élevage et leur usage sont contrôlés par les michis, les gardiens de lamas, ce qui nous permet de bien suivre l'évolution de leur nombre et d'accroître leur population."
 local_governor_advance:0 "$local_governor$"
 local_governor_advance_desc:0 "$local_governor_desc$"
 local_merchant_preference:0 "Priorité aux marchands locaux"
 local_merchant_preference_desc:0 "En théorie, un marchand peut être citoyen du monde, entrant et sortant des ports comme il l'entend. Nous devons pourtant offrir des avantages à nos propres marchands, par exemple en leur accordant la priorité pour charger et décharger leurs marchandises, afin qu'ils aient toutes les raisons de ramener leurs produits chez nous."
 local_nobility:0 "Noblesse locale"
 local_nobility_desc:0 "La noblesse sait qu'elle est tout simplement supérieure au peuple, et elle accorde sa loyauté à ceux qui s'en montrent dignes. Confirmer ses privilèges est la garantie qu'elle garde souvenir de notre générosité et qu'elle sera moins sensible aux sollicitations des puissances étrangères."
 local_smelters_advance:0 "$local_smelters$"
 local_smelters_advance_desc:0 "$local_smelters_desc$"
 local_traditions:0 "Traditions locales"
 local_traditions_desc:0 "Gouverner un territoire étendu implique de gouverner des peuples très divers et nombreux, chacun disposant de ses propres us et coutumes. En incorporant ces mœurs dans notre code de loi, nous pouvons les rendre heureux et loyaux."
 logistics_of_khan:0 "La logistique du $rank_kingdom_horde_ruler_suffix_male$"
 logistics_of_khan_desc:0 "On oublie souvent que les conquêtes du Grand $rank_kingdom_horde_ruler_suffix_male$ dépendaient tout autant d'une logistique supérieure que de sa puissance militaire. Nous devons reproduire les méthodes du Grand $rank_kingdom_horde_ruler_suffix_male$, tout en les adaptant à notre époque, afin de réaliser des conquêtes de plus grande ampleur encore."
 long_rifle:0 "Chasse au fusil long"
 long_rifle_desc:0 "Avec des fusils longs spécialement fabriqués pour la chasse, nos chasseurs disposeront d'un outil fiable pour obtenir à la fois du gibier et des fourrures."
 lor_between_great_powers:0 "Héritage des anciens rois"
 lor_between_great_powers_desc:0 "Nos terres firent jadis partie intégrante de la Lotharingie, l'un des royaumes francs. Si nous ne voulons pas sombrer dans l'oubli, nous devrons consolider notre position diplomatique et nouer des alliances durables."
 lor_cultural_diversity:0 "Multiculturalisme"
 lor_cultural_diversity_desc:0 "Notre territoire se trouve à la confluence de plusieurs cultures. Établir un État capable de gouverner ces peuples avec équité ne sera pas chose aisée, mais ce défi doit être surmonté. Seul ce projet nous permettra de nous montrer dignes de l'État lorrain dont nous sommes les héritiers."
 lor_fortified_cities:0 "Cités fortifiées de Lorraine"
 lor_fortified_cities_desc:0 "Nous occupons des points de passage stratégiques sur plusieurs fleuves, qu'il nous faudra défendre coûte que coûte pour préserver notre indépendance. À cette fin, nous devons moderniser les grands châteaux-ponts de nos villes et ériger de puissantes citadelles."
 lor_mining_tradition:0 "Mines de Lorraine"
 lor_mining_tradition_desc:0 "Nos terres regorgent de minerais et de charbon, ressources que nous pourrons exploiter à notre profit. Leur extraction pourrait faire de nous un pays prospère et jeter les bases de nos ambitions."
 lor_three_bishoprics:0 "Terre des évêques"
 lor_three_bishoprics_desc:0 "La Lorraine abrite de nombreux évêchés, dont les soutiens influents s'étendent au-delà de nos frontières et au sein même de l'Église. Une coopération avec eux sera un atout précieux pour faire entendre notre voix au sein de l'Église et faciliter, grâce à leur appui, la pacification de notre population."
 lords_of_the_rhone_corridor:0 "Seigneurs du couloir rhodanien"
 lords_of_the_rhone_corridor_desc:0 "La vallée du Rhône a toujours été l'artère essentielle de notre pouvoir, et nos châteaux veillent sur elle telles des sentinelles de pierre. Ces fortifications surveillant à jamais notre domaine figurent parmi les plus solides de toute l'Europe, signe indéniable de notre génie militaire et de notre savoir-faire en ingénierie."
 lowered_power_of_barons:0 "Pouvoir des barons amoindri"
 lowered_power_of_barons_desc:0 "Les arts et la culture sont certes de première importance, mais si nous voulons conserver notre indépendance, il nous faut de l'argent. Il est donc nécessaire de briser le pouvoir de la petite noblesse et de nous assurer que le pouvoir central dispose de plus de revenus."
 lub_hanseatic_coins:0 "Wendischer Münzverein"
 lub_hanseatic_coins_desc:0 "Nouvelle organisation fondée entre des villes puissamment ancrées dans la Ligue hanséatique, l'Union monétaire de Wende nous offrira une base solide pour faciliter le commerce et les échanges dans nos contrées."
 lumber_improvements_absolutism:0 "Scieries à vent"
 lumber_improvements_absolutism_desc:0 "La construction de moulins à vent pour alimenter nos scieries nous permet de transformer le bois en planches encore plus vite qu'avant."
 lumber_improvements_discovery:0 "Foresterie dévouée"
 lumber_improvements_discovery_desc:0 "En réservant certaines parties de nos terres à la plantation et à l'entretien d'arbres robustes, nous pouvons augmenter la qualité et la quantité de nos scieries."
 lumber_improvements_reformation:0 "Lames de scie améliorées"
 lumber_improvements_reformation_desc:0 "Grâce aux avancées dans la fabrication des outils, les lames de nos scies sont plus robustes que jamais tout en nécessitant moins d'entretien. Cela garantira un approvisionnement régulier en bois dont notre économie a besoin."
 lux_destined_rule:0 "Voué à régner"
 lux_destined_rule_desc:0 "La grande dynastie luxembourgeoise a pris le nom de notre grande nation et est aujourd'hui la famille la plus importante d'Europe. Il doit s'agir d'un signe du ciel et nous utiliserons ce don divin pour étendre encore notre influence."
 lux_fortress_europe:0 "La forteresse d'Europe"
 lux_fortress_europe_desc:0 "La position imprenable de la ville de Luxembourg, avec la formation du Bock comme forteresse naturelle, nous confère un grand avantage. Nos ennemis périront en tentant de prendre nos positions. Nous devons nous inspirer de la nature et faire en sorte que toutes nos forteresses utilisent les formations terrestres à leur avantage."
 lux_heirs_john_blind:0 "Héritiers de Jean l'Aveugle"
 lux_heirs_john_blind_desc:0 "Jean l'Aveugle, roi de Bohême et comte de Luxembourg, est né dans notre humble royaume et mort lors de la bataille de Crécy à l'âge de 50 ans, après avoir chargé au combat malgré son aveuglement : une mort honorable et courageuse, qui inspirera nos troupes durant des siècles. C'est un vrai héros du peuple."
 lva_baltic_forestry:0 "Foresterie balte"
 lva_baltic_forestry_desc:0 "Nos forêts représentent une ressource vitale, fournissant du bois pour la construction et du combustible pour nos feux. Nous devons les gérer judicieusement afin d'en assurer un approvisionnement constant."
 lva_baltic_forts:0 "Forts baltes"
 lva_baltic_forts_desc:0 "Notre réseau de forts et de châteaux disséminés à travers le paysage constitue une première ligne de défense contre les envahisseurs. Ces bastions nous permettent de surveiller et de contrôler les routes stratégiques de la Baltique."
 maghrebi_administration:0 "Administration du Maghreb"
 maghrebi_administration_desc:0 "Des siècles d'autonomie et la rudesse de notre environnement ont fait naître des tendances autonomistes à l'intérieur de nos frontières. Si nous voulons établir une présence solide dans la région, nous devons faire savoir à chaque tribu à l'intérieur de nos frontières qui est son maître."
 magna_carta_advance:0 "$magna_carta_reform$"
 magna_carta_advance_desc:0 "$magna_carta_reform_desc$"
 mahabarata:0 "Mahābhārata"
 mahabarata_desc:0 "L'un des deux principaux textes de la $smrti$ avec le $ramayana$, le $mahabarata$ est une épopée portant sur l'$india$ antique. Il s'agit du plus long poème jamais écrit, faisant environ 10 fois la taille de #italic L'Illiade#! et de #italic L'Odyssée#! #L $greek_language$ques#! réunies. Cette œuvre relate la lutte dynastique pour le trône de l'ancien royaume indien de Kuru, engendrant ainsi la bataille de Kurukshetra, également appelée Guerre de $mahabarata$. L'histoire se termine par la mort de $krishna_avatar$ et la fin de sa dynastie."
 mai_center_of_printing:0 "Imprimeries de Mayence"
 mai_center_of_printing_desc:0 "Notre position nous permet de capitaliser sur l'essor des presses à imprimer dans notre pays et d'en faire un pôle majeur de production de livres en Europe."
 mai_city_and_archbishop:0 "Droits de la ville"
 mai_city_and_archbishop_desc:0 "Les habitants de Mayence ont prospéré grâce aux privilèges étendus que leur octroya Adalbert en 1119 et 1122. Gravés dans la porte de bronze de la cathédrale, ces droits rappellent l'alliance entre le clergé et la bourgeoisie, un équilibre qu'il nous appartient de perpétuer."
 mai_diadema_regni:0 "Diadema Regni"
 mai_diadema_regni_desc:0 "Notre cité bien-aimée, qualifiée de Couronne de l'Empire, se doit de porter ce titre avec éclat. Préserver le rang de Mayence au sein de l'Empire nous assurera une influence et un prestige sans égal."
 mai_garrison_of_the_rhine:0 "Ville de garnison du Rhin"
 mai_garrison_of_the_rhine_desc:0 "Défendre nos frontières contre les menaces s'avère ardu, d'autant que le fleuve divise nos terres en deux. Il nous faut établir un réseau dense de garnisons et de fortifications capable de résister à nos ennemis."
 mai_leader_rheinish_league:0 "Ligue rhénane"
 mai_leader_rheinish_league_desc:0 "Tant que la Ligue rhénane a existé, nous en avons naturellement assumé la direction et guidé ses membres. Bien que cette alliance ait été dissoute, notre rôle d'autorité et de guide auprès des États mineurs voisins ne peut disparaître."
 mai_mainz_kingdom:0 "Mainzer Königreich"
 mai_mainz_kingdom_desc:0 "Si les célébrations du mercredi des cendres sont monnaie courante, elles sont particulièrement enracinées dans notre pays. Alors que le peuple célèbre la #italic Fastnacht#!, ou carnaval, avec des déguisements et des festins, notre cour participera à un événement particulier : lors des célébrations du carnaval, nous redistribuerons les rôles de notre cour par tirage au sort, même le souverain devant y participer. Cette coutume d'échange des rôles, appelée #italic Mainzer Königreich#!, dépassera largement nos frontières et garantira notre héritage culturel."
 mai_vicar_of_mainz:0 "Gouvernance du vicaire"
 mai_vicar_of_mainz_desc:0 "Pour garantir une gouvernance fiable de nos terres, même en l'absence de notre dirigeant, il convient d'instaurer un vicaire. Doté de pouvoirs étendus, celui-ci gouvernera selon notre volonté et rappellera en permanence notre autorité au peuple."
 mai_zealous_fight_against_heretics:0 "Protection de notre foi"
 mai_zealous_fight_against_heretics_desc:0 "L'unité religieuse de notre pays doit être défendue contre toute menace. En intégrant des prêtres au sein de nos armées pour en guider le sens moral, nos soldats seront bien plus déterminés à défendre nos croyances."
 maitreya:0 "Maitreya"
 maitreya_desc:0 "$maitreya$ est un $bodhisattva$ appelé à devenir le bouddha du futur et le dernier de notre cycle cosmique. Destiné à rétablir les enseignements du dharma à travers le monde lorsque l'humanité les aura oubliés, il est le successeur de Siddhārtha Gautama."
 maj_bajang_ratu:0 "La porte de $bajang_ratu$"
 maj_bajang_ratu_desc:0 "$bajang_ratu_desc$"
 maj_bubu_and_jala:0 "Bubu et Jala"
 maj_bubu_and_jala_desc:0 "$bubu_building_desc$"
 maj_home_of_the_sea_nomads:0 "Demeure des nomades de la mer"
 maj_home_of_the_sea_nomads_desc:0 "$n_kabang_desc$"
 maj_island_colonies:0 "Colonies insulaires"
 maj_island_colonies_desc:0 "Nos contacts avec de nombreux voisins dans l'archipel ont fait naître l'idée de nous emparer des ressources et des terres inoccupées, qui seront sûres et prospéreront sous notre houlette."
 maj_jong_advance:0 "$n_jong$"
 maj_jong_advance_desc:0 "$n_jong_desc$"
 maj_late_karambit_warriors:0 "$a_late_karambit_warrior$"
 maj_late_karambit_warriors_desc:0 "$a_late_karambit_warrior_desc$"
 maj_maritime_silk_road:0 "Route de la soie maritime"
 maj_maritime_silk_road_desc:0 "Notre position géographique, associée à notre influence croissante, nous a permis de présider au destin du vaste et profitable réseau commercial qui achemine la $silk$ et les épices de l'Orient vers l'Occident."
 maj_preservation_of_javanese_history:0 "Préservation de l'histoire $javanese_culture$e"
 maj_preservation_of_javanese_history_desc:0 "La richesse et l'histoire du peuple $javanese_culture$ font partie intégrante de notre identité culturelle. Afin de protéger notre existence, nous devons préserver ces traditions sur lesquelles nous avons bâti une grande nation."
 maj_restore_candi_shrines:0 "Restauration des sanctuaires candi"
 maj_restore_candi_shrines_desc:0 "Dispersés sur tout le Nusantara se trouvent des temples appelés « candi ». Nous devrions les restaurer partout où nous en trouvons pour revigorer la foi au sein du peuple."
 maj_sumpah_palapa:0 "Sumpah Palapa"
 maj_sumpah_palapa_desc:0 "Le chef de notre armée, sous les ordres directs de notre dirigeant, détient une grande influence et un grand pouvoir et façonne l'histoire de notre peuple. Pour s'assurer de son efficacité et confirmer qu'il comprend l'importance d'une telle position, un serment sera exigé de sa part, un serment qui souligne nos rêves de conquête et fortifie nos esprits."
 maj_the_ghali:0 "$n_madurese_gali$"
 maj_the_ghali_desc:0 "$n_madurese_gali_desc$"
 maj_the_magic_arrow:0 "La flèche magique"
 maj_the_magic_arrow_desc:0 "$a_cetbang_cannon_desc$"
 makaron_nisoi_advance:0 "Récits des îles Fortunées"
 makaron_nisoi_advance_desc:0 "Les Makaron Nesoi, les « îles Fortunées », sont considérées comme la destination ultime des âmes les plus vertueuses. Ceux qui mènent une vie de piété et d'excellence peuvent mériter leur place parmi les esprits héroïques dans les champs Élyséens. Les récits de ces royaumes sacrés inspirent la quête de la vertu, de l'honneur et de l'excellence morale à travers toute la société."
 malay_merchants_in_every_port:0 "Marchands malais dans chaque port"
 malay_merchants_in_every_port_desc:0 "Des bazars d'$arabia_region$ aux ports d'$east_asia$, nos marchands font partie intégrante de notre environnement. Leur présence forme un vaste réseau de coopération, facilitant l'établissement de nos enclaves à l'étranger et étendant notre influence à tous les grands entrepôts du monde."
 malian_military_tactics:0 "Tactiques militaires maliennes"
 malian_military_tactics_desc:0 "Au cours de notre vie en tant que sujets de l'empire du Mali, notre peuple a beaucoup appris de leur commandement et de leurs tactiques de bataille. Leurs connaissances aideront notre infanterie dans les batailles à venir."
 manchu_reborn:0 "Renaissance mandchoue"
 manchu_reborn_desc:0 "Notre nation a subi de profondes transformations en son sein, et il en va de même pour notre armée. Le monde s'ouvre davantage à nous et de nouveaux défis se profilent à l'horizon. Si nous voulons survivre, nous devons être prêts à agir."
 manchu_script:0 "Écriture mandchoue"
 manchu_script_desc:0 "L'alphabet mandchou est né de la combinaison des caractères mongols classiques et de la phonétique jürchen. Ce système unique facilite l'écriture en colonne verticale de gauche à droite. Grâce à la diversité des formes de lettres et à l'adaptabilité contextuelle pour les positions initiales, médianes, finales et isolées, il préserve les nuances linguistiques de notre langue."
 mandate_of_the_khan:0 "Mandat du $rank_kingdom_horde_ruler_suffix_male$"
 mandate_of_the_khan_desc:0 "Quand le $rank_kingdom_horde_ruler_suffix_male$ ordonne, les dieux obéissent. L'unité de notre peuple vient de la loyauté que nous témoignons à notre dirigeant suprême. Seul un homme capable de faire plier ceux qui courbent l'échine devant la Couronne est digne de notre dévotion."
 mandekalu_levies:0 "Levées de Mandekalu"
 mandekalu_levies_desc:0 "Les $mandekalu_levies$ sont le pilier de l'armée malienne. Les hommes libres de l'empire sont appelés à prendre les armes en temps de guerre, et c'est là un grand honneur pour eux de participer à ces batailles avec leurs propres armes."
 mandinka_warrior_spirit:0 "Esprit guerrier mandingue"
 mandinka_warrior_spirit_desc:0 "Païens ou musulmans, peu importe : les Mandingues sont les meilleurs guerriers que le Sahel ait jamais pu contempler. Nos troupes forcent l'admiration par leur courage et leur fierté, et lorsque le Mansa lève une armée, elle n'est pas seulement la plus nombreuse de tout le Sahel, mais aussi la meilleure."
 manufactories_advance:0 "Manufactures"
 manufactories_advance_desc:0 "Les récentes avancées technologiques et la mécanisation ont favorisé l'essor d'installations de production concentrées sous forme de manufactures. Il en résulte une amélioration du rythme et de la quantité de production qui permet d'obtenir des bénéfices plus importants."
 manufacturing_center:0 "Cœur manufacturier de l'empire"
 manufacturing_center_desc:0 "Notre population est la base de la puissance commerciale de notre suzerain. Lorsque les marchandises étrangères nous sont livrées, c'est nous qui les transformons pour en faire des produits finis."
 maori_ceremonial_haka_advance:0 "Haka cérémoniel"
 maori_ceremonial_haka_advance_desc:0 "Le sol tremble tandis que nos guerriers effectuent le #italic haka#!, leurs cris féroces et leurs mouvements synchronisés résonnant sur le champ de bataille. Cette danse intimidante enhardit tous les guerriers, conférant un surcroît de moral aux forces terrestres."
 maori_he_whakaputanga_advance:0 "He whakaputanga"
 maori_he_whakaputanga_advance_desc:0 "La « Déclaration d'indépendance de la Nouvelle-Zélande » est un document qui établit une fois pour toutes un État māori unifié et indépendant. Avec des termes compris par tout le monde, nos chefs peuvent enfin s'unir et se libérer des influences étrangères."
 maori_rua_kumara_advance:0 "Rua kūmara"
 maori_rua_kumara_advance_desc:0 "En perfectionnant l'art de la culture et du stockage des tubercules de #italic kūmara#! dans des #italic rua#! (fosses) construites à cet effet, nous pouvons veiller à ce que nos ventres soient pleins même lors du plus dur des hivers."
 maori_ta_moko_advance:0 "Tā moko"
 maori_ta_moko_advance_desc:0 "Avec les courbes et les spirales complexes du #italic tā moko#!, nous imprégnons chaque pigment dans notre peau de façon rituelle, ce qui transforme nos corps en fresques vivantes d'honneur et d'histoire."
 maori_te_reo_advance:0 "Te reo"
 maori_te_reo_advance_desc:0 "Nous savons qu'en préservant et en nourrissant le #italic te reo#!, notre langue sacrée, nous conservons une relation dynamique avec notre culture et nos traditions."
 maori_whakapapa_advance:0 "Whakapapa"
 maori_whakapapa_advance_desc:0 "La force et l'unité viennent de la connaissance de sa #italic whakapapa#!, le fin réseau de connexions généalogiques qui constitue un #italic iwi#!. Cette compréhension profonde de la lignée collective permet de créer un front uni capable de faire face à toutes les adversités."
 maple_syrup:0 "Sirop d'érable"
 maple_syrup_desc:0 "Les nombreux érables du pays sont riches en sève, qui peut être collectée et bouillie puis traitée pour en faire un sirop délicieux, ainsi que du sucre."
 mapmaking:0 "Cartographie"
 mapmaking_desc:0 "Illustrer des lieux sur du papier ou du parchemin est plus qu'un simple procédé artistique : c'est une façon de consigner des informations pour un usage stratégique. À travers la connaissance cartographique, nous pourrons non seulement mieux coordonner nos attaques, mais aussi mieux appréhender notre propre territoire. Comme le disent les anciens : le savoir, c'est le pouvoir."
 march_to_the_sound_of_the_guns_advance:0 "$march_to_sound_of_guns$"
 march_to_the_sound_of_the_guns_advance_desc:0 "Avec la croissance constante de notre armée, l'assouplissement des exigences en matière de logistique devient plus important que jamais. Ordonner à nos généraux de disperser leurs troupes et de les regrouper sur le champ de bataille une fois que les combats auront éclaté nous sera très bénéfique."
 marcher_lords:0 "Marches militaires"
 marcher_lords_desc:0 "Si nous accordons une autonomie importante aux vassaux des régions frontalières, les seigneurs de ces marches militaires seront capables de lever des troupes nombreuses en cas de guerre, lorsqu'il nous faudra trouver du soutien."
 margrave_council:0 "Conseil du margrave"
 margrave_council_desc:0 "Les pouvoirs du margrave sont grandement menacés par la puissance croissante de nos ordres. Ceux-ci constituent un grand avantage pour le pays, mais ils imposent la création d'un nouveau conseil, afin de les limiter à un pouvoir de conseil. De ce fait, nous pourrons continuer de jouir de leurs avis sans avoir à nous soucier de répondre à leurs exigences."
 marian_devotion:0 "Dévotion à la Sainte Vierge"
 marian_devotion_desc:0 "Notre dévotion à la Sainte Vierge doit rester un pilier central de notre culte."
 marine_regiments:0 "Régiments de fusiliers marins"
 marine_regiments_desc:0 "Les fusiliers marins sont spécialisés dans les opérations amphibies. Ils effectuent des raids sur les côtes et arraisonnent les navires ennemis, mais ils participent aussi aux batailles terrestres."
 maritime_advance_age_2:0 "Flottes marchandes"
 maritime_advance_age_2_desc:0 "À mesure que le commerce se développe, il devient indispensable de pouvoir transporter plus rapidement et plus efficacement de plus grandes quantités de marchandises. C'est pourquoi ceux qui investissent dans le commerce maritime ne lésinent pas sur les moyens pour se doter d'une flotte plus importante."
 maritime_advance_age_3:0 "Flottes d'exploration"
 maritime_advance_age_3_desc:0 "Au fur et à mesure que la connaissance du monde et des nouvelles terres s'étend, la soif d'en savoir encore davantage s'intensifie. Des mers lointaines de l'est aux nouvelles côtes de l'ouest, le nombre de vagues sur lesquelles voguer s'est multiplié. Il est donc nécessaire de disposer d'une flotte plus importante pour les parcourir."
 maritime_advance_age_4:0 "Flottes mondiales"
 maritime_advance_age_4_desc:0 "Avec les récentes découvertes de territoires de ces derniers siècles, le monde semble avoir rétréci plutôt que l'inverse. Des pays qui n'avaient auparavant aucun contact avec l'extérieur entretiennent désormais des relations diplomatiques et commerciales constantes. Par conséquent, des flottes plus importantes et plus performantes sont nécessaires pour maintenir toutes ces relations outre-mer."
 maritime_advance_age_5:0 "Convois"
 maritime_advance_age_5_desc:0 "À mesure que le commerce maritime se développe, transportant de part et d'autre des marchandises provenant de contrées plus éloignées et en plus grande quantité, le besoin d'instaurer un flux plus constant se fait sentir. L'organisation de flottes de convois commerciaux permet d'assurer une circulation stable des navires de commerce."
 maritime_advance_age_6:0 "Convois armés"
 maritime_advance_age_6_desc:0 "Les convois commerciaux sont évidemment des cibles particulièrement juteuses pour les pirates. Les navires qui regorgent de marchandises et de pièces de monnaie représentent un butin que peu de personnes laisseront passer. Il est donc essentiel de doter ces convois commerciaux d'un armement de défense afin de décourager ces attaques. Le fait que les flottes commerciales soient accompagnées de frégates ou de tout autre navire armé permet de garantir leur sécurité."
 maritime_decay_advance_disc:0 "Itinéraires établis"
 maritime_decay_advance_disc_desc:0 "Les mers sont constamment parcourues par les marchands qui cherchent les meilleurs profits. Cette situation évolue naturellement en l'établissement de certaines routes, plus fréquentées que d'autres, les plus populaires consistant en un flux continu de bateaux."
 markets_for_salt:0 "Marchés du sel"
 markets_for_salt_desc:0 "Dans notre pays, le sel vaut son pesant d'or. Au sud, dans les immenses forêts des Ashantis et des Yorubas, il vaut bien plus encore. Par chance, nous possédons nos propres sources de sel, et suffisamment d'or pour nous en procurer de manière illimitée. Peut-être pourrions-nous trouver d'autres communautés pour lesquelles le sel est un bien des plus précieux ?"
 marmorina:0 "Marmorina"
 marmorina_desc:0 "En temps de paix, Vérone s'épanouit sous l'égide de souverains qui apprécient autant la beauté que le pouvoir. La ville gagnera le nom de « Marmorina » pour la profusion de ses marbres romains, sa statuaire et son architecture gracieuse. Un nouveau pont sur l'Adige, le Ponte Navi, constitue un exploit d'ingénierie, tandis que la tour Gardello, première horloge hydraulique d'Italie, marque les heures d'une ville en pleine ascension. Ce raffinement façonnera sans aucun doute l'aspect de notre cité, mais placera également son nom dans les livres d'histoire."
 martyrs:0 "Martyrs"
 martyrs_desc:0 "Le martyr est celui qui comprend que mourir au nom de son dieu est le plus grand honneur qui soit. Notre peuple conserve sa foi dans son cœur, toujours prêt à lutter pour la cause divine."
 mass_army:0 "Armée de masse"
 mass_army_desc:0 "Nous avons, jusqu'à maintenant, choisi les soldats du rang avec beaucoup d'attention, en ne prenant que les plus pauvres et les plus désespérés : ceux qui ne manqueraient à personne, pour parler franchement. Désormais, les rangs seront ouverts à tous. Enfin, pas aux riches, quand même."
 massed_battery:0 "Canons rassemblés"
 massed_battery_desc:0 "Rassemblons nos canons en batteries : leur pouvoir de destruction sera alors tel que les lignes ennemies s'en trouveront percées et coupées."
 masters_of_spice:0 "Maîtres des épices"
 masters_of_spice_desc:0 "Le commerce des clous de girofle est une source de richesse considérable pour nous et notre peuple. En contrôlant les terres et les mers d'où proviennent ces épices, nous serons au cœur d'un commerce amené à s'étendre à travers le monde, et aucun marchand ne peut ignorer l'attrait de ces biens."
 masters_of_the_nile:0 "Maîtres du Nil"
 masters_of_the_nile_desc:0 "Le Nil représente le fondement de notre sultanat. Parcourant nos terres les plus fertiles, les eaux salvatrices de ce fleuve apportent prospérité et richesse à notre domaine tout entier."
 matchlock_gun:0 "Fusils de chasse primitifs"
 matchlock_gun_desc:0 "Les améliorations apportées aux armes produites par nos armuriers fourniront également à nos chasseurs de meilleurs outils pour rapporter d'abondantes fourrures et gibiers."
 matsuri:0 "Matsuri"
 matsuri_desc:0 "Chaque sanctuaire, chaque temple a ses propres fêtes et célébrations. La population locale est toujours désireuse d'y participer, car c'est une opportunité pour elle d'offrir sa dévotion et sa gratitude à son kami protecteur."
 maurician_infantry:0 "Infanterie mauricienne"
 maurician_infantry_desc:0 "La largeur et la profondeur du carré espagnol lui conféraient une grande capacité de résistance, mais ralentissaient et complexifiaient la manœuvre sur le champ de bataille, tout en rendant inutile une bonne partie des hommes de la formation durant l'essentiel du combat. Maurice de Nassau, stathouder des Provinces-Unies, réduisit donc les effectifs de ces formations en diminuant leur profondeur, afin de les rendre plus mobiles tout en conservant les mêmes capacités de feu et de choc."
 measuring_the_world:0 "Arpentage du monde"
 measuring_the_world_desc:0 "Les sciences nouvelles nous offrent les moyens de décrire et de mesurer le monde qui nous entoure. Envoyons des savants parcourir le vaste monde, et plus particulièrement notre pays : comment savoir de quelles ressources nous disposons tant que nous n'aurons pas cherché à recenser de façon systématique tous les minéraux, dénombré tous les sujets et évalué les revenus de toutes les entreprises ?"
 medical_school_advance:0 "Écoles de médecine"
 medical_school_advance_desc:0 "Les écoles de médecine, centres spécialisés dans la formation de soigneurs, permettent aux lettrés d'en apprendre plus sur le corps humain, ses maladies ainsi que les différentes méthodes de prévention et de traitement."
 medici_porcelain:0 "Porcelaine Médicis"
 medici_porcelain_desc:0 "Au cours des dernières décennies, de nombreuses tentatives ont été effectuées pour reproduire les propriétés de la porcelaine véritable, considérée comme un produit exotique venu d'Extrême-Orient. Avec l'expérience des maîtres et les connaissances des scientifiques, nous sommes assurés de produire de la porcelaine de grande qualité."
 medicinal_infusions:0 "Infusions médicinales"
 medicinal_infusions_desc:0 "Les propriétés médicinales des plantes ont aidé notre peuple à supporter bien des maladies au cours des siècles, et l'on dit même que certaines infusions permettent de rallonger nos jours."
 medieval_military:0 "Armée médiévale"
 medieval_military_desc:0 "À la fin du Moyen Âge, les armées terrestres s'étaient professionnalisées et avaient amélioré leurs capacités d'organisation. Ces progrès permettaient de soutenir un ensemble composé de levées et de soldats de métier qui dominaient désormais les champs de bataille, alors que la puissance de l'infanterie, lentement mais sûrement, menaçait de déborder la cavalerie."
 mehmed_beys_firman:0 "Firman de Mehmet Bey"
 mehmed_beys_firman_desc:0 "Meḥmed Ier promulgua un décret instaurant le turc comme seule langue des tribunaux, des couvents de derviches, des assemblées et des places publiques. Cet acte rejeta la domination du persan et de l'arabe dans les cercles dirigeants et jeta les bases d'une politique culturelle résolument turkmène."
 meissen_lion:0 "Le lion de Misnie"
 meissen_lion_desc:0 "Le lion de Misnie, aussi connu sous le nom de Markmeißnische Löwe, occupe une place particulière dans les armoiries : d'or, au lion de sable, armé et lampassé de gueules, il symbolise la puissance de la dynastie Wettin. Représenté notamment sur les pierres tombales peintes, étendards, casques, pièces et sceaux, il évoque l'affiliation de la cité de Misnie au margraviat éponyme. Certains érudits le rattachent au lion thuringien recoloré."
 meissner_groschen:0 "Gros de Misnie"
 meissner_groschen_desc:0 "Le Meißner Groschen sera la devise régionale de notre nation. Cette pièce est basée sur le gros de Prague, que nous allons remplacer. Elle marquera le début d'une ère nouvelle dans l'histoire de notre monnaie et nous permettra de bien mieux contrôler ses flux."
 meissner_porcelain:0 "Porcelaine de Misnie"
 meissner_porcelain_desc:0 "La Saxe est le premier pays européen à avoir produit de la porcelaine. Cela garantit à la cour des Wettin richesse et prestige."
 melaka_tree:0 "Arbre de Malacca"
 melaka_tree_desc:0 "Selon la légende, le timide chevrotain aurait trouvé refuge dans ce qui allait devenir plus tard notre domaine. Nos débuts furent modestes, puisqu'il ne s'agissait alors que d'un petit village de pêcheurs situé à l'ombre des arbres de Malacca. De ces racines allait naître un peuple qui allait un jour façonner toute la région."
 men_of_letters_advance:0 "Hommes de lettres"
 men_of_letters_advance_desc:0 "Ce n'est un secret pour personne que l'Occident envie nos réalisations littéraires et notre passé érudit. C'est pourquoi il cherche à embaucher des tuteurs de notre cour, désireux de se plonger dans les connaissances qui ont donné naissance à de puissants empires et façonné le paysage culturel de tout le continent. C'est grâce à ces hommes de lettres que nos voisins occidentaux pourront s'éprendre de notre histoire et s'instruire de nos coutumes."
 mendicant_orders:0 "Ordres mendiants"
 mendicant_orders_desc:0 "Les ordres de notre foi, qui ont juré de mener une vie de pauvreté et d'itinérance, prêtent main-forte à de nombreuses régions de notre pays. Nous devrions soutenir leurs efforts autant que possible sans toutefois compromettre leurs vœux."
 mercantile_spirit:0 "Esprit mercantile"
 mercantile_spirit_desc:0 "Le royaume de Naples, inspiré par l'influence maritime républicaine d'Amalfi, dispose d'un paysage commercial dynamique. Les ports stratégiques, dont Naples elle-même, représentaient des centres cruciaux : ils reliaient le royaume aux territoires lointains et favorisaient la prospérité économique grâce aux échanges de biens et d'idées."
 mercenaries_reformation_advance:0 "Garantie du paiement aux mercenaires"
 mercenaries_reformation_advance_desc:0 "Il est bien connu que les mercenaires ne sont motivés que par l'argent. En leur promettant des salaires équitables et une juste part du butin, nous pouvons renforcer nos liens avec eux et nous assurer la coopération de plus vastes compagnies."
 merchant_adventures:0 "Aventures commerciales"
 merchant_adventures_desc:0 "De nombreux marchands, désireux d'acquérir célébrité et fortune, sont prêts à offrir leurs services pour l'exploration de nouvelles routes commerciales. Profitons-en !"
 merchant_marine:0 "Marine marchande"
 merchant_marine_desc:0 "Que chaque navire marchand arbore fièrement notre pavillon marchand et sache que notre marine sera toujours là pour le protéger en cas de besoin."
 merchant_officials:0 "Dignitaires marchands"
 merchant_officials_desc:0 "Les marchands constituent une précieuse source de revenus pour notre pays. Ils contribuent directement à notre richesse et rapportent à notre dirigeant des nouvelles de nos voisins."
 merchant_power_from_maritime_absolutism_advance:0 "Chambre de commerce"
 merchant_power_from_maritime_absolutism_advance_desc:0 "Avec l'émergence d'idées nouvelles dans le domaine du commerce et de l'économie, les entreprises locales s'associent pour former un réseau capable de promouvoir leurs intérêts et de protéger leurs droits contre les forces politiques et les influences étrangères."
 merchant_power_from_maritime_discovery_advance:0 "Guildes de marchands"
 merchant_power_from_maritime_discovery_advance_desc:0 "Les confréries de marchands permettent à nos commerçants de s'organiser, de partager des routes commerciales rentables et d'unir leurs forces pour acheter et vendre sur les marchés étrangers."
 merchant_power_from_maritime_reformation_advance:0 "Compagnies commerciales"
 merchant_power_from_maritime_reformation_advance_desc:0 "L'expansion des marchés en outre-mer et les dépenses et risques accrus qui en découlent nécessitent la création d'associations de marchands qui partagent les charges liées au commerce avec ces nouvelles contrées."
 merchant_power_from_maritime_renaissance_advance:0 "Partenariats marchands"
 merchant_power_from_maritime_renaissance_advance_desc:0 "L'essor du commerce lointain conduit les marchands à chercher de nouvelles formes de partenariat afin d'en tirer les meilleurs profits. Dans la plus courante, l'un des partenaires finance l'expédition commerciale, tandis que l'autre conduit l'expédition chargée de trouver les marchandises qui seront vendues au retour."
 merchant_power_from_maritime_rev_dip_choice:0 "Flottes marchandes"
 merchant_power_from_maritime_rev_dip_choice_desc:0 "La présence de navires marchands dans nos mers est devenue monnaie courante. Nos marchands ont tellement de navires qui vont et viennent qu'ils ont formé leur propre flotte."
 merchant_power_from_maritime_revolutions_advance:0 "Sociétés limitées"
 merchant_power_from_maritime_revolutions_advance_desc:0 "Les échecs fréquents des sociétés à charte ont conduit à un nouveau type de société dans lequel la responsabilité des actionnaires est limitée à une somme fixe, ce qui réduit les risques et rend le système plus attrayant."
 merchant_princes:0 "Princes marchands"
 merchant_princes_desc:0 "Les grandes cités littorales italiennes disposent depuis longtemps de vastes réseaux commerciaux, apportant richesse et puissance jusqu'à leurs portes. Si Milan n'est pas située sur la côte, cela ne veut pas dire pour autant qu'elle n'a pas droit à sa part. Aussi, faisons savoir partout que ceux qui transportent les richesses du monde trouveront toujours bon accueil à la cour de Milan."
 merchant_traditions:0 "Traditions marchandes"
 merchant_traditions_desc:0 "Le commerce est le poumon de l'économie, car il assure la survie de la nation. Nos marchands étant focalisés sur le maintien des flux commerciaux, nous pouvons établir une tradition et une réputation marchandes dynamiques afin de faciliter l'accès au commerce extérieur."
 merchants_and_trade:0 "Marchands et commerce"
 merchants_and_trade_desc:0 "Les grandes routes commerciales ont été fortement perturbées, ce qui explique très certainement l'apparition de la peste noire et des diverses épidémies. Le commerce ne fait donc que commencer à se rétablir."
 merchants_quarters_advance:0 "Quartiers marchands"
 merchants_quarters_advance_desc:0 "$merchants_quarters_desc$"
 meritocracy_advance:0 "Méritocratie"
 meritocracy_advance_desc:0 "Le mérite n'est pas réservé aux élites de notre société, mais bien présent en chacun de nous, puissant comme miséreux. En créant des examens standardisés capables de mesurer le mérite, les efforts et le talent en général, nous pourrons déceler les perles cachées sous nos yeux pour assurer un meilleur avenir à notre nation."
 metallurgy:0 "Métallurgie"
 metallurgy_desc:0 "L'art de la métallurgie, ou la capacité à manipuler et travailler avec différents métaux, est l'un des facteurs majeurs qui justifient le développement de toute civilisation avancée. Les outils et les armes en métal, dont les capacités sont bien supérieures à celles de la pierre, permettent d'améliorer l'efficacité des ouvriers et des troupes."
 mge_all_under_a_khan:0 "Tous aux ordres du $rank_kingdom_horde_ruler_suffix_male$"
 mge_all_under_a_khan_desc:0 "$genghis_khan_name_no_tooltip$ a unifié de grands territoires sous sa bannière. Ayant unifié à nouveau ces territoires sous l'autorité d'un seul $rank_kingdom_horde_ruler_suffix_male$, tous les peuples de notre empire devront prêter allégeance à nos bannières."
 mge_ghostly_horses_of_the_plain:0 "Chevaux fantomatiques des plaines"
 mge_ghostly_horses_of_the_plain_desc:0 "Les prouesses des cavaliers mongols sont réputées dans le monde entier. Nos ennemis tremblent de peur à la vue des nuages de poussière soulevés au loin, et craignent toujours que cela indique que nous fondons sur eux !"
 mge_glory_of_the_khan:0 "La gloire du $rank_kingdom_horde_ruler_suffix_male$"
 mge_glory_of_the_khan_desc:0 "Le grand $genghis_khan_name_no_tooltip$ a amassé sous ses ordres une vaste armée comme on n'en avait jamais vu auparavant. Nous sommes les héritiers de sa gloire, et notre armée surpassera même les grandes hordes mongoles du passé."
 mge_improved_yam_system:0 "Örtöö amélioré"
 mge_improved_yam_system_desc:0 "Le système postal d'örtöö qui couvre tout notre empire a permis une grande communication et logistique depuis l'époque du grand $genghis_khan_name_no_tooltip$. Grâce au rétablissement et à l'amélioration du système, nos messagers peuvent franchir les grandes distances de notre empire à des vitesses jusqu'alors inimaginables."
 mge_kheshig:0 "Les kheshigs"
 mge_kheshig_desc:0 "Les kheshigs étaient autrefois la garde formidable du Grand $rank_kingdom_horde_ruler_suffix_male$ des Mongols. Aujourd'hui encore, leurs descendants continuent de protéger le $rank_kingdom_horde_ruler_suffix_male$ lorsqu'il chevauche au combat contre les ennemis de notre peuple !"
 mge_life_of_steppe_warrior:0 "La vie d'un guerrier des steppes"
 mge_life_of_steppe_warrior_desc:0 "La steppe est un lieu oppressant et sans pitié pour quiconque n'y est pas préparé. Notre peuple est habitué à vivre dans cet environnement des plus rudes, ce qui le rend résistant et paré à survivre. Faisons en sorte que tous nos guerriers fassent cette expérience, afin de disposer de plus de chances encore de survivre."
 mge_mongolian_mobility:0 "Mobilité des Mongols"
 mge_mongolian_mobility_desc:0 "Chacun de nos hommes garde le plus souvent avec lui trois ou quatre chevaux, ce qui lui permet d'en changer chaque fois qu'une monture est fatiguée. Tous voyagent ainsi avec la plus grande célérité, plusieurs jours, sans avoir à s'arrêter. Ces chevaux de réserve leur fournissent en outre des réserves de nourriture, que ce soit du lait des juments ou de la viande. Ainsi, nos armées sont bien moins vulnérables à la faim que celles de ces pays qui se disent « civilisés ». Il nous est alors aisé de couvrir un vaste territoire en un temps record pour mieux leurrer ou rattraper nos ennemis."
 mge_multicultural_empire:0 "Un Empire multiculturel"
 mge_multicultural_empire_desc:0 "Les territoires relevant du grand Empire mongol couvrent de nombreuses terres et peuples différents, tous unifiés sous la gloire du Grand $rank_kingdom_horde_ruler_suffix_male$."
 mge_pax_mongolica:0 "Pax Mongolica"
 mge_pax_mongolica_desc:0 "Après avoir unifié tous les territoires mongols sous notre bannière, notre peuple pourra jouir d'une stabilité et d'une prospérité comme on n'en a pas vu depuis l'époque du grand $genghis_khan_name_no_tooltip$."
 mge_yeke_mongol_ulus:0 "Yeke Mongol Ulus"
 mge_yeke_mongol_ulus_desc:0 "En tant que Mongols des origines, nous avons restauré le #italic Yeke Mongol Ulus#!, le « Grand pays mongol », et renoué avec la gloire du grand empire de $genghis_khan_name_no_tooltip$. À la moindre occasion, notre peuple cherche à imiter les exploits du Grand $rank_kingdom_horde_ruler_suffix_male$ et à revendiquer son héritage afin de réunir les territoires autrefois vastes du khânat mongol."
 mhr_ashta_pradhan_advance:0 "$mhr_ashta_pradhan$"
 mhr_ashta_pradhan_advance_desc:0 "$mhr_ashta_pradhan_desc$"
 mhr_encourage_brahmin_ties:0 "Encourager les liens Brāhmaṇa"
 mhr_encourage_brahmin_ties_desc:0 "Le secteur financier de notre État est dominé par des familles banquières Brāhmaṇa. Intégrons-les davantage dans notre État en les engageant comme collecteurs d'impôts et en créant des réglementations pour renforcer leurs droits et protéger leurs traditions. Nous aurons gagné la faveur de nos financiers ainsi que l'accès à des administrateurs érudits et compétents."
 mhr_forts_of_maharashtra:0 "Forts du Mahârâshtra"
 mhr_forts_of_maharashtra_desc:0 "Dans ces régions vallonnées et densément boisées, il est primordial de disposer de forts, nombreux et bien entretenus, capables d'être utilisés à des fins défensives aussi bien qu'offensives. L'entretien de nos nombreux forts doit être au cœur de nos préoccupations."
 mhr_office_of_the_peshwa:0 "Office de peshwâ"
 mhr_office_of_the_peshwa_desc:0 "Créons un nouvel office, celui de peshwâ, entièrement dédié aux affaires de l'État et à ses armées. Fort de ce ministre avisé à la tête de notre gouvernement, le pays pourra s'étendre de manière rapide et efficace."
 mhr_peasant_soldiers:0 "Soldats-paysans"
 mhr_peasant_soldiers_desc:0 "Les villages du Desh abritent de nombreux hommes tout disposés à intégrer nos armées. Recrutons et formons tous ceux parlant le $marathi_language$ pour servir au sein de nos troupes."
 mhr_tradition_of_military_service:0 "Tradition du service militaire"
 mhr_tradition_of_military_service_desc:0 "Les cavaliers $marathi_culture$s perpétuent une longue tradition de service en tant que « bargirs » pour les sultanats du Deccan. Suite aux nombreuses guerres livrées dans la région, la militarisation croissante de la région a fait de notre cavalerie l'une des forces les plus redoutables en $india$."
 middle_way:0 "Voie du milieu"
 middle_way_desc:0 "Le Bouddha nous enseigne l'importance d'éviter les extrêmes, car ni l'indulgence sensuelle ni l'ascétisme démesuré ne permettent d'atteindre l'illumination."
 migrant_opportunities:0 "Opportunités d'émigration"
 migrant_opportunities_desc:0 "Les opportunités commerciales et la promesse d'une vie meilleure sont quelques-unes des raisons pour lesquelles nos villes et nos colonies reçoivent des vagues de migrants. Beaucoup d'entre eux décident de s'établir sur nos terres pour y faire fortune, ce qui a pour effet d'accroître la nôtre."
 milanese_ambition:0 "Un nouveau royaume lombard"
 milanese_ambition_desc:0 "La gloire de l'ancien royaume lombard n'est rien en comparaison de ce que les Milanais ont accompli et de ce qu'ils sont encore prêts à accomplir. Tous s'inclineront devant nous."
 milanese_heritage:0 "Traditions des condottieres"
 milanese_heritage_desc:0 "Les habitants de $MLO$ ont l'habitude d'endosser le rôle de mercenaires dans les querelles incessantes de la région, ce qui leur vaut une réputation de soldats très compétents."
 military_administration:0 "Administration militaire"
 military_administration_desc:0 "Les armées du XVIe siècle, toujours plus importantes, ont suscité des soucis bien plus complexes pour les administrations des États. La création d'une institution permanente, chargée de ravitailler et approvisionner les troupes et de garder plus d'hommes sous les drapeaux même au cours de l'hiver ou en temps de paix, nous permettra à terme de lever des armées nombreuses et moins onéreuses, tout en subvenant à leurs besoins de façon plus efficace en temps de guerre."
 military_border:0 "Frontière militaire"
 military_border_desc:0 "La défense de nos frontières est une question sérieuse, surtout en raison de son coût. La solution que nous avons trouvée consiste à octroyer généreusement des terres aux frontières afin d'y constituer une classe militaire professionnelle. Cela garantira une plus grande discipline de nos troupes et facilitera la migration des populations vers les régions sous-peuplées de notre royaume."
 military_drill:0 "Entraînements"
 military_drill_desc:0 "Les entraînements nous permettent d'optimiser la formation des soldats, et ainsi d'améliorer les formations de combat, le maniement des armes et le moral des troupes."
 military_mita:0 "Système militaire mit'a"
 military_mita_desc:0 "La mit'a est un service obligatoire pour la société inca. Ce système ne recouvre pas seulement les aspects communs de l'État : c'est aussi le pilier du service militaire. Chaque ayllu de notre pays doit confier à l'armée des hommes capables de combattre dans les hautes terres."
 military_modernization:0 "Modernisation de l'armée"
 military_modernization_desc:0 "Notre peuple se rappelle la naissance de notre nation, entourée de puissances redoutables qui menaçaient en permanence notre sécurité. Ce climat d'insécurité nous a poussés à toujours nous tenir prêts, afin que nos forces armées se dressent comme un bouclier contre l'adversité. Intrépides et respectés, nos soldats nous ont fait passer du statut de proie potentielle à celui d'adversaire redoutable, et dissuadent ceux qui osent porter atteinte à notre souveraineté."
 military_revolution_advance:0 "Révolution militaire"
 military_revolution_advance_desc:0 "La guerre en elle-même ne changera jamais, mais l'art de faire la guerre le peut. Les récentes avancées en matière d'armement ont prouvé que les anciennes méthodes de combat étaient obsolètes, et les armées ont connu un véritable changement de paradigme. L'adaptation à ces changements est la seule manière de conserver une puissance militaire solide."
 military_tactics_advance_6:0 "Artillerie de campagne"
 military_tactics_advance_6_desc:0 "L'artillerie pouvant désormais accompagner le reste de l'armée sur le champ de bataille, son influence n'est plus limitée par sa portée. Ce gain de mobilité permet le déploiement de formations d'artillerie semi-autonomes à des emplacements stratégiques, sous le commandement d'officiers spécialisés."
 military_traditions:0 "Traditions militaires"
 military_traditions_desc:0 "La pensée militaire ne cesse d'évoluer, et nous faisons tout pour suivre cette évolution. En encourageant au sein de la noblesse une tradition de service militaire, nous entretenons l'idée que le rang dans la société dépend de la gloire acquise au combat. La bravoure et autres lieux communs de ce genre y aident peut-être, mais il est clair que rien ne vaut une nette supériorité sur l'ennemi."
 militiamen_advance:0 "$a_militiamen$"
 militiamen_advance_desc:0 "$a_militiamen_desc$"
 millets:0 "Kanunname"
 millets_desc:0 "L'établissement de codes de lois uniques à chacune des provinces de l'empire permettrait de nous assurer que notre gouvernement sera regardé comme équitable et juste. Ces recueils de lois, les Kanunname, pourront tenir compte des conditions et traditions propres à chacune de provinces, aussi diverses et lointaines soient-elles."
 mimic_the_phoenix:0 "Semblable au phénix"
 mimic_the_phoenix_desc:0 "Nous nous efforçons d'appliquer avec ferveur les coutumes de Byzance tout en nous inspirant de l'héritage romain. Nous insufflons leur essence à notre gouvernance et à notre système juridique, pour imiter consciemment la grâce et la sophistication de l'Empire byzantin."
 mindfulness:0 "Pleine conscience"
 mindfulness_desc:0 "Aspect essentiel de la pratique du $buddhist$, la $mindfulness$ désigne le fait d'être toujours attentif aux phénomènes inhérents au corps comme à l'esprit, tout en respectant les enseignements du Bouddha. Cela permet d'éviter de sombrer dans un état indésirable et de s'orienter plutôt vers l'état recherché."
 mining_advance:0 "Minage"
 mining_advance_desc:0 "Le minage est une activité économique fondamentale depuis l'aube de l'humanité. La généralisation de la métallurgie n'a fait qu'accroître l'importance de la prospection et de l'extraction de différents types de minéraux et de métaux pour le développement de sociétés complexes."
 mining_law_advance:0 "$mining_law$"
 mining_law_advance_desc:0 "$mining_law_desc$"
 mining_tradition:0 "Tradition du minage"
 mining_tradition_desc:0 "Nos sols sont riches en matières rares, prêtes à être extraites et vendues au prix fort aux marchands étrangers. Nous serions stupides de ne pas en profiter."
 mint_advance:0 "$minting_office$"
 mint_advance_desc:0 "$minting_office_desc$"
 mint_of_the_gulf:0 "Monnaie du Golfe"
 mint_of_the_gulf_desc:0 "La monnaie d'Ormuz circule de Bassora au Bengale, tant elle est réputée pour sa pureté et la franchise de son poids. En institutionnalisant notre hôtel des monnaies et en élargissant notre frappe, nous renforçons notre souveraineté financière, et affirmons notre suprématie économique sur l'océan Indien."
 minting_income_factor_building:0 "Propriété monétaire"
 minting_income_factor_building_desc:0 "Il existe de nombreux types de monnaie, mais celle qui porte notre sceau est approuvée et reconnue, et a gagné la confiance de notre peuple."
 minting_trade_range_disc_building:0 "Agrandissement des dépôts commerciaux"
 minting_trade_range_disc_building_desc:0 "Il est vital que nous prenions en compte les besoins croissants liés au commerce international au moment de planifier nos opérations. Agrandir nos dépôts commerciaux nous permettra d'atteindre de nouveaux rivages sans risquer de perdre notre précieuse cargaison."
 minting_trade_range_trad_building:0 "Expéditions commerciales planifiées"
 minting_trade_range_trad_building_desc:0 "Le commerce avec les pays étrangers est le poumon de notre nation. Une planification méticuleuse des routes commerciales et une constitution de stocks suffisants pour chaque voyage nous ouvriront la voie vers des marchés toujours plus lointains."
 missionary_schools:0 "Écoles missionnaires"
 missionary_schools_desc:0 "Même si de nombreuses personnes sont prêtes à s'aventurer dans le monde pour répandre la véritable foi, la plupart font plus de mal que de bien. Cependant, la création d'écoles spécialisées, destinées à former des missionnaires, nous assurera de disposer d'un plus grand nombre de personnes qui ne se contenteront pas de propager la foi, mais qui réussiront dans cette entreprise."
 mitma:0 "Mitimaes obligatoires"
 mitma_desc:0 "Par le passé, s'ils voulaient lancer la construction de grands bâtiments, nos dirigeants devaient se plier à des coutumes anciennes qui les obligeaient à inviter le chef de chaque territoire à la capitale pour les acheter à l'aide de dons et de fêtes somptueuses. À mesure que notre Empire s'est développé, cette coutume s'est révélée de moins en moins pratique. Fournir les travailleurs et le matériel pour nos projets devrait être une obligation pour chacun des chefs qui nous sont soumis."
 modern_bureaucracy:0 "Bureaucratie moderne"
 modern_bureaucracy_desc:0 "Afin de tirer le meilleur parti des territoires et dépendances que nous contrôlons, nous devons développer, réorganiser et professionnaliser l'administration : une organisation stable peut traiter les affaires de chaque juridiction et éliminer tout recours à des solutions à court terme. Mettons au travail les docteurs des universités afin de définir les meilleures manières de gouverner efficacement, et encourageons les fils de la noblesse à servir l'État la plume à la main plutôt que l'épée."
 modern_council_hall_advance:0 "$modern_council_hall$"
 modern_council_hall_advance_desc:0 "$modern_council_hall_desc$"
 modern_road_advance:0 "$modern_road$"
 modern_road_advance_desc:0 "$modern_road_desc$"
 modernization_of_the_military:0 "Modernisation de l'armée"
 modernization_of_the_military_desc:0 "Notre État vit et meurt par les capacités de son armée. C'est notre armée qui assure non seulement notre survie, mais aussi notre prospérité. Nous ne pouvons nous permettre d'être en retard au niveau des technologies militaires."
 modernized_royal_scots_navy:0 "Marine royale écossaise"
 modernized_royal_scots_navy_desc:0 "Notre désir de construire notre propre flotte remonte aux guerres d'indépendance. Auparavant, nous avions recours aux obligations féodales pour former les flottes ; mais l'idéal est une flotte moderne, ne relevant que du roi, et basée dans le port nouvellement construit de Newhaven."
 moe_plethons_vision_advance:0 "La vision de Pléthon"
 moe_plethons_vision_advance_desc:0 "L'arrivée de Gémiste Pléthon à la cour de Mistra a marqué un tournant radical dans l'identité moréenne, car il a proposé un retour aux lois et aux structures sociales de la Sparte antique. Ce philosophe néoplatonicien prône la mise en place d'une armée nationale composée de soldats d'origine grecque plutôt que de mercenaires peu fiables, ainsi que d'un ordre social fondé sur l'héritage hellénique plutôt que sur la seule confession chrétienne. Ce réveil proto-nationaliste permettra de fournir au despotat une puissante arme idéologique, transformant la défense de la Morée en une croisade pour la survie de la nation grecque elle-même. Notre maison régnante y gagnera en prestige même si nous restons fidèles au christianisme."
 moe_reclaiming_the_peloponnese_advance:0 "Revendiquer le Péloponnèse"
 moe_reclaiming_the_peloponnese_advance_desc:0 "Après la reconquête byzantine des forts de Monemvasia, Le Magne et Mistra, le despotat de Morée s'est lancé dans une longue « reconquista » de la péninsule, alors aux mains des principautés franques. Cette campagne ne se limite pas à des sièges, mais vise également à renverser la culture locale, l'administration grecque encourageant la population à se soulever contre les seigneurs latins afin de soutenir le « dirigeant légitime ». Grâce à des mariages stratégiques, des escarmouches persistantes et une absorption progressive des fiefs féodaux, la Morée est lentement parvenue à rallier un territoire fracturé jusqu'à le transformer en province unifiée."
 moe_the_constitution_of_morea_advance:0 "La Constitution de Morée"
 moe_the_constitution_of_morea_advance_desc:0 "Tandis que la vague des Lumières déferle sur la Méditerranée, les despotes de Morée ont pris la décision radicale d'officialiser les relations entre le trône et le peuple par le biais d'une charte écrite. Ce document, fortement influencé par les théories sociales de l'Académie de Mistra, démantèle les derniers vestiges du favoritisme byzantin au profit d'une fonction publique méritocratique et protège les droits de propriété de la classe marchande en plein essor. En accordant aux citoyens une part dans la gouvernance de l'État, le despotat suscite une forte loyauté nationale qui rend la population beaucoup plus résistante à la subversion étrangère. Cette modernisation politique transformera la Morée qui ne sera plus régie par une autocratie traditionnelle, mais par une « monarchie nationale » sophistiquée, capable de mobiliser toutes les ressources psychologiques et financières de son peuple pour défendre la gloire de l'État."
 moe_the_court_of_mystras_advance:0 "La cour de Mistra"
 moe_the_court_of_mystras_advance_desc:0 "À l'instar de Constantinople, la cité perchée de Mistra s'impose comme le centre névralgique de la culture hellénique, attirant les plus grands lettrés, artistes et théologiens de l'Empire sur ses versants ensoleillés. Les despotes des maisons Cantacuzène et Paléologue favorisent un climat intellectuel dynamique, où l'étude de la philosophie grecque classique se mêle au mysticisme orthodoxe. Cette #italic renaissance de Mistra#! transforme le despotat, auparavant simple avant-poste provincial, en une capitale prestigieuse à part entière, dotée d'un pouvoir d'attraction irrésistible pour les diplomates et penseurs méditerranéens."
 moe_the_hexamilion_modernization_advance:0 "Modernisation de l'Hexamilion"
 moe_the_hexamilion_modernization_advance_desc:0 "Conscient que l'isthme de Corinthe est la porte d'entrée de la péninsule, l'État de Morée investira massivement dans la reconstruction et la modernisation du mur de l'Hexamilion. Grâce aux nouvelles avancées en matière de fortifications à poudre à canon, l'ancienne barrière sera transformée en une ligne sophistiquée de bastions, de redoutes et de batteries d'artillerie conçue pour résister à un siège impérial moderne, puis reproduite à travers toute notre nation. Cette « Grande Muraille de Grèce » servira de pierre angulaire à une stratégie défensive qui permettra au despotat de projeter sa puissance en toute sécurité derrière une ligne imprenable, forçant tout envahisseur à s'engager dans un blocus naval long et onéreux."
 moe_the_silk_road_of_morea_advance:0 "La Route de la soie de Morée"
 moe_the_silk_road_of_morea_advance_desc:0 "L'industrie de la soie du Péloponnèse, qui a longtemps été un pilier de l'économie locale, a connu une expansion massive sous l'impulsion de l'État au cours du XVIIe siècle. Elle avait pour objectif de financer les ambitions militaires grandissantes du despotat. En invitant des maîtres tisserands vénitiens et des teinturiers génois à s'installer dans la capitale de Mistra, les despotes ont brisé le monopole étranger qui s'appliquait au traitement des textiles de luxe, garantissant ainsi que l'ensemble de la chaîne de valeur, de la culture du mûrier au brocart fini, reste à l'intérieur des frontières grecques. Ce protectionnisme économique fera de la Morée un « centre de la soie » stratégique, qui permettra de relier la demande du secteur du luxe du siècle des Lumières européen aux matières premières de l'Orient. L'augmentation des droits de douane et des péages commerciaux qui en résultera fournira à la trésorerie l'or nécessaire pour maintenir une bureaucratie moderne et une armée permanente sans surtaxer la paysannerie."
 mohe_ancestry:0 "Ancêtres Mohe"
 mohe_ancestry_desc:0 "Notre peuple descend des tribus Mohe des forêts de l'Amour. Leurs traditions relatives à la chasse, à l'élevage et à la rude vie frontalière ont façonné notre société."
 mol_the_banner_of_the_golden_bull:0 "La bannière de la Bulle d'or"
 mol_the_banner_of_the_golden_bull_desc:0 "Sous la bannière de la Bulle d'or, représentant notre nation, la Moldavie deviendra le « rempart de l'Est », repoussant avec succès les incursions ennemies. Nous instaurerons une tradition consistant à ériger un monastère pour chaque victoire militaire, créant ainsi un paysage parsemé de sites religieux. Cette fusion de zèle religieux et de discipline militaire garantit que nos soldats combattront avec la conviction des croisés."
 mol_the_chronicles_of_grigore_ureche:0 "Les chroniques de Grigore Ureche"
 mol_the_chronicles_of_grigore_ureche_desc:0 "Une ère transformative de conscience intellectuelle s'est ouverte ! Nos hauts boyards ont, pour la première fois, commencé à documenter systématiquement l'histoire de notre peuple en roumain. En consignant scientifiquement les origines latines et le patrimoine linguistique que nous partageons avec nos frères roumains, nous faisons passer les fondements de l'État d'une identité purement religieuse à une identité moderne, linguistique et historique. Cet éveil culturel renforce la légitimité interne du prince et fournit à nos diplomates les arguments historiques nécessaires pour affirmer notre souveraineté auprès des cours européennes. L'Histoire est devenue une arme de l'État."
 mol_the_cotnari_and_odobesti_wines:0 "Les vins Cotnari et Odobești"
 mol_the_cotnari_and_odobesti_wines_desc:0 "Les vignobles demeurent le plus grand trésor de la Moldavie, les vins blancs doux de Cotnari rivalisant avec le Tokay dans les cours d'Europe. Nous avons déjà codifié les premières classifications des vins, affirmant l'intérêt de l'État pour l'exportation de la « Perle de Moldavie » ; il est maintenant temps de passer à l'action. Ce commerce de luxe fournira à la cour princière des devises importantes provenant des marchés voisins, finançant les somptueux palais de notre capitale."
 mol_the_great_military_reforms:0 "Les grandes réformes militaires"
 mol_the_great_military_reforms_desc:0 "Pour contrer le nombre de nos ennemis, nous avons réorganisé notre armée en #italic Oastea Mare#! (la Grande Armée). En accordant des terres aux #italic Răzeși#!, des paysans propriétaires libres qui doivent leur service directement au voïvode, nous avons créé un noyau d'infanterie loyal et autoéquipé, qui combat avec la férocité de propriétaires défendant leurs propres terres. Ce système garantit que, même en cas de faiblesse des boyards, le prince dispose d'un réservoir fiable et massif de soldats aguerris."
 mol_the_moldavian_road:0 "La Route de Moldavie"
 mol_the_moldavian_road_desc:0 "En sécurisant la « Route de Moldavie » qui relie la mer Baltique à la mer Noire, nous avons fait de nos principales colonies des carrefours stratégiques pour le commerce de la fourrure et de la cire en Europe du Nord. Nous avons accordé de nombreux privilèges aux marchands slaves et aux bourgeois allemands pour qu'ils s'installent dans nos villes douanières, veillant ainsi à ce que chaque caravane transitant de la Baltique vers les ports génois du sud verse un lourd tribut à notre trésor. Cette richesse commerciale nous permet de financer une cour spécialisée et de construire des fortifications en pierre sans pour autant imposer à nos paysans libres des taxes qui les pousseraient à se révolter."
 mol_the_moldovan_enlightment:0 "Les Lumières moldaves"
 mol_the_moldovan_enlightment_desc:0 "Dimitrie Cantemir est devenu un polymathe de renommée européenne, introduisant directement à notre cour les principes radicaux du début des Lumières. En cartographiant l'histoire, la musique et la géographie de notre région pour un public occidental, nous avons acquis un avantage stratégique considérable dans les sables mouvants de la politique d'Europe orientale. Nous sommes passés d'une marche frontalière médiévale à un État géré scientifiquement, qui s'inspire de plus en plus des réformes modernisées de l'Occident pour sa politique et sa stratégie militaire. Le savoir est la nouvelle monnaie du trône moldave."
 monarchy_reform_traditions_advance:0 "Traditions de la réforme monarchique"
 monarchy_reform_traditions_advance_desc:0 "Le pouvoir ne peut être confié à n'importe qui au sein du royaume. En concentrant l'influence entre les mains du souverain, l'ordre et la stabilité seront maintenus par une Couronne puissante."
 monarchy_royal_court_advance:0 "$royal_court_customs_law$"
 monarchy_royal_court_advance_desc:0 "$royal_court_customs_law_desc$"
 monastery_productions:0 "Frugalité des monastères"
 monastery_productions_desc:0 "Les occupants de nos monastères préservent les idéaux de la frugalité. Notre clergé devrait prendre ces moines et ces nonnes en exemple."
 monastic_communities:0 "Communautés monastiques"
 monastic_communities_desc:0 "La vie $buddhist_ADJ$ gravite autour de sa communauté de moines et de nonnes, appelée #italic sangha#!. Ce concept est régi par le #italic vinaya#!, un corpus de règles et de préceptes qui dicte la vie de toute communauté monastique $buddhist_ADJ$."
 monastic_dominance:0 "Domination monastique"
 monastic_dominance_desc:0 "La fusion du pouvoir spirituel et temporel définit le paysage politique tibétain. Du plus modeste village aux salles du pouvoir de Sakya, les institutions monastiques occupent une place centrale dans tous les aspects de la vie. Leur autorité morale et leur savoir-faire organisationnel garantissent la loyauté, l'unité et la résilience culturelle."
 monophysite_vs_miaphysite:0 "Monophysite contre $miaphysite_ADJ$"
 monophysite_vs_miaphysite_desc:0 "Promulguant également que la figure christique n'a qu'une seule essence, le $miaphysite$ diffère toutefois substantiellement de la vision monophysite eutychienne qui proclame que l'humanité du Christ a été absorbée dans sa divinité. Bien que certains nous qualifient aussi d'adeptes du monophysisme, il ne s'agit que d'un accord de mots, car sur le fond, nos points de vue sont clairement différents."
 monuments_to_greatness:0 "Monuments symboles de grandeur"
 monuments_to_greatness_desc:0 "Notre histoire remonte à des milliers d'années et notre peuple a surmonté de grandes catastrophes à force de ténacité. Cette force est devenue une caractéristique de notre société, notre résilience étant illustrée par la puissance de notre armée et le charme de notre art."
 moqarrariya:0 "Institutionnaliser la moqarrariya"
 moqarrariya_desc:0 "Pendant des générations, notre royaume a préservé la paix avec le continent grâce au système ancestral de Moqarrariya. Plutôt que de nous en remettre à la coutume et aux négociations, codifions ces tributs en pactes formels, afin de garantir l'eau douce, la sécurité sur les terres et la stabilité à long terme grâce à une diplomatie fiable."
 mor_atlas_strongholds:0 "Bastions de l'Atlas"
 mor_atlas_strongholds_desc:0 "Les chaînes montagneuses qui occupent la majeure partie de notre pays – les différentes parties de l'Atlas et du Rif – expliquent pourquoi aucun empire n'a jamais véritablement conquis le $MOR$. Nos clans amazighs des montagnes défendent ces passages depuis l'époque où les armées romaines y ont pour la première fois pénétré, et notre connaissance de chaque sentier et refuge reste inégalée. Les montagnes ne nous ralentissent pas, elles nous protègent."
 mor_marabouts:0 "Marabouts soufis"
 mor_marabouts_desc:0 "Plusieurs groupes de maîtres soufis se sont installés au Maroc. Nous devons accueillir ces saints hommes et prendre leurs enseignements à cœur."
 morale_recovery_rev_dip_choice:0 "Repos établi"
 morale_recovery_rev_dip_choice_desc:0 "Aucune armée ne peut rester en permanence en état d'action, tous les soldats ont besoin d'un temps de repos et de récupération. En établissant un moment adéquat pour qu'ils se reposent, sans que cela ne se transforme en paresse, nous pouvons maintenir nos troupes en excellente condition."
 more_merchants_age_of_trad:0 "Guildes de marchands"
 more_merchants_age_of_trad_desc:0 "La formation des guildes a façonné la structure de notre économie depuis longtemps. Bien qu'elles soient courantes parmi nos artisans, il n'en va pas de même pour nos marchands. Nous devrions encourager les commerçants à former des guildes de la même manière afin de rationaliser nos ambitions mercantiles."
 mos_dynastic_ties:0 "Règne basé sur les relations dynastiques"
 mos_dynastic_ties_desc:0 "Les terres de $russian_region$ ont pendant longtemps été gouvernées par une seule dynastie. Nous devrions utiliser la position que nous tenons parmi nos pairs ainsi que nos liens de sang pour nous octroyer un rôle prépondérant."
 mos_patrol_the_territories:0 "Levées organisées"
 mos_patrol_the_territories_desc:0 "Gouverner les vastes étendues de $russian_region$ n'est pas tâche facile. Nous devrions établir des centres de recrutement locaux pour faciliter l'enrôlement des recrues dans nos armées."
 mos_skilled_tax_collectors:0 "Collecteurs du tribut"
 mos_skilled_tax_collectors_desc:0 "Notre position de collecteur de tributs pour la $GLH_horde$ nous a permis de consolider nos nombreuses années d'expérience dans ce domaine et de nous attribuer une partie des bénéfices."
 mother_of_russian_cities:0 "La Mère des États de Ruthénie"
 mother_of_russian_cities_desc:0 "Kyiv était jadis la capitale d'un grand État qui s'étendait des forêts septentrionales de Novgorod aux rives méridionales de la mer Noire. Après l'éclatement de la Ruthénie et des invasions mongoles, il n'en reste plus grand-chose. Quelles que soient les épreuves subies par nos cités, nous veillerons à ce qu'elles se rétablissent et prospèrent pour les siècles à venir."
 moundbuilding_advance:0 "Les bâtisseurs de tumulus"
 moundbuilding_advance_desc:0 "Les tumulus d'$north_america$ sont de grands monuments érigés en hommage au peuple, aussi devrions-nous les préserver au moment de planifier nos infrastructures."
 mount_meru:0 "Mont Meru"
 mount_meru_desc:0 "Dans l'$hindu$, le $buddhist$ et le $jain$, le $mount_meru$ est la montagne sacrée située au cœur de l'univers, tant dans le sens physique que spirituel. C'est le pilier central autour duquel gravite toute chose, tout comme notre pays gravite autour de notre dirigeant."
 mountain_cities:0 "Citadelles des sommets"
 mountain_cities_desc:0 "Nos villes et nos forteresses se dressent au sommet de hautes montagnes, bien au-dessus des nuages. Elles constituent un obstacle redoutable pour tous ceux qui tenteraient de nous envahir."
 mountain_roads:0 "Réseau routier des montagnes"
 mountain_roads_desc:0 "Un grand réseau de routes de montagne, reliant entre elles des vallées éloignées et traversant des gorges profondes, est requis pour redistribuer les biens. Construisons-le !"
 mounted_people:0 "Peuple de cavaliers"
 mounted_people_desc:0 "Notre peuple a longtemps prospéré grâce au cheval, un élément indéniable de notre culture et de notre pouvoir. Nous sommes fiers d'élever ces créatures majestueuses et de nos compétences inégalées en matière d'archerie montée. Nous saurons maîtriser ces avantages pour assurer notre suprématie sur le champ de bataille."
 mourning_wars:0 "Guerres de capture"
 mourning_wars_desc:0 "C'est là une tradition fort ancienne au sein de notre peuple que d'adopter dans la tribu les guerriers capturés. Afin d'augmenter notre effectif et de nous permettre de nouvelles conquêtes, nous ne devrions pas nous contenter d'adopter des guerriers isolés, mais bien des tribus entières parmi les Haudenosaunee."
 mri_descendant_of_oe_hiromoto:0 "Descendants d'Ōe no Hiromoto"
 mri_descendant_of_oe_hiromoto_desc:0 "Ōe no Hiromoto, érudit et homme politique qui a grandement contribué à l'établissement du shogunat de Kamakura, était l'ancêtre de notre clan. Aujourd'hui encore, son esprit vit parmi nous, et nous sommes fiers de maintenir une administration efficace."
 mri_munakata_three_goddesses:0 "Trois déesses Munakata"
 mri_munakata_three_goddesses_desc:0 "Les trois filles de Susanoo no Mikoto sont les déesses tutélaires de la mer et de la navigation. Leur bénédiction rendra nos flottes invincibles."
 mtr_lagoon_fisheries:0 "Les pêcheries des lagunes"
 mtr_lagoon_fisheries_desc:0 "La richesse biologique de nos eaux côtières nous fournit un approvisionnement alimentaire stable, ce qui nous permet de maintenir une milice permanente plus importante, même en période de famine régionale. En monopolisant la récolte des lagunes, nous veillons à ce que notre population reste en bonne santé et nos greniers pleins, assurant ainsi la survie de l'État."
 mtr_marshland_guerillas:0 "Guérillas des marais"
 mtr_marshland_guerillas_desc:0 "Nous formons spécifiquement nos levées à attirer les unités ennemies dans les tourbières profondes où leur armure devient un handicap. Dans ces environnements, notre infanterie légère et non blindée règne en maître grâce à des tactiques d'embuscade, transformant la terre elle-même en arme. Notre capacité à nous adapter à tout terrain et à nous déplacer rapidement dans les pires conditions fait de nous un adversaire redoutable."
 mtr_reclamation_engineering:0 "Ingénierie de reconquête"
 mtr_reclamation_engineering_desc:0 "Nous avons entamé le processus de drainage de certaines parties des marais de Myzeqe afin de créer des terres agricoles encore plus fertiles. Cet exploit d'ingénierie augmente non seulement notre assiette fiscale, mais permet également de construire des routes permanentes à travers ce qui était autrefois un marécage infranchissable."
 mtr_the_masters_of_the_karavasta:0 "Les maîtres du Karavasta"
 mtr_the_masters_of_the_karavasta_desc:0 "Notre territoire est protégé par le labyrinthe de la lagune de Karavasta, où notre peuple maîtrise la navigation à travers les vasières et les chenaux dissimulés. Ce paysage aquatique constitue une forteresse naturelle presque impossible à cartographier ou à conquérir pour de lourdes armées étrangères, offrant un refuge qu'aucune charge de cavalerie ne peut atteindre."
 mtr_the_mataranga_port_authority:0 "L'autorité portuaire des Mataranga"
 mtr_the_mataranga_port_authority_desc:0 "Nous avons unifié tous les ports côtiers sous une seule autorité administrative, rationalisant la perception des taxes et des droits de douane. Cette centralisation fait de nous les administrateurs commerciaux les plus efficaces de l'Adriatique et attire les investissements étrangers."
 mtr_the_trade_monopolies:0 "Les monopoles commerciaux"
 mtr_the_trade_monopolies_desc:0 "En contrôlant les embouchures des rivières et les côtes, nous pouvons dicter avec succès l'acheminement du bois et des céréales de l'intérieur vers les galères vénitiennes. Nous nous sommes positionnés comme les intermédiaires indispensables du commerce adriatique, garantissant qu'aucun marchand ne puisse contourner nos péages."
 mug_an_indian_padshah:0 "Pâdishah indien"
 mug_an_indian_padshah_desc:0 "Notre royaume abrite de nombreuses religions et cultures, et bien que nous soyons des étrangers sur ces terres, les traditions et les valeurs de l'$india$ nous parlent. Malgré leur riche culture, ces gens semblent ne pas avoir de but commun. Nous devons lutter pour qu'en dépit de leur caste, de leur religion ou de leur culture, tous nos sujets bénéficient des mêmes opportunités pour servir notre grande maison."
 mug_fatawa_e_alamgiri:0 "Fatawâ-i Âlamgîrî"
 mug_fatawa_e_alamgiri_desc:0 "La $mug_fatawa_e_alamgiri$ est une compilation basée sur la charia, qui sert de code juridique principal réglementant les divers aspects de la vie dans notre empire. C'est l'un des recueils les plus complets de lois, d'éthique, de stratégies militaires, de politiques économiques, de justice et de principes $muslim_ADJ$s."
 mug_mughal_architecture:0 "Architecture $MUG_ADJ$e"
 mug_mughal_architecture_desc:0 "Un grand empire se doit de disposer de somptueux monuments. Au sein de notre empire cosmopolite, les architectes érigent déjà de magnifiques édifices qui impressionneront les générations à venir. Notre dynastie doit donc être au premier plan de ce mouvement en créant des œuvres jamais vues ailleurs."
 mug_mughal_ibadat_khana:0 "$ibadat_khana$"
 mug_mughal_ibadat_khana_desc:0 "$ibadat_khana_desc$"
 mug_zamindar_system:0 "Système zamindar"
 mug_zamindar_system_desc:0 "Les zamindars sont des dirigeants féodaux qui gouvernent nos territoires de manière autonome ou semi-autonome. Bien qu'ils soient propriétaires des terres qu'ils administrent et qu'ils fassent partie de notre noblesse, ils servent en fin de compte de vassaux internes à la couronne elle-même."
 mulltimmer_masugn:0 "Mulltimmer Masugn"
 mulltimmer_masugn_desc:0 "Le fer suédois, apprécié pour sa pureté et sa solidité, alimentait nos besoins domestiques, mais aussi les fonderies et les arsenaux des nations du continent. Le Mulltimmer Masugn n'a pas été construit uniquement avec de la pierre, mais aussi avec du bois isolé avec du sable, du gravier et de la terre."
 multicultural_empire:0 "Empire multiculturel"
 multicultural_empire_desc:0 "L'Autriche est un royaume diversifié et multiculturel, qui s'appuie sur l'accueil et l'intégration de ses nombreuses minorités ethniques pour maintenir l'unité et la stabilité dans un contexte de tensions nationalistes croissantes."
 muslim_caravans:0 "Caravanes $muslim_ADJ$es"
 muslim_caravans_desc:0 "Arpentant aussi bien la Route de la soie que les voies du sel qui traversent le Sahara, notre peuple a pour tradition d'emprunter des caravanes marchandes en direction de contrées lointaines, donnant ainsi accès à un large éventail de produits au monde $muslim_ADJ$."
 muslim_lineage:0 "Lignée $muslim_ADJ$e"
 muslim_lineage_desc:0 "Depuis l'époque de Mahomet, que la paix soit sur lui, l'$muslim$ est intrinsèquement lié aux structures du pouvoir. Par conséquent, notre lignée est également légitimée par la foi elle-même."
 muslim_trade_communities:0 "Communautés commerciales $muslim_ADJ$es"
 muslim_trade_communities_desc:0 "La présence de marchands $muslim_ADJ$s dans les contrées lointaines nous permet d'entrer en contact avec de nombreux peuples et confessions. L'établissement de communautés commerciales en leur sein engendre un certain syncrétisme de leurs croyances avec la véritable parole d'$muslim_god_name$."
 my_son_sanctuary:0 "Sanctuaire de Mỹ Sơn"
 my_son_sanctuary_desc:0 "Au cœur des vallées luxuriantes du centre de Champa se trouve le complexe sacré de My Sơn, où, depuis des générations, nos rois et nos prêtres accomplissent des rites solennels en l'honneur de $shiva_god$, protecteur de notre royaume. Ces tours, sculptées avec dévotion et ornées de symboles sacrés, nous relient à nos ancêtres et au divin. Tant que l'encens brûlera dans leurs sanctuaires, l'âme de Champa perdurera."
 mystai_advance:0 "Cultes à mystères"
 mystai_advance_desc:0 "Cachés derrière des masques, des symboles et des rituels sacrés, des initiés influents se rassemblent au sein de cultes à mystères secrets. Ces organisations exercent une influence sociale et politique considérable, façonnant les événements par leur autorité rituelle, leur richesse et leurs alliances discrètes. Les souverains avisés entretiennent de bonnes relations avec ces mystai, de peur que leur influence et leurs intrigues ne se retournent contre l'État."
 mzk_literary_patronage:0 "Mécénat littéraire"
 mzk_literary_patronage_desc:0 "Nous avons transformé notre capitale en un centre culturel, préservant la sagesse de l'Orient et de l'Occident pour les générations futures. Ce prestige intellectuel fait de notre cour la destination des plus brillants esprits des mondes orthodoxe et latin."
 mzk_silk_road_waystations:0 "Relais de la route de la soie"
 mzk_silk_road_waystations_desc:0 "Nos terres se situent sur les principales routes commerciales de l'intérieur ; en taxant les caravanes de soie, nous maintenons un trésor plein et prospère. Ces revenus nous permettent de soutenir les meilleurs calligraphes et iconographes, faisant de notre domaine la capitale culturelle du sud de l'Albanie."
 mzk_the_agricultural_wealth_of_the_devoll:0 "La richesse agricole de la Devoll"
 mzk_the_agricultural_wealth_of_the_devoll_desc:0 "La vallée fertile de la Devoll nous permet de financer une cour somptueuse et une cavalerie hautement entraînée grâce à des systèmes d'irrigation avancés. Cet excédent agricole constitue le socle économique de nos ambitions politiques, nous permettant d'entretenir une suite professionnelle plus importante que celle de nos rivaux."
 mzk_the_despots_of_berat:0 "Les despotes de Berat"
 mzk_the_despots_of_berat_desc:0 "Régnant depuis le château de Berat, la « Ville aux mille fenêtres », nous incarnons le sommet de la sophistication urbaine albanaise et de l'administration de style byzantin. Notre cour attire savants et artisans, transformant notre capitale en un phare culturel rivalisant avec les grandes villes de l'Orient."
 mzk_the_muzaka_chronicle:0 "La Chronique de Muzaka"
 mzk_the_muzaka_chronicle_desc:0 "Notre famille conserve des archives méticuleuses et majestueuses de notre histoire et de nos droits territoriaux, pour garantir que nos anciennes revendications ne seront jamais oubliées. Cette tradition littéraire préserve nos hauts titres byzantins, impressionnant nos rivaux locaux par notre dignité impériale et la profondeur de notre passé."
 mzk_the_muzakan_industrialization:0 "L'industrialisation des Muzaka"
 mzk_the_muzakan_industrialization_desc:0 "Nous avons introduit la culture à grande échelle de plantes commerciales dans nos vallées les plus fertiles, alimentant une nouvelle industrie domestique. En transformant nos matières premières en produits de grande valeur, nous avons créé une base industrielle qui soutient une population urbaine riche et fidèle."
 nagusa_negast:0 "Nəgusä Nägäst"
 nagusa_negast_desc:0 "Notre souverain est le roi des rois, l'héritier et le descendant des rois d'Aksoum et de leur premier souverain, Ménélik Ier, fils du roi Salomon et de la reine de Saba. Tous nos rois descendent des Salomonides, sans qu'il soit nécessaire de transmettre cet héritage de père en fils."
 nahuatl_domination:0 "Domination nahua"
 nahuatl_domination_desc:0 "Notre culture est bien supérieure à celles qui nous entourent, au point que de plus en plus de peuples l'adaptent à la leur. Nous devons absolument tirer parti de l'influence dont nous disposons au-delà de nos frontières."
 nair_military_advance:0 "Militaires nayars"
 nair_military_advance_desc:0 "Les Nayars sont un groupe diversifié de castes hindoues de la région de $malabar_area$, impliqué depuis bien longtemps dans les activités militaires. Leur expérience, ainsi que leur rôle dans le $kalari$, seront d'une grande utilité pour les conflits en cours."
 nambardar_levy:0 "Levée de nambardars"
 nambardar_levy_desc:0 "La $nambardar_levy$, ou #italic čerig-i nambardar#!, désigne celles de nos troupes qui ne sont pas d'origine $mongolian_culture$e ou $turkic_group$, mais sont au contraire constituées de la population $iranian_group$ autochtone. Grâce à elles, nos armées peuvent être plus importantes qu'elles ne le seraient autrement."
 nanto_rokushuu:0 "Nanto rokushū"
 nanto_rokushuu_desc:0 "Les temples de $nara$ ont gagné en influence depuis l'arrivée du $buddhist$ de $china$. Les six écoles qui le constituent sont dépositaires des enseignements du Bouddha et des différentes manières d'atteindre l'illumination, mais aussi de connaissances ayant trait à des sujets plus terre-à-terre comme la bonne administration d'un monastère."
 napoleonic_warfare:0 "Guerre napoléonienne"
 napoleonic_warfare_desc:0 "Mener des sièges est coûteux en temps et en argent pour notre armée. Au lieu de nous attaquer à chaque fortification sur notre chemin, nous devons orienter notre tactique vers le coup décisif qui nous permettra de gagner la guerre."
 naraka:0 "Naraka"
 naraka_desc:0 "Également appelé Niraya, le $naraka$ fait référence aux enfers de souffrance où les âmes sont purifiées de leur mauvais karma avant d'être réincarnées. Le $naraka$ est constitué de nombreux royaumes, et le temps durant lequel un individu doit y résider ainsi que la nature des supplices qu'il subira dépendent de la quantité de karma nécessaire à sa réincarnation dans un état supérieur."
 nastika_schools:0 "Écoles nāstika"
 nastika_schools_desc:0 "Certaines écoles de pensée de l'$hindu$ se sont écartées des courants principaux, rejetant l'autorité des $vedah$ et l'existence de l'$atman$. Ces écoles, telles que le $jain$ et le $buddhist$, sont donc hétérodoxes, bien qu'elles adhèrent toujours aux croyances fondamentales de l'$hindu$."
 nation_state_advance:0 "État-nation"
 nation_state_advance_desc:0 "L'idée d'unir une seule culture sous une même bannière est puissante. En cultivant un sentiment d'identité nationale, nous pourrons garantir la loyauté de nos vassaux et de nos citoyens envers notre cause."
 national_assemblies_advance:0 "Assemblées nationales"
 national_assemblies_advance_desc:0 "$national_assemblies_desc$"
 national_bank:0 "Banque nationale"
 national_bank_desc:0 "L'établissement d'une autorité centrale, en charge de tout ce qui concerne les finances, nous permettra de mieux contrôler l'économie à l'échelle du pays."
 national_churches:0 "Église nationale"
 national_churches_desc:0 "Nous ne pouvons pas permettre que des entités étrangères exercent trop d'influence dans notre administration. C'est pourquoi l'État doit raffermir son contrôle sur l'Église au sein de notre territoire."
 national_conscripts:0 "Conscription nationale"
 national_conscripts_desc:0 "Augmentons nos effectifs militaires en rendant obligatoire l'enrôlement des hommes dans le service militaire."
 national_rites:0 "Rites nationaux"
 national_rites_desc:0 "La présence des différents patriarcats autocéphales dans notre Église permet certaines variations dans les rites nationaux propres à chaque pays. Toutefois, l'unité du message demeure intacte, et l'Église, en tant qu'entité unique, reste indivisible."
 national_sovereignty:0 "Souveraineté nationale"
 national_sovereignty_desc:0 "Les guerres du début du XVIIe siècle, nombreuses et longues, ont amené la création d'un système diplomatique international, reposant en tout premier lieu sur l'intégrité territoriale des États. Ceux-ci, plutôt que de simples individus couronnés ou des groupes supranationaux, sont devenus les acteurs majeurs de la scène politique internationale, et aucun État n'a le droit d'intervenir dans les affaires internes des autres."
 national_trade:0 "Marché national"
 national_trade_desc:0 "Les étoffes, la laine et d'autres marchandises recherchées font désormais le tour du monde. À une époque où le commerce s'étend jusqu'aux rivages les plus lointains, nous devons veiller à ce que nos marchands aient l'avantage !"
 national_trade_policy:0 "Politique commerciale nationale"
 national_trade_policy_desc:0 "Adopter une politique commerciale pour l'ensemble du pays nous permettrait de renforcer notre présence commerciale et d'accroître l'efficacité de nos marchands."
 nationalistic_enthusiasm:0 "Nationalisme"
 nationalistic_enthusiasm_desc:0 "Le financement des armées est vital pour la défense du pays. Une administration performante peut y concourir de façon efficace en obtenant de généreuses réductions auprès de nos fournisseurs."
 native_policy_advance:0 "Politique envers les indigènes"
 native_policy_advance_desc:0 "Les nouveaux territoires découverts par nos courageux explorateurs sont souvent occupés par des peuplades étranges et frustes. Il est temps de promulguer une règle unique qui régira les rencontres entre nos forces et ces autochtones."
 natural_seamanship:0 "Marins nés"
 natural_seamanship_desc:0 "Le développement de la pêche a aussi permis d'accroître le nombre de marins dans le pays. Nous devrions en tirer parti, car de bons marins sont aussi importants que de bons navires."
 nav_a_renaissance_realm:0 "Un royaume de la Renaissance"
 nav_a_renaissance_realm_desc:0 "Malgré l'origine montagneuse de notre royaume, au cœur des vallées pyrénéennes, notre peuple a reçu les influences humanistes du Sud et du Nord en quantité et en qualité, sans jamais cesser de les influencer en retour. En embrassant cette prise de conscience, les Navarrais n'oublient pas leurs traditions, mais les refondent dans leur nouvelle identité propre."
 nav_adept_traders:0 "Négociants de haut vol"
 nav_adept_traders_desc:0 "La qualité de nos navires, la compétence de nos marchands et l'efficacité de nos processus ont rendu nos activités commerciales extrêmement lucratives. Notre nation en tirera bien des richesses, qui la renforceront."
 nav_always_ready:0 "Toujours prêts"
 nav_always_ready_desc:0 "Notre royaume est né encerclé par des adversaires redoutables venant de toutes les directions. Cela a profondément influencé le développement du caractère de notre nation et notre façon d'interagir avec le monde. Par conséquent, nous restons toujours vigilants, prêts à réagir au moindre signe de menace."
 nav_an_industrious_folk:0 "Peuple industrieux"
 nav_an_industrious_folk_desc:0 "La terre sur laquelle nous vivons n'est peut-être pas la plus riche, mais les Basques sont des travailleurs, qui triment dur pour obtenir ce dont ils ont besoin. Qu'il s'agisse de fondre notre fer dans les forges, de transformer le bois de nos forêts en charbon ou de bâtir les meilleurs navires au monde, c'est grâce aux efforts de notre communauté que notre royaume est prospère."
 nav_basque_ferocity:0 "Férocité $basque$"
 nav_basque_ferocity_desc:0 "Avant même la bataille de Roncevaux, dont les Français gardent un souvenir douloureux, ou les campagnes de la compagnie de Navarre, les nôtres ont toujours été considérés comme de féroces combattants. Nous ne devrions jamais laisser nos ennemis l'oublier."
 nav_chartered_councils:0 "Conseils agréés"
 nav_chartered_councils_desc:0 "Chaque territoire historique formera un conseil, dépendant du dirigeant et élu par les habitants, qui garantira le respect de leurs lois traditionnelles, ou #italic Fueros#!. Cet organe intermédiaire nous octroiera un pouvoir administratif plus efficace sur nos terres, sans pour autant contrarier les intérêts des habitants."
 nav_efficient_bureaucracy:0 "Bureaucratie efficace"
 nav_efficient_bureaucracy_desc:0 "Depuis la création du royaume, notre nation a conservé une tradition de bureaucrates. Les temps changent et il est nécessaire d'adopter de nouvelles approches pour gérer les affaires quotidiennes. À cet égard, la Navarre est admirée pour ses pratiques innovantes dans ce domaine."
 nav_fearless_seamen:0 "Marins imperturbables"
 nav_fearless_seamen_desc:0 "Notre peuple a toujours regardé la mer avec crainte et effroi, tandis qu'elle nous appelait à embrasser ses richesses. Nos courageux ancêtres ont fondé des communautés qui vivaient non seulement près de la mer, mais aussi grâce à elle, en développant des compétences nautiques impressionnantes. Les marins de nos côtes sont bien connus sur toute la façade atlantique."
 nav_memories_reconquista:0 "Mémoires de la Reconquista"
 nav_memories_reconquista_desc:0 "Notre peuple a participé activement à la Reconquista, contribuant aux efforts des $christian_ADJ$s pour reprendre l'$iberia_region$ aux $muslim_ADJ$s. Bien que l'expansion territoriale soit devenue impossible, la $NAV$ a joué un rôle important dans cette croisade, par le biais de campagnes militaires et d'alliances avec les royaumes $christian_ADJ$s voisins."
 nav_mercantile_expansion:0 "Expansion mercantile"
 nav_mercantile_expansion_desc:0 "Pendant des siècles, notre société a commercé non seulement avec ses voisins, mais aussi avec des pays lointains, en leur vendant nos productions et en achetant les leurs. Nos marchands en sont donc venus à exceller dans ce domaine et à diffuser les innovations des autres nations environnantes."
 nav_navarrese_defense_force:0 "Défenses navarraises"
 nav_navarrese_defense_force_desc:0 "Au fil du temps, les nations voisines continuent de se renforcer, ce qui menace de plus en plus la survie de notre nation. Pour y remédier, nous allons créer un département militaire visant à multiplier le nombre de soldats au sein de nos forces sans compromettre la qualité des recrues."
 nav_people_of_the_sea:0 "Le peuple de la mer"
 nav_people_of_the_sea_desc:0 "Nos citoyens sont des marins experts et le monde entier le sait. Notre expertise sera un avantage évident lors des batailles maritimes à venir."
 nav_riflemen_march:0 "Marche des fusiliers"
 nav_riflemen_march_desc:0 "L'introduction du fusil dans l'armée signifie que nos soldats doivent s'habituer à son utilisation. Pour résoudre ce problème, nos commandants ont développé une façon de marcher dont le renom témoigne de la compétence et de la concentration de nos soldats."
 nav_royal_basque_society:0 "Société royale basque"
 nav_royal_basque_society_desc:0 "#italic Euskalerriaren Adiskideen Elkartea#!, la « Société royale basque des amis du pays », est fondée pour encourager le développement de l'économie, de la culture et de la science basques. Le pays en bénéficiera grandement dans les années à venir."
 nav_shipbuiling_experts:0 "Experts de la construction navale"
 nav_shipbuiling_experts_desc:0 "La mer au large de nos côtes regorge de ressources attendant les braves qui oseront s'en emparer. Depuis des siècles, notre littoral se garnit de ports et de chantiers navals qui construisent inlassablement des vaisseaux pour apaiser notre soif d'aventures et d'activité maritime."
 nav_shipyards_ironworks:0 "Chantiers navals et usines sidérurgiques"
 nav_shipyards_ironworks_desc:0 "La construction navale, ou la sidérurgie et le travail du fer sont des activités traditionnelles dans nos contrées. Mais avec le développement de nouvelles techniques, la nécessité d'adapter nos processus devient évidente. Nos anciennes pratiques doivent s'adapter à la modernité pour rester compétitives."
 nav_the_national_military_academy:0 "L'Académie militaire nationale"
 nav_the_national_military_academy_desc:0 "Avec la professionnalisation de notre armée s'impose l'ouverture d'un centre de formation pour nos recrues. Nous formerons un corps de soldats expérimentés et leur enseignerons les secrets de l'art militaire, afin qu'ils constituent le fer de lance de notre armée."
 nav_transatlantic_whaling:0 "Pêche transatlantique à la baleine"
 nav_transatlantic_whaling_desc:0 "La chasse à la baleine $basque$ étant une tradition pluricentenaire, nos spécialistes sont souvent embauchés par d'autres pays qui souhaitent développer et améliorer leurs pêcheries. Nous devrions tirer parti de cette expertise et étendre nos entreprises de chasse à la baleine en créant des comptoirs tout autour de l'Atlantique."
 naval_ambitions:0 "Ambitions maritimes"
 naval_ambitions_desc:0 "Plus motivés, nos marins sont capables de partir à l'assaut des étendues océaniques et de régner sur les flots. Par contrecoup, cela permet aussi à nos colons de braver tous les dangers que l'on peut trouver dans les coins les plus reculés du globe, pour aller toujours plus loin fonder de nouvelles colonies."
 naval_base_advance:0 "Base navale"
 naval_base_advance_desc:0 "$naval_base_desc$"
 naval_battery_advance:0 "Batterie côtière"
 naval_battery_advance_desc:0 "$naval_battery_desc$"
 naval_cadets:0 "Aspirants navals"
 naval_cadets_desc:0 "En mettant en avant la marine comme une carrière de choix pour les cadets de la noblesse, nous pouvons créer un corps d'officiers de marine professionnels, capable de superviser les artilleurs."
 naval_doctrines_advance:0 "Doctrines navales"
 naval_doctrines_advance_desc:0 "La guerre navale a connu de nombreux changements ces dernières années, avec des flottes et des navires toujours plus imposants et spécialisés. En conséquence, les pays commencent à utiliser des tactiques et des doctrines différentes, adaptées à leurs points forts ou à une manière particulière d'utiliser leurs flottes."
 naval_drill:0 "Entraînement naval"
 naval_drill_desc:0 "Le chaos d'une bataille peut laisser un navire hors d'état d'agir pendant un long moment. Un équipage entraîné saura toutefois se reprendre bien plus vite."
 naval_fighting_instruction:0 "Instruction au combat naval"
 naval_fighting_instruction_desc:0 "L'expérience de nos vieux loups de mer peut être utile pour mettre au point des méthodes inventives, destinées à améliorer l'efficacité de notre [navy|e] lors des [blockades|e]."
 naval_glory:0 "Gloire navale"
 naval_glory_desc:0 "À la vue de notre glorieuse et prestigieuse marine, tous nos adversaires trembleront de peur."
 naval_initiative_ren:0 "Tactiques de déploiement"
 naval_initiative_ren_desc:0 "Il est vrai que la victoire passe par l'initiative et une mobilisation rapide. L'étude et la mise en œuvre de tactiques de déploiement permettent d'atteindre cet objectif."
 naval_morale_advance_1:0 "Voiliers médiévaux"
 naval_morale_advance_1_desc:0 "Les progrès réalisés dans le domaine de la voile au cours des dernières décennies ont accru l'expertise et la confiance de nos marins, qui naviguent en toute confiance dans les eaux côtières."
 naval_morale_advance_2:0 "Techniques de navigation"
 naval_morale_advance_2_desc:0 "Nos marins s'habituent à effectuer des voyages plus longs grâce à l'utilisation d'un nouvel ensemble de techniques et d'instruments tels que les compas à pointes sèches, qui améliorent leur maîtrise de la navigation."
 naval_morale_advance_3:0 "Expéditions outre-mer"
 naval_morale_advance_3_desc:0 "La prédominance récente du commerce outre-mer à longue distance a habitué nos marins à rester en mer pendant de longues périodes, ce qui les rend résistants à ses effets indésirables."
 naval_morale_advance_5:0 "Flottes permanentes"
 naval_morale_advance_5_desc:0 "La situation géopolitique actuelle, ainsi que l'augmentation des échanges et du commerce dans l'ensemble du monde, requièrent d'utiliser des flottes permanentes pour protéger les intérêts des différents pays. Le fait de disposer d'une marine établie et toujours présente permet aux navires de mieux opérer les uns avec les autres."
 naval_professionalism:0 "Professionnalisation de la marine"
 naval_professionalism_desc:0 "À l'orée du XVIIe siècle encore, les flottes permanentes étaient d'une importance réduite, et même les puissances navales de premier ordre ne maintenaient une force navale que pour répondre aux besoins immédiats. Avec le temps, pourtant, l'évolution se fait dans le sens d'une flotte professionnelle plus importante : à moins que nous ne voulions voir nos rivaux nous dépasser, nous devons tout faire pour créer une flotte permanente plus importante, dotée d'une structure administrative capable de subvenir à ses besoins et d'assurer que la marine soit une carrière viable pour nos officiers."
 naval_repair_ren:0 "Meilleure étanchéité"
 naval_repair_ren_desc:0 "Tout le monde sait qu'un trou dans la coque d'un navire peut le conduire au naufrage. Avec de meilleures techniques de construction, les coques de nos navires seront plus jointives, ce qui empêchera les fuites et permettra de remédier plus efficacement aux voies d'eau."
 naval_supplies_manufactory_advance:0 "Manufacture de fournitures navales"
 naval_supplies_manufactory_advance_desc:0 "$naval_supplies_manufactory_desc$"
 naval_supplies_mill_advance:0 "$naval_supplies_mill$"
 naval_supplies_mill_advance_desc:0 "$naval_supplies_mill_desc$"
 naval_supplies_workshop_advance:0 "$naval_supplies_workshop$"
 naval_supplies_workshop_advance_desc:0 "$naval_supplies_workshop_desc$"
 navigation_acts:0 "Navigation Acts"
 navigation_acts_desc:0 "Ces lois sur la navigation marquent l'apogée du mercantilisme : notre commerce sera désormais assuré par nos navires, qui feront escale en priorité dans nos ports, où nous pourrons leur imposer nos taxes."
 nax_aegean_waystation_networks_advance:0 "Réseaux de relais de l'Égée"
 nax_aegean_waystation_networks_advance_desc:0 "À l'ère du commerce mondial, nos îles sont devenues des escales incontournables en Méditerranée, car elles fournissent de l'eau douce, du bois pour la construction navale et de la viande salée aux équipages effectuant de longs trajets. En uniformisant les installations portuaires de nos quelque vingt îles, nous nous assurons que tout navire marchand doit payer pour bénéficier de notre hospitalité. Ce réseau logistique fait de nous les maîtres incontestés de l'économie intérieure de la mer Égée."
 nax_archipelagic_vigil_advance:0 "Surveillance archipélagique"
 nax_archipelagic_vigil_advance_desc:0 "Les îles éparpillées de la mer Égée exigent une vigilance constante de la part de leurs dirigeants latins, qui entretiennent des flottes de galères légères pour surveiller les pirates, les pillards ainsi que les puissances maritimes italiennes rivales. Les ducs de Naxos et leurs vassaux ont mis au point un système sophistiqué de garnisons insulaires, de feux de signalisation et de navires-courriers rapides afin de pouvoir intervenir rapidement contre les menaces qui pèsent sur l'archipel, tandis que les richesses tirées de la protection du commerce et des droits portuaires contribuent à financer la construction de solides forteresses côtières, faisant ainsi des Cyclades l'une des régions les plus sûres de la francocratie et un véritable rempart maritime."
 nax_naxian_sea_knights_advance:0 "Les chevaliers de la mer naxiens"
 nax_naxian_sea_knights_advance_desc:0 "Notre noblesse est unique au sein du monde occidental : ses effectifs comptent des chevaliers qui ont troqué leur cheval contre une galère et leur lance contre une pique d'abordage. Ces « chevaliers de la mer » sillonnent la Méditerranée orientale sous la bannière ducale, en imposant une « paix latine ». Une attitude agressive qui maintient nos marins sur le qui-vive et menace sans cesse le commerce de nos rivaux."
 nax_sanudos_isles_advance:0 "Îles de Sanudo"
 nax_sanudos_isles_advance_desc:0 "Marco Sanudo, un noble vénitien qui participa à la quatrième croisade, s'empara de l'archipel des Cyclades en 1207 et fonda le duché de Naxos, créant ainsi un État féodal maritime dont les seigneurs régnaient depuis des citadelles fortifiées et tiraient leurs revenus du commerce, de la lutte contre la piraterie et des vallées fertiles de Naxos, Paros et Santorin. En combinant l'instinct commercial vénitien et l'organisation féodale franque, la dynastie Sanudo a maintenu un duché semi-indépendant qui représente un maillon vital pour le réseau commercial latin, car il protège les voies maritimes tout en percevant des droits de passage et en offrant des ports sûrs aux navires croisés, génois et vénitiens."
 nax_the_aegean_hydrographic_bureau_advance:0 "Le Bureau hydrographique de l'Égée"
 nax_the_aegean_hydrographic_bureau_advance_desc:0 "À l'ère de l'exploration mondiale et de la précision, les ducs de Naxos ont créé le premier centre de cartographie et de sciences maritimes de la Méditerranée. En employant les meilleurs astronomes et horlogers pour cartographier chaque récif, courant et régime de vent des Cyclades, nous avons fait de nos cartes marines les outils les plus recherchés au monde. Cette maîtrise scientifique permet aux capitaines naxiotes de naviguer dans les eaux dangereuses de la mer Égée, de nuit ou par tempête, ce qui confère à nos flottes marchandes et militaires un avantage décisif en termes de vitesse et de sécurité sur tout intrus étranger."
 nax_the_marble_trade_of_paros_advance:0 "Le commerce du marbre à Paros"
 nax_the_marble_trade_of_paros_advance_desc:0 "Avec l'augmentation du nombre de commandes d'œuvres d'art, la demande en marbre de Paros de haute qualité a retrouvé des niveaux jamais vus depuis l'époque d'Auguste. En rouvrant les anciennes carrières et en utilisant des techniques d'ingénierie modernes, nous avons transformé une particularité géologique en une source de richesse qui finance notre hégémonie sur la mer Égée. Les palais de Rome et de Paris sont de plus en plus souvent construits avec de la pierre extraite de nos îles souveraines."
 nbu_fight_against_famines:0 "Fin des famines"
 nbu_fight_against_famines_desc:0 "Du fait des vents froids de la fin de l'automne et des neiges abondantes jusqu'au début du printemps, notre peuple souffre souvent de la disette et de la famine. Nous devons donc constituer des réserves de nourriture et chercher comment améliorer le pays de manière à pouvoir faire face à de futures catastrophes."
 nbu_genji_in_the_north:0 "Genji d'Ōshū"
 nbu_genji_in_the_north_desc:0 "Nous sommes par nos origines une branche cadette du Kai Genji, dont l'ancêtre a reçu un fief dans la province d'Ōshū au XIIe siècle en récompense de sa loyauté envers le shogunat de Kamakura. Depuis lors, nous nous sommes accoutumés à la région et à ses hivers rigoureux, et savons mettre à profit ces conditions au niveau tactique et stratégique."
 nbu_northern_horses:0 "Chevaux du nord"
 nbu_northern_horses_desc:0 "Mutsu dispose de vastes prairies par lesquelles le peuple des époques anciennes envoyait des chevaux à Kyôto. La tradition de l'élevage des chevaux s'est perpétuée, et continuer à la cultiver nous permettra de former une cavalerie plus facilement que nos voisins."
 neapolitan_army_reforms:0 "Réformes militaires de Naples"
 neapolitan_army_reforms_desc:0 "Notre nation a besoin de subir de grandes réformes militaires, en modernisant ses forces pour répondre aux défis des champs de bataille modernes. Ces réformes enrichiront nos capacités tactiques, nos structures de commandement et nos entraînements, ce qui nous permettra de disposer d'une force formidable dans notre région."
 neapolitan_industrialization:0 "Industrialisation napolitaine"
 neapolitan_industrialization_desc:0 "À partir du XVIIIe siècle, le royaume de Naples a connu un procédé progressif d'industrialisation. Des secteurs clés tels que le textile, la construction navale et la forge ont connu une forte croissance grâce aux investissements et aux avancées technologiques. Cette industrialisation jouera un rôle significatif dans la transformation de Naples en centre économique majeur."
 neg_bridgehead_of_the_euripus_advance:0 "Tête de pont de l'Euripe"
 neg_bridgehead_of_the_euripus_advance_desc:0 "Le détroit qui sépare notre île du continent est le point stratégique le plus important de Grèce centrale, contrôlé par notre immense pont mobile et nos tours fortifiées. En taxant le flux de marchandises entre la Béotie et la mer Égée, nous avons transformé une particularité géographique en une source permanente de revenus provenant des péages. Nous détenons la clé du mouvement des armées dans les Balkans, et nous faisons payer le prix fort pour son utilisation."
 neg_negropontine_navarchy_advance:0 "La navarchie de Négrepont"
 neg_negropontine_navarchy_advance_desc:0 "Les seigneurs tierciers de Négrepont ont divisé la seigneurie de la longue île entre trois familles, tout en réussissant à maintenir une politique navale unifiée qui domine l'étroit canal d'Euripos et impose des droits de passage à tous les navires transitant entre la mer Égée et les ports du nord. Leurs galères, dont l'équipage est composé de chevaliers francs, de marins grecs et de mercenaires italiens, parcourent le détroit et le surveillent avec une efficacité implacable, garantissant ainsi que Négrepont reste l'un des avant-postes les plus riches et les plus stratégiques de la francocratie."
 neg_the_eubean_tidal_mills_advance:0 "Les moulins à marée d'Eubée"
 neg_the_eubean_tidal_mills_advance_desc:0 "Nos ingénieurs ont exploité les marées inversées uniques du détroit de l'Euripe pour alimenter une série d'imposants moulins à marée. Ces machines fournissent une énergie constante pour moudre le grain, scier le bois de construction navale et alimenter les soufflets de forge, et ce quel que soit le vent. Cet avantage technologique fait d'Eubée l'île la plus avancée de la Méditerranée sur le plan industriel, capable de surpasser ses rivaux maritimes en termes de production."
 neg_the_glassworks_of_chalkis_advance:0 "Les verreries de Chalkis"
 neg_the_glassworks_of_chalkis_advance_desc:0 "Grâce au sable siliceux de haute qualité de nos plages et à la soude provenant de nos usines côtières, nous avons développé une industrie verrière qui rivalise avec celle de Murano. Nos miroirs et nos vitraux sont exportés vers les grands palais de l'Empire latin et de l'Occident, permettant ainsi à l'île de s'enrichir considérablement. Cette industrie de luxe fournit les recettes fiscales nécessaires à l'entretien de nos imposantes murailles côtières à l'ère de la poudre à canon."
 neg_the_three_fold_defense_advance:0 "La triple défense"
 neg_the_three_fold_defense_advance_desc:0 "L'île d'Eubée est divisée en trois #italic Terzieri#!, ou triarchies, ce qui crée une structure défensive compétitive mais unifiée empêchant tout seigneur de s'affaiblir. Ce système tripartite garantit que si une forteresse tombe, les deux autres se mobilisent instantanément, formant ainsi une administration militaire redondante et résiliente. Cette rivalité interne maintient le niveau de préparation de nos garnisons à son maximum, car aucun triarque ne souhaite être surpassé par ses pairs."
 neg_the_triarchic_naval_academy_advance:0 "L'Académie navale triarchique"
 neg_the_triarchic_naval_academy_advance_desc:0 "Afin de garantir la qualité de notre flotte, les trois seigneurs de l'île ont cofondé une académie pour la formation des officiers de marine et des navigateurs. Les étudiants y apprennent les dernières techniques de navigation basées sur l'astronomique et le droit maritime, ce qui garantit le professionnalisme de chaque capitaine eubéen. L'accent mis sur l'enseignement naval permet à notre flotte de rester à la pointe du progrès en termes de guerre maritime et d'exploration."
 neo_confucianism:0 "Néo-$SECT_CONFUCIANISM_NAME$"
 neo_confucianism_desc:0 "Le néo-$SECT_CONFUCIANISM_NAME$, une évolution ultérieure du $SECT_CONFUCIANISM_NAME$ au cours de son histoire millénaire, est également présent au $japan_region$ depuis des siècles. Cependant, un soutien accru de la part de l'État permettra à notre gouvernement d'affermir son emprise sur la nation."
 neo_neopatras_fortresses_advance:0 "Forteresses de Néopatrie"
 neo_neopatras_fortresses_advance_desc:0 "Dans la région montagneuse frontalière du sud de la Thessalie, les seigneurs du duché de Néopatrie (d'abord Brienne, puis les Aragonais) ont construit et renforcé à plusieurs reprises l'un des complexes de châteaux les plus redoutables de la Grèce franque, transformant la ville antique en une forteresse pratiquement imprenable qui a résisté aux sièges répétés de leurs ennemis. Ces murs imposants, ces fossés profonds et ces ouvrages avancés judicieusement situés sont devenus le symbole de la ténacité latine, permettant à une garnison réduite mais déterminée d'étendre son influence jusqu'au cœur de la Grèce centrale et de retarder pendant des générations l'avancée vers le nord des puissances hostiles."
 neo_the_academy_of_administration_advance:0 "L'Académie d'administration"
 neo_the_academy_of_administration_advance_desc:0 "Le duché de Néopatrie doit remplacer ses « capitaines-gouverneurs » héréditaires par des diplômés d'un lycée administratif spécialisé. Les candidats sont testés sur leur connaissance de notre droit civil et des dernières techniques, afin de garantir que les fonctionnaires de la nation soient aussi à l'aise avec une plume qu'avec une épée. Ce passage du « droit de naissance au mérite » a fait du duché de Néopatrie le territoire le plus efficacement gouverné de Grèce centrale, capable de réaliser des recensements précis et de percevoir rapidement les impôts."
 neo_the_consulate_of_the_sea_advance:0 "Le Consulat de la mer"
 neo_the_consulate_of_the_sea_advance_desc:0 "Grâce à nos relations avec la Couronne d'Aragon et les marchands de Barcelone, le duché de Néopatrie est devenu le principal point d'entrée des marchandises ibériques dans le Levant. Nous gérons un #italic Consulat de la mer#! qui offre une protection juridique et des poids normalisés à tous les commerçants catalans et espagnols. Cette relation privilégiée fait de Néopatrie l'avant-poste le plus riche de la Méditerranée occidentale, en plein cœur de la Grèce."
 neo_the_great_companys_code_advance:0 "Le code de la Grande Compagnie"
 neo_the_great_companys_code_advance_desc:0 "La nation continue à être régie par les traditions démocratiques et militaires de la Compagnie catalane : les officiers y sont élus et le butin de guerre y est partagé. Cette structure égalitaire crée une armée au moral incroyablement élevé, car chaque soldat estime avoir un intérêt personnel dans la survie de l'État. Alors que le reste de l'Europe s'oriente vers l'absolutisme, notre « République des soldats » reste une force de combat farouchement loyale et soudée."
 neo_the_neopatras_horse_breeding_program_advance:0 "Le programme d'élevage équin de Néopatrie"
 neo_the_neopatras_horse_breeding_program_advance_desc:0 "Dans la fertile vallée du Sperchiós, les ducs ont aménagé des écuries royales afin d'élever une nouvelle race de chevaux de guerre, en croisant des étalons catalans avec des juments locales des Balkans. Le #italic destrier de Néopatrie#! qui en résulte est réputé pour son endurance en terrain montagneux et sa puissance de frappe lors des charges. Cet avantage en termes de cavalerie nous permet de dominer les plaines ouvertes de Thessalie et de semer la terreur au sein des troupes rivales."
 neo_the_ordinance_of_the_viles_noves_advance:0 "L'ordonnance des Viles Noves"
 neo_the_ordinance_of_the_viles_noves_advance_desc:0 "Le royaume a décidé de centraliser sa population montagnarde dispersée au sein de « villes nouvelles » (Viles Noves en catalan) inspirées des villages fortifiés de Catalogne. La gouvernance de ces villes est confiée à un « consul du foyer », un fonctionnaire chargé de gérer le stockage communautaire du bois de chauffage et des céréales pour les hivers rigoureux. En contrôlant le chauffage et le pain des hautes terres, notre régime met véritablement fin à l'ère des seigneurs de guerre indépendants des montagnes, les remplaçant par une bureaucratie rationalisée et urbanisée."
 netherlandish_protoindustry:0 "Verlagssystem néerlandais"
 netherlandish_protoindustry_desc:0 "Pendant longtemps, nos nations ont abrité des villes et des villages animés qui se consacraient à l'artisanat dans une plus grande proportion que nos voisins, ce qui a fait de nous un pays très productif."
 netherlandish_ship_building:0 "Construction navale néerlandaise"
 netherlandish_ship_building_desc:0 "Comme les Pays-Bas comptent certains des plus grands ports de toute l'Europe, il est normal qu'ils disposent aussi de certains des plus grands chantiers navals. Pouvoir recourir aux charpentiers de marine locaux réduirait grandement le coût des navires marchands."
 network_of_cities:0 "Réseau des cités"
 network_of_cities_desc:0 "À travers les lacs et les vallées, nos cités sont reliées entre elles grâce aux routes, aux marchés et à des objectifs communs, ce qui permet de renforcer notre influence."
 new_currency_demands:0 "Nouvelles demandes en matière de monnaie"
 new_currency_demands_desc:0 "La découverte de nouvelles terres a également entraîné une augmentation des échanges commerciaux, ce qui a provoqué une hausse de la demande de pièces de monnaie. Si les monnaies en métal noble ($goods_gold$ et $silver$) restent les principales valeurs, d'autres métaux moins prestigieux, comme le $copper$ et ses alliages, ont vu leur utilisation et leur circulation s'intensifier."
 new_fire_ceremonies:0 "Nouvelles cérémonies du feu"
 new_fire_ceremonies_desc:0 "Une fois tous les cinquante-deux ans, le monde est renouvelé par les flammes, unissant les peuples dans la foi et l'équilibre cosmique."
 new_frontiers:0 "Frontières nouvelles"
 new_frontiers_desc:0 "Il s'agit du mouvement pour repousser les frontières coloniales, encore et toujours plus loin à l'intérieur des territoires du Nouveau Monde, en y créant tout : de la plus petite bourgade commerciale jusqu'à de véritables villes dotées de vastes terres agricoles."
 new_trade_opportunities:0 "Nouvelles perspectives commerciales"
 new_trade_opportunities_desc:0 "Les besoins de notre peuple s'adaptent aux nouveaux marchés ouverts à nos marchands. Ceux-ci ont été formés de façon à accroître nos profits."
 new_world_advance:0 "Nouveau monde"
 new_world_advance_desc:0 "Comme le soutient le navigateur florentin Amerigo Vespucci, les terres découvertes par Christophe Colomb ne sont pas les Indes, mais un vaste Nouveau Monde étranger à nos anciens et prêt à être cartographié, revendiqué."
 new_world_crops:0 "Cultures du Nouveau Monde"
 new_world_crops_desc:0 "Les terres généreuses du Nouveau Monde ont fourni de nombreux trésors à notre pays, l'un des plus importants étant la découverte de plantes étranges et exotiques cultivées par les indigènes de ces terres et utilisées comme aliments ou épices. L'introduction de ces cultures dans nos champs apportera à notre population la variété et la nouveauté dont elle a besoin."
 newspapers_advance:0 "Journaux"
 newspapers_advance_desc:0 "Le concept d'annonces via des tablettes ou des feuilles affichées publiquement n'est pas nouveau. Cependant, à mesure que la $printing_press$ se répand dans le monde, le besoin d'informations accessibles sur la politique, l'armée et l'économie se fait sentir. Le journal, une publication périodique décrivant l'actualité, répond à cette demande."
 nghia_quan:0 "Le Nghîa Quân"
 nghia_quan_desc:0 "Tout au long de notre histoire, les #italic Nghîa Quân#!, les milices vertueuses, se sont levées pour défendre notre terre contre les menaces. Composées de paysans, de lettrés et de patriotes, elles ont résisté tant aux envahisseurs étrangers qu'à la tyrannie intérieure. Bien que constituées de manière informelle, leur courage et leur dévouement à la patrie en ont fait une force redoutable une fois mobilisées."
 nine_garrisons_of_the_great_wall:0 "Les Neuf Garnisons de la Grande Muraille"
 nine_garrisons_of_the_great_wall_desc:0 "Les réparations de la Grande Muraille ne peuvent suffire à nous défendre des barbares brutaux. Les Neuf Garnisons sont des villes militaires réparties tout du long de la Muraille, qui non seulement contribuent à protéger les points de passage principaux, mais permettent aussi d'améliorer la logistique de toute la frontière septentrionale."
 niyamniyan:0 "Niyamniyan"
 niyamniyan_desc:0 "Traditionnellement, les Cinq Nobles Talents comprennent l'équitation, le tir à l'arc, le commandement militaire, la loyauté et la discipline. Ces aspects de notre société martiale constituent l'épine dorsale et la fierté de notre culture."
 noble_eightfold_path:0 "Noble sentier octuple"
 noble_eightfold_path_desc:0 "Résumé comme la voie permettant de se libérer du saṃsāra et menant au nirvāṇa, le $noble_eightfold_path$ est la distillation des pratiques $buddhist_ADJ$s. Dictant à la fois l'état mental et les actions physiques, il détermine le comportement de tout adepte du $buddhist$."
 noble_knights:0 "Chevaliers nobles"
 noble_knights_desc:0 "Pourvoir une cavalerie exige un système économique capable de produire un grand surplus de montures. Si nous pouvions garantir à la noblesse ses privilèges, elle en serait ravie, au point de travailler elle-même à fournir les chevaux nécessaires. Le bouffon de notre cour a décrit cela comme une garantie de perpétuation du servage."
 noble_officers:0 "Officiers nobles"
 noble_officers_desc:0 "Le choix de ceux qui commandent nos troupes est crucial. La noblesse souhaite s'assurer que cette responsabilité lui revient. Nous ne pouvons que lui donner raison, d'autant que cela lui offre l'opportunité de montrer sa valeur."
 noble_resilience:0 "Réseaux de la noblesse"
 noble_resilience_desc:0 "Les divers groupes de mercenaires du continent ont souvent pour capitaines des membres de la basse noblesse. En nous assurant de bonnes relations avec les nobles, nous pouvons mettre à profit leurs relations pour recruter davantage de mercenaires."
 noble_society_baden_palatine:0 "Société avec l'Âne"
 noble_society_baden_palatine_desc:0 "Fondée pour protéger les intérêts des chevaliers au sein de l'Empire, la #italic Gesellschaft mit dem Esel#! s'est implantée dans les terres entourant $heidelberg$. Son expertise en matière de gouvernance, ainsi que sa capacité à parrainer des tournois, élèveront notre position culturelle."
 noble_society_cologne:0 "Ordre de Saint-Hubert"
 noble_society_cologne_desc:0 "L'#italic Hubertusorden#! servira d'illustre commémoration des prouesses de nos chevaliers au combat ! Rejoindre l'ordre sera une récompense pour nos fidèles champions, et ses membres feront rayonner notre gloire aux yeux de tous."
 noble_society_franconia:0 "Société Fürspang"
 noble_society_franconia_desc:0 "La #italic Gesellschaft mit dem Fürspang#! est un ordre de chevaliers formé pour défendre leurs intérêts et venir en aide à ceux qui les parrainent. En leur fournissant des fonds importants, nous gagnerons considérablement en influence politique dans notre région et au sein du Saint-Empire romain germanique."
 noble_society_mainz:0 "Société Bengler"
 noble_society_mainz_desc:0 "La #italic Klüppelgesellschaft#! a été fondée par un groupe de chevaliers préoccupés par l'érosion de notre pouvoir au sein du Saint-Empire romain germanique. Il serait sage de notre part de soutenir ceux qui sont prêts à se battre pour notre statut."
 noble_society_nassau:0 "Société avec le Lion"
 noble_society_nassau_desc:0 "Fondée dans le contexte difficile du $western_schism$, la #italic Löwenbund#! s'est engagée à protéger nos terres contre les révoltes hérétiques. Nous devrions leur accorder officiellement notre soutien et les intégrer à notre cour afin de renforcer notre cause."
 noble_society_tyrol:0 "Elefantenbund"
 noble_society_tyrol_desc:0 "Nos terres sont menacées d'invasion par des voisins hostiles, qui convoitent les richesses de nos vallées. La création et le financement d'un ordre de chevaliers, prêts à défendre nos terres, nous permettent de mobiliser des forces plus importantes si le besoin s'en fait sentir."
 nobles_rights_laws_advance:0 "$nobles_rights_laws$"
 nobles_rights_laws_advance_desc:0 "$nobles_rights_laws_desc$"
 nomadic_legacy:0 "Héritage nomade"
 nomadic_legacy_desc:0 "Notre peuple est né sur la selle, libre de parcourir le monde sans avoir besoin de s'enraciner."
 nomadic_tendencies:0 "Tendances nomades"
 nomadic_tendencies_desc:0 "Une partie de notre peuple a longtemps été nomade, voyageant d'un milieu habitable à l'autre. Même aujourd'hui, alors que souffle le vent du changement et que nous construisons une cité pour notre peuple, d'aucuns restent ancrés dans leurs traditions nomades et continuent de parcourir le monde."
 non_inheritable_offices:0 "Charges non héréditaires"
 non_inheritable_offices_desc:0 "Le fait que nos magistrats se transmettent leur fonction de père en fils est une plaie pour notre administration, qui propage l'apathie et la pourriture dans tous les secteurs de notre autorité. Ces fonctions devraient plutôt être attribuées aux plus capables de les remplir, quelle que soit leur naissance."
 nor_bounties_of_the_sea:0 "Richesses de la mer"
 nor_bounties_of_the_sea_desc:0 "Les terres $NOR_ADJ$nes ne pourvoient pas suffisamment aux besoins de notre peuple. C'est donc vers la mer que nous nous tournerons pour nourrir les habitants. Fort heureusement, les eaux de la mer du Nord regorgent de nombreuses zones de pêche que nous pourrons exploiter."
 nor_merchant_tradition:0 "Marchands norvégiens"
 nor_merchant_tradition_desc:0 "Les ports de $NOR$ sont depuis longtemps la destination privilégiée des marchands venus de toute l'$europe$. Toutefois, nous contenter d'accueillir des marchands étrangers dans nos ports n'est plus suffisant. Nous devons tirer nous-mêmes profit des échanges commerciaux qui ont lieu en $europe$ du Nord."
 nor_seaborn_country:0 "Pays de marins"
 nor_seaborn_country_desc:0 "Le peuple $NOR_ADJ$ a toujours choisi de parcourir le pays en bateau, lorsque cela est possible. Cela fait de nos citoyens de fervents marins, prêts à rejoindre notre flotte en cas de besoin."
 nor_shipbuilding:0 "Chantiers navals militaires"
 nor_shipbuilding_desc:0 "L'expansion de l'industrie de la pêche a aussi mené au développement de la construction navale. Nous disposons de nombreux ouvriers expérimentés pour développer la construction de navires de guerre."
 norman_law:0 "Lois normandes"
 norman_law_desc:0 "Notre État est gouverné selon son code juridique, la $couteume_de_normaundie$. En consacrant les privilèges nobiliaires, la décentralisation du pouvoir et les droits de propriété, cette tradition juridique garantit notre stabilité tout en affirmant notre identité."
 north_german_hanseatic_traditions:0 "Négociants de la Hanse"
 north_german_hanseatic_traditions_desc:0 "Depuis des siècles, les peuples de nos régions du nord de l'Allemagne tirent profit de leur accès à la mer Baltique. Alors que nombre de nos voisins plus méridionaux doivent se contenter de transporter leurs marchandises par voie fluviale, nous bénéficions d'une longue tradition de commerçants naviguant sur la Baltique, qui ont fait fortune et apporté richesse et prospérité sur nos côtes."
 northern_center_of_arts:0 "Foyer nordique des arts"
 northern_center_of_arts_desc:0 "La cité de Novgorod est un important foyer culturel européen : des épopées s'appuyant sur une forte alphabétisation, de magnifiques icônes et une architecture grandiose contribuent au prestige de la ville florissante et du pays tout entier."
 northern_march:0 "La Marche du Nord"
 northern_march_desc:0 "Aux origines de l'Empire, la région du Brandebourg était peuplée et gouvernée par des tribus slaves, jusqu'à ce que l'empereur crée la Marche du Nord afin de soumettre et de fortifier la région. Au fil du temps, c'est devenu le Brandebourg, l'une des régions les plus importantes de l'Empire."
 norwegian_heritage:0 "Héritage maritime norvégien"
 norwegian_heritage_desc:0 "Les côtes escarpées de Norvège et sa tradition maritime ont fait des Norvégiens un peuple expert en navigation, en pêche et en construction navale. L'héritage des pêcheurs et des charpentiers de marine nordiques alimente nos ambitions navales et soutient la vitalité de nos communautés côtières."
 novgorodian_fur_trade:0 "Commerce de fourrures novgorodiennes"
 novgorodian_fur_trade_desc:0 "Les fourrures, l'or doux de la Russie. Tandis que d'autres États marchands bâtissent leur fortune sur l'or et les métaux rares, la nôtre repose sur les fourrures de haute qualité engendrées par la mère patrie."
 npl_gurkhas:0 "$a_gurkha$"
 npl_gurkhas_desc:0 "$a_gurkha_desc$"
 npl_himalayan_homeland:0 "Enfants de l'Himalaya"
 npl_himalayan_homeland_desc:0 "Notre peuple vit depuis des temps immémoriaux à l'ombre même des montagnes qui soutiennent les Cieux. Les hauts cols, les crêtes escarpées, les vallées fluviales profondément entaillées... tout cela n'est pas un obstacle pour nous, mais la trame même de notre patrie. Même l'air y est différent de celui des plaines, et aucune armée venue des basses terres ne peut espérer se déplacer dans ces contrées comme le font nos soldats."
 npl_the_divya_upadesh:0 "Le Divya Upadesh"
 npl_the_divya_upadesh_desc:0 "Le Divya Upadesh énonce neuf principes qui constituent le cœur de la vie politique et nationale népalaise, ainsi que des lignes directrices pour une politique étrangère réussie. Il résume des siècles de réflexion népalaise sur la gouvernance, la guerre et la paix. En suivant ces principes, le Népal sera en mesure d'éviter la subversion des empires voisins et des étrangers en maraude."
 oak_forests_for_ships:0 "Des forêts de chênes pour nos navires"
 oak_forests_for_ships_desc:0 "Plus nos navires pourront encaisser de dégâts, plus ils pourront en infliger à leur tour. Faisons en sorte d'avoir en permanence des réserves du meilleur bois de chêne pour réparer nos vaisseaux de guerre."
 obon:0 "Obon"
 obon_desc:0 "$obon$ est l'un des festivals les plus importants où l'on honore les morts et les ancêtres. Au cours des festivités, on pratique des offrandes de nourriture et des danses rituelles. Les participants allument également des feux et des lanternes pour guider les âmes des défunts vers les maisons pour les célébrations, avant de les ramener vers la terre des morts."
 oda_generals:0 "Généraux $ODA$"
 oda_generals_desc:0 "L'obsession de la naissance et du privilège a rendu ce pays faible, et la montée en puissance des clans qui se sont élevés seuls a bien montré que c'était une erreur. Apprenons de cette leçon, et laissons le succès et le talent choisir ceux qui devront désormais commander nos armées. Savoir diriger les troupes est une capacité cruciale pour s'étendre rapidement."
 oda_influential_strongholds:0 "Influence des châteaux"
 oda_influential_strongholds_desc:0 "Le $japan_region$ est, de bien des façons, un pays de châteaux et de fortifications. C'est par la construction de solides postes défensifs que nous pouvons assurer notre influence à la fois sur la scène politique et sur les routes stratégiques lors des campagnes militaires. Nous devons retenir cette leçon. De même, c'est par les châteaux que nous pouvons nous assurer que notre présence et notre pouvoir sont constamment visibles. À n'importe quelle période, nous devons accorder la priorité au démantèlement des fortifications ennemies et à l'érection des nôtres sur les sites les plus stratégiques."
 oda_patronization_of_the_west:0 "Patronage de l'Occident"
 oda_patronization_of_the_west_desc:0 "Les missionnaires occidentaux ont amené de nombreuses idées et techniques dans le pays et, contrairement aux anciennes confréries bouddhistes, ils n'ont aucun lien avec les propriétaires terriens corrompus ou les cités toujours prêtes à se révolter. Nous devrions donc réserver bon accueil à ces Occidentaux dans les villes et examiner tous les bénéfices qu'ils peuvent apporter à notre cour."
 oda_tenka_fubu:0 "Tenka fubu"
 oda_tenka_fubu_desc:0 "Nous sommes destinés à régner sur l'ensemble du pays. Nul ne saura résister à notre autorité, et tous les hommes s'inclineront devant notre puissance militaire."
 oda_triple_firing:0 "Rangs triples"
 oda_triple_firing_desc:0 "L'avènement des armes à feu a révolutionné l'art de la guerre dans l'archipel et continuera de le faire. C'est en maîtrisant ces armes nouvelles que nous pourrons vaincre sur le champ de bataille. Afin d'accroître notre cadence de tir, nos arquebusiers doivent former des rangs, ce qui permettra à certains de tirer pendant que les autres rechargeront."
 oda_uninspiring_clan:0 "Clan peu inspirant"
 oda_uninspiring_clan_desc:0 "Malgré la lignée ancestrale de notre clan, nous n'avons visiblement pas autant d'importance que nos voisins, qui sous-estiment notre force. Leur arrogance causera leur perte."
 offensive_army:0 "Armée offensive"
 offensive_army_desc:0 "L'ère de la poudre à canon et des innovations militaires est arrivée et, avec elle, elle apporte un regain d'intérêt et de vitalité à la conduite de la guerre. Pour accroître notre gloire, nous devons veiller avec diligence à ce que nos forces armées offensives soient d'un niveau élevé."
 offerings:0 "Offrandes"
 offerings_desc:0 "L'un des préceptes du $buddhist$ consiste à adresser des offrandes aux $three_jewels$ en vue d'accumuler du mérite. Ces offrandes peuvent être matérielles ou non, et certaines des communautés monastiques dépendent de la nourriture donnée par leurs adeptes pour leur survie."
 offerings_to_the_moirai_advance:0 "Offrandes aux Moires"
 offerings_to_the_moirai_advance_desc:0 "Chaque année, une part de nos offrandes rituelles est consacrée aux trois Moires, les Parques qui gouvernent le destin lui-même. Clotho la fileuse, Lachésis qui attribue la part de vie, et Atropos, la fin inévitable, président à l'accomplissement de chaque existence mortelle selon l'ordre cosmique. Dans de nombreuses traditions théologiques, leur autorité est considérée comme primordiale, surpassant parfois même celle des dieux."
 ogs_improvment_of_nakasendo:0 "Amélioration du Nakasendō"
 ogs_improvment_of_nakasendo_desc:0 "Le Nakasendō est l'une des plus importantes routes reliant le centre et l'est du Japon. Son contrôle garantit également la mainmise sur le commerce qui s'y déroule."
 ogs_kiso_uma:0 "Kiso-uma"
 ogs_kiso_uma_desc:0 "Les chevaux de la région de Kiso sont nos meilleurs amis. Ce ne sont ni les plus grandes, ni les plus rapides des montures, mais leur force réside dans leur grande résistance et leur vigueur, qui leur permettent de survivre dans les montagnes."
 ogs_ogasawara_ryu:0 "Ogasawara-ryū"
 ogs_ogasawara_ryu_desc:0 "Notre société attache une grande importance aux styles traditionnels. Nous avons formalisé le système des arts martiaux et de l'étiquette lorsqu'Ogasawara Nagakiyo, le fondateur de notre clan, a développé notre école. Chaque samouraï devrait apprendre les méthodes qui y sont enseignées."
 ogs_shinano_shugo:0 "Shugo de $shinano_province$"
 ogs_shinano_shugo_desc:0 "Notre clan appartient à une ancienne branche du Genji et dirige la province de $shinano_province$ en tant que shugo. C'est une région montagneuse et inhospitalière pour tous ceux qui ne la connaissent pas, mais notre peuple a toujours su exploiter ces difficultés pour assurer sa défense. Tirons parti de cette expérience, où qu'aillent nos armées, en cherchant toujours à obtenir des informations précises sur les régions où nous combattons."
 oktoechos:0 "Octoéchos"
 oktoechos_desc:0 "Système de huit modes régissant la composition musicale, l'$oktoechos$ fut utilisé par l'Église des siècles durant pour l'écriture de chants et d'airs religieux. Il constitue le fondement du chant $orthodox_ADJ$, bien que chaque culture possède ses propres variations."
 omani_ambition:0 "Terres isolées"
 omani_ambition_desc:0 "Bien qu'il ne s'agisse pas d'une île, notre pays est isolé du reste de l'$arabia_region$ par les déserts. Nous avons donc appris à quel point il est crucial d'avoir un accès à la mer, et à quel point cela nous sera utile d'en priver nos ennemis."
 omani_heritage:0 "Contrôle du Golfe"
 omani_heritage_desc:0 "Nos marins sont habitués à naviguer loin sur les mers, mais c'est par le contrôle du golfe qui nous entoure que nous pérenniserons nos voyages. Nous devons être prêts à toujours défendre nos côtes contre toute menace étrangère."
 omani_tradition:0 "Golfe d'$OMA$"
 omani_tradition_desc:0 "Notre nation se trouve derrière les vastes déserts hostiles d'$arabia_region$, mais à l'est, la mer nous permet de les contourner. C'est par la mer, et non par la terre, que nous devrons développer notre diplomatie, notre commerce et notre expansion."
 on_hubris_and_morality_advance:0 "De l'hubris et de la moralité"
 on_hubris_and_morality_advance_desc:0 "Les principes de notre foi tirent leur origine de la volonté des dieux et sont interprétés par les prêtres, les devins et les actes de divination. Par la prophétie et l'interprétation sacrée, les mortels tentent de comprendre l'ordre divin du cosmos. Pourtant, le chemin le plus sûr vers la vertu morale demeure la piété, la révérence et l'évitement attentif de l'hubris destructrice."
 onmyodo:0 "Onmyōdō"
 onmyodo_desc:0 "Née en $china$ il y a plusieurs siècles, la théorie du yīn et du yáng a évolué au $japan_region$ sous la forme de l'$onmyodo$. Les experts en la matière, appelés Onmyōji, purifient et exorcisent les esprits mauvais et vengeurs, s'intéressent à la divination, l'astronomie et l'étude de la nature."
 open_levy_standards:0 "Élargissement des critères de levée"
 open_levy_standards_desc:0 "Qu'est-ce qui fait qu'un homme se bat et meurt pour son pays ? Ses croyances ? Son attachement à sa famille ? La seule réponse est que nous ne pouvons pas faire d'exception. Chacun a le devoir de servir sous notre bannière."
 open_sea_exploration:0 "Exploration outre-mer"
 open_sea_exploration_desc:0 "Les vastes mers nous promettent de grandes richesses et de nouvelles possibilités de commerce sur des rivages lointains."
 opera_house_advance:0 "Opéra"
 opera_house_advance_desc:0 "$opera_house_desc$"
 optimism:0 "Optimisme"
 optimism_desc:0 "La victoire ne se gagne pas seulement sur le champ de bataille, mais déjà lors de la planification des campagnes. Nos progrès dans le domaine de la raison permettent à notre peuple de se montrer moins sensible aux revers temporaires, pour rester concentré sur notre inévitable victoire."
 orang_laut:0 "Orang Laut"
 orang_laut_desc:0 "Bien avant notre ascension, les Orang Laut parcouraient les détroits en maîtres du vent et des marées. Aujourd'hui, en apprenant leurs méthodes et en employant quelques-uns d'entre eux, nous guidons les marchands à travers les eaux étroites et tenons les pirates à distance de nos côtes. Cette vigilance garantit que tous ceux qui naviguent vers $malacca$ arrivent à bon port."
 order_headquarters_advance:0 "$order_headquarters$"
 order_headquarters_advance_desc:0 "Il est certain que l'établissement d'ordres fidèles contribuera non seulement à l'augmentation des capacités défensives locales, mais aussi au recrutement d'un plus grand nombre d'hommes valides."
 organised_construction:0 "Construction raisonnée"
 organised_construction_desc:0 "L'amélioration des infrastructures est une opération nécessaire, mais fort coûteuse. Ce pourrait toutefois être bien moins onéreux en organisant tout cela de façon plus rationnelle."
 organised_mercenary_payment:0 "Paiements organisés pour les mercenaires"
 organised_mercenary_payment_desc:0 "Les capitaines mercenaires sont rusés : ils essaient souvent de faire monter les enchères entre deux commandements de la même armée prêts à utiliser leurs services. Il nous faut donc organiser leur recrutement, de manière à prévenir les abus et toujours être en position favorable lors des négociations."
 organised_mercenary_recruitment:0 "Recrutement de mercenaires"
 organised_mercenary_recruitment_desc:0 "L'argent n'est pas le seul problème qui se pose lors du recrutement de mercenaires : encore faut-il en trouver qui acceptent de nous servir. Nous devons par conséquent nous assurer que notre armée permettra à n'importe quelle compagnie de se joindre à nous."
 organized_religion:0 "Organisations religieuses "
 organized_religion_desc:0 "La religion joue un rôle majeur dans chaque société, mais toutes les confessions n'ont pas la même structure. Une religion organisée observe des rituels et des systèmes de croyances soigneusement définis, et suit des doctrines précises."
 ori_anka_year_system:0 "Système d'années Anka"
 ori_anka_year_system_desc:0 "L'année Anka est notre façon de documenter la durée de règne de nos dirigeants. Les années se terminant par 6 et 0, à l'exception de 10, sont ignorées et l'Anka commence toujours lors de la #italic Sunia#!, la nouvelle année fiscale Odia."
 ori_encourage_salt_trade:0 "Commerce de sel"
 ori_encourage_salt_trade_desc:0 "La haute qualité du $salt$ de l'$ORI$ est très demandée en $india$. Faisons ce que nous pouvons pour encourager le commerce de $salt$ afin de pouvoir nous enrichir grâce à lui."
 ori_expansion_of_infrastructure:0 "Développement des infrastructures"
 ori_expansion_of_infrastructure_desc:0 "Les progrès technologiques s'accompagnent d'une augmentation de la population de notre État. Il est plus qu'évident que l'industrialisation a conduit la croissance de notre population à un niveau supérieur. Nous devons donc développer nos infrastructures pour faire face à cette nouvelle situation."
 ori_lord_of_elephants:0 "Gajapati"
 ori_lord_of_elephants_desc:0 "Les chevaux ne sont pas communs dans l'$ORI$ et les terres ne se prêtent pas à leur élevage. Nos jungles sont cependant célèbres pour leurs nombreux éléphants. Dans les jungles denses de l'est de l'$india$, une coopération tactique bien menée entre les éléphants et l'infanterie peut être tout aussi meurtrière qu'une armée de cavalerie. Augmentons encore la taille de nos bataillons d'éléphants et affinons leurs tactiques, afin que nous puissions être reconnus comme de véritables #italic Gajapati#!, Seigneurs des éléphants."
 ori_odia_militarization:0 "Militarisation d'Odia"
 ori_odia_militarization_desc:0 "La menace $muslim_ADJ$e est omniprésente, elle ne s'arrête jamais. Nous devons veiller à ce que notre armée soit prête à affronter les envahisseurs à tout moment."
 ori_parikshas:0 "Les pârikshâs"
 ori_parikshas_desc:0 "Les terres de l'$ORI$ ont longtemps été divisées entre de nombreux princes. Cependant, le temps des mandaleshvaras est révolu ! Nous devons prendre le contrôle de ces terres et nommer des gouverneurs régionaux, des pârikshâs, au lieu de laisser ces petits princes diluer notre autorité impériale."
 ori_patronize_temple_construction:0 "Constructions de temples encouragées"
 ori_patronize_temple_construction_desc:0 "La grandeur des temples qu'elles ont laissés derrière elles témoigne de la gloire des dynasties passées. Nous devrions nous efforcer d'améliorer les nombreux grands complexes de temples présents sur nos terres et d'engager des architectes pour en construire de nouveaux afin de poursuivre le développement architectural du Kalinga."
 ori_refined_cloth_production:0 "Production d'étoffes améliorée"
 ori_refined_cloth_production_desc:0 "L'$ORI$ est réputée pour ses textiles de haute qualité depuis les temps anciens. Encourageons davantage les guildes textiles de l'$ORI$ à affiner leurs méthodes de production du tissu raffiné du Kalinga."
 ori_servitor_of_jagganath:0 "Serviteurs de Jagannâtha"
 ori_servitor_of_jagganath_desc:0 "Le culte de Jagannâtha, le seigneur de l'univers, est ce qui unit ces terres. Les anciens dirigeants de l'$ORI$ ont été considérés comme les fils de Jagannâtha. Notre dirigeant actuel n'est peut-être pas son descendant, mais nous devons faire comprendre à tous que notre dirigeant est le serviteur de Jagannâtha et que toute désobéissance équivaut à une trahison envers le seigneur Jagannâtha lui-même."
 origin_of_coffee:0 "Le berceau du café"
 origin_of_coffee_desc:0 "C'est de nos terres que le café vient, car c'est un lieu idéal. Même s'il peut être cultivé dans d'autres lieux, notre café est réputé pour sa qualité et exporté par tonnes. Il nous faut en faire une façon de créer de la richesse pour notre pays."
 original_christianity:0 "$christian$ originel"
 original_christianity_desc:0 "Le monde $christian_ADJ$ a connu de nombreuses scissions et divisions, mais notre dogme plonge ses racines dans le véritable $christian$ originel, formulé depuis le premier concile de Nicée. Après celui-ci, seuls les hérétiques se sont séparés de la branche principale."
 orm_a_vast_emporium:0 "Grand marché"
 orm_a_vast_emporium_desc:0 "On a dit d'Ormuz qu'elle était « un vaste centre de commerce, où se trouvent des personnes et des marchandises de toutes les sortes et toutes les régions du monde », ou encore que « si le monde tout entier était un anneau d'or, Ormuz en serait le joyau ». L'identité de notre royaume est indissociable du commerce. En effet, des navires venant du Gujarat, d'Arabie et même de Chine jettent l'ancre dans nos ports, pour y échanger épices, pierres précieuses, soies et récits."
 ormuzi_navy:0 "Flotte ormuzienne"
 ormuzi_navy_desc:0 "Le Golfe a toujours compté sur nos flottes, qu'il s'agisse de marchands, de patrouilles ou d'escortes armées. Mais pour rivaliser avec les ambitions de ceux qui convoitent notre position, il nous faut nous étendre et nous moderniser. Faisons d'Ormuz non seulement un comptoir, mais aussi un arsenal naval des mers."
 ostentatious_clothing:0 "Tenues ostentatoires"
 ostentatious_clothing_desc:0 "Il est du droit et du devoir des classes dirigeantes d'afficher leur pouvoir par leur apparence. Elles portent donc des vêtements de plus en plus flamboyants, faisant appel aux techniques les plus récentes pour obtenir des couleurs et des motifs éclatants et luxueux."
 ostrog_advance:0 "$ostrog$"
 ostrog_advance_desc:0 "$ostrog_desc$"
 otm_christian_conversion:0 "Convertis au christianisme"
 otm_christian_conversion_desc:0 "Les relations de plus en plus poussées avec les étrangers ont suscité l'attention de nombreux membres du clan pour la foi chrétienne. Ces chrétiens comptent de nombreux et puissants protecteurs parmi nos seigneurs et nos vassaux, et bien peu sont aussi zélés que les convertis de fraîche date. Utilisons-les donc à bon escient, quelle que soit la route que choisira de prendre le clan, afin de faire avancer notre cause."
 otm_domination_of_kyushu:0 "Domination de Kyūshū"
 otm_domination_of_kyushu_desc:0 "Nous avons été nommés shugo de $bungo_province$, $hizen_province$ et $hyuuga_province$. Nous sommes aujourd'hui en position de force pour revendiquer toute l'île de Kyūshū."
 otm_lord_of_bungo:0 "Seigneurs de Bungo"
 otm_lord_of_bungo_desc:0 "Nous sommes les Shugo de Bungo depuis l'ère Kamakura. Ces terres sont connues pour leur grande fertilité et les riches récoltes de cette région nous permettent de nourrir des armées plus importantes que beaucoup d'autres $daimyo$."
 otm_nanban_trade:0 "Accueil au commerce Nanban"
 otm_nanban_trade_desc:0 "Certains peuvent bien considérer les étrangers comme des barbares ; quant à nous, nous reconnaissons les bénéfices et les avantages du commerce avec eux. Faisons savoir qu'ils seront toujours les bienvenus dans nos ports, ce qui nous permettra d'étendre bien plus loin que nos rivaux notre réseau commercial."
 ottoman_bureaucracy:0 "Le birûn"
 ottoman_bureaucracy_desc:0 "Le birûn, ou service extérieur, comprend le groupe d'administrateurs, d'officiers militaires et d'érudits religieux proche de l'entourage direct du souverain. Ensemble, ils forment une bureaucratie efficace, héritée de l'Iran et des grands Seldjoukides. Son adaptation par des éléments byzantins la rend ottomane par excellence."
 ottoman_tax_farming:0 "Muqata'ah"
 ottoman_tax_farming_desc:0 "Un système d'exploitation fiscale dans lequel les nobles achètent le droit de percevoir des revenus sur une parcelle de terre appartenant à la Couronne. La $ottoman_tax_farming$ équilibre la répartition des richesses dans l'empire et détourne les nobles de la corruption, en leur donnant un intérêt direct à soutenir l'État."
 ottoman_waystations:0 "Menzil"
 ottoman_waystations_desc:0 "Servant de dépôts de ravitaillement et d'hébergements pour les soldats et fonctionnaires, les relais menzils évitent à nos armées de recourir excessivement au pillage, assurant un approvisionnement fiable sur chaque frontière."
 ouc_descendant_of_baekje:0 "Descendants de Baekje"
 ouc_descendant_of_baekje_desc:0 "Les chroniques disent que nous sommes les descendants du prince Imseong, qui appartenait à la famille royale de l'ancien royaume coréen de Baekje. Ce mythe nous accorde un grand prestige dans toute l'Asie de l'Est."
 ouc_fight_against_wokou:0 "Protection contre la piraterie"
 ouc_fight_against_wokou_desc:0 "Afin de maintenir les bonnes relations de nos marchands avec le continent, nous devons patrouiller en mer de façon constante. Tant que les pirates et contrebandiers y resteront nombreux, les étrangers ne pourront nous faire confiance, et pourraient même agir contre nous."
 ouc_korea_trade:0 "Commerce avec la Corée"
 ouc_korea_trade_desc:0 "Notre position géographique a fait de nous le clan le plus impliqué dans le commerce avec la Corée, et nos marchands détiennent quasiment le monopole de nombreux biens exotiques. Nous devons tout faire pour conserver cette position avantageuse et ainsi empêcher tout arriviste de songer même à nous défier."
 ouc_welcome_missionaries:0 "Accueil des Occidentaux"
 ouc_welcome_missionaries_desc:0 "Alors que leurs réseaux commerciaux ont commencé à s'étendre, nous sommes entrés en contact avec toujours plus d'étrangers, et toujours plus de religions. Quelles que soient leurs croyances, leur argent est bon, aussi devons-nous rester ouverts à leurs idées et nous assurer de profiter des échanges avec eux."
 outwards_expansion:0 "Expansion vers l'extérieur"
 outwards_expansion_desc:0 "Il relève du devoir sacré de l'Église d'apporter la lumière du Christ aux infidèles et aux païens. C'est pourquoi nous devons voyager au-delà de nos frontières afin d'offrir le salut à leur âme."
 overnight_army:0 "Une armée au repos"
 overnight_army_desc:0 "Notre capitale et nos villes sont construites sur le modèle des campements de l'armée : elles ont des ailes, une avant-garde, une ligne de front et un centre. En nous assurant que la pensée militaire est constamment présente dans notre vie quotidienne, nous améliorons notre capacité à nous préparer à la guerre."
 oversea_missions:0 "Missions d'outre-mer"
 oversea_missions_desc:0 "Le clergé est prêt à répandre notre foi dans les territoires d'outre-mer. Grâce à cette contribution, l'établissement de nouvelles colonies sera à la fois plus facile et plus économique."
 overseas_exploration:0 "Chercheurs de fortune"
 overseas_exploration_desc:0 "La plupart du temps, l'établissement de colonies dans des territoires lointains est un aller simple : si l'on n'est pas emporté par une maladie inconnue, le voyage est si long que l'on ne reviendra de toute manière jamais. Mais si nous rappelons au peuple les fortunes qui peuvent y être faites, cela l'encouragera à explorer toujours plus loin."
 overseas_merchants:0 "Marchands d'outre-mer"
 overseas_merchants_desc:0 "Afin de développer le commerce, nous devons accorder le droit de citoyenneté à ceux qui vivent au-delà des mers, soutiennent notre commerce et appartiennent à la classe sociale la plus appropriée."
 overseas_trade:0 "Commerce outre-mer"
 overseas_trade_desc:0 "Tandis que notre nation reçoit des nouvelles de contrées lointaines, nos commerçants sont en quête de nouveaux marchés où exhiber leurs produits, tels des fruits mûrs attendant d'être cueillis."
 pacify_population_advance:0 "Contrôle des agitateurs"
 pacify_population_advance_desc:0 "Inévitablement, il arrivera tôt ou tard que notre règne suscite du mécontentement. Toutefois, ce ne sera jamais un problème majeur tant que nous ne le laisserons pas prendre de l'ampleur. Si nous recherchons activement ceux qui sont susceptibles de se dresser contre nous, nous étoufferons toute agitation dans l'œuf avant qu'ils ne rallient assez de monde autour d'eux. Ainsi, la population sera plus satisfaite de nous."
 paik_regiments_advance:0 "$a_paik_infantry$"
 paik_regiments_advance_desc:0 "$a_paik_desc$"
 paik_system_advance:0 "$paik_system$"
 paik_system_advance_desc:0 "$paik_system_desc$"
 pal_a_just_ruler:0 "Dirigeant bienveillant"
 pal_a_just_ruler_desc:0 "Un bain de sang a pour seul effet de causer plus de massacres. Nous avons donc besoin d'un dirigeant pacifique, capable de se réconcilier avec nos ennemis pour établir une paix durable dans nos territoires."
 pal_bilbiotheca_palatina:0 "Protéger la #italic Bibliotheca Palatina#!"
 pal_bilbiotheca_palatina_desc:0 "Riche en écrits théologiques de plusieurs confessions #L $christian_ADJ$nes#!, la #italic Bibliotheca Palatina#! est l'un de nos biens les plus précieux. Protéger les connaissances et la valeur culturelle qu'elle renferme doit être une priorité absolue, car cela nous permettra de continuer à nous appuyer sur ses documents."
 pal_castles_on_rhine:0 "Châteaux sur le Rhin"
 pal_castles_on_rhine_desc:0 "En érigeant de multiples châteaux à des positions stratégiques le long du Rhin, nous pourrons assurer et étendre notre contrôle du fleuve et du commerce qui s'y déroule."
 pal_cultivate_vineyards:0 "Vignobles et vergers du Rhin"
 pal_cultivate_vineyards_desc:0 "Bien que nos territoires soient peu étendus, les rives ensoleillées du Rhin sont parfaitement adaptées aux vignes et aux vergers. Avec quelques efforts, nous pourrions adapter notre économie locale autour du vin."
 pal_fractured_territory:0 "Consolidation des territoires"
 pal_fractured_territory_desc:0 "Notre administration est capable de gérer plusieurs territoires détachés sans en perdre le contrôle. Cela nous permettrait de construire une bureaucratie puissante capable de gérer les tâches les plus difficiles."
 pal_heaven_of_tolerance:0 "Tolérance palatine"
 pal_heaven_of_tolerance_desc:0 "Peu importe leurs dénominations, tous les chrétiens doivent être bienvenus dans les villes et cités de nos territoires. Là où d'autres décident d'écraser leurs minorités religieuses, notre tolérance assurera un flot constant de migrants dans nos territoires."
 pal_heidelberg_catechism:0 "Catéchisme de Heidelberg"
 pal_heidelberg_catechism_desc:0 "La Réforme a suscité de nombreux débats sur la nature de notre foi. Nous devrions investir dans un catéchisme complet, auquel notre peuple pourra adhérer."
 pal_humanist_court:0 "Éducation humaniste"
 pal_humanist_court_desc:0 "Pour bien gouverner, nos dirigeants doivent se voir enseigner les idées humanistes dans leur intégralité. À cette fin, nous devons engager des humanistes renommés qui seront à même d'offrir cette éducation à nos dirigeants et à leurs héritiers, tout en portant l'intérêt de notre cour sur ces principes."
 pal_mildness_to_the_commoners:0 "Le pardon pour les paysans"
 pal_mildness_to_the_commoners_desc:0 "Lorsque nos paysans se soulèvent contre notre noblesse, ils se soulèvent incontestablement contre notre propre autorité. Cependant, nous ne devons pas punir à outrance ceux qui se révoltent. Si les retombées sont modérées, tout le monde sera plus en accord avec notre autorité."
 pal_palatine_lion:0 "Lion palatin"
 pal_palatine_lion_desc:0 "Issu des armoiries dynastiques de la famille Wittelsbach, le Lion palatin représente la clé de voûte de notre légitimité. Orné d'une couronne rouge, il symbolise notre rôle de vicaire impérial et d'archi-intendant du Saint-Empire romain germanique. Tant que le Lion palatin trônera fièrement sur notre blason, notre légitimité ne sera pas remise en question."
 pal_protection_of_exclaves:0 "Fortification locale"
 pal_protection_of_exclaves_desc:0 "En raison de la dispersion de nos territoires, nous sommes vulnérables aux attaques de plusieurs puissances étrangères. La construction de nombreux avant-postes fortifiés sur nos terres nous permettra de gagner du temps pour lever une armée et repousser toute tentative de conquête de l'un de nos nombreux territoires isolés."
 palatial_economy_advance:0 "palatial_economy"
 palatial_economy_advance_desc:0 "A technology focused on production, taxes, and wider economic growth."
 palatinate_romanticism:0 "Soutien au mouvement romantique"
 palatinate_romanticism_desc:0 "Une partie importante du mouvement romantique a choisi la région autour d'Heidelberg pour y vivre. Nous devrions profiter de ce phénomène et les soutenir, ainsi que d'autres artistes, pour apporter la gloire à notre pays."
 pali_canon:0 "Canon $pali_language$"
 pali_canon_desc:0 "Il existe différents canons du $buddhist$ en fonction de chaque école, mais le $pali_canon$ $theravada_ADJ$ reste le plus ancien et le plus prestigieux d'entre eux. Tandis que d'autres écoles ont établi leurs canons en combinant des textes de diverses sources, le $pali_canon$ n'a pas changé depuis l'époque d'Ashoka le Grand et contient les paroles du Bouddha lui-même. Il a également servi de base et de référence à de nombreuses autres écoles."
 palm_tree_masters:0 "Maîtres des palmiers"
 palm_tree_masters_desc:0 "Nos productions locales sont maigres, mais nous avons une chose en abondance : les palmiers. Suffisamment solide pour la construction de maisons et de bateaux, suffisamment souple pour se plier et prendre forme grâce à notre savoir-faire, ce type de bois nous permettra d'accroître nos richesses et nos activités maritimes."
 pan_amalgamation_advance:0 "Amalgamation en cuve"
 pan_amalgamation_advance_desc:0 "L'$pan_amalgamation_advance$ est une amélioration du $patio_process_advance$, qui permet de traiter plus rapidement le minerai."
 pan_asian_trade:0 "Commerce dans toute l'Asie"
 pan_asian_trade_desc:0 "Le pays Sunda se situe au carrefour des grands empires, l'Inde, la Chine et le monde islamique. En nous positionnant comme un nœud indispensable de ce réseau, nous assurons l'accès aux marchandises, aux idées et aux partenaires de toute l'Asie, transformant nos ports en portes de la prospérité."
 pap_legacy_of_the_military_orders:0 "Héritage des ordres militaires"
 pap_legacy_of_the_military_orders_desc:0 "Bien que l'ère des ordres sacrés soit terminée depuis longtemps, son héritage reste une source d'inspiration majeure pour les soldats de Dieu qui s'engagent à défendre le Saint-Siège contre les menaces hérétiques et païennes."
 papal_investiture_and_tithes:0 "Investiture papale et dîmes"
 papal_investiture_and_tithes_desc:0 "À Rome parviennent les richesses venues de toute l'Europe chrétienne."
 paper_guild_advance:0 "Guilde du papier"
 paper_guild_advance_desc:0 "$paper_guild_desc$"
 paper_guild_cloth_maintenance_advance:0 "$paper_guild_cloth_maintenance$"
 paper_guild_cloth_maintenance_advance_desc:0 "Le $paper_guild_cloth_maintenance$, fabriqué à partir de coton de mauvaise qualité ou de tissu usagé, établit de nouvelles normes en matière de qualité et de durabilité."
 paper_guild_fiber_pulp_maintenance_advance:0 "$paper_guild_fiber_pulp_maintenance$"
 paper_guild_fiber_pulp_maintenance_advance_desc:0 "En utilisant des plantes à fibres comme le chanvre ou le mûrier, la production de papier sera largement disponible dans le monde entier. Bien qu'il soit peu coûteux à produire, sa qualité laisse toutefois à désirer."
 paper_guild_wood_pulp_maintenance_advance:0 "$paper_guild_wood_pulp_maintenance$"
 paper_guild_wood_pulp_maintenance_advance_desc:0 "En utilisant du bois tendre disponible partout, le papier sera plus facile à produire et moins cher que jamais."
 paper_manufactory_advance:0 "$paper_manufactory$"
 paper_manufactory_advance_desc:0 "$paper_manufactory_desc$"
 paper_mill_advance:0 "$paper_mill$"
 paper_mill_advance_desc:0 "$paper_mill_desc$"
 paper_workshop_advance:0 "$paper_workshop$"
 paper_workshop_advance_desc:0 "$paper_workshop_desc$"
 partition_inheritance_advance:0 "Partage successoral"
 partition_inheritance_advance_desc:0 "Il n'est pas rare de voir une rivalité s'installer entre les fils d'un monarque, car chacun convoite le trône. Pour éviter ces querelles, certains souverains choisissent de partager équitablement leurs territoires et leurs titres entre leurs fils afin de satisfaire tout le monde."
 paschal_cycle:0 "Temps pascal"
 paschal_cycle_desc:0 "L'$orthodox$ comprend plusieurs fêtes mobiles centrées sur #italic Pascha#!, Pâques, organisées durant le $paschal_cycle$. Les dix semaines précédant Pâques sont appelées Triodion, tandis que les 50 jours suivant cet événement sont appelés Pentecostarion. Ce cycle marque les célébrations les plus importantes de l'année liturgique."
 pat_the_church_state_of_saint_andrew_advance:0 "L'État ecclésiastique de Saint-André"
 pat_the_church_state_of_saint_andrew_advance_desc:0 "Cœur spirituel de la francocratie, Patras est devenue une principauté ecclésiastique souveraine similaire aux principautés épiscopales du Saint-Empire romain germanique. L'archevêque manie à la fois la crosse et l'épée, gouvernant ses terres par le biais d'un #italic synode de défense#! qui fusionne la loi religieuse et l'obligation militaire féodale. Ce statut unique nous permet de mobiliser la paysannerie par la ferveur religieuse, considérant chaque escarmouche frontalière comme une guerre sainte localisée."
 pat_the_patrine_mint_advance:0 "Le Patrine Soldo"
 pat_the_patrine_mint_advance_desc:0 "Patras a obtenu le droit de frapper sa propre monnaie, le #italic Patrine Soldo#!, reconnue pour la stabilité de sa valeur dans toute la région égéenne. En tant que banque centrale de la Morée franque, l'archevêque exerce une puissante influence économique sur les seigneurs laïques. Nous contrôlons le pouls du commerce grâce à la pureté de notre argent."
 pat_the_pilgrimage_tolls_advance:0 "Les péages des pèlerinages"
 pat_the_pilgrimage_tolls_advance_desc:0 "Les reliques présumées de saint André attirant des milliers de pèlerins catholiques qui cherchent refuge à l'Est, nous avons mis en place un réseau d'« hospices » fortifiés pour les protéger. En imposant des « frais de protection » modestes pour le passage et l'hébergement, l'archevêché contribue à financer le maintien d'une armée permanente de moines croisés. Ces fonds sont également utilisés pour embellir la ville, illustration glorieuse de l'architecture latine, faisant de Patras la « Rome de l'Orient »."
 pat_the_port_of_sanctuary_advance:0 "Le port du sanctuaire"
 pat_the_port_of_sanctuary_advance_desc:0 "Nos ports ont été déclarés « ports neutres sacrés ». Les marchands de toutes les nations, qu'elles soient catholiques, orthodoxes ou autres, peuvent y commercer en toute sécurité. Ce statut de sanctuaire a fait de nos ports le principal terrain neutre pour le commerce méditerranéen. Même en temps de guerre totale, le commerce de Patras continue de fonctionner, protégé par l'interdiction de l'archevêque."
 pat_the_seminary_of_diplomats_advance:0 "Le séminaire des diplomates"
 pat_the_seminary_of_diplomats_advance_desc:0 "L'archevêque a fondé une école pour former le clergé à l'art de la négociation internationale et de la correspondance secrète. Nos « diplomates en robe noire » représentent les yeux et les oreilles de l'Orient latin au sein des cours d'Europe. Ce réseau de renseignement clérical confère à Patras une influence géopolitique que les royaumes rivaux lui envient."
 pat_uniate_liturgical_printing_advance:0 "Imprimerie liturgique uniate"
 pat_uniate_liturgical_printing_advance_desc:0 "Afin de contrer l'influence du monde orthodoxe, l'archevêque a créé la première imprimerie catholique en langue grecque dans le Péloponnèse. Nous produisons des bibles et des textes liturgiques qui utilisent la langue grecque mais adhèrent au dogme latin, remportant peu à peu la « guerre des mots » parmi les classes grecques lettrées. Cette offensive culturelle réduit le risque de rébellion et intègre la population de Grèce dans la hiérarchie sociale latine sans la priver de son héritage linguistique."
 patio_process_advance:0 "Procédé de réduction"
 patio_process_advance_desc:0 "Le $patio_process_advance$ consiste à raffiner des minerais d'argent et d'or de faible qualité à l'aide d'une solution chimique à base de mercure pour catalyser la réaction d'amalgamation."
 patriarchate_of_lithuania:0 "Patriarcat de Lituanie"
 patriarchate_of_lithuania_desc:0 "L'abolition de la $romuva$, la foi de nos ancêtres, a ébranlé le tissu social du peuple $LIT_ADJ$. Pour assurer notre avenir, nous avons choisi la voie de l'$orthodox$, célébrant ainsi une nouvelle identité. Il est impératif que les autorités religieuses de l'$orthodox$, notre nouvelle foi, conservent leur autonomie par rapport aux patriarcats étrangers afin d'éviter toute ingérence extérieure."
 patron_of_art:0 "Mécène"
 patron_of_art_desc:0 "C'est ici que débute notre quête d'une société plus cultivée. L'histoire retiendra que nos chefs-d'œuvre étaient les plus magnifiques de notre temps."
 patron_of_music:0 "Mécène des musiciens"
 patron_of_music_desc:0 "Les arts musicaux sont malheureusement trop négligés par les autres dirigeants. Pour la plus grande gloire de Dieu, et la nôtre, finançons les musiciens et Milan brillera de mille feux."
 paved_road_advance:0 "$paved_road$"
 paved_road_advance_desc:0 "$paved_road_desc$"
 peasant_connections_advance:0 "Relations avec les paysans"
 peasant_connections_advance_desc:0 "Nos marchands ont établi des liens avec les villages à l'intérieur de nos territoires comme à l'extérieur de nos frontières. Cela leur permet d'obtenir de meilleurs prix pour les denrées alimentaires que ceux auxquels on pourrait s'attendre."
 peasants_rights_laws_advance:0 "$peasants_rights_laws$"
 peasants_rights_laws_advance_desc:0 "$peasants_rights_laws_desc$"
 peel_towers_advance:0 "Tours peel"
 peel_towers_advance_desc:0 "Les tours peel ont été conçues en réponse à la dureté de la vie dans les régions frontalières de notre pays. Elles servent de protection contre les incursions de groupes de pillards hostiles, protégeant à la fois la vie humaine et le bétail. En outre, elles constituent un moyen rapide d'alerter les villes voisines de l'approche d'armées hostiles à l'aide de leurs feux de signalisation."
 people_of_allah:0 "Peuple d'$muslim_god_name$"
 people_of_allah_desc:0 "Nous sommes les fidèles d'$muslim_god_name$, le seul vrai Dieu, et nous soumettons à Sa parole. À Ses yeux, tous ceux qui croient en Lui sont nos frères et sœurs."
 people_of_ornaments:0 "Peuple des ornements"
 people_of_ornaments_desc:0 "Nos artisans sont renommés aux quatre coins du monde, et l'on dit d'eux qu'ils ne peuvent laisser aucune surface non décorée. Tirons parti de cette réputation en répandant leurs œuvres partout où nous allons."
 people_of_the_sea:0 "Peuple de la mer"
 people_of_the_sea_desc:0 "Nous sommes un peuple façonné par le vent et les marées. Dès l'enfance, nous apprenons à appréhender les caprices de la mousson, le rythme des détroits et l'appel de l'océan. Nos marins mettent ce savoir à profit dans chacun de leurs voyages, gagnant ainsi une certaine renommée au sein de tout l'archipel pour leur courage et leur maîtrise."
 people_of_war:0 "Peuple guerrier"
 people_of_war_desc:0 "Qu'il veuille des captifs à sacrifier, se couvrir de gloire, semer la terreur dans le cœur de ses ennemis ou bien s'enrichir, notre peuple est habitué à un état de guerre permanente dont il supporte les rigueurs bien mieux que les autres."
 pepper_of_the_parahyangan:0 "Poivre du Parahyangan"
 pepper_of_the_parahyangan_desc:0 "Les sols volcaniques fertiles des hauts plateaux sundanais offrent des conditions idéales pour cultiver le précieux poivre noir, recherché par les marchands du monde entier pour son arôme et sa puissance. Nous devons faire de ce trésor naturel un levier pour étendre notre influence par le commerce des épices."
 perfumery_advance:0 "Parfumerie"
 perfumery_advance_desc:0 "$perfumery_desc$"
 perpetual_general_captain_of_the_people:0 "Capitaine général perpétuel du peuple"
 perpetual_general_captain_of_the_people_desc:0 "Dans les tourments politiques de la Vérone médiévale, le titre de Capitano del Popolo dépassa la simple fonction honorifique pour incarner une revendication durable du pouvoir. Enraciné dans la tradition civique et brandi par les Scaligeri comme légitimation de leur autorité, il ancra leur domination dans une cité où la loyauté se conquiert difficilement."
 persian_in_the_court:0 "Persan à la cour"
 persian_in_the_court_desc:0 "Du fait de nos racines, une grande partie de notre administration s'est appuyée sur la langue persane pendant un certain temps. Combinée à la diversité culturelle de la région, cette situation a conduit à une coopération nouvelle qui transcende les barrières."
 personal_executions:0 "Exécutions personnelles"
 personal_executions_desc:0 "Le peuple doit constater notre engagement en faveur de la justice. Désormais, les criminels les plus odieux seront exécutés de la main du souverain. Ainsi, les gens sauront que l'ordre règne dans notre pays et ils seront incités à respecter la loi."
 pest_house_advance:0 "$pest_house$"
 pest_house_advance_desc:0 "$pest_house_desc$"
 pharmacology_advance:0 "Pharmacologie"
 pharmacology_advance_desc:0 "Les alchimistes et les médecins explorent de nouveaux composés et mélanges chimiques à la recherche de remèdes. Certains de ces premiers pharmaciens ont mis au point des traitements pour des maladies courantes comme la fièvre, le rhume et les troubles digestifs, avec des méthodes prometteuses. Cependant, il reste fort à apprendre et nombre de ces nouveaux remèdes peuvent être dangereux s'ils ne sont pas préparés correctement."
 photduang:0 "Pod duang"
 photduang_desc:0 "Notre monnaie peut paraître curieuse aux yeux des étrangers, mais les #italic $photduang$#! nous ont bien servis pendant des siècles. Ces billes d'argent estampillées de poinçons officiels constituent la base de notre économie."
 physical_body_of_christ:0 "Corps physique du Christ"
 physical_body_of_christ_desc:0 "Notre Église est la manifestation physique du corps du Christ sur Terre, qui ne diffère nullement de son corps dans le Ciel. Ainsi, l'Église est l'incarnation physique de notre Seigneur et Sauveur, envoyée afin de guider son peuple."
 pike_and_shot_advance:0 "Pique et arquebuse"
 pike_and_shot_advance_desc:0 "Un nouveau type de combat a commencé à se généraliser : les piquiers forment un carré, tandis que les arquebusiers se déploient sur les flancs et à l'avant, en cherchant à s'abriter derrière ou à l'intérieur du carré au cas où la formation s'engagerait dans un combat rapproché."
 pike_square:0 "Carrés de piquiers"
 pike_square_desc:0 "Tout au long du Moyen Âge, la domination de la cavalerie sur le champ de bataille a été remise en question par les piquiers bien disciplinés. En effet, lors des batailles de Bannockburn ou de Courtrai, la cavalerie fut vaincue par des piquiers. C'est l'alliance d'un entraînement performant et d'une discipline de fer, ainsi que l'ajout de bretteurs pour fournir un soutien en cas de combat rapproché, qui porta cette formation au summum de son efficacité."
 pioneer_spirit:0 "Esprit pionnier"
 pioneer_spirit_desc:0 "Aux temps jadis, notre peuple bravait la haute mer pour établir des colonies sur des côtes lointaines. Réveillons cet esprit pionnier au sein du peuple, pour qu'il fasse de même aujourd'hui."
 piqure_de_marseilles:0 "Piqûre de Marseille"
 piqure_de_marseilles_desc:0 "Dans les ateliers de Marseille, les artisans cousent de délicats boutis dans le style provençal, prisés à travers toute l'Europe pour leur qualité et leur charme. À l'image de notre duché, ces œuvres d'art sont composées d'innombrables parties cousues pour former un tout unifié : une terre assemblée, riche de textures et de cultures."
 pis_anziani_del_popolo:0 "Anziani del Popolo"
 pis_anziani_del_popolo_desc:0 "Le Conseil des Anciens du peuple avait été fondé à l'origine afin de mettre un terme à la rivalité entre les familles Della Gherardesca et Visconti. Mais il a influencé le contrôle et le gouvernement de la république depuis sa création."
 pis_maritimes_legacy:0 "Héritage des républiques maritimes"
 pis_maritimes_legacy_desc:0 "Durant des siècles, Pise a été l'une des grandes puissances de la Méditerranée, contrôlant le commerce et répandant partout son influence. Si elle n'est plus que l'ombre de ce qu'elle était alors, son héritage est toujours bien vivant. Pise se souvient..."
 pis_the_university_of_pisa:0 "L'Université de Pise"
 pis_the_university_of_pisa_desc:0 "L'Université de Pise est l'une des plus anciennes d'Italie et d'Europe, et a toujours été une institution très importante pour l'enseignement et la recherche."
 plantation_buildings_advance:0 "Plantations"
 plantation_buildings_advance_desc:0 "Le climat doux et favorable ainsi que les territoires immenses et fertiles du Nouveau Monde font des colonies des lieux idéaux pour la production de cultures très rentables, telles que le sucre et le tabac."
 platoon_fire:0 "Salve par peloton"
 platoon_fire_desc:0 "Jusqu'à présent, sur les champs de bataille, chaque rang tirait en même temps. Cette façon de faire avait pour objectif d'obtenir la plus grande puissance de feu possible. Nous autres Néerlandais avons développé une autre méthode : la salve par peloton. Une partie du régiment tire toujours sur l'ennemi, ce qui l'empêche de récupérer entre les salves."
 ple_irish_viking_towns_advance:0 "Anciennes villes vikings"
 ple_irish_viking_towns_advance_desc:0 "Les anciens ports de commerce fondés par les Ostmen foisonnent toujours d'activités mercantiles, qui peuvent se révéler particulièrement lucratives pour les malins."
 ple_pale_defenseworks_advance:0 "Constructions légères"
 ple_pale_defenseworks_advance_desc:0 "Notre frontière est définie par des constructions défensives légères, telles que les digues et les palissades, destinées à dissuader nos voisins indisciplinés de mener leurs raids pénibles."
 plutocracy:0 "Le pouvoir de la rhétorique"
 plutocracy_desc:0 "Richesse et pouvoir ne sont pas synonymes, mais ils sont clairement liés. En effet, ce n'est pas seulement le pouvoir qui rend riche, mais aussi la richesse qui donne du pouvoir. Nous comprenons cela, car les personnes les plus riches sont aussi celles qui occupent les sièges du pouvoir dans notre pays."
 pochtecayotl:0 "Pochteca"
 pochtecayotl_desc:0 "Les pochteca, les marchands, voyagent au loin, jusqu'en des lieux soumis à d'autres dirigeants opposés à nous. Si ces marchands pouvaient être nos yeux et nos oreilles, quels secrets nous révéleraient-ils ?"
 poklisars:0 "Poklisars"
 poklisars_desc:0 "Depuis la création de notre nation, nous avons toujours tourné le regard vers l'extérieur ; que ce soit pour établir des routes commerciales rentables, apaiser des voisins dangereux et forger des alliances ou même des partenariats durables contre des adversaires communs. « Poklisars », tel est le nom des ambassadeurs qui accompliront cette mission en notre nom."
 polders_advance:0 "Polders"
 polders_advance_desc:0 "Les Pays-Bas étant très exposés aux inondations, le climat très changeant d'entre les XIe et XIVe siècles a entraîné la création du Zuiderzee et la salinisation des zones côtières. Aujourd'hui, nous disposons de la technologie qui nous permettrait de reconquérir ces terres et d'augmenter la productivité de notre agriculture."
 polhem_machina_nova:0 "Machina Nova"
 polhem_machina_nova_desc:0 "Christopher Polhem, surnommé le « père de l'ingénierie suédoise », a transformé l'industrie du royaume avec sa Machina Nova, un ensemble innovant de systèmes mécaniques visant à rationaliser et accroître la production. En combinant engrenages, cames et énergie hydraulique, Polhem a mis au point des machines capables d'exécuter des tâches autrefois manuelles, du concassage du minerai dans les mines au tissage textile et au sciage du bois. Son Laboratorium Mechanicum faisait à la fois office d'atelier et d'école, diffusant le savoir mécanique dans tout le royaume."
 polish_renaissance:0 "Renaissance polonaise"
 polish_renaissance_desc:0 "Inspiré par les courants italiens de la Renaissance, l'épanouissement des arts et de la culture fleurira dans nos espaces artistiques."
 pomestnoe_voisko:0 "Armée des pomestiés"
 pomestnoe_voisko_desc:0 "En redistribuant les terres confisquées aux cavaliers boyards, nous pourrions établir une classe nouvelle de soldats, capable de constituer un pilier de la principauté."
 pop_promote_actions_advance:0 "Échelle sociale"
 pop_promote_actions_advance_desc:0 "On dit que le chaos est une échelle qui permet aux gens d'élever leur statut social. Pour nous, cette échelle sociale ne vient pas du chaos, mais de l'ordre, car nous avons systématisé un moyen qui encourage nos citoyens à améliorer leur statut social par leurs propres efforts."
 pop_promotion_speed_age_2:0 "Mobilité sociale favorisée"
 pop_promotion_speed_age_2_desc:0 "Le rêve de la plupart des paysans de sortir de la pauvreté et de gravir l'échelle sociale est devenu une réalité dans notre société. En récompensant le travail acharné, la rigueur et la défense de nos idéaux, nous ne manquerons jamais d'individus capables et influents."
 pop_promotion_speed_age_3:0 "Noblesse par le service militaire"
 pop_promotion_speed_age_3_desc:0 "Traditionnellement, les nobles ont toujours obtenu leur statut en offrant un service militaire à leur souverain. Or, pour répondre aux besoins de notre État en pleine expansion, il est devenu nécessaire de promouvoir les membres de la petite noblesse et de proposer des titres à des individus tels que des marchands."
 pop_promotion_speed_age_4:0 "Clergé confessionnaliste"
 pop_promotion_speed_age_4_desc:0 "L'ère de la Réforme et du Confessionnalisme a renouvelé le désir des confessions organisées. Plus d'ecclésiastiques sont déployés pour guider leurs fidèles en ces temps troublés, ce qui rend les offices religieux bien plus attractifs pour le peuple."
 pop_promotion_speed_age_5:0 "Bureaucrates promus"
 pop_promotion_speed_age_5_desc:0 "La bureaucratie se développe afin de répondre aux besoins d'une administration en pleine expansion, engendrant une demande accrue de fonctionnaires éduqués dans nos rangs administratifs."
 pop_promotion_speed_age_6:0 "Mobilité sociale capitaliste"
 pop_promotion_speed_age_6_desc:0 "L'expansion du capitalisme a donné naissance à une nouvelle ère de mobilité sociale. La fortune vient désormais supplanter les hiérarchies traditionnelles pour s'inscrire comme un moyen d'élever son statut, qu'on soit capitaliste, travailleur industriel ou bien membre du clergé."
 populating_the_steppes:0 "Peupler les steppes"
 populating_the_steppes_desc:0 "Autant nous amenons la destruction et la ruine chez nos ennemis, autant nous amenons la paix à tous ceux qui vivent au sein de nos frontières. Assurons la paix à l'intérieur, encourageons les individus de talent de tout l'empire à peupler et bâtir nos grandes villes nouvelles. Ainsi, il sera aisé de maîtriser les steppes."
 por_battle_ourique:0 "La bataille d'Ourique"
 por_battle_ourique_desc:0 "En 1139, nos troupes de braves ont vaincu sans aide cinq rois maures. Cet exploit restera à jamais gravé dans la mémoire de nos soldats : ils peuvent vaincre n'importe quel ennemi, quel que soit sa puissance ou son armement."
 por_bombardeiros:0 "Bombardeiros"
 por_bombardeiros_desc:0 "De nouvelles technologies ont été développées pour rendre les canons beaucoup plus résistants, mais ils sont devenus trop lourds pour les ponts des vaisseaux. En renforçant ces ponts, nous nous assurerons que la puissance des canons de notre marine sera redoutée sur toutes les côtes."
 por_cacadores:0 "Caçadores"
 por_cacadores_desc:0 "Surnommés #italic Coqs de combat#!, les Caçadores sont une unité d'élite d'infanterie légère de l'armée portugaise. Ils portent un uniforme marron pour se distinguer des soldats de l'armée régulière."
 por_colonial_governors:0 "Gouverneurs coloniaux"
 por_colonial_governors_desc:0 "En envoyant les plus compétents de nos hommes gouverner nos colonies et nos avant-postes au nom de nos dirigeants, nous nous assurerons qu'ils restent imperturbables et loyaux, et nous tirerons le plus grand profit de leurs services."
 por_establishment_portuguese_navy:0 "Création de la marine portugaise"
 por_establishment_portuguese_navy_desc:0 "Le roi Dinis a jeté les fondations de la marine portugaise en nommant le marchand génois Manuel Pessanha (Pessagno en italien) amiral de la flotte nationale, avec pour mission de défendre les côtes portugaises contre les raids des pirates musulmans et de créer une puissante flotte commerciale."
 por_estimulate_rural_areas:0 "Dynamiser les zones rurales"
 por_estimulate_rural_areas_desc:0 "De nombreuses régions de notre pays, principalement dans les zones rurales et isolées, se dépeuplent. Champs, forêts et mines se retrouvent à l'abandon. En réformant nos systèmes juridiques, nous encouragerons les gens à exploiter les campagnes et à y maintenir un certain niveau de population."
 por_feitorias:0 "Fonder des feitorias"
 por_feitorias_desc:0 "Envoyons nos #italic feitors#! aux quatre coins des autres continents et faisons de notre pays la force commerciale dominante de l'océan Indien. En créant un réseau de comptoirs fortifiés le long des côtes africaines et indiennes, nous pourrons dominer le commerce local sans dépenser trop de ressources."
 por_ordenancas:0 "Ordenanças"
 por_ordenancas_desc:0 "Notre pays a besoin d'une armée professionnelle pour protéger les frontières sacrées de notre glorieuse nation. Nous réformerons le système de conscription et formerons nos jeunes hommes à remplir ce devoir avec honneur."
 por_pursuing_waves:0 "Suivre les flots"
 por_pursuing_waves_desc:0 "Il semble que notre terre ne suffise pas à une grande partie de notre population, qui regarde la mer avec un sentiment de #italic saudade#!, comme une amante perdue depuis longtemps. Les ports et les quais sont en pleine effervescence, les hommes s'enrôlent sur les navires, ivres du désir d'explorer le monde. Nous ferons grand usage de ces marins."
 por_royal_absolutism:0 "Absolutisme royal"
 por_royal_absolutism_desc:0 "Depuis trop longtemps, le pouvoir royal est limité par les interventions stupides de la noblesse, dont les intérêts locaux à courte vue menacent le bien supérieur du royaume. Nous ignorerons les Cortes et gouvernerons sans leur interférence."
 por_royal_military_academy:0 "Real Academia de Artilharia, Fortificação e Desenho"
 por_royal_military_academy_desc:0 "Notre artillerie et nos fortifications ont longtemps été la clé de la défense de notre territoire, rendant notre petit pays particulièrement coriace pour les armées ennemies. Nous allons créer une académie militaire nommée #italic Academia Real de Fortificação, Artilharia e Desenho#! pour former nos officiers dans ces domaines, afin qu'ils puissent à leur tour faire de nos forts et de nos corps d'artillerie les meilleurs du monde !"
 por_the_bandeirantes:0 "Encouragement aux bandeirantes"
 por_the_bandeirantes_desc:0 "Certains membres des expéditions parcourant l'intérieur des terres pour y capturer des esclaves tombent parfois sur de l'or, des métaux précieux ou des joyaux. Si la rumeur circulait, cela encouragerait les hommes les plus courageux à se rendre aux colonies."
 por_vinho_porto:0 "Vinho do Porto"
 por_vinho_porto_desc:0 "Sur les rives du Douro, dans le nord du pays, les raisins sont cultivés afin de produire un vin qui est ensuite fortifié d'alcool pour créer ce qui commence à être bien connu sous le nom de #italic Porto#!. Nous ne devons pas perdre cette occasion d'engranger beaucoup d'argent, et organiser l'exportation de notre vin."
 porcelain_kiln_advance:0 "Four à porcelaine"
 porcelain_kiln_advance_desc:0 "$porcelain_guild_desc$"
 porcelain_manufactor_advance:0 "Manufacture de porcelaine"
 porcelain_manufactor_advance_desc:0 "$porcelain_manufactory_desc$"
 port_authority_advance:0 "Autorité portuaire"
 port_authority_advance_desc:0 "$port_authority_desc$"
 port_cost_distance_from_capital_advance:0 "Capitaines expérimentés"
 port_cost_distance_from_capital_advance_desc:0 "Tous les pillards ne peuvent pas finir capitaines d'un navire, car seuls les plus expérimentés et les plus talentueux dirigeront nos vaisseaux. De tels loups de mer devraient être capables de retrouver leur chemin même dans les tempêtes les plus féroces."
 port_cost_distance_from_capital_choice_mil:0 "Patrouilles côtières"
 port_cost_distance_from_capital_choice_mil_desc:0 "Organiser des patrouilles appropriées sur l'ensemble de nos côtes garantira que la présence de notre administration y soit fortement ressentie, même dans les plus éloignées."
 port_customs:0 "Postes de douane"
 port_customs_desc:0 "Désigner nos ports en tant que zones marchandes officielles pour les navires étrangers accroîtra assurément l'importance mercantile de nos territoires, aux dépens de nos voisins et de nos ennemis."
 port_of_aden:0 "Port d'Aden"
 port_of_aden_desc:0 "Le port naturel d'Aden, carrefour commercial depuis des millénaires, accueille les navires venant d'Inde, d'Égypte et d'Afrique de l'Est. Soutenu à sa juste mesure, il peut redevenir le pilier de notre économie maritime et la fierté de la mer Rouge."
 port_security_improvement:0 "Amélioration de la sécurité portuaire"
 port_security_improvement_desc:0 "Pour que le commerce soit profitable, il faut que les cargaisons soient déchargées sur nos quais en toute sécurité. Nous devons nous assurer que les zones portuaires fréquentées par les marchands sont exemptes de tout délit."
 porto_franco:0 "Porto franco"
 porto_franco_desc:0 "En ouvrant nos ports au commerce avec les marchands étrangers et en éliminant les frais d'importation, nous sommes certains d'accumuler davantage de revenus grâce à nos opérations marchandes."
 postal_service:0 "Service des postes"
 postal_service_desc:0 "Les communications étant ce qu'elles sont, il est difficile de garantir que nos envoyés diplomatiques arrivent à temps au lieu voulu. La création d'un réseau de bureaux de postes et d'étapes de repos pour les messagers permettra malgré tout de faire entendre notre voix dans les territoires les plus éloignés."
 potato_production:0 "Production de pommes de terre"
 potato_production_desc:0 "Alors que le maïs pousse difficilement sur nos hauts plateaux, nous avons appris à cultiver une plante tubéreuse particulièrement nutritive. Grâce à une production accrue, nous pouvons nourrir notre peuple et nos guerriers de cet aliment facile à conserver."
 pottery_manufactory_advance:0 "$pottery_manufactory$"
 pottery_manufactory_advance_desc:0 "$pottery_manufactory_desc$"
 pottery_mill_advance:0 "$pottery_mill$"
 pottery_mill_advance_desc:0 "$pottery_mill_desc$"
 pottery_workshop_advance:0 "$pottery_workshop$"
 pottery_workshop_advance_desc:0 "$pottery_workshop_desc$"
 pound_lock_canals_advance:0 "Canaux à écluses"
 pound_lock_canals_advance_desc:0 "Creuser la terre afin de favoriser l'affluence, l'accès à la nourriture et une meilleure circulation des marchandises est une activité familière pour notre peuple. L'invention d'écluses spéciales appelées « portes busquées » contribuera à fournir les éléments nécessaires à la croissance et à la prospérité de notre peuple."
 power_projection_advance_1:0 "Ambitions impériales"
 power_projection_advance_1_desc:0 "Tandis que les pays se développaient et que l'État se consolidait au cours du Haut Moyen Âge, les ambitions s'accroissaient, et les dirigeants tentèrent de créer ou de recréer des empires dans leurs régions respectives."
 power_projection_advance_2:0 "Ambitions supranationales"
 power_projection_advance_2_desc:0 "Bien que les idées désuètes sur la création d'empires soient toujours présentes dans l'esprit des dirigeants de cette ère, ils ont également commencé à cristalliser de nouvelles façons d'établir leur domination sur les autres pays et populations."
 power_projection_advance_3:0 "Ambitions régionales"
 power_projection_advance_3_desc:0 "La capacité d'un pays à projeter sa puissance est d'une importance vitale pour avoir du poids sur la scène régionale. En apprenant des autres, du passé et du présent, nous pouvons faire connaître notre pays partout et utiliser cette position pour asseoir notre pouvoir."
 power_projection_advance_4:0 "Influence extérieure dominante"
 power_projection_advance_4_desc:0 "Notre présence aux tables diplomatiques donne une impression de grandeur et de prestige. Notre voix et notre influence seront entendues par l'ensemble de nos interlocuteurs."
 power_projection_advance_5:0 "Ambitions absolutistes"
 power_projection_advance_5_desc:0 "Avec la centralisation croissante du pouvoir des États, l'idée de dominer tous les territoires disponibles a commencé à germer dans l'esprit de la plupart des dirigeants du monde. S'imaginant aussi puissants que le soleil, qui apporte à lui seul la lumière sur toute la Terre, ils désirent jouir d'une autorité absolue."
 power_projection_advance_6:0 "Ambitions mondiales"
 power_projection_advance_6_desc:0 "La consolidation de pays en nations plus vastes a donné naissance à de grandes puissances qui dominent d'immenses zones de leur continent et ne comptent pas s'arrêter là."
 powerful_statues:0 "Statues puissantes"
 powerful_statues_desc:0 "Un pays prospère est le signe d'un dirigeant fort, mais le peuple ne croira à la force d'un dirigeant que si on la lui démontre. À cet effet, de nombreux dirigeants commandent toutes sortes de statues à leur effigie, souvent en pierre ou en bronze, pour projeter au peuple une image de force et de puissance. Cependant, elles ne sont pas toujours efficaces, et ne sont parfois guère plus qu'un assemblage de matériaux."
 preaching_friars:0 "Frères prêcheurs"
 preaching_friars_desc:0 "Nombreux sont les frères qui se sont mis à prêcher notre foi. Nous devrions glorifier ceux qui s'adonnent à cette pratique et louer leurs efforts afin de raffermir les convictions de nos paysans."
 preaching_missions:0 "Missions de prédication"
 preaching_missions_desc:0 "Mettons en place des expéditions missionnaires qui garantiront que la seule et véritable foi soit inculquée à notre peuple."
 precious_stones_art:0 "Taille de pierres précieuses"
 precious_stones_art_desc:0 "Notre territoire regorge de pierres précieuses parfaites pour la création de statues, vases et miroirs. Ces ressources permettront à nos artisans de laisser une empreinte durable en érigeant de grands monuments en hommage à notre culture."
 preobrazhensky_semyonovsky_imperial_guard:0 "La Garde impériale Préobrajensky-Semionovsky"
 preobrazhensky_semyonovsky_imperial_guard_desc:0 "L'armée-jouet est organisée en compagnies d'élite, formant la Garde impériale pour protéger les intérêts de la monarchie. Elle participe fréquemment aux cérémonies de la cour, aux défilés et à d'autres événements importants, ce qui témoigne de son importance au-delà de ses fonctions militaires."
 preserve_theogony_advance:0 "Les enseignements de la Théogonie"
 preserve_theogony_advance_desc:0 "La Théogonie d'Hésiode raconte les origines et la généalogie des dieux, révélant la naissance de l'ordre divin lui-même. À travers ses vers, des symboles d'autorité tels que le sceptre et la voix du pouvoir sont présentés comme des responsabilités sacrées. L'œuvre rappelle aux dirigeants que la véritable autorité doit s'exercer par la sagesse, la modération et la raison."
 preserver_of_national_identity:0 "Préservation de l'identité nationale"
 preserver_of_national_identity_desc:0 "C'est précisément en raison des nombreuses oppressions et persécutions qu'elle a subies que notre Église peut revendiquer le rôle de gardienne de notre identité. C'est en son sein que nos langues et traditions ont été le mieux préservées, et notre foi en elle est restée intacte."
 preserving_of_local_languages:0 "Préservation des langues locales"
 preserving_of_local_languages_desc:0 "Malgré l'importance du $greek_language$ et du $latin_language$ dans le $christian$ primitif, le $miaphysite$ a préservé sa liturgie dans des langues vernaculaires plus locales, telles que le $coptic_language$, l'$aramaic_language$ et l'$armenian_language$. Langues anciennes et traditionnelles, chaque branche $miaphysite_ADJ$ conserve sa propre langue historique."
 press_gangs:0 "Enrôleurs"
 press_gangs_desc:0 "Parce que la vie en mer est dure et impitoyable, bien peu de gens cherchent à faire carrière dans la marine. En autorisant l'enrôlement forcé de quiconque a le pied marin, nous pourrons plus rapidement monter nos équipages et lancer nos navires."
 prester_john:0 "Le prêtre Jean"
 prester_john_desc:0 "Les Européens se sont tournés vers le prêtre Jean depuis des siècles, convaincus qu'il doit nous diriger d'une façon ou d'une autre car nous sommes chrétiens. Il n'y a aucune raison de les en dissuader, tant ils sont ravis de partager leurs idées avec nous."
 prestigious_monasticism:0 "Monachisme prestigieux"
 prestigious_monasticism_desc:0 "Dans l'$orthodox$, le monachisme et l'ascétisme sont tenus en haute estime, et presque obligatoires. Seuls les moines peuvent être ordonnés évêques, et ils doivent devenir moines avant leur consécration. Ainsi, les monastères et le monachisme jouent un rôle important dans notre vie cléricale."
 prestigious_schools:0 "Écoles prestigieuses"
 prestigious_schools_desc:0 "Le $buddhist$ a évolué en une multitude d'écoles, chacune axée sur un type de communauté monastique et chacune privilégiant des textes en particulier. Cependant, certaines de ces écoles se sont forgé une grande notoriété, tandis que d'autres sont tombées dans l'oubli. En fréquentant les plus prestigieuses d'entre elles, le peuple pourra appréhender l'étendue de cette renommée."
 primacy_of_alexandria:0 "Primauté d'$alexandria$"
 primacy_of_alexandria_desc:0 "Bien que le $miaphysite$ ait de nombreuses branches et des dirigeants indépendants, nous reconnaissons $alexandria$ et son siège comme notre chef spirituel. Il s'agit simplement d'un signe de respect pour le trône apostolique qui s'y trouve et d'une manière de l'honorer, plutôt que de lui conférer des prérogatives particulières."
 principle_of_administration_law_advance:0 "Loi du principe d'administration"
 principle_of_administration_law_advance_desc:0 "L'évolution naturelle de notre administration complexe impose l'adoption de nouvelles lois relatives à notre gestion administrative."
 print_culture:0 "Culture de l'écrit"
 print_culture_desc:0 "L'invention de l'imprimerie a rendu la diffusion du savoir plus simple que jamais. Les nouvelles techniques et avancées peuvent désormais parvenir jusqu'aux confins de notre nation, augmentant ainsi sa puissance et sa richesse."
 printing_manufactory_advance:0 "$printing_manufactory$"
 printing_manufactory_advance_desc:0 "$printing_manufactory_desc$"
 printing_mill_advance:0 "$printing_mill$"
 printing_mill_advance_desc:0 "$printing_mill_desc$"
 printing_of_religious_texts:0 "printing_of_religious_texts"
 printing_of_religious_texts_desc:0 ""
 printing_press_advance:0 "Presse à imprimer"
 printing_press_advance_desc:0 "La popularisation des techniques d'impression au cours du siècle a favorisé la diffusion des connaissances et l'échange d'informations, en accélérant la reproduction de manuscrits importants."
 printing_press_shop_advance:0 "Atelier d'imprimerie"
 printing_press_shop_advance_desc:0 "$printing_press_shop_desc$"
 private_to_marshal:0 "De soldat à maréchal"
 private_to_marshal_desc:0 "Tous nos soldats ont un bâton de maréchal dans leur sac. Enfin, pas tout à fait, mais ceux qui sauront se distinguer au combat recevront promotions et distinctions. Nos hommes le savent, et cela les motive."
 privateers:0 "Corsaires"
 privateers_desc:0 "S'attaquer au commerce de l'ennemi est l'une des trois conditions essentielles à la victoire. Encourageons les vieux loups de mer à frapper les routes commerciales ennemies."
 produktplakatet:0 "Produktplakatet : la loi sur les produits"
 produktplakatet_desc:0 "Cette loi interdit aux navires étrangers de débarquer en Suède des marchandises provenant d'ailleurs que leur pays d'origine ou leurs colonies."
 professional_armies_advance:0 "Armées professionnelles"
 professional_armies_advance_desc:0 "La modernisation de nos armées dépend largement du maintien de nos centres de recrutement et d'organisation. Nous devons nous efforcer de préserver une organisation militaire transparente et solide, en réduisant les gaspillages et les redondances."
 promote_estates_general:0 "Promotion des États Généraux"
 promote_estates_general_desc:0 "L'État de Bourgogne est une création féodale, un conglomérat de diverses régions assemblées dans des conditions variées, toutes dotées d'identités locales fortes. En faisant la promotion des États généraux, nous offrons le droit à ces intérêts de s'exprimer et créons un sentiment d'appartenance plus fort."
 protect_the_new_faith:0 "Rempart de la foi"
 protect_the_new_faith_desc:0 "Notre foi est assaillie de toutes parts par nos ennemis, aussi devrons-nous la défendre face aux oppresseurs papistes."
 protected_harbor_advance:0 "$protected_harbor$"
 protected_harbor_advance_desc:0 "$protected_harbor_desc$"
 protectors_of_jerusalem:0 "Protecteurs de Jérusalem"
 protectors_of_jerusalem_desc:0 "Nous nous tenons sur la ligne de front de la chrétienté, entourés d'incroyants. Il est de notre devoir sacré de protéger la Ville Sainte et de frapper d'effroi le cœur des païens qui oseraient l'usurper."
 protestant_administration_tax:0 "Percepteurs d'impôts efficaces"
 protestant_administration_tax_desc:0 "Le clergé était jadis chargé de percevoir une partie des impôts. Bien que certaines de ces structures aient été démantelées au lendemain de la Réforme, maintes personnes compétentes demeurent présentes et sont prêtes à nous servir."
 protestant_cuius_regio_eius_religio:0 "$catholic_cuius_regio_eius_religio$"
 protestant_cuius_regio_eius_religio_desc:0 "$catholic_cuius_regio_eius_religio_desc$"
 protestant_innovation:0 "Innovations protestantes"
 protestant_innovation_desc:0 "Depuis les origines mêmes de notre foi, nous savons combien il est important de remettre en question les doctrines et croyances établies. Le même concept s'applique à d'autres domaines d'étude."
 protestant_invite_persecuted:0 "Invitation des indésirables"
 protestant_invite_persecuted_desc:0 "Nous avons eu la chance de trouver la lumière de la véritable foi, mais nombre de nos frères souffrent encore sous le régime oppressif des âmes impies. Nous devons soutenir ces populations et les inviter au sein de nos territoires, où elles pourront vivre sans récriminations et, plus important encore, contribuer à notre richesse."
 protestant_painters:0 "Art protestant"
 protestant_painters_desc:0 "La Réforme a incité nombre d'artistes à réaliser de nouvelles œuvres éloignées de la glorification de Dieu. En recrutant ce genre d'artistes, nous pourrons nous forger une excellente image de protecteurs des arts."
 protestant_sunday_schools:0 "$sunday_schools_advance$"
 protestant_sunday_schools_desc:0 "$sunday_schools_advance_desc$"
 protestant_work_ethic:0 "Ouvriers assidus"
 protestant_work_ethic_desc:0 "L'influence des prêcheurs piétistes et puritains sur la Réforme est indéniable. Leur emphase portée sur les vertus telles que l'assiduité et la frugalité nous aidera à développer une main-d'œuvre performante."
 province_governors:0 "Gouverneurs de province"
 province_governors_desc:0 "Nos provinces ne sont pas dirigées de manière autonome ni par des nobles assoiffés de pouvoir. Ce sont les gouverneurs nommés par notre administration centrale qui sont chargés d'étendre notre autorité à l'ensemble du pays."
 prussian_grenadiers:0 "$a_prussian_grenadiers$"
 prussian_grenadiers_desc:0 "$a_prussian_grenadiers_desc$"
 public_punishments:0 "Châtiments publics"
 public_punishments_desc:0 "La vie en mer est dangereuse, aussi les punitions doivent-elles être exemplaires. Sinon, elles n'ont pas l'effet escompté, et cela pourrait se traduire par toutes sortes de problèmes. Les châtiments publics ont évolué peu à peu, et il est temps désormais de formaliser tout cela afin que la discipline en mer soit rendue plus stricte."
 pukara_advance:0 "$pukara_building$"
 pukara_advance_desc:0 "$pukara_building_desc$"
 pun_breadbasket_of_india:0 "Le grenier de l'$india$"
 pun_breadbasket_of_india_desc:0 "Les cinq grands cours d'eau (Indus, Jhelum, Chenab, Ravi et Sutlej) pénètrent les terres de la région du $punjab_area$, conférant au sol la bénédiction d'une fertilité inégalée. En plus de nous permettre d'exporter de la nourriture et du coton vers nos voisins, cela permet également à nos nombreuses villes de se développer et encourage toutes sortes de productions spécialisées. Nous devons tout mettre en œuvre pour favoriser l'essor de l'agriculture et défendre nos paysans contre les bandits et les brigands des régions limitrophes."
 pun_encourage_indo_persian_trade:0 "Promotion du commerce indo-persan"
 pun_encourage_indo_persian_trade_desc:0 "Situé à la frontière occidentale de l'Inde, le $PUN$ a toujours été au carrefour des échanges économiques et culturels entre l'$india$ et la $persia_region$. L'ancienne route de la Grande Marche, qui relie l'$india$ orientale au monde $farsi_culture$, traverse nos terres avant de rejoindre les cols afghans, où sévissent hélas pillards et autres bandits. Nous devrons encourager la fréquentation de cette route commerciale et faire tout ce qui est en notre pouvoir pour veiller au bien-être des marchands qui l'empruntent, par la construction de caravansérails et en veillant à leur sécurité."
 pun_foundation_of_the_khalsa:0 "Le Khâlsâ"
 pun_foundation_of_the_khalsa_desc:0 "Le $sikhism$, né au $PUN$, connaît une croissance rapide sur nos terres. Les adeptes de cette foi, issus de toutes castes et de toutes origines, défendront leur État indépendamment de leurs anciennes professions."
 pun_gurmukhi_script:0 "Alphabet gourmoukhî"
 pun_gurmukhi_script_desc:0 "L'alphabet gourmoukhî est un alphasyllabaire développé dans les terres du $PUN$, hautement favorisé par nos gourous $sikhism_ADJ$s. Notre clergé l'utilise pour enregistrer les textes $sikhism_ADJ$s."
 pun_punjabi_textile_industry:0 "Industrie textile $PUN_ADJ$e"
 pun_punjabi_textile_industry_desc:0 "Le $PUN$ est au cœur de l'industrie textile. Nos étoffes sont conçues pour les marchés d'Asie et d'Europe, et nos tisserands comptent parmi les plus productifs en $india$."
 pun_reforming_the_punjabi_army:0 "Réformer l'armée $PUN_ADJ$e"
 pun_reforming_the_punjabi_army_desc:0 "Les us et coutumes de nos ancêtres étaient sensés et nous ont bien servis par le passé. Pourtant, pour que nos troupes restent triomphantes sur les champs de bataille, nous devons créer une armée plus professionnelle. Étudier la manière dont sont organisées celles des contrées lointaines, et adapter prudemment leurs méthodes, nous permettrait de disposer d'une armée $PUN_ADJ$e plus puissante, tout en conservant les qualités uniques de notre organisation militaire actuelle."
 pun_strength_of_the_misls:0 "Puissance des misls"
 pun_strength_of_the_misls_desc:0 "Les misls, États confédérés qui constituent le $PUN$, peuvent grâce à leur organisation administrative aligner sur les champs de bataille une cavalerie impressionnante. En cas de besoin, nous pouvons faire appel à ces troupes pour combattre un ennemi commun."
 purana:0 "Purāṇas"
 purana_desc:0 "Considérés comme appartenant à la $smrti$, les $purana$ sont des textes regroupant tous types de contenus. De la cosmologie aux généalogies divines en passant par l'astronomie, la grammaire ou encore les histoires d'amour, tous les thèmes sont abordés. Et bien qu'ils ne fassent pas partie de la $sruti$, leur influence sur les croyances et la société $hindu_ADJ$es est indéniable, rassemblant de nombreuses convictions et traditions locales dans le récit commun des $vedah$."
 putrefaction_mill_advance:0 "$putrefaction_mill$"
 putrefaction_mill_advance_desc:0 "$putrefaction_mill_desc$"
 putrefaction_works_advance:0 "Manufacture de salpêtre"
 putrefaction_works_advance_desc:0 "$putrefaction_works_desc$"
 pyramid_architecture:0 "Architecture pyramidale"
 pyramid_architecture_desc:0 "Notre peuple ayant érigé des pyramides en pierre lors des glorieux jours de Teotihuacan, Tikal, Copán ou Palenque, la construction de structures monumentales n'a plus aucun secret pour nous. Nous n'avons pas oublié l'art de la construction de pyramides et pouvons perpétuer cette tradition."
 qalat_al_mashwar_advance:0 "$qalat_al_mashwar$"
 qalat_al_mashwar_advance_desc:0 "La forteresse de $qalat_al_mashwar$ incarne à la fois un bastion militaire et le symbole de notre autorité dynastique. En investissant dans son extension, nous renforçons la défense de Tlemcen tout en consolidant notre contrôle administratif sur les terres environnantes."
 quality_education:0 "Éducation de qualité"
 quality_education_desc:0 "Le moment le plus important pour une armée est celui qui suit le combat : victorieuses ou défaites, les troupes épuisées sont alors très vulnérables. Nous devons faire en sorte que nos troupes soient prêtes au combat avant que l'ennemi le soit."
 quest_for_the_new_world:0 "La conquête du Nouveau Monde"
 quest_for_the_new_world_desc:0 "La quête du Nouveau Monde nous permet d'intégrer ces nations qui explorent le vaste monde, au-delà de leurs frontières, et de chercher à être la première à faire le tour du globe en partant à la recherche d'un monde nouveau."
 quinine:0 "Quinine"
 quinine_desc:0 "Bien que l'« Herbe des jésuites » ait été efficace dans le traitement du paludisme par le passé, sa consommation sous forme de poudre d'écorce séchée laisse considérablement à désirer. En isolant et en extrayant le composant curatif de l'écorce, nous pouvons augmenter de manière exponentielle l'efficacité du traitement."
 quipu:0 "Quipous"
 quipu_desc:0 "Ce système transmet des informations sous forme de nœuds sur des cordelettes : chacun représente un chiffre de zéro à neuf, pouvant représenter des quantités et des mesures comptables. Ces nœuds sont aussi utilisés pour désigner des logogrammes sur la même cordelette, en indiquant la syllabe du logogramme à utiliser. En associant plusieurs cordelettes, il est possible de formuler des phrases."
 rade_of_toulon:0 "La rade de Toulon"
 rade_of_toulon_desc:0 "Le port naturel de Toulon est le site idéal où réaliser nos ambitions navales. Tandis que Marseille prospère en un joyau du commerce, Toulon sera l'armurerie de la Provence, le point de départ d'une future puissance maritime."
 rag_the_arsenal_expansion:0 "L'extension de l'arsenal"
 rag_the_arsenal_expansion_desc:0 "Nos chantiers navals sont devenus célèbres pour la construction de #italic ragusea#!, une énorme caraque capable de naviguer dans l'Atlantique et l'océan Indien. En standardisant nos techniques de construction navale et en assurant l'approvisionnement en chêne de haute qualité provenant des forêts bosniennes, nous garantissons que la marine marchande ragusaine est la plus avancée technologiquement de l'Adriatique. Ces navires sont conçus pour offrir une capacité de cargaison maximale et une puissance de feu défensive optimale, permettant à nos marchands de dominer les routes des épices et de la soie tout en arborant le drapeau de Saint-Blaise dans chaque port majeur, de Londres à Goa."
 rag_the_collegium_ragusinum:0 "Le Collegium Ragusinum"
 rag_the_collegium_ragusinum_desc:0 "Pour maintenir notre statut de centre de raffinement, nous avons créé le #italic Collegium Ragusinum#!, une institution d'enseignement supérieur dirigée par les Jésuites, qui attire les fils de la noblesse balkanique et italienne. En formant une classe de diplomates, scientifiques et poètes hautement instruits, nous garantissons que la direction de Raguse n'est jamais dépassée dans les tribunaux d'Europe. Cet investissement intellectuel transforme notre petite cité en un centre culturel, où la fusion de la logique latine et de l'esprit slave produit les érudits qui façonneront l'éveil culturel de tout le littoral adriatique."
 rag_the_lazzaretto_system:0 "Le système des Lazzaretti"
 rag_the_lazzaretto_system_desc:0 "Face aux ravages récurrents de la peste noire, Raguse a mis en place le tout premier système de quarantaine maritime obligatoire au monde, sur les îles de Mrkan et Bobara. En isolant les équipages et les marchandises entrants pendant quarante jours (quaranta), nous protégeons notre population urbaine tout en maintenant le fonctionnement de notre port lorsque d'autres centres méditerranéens sont paralysés par la peste. Cette approche scientifique de la santé publique garantit que la République reste un port d'escale fiable et sain, préservant notre main-d'œuvre et nos réseaux commerciaux même pendant les périodes les plus meurtrières de l'histoire européenne."
 rag_the_ragusan_maritime_insurance_code:0 "Le Code d'assurance maritime ragusain"
 rag_the_ragusan_maritime_insurance_code_desc:0 "Nous sommes allés au-delà du simple transport maritime pour entrer dans le monde de la haute finance en formalisant l'un des premiers systèmes sophistiqués d'assurance maritime. En mutualisant les risques de nos familles marchandes grâce au #italic Monte di Pietà#!, nous permettons à nos capitaines d'entreprendre de nouvelles expéditions audacieuses vers les Amériques et l'Extrême-Orient avec un risque personnel minimal. Cette innovation financière garantit que le capital ragusain reste constamment en mouvement, créant un cycle de richesse autoentretenu qui maintient notre cité prospère et influente, alors même que les routes commerciales méditerranéennes traditionnelles commencent à perdre de leur importance."
 rag_the_ragusan_porto_franco:0 "Le Porto Franco ragusain"
 rag_the_ragusan_porto_franco_desc:0 "Alors que les guerres entre nos voisins s'intensifient, nous avons déclaré notre cité comme #italic Porto Franco#! (Port libre) strictement neutre. En refusant d'héberger des navires de guerre étrangers tout en offrant des réparations et un entreposage de haute qualité à tous les navires marchands, nous faisons en sorte que le conflit ne serve qu'à accroître nos profits. Ce « non-alignement économique » fait de Raguse le seul havre sûr dans une mer en flammes, nous permettant de capter les routes commerciales que nos rivaux ont abandonnées dans leur quête de gloire militaire."
 rag_the_statute_of_1272:0 "Le statut de 1271"
 rag_the_statute_of_1272_desc:0 "Pour garantir un environnement stable pour l'investissement international, Raguse a codifié ses lois dans un cadre juridique complet définissant les droits de propriété et les codes maritimes. En limitant le pouvoir de tout noble isolé et en établissant le #italic Consilium Rogatorum#!, nous créons un cadre commercial prévisible qui attire les marchands les plus riches de Méditerranée. Cette clarté juridique permet à une petite cité-État de peser bien au-delà de son poids, transformant un éperon rocheux en un sanctuaire de #italic Libertas#! qu'aucun seigneur féodal ne peut facilement subvertir ou ignorer."
 railroad_advance:0 "$railroad$"
 railroad_advance_desc:0 "$railroad_desc$"
 rainforests_and_mountaintops:0 "Forêts humides et montagnes"
 rainforests_and_mountaintops_desc:0 "Les grandes forêts humides et les montagnes de notre territoire grouillent de vie. En plus des esprits des forêts, les jaguars, anacondas, tarentules et une myriade d'autres animaux vivent parmi nous, et pour quiconque les connaît, ils présentent bien peu de danger. Pour tout envahisseur, cependant, ces zones ont tout l'air d'une forteresse, dont les animaux sauvages sont les défenseurs."
 rais_of_the_navy:0 "Ra'īs de la flotte"
 rais_of_the_navy_desc:0 "Nos capitaines corsaires, les Ra'īs, sont bien plus que de simples pirates. Ce sont des commandants aguerris, dont l'expérience en mer nourrit une riche tradition maritime, qui renforce l'héritage glorieux de notre flotte."
 raj_clan_loyalties:0 "Loyautés des clans"
 raj_clan_loyalties_desc:0 "L'influence de notre clan s'étend bien au-delà de nos propres frontières. Nous sommes en mesure de faire appel aux Rajputs de notre clan dans tout le nord de l'$india$ pour garnir les rangs de nos armées."
 raj_combat_training:0 "Entraînement au combat"
 raj_combat_training_desc:0 "Tous les soldats sont formés au combat. Cependant, notre peuple s'y entraîne dès son plus jeune âge, ce qui lui permet de surpasser n'importe quel autre soldat fraîchement engagé."
 raj_expanded_artillery_arm:0 "Artillerie perfectionnée"
 raj_expanded_artillery_arm_desc:0 "C'est en assiégeant que l'on gagne les guerres. Nous devons expérimenter des moyens de créer des canons plus grands et plus performants pour faire tomber les nombreux forts de nos ennemis en $india$ et à l'extérieur."
 raj_fortress_architecture:0 "Architecture de forteresse"
 raj_fortress_architecture_desc:0 "La montée en puissance de $DLH$ et les invasions des guerriers $muslim_ADJ$s passées ont été un signal d'alarme pour notre peuple. Nous devons toujours nous préparer à l'arrivée d'envahisseurs étrangers, et donc engager les architectes les plus compétents pour concevoir des forteresses imprenables aux quatre coins de notre royaume. Les murs immensément longs qui seront nécessaires pour protéger nos terres constitueront un projet ambitieux, mais notre détermination à défendre notre peuple fera en sorte qu'il soit mené à bien."
 raj_mandatory_firearm_drilling:0 "Entraînement obligatoire aux armes à feu"
 raj_mandatory_firearm_drilling_desc:0 "De nombreux soldats rajputs sont devenus des experts dans l'utilisation d'armes à feu personnelles. Nous devons mettre ces vétérans endurcis au service de la formation de la prochaine génération de soldats plutôt que de risquer de perdre leur expertise au combat. Tous nos soldats doivent être formés aux tactiques d'armes à feu avant qu'ils n'affrontent nos ennemis sur la ligne de front."
 raj_martial_ethos:0 "Philosophie martiale"
 raj_martial_ethos_desc:0 "L'éducation et les traditions des guerriers rajputs constituent une large base de recrutement d'officiers pour diriger nos armées. Afin de tirer parti de cette situation, nous devrions veiller à ce que les possibilités de carrière soient nombreuses afin d'encourager tous ces jeunes hommes prometteurs à servir en tant qu'officiers, tant dans nos propres armées qu'à l'étranger."
 raj_martial_smiths:0 "Forgerons martiaux"
 raj_martial_smiths_desc:0 "Les guerres ne se gagnent pas seulement par la tactique et la bravoure, mais aussi par l'armement. Nos forgerons fabriqueront les meilleures armes martiales que nos guerriers brandiront pour défendre le peuple rajput contre toute menace étrangère."
 raj_marwari_horses:0 "Chevaux mârwaris"
 raj_marwari_horses_desc:0 "Tout comme leurs maîtres, les chevaux de la cavalerie rajput sont méticuleusement entraînés pour être performants sur le champ de bataille. On dit qu'un cheval mârwari ne peut quitter le champ de bataille que dans l'un des trois cas suivants : la victoire, la mort ou le transport d'un maître blessé en lieu sûr. En prenant bien soin de ces êtres divins, nous assurons la domination éternelle de nos cavaliers sur les champs de bataille à travers l'$india$."
 raj_militaristic_society:0 "Société militariste"
 raj_militaristic_society_desc:0 "Chez les Rajputs, il n'y a pratiquement pas de division entre la société civile et la société militaire. Notre nation est un hôte, défini par son peuple plutôt que par les terres que nous contrôlons, et son peuple est composé de guerriers. Nous devons veiller à ce que les divisions militaires répondent correctement à nos besoins administratifs au fur et à mesure de l'expansion de cet hôte."
 raj_monumental_architecture:0 "Architecture monumentale"
 raj_monumental_architecture_desc:0 "À quoi servent les victoires s'il n'y a pas de bâtiment pour immortaliser nos exploits ? Nous devons ériger des monuments impressionnants tels qu'une Tour de la Victoire pour que les générations futures sachent tout de nos plus grandes batailles."
 raj_painting_school:0 "École de peinture rajput"
 raj_painting_school_desc:0 "Les peintres rajputs jouissent déjà d'une excellente réputation. Nous devons encourager nos artistes à développer leurs compétences et à renforcer la gloire de notre dynastie en créant une école de peinture propre à notre État."
 raj_rajput_resistance:0 "Résistance rajput"
 raj_rajput_resistance_desc:0 "Les bardes rajputs racontent les nombreuses batailles de notre peuple contre les envahisseurs étrangers et comment nos ancêtres préféraient mourir plutôt que de s'avouer vaincus. Nous devons encourager cet esprit d'unité et donner aux bardes des raisons d'écrire de nouvelles ballades sur notre bravoure face à la mort."
 raj_reorganized_rajput_regiments:0 "Régiments rajputs réorganisés"
 raj_reorganized_rajput_regiments_desc:0 "La structure traditionnelle des clans constitue un socle solide pour un système de régiments modernes. Les hiérarchies préexistantes, basées sur la parenté et une loyauté inconditionnelle, peuvent très facilement se traduire sous la forme d'une chaîne de commandement organisée et officialisée."
 raj_the_purbias:0 "Les purbias"
 raj_the_purbias_desc:0 "Les Rajputs se sont répandus dans tout le nord de l'$india$ dans leur quête de gloire pour leur clan. Les #italic purbias#!, soldats d'élite rajputs qui se présentent comme mercenaires, sont réputés pour leur aptitude au combat et propagent ainsi notre redoutable réputation."
 rallying_the_troops:0 "Ralliement des troupes"
 rallying_the_troops_desc:0 "Notre royaume a mis au point des moyens de mobiliser rapidement les troupes, afin qu'aucun ennemi ne puisse nous prendre au dépourvu. Cet atout nous a permis de résister malgré toutes les difficultés, et nous sommes prêts pour la bataille. Unis, nous marchons de l'avant, résolus à défendre notre honneur et notre patrie."
 ramadan:0 "Ramadan"
 ramadan_desc:0 "Commémorant la première révélation faite au prophète Mahomet, que la paix soit sur lui, le mois du $ramadan$ est le mois le plus sacré de l'$muslim$. Au cours de celui-ci, tous les fidèles $muslim_ADJ$s sont appelés à respecter le saoum, la pratique du jeûne et de l'abstinence de l'aube au coucher du soleil, ainsi qu'à s'adonner à la prière et à la réflexion."
 ramayana:0 "Rāmāyaṇa"
 ramayana_desc:0 "L'un des deux principaux textes de la $smrti$ avec le $mahabarata$, le $ramayana$ est une épopée portant sur l'$india$ antique. Elle relate la vie de $rama_avatar$, avatar de $vishnu_god$, en tant que prince du royaume de Kosala. Cette œuvre souligne l'importance de la vertu dans tous les aspects de l'existence."
 ranching:0 "Élevage extensif"
 ranching_desc:0 "L'élevage de bétail a développé la possibilité d'élever des troupeaux de chevaux, ce qui a permis de sélectionner des animaux parfaitement adaptés aux voyages, aux guerres et à un grand nombre d'autres tâches."
 rasulid_bureaucracy:0 "Bureaucratie rassoulide"
 rasulid_bureaucracy_desc:0 "La dynastie rassoulide a instauré un ordre administratif sans précédent dans notre pays. Grâce à des recensements, un système fiscal rigoureux et une administration solide, elle a fait du Yémen l'un des royaumes les plus efficacement gouvernés de la péninsule."
 rebellion_support:0 "Relations secrètes"
 rebellion_support_desc:0 "En ces temps troublés, le peuple n'est guère satisfait de ceux qui les gouvernent. En contactant ces groupes de mécontents à l'étranger, nous pourrions les rallier à notre cause et les persuader de se révolter, ce qui constituerait certainement un outil de déstabilisation de nos ennemis."
 reclamation_of_land:0 "Reconquête"
 reclamation_of_land_desc:0 "Le Sahara n'est pas immuable : il peut s'étendre et se retirer selon les pluies, et le Sahel, la frange habitable où nous vivons, peut donc augmenter ou réduire en taille. Une sécheresse trop importante pourrait faire de la plus grande partie du pays une simple extension du Sahara, sans aucune utilité et où nul ne règne hormis la mort. Tout au contraire, les bonnes années nous permettent de prendre quelques terres au désert pour les rendre productives."
 reconquista_of_the_sea:0 "Reconquête de la mer"
 reconquista_of_the_sea_desc:0 "Lors de nos fréquents affrontements avec les redoutables corsaires turcs et barbares, nous avons souvent pensé que ces corsaires n'avaient pas leur pareil en matière de pillage des côtes, mais qu'ils jetaient leur dévolu sur les mauvaises cibles. Certes, la piraterie est vile en temps de paix, mais en temps de guerre, elle revêt une tout autre importance, n'est-ce pas ?"
 recovery_efforts:0 "Effort de redressement"
 recovery_efforts_desc:0 "La guerre est une maîtresse cruelle qui ne laisse derrière elle que ruines et dévastation. En concentrant nos efforts et en aidant notre peuple, nous pouvons accélérer le redressement dans tout le royaume."
 recruitment_improvements_reformation:0 "Bureaux de recrutement"
 recruitment_improvements_reformation_desc:0 "Si nous voulons que notre pays puisse se constituer une formidable armée, il est impératif que nous intensifiions nos efforts de recrutement. En nous concentrant sur les centres de recrutement, nous pourrons dénicher plus rapidement des soldats de qualité."
 recruitment_improvements_renaissance:0 "Recrutement organisé"
 recruitment_improvements_renaissance_desc:0 "Le développement des armées professionnelles a permis une augmentation de nos aptitudes militaires. Pour continuer ainsi, nous allons devoir améliorer notre capacité à recruter des soldats."
 recruitment_improvements_revolutions:0 "Recrutement intensif"
 recruitment_improvements_revolutions_desc:0 "Les perspectives de conflit se dessinant sur un territoire plus vaste que jamais, nous devons étendre notre système de recrutement en conséquence. Récompenser les engagés volontaires et forcer les criminels à rejoindre notre armée nous permettra de réagir plus rapidement face au danger."
 recruitment_law_advance:0 "$recruitment_law$"
 recruitment_law_advance_desc:0 "$recruitment_law_desc$"
 red_sea_trade:0 "Commerce en mer Rouge"
 red_sea_trade_desc:0 "Avec l'essor du commerce des épices, la mer Rouge est essentielle à notre richesse, aussi devons-nous en contrôler les allées et venues. En menaçant de détruire tous les ports qui acceptent des marchands d'épices sans que nous en ayons le contrôle, nous serons assurés de nous tailler la part du lion."
 reduce_inflations_advance:0 "Contrôle monétaire strict"
 reduce_inflations_advance_desc:0 "Certains se disent qu'il suffit de battre plus de monnaie si nous avons besoin d'argent. En réalité, cela ne ferait que contribuer à notre propre perte. Pour maîtriser l'inflation et même la réduire, nous devons garder un contrôle strict sur notre frappe de monnaie."
 refined_obsidian_weaponry:0 "Armes en obsidienne"
 refined_obsidian_weaponry_desc:0 "L'obsidienne est un excellent matériau pour la fabrication d'outils en tous genres. Sa nature dure et cassante permet aisément de forger des épées, têtes de lance et pointes de flèche capables d'infliger des blessures mortelles à n'importe quel adversaire."
 reform_church_music:0 "Réforme de la musique d'église"
 reform_church_music_desc:0 "Nous devons accepter les réformes proposées concernant notre musique liturgique. Les airs dilués actuellement en usage ne peuvent plus être considérés comme acceptables."
 reform_the_diwan:0 "Réforme du Divan"
 reform_the_diwan_desc:0 "Nous avons la chance de pouvoir compter sur les services d'administrateurs $farsi_culture$ loyaux et éduqués, qui maîtrisent l'art de la gouvernance depuis des générations. Malheureusement, un office héréditaire peut avec le temps stagner et manquer d'innovation. En réduisant le nombre de titres hérités à chaque génération, nous pourrions nous assurer de récompenser non seulement les plus loyaux, mais aussi les plus compétents. Les administrateurs de talent doivent pouvoir se hisser aux plus hauts rangs, quelle que soit la famille dont ils sont issus."
 reform_the_ecclesiastical_authorities:0 "Les guildes marchandes de la Morava"
 reform_the_ecclesiastical_authorities_desc:0 "Nous délivrerons des chartes royales aux corporations de la vallée de la Morava et encouragerons le développement de vastes ateliers de maroquinerie, de tissage et de finition des métaux le long des points de transit de la rivière. En exonérant ces corporations de certains péages internes en échange de la fourniture d'équipements standardisés pour les armées royales – tels que la sellerie pour la cavalerie et les uniformes pour l'infanterie –, l'État créera une industrie nationale autosuffisante. Cette initiative réduira la dépendance du royaume aux importations coûteuses et favorisera l'émergence d'une classe moyenne urbaine prospère, loyale et contrepoids au pouvoir rural de la noblesse, élargissant ainsi considérablement l'assiette fiscale de l'État."
 reform_the_feudal_army:0 "Réforme de l'armée féodale"
 reform_the_feudal_army_desc:0 "Le système de levée féodal s'est révélé trop lent et trop peu fiable à l'avènement d'une nouvelle ère de guerre professionnelle. Inspirés par le modèle français, nous remplacerons nos troupes de vassaux dispersés par des compagnies salariées, des officiers qualifiés œuvrant au sein d'une armée intégrée. Un noyau discipliné de soldats professionnels formera l'épine dorsale d'une armée moderne et adaptable."
 reform_the_grand_secretariat:0 "Réforme du Grand Secrétariat"
 reform_the_grand_secretariat_desc:0 "Considéré comme la plus haute institution #italic de facto#! sur l'ensemble de nos terres, le #italic Grand Secrétariat#! a accompagné nos dirigeants durant leurs mandats. Doté d'une immense influence dans la conduite des affaires administratives, ce corps de ministres va faire l'objet d'une réforme, afin d'accroître encore son efficacité."
 reform_the_mamluk_corps:0 "$a_mamluk_unit_renaissance$"
 reform_the_mamluk_corps_desc:0 "$a_mamluk_unit_renaissance_desc$"
 reformation_of_the_bulgarian_patriarchate:0 "Réforme du patriarcat"
 reformation_of_the_bulgarian_patriarchate_desc:0 "Le cœur spirituel du monde bulgare connaîtra une transformation rigoureuse et profonde sous la direction inflexible de notre patriarche. Reconnaissant que la survie de la nation dépend de la pureté de sa foi et de la précision de ses textes sacrés, le patriarcat entreprendra une vaste réforme linguistique et liturgique centrée sur le monastère de la Sainte-Trinité de Tarnovo. En purgeant les manuscrits en slavon liturgique des siècles d'erreurs de copistes et de localismes corrompus, nous établirons une nouvelle orthographe standardisée qui deviendra la référence pour l'ensemble du monde slave orthodoxe, du Danube à la Volga."
 reformation_subject_opinions_advance:0 "Suzeraineté économique"
 reformation_subject_opinions_advance_desc:0 "Le contrat qui définit la suzeraineté sur un autre État couvre maints aspects, dont l'obligation commerciale intérieure du vassal envers son suzerain. Dans ce contexte d'essor du commerce mondial, il devient de plus en plus important d'étendre cette obligation."
 reformed_telpochcalli:0 "Tēlpōchcalli réformée"
 reformed_telpochcalli_desc:0 "Face à de nouveaux ennemis, il nous faut de nouvelles tactiques militaires. Ces connaissances inestimables vont être enseignées dans notre #italic tēlpōchcalli#!."
 reforms_of_the_posadnichestvo:0 "Réformes du Possadnichestvo"
 reforms_of_the_posadnichestvo_desc:0 "Le possadnik est la plus haute fonction administrative au sein de nos villes et de nos cités. Le poste de possadnik est plus important que celui de maire. Les responsabilités, l'influence et le nombre de possadniks croissent au même rythme que les villes."
 regiment_reinforcement_speed_absolutism:0 "Maréchal des logis"
 regiment_reinforcement_speed_absolutism_desc:0 "Les armées permanentes sont devenues la nouvelle norme de la guerre, ce qui a engendré un certain nombre de difficultés. Le maréchal des logis, nouveau grade de notre armée, est chargé de surmonter ces difficultés en organisant la logistique de nos forces sans cesse grandissantes."
 regiment_reinforcement_speed_discovery:0 "Logistique militaire anticipée"
 regiment_reinforcement_speed_discovery_desc:0 "La logistique est le nerf de la guerre. Sur le champ de bataille, les armes et les armures des soldats perdent de leur résistance, cédant finalement face aux attaques ennemies. Cependant, l'établissement de dépôts de ravitaillement locaux et d'autres méthodes logistiques permettra de rééquiper chaque soldat en très peu de temps."
 regiment_reinforcement_speed_reformation:0 "Flacon de poudre"
 regiment_reinforcement_speed_reformation_desc:0 "Les armes à feu sont de plus en plus répandues au sein de notre armée. Pourtant, la poudre à canon reste un matériau difficile à manier en raison de sa vulnérabilité au climat et aux impacts extérieurs. Le flacon protégera la poudre des éléments, ce qui nous permettra de ravitailler plus facilement nos renforts."
 regiment_reinforcement_speed_renaissance:0 "Formation permanente"
 regiment_reinforcement_speed_renaissance_desc:0 "Le développement des armées professionnelles a bouleversé la manière de faire la guerre, qui repose désormais sur des unités permanentes servant pour une longue durée. Assurer la formation constante des soldats de ces unités constitue un défi de taille, mais se révèle indispensable à leur fonctionnement."
 regiment_reinforcement_speed_revolutions:0 "Formation massive"
 regiment_reinforcement_speed_revolutions_desc:0 "Les armées permanentes des temps modernes sont plus vastes que n'importe quelle force militaire d'antan. Les tactiques sont exécutées par des dizaines de milliers de soldats et le nombre de victimes est sans précédent. Notre nouvel entraînement militaire adressera ce taux de pertes élevé via la formation de centaines de soldats à la fois."
 regimental_camp_advance:0 "Centre de recrutement"
 regimental_camp_advance_desc:0 "$regimental_camp_desc$"
 regimental_system:0 "Système de recrutement"
 regimental_system_desc:0 "En organisant nos [regiments|e] sur la base de circonscriptions géographiquement bien définies, nous permettrons à l'armée de s'enraciner dans les communautés locales. Ainsi, lorsqu'elle devra lever de nouveaux bataillons pour nos [regiments|e], ils seront recrutés beaucoup plus rapidement."
 regnal_chronicles:0 "Chroniques régnantes"
 regnal_chronicles_desc:0 "Nous devrions retracer l'histoire de nos rois et de leurs exploits dans de grandes chroniques qui se transmettraient de génération en génération afin de ne pas tomber dans l'oubli."
 regular_levy_training:0 "Instruction des levées"
 regular_levy_training_desc:0 "Par définition, les levées ne sont pas les troupes les mieux entraînées, mais cela ne signifie pas que nous devons envoyer à la guerre une bande d'écervelés incompétents. Leur affecter des instructeurs chevronnés issus de nos meilleures unités leur permettra d'apprendre et cette période d'entraînement obligatoire fera d'eux des hommes."
 regulate_court_procedures:0 "Réglementation des procédures de la cour"
 regulate_court_procedures_desc:0 "En appliquant un régime strict et une routine à nos procédures, nous serons en mesure de réduire les coûts excédentaires potentiels et de gérer une cour frugale et efficace."
 regulation_bureau:0 "Bureau des réglementations"
 regulation_bureau_desc:0 "Un corps administratif dont la juridiction consiste à promulguer des lois et réglementations relatives à l'inflation et à l'administration des provinces est incontournable."
 rejection_of_chalcedon:0 "Rejet de Chalcédoine"
 rejection_of_chalcedon_desc:0 "Suite à la controverse suscitée par le $second_council_of_ephesus$, le concile de Chalcédoine a été convoqué à l'initiative du pape Léon Ier, qui a demandé l'annulation du $second_council_of_ephesus$. Nous rejetons ce concile fallacieux et nous conformons aux décisions prises lors du concile original."
 relations_absolutism_advance:0 "Politique étendue"
 relations_absolutism_advance_desc:0 "Alors que le monde qui nous entoure évolue pour s'adapter à la portée plus large d'un théâtre véritablement mondial, nos efforts diplomatiques doivent également s'adapter à ce besoin sans cesse croissant de sécurité contre les menaces étrangères."
 religious_dialects_hellenic_faith_advance:0 "Dialectes religieux"
 religious_dialects_hellenic_faith_advance_desc:0 "Bien que notre foi soit partagée par de nombreuses communautés, des divergences notables existent dans les rituels, les traditions et les pratiques religieuses locales. Avec le temps, ces variations se développent de manière organique, parfois même au sein d'une même province. À l'image de la langue qui évolue en dialectes régionaux, nos coutumes religieuses forment progressivement des expressions locales distinctes tout en demeurant au sein d'une même tradition sacrée."
 religious_icon_power_advance:0 "Icônes religieuses"
 religious_icon_power_advance_desc:0 "Les icônes sont des incarnations physiques de notre foi, des représentations sacrées de figures saintes destinées à inspirer admiration et dévotion à ceux qui les contemplent."
 religious_melting_pot:0 "Le creuset religieux"
 religious_melting_pot_desc:0 "De nombreuses religions ont influencé notre peuple, depuis ses croyances traditionnelles jusqu'à l'$hindu$ et le $buddhist$, issus d'$india$ et de $china$. Au fil du temps, notre peuple a forgé un syncrétisme qui mêle les croyances sans en ignorer aucune."
 religious_syncretism:0 "Syncrétisme religieux"
 religious_syncretism_desc:0 "Loin de toujours engendrer un rejet, les interactions entre les différentes croyances et pratiques donnent parfois lieu à une assimilation de ces convictions. Ainsi, la présence d'idées et de croyances étrangères n'est pas un fléau, mais plutôt une opportunité d'apprentissage."
 religious_toleration:0 "Tolérance religieuse"
 religious_toleration_desc:0 "La stabilité de notre pays est la clé de notre succès. En nous développant vers l'extérieur tout en encourageant la tolérance religieuse, nous n'améliorons pas seulement la stabilité de notre pays : nous en faisons un havre de paix pour celles et ceux qui fuient les persécutions."
 religious_tradition:0 "Traditions religieuses"
 religious_tradition_desc:0 "La force de notre foi ainsi que nos démonstrations de piété et de dévotion sont admirées par les autres peuples, qu'ils soient proches ou lointains. Cela se traduit par le prestige et la gloire dont jouit notre pays."
 religious_unification:0 "Unification religieuse"
 religious_unification_desc:0 "Il n'existe qu'une seule vraie religion, et il est de notre devoir d'unir tous les fidèles sous la gouverne exclusive de Dieu."
 remote_patriarchates:0 "Patriarcats éloignés"
 remote_patriarchates_desc:0 "En raison des conquêtes et de la persécution de notre peuple, les sièges de nos patriarcats sont souvent tombés sous le contrôle des infidèles. Nous avons donc été contraints de déplacer et de transférer notre patriarcat en un autre lieu, mais le siège d'origine est toujours préservé et vénéré, même s'il fonctionne à distance."
 renaissance_advance:0 "Renaissance"
 renaissance_advance_desc:0 "Les courants de pensée novateurs et les découvertes qui traversent notre royaume doivent être exploités et utilisés si nous voulons rester à la pointe de l'innovation technologique."
 renaissance_city_rights:0 "Établissement de droits urbains"
 renaissance_city_rights_desc:0 "Le fait que l'octroi des droits de cité demeure l'apanage exclusif de notre dirigeant permettra à notre administration d'avoir une vue d'ensemble plus claire de l'état de notre pays."
 renaissance_court:0 "Cour de la Renaissance"
 renaissance_court_desc:0 "La Renaissance s'est répandue à travers toute l'Europe et plus loin encore. Pour des raisons de prestige, notre cour devrait être remplie d'artistes et d'érudits passionnés, cherchant à concevoir les œuvres les plus splendides jamais réalisées."
 renaissance_development:0 "Traités savants"
 renaissance_development_desc:0 "L'ère de la pensée, des arts et des sciences apportera de nouvelles vagues de découvertes et d'inventions, ce qui nous permettra d'améliorer notre appropriation des institutions étrangères."
 renaissance_prince:0 "Prince de la Renaissance"
 renaissance_prince_desc:0 "Les autres dirigeants italiens peuvent négliger autant qu'ils le veulent la Renaissance culturelle qui se produit sous nos yeux ; mais sous notre patronage, Milan en sera le foyer."
 renaissance_sculptures:0 "Sculptures de la $renaissance$"
 renaissance_sculptures_desc:0 "L'avènement de la $renaissance$ a entraîné un regain d'intérêt pour l'art sous toutes ses formes. Il semble qu'aujourd'hui, tout le monde se doive de posséder une œuvre d'art chez soi. Les sculptures, en particulier, sont devenues l'une des formes d'expression artistique les plus populaires. Cela a entraîné la multiplication des carrières capables de fournir aux artistes les pierres dont ils ont besoin pour leurs créations."
 renaissance_subject_opinions_advance:0 "Suzeraineté culturelle"
 renaissance_subject_opinions_advance_desc:0 "Ces dernières années, les thèmes de la culture et des idées basées sur l'importance de l'Homme et de la nature se sont répandus. Ce phénomène ne s'applique pas seulement à notre peuple, mais aussi aux nations qui nous ont prêté allégeance, donnant ainsi naissance à un nouvel outil diplomatique."
 renaissance_thought:0 "Pensée de la Renaissance"
 renaissance_thought_desc:0 "L'idée qu'une oligarchie noble dirige la société remonte au moins à l'époque romaine et est restée très présente dans certaines parties du monde. Aujourd'hui, cette idée gagne à nouveau en popularité au sein de tous ceux qui jouent un rôle véritable au sein de la société."
 renaissance_urbanisation:0 "L'urbanisme de la Renaissance"
 renaissance_urbanisation_desc:0 "La prise en compte de zones dédiées à l'exploitation des ressources lors de la planification des villes permettra à nos centres urbains de produire plus de biens qu'auparavant."
 repair_at_sea:0 "Carénages côtiers"
 repair_at_sea_desc:0 "Les navires passent de plus en plus de temps en mer, ce qui a été rendu possible par le développement régulier de nouveaux progrès techniques. Cela rend des réparations plus complexes nécessaires, or il n'y a pas toujours de port disponible. Nos marins doivent être formés aux techniques permettant de caréner loin de leur base d'opérations, en mettant à profit la marée basse côtière."
 repair_at_sea_aod:0 "Équipages professionnels"
 repair_at_sea_aod_desc:0 "Alors que les derniers progrès des techniques navales repoussent les limites de la navigation, nous avons besoin que leurs équipages exploitent pleinement ces nouvelles capacités. Seule une formation de marins professionnels permanents leur permettrait d'effectuer correctement toutes les tâches nécessaires à l'entretien des nouveaux navires."
 repair_at_sea_aorev:0 "Gîte parlementaire"
 repair_at_sea_aorev_desc:0 "Cette technique de carénage se réalise dans les eaux côtières profondes. \\nIl s'agit de déplacer une cargaison lourde sur l'un des côtés du navire pour le faire gîter, et ainsi permettre à l'équipage d'accéder à l'autre flanc du navire pour le réparer, sans avoir à mouiller près de la côte et attendre la marée basse, comme c'est l'usage dans un carénage normal."
 republic_reform_traditions_advance:0 "Traditions de la réforme républicaine"
 republic_reform_traditions_advance_desc:0 "La délégation du pouvoir est la pierre angulaire d'une république saine. Des lois solides qui dictent des élections à tirage au sort assureront la stabilité et la réduction de la corruption."
 republican_assembly_advance:0 "Assemblée républicaine"
 republican_assembly_advance_desc:0 "Au cœur de la République, l'$republican_assembly$ est une institution importante si nous voulons que notre pays soit gouverné par la vertu et l'excellence."
 republican_election_law_advance:0 "$republican_election_law$"
 republican_election_law_advance_desc:0 "$republican_election_law_desc$"
 republican_electorate_law_advance:0 "$republican_electorate_law$"
 republican_electorate_law_advance_desc:0 "$republican_electorate_law_desc$"
 republican_foundation_law_advance:0 "$republican_foundation_law$"
 republican_foundation_law_advance_desc:0 "$republican_foundation_law_desc$"
 republican_power_law_advance:0 "$republican_power_law$"
 republican_power_law_advance_desc:0 "$republican_power_law_desc$"
 repurposed_monasteries:0 "Monastères transformés"
 repurposed_monasteries_desc:0 "Les anciennes terres cléricales que nous avons capturées lors de la conversion de notre pays peuvent désormais nous servir de centres de production ou d'administration."
 res_publica_christiana:0 "Chrétienté universelle"
 res_publica_christiana_desc:0 "Nous devons entretenir de bonnes relations avec nos frères chrétiens, et ce en dépit du fait que certaines de leurs pratiques sont considérées comme hérétiques."
 resilient_merchants:0 "Marchands tenaces"
 resilient_merchants_desc:0 "Les marchands $muslim_ADJ$s ont dû supporter les conditions les plus extrêmes au cours de leurs expéditions. Qu'il s'agisse de traverser les sables brûlants du Sahara et du désert de Gobi ou bien de naviguer sur les eaux tempétueuses de l'$indian_ocean_region$ en période de mousson, ils ont prouvé à maintes reprises leur ténacité lorsqu'il est question d'assurer le succès de leur commerce."
 resistance_to_persecution:0 "Résistance à la persécution"
 resistance_to_persecution_desc:0 "Bien que le $buddhist$ se soit répandu à grande échelle, il a néanmoins fait l'objet d'une grande persécution au fil des siècles. Cette religion a en effet vu ses temples et images détruits, ses adeptes massacrés ou contraints à se cacher, mais malgré ces épreuves, les croyances qu'elle prône sont toujours restées fortes."
 resistance_to_the_infidels:0 "Résistance aux infidèles"
 resistance_to_the_infidels_desc:0 "Nos frères $orthodox_ADJ$s ont parfois dû vivre sous le joug d'étrangers infidèles. Cependant, nous avons appris à faire face à une telle oppression, et même à coexister avec ces hérétiques."
 retablissement:0 "Rétablissement"
 retablissement_desc:0 "Après les guerres tumultueuses, une ère nouvelle s'annonce : le #italic Rétablissement#! saxon. Au milieu des ruines, le pays va se relever comme un phénix, rebâtir son économie en faisant voile vers la prospérité. Poussé par un mélange de réformes visionnaires et de dépenses disciplinées de l'État, notre pays émerge en tant que carrefour commercial de l'Allemagne. Grâce à nos compétences administratives sans précédent et à l'accent mis sur le développement économique, cette transformation radicale va marquer un moment important de l'histoire allemande."
 reuniting_rus:0 "Réunification de la Ruthénie"
 reuniting_rus_desc:0 "Nous sommes les véritables héritiers de la Rus' de Kiev, et ses territoires doivent être réunis sous notre bannière !"
 revival_of_the_literary_schools:0 "Les écoles d'art de Tarnovo"
 revival_of_the_literary_schools_desc:0 "Sous le patronage direct de la dynastie Chichman, la nation a connu une croissance culturelle spectaculaire, se positionnant comme une véritable #italic Troisième Rome#! et le principal gardien de la haute culture orthodoxe. En finançant la reconstruction de la cathédrale patriarcale et des palais royaux de Tsarevets, l'État a rassemblé une nouvelle génération de maîtres iconographes, hagiographes et architectes qui fusionnent l'esthétique byzantine traditionnelle avec un réalisme bulgare unique et émouvant. Cette école de pensée ne se limite pas à produire des icônes religieuses : elle constitue un puissant instrument de propagande impériale, codifiant la recension bulgare du slavon liturgique et produisant la chronique de Manassès pour légitimer la revendication du tsar à l'héritage byzantin."
 revolutions_agressive_advance:0 "Conflits justifiés"
 revolutions_agressive_advance_desc:0 "La scène diplomatique internationale appelle à un équilibre du pouvoir entre les nations. Les guerres d'agression sont donc très mal perçues et peuvent, en cas de victoire de l'attaquant, mener à la formation de coalitions contre celui-ci.\\nCependant, un usage habile de la diplomatie et une interprétation à notre avantage nous permettront de dépeindre nos ennemis comme nos agresseurs, justifiant alors pleinement notre guerre et les gains qui en découleront."
 revolutions_subject_opinions_advance:0 "Suzeraineté bienveillante"
 revolutions_subject_opinions_advance_desc:0 "Les feux de la Révolution ne sont pas une menace à prendre à la légère. Si nous voulons nous assurer la loyauté de nos vassaux, nous devons étouffer toute envie de révolte en nommant des gouverneurs loyaux et en éliminant les sources d'agitation."
 rgo_build_time_advance:0 "Méthodes de construction de la Renaissance"
 rgo_build_time_advance_desc:0 "Les grands bâtiments et projets d'infrastructures du passé se dressent encore fièrement. Il est indéniable que les techniques de construction utilisées pour les concevoir et les ériger étaient sophistiquées et bien développées. Nous pouvons encore apprendre beaucoup de choses en les étudiant."
 rgo_construction_ren:0 "Efforts en matière d'infrastructures"
 rgo_construction_ren_desc:0 "Notre terre et notre peuple sont les forces vives de notre nation. En leur accordant les efforts nécessaires pour améliorer les infrastructures, non seulement ils en bénéficieront, mais nous en tirerons également un bénéfice décuplé."
 rgo_logistics_discovery:0 "Greniers locaux"
 rgo_logistics_discovery_desc:0 "Si les commerçants et les artisans peuvent accéder localement aux produits qu'ils désirent, cela permettra non seulement d'alléger leur travail, mais aussi d'éviter que les prix des produits n'augmentent de manière excessive. À cet effet, les entrepôts serviront de centres de distribution locaux pour répondre aux besoins de tous."
 rgo_logistics_mil_choice:0 "Greniers améliorés"
 rgo_logistics_mil_choice_desc:0 "Disposer d'entrepôts adéquats pour stocker les produits nécessaires aux commerces locaux est indispensable si nous voulons que ces commerces, ainsi que l'ensemble de l'économie, fonctionnent sans accroc."
 rgo_size_advance_absolutism:0 "Physiocratie"
 rgo_size_advance_absolutism_desc:0 "Les transformations récentes de la pensée économique ont fait évoluer l'ancienne idée mercantiliste de valeur intrinsèque au commerce : la valeur réside désormais dans le processus de production lui-même. Ainsi, la production elle-même s'est constamment améliorée et a augmenté."
 rgo_size_advance_discovery:0 "Techniques d'extraction avancées"
 rgo_size_advance_discovery_desc:0 "Les différentes découvertes de minéraux et l'invention de nouveaux outils ont permis de collecter plus efficacement les ressources et d'accélérer les chaînes de production."
 rgo_size_advance_reformation:0 "Rouets"
 rgo_size_advance_reformation_desc:0 "Plus nos méthodes d'extraction des ressources gagnent en efficacité, plus nous pouvons produire et donc nous enrichir."
 rgo_size_advance_renaissance:0 "Moulins"
 rgo_size_advance_renaissance_desc:0 "Les moulins sont employés depuis leur découverte dans l'Antiquité, il y a plusieurs siècles. Toutefois, nous sommes aujourd'hui en mesure de développer des moulins à vent et à eau plus modernes et plus efficaces pour collecter des matières premières."
 rgo_size_advance_revolutions:0 "Machine à vapeur"
 rgo_size_advance_revolutions_desc:0 "L'énergie à vapeur est un procédé connu depuis l'Antiquité. Cependant, ce n'est que récemment que nous avons pleinement mesuré son potentiel, lorsque les dernières avancées en physique et en mathématiques ont conduit à l'invention de moteurs à vapeur plus performants, capables d'alimenter des machines plus complexes. Un progrès qui a permis d'accroître considérablement la productivité dans tous les domaines."
 rich_lands:0 "Terres abondantes"
 rich_lands_desc:0 "Nos terres sont riches, des prairies aux forêts épaisses, prêtes à être exploitées par nos courageux hommes et femmes. Nous utiliserons toutes les ressources à notre disposition pour apporter la prospérité à chaque foyer de notre grande nation en gérant avec sagesse les terres qui nous ont été données."
 riches_of_asia:0 "Richesses d'$asia$"
 riches_of_asia_desc:0 "L'$asia$ est célèbre dans le monde entier pour la richesse de son territoire. Qu'il s'agisse des cités prospères de l'$india$ et de la $persia_region$, des articles de luxe très convoités de la $china$ ou des légendaires îles aux épices de l'$indonesia_region$, l'$asia$ abrite des richesses et produits fortement appréciés aux quatre coins du globe."
 riches_of_foreign_coasts:0 "Richesses des côtes étrangères"
 riches_of_foreign_coasts_desc:0 "Des terres lointaines nous ont apporté de nombreuses ressources, mais ce ne sont pas seulement les terres elles-mêmes qui sont riches. Les côtes et la mer sont également généreuses, et en acquérant le savoir des plongeurs de perles étrangers, les nôtres voient leurs prises devenir plus abondantes."
 riches_of_the_silk_road:0 "Contrôle de la Route de la soie"
 riches_of_the_silk_road_desc:0 "Tant que nos marchands contrôleront les terres de la $transoxiana_area$ et $samarkand$, le commerce sur la route de la soie se fera sans entrave et notre dynastie continuera d'accumuler les richesses."
 right_to_rule:0 "Droit de statuer"
 right_to_rule_desc:0 "Notre administration est organisée autour du principe selon lequel les meilleurs talents sont affectés aux postes qui leur conviennent. Ainsi, le dirigeant devrait être le plus talentueux de tous, comme il sied à quelqu'un qui a la responsabilité du pays tout entier. Dans le cas malheureux où le souverain serait incompétent, nous avons besoin de personnes chargées d'embellir la réalité, que ce soit par des statues imposantes, des peintures éblouissantes ou des vers exaltants."
 rights_of_man:0 "Droits de l'homme"
 rights_of_man_desc:0 "Portée aux nues par les pensées révolutionnaires se trouve la notion radicale de l'égalité entre tous. Les philosophes de différentes régions du monde ont travaillé de concert pour créer un document intitulé « La Déclaration des droits de l'homme et du citoyen », proclamant que ces droits sont universels et devraient être imposés par la loi. Il est à prévoir que cela aura des répercussions importantes pour le développement et la diffusion de la liberté et de la démocratie, aussi aurions-nous tout intérêt à nous y intéresser sans attendre."
 rise_of_great_individuals:0 "Montée en puissance d'illustres personnages"
 rise_of_great_individuals_desc:0 "L'histoire a démontré que les illustres personnages sont ceux qui s'élèvent et accomplissent de grandes choses. Combien de fois des empires sont nés et ont péri de la main d'un seul dirigeant ? De tels exploits se doivent d'être respectés et admirés."
 rites_holy_sepulchre:0 "Rites du Saint-Sépulcre"
 rites_holy_sepulchre_desc:0 "Dans l'église du Saint-Sépulcre, les anciens rites latins sont à nouveau célébrés dans toute leur splendeur. Ces rituels solennels, qui honorent la mort et la résurrection du Christ, renforcent notre mandat divin de gouverner cette terre et de répandre les enseignements de notre foi."
 ritual_bloodletting:0 "Offrandes de sang rituelles"
 ritual_bloodletting_desc:0 "Dans bien des cultures de notre monde, il est considéré comme normal que le dirigeant se livre à la scarification et à des offrandes de son sang pour honorer les dieux. Préserver cette tradition, c'est affirmer notre droit à gouverner."
 river_trade:0 "Commerce fluvial"
 river_trade_desc:0 "Les richesses des grands fleuves et des mers ont toujours nourri notre peuple. Lançons-nous dans le commerce fluvial et faisons notre possible pour protéger les nombreux marchands qui parcourent les rives et les côtes, afin de ne jamais manquer de ces biens qu'ils nous apportent."
 rmn_cartea_romaneasca_de_invetatura:0 "Carte Românească de Învățătură"
 rmn_cartea_romaneasca_de_invetatura_desc:0 "Nous avons publié la première collection imprimée de lois de notre nation, la #italic Carte Românească de Învățătură#!. Cette œuvre monumentale vise à unifier les pratiques juridiques de notre royaume et à les aligner sur la jurisprudence européenne. En professionnalisant les tribunaux et en standardisant les peines, nous avons réduit le pouvoir arbitraire des boyards locaux et renforcé l'autorité centrale du trône, faisant de notre État un modèle de légalisme et d'ordre orthodoxe oriental."
 rmn_the_bible_of_bucharest:0 "La Bible de Bucarest"
 rmn_the_bible_of_bucharest_desc:0 "La publication de la première Bible complète en langue roumaine a fondamentalement transformé notre identité culturelle, passant du slavon liturgique à la langue vernaculaire vivante. Cette œuvre monumentale agit comme un unificateur linguistique, standardisant les dialectes de la Valachie, de la Moldavie et de la Transylvanie en une langue littéraire unique. En rendant les textes sacrés accessibles au peuple, nous avons jeté les bases d'une conscience nationale unifiée qui transcende les frontières politiques des trois principautés distinctes."
 rmn_the_byzantine_heirs:0 "Les héritiers byzantins"
 rmn_the_byzantine_heirs_desc:0 "Inspirés par la gloire de Constantinople, les princes roumains se sont engagés à devenir les principaux mécènes du mont Athos et de l'Orient orthodoxe. En nous positionnant comme les héritiers de l'héritage culturel byzantin, nous attirons des lettrés et des artistes de tout le monde balkanique. La Roumanie est désormais « plus byzantine que Byzance », la capitale spirituelle du monde orthodoxe."
 rmn_the_descendants_of_trajan:0 "Les descendants de Trajan"
 rmn_the_descendants_of_trajan_desc:0 "À mesure que les vagues ennemies s'estompent, les peuples de langue latine des Carpates prennent conscience de leur héritage romain commun. En codifiant les récits oraux et les traditions juridiques des Valaques, nous sommes en mesure de créer une identité culturelle unifiée qui transcende les #italic Knezates#! et les voïvodies fragmentées. Ce #italic Romanisme#! fournit le ciment idéologique nécessaire pour unir les clans des montagnes en un État cohésif."
 rmn_the_foundation_of_the_metropolises:0 "La fondation des métropoles"
 rmn_the_foundation_of_the_metropolises_desc:0 "En assurant l'établissement des métropoles sur nos terres, nous obtenons une indépendance spirituelle et politique vis-à-vis des influences ecclésiastiques étrangères. Cette autonomie religieuse permet à la Couronne roumaine d'utiliser l'Église comme un bras administratif, garantissant la loyauté des boyards par la sanction divine. L'Église devient ainsi le principal promoteur de l'alphabétisation et du droit en Roumanie."
 rmn_the_pandur_militias:0 "Les milices Pandur"
 rmn_the_pandur_militias_desc:0 "Notre nation a vu l'essor des #italic Panduri#!, une infanterie irrégulière hautement motivée, issue de nos paysans libres et de la petite noblesse. Ces soldats se spécialisent dans la guérilla et les déplacements rapides à travers les marais danubiens, démontrant qu'une force indigène animée par des convictions idéologiques peut rivaliser à la fois avec les ennemis et les troupes des boyards. La tradition des Pandur deviendra le modèle de la première armée nationale roumaine professionnelle et moderne."
 road_advance_1:0 "Réseau routier"
 road_advance_1_desc:0 "Le commerce et les échanges jouent un rôle de plus en plus central, de même que la mise en place de réseaux routiers plus étendus et plus complexes pour faciliter et accroître la circulation des personnes et des marchandises."
 road_advance_2:0 "Routes rudimentaires"
 road_advance_2_desc:0 "Les réseaux routiers rudimentaires ont permis de faire progresser nos systèmes de transport. En développant nos routes, nous pourrons élargir la circulation des marchandises au sein de notre territoire."
 road_building:0 "Construction routière"
 road_building_desc:0 "Le transport de marchandises, de troupes et de civils est essentiel à notre survie. En développant un réseau routier sous sa forme la plus basique, nous pourrons au moins rassembler notre peuple et l'assister dans son quotidien."
 rom_all_roads_lead_to_rome:0 "Tous les chemins mènent à Rome"
 rom_all_roads_lead_to_rome_desc:0 "Le réseau routier romain fait l'envie du monde entier : il relie notre empire, accélère la circulation des marchands, des messagers et des soldats, et tous les chemins convergent vers la Ville éternelle."
 rom_bread_and_circuses:0 "Panem et Circenses"
 rom_bread_and_circuses_desc:0 "Le peuple doit être content, car le mécontentement engendre la révolte. En lui assurant du pain pour sa table et des jeux pour ses yeux, nous gagnons sa loyauté et renforçons l'État."
 rom_citizenship:0 "Citoyens de Rome"
 rom_citizenship_desc:0 "La citoyenneté est l'élément vital de Rome, car elle lie les peuples de toutes les provinces en un seul corps politique. L'extension de ces droits garantit l'intégration et la promesse d'avancement pour tous ceux qui servent l'empire."
 rom_imperium_sine_fine:0 "Imperium Sine Fine"
 rom_imperium_sine_fine_desc:0 "La destinée de Rome n'a aucune limite. Des colonnes d'Hercule aux confins de la terre, nous sommes destinés à étendre notre domination, et à porter la civilisation partout où nos aigles marchent."
 rom_new_corpus_juris_civilis:0 "Novus Corpus Juris Civilis"
 rom_new_corpus_juris_civilis_desc:0 "Nos juristes compileront nos lois en un ensemble cohérent, en s'inspirant de la sagesse de Justinien et de la République. Ce faisant, nous garantirons une justice équitable pour tous sous le régime de Rome."
 rom_pax_romana:0 "Pax Romana"
 rom_pax_romana_desc:0 "Sous Rome, la paix ne signifie pas l'absence de guerre, mais le triomphe de l'ordre. Grâce à la loi, aux routes et à la puissance de nos armées, nous apportons la stabilité et la prospérité aux quatre coins de notre Empire."
 rom_provincial_governors:0 "Gouverneurs provinciaux"
 rom_provincial_governors_desc:0 "Les provinces ne peuvent être gouvernées depuis Rome. En donnant plus de pouvoir aux gouverneurs compétents, nous nous assurons que nos lois et nos taxes accèdent aux territoires les plus reculés de l'Empire."
 rom_restore_the_legions:0 "Réinstituer les légions"
 rom_restore_the_legions_desc:0 "Fierté de Rome, les légions étaient autrefois redoutées et respectées dans le monde entier. Les restaurer, c'est faire revivre la discipline, l'organisation et l'esprit indomptable qui ont bâti nos puissantes fondations."
 rom_revival_of_arts_and_culture:0 "Renaissance des arts et de la culture"
 rom_revival_of_arts_and_culture_desc:0 "Rome était tout autant un phare culturel qu'un conquérant. En parrainant des poètes, des savants et des architectes, nous ravivons la flamme créative qui a illuminé le monde antique."
 rom_roman_architecture:0 "Architecture romaine"
 rom_roman_architecture_desc:0 "Des aqueducs aux amphithéâtres, l'ingénierie romaine laisse des monuments qui perdurent pendant des siècles. Notre maîtrise de la pierre et de la voûte déclare au monde que la grandeur de Rome est éternelle."
 rom_spqr:0 "S.P.Q.R."
 rom_spqr_desc:0 "Le Sénat et le peuple de Rome sont les fondements éternels de notre État. En invoquant cette autorité ancienne, nous rappelons à tous que Rome ne gouverne pas seulement par la force des armes, mais également par la volonté de ses citoyens et de ses institutions."
 rom_triumphs:0 "Triomphes romains"
 rom_triumphs_desc:0 "Un triomphe est plus qu'une procession. C'est la mémoire vivante d'une conquête qui défile dans les rues de nos plus grandes villes. De telles cérémonies inspirent à la fois la loyauté, la crainte et l'ambition."
 roman_catechism:0 "Catéchisme romain"
 roman_catechism_desc:0 "Notre clergé doit s'adapter aux instructions officielles de l'Église, ce qui rendra nos prêtres plus performants et facilitera leur éducation."
 roman_orthodoxy:0 "Orthodoxie catholique romaine"
 roman_orthodoxy_desc:0 "Si nous voulons que le peuple soit bien conscient de l'autorité de l'Église, nul ne doit remettre en cause la droiture de la foi catholique romaine ni de sa doctrine."
 romanian_the_foundation_of_the_voivodeship_tradition:0 "Les fondements de la tradition des voïvodies"
 romanian_the_foundation_of_the_voivodeship_tradition_desc:0 "Le passage des knèzes tribaux à la fonction centralisée de voïvode marque l'évolution de la culture politique roumaine en un système médiéval sophistiqué. Ce modèle de #italic Dux#!, ou chef militaire, s'inspire à la fois des influences slaves et byzantines, mais sa mise en œuvre est typiquement roumaine, alliant monarchie élective et continuité dynastique. Il offrira à la communauté une hiérarchie militaire claire, capable de négocier avec les couronnes voisines en tant qu'égaux souverains."
 romanian_the_letter_of_neacsu:0 "La Lettre de Neacșu"
 romanian_the_letter_of_neacsu_desc:0 "La Lettre de Neacșu de Câmpulung est le plus ancien document existant rédigé en roumain. Ce passage du slavon à la langue vernaculaire dans la correspondance privée et administrative témoigne d'une conscience nationale grandissante parmi les élites et les marchands. Elle jette les bases d'une culture littéraire roumaine unifiée qui finira par unir nos terres."
 romanian_the_postelnic_bureaucracy:0 "La bureaucratie des postelnics"
 romanian_the_postelnic_bureaucracy_desc:0 "Nous avons modernisé notre administration centrale en élargissant le rôle du postelnic (grand chambellan) afin qu'il supervise un corps professionnalisé de greffiers dans les domaines diplomatiques et financiers. En adoptant des pratiques de chancellerie à l'occidentale et en tenant des registres rigoureux des recettes de l'État et des traités internationaux, nous avons dépassé le stade de la simple gouvernance féodale. Cette efficacité bureaucratique permet au voïvode de tirer pleinement profit du commerce danubien, tout en maintenant un réseau complexe d'espions dans les capitales ennemies."
 romanian_the_romanian_renaissance:0 "La Renaissance roumaine"
 romanian_the_romanian_renaissance_desc:0 "Grâce à l'influence de nos familles les plus fortunées, nos terres connaissent actuellement un essor culturel connu sous le nom de « style brâncovenesc », et nous nous devons de le soutenir. Cette période d'épanouissement culturel conduira à la construction de palais somptueux et au mécénat de lettrés humanistes, qui mettront en avant les origines romaines du peuple roumain. Ce mouvement intellectuel consolidera notre identité en tant qu'« île latine » au milieu d'un océan d'influences slaves et magyares, renforçant ainsi notre position diplomatique en Europe occidentale."
 romanian_the_scoala_ardeleana:0 "La Școala Ardeleană"
 romanian_the_scoala_ardeleana_desc:0 "Ce mouvement intellectuel né en Transylvanie a su brillamment allier le rationalisme des Lumières à une fierté nationale farouche, en démontrant les origines latines de notre peuple grâce à des études minéralogiques et linguistiques rigoureuses. En rédigeant les premiers manuels modernes de grammaire et d'histoire roumains, nous avons alimenté le moteur idéologique d'un véritable esprit nationaliste. L'École transylvaine a convaincu les peuples roumains, dans toutes les provinces, qu'ils formaient une nation unique, d'origine occidentale, vouée à la souveraineté, ce qui mit fin à l'ère du provincialisme médiéval."
 roof_of_africa:0 "Le toit de l'Afrique"
 roof_of_africa_desc:0 "Notre peuple a habité les hauts plateaux depuis des générations, supportant des conditions extrêmes qui nous ont rendus robustes et puissants. Cela nous confère un avantage considérable sur nos ennemis dès que nous sommes en guerre."
 rotherham_plough:0 "Charrue de Rotherham"
 rotherham_plough_desc:0 "Les charrues utilisées en Europe n'ont guère évolué depuis l'époque romaine. Grâce à des améliorations au niveau de leur conception, elles sont désormais plus légères, ce qui permet aux animaux de trait de fournir moins d'efforts pour obtenir un meilleur rendement."
 route_to_the_indies_advance:0 "Route des Indes"
 route_to_the_indies_advance_desc:0 "Le commerce avec l'Extrême-Orient est essentiel au maintien de notre mode de vie. Cependant, la voie terrestre est lente et coûteuse. La découverte d'une route maritime ouvrirait de nombreuses opportunités commerciales aux marchands de notre pays."
 royal_court_advance:0 "Cour royale"
 royal_court_advance_desc:0 "$royal_court_desc$"
 royal_mamluks:0 "Mamelouks royaux"
 royal_mamluks_desc:0 "Les mamelouks royaux sont les unités d'élite de l'armée mamelouke qui assurent la garde personnelle du sultan. Triés sur le volet et rigoureusement formés, ils sont réputés pour leur loyauté, leur talent exceptionnel pour le combat ainsi que leur dévouement inébranlable."
 royal_navy:0 "La Royal Navy"
 royal_navy_desc:0 "À partir de 1495 environ, les Tudors investissent lourdement dans les affaires maritimes : non seulement dans les navires, mais aussi dans les infrastructures pour les entretenir. Beaucoup y voient l'acte de naissance de la marine royale : la « Royal Navy »."
 royal_revenue:0 "Garantir les revenus de la Couronne"
 royal_revenue_desc:0 "Si nous souhaitons libérer l'Écosse de l'esclavage, nous devons nous assurer des sources de revenus stables. En renforçant notre contrôle sur les domaines royaux et les droits féodaux, nous pouvons augmenter les impôts que nous percevons à juste titre. Grâce à ces méthodes, nous pouvons faire en sorte que la couronne dispose des fonds nécessaires pour agir à sa guise sans dépendre d'autres sources d'argent."
 rudimentary_coastal_ship_repair:0 "Réparations improvisées"
 rudimentary_coastal_ship_repair_desc:0 "La détérioration des navires lorsqu'ils naviguent est inévitable. Le battement constant des vagues et la corrosion due à l'eau salée endommagent la coque et les cordages au fil du temps, quelle que soit la qualité de fabrication du vaisseau. Pour pallier ce problème, les marins ont l'habitude d'effectuer des travaux d'entretien réguliers sur leur navire pour le garder en parfait état de marche et, en cas d'avarie plus importante, de le maintenir à flot jusqu'à atteindre un port sûr."
 rulership_of_enlightened_principals:0 "Gouvernement éclairé"
 rulership_of_enlightened_principals_desc:0 "Avec les encouragements donnés aux philosophes, de nouvelles théories et de nouveaux principes ont commencé à voir le jour. Structurer notre administration selon ces principes permettrait à plus de gens de nous soutenir. En tout cas, ceux qui comptent vraiment."
 rural_rgo_disc_advance:0 "Développement des colonies"
 rural_rgo_disc_advance_desc:0 "Tout établissement, quelle que soit son importance, prospérera tant que la terre est riche et qu'il y a quelqu'un pour la travailler. Même un tout petit village peut devenir prospère et rempli d'activité le temps venu."
 rural_rgo_traditions:0 "Dégagement du terrain"
 rural_rgo_traditions_desc:0 "Nous devons apprivoiser les régions les plus reculées de notre pays afin d'étendre nos capacités économiques. Non seulement nous offrirons plus d'espace à notre population, mais nous pourrons également améliorer leur contribution à notre pays."
 russian_artillery_yard:0 "Atelier d'artillerie russe"
 russian_artillery_yard_desc:0 "Ce qui décide des sièges aujourd'hui et des batailles indécises de demain, c'est une puissance de feu supérieure. Nous devons construire un atelier d'artillerie moderne au cœur même du pays, qui assurera à nos armées de ne jamais manquer ni de canons ni de boulets."
 russian_integration:0 "Traditions $russian_group$s"
 russian_integration_desc:0 "Les $russian_group$s ont une culture vaste et diversifiée. Pour les unifier comme y parvenaient les souverains d'autrefois, nous devrions promouvoir notre histoire commune et forger un lien entre les peuples qui deviendra indéfectible."
 russian_legitimization:0 "Légitimité populaire"
 russian_legitimization_desc:0 "Le peuple $russian_group$ occupe ces terres et y règne depuis des siècles. Il est donc parfaitement naturel que ce soit un dirigeant $russian_group$ qui gouverne son propre peuple. Plus nous nous présenterons comme des $russian_group$s, plus la population acceptera facilement notre domination."
 russian_resiliance:0 "Recrutement $russian_group$"
 russian_resiliance_desc:0 "Les invasions $mongolian_group$s passées ont imprégné les $russian_group$s d'une forte détermination à résister à la domination étrangère. Nous pouvons tirer parti de cette volonté pour renforcer nos troupes."
 ruthenia_commoner_education:0 "Éducation pour tous les Ruthènes"
 ruthenia_commoner_education_desc:0 "En instaurant des écoles locales, nous veillerons à ce que toutes les classes de notre population soient bien éduquées."
 ruthenian_rural_buildings:0 "Villages de Ruthénie"
 ruthenian_rural_buildings_desc:0 "La Ruthénie est une vaste terre rurale. Et si nos grandes villes comme Kyiv jouent un rôle important, nous ne devons pas négliger les petits villages qui fournissent à notre économie son approvisionnement vital en nourriture et en matières premières."
 ruthenian_state_advance:0 "Une nation ruthène"
 ruthenian_state_advance_desc:0 "Par le passé, nous avons dû nous adapter aux influences et coutumes étrangères pour garantir des relations amicales. En ces temps nouveaux, il nous revient d'affirmer nos propres coutumes sans risquer de tomber dans la sphère d'influence d'autrui."
 sacred_cattle:0 "Vaches sacrées"
 sacred_cattle_desc:0 "Conformément au concept de l'$ahimsa$, le massacre du bétail est prohibé. Pour cette raison, les vaches sont respectées et vénérées comme des figures maternelles, et comme un symbole d'altruisme et de sacrifice. Révérées depuis l'époque des $vedah$, elles méritent tout notre respect et notre attention."
 safe_exploration_techniques_advance:0 "Connaissance accumulée"
 safe_exploration_techniques_advance_desc:0 "Avancer à l'aveugle est toujours effrayant, mais de nos jours, peu d'endroits sont encore vraiment méconnus. Bien que de nombreuses terres dans le monde n'aient pas encore été entièrement explorées, leur existence est néanmoins déjà connue, et il existe suffisamment d'informations sur la manière de s'y rendre. En nous appuyant sur les connaissances de nos prédécesseurs, nous pouvons nous aventurer en territoire inconnu comme jamais auparavant."
 saharan_gold_trade:0 "Commerce de l'or saharien"
 saharan_gold_trade_desc:0 "L'or extrait localement sur notre territoire est de grande qualité et constitue un excellent outil pour étendre notre influence commerciale au-delà de nos ports."
 saharan_trade:0 "Commerce transsaharien"
 saharan_trade_desc:0 "Des oasis de Ghadamès aux caravanes du Sahel, nos marchands sécurisent et prélèvent les revenus des routes transsahariennes qui nous relient aux richesses de l'intérieur. Sous notre protection, l'or, le sel et les esclaves remontent vers le nord."
 saiger_process:0 "Procédé de Saiger"
 saiger_process_desc:0 "Un procédé de fonte novateur et révolutionnaire, consistant en l'enrichissement du cuivre contenant de l'argent avec du plomb, ce qui nous permet d'améliorer la productivité de nos opérations minières."
 saiger_process_discovery:0 "Procédé de Saiger raffiné"
 saiger_process_discovery_desc:0 "Les méthodes de production et de travail améliorées permettent à nos mines d'argent et de plomb de prospérer."
 sailing_and_fighting_instructions:0 "Instructions à la navigation et au combat, par Robert Blake"
 sailing_and_fighting_instructions_desc:0 "Robert Blake a rédigé plusieurs séries de règles et de consignes qui ont entraîné de profondes réformes dans la marine. Il s'agit notamment de nouvelles tactiques pour les barrages et les débarquements, ainsi que de l'adoption de la formation de combat en ligne de front unique."
 sakya_hegemony:0 "Hégémonie Sakya"
 sakya_hegemony_desc:0 "Depuis un siècle, l'école Sakya exerce l'autorité temporelle sur le Tibet, en tant que gardienne spirituelle et politique sous patronage mongol. Sa domination a instauré une ère de gouvernance centralisée et de consolidation savante. Bien que son pouvoir ait décliné, son héritage influence toujours notre conception de l'autorité et de l'ordre."
 salic_law_advance:0 "Loi salique"
 salic_law_advance_desc:0 "La place des femmes au sein des monarchies n'étant pas toujours respectée, il n'est pas rare de voir des lois qui leur ôtent directement tout droit de succession, au profit de leurs frères ou cousins."
 salt_monopoly:0 "Monopole sur le sel restauré"
 salt_monopoly_desc:0 "Le monopole sur le sel constituait l'une des sources de revenus les plus importantes de l'État, avant que certains empereurs du passé n'aient jugé bon d'y mettre fin. L'État doit reprendre le contrôle du commerce du sel."
 saltpeter_workshop_advance:0 "$saltpeter_workshop$"
 saltpeter_workshop_advance_desc:0 "$saltpeter_workshop_desc$"
 samanta_advance:0 "Système féodal « samanta »"
 samanta_advance_desc:0 "Samanta, ou #italic voisin#!, est le terme qui désigne aussi bien les vassaux que les annexions. Il s'agit d'un système féodal qui a perduré pendant longtemps, et bien qu'il perde de son importance à l'époque actuelle, c'est l'un des piliers sur lesquels notre société s'est construite au fil des siècles."
 sanitation_advance:0 "Assainissement"
 sanitation_advance_desc:0 "Les colonies investissent dans des mesures d'assainissement améliorées, telles que l'élimination des déchets et les systèmes d'eau propre. Cela permettra de réduire la propagation des maladies et d'améliorer l'état de santé général de la population. Le développement de pratiques sanitaires modernes permettra aux gens de vivre plus près les uns des autres sans succomber à la maladie."
 sankore_madrassah:0 "Madrasa de Sankoré"
 sankore_madrassah_desc:0 "Il se dit que l'école de la mosquée de Sankoré est le plus grand centre universitaire de toute l'Afrique. Qui pourrait en douter, en voyant des sages venus de régions aussi lointaines que le Maghreb ou même l'Arabie y débattre des questions philosophiques et religieuses les plus pointues ?"
 sanskritization:0 "Sanskritisation"
 sanskritization_desc:0 "L'$hindu$ s'est étendu bien au-delà de ses origines en $india$, et de nombreux autres pays et cultures ont adopté les concepts et titres $sanskrit_language$s dans leur propre identité. Pour cette raison, les idées de l'$hindu$ ont facilement imprégné les croyances étrangères."
 sanxitang:0 "Sānxītáng"
 sanxitang_desc:0 "La « Salle des trois raretés » est notre plus précieuse réserve d'objets rares et précieux, ainsi que d'œuvres d'art. Grâce au généreux mécénat de notre dirigeant, elle est devenue un lieu de discussions académiques, de conférences et même d'événements culturels, favorisant les échanges intellectuels et les recherches savantes."
 sao_salonas_stance_advance:0 "Position de Salona"
 sao_salonas_stance_advance_desc:0 "Juchés sur l'ancien site de Delphes et contrôlant les cols stratégiques menant à la Grèce centrale, les seigneurs des montagnes de Salona conservent farouchement leur indépendance grâce à un relief accidenté, à des fortifications solides et à une tradition martiale qui attire des combattants de toute la francocratie ; même lorsque des États plus puissants s'effondrent, les seigneurs de Salona continuent à défier leurs ennemis, transformant leur fief montagneux en un refuge sécurisé pour la chevalerie latine en Grèce et en une source d'irritation persistante pour toutes les puissances qui cherchent à dominer la région entre le golfe de Corinthe et la vallée du Sperchiós."
 sao_the_asceticism_of_the_crissaean_crags_advance:0 "L'ascétisme des rochers de Crissa"
 sao_the_asceticism_of_the_crissaean_crags_advance_desc:0 "Peu hospitalier, le sol de Salona n'offre que des herbes de montagne à ceux qui vivent à l'ombre des sommets. La vie dans ce paysage accidenté a donné naissance à une classe paysanne et chevaleresque réputée pour braver la faim et les épreuves. Nos soldats ont besoin de deux fois moins de vivres qu'un homme d'armes franc. En effet, leur endurance optimisée, digne de celle des loups, leur permet de se déplacer et de grimper plus vite que n'importe quel adversaire. Dans les cols élevés de la Phocide, le ventre est léger, mais la détermination aussi inébranlable que la montagne elle-même."
 sao_the_legacy_of_the_alpha_protector_advance:0 "L'héritage du protecteur alpha"
 sao_the_legacy_of_the_alpha_protector_advance_desc:0 "Les « pactes du loup » ont mené à une conclusion logique : l'Hégémonie est désormais reconnue comme l'« alpha » de la Méditerranée orientale. Nous ne justifions plus l'agression. Nous exerçons simplement notre mandat naturel de « police » du Levant. Cette projection de puissance garantit que les mers grecques restent une étendue d'eau privée pour les marchands de Salona."
 sao_the_parnassian_wolf_pacts_advance:0 "Les pactes du loup du Parnasse"
 sao_the_parnassian_wolf_pacts_advance_desc:0 "Dans le contexte d'une dynamique de pouvoir en pleine mutation, Salona est passée de simples serments féodaux à une doctrine juridique de prédateurs connue sous le nom de « pactes du loup ». En définissant légalement nos voisins comme des « proies » qui ont besoin de la protection de Salona, l'« alpha », pour survivre, nous créons une justification diplomatique permanente en faveur de l'intervention et de l'annexion. Cette diplomatie de prédateurs nous permet d'absorber les petites seigneuries et les fiefs frontaliers sous le couvert d'une « consolidation défensive », garantissant ainsi que la présence latine dans les Balkans soit dirigée par une seule puissance redoutable plutôt que par une meute dispersée et vulnérable."
 sao_the_parnassus_mines_advance:0 "Les mines du Parnasse"
 sao_the_parnassus_mines_advance_desc:0 "Au cœur des montagnes escarpées de notre seigneurie se trouvent des filons métallifères oubliés depuis l'époque de l'oracle de Delphes. En faisant appel à des experts miniers saxons et en appliquant les techniques de fusion occidentales, nous avons transformé le #italic mont des Muses#! en un centre d'industrie lourde. Les richesses extraites de ces mines permettent aux seigneurs de Salona d'entretenir une cour qui concurrence celle des ducs d'Athènes en termes d'élégance et de puissance."
 sao_the_phocian_mule_chancery_advance:0 "La chancellerie de bât de Phocide"
 sao_the_phocian_mule_chancery_advance_desc:0 "Le transport sur roues est pratiquement impossible dans la majeure partie de notre domaine ; nous avons donc créé une chancellerie publique afin de développer la logistique dans les montagnes. Cela nous permet de déplacer rapidement des convois de ravitaillement, en laissant les armées impériales conventionnelles mourir de faim dans les rochers."
 saquiyah:0 "Saqia"
 saquiyah_desc:0 "La $saquiyah$ est un dispositif mécanique conçu pour faciliter le transport de l'eau en altitude. Également connue sous le nom de #italic roue persane#!, #italic tablia#!, #italic rehat#! et #italic tympan#!, elle joue un rôle crucial dans les systèmes d'irrigation des régions où l'eau coule peu ou pas du tout."
 sav_alpine_identity:0 "Identité alpine $SAV_ADJ$e"
 sav_alpine_identity_desc:0 "Nichés au cœur des hautes Alpes, nous sommes avant tout un peuple de montagne. Leur relief et les cols qui les traversent sont notre héritage, notre moyen de subsistance, et les montagnes elles-mêmes sont nos protectrices. Des générations passées à vivre au sein des Alpes ont donné à notre peuple une compréhension inégalée de leurs hauteurs et de leur géographie."
 sav_alpine_pass_control:0 "Contrôle des cols"
 sav_alpine_pass_control_desc:0 "Le franchissement des Alpes, déjà difficile dans le meilleur des cas, devient impossible pour les convois et les cortèges. En entretenant routes, refuges et relais, nous maîtriserons ce terrain hostile et garantirons la continuité des flux de marchands à travers nos domaines."
 sav_embrace_the_vaudois:0 "Une lumière dans les ténèbres"
 sav_embrace_the_vaudois_desc:0 "Nous avons adopté les enseignements du mouvement valaisan et sommes déterminés à protéger cette foi contre les vices de l'Église catholique qui souhaite éradiquer ses idées."
 sav_fight_the_vaudois:0 "Combat contre l'hérésie"
 sav_fight_the_vaudois_desc:0 "Nos terres ont longtemps subi la prédication hérétique des Valaisans. Par notre volonté inébranlable et avec l'appui du Très-Haut, nous avons circonscrit leur influence et nous continuerons de défendre la seule vraie foi contre ces idées pernicieuses."
 sav_house_of_savoy:0 "Une maison unifiée"
 sav_house_of_savoy_desc:0 "La Savoie est dirigée depuis plusieurs siècles par une lignée stable de comtes, depuis sa fondation en 1032. En préservant l'unité de notre famille régnante et en renforçant nos liens avec les représentants locaux, nous empêcherons le morcellement de nos terres."
 sav_repopulate_the_valleys:0 "Peuplement des vallées alpines"
 sav_repopulate_the_valleys_desc:0 "Les populations des vallées alpines désertent depuis trop longtemps nos hauteurs pour les cités des plaines. Cette hémorragie laisse nos villages les plus reculés en proie à la précarité et à l'instabilité. Il nous faut leur offrir les moyens de prospérer à nouveau, afin qu'ils ne tombent pas en ruine et que nos montagnes restent peuplées."
 sav_savoyard_flexibility:0 "Diplomates savoyards"
 sav_savoyard_flexibility_desc:0 "Notre position entre les grandes puissances nous oblige à compter sur notre habileté diplomatique pour survivre. En entretenant des relations même avec nos ennemis les plus redoutables, nous pourrons corriger nos alliances et assurer la pérennité de notre pays."
 sav_the_shroud_of_turin:0 "Pèlerinage au Saint Suaire"
 sav_the_shroud_of_turin_desc:0 "Nous sommes en possession d'une relique sacrée entre toutes : un linceul portant l'effigie de Jésus de Nazareth. Son rayonnement attire une foule ininterrompue de pèlerins, dont la dévotion enrichit nos domaines. Il nous appartient d'en tirer pleinement parti."
 saxon_baroque:0 "Baroque saxon"
 saxon_baroque_desc:0 "Fortes de leurs édifices officiels et manoirs, Dresde et Leipzig favorisent les manières raffinées de l'époque, accroissant leur reconnaissance internationale. Les monuments tels que la Dresdner Hofkirche rendent grâce à la grandeur de la Saxe, tandis que les travaux de Johann Sebastian Bach transforment Leipzig en cité de musique, berceau de la haute culture. La région compte des formes culturelles uniques, telles que les artisanats des monts Métallifères ou les traditions culinaires comme le Dresdner Christstollen."
 saxon_court:0 "La cour saxonne"
 saxon_court_desc:0 "La cour saxonne reste un pilier des tâches publiques dans l'Électorat de Saxe, aux côtés des états civils et militaires. Le quotidien des fonctionnaires est gouverné par les régulations de la cour, composée de nobles et de roturiers qui servent la famille régente tout en contribuant au gouvernement et à l'administration du pouvoir. Même si chaque membre adulte de la famille régente maintient sa propre cour, nous allons créer un grand aréopage permanent dans notre capitale, qui attirera les plus grands esprits du royaume."
 saxon_defensioner:0 "$a_saxon_defensioner$"
 saxon_defensioner_desc:0 "$a_saxon_defensioner_desc$"
 saxon_industrialization:0 "Industrialisation saxonne"
 saxon_industrialization_desc:0 "L'industrialisation rapide de la Saxe est évidente, avec un secteur industriel très développé comparé à d'autres régions. Le système des manufactures, qui produisent principalement dans un but d'exportation, fleurit et fait de la Saxe l'État au sommet de l'industrialisation en Allemagne. L'émergence des petits paysages commerciaux est cruciale pour promouvoir la croissance économique de la région et les relations avec les autres marchés européens."
 sba_access_to_northern_japan:0 "Liens avec Ōshū"
 sba_access_to_northern_japan_desc:0 "La province d'Ōshū est notre second foyer, et c'est de là que vient le nom de notre clan. Nous devons faire usage de nos liens avec Ōshū pour toujours avoir à notre disposition les puissants chevaux de guerre qui y sont élevés."
 sba_multiple_shugo:0 "Shugo de plusieurs provinces"
 sba_multiple_shugo_desc:0 "Nous avons été nommés shugo de plusieurs provinces. Ces territoires nous permettent de tirer de grandes richesses, grâce aux rizières et aux ateliers des artisans les plus talentueux du Japon."
 sba_shiba_retainers:0 "Partisans de $SBA$"
 sba_shiba_retainers_desc:0 "Nous comptons des vassaux aussi talentueux qu'ambitieux au sein de notre clan. Cependant, ces familles peuvent aussi causer des déchirements, et nous serions avisés de les contrôler avec fermeté. Une supervision et des récompenses appropriées pourraient faire d'elles la plus grande force sur laquelle nous appuyer."
 sca_legacy_kalmar_union:0 "Héritage de l'Union de Kalmar"
 sca_legacy_kalmar_union_desc:0 "Bien que l'Union de Kalmar se soit dissoute lors d'un conflit, elle a créé un précédent de souveraineté nordique partagée. En nous appuyant sur cet héritage, nous réaffirmons notre autorité et rappelons à nos sujets que l'unité est source de force, et non de soumission."
 sca_sound_toll:0 "Droit du Sund"
 sca_sound_toll_desc:0 "Le contrôle de l'Øresund nous permet d'imposer le Droit du Sund à tous les navires étrangers qui traversent les détroits danois. Ce privilège ancestral transforme un avantage géographique en richesse tangible qui consolide notre domination sur le commerce septentrional."
 sca_unified_scandinavia:0 "Scandinavie unifiée"
 sca_unified_scandinavia_desc:0 "L'union du Danemark, de la Norvège, de la Suède et de la Finlande sous une seule couronne a transformé le Nord, autrefois déchiré par les rivalités royales, en une puissance centralisée. Grâce à une administration unifiée et à une coopération renforcée entre les domaines, nous pouvons exercer un contrôle plus ferme sur le royaume."
 scaligers_military_ambitions:0 "Ambitions militaires des Scaligeri"
 scaligers_military_ambitions_desc:0 "Les Scaliger n'aspiraient pas seulement à régner sur Vérone, mais à en faire une puissance lombarde. Leurs campagnes militaires s'étendirent à travers la vallée du Pô, les opposant à Milan, Venise et Padoue. Cette ambition a laissé des cités fortifiées, des milices aguerries et une cour imprégnée de réformes militaires."
 scandinavian_bergslag_privileges_advance:0 "$scandinavian_bergslag_privileges$"
 scandinavian_bergslag_privileges_advance_desc:0 "$scandinavian_bergslag_privileges_desc$"
 scandinavian_fishing_privileges_advance:0 "$scandinavian_fishing_privileges$"
 scandinavian_fishing_privileges_advance_desc:0 "$scandinavian_fishing_privileges_desc$"
 scandinavian_tar_privileges_advance:0 "$scandinavian_tar_privileges$"
 scandinavian_tar_privileges_advance_desc:0 "$scandinavian_tar_privileges_desc$"
 scandinavian_thing_rights_advance:0 "$scandinavian_thing_rights$"
 scandinavian_thing_rights_advance_desc:0 "$scandinavian_thing_rights_desc$"
 scholasticism:0 "Scolastique classique"
 scholasticism_desc:0 "Fondée sur la logique aristotélicienne et les écrits des Pères de l'Église, la scolastique vise à diffuser la connaissance en mettant l'accent sur les croyances et les traditions dogmatiques religieuses."
 school_of_alexandria:0 "École d'$alexandria$"
 school_of_alexandria_desc:0 "L'$school_of_alexandria$ catéchétique, qui aurait été fondée par l'apôtre Marc lui-même selon saint Jérôme, est la plus ancienne école de catéchisme au monde. Les études bibliques et théologiques y sont enseignées depuis les débuts du $christian$. Bien que l'établissement lui-même ait été détruit lorsque la supériorité de l'évêque de $rome$ fut déclarée par rapport au patriarche d'$alexandria$, sa tradition a perduré."
 schools_of_thought:0 "Écoles de pensée"
 schools_of_thought_desc:0 "L'$muslim$ a toujours préconisé la recherche du savoir et l'éducation. Des nombreuses écoles de jurisprudence et de théologie aux institutions de connaissances fondées par divers dirigeants, les œuvres de nos lettrés sont admirées non seulement par le monde $muslim_ADJ$, mais aussi par les infidèles."
 scientific_experimentation:0 "Expérimentation scientifique"
 scientific_experimentation_desc:0 "Rien ne se produit sans raison. En comprenant la raison à l'origine de chaque chose, nous sommes en mesure de savoir à quoi nous attendre lorsque des situations similaires se présentent."
 scientific_mapping_advance:0 "Cartographie"
 scientific_mapping_advance_desc:0 "Les améliorations récentes dans les domaines et les sciences de la connaissance géographique, de la cartographie et de la topographie permettent de créer des représentations plus précises des masses et des caractéristiques naturelles terrestres, aussi bien en termes de tailles relatives que de leurs positions exactes."
 scientific_revolution_advance:0 "Révolution scientifique"
 scientific_revolution_advance_desc:0 "Les progrès récents en mathématiques, physique, astronomie, biologie et chimie n'ont pas seulement remis en question notre vision du monde qui nous entoure : ils l'ont complètement changée. La société progresse plus rapidement que jamais et de nouvelles découvertes scientifiques sont faites chaque jour."
 scottish_diplomacy:0 "Les Alliances"
 scottish_diplomacy_desc:0 "Pendant des siècles, nous avons compté sur la Diplomatie et les contacts avec les puissances étrangères du continent pour assurer notre indépendance. Il est temps de formaliser cette pratique et d'assurer la pérennité de nos liens pour les siècles à venir."
 scottish_education:0 "Universités d'Écosse"
 scottish_education_desc:0 "Après avoir fait l'expérience des universités et de l'enseignement étrangers européens, il est temps d'améliorer notre système d'enseignement et de donner aux meilleurs la possibilité d'étudier. Notre peuple devrait pouvoir s'efforcer d'acquérir des connaissances et des compétences sans avoir à se déplacer à grands frais et à dépendre d'institutions étrangères."
 scottish_enlightenment:0 "Lumières d'Écosse"
 scottish_enlightenment_desc:0 "Les progrès rapides de la philosophie, de l'économie politique et de la médecine conduisent à une pléthore de réalisations de nos compatriotes qui propulseront l'Écosse à l'avant-garde de l'innovation mondiale. Cette période des Lumières d'Écosse peut être un outil très puissant pour nous sur la scène internationale."
 scottish_highland_tradition:0 "Traditions des Highlands"
 scottish_highland_tradition_desc:0 "Les clans des Highlands ont toujours bougé et combattu différemment des armées de plaine. Élevés parmi les vallées, lochs et pentes escarpées du nord, nos hommes se sentent naturellement à l'aise dans des terrains qui épuiseraient et désorienteraient les étrangers. Cette connaissance intime du paysage local se transmet de père en fils, et aucun conquérant étranger n'a jamais réellement su la maîtriser."
 scottish_highlander_advance:0 "Régiments de Highlanders"
 scottish_highlander_advance_desc:0 "Le recrutement de régiments parmi les habitants des Highlands écossais peut constituer un atout crucial dans nos efforts militaires."
 scottish_longbowmen:0 "Archers anglo-écossais"
 scottish_longbowmen_desc:0 "Grâce au renforcement de nos liens avec l'Angleterre, nous intégrerons une partie de ses tactiques militaires dans notre armée et nous perfectionnerons ces unités pour qu'elles inspirent la peur chez nos ennemis."
 scottish_morale:0 "Courage écossais"
 scottish_morale_desc:0 "Depuis le début de notre guerre contre la tyrannie anglaise, nous avons préservé notre indépendance grâce aux efforts du courageux peuple écossais. Le souvenir d'hommes comme William Wallace poussera nos armées à défendre et à protéger l'indépendance de l'Écosse."
 scottish_salmon:0 "Protection du saumon écossais"
 scottish_salmon_desc:0 "Les saumons peuplent nos cours d'eau et nos côtes. Seule une législation stricte adoptée avec une attention particulière nous permettra d'exploiter cette ressource et d'orienter notre économie locale vers l'exportation de ce poisson très recherché."
 scottish_tenacity:0 "Terre tenace"
 scottish_tenacity_desc:0 "Les guerres peuvent être longues et épuisantes. Si nous voulons conserver notre indépendance, nous devons être prêts à traverser des périodes difficiles. Heureusement, notre peuple est aussi tenace que la terre qu'il appelle son foyer, et il résiste jusqu'au bout aux envahisseurs étrangers."
 scottish_trade_connections:0 "Relations commerciales en $north_sea_area$"
 scottish_trade_connections_desc:0 "Notre pays est situé aux confins de l'Europe occidentale et ne dispose que de peu de ressources. Si nous voulons prospérer sur le plan économique, nous devons investir et étendre nos relations commerciales à d'autres régions. La mer du Nord nous permet d'accéder à des marchés riches et à des opportunités commerciales, à condition que nous l'utilisions."
 scottish_whisky:0 "Whisky écossais"
 scottish_whisky_desc:0 "Alors que des distilleries existent depuis longtemps en Écosse, nous devrions veiller à ce que ces industries soient placées sous la responsabilité de l'État. Nous pourrons ainsi nous établir à la pointe de la production d'alcool et développer notre industrie d'exportation."
 scourge_of_the_corsairs:0 "Fléau des corsaires"
 scourge_of_the_corsairs_desc:0 "Le célèbre corsaire turc Khayr ad-Din dit Barberousse a maintes fois affronté les chevaliers, mais Barberousse n'est pas le seul corsaire que nous ayons rencontré. Les pillards turcs qui s'en prennent à toute l'Europe méridionale sont tolérés par les États barbares et financés par les Turcs eux-mêmes. De tels agissements doivent cesser. Les chevaliers feront leur devoir et protégeront les marins innocents coûte que coûte."
 scriptorium_advance:0 "Scriptorium"
 scriptorium_advance_desc:0 "$scriptorium_desc$"
 sea_hawks:0 "Faucons des mers"
 sea_hawks_desc:0 "Ces chantres de l'agressivité en mer nous permettront de coordonner les recherches dans le domaine maritime, et ainsi d'accroître notre tradition navale."
 seasonal_economy:0 "Économie saisonnière"
 seasonal_economy_desc:0 "Lors des périodes agitées, nous devons apprendre à faire face aux difficultés de la vie. Il en va de même avec la nature : le changement des saisons implique d'adapter nos pratiques. Les villages doivent être aussi temporaires et mobiles que le climat."
 seat_of_metropolitan_bishop:0 "Évêché du métropolite"
 seat_of_metropolitan_bishop_desc:0 "Le peuple russe a besoin d'être guidé avec fermeté. Nous avons toujours coopéré avec l'Église au cours de l'Histoire, et elle comme nous aurions beaucoup à gagner à continuer ainsi. Pouvoir déplacer à Moscou le siège du métropolite nous permettrait de resserrer les liens entre la foi russe orthodoxe et l'État."
 second_council_of_ephesus:0 "Deuxième concile d'Éphèse"
 second_council_of_ephesus_desc:0 "Convoqué en 449 à l'initiative du pape Dioscore Ier d'$alexandria$, le $second_council_of_ephesus$ était un concile $christian_ADJ$ légitime, bien que les Églises $catholic_ADJ$ et $orthodox_ADJ$ l'aient dénoncé. On y accepta la formule de Cyrille d'Alexandrie, qui affirme que le Christ est une seule essence incarnée, à la fois humaine et divine."
 second_scholasticism:0 "$scholasticism$ moderne"
 second_scholasticism_desc:0 "Nous devons faire renaître et raffiner le mouvement philosophique de la scolastique médiévale."
 secretaries_of_state:0 "Secrétaires d'État"
 secretaries_of_state_desc:0 "Le roi a toujours disposé de quelques serviteurs responsables de sa correspondance. Au milieu du XVIIe siècle, le nombre de ces serviteurs a commencé à croître, au point d'en faire un élément important de l'appareil gouvernemental : ils ne se contentaient plus de transmettre les décrets royaux, mais disposaient d'une réelle autonomie administrative."
 secure_mediterranean_ports:0 "Sécuriser les ports de la Méditerranée"
 secure_mediterranean_ports_desc:0 "Nos ports à travers la Méditerranée comptent parmi les plus lucratifs de toute la région. Les marchands venus de chaque recoin du monde connu rallient Alexandrie et le Caire pour commercer épices, soies et pierres précieuses. La création d'une flotte marchande pour faciliter et protéger nos intérêts maritimes serait une sage décision."
 seljuk_heritage:0 "Héritage seldjoukide"
 seljuk_heritage_desc:0 "Pour aborder l'avenir, nous devons nous souvenir de ce que nous ont appris les Perses et les grands Seldjoukides, et construire un État capable de rassembler des peuples et des croyances disparates en un ensemble plus vaste."
 seljuk_roots:0 "Racines seldjoukides"
 seljuk_roots_desc:0 "Nous sommes cernés par nos ennemis, aussi est-il vital pour notre État de constituer une armée puissante. Fort heureusement, nous ne sommes en rien un peuple faible. Depuis les irréguliers ghâzî et les cavaliers akindji jusqu'aux sipahis de l'Empire ottoman, le monde a appris à reconnaître la puissance militaire des peuples turcs. Levons une armée digne d'un Empire en nous inspirant de nos glorieuses traditions, de notre histoire et de la force de nos prédécesseurs."
 semi_salic_law_advance:0 "$semi_salic_law$"
 semi_salic_law_advance_desc:0 "Selon la $salic_law$, seuls les hommes sont autorisés à hériter du trône. Cette pratique se heurte à un problème insoluble lorsque la lignée masculine s'éteint et que la monarchie est confrontée à une crise de succession. Pour éviter cela, le droit des femmes doit être élargi afin qu'elles puissent hériter du trône s'il n'y a pas d'héritier masculin approprié."
 send_people_to_colonial_charter_advance:0 "Nouvelles terres d'abondance"
 send_people_to_colonial_charter_advance_desc:0 "De nouvelles terres sont synonymes d'opportunités et de ressources à exploiter. En encourageant notre population à s'y installer et à les exploiter, nous en tirerons de meilleurs profits."
 send_people_to_the_colonies_advance:0 "Nouvelles terres d'opportunités"
 send_people_to_the_colonies_advance_desc:0 "Un monde nouveau s'ouvre à nous, ce qui nourrit la représentation que se font les gens de leur nouvelle vie là-bas. Nous devrions encourager ces pensées, embellir ces histoires, afin de susciter l'envie de nos peuples d'aller coloniser ces nouvelles terres pour nous."
 sepak_takraw:0 "Sepak Takraw"
 sepak_takraw_desc:0 "Pratiqué dans toute l'$south_east_asia$ depuis sa lointaine adaptation du #italic Cùjū#! d'origine $chinese_group$, et également connu sous les noms de #italic Sepak Raga#!, #italic Takraw#!, #italic Chinlone#! ou #italic Sipa#! selon les pays, le #italic $sepak_takraw$#! est plus qu'un simple jeu. Bien que l'objectif pour les joueurs soit de taper dans un ballon pour le maintenir en l'air, il s'agit aussi d'un moyen de faire de l'exercice physique. C'est pourquoi il est aussi bien un divertissement qu'un exercice d'entraînement pour nos militaires."
 separation_of_powers:0 "Séparation des pouvoirs"
 separation_of_powers_desc:0 "Un traité anonyme de théorie politique a été publié subrepticement, et malgré tous les efforts pour le censurer, il se répand partout à travers le monde. Il traite de la nature des régimes politiques, qu'ils soient monarchie, despotisme ou démocratie, et argumente en faveur d'une séparation stricte entre les pouvoirs exécutif, législatif et judiciaire. Cela permettrait de protéger le peuple et de limiter les pouvoirs des dirigeants, ce qui constitue bien évidemment une perspective très attirante pour la population. En définitive et malgré les conséquences fâcheuses que ces idées pourraient avoir pour nos dirigeants, le pays tout entier pourrait en tirer parti."
 septuagint:0 "Septante"
 septuagint_desc:0 "La $septuagint$ est la version en langue $greek_language$que de l'Ancien Testament, traduite depuis l'$hebrew_language$ au IIIe siècle av. J.-C. par 72 traducteurs qui sont tous indépendamment parvenus exactement à la même traduction. Cela prouve que cet ouvrage est d'inspiration divine et constitue la parole de Dieu."
 ser_serbian_national_militia:0 "Milice nationale serbe"
 ser_serbian_national_militia_desc:0 "Forts de l'expérience durement acquise par nos unités vétéranes des décennies passées, nous avons établi une milice nationale permanente et professionnelle. Cette force marque un tournant décisif en s'éloignant des levées paysannes désorganisées, en adoptant une discipline rigoureuse à l'occidentale, un équipement uniformisé et une chaîne de commandement modernisée, tout en conservant le style de combat farouche et le moral élevé de nos prédécesseurs balkaniques. Cela garantit que notre indépendance n'est pas un fragile cadeau diplomatique, mais qu'elle repose sur une machine militaire moderne et crédible, capable de défendre nos frontières contre toute puissance impériale envahissante."
 ser_the_sumadija_agrarian_revolution:0 "La révolution agraire de Šumadija"
 ser_the_sumadija_agrarian_revolution_desc:0 "La paysannerie serbe a mené sa propre révolution culturelle et économique en adoptant des techniques agricoles venues de l'Occident. Cela a transformé les forêts denses de $sumadija_province$ en un cœur agricole hautement productif. Ce surplus alimentaire ne se contente pas de nourrir la population : il alimente une explosion démographique. Une population serbe bien nourrie devient une population croissante et ambitieuse, fournissant un vaste réservoir de jeunes recrues en bonne santé pour l'armée ainsi qu'un marché intérieur solide qui fait de la Serbie le principal moteur économique des Balkans centraux."
 ser_the_transcribers_of_resava:0 "Les transcripteurs de Resava"
 ser_the_transcribers_of_resava_desc:0 "À une époque de conflits, le peuple serbe se tourne vers la plume pour préserver ce que l'épée ne peut protéger. L'école d'orthographe de #italic Resava#! standardisera la langue serbo-slave, créant une « république des lettres » culturelle. Cette obsession pour la pureté linguistique et la conservation des chroniques garantit que l'histoire serbe ne se perde jamais dans le brouillard de la guerre. Elle engendre une élite très lettrée qui agit comme la mémoire de la nation, conservant les registres de nos dynasties dans chaque scriptorium monastique, du Danube à l'Adriatique."
 ser_vitestvo:0 "Viteštvo"
 ser_vitestvo_desc:0 "Nous encouragerons le #italic Viteštvo#!, un code de chevalerie serbe unique, qui fusionnera les traditions en armure lourde de l'Occident avec l'éthique stoïque du guerrier de l'Orient. Cette culture de la chevalerie ne sera pas réservée à la haute noblesse, mais se diffusera jusqu'aux classes inférieures de soldats libres. Elle mettra l'accent sur le courage personnel, la loyauté envers la Vraie Foi et la maîtrise spécialisée de la lance et du sabre. Cette culture militaire produira une population naturellement prédisposée à la guerre, considérant le service militaire comme la plus haute forme d'accomplissement social et spirituel."
 serbian_enlightenment:0 "Lumières de Serbie"
 serbian_enlightenment_desc:0 "Inspirés par d'autres nations éclairées, des héros nationaux tels que Dositej Obradović ont cherché à enrichir notre langue et notre littérature vernaculaires. Touché par la pénurie d'ouvrages profanes accessibles au commun des mortels, Dositej Obradović lui-même a pris l'initiative de combler le fossé entre le serbe écrit et le serbe parlé. En élaborant avec diligence des grammaires et des dictionnaires, en rédigeant des ouvrages et en traduisant des œuvres étrangères, ces visionnaires ont permis à notre nation de connaître un renouveau littéraire."
 serbian_mining:0 "Les privilèges de minage $saxon$s"
 serbian_mining_desc:0 "L'invitation délibérée de mineurs #italic Sasi#! venus de $upper_saxony_area$ et des monts du Harz a profondément transformé nos simples mines de surface en de véritables moteurs industriels sophistiqués. En accordant à ces experts germaniques leurs propres tribunaux autonomes, le droit de suivre leurs propres codes miniers et la liberté religieuse, nous avons réussi à exploiter les vastes filons d'argent et d'or profondément enfouis de $brskovo$ et $novo_brdo$. Cet afflux d'expertise technique nous fournit les immenses quantités de métaux précieux nécessaires pour engager les meilleurs mercenaires occidentaux, ériger de monumentales fondations en pierre et frapper des imitations de #italic Matapan#! en argent de haute qualité, qui en sont venues à dominer le commerce balkanique et les échanges en Méditerranée."
 serbian_seobe:0 "Seobe"
 serbian_seobe_desc:0 "Le peuple serbe a maîtrisé l'art de « l'identité mobile ». Celle-ci se caractérise par la capacité de déplacer des communautés entières vers de nouvelles terres sans perdre leur cohésion culturelle. Cette mobilité garantit que le « foyer serbe » n'est pas un point géographique fixe, mais un contrat social portable et indestructible ; partout où la communauté serbe plante son bâton, les anciennes lois et les traditions de la #italic Slava#! sont immédiatement rétablies. Cette résilience rend la culture serbe pratiquement impossible à décapiter, car la nation peut abandonner des vallées dévastées pour réapparaître comme une société militaire pleinement constituée sur une nouvelle frontière, attendant le moment opportun pour frapper au cœur de ses terres ancestrales."
 serbian_serbian_epic_poetry:0 "Poésie épique serbe"
 serbian_serbian_epic_poetry_desc:0 "Le peuple serbe a développé une « histoire vivante » à travers la poésie épique. Le #italic guslar#! – un barde itinérant – est le principal gardien de l'âme nationale. Le #italic guslar#! récite des milliers de vers accompagné de sa #italic gusle#!. Ces chants préservent les généalogies, les précédents juridiques et les impératifs moraux. La culture serbe fait en sorte que même le berger le plus illettré possède une compréhension des droits ancestraux et une identité commune. Chaque rassemblement villageois devient une séance d'endoctrinement historique."
 serbian_the_icon_of_saint_sava:0 "L'icône de saint Sava"
 serbian_the_icon_of_saint_sava_desc:0 "Le fondement culturel du peuple serbe est défini par saint Sava. En mêlant la spiritualité byzantine aux coutumes slaves locales et à un attachement farouche à la langue serbe dans la liturgie, Sava a créé une Église nationale indissociable de l'identité du peuple. Cet ancrage culturel réapparaît continuellement au sein de notre population et garantit que tous les Serbes, qu'ils soient nobles ou paysans, se perçoivent comme membres d'une communauté distincte et sacrée, demeurant unie même lorsque les frontières politiques se déplacent ou s'effondrent, gage de stabilité interne et de résistance à l'assimilation culturelle étrangère."
 serbian_zaduzbina:0 "Zadužbina"
 serbian_zaduzbina_desc:0 "L'élite serbe comme le peuple sont liés par la tradition de la #italic Zadužbina#!, la « dotation de l'âme ». Cette impulsion culturelle à ériger des églises et des monastères en pierre crée un paysage physique durable de présence serbe à travers les Balkans. Ces édifices sont bien plus que de simples centres religieux ; ils constituent des réservoirs d'histoire, d'art et de savoir qui définissent « l'espace de vie » serbe. Cette obsession architecturale ancre physiquement la culture serbe dans le territoire, offrant un sentiment de permanence et de continuité historique qui incite le peuple à défendre sa « terre sacrée » à tout prix."
 seren_taun:0 "Sérén Taun"
 seren_taun_desc:0 "Célébrée après les récoltes, la fête du Sérén Taun est une cérémonie annuelle marquant l'abondance des récoltes. Ponctuée de rituels, d'offrandes et de musique, elle renforce les liens communautaires de nos kampung-kampung et rappelle à tous l'équilibre sacré entre les hommes, le riz et la nature."
 serfdom:0 "Serfs"
 serfdom_desc:0 "Être fantassin dans l'armée n'est pas vraiment la carrière dont tout le monde rêve : [food|e] médiocre, solde de misère, quasiment pas de soins médicaux... Mais si nous pouvions attacher les paysans à leur terre, nous saurions précisément où trouver des recrues."
 servants_of_god:0 "Serviteurs de Dieu"
 servants_of_god_desc:0 "Être un rouage dans la machinerie céleste est l'un des plus grands honneurs auxquels puisse aspirer un homme. Avoir notre dieu pour seigneur fait bondir de joie le cœur du peuple."
 settle_the_frontier_advance:0 "L'appel de la frontière"
 settle_the_frontier_advance_desc:0 "Nous sommes entourés de territoires faiblement défendus qui attendent d'être conquis. L'envoi des membres les plus aventureux de notre cour nous permettra d'imposer notre autorité sur ces terres dépourvues de maîtres."
 settle_the_islands:0 "Coloniser les îles"
 settle_the_islands_desc:0 "À travers les îles éparpillées de notre patrie se trouvent d'innombrables rivages qui n'attendent que notre arrivée. En consolidant notre présence sur ces îles, nous assurerons la prospérité de notre peuple et construirons une nation unie par le biais de nouveaux comptoirs commerciaux, de nouvelles récoltes et de nouvelles communautés liées par les flots."
 shadow_of_ambition:0 "L'ombre de l'ambition"
 shadow_of_ambition_desc:0 "L'unification des tribus Jürchen n'est que la première étape de notre ambitieuse ascension vers le pouvoir. Bientôt, notre nom inspirera la crainte et le respect à travers tout le continent."
 shahbandar:0 "Système de Shāhbandar"
 shahbandar_desc:0 "Afin de gérer le flux important de marchands arrivant dans nos ports, nous avons nommé un Shāhbandar comme autorité chargée de superviser les douanes, de résoudre les litiges et d'organiser les quartiers étrangers. Cette fonction permet de mettre de l'ordre dans notre entrepôt animé et consolidera notre position en tant que carrefour maritime."
 shared_brotherhood:0 "Fraternité partagée"
 shared_brotherhood_desc:0 "Unis par les enseignements de la Grande Loi de paix, nos peuples, malgré des origines tribales diverses, conservent un sens aigu de la fraternité et de l'unité."
 shared_knowledge:0 "Partage du savoir"
 shared_knowledge_desc:0 "Les innovations peuvent prendre maintes formes, et si nous voulons conserver notre position face à la menace des tribus rivales, il nous faudra exploiter la moindre avancée."
 shared_products_procedures:0 "Produits et procédures partagés"
 shared_products_procedures_desc:0 "Le monde a rapetissé et nous avons découvert un grand nombre de nouvelles terres et de nouveaux peuples. Grâce à eux, nous avons également découvert beaucoup de nouveaux produits et de nouvelles façons de les utiliser. Même un produit aussi spécialisé que l'$alum$ est utilisé de bien des façons dans d'autres endroits."
 sharia:0 "Sharī'ah"
 sharia_desc:0 "Cette loi sacrée donnée par le Prophète lorsqu'il gouvernait Médine doit être le fondement inébranlable de notre société. En réformant notre code criminel conformément à ses enseignements, nous sommes certains d'assurer l'harmonie et la justice dans notre société."
 sheltered_ports:0 "Ports protégés"
 sheltered_ports_desc:0 "Il est malheureux que nos navires subissent des dégâts lors des combats en mer, et tout aussi malheureux que les navires ainsi touchés puissent rarement être réparés en mer. Un système de ports abrités, répartis tout au long de notre littoral, permettrait de résoudre en partie le problème en permettant aux vaisseaux d'y être réparés."
 shinbutsu_shuugou:0 "Shinbutsu-shūgō"
 shinbutsu_shuugou_desc:0 "Depuis l'arrivée du $buddhist$ au $japan_region$, ses enseignements se sont mêlés au culte des kamis. Le Bouddha et les kamis se sont fondus dans un ensemble de croyances unifié, même si les pratiques rituelles sont restées distinctes."
 ship_building_advance:0 "Construction navale"
 ship_building_advance_desc:0 "Les mers regorgent non seulement d'aventures et de richesses, mais aussi d'opportunités de commerce et d'expansion."
 ship_building_techniques_absolutism:0 "Bassin à flot"
 ship_building_techniques_absolutism_desc:0 "La construction d'un bassin à flot permettra à nos charpentiers de produire des navires bien plus rapidement."
 ship_building_techniques_discovery:0 "Construction navale améliorée"
 ship_building_techniques_discovery_desc:0 "Apprendre de nouvelles techniques de construction de navires nous aidera à en produire plus rapidement."
 ships_penny:0 "Le denier de la marine"
 ships_penny_desc:0 "Les navires coûtent cher, et le mieux serait de faire en sorte que les autres paient à notre place. Le denier de la marine permettrait aux marins de verser un peu d'argent chaque fois qu'ils vont prier dans un sanctuaire avant de reprendre la mer."
 shipyard_advance:0 "Chantier naval"
 shipyard_advance_desc:0 "$shipyard_desc$"
 shirazi_legacy:0 "L'héritage des Shirazi"
 shirazi_legacy_desc:0 "Notre fondateur, le fils d'un émir de $persia_region$, est venu de $shiraz$. Cela révèle bien que nous sommes en droit de dominer nos voisins."
 shn_defender_against_mongols:0 "Défenseurs du Japon"
 shn_defender_against_mongols_desc:0 "En tant que grande famille de samouraïs dans le nord de Kyūshū, nous avons bravement repoussé deux invasions mongoles. Si le besoin devait à nouveau s'en faire ressentir, nous nous dresserions encore pour défendre Kyūshū et l'ensemble du royaume face aux envahisseurs."
 shn_diplomacy_through_tsushima:0 "Diplomatie au-delà de Tsushima"
 shn_diplomacy_through_tsushima_desc:0 "Grâce à notre présence sur l'île de $tsushima_province$, nous avons développé une grande expérience des négociations avec la Corée. Cela nous a permis de toujours être capables de maintenir des relations avec l'autre rive du détroit, même lorsque les relations sont officiellement interdites."
 shn_vice_minister_of_dazaifu:0 "Vice-ministre du Dazaifu"
 shn_vice_minister_of_dazaifu_desc:0 "Comme le suggère le nom de notre clan, nous descendons du vice-ministre du Dazaifu, dans la province de $chikuzen_province$. Cette institution étant le centre diplomatique et militaire de la région depuis les temps anciens, nous gouvernons traditionnellement le nord de Kyūshū en tant que représentants de l'empereur."
 shrewd_commerce_practice:0 "Commerce avisé"
 shrewd_commerce_practice_desc:0 "De nouvelles pratiques commerciales nous permettent de commercer de manière plus subtile, garantissant ainsi à nos marchands le succès face à leurs concurrents."
 shurfa_status:0 "Statut de chorfa"
 shurfa_status_desc:0 "Parmi les plus fiers et les plus nobles acteurs du monde musulman, rares sont ceux qui, comme nous, peuvent se proclamer descendants de la famille du Grand Prophète."
 sia_advanced_elephant_warfare:0 "Expertise des éléphants de combat"
 sia_advanced_elephant_warfare_desc:0 "Il n'est pas rare pour nos plus grands poètes de consacrer de nombreux textes à l'énumération de nos éléphants de guerre afin de les honorer individuellement. Montrons à nos ennemis quelle en est la raison."
 sia_consolidation_of_state:0 "Consolidation de l'État"
 sia_consolidation_of_state_desc:0 "Un système décentralisé risque d'amoindrir notre pouvoir dans nos provinces éloignées. Si nous voulons être le royaume qui unifie les peuples $thai_culture$, il faut que nos provinces le soient également."
 sia_education_reform:0 "Réformes de l'éducation"
 sia_education_reform_desc:0 "Comme l'a dit le Bouddha, nous ne devons pas accepter quelque chose parce qu'on le dit souvent, mais en faire l'expérience par nous-mêmes. L'éducation est la base du savoir, et si nous voulons exceller dans la technologie, nous devons d'abord exceller dans l'éducation."
 sia_experienced_ambassadors:0 "Ambassadeurs expérimentés"
 sia_experienced_ambassadors_desc:0 "Nous avons une grande expérience de la politique et l'essor de notre pays ne s'est pas fait uniquement grâce à la puissance de nos armées. Notre réputation diplomatique peut sans nul doute nous permettre d'accroître notre influence."
 sia_rise_to_equal_heights:0 "Essor de l'égalité"
 sia_rise_to_equal_heights_desc:0 "De nombreuses régions de notre pays sont relativement dépeuplées. Nous devrions y améliorer les conditions de vie afin que toutes nos provinces puissent briller de mille feux."
 sia_royal_absolutism:0 "Absolutisme royal"
 sia_royal_absolutism_desc:0 "N'en répondre à nul autre qu'aux Cieux, voilà ce qui caractérise un souverain. Honorés et vénérés, nos monarques règnent sur la Terre tout comme les dieux règnent sur le Ciel."
 sia_thai_unity:0 "Unité $thai_culture$"
 sia_thai_unity_desc:0 "Nous sommes sans aucun doute le plus avancé des peuples $thai_culture$. Nos troupes sont fières de servir notre pays, de défendre notre culture et notre identité, pour laquelle elles se battent avec acharnement."
 siberian_frontier:0 "Frontière sibérienne"
 siberian_frontier_desc:0 "Les lointaines terres de Sibérie nous appellent. Nous devons nous frayer un chemin et permettre à nos cosaques de partir à la conquête de ce territoire pour le peuple russe."
 sic_constitions_of_melfi:0 "Constitutions de Melfi"
 sic_constitions_of_melfi_desc:0 "L'empereur Frédéric II de Hohenstaufen, roi de Sicile, avait fait rédiger un code de lois connu sous le nom de « Constitutions de Melfi » ou de « Liber Augustalis ». Encore appliqué des siècles plus tard, il est l'un des fondements de la gouvernance du pays, permettant d'établir les lois publiques, les procédures judiciaires et féodales et le droit privé et criminel."
 sic_naval_vigilance:0 "Vigilance navale"
 sic_naval_vigilance_desc:0 "Les raids constants des pirates barbaresques et des Ottomans obligent la Sicile à maintenir une défense côtière vigilante. Ses galères et ses forts sont essentiels à la protection du sud de l'Europe."
 sic_sicilian_enlightenment:0 "Lumières de la Sicile"
 sic_sicilian_enlightenment_desc:0 "Bien qu'éloignée des grands salons de Paris ou de Vienne, la Sicile a connu elle aussi, son siècle des Lumières. De brillants esprits y ont remis en cause les privilèges féodaux, promu la science et prôné des réformes juridiques, souvent dans le cadre de l'humanisme catholique. Ces idées ont jeté les bases de la modernité à l'ombre de la monarchie et de la tradition."
 sic_sicilian_reforms:0 "Réformes en Sicile"
 sic_sicilian_reforms_desc:0 "Au fil du temps, nos institutions sont devenues obsolètes ou tout simplement inefficaces. Des réformes sont nécessaires si nous voulons assurer la prospérité de notre nation. Nos meilleurs esprits vont travailler de concert à veiller à ce qu'il n'y ait pas de gaspillage et à ce que les processus soient aussi efficaces que possible."
 sic_sicilian_silk:0 "Soie sicilienne"
 sic_sicilian_silk_desc:0 "Au temps de Frédéric II, la soie était la première exportation sicilienne. Si cette industrie a depuis lors décliné, dépassée par celle de l'Italie du Nord, il n'y a toutefois aucune raison que nous ne puissions rétablir la situation à notre avantage. Par des investissements judicieux, nous pourrons voir les soyeux et les tisserands prospérer à nouveau."
 sic_studium_generale:0 "Studium generale"
 sic_studium_generale_desc:0 "Fondée en 1434 par le roi Alphonse V d'Aragon, l'université de Catane est la plus ancienne de Sicile et l'une des rares institutions méridionales à avoir obtenu le statut de Studium generale. Sans équivalent de par sa charte royale et son mélange d'enseignement scolaire et juridique, elle a produit des juristes, des théologiens et des scientifiques qui ont servi à la fois l'Église et la Couronne dans une région culturellement diversifiée."
 sick_and_hurt_board:0 "Sick and Hurt Board"
 sick_and_hurt_board_desc:0 "Fondé en 1707, le « Conseil des malades et blessés » a pour rôle d'assurer le bien-être des marins du rang. Il permet la mise en place de réformes destinées à améliorer leur état de santé pendant toute la durée de leur service."
 sie_artists:0 "L'école siennoise"
 sie_artists_desc:0 "L'art de la peinture a commencé à véritablement fleurir en Italie lors de la Renaissance, mais aucun artiste ne peut égaler le talent de ceux de Sienne : leur style, élégant et coloré, se centre sur les miracles des figures bibliques et des saints. Et quand bien même d'autres artistes peuvent paraître brillants sur le moment, c'est assurément la subtilité des Siennois qui marquera les générations à venir."
 sie_council_priori:0 "Conseil des prieurs"
 sie_council_priori_desc:0 "Après une série de républiques vouées à l'échec et de régimes autoritaires, nous avons enfin établi un conseil gouverné par le peuple de Sienne, qui évitera sans doute que nous retombions sous le pouvoir de nobles corrompus. Si le nombre exact de prieurs y prenant part et leur mode d'élection sont toujours sujets à débat, ce gouvernement communal décentralisé permettra d'assurer l'indépendance de Sienne."
 sie_studium_senese:0 "Studium Senese"
 sie_studium_senese_desc:0 "Considérée comme la première université financée par des fonds publics, l'université de Sienne fait la fierté de la ville. Elle forme nos citoyens afin qu'ils servent au mieux notre nation."
 siege_ability_revolutions:0 "Officiers d'artillerie"
 siege_ability_revolutions_desc:0 "L'artillerie est devenue si essentielle qu'il faut impérativement déployer des officiers spécialisés dans les aspects techniques des canons et les tactiques modernes qui les exploitent au mieux."
 sight_veneration:0 "Vénération de la vue"
 sight_veneration_desc:0 "L'aspect le plus important de la vénération est le voyage sensoriel effectué par les fidèles. Pour cette raison, nos églises ont toujours été parées d'images et de couleurs éclatantes, afin que la présence du Christ sur la Terre puisse immédiatement être ressentie par chacun."
 silk_road:0 "Route de la soie"
 silk_road_desc:0 "Que ce soit en traversant le désert de Gobi et la $persia_region$ ou en bravant les eaux de l'$indian_ocean_region$ et de l'$indonesia_region$, les marchands ont pendant des siècles sillonné les terres d'$asia$ afin de s'enrichir sur la célèbre Route de la soie."
 silk_road_transmission:0 "Expansion via la Route de la soie"
 silk_road_transmission_desc:0 "Nul ne saurait nier l'impact qu'a eu la Route de la soie dans la diffusion du $buddhist$. Que ce soit par voie terrestre ou maritime, le commerce a permis au $buddhist$ de s'étendre bien au-delà de son berceau en $india$."
 silver_standard:0 "Monométallisme de l'argent"
 silver_standard_desc:0 "Réformons la plupart des obligations envers le gouvernement central – depuis les impôts par tête jusqu'à la corvée des paysans en passant par les tributs des fonctionnaires locaux – pour en faire un paiement unique, en argent, établi en fonction de la population et de la quantité de terres arables de chaque préfecture. Ainsi, les efforts nécessaires à la collecte seront bien moindres, et nos revenus plus importants."
 skilled_captains:0 "Capitaines habiles"
 skilled_captains_desc:0 "Nous devons nous assurer que nos capitaines sont les meilleurs marins et navigateurs qui soient, capables d'user de toutes leurs compétences en manœuvre, dans toutes les situations."
 skilled_cavalry_raids:0 "Raids de cavalerie"
 skilled_cavalry_raids_desc:0 "Depuis des générations, les cavaliers sont l'instrument de la conquête. Le tonnerre de leurs sabots dans les hautes herbes du Sahel sème la terreur dans les rangs de nos ennemis et a permis de remporter bien des victoires."
 sko_education_for_all:0 "Lettrés"
 sko_education_for_all_desc:0 "En encourageant la diffusion de l'alphabétisation et de l'érudition auprès des hommes et des femmes, nous pourrons faire progresser notre société et consolider notre emprise sur nos terres. La famille de nos dirigeants doit occuper une place de choix dans cette entreprise, en servant de modèle."
 sko_fulani_expansion:0 "Expansion de l'empire de Sokoto"
 sko_fulani_expansion_desc:0 "Voilà trop longtemps que les peuples d'$west_africa$ sont sous la coupe de dirigeants qui, tout en se prétendant vertueux, se livraient au syncrétisme. Cela doit cesser ! Notre drapeau flottera toujours au-dessus des royaumes de ce monde."
 sko_one_people_in_faith:0 "Unification de la foi"
 sko_one_people_in_faith_desc:0 "Nos terres abritent de nombreuses populations de cultures et de langues différentes. Nous devons mettre l'accent sur notre foi en tant que force unificatrice afin de rassembler tous les peuples sous une même bannière."
 sko_recruit_fulani_generals:0 "Recruter des commandants $fulbe$"
 sko_recruit_fulani_generals_desc:0 "Le peuple $fulbe$ est composé de guerriers émérites, qui occupent des postes de commandement dans toute l'$west_africa$. Nous devrions nous constituer employeur permanent et recruter leurs commandants les plus compétents."
 sko_recruit_the_faithful:0 "Recruter les fidèles"
 sko_recruit_the_faithful_desc:0 "Tous ceux qui sont prêts à servir sous l'autorité de nos dirigeants vertueux doivent être accueillis, et ce quelle que soit leur origine."
 sko_religious_court:0 "Cour la plus religieuse"
 sko_religious_court_desc:0 "Au lieu d'afficher le faste mondain de notre règne, notre cour devrait se concentrer sur les questions spirituelles. En invitant des personnalités religieuses érudites à enseigner dans notre capitale, nous serons en mesure de prouver notre véritable engagement envers notre foi."
 slash_and_burn:0 "Agriculture sur brûlis"
 slash_and_burn_desc:0 "L'une de nos pratiques agricoles consiste à brûler la végétation pour obtenir une couche de cendres riches qui fertilise le sol. Nous avons appris que la terre devient plus forte grâce à cette méthode, mourant pour mieux renaître."
 slave_center_advance:0 "$slave_center$"
 slave_center_advance_desc:0 "Une gestion adéquate de la main-d'œuvre servile dans notre royaume est impérative pour que notre peuple puisse continuer à vivre dans l'opulence."
 slave_manned_galleys:0 "Envoi d'esclaves aux galères"
 slave_manned_galleys_desc:0 "Nécessitant un grand nombre de rameurs, les flottes massives de galères engendrent des frais considérables. En employant des esclaves, nous pouvons réduire les coûts d'exploitation de nos navires."
 slave_raid_advance:0 "Raids côtiers"
 slave_raid_advance_desc:0 "Nous suivons toujours la tradition ancienne qui consiste à razzier les côtes pour y trouver ce qu'il nous faut, que ce soit des esclaves, de l'argent ou toute autre bonne chose de la vie."
 slave_raiding_wars:0 "Guerres de razzias d'esclaves"
 slave_raiding_wars_desc:0 "Les esclaves sont le pilier de notre économie. Attaquer et razzier nos voisins pour capturer leurs peuples et les asservir est donc le souffle qui maintient notre pays en vie."
 slave_soldiers:0 "Soldats esclaves"
 slave_soldiers_desc:0 "Afin d'assurer la loyauté des troupes permanentes, nous emploierons des soldats esclaves disciplinés puisés au sein de notre société."
 slave_trade_act_advance:0 "Loi sur l'esclavage"
 slave_trade_act_advance_desc:0 "Le flux de main-d'œuvre à destination et en provenance de nos colonies est une affaire lucrative et délicate. Il nous faut par conséquent redoubler d'efforts pour l'affiner par voie législative."
 slavery_before_death:0 "Esclavage avant la mort"
 slavery_before_death_desc:0 "La destruction des villes fait partie de la guerre. Autrefois, nos guerriers détruisaient et pillaient tout sur leur passage, tuaient tous ceux qui se dressaient contre eux. Cela renforçait leur moral, mais leurs actions étaient contre-productives. Avec cette nouvelle approche, nous pourrons au moins asservir ceux qui sont capables de travailler au lieu de les décapiter aveuglément pour nous faire un trône de crânes."
 slitting_mills:0 "Machine à refendre"
 slitting_mills_desc:0 "Il s'agit d'un nouveau type de moulin à eau conçu pour découper les barres de fer en tiges de moindre diamètre. Cela permet une fabrication plus efficace d'outils et de machines en fer, car les fondeurs peuvent utiliser des barres qui répondent mieux à leurs besoins, ce qui réduit le gaspillage des excédents de matière au cours du forgeage."
 slovene_the_catechismus_and_abecedarium:0 "Le Catechismus et l'Abecedarium"
 slovene_the_catechismus_and_abecedarium_desc:0 "L'âme de notre peuple a trouvé sa voix grâce aux presses à imprimer. Primož Trubar a publié #italic le Catechismus et l'Abecedarium#!, les tout premiers livres imprimés en langue slovène. Il ne s'agit pas simplement d'un acte religieux : c'est un véritable séisme politique qui standardise nos divers dialectes en une langue littéraire unique. En donnant au peuple les outils de la lecture et de l'écriture dans sa propre langue, nous avons forgé une conscience nationale unifiée qui transcende les frontières des anciens duchés féodaux. Cet éveil intellectuel accélère l'adoption des institutions administratives modernes et permet à la lumière des nouvelles idées de se répandre rapidement de la chaire à la charrue."
 slovene_the_dukes_chair_tradition:0 "La tradition du trône ducal"
 slovene_the_dukes_chair_tradition_desc:0 "L'ancien rituel d'installation des ducs de Carinthie en langue slovène symbolise une relation contractuelle unique entre le souverain et ses sujets. Cette coutume renforce l'idée d'une paysannerie libre dotée de droits juridiques spécifiques, empêchant la dépossession totale de la population rurale. Ce contrat social favorise une base agricole stable et productive à travers nos domaines."
 slovene_the_freising_fragments:0 "Les fragments de Freising"
 slovene_the_freising_fragments_desc:0 "S'appuyant sur les anciennes traditions des fragments de Freising, la paysannerie slovène et le clergé local ont conservé une identité linguistique distincte, qui a survécu au sein des structures ecclésiastiques du Saint-Empire romain germanique. Cette tradition vernaculaire précoce constitue un ancrage culturel discret mais résilient, distinguant les locuteurs #italic Windish#! de leurs voisins germaniques et italiens."
 slovene_the_glory_of_carniola:0 "La gloire de la Carniole"
 slovene_the_glory_of_carniola_desc:0 "En suivant l'exemple de Janez Vajkard Valvasor, nous avons entrepris un effort monumental pour cartographier la géographie, l'histoire et les coutumes de nos terres. Cette enquête scientifique offre à l'État une compréhension sans égale de ses ressources et de son peuple, permettant une fiscalité plus efficace et l'application rapide des innovations technologiques."
 slovene_the_tabor_defense_system:0 "Le système défensif des Tabor"
 slovene_the_tabor_defense_system_desc:0 "En tant que nation frontalière, nous avons toujours été dans une position périlleuse face à nos ennemis. C'est ainsi que notre peuple a développé les #italic Tabor#!, des enceintes fortifiées autour des églises où les villageois peuvent se réfugier avec leur bétail et leurs biens. Ce système de défense décentralisé transforme chaque village en une petite forteresse, contraignant tout envahisseur à une guerre d'attrition éprouvante qu'il ne peut remporter."
 slovene_the_zois_circle:0 "Le cercle de Zois"
 slovene_the_zois_circle_desc:0 "Le baron Sigmund Zois, riche minéralogiste et mécène des arts, a commencé à organiser un cercle d'intellectuels qui ont été à l'avant-garde de l'Éveil national slovène (Preporod). Ce groupe promeut l'usage du slovène dans la haute culture, la science et la politique, transformant ainsi efficacement une « langue paysanne » en une langue de souveraineté moderne."
 sme_atabegs_of_samtskhe:0 "Atabegs de $SME$"
 sme_atabegs_of_samtskhe_desc:0 "Nous ne sommes pas qu'une simple région du Royaume de $GEO$, car nous avons reçu la reconnaissance royale depuis bien longtemps et, avec elle, le titre d'Atabeg. Ce titre, qui n'était accordé qu'aux vassaux arméniens, est un signe de distinction et du respect que le monarque $GEO_ADJ$ a pour nous."
 sme_bridge_between_worlds:0 "Un pont entre les mondes"
 sme_bridge_between_worlds_desc:0 "Notre pays a toujours été situé entre deux mondes, le chrétien et le musulman, formant un pont et des liens entre eux. Ainsi, les croyants des deux religions ont toujours interagi au sein de notre territoire."
 sme_fortresses_of_samtskhe:0 "Forteresses de $SME$"
 sme_fortresses_of_samtskhe_desc:0 "Notre pays est une frontière montagneuse, barrant bien des fois le passage à des envahisseurs étrangers qui visaient la $GEO$. Pour cette raison, nous avons appris à construire des forteresses puissantes et à être prêts à mener des guerres défensives. Nous devons à tout prix maintenir cet héritage, les forteresses du $SME$ doivent être parfaitement entretenues, pourvues en hommes et en ravitaillements ; car les invasions étrangères ne sont pas pour nous une possibilité, mais une certitude."
 sme_frontier_warriors:0 "Guerriers des frontières"
 sme_frontier_warriors_desc:0 "Le Caucase a longtemps été façonné par les empereurs nomades et les pâturages du $SME$ ont attiré de nombreuses tribus désireuses de s'établir sur nos terres. Nous ne devons pas laisser cela réduire la stabilité du pays, mais plutôt conclure des accords avec ces tribus de façon qu'elles jouent leur rôle pour servir nos ambitions militaires."
 sme_independent_ambitions:0 "Ambitions d'indépendance"
 sme_independent_ambitions_desc:0 "Qu'ils soient musulmans ou chrétiens, $georgian_culture$s, $turkic_group$s ou Iraniens, le $SME$ a souvent dû se soumettre à des rois et sultans étrangers. Afin d'établir un État et une économie durables, nous devons établir nos propres institutions, capables de résister, quelle que soit l'origine de celui qui veut s'emparer de notre terre, à n'importe quel moment. Battons notre propre monnaie, rédigeons nos propres lois et faisons-nous les mécènes de nos propres théologiens et littérateurs."
 sme_jaqeli_dynasty:0 "Dynastie $Jaqeli$"
 sme_jaqeli_dynasty_desc:0 "Malgré ses origines modestes, la dynastie $Jaqeli$ a su établir de nombreux contacts fructueux et des liens avec les dynasties royales et impériales qui nous entourent. À ce titre, notre position dans la sphère diplomatique est bien perçue."
 sme_proactive_diplomacy:0 "Diplomatie active"
 sme_proactive_diplomacy_desc:0 "Même s'il est une partie constituante de la $GEO$, le $SME$ est resté largement indépendant dans son administration et ses actions. Cela a nécessité de toujours se tenir au fait de la scène politique en $GEO$, ainsi qu'une diplomatie très active avec les empires à nos frontières. Nos dirigeants se sont toujours assurés d'avoir un moyen de discuter avec ceux qui disposaient de la plus grande puissance. De la même façon, nous avons parfois dû jouer un rôle actif dans la politique intérieure du royaume de $GEO$, en intervenant dans les querelles de succession et en nous alliant à la dynastie royale lorsque c'était dans notre intérêt. Nous ferions bien de poursuivre cette tradition, car l'avenir de notre petit pays en dépend. Qu'il ne soit jamais dit que nous en avons fait trop peu ou que nous avons agi sans intelligence !"
 sme_protect_trade_routes:0 "Protection des routes commerciales"
 sme_protect_trade_routes_desc:0 "Notre situation, au carrefour de la $georgia_area$, de l'$anatolia_region$, de l'$armenia_area$ et de l'$azerbaijan_area$, implique aussi qu'un grand nombre de marchands cherchent à traverser nos territoires. Les raids perpétuels des tribus nomades, pourtant, menacent constamment la sécurité sur nos routes. Nous devons les défendre, de même que les auberges fréquentées par les commerçants, afin de nous assurer que les échanges ne soient pas empêchés dans notre pays."
 sme_sacred_land:0 "Terres sacrées"
 sme_sacred_land_desc:0 "La terre du $SME$ abrite des lieux sacrés et révérés du peuple $georgian_culture$. Le monastère troglodytique de Vardzia, l'ancienne église d'Atskuri avec son icône miraculeuse de la Sainte Vierge, le monastère d'Ancha avec son icône de l'Anchiskhati sont certains des lieux saints les plus importants dont nous avons la garde. Protéger et veiller au maintien de l'Église en $SME$, à l'écart de celle de $GEO$, nous permet de nous assurer que notre peuple reste uni face à tous ses adversaires."
 smithian_economics:0 "Économie smithienne"
 smithian_economics_desc:0 "En nous opposant au mercantilisme et en réduisant le contrôle de l'État sur les questions économiques, nous pourrions soutenir la libre concurrence, qui permettra une bien meilleure productivité."
 smolenskian_resolve:0 "Résolution smolénienne"
 smolenskian_resolve_desc:0 "Pendant des siècles, les étrangers – ducs lituaniens, rois polonais et princes moscovites – se sont déchiré Smolensk. Pour survivre, nous nous sommes accrochés à ce qui nous unissait : notre foi et notre résilience. Si nous devons renaître, il nous faut rejeter les divisions et nous rassembler autour d'une idée sacrée : il n'est rien au-dessus de Smolensk."
 smooth_administration:0 "Administration sans heurts"
 smooth_administration_desc:0 "Grâce à notre administration constituée des personnes talentueuses et compétentes, notre pays fonctionne sans heurts et notre autorité s'exerce sans interruption, quelles que soient les circonstances extérieures dans lesquelles nous nous trouvons."
 smrti:0 "Smriti"
 smrti_desc:0 "Signifiant « ce dont on se souvient », la $smrti$ est un ensemble de textes inspirés par les $vedah$ ou issus de ces derniers. En raison de cette origine dérivée, la $smrti$ est considérée comme moins influente que la $sruti$, mais contrairement à celle-ci, sa rédaction est attribuée à des auteurs humains et ce recueil est transmis au moyen de manuscrits."
 smz_early_westernization:0 "Occidentalisation précoce"
 smz_early_westernization_desc:0 "Grâce à des contacts fréquents et précoces avec les pays occidentaux, nous avons beaucoup appris sur les technologies et idées étrangères. Grâce à cela, nous pouvons entreprendre des réformes dans les domaines de l'économie, de l'industrie et de l'éducation, qui nous offriront un net avantage sur les autres clans nippons."
 smz_satsuma_shugo:0 "Shugo de $satsuma_province$"
 smz_satsuma_shugo_desc:0 "Nous avons toujours été le shugo de la province de $satsuma_province$, dont le nom même est devenu synonyme de notre clan. Nos guerriers sont fiers de cet accomplissement, et ne demandent qu'à combattre pour notre cause."
 smz_shimazu_charge:0 "Charge des $SMZ$"
 smz_shimazu_charge_desc:0 "Même lorsqu'ils se retrouveront complètement encerclés et en infériorité numérique, nos soldats poursuivront inlassablement leur avancée jusqu'à ce qu'ils aient franchi les lignes ennemies. La charge de nos troupes deviendra légendaire."
 smz_tanegashima:0 "Tanegashima"
 smz_tanegashima_desc:0 "Les Occidentaux qui sont arrivés sur l'île de Tanegashima ont amené avec eux de nouvelles armes extrêmement intéressantes. Ces arquebuses se font de plus en plus communes dans tout le $japan_region$, mais nulle part elles n'ont été disponibles depuis aussi longtemps qu'ici."
 smz_tsurinobuse:0 "Tsurinobuse"
 smz_tsurinobuse_desc:0 "Le tsurinobuse, « l'appât et l'embuscade », est notre tactique la plus efficace, qui nous permet de vaincre des ennemis bien plus puissants. Nous devons en faire la tactique principale de nos armées afin de pouvoir surprendre les généraux crédules des autres clans."
 sofa_levies_advance:0 "Levées de Sofas"
 sofa_levies_advance_desc:0 "À l'origine, tous les soldats présents dans les levées de kèlè-bolo sont des Horons, ou « hommes libres », mais un récent changement dans l'empire du Mali oblige l'inclusion des jonow, les « esclaves », qui servent dans l'armée comme guerriers plutôt que comme porteurs d'armes. Ces guerriers esclaves, les « Sofas », assureront la protection des fortifications maliennes."
 soldier_king:0 "Le roi-soldat de Prusse"
 soldier_king_desc:0 "La plupart des États sont des pays qui disposent d'une armée ; la Prusse, en revanche, est une armée qui dispose d'un pays. Les nombreux rois de Prusse étaient aussi bien soldats que monarques, chacun régnant par le biais de réformes tout en laissant une marque indélébile sur l'armée."
 soldiers_fortune:0 "Soldats de fortune"
 soldiers_fortune_desc:0 "Nos terres sont pour la plupart peu peuplées et entourées d'ennemis. La nécessité d'une défense solide nous incite à engager des soldats étrangers, prêts à se battre sous nos couleurs."
 solomonid_claim:0 "Revendication de Salomon"
 solomonid_claim_desc:0 "Les ancêtres de nos dirigeants descendent des monarques d'Axum, de la lignée du roi Salomon et de la reine de Saba. Nous avons déposé les monarques Zagwe afin de légitimer notre règne et d'établir fermement la restauration du royaume à sa dynastie légitime."
 sons_of_the_salur_tribe:0 "Fils de la tribu Salur"
 sons_of_the_salur_tribe_desc:0 "Les Karamanides puisent leur lignée chez les Salur, l'une des grandes tribus oghouzes. Réputés pour leur autorité et leur bravoure, les Salur nous ont laissé leur héritage qui forge l'identité de notre État et fonde notre légitimité à représenter les Turkmènes d'Anatolie."
 soo_bahan_ship:0 "Navires bahan"
 soo_bahan_ship_desc:0 "Nos navires corsaires sont craints de tous du fait qu'ils battent le pavillon de Hachiman. Qui oserait intercepter une flotte ainsi protégée par le dieu du combat lui-même ?"
 soo_fight_for_tsushima:0 "Combats pour Tsushima"
 soo_fight_for_tsushima_desc:0 "Se trouvant entre le continent et les îles du Japon, notre île de $tsushima_province$ et toute la mer qui l'entoure sont le lieu où se jaugent et s'affrontent les différents pays de la région. Puissent nos flottes être toujours fortes, non seulement pour défendre notre pays, mais aussi l'étendre !"
 soo_tradition_of_wakou:0 "Tradition des wakō"
 soo_tradition_of_wakou_desc:0 "Si nous apprécions certes de pouvoir commercer en paix et dans le respect des lois grâce aux certificats officiels qui nous ont été accordés, nous devons aussi nous préparer à affronter des situations plus dangereuses en cas de tensions militaires. Fort heureusement, nos traditions de pirates pourraient nous aider à résoudre par la force certains litiges."
 source_of_knowledge:0 "Source de connaissances"
 source_of_knowledge_desc:0 "Tandis que certains territoires se targuent d'être à la pointe de la connaissance et du développement, certaines de leurs « inventions » existent déjà en $asia$ depuis des siècles. Des prouesses technologiques de la $china$ à la littérature ancienne de l'$india$, l'Orient n'a rien à envier à l'Occident."
 southern_campaigns:0 "Campagnes méridionales"
 southern_campaigns_desc:0 "La $CHI$ est synonyme de richesses, de prestige et d'un savoir incommensurable. Sous le règne d'une dynastie fragile, il nous incombe de prendre le pouvoir et de rendre à ces terres leur prospérité et leur splendeur d'antan."
 spa_naval_reforms:0 "Réformes navales espagnoles"
 spa_naval_reforms_desc:0 "Notre marine, trop longtemps délaissée, a perdu en capacité par rapport à nos concurrents. Une réforme s'impose pour nous rendre la suprématie qui devrait être la nôtre."
 spa_revival_of_ecclesiastical_discipline:0 "Renouveau de la discipline ecclésiastique"
 spa_revival_of_ecclesiastical_discipline_desc:0 "Le laïcisme qui se répand au sein de notre peuple nous éloigne de Dieu. Nous allons signer des traités avec nos chefs religieux afin de renforcer les liens entre notre gouvernement et leur magistère moral afin de redevenir une nation pieuse."
 spa_school_salamanca:0 "L'École de Salamanque"
 spa_school_salamanca_desc:0 "Basée à l'université de Salamanque, l'École s'intéresse à des domaines aussi divers que la théologie, l'économie et la philosophie politique. Il s'agit de l'une des principales écoles de pensée du monde catholique, dont la présence bien ancrée en Espagne garantit que notre pays est toujours à la pointe des affaires intellectuelles."
 spa_siglo_de_oro:0 "Siglo de Oro"
 spa_siglo_de_oro_desc:0 "La vie culturelle de notre royaume est en pleine effervescence. Si nous canalisons cette créativité vers les lieux appropriés, en l'alimentant au besoin grâce au mécénat de bienfaiteurs, nous entamerons un véritable Siècle d'or des arts espagnols."
 spa_spanish_enlightenment:0 "Les Lumières espagnoles"
 spa_spanish_enlightenment_desc:0 "Les nouvelles idées de l'ère moderne imprègnent l'esprit des grands hommes d'Espagne, qui élaborent des plans pour que notre pays se distingue de ses concurrents dans le monde entier."
 spa_viceroyalties:0 "Vice-royautés espagnoles"
 spa_viceroyalties_desc:0 "De nouvelles terres attendent d'être revendiquées au-delà des océans. Nous les diviserons en territoires dirigés par des représentants de notre souverain, ce qui renforcera l'ordre sur place, rendra ces destinations attrayantes pour notre peuple et assurera notre présence dans ces régions."
 spanish_square:0 "Carré espagnol"
 spanish_square_desc:0 "Les carrés espagnols sont une évolution naturelle des formations combinant armes à feu et armes blanches : il s'agissait pour l'essentiel d'un carré de piquiers, avec à chaque coin un groupe d'arquebusiers. Cette formation conservait ainsi la capacité de résistance traditionnelle du carré de piquiers, tout en la renforçant par la puissance des armes à feu qu'étaient les arquebuses."
 splendor_of_anatolia:0 "La splendeur de l'Anatolie"
 splendor_of_anatolia_desc:0 "Notre région abrite certaines des madrasas et des mosquées les plus impressionnantes du monde islamique. Grâce à l'attention portée aux détails et à l'abondance de talents, nos prouesses artistiques n'ont pas d'égal."
 spy_construction_absolutism:0 "Réseaux d'espionnage mondiaux étendus"
 spy_construction_absolutism_desc:0 "Face à l'expansion constante des empires et des institutions dans le monde, nous devons maintenir nos efforts d'espionnage pour ne pas nous laisser distancer par nos rivaux."
 spy_construction_discovery:0 "Structure d'espionnage améliorée"
 spy_construction_discovery_desc:0 "En recrutant des individus de confiance en tant qu'informateurs et en les affectant à des postes où circule l'information, nous pourrons améliorer notre dispositif de renseignement afin d'en savoir plus sur nos ennemis et leurs activités."
 spy_construction_reformation:0 "Cryptographie avancée"
 spy_construction_reformation_desc:0 "Si nous voulons recueillir des informations sur nos ennemis, il est important de leur donner un faux sentiment de sécurité. Ce n'est qu'ainsi que nous pourrons obtenir des renseignements exacts et détaillés sur leurs plans, afin de mieux riposter."
 spy_construction_renaissance:0 "Réseaux d'espionnage"
 spy_construction_renaissance_desc:0 "Depuis les temps anciens, les empires font appel à des espions pour glaner des informations sur les menaces intérieures comme extérieures. Les Mongols en ont même fait un art, recourant à l'espionnage pour préparer leurs campagnes militaires et assurer leur succès."
 spy_construction_revolutions:0 "Contact avec les dissidents"
 spy_construction_revolutions_desc:0 "Face aux idées et systèmes politiques nouveaux qui se propagent à travers le monde, nous devrons allouer des ressources pour soutenir les dissidents à l'œuvre dans les pays de nos rivaux et acquérir de précieuses informations."
 square_rigged_caravel:0 "Caravelle à gréement carré"
 square_rigged_caravel_desc:0 "En combinant la $n_iberian_caravel$ et la $n_carrack$, un nouveau navire verra le jour : rapide et solide, il nous assurera la domination des mers."
 sruti:0 "Shruti"
 sruti_desc:0 "Signifiant « ce qui est entendu », la $sruti$ est le plus ancien recueil de textes sacrés de l'$hindu$. On y voit une révélation d'un auteur divin, mais bien que tous les adeptes acceptent l'autorité de ce recueil, d'aucuns réfutent son origine céleste."
 standardisation_of_calibre:0 "Calibres standardisés"
 standardisation_of_calibre_desc:0 "Du fait que l'artillerie commençait à jouer un rôle plus important sur le champ de bataille, le nombre d'armes à feu augmenta. Chacune était toutefois fabriquée séparément, aussi le réapprovisionnement en munitions était-il complexe. En 1544, l'empereur Charles Quint décida qu'il n'y aurait plus que cinq calibres d'armes ; quant au roi de France Henri II, il décida d'en utiliser six."
 standardized_coins:0 "Pièces standardisées"
 standardized_coins_desc:0 "La création de richesses fait émerger de nouvelles monnaies. Bien que nous ayons utilisé de nombreux types de devises au fil des ans, il est important que nous définissions de nouvelles normes afin d'éviter que des indélicats rognent sur la quantité de métaux nobles des pièces ou en liment le pourtour."
 standardized_pikes:0 "Piques normalisées"
 standardized_pikes_desc:0 "Une pique est remarquablement simple à fabriquer. Toutefois, pour en tirer le meilleur parti, l'ensemble de la formation doit disposer d'armes de la même longueur et du même type."
 star_fort_advance:0 "Forteresse en étoile"
 star_fort_advance_desc:0 "$star_fort_desc$"
 state_administration_advance:0 "Administration d'État"
 state_administration_advance_desc:0 "Toute taxation exige une connaissance de la population, des lois et des coutumes locales. C'est pourquoi il est primordial de mettre en place un système d'administration du royaume."
 state_efficiency:0 "Infrastructures locales"
 state_efficiency_desc:0 "En dépit de l'attention particulière que nous portons aux affaires à l'échelle du pays, les législations et autorités locales ne doivent pas être négligées en ce qui concerne les affaires purement locales."
 state_of_clerics:0 "État clérical"
 state_of_clerics_desc:0 "La nature d'une théocratie réside dans sa proximité avec le divin. Pour ce faire, de nombreux éléments de notre gouvernement sont mis en œuvre par le clergé, qui allie les rites religieux avec les tâches bureaucratiques des administrateurs."
 state_propaganda:0 "Propagande d'État"
 state_propaganda_desc:0 "Tout comme c'est le cas pour un homme, la réputation d'un pays est cruciale, et l'établissement d'un service officiel de propagande nous assure que notre nom ne sera pas sali par les mensonges de nos ennemis."
 status_by_merit:0 "Statut au mérite"
 status_by_merit_desc:0 "Les guerriers et les nobles s'élèvent grâce à leur bravoure et leurs services, garantissant ainsi que l'autorité revient à ceux qui l'ont véritablement méritée."
 statute_of_kalisz:0 "Statut de Kalisz"
 statute_of_kalisz_desc:0 "Connue sous le nom de Charte générale des libertés juives, cette législation contient des articles qui accordent à tous les Juifs la liberté de culte, de commerce et de voyage. La loi tente également de réduire le nombre d'accusations de meurtres rituels à l'encontre des Juifs propagées par l'Église catholique."
 statutes_of_aix:0 "Statuts d'Aix"
 statutes_of_aix_desc:0 "Une série de lois et de statuts vaguement assemblés forme l'épine dorsale juridique de notre gouvernance. Ces statuts mêlent la jurisprudence romaine aux coutumes locales et à la tradition angevine, nous permettant de gérer un patchwork de régions comme un seul domaine cohérent : une monarchie composite, où les parties sont diverses, mais la couronne indivisible."
 statutes_of_lithuania:0 "Statuts de Lituanie"
 statutes_of_lithuania_desc:0 "Les Lietuvos Statutai sont un recueil de trois réformes législatives rassemblant, unifiant et actualisant les lois du pays. Connus pour leurs châtiments sévères et l'introduction de la peine de mort, ils sont en cela comparables à de nombreux codes pénaux occidentaux contemporains : à chaque crime doit en théorie toujours correspondre la même condamnation, sans considération pour la personne qui le commet. Malgré tout, dans la pratique, la paysannerie reste désavantagée. Les Statuts de Lituanie inspireront par la suite une réforme similaire en Russie."
 steel_mill_advance:0 "Aciérie"
 steel_mill_advance_desc:0 "$steel_mill_desc$"
 steppe_horde_tribal_cultural_identity_law_advance:0 "$tribal_cultural_identity_law$"
 steppe_horde_tribal_cultural_identity_law_advance_desc:0 "$tribal_cultural_identity_law_desc$"
 steppe_horde_tribal_modernization_law_advance:0 "$tribal_modernization_law$"
 steppe_horde_tribal_modernization_law_advance_desc:0 "$tribal_modernization_law_desc$"
 steppe_horde_tribal_religious_values_law_advance:0 "$tribal_religious_values_law$"
 steppe_horde_tribal_religious_values_law_advance_desc:0 "$tribal_religious_values_law_desc$"
 steppe_riders:0 "Cavaliers des steppes"
 steppe_riders_desc:0 "Les steppes constituent un lieu de vie particulièrement hostile et la mort menace tous ceux qui sont privés de chevaux. Lorsque vous vous aventurez sur ces vastes étendues d'herbe, votre cheval cesse d'être un animal pour faire corps avec vous. De même qu'il est impossible de survivre sans cœur ou sans foie, dans les steppes, il est impossible de survivre sans cheval."
 steppe_slave_raiding:0 "Raids des esclaves des steppes"
 steppe_slave_raiding_desc:0 "Nos groupes de raid se déplacent aussi vite que le vent, frappant et s'enfuyant presque avant que quiconque ne se rende compte de notre présence. Le pillage des colonies que nous attaquons n'est pas le seul moyen de gagner beaucoup d'argent, mais nous pouvons aussi capturer des prisonniers que nous vendrons à prix d'or."
 stickball_game:0 "Crosse"
 stickball_game_desc:0 "Le jeu de crosse, une tradition ancienne, est pratiqué depuis des siècles. Habituellement utilisé à des fins rituelles ou pour résoudre des conflits, il rassemble des centaines de guerriers dans une plaine, armés de bâtons de bois et d'une balle à envoyer dans un but délimité. Cette pratique consolide notre peuple et assure l'excellente condition de nos guerriers."
 stk_eastern_coalitions:0 "Coalitions orientales"
 stk_eastern_coalitions_desc:0 "Quels que soient les clans hostiles qui nous entourent, nous sommes toujours parvenus à nous présenter comme un troisième parti raisonnable auquel les clans peuvent se rattacher pour se protéger des invasions. Cette tradition des coalitions de l'Est nous sera des plus profitables tant que les clans qui se reposent sur nous seront certains de n'avoir rien à craindre pour leur sécurité."
 stk_hitachi_genji:0 "Genji de $hitachi_province$"
 stk_hitachi_genji_desc:0 "Nous sommes l'un des plus anciens Genji de la région du Kantō et avons combattu pour la gloire du clan dans tout l'est du Japon avant même la fondation du shogunat de Kamakura par Minamoto no Yoritomo. Notre position de shugo de $hitachi_province$ est donc incontestable."
 stk_kashima_jingu:0 "$kashima_shrine$"
 stk_kashima_jingu_desc:0 "Le $kashima_shrine$ est l'un des trois plus importants sanctuaires du Kantō. Takemikazuchi-no-O-no-Kami, le dieu du tonnerre et des sabres, patron protecteur du $sumo$, y est vénéré. Le fait que nous soyons les gardiens de ce sanctuaire joue un grand rôle pour renforcer la résolution de nos armées."
 stock_exchange_advance:0 "Bourse"
 stock_exchange_advance_desc:0 "$stock_exchange_desc$"
 stone_and_brick:0 "Pierre et brique"
 stone_and_brick_desc:0 "Pendant des siècles, nous avons compté sur la faiblesse du bois pour ériger des communautés et des défenses contre nos ennemis. Grâce à notre trésor et à notre pouvoir politique, le plan d'expansion de l'infrastructure de notre domaine sera mis en œuvre. Nous avons hérité de villes en bois, et nous les léguerons fortifiées avec de la pierre et de la brique."
 stories_of_the_gao_empire:0 "Histoires sur l'empire de Gao"
 stories_of_the_gao_empire_desc:0 "Bien avant que l'empire du Mali ne domine l'Afrique de l'Ouest, la cité de Gao était en elle-même une véritable capitale impériale. Même s'il n'y a guère d'archives écrites sur l'empire de Gao, son héritage vit dans nos traditions orales, inspirant les hommes qui aspirent à atteindre la gloire."
 strength_of_the_boyars:0 "La puissance des boyards"
 strength_of_the_boyars_desc:0 "La classe des boyards est, de bien des façons, le pilier de l'aventure impériale russe ; mais autant nous avons besoin de la renforcer, autant nous devons veiller à la contrôler. Il nous faut donc à la fois réserver des sièges à ces boyards au sein de la Douma, mais aussi nous assurer qu'ils ont besoin de nous pour accroître leur influence."
 structured_patriarchates:0 "Patriarcats structurés"
 structured_patriarchates_desc:0 "Nos patriarcats ont toujours été très bien structurés et organisés, chacun présentant ses propres attributs et limites. Cela permet de mieux administrer l'Église dans son ensemble et, par extension, l'État."
 structured_society:0 "Société structurée"
 structured_society_desc:0 "Les sociétés de l'$asia$ sont généralement très structurées, chaque individu étant conscient de son propre rôle. Grâce à l'influence des idées collectives de l'$hindu$ et du $SECT_CONFUCIANISM_NAME$, les rouages de la société ont tendance à être bien huilés en $asia$."
 students_of_foreign_courts:0 "Étudiants de cours étrangères"
 students_of_foreign_courts_desc:0 "Nos royales lignées connaissent bien les voyages à l'étranger : c'est l'occasion de se faire étudiants de cours illustres loin de notre patrie, à la recherche de connaissances et d'éducation diplomatique."
 study_european_colonizers:0 "Étudier les colons européens"
 study_european_colonizers_desc:0 "Des étrangers sont entrés en contact avec notre peuple. Leurs navires et leurs armes méconnus suscitent la crainte et la peur. Comprendre leurs méthodes pourrait être la clé de notre survie."
 study_foreign_gunpowder_techniques:0 "Poudre à canon étrangère"
 study_foreign_gunpowder_techniques_desc:0 "Les grands empires d'Europe et d'Orient ont fortement contribué à assurer l'usage de la poudre à canon et de ses applications militaires. Étudier et améliorer leurs méthodes renforcerait grandement nos troupes."
 study_institutions_advance:0 "Partage des connaissances"
 study_institutions_advance_desc:0 "Il n'est pas honteux que d'autres sachent ce que nous ignorons, mais il n'est jamais à notre avantage de ne rien faire pour y remédier. En étudiant sérieusement les découvertes des autres, nous améliorerons notre connaissance du monde."
 sturdy_privateers:0 "Corsaires robustes"
 sturdy_privateers_desc:0 "Les corsaires sont toujours dans la ligne de mire. Si nous voulons tirer pleinement parti de leur potentiel, nous devons faire en sorte qu'ils ne coulent pas aux premiers coups de canon. Les faire embarquer sur des navires robustes sera bénéfique à long terme."
 subject_income_reformation_advance:0 "Structures du pouvoir externes"
 subject_income_reformation_advance_desc:0 "La chaîne de commandement détermine très clairement les devoirs de nos vassaux envers nous. Renforcer ces obligations et veiller à leur respect ponctuel nous permettra très certainement d'asseoir notre trésorerie."
 subject_income_revolutions_advance:0 "Souveraineté rémunérée"
 subject_income_revolutions_advance_desc:0 "Tandis que le monde fait face à des changements majeurs dans tous les secteurs, nous pouvons aujourd'hui plus que jamais proposer des contrats de paiement à nos vassaux contre l'assurance de leur pérennité."
 subject_integration:0 "Consolidation des titres"
 subject_integration_desc:0 "Bien que le fait d'avoir de nombreux pays à notre service ne soit pas sans avantages, ce n'est qu'en rassemblant leurs différents titres sous le nôtre que nous pourrons réellement tirer profit de leurs terres. Car il est clair qu'un simple souverain pèsera bien peu par rapport à notre dirigeant bardé de titres."
 subject_loyalty_absolutism:0 "Loyauté absolue"
 subject_loyalty_absolutism_desc:0 "Nous ne tolérons aucune dissidence ou révolte au sein de notre propre population. Pourquoi le ferions-nous parmi nos sujets ?"
 subjects_advance:0 "Dépendances"
 subjects_advance_desc:0 "La délégation du pouvoir local aux sujets sous notre bannière est un moyen acceptable d'empêcher leurs habitants de se révolter, tout en leur soutirant un précieux tribut."
 successors_of_genghis_khan:0 "Successeurs de $genghis_khan_name_no_tooltip$"
 successors_of_genghis_khan_desc:0 "Depuis l'époque de la conquête totale jusqu'aux vastes étendues du grand empire de $genghis_khan_name_no_tooltip$, notre peuple descend de générations de faiseurs de terre, et de ceux qui sont destinés à écrire l'Histoire."
 sudano_sahelian_architecture_advance:0 "Architecture soudano-sahélienne"
 sudano_sahelian_architecture_advance_desc:0 "Les steppes, les savanes et les déserts de l'Afrique de l'Ouest sont pauvres en ressources pour les projets de construction. L'usage de briques de boue et de pisé réduit de façon significative le coût des bâtiments, tout en leur accordant un style particulier."
 suk_akson_sukhothai:0 "Akson $SUK$"
 suk_akson_sukhothai_desc:0 "Bien que l'écriture $thai_culture$ se soit déjà répandue parmi tous les peuples $thai_culture$, il ne faut pas oublier que c'est dans notre pays et sous notre direction qu'elle a été développée à partir de l'écriture de nos anciens oppresseurs $KHM_ADJ$. Ce n'est pas seulement une force d'unification pour notre culture, mais aussi la preuve de notre indépendance et de notre spécificité."
 suk_birthplace_of_a_culture:0 "Berceau d'une culture"
 suk_birthplace_of_a_culture_desc:0 "On nous appelle le premier royaume $thai_culture$ indépendant, car nous fûmes les premiers à nous rebeller contre l'autorité $KHM_ADJ$ pour nous affranchir de son influence. C'est pour cette raison que tous les peuples $thai_culture$ nous voient avec admiration."
 suk_breaker_of_chains:0 "Destructeur de chaînes"
 suk_breaker_of_chains_desc:0 "Il n'y a pas si longtemps, nous étions sous l'autorité $KHM_ADJ$, jusqu'à ce que nous gagnions notre liberté et notre place légitime en tant que puissance indépendante. Nous avons gagné l'admiration et le respect de nos pairs."
 suk_military_history:0 "Histoire militaire"
 suk_military_history_desc:0 "Nos armées ont une longue tradition de succès militaires. De ce fait, un poste dans notre armée est vu comme une position honorable et prestigieuse. Nombreux sont ceux qui souhaitent servir."
 suk_ram_khamhaeng_stele:0 "Stèle de $name_ram_khamhaeng$"
 suk_ram_khamhaeng_stele_desc:0 "Ce que l'on sait de l'histoire du premier royaume $SUK_ADJ$ se trouve sur les inscriptions sur la $suk_ram_khamhaeng_stele$, commandées par le grand roi pour rendre compte de son glorieux règne. La $suk_ram_khamhaeng_stele$ est un héritage de paix sacré qui prouve assurément notre place dans l'Histoire."
 suk_sukhothai_ceramics:0 "Céramiques $SUK$"
 suk_sukhothai_ceramics_desc:0 "Depuis l'Antiquité, les peuples $thai_culture$ créent des objets de céramique, influencés par la céramique $chinese_group$e mais dans un style qui leur est propre. Toutefois, ce sont les céramiques produites dans notre pays qui sont les plus appréciées et on les trouve sur les marchés de pays fort lointains."
 suk_unstoppable_army:0 "Armée invincible"
 suk_unstoppable_army_desc:0 "Beaucoup ont essayé par le passé d'entraver notre expansion, mais tous ont échoué devant nos armées. Elles se sont révélées être une force implacable balayant tous les obstacles qui se dressent sur son chemin."
 suk_wat_si_sawai:0 "Wat Si Sawai"
 suk_wat_si_sawai_desc:0 "Nos nombreux temples sont réputés, comme le grandiose $suk_wat_si_sawai$, l'un des plus anciens de $sukhothai$. Ce temple $hindu_ADJ$ construit sous l'autorité $KHM_ADJ$ est devenu un symbole de notre identité par sa reconversion. La foi de notre peuple est forte."
 sumo:0 "Sumō"
 sumo_desc:0 "Originaire d'une danse rituelle agricole destinée à obtenir de bonnes récoltes, la pratique du $sumo$ a échappé aux limites de la cour et des prêtres. C'est aujourd'hui une activité populaire pratiquée par le petit peuple, également utilisée pour l'entraînement des militaires."
 sun_must_rise:0 "Le soleil doit se lever"
 sun_must_rise_desc:0 "Grâce à notre dévotion et à nos rituels, nous perpétuons le parcours du soleil, en apaisant les cœurs et en fortifiant l'esprit de notre peuple. La préservation de l'équilibre et le monde entier reposent sur nos épaules."
 sunnah:0 "Sunna"
 sunnah_desc:0 "Désignant les traditions et pratiques attribuées à Mahomet, que la paix soit sur lui, la $sunnah$ décrit la façon dont chaque fidèle $muslim_ADJ$ doit se comporter, et a également engendré le terme « $sunni$ ». Bien que les différentes écoles de jurisprudence diffèrent au niveau des détails, elles restent toutes basées sur la $sunnah$."
 superior_firepower:0 "Puissance de feu supérieure"
 superior_firepower_desc:0 "Une puissance de feu concentrée, capable de désorganiser les lignes ennemies avant de porter le coup de grâce, est l'une des forces de notre armée. Nous nous assurerons que nos commandants en ont bien conscience."
 superior_seamanship:0 "Sens marin supérieur"
 superior_seamanship_desc:0 "La pratique de l'art maritime nous permet de transformer notre [navy|e] en une puissance navale d'excellence, dotée des meilleurs vaisseaux ainsi que de capitaines et d'équipages de talent."
 superior_ship_design:0 "Conception navale améliorée"
 superior_ship_design_desc:0 "Des [ships|e] légèrement plus rapides que ceux de nos adversaires, voilà qui n'a aucune valeur militaire à proprement parler. Pourtant, c'est un atout qui donne confiance aux équipages et oblige l'ennemi à faire preuve de prudence avant d'engager le combat, même à armes égales."
 supply_depot_advance_age_2_renaissance:0 "Dépôts de ravitaillement"
 supply_depot_advance_age_2_renaissance_desc:0 "Aucune armée ne peut survivre sans ravitaillement. La mise en place de dépôts de ravitaillement permanents offre un approvisionnement continu aux lignes de ravitaillement, ce qui permet à nos armées d'être toujours au maximum de leurs performances."
 supply_depot_advance_age_3_discovery:0 "Dépôts militaires"
 supply_depot_advance_age_3_discovery_desc:0 "Le développement et le déploiement d'armées permanentes ont augmenté les besoins en armes, uniformes et autres fournitures militaires qu'elles doivent garder à portée de main."
 supply_depot_advance_age_4_reformation:0 "Dépôts de munitions"
 supply_depot_advance_age_4_reformation_desc:0 "Le déploiement généralisé de l'artillerie sur les champs de bataille et lors des sièges a entraîné un besoin en munitions et en poudre à canon pour les alimenter, ce qui accroît l'importance des dépôts pour les stocker."
 supply_depot_advance_age_5_absolutism:0 "Dépôts avancés"
 supply_depot_advance_age_5_absolutism_desc:0 "Les armées peuvent désormais opérer à plus grande distance et plus longtemps en territoire ennemi, ce qui rend nécessaire la création et le maintien de dépôts avancés à proximité, tout en les reliant aux lignes de ravitaillement de défense."
 supply_depot_advance_age_6_revolutions:0 "Dépôts de campagne"
 supply_depot_advance_age_6_revolutions_desc:0 "L'utilisation de plusieurs armées dans le cadre de campagnes plus longues a exercé une pression supplémentaire sur notre logistique, augmentant ainsi l'importance de créer rapidement des dépôts plus grands pour les soutenir."
 supply_lines:0 "Lignes de ravitaillement"
 supply_lines_desc:0 "Le développement d'armées professionnelles a changé la manière dont la guerre est menée. La logistique est désormais essentielle et les lignes de ravitaillement indispensables pour nourrir les soldats et les approvisionner en munitions."
 supply_trains:0 "Convois de ravitaillement"
 supply_trains_desc:0 "En campagne, l'[attrition|e] est notre ennemi le plus redoutable. La clé pour protéger nos hommes contre celle-ci consiste en la mise en place d'un réseau logistique bien planifié et géré efficacement, capable de fournir un soutien et des provisions."
 supreme_court_advance:0 "Cour suprême"
 supreme_court_advance_desc:0 "$supreme_court_desc$"
 supremus_dux_lithuaniae:0 "Supremus Dux Lithuaniæ"
 supremus_dux_lithuaniae_desc:0 "Si nous voulons nous défendre contre nos agresseurs $polish$ et $russian_group$, nous devons affirmer notre force ! Le titre de #italic Duc suprême de Lituanie#! vise à assurer notre emprise sur le pouvoir, en particulier contre le pouvoir croissant de notre noblesse et de ceux qui cherchent à violer notre souveraineté."
 surgery_advance:0 "Chirurgie"
 surgery_advance_desc:0 "Les barbiers chirurgiens mettent au point des techniques plus sophistiquées pour traiter les blessures et les maladies. Le développement de nouveaux instruments chirurgicaux rend les procédures plus sûres et plus efficaces : les patients survivent ainsi à des afflictions qui leur auraient été fatales il y a seulement quelques années."
 sutra:0 "Sutra"
 sutra_desc:0 "Textes sacrés dans les religions $dharmic_ADJ$ et $buddhist_ADJ$, les sutras présentent des formats et contenus variés. Toutefois, ils sont toujours considérés comme des sources de connaissances qui exigent une étude approfondie si l'on souhaite développer son esprit."
 suw_suwa_taisha:0 "Suwa-taisha"
 suw_suwa_taisha_desc:0 "Le Suwa-taisha, au Suwa, est l'un des sanctuaires les plus anciens du Japon, hautement révéré même en dehors de Shinano. Sa célébration la plus importante, l'Onbashira-matsuri, prouve bien le courage de notre peuple, qui transporte des troncs sacrés des montagnes jusqu'au sanctuaire."
 svn_swamp_drainage_projects:0 "Projets d'assèchement"
 svn_swamp_drainage_projects_desc:0 "En investissant dans de vastes projets d'ingénierie hydraulique visant à assécher les immenses zones marécageuses des régions fluviales, nous ouvrons des milliers d'hectares de nouvelles terres fertiles. Ces terres reconquises seront rapidement peuplées, ce qui augmentera la densité démographique et l'assiette fiscale de la province tout en éliminant les foyers de maladies. Cette transformation du paysage renforce non seulement notre économie, mais crée également un territoire plus praticable et plus défendable, supprimant les obstacles naturels qui entravaient autrefois nos propres communications internes."
 svn_the_alluvial_grant_lands:0 "Les concessions alluviales"
 svn_the_alluvial_grant_lands_desc:0 "Les limons fertiles situés entre la Sava et la Drava constituent notre atout le plus précieux. En accordant des parcelles exonérées d'impôts en échange du défrichement des broussailles riveraines, nous transformons les plaines inondables en principal bassin céréalier du Nord. Cette intensification agricole fournit la logistique nécessaire pour soutenir une armée permanente massive, garantissant que le royaume peut nourrir ses défenseurs même lors des blocus hivernaux les plus rigoureux."
 svn_the_marturina_tax_system:0 "Le système fiscal de la Marturina"
 svn_the_marturina_tax_system_desc:0 "Nous avons officialisé la #italic Marturina#! (impôt sur les peaux de martre, également appelé #italic Kunovina#!), un système de tribut unique et ancien de Slavonie qui fournit au Ban un actif précieux et facilement transportable. En standardisant la valeur de ces fourrures par rapport au Mark royal, nous avons créé une monnaie stable pour la région, fortement résistante à l'inflation. Cette fiabilité fiscale permet au banat de maintenir une garde professionnelle et de construire d'importantes fortifications en bois et en pierre le long des passages vulnérables de la Drave, sans imposer aux paysans des taxes excessives sur les céréales."
 svn_the_oak_staple_rights:0 "Les droits d'exclusivité du chêne"
 svn_the_oak_staple_rights_desc:0 "Le chêne de Slavonie est désormais le bois le plus recherché en Méditerranée pour sa résistance quasi métallique à la pourriture aquatique. En établissant un monopole royal sur l'exportation de chêne mûr vers les chantiers navals vénitiens, nous avons obtenu un levier économique stratégique sur les républiques maritimes. Ce commerce ne se contente pas de remplir nos coffres : il garantit que les fondations mêmes des palais de Venise et les coques de leurs galères sont physiquement composées du sol croate, nous conférant une influence diplomatique unique sur la « Reine de l'Adriatique »."
 svn_the_slavonian_grenadier_regiments:0 "Les régiments de grenadiers slavoniens"
 svn_the_slavonian_grenadier_regiments_desc:0 "Nos unités d'infanterie ont été réorganisées en régiments de grenadiers d'élite, renommés dans tout le continent pour leur stature impressionnante, leur discipline rigoureuse et leur courage inébranlable sous le feu. Ces troupes spécialisées sont formées pour ouvrir la charge face aux tirs les plus intenses, utilisant grenades et baïonnettes pour briser les lignes des ennemis les plus redoutables. La présence de ces « Géants de Slavonie » sur le champ de bataille constitue une arme psychologique puissante, qui renforce le moral de nos troupes tout en semant la terreur chez ceux qui osent leur faire face."
 svn_the_slavonian_sabor:0 "Le Sabor slavonien"
 svn_the_slavonian_sabor_desc:0 "Notre peuple est gouverné sous le contrôle du #italic Sabor#! slavonien. Cette indépendance législative permet à la noblesse de Slavonie de répondre aux besoins spécifiques des plaines entre les rivières, comme les projets de drainage et la régulation des marchés de grains. En disposant d'une assemblée dédiée, le banat peut réagir rapidement aux crises régionales et négocier directement des exonérations fiscales, garantissant que la richesse agricole de Slavonie est utilisée principalement pour sa propre défense et son développement."
 swabian_frugal_people:0 "Finances frugales"
 swabian_frugal_people_desc:0 "On a souvent accusé notre peuple d'avarice et raillé notre sens de la prudence économique. Heureusement, leurs moqueries sont faciles à supporter quand nos coffres sont pleins et nos ducats prêts à financer nos propres ambitions."
 swabian_league_of_cities:0 "Ligue des cités"
 swabian_league_of_cities_desc:0 "La Souabe abrite de nombreuses cités prospères, autant de proies convoitées par les ambitions étrangères. Pour mieux défendre nos terres, nous devons nous unir en temps de guerre et repousser toute ingérence étrangère sur notre sol."
 swedish_absolutism:0 "Absolutisme suédois"
 swedish_absolutism_desc:0 "L'absolutisme est une théorie qui veut qu'un seul homme dirige. Cet homme est le roi, et il doit avoir la capacité de diriger sans que le Conseil privé n'interfère."
 swedish_copper_coins:0 "Pièces de cuivre suédoises"
 swedish_copper_coins_desc:0 "L'abondance de cuivre en $SWE$, provenant principalement de la mine Stora Kopparberget à Falun, a incité le pays à utiliser ce métal comme ressource principale pour frapper une nouvelle monnaie nationale : le #italic daler#!. Celle-ci est émise sous la forme d'une grande plaque métallique appelée #italic plåtmynt#!, dont le poids peut atteindre 20 kilogrammes. Certains affirment que cela n'est pas forcément très pratique et que le volume d'argent en circulation pourrait dépasser les réserves de cuivre, mais ils font probablement preuve d'étroitesse d'esprit."
 swedish_heritage:0 "Paysans libres"
 swedish_heritage_desc:0 "Les fermiers suédois ont toujours joué un rôle important au sein du pays, aussi n'y a-t-il jamais eu de différend majeur entre la noblesse et les paysans libres."
 swedish_roots:0 "Racines militaires suédoises"
 swedish_roots_desc:0 "Constituée des rangs disciplinés des Carolins et de la paysannerie libre et robuste, la puissance militaire de la Suède est un pilier essentiel de la Scandinavie. En intégrant ses institutions et ses systèmes de recrutement, nous renforçons les effectifs et la puissance de notre empire."
 swedish_royal_post_office:0 "Kungliga Postverket"
 swedish_royal_post_office_desc:0 "La Kungliga Postverket (Agence postale royale) fut fondée sous le règne de la reine Christina. Créée pour améliorer l'administration de l'État et les communications à travers le vaste Empire suédois, elle établit un réseau fiable de messagers et de relais. Le système devint crucial pour la coordination militaire, la diplomatie et la gouvernance à l'époque où la Suède était une grande puissance."
 swedish_steel:0 "Acier suédois"
 swedish_steel_desc:0 "Alors que d'autres armées tirent des salves imprécises contre leurs ennemis, nous progresserons en rangs disciplinés et tirerons une seule salve à courte portée qu'ils ne sont pas près d'oublier."
 swedish_tradition:0 "Attaque incessante"
 swedish_tradition_desc:0 "Pour anéantir l'ennemi, il suffit d'adopter la formation Svinfylking et de charger ! Les chevaux servent à se rendre jusqu'à la zone de guerre, ils n'ont pas leur place sur le champ de bataille."
 swiss_alpine_passes:0 "Maîtres des cols alpins"
 swiss_alpine_passes_desc:0 "Les grandes montagnes des Alpes ne sont pas de simples obstacles pour nous, elles sont notre foyer. Leurs grands cols – le Gothard, le Simplon, le Grimsel – sont nos rues. Des générations de pèlerins, de marchands et d'armées traversant ces hauteurs périlleuses ont rendu notre peuple intimement familier de chaque itinéraire, abri et raccourci qui s'y trouve. Aucune armée étrangère ne se déplacera dans nos montagnes avec autant de rapidité que nous."
 swiss_ambition:0 "Les Lumières $SWI_ADJ$s"
 swiss_ambition_desc:0 "Nous n'avons pas besoin d'une identité unique pour notre pays, depuis que notre peuple a décidé de se rallier aux bannières de ses cantons et aux valeurs de notre confédération. Mais en finançant les lettrés de l'époque, nous pourrons façonner une ère nouvelle pour les fidèles $SWI_ADJ$s et consolider les traits uniques de notre Eidgenossenschaft. L'helvétisme sera le fondement de nos principes éclairés."
 swiss_banking:0 "Banque $SWI_ADJ$"
 swiss_banking_desc:0 "Nous sommes un sanctuaire non seulement pour les personnes persécutées d'autres pays, mais aussi pour leurs richesses. Dans de grandes chambres fortes, cachées derrière de solides murs et protégées par nos soldats dignes de confiance, nous serons le meilleur choix pour les citoyens des pays pauvres déchirés par la guerre pour la sauvegarde de leurs objets de valeur."
 swiss_clockwork:0 "Maîtres du temps"
 swiss_clockwork_desc:0 "Certaines personnes de peu d'entendement sont persuadées que l'horlogerie est réservée aux horloges. Pourtant, lorsque l'on comprend le pouvoir des rouages, il est évident que l'horlogerie permet de tout faire. Le Créateur lui-même n'aurait-il pas pensé l'univers comme un gigantesque mécanisme, dont les rouages égrèneraient librement les siècles, l'un après l'autre ? Quoi qu'il en soit, les horlogers $SWI_ADJ$s sont les plus grands maîtres dans cet art, après Dieu bien évidemment."
 swiss_eternal_alliance:0 "L'Alliance éternelle des cantons forestiers"
 swiss_eternal_alliance_desc:0 "Nous avons conclu une alliance éternelle avec nos amis des cantons voisins. Sans ce traité, nous aurions certainement succombé aux envahisseurs habsbourgeois et serions tombés une fois de plus sous le joug de tyrans étrangers. Ces alliances assureront notre indépendance pour les siècles à venir."
 swiss_halberd_infantry:0 "Héritage de Morgarten"
 swiss_halberd_infantry_desc:0 "Lorsque nous avons défendu notre liberté à la bataille de Morgarten, nous avions un avantage très important sur les envahisseurs Habsbourg. La hallebarde est une arme simple mais efficace qui repousse facilement n'importe quel adversaire. L'entraînement de nos troupes à l'utilisation de cette arme nous donnera un avantage sur nos ennemis, même s'ils sont supérieurs en nombre."
 swiss_mercenaries:0 "Mercenaires $SWI_ADJ$s"
 swiss_mercenaries_desc:0 "Nos troupes sont reconnues parmi les meilleurs soldats au monde. Comme nous n'avons pas besoin de leurs services en permanence, autant les louer à des puissances étrangères pour nous enrichir et leur fournir une expérience précieuse."
 swiss_oath_of_rutli:0 "Le serment du Rütli"
 swiss_oath_of_rutli_desc:0 "Récitons le vœu de cette nouvelle union. Nous voulons être une nation de frères, et nul trouble, nul danger ne nous séparera. Aucun tyran étranger ne régnera sur nos terres !"
 swiss_recovery_and_prosperity:0 "Un royaume en proie aux troubles"
 swiss_recovery_and_prosperity_desc:0 "Les conflits passés ont montré que repousser les envahisseurs n'est pas la seule tâche à accomplir. Chaque bataille dévaste un peu plus les vallées de nos cantons, aussi est-il nécessaire de prendre des mesures prudentes permettant de ramener la prospérité sur nos terres."
 swiss_reislaufer:0 "Compagnie des Suisses"
 swiss_reislaufer_desc:0 "$a_reislaufer_desc$ Nous devrions former des régiments à partir de ces vétérans et les employer dans nos armées."
 swiss_religious_refuge:0 "Un havre pour les réfugiés"
 swiss_religious_refuge_desc:0 "Alors que d'autres chassent leurs minorités religieuses et exilent leurs personnalités problématiques, nous leur offrons volontiers un foyer. En $SWI$, ils pourront se construire une nouvelle vie et faire l'éloge de notre pouvoir."
 swiss_tolerance:0 "Tolérance $SWI_ADJ$"
 swiss_tolerance_desc:0 "Pourquoi s'entretuer pour la transsubstantiation et la prédestination alors que nous pourrions faire de nos montagnes un royaume uni ?\\n\\nC'est pourquoi chaque canton de $SWI$ aura le dernier mot en matière de religion. Cela n'éliminera pas les conflits religieux dans notre pays, mais cela garantira à chacun, quelle que soit sa confession, de pouvoir trouver un endroit où il ne sera pas persécuté."
 symbol_of_catholicism:0 "Symbole du catholicisme"
 symbol_of_catholicism_desc:0 "Jérusalem, ville la plus sainte de la chrétienté, est le lieu même de la Passion et de la Résurrection du Christ. En affirmant la suprématie catholique sur ces terres sacrées, nous devenons le phare spirituel du monde latin et un pilier de la vraie foi."
 system_of_tributaries:0 "Système tributaire"
 system_of_tributaries_desc:0 "Lorsque l'on veut exercer un contrôle direct sur un territoire, il est nécessaire de déployer des efforts considérables afin de pacifier la population locale et de soumettre l'administration. En mettant en place un dirigeant loyal et en exigeant un tribut annuel, nous pourrons éliminer la menace que poserait un $altepetl$ rival tout en remplissant nos caisses de manière simple et pratique."
 szkola_rycerska:0 "Szkoła Rycerska"
 szkola_rycerska_desc:0 "En formant la prochaine génération de nobles et en lui inculquant la fierté nationale, nous parviendrons à forger des générations de militaires et de citoyens dignes d'intérêt."
 table_of_ranks:0 "Tabel o rangakh : la Table des rangs"
 table_of_ranks_desc:0 "L'abolition du Mestnitchestvo a été la première étape pour rendre l'administration plus méritocratique. La Table des rangs le codifie et permet que le service et les promotions au sein de l'armée dépendent du service aux rangs inférieurs."
 talented_traders:0 "Marchands talentueux"
 talented_traders_desc:0 "Notre administration est constituée de personnes talentueuses, et ceux qui font circuler l'argent et les marchandises à travers le pays devraient l'être tout autant. En confiant nos opérations commerciales aux esprits les plus brillants, nous nous assurerons que les marchandises et les bénéfices circulent sans interruption."
 tamazight:0 "Tamazight"
 tamazight_desc:0 "Les populations berbérophones de l'intérieur sont une composante essentielle de notre société. En reconnaissant leur identité culturelle et en encourageant l'alphabétisation, nous renforçons notre capacité à gouverner des régions diverses, sans sacrifier ni notre cohésion ni notre autorité."
 tambo_advance:0 "$tambo$"
 tambo_advance_desc:0 "$tambo_desc$"
 tamed_steppes:0 "Steppes sous contrôle"
 tamed_steppes_desc:0 "Alors que l'on considère généralement les steppes comme des terres inhospitalières et peu rentables, nos cosaques se sont adaptés à cet environnement rude au point d'y survivre et même d'y prospérer. Grâce à eux, nous pouvons exploiter ces terres et en tirer profit."
 tamerlane_chess:0 "Échecs de Tamerlan"
 tamerlane_chess_desc:0 "Cette nouvelle variante du jeu d'échecs, inventée par notre grand fondateur éponyme, améliore les versions précédentes et son utilisation permettra à nos généraux d'améliorer leur stratégie et leur tactique."
 tannery_manufactory_advance:0 "Manufacture de tannage"
 tannery_manufactory_advance_desc:0 "$tannery_manufactory_desc$"
 tannery_mill_advance:0 "$tannery_mill$"
 tannery_mill_advance_desc:0 "$tannery_mill_desc$"
 tanning_workshop_advance:0 "$tanning_workshop$"
 tanning_workshop_advance_desc:0 "$tanning_workshop_desc$"
 tanye_guanxi:0 "Tányuè Guânxì"
 tanye_guanxi_desc:0 "Depuis des siècles, notre influence spirituelle en Chine a constitué le fondement des relations diplomatiques. Le mécénat impérial, les échanges de tributs et les rituels sacrés comme le Tányuè nous ont garanti à la fois le respect et des avantages matériels."
 tax_assessor_advance:0 "Collecteur d'impôts"
 tax_assessor_advance_desc:0 "$tax_assessor_desc$"
 taxation_advance:0 "Impôts"
 taxation_advance_desc:0 "Pour opérer dans une société civilisée, il est nécessaire de maintenir une autorité centrale. En demandant un impôt à nos vassaux et citoyens, nous pourrons gérer nos affaires plus simplement et de façon plus productive."
 tears_of_the_sun:0 "Larmes du soleil"
 tears_of_the_sun_desc:0 "Même si des aventuriers venus de contrées lointaines rêvent de trouver de l'or au détour d'un chemin de la cordillère des Andes, pour nous le métal jaune a une valeur artistique et sacrée, plutôt que simplement économique."
 temporary_appointments:0 "Nominations temporaires"
 temporary_appointments_desc:0 "Le fait que les membres de la Cour occupent une charge à vie comporte le risque inhérent qu'avec le temps, ils accumulent pouvoir et influence et consacrent moins d'efforts à leurs tâches. Ainsi, nous pouvons mettre en place un système d'affectations temporaires, de sorte que les fonctionnaires soient affectés aux postes pour lesquels ils sont les plus qualifiés, mais qu'il soit possible de les changer dès qu'ils commencent à s'y complaire."
 ten_great_campaigns:0 "Les Dix Grandes Campagnes"
 ten_great_campaigns_desc:0 "Les Dix Grandes Campagnes visent à étendre notre influence à l'intérieur et à l'extérieur de nos frontières. Pour ce faire, nous formerons une immense armée pour écraser les résistances que nous pourrions trouver sur notre chemin et nous tuerons dans l'œuf la moindre rébellion. Notre gloire sera éternelle."
 tercio:0 "Tercio"
 tercio_desc:0 "Les tercios sont des unités d'infanterie, développées principalement par le brillant général Gonzalo Fernández de Córdoba (#italic El Gran Capitán#!) pendant les guerres d'Italie. Il s'agit d'une formation d'infanterie mixte composée de piquiers et de mousquetaires. Grâce à cette combinaison de deux armes, ces troupes bénéficient à la fois de la solidité de l'infanterie lourde et de la puissance de feu à longue portée des mousquetaires, ce qui en fait une formation idéale en défense comme en attaque."
 terrace_farming:0 "Cultures en terrasses"
 terrace_farming_desc:0 "Les cultures en terrasses et les techniques d'irrigation que nous avons développées nous permettent de ne rien perdre de l'espace limité qu'offrent les versants montagneux."
 terraces_advance:0 "$terraces$"
 terraces_advance_desc:0 "$terraces_desc$"
 teu_absolute_order:0 "Ordre absolu"
 teu_absolute_order_desc:0 "Dans notre ordre, tous les pouvoirs de l'État sont consolidés. Chaque action entreprise, chaque décision prise passe d'abord par la hiérarchie de l'ordre Teutonique avant d'être exécutée. Bien sûr, cette bureaucratie n'est pas du goût de tout le monde, mais elle garantit le pouvoir absolu du Hochmeister."
 teu_crusader_discipline:0 "Discipline des croisés"
 teu_crusader_discipline_desc:0 "Notre grand ordre a été forgé dans les flammes et le sang de la troisième croisade lors du siège d'Acre en 1191. Alors qu'à l'origine nous soignions les malades et les faibles, l'ordre s'est transformé en un groupe militarisé de chevaliers au dévouement et à la discipline inébranlables."
 teu_expanded_marches:0 "Marches étendues"
 teu_expanded_marches_desc:0 "Accordons plus d'autonomie aux gouverneurs locaux de nos régions frontalières et transformons leurs terres en marches. Ces territoires spécifiques paieront moins d'impôts à l'État en échange de leur obligation à prendre les armes en temps de guerre comme en temps de paix. Cela devrait nous offrir une plus grande souplesse militaire à faible coût."
 teu_infantry_tactics:0 "Tactiques d'infanterie"
 teu_infantry_tactics_desc:0 "En Europe, les batailles modernes ont prouvé que l'ère de l'infanterie est sur le point de commencer. L'heure est venue de développer de nouvelles tactiques et de réformer le concept médiéval d'infanterie auxiliaire pour en faire la force de combat principale de nos futures armées."
 teu_one_state_one_religion:0 "Un État, une religion"
 teu_one_state_one_religion_desc:0 "Réservons toutes les fonctions de l'État à ceux qui partagent notre religion. Les hérétiques et les païens ne sont plus les bienvenus dans notre royaume."
 teu_peasants_recruitment:0 "Recrutement des paysans"
 teu_peasants_recruitment_desc:0 "Il apparaît clair que nous ne pouvons plus compter sur les volontaires étrangers pour renforcer les rangs de notre armée, malgré leur expérience et leur valeur. Nous devons plutôt développer un système nous permettant de réquisitionner nos sujets, $GER_ADJ$s comme étrangers."
 teu_prussian_bishops:0 "Évêques prussiens"
 teu_prussian_bishops_desc:0 "Accordons plus de droits et de privilèges à nos évêques prussiens pour veiller à ce qu'ils fassent preuve d'une loyauté inébranlable envers nous."
 teu_reformed_order_army:0 "Armée de l'ordre réformé"
 teu_reformed_order_army_desc:0 "Les chevaliers allemands, ces vétérans des croisades et d'innombrables guerres en Europe, ne sont tout simplement pas assez nombreux pour continuer de constituer la base de nos armées. Nous devons réorganiser ces dernières et lever des régiments nationaux capables de remplacer les chevaliers sur le champ de bataille."
 teu_teutonic_heavy_cavalry:0 "Cavalerie lourde teutonne"
 teu_teutonic_heavy_cavalry_desc:0 "Il n'existe pas de plus grand symbole de puissance et de prouesse militaires que la cavalerie lourde. Si, dans de nombreux États, la cavalerie est composée de nobles, chaque chevalier teutonique est également membre de notre cavalerie lourde et suit l'entraînement strict d'un croisé."
 teu_teutonic_religious_authority:0 "Autorité religieuse teutonique"
 teu_teutonic_religious_authority_desc:0 "Nous mettrons fin à l'autonomie religieuse des archevêques de notre royaume. Toutes les questions religieuses, des impôts à la conversion de la population, relèveront désormais de l'État."
 textile_mill_advance:0 "Fabrique textile"
 textile_mill_advance_desc:0 "$textile_mill_desc$"
 thai_royal_poets:0 "Poètes royaux"
 thai_royal_poets_desc:0 "À quoi bon gagner des guerres s'il n'y a personne pour les chanter ? Notre Cour doit être un lieu d'accueil pour les poètes et notre histoire sera leur source d'inspiration."
 thai_war_elephants:0 "Éléphants de guerre"
 thai_war_elephants_desc:0 "Depuis des siècles, les éléphants de guerre sont utilisés en $indochina_region$, à la fois comme soutien d'infanterie et comme monture des rois, qui se livraient alors à des duels à dos d'éléphant avec les chefs adverses."
 the_adige:0 "L'Adige"
 the_adige_desc:0 "L'Adige est l'artère vitale de Vérone, un canal pour le commerce, l'agriculture et la prospérité. Comme ses eaux descendent des Alpes vers l'Adriatique, la richesse irrigue nos marchés et nos champs, nourrissant à la fois la ville et la campagne."
 the_age_of_the_genoese:0 "Le siècle des Génois"
 the_age_of_the_genoese_desc:0 "Grâce au développement financier de Gênes au cours des dernières décennies, les banquiers génois sont désormais parmi les plus recherchés ; ils ont même accru la splendeur de notre pays en embauchant des artistes renommés pour décorer leurs villas et leurs palais."
 the_ark_of_the_covenant:0 "L'Arche d'alliance"
 the_ark_of_the_covenant_desc:0 "Nous sommes la nation qui détient l'Arche d'alliance sacrée après son appropriation en secret par Ménélik Ier, avec l'aide de Dieu, il y a des milliers d'années. Elle a dû être cachée aux yeux de tous, de peur que le trésor sacré soit volé. Malgré tout, des répliques de l'Arche sont placées dans chacune de nos églises pour rappeler à tous que notre royaume a été béni par Dieu."
 the_censorate:0 "Le censorat"
 the_censorate_desc:0 "À l'instar d'autres instituts de notre administration, cette branche de notre gouvernement est chargée de lutter contre la corruption. Chargés de contrôler les intrigues palatiales et les malversations, les censeurs sont souvent considérés comme les yeux et les oreilles de l'empereur."
 the_constitution:0 "Constitution"
 the_constitution_desc:0 "Un nouveau concept philosophique a fait son apparition : le constitutionnalisme. Selon ses principes, le gouvernement devrait accepter des limites légales à son pouvoir. C'est une idée intéressante, mais avouons-le : elle n'a pas un grand avenir."
 the_dhow:0 "$n_kilwan_dhow$"
 the_dhow_desc:0 "$n_kilwan_dhow_desc$"
 the_eight_banners:0 "Les Huit Bannières"
 the_eight_banners_desc:0 "Le système des Huit Bannières constitue le cœur de notre société et de notre puissance militaire. Avec une appartenance héréditaire et des récompenses sous forme de terres et de revenus, les bannières constituent l'élite des gardiens de notre royaume. De la conquête de nos voisins aux futures campagnes, notre domination dépend de la puissance des Bannières."
 the_exchequer:0 "Le Chancelier de l'Échiquier"
 the_exchequer_desc:0 "Notre corps législatif doit rester à l'abri de toute influence extérieure, afin de préserver notre identité culturelle et notre indépendance. Inspiré des institutions fiscales anglo-normandes, notre système parlementaire renforcera les revenus de la Couronne et améliorera le contrôle administratif."
 the_gold_standard:0 "Étalon-or"
 the_gold_standard_desc:0 "Le déficit commercial des échanges entre l'Europe et l'Orient a entraîné, partout sur le territoire européen et dans le monde, une pénurie en métaux précieux. Passer des pièces d'argent à des pièces d'or permettra à de nouvelles pièces d'entrer en circulation et d'augmenter encore davantage le volume des échanges."
 the_hajj:0 "Le hajj"
 the_hajj_desc:0 "Comme Mansa Moussa du Mali l'a fait autrefois, nos dirigeants peuvent se rendre à la Mecque, respectant ainsi le cinquième pilier de l'Islam, en portant de l'or comme symbole de notre richesse et de notre puissance. Comme le Mali d'antan, faisons en sorte que le monde s'émerveille de la richesse et de la grandeur des Songhaïs."
 the_hansa_bank:0 "La banque de la Hanse"
 the_hansa_bank_desc:0 "Grâce au nouveau système de contributions, nous pouvons créer une banque réservée à l'usage des membres. Avec l'appui des ressources de la ligue, une lettre de crédit de la banque aura autant de valeur que de la monnaie. En plus de nos autres instruments financiers, cela donnera un net avantage à nos marchands par rapport à la concurrence extérieure."
 the_kilwan_zambuc:0 "$n_kilwan_zambuc$"
 the_kilwan_zambuc_desc:0 "$n_kilwan_zambuc_desc$"
 the_mantle_of_the_great_khan:0 "Le manteau du Grand $rank_kingdom_horde_ruler_suffix_male$"
 the_mantle_of_the_great_khan_desc:0 "La mort de $genghis_khan_name_no_tooltip$ a entraîné la vacance du pouvoir, que des personnes mal avisées se sont empressées de combler. Cependant, nous avons pu, grâce à des mariages, renforcer notre prétention à descendre du Grand $rank_kingdom_horde_ruler_suffix_male$ lui-même, et les guerriers des steppes savent qui ils doivent suivre."
 the_mestnichestvo_advance:0 "$the_mestnichestvo$"
 the_mestnichestvo_advance_desc:0 "$the_mestnichestvo_desc$"
 the_old_and_infirm:0 "Vétérans et invalides"
 the_old_and_infirm_desc:0 "Les vétérans comptent parmi les personnes les plus méprisables et les plus corrompues qu'on puisse imaginer. Pourtant, ils pourraient nous être utiles : plutôt que de les laisser mendier dans nos rues, nous pourrions faire usage de leurs compétences après la fin de leur service en leur confiant la charge des entraînements et de l'intendance."
 the_pentarchy:0 "Pentarchie"
 the_pentarchy_desc:0 "L'ancienne structure de l'Église formulée par l'empereur Justinien est toujours en vigueur dans l'$orthodox$. Bien que le patriarche de $rome$ se croie au-dessus de tout dans le $catholic$, pour l'Église authentique, les villes de $constantinople$, d'$alexandria$, d'$antioch$ et de $jerusalem$ ont toujours leur importance."
 the_philosophes:0 "Les philosophes"
 the_philosophes_desc:0 "En cet âge des Lumières, nous avons donné naissance à certains des plus grands philosophes de notre temps, chantres d'idées et de pensées nouvelles, capables de stimuler le progrès dans tous les domaines, des plus quotidiens aux plus importants."
 the_rebirth_of_the_patriarchate:0 "La renaissance du patriarcat"
 the_rebirth_of_the_patriarchate_desc:0 "Grâce à un sens politique exceptionnel et à des manœuvres habiles au sein des complexes administrations impériales de nos voisins, nous avons réussi à négocier la restauration de notre patriarcat national. Cette victoire diplomatique nous confère une juridiction spirituelle et légale sur toutes les populations serbes, de la côte adriatique jusqu'au milieu du Danube, permettant à l'Église d'agir comme « gardienne de tous les Serbes ». Elle rend possible le maintien d'une administration parallèle qui perçoit la dîme, gère l'éducation locale et entretient la flamme de nos traditions au sein d'une population unie par une foi unique et puissante."
 the_red_cannon:0 "Le canon rouge"
 the_red_cannon_desc:0 "Les barbares aux cheveux roux venus d'Europe ont beau être rudes et n'avoir aucune manière, ils savent cependant fabriquer des pièces d'artillerie et des armes à feu de qualité. En importer pour les reproduire permettrait d'améliorer notre armée pour la rendre plus efficace face aux invasions."
 the_return_of_quetzalcoatl:0 "Le retour de Quetzalcōātl"
 the_return_of_quetzalcoatl_desc:0 "Le contact avec des étrangers d'autres continents a apporté de nouvelles idées intéressantes sur nos dieux. La prophétie de #italic Quetzalcōātl#! révèle une réalité au-delà des mythes, un aperçu de la vérité : #italic Quetzalcōātl#!, « le Serpent à plumes », va bientôt revenir pour mener une ère de changements, vaincre les ténèbres et apporter la lumière. Symbole d'une fusion cosmique, il unira la matière et l'esprit, restaurera l'équilibre tout en transcendant la conscience de l'Homme."
 the_right_hand_pope:0 "La main droite du pape"
 the_right_hand_pope_desc:0 "Alors que le monde se modernise et que l'âge des croisés tombe peu à peu dans l'oubli, la nécessité d'influencer le Saint-Père pour assurer notre avenir est une évidence pour tout dirigeant susceptible de devenir notre grand maître. Ainsi, nous deviendrons les meilleurs conseillers et amis du Souverain pontife. Bien sûr, dans notre quête pour le servir, nous pouvons encore obtenir quelques avantages."
 the_sahel_trade:0 "Commerce sahélien"
 the_sahel_trade_desc:0 "Depuis des siècles, des caravanes entretiennent des relations commerciales entre le Sahel et la Méditerranée, les avantages de ces échanges l'emportant largement sur les risques liés à la traversée des sables brûlants du Sahara."
 the_swiss_confederation:0 "Les principes de la Confédération"
 the_swiss_confederation_desc:0 "Chaque membre de notre confédération apporte des ressources précieuses à notre cause. Notre approche décentralisée de la gouvernance de cette alliance d'États sert un objectif plus large, de sorte que nous ne risquons pas de guerre civile même en cas de désaccords entre cités ou cantons."
 the_tea_trade:0 "Le commerce du thé"
 the_tea_trade_desc:0 "Boisson essentielle de notre société, le thé a fini par dominer les réunions sociales au point de devenir la boisson préférée de beaucoup. Cette évolution entraînera sans aucun doute non seulement la culture de nouvelles variétés, mais aussi un certain essor de la production."
 the_the_fair_of_saint_demetrios:0 "La foire de Saint-Démétrios"
 the_the_fair_of_saint_demetrios_desc:0 "Nous avons transformé l'ancienne foire religieuse en une immense exposition commerciale internationale qui relie l'arrière-pays des Balkans aux routes maritimes méditerranéennes. En garantissant la sécurité des marchands, Thessalonique est devenue le premier marché pour la fourrure, les céréales et les textiles occidentaux. Cette vitalité économique permet au roi de contourner la noblesse locale en finançant son administration grâce aux taxes sur les ventes et aux droits de douane."
 the_the_lombard_guard_advance:0 "La garde lombarde"
 the_the_lombard_guard_advance_desc:0 "Restauré en tant que rempart en Macédoine, le royaume a ravivé son héritage en invitant des ingénieurs militaires lombards et nord-italiens à moderniser ses défenses. Ces #italic gardes lombards#! constituent le noyau professionnel de l'armée. Ils utilisent en effet des formations avancées de piques et de mousquets pour défendre la vallée du Vardar contre les armées ennemies qui empiètent sur leur territoire. Grâce à leur présence, notre nation demeure le bastion de la théorie militaire occidentale au cœur des Balkans."
 the_the_macedonian_fur_trade_advance:0 "Le commerce de fourrures en Macédoine"
 the_the_macedonian_fur_trade_advance_desc:0 "Nos chasseurs ont exploité les vastes étendues sauvages des montagnes du nord, établissant un commerce lucratif de fourrures haut de gamme pour les marchés de luxe en Italie et en France. En réglementant les saisons de trappe et en protégeant les routes commerciales vers le Danube, nous bénéficions d'une source constante d'« or à fourrure » pour le trésor royal. Cette industrie finance la modernisation de nos fortifications nordiques contre la puissance montante des principautés du nord."
 the_the_thessalonican_crown_advance:0 "La couronne de Thessalonique"
 the_the_thessalonican_crown_advance_desc:0 "Couronné roi de Thessalonique en 1204, Boniface de Montferrat érigea un royaume latin dans le nord qui contrôlait la Via Egnatia, voie de communication vitale, ainsi qu'une grande partie de la Macédoine. Il créa ainsi un royaume riche et stratégiquement important dont la capitale devint un centre fastueux de la vie de cour franque, du commerce italien et de la coexistence orthodoxe-catholique sous domination latine. Menacés à plusieurs reprises par leurs ennemis environnants, les barons du royaume ont néanmoins maintenu une fière tradition martiale et une économie florissante basée sur les céréales, le vin et le commerce de transit, garantissant ainsi que Thessalonique reste l'un des joyaux les plus radieux de la francocratie."
 the_the_university_of_thessalonica_advance:0 "L'université de Thessalonique"
 the_the_university_of_thessalonica_advance_desc:0 "Thessalonique a fondé une université royale dédiée à l'étude d'un large éventail de matières, alliant la théorie italienne à l'expérience locale des Balkans. Cette institution forme les meilleurs étudiants de la francocratie, capables de réaliser des merveilles. Nos diplômés sont particulièrement prisés dans le monde latin, faisant du royaume le centre intellectuel de l'innovation."
 the_the_via_egnatia_restoration_advance:0 "La restauration de la Via Egnatia"
 the_the_via_egnatia_restoration_advance_desc:0 "Le roi a ordonné la réfection complète et la fortification de l'ancienne Via Egnatia, artère vitale qui relie l'Adriatique au Bosphore. En établissant des garnisons permanentes le long de cette route, nous avons pu éliminer le banditisme et réduire considérablement le temps de trajet pour les marchands ainsi que les armées. Ce chef-d'œuvre logistique renforce la position de Thessalonique en tant que pont indispensable reliant l'Empire latin aux puissances d'Europe occidentale."
 the_yak:0 "Le yak"
 the_yak_desc:0 "Domestiqué depuis des siècles, le yak constitue l'épine dorsale de la vie pastorale tibétaine. Il fournit viande, lait, laine, transport et combustible, ses bouses séchées constituent une source d'énergie vitale sur le plateau dépourvu d'arbres. En période de besoin comme de fête, le beurre de yak remplit nos lampes et nos coupes."
 the_young_can_serve:0 "Les jeunes peuvent combattre"
 the_young_can_serve_desc:0 "À quel âge un garçon peut-il être considéré comme un homme ? À partir de quel seuil peut-il mourir pour son pays ? Certains dirigeants sont faibles, ce qui n'est pas notre cas : nous offrons à tous la même chance de se faire trouer la peau sur nos champs de bataille."
 theater_advance:0 "Théâtre"
 theater_advance_desc:0 "$theater_desc$"
 theocracy_divine_cause_law_advance:0 "$divine_cause_law$"
 theocracy_divine_cause_law_advance_desc:0 "$divine_cause_law_desc$"
 theocracy_nature_of_our_faith_law_advance:0 "$nature_of_our_faith_law$"
 theocracy_nature_of_our_faith_law_advance_desc:0 "$nature_of_our_faith_law_desc$"
 theotokos:0 "Théotokos"
 theotokos_desc:0 "Ayant conclu la Première Alliance en accueillant en elle la Nouvelle Alliance en la figure du Christ, la Sainte Vierge est une figure clé pour nous. C'est pourquoi, en tant qu'incarnation du Dieu-Christ, elle était littéralement la mère de Dieu et prédomine donc sur tous les autres saints."
 there_shall_be_no_grass:0 "L'herbe ne poussera plus"
 there_shall_be_no_grass_desc:0 "Là où la horde est passée, l'herbe ne repoussera plus. Le sol ne nourrira plus nos ennemis, le jour et la nuit passeront mais la terre restera silencieuse, aucune moisson ne sera faite. Il est certaines famines auxquelles on ne peut échapper."
 thp_a_centralized_levy_system:0 "Un système de levées centralisé"
 thp_a_centralized_levy_system_desc:0 "Nous nous sommes éloignés des associations claniques relâchées pour constituer un noyau semi-professionnel d'infanterie basé sur notre axe urbain central. Cette modernisation nous permet de répondre aux menaces avec une rapidité et une discipline que les levées tribales traditionnelles ne peuvent égaler."
 thp_french_blood_claims:0 "Revendications du sang français"
 thp_french_blood_claims_desc:0 "Nous revendiquons une ascendance prestigieuse, quoique contestée, issue de la royauté française, conférant à nos diplomates un statut particulier dans les cours d'Europe. Cette noblesse perçue nous permet de négocier d'égal à égal avec les cités-États italiennes et la papauté. Nous parvenons ainsi à des alliances qui seraient refusées à de simples chefs de guerre balkaniques."
 thp_mecenas_of_the_arts:0 "Mécènes des arts"
 thp_mecenas_of_the_arts_desc:0 "Nous avons financé la construction de grandes cathédrales et fortifications qui mêlent styles gothique et byzantin pour mettre en valeur notre richesse et notre piété. Cette splendeur architecturale sert à légitimer notre pouvoir aux yeux de l'Église et de nos sujets, transformant nos villes en symboles de permanence."
 thp_princeps_albaniae:0 "Princeps Albaniae"
 thp_princeps_albaniae_desc:0 "Notre nom est devenu synonyme de l'État lui-même, nous permettant d'intégrer divers groupes ethniques sous une seule bannière. En promouvant les individus les plus talentueux, indépendamment de leurs origines, nous avons créé une bureaucratie méritocratique qui surpasse nos rivaux féodaux."
 thp_the_lion_of_thopia:0 "Le Lion de Thopia"
 thp_the_lion_of_thopia_desc:0 "Notre maison s'est hissée au premier rang en naviguant habilement parmi les conflits des clans, positionnant la famille Thopia comme arbitre de la souveraineté albanaise. En tissant un réseau complexe d'alliances, nous obtiendrons le premier véritable titre de #italic Princeps Albaniae#! reconnu à la fois par l'Orient et l'Occident. Avec le lion de notre blason dominant les remparts de la côte, nous avons établi un noyau administratif professionnalisé qui dépasse le féodalisme primitif de nos rivaux, garantissant que notre maison demeure le prédateur dominant du littoral adriatique."
 thp_the_thopia_merchant_marine:0 "La marine marchande des Thopia"
 thp_the_thopia_merchant_marine_desc:0 "Nous avons étendu notre influence commerciale en offrant une protection étatique à tous les navires marchands arborant la bannière de Thopia. Cette sécurité maritime a fait de nos ports les centres privilégiés du commerce avec le Levant, détournant la richesse des ports en déclin de nos rivaux."
 three_jewels:0 "Trois joyaux"
 three_jewels_desc:0 "Les $three_jewels$, ou trois refuges, sont les trois notions dans lesquelles les adeptes du $buddhist$ prennent refuge. Il s'agit du #italic Bouddha#! (l'éveillé), du #italic dharma#! (l'enseignement du Bouddha) et du #italic sangha#! (la communauté monastique qui préserve le dharma)."
 three_sisters:0 "Agriculture des trois sœurs"
 three_sisters_desc:0 "Notre territoire regorge de nombreuses cultures. L'utilisation combinée de cultures de maïs, de haricots et de courges permet un meilleur rendement que si elles étaient séparées."
 three_teachings:0 "Trois enseignements"
 three_teachings_desc:0 "Les $three_teachings$ sont une philosophie originaire de $CHI$ qui combine les enseignements du $SECT_CONFUCIANISM_NAME$, du $SECT_DAOISM_NAME$ et du $buddhist$ en un savoir unifié et harmonieux. Le $SECT_CONFUCIANISM_NAME$ est l'idéologie de la loi alors que le $SECT_DAOISM_NAME$ représente la vision du monde des intellectuels radicaux. Ces deux opposés se trouvent liés par la philosophie du $buddhist$."
 thrive_under_persecution:0 "Prospérer en dépit de la persécution"
 thrive_under_persecution_desc:0 "Bien que nos fidèles aient été persécutés par les hérétiques et les infidèles pendant des siècles, notre foi a résisté. Peu importe le nombre de fois où nous sommes tombés par leur faute, nous nous relevons toujours."
 ths_armatole_administration_advance:0 "Administration des armatoles"
 ths_armatole_administration_advance_desc:0 "Afin de lutter contre l'anarchie qui règne dans les régions frontalières et la montée du banditisme, l'État thessalien a institutionnalisé le système des #italic Armatoles#!, qui consiste à conférer aux dirigeants locaux une juridiction militaire officielle sur des districts spécifiques. Cette couche administrative comble le fossé entre le despote central et la paysannerie rurale, en créant une classe paramilitaire disciplinée chargée de collecter les impôts et de maintenir la sécurité intérieure. En transformant d'anciens hors-la-loi en gardiens de la paix approuvés par l'État, le despotat atteindra un niveau de stabilité intérieure qui favorisera une reprise de la croissance économique et la mise en place d'une forme de gouvernance plus centralisée."
 ths_meteora_sanctuaries_advance:0 "Sanctuaires des Météores"
 ths_meteora_sanctuaries_advance_desc:0 "Alors qu'une instabilité croissante règne au sein des Balkans, les despotes de Thessalie subventionnent la construction de complexes monastiques au sommet des piliers de grès inaccessibles des Météores. Ces « monastères dans le ciel » ont une double fonction : ils servent de phares spirituels pour la foi orthodoxe et de trésors en altitude qui protègent les richesses de l'État et les reliques sacrées contre les mercenaires pillards. En centralisant l'autorité spirituelle de la région dans des positions aussi faciles à défendre, le despotat garantit que l'identité locale reste ancrée dans l'orthodoxie, même lorsque le gouvernement central doit faire face à la contrainte."
 ths_raiders_of_the_pindus_advance:0 "Pillards du Pinde"
 ths_raiders_of_the_pindus_advance_desc:0 "Pour survivre dans le nord de la Grèce, il est nécessaire d'abandonner les tactiques militaires byzantines traditionnelles au profit d'un système sophistiqué de guérilla. La doctrine militaire thessalienne évoluera pour se concentrer sur les tactiques des #italic klephtes#!, qui utilisent les ravins profonds et les forêts denses des montagnes du Pinde pour épuiser les lignes d'approvisionnement ennemies en les persécutant sans cesse. Ce changement culturel vers les tactiques de guérilla signifie que toute force d'occupation sera confrontée à un environnement hostile dans lequel chaque berger est un éclaireur et chaque sentier de montagne un lieu d'embuscade potentiel, transformant ainsi la conquête de la Thessalie en un véritable cauchemar logistique pour les empires étrangers."
 ths_the_wallachian_scutari_advance:0 "Les Scutari de Valachie"
 ths_the_wallachian_scutari_advance_desc:0 "Dans le chaos qui suivit la quatrième croisade, les souverains de Thessalie se tournèrent vers les populations semi-nomades de #italic Grande Valachie#! pour renforcer leurs rangs décimés. En accordant à ces féroces bergers l'autonomie et des droits de pâturage en échange de leur service militaire, le despotat s'assura les services d'une caste loyale d'infanterie légère et de tirailleurs qui prospéra dans la chaîne montagneuse accidentée du Pinde. Réputés pour leur mobilité et leurs tactiques de choc dévastatrices, ces soldats devinrent le principal moyen de dissuasion contre les chevaliers latins et leurs rivaux épirotes. C'est ainsi que les cols montagneux se transformèrent en goulets d'étranglement mortels pour toute force d'invasion."
 ths_thessalian_grain_exchange_advance:0 "La Bourse aux grains de Thessalie"
 ths_thessalian_grain_exchange_advance_desc:0 "La transformation des plaines de Thessalie en un grenier agricole modernisé sera achevée grâce à la création de la Bourse aux grains de Thessalie. S'éloignant du métayage médiéval, l'État encouragera l'utilisation des techniques les plus modernes, tandis que la Bourse normalisera les prix et la qualité pour le marché international. Cette centralisation économique permettra à la Thessalie d'utiliser ses excédents alimentaires comme un outil diplomatique, en approvisionnant les armées affamées d'Europe pendant les conflits en échange de concessions politiques et de nouvelles technologies. La richesse générée par ces exportations financera la création d'infrastructures qui relieront directement les mines de montagne aux ports côtiers, créant ainsi une économie nationale véritablement intégrée."
 ths_thessalian_horse_breeding_advance:0 "Élevage de chevaux en Thessalie"
 ths_thessalian_horse_breeding_advance_desc:0 "Les vastes plaines fertiles qui entourent Larissa et Trikala offrent un avantage géographique unique dans une région dominée par les montagnes : la possibilité d'élever des chevaux à grande échelle. S'inspirant de l'héritage antique de la cavalerie thessalienne, les despotes ont créé des haras publics afin de produire des montures robustes et rapides, capables de transporter des cavaliers en armure sur différents types de terrain. Cet investissement métamorphosera l'armée du despotat, car il lui permettra de disposer d'un corps de cavalerie professionnel capable de rivaliser avec les chevaliers ennemis et d'offrir ainsi à l'État un outil offensif décisif sur le champ de bataille."
 tibetan_monastic_education:0 "Système d'éducation monastique"
 tibetan_monastic_education_desc:0 "De longue date, nos institutions monastiques ont servi de centres d'apprentissage, de débat et de discipline spirituelle. Par une formation rigoureuse et une approche structurée de l'éducation, le clergé préserve un haut niveau d'intégrité intellectuelle et morale. Ces fondations soutiendront une gouvernance avisée et l'épanouissement culturel de notre royaume éclairé."
 ties_with_the_holy_see:0 "Liens avec le Saint-Siège"
 ties_with_the_holy_see_desc:0 "Des années de négociations avec le Saint-Père nous ont permis d'embrasser le $catholic$, avec la bénédiction de nos voisins $polish$ et du Pape lui-même, au cours d'un processus de christianisation qui fut turbulent. Maintenant que nous avons trouvé notre identité spirituelle, nous sommes devenus un phare du catholicisme et un bouclier contre les païens et les hérétiques qui s'infiltrent dans nos frontières."
 timariots:0 "Timariots"
 timariots_desc:0 "En offrant des terres en Timar aux cavaliers sipahis, ces derniers peuvent utiliser ces nouvelles richesses parrainées par l'État pour financer leur ravitaillement et celui de leur suite. Cela nous permet d'aligner des unités de cavalerie plus redoutables."
 timurid_architecture:0 "Architecture $TIM_ADJ$"
 timurid_architecture_desc:0 "L'architecture de la $persia_region$ fait l'envie du monde entier depuis des siècles. Nous devons promouvoir un nouveau type d'architecture afin d'occuper cette place qui nous revient de droit."
 timurid_cavalry:0 "Cavalerie $TIM_ADJ$"
 timurid_cavalry_desc:0 "Tout comme le grand $genghis_khan_name_no_tooltip$ qui dominait les steppes grâce à la puissance de sa cavalerie, nous triompherons grâce à la puissance de nos chevaux. Élevée pour la guerre la plus rigoureuse et montée par les soldats les mieux entraînés, notre cavalerie instillera la peur dans le cœur de nos ennemis."
 timurid_renaissance:0 "Renaissance $TIM_ADJ$"
 timurid_renaissance_desc:0 "Depuis l'époque de la première expansion $TIM_ADJ$, nos territoires ont attiré les plus habiles artisans et les hommes les plus sages de notre temps. Par le mécénat des arts, des sciences et de la littérature, nous avons fait de nos villes, $herat$ et $samarkand$, les joyaux les plus brillants du monde."
 tkd_fuurinkazan:0 "Fūrinkazan"
 tkd_fuurinkazan_desc:0 "« Une armée doit être preste comme le vent, majestueuse comme la forêt, dévorante comme la flamme, inébranlable comme la montagne. » Les paroles du grand maître de guerre Sun Tzu resteront à jamais ancrées dans le nom de notre famille, et deviendront notre devise."
 tkd_kai_shugo:0 "Shugo de $kai_province$"
 tkd_kai_shugo_desc:0 "En tant que descendants du Genji de $kai_province$, nous en avons toujours été le shugo. C'est pourquoi nous sommes intrinsèquement liés à cette province, dont les célèbres chevaux sont d'ores et déjà assimilés à notre cavalerie."
 tkd_takeda_ryu:0 "Takeda-ryū"
 tkd_takeda_ryu_desc:0 "Au sein de notre famille, les formes traditionnelles d'arts martiaux sont transmises de génération en génération. Nous accordons notamment une grande importance à l'équitation et au tir à l'arc à cheval, qui rendent nos troupes montées bien plus efficaces."
 tkd_tiger_of_kai:0 "Tigre de Kai"
 tkd_tiger_of_kai_desc:0 "Les bons chefs offrent une bien meilleure garantie de survie que les châteaux, aussi nombreux soient-ils. Nos généraux doivent s'entraîner dur pour leurs tâches futures et gagner le droit de porter le titre de « tigre de Kai »."
 tki_banner_of_bellflower:0 "Bannière à la campanule"
 tki_banner_of_bellflower_desc:0 "Après avoir été le shugo de $mino_province$ des générations durant, notre emblème est aujourd'hui associé à cette province. Tous les hommes qui y vivent combattront sous notre bannière."
 tki_flood_control_of_three_rivers:0 "Contrôle des crues"
 tki_flood_control_of_three_rivers_desc:0 "Dans notre province natale, les grands fleuves Kiso, Ibi et la rivière Nagara causent souvent de graves crues qui inondent les rizières. Nous devons donc contrôler ces cours d'eau afin d'accroître la fertilité de nos terres dans toutes les provinces que nous détenons."
 tki_genji_in_mino:0 "Genji de $mino_province$"
 tki_genji_in_mino_desc:0 "En tant que shugo et chefs du Genji de $mino_province$, nous gouvernons les autres samouraïs de la région depuis des générations. Notre domaine occupe une position stratégique, depuis laquelle nous pouvons contrôler les régions voisines."
 tlahtocayotl:0 "Tlahtohcāyōtl"
 tlahtocayotl_desc:0 "Nous allons créer un système de provinces pour ces cités-États intégrées dans le pays afin de centraliser notre puissance."
 tnk_expertise_in_conflicts:0 "Endurci par la guerre"
 tnk_expertise_in_conflicts_desc:0 "Tout au long de notre histoire mouvementée, nous n'avons jamais faibli face aux conflits et aux obstacles insurmontables. Nous devons en tirer parti et insuffler à notre peuple la ferveur nécessaire pour lutter en faveur de la stabilité du royaume."
 tnk_imperial_legacy:0 "Héritage impérial de Pândya"
 tnk_imperial_legacy_desc:0 "Les territoires du sud de l'$india$ ont longtemps souffert des envahisseurs étrangers et des seigneurs de guerre arrivistes qui voulaient établir leur propre domaine. Nous devons utiliser notre position unique d'ancienne dynastie pour revendiquer ces terres et ramener la stabilité et la paix sur nos terres légitimes."
 tnk_legitimate_rule:0 "Racines anciennes"
 tnk_legitimate_rule_desc:0 "Nos ancêtres ont régné sur les terres du $tamil_land_area$ pendant des siècles. En ces temps dominés par des envahisseurs étrangers, nous devrions nous appuyer sur nos liens anciens avec la terre pour justifier notre domination."
 tnk_pearls_of_india:0 "Experts de la récolte de perles"
 tnk_pearls_of_india_desc:0 "Les habitants de notre pays ont développé un talent exceptionnel pour la plongée et la récolte de perles sur nos côtes. Si cela nous procure un avantage économique évident, leur affinité naturelle pour les eaux facilitera également leur formation de marin, ce qui nous donnera un avantage militaire sur nos ennemis."
 tnk_resist_invaders:0 "Résistance experte"
 tnk_resist_invaders_desc:0 "Notre histoire mouvementée est jalonnée de victoires et de défaites presque écrasantes. Si nous voulons perdurer et dominer à nouveau en tant que dynastie, nous devons utiliser les terrains accidentés pour retarder et bloquer les armées hostiles jusqu'à ce que nous puissions organiser une résistance directe."
 toi_muay:0 "Toi Muay"
 toi_muay_desc:0 "Cet art martial enseigné à nos soldats se pratique sans armes et associe coups de poing, saisies et techniques de combat au sol. Sa maîtrise permet à nos troupes d'être plus meurtrières au combat, même si elles perdent leurs armes."
 tolerance_idea:0 "Principe de tolérance"
 tolerance_idea_desc:0 "Chaque homme a été conçu à l'image du Créateur. C'est pourquoi nous entendons que les croyances de chacun, même fausses, puissent être acceptées comme une étape menant à une conversion future à la seule vraie foi."
 tools_workshop_advance:0 "$tools_workshop$"
 tools_workshop_advance_desc:0 "$tools_workshop_desc$"
 town_rights_abs_advance:0 "Cour somptueuse"
 town_rights_abs_advance_desc:0 "En tant que siège de notre cour, notre capitale doit également exprimer la gloire et la magnificence de notre règne. Aucune autre ville ou cité ne doit pouvoir rivaliser avec elle en termes de majesté et de grandeur."
 town_rights_aod_advance:0 "Primauté de la capitale"
 town_rights_aod_advance_desc:0 "Parmi toutes les colonies de notre pays, qu'elles soient rurales ou urbaines, la plus importante est notre capitale. En tant que siège de notre cour et source de notre pouvoir, elle mérite sans conteste un traitement préférentiel par rapport aux autres colonies."
 town_rights_enable:0 "Privilèges des bourgs"
 town_rights_enable_desc:0 "Il ne fait aucun doute que toute concentration importante de personnes et d'habitations confère à une colonie un caractère bien distinct de celui de la campagne. Dans la lignée des traditions des cités romaines autonomes, nous pouvons instaurer dans ces colonies des lois et des privilèges spécifiques, marquant ainsi davantage cette différence et offrant des avantages aux habitants."
 town_rights_ref_advance:0 "Capitale évoluée"
 town_rights_ref_advance_desc:0 "À mesure que notre pays se développe, notre capitale s'agrandit elle aussi, ce qui nécessite une révision et une mise à jour constantes des lois qui la régissent. C'est uniquement avec une capitale qui fonctionne bien, dotée de lois et de privilèges parfaitement adaptés à sa superficie et à son importance, que notre pays pourra continuer à prospérer."
 town_rights_rev_advance:0 "Cœur d'une nation"
 town_rights_rev_advance_desc:0 "En tant que siège de notre gouvernement, notre capitale représente le cœur même de la nation. Ce simple fait la rend unique et lui confère un statut privilégié par rapport aux autres villes."
 tra_the_edict_of_torda:0 "L'édit de Torda"
 tra_the_edict_of_torda_desc:0 "Dans une Europe de plus en plus déchirée par des guerres religieuses sanglantes et fanatiques, la Transylvanie a courageusement promulgué l'édit de Torda, la première loi de tolérance religieuse universelle dans le monde occidental. En permettant aux catholiques, luthériens, calvinistes et unitariens de coexister au sein d'un même cadre légal, nous avons évité l'effondrement social interne et les conflits civils observés dans tout le Saint-Empire romain germanique. Cette paix religieuse sans précédent fait de notre principauté un refuge sûr pour les lettrés, scientifiques et marchands déplacés, accélérant rapidement notre adoption de réformes administratives modernes et d'influences culturelles diverses. La tolérance est devenue notre plus grand atout stratégique."
 tra_the_national_mining_academy:0 "L'Académie nationale des mines"
 tra_the_national_mining_academy_desc:0 "Nous avons créé des institutions scientifiques de renommée mondiale pour superviser l'extraction intensive de l'or, de l'argent et du sel dans les différentes chaînes de montagnes de notre nation. En appliquant les dernières techniques minéralogiques et chimiques, nous avons fait de la Transylvanie le principal trésor de la région. Cette orientation industrielle a engendré une nouvelle classe d'ingénieurs et de technocrates professionnels, qui gèrent les ressources de l'État avec une précision scientifique, assurant une stabilité économique durable."
 tra_the_transylvanian_autonomy:0 "L'autonomie transylvaine"
 tra_the_transylvanian_autonomy_desc:0 "Tandis que la Transylvanie est restée une partie du royaume de Hongrie, les nobles locaux roumains, saxons et hongrois ont tous conservé un niveau unique d'autonomie régionale sous leur propre voïvode, et ainsi vécu en paix. Cette gouvernance partagée a permis à chacun de préserver ses croyances et ses coutumes distinctes malgré leurs différences apparentes. Une collaboration interne qui a assuré un certain degré de paix intérieure et de multiculturalisme au cœur des Carpates."
 tra_the_transylvanian_trade_guilds:0 "Les guildes marchandes de Transylvanie"
 tra_the_transylvanian_trade_guilds_desc:0 "Dans les villes animées de l'arc carpatique, les marchands issus de nos principaux groupes culturels ont commencé à s'organiser en guildes et en confréries commerciales, souvent en concurrence ou en coopération les uns avec les autres. Cela urbanise une partie de la population, créant une classe moyenne qui finance des écoles et imprime des livres. Cet essor économique permettra à notre nation de dépasser le cadre villageois pour entrer dans le marché des idées et du commerce mondial."
 tra_the_vauban_transylvanian_bastion_synthesis:0 "La synthèse des bastions"
 tra_the_vauban_transylvanian_bastion_synthesis_desc:0 "À l'apogée de l'ère de la poudre à canon, nous avons adopté une école unique d'architecture militaire, adaptant les derniers modèles italiens et français de #italic tracé à l'italienne#! à la géographie accidentée et calcaire de l'intérieur des Carpates. Nos principaux centres administratifs ont été refortifiés avec des bastions angulaires et bas, capables d'absorber les tirs d'artillerie de siège lourde. Contrairement aux immenses murailles de pierre du passé, ces ouvrages modernes en terre et en briques sont conçus pour la défense active, avec des champs de tir imbriqués pour le corps d'artillerie en expansion de la principauté. Cette doctrine défensive garantit que toute armée envahisseuse est saignée à blanc au cours d'une série de sièges prolongés et coûteux avant de pouvoir menacer le cœur de l'État."
 tra_unio_trium_nationum:0 "Unio Trium Nationum"
 tra_unio_trium_nationum_desc:0 "En réponse aux menaces de révoltes paysannes, nos classes supérieures ont formé « l'Union des Trois Nations ». Ce cadre juridique complexe et rigide exclut la majorité des roturiers, mais crée un noyau administratif très stable, fortifié et loyal pour la région. Cette unité interne offre à la Couronne une base fiable de soldats professionnels urbains et féodaux."
 trade_advance_age_of_trad:0 "Rencontres commerciales"
 trade_advance_age_of_trad_desc:0 "Au fur et à mesure que les routes commerciales se rétablissaient ou se développaient durant le Moyen Âge, de nouvelles pratiques virent le jour. Les foires commerciales étaient des événements de grande envergure organisés chaque année dans les villes, où les marchands de différentes régions pouvaient se rencontrer et négocier."
 trade_caravans:0 "Caravanes commerciales"
 trade_caravans_desc:0 "Des routes commerciales lucratives traversent notre territoire depuis l'Antiquité. Notre peuple est habitué à interagir avec de longues caravanes de marchands qui échangent des marchandises venues de terres lointaines."
 trade_center_building_country_advance:0 "Carrefours commerciaux"
 trade_center_building_country_advance_desc:0 "À l'aide de techniques habiles, nous pouvons facilement rendre nos marchés contrôlés plus attractifs pour les commerçants étrangers, et ainsi augmenter nos bénéfices."
 trade_companies_advance:0 "Compagnies commerciales"
 trade_companies_advance_desc:0 "Il a toujours été évident que l'argent fait tourner le monde. Avec la découverte d'un nombre croissant de produits dans des contrées lointaines, les sociétés commerciales spécialisées dans leur exploitation et leur distribution sont assurées de réaliser d'importants bénéfices."
 trade_envoys:0 "Émissaires commerciaux"
 trade_envoys_desc:0 "Avec l'augmentation récente du commerce en provenance et à destination de pays lointains, nos émissaires ont commencé à rejoindre des expéditions commerciales afin d'établir des contacts diplomatiques avec des pays auparavant hors de notre portée."
 trade_manipulation:0 "Manipulation du marché"
 trade_manipulation_desc:0 "Dans tous ces carrefours importants où les flux commerciaux peuvent facilement être redirigés dans une direction ou une autre, le moindre avantage peut emporter la décision et nous permettre d'accroître nos revenus commerciaux."
 trade_ports_in_the_channel:0 "Ports commerciaux de la Manche"
 trade_ports_in_the_channel_desc:0 "Notre position stratégique le long de la Manche nous permet de prospérer en tant que plaque tournante du commerce. En investissant dans nos ports et nos infrastructures marchandes, nous serons maîtres du commerce régional tout en réduisant les coûts de nos opérations outre-mer."
 trade_range_advance_age_2:0 "Marchés lointains"
 trade_range_advance_age_2_desc:0 "Le développement économique fait émerger de nouvelles opportunités. Alors que les courts trajets commerciaux étaient auparavant très profitables, les itinéraires longs rapportent désormais plus d'argent. Nos navires marchands naviguent plus loin pour décrocher les meilleures offres."
 trade_range_advance_age_3:0 "Navires marchands améliorés"
 trade_range_advance_age_3_desc:0 "Avec le développement de navires plus grands, disposant d'équipages moins nombreux et pouvant naviguer plus longtemps sans s'arrêter, la portée de nos efforts commerciaux sera considérablement accrue."
 trade_through_owned_disc_advance:0 "Pistes marchandes"
 trade_through_owned_disc_advance_desc:0 "Les marchands restent rarement en place, toujours à la recherche des échanges les plus rentables. Leur va-et-vient incessant est une scène familière dans nos contrées. Ils vont même jusqu'à tracer leurs propres chemins pour raccourcir les distances qu'ils doivent parcourir."
 trading_embassies:0 "Ambassades commerciales"
 trading_embassies_desc:0 "Bon nombre de marchands opèrent dans nos eaux, ce qui nous apprend des choses sur les royaumes lointains. Nous devrions installer des ambassades dans ces pays afin de nous tenir informés des affaires du monde."
 trading_hub_advance:0 "Carrefour commercial"
 trading_hub_advance_desc:0 "$trading_hub_desc$"
 trading_links:0 "Liens commerciaux"
 trading_links_desc:0 "Notre pays est un carrefour commercial depuis l'Antiquité. Notre proximité avec l'$india$ et la $china$ a permis la circulation du commerce sur nos terres et, par conséquent, enrichit les relations et les interactions avec les nombreux pays qui nous entourent."
 tradition_of_payment:0 "Paiements en temps et en heure"
 tradition_of_payment_desc:0 "Il est difficile de résister à l'envie de payer les mercenaires avec quelques jours de retard : après tout, on ne sait jamais quelles dépenses imprévues peuvent survenir. Mais nous résisterons à la tentation et les paierons rubis sur l'ongle, de façon que les capitaines mercenaires s'en souviennent bien."
 training_fields_advance:0 "Terrain d'entraînement"
 training_fields_advance_desc:0 "$training_fields_desc$"
 trampling_horde:0 "Une Horde ravageuse"
 trampling_horde_desc:0 "$genghis_khan_name_no_tooltip$ a fait trembler le monde par ses conquêtes, et nous ferons de même. Le monde apprendra à craindre le galop de nos chevaux."
 trans_sahara_trade:0 "Commerce transsaharien"
 trans_sahara_trade_desc:0 "Les marchands rapportent souvent des objets fascinants des cours maghrébines. Peut-être devrions-nous leur demander d'en rapporter davantage ?"
 trans_saharan_trade:0 "Commerce transsaharien"
 trans_saharan_trade_desc:0 "Les caravanes des grandes routes du Sahara transportent du sel depuis l'Afrique du Nord en échange d'esclaves et d'or venus des royaumes subsahariens. Nous bâtirons notre avenir grâce à l'afflux de ces nouveaux revenus."
 tre_byzantine_birthright:0 "Comté $BYZ_ADJ$"
 tre_byzantine_birthright_desc:0 "Le grand Empire $BYZ_ADJ$ dirigé par nos ancêtres était vraiment quelque chose à voir. C'est par la tromperie et la trahison que nous en avons été chassés, avant de rassembler nos forces et de nous relever. Personne ne doutera de notre autorité."
 tre_empire_in_exile:0 "Empire en exil"
 tre_empire_in_exile_desc:0 "Nous avons hérité d'une partie de l'administration de notre ancien empire, ce qui nous a permis de maintenir l'ordre et la gouverne malgré nos piètres conditions de vie."
 tre_grand_komnenoi:0 "Grands Comnènes"
 tre_grand_komnenoi_desc:0 "La dynastie $komnenos_dynasty$ a certes été chassée du trône de l'empire $BYZ_ADJ$ dans le passé, mais sa gloire n'a jamais été éteinte. La reconnaissance que notre lignée a obtenue est toujours d'actualité, et le respect que notre peuple et les autres pays nous portent n'est pas immérité."
 tre_greek_stronghold:0 "Bastion $greek_language$"
 tre_greek_stronghold_desc:0 "Depuis l'Antiquité, le $greek_language$ est la langue de l'éducation et de la science. Lorsque nos ancêtres ont débarqué sur nos terres, ils n'ont pas seulement apporté leurs lois, mais aussi leur culture et leur langue. La tradition d'enseignement du $greek_language$ est bien vivante dans notre pays."
 tre_komnenoi_princesses:0 "Princesses comnènes"
 tre_komnenoi_princesses_desc:0 "La dynastie $komnenos_dynasty$ a donné naissance à de nombreuses femmes remarquables, et nombre de dirigeants d'$europe$ voire d'infidèles ont demandé leur main en mariage. Notre lignée est très respectée, et nos princesses le sont à double titre, car elles permettent aux pays étrangers de revendiquer la légitimité de notre lignée, et à nous de maintenir notre influence sur leur cour."
 tre_komnenos_legacy:0 "Héritage des $komnenos_dynasty$s"
 tre_komnenos_legacy_desc:0 "N'oublions pas que nous sommes les descendants des $komnenos_dynasty$ qui ont régné sur l'empire $BYZ_ADJ$. Bien que nous soyons aujourd'hui à la tête d'un autre État, l'héritage et le prestige de notre dynastie restent indéniables."
 tre_lessons_of_the_fourth_crusade:0 "Les leçons de la IVe Croisade"
 tre_lessons_of_the_fourth_crusade_desc:0 "Isaakios Angelos, qui a déposé notre lignée en 1185, a lui-même été déposé et rendu aveugle ; puis, sous prétexte de remettre le vieux fou aveugle sur le trône, les troupes de $VEN_ADJ$ ont mis à sac $constantinople$ en 1204. S'il y a quelque chose à retenir de tout cela, c'est que la trahison et la tromperie sont omniprésentes dans la lutte pour le pouvoir, mais qu'elles sont aussi ce qui assure la victoire."
 tre_pontic_mountains:0 "Montagnes $pontic_greek_culture$s"
 tre_pontic_mountains_desc:0 "Tout comme les Alpes séparent les Français et les Italiens, les montagnes $pontic_greek_culture$s séparent notre dernier bastion $greek_culture$ en $anatolia_region$ des envahisseurs $turkic_group$s qui se sont emparés du plateau anatolien. Le Pont a toujours été plus $greek_culture$ que le reste de l'$anatolia_region$. Peut-être l'héritage du grand Mithridate saura-t-il inspirer nos guerriers et semer autant de peur dans le cœur des Turcs qu'il le fit dans celui des Romains ?"
 tre_pontic_trail_mastery:0 "Maîtrise des chemins $pontic_greek_culture$s"
 tre_pontic_trail_mastery_desc:0 "Nos territoires sont notre foyer, nos forêts sont notre jardin. Nous en connaissons les moindres recoins. Chaque chemin, chaque piste qui s'y trouve est connu de nous, et nous saurons en tirer parti si quiconque ose nous envahir."
 tre_princes_of_the_lazes:0 "Princes des $laz_culture$s"
 tre_princes_of_the_lazes_desc:0 "Les $laz_culture$s vivent ici depuis des siècles. Si notre Empire trouve ses origines chez les $greek_culture$s, il est vrai que les $laz_culture$s n'ont pas quitté nos frontières. C'est pourquoi nombre de nos ennemis nous appellent les $tre_princes_of_the_lazes$ en signe de mépris. Cependant, peu importe leurs efforts, cela ne diminue en rien nos revendications, et nous porterons ce titre avec fierté."
 tre_strategic_marriages:0 "Mariages stratégiques"
 tre_strategic_marriages_desc:0 "Ce n'est pas seulement par la force que l'on conquiert royaumes et empires. En établissant des liens matrimoniaux étroits avec les nations qui nous entourent, nous aurons une chance de leur succéder sur leur trône. #italic A minima#!, nous étendrons notre influence sur eux."
 tre_terminus_of_the_silk_road:0 "Terminus de la Route de la soie"
 tre_terminus_of_the_silk_road_desc:0 "Même à l'époque antique, sous son nom de Trébizondais, les anciens $greek_culture$s avaient constaté l'utilité de ce lieu, où la voie terrestre qui traverse l'$asia$ rencontre la route maritime qui mène à la Méditerranée. Nous étions devenus le point d'arrivée de la grande Route de la soie, les marchandises de $china$ et d'$india$ traversaient notre territoire avant d'arriver en $europe$. Il n'y a aucune raison de ne pas chercher à capter une partie des richesses qui y transitent."
 tre_trapezuntine_endurance:0 "Endurance $TRE_ADJ$e"
 tre_trapezuntine_endurance_desc:0 "Chassée de notre pays, notre lignée a survécu. Obligé de vivre dans une région montagneuse entourée d'ennemis, notre peuple a prospéré. Nous savons tirer le meilleur parti des événements, quels qu'ils soient, et de toutes les ressources dont dispose notre peuple."
 tre_trapezuntine_monasteries:0 "Monastères $TRE_ADJ$s"
 tre_trapezuntine_monasteries_desc:0 "C'est notre foi qui sauve l'âme de notre peuple. C'est le clergé qui veille sur son salut. Que sont donc nos monastères, sinon la source et l'origine de ce salut ?"
 tree_of_peace:0 "Arbre de la paix"
 tree_of_peace_desc:0 "Héritage du Grand Pacificateur, l'Arbre de la paix symbolise notre engagement à unir les différentes tribus. C'est également une représentation des chefs eux-mêmes."
 tri_balance_the_landstande:0 "Équilibre des Landstände"
 tri_balance_the_landstande_desc:0 "Notre territoire abrite à la fois de nombreuses zones urbaines et les châteaux de bon nombre de chevaliers impériaux. Il n'est pas facile de trouver un équilibre entre eux et leurs intérêts souvent divergents. Ce n'est que s'ils coopèrent avec nous et le chapitre de la cathédrale que nous pourrons garantir le bon fonctionnement de notre gouvernement."
 tribal_cultural_identity_law_advance:0 "$tribal_cultural_identity_law$"
 tribal_cultural_identity_law_advance_desc:0 "$tribal_cultural_identity_law_desc$"
 tribal_migration_law_advance:0 "$tribal_migration_law$"
 tribal_migration_law_advance_desc:0 "$tribal_migration_law_desc$"
 tribal_modernization_law_advance:0 "$tribal_modernization_law$"
 tribal_modernization_law_advance_desc:0 "$tribal_modernization_law_desc$"
 tribal_religious_values_law_advance:0 "$tribal_religious_values_law$"
 tribal_religious_values_law_advance_desc:0 "$tribal_religious_values_law_desc$"
 tributary_system:0 "Système des tributaires"
 tributary_system_desc:0 "Un système de chefs de guerre et de dirigeants locaux assujettis, qui nous envoient des cadeaux en signe de soumission à notre suprématie. Affiner et centraliser ce système ne ferait que renforcer notre emprise sur eux."
 tribute_system:0 "Système du tribut"
 tribute_system_desc:0 "Imposer un système de tribut annuel à nos vassaux permet d'accroître nos revenus."
 tu_bing:0 "Tǔ bīng"
 tu_bing_desc:0 "Alors que nous nous efforçons de défendre correctement nos frontières, il est devenu évident que nous devons créer un système de recrutement centré sur les soldats locaux et les combattants. Ces hommes constituent un atout majeur pour nos capacités militaires et sont distincts du système #italic Wèi suǒ#!."
 tulip_period:0 "L'Ère des tulipes"
 tulip_period_desc:0 "Nous réformerons les traditions anciennes et stagnantes, ferons fleurir des tulipes dans tous les jardins et inaugurerons un nouvel âge d'or du commerce et des relations."
 tunisian_corsairs:0 "Corsaires tunisiens"
 tunisian_corsairs_desc:0 "Depuis leurs places fortes de Tunis et de La Goulette, nos corsaires dominent la Méditerranée. Grâce à leurs galères rapides et au soutien de l'État, ils inspirent la crainte aux marchands étrangers et stimulent notre force navale avec une efficacité impitoyable."
 turco_mongol_tradition:0 "Traditions turco-mongoles"
 turco_mongol_tradition_desc:0 "Bien que la dynastie $Borjigin$ soit d'origine $mongolian_culture$e, les territoires conquis par $genghis_khan_name_no_tooltip$ en $central_asia$ étaient principalement peuplés par les $turkic_group$s. Par conséquent, un mélange distinct de culture a émergé entre ces deux groupes."
 turco_persian_tradition:0 "Traditions turco-perses"
 turco_persian_tradition_desc:0 "Il est indéniable que la $persia_region$ a toujours été le cœur de la culture et de la langue de la région, influençant les différents peuples $turkic_group$s qui se sont succédé pendant des siècles. Nous allons promouvoir ce mélange pour créer notre propre tradition culturelle."
 turkic_traditions:0 "Traditions turciques"
 turkic_traditions_desc:0 "Nous venons des steppes. Le vent, les difficultés et le frisson de la bataille couleront à jamais dans notre sang. Ne l'oublions jamais."
 tuscan_municipal_reforms:0 "Réformes militaires toscanes"
 tuscan_municipal_reforms_desc:0 "À mesure que nous entrons dans l'ère de l'absolutisme et de l'autorité centralisée, nous devons revisiter l'administration locale et réformer nos systèmes de manière appropriée si nous voulons mettre à profit nos capacités régulatrices."
 tuscan_new_trade_system:0 "Nouveau système commercial toscan"
 tuscan_new_trade_system_desc:0 "L'ère des guildes commerciales approche lentement, car leur influence s'affaiblit face à une puissance centralisée absolue. En réformant leur administration et en transférant l'essentiel du contrôle à l'État, nous sommes assurés d'accroître nos profits."
 tuscan_physiocratic_reforms:0 "Réformes physiocratiques toscanes"
 tuscan_physiocratic_reforms_desc:0 "En renforçant nos secteurs agricoles et en prenant soin de notre peuple, nous arriverons sans nul doute à créer une base durable pour nos systèmes économiques nouvellement modernisés."
 tuscan_uffizi:0 "Uffizi"
 tuscan_uffizi_desc:0 "Conçu à l'origine pour consolider l'administration des guildes et des agences, l'Uffizi ou musée des Offices est une source importante de pouvoir centralisé, qui présente également de nombreuses œuvres d'art en signe de supériorité culturelle et de démonstration d'influence."
 tusi_titles:0 "Titres de tǔsī"
 tusi_titles_desc:0 "Accordés aux seigneurs de la guerre et aux hommes forts locaux, ces postes administratifs sont utilisés pour réprimer les troubles et maintenir la population rurale sous le contrôle du pouvoir central."
 two_realms:0 "Deux royaumes"
 two_realms_desc:0 "En raison de la taille de notre royaume, notre juridiction s'inscrit dans deux cadres distincts. Au nord se trouve le cœur de nos territoires, qui embrasse fièrement nos traditions culturelles. En revanche, le sud et l'est présentent souvent des divergences par rapport à nos règles ancestrales. Le respect de cette diversité ne peut que renforcer notre position géopolitique."
 tws_capable_vicars:0 "Vicaires compétents"
 tws_capable_vicars_desc:0 "La gouvernance des deux rives du détroit de Messine pose une difficulté particulière pour notre pays unifié. Comme notre dirigeant ne peut être présent que d'un seul côté à la fois, l'autre doit être confié à un vicaire qui gouvernera en notre nom. Nous devons veiller à nommer à cette fonction essentielle uniquement les personnes les plus compétentes et les plus dignes de confiance afin d'éviter toute corruption."
 tws_ensure_loyal_families:0 "Loyauté des familles nobles"
 tws_ensure_loyal_families_desc:0 "Les familles nobles des Deux-Siciles exercent un pouvoir considérable à notre place. En leur accordant des rôles prestigieux mais insignifiants à la cour, nous garantirons leur loyauté ainsi que la stabilité au sein de nos campagnes."
 tws_oversea_ambitions:0 "Ambitions outre-mer"
 tws_oversea_ambitions_desc:0 "Étendre nos territoires en Italie est une tâche difficile, car cela implique de naviguer au sein d'un réseau d'alliances périlleux et de risquer de s'attirer les foudres du pape lui-même. Nous devrions par conséquent nous tourner vers l'outre-mer, où des richesses potentielles nous attendent sur les territoires d'Afrique du Nord et de Grèce."
 tws_protect_the_coastline:0 "Augmenter les patrouilles maritimes"
 tws_protect_the_coastline_desc:0 "Notre littoral est vaste et vulnérable aux raids initiés par des pirates à la recherche d'esclaves. Nous devons mettre en place une flotte pour patrouiller, protéger et, à terme, vaincre cette menace ignoble qui pèse sur notre peuple."
 tws_revitalize_the_lands:0 "Attirer de nouvelles personnes"
 tws_revitalize_the_lands_desc:0 "Les dirigeants précédents ont accordé trop d'importance à certaines contrées de notre pays. Si nous voulons conserver notre mainmise sur les Deux-Siciles, nous devons investir de manière égale et équitable dans les deux parties. Pour atteindre cet objectif, l'une des mesures à prendre consiste à inciter la population à s'installer dans les contrées jusqu'alors négligées."
 tws_unified_legal_code:0 "Code juridique uniformisé"
 tws_unified_legal_code_desc:0 "Les territoires qui constituent notre pays ont été le théâtre de nombreuses révoltes en raison de l'application injuste des lois. Afin d'éviter que cela ne se reproduise, nous devons harmoniser notre code juridique et garantir que nos lois sont appliquées de manière équitable. Cela permettra sans conteste d'empêcher que ces révoltes s'enveniment."
 uc_bey_advance:0 "$uc_bey$"
 uc_bey_advance_desc:0 "$uc_bey_desc$"
 ues_double_shugo:0 "Shugo de deux provinces"
 ues_double_shugo_desc:0 "Nous avons été nommés shugo des provinces de $kouzuke_province$ et de $tango_province$. La richesse de ces terres servira bien notre expansion."
 ues_dragon_of_echigo:0 "Dragon d'Echigo"
 ues_dragon_of_echigo_desc:0 "Notre clan nourrit un esprit de courage et de justice, qui fait que nos ennemis nous craignent sur le champ de bataille. Faisons connaître au monde la force des chefs du clan. Tout le monde doit apprendre à redouter le dragon d'Echigo."
 ues_eastern_power:0 "Puissance orientale"
 ues_eastern_power_desc:0 "Bien que nous ayons reçu des territoires tant à l'est qu'à l'ouest du $japan_region$, c'est à l'est que nous pourrons davantage prospérer. Dans ces riches contrées, nous trouverons de nombreux guerriers prêts à se battre pour notre cause."
 ues_strong_dynastic_ties:0 "Forts liens dynastiques"
 ues_strong_dynastic_ties_desc:0 "Notre famille descend de la prestigieuse lignée Fujiwara, et étant donné que la mère d'Ashikaga Takauji appartient à notre clan, nous sommes également étroitement liés à la famille Ashikaga. Ces liens dynastiques se révéleront d'une importance capitale pour la prospérité de notre clan."
 ukrainian_farmlands:0 "Terres arables ukrainiennes"
 ukrainian_farmlands_desc:0 "L'Ukraine, ou « les terres frontalières » en langue $slavic$, est l'une des régions les plus fertiles d'$europe$. Les terres situées de part et d'autre des grands cours d'eau sont réputées pour leur riche sol noir, qui offre des récoltes abondantes de céréales, de légumineuses et de plantes textiles. Quiconque détient ces territoires bénéficie d'un avantage agricole considérable, approvisionnant les greniers de son royaume et les marchés d'$europe$."
 unchanging_tradition:0 "Tradition immuable"
 unchanging_tradition_desc:0 "La tradition transmise par Jésus-Christ et ses apôtres est restée fidèle à ses origines, sans le moindre ajout, altération ni retrait. Il en va ainsi car la foi elle-même est immuable et pratiquée par tous à travers le monde."
 unified_armies:0 "Armées unifiées"
 unified_armies_desc:0 "Nul ne saurait contester le fait que l'$muslim$ s'est diffusé au sein de nombreux peuples et cultures depuis son émergence dans la région d'$arabia_region$. Chaque fidèle, tant qu'il croit en $muslim_god_name$, devrait pouvoir combattre en Son nom, quelle que soit son origine."
 unify_priestly_class_advance:0 "Unification de la classe ecclésiastique"
 unify_priestly_class_advance_desc:0 "Pendant une grande partie de notre histoire, le sacerdoce chargé des terres sacrées et des revenus des temples a fonctionné de manière décentralisée. Cependant, des évolutions récentes au sein d'institutions religieuses étrangères ont introduit de nouvelles idées d'organisation et d'autorité centrale. Ces influences encouragent désormais l'unification et la coordination de notre propre hiérarchie sacerdotale."
 unique_architecture:0 "Architecture unique"
 unique_architecture_desc:0 "L'isolement relatif de nos patriarcats a donné lieu à des styles architecturaux uniques pour nos lieux saints. Bien que d'autres confessions $christian_ADJ$nes aient pu être plus proéminentes, nos styles architecturaux uniques peuvent de la même manière conquérir le cœur des fidèles."
 unite_the_tribes:0 "Union des tribus"
 unite_the_tribes_desc:0 "Depuis la naissance de notre nation, les Jürchens ont été unifiés et divisés en de multiples tribus et alliances, pas toujours amicales. Cette dynamique perdure depuis toujours, de même que le désir de plusieurs dirigeants d'unifier toutes les tribus sous une même bannière."
 united_faith:0 "Une foi unie"
 united_faith_desc:0 "Nous devons veiller à l'unité de notre foi en toutes circonstances. Notre clergé doit parler d'une seule voix et il ne faut pas de discorde entre les factions de fidèles afin qu'il puisse se concentrer sur ses fonctions premières, à savoir guider notre peuple et le rassurer."
 university_advance:0 "Université"
 university_advance_desc:0 "$university_desc$"
 university_naples:0 "L'Université de Naples"
 university_naples_desc:0 "Fondée en 1224 par l'empereur Frédéric II, l'université de Naples est l'une des plus anciennes institutions publiques de l'Italie. Adoptant une doctrine laïque, elle a fourni une éducation complète à des générations d'étudiants et contribué au développement d'avancées intellectuelles dans divers domaines."
