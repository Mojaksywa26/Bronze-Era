 urbanization:0 "Urbanisation"
 urbanization_desc:0 "Les nouvelles opportunités et le sentiment de sécurité proposés par les cités émergentes séduisent de plus en plus d'habitants des milieux ruraux, qui déménagent en ville pour venir travailler dans les usines modernes."
 urbanization_decrees:0 "Décrets d'urbanisme"
 urbanization_decrees_desc:0 "Afin de moderniser $prague$, nous devons donner des instructions et des subventions à des personnages importants de la ville pour les rediriger vers la capitale, attirer les étrangers et leur offrir une chance d'améliorer leur statut social dans notre magnifique métropole."
 usa_bill_of_rights:0 "Déclaration des droits"
 usa_bill_of_rights_desc:0 "#italic ...ou qui restreigne la liberté de la parole ou de la presse, ou le droit qu'a le peuple de s'assembler pacifiquement et d'adresser des pétitions au gouvernement pour obtenir réparation de ses griefs.#!"
 usa_declaration_of_independence:0 "Déclaration d'indépendance"
 usa_declaration_of_independence_desc:0 "#italic Nous tenons pour évidentes pour elles-mêmes les vérités suivantes : tous les hommes sont créés égaux.#! \\n\\nPar cette déclaration audacieuse, nous briserons les chaînes de la l'asservissement et embrasserons notre destin commun."
 usa_empowered_assemblies:0 "Assemblées autonomes"
 usa_empowered_assemblies_desc:0 "Des assemblées élues émergèrent dans toutes les colonies, donnant aux propriétaires terriens le pouvoir de se gouverner eux-mêmes. Les humbles origines de la liberté résident dans les couloirs de ces institutions."
 usa_era_good_feelings:0 "Ère de bonne entente"
 usa_era_good_feelings_desc:0 "À la suite des épreuves, la paix et l'unité ont apporté un rare moment d'harmonie nationale. Le peuple s'épanouit dans l'ordre et l'optimisme."
 usa_great_awakening:0 "Grand réveil"
 usa_great_awakening_desc:0 "Une vague de renouveau religieux balaie le pays, qui défie les anciennes autorités et réveille la conscience morale d'un peuple en ascension."
 usa_mayflower_compact:0 "Pacte du Mayflower"
 usa_mayflower_compact_desc:0 "Unis par un péril et un but communs, les premiers colons rédigèrent un pacte de gouvernance autonome. Même au cœur de la nature sauvage, les graines de la société et du compromis trouvèrent un terreau fertile."
 usa_recognized_sovereignty:0 "Souveraineté reconnue"
 usa_recognized_sovereignty_desc:0 "Les traités et la diplomatie ont confirmé ce que nos luttes ont acquis. Notre place sur la scène diplomatique est désormais reconnue."
 ushkuiniks:0 "Les ouchkouïniks"
 ushkuiniks_desc:0 "Les pirates ouchkouïniks, qui suivent le mode de vie des Vikings, sont un outil efficace pour nous débarrasser de nos rivaux. Malheureusement, les interventions extérieures, principalement de la part de Moscou, leur ont porté un coup rude. Nous devons leur fournir à nouveau une aide financière pour leur permettre de reprendre la mer et de rappeler à tous qui sont les véritables maîtres du Nord..."
 utn_fujiwara_descendant:0 "Descendants des Fujiwara"
 utn_fujiwara_descendant_desc:0 "La généalogie indique que les ancêtres de notre clan étaient à l'origine des membres de la maison Fujiwara de $kyoto$. Cette parenté avec une famille aussi ancienne et vénérable est un avantage dont nous pouvons tirer parti dans les relations diplomatiques avec la cour impériale et les autres clans."
 utn_legacy_of_nasu_no_yoichi:0 "Héritage de Nasu no Yoichi"
 utn_legacy_of_nasu_no_yoichi_desc:0 "$shimotsuke_province$ était autrefois la résidence de Nasu no Yoichi, un très célèbre archer de l'ancienne guerre de Genpei. Aujourd'hui encore, les guerriers de $shimotsuke_province$ le tiennent en haute estime, et l'on nous considère comme les meilleurs archers du Kantō."
 utn_mediator_of_kanto:0 "Médiateurs du Kantō"
 utn_mediator_of_kanto_desc:0 "En tant que l'un des clans les plus anciens du Kantō, nous disposons d'une grande connaissance sur la politique de la région et avons pu agir à de nombreuses reprises en tant que médiateurs entre différentes factions. Cela nous offre aussi le moyen d'étendre nos territoires de façon efficace, sans provoquer ni la peur ni la haine des autres."
 utr_blessed_land:0 "Une terre bénie"
 utr_blessed_land_desc:0 "Le pape lui-même influence l'élection de notre prince-évêque, contrairement à l'élection traditionnelle en cinq chapitres que nous avions auparavant. C'est une preuve évidente que notre pays est béni."
 utr_city_churches:0 "La cité des églises"
 utr_city_churches_desc:0 "Utrecht, souvent appelée la #italic cité des églises#! pour ses nombreux clochers, abrite l'emblématique tour de la cathédrale. Centre spirituel des Pays-Bas et siège de l'évêché d'Utrecht, elle est un phare depuis l'Antiquité."
 utr_skilled_diplomats:0 "Diplomates de talent"
 utr_skilled_diplomats_desc:0 "Avec l'influence croissante de nos voisins, la survie de notre pays dépend de notre capacité à obtenir des alliés puissants et loyaux qui nous soutiendront en cas de besoin."
 vaccination_advance:0 "Vaccination"
 vaccination_advance_desc:0 "Grâce au développement des vaccins, les médecins sont en mesure d'immuniser la population contre des maladies mortelles. Ces vaccins contribuent à réduire la propagation des maladies et à prévenir les épidémies. En injectant dans le corps une petite quantité de bactéries ou de virus affaiblis ou morts, le système immunitaire est capable de reconnaître et de combattre la maladie s'il la rencontre à nouveau."
 valley_irrigation:0 "Irrigation des vallées"
 valley_irrigation_desc:0 "La construction de vastes canaux permettant de relier les sources d'eau issues de vallées différentes nous permet d'améliorer considérablement nos techniques d'irrigation et la productivité du pays."
 variety_in_divine_identity_advance:0 "Variété d'identités divines"
 variety_in_divine_identity_advance_desc:0 "Notre panthéon abrite une remarquable diversité de divinités, chacune incarnant différentes vertus, arts et idéaux. Cette richesse permet à chaque individu de trouver un patron divin en résonance avec sa vie et sa vocation. Le modeste autel d'un forgeron dédié à Héphaïstos porte un sens égal à la noble dévotion offerte à Zeus."
 varna_system:0 "Système Varna"
 varna_system_desc:0 "Depuis l'époque des $vedah$, le concept du dharma d'un individu est divisé en quatre castes : les #italic brahmanes#!, prêtres ou lettrés ; les #italic kshatriyas#!, dirigeants ou guerriers ; les #italic vaishyas#!, fermiers ou marchands ; et les #italic shudras#!, artisans ou serviteurs. Bien que ces classes ne soient pas strictement figées et représentent davantage l'idéal de la vocation d'un individu, elles ont malgré tout été très influentes dans la société $hindu_ADJ$e."
 vauban_fortifications:0 "Fortifications innovantes"
 vauban_fortifications_desc:0 "Si Vauban n'a pas fait évoluer radicalement la conception des fortifications, son génie réside dans l'emplacement choisi pour ses forteresses. En tirant le meilleur parti des caractéristiques du terrain, un fort peut devenir beaucoup plus difficile à capturer."
 veche_advance:0 "Le vétché"
 veche_advance_desc:0 "$veche_advance$ est une assemblée populaire dont les origines remontent aux anciennes réunions tribales qui se tenaient bien avant l'ère des Russes. Il s'agit de la plus haute autorité judiciaire et législative de l'État."
 vedah:0 "Védas"
 vedah_desc:0 "Les principaux textes parmi les $sruti$ sont les $vedah$, qui sont les plus anciens textes en $sanskrit_language$. Leur paternité est attribuée à Brahmā dans ls $mahabarata$. Ils sont composés du Ṛgveda, du Yajurveda, du Sāmaveda et de l'Atharvaveda."
 vegetarianism:0 "Végétarisme"
 vegetarianism_desc:0 "Bien que cet aspect varie selon les écoles, le dharma comporte des règles restreignant la consommation de chair animale. Chaque branche est plus ou moins stricte vis-à-vis de cette abstinence, qui peut ne s'appliquer qu'à la communauté monastique ou bien à l'ensemble de la population."
 ven_gothic_architecture:0 "Architecture gothique"
 ven_gothic_architecture_desc:0 "Véritable trésor de notre patrimoine, l'$ven_gothic_architecture$ vénitienne, qui mêle influences islamiques et bâtiments de style byzantin, est très appréciée par l'élite. De nombreux nobles et marchands prospères soutiennent financièrement ce style d'architecture."
 ven_magistrato_alla_sanita:0 "Magistrato alla Sanità"
 ven_magistrato_alla_sanita_desc:0 "Le #italic $ven_magistrato_alla_sanita$#!, ou Magistrature de la santé, est un bureau qui occupe une fonction capitale : il exerce une surveillance constante pour prévenir les maladies et les épidémies au sein de notre nation."
 ven_mixed_naval_tactics:0 "Tactiques navales mixtes"
 ven_mixed_naval_tactics_desc:0 "Depuis sa création, la marine vénitienne repose sur les rameurs. Cependant, le temps ne s'est pas montré clément envers eux, car les voiliers jouent un rôle de plus en plus prépondérant dans les combats en Méditerranée. Notre marine doit s'y adapter en associant son meilleur atout aux grandes galéasses."
 ven_naval_conscription:0 "Conscription navale"
 ven_naval_conscription_desc:0 "Depuis la fondation même de Venise, les rameurs embarqués sur nos galères sont des hommes libres engagés contre salaire. Hélas, une pénurie d'hommes rend le recrutement de rameurs qualifiés plus difficile ; aussi n'avons-nous d'autre choix que de recourir à la conscription pour nos galères."
 ven_printing_industry:0 "Industrie de l'imprimerie"
 ven_printing_industry_desc:0 "Depuis l'invention de l'imprimerie, les Vénitiens ont démontré une aptitude particulière à l'utiliser. Les bénéfices pour la cité étant manifestes, nous devrions encourager cette industrie."
 ven_provveditori_ai_beni_inculti:0 "Provveditori ai beni inculti"
 ven_provveditori_ai_beni_inculti_desc:0 "Les provéditeurs des terres incultes sont chargés de l'assèchement des marais et de l'irrigation des terres arides. L'objectif est d'améliorer le ravitaillement de Venise en nourriture."
 ven_ship_mounted_gunpowder_weapons:0 "Armes à poudre sur les navires"
 ven_ship_mounted_gunpowder_weapons_desc:0 "Depuis des millénaires, les affrontements sur les mers s'apparentent davantage à des batailles terrestres sur des planches flottantes qu'à de véritables combats entre navires. L'avènement des armes à poudre nous permet de rompre avec cette guerre à l'ancienne et d'anéantir les navires ennemis avant même qu'ils ne s'approchent de nos galères."
 ven_state_inquisition:0 "L'Inquisition d'État"
 ven_state_inquisition_desc:0 "L'Inquisition d'État est un tribunal constitué de trois juges, mis en place pour traiter des menaces à la sécurité intérieure. Ce petit nombre de juges permet de réagir rapidement et il ne faut pas longtemps pour mettre en place, aussi bien dans la cité qu'à l'étranger, un réseau d'agents capable de dénicher les traîtres."
 ven_stato_da_mar:0 "Stato da Màr"
 ven_stato_da_mar_desc:0 "Le commerce est le sang même de Venise, et la gestion de nos postes commerciaux outre-mer est vitale pour nos intérêts. En centralisant l'administration de ces territoires en un seul organisme, « l'État de la mer », nous pourrions accroître nos échanges."
 ven_venetian_painting:0 "Peinture vénitienne"
 ven_venetian_painting_desc:0 "Dans son ensemble, la région italienne est célèbre pour sa contribution à la culture mondiale, et la peinture vénitienne en est l'étendard. Des artistes de tous horizons viennent visiter nos galeries pour découvrir de près la Renaissance italienne qui rayonne de notre grand art."
 ven_venetian_palaces:0 "$venetian_palaces$"
 ven_venetian_palaces_desc:0 "$venetian_palaces_desc$"
 ven_venetian_school_of_music:0 "École de musique vénitienne"
 ven_venetian_school_of_music_desc:0 "Si les tableaux attirent les amateurs d'art visuel, la musique vénitienne traverse les frontières pour influencer ceux qui recherchent l'illumination mélodique. De nombreux grands compositeurs issus de nos écoles de musique parcourent aujourd'hui l'Europe pour diffuser notre culture."
 venetian_arsenal_advance:0 "Arsenal de Venise"
 venetian_arsenal_advance_desc:0 "Depuis le XIIe siècle, l'Arsenal de Venise est le socle sur lequel se fonde notre puissance."
 vetting:0 "Enquêtes de contrôle"
 vetting_desc:0 "Avec autant d'offices lucratifs, il ne serait pas étonnant que nos fonctionnaires soient susceptibles d'être soudoyés par des puissances étrangères. Quelques vérifications élémentaires permettraient de découvrir ceux qui sont les plus susceptibles d'être corrompus."
 vibrant_court_advance:0 "Cour animée"
 vibrant_court_advance_desc:0 "Les grands esprits affluent à notre cour depuis le monde entier, avec des modes et des langues différentes. En conséquence, nous devenons de plus en plus tolérants à l'égard de leurs « mœurs » étrangères."
 vice_roys:0 "Vice-rois"
 vice_roys_desc:0 "La mise en place de vice-rois permet une administration plus performante de nos colonies, et par conséquent l'accroissement des revenus que nous pouvons en tirer."
 viceroyalty_advance:0 "Vice-royauté"
 viceroyalty_advance_desc:0 "Une vice-royauté est une unité territoriale distincte et semi-autonome au sein du royaume, définie comme un État monarchique gouverné par un vice-roi. Nommé personnellement par le monarque, celui-ci joue un rôle essentiel : administrer et gouverner un pays ou une province spécifique. Généralement située à l'écart du noyau central du royaume, la vice-royauté fonctionne comme une entité séparée, ce qui lui permet de jouir d'une certaine autonomie tout en restant sous la coupe du souverain régnant. Le vice-roi assume de nombreuses responsabilités, de la mise en œuvre de politiques au maintien de l'ordre, en passant par la représentation de l'autorité royale dans la région désignée."
 vid_the_codex_shishman:0 "Le Codex Chichman"
 vid_the_codex_shishman_desc:0 "Pour parachever la transition d'un État féodal médiéval vers une monarchie moderne et centralisée, le Tsarat promulguera le #italic Societas Codex Chichman#! , une réforme juridique complète qui unifie les coutumes locales disparates des Balkans occidentaux. Ce code établira une magistrature professionnelle, indépendante des propriétaires terriens locaux, et standardisera les poids, mesures et monnaies utilisés dans tout le réseau commercial de Vidin. En offrant un cadre juridique prévisible et équitable, nous assurerons la croissance d'une classe moyenne urbaine loyale et la stabilité des recettes fiscales de l'État. Cette modernisation administrative fera de Vidin un phare du « Despotisme éclairé » à l'Est, où l'État de droit est aussi inébranlable que les murailles de Baba Vida elle-même."
 vid_the_mining_grants:0 "Les accords de minage"
 vid_the_mining_grants_desc:0 "Vidin doit étendre son influence dans la vallée riche en minerais du Timok, en accordant des chartes aux mineurs saxons et ragusains pour extraire l'argent, le plomb et le cuivre. Cette base industrielle fournira au Tsarat les métaux nécessaires à une monnaie moderne et à la production d'armes à feu de haute qualité, faisant de Vidin une puissance militaire autosuffisante. La richesse issue de ces mines permettra également aux tsars d'entretenir une armée professionnelle."
 vid_the_order_of_the_danubian_dragon:0 "L'Ordre du Dragon du Danube"
 vid_the_order_of_the_danubian_dragon_desc:0 "Pour assurer la loyauté de la noblesse frontalière et créer un corps d'officiers professionnel, les tsars de Vidin établiront un ordre chevaleresque local calqué sur la #italic Societas Draconistrarum#! d'Europe occidentale. Les membres de cet ordre se verront attribuer des domaines le long des rivières Timok et Danube en échange du maintien d'un état de préparation permanent et de la fourniture d'un noyau de cavalerie lourde pour la défense du Tsarat. Cette institution devrait permettre de combler le fossé entre les anciennes traditions des boyards bulgares et les standards chevaleresques de l'Occident, favorisant un haut niveau de discipline militaire et de loyauté personnelle envers la Couronne, tout en prévenant la fragmentation interne."
 vid_the_stronghold_of_baba_vida:0 "La forteresse de Baba Vida"
 vid_the_stronghold_of_baba_vida_desc:0 "La forteresse de Vidin, située à un méandre stratégique du Danube, sert de passerelle ultime entre les terres bulgares, les plaines hongroises et les montagnes serbes. Sous la dynastie Chichman, le château de Baba Vida a été transformé en une citadelle fluviale sophistiquée, capable de résister à de longs sièges et d'abriter une garnison permanente de troupes d'élite. Cette attention portée à l'architecture défensive garantit que Vidin reste un bastion souverain, même lorsque le reste du cœur de la Bulgarie est menacé, agissant comme un « Bouclier de l'Ouest » pour la nation."
 vid_the_western_connection:0 "Liens avec l'Occident"
 vid_the_western_connection_desc:0 "Situés au carrefour des cultures, les tsars de Vidin ont entretenu des liens plus étroits avec l'Occident catholique que tout autre souverain bulgare, en se mariant souvent avec la noblesse hongroise et valaque. Cette flexibilité diplomatique permet à Vidin de survivre en tant qu'État indépendant, en utilisant la technologie militaire occidentale et les traditions de cour pour se distinguer du reste de la $BUL$. En servant de pont entre les mondes orthodoxe et catholique, Vidin devient un centre de commerce et d'échanges intellectuels qui enrichit le trésor local et renforce l'armée."
 vid_vidins_custom_houses:0 "Maisons de douane de Vidin"
 vid_vidins_custom_houses_desc:0 "À mesure que le commerce entre le haut Danube et la mer Noire se développe, Vidin est devenue l'une des plus importantes maisons de douane du bas Danube, régulant le flux des produits de luxe européens vers les Balkans. En mettant en place un système sophistiqué de tarifs et de lois sur les entrepôts, l'État pourra remplir ses coffres sans imposer une lourde charge à sa propre population agricole. Cette économie axée sur le commerce permettra à Vidin de moderniser ses infrastructures, en construisant des routes pavées et des ponts de pierre reliant le Danube à l'intérieur de la péninsule balkanique."
 vij_adroit_diplomacy:0 "Une diplomatie habile"
 vij_adroit_diplomacy_desc:0 "Les nombreux envahisseurs de notre peuple $hindu_ADJ$ ont montré à maintes reprises la même faiblesse : une propension à se battre entre eux. Nous devons être prêts à tout moment à l'exploiter à nos propres fins."
 vij_an_army_for_city_of_victory:0 "Une armée pour la Cité de la Victoire"
 vij_an_army_for_city_of_victory_desc:0 "Pour que Vijayanâgara, la « Cité de la Victoire », soit digne de son nom, nous devons nous assurer que notre armée remporte des victoires. Veillons à ce que nos troupes soient bien formées et s'enorgueillissent de leur rôle."
 vij_arab_horses:0 "Chevaux arabes"
 vij_arab_horses_desc:0 "Les chevaux de la péninsule arabique sont de loin supérieurs aux races locales. Nous utiliserons nos relations commerciales pour assurer un approvisionnement régulier de ces chevaux pour nos troupes."
 vij_carnatic_music:0 "Musique carnatique"
 vij_carnatic_music_desc:0 "Nous devons résister à l'invasion de l'$muslim_ADJ$ sur tous les fronts. Les traditions musicales des États du Nord montrent déjà des signes d'influences étrangères. C'est un blasphème, car nous savons tous que la musique est une forme d'art divin qui trouve son origine chez les Devas et les Devis eux-mêmes. Nous montrerons au peuple $hindu_ADJ$ qui est là pour le défendre."
 vij_city_of_victory:0 "La Cité de la Victoire"
 vij_city_of_victory_desc:0 "Vijayanâgara, la #italic Cité de la Victoire#!, est le cœur de notre État et deviendra un jour le cœur de l'empire $hindu_ADJ$ de l'$india$ qui repousse les envahisseurs $muslim_ADJ$s. Puisse-t-elle être le phare de notre culture et de nos traditions !"
 vij_cultural_integration:0 "Intégration culturelle"
 vij_cultural_integration_desc:0 "La diversité culturelle du sous-continent indien est une évidence. En permettant aux habitants locaux de gouverner selon leurs propres coutumes, nous pouvons assurer leur loyauté et leur intégration dans notre société."
 vij_decentralized_rule:0 "Régime décentralisé"
 vij_decentralized_rule_desc:0 "Alors que l'État se développe, les charges administratives qui pèsent sur le gouvernement et les risques potentiels de révolte augmentent également. Pour y remédier, il est nécessaire d'instaurer un régime décentralisé dans lequel les habitants peuvent gérer eux-mêmes les problèmes mineurs, tandis que seuls les problèmes importants sont portés devant les tribunaux pour y être traités."
 vij_first_indian_artillery:0 "Première artillerie indienne"
 vij_first_indian_artillery_desc:0 "L'utilisation de la poudre à canon dans le domaine militaire n'est pas encore très répandue, mais elle présente un grand potentiel pour façonner l'avenir de la guerre. Nous devons explorer l'utilité et le pouvoir de la poudre à canon."
 vij_harsh_penal_code:0 "Code pénal sévère"
 vij_harsh_penal_code_desc:0 "Le dirigeant fait respecter la loi en tuant. Établissons un nouveau code pénal sévère et, surtout, veillons à ce qu'il soit appliqué afin que nos concitoyens se sentent en sécurité dans notre pays."
 vij_indian_throne:0 "Le trône indien"
 vij_indian_throne_desc:0 "L'$india$ est soumise aux menaces de l'$muslim_ADJ$ depuis bien trop longtemps. Des empires païens prétendent régner depuis $delhi$ au nord, mais leurs croyances et leur gouvernement sont en opposition directe avec ce que les Indiens souhaitent vraiment. Non, il faut établir un nouveau siège du pouvoir et faire de $vijayanagar$ le nouveau trône d'$india$ !"
 vij_promotion_of_trade:0 "Promotion du commerce"
 vij_promotion_of_trade_desc:0 "Nos terres sont situées sur l'une des principales routes commerciales entre l'Est et l'Ouest. Nous devons veiller à ce que nos zones portuaires soient sûres et sécurisées afin que les capitaines de passage s'arrêtent sur nos terres et que nous puissions ainsi les taxer."
 vij_rule_in_accord_with_dharma:0 "Gouverner avec le dharma"
 vij_rule_in_accord_with_dharma_desc:0 "Le dharma est un pilier majeur de nos valeurs religieuses et sociétales. Notre État ne peut être juste et vertueux que si nos dirigeants eux-mêmes incarnent et vivent en accord avec le dharma."
 vij_the_bunds:0 "Les digues"
 vij_the_bunds_desc:0 "Notre société repose sur l'agriculture dans la région plutôt aride de $karnakassala_area$. Les #italic digues#! (également appelées #italic anecut#!) fournissent à nos villes comme à nos champs l'eau dont ils ont tant besoin."
 voivode_advance:0 "Voïvode"
 voivode_advance_desc:0 "Le voïvode est un chef militaire chargé de maintenir l'ordre, de défendre les territoires contre les menaces extérieures et de mener des campagnes militaires. Le poste de voïvode peut être utile pour surmonter les défis administratifs dus aux moyens de communication limités de l'époque."
 wagenburg:0 "Wagenburg"
 wagenburg_desc:0 "Pendant les croisades contre les hussites, nos armées comptaient sur des forteresses mobiles pour remporter des batailles que nous aurions sinon perdues. Nous n'utiliserons peut-être pas toujours ces forts, mais des tireurs d'élite en position défensive représenteront une tactique de choix pour nos armées tchèques invincibles."
 wake_of_the_mongol_horde:0 "Séquelles des conquêtes $mongolian_group$es"
 wake_of_the_mongol_horde_desc:0 "Il n'existe nul lieu en $asia$ qui n'ait ressenti l'influence des conquêtes $mongolian_group$s. Maintenant que le grand empire de $genghis_khan_name_no_tooltip$ est tombé, la terre se régénère après le passage de ses chevaux."
 wal_the_abolition_of_serfdom:0 "L'abolition du servage"
 wal_the_abolition_of_serfdom_desc:0 "Sous l'impulsion des réformistes de notre nation, nous avons pris la décision radicale d'abolir légalement le servage, avant de nombreux voisins. En transformant les paysans de « biens meubles » en « sujets imposables », nous avons centralisé le pouvoir fiscal de l'État et brisé le contrôle absolu des boyards ruraux. Cette révolution sociale offre au voïvode une relation plus directe avec le peuple, créant une population plus mobile et économiquement active, capable de soutenir une administration centrale en pleine modernisation."
 wal_the_diplomat_schools:0 "Les écoles de diplomates"
 wal_the_diplomat_schools_desc:0 "Sous le mécénat des hauts fonctionnaires, nous avons fondé l'Académie princière de Saint Sabbas, attirant des professeurs italiens et grecs dans notre capitale. Cet investissement dans l'enseignement supérieur a créé une génération de « philosophes-diplomates », aussi à l'aise pour discuter de rhétorique latine que pour négocier des traités secrets avec nos voisins. En faisant de notre capitale un phare intellectuel, nous avons garanti que notre élite administrative reste la plus raffinée des Balkans, capable de surpasser quiconque à chaque tournant."
 wal_the_order_of_the_dragon_influence:0 "L'influence de l'Ordre du Dragon"
 wal_the_order_of_the_dragon_influence_desc:0 "Nous introduirons en Valachie une culture de guerre psychologique brutale et d'ordre absolu. En purgeant les boyards corrompus et en imposant des codes juridiques stricts, nous consoliderons le pouvoir princier et transformerons l'armée en une force centralisée, loyale uniquement envers le voïvode. Cette réputation impitoyable servira de principal moyen de dissuasion contre les forces de nos ennemis."
 wallachian_heritage:0 "L'héritage de la bataille de Posada"
 wallachian_heritage_desc:0 "En 1330, Basarab Ier vainquit le roi de Hongrie Charles Robert, assurant l'indépendance de la Valachie grâce à une maîtrise supérieure des tactiques montagnardes. Cette victoire prouva qu'une force plus réduite et locale pouvait utiliser les dangereux passages des Carpates pour démanteler des armées impériales, établissant un précédent militaire pour les cinq siècles suivants. Nos troupes sont désormais expertes dans la guerre de harcèlement et exploitent le terrain pour épuiser les envahisseurs bien avant qu'ils n'atteignent les plaines danubiennes."
 wallachian_tradition:0 "La descente des Valaques"
 wallachian_tradition_desc:0 "Selon la tradition historique, Rodolphe Bessaraba aurait traversé les Carpates depuis la Transylvanie pour fonder la principauté de Valachie. Des récits analogues ont également été rapportés concernant la fondation d'autres principautés. Cette « descente fondatrice », ou #italic Descălecatul#!, représente la migration des élites roumaines et l'établissement de la première Țara Românească (terre roumaine) souveraine, affranchie de toute hégémonie étrangère. Cet événement marque la naissance d'un État roumain unique, séparé des empires environnants, mais profondément enraciné dans la tradition orthodoxe et latine."
 wampum:0 "Wampum"
 wampum_desc:0 "Mélange de perles blanches et violettes issues de différents coquillages, le wampum a de nombreux usages. De la consignation d'histoires et de traités jusqu'au commerce, les perles de wampum se trouvent partout où notre peuple est présent."
 wandering_scholars:0 "Érudits errants"
 wandering_scholars_desc:0 "Des communautés de sages issus de nombreuses confessions vivent sur nos terres, enseignant leur foi de manière à ce que chacun les écoute et répandant la seule vraie foi parmi notre peuple."
 war_bonfires:0 "Feux de guerre"
 war_bonfires_desc:0 "Un réseau de postes frontaliers, reliés entre eux par d'immenses feux, nous prévient en cas d'urgence pour nous permettre de répondre rapidement à toute menace."
 war_college_advance:0 "École militaire"
 war_college_advance_desc:0 "$war_college_desc$"
 war_no_cb_cost_modifier_renaissance_advance:0 "Guerre récurrente"
 war_no_cb_cost_modifier_renaissance_advance_desc:0 "La guerre évolue en même temps que les États qui les livrent. Leurs capacités accrues leur permettent de faire la guerre plus longtemps, et les guerres entre États sont donc de plus en plus fréquentes."
 war_score_absolutism_advance:0 "Revendications agressives"
 war_score_absolutism_advance_desc:0 "La puissance de l'État est directement liée à sa capacité militaire. Il s'avère que plus un pays est peuplé, plus son armée est puissante. Notre diplomatie doit adopter une approche agressive pour annexer autant de terres que possible dans les traités de paix afin de renforcer notre avantage sur nos voisins."
 war_score_reformations_advance:0 "Droit divin de conquérir"
 war_score_reformations_advance_desc:0 "Nos victoires sur le champ de bataille ne sont pas uniquement dues à une bonne exécution de nos plans d'attaque et stratégies de guerre : elles sont le fruit d'une intervention divine. Ainsi, le droit de conquérir et d'annexer de nouveaux territoires pour lequel nous avons versé du sang est une extension de la volonté divine."
 war_score_revolutions_advance:0 "Arguments de la raison"
 war_score_revolutions_advance_desc:0 "La guerre est un concept abominable qui fait la souffrance des deux camps. Accepter cette réalité et faire appel à la logique et à la raison de l'autre partie nous donnera un avantage significatif lors des négociations concernant les changements inévitables de frontières."
 warachikuy:0 "Warachikuy"
 warachikuy_desc:0 "Le Warachikuy est une cérémonie sacrée au cours de laquelle de jeunes hommes mettent à l'épreuve leurs compétences, leur courage et leur intelligence, ainsi que leurs capacités physiques telles que la course, le tir de précision, le combat et la résistance à de longues périodes sans sommeil. Ceux qui réussissent brillamment ces examens sont promus au rang d'officiers dans notre armée grandissante."
 warka_ties:0 "Relations avec les Warka"
 warka_ties_desc:0 "Nos relations avec les Warka nous ont permis d'acquérir de précieuses connaissances en matière de chasse et de cueillette. Grâce à ces pratiques, nous sommes en mesure d'assurer la subsistance de notre peuple, et ce même pendant les hivers prolongés."
 warlord_dukes:0 "Ducs guerriers"
 warlord_dukes_desc:0 "En deux siècles de guerres acharnées, les grands ducs guerriers lituaniens sont parvenus à unifier un pays qui n'était auparavant rien de plus qu'une vague fédération tribale en véritable État guerrier, à mener la résistance contre les ordres de moines-chevaliers catholiques, et à conquérir de vastes territoires à l'est. Ces exploits suscitent l'admiration de nos commandants."
 warrior_societies:0 "Sociétés guerrières"
 warrior_societies_desc:0 "Notre société remarquablement dynamique offre au petit peuple, les #italic mācēhualtin#!, l'opportunité de devenir #italic pīpiltin#! (nobles) par leur vaillance au combat, dont ils gardent trace sur leur habit #italic tlahuiztli#! honorifique. Cette chance unique de mobilité ascendante nous donne un avantage direct sur les sociétés voisines."
 warriors_unity:0 "Guerriers unis"
 warriors_unity_desc:0 "Nous ne sommes peut-être pas la tribu la plus nombreuse, mais nos institutions tribales fortes nous accordent ce qui fait défaut aux autres : l'unité ! Nos guerriers combattent en tant que frères, côte à côte au combat. Tant que nous maintiendrons cette tradition, personne ne pourra nous vaincre !"
 wary_of_heretic_preachers:0 "Défense contre les hérétiques"
 wary_of_heretic_preachers_desc:0 "Nous devons nous méfier des forces qui tentent de convertir notre peuple ou de restaurer notre ancienne foi. En désignant ouvertement ces prédicateurs comme hostiles et malveillants, nous pourrons nous préparer à cette menace et imposer plus facilement une orthodoxie religieuse."
 watchers_of_the_silk_road:0 "Gardiens de la Route de la soie"
 watchers_of_the_silk_road_desc:0 "Nous ne construisons pas, nous ne marchandons pas. Nous prenons ce dont nous avons besoin, et parfois un peu plus. Nos guerriers ont surveillé avec attention les négociants étrangers et leurs techniques : désormais, nous connaissons les routes les plus sûres pour transporter nos biens."
 water_frame:0 "Water frame"
 water_frame_desc:0 "Cette machine à filer hydraulique est utilisée dans l'industrie textile pour produire du fil de coton. Une innovation qui contribuera à la mise en place de grandes usines textiles alimentées par des roues hydrauliques."
 wealth_of_mesoamerica:0 "Richesses de la Mésoamérique"
 wealth_of_mesoamerica_desc:0 "Les sols fertiles, les forêts et les mines d'Anahuac produisent d'immenses richesses qui soutiennent notre croissance ainsi que nos ambitions impériales. Une utilisation judicieuse de ces ressources renforcera notre influence."
 weapon_factory_advance:0 "Fabrique d'armes"
 weapon_factory_advance_desc:0 "$weapon_factory_desc$"
 weapon_guild_advance:0 "$weapon_guild$"
 weapon_guild_advance_desc:0 "$weapon_guild_desc$"
 weapon_manufactory_advance:0 "Manufacture d'armes"
 weapon_manufactory_advance_desc:0 "$weapon_manufactory_desc$"
 weapon_workshop_advance:0 "$weapon_workshop$"
 weapon_workshop_advance_desc:0 "$weapon_workshop_desc$"
 weisuo_system:0 "Wèi suǒ"
 weisuo_system_desc:0 "Nos terres sont convoitées par de nombreux conquérants étrangers. Pour les défendre, nous devons mettre en place un système de garnison destiné à réagir rapidement aux invasions hostiles. Grâce au recrutement de troupes locales, nos prouesses défensives seront complétées par des approvisionnements et une logistique plus efficace."
 west_african_caravan_stop_advance:0 "$caravan_stop$ saharienne"
 west_african_caravan_stop_advance_desc:0 "Le commerce entre l'Afrique subsaharienne et l'Afrique du Nord fait partie de notre identité depuis des siècles. Même avec de nombreuses années d'expérience, la traversée de l'immensité du désert est à la fois dangereuse et éprouvante. La clé du commerce dans cette région réside dans la $caravan_stop$, un lieu où les marchands et leurs caravanes peuvent se reposer durant leur périple."
 west_african_slave_trade:0 "Traite des esclaves en Afrique de l'Ouest"
 west_african_slave_trade_desc:0 "Avant même que notre empire ne soit fondé, le grand royaume du Wagadou, l'empire du Ghana qui nous a précédés, vendait des esclaves aux Arabes par-delà le désert. En fournissant au monde arabe un nombre illimité d'esclaves, nous sommes en ce sens son successeur. Aujourd'hui, les Européens veulent également des esclaves pour travailler dans les plantations de ce qu'ils appellent le Nouveau Monde. Et si nous n'avons encore que peu d'informations, la quantité d'esclaves qu'ils demandent est proprement ahurissante. Ils ne cessent de revenir, allant parfois même jusqu'à razzier nos côtes pour s'emparer de nos propres sujets. L'heure est venue de remettre de l'ordre dans la traite des esclaves et d'obliger les Européens à débarquer dans certains ports, bien définis, pour acheter et non plus voler des esclaves."
 westphalian_monastic_traditions:0 "Pays des monastères"
 westphalian_monastic_traditions_desc:0 "Le nord de l'Allemagne abrite de nombreux bastions catholiques, tels que les évêchés de Münster et de Padoue. La vie monastique et les traditions religieuses associées à la région ont un effet positif sur l'alphabétisation et l'éducation de notre clergé, car il y trouve de nombreux endroits pour se former et apprendre, ce qui multiplie les opportunités pour les ecclésiastiques cherchant à rejoindre notre sainte mère l'Église."
 whale_hunters:0 "Chasse à la baleine"
 whale_hunters_desc:0 "Baleines, marsouins, morses et phoques, tout ce que nous donne la mer est plus important que nous et que notre orgueil négligent. Tout ce que nous donne la mer, nous le chassons."
 wiener_klassik:0 "Classicisme viennois"
 wiener_klassik_desc:0 "Le classicisme viennois est une période musicale transformatrice. Les œuvres de nos compositeurs les plus talentueux révolutionneront la musique occidentale de par leurs formes innovantes, qu'elles soient symphoniques, lyriques ou de chambre."
 windmills_advance:0 "$windmill$"
 windmills_advance_desc:0 "$windmill_desc$"
 winery_manufactory_advance:0 "$winery_manufactory$"
 winery_manufactory_advance_desc:0 "$winery_manufactory_desc$"
 winged_hussars_advance:0 "Hussards ailés"
 winged_hussars_advance_desc:0 "Les hussards étaient à l'origine des troupes de cavalerie légère utilisées comme éclaireurs. Transformés par le déclin de l'armée féodale traditionnelle en régiments professionnels, ils constituent l'essentiel de la cavalerie. Les hussards ailés de Pologne seront bientôt redoutés de tous."
 wojsko_komputoe:0 "Wojsko komputowe"
 wojsko_komputoe_desc:0 "La wojsko komputowe, « l'armée calculée », dépendait d'un budget annuel calculé et approuvé par le Sejm, le parlement. L'idée était de donner à la république des Deux Nations une armée régulière stable pour assurer sa défense."
 woodblock_printing:0 "Impression au bloc de bois"
 woodblock_printing_desc:0 "La production d'illustrations, d'œuvres d'art et de livres élégants à l'aide de cette méthode d'impression a captivé l'attention de notre peuple, qui s'efforce de perfectionner sa technique. L'impression au bloc de bois fait désormais partie de notre culture et, grâce aux améliorations récentes, l'introduction d'œuvres littéraires ne fera que rehausser notre prestige !"
 write_new_sagas:0 "Écrire de nouvelles sagas"
 write_new_sagas_desc:0 "Les esprits vifs préservent la connaissance\\nDes siècles passés\\nChantées au couchant\\nNos épopées sont notre héritage\\nEt avec de la volonté\\nChaque pays aura la sienne."
 written_alphabet:0 "Alphabet écrit"
 written_alphabet_desc:0 "Un peuple est défini par son héritage. C'est pourquoi un alphabet écrit n'est que la première étape vers l'immortalité et l'éducation d'une société fonctionnelle."
 xuanzang_travels:0 "Le voyage de Xuanzang"
 xuanzang_travels_desc:0 "Xuanzang, un moine $buddhist_ADJ$ chinois de la dynastie Tang ayant vécu au VIIe siècle, entreprit un voyage à pied de 17 ans vers l'$india$ afin d'y visiter les centres d'enseignement et de rassembler un grand nombre de textes du $buddhist$. Il visita notamment Nālandā, où il apprit des meilleurs maîtres avant de rapporter plus d'un millier de documents en $china$, contribuant ainsi énormément au courant du $mahayana$. Son périple et ses archives servirent de base à #italic La Pérégrination vers l'Ouest#!, œuvre dans laquelle un moine, accompagné de personnages tels que le Roi singe Sun Wukong, voyage vers l'$india$ au nom du Bouddha en quête de textes sacrés."
 yams_of_the_great_khan:0 "Örtöö du Grand $rank_kingdom_horde_ruler_suffix_male$"
 yams_of_the_great_khan_desc:0 "Afin de veiller à ce que ses messagers puissent voyager assez rapidement pour rejoindre les armées mongoles, $genghis_khan_name_no_tooltip$ a mis en place un système de relais, l'örtöö, qui tous les 30 à 60 km fournit nourriture, abri et chevaux frais à tous les émissaires. Cela permet ainsi de voyager aussi vite qu'un cheval au galop, sans que la fatigue ne s'abatte sur lui. L'empire était ainsi capable de surmonter les difficultés logistiques posées par l'immense étendue du territoire, aussi loin qu'était assurée la Pax Mongolica... tant qu'elle a duré, tout au moins."
 yem_unite_the_tribes:0 "Unification des tribus yéménites"
 yem_unite_the_tribes_desc:0 "Des côtes de la Tihāma aux montagnes du Ḥarāz, notre royaume abrite d'innombrables tribus farouchement indépendantes. Si elles ont toujours résisté à l'autorité centrale, elles sont aussi notre force : en les ralliant à une cause commune, nous pourrons mieux mobiliser leur énergie."
 ymn_descendant_of_nitta:0 "Descendants du clan Nitta"
 ymn_descendant_of_nitta_desc:0 "Nous sommes les descendants du clan Nitta, le plus grand rival de l'ancienne famille Ashikaga. Pour certains, cela constitue une preuve de loyauté, tandis que pour d'autres, cela fait de nous les candidats naturels de l'opposition. Quoi qu'il en soit, nous devons faire bon usage de cette lignée dans les nombreuses possibilités qui nous sont offertes par la vie politique de notre époque."
 ymn_isolated_heartland:0 "Territoire isolé"
 ymn_isolated_heartland_desc:0 "Nos terres sont montagneuses et isolées. Heureusement, cela signifie aussi qu'elles sont difficilement accessibles à un éventuel conquérant. Construisons donc nos défenses autour des points forts naturels offerts par la nature, afin que ceux qui nous attaqueront regrettent d'avoir jamais posé les yeux sur nos possessions."
 ymn_leader_of_western_army:0 "L'armée de l'Ouest"
 ymn_leader_of_western_army_desc:0 "Forgeons une grande armée de l'Ouest afin d'unir les États divisés du Japon. Des généraux courageux et talentueux à la tête de soldats bien entraînés écraseront aisément ceux de l'Est !"
 ymn_mediate_succession_disputes:0 "Médiateurs des querelles de succession"
 ymn_mediate_succession_disputes_desc:0 "Alors que nombre d'autres clans de shugo se divisent pour savoir qui est l'héritier légitime de qui, ils se tournent vers nous pour arbitrer leurs différends. Cela peut nous permettre de gagner de nombreuses relations et de nombreux alliés, tout en nous offrant la possibilité de déstabiliser nos rivaux."
 yoga:0 "Yoga"
 yoga_desc:0 "Appartenant aux écoles et aux philosophies de l'$hindu_ADJ$, le $yoga$ est un ensemble de méthodes physiques et spirituelles visant à unir le corps et l'esprit. Pratiqué depuis des millénaires, il est presque devenu synonyme de chemin de l'esprit éveillé."
 yulin_tuce:0 "Yúlín túcè"
 yulin_tuce_desc:0 "L'évasion fiscale est un problème général qui a frappé nos ancêtres. En établissant des registres pour les districts et les provinces, nous pourrons mieux suivre les impôts dus au gouvernement central par chaque parcelle. Cet impôt est en grande partie déterminé en fonction du rendement en grains de chaque parcelle qui fait l'objet d'une enquête."
 zaju:0 "Zaju"
 zaju_desc:0 "Composé généralement de quatre actes, ce brillant spectacle de danse et de musique est une expression colorée des sommets artistiques atteints par notre société."
 zakah:0 "Zakat"
 zakah_desc:0 "L'un des cinq piliers de l'$muslim$, l'Al-Zakāh est une forme d'aumône considérée comme une obligation religieuse pour tout fidèle $muslim_ADJ$. Le don d'argent en vue d'aider les nécessiteux est un acte de charité impératif pour tous ceux qui en ont les moyens, et qui est vu comme un impôt."
 zan_diplomacy_through_trade:0 "Diplomatie par le commerce"
 zan_diplomacy_through_trade_desc:0 "Notre position unique à la croisée des richesses venues de $china$, d'$india$ et d'$europe$ nous offre une grande influence dans le jeu diplomatique entre empires et puissances étrangères."
 zan_food_imports:0 "Importations de produits alimentaires"
 zan_food_imports_desc:0 "L'aube d'une nouvelle ère de navigation a ouvert de nouvelles sources de moyens de subsistance pour notre peuple. Tandis qu'autrefois nous nous approvisionnions en millet, en bétail et en riz en commerçant exclusivement avec l'intérieur de l'$africa$, nous pouvons maintenant atteindre de nouveaux ports où les denrées alimentaires sont moins chères et plus disponibles."
 zan_gold_trade_of_africa:0 "Commerce de l'or en $africa$"
 zan_gold_trade_of_africa_desc:0 "Nos réserves d'$goods_gold$ provenant de nombreuses sources de l'Est de l'$africa$ sont le fondement de notre richesse et de notre prospérité. Nous devons tirer pleinement parti de nos réserves et diffuser une monnaie forte."
 zan_kilwan_latitude_staves:0 "Instruments de navigation"
 zan_kilwan_latitude_staves_desc:0 "Notre technologie maritime nous permet de naviguer plus loin et plus aisément que tous nos rivaux, ce qui nous accorde de grands avantages."
 zanj_taxation:0 "Imposition des Zanj"
 zanj_taxation_desc:0 "Ce terme désigne à l'origine les habitants de l'intérieur de l'$africa$, en particulier ceux d'origine $bantu_language_family$e, qui constituent désormais une part importante de la population de nos colonies. Tout en leur accordant de nombreuses libertés et responsabilités, ils sont taxés en conséquence afin de conserver leurs privilèges. Leur relative autonomie pacifique au sein de notre cadre juridique a permis l'introduction de phénomènes linguistiques et de nouvelles traditions culturelles."
 zasechnaya_cherta:0 "Zassetchnaïa tcherta"
 zasechnaya_cherta_desc:0 "Afin de rester à l'abri des raids tatars, nos ancêtres ont constitué et maintenu une ligne dense de forteresses bien défendues. À mesure que le pays s'étend, nous devrions prolonger cette « ligne d'abattis » afin d'être certains que le peuple soit toujours protégé de ces attaques capables de s'enfoncer loin dans nos territoires."
 zaydi_scholarly_traditions:0 "Traditions savantes du $zaidi_school$"
 zaydi_scholarly_traditions_desc:0 "Les hauts plateaux du Yémen abritent depuis des siècles l'imamat du $zaidi_school$, foyer de savoir et de piété. S'appuyant sur la jurisprudence islamique, la théologie et le rationalisme, notre tradition savante a garanti l'État de droit et l'intégrité morale de notre gouvernance."
 zenata_roots:0 "Racines zénètes"
 zenata_roots_desc:0 "Notre peuple descend des Zénètes, une tribu connue pour sa production de laine, modeste, mais si importante, et sa tradition d'élevage de vastes troupeaux de béliers."
 zhongshu_sheng:0 "Zhōngshū shěng"
 zhongshu_sheng_desc:0 "Branche essentielle des #italic trois départements et six ministères#!, le secrétariat central est responsable de la codification rédactionnelle de nombreuses réformes et décrets impériaux."
 zmw_controlling_the_mutapan_riches:0 "Contrôle des richesses"
 zmw_controlling_the_mutapan_riches_desc:0 "Les voyageurs occidentaux ont baptisé notre pays « Ophir ». Au cours des siècles, les mines d'or sur le plateau et le contrôle du commerce du Zambèze ont fait de nombreux jaloux. Étendons notre contrôle sur ces territoires et bâtissons des comptoirs commerciaux permanents qui pourraient devenir de vastes cités."
 zmw_cow_horn_tactics:0 "Formations en cornes de vache"
 zmw_cow_horn_tactics_desc:0 "S'adapter aux tactiques de guerre en constante évolution n'est pas une tâche facile. Face à des ennemis potentiellement supérieurs, nous devons avant tout compter sur notre propre mobilité. Si nous parvenons à forcer nos ennemis à un combat de mêlée et à envoyer des régiments pour les prendre en tenaille et encercler leurs troupes, nous leur infligerons des pertes dévastatrices."
 zmw_discipline_and_traning:0 "Entraînements réguliers"
 zmw_discipline_and_traning_desc:0 "Les victoires sont remportées par la discipline, la préparation et l'entraînement. Conscients de ce fait, nos commandants sont parvenus à élaborer de nouvelles tactiques et une nouvelle organisation militaire. Faisons bon usage de ces innovations en regroupant nos guerriers en régiments et en les laissant s'entraîner régulièrement avec leurs arcs, leurs sagaies, leurs couteaux et leurs haches. C'est l'habitude qui leur permettra de combattre en formation sans ressentir la peur, et de vaincre des ennemis plus nombreux."
 zmw_elected_administrators:0 "Administrateurs provinciaux"
 zmw_elected_administrators_desc:0 "Traditionnellement, tous les administrateurs importants, y compris au niveau du village, ont été nommés au sein de la famille de notre dirigeant. Cependant, à mesure que notre empire grandit et mûrit, il est temps de tirer parti des connaissances locales de nos sujets et de leur permettre de choisir leurs propres administrateurs."
 zmw_empowering_the_rozwi:0 "Renforcer l'autonomie des Rozwis"
 zmw_empowering_the_rozwi_desc:0 "Nos territoires abritent de nombreux guerriers compétents. Parmi eux, les Rozvis, des combattants disciplinés, prêts à nous défendre contre quiconque oserait s'emparer de nos terres."
 zmw_encourage_new_settlements:0 "De nouvelles bases pour les ressources"
 zmw_encourage_new_settlements_desc:0 "Au-delà de nos frontières s'étendent de vastes territoires riches en ressources et en pâtures prêtes à être exploitées. Nous devons encourager notre peuple à s'y installer et à y fonder de nouvelles villes."
 zmw_experienced_cattle_herder:0 "Éleveurs expérimentés"
 zmw_experienced_cattle_herder_desc:0 "La garde d'animaux n'est pas une tâche facile, mais elle est vitale. Si nous voulons étendre notre règne, nous devons étendre nos pâturages et agrandir nos troupeaux."
 zmw_merchant_taxes:0 "Redevances mercantiles"
 zmw_merchant_taxes_desc:0 "Avec l'arrivée de nouveaux marchands dans la région du Zambèze, nous devons nous assurer que notre autorité suscite le respect qui lui est dû. Quiconque souhaite faire commerce chez nous et emmener notre or et notre ivoire sur d'autres côtes doit au préalable recevoir l'accord de notre dirigeant et payer la taxe afin de disposer du libre accès. Si le moindre paiement venait à être retardé, l'État confisquerait toute marchandise étrangère."
 zmw_rekindling_the_royal_fires:0 "Rallumer les feux"
 zmw_rekindling_the_royal_fires_desc:0 "Afin que les chefs puissent prouver leur loyauté, à nous autant qu'aux dieux, ils doivent une fois par an venir à la capitale pour rallumer leur feu local à partir du nôtre. Une fois l'année écoulée, notre armée l'éteindra et ils devront refaire le voyage."
 zmw_spokesman_before_the_dead:0 "Celui qui parle avec les morts"
 zmw_spokesman_before_the_dead_desc:0 "Notre dirigeant n'est pas seulement notre chef au sens temporel du terme : on attend aussi de lui qu'il parle en notre nom devant les esprits des morts. Avant toute campagne militaire ou avant toute moisson, il informe les esprits de nos ancêtres, par des cérémonies ou des danses, de notre respect et de nos besoins. Sans un grand meneur pour entretenir les tombes royales et garder un lien étroit avec nos morts, les choses pourraient très rapidement se dégrader pour le pays."
 zmw_stone_builders:0 "Bâtisseurs du Zimbabwe"
 zmw_stone_builders_desc:0 "Les grands édifices de pierre du Zimbabwe impressionnent de nombreux visiteurs. Le maintien de cette tradition nous permettra de développer nos grandes villes de pierre, qui traverseront les siècles."
 zmw_strict_gold_regulations:0 "Régulations sévères du commerce de l'or"
 zmw_strict_gold_regulations_desc:0 "Nos territoires ont beau être riches en ressources qui intéressent les marchands étrangers, la première exportation du pays reste l'or. Même si une telle richesse est pour nous une bénédiction, elle peut aussi s'avérer dangereuse si elle n'est pas fermement maîtrisée. Aussi devons-nous réguler tout commerce et toute possession d'or afin d'éviter les influences extérieures destructrices."
 zta_guerillas_of_the_scrub:0 "Guérillas du maquis"
 zta_guerillas_of_the_scrub_desc:0 "Les #italic Gola Brda#! (« collines nues ») du karst n'offrent absolument aucun couvert à une armée d'invasion traditionnelle, mais elles fournissent d'innombrables cachettes et points d'embuscade pour nos guerriers agiles. Nous avons développé une doctrine tactique sophistiquée de « raids nocturnes », où nos clans descendent silencieusement des sommets sous le couvert total de l'obscurité pour massacrer les camps ennemis, enclouer leurs canons, puis disparaître dans la brume avant les premières lueurs de l'aube. Cette guerre psychologique pousse toute force d'occupation dans les basses terres aux limites de la folie, sous l'effet de la peur constante et de l'épuisement physique, transformant notre territoire en cauchemar qu'elle finit par abandonner, tout en adaptant nos armées à tout environnement hostile."
 zta_maritime_fiefdoms_of_the_adriatic:0 "Fiefs maritimes de l'Adriatique"
 zta_maritime_fiefdoms_of_the_adriatic_desc:0 "Notre identité est forgée au point de rencontre violent entre la haute montagne calcaire et le sel de la mer. En maintenant un contrôle ferme sur les villes côtières stratégiques, les seigneurs de la Zeta agissent comme la porte maritime indispensable de tout l'intérieur serbe, contrôlant le flux du sel, de la soie et de l'argent. Nous utilisons la richesse considérable générée par le commerce méditerranéen et les droits de douane pour financer nos clans montagnards farouchement indépendants et construire de massives fortifications de pierre qui gardent le littoral. Cela garantit que la Zeta demeure une puissance maritime à part entière, projetant son influence bien au-delà des falaises escarpées de l'arrière-pays."
 zta_the_code_of_the_black_mountain:0 "Le Code du mont Noir"
 zta_the_code_of_the_black_mountain_desc:0 "Afin de passer définitivement d'une fédération tribale désorganisée à un État moderne et centralisé, nous avons instauré un nouveau code juridique rigoureux et sans compromis qui réprime strictement la tradition destructrice des vendettas et centralise le pouvoir du #italic vladika#!. En remplaçant le droit tribal ancien par un système uniforme de justice et de fiscalité d'État, nous unifions les clans rivaux en un seul corps national cohérent. Cette réforme transforme l'énergie disparate et souvent chaotique des montagnes en une force nationale disciplinée et concentrée, capable de reconquérir nos côtes ancestrales et d'étendre nos frontières avec l'efficacité d'une puissance européenne moderne."
 zta_the_italian_condottieri:0 "Les condottieres italiens"
 zta_the_italian_condottieri_desc:0 "Nous avons maîtrisé l'art lucratif et périlleux du contrat de mercenariat international. En fournissant aux Italiens une infanterie de montagne d'élite de la Zeta et des marins vétérans pour leurs diverses guerres outre-mer, nous assurons l'accès aux armements modernes de l'Occident, à la poudre à canon et à un puissant allié naval en Adriatique. Cette connexion garantit que l'indépendance de notre royaume est protégée par des amis puissants, tout en nous permettant de maintenir et d'affiner nos anciennes traditions guerrières sur le territoire national. Elle nous confère un avantage militaire professionnel que peu d'autres États balkaniques peuvent espérer égaler."
 zta_the_retreat_to_the_karst:0 "Le repli vers le karst"
 zta_the_retreat_to_the_karst_desc:0 "La côte peut être temporairement perdue face aux sables mouvants de la puissance impériale, mais les montagnes karstiques restent notre forteresse éternelle et imprenable. Notre monastère-forteresse de Cetinje, perché dans les hauteurs du Lovćen où l'air est rare et les pentes abruptes, constitue le cœur de notre nation. Cette cité incarne une stratégie nationale à long terme d'« isolement montagneux », où nous échangeons délibérément la richesse et la vulnérabilité des ports contre la sécurité absolue des sommets. En nous retranchant dans la roche, nous rendons la Zeta pratiquement impossible à annexer ou à gouverner pour toute puissance impériale."
 zta_the_vladika_sovereignty:0 "La souveraineté du vladika"
 zta_the_vladika_sovereignty_desc:0 "Alors que les dynasties nobles laïques déclinent sous la pression des guerres incessantes, les princes-évêques (vladikas) de Cetinje ont endossé le lourd manteau de la direction nationale. Cette #italic monarchie théocratique#! unique unit l'autorité spirituelle et le pouvoir temporel en une seule charge célibataire, empêchant efficacement la dangereuse fragmentation de nos terres entre héritiers féodaux rivaux. Le combat pour l'indépendance montagnarde se transforme en une guerre sainte perpétuelle à laquelle chaque membre de clan est religieusement tenu de participer. Le #italic vladika#! n'est pas seulement un souverain : c'est le symbole vivant de notre résistance, veillant à ce que la croix et l'épée ne soient jamais séparées dans la défense du #italic mont Noir#!."
 age_1_traditions:0 "Bronze"
 age_1_traditions_desc:0 "Chronologie visuelle : 1209-1050 BC. Les économies palatiales, le travail du bronze, les chars de guerre, les royaumes fluviaux et les échanges maritimes définissent le premier horizon technologique du mod Bronze Era. Le moteur utilise des années positives pour rester stable."
 age_2_renaissance:0 "Fer"
 age_2_renaissance_desc:0 "Chronologie visuelle : 1050-800 BC. Les outils en fer, les nouvelles organisations militaires, les royaumes fragmentés et la reconstruction après l'effondrement transforment l'ancien monde du Bronze."
 age_3_discovery:0 "Archaïque"
 age_3_discovery_desc:0 "Chronologie visuelle : 800-500 BC. Les cités, sanctuaires, ports coloniaux, lois écrites et aristocraties régionales commencent à remodeler la Méditerranée et ses arrière-pays."
 age_4_reformation:0 "Classique"
 age_4_reformation_desc:0 "Chronologie visuelle : 500-323 BC. Les cités matures, empires organisés, institutions civiques et armées disciplinées définissent l'équilibre des puissances du monde antique."
 age_5_absolutism:0 "Hellénistique"
 age_5_absolutism_desc:0 "Chronologie visuelle : 323-147 BC. Les royaumes successeurs, cours royales, armées professionnelles et échanges à longue distance relient la Méditerranée orientale à un monde politique plus vaste."
 age_6_revolutions:0 "Romain"
 age_6_revolutions_desc:0 "Chronologie visuelle : 147 BC-120 AD. L'administration impériale, les réseaux routiers, les armées professionnalisées et l'hégémonie méditerranéenne marquent le dernier âge de la campagne."
 artillery_institution:0 "Artillerie"
 artillery_institution_desc:0 "L'invention de la poudre à canon en $CHI$ a conduit à la mise au point d'un dispositif qui utiliserait sa puissance de feu en combat : l'artillerie. Bien que cette dernière se soit répandue dans toute l'$europe$ et l'$asia$ au XIIIe siècle, son adoption dans le domaine militaire ne s'est généralisée qu'au XVe siècle, lorsque les améliorations apportées à la longueur des canons et à la composition de la poudre ont donné à l'artillerie la puissance nécessaire pour menacer les châteaux et les fortifications en pierre typiques d'$europe$. Bientôt, l'artillerie sera utilisée non seulement dans les sièges, mais aussi sur les champs de bataille, car les canons de petit calibre possèdent désormais la mobilité nécessaire pour être déployés et utilisés rapidement. C'est au XVIIIe siècle que l'artillerie a définitivement évolué en un système offensif fondamental, notamment grâce à Napoléon qui a perfectionné son utilisation à des points stratégiques de ses batailles."
 banking:0 "Banque"
 banking_desc:0 "Le prêt d'argent existe depuis l'apparition des monnaies métalliques dans l'Antiquité. Il dépendait cependant de quelques individus et de leurs groupements familiaux ou des États antiques. Un changement s'est produit au Moyen Âge, encouragé par la reprise de la croissance des activités commerciales à grande échelle sur le continent eurasien et ses périphéries.\\\\n\\\\nL'organisation de prêteurs spécialisés s'est mise en place lorsque des communautés juives ont commencé à opérer entre les mondes chrétien et islamique. Cependant, l'essor de la demande de crédit qui a suivi les croisades au XIIe siècle a encouragé les marchands des cités-États italiennes à créer de plus grandes structures de prêt d'argent, fondant ainsi les premières institutions bancaires, telles que les maisons Peruzzi et Bardi.\\\\n\\\\nD'autres instruments ont été développés, comme les lettres de change et les obligations. Les dynasties bancaires telles que les Médicis, les Fugger et les Welser sont rapidement devenues aussi puissantes que les États."
 bronze_large_libraries:0 "Grandes Bibliothèques"
 bronze_large_libraries_desc:0 "An institution based on scholarship, experimentation, and research."
 bronze_professional_armies:0 "Armées professionnelles Grec"
 bronze_professional_armies_desc:0 "Les armées existent depuis que la guerre a été inventée, il y a plusieurs milliers d'années. Pourtant, leur forme a évolué au fil des siècles, jusqu'à se scinder en différents types de recrutement et d'organisation selon les cultures et les époques.\\\\n\\\\nÀ la fin du Moyen Âge, les armées d'un large éventail de sociétés reposaient sur des levées basées sur les structures de la société féodale, avec des chevaliers et des fantassins formant un noyau qui était prélevé de manière saisonnière. Dans certaines régions, cependant, les États étaient suffisamment puissants pour financer des armées permanentes, composées de soldats professionnels disponibles tout au long de l'année.\\\\n\\\\nCe système a également été développé en Europe après le déclenchement de la guerre de Cent Ans, constituant ainsi un changement majeur qui a favorisé une révolution militaire au début de l'ère moderne. L'augmentation de la taille et de la qualité des armées professionnelles, tout en trouvant de nouvelles sources de revenus pour les financer, est rapidement devenue l'un des principaux défis à relever pour les dirigeants du monde entier."
 bronze_routes:0 "Routes du Bronze"
 bronze_routes_desc:0 "An institution driven by trade networks and market growth."
 chariot_warfare:0 "Guerre de Chars"
 chariot_warfare_desc:0 "An institution based on professional warfare and military organization."
 classical_philosophy:0 "Philosophie Classique"
 classical_philosophy_desc:0 "An institution based on scholarship, experimentation, and research."
 commercial_counters:0 "Comptoirs commercial"
 commercial_counters_desc:0 "An institution driven by trade networks and market growth."
 confessionalism:0 "Confessionnalisme"
 confessionalism_desc:0 "Le $catholic$ a longtemps été considéré comme une entité unitaire, mais l'avènement des différentes confessions du $protestant$ y a mis fin. Avec la myriade d'interprétations différentes de ce que doit être la foi, le $christian$ est tout sauf uni. Or, alors qu'auparavant, tout écart par rapport aux enseignements traditionnels de l'Église pouvait facilement être qualifié d'hérésie, les frontières entre les différentes sectes se floutent fort heureusement peu à peu.\\\\n\\\\nAinsi, les autorités religieuses et laïques ont de plus en plus intérêt à définir clairement les formes de leurs doctrines spécifiques, en appliquant leurs règles et leurs points de vue particuliers à tous les aspects de la foi et de la vie. Cela leur permet d'avoir une emprise plus ferme sur la foi des populations, mais accroît également la différenciation, et donc l'animosité, vis-à-vis de toutes les autres formes de croyance."
 enlightenment:0 "Lumières"
 enlightenment_desc:0 "Le siècle dernier a vu la raison et l'empirisme gagner en popularité parmi les grands esprits de la période. Dans le domaine des lettres, les écrits, les publications et les cafés rassemblent souverains, scientifiques, philosophes et hommes de lettres pour débattre des mérites de la tolérance, des méthodes scientifiques ou encore de la propagation des idéaux des Lumières à l'ensemble de l'humanité. Depuis les universités et les cours des monarques éclairés, des expéditions sont envoyées pour mesurer, cataloguer, peser et cartographier le monde, de façon à nous permettre de mieux comprendre les lois qui gouvernent tout ce qui nous entoure. D'autres, pendant ce temps, débattent des lois qui gouvernent la société pour tenter d'établir clairement quels sont les droits naturels des hommes.\\\\n\\\\nUne entreprise colossale a aussi été lancée : la compilation d'une Encyclopédie de l'ensemble des connaissances. Les Lumières de la raison ont été allumées, et nombreux sont ceux qui ont décidé de ne pas prendre de repos tant qu'elles n'éclaireront pas jusqu'au dernier recoin de ce monde."
 global_trade:0 "Commerce mondial"
 global_trade_desc:0 "Depuis l'Antiquité, des marchandises ont été transportées de continent en continent. Alors que cela ne concernait jusqu'à présent qu'un certain nombre de routes et de biens spécifiques, tels que les produits manufacturés d'$india$ et de $CHI$ traversant l'$indian_ocean_continent$ ou transportés sur la Route de la soie, tous ces échanges s'insèrent désormais dans un réseau commercial toujours plus mondialisé. Avec la découverte des Amériques, le contournement de l'$africa$ par les routes maritimes et la traversée de l'$pacific_ocean_continent$, les échanges régionaux sont liés les uns aux autres en un réseau mondial unique et interconnecté.\\\\n\\\\nL'$silver$ extrait dans les $andes_region$ est désormais acheminé depuis l'$europe$ jusqu'en $CHI$ et en $india$, le $iron$ des mines de $scandinavian_region$, forgé sur place, est vendu en $west_africa$ par des marchands $ENG_ADJ$, et d'autres se constituent des fortunes en se contentant de distribuer des $cloth$ et des épices aux marchands d'$south_east_asia$. Même en $india$, les marchands investissent dans les opérations commerciales futures des Européens ! Sans doute est-il encore trop tôt pour parler d'une économie mondiale, mais assurément, nous assistons là à sa naissance."
 hellenistic_cosmopolitanism:0 "Cosmopolitisme Hellénistique"
 hellenistic_cosmopolitanism_desc:0 "An institution driven by trade networks and market growth."
 hoplite_phalanx:0 "Phalange Hoplitique"
 hoplite_phalanx_desc:0 "An institution based on professional warfare and military organization."
 imperial_administration:0 "Administration Impériale"
 imperial_administration_desc:0 "An institution driven by trade networks and market growth."
 industrialization:0 "Industrialisation"
 industrialization_desc:0 "À l'aube du XVIIIe siècle, la soif de croissance de l'Homme a donné naissance à de nombreuses institutions nouvelles. Les progrès dans le domaine de la production et de la manufacture, ainsi que l'introduction de machines complexes, vont changer le monde tel que nous le connaissons à l'échelle planétaire. L'essor de la Révolution industrielle entraîne des changements durables sur la scène internationale, non seulement dans le commerce et les affaires, mais aussi dans le tissu social lui-même. Des inventions telles que le métier à tisser et la machine à vapeur porteront les capacités de l'humanité à leur apogée."
 iron_metallurgy:0 "Métallurgie du Fer"
 iron_metallurgy_desc:0 "An institution based on scholarship, experimentation, and research."
 legalism:0 "Légalisme"
 legalism_desc:0 "Les théories derrière le légalisme s'intègrent aux structures sociétales chinoises depuis des centaines d'années. Le concept selon lequel l'idéalisme pur et la stabilité intérieure conduisent à un État riche et prospère et à une armée puissante est profondément enraciné dans les forums de pensée des domaines de l'Asie orientale.\\\\n\\\\nCependant, à mesure que les marchands et migrants favorisaient l'échange d'idées, le concept de légalisme s'est répandu à travers les vastes étendues du monde musulman. Il y prend la forme d'une relation symbiotique entre païens et croyants dans les États islamiques.\\\\n\\\\nEn Europe, le légalisme représentait un rite de passage, de l'emprise agonisante du grand Empire romain à ses racines juridiques restantes, dont beaucoup serviraient plus tard de base à une nouvelle jurisprudence sur le vieux continent."
 legions:0 "Légions"
 legions_desc:0 "An institution based on professional warfare and military organization."
 levee_en_masse:0 "Levée en masse"
 levee_en_masse_desc:0 "La guerre est un concept en constante évolution, perfectionné à force d'innovations génération après génération. Le XVIIIe siècle a vu naître de puissants empires, chacun avec ses propres ambitions. Pour satisfaire le besoin d'expansion et fournir le carburant nécessaire à la réalisation de ces ambitions, de nouvelles lois sur la conscription nationale vont être rédigées et signées, levant des armées composées de tous les jeunes hommes célibataires, dont la taille façonnera le cours de l'Histoire."
 manufactories:0 "Manufactures"
 manufactories_desc:0 "Alors qu'un certain nombre d'innovations techniques des XVIe et XVIIe siècles ont permis d'accroître la production de certaines marchandises, telles que le métal ou les étoffes, le changement majeur dans le domaine semble plutôt résider dans la mise en place de nouvelles formes d'organisation. En créant des manufactures, souvent situées en périphérie des villes, les capitalistes marchands peuvent contourner les règlements des anciennes guildes qui interdisaient par principe toute production de masse, et rechercher par la même occasion de nouveaux moyens d'accroître la production en organisant et en spécialisant les tâches en un seul lieu. Ces pionniers de l'industrialisation étaient capables d'accroître la production, non pas en recourant à des machines coûteuses, mais en facilitant l'accès aux matières premières et à une main-d'œuvre abondante. Il s'agit là d'un véritable bouleversement des méthodes souvent très régulées utilisées jusqu'alors, qui préfigure une révolution de la société tout entière en conjonction avec les avancées techniques à venir."
 mediterranean_colonization:0 "Colonisation Méditerranéenne"
 mediterranean_colonization_desc:0 "An institution driven by trade networks and market growth."
 meritocracy:0 "Méritocratie"
 meritocracy_desc:0 "De nombreux individus jouissant d'un grand prestige et occupant des postes de pouvoir choisissaient souvent de nommer leurs proches à des postes influents.\\\\n\\\\nL'avènement de la méritocratie en tant qu'institution et mouvement de pensée a été très populaire dans les cours de la Chine impériale. Confucius lui-même y soutenait l'idée que ceux qui gouvernent doivent le faire sur la base du mérite et non du népotisme.\\\\n\\\\nC'est ainsi que la noblesse chinoise fondée sur les liens du sang a été remplacée par une noblesse fondée uniquement sur les capacités méritocratiques. Le développement de cette institution se répercutera au-delà des frontières de l'Asie et finira par atteindre les cours royales des monarques européens, dont les nobles maîtrisaient les mécanismes du pouvoir et de l'autorité."
 military_revolution:0 "Révolution militaire"
 military_revolution_desc:0 "L'état de guerre permanent qui affecte l'Europe aux XVIe et XVIIe siècles entraîne une forte augmentation de l'effectif des armées, une nécessité née de l'autorité croissante des régimes absolutistes concurrents. L'infanterie est désormais armée en masse avec des mousquets à silex, ce qui augmente considérablement sa puissance de feu et ses performances au combat en étant déployée dans une formation en ligne novatrice, qui remplace l'ancienne formation « Pique et arquebuse ». Ces besoins affectent également les capacités d'administration de l'État, qui continue à se développer pour gérer les réserves et les finances requises par cette augmentation des effectifs militaires. C'est également le fer de lance du développement des chaînes logistiques nécessaires pour nourrir les armées et subvenir à leurs besoins, par le biais de dépôts intermédiaires qui soutiennent les armées opérationnelles. Le résultat de ces avancées ne serait autre qu'une recrudescence des guerres entre des pays de plus en plus militarisés au XVIIIe siècle."
 new_world:0 "Nouveau Monde"
 new_world_desc:0 "La découverte du Nouveau Monde annonce une ère nouvelle, non seulement pour les puissances coloniales, mais aussi pour les colonisés. Toutefois, elle a également entraîné la diffusion de matériaux et de techniques, ainsi qu'une prise de conscience de l'immensité du globe. Alors que les animaux, les types de cultures, l'argent et les maladies se répandent de part et d'autre de l'Atlantique, les premiers pas vers une économie véritablement mondiale sont accomplis ; et à mesure que des peuples et des contrées nouvelles sont notés sur les cartes et documentés, tout ce qui a été découvert jusqu'à présent dans les sociétés de l'outre-mer apporte de nouveaux arguments dans les débats religieux et philosophiques. Les grands esprits ressentent à présent le besoin de remettre en question ce qui était autrefois la vérité : de Valladolid à Fatehpur Sikri, la nature du monde est désormais sujette à débat."
 palatial_economy:0 "Économie Palatiale"
 palatial_economy_desc:0 "An institution driven by trade networks and market growth."
 phoenician_alphabet:0 "Alphabet Phénicien"
 phoenician_alphabet_desc:0 "An institution driven by trade networks and market growth."
 pike_and_shot:0 "Pique et arquebuse"
 pike_and_shot_desc:0 "Un nouveau type de guerre a commencé à se développer à la fin du XVe siècle, en plein cœur des guerres d'Italie. La généralisation des piquiers à la fin du Moyen Âge comme alternative aux hommes d'armes capables d'affronter avec succès les charges de cavalerie lourde s'est accompagnée du développement des armes à feu portatives, principalement des arquebuses à mèche et des mousquets. Les soldats adoptent alors une nouvelle formation dans laquelle les piquiers forment un carré, tandis que les arquebusiers se déploient sur les côtés et à l'avant, en cherchant à s'abriter derrière ou à l'intérieur du carré au cas où la formation s'engagerait dans un combat rapproché. Privilégié par les lansquenets allemands et les tercios espagnols, ce nouveau type de formation appelé « Pique et arquebuse » fut bientôt adopté par d'autres armées, régnant en maître sur les champs de bataille européens pendant près de deux siècles. Il fut supplanté au début du XVIIIe siècle par les formations d'infanterie de ligne armées de nouveaux mousquets à silex montés sur baïonnettes."
 printing_press:0 "Presse à imprimer"
 printing_press_desc:0 "La capacité de reproduire en masse des écrits est propre à révolutionner la propagation des informations et, à bien des égards, la société moderne dans son ensemble. Mis au point par des hommes de la Renaissance tels que l'imprimeur vénitien Alde Manuce, ce nouvel art a contribué à alimenter la Renaissance en rendant les classiques traduits plus largement accessibles. La Réforme bénéficiera elle aussi grandement de cette capacité à diffuser des publications polémiques et des traductions des Saintes Écritures.\\\\n\\\\nMaintenant que la technique de l'impression est bien dominée et s'est répandue dans toute l'Europe, l'édition s'est considérablement accrue et des centaines de milliers de copies de toutes sortes d'ouvrages circulent à travers le continent, depuis les pamphlets politiques et religieux jusqu'aux livres expliquant le comportement à adopter en société ou aux traités scientifiques. Avec la multiplication des ateliers d'imprimeurs, les dirigeants s'aperçoivent qu'il est de moins en moins aisé de contrôler cette technique nouvelle, car la production plus facile des ouvrages signifie que la censure peut aisément être contournée en déplaçant une presse de l'autre côté de la frontière, ou même en changeant simplement un titre sur une couverture."
 professional_armies:0 "Armées professionnelles"
 professional_armies_desc:0 "Les armées existent depuis que la guerre a été inventée, il y a plusieurs milliers d'années. Pourtant, leur forme a évolué au fil des siècles, jusqu'à se scinder en différents types de recrutement et d'organisation selon les cultures et les époques.\\\\n\\\\nÀ la fin du Moyen Âge, les armées d'un large éventail de sociétés reposaient sur des levées basées sur les structures de la société féodale, avec des chevaliers et des fantassins formant un noyau qui était prélevé de manière saisonnière. Dans certaines régions, cependant, les États étaient suffisamment puissants pour financer des armées permanentes, composées de soldats professionnels disponibles tout au long de l'année.\\\\n\\\\nCe système a également été développé en Europe après le déclenchement de la guerre de Cent Ans, constituant ainsi un changement majeur qui a favorisé une révolution militaire au début de l'ère moderne. L'augmentation de la taille et de la qualité des armées professionnelles, tout en trouvant de nouvelles sources de revenus pour les financer, est rapidement devenue l'un des principaux défis à relever pour les dirigeants du monde entier."
 renaissance:0 "renaissance"
 renaissance_desc:0 "Dès le XIVe siècle, les riches et les puissants des cités-États italiennes ont parrainé des artistes et des érudits désireux d'explorer les anciennes sociétés romaines et grecques de leurs ancêtres.\\\\n\\\\nEn tant que mouvement culturel, la Renaissance couvre déjà la majeure partie de la région et a eu un impact important sur la littérature, l'art, la philosophie et la musique. Les érudits humanistes analysent également la société dans laquelle ils vivent, en la comparant aux idéaux des philosophes classiques. L'humanisme de la Renaissance est devenu un mouvement plus établi, prêt à imprégner tous les aspects de la société.\\\\nUn nouvel idéal pour les gouvernants comme pour les gouvernés se répand aussi rapidement que les premiers imprimeurs peuvent distribuer des copies de ces idées nouvelles.\\\\n\\\\nUn véritable humaniste de la Renaissance est un expert dans tous les domaines, de la politique à la philosophie en passant par l'art, l'analyse textuelle, la musique et l'architecture. La Renaissance est désormais prête à refaçonner le monde afin qu'il corresponde mieux à ses idéaux classiques."
 road_network:0 "Réseau Routier"
 road_network_desc:0 "An institution driven by trade networks and market growth."
 roman_law:0 "Droit Romain"
 roman_law_desc:0 "An institution based on scholarship, experimentation, and research."
 scientific_revolution:0 "Révolution scientifique"
 scientific_revolution_desc:0 "Il est clair que le monde est plus petit aujourd'hui qu'il ne l'a jamais été. L'essor du commerce mondial et de l'imprimerie a favorisé la circulation des personnes et des idées, permettant une diffusion plus large des connaissances. Cela a entraîné une remise en question et une analyse plus approfondies de la réalité du monde. Ce qui était autrefois reconnu est aujourd'hui remis en question, ce qui n'était que mal compris est aujourd'hui observé et ce qui n'était que supposé est testé.\\\\n\\\\nLes progrès récents dans des domaines tels que les mathématiques, la physique ou la biologie sont indéniables, mais la véritable révolution se révèle être l'évolution dans la perception et l'approche de la science elle-même ainsi que la manière de la comprendre. L'expérimentation systématique constitue la véritable révolution scientifique, qui transformera sans conteste radicalement notre conception du monde."
 standardized_currency:0 "Monnaie Standardisée"
 standardized_currency_desc:0 "An institution driven by trade networks and market growth."
 tribal_migrations:0 "Migrations Tribales"
 tribal_migrations_desc:0 "An institution shaped by religious authority and social cohesion."
